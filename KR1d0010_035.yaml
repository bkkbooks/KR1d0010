body:
  text: 周禮訂義卷三十五宋王與之撰典瑞中士二人府二人史二人胥一人徒十人鄭康成曰典瑞若今符璽郎鄭鍔曰瑞也器也俱用玉以為之同掌於此名官特曰典瑞者蓋器以禮神不憂臣下擅改作惟瑞以為合符之驗天子以是而驗諸侯以知其從違諸侯以是而合乎天子以見其臣服非祭器之比其典之者尤當致嚴故特以瑞名官掌玉瑞玉器之藏辨其名物與其用事設其服飾鄭康成曰人執以見曰瑞禮神曰器瑞符信也鄭鍔曰玉瑞者王與諸侯所執之圭璧使者所執之瑞節玉器者祀天祭地祼先王致四時之圭璧璋瓉也或圭或璧其名不同其色亦異故當辨其名物及其用之也或祀天或祭地或朝日或眺聘或治德或結好或和難故又當辨其用事設繅藉以為之飾者內有寶以體之外有文以章之然後禮可觀王晉大圭執鎮圭繅藉五采五就以朝日鄭司農曰晉讀為搢紳之搢謂插之於紳帶之間若帶劒也賈氏曰凡帶有二大帶大夫以上用素士用練即紳也又有革帶所以佩玉之等今插笏者插於紳之外革之內故曰紳帶之間玉人職云大圭長三尺杼上終葵首天子服之鎮圭尺有二寸天子守之楊氏曰大圭不琢象天道之質朝日次於祀天故晉之鎮圭用以朝日故執之愚案鎮圭説已見大宗伯六瑞日為衆陽之宗上有以參天地之神故用大圭鎮圭繅藉以朝日陳氏曰曲禮曰執玉有藉者則裼無藉則襲左氏曰藻率鞞鞛鄭氏謂繅所以薦玉木為中幹用韋衣而畫之廣袤如其玉之小大蓋玉之藉以藻而繅之長視玉采以象德之文就以象文之成君子以貞剛之質存乎內以柔順藉之於外又有文焉然後可以行禮矣玉五采五就色不過五公侯伯皆三采三就降殺以兩子男大夫聘玉皆二采者禮窮則同繅或作藻冕藻織絲為之則圭繅亦然鄭氏與杜預皆謂以韋為之無據也繅可垂可屈則廣於玉矣鄭氏謂各視其玉之大小亦無據也圭繅皆有組以繫之聘禮所謂皆玄纁繫長尺絢組是也璧繅亦然春秋傳所謂楚平王再拜皆厭璧紐是也賈氏曰下文有三采者亦一采而為一就又云二采一就者以臣行聘不得與君同是以二采采為一行二采共為一就凡言就者或兩行名為一就即此上下文是也或一匝二行為二就就即等也故聘禮云繅三采六等朱白蒼注曰三色色為再就即六等雜記亦云三采六等注云以朱白蒼畫之也再行行為一等是等為一行行亦為就據單行言之曲禮疏曰熊氏云五采五就者采别二行為一就故五就三采三就者亦采别二行為一就故三就二采二就者亦采别二行為一就故再就一采一就者以卿大夫卑采則别唯一行共為一就雜記及聘禮云三采六等故知天下諸侯采别為二等也王昭禹曰設色者采藍以為青采沙以為朱五采藍沙之類也采色一成謂之一就五就則五色皆成也鄭康成曰王朝日者示有所尊訓民事君也天子常春分朝日秋分夕月覲禮曰拜日於東門之外黃氏曰覲禮載朝日之禮蓋時會殷同王既揖諸侯於壇乘龍輅載大旗出拜日於東門之外反祀方明此所謂大朝覲也常朝春朝之日諸侯有修歲事而朝者豈非帥之而出歟國語大采朝日蓋日朝焉王氏詳説曰經籍有言日不言月者有並言日月者且冬夏致日春秋致月見於馮相氏而堯典於仲夏則曰敬致而已土圭以致四時日月見於典瑞而玉人於土圭則曰致日而已王者父天母地兄日姊月未有祭天不及地未有祭日不及月並言日月者備陰陽之義言日不及月者尊陽而卑陰之義郊之祭也大報天而主日晉大圭執鎮圭以朝日則郊之朝於天又可知矣言祀天地之圭而不言朝天地之圭豈其亦大圭鎮圭歟公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王易氏曰此圭璧繼於鎮圭之後即大宗伯以玉作六瑞然上公九命故桓圭九寸侯伯七命故信圭躬圭七寸子男五命故榖璧蒲璧五寸此命數也若桓圭信圭躬圭繅藉皆三采三就榖璧蒲璧之繅藉皆二采再就非命數也用以藉圭璧而隆殺寓焉鄭鍔曰天子受瑞於天故朝日則薦之諸侯受瑞於天子故朝覲宗遇會同則薦之玉以比德而薦之以柔順之繅藉所以明下事上之道也鄭康成曰三采朱白蒼二采朱緑也鄭司農曰以圭璧見于王覲禮曰侯氏入門右坐奠圭再拜稽首侯氏見于天子諸侯相見亦如之鄭鍔曰非特見王之時其薦玉之藉若此諸侯自相見亦然因其三采二采之别以知其爵之髙下國之小大且以明其鄰國交際之禮無非本於文明柔順之道鄭司農曰亦執圭璧以相見故邾隱公朝於魯春秋傳曰邾子執玉髙其容仰瑑圭璋璧琮繅皆二采一就以眺聘鄭司農曰瑑有圻鄂瑑起易氏曰此諸侯遣臣聘眺於天子者然公侯伯以圭而其臣亦以圭子男以璧而其臣亦以璧不特此而巳圭之外又加以璋璧之外又加以琮臣非可以踰乎君其用異也鄭氏謂璋以聘后夫人以琮享之學者遂因以推圭璋之文殊不知玉人曰璧琮九寸諸侯以享夫人又曰瑑圭璋八寸璧琮八寸以眺聘所謂瑑圭璋璧琮者與圭璋璧琮固自不同五等諸侯以桓及蒲穀飾其圭璧而其臣特瑑之五等諸侯或三采三就或二采再就而其臣特二采一就此所以為尊卑之分林氏曰禮於朝覲之玉言其所瑑桓信躬蒲榖是也眺聘之玉言瑑而已瑑圭璋璧琮以眺聘是也若享獻之玉諸侯以享天子則不瑑玉人所謂諸侯以享天子是也鄭鍔曰薦玉之繅藉皆朱緑二采一就二采所以成文一就所以見純一之義鄭康成曰大夫衆來曰眺賈氏曰即殷眺曰視寡來曰聘賈氏曰即時聘曰問黃氏曰時聘殷眺皆用之聘公侯伯以瑑圭璋聘子男以瑑璧琮愚案鄭注以此為諸侯遣使於天子黃氏以此為天子遣使於邦國要知王與諸侯之臣通用以眺聘餘見玉人之事四圭有邸以祀天旅上帝鄭鍔曰邸本也朝宿之邑謂之邸旅者所宿亦謂之邸邸有託宿之義四圭有邸者以璧為邸四面合瑑出一圭託於是也璧以為邸以象天之體四圭邸於璧以象天由體以致用必用四圭者象天道運行周遍四方神無不在之意易氏曰璧之色蒼琮之色俱黃圭之色異不應一玉可以成也邸以託宿為義則是四青圭而託於蒼璧兩青圭而託於黃琮以此求之方合玉人之制劉氏曰天以一氣為四時生萬物五帝四時之宰也易曰帝出乎震是也四圭有邸象四時本出於一氣五帝而本自於一天也王昭禹曰祀天謂圓丘之祀天神也旅上帝則五帝在焉以其及衆神故謂之旅孫氏曰國有故則旅旅者合昊天與五帝並祀也兩圭有邸以祀地旅四望鄭鍔曰以琮為邸兩面各瑑出一圭託於是也邸於琮以象地之體圭之兩也言地道之利用不足於天亦以見地數二之義劉氏曰聖人作易二晝為坤以象地之形象所以兩圭有邸法坤之義王昭禹曰祀地謂方澤之祭大示也旅四望則五嶽四瀆在焉陳及之曰宗伯所謂蒼璧黃琮典瑞所謂四圭兩圭也蒼璧黃琮言其色四圭兩圭言其形以此推之凡夏正祈穀孟夏大雩季秋大享若祀天則冬至圓丘用四圭之蒼璧祭地則夏至方澤用兩圭之黃琮祭天地之處則止於圓丘方澤安有天帝之别昆崘神州之異哉鄭氏以宗伯蒼璧所禮為圓丘郊天皇天帝典瑞四圭所禮為祭感生之帝其説則曰三王之郊一用夏正建寅之月凡王者受命必感五行之氣以生則祭其所生之帝若周以木德而王則祭青帝靈威仰以火德而王則祭赤帝赤熛怒其學蓋自後漢光武好讖當時士大夫相承傳之康成最為精於緯書其曰三王之郊一用夏正是月令孟春天子以元日祈榖於上帝者非郊天也易氏曰大宗伯之六器以蒼璧禮天以黃琮禮地大司樂之職冬日至則禮天於圓丘夏日至則禮地於方澤謂之禮則禮之常若夫四圭有邸兩圭有邸用之於祀亦用以旅然國有大故則旅上帝及四望有故而後稱旅乃與祀天地同其五祀豈禮之常者乎是不然璧貟象天而四圭以象天道之全琮方象地而兩圭以象地道之偶託之於邸用以祀天地則亦禮之常者旅特通用之而巳蓋以上帝四望為主而謂之大旅則天神地示以下皆與於祭此所以兼用禮天地之玉祼圭有瓉以肆先王以祼賔客鄭鍔曰祼圭尺有二寸有瓉其制如槃鄭康成曰漢禮瓉槃大五升口徑八寸下有槃口徑一尺然其柄用圭有流前注疏為龍口之形所以挹鬯以祼神與賔客也説者謂祀先王謂之肆於賔客則以祼為言何邪康成謂以祀先王者肆解牲體以祭因以為名余以為既祼然後解牲體今名祼為肆非其序也肆陳也鬱人和鬱鬯以實彞而陳之凡祼玉濯之陳之皆謂肆為陳圭瓉陳於先王之前而用以灌祭故先儒以為肆者灌祭先王待賔如事神然故其禮有祼所謂上公再祼之類是也嫌賔客人也不當祼故特以祼言之陳氏曰唯天地之神無所用祼故典瑞祼圭止於先王玉人祼圭止於祀廟則天地無祼可知禮曰諸侯賜圭瓉然後為鬯詩曰釐爾圭瓉秬鬯一卣而魯晉之國皆用以其有功於民祭統所謂君執圭瓉祼尸大宗伯執璋瓉亞祼此諸侯用玉瓉之禮周衰禮廢而臧文仲以鬯圭如齊告糴豈知先王所以賜周公之意哉易氏曰賔客亦有祼鄭康成曰爵行曰祼即大行人所謂王禮再祼一祼之節賔客亦有肆即大行人所謂享禮九獻七獻五獻之序先王言肆賔客言祼互文圭璧以祀日月星辰鄭鍔曰以圭邸於璧之上瑑出一圭也日月星辰麗乎天其用各主乎一故用一圭其體則託乎天故以一圭而邸璧易氏曰一圭而邸以璧故謂之圭璧璧貟固所以象天一圭所邸則於天道為不足故以之祀日月星辰王氏詳説曰朝日以大圭鎮圭祀日月以圭璧是朝與祀異矣璋邸射以祀山川以造贈賔客鄭鍔曰半圭曰璋射者琰而出也半圭之璋邸於琮而從下向上皆邪卻而琰出故謂之射鄭康成曰璋有邸而射取殺於四望林氏曰璋邸射素功以其刮摩之功略也鄭氏以素功為無瑑飾若然是四圭兩圭圭璧之類有瑑飾乎李嘉會曰璋邸射之制體方而扞外也體方則守而不變扞外則邪剡而有威體山川之形以扞禦而望諸侯也無所瑑飾貴乎純誠守義而巳玉人於璋邸射特曰素功夷其無瑑明也璋以象隂之任事又從而邪殺之如矢之射見通贊之義以此祀山川則小宗伯所謂兆山川丘陵墳衍者是也賔客之至以此致稍餼賔客之還以此致贈賄項氏曰至館而致餼則曰造出郊而致賜則曰贈所用與山川同者山川為國之扞蔽賔客之來亦以禮相接以扞蔽其國家故也易氏曰琮方固所以象地半圭所邸於地道為不足於以祀山川造贈賔客土圭以致四時日月封國則以土地鄭康成曰土地猶度地也鄭鍔曰土圭尺有五寸上可以度天時下可以測地理欲知天時則植之以觀春夏秋冬之景冬至日在牽牛景長丈有三尺夏至日在東井景長尺有五寸則日之行可知春分日在婁月上弦於東井而貟於角下弦於牽牛秋分日在角月上弦於牽牛而貟於婁下弦於東井則月之行可知謂之致者植土圭於此使景自至於此則以致乎四時之日月者欲知地理則植之以觀東西南北之景以一寸之景知千里之遙以一分之景知百里之近封建諸侯則以此度其地王昭禹曰玉人言土圭尺有五寸以致日以土地言致日不言月蓋主成歲而言成歲者陽而已珍圭以徴守以恤凶荒易氏曰珍有貴重之義鄭鍔曰考玉人之職不言珍圭杜氏謂珍當為鎮康成謂為王使之瑞節其制大小當與琬琰相依不以為鎮圭者人君守之以鎮安天下之圭安可付之使者執以出使乎然諸侯守土王欲徴之凶荒之際王欲恤之遣使以往詎可無所執此所以作珍圭惜其尺寸不傳今無所考非鎮圭斷可知矣杜子春言諸侯為一國之鎮凶荒民有逺志欲鎮安之其説則然改字以從巳意不可也牙璋以起軍旅以治兵守鄭鍔曰半圭曰璋長七寸瑑為齒牙之形取牙齒之剛利能噬齧兵之象故執以起軍旅若屯兵於外守要害之地有不率紀律者執此以治之李嘉會曰兵者服人之難服如牙之噬物必合而後止故以之起軍旅所以治外以之治兵守所以齊內牙璋則軍旅之大者用之中璋則軍旅之小者用之林氏曰鄭康成曰牙璋中璋皆有鉏牙之飾於琰則先言牙璋有文飾也賈公彥曰軍多以牙璋軍小用中璋中璋亦有鉏牙但牙璋文飾多故得牙名而先言春秋之時宋司馬請瑞以命其徒攻桓氏魏有兵符漢有銅虎符發郡國兵皆此類也禮庫曰古者五侯九伯二伯專征而諸侯皆共四方之事畿兵不輕出以周禮司馬法參考王有四方之事則冢宰徴師於四方曰某國不道征之以某月某日師至於某國小宰掌其戒虎賁奉書以牙璋發之則畿兵不遽出也在易未濟髙宗伐鬼方三年有賞于大國則雖天子親征亦用諸侯之師詩周王于邁六師及之則所在皆成六師劉文公平丘之會對晉人曰天子之老請帥王賦元戎十乘則雖王人涖師無過十乘以為先行宣王復古北伐其制如此平王東遷以王人戍申甫揚之水始刺之然春秋之時桓王伐鄭猶有陳蔡衛人二百四十年間王人會伐屢矣左氏未嘗見車之出唯敗績茅戎王師自出春秋深譏焉璧羡以起度李嘉會曰注以羡者不貟之貌本徑九寸傍減一寸以益上下故髙一尺橫徑八寸夫璧貟九寸好三寸肉倍之羡而長之則十寸而傍減為八寸十寸尺也八寸亦尺也十寸之尺起度則十尺為丈十丈為引八寸之尺起度則八尺為尋倍尋為常如是則九寸之璧一縱一橫皆可以為尺蓋通變之權也蓋必因九寸而羡之九天數也可以變通矣鄭鍔曰先王為度之意正以量長短然慮後世度茍不存則欲制作者將無所考故廣為之制以存之有黃鍾之長以為之度則其度起於九寸有璧羡之長以為之度則其度數起於一尺自九寸而積之所謂律吕以作樂者有所考自一尺而廣之所謂器用以行禮者有所考樂之數必起於九以九者陽數而樂由陽來禮之數必起於十以十者陰數而禮由隂作王氏曰度之在樂則起於黃鍾之長在禮則起於璧羡先王以為度之不存禮樂之文熄故作此使天下後世有考劉執中曰度起於黃鍾之長權起於積黍之重又為羡璧則尺寸不可移矣又文駔琮則權衡不可欺矣則五量不言其制已辨也駔圭璋璧琮琥璜之渠眉疏璧琮以斂尸賈氏曰此六玉兩頭皆有孔又於兩孔之間為溝渠於溝之兩畔稍髙為眉瑑故云以組穿聨之王氏曰六物皆為渠眉璧琮又疏焉鄭康成曰斂尸於大斂加之圭在左璋在首琥在右璜在足璧在背琮在腹蓋取象方明神之也疏璧琮者通於天地賈氏曰圭在左已下皆約大宗伯青圭禮東方等文以尸南首而置此六玉宗伯璧禮天琮禮地今此璧在背在下琮在腹在上者以背為陽腹為隂也劉氏曰王者之孝莫大於嚴父配天故其斂也以禮天地四方之玉器為之穀圭以和難以聘女鄭康成曰穀圭亦王使之瑞節易氏曰榖善也若天子遣人和諸侯之難及遣人聘女於諸侯皆以穀圭行之可以釋諸侯之怨惡可以圖諸侯之交好所謂善者取此鄭鍔曰圭之長七寸而為文如榖粟者名曰穀圭蓋與穀之文同也榖粟之為物充實而能飬人王者於諸侯欲使之協比而巳茍有難焉不相協和則遣使執穀圭以和之欲使之信實相與且安其生生之福故曰以和難鄭康成曰難仇讎和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王昏禮有六其五用鴈獨納徴不用鴈以其束帛可執故納幣用玄纁天子加以穀圭欲其信實相親且以生生而不絶故曰以聘女琬圭以治德以結好鄭康成曰琬圭亦王使之瑞節陳用之玉人解曰琬圭貟其鋭使宛而不剡琰圭鋭其末使剡而不宛鄭鍔曰圭長九寸不鋭而貟者名曰琬圭琬猶貟也圭之形皆鋭其上以表其用之利此則貟之凡物尖則逆貟則順故不鋭而貟者所以見柔仁而無所不順之意惟其仁柔而順故諸侯於德有所不順者則執此以治之使去凶德而修其吉德黃氏曰凡諸侯之有其善德者天子遣人以琬圭旌表之及諸侯使其臣來聘亦執此以命事行人言時聘以結諸侯之好是也諸侯於好有所未講者則執此以結之使之去仇怨而結其和好欲其仁柔婉順歡愛相從也易氏曰交好本於執德之不回故治德為大結好次之鄭鍔曰此謂之治德玉人謂之象德蓋中和柔仁者德之體故貟其圭以象之自其制作而言故玉人謂之象典瑞則自王遣使而言故謂之治琰圭以易行以除慝鄭康成曰琰圭亦王使之瑞節鄭鍔曰司農謂琰圭有鋒芒傷害征伐誅討之象然考玉人之制未嘗有鋒芒故禮圖謂鋒芒之言有違判圭之義唯半於圭乃得圭名琰圭亦九寸玉人謂之判圭判者半凡圭皆琰其上寸半而巳此則琰其半以上又半為瑑飾之文其半規以象仁其半琰以象義仁義各居其半而不純乎用兵諸侯所行有不善執此以責誚之使之改易焉治民之政有慝惡執此以戒諭之使之除去焉行人謂殷俯以除邦國之慝此除慝者謂殷俯之所執蓋諸侯政慝未至於可誅故責之使改行除惡所謂愛之以仁必有誚責之辭所謂責之以義黃氏曰易行其惡未著使遷善慝則其惡成矣除惡蠲其罪林氏曰圜而宛之仁故以治德以結好剡而有鋒義故以易行以除慝總論黃氏曰時聘無非結好使者執瑑圭璋璧琮以行禮又執琬圭褒賞有德亦執之殷俯無非除慝使者亦執瑑圭璋璧琮以行權又執琰圭焉戒敕過行亦如之是則聘俯禮同而事異故以宛著其義大祭祀大旅凡賔客之事共其玉器而奉之鄭康成曰玉器謂四圭祼圭之屬鄭鍔曰大祭祀天地宗廟之祭大旅旅上帝及四望賔客所用者祼圭也祭祀所用者四圭兩圭之類典瑞共其器又奉承以往也大喪共飯玉含玉贈玉鄭康成曰飯玉碎玉以雜米賈氏曰飯玉者天子飯以黍諸侯飯用梁大夫飯用稷天子之士飯用梁諸侯之士飯用稻其飯用玉亦與米同時此即檀弓云飯用米貝不以食道鄭云食道褻米貝美是也含玉柱左右顚及在口中者賈氏曰含玉有數有形雜記云天子飯九貝諸侯七大夫五士三貝者鄭云夏時禮以其同用貝故也周天子諸侯皆用玉亦與飯同時行之贈玉蓋璧也贈有束帛六幣璧以帛賈氏曰贈玉者既夕禮葬時棺入坎贈用玄纁束帛即天子加以玉是贈先王物賈氏曰按玉府大喪共含玉此又言之者玉府主作之此官主其成事而共之凡玉器出則共奉之黃氏曰出對藏不用藏之用則出之出則固當共奉之王所賜出玉府內府典瑞不與鄭説非也易氏曰共者共其物奉者奉其事此職皆言玉瑞玉器之名物用事而於職末言共奉之者重其事也鄭鍔曰上言共其玉器而奉之主於祭祀賔客嫌其他事之時或不共奉故言凡玉器出則共奉之見其無往而不共奉王氏詳説曰天府所藏以為國之寶典瑞所藏以為國之用故天府言若遷寶則奉之而典瑞特言凡玉器出則共奉之典命中士二人府二人史二人胥一人徒十人項氏曰萬物制命於天臣制命於王故謂之典命鄭鍔曰觀春秋書王使榮叔來錫公命詩人美宣王能爵命諸侯則命出於人君之所錫也然自一命以至九命有等降之差視命數之差則可以定隆殺之儀是則儀出於命矣典命之官以中士二人為之掌臣下命數之書所以紀實而傳信也所掌者儀與命而特以典命名官者蓋無是命則無是儀賈氏曰典命遷秩羣臣亦是禮事又爵命屬陽故在此掌諸侯之五儀諸臣之五等之命鄭康成曰五儀公侯伯子男之儀五等謂孤以下四命三命再命一命不命也或言儀或言命互文也鄭鍔曰諸侯有儀必本於命諸臣有命亦必有儀於諸侯特言儀於諸臣特言命何也蓋諸臣之命為卑其於儀未必有僭越之差所先辨者莫急於命諸侯之命為尊其於儀也有覬覦之嫌所先辨者莫急於儀易氏曰諸侯未嘗無命以儀為實諸臣未嘗無儀以命為節故也然大宗伯以九儀之命正邦國之位則是命有九此言諸侯五儀諸臣五命者蓋典命所掌者羣臣遷秩命數之書大宗伯則合九等之命所用之儀以正位於朝廷不數不命之士以其卑而無列於朝也上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節王昭禹曰上公有功德者命為二伯二伯雖同於九命九命者未必皆為伯也公其爵也伯其職也若自陜以東周公主之自陜以西召公主之此王制所謂八伯各以其屬屬於天子之老二人以天下為左右曰二伯是也王氏詳説曰為伯者稱公則終其身而二王之後稱公者則及其子孫周公封魯不之魯太公封齊不之齊所以稱公者終於其身而已而其後世不過曰齊侯魯侯而已宋自微子以來庸建于上公終春秋之世未嘗不曰宋公蓋二王之後及其子孫得稱公者所以備三統三公之後其子孫不得稱公者所以旌有德鄭康成曰國家國之所居謂城方也公之城蓋方九里宫方九百步侯伯之城蓋方七里宫方七百步子男之城蓋方五里宫方五百步鄭鍔曰先儒據匠人營國方九里之文謂周天子之城則冝十二里疑匠人為夏商之法余以為匠人據天子中城言非異代之制上公之外城比天子之中城以九里為節宫室則方九百步車旗則建常九斿樊纓九就二車九乘衣服則冕服九章其他禮儀皆以九為節則桓圭九寸繅藉九寸介九人禮九牢朝位賔主之間九十步之類是也王昭禹曰自上公而下降殺以兩禮文之數即其命而制之王制曰三公一命衮若加則賜也不過九命次國之君不過七命小國之君不過五命亦若此鄭鍔曰公卿大夫則以八以六以四公侯伯子男則以九以七以五者蓋內而為王臣其位之尊雖為三公亦臣道也外而為諸侯其國之小雖為子男亦君道也君道南面取法乎陽故公侯伯子男之數皆竒臣道北面取法乎隂故公卿大夫士之數皆偶義各有所取也王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之鄭鍔曰此皆言在朝之命數也卿即上大夫耳大夫則指中大夫下大夫而言自上士中士下士一命再命三命推而上之則中大夫下大夫同於四命其五命不以命在朝之臣故卿六命其七命亦不以命在朝之臣故三公八命其數皆偶然三公與卿大夫在朝未嘗無畿內之封邑鄭康成曰出畿內封於八州之中賈氏曰畿內諸侯就國亦云出封及其就封畿外然後加一等之命以褒崇寵異之故八命之三公加一命則為侯伯四命之大夫加一命則為子男命數既加則國家宫室之類亦從其命數而加之明其內而近君則其勢屈其禮冝殺外而逺君則其勢伸其禮冝隆故也陳君舉曰及其出封皆加一等則勸人之際斯有異恩如加舊無頒爵之等每有不盡之意若當時都極其分了一旦欲勸國征有以褒賜之類皆是人何以待之先王之深意也李氏曰古之立王朝者無九命之公後世人臣寵命之極隆如所謂位上公加九錫者失周家之禮意甚矣陳君舉曰典命之大夫無中下之别案序官有中下大夫則曰命大夫自分為中下似若侯伯同七命子男同五命爵則有髙下不同士以三命為差但典命直言公卿大夫之命者欲見有出封之事故曰其出封皆加一等士爵卑無出封之理故不言也彼士之命數既不言加三命以下者正見序官有上士中士下士三等典命除六命四命無三命二命一命鄭則約之上士為三命中士為再命下士為一命若然王朝三公八命卿六命大夫四命皆為隂爵以待出封為諸侯乃為陽爵九命七命五命士既不得出封故在王朝有三命一命亦為陽爵無嫌鄭鍔曰典命不言天子士之命數獨言諸侯國之士蓋近而在朝名分嚴逺乎朝者易萌僭擬故防諸侯之國為尤急自士巳防之推而上可知易氏曰成周之制有以公卿大夫而出封者齊魯晉衛也有以諸侯入為天子之公卿大夫者芮伯彤伯衛侯毛公是也或出或入乃成周內外相權大制孫氏曰在外者數隆在內者數殺止齋以為先王欲抑內重外輕之患歸於平故於命數致意焉余考之內重外輕此後世之弊先王之世未之聞也諸侯之中擇其材賢入為王官諸臣之中勳名已著則出封邦國書記六卿芮伯彤伯畢公衛侯毛公在焉皆自諸侯為王官者下至吕伋為虎賁氏滕侯為卜正先王豈以人情所樂而求以抑之哉及太公封齊召公封燕周公封魯皆因三方未定封以鎮之周公卒不就國伯禽嗣焉又豈以人情所不樂而以褒之哉內則俯首而為臣不致其殺無以絶僭上之階外則南面而為君不致其隆將無以全君臨之體更出迭入特於車旗衣服禮儀之間示損益初非欲平內外輕重之勢王氏詳説曰毛氏之説以為出加入減先鄭之説以為出加入亦加且毛氏見無衣之篇有豈曰無衣六兮之語遂謂晉武公以侯爵而衣六章是入減也先鄭見宗伯之職有六命賜官之語遂謂子男五命入而為卿是入亦加也然無衣之篇詩人之意欲武公入為天子卿士雖六命之衣亦自有所願為也毛氏失詩人之意矣宗伯之職謂內而卿士之有官人者非謂子男之入為卿士而賜官也先鄭失禮家之意矣出加入不加當從鄭説凡諸侯之適子誓于天子攝其君則下其君之禮一等未誓則以皮帛繼子男鄭康成曰誓猶命也明天子既命以為之嗣樹子不易春秋桓九年曹伯使其世子射姑來朝行國君之禮是黃氏曰此其君有喪有疾不能朝而使其世子攝者猶謂之君禮也王昭禹曰巳成其為君之嗣故攝以行禮則降一等焉避國君之正也鄭康成曰公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝會其賔之皆以上卿之禮焉易氏曰諸侯得以世爵象賢也世必以嫡正分也於是父死則嫡子繼之嫡子死則嫡孫繼之杜僭亂之源定上下之志其先於此然使諸侯自以嫡繼而不稟王命則何以奔走天下故周之王者雖不廢萬世之定分亦未嘗無輕重隆殺之權凡世子受命於王則有文告之辭申戒飭之意故謂之誓已誓者攝其君而至其待之之禮降其君之禮一等若未誓則未有嗣諸侯之義故以皮帛繼子男而無正禮所以尊天子之命上以尊天子之命下以定萬世之分而政行矣王氏詳説曰三帛之制尚矣舜典所載先儒以為孤執皮帛與夫諸侯之適子未誓者以皮帛繼子男公之孤以皮帛視小國之君是已典命所言但諸侯之適子未誓者及公之孤而巳初不言天子之孤宗伯言孤執皮帛其天子之孤歟天子之孤六命此雖不言孤然言其卿六命則孤在其中皮帛者以束帛加虎豹之皮也天子之孤六命上公之孤四命六命之孤所執者虎皮也四命之孤所執者豹皮也若夫諸侯之適子未誓者繼子男亦不純乎子男也公之孤視小國之君亦不純乎小國之君也此又見周公制法之意春秋桓九年曹伯使其世子射姑來朝左氏以為賔之以上卿為禮是不純乎子男明矣行人之職云凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交儐廟中無相以酒禮之是不純乎小國之君也明矣公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各視其命之數鄭鍔曰上公為至尊其國得以立孤孤所以相之猶漢時所立諸侯王之相自一命之士推而上之士惟一命大夫再命卿三命故孤四命四命蓋比天子之大夫名同天子之孤位比天子之大夫名雖同而位不同此所以有天子諸侯之臣之别也執皮帛者見其德足以衣被乎人而文足以炳蔚乎外其禮儀則如子男者天子之大夫出封則為子男公之孤比天子之大夫故得以視子男之君左傳謂列國之卿當小國之君正謂是鄭康成曰視小國之君列於卿大夫之位而禮如子男易氏曰公之孤四命則上同乎天子之大夫執皮帛以視小國之君則又上同乎天子之孤然天子之孤執帛而加虎皮大國之孤執帛而加豹皮此其辨王昭禹曰王之孤與公之孤皆謂之孤以其特立而無朋其德則同其執皮帛以視小國之君固其冝也王昭禹曰上公九命則其臣命之隆者不得等其君命之半故孤四命而巳卿次於孤故三命大夫次於卿故再命士又次於大夫故一命侯伯之君與公異命其卿大夫士之命與公同者蓋自其君之命數為之降數公九命而有四命之孤侯伯不得設孤故進其三命之卿與上公之卿同焉以其臣命之隆者不得等其君命之半則進侯伯之臣與公之卿大夫士同命亦可致其勸而無嫌矣鄭鍔曰余考春秋成三年晉使荀庚衛使孫良夫來聘公以為中行伯之位在三孫子之位為上卿疑其所先而臧宣叔曰次國之上卿當大國之中中當其下下當其上大夫小國之卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制以宣叔之言觀之則次國之上卿只可當大國之中卿是則侯伯之卿不得以比公侯之卿乃與興命之文不合蓋典命言其命之數相同宣伯所言者論其位之相當其命則同而位則降等此其所以異也王氏詳説曰王制次國之卿與大國之卿異今侯伯之卿大夫士亦如之蓋王制所言夏商制夏商上國無孤其卿不得不與次國異周之上國有孤次國無孤是降於大國一等矣卿大夫士之命一同者亦無復嫌於其間也鄭鍔曰其卿三命比天子之上士其大夫再命比天子之中士其士一命比天子之下士宫室車旗衣服之類各從其命數為之等降以其未有國家故不言國家侯伯之國無孤惟有卿大夫其命與其禮儀之類皆視其命數為之制小國之卿再命比天子之中士大夫一命比天子之下士其士不命則其君所自辟除説者謂再命之卿一命之大夫其宫室車旗之類固有可視之命乃若不命之士將安所視耶余謂其君所辟除亦得比附一命之士以為之儀而略減殺也蓋不依一命之士則宫室車旗之類無所取法殆將與庶人未仕者等矣先王之制命數視其國之小大而已總論林椅曰諸侯有五儀而命數止有九七五三等諸臣五等而八六四三二一乃有六等蓋公侯伯子男皆命為之非疊其命而得至焉者若士至大夫則有纍其命而為之者矣故諸臣言等自五命以上則同於子男矣故侯伯子男各言儀周禮訂義卷三十五
