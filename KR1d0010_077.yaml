body:
  text: 周禮訂義卷七十七宋王與之撰矢人為矢王昭禹曰夏官有槀人司弓矢而冬官又有矢人者蓋槀人則掌以財齎弓矢之幹所以給矢人之用者也司弓矢掌弓矢之法則以藏矢人之成者也趙氏曰矢人止為矢冶氏止為㦸二工皆有正職而矢鏃乃金工所制却是冶氏為之矢人特以已打成之鏃刮摩而用為矢考工所以列治氏於攻金之工列矢人於刮摩之工正以此爾詳見冶氏篇鍭矢參分茀矢參分一在前二在後趙氏曰鍭矢注謂鍭之言候也可以伺候射敵人禽獸之近者而中焉毛氏曰以其鍭之重也故名之以鍭茀矢注改作殺以其中則可以死陳用之曰茀之言拂也可以制物即司弓矢所用於近射田獵者也王昭禹曰三分一在前二在後者箭槀中鐵莖三分而以一居前也夫殺矢刃長寸而鋌十之所謂挺則槀中鐵莖也矢長三尺而鐵莖長一尺三分其鐵而以一分居前則一尺之鋌槀前得三寸三分寸之一槀後得六寸三分寸之二則箭鐵為重也此所以中之則死而謂之殺矢鍭矢也陳藴之曰案圖說亦如此或謂矢長三尺一在前則鋌長一尺在前耳不必又於一尺之鋌分三分之一也然一在前者皆鐵耳則前重矣易氏曰三分其槀之三尺則一尺在前二尺在後以後二尺之重與前一尺相等則槀前之鐵為極重矣故其發遲而近射用焉兵矢田矢五分二在前三在後趙氏曰兵矢用於兵戰田矢用於田獵謂枉矢潔矢也即司弓矢用於火射車戰者也易氏曰五分其槀之三尺則尺有二寸在前尺有八寸在後也以後有八寸之重而與前尺有二寸相等則槀前之鐵比殺矢蓋短而小矣故其發逺而火射用焉殺矢七分三在前四在後鄭康成曰司弓矢職殺當為茀賈氏曰直言茀矢不言矰矢以其與茀矢同制故略不言趙氏曰茀矢用於弋射要去得髙所以鐵莖前重處又少後又輕輕則射得入髙空去不至低墜下也易氏曰七分其槀之三尺則在前者尺有二寸七分寸之六在後者尺有七寸七分寸之一也以後七分之四與前七分之三相等則槀前之鐵比兵矢又短而小矣故其發髙而弋射用焉至於恆矢庳矢前後皆四分而此不言者以其無所輕重故也毛氏曰禮曰挺矢一乘骨鍭短衛志矢一乘軒輞中亦短衛矢本以殺物今以送死其鍭易之以骨志矢習射之矢志於中也所謂恆矢庳矢用諸散射是也其鍭以骨今以其送死故無鍭而軒輞約也惟無鍭乃均則恆庳骨雖不用鐵以有骨九分冝四在前五在後矣總論劉執中曰司弓矢所辨者八矢而此所記止五矢又田矢兵矢司弓矢即無有蓋司弓矢以辨其名物為主考工記止記其為之之法則有合而名之者皆該在其中且司弓矢據事之重者為先故枉矢潔矢用於戰伐是重事則列在前鍭矢殺矢却在後此據鐵之重者為先故鍭矢殺矢二在後者則列在前而枉矢潔矢却作田矢兵矢而在後也參分其長而殺其一鄭鍔曰此言為矢之法假令矢槀長三尺則削而殺其一使小令趣鏃也賈氏曰槀人注云矢服長短之制未聞今所云長三尺者彼無正文此約羽六寸逆差之五分其長而羽其一鄭鍔曰又以其長而五分之以一分而安其羽其羽當六寸以其笴厚為之羽深鄭鍔曰所謂妢胡之笴是也字文為槀故有槀人之官量幹之厚以為羽深則以羽入笴不傷其力趙氏曰笴之藏羽要恰好入羽太深則傷笴太淺則羽易脫當看笴厚薄而為深淺水之以辨其隂陽趙氏曰辨正也隂沉而陽浮凡物負隂抱陽陽木稹理而堅重隂木疏理而輕柔竹亦如此陽生於山南者隂生於山北者陽竹輕清隂竹重濁然生而混成不可辨也惟水隨物輕重而應之以浮沉初無心焉置於水而沉則竹必重濁置於水而浮則竹必輕清然後調適而用之然所以辨其隂陽者欲以設其比須使輕重均方可也夾其隂陽以設其比夾其比以設其羽趙氏曰比謂箭刮抵弦處以其貼近絃故名為比如五家為比以其近而相親也夾謂以手指夾而搖之既辨得隂陽了然後夾而搖那處輕那處重看得輕重均然後設其比設比了夾其比搖之使輕重均然後設其羽賈氏曰弓豎用之故比在稿兩畔弩橫用之故比在槀上下無問弓矢弩矢比在兩旁上下皆設羽於四角同也參分其羽以設其刃鄭鍔曰羽長六寸三分之而設其鋌鏃之刃當長二寸也於文當為三分取一以設其刃不言取一者缺文也自參分其長而殺其一至於設其刃皆言為矢之法如此則雖有疾風亦弗之能憚音但矣趙氏曰矢之輕重羽刃相稱則其發不可禦矣憚驚畏之意雖有疾風亦弗能憚不能驚憚其矢而使緩其勢也李嘉會曰疾風如何能憚矢蓋羽弗長頭弗輕中弗軟則前去徑速疾風弗能憚也刃長寸圍寸鋌十之重三垸音丸趙氏曰刃長寸謂箭鏃也鋌謂鐵莖也垸是稱兩之名此言刃長寸而上文三分其羽以設其刃乃謂二寸意者一寸刃也二寸一半刃鏃一半刃根併而言之詳見冶氏王昭禹曰此蓋殺矢之刃鋌如此易氏曰刃過於長則滯而不發此刃必以寸所以獨見於矢人冶氏為殺矢亦曰刃寸前弱則俯音免後弱則翔中弱則紆中强則揚羽豐則遲羽殺則躁鄭鍔曰上文言其法此又言其不中法之狀趙氏曰此段理會箭笴并羽李嘉會曰矢之幹强弱欲適中矢之羽豐殺欲適節笴近比處軟弱則矢行而低俯言低也笴近鏃處軟弱則矢行而搖旋翔言回顧而掉轉也中間輕弱則矢行邪曲紆言曲也中間强而太健則矢行髙起揚謂飛揚也此是强弱失中者也羽豐則太多多則矢重而其行失於緩羽殺則太少少則矢輕而其行過於急躁謂旁掉而去急也此是豐殺失節者也矢之病如此是故夾而搖之以視其豐殺之節也鄭鍔曰欲知其病者必夾於兩指之間以搖之如豐殺中節則搖之必均平而無輕重也鄭康成曰今人以指夾矢儛衛是也橈之以視其鴻殺之稱也鄭鍔曰以為未足以知其病又橈其幹如鴻殺相稱則無强弱賈氏曰此言鴻即上文强是也此言殺即上文弱是也趙氏曰以指夾而搖之則羽豐殺之節可以視而見以手指橈而屈之則笴强弱之稱可以視而知上是試羽下是試笴笴體欲相稱故於鴻殺言稱羽欲有節故於豐殺言節凡相笴欲生而摶鄭康成曰相猶擇也王昭禹曰為矢雖出於工之巧而材苟不美雖工亦不能易其質而為良所謂妢胡之笴亦以其材美也然則欲其笴之良孰若相其材之美乎鄭康成曰生謂無瑕蠧也摶讀如摶黍之摶謂圜也鄭鍔曰欲其圜出於自然非琢削也故曰生而摶趙氏曰與廬人刺兵摶同同摶欲重鄭鍔曰其摶同矣則以重為貴易氏曰於圜之中又擇其材之實者同重節欲疏鄭鍔曰其重同矣則以節目之疏者為貴趙氏曰節密則輕重不等粗細不勻也同疏欲㮚王昭禹曰於節疏之中又擇其材之縝栗而堅鄭鍔曰㮚肉之色必黃或又取其色如栗也總論趙氏曰弓之笴長弩之箭頗短弓箭設比在笴兩旁弩箭橫用之設比在槀上下其制度利病一般此所記者乃總云初不曽分矢以鍭為首以括為末然鍭茀田兵殺皆有齊而考工獨於殺矢言齊以殺矢要中之必死用金為多故特記之要調適其金錫其實皆有齊也陶人為甗魚輦反實二釜音輔厚半寸脣寸王昭禹曰陶人所以為甗為盆為甑為鬲為庾皆燒土為之陳用之曰茹毛飲血非所以養生聖人教之以火化舂榖以為米臼杵之利興焉炊米以為食鬲甑之器用焉陶人之職其來尚矣考工所記蓋亦因前代所制以為之法鄭司農曰甗無底甑趙氏曰甗必有物以為底如今甑以竹為箄之類若果無底蒸物不得厚半寸言其身脣寸言其口邉又厚也鄭康成曰量六斗四升曰釜陳用之曰先儒所引者齊人之亂法非先王之制度所以知釜為斛者蓋㮚氏為量內方尺而貟其外其實一釜其脣一寸其實一豆豆謂斗也斗十之而為斛則釜之方尺為斛可知或言釜或言斛互相見也鄭鍔曰釜之脣一寸其實一升則其腹深尺當實十斗釜冝如管子所謂百升而成釡之釡也有足者謂之釜無足者謂之釡所容皆同故其名相近也盆實二釜厚半寸脣寸毛氏曰盆以盛物亦以為量荀子謂畝數盆一本數以盆鼓也猶釜本以烹飪又以為量蓋先王藏禮於器之意鄭鍔曰莊子鼓盆而歌記言夫人繅三盆此所謂盆也甑實二釜厚半寸脣寸七穿鄭鍔曰甑以蒸物爾雅言甑謂之鬵詩所謂溉之釡鬵者亦甑之名也其厚其脣制作皆與甗同其實亦無多寡之異所以異者甑有底而其底有七孔耳王昭禹曰七穿所以逹氣鄭鍔曰必七孔取火之成數鬲實五觳音斛厚半寸脣寸鄭鍔曰鬲則鼎之類所以烹飪也經於亨人言鼎鑊於小宗伯言逆鑊於小司寇言實鑊而不言鬲爾雅曰疑足謂之鬲疑空也蓋其足之空中也陳用之曰有甑必有鬲鬲盛水於下甑加於上以木巽火水在火上而水火相逮炊以熟物鄭康成曰豆實三而成觳則觳受一斗二升五觳者六斗也鄭鍔曰漢志云十斗為斛今人亦以十斗為斛斛之名與觳相近而容不同以理推之鬲所以蒸炊之器也其上容甑焉甑容多而鬲容少固其常也則觳為斗二升蓋與斛異庾實二觳厚半寸脣寸王昭禹曰庾用以量賈氏曰爾雅掬二升二掬為豆豆四升四豆曰區四區曰釡二釡有半謂之庾庾本有二法故聘禮十六斗曰藪注云藪即庾也昭二十六年云粟五千庾注庾十六斗陳用之曰庾實二斛與經傳所記十六斗之數不同蓋所謂請益之庾者是粟之數非器之名豈此所記者自陶人所為缶屬之謂非粟之數名也鄭敬仲曰庾從一從臾少數也須臾而度之矣總論趙氏曰鬲如鐺鍋盛水甑甗加其上火炊以熟物物熟須要盆盛頓傾物入甗甑須要庾量多寡五者不可闕一旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺鄭鍔曰泥之在鈞惟甄者之所為甄人合土而為器即旊人爾旊人掌為瓦器之方陶人則以火而熟之旊人則以土而為之簋者盛黍稷之器也簋有以木為之亦有以土為之者說者以為宗廟用木天地用瓦詩言于豆于登則祀天有木豆矣儀禮饋食有瓦豆則宗廟用瓦豆矣旊人之為簋以土為之也然經言簋多矣獨此載為簋之法說者謂簋以盛稻粱加膳也簠尊而簋卑用簠則簋從用簋而簠或不預故不言也觀掌客所言上公簠十侯伯簠八子男簠六而簋則同十有二其尊卑固明然經無瓦簠之說此不言為簠者豈其不用土以為之故歟其實一觳容一斗二升此言自豆之實積而為觳之制三豆則為一觳觳之大能容三豆之物也考諸家說豆區量釡數皆不同蓋始於經無為豆之法梓人言一獻而三酬則一豆矣以爵一升觚三升考之則一豆當容十升字當為斗與此所謂豆蓋不同此所謂豆乃俎豆之豆經只言豆實三而成觳不言豆之所容而康成以為豆實四升者蓋用爾雅之文以謂掬二升二掬為豆故曰豆四升也然則此豆容四升以之為觳則觳容一斗二升矣不可以為豆區鍾釡之法先王之為鍾釡之法必不同俎豆之豆所容為醢說者之異同蓋不考其詳爾易氏曰豆謂瓦豆周家金木之豆皆四升即齊晏子所言四豆之實是已惟簋實觳所容三斗趙氏曰崇尺髙也厚半寸身也脣寸口邉也惟豆與簋相似所以又兼為豆如陶人為甗又兼甑鬲盆庾也賈氏曰簋法圎舍人云方曰簠貟曰簋孝經陳其簠簋注云內圎外方者彼兼簠而言之凡陶旊之事髺音刮墾薜音擘暴音剝不入市王昭禹曰凡陶旊之事謂陶人旊人所作之器鄭康成曰髺讀為跀賈氏曰跀謂器不正欹邪者陳用之曰髺如法之髺言其聚而髙墾頓傷也陳用之曰墾如土之墾言其發而分鄭司農曰薜讀為藥黃蘗之蘗易氏曰蘗言其破裂而不全鄭康成曰暴墳起不堅致也鄭鍔曰陶旊之事剛則甈柔則坯以其失剛柔之節致器之或過乎堅或不及乎堅而其病則甈則坯皆不可用也用器不中度不入於市髺而跀者則有欹斜之病墾而傷者則有毁頓之病與夫薜而破裂暴而墳起者皆不得以入市則工人用器不敢以苟簡而罔利也器中去聲膞音遄鄭鍔曰膞者植木於鈞之側上下崇四尺既附泥而轉其鈞之時則視此膞擬度以為法使與膞相應則其器端正也為器必欲中此膞乃善陳用之曰器中膞者欲其形之細滑也古文以膞為切肉也陶器之形質如之則其細且滑可知矣豆亦器也言器中膞則瓦豆亦與焉豆中縣音𤣥鄭康成曰縣縣繩正豆之柄賈氏曰豆柄中央把之者長一尺宜上下直與懸繩相應陳用之曰豆有柄立而用焉以直為貴趙氏曰言豆則只是豆中縣言器則瓦豆簋皆是器皆要方正膞崇四尺方四寸易氏曰中縣易見而中膞難知不可過於崇亦不可過於方故曰膞當崇四尺厚當方四寸趙氏曰膞崇四尺謂正瓦器之髙使不過此過厚則火燒不透易得破壞中義乃謂上文止言崇尺何用四尺髙以為式疑有脫誤却不知膞者先王特為定則燒時為凖凡髙下斜曲皆就四尺內忖度不成做一尺髙成樣如今之木匠手持五尺則子起屋量一尺階基也是此則子量一二丈柱櫨也是此則子中義未之思爾梓人為筍虡鄭鍔曰或謂攻木之工七而分為二何耶余以為記人重時王所尚之輿故以輪輿之事先列之禮樂之器或用木以為之而名官特曰梓人者以梓為材之良制器者先貴乎良故以名官也王昭禹曰梓材之義可以為禮樂之器故工能治材以為器者謂之梓人鄭鍔曰梓人為禮樂之器固不一此言其為筍虡之法耳筍虡者樂器之所懸也其橫者謂之筍以其圎如竹筍然且其飾如竹筍之文樂之節亦由此始故也其植者謂之虡以其中之虛而樂之聲所由以達故也筍或作簨虡或作鐻其實一也易氏曰筍之上有崇牙所以縣之也虡上設業以象業成於上而樂作於下業之上樹羽以羽為南方之屬而禮樂文明之象也總論王氏詳說曰明堂位曰夏后氏之龍筍虡商之崇牙周之璧翣夫筍虡所以縣金石之樂也有虞氏戞擊鳴球與夫笙鏞以間是已有金石之樂夫豈無筍虡乎而明堂所言止於三代者則周人不以有虞之筍虡賜魯也然考工記云商人上梓梓人為筍虡而不言璧翣固然矣豈梓人為商人所上之官而不言崇牙乎是知梓人非三代制也明矣且以筍虡言之靈臺為文王作樂之詩曰虡業維樅賁鼓惟鏞有瞽為成王作樂之詩曰設業設虡崇牙樹羽皆言虡而不言筍特以所懸者為主耳業大版也業之所設設於虡之下而金石之樂縣在是故二詩皆言虡而不言筍至有瞽而又及於崇牙樹羽者豈非成王之時樂為大備乎天下之大獸五脂者膏者裸者羽者鱗者鄭鍔曰言此物可以為宗廟之用鄭康成曰脂牛羊屬膏豕屬王昭禹曰雜肉而生謂之脂生於肉上謂之膏鄭鍔曰裸者先儒謂虎豹貔􅣝獸之淺毛者若言有毛則不可謂之裸矣羽者能飛鱗者能藏飛者禽鳥也藏者龍蛇也亦不可以謂之獸合此二者而以大獸目之記者之誤也宗廟之事脂者膏者以為牲裸者羽者鱗者以為筍虡賈氏曰此别言之欲分别可以為筍虡者鄭康成曰為牲致美味也筍虡貴野聲也陳用之曰此篇所記多無據而不可考證如言天下之大獸五而羽者鱗者與焉夫羽炎亢於上能飛而不能濳鱗伏藏於下能濳而不能飛若非所謂獸也其所謂裸者則指虎豹之屬豈裸也哉宗廟之事脂者膏者以為牲裸者羽者鱗者以為筍虡如雞人共雞牲司馬羞牲魚則羽者鱗者豈不以為牲乎其以裸者為虡鱗者為筍則凡乘樂器者皆用之亦不必宗廟之事外骨內骨卻音却行仄行連行紆乙俱反行以脰音豆鳴者以注陟又反又音鑄鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢賈氏曰此更别言小蟲之屬以飾祭器者鄭康成曰外骨龜屬內骨鱉屬賈氏曰鱉外有肉緣故為內骨卻行蚓衍之屬仄行蟹屬連行魚屬紆行蛇屬脰鳴蛙黽屬賈氏曰即蝦蟇之屬也項中鳴也注鳴精列屬賈氏曰釋蟲云蟋蟀蛬注云亦名青蛚旁鳴蜩霓屬賈氏曰蜩霓即蟬也蟬鳴在脅翼鳴發皇屬賈氏曰爾雅蛂蟥蛢郭云甲蟲也大如虎豆緑色江東呼為黃蛢即此發皇也股鳴蚣蝑動股屬賈氏曰五月斯螽動股陸璣云幽州人謂之舂箕長而青角長股股鳴者胸鳴榮原屬賈氏曰揚雄以為蛇醫或謂之榮原鄭鍔曰或取其行或取其鳴用其狀貌刻畫雕琢於祭器之間凡以致其文之美以見其外物無不盡也厚脣弇口出目短耳大胸耀所教反後大體短脰若是者謂之裸屬恆有力而不能走其聲大而宏有力而不能走則於任重冝大聲而宏則於鐘宜若是者以為鐘虡是故擊其所縣音𤣥而由其虡鳴鄭鍔曰其脣厚其口弇趙氏曰弇小斂貌其目突而出其耳短其胸大其後耀而削鄭康成曰耀讀為哨頎小也賈氏曰哨與頎皆是少小之義凡猛獸有力者皆前粗後細故云大胸耀後其四體大其脰短者虎豹􅣝貔之類其色淺而短雖非裸也亦裸之屬是物也氣猛毅故常有力身重遲故不能走然其聲大而宏鄭司農曰宏讀為紘綖之紘謂聲音大也為鐘虡者冝取乎是也何則鐘至重物也惟有力而不能走者必能任重也鐘之聲至大也惟聲大而宏者則與之稱也故用之以為鐘虡以縣乎鐘苟擊其縣則似其聲由虡以出也鄭司農曰由若也鋭喙決吻數音促目顅古顔反脰小體騫腹若是者謂之羽屬恆無力而輕其聲清揚而遠聞音問無力而輕則於任輕冝其聲清揚而遠聞於磬冝若是者以為磬虡故擊其所縣而由其虡鳴鄭鍔曰其喙鋭趙氏曰喙鳥觜畫處鋭尖也其食物則決之於吻鄭康成曰口腃也其目數而近其脰顅而長賈氏曰顅長脰貌其四體小其腹騫騰而上者也趙氏曰騫虧也禽鳥之類也是皆以羽而飛者也故謂之羽屬是物也微弱之至故常無力便捷善飛故輕然其聲則清揚遠聞焉為磬虡者冝取乎是也何則磬為至輕故無力而輕者足以任之樂聲莫清於磬而聞及遠者也故聲清揚而遠聞者則與之稱也故用之以為磬虡以縣乎磬苟擊其縣則若其聲由虡而出也鄭敬仲曰凡虡之制物形皆於下以載之故有任重任輕之異小首而長摶身而鴻若是者謂之鱗屬以為筍鄭康成曰摶圜也鄭鍔曰鴻大也首小而長身圜而大者龍蛇之類也故謂之鱗屬用以為筍圜且長以龍蛇之形畫之也賈氏曰鍾磬之虡用鳥獸不同二者之筍則同用龍蛇鱗物為之凡攫俱縳反閷色界反援音袁簭音筮之類必深其爪出其目作其鱗之而鄭康成曰謂筍虡之獸易氏曰攫言其便捷而攫物閷言其纎利而閷物鄭鍔曰援能攀援而登髙簭言吻之囓而食賈公彥曰攫閷者攫著則殺之援簭者援攬則噬之鄭康成曰深猶藏也作猶起也之而頰􅝋也王昭禹曰必深其爪則其爪長必出其目則其目露而瞪必作其鱗之而則其勢起而直毛氏曰鱗在身之而在頰賈氏曰如此之類必藏其爪出其目又作其鱗之而鱗之而謂動頰􅝋皆可畏之貌深其爪出其目作其鱗之而則於視必撥爾而怒苟撥爾而怒則於任重冝且其匪色必似鳴矣賈氏曰以似非真實故為撥撥謂鳴聲發動也鄭鍔曰且當如詩所謂有萋有且之且匪當如斐然成章之斐且者飾以萋且之文也且其匪色謂飾以斐然之采色也王昭禹曰如此則其於視也若撥動其體而怒焉雖任大鍾其力之勇鷙足以勝之而不為重且其匪然之文著於采色之間擊其鍾則似由其獸之鳴矣易氏曰非果鳴也制作侔乎造化則物之無聲者亦疑於有聲矣爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣趙氏曰穨穨敗也委委靡也廢不舉也措置而不動也鄭鍔曰為鐘虡者必取其至猛之象若夫爪不深目不出鱗之而不作之物其狀柔弱不能自立穨然傾靡如將委地其狀如是加以任重則不勝其任如將廢矣苟又措其采色亦似不能鳴也此脂者膏者之狀只可以為牲歟總論趙氏曰凡此皆先王假物意以形容鐘磬聲一要宏大一要輕清欲工人體此意而盡斫削之巧爾梓人為飲器勺音杓一升爵一升觚音孤三升獻以爵而酬以觚一獻而三酬則一豆矣王昭禹曰梓人為筍虡為樂器也為飲器為禮器也鄭鍔曰非酒無以為禮非器無以飲酒飲酒之器大小有度鄉衡有法則命梓人以為之焉勺與爵各可容一升觚可容三升此其法也勺以酌之而用爵以飲故其實皆一升也謂之勺者言酌度以取之其取者少也謂之爵者其形如雀容受為至少也至於觚之所容則三倍矣多焉三倍而名謂之觚者亦以見其所容者多孤立無朋之意趙氏曰勺以酌酒今之杓是也古者有龍勺刻龍在上明堂位言灌尊龍勺疏勺蒲勺是也爵用以盛酒盞之小者薛氏曰爵刻木為之漆其中形如玉爵焉觚盞之有稜角者又大似爵凡酒盛於樽必先以杓挹酒然後注於爵中至用觚則加厚也梓人先勺而後以爵與觚小大先後序當如此王氏詳說曰明堂位曰夏后氏以盞商以斚周以爵梓人之爵一升非商人之上梓也明矣雖似周制亦不盡乎周制且一升曰爵二升曰觚三升曰觶四升曰角五升曰散總而名之皆曰觴也明堂位曰爵用玉盞仍雕加以璧角璧散禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角特牲者二觚二爵四觶一角一散則是用制之有五等矣此言爵曰觚而不及觶與角與散其非周制也明矣然鄭氏以觚當為觶豆當為斗蓋以所容之酒約之獻以爵酬以觚一獻而三酬則為酒一斗若不以觚為觶則不及斗酒之數矣緣觶之一字其書有三有以角旁從支者有以角旁從單者有以角旁從氏者角旁從氏當誤而為觚字也必矣若夫五等之觴所容之外又有所謂觥者詩曰兕觥其觩是也又有所謂豐者鄉射記曰司射命弟子升設豐是也鄭氏於觥之說失之以觥即角也曽不謂所容四升何以為罰爵乎舊圖與許慎皆謂七升曰觥其說似可採也舊圖於豐之說失之以豐為人形而首載杅謂豐國之君以酒亡國曽不謂豐為爵之承槃與坫同人以酒亡國者何必豐乎鄭氏與聶氏皆謂豐如豆而卑其說似可採也但梓人所為飲酒器皆以木為之詩曰酌之用匏則於是乎有匏爵矣此用之於郊也書曰乃受同瑁則於是乎有銅爵矣此周人用之於圭瓉也明堂位曰爵用玉盞此魯人用之於灌也然則周人自用銅而與魯人以玉爵乎曰周制所用以當代異代為貴賤而不以銅玉為貴賤也劉氏曰一獻而三酬者獻以一升酬以三升也并而計之為四升四升為豆豆雖非飲器其計數則然陳用之曰賔主之禮有獻而後有酢有酢然後有酬獻也酬獻蓋本於主而酢之禮則在於賔獻者禮之施也酢者禮之報也酬者禮之成也鄭鍔曰主獻賔則以爵而酬賔則以觚君子以燕飲之禮樂嘉賔之心與之獻酬主尊賔有獻以爵則一升也賔於是酢主人焉主人又酬之其酬以觚則三升也獻以一升酬以三升三酬而九升合一獻之升而計之是為一斗也獻必以一者行禮之始以誠為主也酬必以三者行禮之終以厚為貴也一獻則以少為貴三酬則以多為貴易氏曰天下之禮主獻賔賔之酢主人主人復酬賔今止言一獻三酬為一斗之實而不及酢者専以待賔為義且為中人之食設也蓋中人之食以一獻三酬為一斗不當言豆故先儒改豆為斗此却不必改也古之為豆有三有以金為之者有以木為之者有以瓦為之者以金為豆其實四升齊晏子所言是也以木為豆其實亦四升醢人四豆之實是也惟考工記所言以瓦為豆者與金木不同其實乃至十升則旊人言豆實三而成觳是也梓人之豆十升即瓦豆矣先儒亦知瓦豆之制異於金木之豆或者又泥於旊人十升之說且謂金木之豆皆十升尤非通論食一豆肉飲一豆酒中人之食也鄭康成曰一豆酒又聲之誤當為斗陳用之曰升十之為豆豆即斗也易氏曰十升之瓦豆誠天下之中制鄭鍔曰中人之量能容者不過一豆之肉一斗之酒耳不及乎此或不足其欲過乎此則或不勝其任是故以一斗為率而用爵與觚以為獻酬之節記曰觴酒豆肉豆所以盛肉也故曰豆肉至於酒非可以豆計矣謂之豆酒當為飲一斗酒也凡試梓飲器鄉許亮反衡而實不盡梓師罪之鄭鍔曰此言試梓之法也梓匠之所為未嘗無法試之之術觀其飲器耳鄭康成曰衡平也陳用之曰百工之事必有師焉師則以教其屬為義飲器向口而平矣而其中所實尚不盡焉則為造之不精可知矣此所以得罪於梓師也試其器必以盡實為度蓋以禮有卒爵飲之既飲之然至於三而止過是則流於亂矣梓人為侯廣與崇方參分其廣而鵠居一焉毛氏曰侯以布為之以皮飾之梓人攻木之工而為侯者以侯待木而張故也鄭鍔曰射必用侯正名曰侯者蓋天子射之所以服諸侯臣下射之得以為諸侯也天子諸侯卿大夫各有所射之侯而侯之制則有小大之不同天子之熊虎豹侯九十弓侯中丈八尺諸侯熊侯七十弓侯中丈四尺卿大夫麋侯五十弓侯中一丈然其侯中之廣與崇方則一而已鄭康成曰崇髙也方猶等也其廣與崇適相等焉謂侯之中髙廣相似也蓋偏於左右則不得其正倚於上下則不得其正惟正然後可以期於中所以欲其相等也匠人之為防亦云廣與崇方蓋非相等則其力不足以捍患故也王昭禹曰鵠棲侯以為的者鵠之為物逺舉而難中射以及逺中難為善中則告勝焉故的謂之鵠也鵠以皮為之各如其侯鵠居侯中三分之一唯大射以皮侯其餘有賔射燕射鄭鍔曰弓二寸以為侯中虎侯之弓以九為節則侯中一丈八尺也中一丈八尺則鵠六尺也由是推之熊侯七十弓侯中丈四尺則鵠方四尺六寸有竒豹侯麋侯五十弓則侯中一丈而鵠方三尺三寸有竒鄭衆馬融皆曰十尺曰侯四尺曰鵠二尺曰正者蓋不考諸此耳易氏曰梓人為侯者三射之侯也古者天子之禮有燕射有賔射有大射而梓人所言者主乎大射之侯何以知之以其言鵠而知之也鄭康成曰大射之侯用鵠賔射之侯用正燕射之侯用質不言賔射之正燕射之質而獨言大射之鵠舉一以該三者也上兩個與其身三下兩個半之鄭鍔曰弓之左右出者其名曰個亦名曰舌個或音幹取其張而用力也又名曰舌者取其出而左右也侯有中又有躬有舌舌即個也與其身三者言身居一分上兩個倍之而居其三也下兩個半之者言下兩個居上兩個之半也鄭康成曰身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌易氏曰身在中而居一分兩個在左右而居三分故曰與其身三倍中以為躬則躬之廣凡三丈有六尺倍躬以為左右舌則上兩個之廣凡七丈二尺侯之制上廣而下狹上兩個各出丈八尺下兩個半之各出九尺餘兩畔之丈八尺正合五丈四尺之制其制則躬夾中個夾躬在上下各一幅先儒謂用布三十六丈是也此以天子虎侯為言者也若夫槮侯七十弓則其中為丈四尺其躬為二丈八尺其兩個為五丈六尺其鵠為四尺三分寸之二矣犴侯五十弓則其中為丈其躬為二丈其兩個為四丈其鵠為三尺三寸三分寸之一矣非特大射三侯為然雖賔射燕射之侯用正用質之不同而其廣狹長短皆可以類推鄭康成曰侯制上廣下狹取象於人也張臂八尺張足六尺是取象率焉鄭鍔曰古者制度取於身而器用生於類故侯道生於弓而侯中亦生於弓弓二寸以為侯中倍中以為躬倍躬以為左右舌故其命名亦然上綱與下綱出舌尋縜音雲又隕寸焉鄭司農曰綱連侯繩也舌維持侯者縜籠綱者趙氏曰縜是圈子穿在個邉綱却穿過圈子以縳在植上易氏曰綱所以持侯而繫於植縜所以持綱而繫於侯上綱與下綱出舌皆八尺者以象人張臂之義縜寸者以象人伸指之義蓋臂為尋而指為寸皆近取諸身者也此又三射之侯與夫三侯二侯一侯之所同也竇氏曰九十七十五十弓之侯丈尺廣狹不同縜綱籠繫亦異且大侯上舌七丈二尺上端共使四綱餘有八綱布在七丈二尺之間每九尺一綱共十二綱則侯之緩急上下不等然亦依侯大小為數取稱也張皮侯而棲鵠則春以功愚案此大射之侯鄭康成曰皮侯以皮所飾之侯司裘職曰王大射共虎侯熊侯豹侯設其鵠謂此侯也賈氏曰綴於中間似鳥之棲故曰棲鵠鄭鍔曰皮侯者天子將祭擇士助祭所射之侯也有諸侯卿大夫有列國所貢之士焉其中多者得與於祭其中少者不得與於祭數與祭而君有慶數不與祭而君有讓則是大射之禮乃所以勉諸侯卿大夫士以立功也春以功蓋氣至於春則發生之時人至於春則立功之時大射之禮所以發動使之求為有功之事也鄭康成曰春讀為蠢蠢作也出也天子將祭必與諸侯羣臣射以作其容體出其合於禮樂者與之事鬼神焉李嘉㑹曰大射擇士之射張虎豹之皮示難服也而鵠又難中之鳥而能中者則可擇矣張五采之侯則逺國屬鄭鍔曰五采之鵠者即射人所謂五正之侯也虎侯五正熊侯三正豹侯二正用五采以畫焉中朱次白次蒼次黃而𤣥居外以五行相克為次也以南為首故先朱以正為的故曰正畫用五采故曰采侯張五采之侯則王與來朝之諸侯行賔射之禮也惟朝㑹而張此侯以射此逺國所以繫心於王而不敢擕二也說者以為逺國豈張侯而遂使之屬歟殊不知物有甚微而託意甚逺者五采之侯以文為主示之以文所以明用文德而不用武之意也能使逺國屬孰謂其不然哉賈氏曰逺國對畿內諸侯為逺也陳用之曰逺國屬者所謂賔禮也張獸侯則王以息燕鄭鍔曰六獸皆正面畫其正首於正鵠之處張獸侯以明獸之害人者吾已射之矣此可以息燕焉陳用之曰息燕云者於安息無事之時燕羣臣而與之射也鄭康成曰息者休農息老物也燕謂勞使臣若與羣臣飲酒而射賈氏曰此燕射以其事䙝天子已下惟有五十步侯而已無尊卑之别總論三侯陳用之曰此三侯者皆王所射也皮侯則飾之以皮采侯則飾之以采獸侯則無飾也為熊虎豹而已射人以射法治射儀王以六耦射三侯九節五正此總言王所射者也其所謂三侯即熊虎豹者也其所謂五正即五采是也或為熊虎豹之形而不采或為而采之又飾之以熊虎豹之皮焉則所用之異也皮侯則司裘所共者是也司裘言王大射共熊虎豹之侯則大射之侯所飾之皮可知矣所以知采侯為熊虎豹之侯而飾之以采以射人見之也所以知獸侯為熊虎豹之形者蓋以王之所射在此三者故也先儒不此之思引鄉射記天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕以為獸侯之制夫鄉射所記已無所考據况彼所記者鄉射而引之以證燕可乎大射張皮侯其義則以功為主賔射張采侯其義則以禮為主燕射張獸侯其義則以質為主示其情故也祭侯之禮以酒脯醢王昭禹曰侯而祭之者神無乎不在而君子無往不用其至也鄭鍔曰考鄉射之事司馬洗爵升實之以降獻獲者於侯薦脯醢設折俎折俎與薦皆三祭獲者負侯拜受爵乃適右個左個中南面而祭侯終則左個之西北三步東面而卒爵此祭侯之禮也然射人祭侯則為位鄭康成謂獻服不以祭侯為服不受獻之位則與鄉射所言不同鄉射獻獲者在於射中之後射人獻服不在於未射之前則鄉射之禮異乎射人天子之射祭侯之禮矣蓋侯之有神者其先有功於射者也君子於古先有功之臣未嘗或忘之也故食有先食蠶有先蠶卜有先卜農有先農皆不忘其初也况於射乎祭之之禮酒與脯醢而已無牲體之薦無多品之美取乎薄而可以為禮者亦以為取足不忘乎禮也祭有以少為貴者此也其辭曰惟若寧侯毋或若女不寧侯不屬于王所故抗而射女强飲强食詒女曽孫諸侯百福鄭康成曰若猶女也寧安也謂先有功德其鬼有神或有也若如也屬猶朝㑹也抗舉也張也詒遺也曽孫諸侯謂女後世為諸侯者賈氏曰祭侯者祭先有功德之侯若射侯則射不寧侯有罪者下文母或若女已下是也陳用之曰射禮諸侯以貍首為節蓋貍首者樂㑹時也其義則諸侯以時㑹天子為節不屬于王所則反是此所以禁而止之而有射女之戒易氏曰侯之為侯非止射侯而已內能受矢外能威人者為射之侯屏蔽王室敵王所愾者亦為天子之諸侯使諸侯而安其為侯則善矣其或不安其為侯不能奉承乎王命則司馬九伐之法在所必及故托其辭於祭侯曰抗而射女爾諸侯可不知所戒乎誠能安其為侯謹守臣節則富貴可以長守故曰强飲强食詒女曽孫諸侯百福然雖曰詒之自上而所謂惟若寧侯者實諸侯之自求多福也周禮訂義卷七十七
