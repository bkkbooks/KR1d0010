body:
  text: 周禮訂義卷十四宋王與之撰內司服奄一人女御二人奚八人鄭康成曰內司服主宫中裁縫宫之長史氏曰春官有司服掌王之吉凶衣服今掌后之吉凶衣服者不得不以內司服别之鄭鍔曰司服一耳王之服掌於春官后之服掌于天官王者出與物接因以行禮於外為主春官掌禮故也王后入與王接則以正體於內為主天官掌王內之政令故也賈氏曰奄一人者以衣服事多須男子兼掌與婦人同處故用奄鄭康成曰有女御者以衣服進或當於王廣其禮使無色過賈氏曰此女御還是女奴曉進御衣服者故與女酒女祝女史同號女也得與八十一女御同名欲見百二十外兼有此女御之禮王合御幸之使王無淫色之過故曰女御薛平仲曰上自王后以𧖟事先天下下及命婦內人以絲枲效其功則女功之勤亦至矣人惟患已之不諳其勤也而後服飾之用或過侈而不顧知吾身所歷者為不易則吾身之所服者其敢易哉掌王后之六服褘衣揄音遙狄闕狄鞠衣展衣緣吐亂反衣素沙鄭鍔曰天子之服九王后之服六者蓋天子陽道九者所以取乎陽數之極王后隂道六者所以取於隂數之中天子之九祭服六常服三王后之六祭服三常服三王后無天地山川社稷之祭故服止於三或九或六無非取法乎隂陽之義鄭司農曰褘衣畫衣祭統曰夫人副褘立于東房賈氏曰褘衣亦是翟而云衣者以褘衣是服之首故言衣劉執中曰褘衣色玄所以象地而配天子之玄衮天子大裘衮冕以玄為質所以配天鄭康成曰狄當為翟翟雉名伊洛而南素質五色皆備而成章曰翬江淮而南青質五色皆備而成章曰搖王后之服刻繒為之形而綵畫之綴於衣以為文章鄭鍔曰闕狄與禮記之屈狄之屈同王氏曰闕狄謂之屈知其屈於褘狄而已論語曰君子于其所不知蓋闕如也以翟為飾比之褘揄二服刻為雉服而闕其數耳於褘衣言衣而不言狄於揄闕言狄而不言衣者蓋褘言衣則知揄闕者亦衣也揄狄闕狄言狄則知褘衣亦狄也上下之文互見鄭康成曰褘衣畫翬者揄狄畫搖者闕狄刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄狄祭羣小祀則服闕狄史氏曰翬與揄皆雉取雉者象德也夫雉者其交有時內之所守者正其羽五色外之所發者文質素而青仁義之全鄭康成曰以下推次其色則褘衣玄揄狄青闕狄赤婦人尚專一德無所兼連衣裳不異其色鄭康成曰鞠衣黃桑服色如鞠塵象桑葉始生月令三月薦鞠衣于先帝告桑事鄭鍔曰鞠衣之色黃雖服以奉采桑之祭非事宗廟之服故不入祭服之列鄭司農曰展衣白衣喪大記世婦以袒衣袒與展相似鄭康成曰展衣以禮見王及賔客之服字當為袒袒之言亶亶誠也詩云瑳兮瑳兮其之展也鄭鍔曰事人之道以誠信為主而服展衣以見王與賔客故其色白見其誠信潔白之道王氏曰褖衣之色黑而緣以纁王氏詳説曰以褖衣為緑衣者此衛詩之文以褖衣為稅衣者此雜記之文以褖衣為純衣者此昏禮之文以褖衣為男子所陳之衣此士喪禮之文居鄭康成曰御于王之服亦以燕史氏曰鞠衣黃衣黃者中也親𧖟之服欲天下取中也展色純白白者正潔之義以禮見王享賔客時服也謂之展者展禮所用也緣衣純黑黑者至隂之義至隂不動燕居時服也謂之緣衣太質無華以纁緣之也夫天玄地黃黃者地道妻道天地嚴凝之氣始於西南盛於西北白者西方之色隂之盛坎再索而得女正北方之卦黑者北方之色女之位凡此皆婦人所用之正色故鞠衣展衣緣衣不獨后服之外內命婦亦服之鄭康成曰素紗今之白縳六服皆袍制以白縳為裏使之張顯今世有紗縠者名出於此黃氏曰謂素紗以白縳為裏未必然毛公曰禮衣有展者以丹縠為衣又曰絺之靡者為皺是當暑絆延之服展衣丹縠似與司農合然以意求之皺絺冝素紗為類鄭曰後世紗縠名出於此素紗單薄之稱是則當暑别有此服其制亡不可考陳君舉曰褖衣冬衣素紗夏衣如書所謂藻火粉米黼黻絺繡夏則絺冬則繡更不必多説史氏曰婦人以正潔為體以疏通為用六服必以素紗為裏素白也紗疏也先王為衣服之義所以寓戒總論湯氏曰狄當作翟翟是首飾所謂副也褘搖屈鞠展褖皆衣名詩云玼兮玼兮其之翟也鬒髮如雲不屑髢也今俗云翟髻是也下文云瑳兮瑳兮其之展也蒙彼皺絺是紲袢也鄭康成據此知展是白衣然則褖衣黑展衣白鞠衣黃亦三色相次王氏詳説曰玉藻云王后褘衣夫人揄狄又云君命屈狄再命鞠衣一命袒衣士褖衣又云惟世婦命於奠繭其他則從男子鄭氏以意約而解之謂世婦命於奠繭之文冝在夫人揄狄之下蓋前所謂夫人揄狄謂王后夫人下所謂君命屈狄者謂子男之夫人且六服之制王后褘衣夫人而下無復有褘衣矣明堂位謂夫人副褘云者直謂魯設耳魯為上公之後得用此禮與二王之後禮一同夫人揄狄則內之三夫人與夫諸侯之夫人亦揄狄矣侯伯之夫人揄狄則子男之夫人屈狄矣此所以知君命屈狄為子男之夫人言也子男之卿再命故其妻鞠衣大夫一命故其妻袒衣其士不命故其妻褖衣等而上之上公之國孤之妻當屈狄卿之妻當鞠衣大夫之妻當袒衣士之妻當褖衣矣侯伯之國上卿之妻當屈狄下卿之妻當鞠衣大夫之妻亦當袒衣士之妻亦當褖衣矣但秦火之後經無正文故説禮者亦無定論要之可以義起史氏曰詩人以后妃服浣濯之衣為美今此所用六服之彩繪得無相戾耶蓋六服者祭祀賔客朝王所用所謂禮服法服至其常御者浣濯之衣可也鄭鍔曰天子六服有章數之殊備物而尚文王后三服無章數之異守一而尚質惟其尚文故日月山龍而下有鷩有毳其物十二惟其尚質故純用狄而已以王服之章十二推之則后服亦刻十二以為飾何則文質雖殊而合體同尊法天之大數也辨外內命婦之服鞠衣展衣緣衣素沙鄭鍔曰內命婦之服惟此三等外命婦之服視其夫之爵其夫孤則服鞠衣其夫卿大夫則服展衣其夫士則服緣衣或者謂在內之臣有公卿大夫士之殊在外之臣有公侯伯子男之等三等之衣上不及王公之妻外不及諸侯之妻何也竊以為諸侯之妻從其夫之命數而三公之妻不可以常制論以次而推三公之妻冝服闕狄鄭氏曰三夫人及公之妻其闕狄以下諸侯之夫人揄狄子男之夫人亦闕狄唯二王後褘衣三公出封則為大國之君以君子偕老之詩觀之衛乃侯爵耳詩人言夫人之服則曰其之翟也其之展也上三衣有翟下三衣有展其下王后一等無褘衣而已三公之妻蓋如是也何則三公在朝屈于王則服子男之服其妻亦屈而服子男之妻闕狄耳出封則冝加禮記有夫人屈狄之文又有夫人副褘之文夫人屈狄者指三夫人言之夫人副褘者指上公之妻或者又謂內命婦之服九嬪則鞠衣世婦則展衣女御則緣衣然九嬪而上有三夫人自夫人以至女御凡四等此所辨者止於三服何也竊以為三夫人之服亦不可以常制論蓋三夫人之服自褘衣而下凡有二等有時而揄狄亦有時而闕狄也觀禮經列九嬪世婦女御於內官之列而無三夫人之職蓋尊之也是故中宫有后則夫人之禮屈而服闕狄與三公之妻在朝從子男之妻之服同中宫或闕則夫人之禮伸而服揄狄與侯伯出封其妻則服揄狄之服同內司服之言辨如此而已然所辨者有三等之殊婦人以純素為本則一而已故皆素紗凡祭祀賔客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰七雷反亦如之鄭鍔曰上文言掌言辨此又言共則非特掌之辨之又造衣服以共之賈氏曰祭祀共三翟賔客共展衣九嬪世婦謂助后祭祀賔客時鄭康成曰凡者凡女御與外命婦言及言凡殊貴賤也春秋之義王人雖微猶序乎諸侯之上所以尊尊也臣之命者再命以上受服則下士之妻不共外命婦唯王祭祀賔客以禮佐后得服此上服自於其家則降焉賈氏曰自於其家則降見追師注王氏詳説曰命夫之服助祭於王與夫朝覲他則否命婦之服助祭於后與夫相后見賔客他則否玉藻曰諸侯玄端以祭裨冕以朝是諸侯命服不得私用雜記曰大夫冕而祭于公辨而祭于已士辨而祭于公冠而祭於已是大夫命服不得私用命婦之服其禮亦如之案特牲曰主婦纚笄綃衣則是士之妻不得衣褖少牢曰主婦髲鬄衣侈袂則是大夫之妻不得衣展衣蓋惟褖衣侈袂大夫妻不衣展衣而衣緣衣此共其衣服所以見於祭祀賔客之下賈氏曰喪衰亦如之者外命婦喪衰謂為王服齊衰於后無服若九嬪以下及女御於王服斬衰于后服齊衰后之喪共其衣服凡內具之物王昭禹曰內司服所掌主以共后故生也共其所服及其死也亦無以異於生凡內具之物則后生時所用紛帨線纊之屬亦共之此事死如事生之意賈氏曰案內則婦事舅姑有紛帨之屬故死者入壙亦兼有此數物縫人奄二人女御八人女工八十人奚三十人王昭禹曰所謂女御八人非王宫八十一女御之數鄭康成曰女工女奴曉裁縫者鄭鍔曰詩云摻摻女手可以縫裳女御於王與后之衣服無所不為則縫人掌縫線之事女御製之縫人縫之為女御役也然王及后之衣服固非一種豈二人之奄所能盡縫哉然以掌王宫縫線之文考之竊意只掌縫之線耳蓋衣服之縫自有女御史氏曰布帛之成可謂難矣茍剪裁不中度則棄為無用之物而紉縫亦倍費力矣先王知其然立縫人之官以司之使之專其職熟其制則刀尺針縷之未施其長短之程度已定於胸中於是役女御以紉縫則布帛不費而衣服具矣掌王宫之縫線之事以役女御以縫王及后之衣服鄭司農曰線縷也劉執中曰女御縫王及后之服者奄所以董其工而役之裁縫者也女御所以取其制授之修短者也王及后至尊非女工可得度量喪縫棺飾焉鄭康成曰孝子既啓見棺猶見親之身既載飾而以行遂以葬若存時居于帷幕而加文繡喪大記曰飾棺君龍帷三池振容黼荒火三列黻三列素錦褚加偽荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六此諸侯禮也禮器曰天子八翣諸侯六翣大夫四翣漢禮器制度飾棺天子龍火黼黻皆五列又有龍翣二其戴皆加璧王昭禹曰王及后之喪則縫人縫棺飾不言王及后則蒙上文可知衣於記反翣所甲反栁之材賈氏曰鄭喪大記注引漢禮翣方扇以木為匡廣三尺兩角髙二尺四寸柄長五尺以布覆之王昭禹曰翣如方扇持之以蔽棺栁隂木為之故喪車謂之栁車翣以木為體用綵繒衣纒之以為飾故曰衣翣栁之材鄭康成曰栁之言聚諸飾之所聚賈氏曰二者皆有材縫人以采繒衣纒之乃後張飾於其上掌凡內之縫事史氏曰凡內之縫事悉掌之者知縫人于吉凶衣服之制度無不熟染人下士二人府二人史二人徒二十人鄭伯謙曰鍾氏染羽以充國之用染人掌絲帛以充王后之用內固不可以兼外先王防微杜漸之意薛平仲曰內司服之與縫人既皆以奄人主之染人亦冝以奄人可也特付之命士何哉蓋縫線雖當便於內而采彰之正豈容使便于內哉此染人所以命下士掌染絲帛劉執中曰染絲帛者染而後織者上也織而後染者次也凡染春暴步卜反練史氏曰凡染事所以設色於布帛線縷以供帷幕幄帟衽席衣服之用故春云暴練欲其白而受采王昭禹曰㡆氏練絲帛皆晝暴諸日是也賈氏曰春陽時陽氣燥故暴曬之夏纁音勳玄鄭司農曰纁絳鄭康成曰纁玄者謂始可以染此色者玄纁者天地之色以為祭服賈氏曰凡六冕之服皆玄上纁下故云為祭服石染當及盛暑熱潤始湛研之三月而後可用賈氏曰夏暑熱潤之時以朱湛丹秫易可和釋故夏染纁玄王氏詳説曰夏纁玄則考工鍾氏也其職曰三入為纁五入為緅七入為緇雖不言玄鄭氏謂玄在緅緇之間王昭禹曰纁者黃而兼赤色玄者赤而兼黑色鄭鍔曰纁黃而赤法陽夏則陽用事位在南方染纁宜矣秋染夏戶雅反鄭康成曰染夏者染五色謂之夏者其色以夏狄為飾禹貢羽畎夏翟是其總名其類有六曰翬曰搖曰􅔧曰災曰希曰蹲其毛羽五色皆備成章染者擬以為淺深之度是以倣而取名賈氏曰其類有六已下並爾雅文秋氣涼可以染五色鄭鍔曰秋則氣收而不散五色此時亦皆受采故染文明之色王氏詳説曰染夏雖不見於考工而畫繢之事有五采備之文不然則筐人之職王昭禹曰七月之詩言八月載績載玄載黃我朱孔陽為公子裳蓋於是時五色皆可以染然染人以夏言纁玄與詩不同者蓋染纁玄者始於夏秋則文雜而成章之時故染五色者備於是時冬獻功賈氏曰纁玄與夏總染至冬功成並獻於王總論鄭鍔曰禮記言后𧖟之事謂及獻功之時則朱緑之玄黃之以為黼黻文章祭服之色皆後宫所為此專責之染人之官者蓋后宫所染者專以供王之祭祀染人之官則供國家之禮事其染不一種先王立事無所往而不法乎天時況衣服之色取法隂陽以逺不衷之戒尤欲其色之正此染人之言四時所以為尤備掌凡染事易氏曰掌凡染事不特絲帛而已史氏曰天下之染必因草木土石而成布帛線縷先王取其色以配四時之冝以定上下之分皆所以為禮然先王取色以為禮後世因色以起妄故傳曰五色今人目肓使知所謂色者出於草木土石不足為吾損益則目不肓而視天下之色姑以為禮設耳此周官之意追丁回反師下士二人府一人史二人工二人徒四人鄭康成曰追治玉石之名詩云追琢其章王昭禹曰掌后首飾而謂之追者以其有追衡笄之事而副編次亦有玉以為之飾薛平仲曰服飾既有以謹諸身矣則俯仰於一身之間者首服服屨尤不可有一之或略嘗疑周官於王之五冕掌之政典之辨師而追師屨人掌王后之首服服屨領於大宰何哉大抵君尊之分固臣下之所易嚴而婦飾之美則人情之所易誘夫上而飾之於首追師有定式下而飾之於足屨人有定制不主於奄人女奚之屬而主於外庭之命士不分屬於政典禮典之官而領於天官大宰之重風化之本所係在是是固纎悉之必謹歟掌王后之首服為副編步典反次追衡笄賈氏曰掌王后之首服對夏官辨師掌男子之首服也愚案婦人之副翟比男子之冕婦人之次比男子之辨婦人之纚笄比男子之玄冠婦人之髽比男子之免鄭鍔曰副之言覆所以覆首鄭康成曰覆首為之飾禮記云君卷古本反冕立于阼夫人副褘立于東房然則身服褘衣首乃戴副也康成謂其遺象若今步繇詩云君子偕老副笄六珈謂此副也編者編列其髮以為之如後世之假紒康成謂服之以採桑然則身服鞠衣首戴編也次者次第其髮髢也詩云鬒髮如雲不屑髢也正謂此耳康成謂服之以見王然則身服褖衣首則戴次王昭禹曰后之服六首服有三蓋以一當二副配褘揄編配闕鞠次配展褖詩言副言髢而不及編蓋副者飾之上而次者飾之下惟褘衣可配以副惟褖衣可配以次惟祭服有衡垂于副之兩旁當耳其下以紞垂瑱左傳所謂衡紞詩人所謂玉瑱可也詩人又云副笄六珈者蓋自其冠言之則用衡自其髮言之則用笄衡所以維持其冠而笄則以約束其髮二物皆用玉故必追以為之史氏曰衡其維持冠之𢃄傳所謂衡紞紘綖是矣笄其髻之篸禮所謂女子許嫁笄而字是矣為九嬪及外內命婦之首服以待祭祀賔客鄭康成曰外內命婦衣鞠衣袒衣者服編衣褖衣者服次鄭鍔曰后之首服三副非衆妾所得而戴所謂九嬪及內外命婦首服者殆亦編與次而已賈氏曰以待祭祀賔客亦謂助王后而服之史氏曰祭祀所以見祖廟賔客所以享所尊故首服用焉以明非祭祀賔客則不用用之未必飾鄭康成曰內外命婦非王祭祀賔客佐后之禮自於其家則亦降焉少牢饋食禮曰主婦髲鬄衣侈袂特牲饋食禮曰主婦纚笄綃衣是也昏禮女次純衣攝盛服耳主人爵辨以迎侈袂褖衣之袂喪紀共笄絰亦如之王昭禹曰喪紀則笄而又加之以絰其共九嬪外內婦所用亦如祭祀賔客之禮故曰亦如之屨人下士二人府一人史一人工八人徒四人史氏曰傳曰屨雖新不加於冠古人賤屨而貴冠所以明上下之分此屨人必在追師之後王有辨師后有追師王有司服后有內司服冠冕衣裳無非各有其司獨於屨人總云者以為不足煩二官鄭鍔曰有舄有屨名官特曰屨人者舄止於朝覲祭祀時服之而屨則無時不用也徐卿曰屨之方以象地乃列於天官者蓋立天之道曰隂與陽屨雖方而隂列於天官是天道可兼於隂陽掌王及后之服屨為赤舄黑舄鄭鍔曰服不同則屨不同屨各隨其服故曰服屨賈氏曰后三翟連衣裳而色各異故以三等之舄配之玄舄配褘衣則青舄配揄翟赤舄配闕狄鄭鍔曰王之舄三赤為上赤者盛陽之色表陽明之義后之舄三以玄為上玄者正隂之色表幽隂之義王冕服則舄后褘衣則舄王赤舄之下有白黑二舄后玄舄之下有赤青二舄此為赤舄黑舄特言其尊者耳王氏曰司服言辨則曰辨服辨在上也屨人言屨則曰服屨屨在下也湯氏曰襌下曰屨復下曰舄凡舄之內必有屨屨外又加以舄故云復也屨之與舄理冝同色亦猶裳之與屨同色也周人衣服大槩三色玄青黑緇之類為一色白素之類為一色纁赤黃之類為一色此三代所尚纁赤周也白素殷也青黑夏也纁赤為上白素為中青黑為下故儀禮爵辨纁裳皮辨素積玄冠玄端三服相次等而上之六曰玄冕五曰絺冕釋文希本又作絺四曰毳冕絺麻衣毳罽衣也詩曰毳衣如璊麻衣如雪三色相次亦可見矣但周人盛服不用白素故舄無白者自漢明帝時諸儒誤讀尚書始為山龍華蟲十二章之飾而冕服始皆玄衣纁裳故鄭康成謂冕服皆赤舄冝檢周禮注先鄭後鄭不同處仍以後漢輿服志參考之知漢儒衣服非復周制康成蓋時學耳赤繶於力反黃繶青句音劬鄭鍔曰縫中之紃謂之繶屨頭之拘謂之絇赤繶者王之黑舄之飾黃繶者后之玄舄之飾青句者王之白舄之飾知其然者舄之飾如繢之次故也若夫黃屨則白飾白屨則黑飾黑屨則青飾知其然者屨之飾如繡之次故也但言此三者見其他猶有舄互相考也考工記言畫繢之事青與白赤與黑玄與黃相次也赤與白白與黑黑與青謂之繡舄屨之飾蓋取諸此史氏曰赤繶所以飾赤舄赤陽色陽以純為貴男子之服詩所謂王錫韓侯玄衮赤舄是矣黃繶所以飾黑舄黃地道隂以黃為貴婦人之服禮於后之服屨有里舄是也句絇也青絇所以飾素屨青陽也素隂也陽動隂靜動靜不失其節此足容所以重余嘗考之天子吉事皆舄上公服冕則舄周公衮衣而詩云公孫碩膚赤舄几几是也諸侯服冕亦舄詩云王錫韓侯玄衮赤舄是也其他則皆屨而已先王正一身以治天下正一家以齊四海一身之所履萬民之所取正一家之所行四海之所隨衣裳之制俱有自然之意義況舄屨致飾於步趨之際可無其義乎故繶之名則取致意應物之義絇之名則取拘制其身之義皆以為行戒跬步之間皆中禮節則下而臣民敢不取法哉素屨葛屨賈氏曰自赤舄以下夏則用葛為之冬則用皮為之在素屨下者欲見素屨亦用葛與皮也黃氏曰王與后皆有六服屨人六屨其下又有葛屨鄭引喪禮冬皮屨夏葛屨其意謂葛屨獨施於凶服耳屨人末言四時之祭祀以冝服之鄭氏遂云祭祀而有素屨葛屨惟大祥時恐非此正明葛屨之所當用葛屨見於經者多不獨施於凶服六服六屨其末出葛屨似對后服素紗為當暑之服士喪禮冬皮屨夏葛屨皆有繶純無他義直以寒暑之冝耳然則屨人所謂凡四時祭祀以冝服之者亦為寒暑之當變故大裘祭天先儒疑施於夏至方澤方澤祭地本不與祭天同姑未暇論然服屨而辨冬夏之冝則大裘恐亦不施於夏祭先王觀會通以行典禮豈有當暑而服寒者若言祭則用赤舄黑舄功屨喪屨散屨此隨事之所冝王氏詳説曰鄭氏於追師其説皆可取若夫屨人其説鑿矣且玉藻所謂享天子諸侯衣服冠佩等制甚詳未嘗及舄屨不過曰在官不俟屨又曰童子不屨絇又曰辨行剡剡起屨又曰退則坐取屨而已鄭氏以士冠禮有黑屨白屨纁屨之文以意解而廣之夫士之冠禮其可為王后與服屨之禮乎漢儒之禮其可執以為周公之禮乎謂王之吉服有九祭服之六皆赤舄韋辨皮辨則白舄冠辨則黑舄謂后之吉服有六祭服之三褘衣則玄舄揄狄則青舄闕狄則赤舄何祭服之多而舄之少耶何后服之少而舄之多耶謂后之鞠衣黃屨展衣白屨褖衣黑屨何王之屨絶無而后之屨有許多耶況經有赤舄黑舄而已鄭氏乃有白舄玄舄青舄焉經有素屨葛屨命屨功屨散屨而已鄭氏乃有黃屨黑屨白屨焉經有赤繶黃繶而已鄭氏乃言繶必有絇純言絇必有繶純三者相將焉又以舄之飾如繢之次以屨之飾如繡之次不知又自畔其説且既曰復下曰舄禪下曰屨今以白屨黑屨為屨之飾如繡之次又以纁屨為舄之飾如繢之次是以纁屨為纁舄又以爵辨為士之祭服故尊之以為舄其説愈不可曉辨外內命夫命婦之命屨功屨散屨鄭鍔曰命夫命婦隨其命而有屨謂之命屨當辨其命之數使無越制而亂其序鄭康成曰命夫之命屨纁屨命婦之命屨黃屨以下賈氏曰大夫以上衣冠則有命舄士之命服爵辨則命屨纁屨而已外命婦孤妻以下內命婦九嬪以下不得服舄皆自鞠衣以下故云黃屨以下言以下者兼有卿大夫妻二十七世婦皆展衣白屨士妻女御皆褖衣黑屨功屨次命屨於孤卿大夫則白屨黑屨九嬪內子亦然世婦命婦以黑屨為功屨女御士妻命屨而已士及士妻謂再命受服者賈氏曰案司服孤希冕卿大夫玄冕皆以赤舄為命舄以下仍有韋辨白屨冠辨黑屨故云次命屨命屨據婦人而言其實孤卿大夫則功屨次命舄也九嬪孤妻內子既以黃屨為命屨功屨之中有禪衣白屨褖衣黑屨故云亦然世婦命婦以白屨為命屨其功屨惟黑屨也女御士妻惟黑屨為命屨而已史氏曰功屨以人力為之若掌裘之功裘是也散屨不加功飾所常御及喪屨也王氏曰散屨則喪記無絇者也凡四時之祭祀以冝服之王昭禹曰以冝服之者各隨其時與事之冝而服之若夏則葛屨冬則皮屨此隨時之冝若吉祭用赤舄黑舄功屨喪祭有素屨散屨此隨事之冝總論陳君舉曰王及命夫之服司服掌之其冕辨師掌之而皮枲絲屨皆藏於天官既成而頒焉冢宰制其用而宗伯受之以共服御也漢𥘉有御府令掌御衣服東西織室亦有令皆屬少府費悉出於禁錢不調之大農而齊三服官亦主作服輸不過十笥其後浸侈齊官至歲費數百萬而東西織室官之費五千萬貢禹奏罷之東都織室不别為令以其令丞屬御府蓋稍省約至晉宋改御府為中署然則自漢以下所謂禮部大常尚無車輿章服之辨況節制自冢宰乎車服旗常之類大宰得以會計其財物則用度不至於亡藝禮官之屬得以辨其禮儀等級則所謂用器兵革不中度終無有也夏采下士四人史一人徒四人鄭康成曰夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采王氏曰謂之夏采者其復以冕服備采色焉且喪則哀素幸其生故以采色名官夏氏曰夏采記招魂死事故於末言之鄭鍔曰此事非常有之事專設一官意者有是事然後設其列於此者亦見當屬於天官故耳黃氏曰夏采掌復無他事也特建一官者生事盡而死事始也曽子曰啓豫手啓豫足詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫宋穆公曰若以大夫之靈得保首領以沒於地人主能保其身至此而冡宰之責盡矣復于四郊必以四人掌大喪以冕服復于大祖以乘車建綏復于四郊鄭司農曰復猶始死招魂復魄劉執中曰王之衮冕生常服之奉享乎大祖之廟者也王之太常生常建諸玉路乘於四郊以奉祀者也及其始喪則用以為復而莫測其神魂奚往也故或以其服或以其乘或以其建或之其所往而致敬者或之其所居而素安者或用其所昵而常侍者臯而復之庶幾其神之復而可生者也孝子盡愛之道無不至是以夏采復於大廟也復于四郊也祭僕復于小廟也𨽻僕復于小寢大寢也史氏曰人之終也體魄降于地魂氣無不之以平時所服之冕服所乘之車綏呼而復之覬其魂氣之識於物以來招之以附于形體而復生非愛其親者能如是乎禮庫曰夏采不可強解且依注説總論冢宰官屬易氏曰大學論治國平天下之道曰欲齊其家先修其身欲修其身先正其心此三者統宗會元之地萬化之所從出也今自天官分而論之大宰卿一人而兼之以三公則論道經邦燮理隂陽有以格人主之非心小宰掌建邦之宫刑而正其治於宫閫之間宰夫掌王及三公六卿大夫羣吏之位而正其位於朝廷之上以至宫正宫伯所掌之官府士庶子凡在王所罔匪正人使之日聞正言見正行皆所以輔成君德而納君於當道是固所以為人主正心之端也猶以為未也以人主之尊不以厚其身無以厚天下而護養國家元氣之本正在於護養人主之身故其設官自膳夫而下主膳羞㸑亨之味甸師而下主禽獸魚臘之獻醫師而下主飲食調和之味酒正而下主酒漿醯醢之物宫人而下主宫舍幕帟之儀使人主端居九重心廣體胖血氣和平志慮充溢而後民命國脈始有所恃冝足以享天下之備奉矣而人主之心自視欿然不敢以自安舉天下之財雖曰王之膳服不會而總於大宰者莫不有一定之式玉府掌其器物內府掌其貨賄外府掌其邦布之出入皆有式法以行之及其用之則司會會其財司書掌其書職內以下莫不惟法式之是守使人主不以天下自利而常有以厚天下之利是又所以為人主修身之端也猶以為未也六寢六宫深嚴邃密親公卿大夫之時少親宦官宫妾之時多故王者皆以法制裁之夫人不列於官九嬪世婦女御不著其數以見王者嚴於內官之選初不過取而輕擇內宰下大夫之外如內小臣典婦功絲枲縫染追屨之官亦皆上士中士下士為之小夫憸人不得厠迹其間閽寺之徒曽不數十固大異於後世之鳴璫曳組含天憲而握王爵者宫壼朝署事均一體而萬物咸理是又所以為人主齊家之端莫切於人主之心莫親於人主之身莫重於人主之家大宰皆得以道揆之以至宿衛扈從灑掃使令之徒寢處燕息沐浴櫛頮私猥之事亦莫不皆取正於大宰夫是以政本出於上政權不移於下上下有總攝之政內外無壅隔之𫝑此大宰佐王之大者聖人治國平天下之本見於此矣陳君舉曰冢宰一職惟制御天子身畔之人一則環衛之人二則供奉飲膳酒漿之人三則出納財賄之人四則宫中使令之人蓋以此等與天子𫝑狎或用內官或用女奚他卿不能誰何所以冡宰盡制御之秦漢以環衛之人分入光祿勳衛尉以供奉之人分入少府以出納財用之人分入司農而宫中出入侍從使令之人分與大長秋是冢宰之職分為三四矣又曰以今世之官論之自玉府內府而下今皆收入內藏庫矣自宫人掌舍而下今皆收入修內司矣自醫師食醫而下今皆收入御藥院矣自膳人庖人以下今皆御前供奉官為之矣大抵先王所以朝夕親近士大夫在宫中者自漢晉以來稍稍推出至於天子所以自奉養於外朝者稍稍引入試以通典考之可得一二焉周禮訂義卷十四
