body:
  text: 周禮訂義卷六十二宋王與之撰朝士中士六人府三人史六人胥六人徒六十人賈氏曰其職掌外朝之法左右九棘之事主詢衆庶讞疑獄故屬秋官掌建邦外朝之灋鄭鍔曰天子有三朝一曰治朝司士所掌是也二曰内朝大僕所掌是也三曰外朝朝士掌之其官謂之朝士葢天子五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門外朝在庫門外嫌其非朝故名官特曰朝士法立則位正而儀肅然後君臣上下可以議獄斷訟於此矣或謂宰夫掌治朝之法不言建司士正朝儀之位大僕王眡燕朝則正位而不言建其法獨朝士言掌建邦外朝之法何耶葢治朝乃日日所視之朝其法素明不待建而後立燕朝大僕正王之服位而詔其法儀亦不待建也惟外朝聚衆庶凡厥臣民咸造王庭事非常有欲其勿䙝尤慮其體之不嚴此外朝之法所以特謂之建焉王昭禹曰外朝詢衆庶聽獄訟之朝其位有左右有前後不得以相踰越所謂法也易氏曰朝士掌建邦外朝之法而小司寇掌外朝之政者政所以正其法者也小司寇主於詢天下之政故其位止於公卿大夫庶民而已若朝士專掌外朝之法則諸侯以至羣士羣吏咸在焉欲肅其儀所以必建其法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後鄭鍔曰左右皆植九棘者三孤六卿其數九公侯伯子男其服九棘之為物其心赤其刺外向其華白欲孤卿諸侯忠赤誠實以事上而以潔白為義又欲其外示威儀使人無敢犯也槐數三者上公三人也槐之為物其華黄其實𤣥其文在中坤大臣之位以黄裳為元吉故取其黄論道佐王欲其入道之妙故取其𤣥隂雖有美含之以從王事無成而代有終故有取於文在其中易氏曰孤卿大夫待之以臣道故列其位於九棘之左公侯伯子男待之以賔道故列其位於九棘之右李嘉㑹曰孤卿諸侯蕃衛王室故居左右鄭鍔曰賔主之禮左為主右為客公侯伯子男其爵雖尊有為君之道入在王朝則宜以王人為先列公卿大夫於左則左為主矣羣士亦在左焉左之所以尊之也羣吏乃在乎右右之以見其卑爾三公北面則以答王為義故列其位於三槐之前以至羣吏州長衆庶之徒皆所以斷庶民獄訟之中故亦各以位序而列於後所謂外朝之法其嚴葢如此鄭鍔曰或謂自士師以下名曰士者皆羣士也或以謂上士中士下士之緫名羣吏則府史胥徒是也衆庶則六鄉之民是也三公面王為最尊矣乃使州長帥六鄉之民在其後亦得同三公之尊何耶葢外朝之設正為詢衆庶也王將詢之則三公引之以前而正王面王得以親問焉其在三公之後宜矣以鄉老觀之二鄉則公一人公在前而衆庶從其後亦其宜也獨使州長帥之葢其平日屬民讀法而勸戒之有素民所聽從而不敢咈者也若夫羣士在孤卿大夫之後者乃上士中士下士而非士師以下之官明矣王朝之官上有孤卿大夫下有元士是其常也安有士師得預其後而元士反不在列之理元士在孤卿大夫之後則府史胥徒在諸侯之後亦其理也易氏曰諸侯羣臣之並列於位者外朝之法斷獄弊訟於九棘之下者外朝之位初不必諸侯羣臣之咸集而後聽之也黄氏曰外朝詢民訊獄諸侯適來朝則與焉小司宼羣臣西面詢訊不必備諸侯也適來朝則其位在此詢訊及之與羣臣為一等歟緫論陳君舉曰内重外輕之患自古然矣滕薛兩君爭長於魯滕侯曰我周之卜正卜正無足道焉者而夸大言之五叔無官則蔡不得以髙年先衞人情重内雖聖人不能禦此周人所以汲汲致意也外朝之法以王官位左棘之下以諸侯位右棘之下使若敵然不以朝廷臨寰外至於賔射則諸侯在朝與三公皆北面雖朝士位著有不設者矣至於燕則諸侯以齒敘雖射人之位著有不設者矣至於饗唯諸侯具十有二牢而諸侯之長獨得用十有再獻是則王禮之數何其過厚也又不徒為是文具止也典命之法雖天子之三公毋過八命而九命必以待州伯卿大夫苟出封也皆加一等攷之於𫝊蔡仲周公之卿士也而封蔡虞遏父為陶正而封陳亦甚寵矣宣王之時申伯徂申韓侯徂韓為之賦詩悦其就國之意撫綏慰勞及其私人及其諸娣而雅頌諸詩自鹿鳴至彤弓自臣工至有客皆為下國來者作也夫然後内外之勢一而士無觖望所謂不泄邇不忘逺者如此若夫王臣過國君則三公眡上公之禮卿眡侯伯之禮大夫眡子男之禮士眡諸侯卿之禮庶子壹眡其大夫之禮皆以爵為差葢卿不得踰上公大夫不得踰諸侯伯孔子作春秋王人雖㣲必序乎諸侯之上始不以爵為差凡以尊王非周之舊典也左嘉石平罷民焉右肺石達窮民焉王昭禹曰地道尊右而卑左嘉石必在外朝之左者卑之而示其辱焉肺石必在外朝之右者佑之而欲其伸也項氏曰左嘉石抑罷民也右肺石伸窮民也平者平治之平也李嘉㑹曰人之有病欲平安物平則安安則和也鄭鍔曰或謂嘉石與肺石其一以恥罷倦不能自强之人其一以通下情使窮困無告之民得以上達必設於外朝者葢自雉門而内則有禁其出入者矣惟外朝得入而至焉庶使坐者有恥於其類窮者得至而無壅遏也帥其屬而以鞭呼趨且辟禁慢朝錯立族談者賈氏曰帥其屬當是徒六十人為之鄭康成曰趨朝辟行人執鞭以威之王氏曰以鞭呼趨則呼朝者使趨戒以肅也辟則使人避焉慢朝謂臨朝不肅敬也錯立族談違其位僔語也鄭鍔曰野衆庶羣至於外朝之地則有路塞而不知避所尊者矣必示以威乃知畏也彼其生長於田野之間不知有朝儀則慢而不敬矣未嘗有班序之列不知所當立之地則錯而不定矣未嘗識朝廷之人則就其族類相與私語而談時事矣不有以禁之於未然至其有犯而加誅焉豈忍為之哉此所以帥其屬執鞭以威之又從而辟之又從而禁之也易氏曰王朝有三皆所以聴政此言外朝之政特詳於治朝燕朝葢不特諸侯羣臣之咸在雖州長衆庶與夫窮民罷民之類皆得羣至於左右前後之列其可忽乎朝士以鞭呼趨則呼朝者之趨於位也且為之辟則使人避焉而止其位也位定然後為之禁其慢朝者錯立者族談者尊君故也陳及之曰朝士司寇之屬葢法官也而掌朝儀位著葢法官佐司寇議獄訟詰邦國刑四方其風采足以肅百僚振紀綱以之典朝儀則可以儀刑百辟矣漢時御史中丞外總部刺史内領侍御史舉劾百官自丞相以下舉法無所避每朝㑹則禁彈不肅者亦先王舊制哉凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之王昭禹曰彼失而我有之之謂得伺度而得之之謂獲鄭康成曰俘而取之曰獲故易曰得難曰獲左𫝊所謂得器曰得得人曰獲春秋書獲麟得寶玉大弓凡此皆難易之辨易氏曰古者建國面朝後市市近利而朝近義惟義可以正天下之利葢人民有常業而或至於亡逸者鄭鍔曰謂奴婢之逃亡者或幼小童穉不能自言其所在者貨賄六畜有常守而或至於遺失者於是凡得獲者則委於聽獄訟之朝告於議訟之士而不敢私焉以待其人而反之不使人之見利而忘義也至于旬亦既久矣物不可反亦不可棄於是舉之大者入於公小者歸于庶民之私是又以上下輕重而制其義也若司市言得貨賄六畜者三日而舉之與此異者市民之所集其亡易得其求宜速故三日而舉若外朝之所委則求者或逺亡不易得待之宜緩故必至于旬而後舉各當於義而已鄭鍔曰外朝人所罕至故必十日而後舉市之所舉者不以予民而盡以入官以其物人之所自失非得者之功此大者公之小者與民亦以勞其能得獲之效不忘人功之意也凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期内之治聽期外不聽黄氏曰凡士謂自鄉士已下治謂獄有過誤各以其期理于朝則聽之鄭鍔曰外朝正為聽斷獄訟耳苟不為之期非所當聽者亦為之聽欲使民無訟不可得也故立為期日國中一旬謂鄉士也郊二旬謂遂士也野三旬謂縣士也邦國朞謂訝士也地有逺近故期有寛廹過期則不為受理所以省煩息訟也或謂外朝正以聽訟踰期而不聽無乃不能使民伸其枉乎不知事之抑而不直者彼固不能久安也若過期然後反覆是其變詐或生於意外又為之聽則其證逮所及擾民多矣此其所以不聽歟質人之官謂治質劑者國中一旬郊二旬野三旬都三月邦國朞朞外不聽所以省市中之文書息民之好訟先王之治所以措於無事之域者葢如此凡有責者有判書以治則聽鄭鍔曰責如今之理欠也然必有判書可為證驗則聽其事判書謂兩書一札一書所與之數一書所償之數人各執其半者也苟無判書則不聽小宰所謂聽稱責以傅别是也劉執中曰所以養信而省訟李嘉㑹曰以治者先經所屬如鄉遂縣士而後致朝士由是而觀亦不許越訴明矣凡民同貨財者令以國灋行之犯令者刑罰之鄭司農曰同貨財謂合錢共賈者也王昭禹曰司闗曰凡貨不出於闗者舉其貨罰其人所謂國法也若二人同而一人犯令則并舉其貨財而刑罰施於犯令者一人而已鄭康成曰謂同貨財者富人畜積者多時收斂之乏時以國服之法出之雖有騰躍其贏不得過此以利出者與取者過此則罰之若今時加貴取息坐贓凡屬責者以其地傅而聽其辭王昭禹曰屬責謂以已之財屬之於人而使責也王氏曰以責屬人必使有傅傅必有地著其相抵冐而訟以其地傅來乃為之聽治屬責而無傅有傅而無地著不知所在不可追證則弗聽也李嘉會曰地傅者當土之人當時為傅别者若今牙保也屬責於人有地傅為之證則聽其辭而理之黄氏曰屬責以貨財相委屬而有逋逸侵貨訟于官者猶以傅别之傅為名地傅葢五家相受所能共知鄭鍔曰屬字當為親屬以財相貸葢有不用判書而與之者及其有責而相訟不可以其所親之人為證何則彼以親故或不能無相容隠之情證其曲直或至於傷恩故於法親不為證但以其地相傅近之人證之乃為之聽其辭如地傅之人有不知其事實則不聽矣愚案黄鄭二説俱通若參以小宰聽稱責以傅别之言不若黄李為平易黄氏曰有責治以判書同貨行以國法屬責聽以地傅皆著聽訟之法也皆細事也無不得上達則民情無壅矣然教化素行民訟簡少畿外委之諸侯畿内委之家都朝士所治者甚寡朝廷雖尊而事勢常與民接故其法可行非後世所能為也凡盜賊軍鄉邑及家人殺之無罪鄭鍔曰軍謂屯為軍旅以攻圍人也盜賊或羣輩軍屯於鄉邑至於犯及家人其熾如此凡能殺之者皆無罪王安石乃以為攻圍鄉邑及家則人得殺之其意謂既圍鄉邑矣又及吾之私家故人殺之無罪然與下殺之無罪為不叶良由考之不詳强為之説易氏曰專殺固聖人之所禁凡盜賊結集徒黨已成軍伍而害及鄉邑及家人者苟禁其殺勢將猖獗而不可禦殺之無罪去天下之害也凡報仇讎者書於士殺之無罪鄭康成曰謂同國不相辟者將報之必先言於士賈氏曰士即朝士也鄭鍔曰報仇者必告於士已書於士而士得之則以刑而論其罪已書於士而士不得其人苟是人後自得而殺之則無罪謂已告於公故也許之以報仇讎所以伸人之私恩必使先告於公然後得以行其事所以杜人之專殺也既書于士矣及其既報則不論以罪葢非私殺也若邦凶荒札喪寇戎之故則令邦國都家縣鄙慮刑貶賈氏曰縣鄙謂六遂不言六鄉者舉遂則鄉在其中劉迎曰刑之貶而以朝士慮之者葢凶荒札喪寇戎之際法不寛減則民滋不安而盜賊之變起正朝士所當慮而令邦國都家縣鄙議刑貶也先儒以減用為慮貶朝士何與於減用哉司民中士六人府三人史六人胥三人徒三十人林椅曰外朝有司民猶司士之在治朝鄭鍔曰天子為天牧民則民者天子之所司官曰司民葢天子司其牧養之事司民司其多寡之數而登之耳王氏詳説曰天府云若祭天之司民司禄而獻民數榖數則受而藏之祭之同其時掌之異其屬司禄為地官之屬固然矣司民不屬地官而屬秋官者秋官主刑聖人用刑本為好生耳陳君舉曰司徒處繇役不時教化不至征賦不均則民犯法者衆故於刑官中設司民之官知其多寡與司徒相闗今戸部刑部不相闗薛平仲曰五刑皆戕民者也知所以愛其民則知所以謹其刑此司民所以列於司刑之上掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女歲登下其死生鄭康成曰登上也男八月女七月而生齒鄭鍔曰生齒則能食能食則成人戸口之所始也版今戸籍也賈氏曰國中據六鄉在城中者都鄙據三等采地及其郊野者郊謂六鄉之民在四郊者野謂六遂及四等公邑是徧畿内矣鄭鍔曰不辨其國中都鄙郊野無以知其地之人數辨之使不相雜則其地之戸口衆寡皆可見不異其男女無以知其生之種類異之而各從其類則他日嫁娶之年髙下皆可知也每歲有死者則下之有生者則登之以知其存沒也吕氏曰案周官媒氏男女自成名以上皆書年月日名焉成名子生三月父名之也内則子生三月之末男角女羈以見於父父名之宰書曰某年某月某日生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府其制詳密如此重民之生也秦始皇令男子書年此特恐民避征役耳豈有三代重民之意及三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數于王王拜受之登于天府鄭鍔曰司寇刑官也宜無預於民數大比之年則以戸口之數詔之何也以刑之繁簡民之息耗繫焉所以告之者使省刑而已司寇既得其數俟至孟冬祀天司民之日則獻于王以為民之所以生者屬乎天亦隠有神者相之而其權在王王能恤天之所生則已得以省刑矣司民天之星也王者以名官所以法之也小司寇孟冬祀司民獻民數于王葢小司宼每歲祀司民則獻每歲之數此則大比之歲於祀司民之時乃獻三年之大數也王氏詳説曰司禄為文昌三台之第六星司民為軒轅角葢軒轅十七星兩角有大民小民天文志所載明矣先鄭以司禄司民為文昌星何所經見鄭康成曰天府主祖廟之藏者孫氏曰天府受民數榖數之藏司寇獻民數而不及榖數以圖國用觀之則榖數必與民數俱上司禄與司民亦同祭也葢民數自生齒以上俱登之不得穀數之實則國用亦無所稽矣賈氏曰王拜受之登于天府者重此民數民為邦本故也内史司㑹冢宰貳之以賛王治鄭康成曰賛佐也賈氏曰内史掌八柄司㑹掌天下大計冢宰貳王治事皆掌大事故皆寫一通副貳民數藏之所以賛助王之治民也鄭鍔曰内史司㑹冢宰貳之以見民非特王之事而為大臣者不可不任其責小司寇貳之以制國用此言貳之以賛王治者司宼刑官也民至於犯刑以其貧窮而抵冐爾故言制國用意欲使三官知為民富之術不至使之犯刑也司民掌民數之官耳民之貧而犯刑非已所得而知也以為民者王所當治民有登耗則為公卿大臣者當據是數佐王以治之使之繁庶而已故曰以賛王治易氏曰此言貳之以賛王治小司寇言貳之以制國用者葢財之豐耗出於民民之繁簡係乎刑小司寇既敬刑以為生民之本故冢宰資之以制國用若司民專掌萬民之數故泛言賛王治而已司刑中士二人府一人史二人胥二人徒二十人鄭鍔曰刑者民命所係大小司寇司之而士師以下行之非中士二人所獨得而私也名曰司刑者使掌五刑之書掌五刑之灋以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百鄭鍔曰刑當與罪相應掌其刑書於此因其罪而附麗之則國法不濫而民亦無寃矣五刑之屬二千五百其至輕者墨刑也劓重於墨宫重於劓刖重於宫鄭康成曰墨黥也先刻其面以墨窒之劓截其鼻也今東西夷或以墨劓為俗古刑人亡逃者之世類與宫者丈夫則割其勢女子閉於宫中若今宦男女也刖斷足也周改臏作刖殺死刑也書𫝊曰決闗梁踰城郭而略盜者其刑臏男女不以義交者其刑宫觸易君命革輿服制度姦宄盜攘傷人者其刑劓非事而事之出入不以道義而誦不詳之辭者其刑墨降畔寇賊刼略奪攘撟䖍者其刑死此二千五百罪之目略也其刑書則亡夏刑大辟二百臏辟三百宫辟五百劓墨各千周則變焉所謂刑罰世輕世重也王氏詳説曰此言掌五刑之法案左𫝊文十八年季文子曰昔周公作誓命曰在九刑不忘鄭氏以正刑五流宥鞭扑贖刑之四者為九刑賈服以為五刑一與八議為九刑二説皆非也從鄭氏之説則是虞舜之世已有九刑矣不必周公時也從賈服之説則八議非刑矣況五刑之外不止八議如士師之五禁五戒司刺之三刺三宥三赦如大司徒之鄉八刑大司寇之三典與夫糾萬民之五刑又非墨劓刖宫大辟之五刑果若是刑與司刑之五刑又不止於九刑也且以叔向之言明之叔向云夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也九當為甫聲之誤也既曰禹刑湯刑以當代名其刑則穆王訓夏贖刑作吕刑即甫刑也甫聲訛為九也明矣周之甫刑與周公之五刑自不同周公之五刑其屬二千五百大辟小辟每刑各五百也穆王之甫刑其屬三千又以五等輕重而為屬之多寡輕者屬多如墨劓之屬各千是也重者屬少如宫屬三百大辟之屬二百是已則是周公之重刑入重而穆王之重刑入輕矣又況穆王之刑贖刑也訓夏后氏之肉辟三千而作世輕世重其是之謂歟陳及之曰春秋𫝊晉叔向曰周有亂政而作九刑然則司刑五刑之屬凡二千五百非周公之舊典其九刑之書乎穆王訓夏作吕刑五刑之屬凡三千而大辟二百而已今殺罪至五百比穆王為又重然則九刑又穆王後所修律令歟雖然司刑所掌五刑而已其四刑安在葢五刑者皆肉刑也而司刑掌之若夫男子入於罪隷女子入于舂稾見於司厲敢不闗鞭五百見於條狼氏金罰貨罰見於司金皆輕刑也與五刑併為九耳其詳不可得聞也班孟堅謂司刑之屬二千五百為中典吕刑之屬三千為重典以中典為成周之制以重典為穆王之刑非矣周公之制安有刑書其殺罪至五百安在為中典也孔子曰五刑之屬三千其罪莫大於不孝以司刑二千五百為周公之刑則孔子不應舎周公而稱穆王之制矣二千五百之刑決穆王後所修律令無疑矣使周公果有刑書而叔向不應曰三辟之興皆叔世也書序謂穆王訓夏贖刑作吕刑今以周禮考之自有金罰即贖刑葢又承穆王之制耳穆王訓夏贖刑而不言其先世則周公無刑書明矣有罪而贖亦非周公之舊矣世清則刑輕世亂則刑重自漢以後及今皆然豈有周公之際輕刑少而重刑多穆王之際輕刑多而重刑少耶漢儒所言皆未達也林椅曰先王議事以制不為刑辟然司刑五刑之屬各五百則三刺三宥八議之餘不必盡用也若司寇斷獄弊訟則以五刑之灋詔刑罰而以辨罪之輕重鄭鍔曰若司寇斷獄弊訟之時則執五刑之法往而詔之以刑罰之等而以辨人罪之輕重使輕不至於失其罪重不至於濫無辜一以書為斷而已用刑書如伯州犂之欲上下其手張湯之欲輕重其心胡可得哉王昭禹曰以五刑之法詔刑罰所謂惟察惟法其審克之也而以辨罪輕重所謂上下比罪上刑適輕下服下刑適重上服也周禮訂義卷六十二
