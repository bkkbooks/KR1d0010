body:
  text: 周禮訂義巻九宋王與之􅁧籩人奄一人女籩十人奚二十人鄭康成曰籩竹器如豆者女籩女奴之曉籩者薛平仲曰此數官者又以備膳夫之羞用百有二十品醬用百有二十罋者也反覆求之則知周官敘次之意大抵官府之近於君者固莫宻於供奉之職而官女之宻於君者尤莫切於供奉之職然庖厨之當逺君子必處於外而酒醴之蠲潔籩豆之靜嘉古人當責於内處於外者固冝以命士為職責於内者亦宜以奄官女奚為職然外而官府敬君為有素先言共王而後言祭祀之用所以責其敬而已内而内人朝夕王所者也先言祭祀而後言共王之用所以養其敬也況籩豆之實水土之品不敢用常褻味而貴多品則纎悉委曲之誠潔靜精微之意使在内者各有事焉凡便嬖側媚之習不惟不敢且不暇矣王昭禹曰先王祭祀内盡志以致其内心外盡物以致其外心水草之葅陸産之醢細物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣凡天之所生地之所産而可薦者莫不咸在一物不可遺則一器不可闕籩豆簋俎禮之器也籩豆之事各有司存此籩人醢人之職所以立掌四籩之實鄭康成曰籩其容實皆四升史氏曰籩以竹為之所以陳乾物賈氏曰四籩則朝事饋食加籩羞籩是已四籩之實則麷蕡白黒等是也朝事之籩其實麷方弓反蕡符文反白黒形鹽膴火具反鮑魚鱐所求反鄭康成曰以司尊彞之職參之朝事謂祭宗廟薦血腥之事也鄭鍔曰宗廟祭祀有朝踐之事所以象事生朝時之所進當其祭之始也王酌鬱鬯祼尸后亞獻於是乎王出迎牲而殺之始行朝踐之事則后薦朝事之籩其籩中所實之物則曰麷曰蕡曰白黑曰形鹽曰膴鮑魚鱐也麷熬麥也鄭康成曰蕡枲實也熬稻而白之熬黍而黒之鹽則築以為虎之形魚則䐑大臠以為膴史氏曰䐑肉為大臠或糗乾以為鮑或折乾以為鱐王氏曰王使周公閒來聘魯享有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之享以象其德羞嘉穀鹽虎形麷蕡白黒則所謂羞嘉穀也形鹽則所謂鹽虎形也昌本則所謂昌歜也推𩔖而言則膴鮑魚鱐與夫朝事之享皆所謂致其養之盛者也孝子之事親欲致其養養欲致其盛故朝事之籩豆其實如此王昭禹曰鼎俎竒而籩豆偶隂陽之義也蓋籩豆之實物産之雜也其數冝偶故朝事之籩其實麷蕡而下凡八物矣加籩之實菱芡㮚脯皆偶也饋食之籩其實棗㮚古栗字桃乾䕩音老榛倒巾反實王氏曰饋食之籩豆以象食時所進鄭康成曰乾䕩乾梅也有桃諸梅諸是其乾者榛似㮚而小賈氏曰八籩則棗一㮚二桃三乾䕩四榛五案乾䕩為乾梅則籩中桃是濕桃既有濕桃則别有乾桃注引内則桃諸云是其乾者既有濕桃則有濕梅可知以乾梅濕梅添五者是為七籩既桃梅有乾濕則棗亦冝有乾濕復取一添前為八必知有八者案儀禮特牲少牢士二籩二豆大夫四籩四豆諸侯冝六天子冝八醢人饋食之豆有八此朝事加籩皆八也王氏曰桃乾䕩脾析豚拍蠃蠯蜃蚳及魚皆物之細者也棗㮚榛實女所用摰以告䖍也凡此所謂備其細且致其敬孝子之事親致其養者既盛矣以為未足又備其細既備其物以為是養而已弗敬不足以為孝則又致其敬故饋食之籩豆其實如此鄭鍔曰攷女䞇不過榛㮚棗脩以喻婦人誠實無偽則饋食之籩所實者皆致禮之實緫論九獻陳藴之曰九獻注疏已有成説但雜見於籩人司尊􅂜與其他官職今取注疏及禮圖之説𩔖聚為四蓋别而言之謂之九獻合而言之則有四節其一節曰祼凡經中所謂祼者是也王以圭瓉酌鬱鬯以獻尸此一獻也后以璋瓉酌鬱鬯以獻尸此二獻也其二節曰薦腥籩人所謂朝事司尊彞所謂朝踐是也后既祼之後王出迎牲于門祝延尸向户外户牖之間南面后於是薦朝事之籩豆王迎牲入廟麗于碑親殺取血以告殺取毛以告純解而腥之為七體薦于神坐王以玉爵酌醴齊以獻尸此三獻也后以玉爵酌醴齊以獻尸此四獻也其三節曰薦熟籩人所謂饋食司尊􅂜所謂饋獻是也朝踐之後乃體解其犬豕牛羊烹而熟之后於是薦饋食之籩豆王以玉爵酌盎齊以獻尸此五獻也后以玉爵酌盎齊以獻尸此六獻也其四節曰酳自饋食之後尸始有飲食之禮尸食訖后又薦加籩豆王以玉爵酌朝踐之醴齊以酳尸此七獻也后以瑶爵酌饋食之盎齊以酳尸此八獻也后酳尸後諸臣又以瑶爵酌沈齊獻尸司尊􅂜所謂皆有罍諸臣之所酢者以備卒食之三獻此九獻也以上九獻謂之正獻九獻之後遂行玉爵為旅酬矣鄭氏又有朝獻再獻之説及圖説九獻異於注疏並於司尊􅂜見之加籩之實蓤音陵芡音儉㮚脯蓤芡㮚脯薛氏曰周禮言加豆籩則加爵之豆籩特牲禮主人主婦既酳尸然後長兄弟衆賔長為加爵不施於亞獻之節鄭氏謂尸既食后亞獻尸所加之籩誤矣明堂位曰爵用玉琖仍雕加以璧散璧角特牲禮獻用爵加用觚則加在獻數之外明矣王氏曰加籩豆以象饋食之有加鄭康成曰蓤芰也芡雞頭也㮚與饋食同重言之者以四物為八籩也鄭鍔曰蓤芡之𩔖皆生於水以𩔖推之則取物之深逺者所以致其物之難得者王氏詳説曰㮚嘉㮚也醢美味也故㮚為饋食之籩亦為加籩之實醢為朝事之豆亦為加豆之實詩云醓醢以薦其周人之尚醢歟語曰周人以㮚其周人之尚㮚歟羞籩之實糗餌而去反粉餈昨資反鄭康成曰羞籩謂若少牢主人酬尸宰夫羞房中之羞于尸侑主人主婦皆右之者賈氏曰天子祭祀禮亡故取少牢大夫禮解之此當王酬尸内饔進之于尸侑等者也王氏曰羞籩豆則象其養之有羞也鄭康成曰此二物皆粉稻米黍米所為也合蒸曰餌餅之曰餈糗者𢷬粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足賈氏曰此為二籩糗與粉為一物恐餌餈黏著籩故分于二籩之下劉執中曰粉穤黍秫成餈鄭鍔曰曰糗曰餌曰粉曰餈亦以四物而為八籩王氏曰糗餌粉餈酏食糝食出於耕耨而用舂治之力為多非若菹醢之薦可以久所以服其勤而致新也黄氏曰四籩以司尊􅂜互考之屬薦腥薦熟為兩節王行禮為正則加籩羞籩當為后亞獻行禮故謂之加與羞皆用㮚脯餌餈凡祭祀共其籩薦羞之實賈氏曰祭祀言凡謂四時禘祫祭鄭鍔曰四籩皆王后所薦籩人則實之耳其他祭祀則共籩中可薦可羞之物不共其籩有司自掌其器也王昭禹曰薦羞皆進也薦羞則所進之物薄羞籩則致滋味焉愚案宰夫庖人又有薦羞説喪事及賔客之事共其薦籩羞籩鄭康成曰喪事謂殷奠時賈氏曰殷大也大奠朔月月半薦新祖奠遣奠之𩔖賔客謂燕享時也王昭禹曰喪事賔客之事皆王之事籩人共其實亦共其籩為王及后世子共其内羞凡籩事掌之鄭康成曰於其飲食以其房中之羞王氏曰籩人醢人皆曰為王及后世子共其内羞則此内羞乃王及后世子以此共禮事而籩人醢人為之共之也世婦及祭之日涖陳女官之具凡内羞之物則内羞所共為祭事矣鄭鍔曰籩人奄官所以為王及后世子共之其職主籩又在内也王昭禹曰曾子曰籩豆之事則有司存守其數不知其義也籩豆之為禮皆王之所親行籩豆之為器則掌於奄人女奚之屬所謂本在上末在下也醢呼改反人奄一人女醢二十人奚四十人王昭禹曰四豆之實皆醢而已故以醢人名官鄭鍔曰或謂籩豆者禮之器用籩以盛果實必用豆以盛葅醢既列籩人冝有豆人不設豆人而有醢人何也蓋醢必盛於豆而豆人所盛者不一物言醢則豆可知鄭康成曰女醢女奴曉醢者掌四豆之實禮圖曰案考工記旊人為豆高一尺又鄭注周禮及禮記云豆以木為之受四升口圓徑尺二寸有蓋盛昌本脾析豚拍之韲醓蠃兎鴈之醢韭菁芹筍之菹麋臡鹿臡之屬鄭注鄉射説云豆冝濡物賈氏曰言四豆之實豆與籩並設節數與四籩同時朝事之豆其實韭音久菹莊魚反醓吐感反醢昌本麋臡乃兮反菁惟寜反菹鹿臡茆音卯菹麇臡鄭康成曰凡菹醢皆以氣味相成史氏曰凡以一物為醫必有一菜以稱之取其味之相冝也賈氏曰經云韭菹醓醢以下皆兩兩相配鄭鍔曰韭也昌本也菁也茆也四物以為菹醓也麋也鹿也麇也四物以為醢醢亦謂之臡蓋同一法有骨為臡無骨為醢如全物為菹細切為韲名不同也鄭康成曰三臡亦醢也作醢及臡者必先膊乾其肉乃後莝倉卧切之雜以粱麴及鹽漬以美酒塗置甀中百日則成矣王昭禹曰詩云四之日其蚤獻羔祭韭以此薦新則韭亦祭之所貴醓醢以肉汁為醬鄭康成曰昌本昌蒲根切之四寸為菹鄭司農曰麋臡麋肝髓醢史氏曰麋似鹿而大鄭康成曰菁蔓菁也茆鳬葵也劉執中曰四時之田一為乾豆共於豆實則醢之脯醢之餘則臡之皆所以奉祭祀饋食之豆其實葵菹蠃力禾反醢脾婢支反析星厯反蠯蒲佳反醢蜃市軫反蚳醢豚拍音博魚醢王昭禹曰葵草之細出者傾心向日則有敬意鄭康成曰蠃䗂音移蝓音榆史氏曰蠃蠯蜃蚳皆蛤屬鄭司農曰脾析牛百葉蠯蛤也鄭康成曰蜃大蛤蚳蛾魚綺反子賈氏曰脾析蜃豚拍不言菹皆虀也鄭大夫杜子春皆以拍為膊謂脅也或曰豚拍肩今河間名豚脅聲如鍜鎛王昭禹曰豚拍則拍豚而為之也鄭鍔曰葵也脾析也蜃也豚拍也四物以為菹蠃也蠯也蚳也魚也四物以為醢加豆之實芹音勤菹兎醢深蒲醓醢箈音迨菹鴈醢筍息尹反菹魚醢鄭康成曰芹楚葵深蒲蒲始生水中子史氏曰芹與深蒲皆水産深蒲必深水所出箈箭萌筍竹萌賈氏曰箭一名篠筍一名簜萌謂新生者見今皆為菹史氏曰箈與筍皆陸産史氏曰兎醢出於陸故以水産配之魚鴈出於水故以陸産配之羞豆之實酏食音嗣糝素感反食鄭康成曰酏􅊡之然反内則曰取稻米舉糔思柳反溲所柳反之小切狼臅昌蜀切膏以與稻米為􅊡賈氏曰酏粥也先鄭以酒酏為餅若今起膠餅文無所出故後鄭不從内則有􅊡無酏周禮有酏無􅊡故知酏􅊡一也内則曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之史氏曰食者皆取稻麥為之酏者以酒酏發之糝者以肉屑和之鄭鍔曰凡此四豆菹之與醢氣味相冝同為一豆若夫醓醢則朝事之豆於韮菹用之加豆則於深蒲又用之魚醢於饋食之豆用之於加豆則又用之蓋一氣與味茍可以相成不嫌於再薦也凡祭祀共薦羞之豆實賔客喪紀亦如之為王及后世子共其内羞賈氏曰此一節與籩人同已釋於上王舉則共醢六十罋以五齊子西反七醢七菹三臡實之賈氏曰王舉謂王日一舉鼎十有二則醢人共醢六十罋以醢為主其實有五齊七菹等禮圖曰罋以盛醯醢高一尺受二升今以八寸之尺計之口徑六寸五分腹徑九寸五分底徑六寸五分高一尺腹下漸殺六寸鄭康成曰齊當為韲五韲昌本脾析蜃豚拍深蒲也七醢醓蠃蠯蚳魚兔鴈醢七菹韭菁茆葵芹箈筍菹三臡麋鹿麇臡也凡醢醬所和細切為韲全物若䐑直輒反為菹少儀曰麋鹿為菹野豕為軒皆䐑而不切麕為辟雞兔為宛脾則䐑而切之葱若薤實之醢以柔之由此言之韲菹之稱菜肉通王氏詳説曰鄭氏於少儀釋之曰皆菹𩔖是菹兼肉菜而言今言七菹皆菜𩔖言韲則通肉菜而為言豈非成周之禮有異於記禮歟鄭鍔曰合是數者以實六十罋事至尊之禮無所不致其敬也賔客之禮共醢五十罋凡事共醢賈氏曰賔客謂五等諸侯來朝天子致饔餼與之醢也案掌客云禮上公醯醢百有二十罋侯伯百罋子男八十罋此共醢五十罋合醯人所共醯五十罋共為百罋此指侯伯而言舉中以見上下王昭禹曰非特祭祀賔客喪紀之事而已凡邦事有用醢者皆共之史氏曰物以乾養氣以濕養血籩實必乾豆實必濕濕則滋味具而血榮也故養人之血氣者豆實為重觀鄉飲酒之禮為養老設也六十者三豆七十者四豆八十者五豆九十者六豆不言籩者所主在濕味也王者養老袒而割牲埶醬而饋醬亦醢也皆豆之實也醢人之設王者豈私其口腹乎醯人奄二人女醯二十人奚四十人王氏曰醯以酸為尚然五齊七菹皆醢物也醢人職之矣醯人復共醯何邪蓋天下之味不過於禽獸魚蜃之屬其肉登俎則腐敗隨之不以鹽醢之其能久乎鹽曰鹹醝故醢之味專於鹹鹹非酸不能收故醢不可以無醯此醯人之職所以設而醯之為用亦不過乎菹醢之間鄭康成曰女醯女奴曉醯者掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物鄭康成曰齊菹醬屬醯人者皆須醯成味賈氏曰此則醢人所掌豆實而在此者與醯人共掌連言醬者并豆醬亦掌也王氏曰醢人醯人各有五齊七菹者蓋齊菹有須醬以成者凡醯物則凡以醯成之物凡醯醬之物則凡以醯成之醬也五齊七菹三臡皆謂之醬劉執中曰祭祀燕享所用之物酒則尊罍粢盛則簠簋肉則俎薦羞則籩醢醯則豆各有定數至於醯醢鄭氏曰罋或曰豆者罋之可備禮數而持乆也豆之則以和齊菹而具膳也是醢人雖備五齊七菹以充豆實而不加之以醯則齊菹不成其味非可以為備物故其職與醢人為聯賔客亦如之賈氏曰下云賔客之禮據饔餼此云賔客亦如之據享食致之也鄭鍔曰既言賔客亦如之又言賔客之禮共醯五十罋蓋賔之稍禮之時所共者少而饔餼盛禮則其數當五十此所以别言之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賔客之禮共醯五十罋凡事共醯賈氏曰此六十罋并醢人六十罋即膳夫所謂醬用百有二十罋是也史氏曰賔客之禮殺於王故共五十罋醯人共王后世子内羞不言齊菹此言齊菹以其與醢人共掌罋菹須醯故就醯人為言鹽人奄二人女鹽二十人奚四十人鄭康成曰女鹽女奴曉鹽者掌鹽之政令以共百事之鹽劉執中曰鹽人之政令以鹽之産所不同而用藏之亦異也故有刮於地而得者有風其水而成者有熬其波而出者有汲於井而為者有積於鹵而結者史氏曰鹽之政令非獨共鹽而已凡出納煎煉之事皆掌之王昭禹曰醢人醯人皆不言政令而鹽人之為物其用博其利厚異於醯醢必有政令以治之百事之鹽所用非一事所和非一物祭祀共其苦音鹽鹽散鹽賈氏曰盬鹽今之顆鹽鄭康成曰散鹽䰞水為鹽王氏曰散鹽鹽之散者蓋今末鹽是也不如顆鹽之苦又不如戎鹽之甘故不以味名之而名其體史氏曰洪範曰潤下作鹹散者謂鹹末鹽也池水所出䰞海所成皆出於潤下是故水入其奥風凝其華不須煎煉而自結者池井之鹽昔晉大夫以郇瑕之地沃饒而近鹽是也剗土為場牢盆為鹵火齊以時而後成者䰞海之鹽昔東郭咸陽以治生累萬後世諸侯資其利而冨埒天子是也祭祀則皆共焉劉執中曰刮地之鹽苦而以共祭祀者取其成於自然與夫𤣥酒明水不異也熬波之鹽散取其治洽四海能致逺物故以奉先焉賔客共其形鹽散鹽劉執中曰鹽為虎形以共食㗖示服猛也故以待朝覲㑹同之賔客而副之散鹽者致物以懷諸侯也王之膳羞共飴鹽后及世子亦如之鄭鍔曰王之膳羞取其味之甜者為之所以共飴鹽凡齊才細反事䰞音煮鹽以待戒令鄭康成曰齊事和五味之事劉執中曰鹽之煉者其色黒或化而為水用以火煉治之則潔白如初而其味和矣故以待王之齊事和品味焉鄭鍔曰祭祀膳羞賔客所用調和之齊廣矣安可待事至然後求具所以先䰞鹽以待不時之須鄭鍔曰先王於鹽只以待祭祀賔客膳羞之用初不以為冨國之資故周禮一書理財居半鹽獨無賦自管仲以後寖以為冨國之計遂至於官與民爭利豈先王之意哉幂莫厯反人奄一人女幂十人奚二十人鄭康成曰以巾覆物曰幂女幂女奴曉幂者愚案以巾覆物者其間既有八尊六􅂜故亦屬酒正掌共巾幂賈氏曰巾則下經云王巾皆黼是也幂則幂八尊之𩔖是也史氏曰巾幂一也帨手帨爵者専謂之巾可以覆物者謂之幂幂人共祭祀以覆物謂主也祭祀以疏布巾幂八尊以畫布巾幂六􅂜賈氏曰疏布者大功布為幂覆此八尊程氏曰疏布之尚反女功之始也布之精者多而宻粗者少而疏疏布祭祀用之以幂尊女功之作始於粗久而後至於精故揚雄曰霧縠之組麗女功之蠹以䟽布之尚故曰反女功之始也史氏曰尊之名止六此曰八尊者案司尊􅂜春祠夏禴獻象皆兩之秋嘗冬烝著壺皆兩之四時之閒祀大山皆兩之是知每祀六尊皆設而為二尊各加其一焉故謂之八尊賈氏曰六􅂜者雞􅂜鳥􅂜斝􅂜黄􅂜虎􅂜蜼􅂜此六者皆盛鬱鬯以畫布幂之王昭禹曰先儒謂畫雲氣非是以經考之下文言凡王巾皆黼則畫布巾亦皆畫黼矣王昭禹曰言畫則知疏布之素言疏則知畫布之宻薛氏曰鄭氏謂疏布者天地之神尚質以八尊用之天地又謂宗廟尚文以六􅂜用之宗廟也蓋祭祀惟宗廟有祼鬱人所謂凡祭祀賔客共鬱鬯以實􅂜而陳之司尊􅂜於祠禴烝嘗閒祀則祼用六􅂜是六􅂜固用之於宗廟若夫八尊則司尊􅂜亦用於宗廟酒正於大祭中祭小祭則以五齊三酒而實之八尊則八尊固用之天地亦用之宗廟何獨曰尚天地之質意者八尊實而不酌示其質也故以疏布六􅂜用之以祼示其文也故以畫布然司尊􅂜有六尊六􅂜此言八尊者何也蓋司尊􅂜雖言六尊六􅂜而獨言十二尊六􅂜者祼用雞􅂜鳥􅂜之類是也十二尊者春祠夏禴秋嘗冬烝與夫四時之閒祀追享朝享其朝踐饋食各用兩尊是也假如春祠夏禴其朝踐用兩犧尊其再獻用兩象尊則是四尊致用其餘八尊則攝而不酌耳烝嘗閒祀亦然凡王巾皆黼音甫史氏曰非獨幂尊􅂜凡用帨手覆物者皆是也鄭鍔曰王之四飲三酒及籩豆俎簋之布不以䟽為尚質不以畫為尚文皆當用白黑二色繡為黼文以幂之黼者繪以斧形而白黑半之也白黑西北乾方之色而斧又有斷制之義皆君象也唯王得以用之所以象乾之剛健斧之斷制用在於進賢退不肖也禮曰見賢不能舉舉而不能先慢也見不善不能退退而不能逺過也慢與過則失其剛健斷制之義矣視黼巾足以知戒也黼巾亦布祭祀既用布則王巾豈敢以他物為之堯舜飯土塯啜鉶羮者以天地宗廟之奉不過陶匏之器後世天地宗廟之器未之有改而土之自奉者金玉文繡也黼巾不用而龍鬚火浣進矣宮人中士四人下士八人府二人史四人胥八人徒八十人王昭禹曰宮官之屬有宮正宮伯而又有宮人者蓋宮正掌王宮之戒令糾禁宫伯掌王宮之士庶子凡在版者是其所掌及於宮中之官府次舍宿衛之事而宮人之所掌則止於修治宫寢與凡共王勞褻之事而已易氏曰夙興夜寐洒掃庭内衛武以為荒耽之警子有庭内弗洒弗掃晉昭以不能修正國之道朝廷内外之肅正君臣上下儆戒之機不然則王宫自奄奚以下如次舍幕幂皆掌之以下士而宮人獨中士意可見矣薛平仲曰太宰為人君心術慮自宮正至宫伯自膳夫至膳人自酒正至幂人所以宻邇於王者夫皆王宫内人而猶未及於外也宫人掌六寢之修而及於四方之舍事掌舍而下又皆為王之㑹同于國外者設焉則内外出入之際其為王躬之是保者始悉使大宰能正王宫王内之職而防慮猶未周於外則周旋於寢處次舍之間者得無有間之可乗而大宰於王眡朝則賛治眡四方之聽朝亦如之内外不容於有閒也詎謂叙次官屬而申儆之容有内外之不備哉此宫人已下所以見諸此也掌王之六寢之脩王氏曰王朝有三寢有六隂陽之義也鄭康成曰六寢者路寢一小寢五玉藻曰朝辨色始入君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服是路寢以治事小寢以時燕息焉春秋書魯莊公薨于路寢僖公薨于小寢是人君非一寢明矣賈氏曰路寢制如明堂以聽政路大也人君之所居皆曰路鄭所引者皆諸侯法天子六則諸侯三亦路一燕一側室一内則所云是也史氏曰餘五小寢曰燕寢四季居四隅季夏居中央棲息之所也王氏詳説曰王謂之六寢掌之者宮人后謂之六宮掌之者寺人宮人之職以中士四人為之寺人之職以王之正内五人為之鄭氏以正内為路寢是已鄭氏曰守祧職其廟則有司修除之此修亦是掃除也鄭鍔曰修修飾以致美也為其井匽於建反除其不蠲圭淵反去起吕反其惡􅆨賈氏曰謂於宮中為漏井以受穢又為匽豬使四邊流水入焉井匽二者皆所以除其不蠲潔又去其惡臭之物鄭康成曰蠲猶潔也詩云吉蠲為饎劉執中曰井以停止水備火燭匽以窒渠流備洒滌故欲除其不蠲潔者去其惡􅆨則决渠匽以滌濯之共王之沐浴鄭康成曰沐浴所以自潔清賈氏曰宫人掌潔清之事沐用潘浴用湯王氏詳説曰鬯人云凡王之齊事共其秬鬯鄭氏謂以給沐浴蓋齊日沐浴與平日之沐浴異此所以必用秬鬯然共其秬鬯不言沐浴者直謂共之於宫人耳凡寢中之事埽除執燭共鑪炭凡勞事鄭康成曰勞事勞䙝之事四方之舍事亦如之史氏曰王巡狩而適四方必有次舍其所掌亦不外是居高明逺濁穢所以養神明而清志慮也掌舍下士四人府二人史四人徒四十人賈氏曰自掌舍至掌次安不忘危出行之事故次於此鄭康成曰舍行所解止之處掌王之㑹同之舍設梐步禮反枑户故反再重直龍反鄭鍔曰王者之居室壯麗以重天威禁衛九重以備非常諸侯四時入覲固無事於行若夫將有征討之事為壇於國門之外合諸侯以發四方之禁謂之㑹或十二歲不巡狩為壇於國門之外合諸侯以施四方之政謂之同當是時出而在外不可不嚴其衛故隨所舍止之處為之禁防杜氏曰梐枑行馬鄭康成曰行馬再重者以周衛有外内列鄭鍔曰設以拒絶行人止其外入也設必再重又拒其内出也賈氏曰虎賁氏舍則守王閑注云閑梐枑也則梐枑是周衛之具此梐枑所施惟據下文車宫壝宫止宿而言其帷宮無宫暫止之間未必有此梐枑也設車宫轅門鄭鍔曰偶所舍之地或險阻則必環車以外向仰轅以為門車有甲士可備非常轅橈而不直有門之象黄氏曰車宫壇壝宫皆因㑹同為之有兵事則為車宮所謂兵車之㑹今猶稱將幕為轅門為壇壝唯貴反宫棘門鄭鍔曰地或平曠則必築壇於其中壝土於其外以為宮地平故增高土曠故為防限其宫則以棘為門或云棘當為㦸謂矛㦸為門禮記云越棘大弓棘字與㦸同史氏曰案左傳子都與潁考叔爭車子都拔棘逐之則知棘即㦸也王氏曰所以待合諸侯而命事為帷宫設旌門鄭鍔曰若晝日食息暫展肄焉則張帷以為宫設旌以為門帷以蔽其外旌以表其所而已賈氏曰司常云㑹同賔客置旌門注引此則旌門司常置之掌舍主當之若然則轅門之等皆他官置之掌舍直主當耳無宮則共人門鄭鍔曰非食非息偶有所遇而住遊觀則不必為宫第共長大之人以為門今之衛士是也史氏曰帷宮無宫非舍息之時王之所在雖蹔駐亦當設備也帷宫以綵為之立旌以為門無宫以人衛之亦執干戈以司其出入王氏曰壇壝宫棘門則為之而後成車宫轅門帷宫旌門無所為也設之而已人門則又不設也共之而已凡舍事則掌之鄭康成曰凡舍事王行所舍止史氏曰凡舍皆掌者非獨時見曰㑹殷見曰同然後為之設舍在易之豫動卦也曰利建侯行師明行㑹同征伐皆為順動也其象則曰重門擊柝以待暴客明凡動皆當謹門以備非常此掌舍所以皆立也鄭鍔曰先王之制禁衛嚴宻一有㑹同周防若此不敢輕其身以危社稷宗廟也自漢以來為帝王者或為微行遊畋射獵晨出夕返如漢武帝自稱平陽侯而見呵止於鄠杜令豈知先王設掌舍之意哉幕人下士一人府二人史二人徒四十人鄭康成曰幕帷覆上者陳君舉曰掌舍幕人掌次三職相須而成事者也幕人即綴衣是也掌帷幕幄鳥學反帟音亦綬音受之事賈氏曰帷在傍施之象土壁也幕則帷上張之象舍屋也鄭康成曰皆以布為之四合象官室曰幄王所居之帳賈氏曰幄則帷幕之内設之帟者在幄之内承塵皆以繒為之賈氏曰綬絛也鄭康成曰凡四物者皆以綬連繫焉王昭禹曰幕人非特掌其物又掌其事凡朝覲㑹同軍旅田役祭祀共其帷幕幄帟綬鄭康成曰共之者掌次當以張賈氏曰此云朝覲㑹同即掌次云諸侯朝覲㑹同此云軍旅田役即掌次曰師田此云祭祀即掌次云大旅及朝日祀五帝此數事皆共帷幕幄帟綬與掌次是以鄭云掌次當以張也史氏曰授於掌次而以時陳設之大喪共帷幕帟綬鄭康成曰為賔客飾也帷以帷堂或與幕張之於庭帟在柩上賈氏曰即掌次張帟三重者也王氏曰大喪共帷幕帟綬而不共幄則王方宅喪無事於幄以帷幕帟綬共張喪柩而已三公及卿大夫之喪共其帟賈氏曰此云三公不云諸侯與孤掌次云諸侯與孤不云三公者三公即是諸侯再重孤與卿大夫同不重鄭康成曰惟士無帟王有惠則賜之檀弓曰君於士有賜帟掌次下士四人府四人史二人徒八十人鄭康成曰次自修止之處鄭鍔曰次與舍一既有掌舍又有掌次何也蓋舍者乆留之辭次者暫止之義出而㑹同則或留之久故有掌舍以為衛出而祭祀亦暫止而已故有掌次以為儀觀其設梐枑壇壝之制而嚴為防限則久留可知觀其設皇邸帟案之儀而多為容飾則暫止可知左氏曰再宿為信過信為次次止也言造次之所止也掌王次之灋以待張音帳事王氏詳説曰次禮亦用之於諸侯用之於尸用之於耦然必言掌王次之法者禮樂自天子出耳鄭康成曰法大小丈尺也史氏曰廣狹多寡之制度易氏曰法者大宰九式之法夫次舍帷幕其事雖微君尊所臨其體實重故大旅上帝與朝日祀五帝實不外乎祭祀之式合諸侯與朝覲㑹同實不外乎賔客之式凡師田喪紀與邦事莫不皆有式大宰以此授之掌次以此行之凡聨事於掌舍幕人亦然以此見無動而不謹於法也賈氏曰待張事者王出則幕人以帷與幕等送至停所掌次張之史氏曰張事設陳之役也王大旅上帝則張氈案設皇邸當禮反王氏詳説曰天神曰祀祀之者又非一而足以所告之事言之則為𩔖𩔖于上帝是巳以所達之氣言之則為禋克禋克祀是也以非常之禮言之則為旅大旅上帝是已以備物之禮言之則為饗享帝于郊是也旅之名又不一而獻旅上帝謂之旅旅五帝亦謂之旅旅泰山亦謂之旅旅四望亦謂之旅王昭禹曰有故而祭祀謂之旅大宗伯國有故則旅上帝及四望則大旅以有大故㑹衆神而祭也旅之為言衆也陳也㑹衆神而陳其所遭之故焉前軰疑此祀帝而不反地何也蓋天地當合祭初無圓丘方澤之異如詩昊天有成命郊祀天地也陳氏曰禮器曰一獻之禮不足以大旅大旅具矣不足以饗帝是則大旅之禮又不若祀天鄭康成曰張氈案以氈為床於幄中鄭司農曰皇羽覆上邸後版也鄭康成曰後版屏風與染羽象鳯皇羽色以為之史氏曰張氈于床以禦寒也設版於屏以障風也鄭鍔曰張氈為案設皇于邸氈之為物無經無緯則不尚乎文非織非紝則無事於功皇之為物五色俱備則其體有文中律吕音則其聲有度案者王所託用氈以張之見其内之所憑依者皆本純質以為體邸用皇羽以覆之見其外之所表見者又用文彩以為儀内質而外文格上帝之道莫過乎是易氏曰張氈案設皇邸而無大次小次者祀天之禮主乎敬王者不敢自安也劉執中曰王當宿齋候郊故張氈案設皇邸言張氈案則幄次帷宫等不言自備矣朝直遥反日祀五帝則張大次小次設重直龍反帟重案合諸侯亦如之鄭康成曰朝日春分拜日於東門之外祀五帝於四郊鄭司農曰五帝五色之帝愚案五帝詳見小宗伯劉執中曰朝日於東郊迎四時之氣則祀其帝於郊王不宿于外故張大次以候止息小次以候行禮鄭康成曰次謂幄大幄初徃所止居也小幄既接祭退俟之處祭義曰周人祭日以朝及闇雖有强力孰能支之是以退俟與諸臣代有事焉合諸侯於壇王亦以時休息賈氏曰重帟謂於幄中設承塵案則床也謂床上設重席案司几筵繅席次席三重此亦當有三重與重帟不同幄在幕中既有幄明有帷幕可知不言氈及皇邸亦有可知史氏曰諸侯合而助祭亦以是待之師田則張幕設重帟重案賈氏曰師田謂出師征伐及田獵王昭禹曰田則追逐禽獸馳驅於山野之中無所用次焉鄭康成曰不張幄者於是臨誓衆王或回顧占察諸侯朝覲㑹同則張大次小次賈氏曰與諸侯張之也若四時常朝在國内今言朝覲㑹同為㑹同而來故在國外與大宰大朝覲㑹同一也鄭康成曰大次亦初徃所止居小次即宫待事之處賈氏曰初徃止居者宮外也即宮者應是宫内言宮即司儀注云宮方三百步壝土為之是也師田則張幕設案鄭康成曰此掌次張之諸侯從王而師田者賈氏曰不言重則無重席亦應有單席於牀也王氏詳説曰王有師田諸侯亦有師田孤卿則為内諸侯孤卿有邦事則張幕設案史氏曰三孤六卿以公事出境亦張幕設案所以尊王命鄭康成曰不言公公如諸侯禮從王祭祀合諸侯張大次小次師田亦張幕設案劉執中曰孤卿將受王命出使于四方張幕於庭所以藉幣設案為位王立於前而授之命焉凡喪王則張帟三重諸侯再重孤卿大夫不重鄭康成曰張帟柩上承塵劉執中曰諸侯再重謂朝覲㑹同而卒者所以優賔故不用幕人之共者凡祭祀張其旅幕張尸次鄭康成曰旅衆也公卿以下即位所祭祀之門外以待事為之張大幕賈氏曰助祭既多不可人人獨設故設旅幕衆人共之鄭司農曰尸次祭祀之尸所居更衣帳賈氏曰未祭則常服至祭所乃更去服祭服故須更衣射則張耦次鄭康成曰耦俱升射者次在洗東賈氏曰大射鄉射耦皆兩兩揖讓升自西階鄉兩楹之間履射物南面而射射訖又兩兩揖讓降自西階天子大射六耦在西郊賓射六耦在朝燕射三耦在寢則六耦三耦據諸侯射者若衆耦則多但無常數耳易氏曰天子不能獨射也有射必有耦有耦必有次大射曰遂命三耦取弓矢于次此雖諸侯之禮亦可以為天子耦次之證掌凡邦之張事史氏曰謂凡設陳之役王氏曰掌凡邦之張事則在宮張事自幕人共之掌次所掌凡在邦而已史氏曰先王設掌次之官其意若曰帷幕幄帟所用非一處用罷則徹之而復用其為費亦小矣後世離宮别館竭萬家生養之資為一日巡幸之備嗚呼無惑乎生民息肩之無日也周禮訂義卷九
