body:
  text: 周禮訂義卷八宋王與之撰天官冡宰下醫師上士二人下士四人府二人史二人徒二十人鄭康成曰醫師衆醫之長也賈氏曰凡言師者皆取可師法也陳宏甫曰人之一身之用與天地同有餘則損不足則補天之道也自非達得造化消息盈虚之理如何㑹知得人身中氣偏之所在此直是絲毫不可差如後世庸懦安能了得此事所以成周以士大夫為之薛平仲曰膳夫自庖人至腊人既聯事以共其職矣食醫一官屬焉可也特别而置諸醫者之列固人主護養之道然護養之道人主之所能有也君子之所能放也彼天下之民其孰能知節於此哉不知所以節之則隂陽之寇每易以乗隙而傷其和而疾病見矣先王不忍厚己以忘民也是故先於食醫則有醫師以掌分治民物之疾病後於食醫則疾醫􅅑醫獸醫次第而設焉蓋仁出於身而加於民愛乎物實自夫一飲一食之間推之掌醫之政令聚毒藥以共醫事劉執中曰醫師掌醫之政令則聚其毒藥有州土之冝有采取之候有治煉之方有攻療之制悉預知之然後可以共醫事鄭鍔曰治病之法亦有用善藥以補治之者不必皆用毒藥説者云巴豆狼牙之𩔖藥之有毒者也人參芎藭之𩔖藥之無毒者也此言聚毒藥蓋謂以毒為主也愚以為不然痬醫云以五毒攻之以五藥療之則毒與藥二物也藥之毒與夫藥之不毒者皆不可以卒求如七年之病求三年之艾則不可不蚤收而預蓄也凡邦之有疾病者疕匹婢反􅅑音羊者造七報反焉則使醫分而治之賈氏曰疾病者謂若疾醫所云也疕􅅑者謂若􅅑醫所云也二者皆造醫師醫師則以疾病者付疾醫疕􅅑者付􅅑醫史氏曰腹心四體其有不康謂之疾病附贅癰疽謂之疕􅅑鄭鍔曰疕謂瘡生於頭者􅅑謂瘡生於身者歲終則稽古兮反其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下王氏曰餼廩稱事然後能者勸而不能者勉王氏詳説曰小宰於百官府則以叙制其食宮伯於宮中之官府則均其稍食此曰稽其醫事以制其食皆食功也鄭康成曰全猶愈也以失四為下者五則半矣或不治自愈王昭禹曰晉侯有疾醫緩曰疾不可為也在膏之下肓之上公曰良醫也晉侯果卒十全者但知其可治不可治而失焉者皆全矣史氏曰計其所失為之殿最則為醫者惟恐其失之矣食醫中士二人賈氏宰夫疏曰食醫府史胥徒俱無以其專官行事無所須故也王氏曰醫師聚毒藥以共醫事則有藏矣故有府掌醫之政令而使之分治疾􅅑稽其事制其食則有書且有政令矣故有史有徒諸醫毒藥於醫師受政令聽所使治則無用府史胥徒掌和王之六食音嗣六飲六膳百羞百醬八珍之齊才細反下皆同賈氏曰六食以下皆膳夫所掌此主調和而已其六食等義並在膳夫史氏曰和之者調其滋味之宜通其寒温之候辨其物性之相忌相使可以進之也陳及之曰食醫醫師之屬其職專和飲食而不治醫事者也蓋人之疾病未有不自飲食致之能防於未病之前則疾鮮矣故有庖人内饔辨鳥獸魚物腥臊之不可食者而食醫又以法調和食飲膳羞之齊亨人給水火之齊内宰以隂禮教六宫以隂禮教九嬪以婦式之法教九御以時御叙于王所其防微杜漸皆所以謹疾無使致疾故食醫不治醫事也若待其已病然後療之此後世之事非先王之制凡食齊眡春時羮齊眡夏時醬齊眡秋時飲齊眡冬時賈氏曰眡猶比也羮若大羮鉶羮等醢人醯人惟有醢醯不言醬即豆醬也公食大夫禮公親設醬醬者食之主言醬則該諸豆實方氏曰齊與王制遲速異齊之齊同食齊則黍稷稌粱之𩔖羮齊則雉兔雞犬之𩔖醬齊則醢醯韲菹之𩔖飲齊則水漿醴涼之𩔖食齊視春固以温為主然食養物而生之亦春之事羹齊視夏固以熱為主然羮熟物而化之亦夏之事也醬齊視秋固以涼為主然醬將物而成之亦秋之事飲齊視冬固以寒為主然飲潤物而清之亦冬之事史氏曰非謂於四時各供其品言其所冝之氣耳冝温眡春冝熱眡夏冝涼眡秋冝寒眡冬一食之間具此四氣也凡和春多酸夏多苦秋多辛冬多鹹調以滑甘易氏曰春為木味多酸以養肝夏為火味多苦以養心秋為金味多辛以養肺冬為水味多鹹以養腎脾土旺於四季故皆調以滑甘史氏曰非謂四時各專一味謂之多者就五味中使一味勝焉以養其氣也如春則肝用事用則勞勞則損損則四藏勝而疾生焉曲直作酸唯酸為主可以引諸味以益肝氣而使適平夏之苦秋之辛冬之鹹莫不皆然調以滑甘者則受和為五味之本也在五行曰土在五常曰信在五藏曰脾脾養五藏土旺四季而信於四端無不用者若甘之緫五味也鄭康成曰各尚其時味而甘以成之猶水火金木之載於土内則曰棗栗飴􅁡以甘之堇荁枌榆免薧滫瀡以滑之王昭禹曰温熱寒涼天所造以養萬物者也酸苦辛鹹地所化以養萬物者也人之一身常與天地流通則其氣味之所養又安可違此温涼寒熱之所御必在順四時之氣酸苦辛鹹之所節必欲順四時之味凡㑹膳食之冝牛冝稌羊冝黍豕冝稷犬冝粱鴈冝麥魚冝苽音瓜鄭康成曰㑹成也謂其味相成鄭鍔曰膳食各有相冝者又當㑹而合之使氣味相成牛土畜也稌稻也澤中所生與土畜相冝羊火畜也黍高燥所生與火畜相冝豕水畜也稷北方之穀與水畜相冝犬金獸也粱西方之穀與金畜相冝鴈陽物也麥秋種而夏熟得陽氣為多與鴈相冝魚水物也苽者米之生於水者也與魚相冝凡此皆氣味相冝者也楊氏曰所以養隂陽之氣不可以偏勝凡此皆衛生之道王氏詳説曰洪範五行以自順為序六府五行以相就為序月令五行以相生為序人食味别聲被色未有不本於五行者或以同氣而為之冝者牛冝稌羊冝黍魚冝苽是已土之與土火之與火水之與水其同氣歟或以相克而為之冝者豕與稷是已土之與水其相克歟或以相生而為之冝者犬冝粱鴈宜麥是已金之與土火之與木其相生歟若夫月令言食麥與羊食菽與難食稷與牛食麻與犬食黍與彘與此不同者蓋彼言其所與順時令也凡君子之食恆放甫徃反焉王昭禹曰君子與王貴賤之分不同而養生之理則未嘗異故膳食所㑹之冝皆得以放王而自養焉黄氏曰秦毉和謂趙孟曰國之大臣榮其寵禄全其大節有菑禍興而無改焉必受其咎今君至於淫以生疾主不能禦吾是以云良臣將死也夫師之教訓傅之德義保其身體冡宰之事也周冡宰必兼三公使其燥濕寒暑之不戒飲食起居之不節而疾生焉則何以為師保故食藥之調適飲膳為詳而醫師奉王之事屬於冡宰豈苟而已哉鄭節卿曰古者史官樂官與醫卜之官皆世其業不兼官不貳事懼其不精也醫不三世不服其藥執技以事上者惟醫為難精惟疾病不可不謹先王豈敢以一人而兼二三人之能哉是故食醫之下有疾醫調飲食不兼於治病疾醫之下有􅅑醫察内症不兼於外症􅅑醫之下有獸醫治禽獸者不兼於治人也必求其精不敢計其冗先王之仁也疾醫中士八人掌養萬民之疾病賈氏曰疾輕病重論語註疾甚曰病王昭禹曰安强得於氣之和疾病由乎氣之乖善醫者審其源亦貴乎調養氣為本蓋五藏六府之氣均則疾病無自而作一或盈而有餘一或羸而不足則偏勝而疾病因之以起所謂養者育之使其氣一於充實而後已下文以五味五穀五藥養其病是也四時皆有癘疾春時有痟音消首疾夏時有痒以掌反疥音介疾秋時有瘧音嶽寒疾冬時有嗽西豆反上時掌反氣疾鄭康成曰癘疾氣不和之疾痟酸削首疾頭痛嗽咳上氣逆喘也史氏曰四時皆有癘氣人感之者謂之癘疾夫人之一身冲和之氣彌滿四體一有虧失則内氣必消外邪客氣乗之以入而癘焉如置杯於水外水得入者内水虧也故疾醫之職必先於調養其内氣消耎則傷之者衆冬傷於寒春必為温夏傷於暑秋必為瘧寒氣藴伏春温激之故熱生焉此疾必先頭痛也暑氣藴伏秋凉激之故寒生焉瘧寒者脾寒也言此病必先寒至也熱之餘毒客於肌膚而不散故夏有痒疥之疾寒之餘毒傳於華蓋而上升故冬有嗽上氣之疾以五味五榖五藥養其病鄭康成曰五味醯酒飴蜜薑鹽之屬賈氏曰醯則酸酒則苦飴蜜則甘薑則辛鹽則鹹鄭不言酸鹹等也而言醯酒之屬者或當時醫方所用五穀麻黍稷麥豆賈氏曰此依月令五方之穀據養疾而食之非必入於藥分也愚案素問以麻麥稷稻豆為五穀以麻屬木麥屬火稷屬土稻屬金豆屬水若疾醫用以養病必知物性所冝恐當從素問為是五藥草木蟲石穀養猶治也病由氣勝負而生攻其贏養其不足也賈氏曰假令夏時熱病者體寒即是水水贏而勝火氣負而不足故夏時病者則五味中食甘五穀中食稷以甘稷是土之穀味土所以克水是攻其贏也上生于火土是火之子食甘稷為子養母之道故云養其不足也王氏曰素問曰形不足温之以氣精不足補之以味味養精者也穀養形者也藥則療病者也養精為本養形為次療病為末史氏曰得是病者必貴急攻調之使氣内正内正則外邪客氣無所容而疾去矣故五味以滋其氣五穀以榮其血五藥以禦其邪而病不瘉者未之有也吕氏曰先以五味五穀繼以五藥以藥醫之下也雖然豈獨醫哉以五氣五聲五色眡其死生鄭康成曰五氣五臟所出氣也肺氣熱心氣次之肝氣凉脾氣温腎氣寒五聲宫商角徵羽也賈氏曰宫數八十一配土商數七十二配金角數六十四配木徴數五十四配火羽數四十八配水此五聲數多者聲濁少者聲清人之言語似之五色面貎青赤黄白黒察其盈虚休王吉凶可知賈氏曰假令冬時面色黒其氣寒聲應羽此是盈而王吉可知若冬時其色黄其氣熱聲應宮此是中央土克己此是虚而休凶可知三者劇易之徵見於外者賈氏曰氣病在内人所不覩見其聲色則知其增劇及簡易也王昭禹曰素問曰五臟之象可以𩔖推五臟之音可以意職五臟徵驗可以目察王氏曰望其氣又聽其聲又觀其色以眡其死生不過五以味穀藥養其病亦不過五則以物之更王更廢更囚更死不過五故也兩之以九竅古弔反之變參之以九藏之動賈氏曰此驗其脉侯九竅與所眡為兩兩與九藏為參易氏曰九竅皆有形而見於外者觀其證之變而有通塞之二候故曰兩九藏皆有形而藏於内者察脉之動而有浮中沉之三部故曰參鄭康成曰陽竅七隂竅二竅之變開閉非常劉執中曰變者失其常職正藏五又有胃膀胱大腸小腸藏之動謂脉至與不至賈氏曰正藏五者謂肺心肝脾腎並氣之所藏故得正藏之稱又有胃膀胱大小腸乃六府中取此四者以益五藏為九也黄帝八十一難經説胃為水穀之府小腸為受盛之府大腸為行道之府膀胱為津液之府氣之所生下氣象天故寫而不實實而不滿若然此則正府也故入九藏其餘膽為清淨之府三焦為孤府非正府故不入九藏劉執中曰神藏五難經曰心藏神肝藏䰟肺藏魄脾藏意腎藏志是謂神藏五也形藏四謂頭角也耳目也口齒也胷中也故下部天以候肝地以候腎人以候脾謂之氣中部天以候肺地以候胷中之氣人以候心上部天以候頭角之氣人以候耳目之氣地以候口齒之氣故三部者各有天地人合為九分以應九野以察九藏故曰參之以九藏之動則生死不能逃矣史氏曰九竅在外九藏主之兩之以外證之變動參之以九藏之脉息始能決之王昭禹曰難經望而知之謂之神聞而知之謂之聖問而知之謂之工切脉而知之謂之巧望以五氣望而知者也聽以五聲聞而知者也問以五味問而知者也診九藏之動切脉而知者也凡民之有疾病者分而治之死終則各書其所以而入于醫師賈氏曰以疾醫中士八人各有能故使分治之也王氏曰醫師言使醫分而治之疾醫又言分而治之者醫師分疾病疕􅅑使各治之而疾醫所治亦各有能也至於􅅑醫但言凡有􅅑者受其已藥則腫􅅑潰􅅑金􅅑折􅅑同科而鄭康成曰少者曰死老者曰終所以謂治之不愈之狀也醫師得以制其禄且為後治之戒王氏曰獸醫曰死疾醫曰終終則盡其道而死者也終亦有所以而非醫之罪亦書其所以焉使知如此者在所不治也􅅑醫下士八人王昭禹曰氣乖不和則為病血壅不行則為􅅑病以氣而其傷在藏府􅅑以血而其傷在肌膚此疾醫所以治内而􅅑醫又有以治外也鄭鍔曰􅅑者疾之至惡治之尤難伯牛有疾説者以為癩孔子曰亡之命矣夫荀偃癉疽生􅅑於頭至於大病目出而死信夫為疾尤惡非他醫所能愈故特設一官掌腫􅅑潰􅅑金􅅑折􅅑之祝之樹反藥劀音刮殺之齊才細反王氏曰腫􅅑聚而不潰潰􅅑潰而不聚金􅅑刃創未必折骨折􅅑折骨未必刄創史氏曰金者凡鋒刄利芒所傷折者凡墜壓顛覆所致腫􅅑癰而上生瘡者潰􅅑癰而含濃血者鄭鍔曰王安石謂疾之惡者藥或不能攻則有祝焉乃引素問上古移精變氣祝由之説以為證鄭康成曰祝當為注讀如注病之注聲之誤也愚攷醫之用祝理或冝然今世有以氣封􅅑而徙之者正祝由之遺法也祝之不勝於是用藥藥或不能去必劀以刀而去惡血劀而不效必殺之以藥而食其惡肉凡四法各有淺深之度故言齊凡療􅅑以五毒攻之以五氣音餼養之以五藥療之以五味節之鄭康成曰止病曰療攻治也五毒五藥之有毒者今醫方有五毒之藥作之合黄堥置石膽丹砂雄黄礜石慈石其中燒之三日三夜其煙上著以雞羽掃取之以注創惡肉破骨皆盡出王氏曰以五氣養之生之也獨於􅅑言素問曰形不足温之以氣􅅑之治冝以氣也而以五氣養之反在以毒攻之之後則必先除其惡然後可養也鄭康成曰五氣當為五穀字之誤也以五藥療之治之也凡療􅅑者五毒五氣五味亦所以療之也而獨言以五藥療之者以藥為主也鄭康成曰節節成其藥之力也賈氏曰即下文以酸養骨之𩔖是也史氏曰治療之序五毒攻之利法也自内作者血氣壅滯不利不瘉自外受者毒必相資不利不瘉利己則腸胃虚以五穀之氣補之以五藥之良調之以五味之中節之則内和而平外疾去而支膚全矣王昭禹曰疾醫以五味五穀五藥養其病而􅅑醫以五藥療之然後以五味節之者疾醫所言者養也凡養以治内為主故先味而後藥􅅑醫所言者療也凡療以治外為主故先藥而後味凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅凡有􅅑者受其藥焉鄭鍔曰先攻以五毒後療以五藥豈其五藥並用而求一物之幸中哉又當視其病之所損者而審其味以養之也其有損於骨則以酸養之酸之味由木所作木强能立事可以强其骨有損於筋則以辛養之辛之味由金所作金能纒合異物可以收其筋有損於脉則以鹹養之鹹之味由水所作水能流行可以柔其脉有損於氣則以苦養之苦之味由火所作火氣炎上可以作其氣有損於肉則以甘養之甘之味由土所作土能含載萬物可以生其肉有損於竅則以滑養之滑石之性能滑物而通之可以利其竅凡此皆療􅅑之法也王昭禹曰素問曰酸收辛散鹹耎若堅甘緩夫肉以骨為體骨收則强故以酸收之肉以筋為節筋散則不攣故以辛散之脉所以行血脉耎則和故以鹹耎之氣所以充體氣堅則實故以若堅之肉緩則不壅故以甘緩之竅利則不滯故以滑利之且腎主骨腎水屬也故欲收肝主筋肝木屬也故欲散心主脉心火屬也故欲耎肝主氣肺金屬也故欲堅脾主肉脾土屬也故欲緩至於竅則以骨為體而以肉為包所以通氣也素問曰骨肉滑利可以長久惟滑則無所凝止則竅亦水屬也故以滑利為主劉執中曰以酸養骨者酸主肝而腎主骨以子養母則骨之折者可續以辛養筋者辛主肺金之味也而克木不使肝與筋過盛以鹹養脉者心火也而主於脉鹹水之味而克火不使心與脉過盛以苦養氣者肺金也而主於氣苦火之味而克金不使肺盛氣過血以甘養肉者脾主肉甘者土之味而主脾者也養之使盛則肉速長而􅅑可合以滑養竅者竅不滑則閉塞不通而毒氣内壅則反攻於􅅑不可得而速合然則􅅑之為病也四而所以破陷者肉也斷折者骨也則夫氣也脉也筋也過盛而流通則其􅅑不可得而合矣故必抑之使微而肉也骨也缺損而欲其合且續也故必養之而使盛竅則利之而使通此所以為療􅅑之道史氏曰􅅑之作本於壅滯鬱結藥之用專於通利䟽導則疾何由而有譬之治國上情下宣下情上達無有壅蔽之患治斯舉矣然則用宣利之藥者痬醫之大法至於血氣之虚實在乎用藥之多寡如盤走圓貴乎得其意而已陳及之曰醫官之屬自萬民疾病及禽獸無不治療而王朝公卿大夫士則不主治之何也蓋卿大夫士權力足以致之財賂足以使之故治不在上之人設官掌之也若萬民之疾病良醫既不肯治非設官以治之則人有死非其命矣獸醫下士四人鄭鍔曰古者服牛乗馬引重致逺有賴其力用其力而不治其疾則種𩔖浸潰以死何以供用自漢以來如張里以馬醫而擊鍾黄憲乃牛醫之子則獸醫者豈非為牛馬而設愚案人為萬物之靈君仁民而後愛物故人之為醫二獸之為醫一掌療獸病療獸􅅑史氏曰疾與病一也分言之則疾淺而病深俱治之者貴人也至於獸醫則療獸病而已不問其疾彼其口不能言不食水草而鳴之哀亦先王之所不忍醫固不可無也凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸􅅑灌而劀之以發其惡然後藥之養之食音似之鄭鍔曰獸與人異𩔖不可求於言語痛癢之際故其病為難知療之之法則先灌藥劑以行之行則知其病之所在然行之不已則其病浸劇又當節以止之蓋先動其脉氣脉氣不發無從用藥因其氣所發動之處從而養之則其病可除若療其瘍亦灌以藥既灌則括其惡肉以發其惡然後外附以藥内養其氣而用芻秣以食之此療獸􅅑之法凡獸之有病者有􅅑者使療之死則計其數以進退之史氏曰疾醫於人死則書其所以而獸醫於獸死則計其數而已其詳畧不同皆先人後物之意所謂計其數而後進退之者隨其勲效之有無而予奪其食醫師稽其醫事以制其食是也酒正中士四人下士八人府二人史八人胥八人徒八十人鄭康成曰酒正酒官之長黄氏曰宮正宫伯之掌宫室居處之正也膳夫庖人之事膳羞飲食之常也酒醬醯醢冝聯膳飲舍次帟幕冝聨宮室離之而在醫師之後其下遂列府藏嬪御之官蓋以為厚味腊毒游觀怠荒貨賄逐至聲色縱欲皆足以致疾其在典章雖不可已而可節其在人情雖不能免而可戒是皆大宰之所當知自秦以來宰相不復預此凡人主共養盡屬少府乃為天子私人夫豈惟宰相不得預而醫卜史官加諸吏左右曹則與聞政事矣尚書宻掌樞機則權侔宰相矣薛平仲曰酒以行禮固不能不用而酒以亂德尤不可輕用觀酒誥一篇周公之慮悉矣則設官分職之際豈苟然哉故於酒正之官則以命士而掌政令以式法而授酒材而為酒為漿者則以奄官女奚主之蓋酒正以如是之式而畀之酒漿之人為如是之用以入于酒正之府内不可以妄為而外有可稽驗事制曲防之意逺矣掌酒之政令以式灋授酒材凡為公酒者亦如之王昭禹曰酒之為物以承祭祀以供賔客以養老病以行愛敬之情一事不可遺一禮不可闕先王由是設官以掌之然所謂政令非特釀造供承之事芻豢為酒非以為禍而酒之流實生禍故始乎治常卒乎亂則酒正之掌政令亦所以謹酒也鄭康成曰式法作酒之法式作酒既有米麴之數又有功沽之巧月令曰乃命大酋秫稻必齊麴糵必時湛饎必潔水泉必香陶器必良火齊必得王昭禹曰式若米麴多寡之數法若水火齊量之差鄭司農曰授酒材授酒人以其材也賈氏曰酒材即米麴糵王昭禹曰凡資之以為酒者皆是也鄭康成曰公酒謂鄉射飲酒以公事作酒者亦以式法及酒材授之使自釀也王氏詳説曰鄉大夫三年則大比而興賢者能者以禮禮賔之此鄉飲酒也黨正曰國索鬼神而祭祀則以禮屬民而飲酒于序此亦鄉飲酒也鄉大夫又曰退而以鄉射之禮詢于衆庶此鄉射飲酒也州長曰春秋以禮㑹民而射于州序此亦鄉射飲酒也故所用之酒為公酒若夫族師所掌初無飲酒之禮春秋祭酺相為酬酢其非公酒歟史氏曰自王及后世子之用與凡所以為祭祀賔客鄉射燕享之奉者皆曰公酒陳及之曰三代無𣙜酒法酒誥禁羣酒息鬭爭甚嚴今酒正酒官不掌禁酒至地官司虣禁飲食于市者秋官有萍氏掌幾酒謹酒蓋先王所以為酒者為祭祀賔客設也自酒正之外官府不得私釀每歲給其秩酒惟鄉遂官長有鄉射飲酒之禮則釀未可知矣然酒正内官也以下又皆奄人女奚為之勢不可以呵禁外事而萍氏刑官之屬司虣市官之屬俾之謹察酒禁則順矣後世專立酒官務在𣙜酤恐齊民奪其利故禁察酒亦有職先王無此意也辨五齊之名一曰泛芳劒反齊二曰醴齊三曰盎鳥浪反齊四曰緹音體齊五曰沈齊賈氏曰辨者言不自造酒直辨五齊之名但知其清濁而已王昭禹曰五齊用以祭祀每以祭祀其造作必有量數故曰齊焉鄭鍔曰太古有明水以為醴其後乃有𤣥酒𤣥酒之後又有五齊五齊之後乃有三酒至於酒則其味厚矣味之厚者生於薄味之薄者生於𤣥去古益逺則禮文益變然五齊雖生於𤣥酒而五者之中亦自有厚薄之齊自泛之醴自醴之盎自盎之緹自緹之沈非色不同也味亦不同非惟厚薄不同清濁又不同其齊不同則其名不同其名不同則不可以不辨故使酒正辨之蓋𤣥一變始有泛齊成而泛泛然而滓則浮而上泛齊一變始有醴齊成而汁滓相將其體則厚而甜醴齊一變始有盎齊成而滃滃然其味得中鄭康成曰自醴以上尤濁縮酌者盎以下差清賈氏曰謂泛齊醴齊皆以茅泲之使可酌故司尊彞云醴齊縮酌盎以下差清以清酒泲之不用茅故司尊􅂜云盎齊涚酌鄭注涚清也過此以徃然後有緹齊其色紅赤味已是酒故名曰緹緹言其是酒也史氏曰沉者上澄而下濁禮之近人情者非其至也此泛所以處五齊之先而沈所以處五齊之下凡此皆用以事神記曰𤣥酒在室醴醆在户粢醍在堂澄酒在下是謂承天之祜又曰醴酒在室醍酒在堂澄酒在下示民不淫也醆則盎爾澄則沈爾酒正辨其名然後辨三酒四漿之物因名然後有實也辨三酒之物一曰事酒二曰昔酒三曰清酒史氏曰三酒而辨其物者謂其形已成兼以共人飲取其能養陽能合歡也王氏曰五齊言名三酒言物五齊以祭祭則致其義名者義之所出故也三酒以飲飲則致其實物者實之所效故也史氏曰事者方有事於糟漉昔者熟之而可久清者澄之而可飲鄭鍔曰昔之為言宿昔之意謂日久而漸清之酒也禮記曰猶明清與醆酒于舊醳之酒所謂舊醳之酒者昔酒也惟其涚而久故謂之舊醳逮其後也遂有清酒其色益清明記禮所以醆酒涚于是是也醆酒盎齊也盎齊差清又以清酒涚之則知清酒之為大清矣王氏詳説曰以昔酒為久則知事在昔之上為近而清在昔之下為尤久也以事為有事者之酒則昔為無事者之酒而清為諸臣所酢者之酒矣蓋祭祀之禮有行事者有預陪祀而不得行事者事酒昔酒其出於此若夫司尊􅂜云皆有罍諸臣之所酢蓋九獻之禮王及后皆四而諸臣一王酢以醴后酢以盎諸臣所酢以清酒而已是不敢與王之神靈等辨四飲之物一曰清二曰醫於已反三曰漿四曰酏以支反王昭禹曰飲於三酒為薄於五齊為厚亦人所飲者故亦言辨其物史氏曰四飲辨其物者取三酒之餘加之以四飲之物而後釀焉是故未成而曰漿已成而曰飲飲不以酒名取其為酒之貳也鄭鍔曰清則泲醴而為之醴至厚而濁泲之則清而可飲醫則釀粥以為之比於醴則少清漿則酨漿之可飲者賈氏曰酨之言載米汁相載也酏則稀粥之可飲者王氏詳説曰醫酏皆粥也但分厚薄耳賈氏曰案漿人有六飲此言四者鄭注漿人云酒正不辨水凉無厚薄之齊掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒賈氏曰自五齊以下並是酒人漿人所為故直掌其厚薄之齊史氏曰備之三酒副之四飲而饌設之味以之共王則然耳后及世子酒飲之數未必全共而饌設之味未必全享賈氏曰饌謂饌陳其具設之也王氏曰后世子之飲與其酒共之而已弗為之饌王昭禹曰此不言五齊則五齊獨用於祭祀也凡祭祀以灋共五齊三酒以實八尊大祭三貳音二下同中祭再貳小祭壹貳皆有酌數唯齊酒不貳皆有器量易氏曰酒正初以式法授酒材及成又以式法共用不可多不可寡也賈氏曰五齊五尊三酒三尊故云八尊此除明水𤣥酒若五齊加明水三酒加𤣥酒此八尊為十六尊不言者舉正尊也賈氏曰先鄭謂大祭天地中祭宗廟小祭五祀其實天地自有大祭小祭宗廟亦有大祭後鄭之説皆據司服六冕差之也鄭鍔曰祭祀之禮以神事之則用五齊以人養之則用三酒其尊有八酒正以法共之其實本以事鬼神三酒之用不一始焉以酌獻終焉以酢諸臣貴其有餘而不欲其嗛是故大祭度用一尊則用三尊以為副貳中祭度用一尊則用二尊以為副貳小祭度用一尊則用一尊以為副貳祭之大則所酌者多祭之小則所酌者寡此所以為降等皆有酌數取足而無乏耳唯尊中所實齊酒專以事神而不以飲諸臣不用副貳之尊器之大小量之多寡俱有一定之數蓋五齊雖以致禮之文無實則近於偽而不誠非所以交神明之道故雖不副貳亦皆有器量乃所以致禮之實愚案酒之有貳謂既薦鬼神而後以鬼神之福爵羣臣所以廣神施也大祭天地用三貳謂天地之施廣而周中祭宗廟用再貳謂宗廟之設施視天地雖殺而猶廣小祭山川用一貳謂山川之施為微大抵皆是廣神之惠澤以及下記曰祭者澤之大者也上有大澤則惠必及下共賔客之禮酒共后之致飲于賔客之禮醫酏糟皆使其士奉之王昭禹曰禮酒謂致享于賔客之酒饗以訓恭儉爵盈而不敢飲為禮而已史氏曰后之賔客公卿之妻燕見而飲也王氏曰建國則王立朝后立市祭祀則王耕以供粢盛后蠶以為祭服王獻而后亞祼王親牽射牲后親徹豆籩賔客則亦王祼獻而后亞獻則王致酒后致飲夫婦相成之義也鄭鍔曰醫與酏則必糟而不泲蓋泲則清而不濁糟則濁而不清后與王同體故所用之物不無少屈也易氏曰酒正以奉王也不以奉王之職奉賔客故使其士鄭康成曰士謂酒人漿人奄士凡王之燕飲酒共其計酒正奉之易氏曰燕朝之暇王所與飲酒或與同姓之伯父叔父或異姓之伯舅叔舅或公卿大夫之貴而親也王昭禹曰燕以示慈惠恐其過故共其多寡之計黄氏曰燕賔客有常禮故共其計左傳曰臣侍君燕過三爵非禮也三爵獻酬酢也酒正奉之察其過也鄭鍔曰説者謂王者之尊不可拘以有司之法制今則奉其多少之計何也蓋至尊之酒不可以常禮拘至於燕飲則不得不為之防紂為長夜之飲後至於喪六百年之業由無節之所致不參計於禮飲而奉於燕飲使王知其過多則自為之戒其慮逺矣示慈恵故燕飲酒取醉而已不若饗之為有節然當防其過焉凡饗士庶子饗耆老孤子皆共其酒無酌數鄭鍔曰饗禮之嚴几設而不倚爵盈而不飲所以訓恭儉而此言共酒無酌數何也蓋此所謂饗非大饗也以饗士庶子之在王宫也有宿衛之忠勤或用酒以飲之所以勞其功耆老之子孤子之父死於王事憫其惸獨無依或用酒以飲之所以念其功其享之也不過以醉為度示恩意之厚耳劉中義曰優宮中之環衛恤死亡之老幼必盡其量而共之鄭節卿曰燕羣臣嘉賔所以恩之也享士庶子所以任之也饗耆老孤子所以報之也大拘則懽不洽賔主百拜酒止三行非所以使之醉酒飽徳也共其酒無酌數則曲盡其情而極其懽未醉而威儀抑抑既醉而威儀怭怭矣夫外嚴於分而内則懷之以恩生蒙其力而死恤其老幼仁之至義之盡也掌酒之賜頒皆有灋以行之凡有秩酒者以書契授之易氏曰賜即賜予頒即匪頒皆出於禄秩之外法即太宰九式之法皆以其式法行之則好賜匪頒雖王者非常之恩亦無非天下之常法鄭司農曰有秩酒者給事中予之酒秩常也常受酒者國語曰至于今秩之王氏曰秩酒有常賜之酒也鄭氏以王制九十日有秩謂有秩酒者老臣也老臣固有秩酒然有秩酒則非特老臣而已授以書者使知其所得之數授以􅆻者使執之以取酒也史氏曰賜頒者時有所予之横賜秩酒者月有所給之定數也劉執中曰酒雖出於酒人莫不關於酒正也酒正之出日入其成月入其要小宰聽之鄭康成曰出謂授酒材及用酒之多少受用酒者日言其計於酒正酒正月盡言於小宰賈氏曰受用酒是酒人也愚案一酒至微尤不少置非是督責之察要之一事廢則一職廢今日之不治他日必有不勝治之嘆故日入其成月入其要經特於酒正見之意者三百六十之職無時不然王氏曰特謹其出異於其餘物毖酒之意也必小宰聽之則守出納之正而正其不如法者歲終則㑹唯王及后之飲酒不㑹以酒式誅賞易氏曰日入其成計一日之出月入其要計一月之出小宰聽之計所出而已未計夫入焉至於歲終然後小宰以所入之要而致於大宰大宰乃以初授式法之多寡而㑹一歲之所共所用蓋將以酒式而行誅賞也愚案不㑹者非直縱之飲也王燕飲而必共其計曷嘗不計之有司嚴奉酒之吏乃所以黙制人主也劉執中曰國之儲貳政之本原未可以酒亂其性焉聖人謹微如此鄭鍔曰酒正掌酒之政令其始以式法授酒材彼違式而酒惡不可以無誅如式而酒美又烏得而不賞故曰以酒式誅賞酒人奄十人女酒三十人奚三百人王氏曰鄭氏以奄為精氣閉藏者蓋民之有是疾先王因擇而用焉與籧篨蒙鏐戚施直鏄聾瞶司火瞽矇修聲同若以為刑人則國君不近況於王乎若刑無罪之人而任之則冝先王之所不忍賈氏曰以其與女酒及奚同職故用奄人奄不稱士亦府史之𩔖鄭康成曰女酒女奴曉酒者古者從坐男女没入縣官為奴其少材智以為奚今之侍史官婢或曰奚宦女賈氏曰言女酒三十人則女酒與奚為什長若胥徒也奚三百人以其造酒故多也掌為五齊三酒祭祀則共奉之以役世婦史氏曰五齊三酒酒正授式法酒材為者酒人醖釀之也鄭鍔曰周禮有兩世婦一在春官以卿一人為之一乃天官内宰世婦與九嬪為列者也先儒以此世婦謂春官之卿掌女宮之宿戒者殊不知内宰之世婦於祭祀之時當涖陳其具酒人乃奄人也奄人固冝與内人聯事則其聽世婦役也冝矣安可以為春官之卿耶史氏曰酒非常用必祭祀之餘因以為飲周公誥康叔曰祀兹酒則祭祀方用酒明矣越庶國飲惟祀德將無醉則因祭祀而為飲亦明矣有奄十人女酒三十人奚三百人其奉酒於内則受世婦之役而世婦亦惟祭祀用之而已共賔客之禮酒飲酒而奉之王氏曰饗酒為禮而已故謂之禮酒燕以示慈惠故燕酒謂之飲酒史氏曰禮酒飲酒多寡異也夫一獻之禮賔主百拜而酒三行所以防其多而失禮也既飲食之又實幣帛以將其厚意所以致其多而盡歡也王昭禹曰非特供其酒又奉其事黄氏曰酒漿籩醢皆内事宗廟之祭祀賔客之饗食王后行禮於此世婦詔之酒正不與故酒人共酒而奉之直致内事鄭言酒正使之非也詩曰我姑酌彼金罍我姑酌彼兕觥后夫人之職也凡事共酒而入于酒府凡祭祀共酒以徃賔客之陳酒亦如之鄭鍔曰凡事則不一事也皆共其酒則酒之用亦不一矣酒之用不一則其費也廣酒人既共其酒必以數入于酒正之府若酒人不入其數則酒正何以日入其成月入其要哉入與凡􅈄征入于玉府皮毛筋骨入于玉府之入同鄭康成曰凡祭祀小祭祀也王氏曰祭祀共酒以徃則自有奉之者徃待其令而已鄭鍔曰祭祀共酒以徃不必自徃宮中祭祀聽世婦之役在外之祭祀不必自徃賔客之來王朝有歸饔餼之酒所謂上公壺四十皆陳侯伯三十有二皆陳是也陳則設之於堂東自有掌客徃焉酒人奄者也不當從事於其間黄氏曰外祭祀賔客陳酒皆共酒以徃酒正使其士奉之漿人奄五人女漿十有五人奚百有五十人王昭禹曰酒漿皆人所飲有酒人又有漿人者蓋其造釀異法故異職也鄭康成曰女漿女奴曉漿者愚案酒漿籩醯醢鹽幕等人皆以奄為之以此等人只可給役使不可使入王之燕寢掌共王之六飲水漿醴涼醫酏入于酒府史氏曰酒正言四飲而此云共王之六飲蓋酒正辨其清濁醇醨六飲之中唯水為清冷所以和酒涼為寒粥所以投酒隨汲而有隨取而辨厚薄之齊不必辨所以不言鄭鍔曰飢食而渴飲人道之常飲以水為主其水豈可以常飲哉用米以將之於是而有漿漢人謂之酨漿言其米汁相載也自漿而為醴則稍厚而可飲自醴而為涼則又雜糗飲之水以為飲也曰醫則釀粥為醴也曰酏則薄粥也酒正有清而無醴此有醴而無清清與醴一物也醴之厚泲之則清也王氏詳説曰醴有清有糟清泲也糟醇也以可飲言之則曰醴以泲之清言之則曰清醴恬可飲故五齊六飲皆有醴楚元王為穆生設醴即此也薛氏曰内則有醴清糟酏漿醷濫而無水凉醫玉藻有水漿酒醴而無凉醫者清醴之泲也糟醴之濁也酏内則所謂酏也醴内則所謂黍酏也醫内則所謂醷也凉内則所謂濫也水凉之末非酒正之所辨故内則無水凉亦以其畧而薄之也漿人六飲始水玉藻五飲亦上水反其本也酒在飲中非用漿人之法故漿人六飲無酒玉藻五飲有酒異代之禮古者於五飲六飲醴為多王昭禹曰酒以用於祭祀為主若漿則主於飲而已故漿人但言共六飲而未嘗及祭祀鄭鍔曰必入于酒府者以共王之飲則酒正職當共奉之故耳共賔客之稍禮共夫人致飲于賔客之禮清醴醫酏糟而奉之黄氏曰飲常頒也以共賔客謂之稍禮常日稍用之非必備六飲禮飲后夫人致稍禮漿人共不由酒府繼粟繼食之義賈氏曰夫人謂三夫人致飲于賔客助王養賔亦致于客館清醴醴之泲者即酒正一曰清也醫酏不泲者此二飲與后同而奉之者亦使漿人奄士奉之王氏曰夫人有致飲于賔客之禮則猶冡宰之有好賜予也蓋上下内外小大相成焉禮之所以立也鄭氏曰亦酒正使之也賈氏曰以酒正云使其士奉之者也愚案或疑后之所致有醫有酏夫人所致於醫酏之外又有醴后所致者糟而奉之至夫人所奉於醴則清之於醫酏則糟之則夫人所致若有加於后何也不思后之致飲共於酒正之府者在所不必言特醫酏糟皆使其士奉之士者康成謂酒人漿人奄士若夫人致飲不可以供后之職奉之凡清之為醴濁之為醫酏糟惟漿人得而奉之矣貴賤之等不待辨而可知凡飲共之王昭禹曰膳夫言凡王之饋飲用六清則上文共王之六飲者乃饋食所共也此言凡飲共之非必饋食黄氏曰凡飲自后而下凌人下士二人府二人史二人胥八人徒八十人鄭康成曰凌冰室也詩云二之日鑿冰冲冲三之日納于凌隂愚案冰既是飲食中用故次酒正薛平仲曰凌人以掌冰為職於酒漿無關也特屬於酒漿之末蓋酒所以奉陽冰之用所以禦陽也一身之血氣常流於天地間隂陽節宣之不至則未有不致戾者豈足以與天地同流哉觀凌人之屬於酒漿之末則大宰佐王之道宻矣掌冰正歲十有二月令斬冰三其凌鄭節卿曰周雖改正朔每用夏正故凌人之職正歲十有二月令斬冰夏頒冰掌事秋刷皆夏月也如詩七月流火九月授衣每書月者皆夏正若周正則不書月一之日二之日是也賈氏曰周十二月冰未堅也詩曰二之日鑿冰冲冲三之日納于凌隂二之日謂周之二月夏之十二月三之日謂周之三月夏之正月與此周禮十二月藏冰校一月者豳地寒故納冰可用夏正月也王昭禹曰斬取以建丑之月納藏以建寅之月蓋隂積而為冬建丑之月隂雖已退而其氣猶盛陽雖已萌而其氣未浮隂氣有餘而强陽氣不足而弱斬而藏之所以宣助陽氣鄭鍔曰冰不堅厚則不可取欲取諸冰厚腹堅之時故記則謂之伐詩則謂之鑿此則謂之斬杜氏曰三其凌三倍其冰鄭康成曰三之者為消釋度也易氏曰三為冰室以待亥子丑三月之用蓋天時不可預必有冬而無冰者凡亥子丑三月之閒皆可藏冰故三其凌以待之李景齊曰藏冰將以備暑亦所以達陽出冰雖以禦暑亦所以助隂蓋隂陽之氣流行乎天地閒一氣不至則閉塞而為災一氣或過則乖戾而為疾善防患者養其弱而抗其强故方隂之盛而陽之微則鑿冰以達陽或損有餘以補不足故方陽之隆而隂之消則出冰以禦暑聖人所以裁成天地之道輔相天地之冝以此也豳詩言王業所致之由而必有及於鑿冰冲冲申豐言隂陽之和而無水旱疫癘之災者亦推其本於鑿冰出冰之得其道凌人一職豈非若緩而實急乎春始治鑑胡暫反凡外内饔之膳羞鑑焉凡酒漿之酒醴亦如之賈氏曰春謂正月也鄭康成曰鑑如甀大口以盛冰置食物於中以禦温氣春而始治之為二月將獻羔而啟冰鄭鍔曰春分奎星朝見東方蟄蟲始出時將用冰始修飾盛冰之器以鑑名之者左傳曰美澤可以鑑謂其光澤也賈氏曰外内饔之膳羞謂王及后世子并饗耆老孤子等二月之後皆須鑑以盛冰鄭康成曰酒漿酒人漿人賈氏曰酒人舉酒而言漿人舉醴而言酒醴見温氣亦失味王昭禹曰膳羞感暑氣則易敗酒醴感暑氣則易酸必共冰以寒之也祭祀共冰鑑賔客共冰賈氏曰祭祀謂天地宗廟社稷之事皆共冰冰有鑑則冰不消釋食得停久賔客謂諸侯來朝王禮之以飱及饔餼直共冰以徃無鑑也大喪共夷槃冰鄭康成曰夷之言尸也實冰於夷盤中置之尸牀之下所以寒尸王昭禹曰死必臭腐故用冰以寒之夷之言傷也冰槃曰夷槃移尸于堂曰夷堂牀曰夷牀衾曰夷衾皆以哀傷為主夏頒冰掌事賈氏曰頒冰頒賜羣臣也掌事主賜冰之多少合得與不合得之事王昭禹曰陽氣過盛無以制之非徒有煩縟之患隂陽不和反傷人之形而疾癘作故夏之痒疥以陽氣傷於皮膚故也秋之瘧寒以夏陽之傷於腑臟故也先王至是而頒冰者所以禦暑患也薛氏曰鄭氏引春秋傳日在北陸而藏冰西陸朝覿而出之以為夏頒冰之證非也案左氏傳昭四年大雨雹季氏問申豐曰雹可禦乎對曰古者日在北陸而藏冰西陸朝覿而出之祭寒而藏之獻羔而啟之公始用之火出而畢賦自命夫命婦至於老疾無不受冰杜預以西陸為三月日在大梁之次清明節穀雨中是夏三月是時蟄蟲已出有温暑臭穢冝當用冰故以時出之後鄭泥於夏頒冰之言乃以西陸為四月立夏之時又引夏頒冰以為説不知四月立夏則日在實沈之次轉而行南陸何以謂之西陸朝覿不然則左氏何以又曰火出而畢賦火出於辰即夏之三月也若出次必待四月立夏之時則何三月火出而畢賦乎鄭氏之説吾無取焉意者日在西陸火出於辰在夏為二月是時方出冰夏則取而頒之耳頒非出也若必日在西陸暑氣盛而後頒冰非特不知頒冰之制亦不知西陸日行之度秋刷鄭司農曰刷除冰室當更納新冰也周禮訂義卷八
