body:
  text: 周禮訂義卷一宋王與之撰天官冢宰愚案天於萬物無所不覆冢宰於百官無所不統以冢宰而屬之天官俾師百官以亮天工歟賈氏曰冢大也王氏曰爾雅曰山頂曰冢冡於地特髙列職於王則冢宰與六卿同謂之大百官總焉則太宰於六卿獨謂之冢賈氏曰宰者調和膳羞之名冢宰亦能調和衆官故號曰宰不言司者不主一官之事王氏曰宰以制割調和為事供刀匕者亦謂之宰惟王建國鄭康成曰建立也司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉愚案先儒見周公作洛而不遷以為洛邑之作乃朝㑹諸侯之地嘗攷自古帝王都邑黄帝都涿鹿少昊都曲阜顓頊都濮陽堯都冀州舜都河内禹都平陽湯都亳多不得天地之中而轉徙無定所周自文王興于岐建都止在豐鎬道化之行僅及江漢汝墳之地至武王克商遷九鼎于洛邑成王周召卒相與營之將以建大中立皇極一民志而定大業也然營之而卒不遷意者宅洛之制度未成周公不幸而亡也何以見之周官之作周公方整齊六典為宅洛計即繼之以周公在豐將沒魯世家亦以周公在豐病將沒曰必𦵏我成周主此議者周公也故垂死一念不忘在洛公死其規模不獲究矣不然自周至洛幾何里五服諸侯四時朝于天子者不絶當其朝也必見於祖廟射于射宫始之以享繼之以燕其禮甚詳且悉借使營洛為朝諸侯之地而成王自都宗周則周之君固將奔走之不暇矣辨方正位鄭康成曰辨别也考工匠人建國水地以縣置􅈏以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕是别四方召誥曰大保乃以庶殷攻位于洛汭越五日甲寅位成正位謂此定宫廟王氏曰既辨方矣於是立宗廟於左立社稷於右立朝於前立市於後此謂之正位體國經野鄭康成曰體猶分也李嘉㑹曰經野必有木以國為體則左右逺近之序得以次而達之如王朝處於中則九經之涂可以經緯於外王國處於中則九服之畿可以區别於逺經謂為之里數項氏曰為之經界耳黄氏曰體國以經理田野也王畿方千里周人合東西都為王畿地形不能正方短長相補以充足之設關於郊關以内為國自甸以往為野六官之首皆言此者六卿分主六鄉鄭司農曰營國方九里國中九經九緯左祖右社面朝後市野則九夫為井四井為邑之屬是也王氏曰宫城門闈堂室之類髙下廣狹之制凡在國者莫不有體此之謂體國井牧溝洫田萊之𩔖逺近多寡之數凡在野者莫不有經此之謂經野設官分職王氏曰設官則官府之六屬分職則官府之六職劉執中曰設官謂設六官以代天地四時之工分職謂分三百六十職以司三百六旬之事玉昭禹曰官言其所司之人職言其所掌之事以為民極愚案先儒或以極為中或以極為至要知惟中而後能極而極者中之至也猶天之極衆星拱焉猶屋之極衆材萃焉極處未嘗不中所謂中者莫能加毫末於此也王者宅中建國四方輻凑至斯為極必辨方以為廟社朝市之正體國以為鄉遂田野之經官由是而設職由是而分内外相維小大相濟治教禮政刑事靡不畢舉何往非爾民之極詩曰商邑翼翼四方之極即經以建國為極也書曰五皇極皇建其有極又見聖人為斯道之極也以皇極之道立民極之制其惟成周乎總論鄭節卿曰周公之序六典也辨方正位體國經野設官分職之下毎終之以為民極此特建國之始耳民何以遽取極於此哉曰先王之教天下初無精粗本末之間有如王之立朝后之立市朝之居前市之居後公卿大夫之在朝百工商賈之在市人見其為辨方正位而已經涂之九軌而野涂之五軌宫隅之制以為諸侯之城制都之經涂體野涂焉諸侯之經涂體環涂焉人知其為體國經野而已朝官居朝市官居市卿大夫王后入市則有罰二鄉則公一人一鄉則卿一人由此而統六遂由此而倡九牧人知其為設官分職而已孰知其所以定民之志而為教之大者固在此耶夫朝不混市野不踰國人不侵官后不敢以奸王之權諸侯不敢以僣天子之制公卿大夫不侔商賈之利六卿九牧相屬而聽命於三公夫彼皆民上也皆富且貴焉而尺寸不敢踰所以習民於尊卑等殺階級之中消其亡等冒上之心而寓其道徳之意是以民服事其上而下無覬覦志慮不易視聽純一何往而非為民極哉乃立天官冢宰使帥其屬而掌邦治鄭節卿曰冢宰一官其屬六十未始有一事之關乎天者謂之天官何也曰以虚名而加實職所以寵而尊之也凡論道經邦以轉移人主之心術而釐正天下之萬事者皆寅亮天地燮理隂陽也其誰曰人事之非天理也加天官於冡宰之上其尊大臣也至其責大臣也深鄭鍔曰治典所治不一非僚屬其孰助之然亦在為之長者有以帥之孔子曰子帥以正使帥其屬欲其躬帥之也鄭康成曰掌主也鄭司農曰邦治謂總六官之職也六官皆總屬於冢宰冢宰於百官無所不主禮庫曰五官云教禮政刑事只是一事惟冢宰無所不理故謂之治以佐王均邦國鄭康成曰佐助也吕氏曰古之稱宰相者多以平為主在商謂之阿衡平之之謂也禮庫曰天下譬如物冡宰譬如持衡令輕重得其平故曰均王昭禹曰均平之至也天之所以立君命相不過欲均平天下之不平者爾四海之内貴者貴賤者賤耕者耕織者織士農工商鰥寡孤獨事事物物咸適其冝是宰相均平天下之道均之一字是宰相之大綱林氏曰均邦國者舉近以明逺均四海者舉逺以明近項氏曰小宰之均財政典之均萬民均人之均地政土均之平土地之政無非均也其所均者小此皆下之所得専也治官之屬賈氏曰此一句總與下六十官為目也大音泰宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人愚案王者之官公卿大夫士而已自王室衰諸侯僣其後列國之大夫皆僣稱卿故春秋一經無卿字凡𫝊之稱卿者經皆以大夫言之或者因周官目録以中大夫為小宰不見上大夫遂以卿為上大夫乃引王制諸侯上大夫卿之說不知王制非周之制或者謂戰國之人為之又引晏嬰之言為證不知晏嬰言惟卿為大夫謂今之大夫古之士也惟今之卿斯為大夫耳此語甚明注家慮與𫝊牾乃謂其遜辭以答家老此豈平仲之㫖若以卿為大夫則是抑六卿而為上大夫以實上大夫卿之言耳蓋卿自是卿大夫自是大夫豈可以目録無上大夫而指卿即是上大夫吕東萊謂周禮書卿了便無上大夫只書中大夫下大夫至春秋如晉有上卿又有上大夫見得制度壞處林氏曰冢宰三公之任而命以卿蓋卿爵也冢宰官也其爵則卿其官則三公有以兼之故周公以大師位冢宰召公以大保位冢宰胡氏曰春秋書宰周公以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰無人亦以三公下行端揆之職禹自司空進宅百揆是以宰臣上兼師保之任周公為師又曰位冢宰正百工是以三公下行端揆之職所以然者三公與王坐而論道故難其人而冢宰揆百官均四海亦不易處也愚案大宰既以宰名官小宰宰夫亦以宰名者蓋皆主調和之義但大宰總其大綱小宰貳之宰夫攷之皆推行大宰之治均名以宰何嫌況有曰大曰小曰夫之别乎即小司徒小司馬以後參之可見鄭康成曰旅衆也下士治衆事者王昭禹曰以命數推之天子之卿六命其大夫四命則元士蓋三命中士二命下士一命矣故黨正曰一命齒於鄉里再命齒於父族下士獨言旅者則衆故也衆則卑惟上所令使從人而不自用故曰旅下士賈氏曰自士以上得王簡策命之則為王臣對下文府史胥徒官長自除辟者非王臣也府六人史十有二人胥十有二人徒百有二十人鄭康成曰府治藏史掌書者胥謂其有才智為什長賈氏曰什長謂一胥十徒也周官之内稱胥者多謂若大胥小胥胥師之𩔖雖不為什長皆是有才智之稱陳君舉曰徒即今騶從也王昭禹曰有藏則置府有書則置史有號令之事則置徒有徒則置胥有市賈之事則置賈王氏詳說曰胥一而徒十府一而史倍此例之常也若夫御史則史多而又在府上者以所掌贊書之數多也角人羽人則有府而無史者以當職文書之數少也腊人之𩔖有徒無胥者以當職事少得徒足矣不假於胥也食醫􅅑醫獸醫則府史胥徒並無者以當職事絶少自為之足矣曰奄曰奚云者以宫中之事當用奄者與官女耳此酒人漿人籩人醢人之𩔖所以曰奄曰奚而以女酒女漿女籩女醢間於其間者此也曰賈人者以其出納之吝當有主市買而知物價者此庖人太府玉府職幣之𩔖各有賈人而載師亦有所謂賈田者此也陳君舉曰王金陵論府史胥徒謂成周用人流品不分非也古人用人無他途自公卿大夫之子弟皆養於學宫以備宿衛考其徳行而升進之自鄉遂侯國凡占氏數而為民者亦攷察於鄉里以擇其天民之秀異者節級而升之故受命為士儻不由此者终不得以通籍於仕版故以天子之子猶不得仕者記所謂無生而貴者也至於上之不可以為士下之不止於為農則任以府史之職司士所謂以久奠食者此也頭須守藏猶見於春秋之世蓋不比胥徒之流更迭為之而均謂之庶人在官也大宰之職掌建邦之六典胡氏曰太宰所掌而特謂之建以此典大宰之所定也鄭鍔曰虞史載堯舜大道之常名其書曰典典言常道也蓋聖人以道制法行於聖人之身則為道著於天下之治則為法道載於書𫝊萬世而不刋法出於道通萬世而可行名曰典如此而已王昭禹曰六典則治教禮政刑事之書也六官雖分職掌六典大宰則合六典之書而建之蓋治之於教禮刑政事猶道之於仁義禮智信仁義禮智信皆不離乎道則教禮刑政事皆不離乎治也以佐王治邦國愚案大宰雖兼六典然其官則治官職則治職故其佐王者特治邦國一曰治典以經邦國以治官府以紀萬民王昭禹曰揚子曰大作綱小作紀蓋紀者綱之目而係乎綱者也楊氏曰諸侯之治邦國有節制焉故治典頒其大經而已庶務得以自治也禮庫曰治典則言無所不治也其他如邦國官府百官萬民曰安教擾曰和統諧曰平正均曰詰刑糾曰富任生亦各就其所掌事上說若是大宰則曰經邦國治官府紀萬民經是經理之治是平治之紀是紀綱之固與諸卿不同矣二曰教典以安邦國以教官府以擾而小反萬民王昭禹曰上無教則百姓不親五品不遜而國危矣故曰安邦國鄭鍔曰官府教之所自出不知設教之意安能教人故言教官府鄭康成曰擾猶馴也愚案擾若擾龍之擾吕氏曰所謂教者非是約束之得成優游沾漬馴擾涵養使之自入於善非是驅迫人物事擾之一字乃是司徒之大綱馴習而熟之之謂也撫摩而入之之謂也畜養而寛之之謂也三曰禮典以和邦國以統百官以諧户皆反萬民吕氏曰禮有自然條目幽而神明而人秩然有序燦然有經處便是和若非禮則乖爭陵犯上陵下替豈能一日和黄氏曰統言尊卑上下有所統也賈氏曰天官云治官府地官云教官府夏官云正百官秋官云刑百官皆作本職言之至春官不可云禮百官禮所以統敘萬事故曰統百官也王昭禹曰書於八音言克諧於神人言以和蓋八音清濁小大其音不同當合而和之故言諧則諧詳於和可知四曰政典以平邦國以正百官以均萬民王昭禹曰物各當其分之謂平鄭鍔曰諸侯之不平者或敢憑弱而犯寡或敢暴内而陵外或敢犯令而陵政或敢負固而不服政典有九伐之法則正之侵之削之杜之壇之斯有以平之也平如平土地然使無髙下之殊王昭禹曰政者正也子率以正孰敢不正於百官言正則正百官以正萬民之意鄭鍔曰治民無政則役使不均矣賦斂不均矣近者或重而逺者或輕矣富者或免而貧者或困矣政典有九法施貢分職以任之簡稽鄉民以用之均守平則以安之斯有以均之也均如均財然使無多寡之偏五曰刑典以詰起一反邦國以刑百官以糾萬民鄭康成曰詰猶禁也書曰度作刑以詰四方王昭禹曰大司宼掌建邦之三典以佐王詰四方則詰者加以威讓而已則詰於刑為略鄭鍔曰諸侯有命位之尊有民社之重茍俟其過惡已彰而加之以刑則至於大刑用兵可也故刑之所用不同乎萬民知其有過惡之萌而先有以詰責之詰其所以然杜之於其始也鄭鍔曰百官行人之法法之所行當自貴者始官不畏刑則舞文弄法矣故曰刑百官王昭禹曰司徒以鄉八刑糾萬民則糾於刑為詳愚案糾者察之之詳也聖人慮民不循乎理而麗乎法故刑之所設别為條目每事而加察之俾民入孝出悌内睦外婣謹行信言敬事敏功動由乎禮法之中無微疪細過抵冒乎刑者此刑典糾民之意也六曰事典以富邦國以任百官以生萬民愚案事典乃司空之職書言司空居四民時地利所謂事者非止如今考工記之補亡止言百工之事也民各有職職各有事民以其職而治其事百姓既足君孰與不足邦國之富實基於此如衛文公務材訓農通商惠工馴致國家殷富之福後世急於富國而不知民事若季氏之富於周公其得罪於周典深矣王昭禹曰因其力之所勝而任之以事故曰任百官鄭康成曰生猶養也鄭鍔曰萬民不能以自生上之人敎使為農工商賈以為衣食之資然後得以仰事俯育而免於溝壑之殍此其所以生之歟總論六典賈氏曰治典教典曰官府禮典以下曰百官者尊天地二官不局其數故不云百官而云官府也六官之屬六十而得稱百官者舉全數也黄氏曰冢宰司徒二府對立與四卿不同周公為冢宰召公為司徒相成王為左右蓋左古相也周人常使二官分陜而治事任甚重治典教典稱官府禮典而下稱百官冢宰之治司徒之教於官府無所不行也禮政刑事百官有其職則承之鄭節卿曰府之為言百官之所聚萬化之所闗也故大宰司徒獨曰官府吕氏曰周禮一部綱目盡在六典冡宰無所不統是宰相之職天下事須有總統㑹要處下面雖衆把握管鑰皆在者非官官而控制之也自百而歸之六自六而歸之一所操者至簡也所以調制之者非人人而稱量之也大者與之為大小者與之為小所居者至易也明乎簡易之理則相業無餘藴矣司徒自唐虞時命契為司徒敬敷五教在寛乃是以君臣父子夫婦朋友兄弟敷布之天下之常道惟此五者此古今之達教不可易也宗伯天地人之禮無所不掌正禮記所謂明則有禮樂幽則有鬼神天下之事有治以均之有教以擾之又以禮以和之其待天下之理亦已盡矣其間或有敗常干紀不循禮法者大則職之司馬小則職之司寇以此見王者之治不􅀝一偏欲有以開導之又有以警畏之如天地之有雨露必有霜雪有春夏必有秋冬天下之理未嘗不相對何嘗少一件得莊老乃謂徳衰然後有刑縁其不識天地隂陽之化所以如此說司空一官居終何故蓋有前五件了然後民可得其居得其養若無前五事民雖有棟宇無縁得居雖有穀粟無縁得食夫三公三孤天子所與共調精微之原而有所治者也欲萬事而分治之則有六卿之職焉六卿者萬事之綱也為天下者始於立綱紀故一曰邦治綱紀既立首教之以人道之大故二曰邦教人道立則必有節文之著故三曰邦禮教立禮行而猶有千紀亂常者則將帥兵事興故四曰邦政大罪陳之原野降此則有有司之法在故五曰邦刑民之遷善逺罪然後可永奠其居故六曰邦事終焉六卿分職各率其屬以倡九牧阜成兆民為治之體上下相統内外交應本末具舉則絲牽繩聨無一節不相闗處天下雖廣㑹合都在六卿上冡宰相天子而統百官則司徒以下無非冡宰之所統乃均列一職而併數之為六卿何也網固在綱之中而首亦豈處身之外哉乾坤之與六子冡宰之與六卿並居六職一也以八灋古法字治官府鄭鍔曰官府者治之所由出故治官府者不可無法法不行於官府民不可得而治矣周家於此别立八法誠以致治必自此始故也有官必有府官則其所命之名也府則官之所居也此句即注疏人衆而事叢非事為之制曲為之防本數末度各得其理大綱小紀不紊其條何能致治哉此其别所以有八也一曰官屬以舉邦治鄭司農曰官屬謂六官其屬六十小宰曰以六屬舉邦治二曰官職以辨邦治鄭司農曰官職謂六官之職小宰曰以六職辨邦治王昭禹曰官有職則事各有司存故曰辨辨者因其列職而分之也三曰官聨音連以㑹官治鄭司農曰官聯謂國有大事一官不能獨治則六官共舉之聯謂聯事通職相佐助小宰曰以六聯合邦治鄭鍔曰事之煩者如祭祀賓客田役斂弛之𩔖非一職所獨任官各有聯則總衆異以為同治不患其難㑹也四曰官常以聽官治王氏詳說曰官屬則小宰所謂六屬矣官職則小宰所謂六職矣官聯則小宰所謂六聯矣官成則小宰所謂八成矣官法者其小宰之所謂以法掌祭祀朝覲㑹同賓客之戒具乎官刑者其小宰之所謂令于百官府曰不聽王命國有常刑乎官計者其小宰之所謂六計弊羣吏之治乎惟官常之名不見於小宰而見於宰夫宰夫八職曰四曰旅掌官常以治數則是官常者數之謂也如卿一人中大夫二人下大夫四人上士八人中士十六人下士三十二人矣其他常數皆此𩔖也大宰正也故官府之八法皆治之小宰為貳宰夫為攷分治大宰之事也劉迎曰書言常伯常任而繼之以乃克立兹常事司牧人蓋此之官常也常伯官之長常任官之任事者皆有常職如三百六十官之職不可以數計也夫有常職以事於上乃可以聽官治故列之官職官聯之後而治始可聽歟五曰官成以經邦治鄭司農曰官成謂官府之成事品式也小宰曰以八成經邦治王昭禹曰始終無虧之謂成言成則事之終始皆一定而不可虧矣蓋比居簡稽版圖傳别之𩔖其事皆有一定之成體聽萬民之治則以此經之而已故曰以經邦治六曰官灋以正邦治鄭司農曰官法謂職所主之法度官職主祭祀朝覲㑹同賓客者則皆自有其法度小宰曰以法掌祭祀朝覲㑹同賓客之戒具王昭禹曰既曰以八法治官府又曰官法以正邦治者蓋八法者治官府之大法官法者百官各有奉行之法也若大宰垂治象之法司徒垂教象之法六官之屬所承以治事者無非法也以其施之於官故曰官法百官各循法以治事則無侵官之冒無離局之姦治由此而各正於一矣故曰以正邦治鄭鍔曰有大宰之八法有一官之官法宰夫之職曰正掌官法以治要乃大宰之八法也又云司掌官法以治目乃一官之定法也名曰法則同所以為法則小大不同也七曰官刑以糾邦治鄭康成曰官刑謂司寇之職五刑其四曰官刑上能糾職王昭禹曰所以治天下者謂之邦刑所以治官府者謂之官刑書曰制官刑儆于有位又曰鞭作官刑是以古之在官者必有鞭刑以儆之然古者刑不上大夫則官刑之所施者自士而下故也八曰官計以弊必世反邦治鄭康成曰官計謂小宰之六計所以弊斷羣吏之治也王昭禹曰弊有審斷之意司寇曰卿大夫之獄訟以邦法斷之萬民之獄訟以邦法弊之則弊詳於斷矣總論王氏曰官常官聨雖六官之通治而各致其一官之治故言官治以别之餘則雖各致一官之治六官相待而成故言邦治以包之李景齊曰周人責吏治之法既有官屬以舉之復有官職以辨之既有官聨以㑹之復有官常以聽之既有官成以經之復有官法以正之其詳至此自無不舉之職矣尤必有官刑以糾之有官計以弊之者然後知古人任職雖以其才待吏雖以其誠而所以震厲考察之意尤不敢廢於馭吏之日亦足以見先王設官以為民者如是其拳拳也唐虞考績成湯制官刑即此意以八則治都鄙鄭康成曰則亦法也陳君舉曰典法則皆是一事恐文籍多難辨異其名耳欲辨其為邦國都鄙官府文字鄭鍔曰都鄙地不出王畿之外非如邦國諸侯得以自治其國故王朝立為設施之則使之事事取則於此焉則如書所謂有典有則之則法如今之律令則如今之格式鄭鍔曰以其有先君之廟故曰都鄭康成曰都之所居曰鄙王氏曰書曰建邦設都春秋曰齊人伐我西鄙都鄙者以其有邑都焉則謂之都以其在王國之鄙則謂之鄙鄭康成曰都鄙公卿大夫之采邑王子弟所食邑周召毛聃畢原之屬在畿内者賈氏曰謂三等采地載師家邑任稍地則大夫之采也小都任縣地則六卿之采也大都任畺地則三公之采也王子弟所食邑者親王子弟與公同處而百里次疏者與卿同處而五十里次疏者與大夫同處而二十五里陳氏曰先王建都鄙以為公卿大夫及王子弟之采地而居畿内焉其外有封疆溝木之固其内有城郭市朝社稷宗廟之别使之朝夕涖事王朝而退食於家其家不出王城而都鄙乃在三百里之外此猶民之㕓里在國而受田在鄉也易氏曰秋官設都則之職專掌此八則之法然謂之都則而不言家則何也考大宗伯九儀之命惟五命以上然後賜則王之大夫四命雖馭之以八則而未與賜則之數故采邑謂之家而不謂之都若卿以六命為小都公以八命為大都此所以置都則焉由是觀之八則通用於三等采邑而以都為主故總而言之曰治都鄙一曰祭祀以馭其神鄭康成曰祭祀其先君社稷五祀也王氏曰凡造都鄙必先立宗廟社稷諸神之祀故八則首曰祭祀以馭其神祭祀以馭其神則其神之所享惟祭祀之從也若夫典祀弗舉滛祠無禁巫祝費財妖昏傷民非所以馭其神也林氏曰所謂旱乾水溢變置社稷是也二曰灋則以馭其官鄭康成曰法則其官之制度賈氏曰謂宫室車旗衣服之等皆不得僣也王氏詳說曰尤氏曰天子建國諸侯立家卿置側室大夫有貳宗士有𨽻子弟則都鄙亦自有官吏矣八則為都鄙之大則法則者特馭其官之則耳不曰則而曰法則者蓋對言法則法為詳則為略連言法則法亦則則亦法也三曰廢置以馭其吏鄭康成曰廢猶退也退不能者舉賢而置之王氏曰以廢置馭其吏則吏之所治惟廢置之從也若夫治不時考政不嵗㑹勤不保置怠不患廢非所以馭其吏也四曰禄位以馭其士鄭康成曰禄若今月奉也位爵次也楊氏曰自鄉論秀士而升之於司徒自司徒升之於學曰造士而後大樂正論造士之秀者升之於司馬曰進士則所謂士者未嘗有禄位也司馬論辨官材論定然後官之任官然後爵之位定然後禄之非修之於鄉升之於司馬則禄位不可得也故以禄位馭之黄氏曰自一命以上皆命於天子五曰賦貢以馭其用林氏曰上斂下謂之賦下奉上謂之貢而都鄙之用亦賴此以給故曰貢賦以馭其用易氏曰賦貢者謂都鄙以其田賦之什一者取於民而又以稍縣都之十二者輸於王然後為之制其用度豐殺之數故曰馭其用王氏曰賦貢以馭其用則上之所用惟賦貢之從若夫征求無藝費出無節奢或僣上儉或廢禮非所以馭其用也六曰禮俗以馭其民鄭康成曰禮俗昏姻喪紀舊所行也黄氏曰土均所以設職也雖從其俗要必以禮為準而權其輕重楊氏曰五方之民皆有性其安居和味宜服利用備器不可推移先王修禮以節其性因之以達其志通其欲為節文道之使成俗也以是馭之故無殊俗七曰刑賞以馭其威鄭鍔曰刑以馭威而賞亦以馭威者蓋能生能殺則權之所歸人畏其威矣王氏曰獨刑而無賞則人有怨心豈能使民聽服而畏哉刑賞以馭其威則民之所畏惟刑賞之從若夫刑以幸免賞以茍得慢公死黨畏衆侮上非所以馭其威八曰田役以馭其衆王昭禹曰簡之有禮則能者為之使而足以制變任之有義則有力者為之用而可以舉事王氏詳說曰王制曰天子諸侯無事則嵗三田天子不合圍諸侯不掩羣賈氏謂田役馭其衆則是卿大夫得田獵引春秋鄭大夫豐卷請田子産不許失之矣都鄙雖為公卿大夫采地非内諸侯乎賈氏引諸侯之大夫為天子大夫之證曽不謂天子之大夫四命自可以出封乎當以天子之大夫得田役諸侯之大夫不得田役為正總論禮庫曰馭如馭馬之馭凡馬之疾徐行止使之齊一皆惟馭者之聽揚子云馭得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵有天下者審所御而已且如鬼神本無聲無形然亦可馭只祭所當祭合於理便馭得如後世淫祀儌福先自失了如何馭得鬼神便見出來興起妖怪此理甚明又如荒於遊畋非時役民如何馭得衆舉此便見事事做得當盡合於理所以謂之馭此便是為民極林椅曰都鄙乃王朝大夫王子弟之所食其禮政刑事皆聽於王朝故八則皆曰馭馭者進退自我邦國則封疆之内皆得自治黄氏曰都鄙略似邦國而事神治民一皆受命於天子故謂之馭春秋傳曰外諸侯世也内諸侯禄也將有進退故八則皆自上馭之春秋祭以伯見後曰祭公單以伯見後曰單子此其進退之可見總論典法則孫氏曰六典未嘗不具八法所謂八則者亦不出六典之外猶朝覲宗遇均為賓主之禮禴祠烝嘗均為奉先之祀三書之中惟六典為備大宰大史相與建之司書藏其書之正小宰司㑹存其書之副大宰掌邦治總六官而治之建是書可也大史奚為同建焉蓋是書之立天地待以彌綸人物資之運量統緒相承非一日之故損益相權非一人之力大史典籍所司則前後稽驗必有可以廣見聞助諫議者非斯人誰與建之小宰司㑹不過各揚厥職以維持保守是書而已於建立之始無預周禮訂義卷一
