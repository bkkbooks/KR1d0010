body:
  text: 周禮訂義卷三十九宋王與之撰凡樂事大祭祀宿縣遂以聲展之王昭禹曰宿縣祭前之夕列之於筍簴鄭鍔曰作樂之時樂縣之位正於小胥既掌辨其聲矣大司樂又宿縣遂以聲展之葢鐘磬之屬縣於筍簴固可以作樂前期之夕樂官之長視之又扣擊其聲而展省之者欲知其宫商不爽金石諧和庶其奏可以格神祗也王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏鄭鍔曰祭祀之節有王出入之時有尸出入之時有牲出入之時皆當奏夏夏之名有九此所奏者三夏夏大也樂章之大者也王始祭入廟門祭訖出廟門皆奏王夏葢歌王者之徳為甚大始迎尸而入終送尸而出皆奏肆夏尸者祖先之象肆遂也安也或説祖先有功徳故國遂大至於為天子而有天下也王昭禹曰直而自遂之謂肆尸以象乎神則有直而自遂之意故尸出入則奏肆夏二祼之後王出迎牲入而告牲乃出而殺之皆奏昭夏昭明也明祖先有碩大之徳故用是牲王昭禹曰神散而為明明散而為昭牲以致味行吾憂勤而親鬼神者在此宜其致精明以歆鬼神焉故牲出入則奏昭夏説者以肆夏為時邁所謂肆于時夏允王保之是也王夏昭夏則無所攷矣王氏詳説曰九夏之名見於鐘師此特言三夏以三夏為九夏之大奏九夏者鐘師也令鐘師而奏三夏者大司樂也自納夏而下則鐘師自奏矣鄭鍔曰此所令奏者時祭也帥國子而舞鄭鍔曰奏夏之時又帥國子而舞以形容之易氏曰舞所以宣導其和王昭禹曰大司樂以樂舞教國子舞故凡樂事用舞則帥國子而舞大饗不入牲其他皆如祭祀鄭鍔曰祫祭先王饗五帝於明堂饗來朝之諸侯皆謂之大饗此所謂大饗饗來朝之諸侯也祭祀迎牲入廟而始殺饗賔則殺牲於門外鼎而後入故不迎牲不奏昭夏惟此與祭祀不同祭有入牲之禮者告博碩肥腯又以告幽全也賔客之來隨命數以致禮在主人不當告於賔客然先王待賔客如待神明故其他皆得而同鄭康成曰其他謂王出入賔客出入亦奏王夏肆夏項氏曰禮曰大饗其王事歟又云其出也肆夏而送之大射王出入令奏王夏及射令奏騶虞賈氏曰大射謂祭祀擇士而射於西郊虞庠學中鄭康成曰騶虞樂章名在召南之卒章王射以騶虞為節鄭鍔曰王出入令奏王夏則奏於未射之時及射令奏騶虞則奏於𤼵矢之際項氏曰騶虞樂官備也射一𤼵矢騶虞驅五豝而待其得賢之多如此愚案騶虞説詳見樂師詔諸侯以弓矢舞賈氏曰諸侯來朝將助祭預天子大射之時鄭鍔曰又詔待射諸侯執弓挾矢揖遜進退為手舞足蹈之容者諸侯雖尊入而侍王當執臣子之禮黄氏曰舞所以飾敬也王昭禹曰王以六耦射三侯其耦王射者必詔以弓矢舞則以天子之射其節比於樂諸侯之舞亦所以應王故也儀禮大射命三耦取弓矢有升降之儀者亦以此王大食三侑皆令奏鐘鼓王昭禹曰大食大牢非常食也玉藻曰天子日食少牢而朔月大牢所謂大食者其朔月之食乎夫人之養也心志和而後氣體從之食飲膳羞所以養氣體侑之以樂所以和其心志而致氣體之養焉況天下無事無大荒無太札無大災無大故而王可以樂之時所以大食之三侑大司樂皆令奏鐘鼓膳夫言王日一舉鼎十有二物皆有俎以樂侑食此謂常日之禮至於王齋日三舉亦大食之禮鄭康成曰宥猶勸也鄭鍔曰食則三侑勸之至于三加牲而用大牢謂之大食奏鐘鼓用樂之盛也項氏曰鐘鼓樂器之大備大禮也李嘉㑹曰侑食之樂非無笙磬絲竹之音必奏鐘鼓何也葢鐘聲鏗鏗以立號君子聞鐘聲則思武臣鼓聲讙讙以立動君子聞鼓聲則思將帥之臣安不忘危治不忘亂之意王師大獻則令奏愷樂易氏曰凡師之出宜乎社造乎祖各載其主以行及其有功則皆獻之以愷樂皆大司樂有以令其奏王昭禹曰愷者喜之屬南風謂之愷風者天地之怒氣散焉王師大獻奏愷樂者人之怒氣釋焉鄭鍔曰有功而歸將釋其怒而為愷悦故樂名曰愷左傳晉文公敗楚振旅愷以入于晉李嘉㑹曰聖人于軍功始教以振旅終奏以愷歌示人以勝殘去殺之義樂師於大獻奏愷歌遂倡之鎛師若大獻則鼓其愷樂然則大司樂所令者令其屬而已鄭鍔曰令鎛師奏之凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂鄭康成曰四鎮謂揚之㑹稽青之沂山幽之醫無閭冀之霍山五嶽岱在兖衡在荆蕐在豫嶽在雍恒在并傀猶怪也大怪異烖謂天地竒變若星辰奔霣及震裂為害者去樂藏之也春秋傳曰壬午猶繹萬入去籥萬言入則去者不入藏之可知也大札大凶大烖大臣死凡國之大憂令弛縣鄭康成曰札疫癘也凶凶年也烖水火也弛釋下之若今休兵鼓之為凡建國禁其滛聲過聲凶聲慢聲鄭鍔曰王者作樂以導和於天下王朝所作者雖本乎雅正茍侯國或為滛哇何以一天下於至和哉故於建國之際禁其滛過凶慢之聲諸侯繫一國之風不謹於聲樂之際鼓滛放蕩流入邪滛國亦因以亡矣始建國必禁焉防於未然之前李嘉㑹曰四者之聲何獨於諸侯新封而禁之樂感人深浹肌藏髓立國之初當尚中正四者必禁求以善民心於始也鄭康成曰滛聲若鄭衛也過聲失哀樂之節也凶聲亡國之聲若桑間濮上也慢聲惰慢不恭也大喪涖廞樂器及葬藏樂器亦如之鄭康成曰涖臨也廞興也臨笙師鎛師之屬興樂器也興謂作之也易氏曰藏瘞也大司樂涖之敬其事也樂師掌國學之政以教國子小舞鄭康成曰謂以年㓜小時教之舞内則曰十三舞勺成童舞象二十舞大夏易氏曰勺者周公告成大武之詩象者武王告成象舞之詩播為樂章以教國子則有六者之舞黄氏曰凡稱國子兼適庶也故王世子亦在文王世子曰春夏教干戈秋冬教羽籥帗羽皇旄干人等舞則為小舞自其小時教之大司樂六舞則合之羽旄干戚備焉賈氏曰此言小舞則大司樂教雲門已下為大舞李嘉㑹曰教國子以舞使之委蛇曲折動容貌習威儀就其抑揚進退之節以銷其驕滛矜誇之習此教國子之善灋小舞既習而後六代之舞可習矣凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞鄭司農曰帗舞者全羽鄭康成曰帗析五采繒今靈星舞子持之是也鄭鍔曰羽則析白羽劉執中曰羽舞秉翟以為文舞皇則用五采羽為鳳凰之形皆執之以舞鄭司農曰皇舞者以羽冐覆頭上衣飾翡翠之羽易氏曰象鳳凰來儀項氏曰欲其和也鄭司農曰旄舞􅈊牛之尾易氏曰象百獸率舞也項氏曰取其順也鄭鍔曰干執干楯以舞鄭司農曰兵舞鄭司農曰人舞者手舞鄭康成曰舞無所執以手袖為威儀鄭司農曰社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人鄭鍔曰社稷之舞執帗有帗除之意言社稷生養乎人而除其災害四方之舞執羽有羽翼之意言四方為國翼蔽如鳥之有羽旱暵之舞以皇皇鳳之雌也為羣隂之長旱則陽勝隂舞以皇所以召隂而却陽也旄即旄人所教之舞也夷樂散樂賔客之燕樂用之或謂辟雍用旄無所考人舞則宗廟用之八佾六佾皆以人為主地官之屬所用者止繫於民事舞師言兵舞此言干舞變干言兵實一而已易氏曰地官舞師之四舞不及旄舞人舞者教其所當用非國子之小舞若舞師先教兵舞則以祭祀大小為先後樂師先教帗舞則以所教之序為先後以人舞非舞之正故列於數者之末愚案餘説見舞師教樂儀行以肆夏趨以采薺車亦如之鄭鍔曰承上文教國子又教之奏樂以為王行步之儀王昭禹曰樂師所教教作樂者堂上之行而肆夏作門外之趨而采薺作一行一趨有其儀與樂節相應不可不豫教焉鄭鍔曰在堂則賔尚逺故行出門則賔巳近故速也行則緩緩則有直而自遂之意故奏肆夏趨則疾疾則欲齊而整肅焉故奏采薺鄭司農曰肆夏采薺皆樂名或曰皆逸詩鄭康成曰王如有車出之事登車於大寢西階之前反降於阼階之前尚書傳曰天子將出撞黄鍾之鐘右五鐘皆應入則撞􅅋賔之鐘左五鐘皆應大師於是奏樂王昭禹曰王之行趨既然車之疾徐亦如此故曰車亦如之且王於賔客饗食則在廟其燕則在寢或步或乗出入皆有儀王之進退豈茍乎哉劉執中曰車亦如之者則五御之法有緩急和鸞之聲動則相應賈氏曰先言行後言趨又云環拜從内向外而言是出時也玉藻趨以采薺行以肆夏先言趨後言行從外向内是入時也王氏詳説曰司樂云王出入奏王夏尸出入奏肆夏此又行以肆夏不奏王夏者何耶葢司樂出入謂廟中時此謂出迎賔客及升車時肆夏所用亦廣王出入則奏之大司樂樂師是已享元侯則奏之晉穆叔所謂肆夏天子所以享元侯是也告祭柴望則奏之時邁所謂肆于時夏是已送賔則奏之禮器所謂其出也肆夏以送之是已鄭氏於禮器以肆夏當為陔夏是徒知賔出入則奏陔夏不知肆夏之用為廣也黄氏曰祭祀朝㑹師甸封建之時王在五路其步趨之節責大馭焉五路之上王安佚矣然而顧車之行而聞肆夏之聲則猶行於堂下顧車之趨而聞采薺之聲則猶行於門外造次無非禮者樂師之所教大馭之所馭與有力焉環拜以鐘鼓為節鄭司農曰環猶旋也黄氏曰漢何武舉方正召見槃辟雅拜有司劾其虚偽服䖍曰槃辟雅拜行禮之容拜也師古曰槃辟猶盤旋也此儀至漢猶在愚案環拜羣臣環王而拜祭天地祭宗廟朝日之類俱有拜王拜于中羣臣環列而拜之于外則謂之環拜鄭鍔曰環乃回環之義羣臣環外而拜天子拜者衆惡其不齊故奏鐘鼓為節使聞鼓而拜聞鐘而止易氏曰行趨者接賔之儀環拜者賔拜之儀樂師於是教國子之樂儀欲君臣上下無非禮也爾雅曰堂上謂之行門外謂之趨是王出既服至堂而肆夏作出路門而采薺作齊侯曰朝覲宗遇饗食皆乗金路各以其等為車送迎之節是王者有車出迎賔之禮亦因車之行趨為之歌肆夏采薺葢肆夏之樂其聲舒以緩采薺之樂其聲數以疾此王者接賔之樂儀至於朝㑹諸侯於外朝之位與夫合諸侯於國門外方明壇之位則有環拜之禮雖不詳見而賈氏於方明壇之位則曰公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地此禮之大者必以鐘鼓節之為作止之節也凡射王以騶虞為節鄭鍔曰凡射則大射燕射賔射之時皆奏此詩薛氏曰先鄭釋此以為騶虞聖獸鄭氏釋騶虞之詩亦以為義獸白虎黑文不食生物不知彼何所見吾觀騶虞者天子之官記曰樂官備又曰天子以備官為節劉執中曰賢人衆多則官備而治有弗至者乎葢騶者謂趣馬主為諸官駕説者記於季秋天子乃教於田獵命僕及七騶咸駕則騶者田獵之官經於大閲則虞人萊所田之野謂山虞於大田獵萊山田之野澤虞於大田獵萊澤野則虞者山澤之官而與於田獵者騶虞掌田獵之官宜以殺獸為事乃一𤼵止於取五豝其仁如此天子取之以為射節者此也王氏曰以騶虞為節者樂仁而殺以時鄭鍔曰文王之射於騶囿詩之辭則曰一𤼵五豝又曰一𤼵五豵其義以為獸之數五而王射以一矢不欲多殺者乃愛物之仁心故奏是詩言天子以仁而愛物為主諸侯以貍首為節鄭鍔曰諸侯三節以聽四節以射詩則貍首也詩之辭曰曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽葢言諸侯不敢寜處惟朝于天子則享安譽也貍之為言不來也貍首言射乎不來者之首為諸侯者必當朝王不朝則射之將以為不朝者之戒吕氏曰貍首之詩亡矣記有原壤所歌之辭曰貍首之班然執女手之卷然貍首田之所𫉬物之至薄君子相㑹不以微薄廢禮猶白茅死麕可以聘如玉之女匏葉兎首可以為君子之獻執手者所以道舊結懽言君臣相與習禮而結懽奉天子以修朝事故諸侯之射以是為節大夫以采蘋為節吕氏曰采蘋詩言大夫妻能循灋度采蘋采藻盛之湘之奠之皆在家所習教成之祭之事大夫妻已嬪能循在家姆教之灋度乃可以承先祖共祭祀卿大夫已命能循其未仕所學乃可以與國政故卿大夫之射以是為節士以采蘩為節吕氏曰采蘩詩言夫人不失職所謂采蘩于澗之中于以用之公侯之事被之僮僮夙夜在公葢夫人無外事祭祀乃其職惟敬以從事是為不失士之事君何以異此敬恭朝夕事事而巳然後盡士之職而不愧故士之射以此為節鄭鍔曰采蘩詩言于沼于沚于澗之中無以異乎采蘋之詩序言可以奉祭祀不失職亦無以異乎采蘋之循灋度之語詩人列采蘋於采蘩後今之射節先采蘋後采蘩士之歌用前大夫之歌用後余甚疑所歌之義恐此二篇歌奏之時有遲速不同故分為大夫士之射節總論吕氏曰天子之徳莫大於好生繼天也諸侯之徳莫大於奉朝事事君也卿大夫之事莫大於灋先王守道也士之徳莫大於敬事死命也詩不可以無義故各以其所樂告之所以明乎其節之志以不失其事則功成而徳立無暴亂之禍矣薛氏曰夫子曰射者何以射何以聽循聲而𤼵𤼵而不失正鵠者其唯賢者乎且歌射節所以為聽也天子九節諸侯七節大夫五節不間尊卑皆用乗矢矢之所發四節作矣是天子未射先歌者五諸侯未射先歌者三大夫未射先歌者一尊者先以聽則多卑者先以聽則寡所以優尊者凡樂掌其序事治其樂政賈氏曰掌其序事謂陳列樂器及作樂之次第鄭鍔曰使不失先後之倫治其樂政者謂治理樂聲得其正不淫放也鄭鍔曰使樂工不敢為淫亂之聲李嘉㑹曰樂事在前樂政在後何也惟掌其序事節奏有緒舉知其宜則可以治其樂政凡下文所謂小事用樂樂成告備者皆樂政也又有賞罰有升黜凡樂師提綱總領之權總樂政也凡國之小事用樂者令奏鐘鼔鄭康成曰小事小祭祀之事易氏曰舞師言小祭祀不興舞而此下文言臯舞則非舞師所謂小祭祀也謂大神􅅘大鬼之外皆小事之樂令奏鐘鼓言嚴其始而已王昭禹曰令奏鐘鼓則令其屬也小事樂師令之大事大司樂所令也凡樂成則告備易氏曰樂所奏一竟為一成不特大神大􅅘大鬼之樂為然據大司樂言凡天神皆六成凡地􅅘皆八成凡人鬼皆九成每一成則樂師皆為之告其備皆有舞以節其樂鄭鍔曰小宗伯告備于王告禮之備也肆師禮成則告備告禮事之畢也事畢言禮已畢此則告樂之備爾王氏詳説曰案大射禮曰大樂正命大師曰奏貍首此命奏者樂師而非樂正也案燕禮曰大師告于樂正曰正歌備此告備者樂師非大師也葢諸侯之射禮燕禮與天子不同此所以命奏者在於樂師告備者在於樂師是樂師卑於樂正而尊於大師也詔來瞽臯舞鄭康成曰詔視瞭扶瞽者來入也臯之言號告國子當舞者舞王昭禹曰瞽無目非可顧視故詔其來舞有節非可速故詔其緩臯緩也及徹帥學士而歌徹鄭司農注大胥曰學士謂卿大夫諸子學舞者王昭禹曰以其父兄有爵列於國故謂之國子以其衆言謂之諸子以其教於學謂之學士賈氏曰此謂祭末至徹祭器之時樂師帥學士而歌徹但學士主舞瞽人主歌今云帥學士而歌徹者此絶讀之然後合義歌徹之時歌舞俱有所謂帥學士使之舞歌者自是瞽人歌雍詩也徹者諸宰君婦耳鄭鍔曰祭將畢恐其不敬故歌詩以見其敬以周頌攷之雍禘太祖也此所歌以徹者其雍詩乎王昭禹曰歌雍學士也樂師則帥之而已令相鄭司農曰告當相瞽師者言當罷也瞽師盲者皆有相道之者故師冕見及階曰階也及席曰席也皆坐曰某在斯某在斯曰相師之道與劉執中曰樂備矣瞽矇當退則令視瞭以相之鄭鍔曰祭之始詔使扶之而來其終也相之以往饗食諸侯序其樂事令奏鐘鼔令相如祭之儀王昭禹曰饗以飲為主食以食為主鄭鍔曰孔子語魯大師以樂則知樂之有序葢如此故曰掌其序事若夫饗食諸侯則奏樂之際序其作樂之事故令奏鐘鼓以為節樂終則令相瞽矇以退皆如祭祀之儀惟不入牲之事異而已燕射帥射夫以弓矢舞王昭禹曰燕射謂王與羣臣燕而行射禮鄭康成曰射夫衆耦也賈氏曰凡射有三畨又天子六耦畿内諸侯四耦畿外諸侯三耦前畨直六耦三耦等射所以誘射故也第二畨六耦與衆耦俱射第三畨人兼作樂經直云射夫鄭知衆耦者以其三畨射皆弓矢舞若言六耦不兼衆耦若言衆耦則兼三耦王昭禹曰帥其耦而治之者射人也帥之使舞者樂師也大司樂詔諸侯以弓矢舞諸侯尊也樂師帥射夫射人卑也飲燕之間必用射皆特為禮以觀徳抑又為有事之備樂出入令奏鐘鼓易氏曰大司樂王出入奏王夏尸出入奏肆夏牲出入奏昭夏此三夏皆瞽所歌之詩有歌必有笙有笙必有舞如此之類皆樂之出入令奏鐘鼓以節之凡軍大獻教愷歌遂倡之鄭鍔曰王師大獻令奏愷樂則王親征之師故大司樂令之軍大獻教愷歌遣將出軍而歸故樂師教之又倡之異尊卑王昭禹曰歌出於人聲有倡有和故樂師倡之使所教之瞽矇和焉李嘉㑹曰愷歌歌於堂上愷樂作於堂下二者相應愷歌在前樂師倡之凡喪陳樂器則帥樂官賈氏曰樂器即明器若檀弓云木不成斵瓦不成沫琴瑟張而不平笙竽備而不和王昭禹曰猶大喪之廞焉之死而致生之不智而不可為所以陳之而已賈氏曰樂官笙師鎛師之屬易氏曰謂大胥至司干鄭康成曰帥樂官往陳之及序哭亦如之王昭禹曰小宗伯及執事眡葬獻器遂哭之樂師又帥樂官而哭樂器以明先王之盛徳感人之深其生也榮其死也哀故睹器而思其人則哭也必使樂師帥而哭亦以明哀樂之相仍舞用翣亦此意也凡樂官掌其政令聽其治訟鄭鍔曰掌其政令所以統治之其有爭訟則為斷其曲直此所以名之為師周禮訂義卷三十九
