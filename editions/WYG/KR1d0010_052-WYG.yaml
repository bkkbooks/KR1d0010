body:
  text: 周禮訂義卷五十二宋王與之撰大僕下大夫二人鄭康成曰僕待御於尊者之名大僕其長也鄭鍔曰公卿大臣輔王於朝其見王為有時若夫左右僕從於王尤親暱茍䙝近小人無以聞正論故先王以下大夫為之所以重其任也陳君舉曰六官皆有風義之臣如地官師氏保氏春官大史内史夏官射人大僕是也書曰太史友内史友記曰射人師僕人師薛平仲曰上而正君心於周旋宻勿之間下而通人情於勢分難通之際大僕以之帥其僚庶僚以之佐其長上下交孚内外無壅天下之政此其本也陳君舉曰屬之司馬不惟宫中部署嚴肅亦以通遽令也不然則有逗留怠於𫝊命之患掌正王之服位出入王之大命項氏曰王之吉服有六大僕正之則動容周旋無不中禮黃氏曰此盖朝服非朝服則祭服也燕服小臣正也王之眡朝有位正之則出入起居罔有不欽王昭禹曰出王之大命則宣之于外入王之大命則納之于内鄭康成曰出大命王之教也入大命羣臣所奏行鄭鍔曰王之大命則國之大安危民之大利病所以指麾羣臣而號令四方者大僕之出入王之大命特以其在王之左右為王之侍御掌趨走奉行之事而已若書言龍作納言詩言仲山甫出納王命則異於是掌諸侯之復逆鄭鍔曰諸侯之復上有詢乎諸侯而諸侯反報之諸侯之逆諸侯自出所見以告乎上皆掌受之以上逹則無壅遏或謂羣吏之逆庶民之復御僕掌之諸臣之復萬民之逆宰夫掌之三公及孤卿之復逆小臣掌之獨大僕掌諸侯之復逆何也盖臣民復逆王所日聞故内焉御僕小臣逹之外焉宰夫逹之事之常也若諸侯復逆則非常矣陳及之曰掌復逆者受羣下書奏也漢之公車司馬今之登聞檢院皆掌天下章奏乃一官耳大僕掌諸侯復逆小臣掌羣吏之逆及庶民之復而宰夫又掌諸臣之復萬民之逆不亦多乎盖官府有尊卑爵禄有髙下大僕大夫也茍下掌吏民之復逆御僕下士也茍上掌諸侯及公孤之復逆則情意不相通官髙則此不肯受官卑則此不肯授於是上下之勢懸隔而天下之事壅於上聞今大僕掌諸侯小臣掌孤卿大夫御僕掌吏民則勢敵情通不敢逗留章奏矣然其事所係甚大於是復俾大宰之屬掌之則當以所言告之冢宰與王謀議其事而行不特是也秦章邯奏事而趙髙為丞相留司馬門不進則是與章奏者非王之近臣也若夫大僕小臣御僕皆王之侍御僕從也受章奏而逹於王無所闗決而大臣亦不得自便矣王眡朝則前正位而退入亦如之王氏曰王眡朝眡治朝易氏曰此經正與司士一職互文見義司士正朝儀之位王南鄉則王之位也雖言王位而非正王位之職所正者羣臣之位其曰三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之右南面西上羣臣既正其位矣然後大僕自路門之左立於王前故曰大僕前所以正王位又言王入内朝皆退鄭氏引玉藻之言曰朝服以日視朝於内朝辨色始入君日出而視之退適路寢聽政謂諸侯也言諸侯則天子亦然謂王入路門聽政於路寢則羣臣各退向治事之處若據司士所言皆退疑若大僕亦隨羣臣而退今攷此經文意則大僕實未嘗退所言王眡朝則前正位而退乃是退立於路門之本位以俟朝畢及王入路門而聽政路寢則羣臣雖退而大僕復入正路寢之位司士不及此者以其所正者羣臣之位朝畢則退而已大僕掌正王位則無往不從故出入亦如之詳略不同亦各其職云吕氏曰如漢成帝臨朝之時尊嚴如神及退朝與張放等所説皆淫辟邪侈之事人君到此不是匡正有人如何㑹到罔有不欽田地建路鼓于大寢之門外而掌其政以待逹窮者與遽令聞鼓聲則速逆御僕與御庶子王昭禹曰路鼓王鼔也必建路鼓示欲四方無所不逹鄭鍔曰路鼔王之所執者也大寢王聽政之所也建路鼓於大寢之門外使窮寃失職者擊焉上急變者擊焉欲其近乎王而聲必聞事必逹也季氏曰天子有五門外曰臯門二曰庫門三曰雉門四曰應門五曰路門大寢盖在路門之内也考之周禮閽人掌王宫中門之禁則是雉門已有禁矣而路鼓在路門外窮民安得入也盖朝士之職以肺石逹窮民而肺石乃在外朝外朝在臯門之内庫門之外則是窮民得至於庫門之外而朝士乃為之逹於路門耳然則大僕之所待者乃待朝士之所逹也黃氏曰鄭謂政鼓節與早晏非也經之建鼓所待者逹窮與遽令而已如御僕直事鼓所大僕聞鼓速逆皆其政也窮與遽令皆應亟報故不待眡朝擊鼓而奏之更始韓夫人曰帝方與我飲乃以此時奏事抵破案於是百官不敢奏事王氏曰先窮者欲速逹甚於遽令鄭康成曰御僕御庶子直事鼔所者黃氏曰御僕與御庶子各有之通掌其事御庶子士庶子之御于王所者也是於士庶子最為親近御僕掌王燕令鄭鍔曰御僕與御庶子受窮民之訴與遽令之事將以上逹使大僕不迎而受之欲上逹之速亦不可得聞鼓聲則速逆之言迎而受之速以上逹孫氏曰命令復逆雖均之為急未若遽令所係於軍事者尤急故不領於他官而領於司馬既領之司馬復敘於小宰何也一相在内無所不統使侍御僕從不由小宰以敘次而紛亂離貳一相不預聞焉則事權分而君聽惑故逹以御僕而後上下之情通敘於小宰而後内外之體一祭祀賔客䘮紀正王之服位詔灋儀賛王牲事王昭禹曰祭祀吉禮之事賔客賔禮之事䘮紀凶禮之事事既不同王之服位亦異易氏曰王者祭祀之服六司服之六服是也賔客之服二司服所言鄉射則鷩冕眡朝皮弁服是也䘮紀之服一司服所言凶事服弁服是也其位則随事而立無非大僕之所正鄭鍔曰大僕既正王之服位又再言之何也盖上所言者王視朝之時乃若祭祀賔客䘮紀之服位茍不正之則事神接人之際失其當矣既已正之又詔之以法使王動皆中度詔之以儀使王行而合禮鄭康成曰詔告也王昭禹曰法見於度數者儀見於動容者皆大僕以言告之鄭康成曰牲事殺割匕載之屬賈氏曰言殺據祭祀之時親自射牲也司弓矢云共王射牲之弓矢割者即郊特牲云君肉袒親割也匕載易震卦注云人君於祭祀之禮匕牲薦鬯也王氏曰王之牲事以事鬼神茍外不能治其人内不能治其身雖日用牲祭鬼神猶弗享也大臣衆矣所與治其人莫尊於大宰近臣衆矣所與正其身莫親於大僕故賛牲事以此兩官王出入則自左馭而前驅易氏曰不敢自右以周人尚右尊君也王氏詳説曰夏官以僕名官者有八大僕祭僕馭僕𨽻僕僕於王之左右也道僕齊僕田僕戎僕四者僕於車之左右也乗車之僕見於曲禮詳矣曰君車將駕則僕執策立於馬前已駕僕展軨效駕奮衣由右上取貳綏跪乗執䇿分轡驅之五步而立君出就車則僕并轡授綏左右攘辟車驅而騶至于大門君撫僕之手而顧命車右就車車之有僕所以兼車右事也效車則奮衣由右車驅則顧命車右此大僕初非預於乗車之僕特為王前驅而已驅者在途御者在車驅不復御焉有并為之乎今曰自左馭而前驅是王未乗車而乗君之乗車者不敢曠左是左馭者乃乗車之僕葢大僕前驅自馭者之左行而驅耳鄭氏以為居左自馭失之矣凡軍旅田役賛王鼓鄭鍔曰軍旅田役王親執路鼓路鼓四面王自擊其一大僕擊其一戎右擊其一故二官皆言賛王鼓助王擊之以用衆也黃氏曰鼓所令止作也大僕賛王鼓亦左馭居前歟易氏曰大司馬蒐田之禮王執路鼔必待司馬辨之而後大僕賛之鼔人於救日月則詔王鼔必待鼓人詔之而大僕賛之王皆為之親鼔焉其義見於大司馬及鼓人救日月亦如之鄭康成曰日月食時春秋𫝊曰非日月之𤯝不鼓鄭鍔曰日食陰侵陽伐鼓以助陽月食陽侵陰亦擊鼓者以陽太盛擊助陰之鼓也鼓人言以雷鼓鼓神祀以靈鼓鼓社祭雷鼓祀天之鼓屬乎陽日食所擊者也月食宜擊靈鼓歟大䘮始崩戒鼓𫝊逹于四方窆彼驗反亦如之鄭司農曰窆春秋𫝊所謂日中而塴禮記謂之封皆葬下棺也易氏曰始崩及窆擊鼓以戒衆人且𫝊逹于四方使四方知䘮禮也縣音𤣥䘮首服之灋于宫門鄭康成曰首服之法謂免髽筓緫廣狹長短之數縣其書於宫門示四方易氏曰小宗伯既已縣衰冠之式于路門之外此復縣首服之法于宫門者首服則婦人之服衰冠則男子之服黃氏曰必使大僕掌之者大僕侍御之官王之起居所當知也漢武帝崩燕王使幸臣王孺之長安問帝崩所病執金吾郭廣意言待詔五柞宫宫中讙言帝崩諸將軍共立太子歸以報王王曰上棄羣臣無語言盖主又不得見甚可怪於是為反謀故人主左右無中外共信之臣及平時無法度可使與臣民相闗通緩急之際姦軌遂得妄有窺伺周官王出則大僕前驅居則賛相不眡朝則辭於三公及孤卿大䘮始崩戒鼓遂出䘮首服法防㣲杜漸之意深矣掌三公孤卿之弔勞力報反鄭康成曰王使往鄭鍔曰王於公卿有弔之之禮以致其哀戚之情有勞之之禮以示其閔勞之意三公孤卿近臣之重故遣僕臣以往見其恩厚也王燕飲則相息亮反其灋鄭鍔曰王有燕飲臣下之禮以示慈惠公三燕侯伯再燕子男一燕其燕皆在寢如主人酌賔賔酬主人之類皆有法也大僕侍王左右故相其法燕而有法則無廢禮之愆幽王荒廢飲酒無度以其無法故歟大僕相其法此其所以用吉士而不敢用便辟側媚之人王射則賛弓矢鄭康成曰賛謂授之受之鄭鍔曰射有挾弓執矢之法文承燕飲之下則知因燕而射也先儒以為大射恐不然射以觀徳而王者之射尤諸侯臣下之所取法故令大僕賛之後世委任華重漸至於執政而名官以僕射其原盖起於此王眡燕朝則正位掌擯相鄭康成曰燕朝朝於路寢之庭王圖宗人之嘉事則燕朝鄭鍔曰上言正王之服位又言祭祀賔客則正位此又言正位者燕朝之位也王有三朝而燕朝乃安燕之地親族所聚正其位而且擯之相之則王之見之也以禮而宗人之見王也不敢恃恩以犯分王昭禹曰擯則相賔相則助王皆大僕掌之主不眡朝則辭於三公及孤卿鄭鍔曰一日二日萬幾王者不可一日不眡朝王不眡朝是必有故以辭諭諸大臣使知其不視之故若以安燕而廢朝當論諫以箴過於未萌三公孤卿大臣也與國共休戚宜以辭告之總論李嘉㑹曰大僕與王最親無一事不正乎王無一動不賛其禮不惟正眡朝之服位至入于燕朝亦如之不惟正賔祭䘮紀之服位而位在燕朝者亦正之王有牲事則賛法儀王有燕飲則相其法師田則賛王鼓王射則賛弓矢穆王以此職命伯冏謂其出入起居罔有不欽其見大僕有闗於王身者如此其重小臣上士四人黃氏曰地愈近則事愈䙝而職愈卑故名大僕曰大小臣曰小鄭鍔曰小臣掌𫝊王之小命王有所行則詔相其法儀之小者疑若卑䙝以上士為之何耶盖所謂士者以徳行道藝考選而進者在王左右必不𨗳王為非矣故穆王命伯冏慎簡乃僚其惟吉士正謂此也春官之内小臣掌王后之小事者尚以奄上士為之况事王乎否則近而不遜遂至假命擅權奉使四方則光燄赫赫用事宫中則廢立皆出其手强蕃悍鎮出其門下如唐末之禍掌王之小命詔相王之小灋儀鄭康成曰小命時事所勑問王昭禹曰大僕言出入王之大命則小臣掌王之小命其出入亦可知小法儀趨行拱揖之容王昭禹曰小法若行以肆夏趨以采薺之類小儀若天揖同姓時揖異姓土揖庶姓之類小臣言小法儀則大僕所謂詔法儀者乃其大者也大僕言詔而小臣言詔相非特詔以言又相以力也掌三公及孤卿之復逆鄭鍔曰諸侯之復逆大僕掌之為其入朝則有賔道也三公孤卿日以事聞乎王以其亟也故小臣掌之非有所輕重也正王之燕服位鄭鍔曰王自路寢聽朝而退適小寢則正其燕居之服位大僕正於外小臣正於内此所以無適不正也王氏詳説曰案玉藻天子以龍衮祭以𤣥冕聽朔以皮弁眡朝以𤣥端燕居諸侯以𤣥冕祭以禆冕朝以皮弁聽朔以朝服眡朝以𤣥端燕居夕深衣祭牢肉天子諸侯雖燕居同於𤣥端然天子初無夕深衣也是諸侯適小寢釋服而𤣥端與天子同夕深衣又與天子異王之燕出入則前驅鄭鍔曰燕出入若今遊於諸觀苑又曰朝覲㑹同祭祀軍旅之時大駕雷動百司駿奔儀衛無所不備若夫燕游之觀不備百司則小臣掌前驅之儀盖雖燕遊亦不可以不正王體也大祭祀朝覲沃王盥王氏詳説曰鬱人云凡祼事沃盥此云大祭祀朝覲沃王盥者盖大饗不入牲其他皆如祭祀九獻七獻五獻皆須盥也鬱人之沃盥但於盥獻事耳其朝覲饋獻卒食之獻所以沃盥者小臣也鄭鍔曰事神待賔其法則同第所掌有小大耳小祭祀賔客饗食賔射掌事如大僕之灋鄭康成曰賔射與諸侯來朝者射黃氏曰大僕王射則賛弓矢此外不見掌事之法是則賔射小臣賛弓矢也鄭鍔曰雖掌其小而法如大僕也掌士大夫之弔勞凡大事佐大僕鄭鍔曰掌小事故掌弔勞于士大夫凡有大事則為大僕之佐而已總論易氏曰小臣佐大僕者也大僕出入王之大命此則言辭告語之末故掌王之小命大僕詔王之法儀此則趨行拱揖之容故詔相王之小法儀大僕於眡朝及禮之大者正其服位此則正王之燕服位大僕於王之大禮路車出入則曰左馭而前驅此於王燕出入則前驅以至大僕掌諸侯之復逆而此則掌三公及孤卿之復逆大僕掌三公孤卿之弔勞而此則掌士大夫之弔勞凡此無非大僕掌其大而小臣掌其小也小臣所得而専者大祭祀沃王盥而已然先王設小臣之職亦猶后之有内小臣而内小臣所掌反同於大僕何也大僕正王之服位而内小臣亦正后之服位大僕出入王之大命而内小臣亦掌王后之命大僕於王之出入則曰左馭而前驅内小臣於后之出入亦前驅大僕於祭祀賔客䘮紀則詔法儀於眡燕朝則掌擯相内小臣亦擯詔后之禮事盖内小臣之於大僕則内外之辨小臣之於大僕則大小之辨祭僕中士六人黃氏曰僕本燕閒之官祭尊燕䙝不敢以褻于尊故専設官掌受命于王以眡祭祀而警戒祭祀有司糾百官之戒具王昭禹曰前期有戒既戒供具有糾焉所以約其緩散鄭康成曰糾謂校録所當共之牲物鄭鍔曰小宗伯而下専主祭祀之事又設祭祀官親受王命以視祭祀何耶盖人君為神民之主禮重於祭茍祭不親非所以事神此所眡之祭祀乃王所當躬臨者也王偶有故不獲躬親必命有司攝事故特設祭僕之職使掌察眡之事受命而臨觀之又以言而警戒之有不戒不具者皆得而糾舉之則祭事益嚴無以異於王之躬親矣劉執中曰王之於祭祀也冢宰振其綱宗伯正其職六官之屬各祗其事先期警戒擇賢執事十日涖牲齋戒滌濯可謂盡其誠敬備乎禮文矣而具脩之初王不可得以躬眡之也乃設祭僕之職専受王命以眡祭祀而警戒祭祀有司糾百官之戒具是代王躬眡於其事也既祭帥羣有司而反命以王命勞之誅其不敬者鄭鍔曰祭畢則帥羣有司而反命乃以王命勞其勤者而誅其不敬者則羣有司知所懲勸矣王氏曰肆師誅其慢慢謂不肅也祭僕誅其不敬則非不肅之謂也大䘮復于小廟賈氏曰大䘮王䘮也王生時所有事之處皆復祭僕復小廟夏采復大廟𨽻僕復大寢小寢也黃氏曰夏采復于大祖不曰大廟然則總謂之大廟猶大社大稷也故夏采復于大祖不言廟祭僕復于小廟避夏采大祖之文髙祖以上猶有二祧王氏曰祭僕掌受命于上以眡祭祀𨽻僕掌五寢掃除糞洒之事王皆以故習而親焉故也既置夏采掌復之正事又以二僕參焉復盡愛之道求所以生之不以方而已凡祭祀王之所不與音預則賜之禽都家亦如之黃氏曰祭王之所不與者山川在畿内地逺王不行公卿百辟之有功徳於民者秩卑王不行然皆國之命祀故賜之禽王昭禹曰賜之禽亦以出於王命故也都家祭祀皆命於國王不親祭各使其主者祭之凡祭祀致福者展而受之鄭鍔曰諸臣之祭致胙於王謂之致福必受而膳之然胙自外來將以奉王詎可輕焉必度而省之知其非可疑然後致膳先儒謂展其牲之體數大牢則牛左肩九个少牢則羊左肩七个之類則所展者曷止此觀晉申生歸胙而驪姬毒以獻其事有不可不防者展而受之之意豈止於體數而已哉易氏曰凡祭祀受胙謂之受福言神錫之福而君受之也都宗人家宗人與國之祭祀有司皆致其福於王祭僕則展而受之膳人則受而膳之則祭祀之誠至矣御僕下士十有二人府二人史四人胥二人徒二十人賈氏曰大僕至御僕四官列職同官故同府史掌羣吏之逆及庶民之復與其弔勞易氏曰御僕所掌復逆視大僕小臣有尊卑小大之異視宰夫有甚不同者此謂庶民非萬民之衆所謂羣吏則府史胥徒之在官者亦非諸臣也諸臣則諸侯羣臣咸與非御僕所得而並言然宰夫於諸臣言復此於庶民言復宰夫於萬民言逆此於羣吏言逆所謂復逆者盖通上下言之王氏曰庶民之復大司㓂所謂逺近惸獨老幼之欲有復于上者故大僕言建路鼓以待逹窮者聞鼓聲則速逆御僕也李嘉㑹曰羣吏庶民安有弔勞觀陽門之介夫死而子罕哭之哀漢征民宿衛及其去也天子親享之羣吏庶民或有弔勞宜也鄭鍔曰於吏民有哀則弔有勞則勞未嘗以其賤而遺也使御僕掌弔勞見恩意之厚易氏曰以大僕掌三公孤卿之弔勞小臣掌大夫士之弔勞推之此亦羣吏之弔勞也大祭祀相盥而豋鄭鍔曰祭祀以匕登牲體於俎王盥手乃登之王氏曰王盥而登御僕相之王昭禹曰相盥非沃也若儀禮所謂奉盤授巾是也大䘮持翣鄭康成曰翣棺飾也持之者夾蜃車易氏曰此䘮祭之冗事故御僕掌令掌王之燕令鄭鍔曰燕居之令非視朝時所出羣臣不預聞故掌其𫝊導也以序守路鼓鄭康成曰序更也王昭禹曰御僕下士十有二人以序更守路鼓以待逹窮民與遽令李嘉㑹曰不説御庶子者升而為士則非御庶子矣𨽻僕下士二人府一人史二人胥四人徒四十人鄭鍔曰左𫝊曰輿臣皁皁臣𨽻𨽻臣之尤賤者名官以此盖五寢者神之所依當埽除糞洒以致潔清乃皁𨽻所當為以是名官使知僕𨽻之役不敢廢事也黃氏曰𨽻僕職任愈䙝故雖屬大僕而别置府史胥徒羣僕皆御于王所孫氏曰𨽻僕之屬夏官法嚴而儀肅不容狎視漢法事闗宗廟必置重辟亦此意掌五寢之埽除糞洒之事黃氏曰寢之為五何如或曰五當為王祭祀脩寢為王將齊故脩治潔清之寢廟惟月令有之自漢以來原廟置寢於諸經未見廟有寢者然漢廟有寢亦死事耳劉氏曰五寢夫人以下所居也王后所居謂之正内隷僕不掌自有寺人内豎也鄭𤣥謂五寢五廟之寢非也隷僕乃掌洗乗石蹕宫中之事古者神人不紊若典職宗廟何縁䙝之於宫中而外役乎鄭康成曰汜埽曰埽埽席前曰拚洒灑也祭祀脩寢劉氏曰脩讀為滌祭祀則齊齊則大滌五寢使之㳙潔不犯禁也愚案注䟽引爾雅有東西廂曰廟無曰寢必須寢者祭在廟薦在寢也月令凡新物先薦寢廟不知寢廟脩除於守祧自屬禮官今掌之𨽻僕厠於僕從之後必非寢廟之寢况經中只言五寢又不曽及廟字黃氏劉氏之説是矣王行洗乗石鄭司農曰乗石王所登上車之石詩云有扁斯石履之卑兮鄭鍔曰王所踐履猶致其潔如此則事至尊之禮嚴掌蹕音畢宫中之事鄭司農曰蹕謂止行者清道若今時儆蹕鄭康成曰宫中有事則蹕易氏曰於宫中為之蹕致其肅也大䘮復于小寢大寢劉氏曰大寢内寢小寢燕寢正内春秋莊公薨于路寢僖公薨于小寢黃氏曰復於其平生所有事之所小寢大寢王所興居也鄭説皆非弁師下士二人工四人史二人徒四人賈氏曰郊特牲云夏收殷哻周弁則弁亦冕也即是六冕皆得稱弁鄭康成曰弁者古冠之大稱委貌緇布曰冠王昭禹曰冕上服以臨下弁下服以事上人君服以冕亦服弁者以上得兼下也此掌五冕之官所以名之曰弁師鄭鍔曰王之冕弁宜在禮官今乃列之夏官繼大僕羣僕之後在司戈盾司弓矢之前俱非其類疑其失次徐卿曰弁者所以見諸侯夏則於卦為離萬物相見之時故弁師屬焉掌王之五冕皆𤣥冕朱裏延紐五采繅音早十有二就皆五采玉十有二玉笄朱紘鄭鍔曰五冕制度冕與弁異攷之皆可疑今隨文釋之冕之長短廣狹經無文漢儒謂用版廣八寸長尺六寸以布衣之上𤣥下纁名謂之冕冕者俛也後髙前下有俯俛之形故以名焉在髙位者失於驕矜欲令位彌髙而志彌下之意然王之吉服六每服一冕則宜六冕今止五冕者禮圖以大裘之冕無旒陸佃云大裘襲衮則戴冕繅十有二旒大裘與衮同一冕故服六而冕五此說得之李嘉㑹曰五冕不及大裘大裘天子服也今説五冕則公卿大夫士之服也然必曰王之五冕者惟天子則五冕可具也王昭禹曰服者下之飾陰也故有六陰數也冕上之飾陽也故止於五陽數也賈氏曰皆𤣥冕古者績麻三十升布染之上以𤣥下以朱衣於冕之上下鄭鍔曰𤣥冕朱裏説者以𤣥在上者升而與物辨以象道之妙朱在下者降而與物接以象禮之文上𤣥之版謂之延取其長也垂之以旒謂之邃取其深也紐鄭康成曰小鼻也綴於冕之傍垂之以武傍孔相當以笄貫之欲其牢固也有延以為覆有紐以為固文以五采為繅鄭康成曰繅雜文之名繩垂於前後故曰五采繅有十二也就皆五采玉十有二就成也以一玉為一成結之使不相并也賈氏曰就皆五采玉十有二者此各據一旒而言於一旒之上以青赤黃白黑五色玉貫於藻繩每玉間相去一寸十二玉則十二寸就成也鄭康成曰此為衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十𤣥衣之冕三斿用玉七十二玉笄以玉為笄以貫之也朱紘以朱色之組為綬而屬結之也鄭康成曰紘一條屬兩端於武賈氏曰謂以一條繩先屬一頭於左傍笄上以一頭繞於頥下至向上於右相笄上繞之劉氏曰朱紘上繞笄之兩傍助其固也王氏曰五采備采也十有二就備數也玉十有二備物也玉笄貫其上以象徳也李嘉㑹曰五冕五采必五者象仁義禮智信五者無一不備黃氏曰康成以繅不言皆有不皆者非也又以十二句絶就字下屬亦非五采繅十有二就䝉上𤣥冕朱裏延紐皆字十有二就下又有皆字謂每就十二玉也冕制於經無所考注䟽家所言皆約漢制未可信康成又采摭禮記儀禮殘闕不全之説牽合為證亦難信者然則天子五冕皆𤣥冕朱裏延紐繅斿十二就就皆十二玉玉笄朱紘是則一冕耳而曰五冕者正以著其同也大裘之冕不數自見其為異諸侯之繅斿九就瑉亡貧反玉三采其餘如王之事繅斿皆就玉瑱吐練反玉笄鄭鍔曰近世陸佃論此云諸侯九斿則上公十二斿可知公衮冕十二斿侯伯鷩冕九斿則毳冕七斿希冕五斿𤣥冕三斿可知舊圖謂侯伯之服鷩冕七斿子男毳冕五斿公之孤希冕四斿則以上廹於上公衮冕九斿又廹於𤣥冕三斿為之説也一曰凡冕天子皆十二斿諸侯皆九斿故記曰天子十有二旒諸侯九而弁師云諸侯九就諸侯盖通稱繅即禮記所謂藻也易藻為繅繅雜文之名取其義之著也斿即禮記所謂旒也易旒為斿謂其垂於前後如旌旗之斿也諸侯九就盖自公而推之以九以七以五皆可見矣瑉玉者石之似玉子貢所謂君子貴玉而賤瑉為玉之寡而瑉之多者是也天子之徳全故其玉用全諸侯之徳殺於天子故用瑉玉天子用五采之玉所以表其徳之全諸侯徳不及天子故用三采之玉其餘如王之事則𤣥朱延紐朱紘之類皆同乎王也所以可同乎王者以其有人君之道故耳然言其餘如王之事則特笄紐之類黃氏曰其餘如王之事言公衮冕其餘鷩毳希𤣥皆與王之事同事謂祭祀射饗所當用也鄭以為延紐非也經不言玉之數則每旒之玉皆十二與王同亦可知也其異於王者殺其斿與其采而已不如是殺玉彌寡其垂有不可及目者詎足以示蔽明之義哉繅斿皆就言玉既三采則繅斿之就皆三采也易氏曰繅斿皆就又總言侯伯子男之冕侯伯七命則七就也子男五命則五就也鄭康成曰玉瑱塞耳者鄭鍔曰前旒蔽明以見其收視於内玉瑱塞耳以見其反聽於無聲賈氏曰王不言玉瑱王與諸侯互見為義是以王言𤣥冕朱裏延紐及朱紘明諸侯亦有之公言玉瑱明王亦有之李嘉會曰玉瑱王不言之言王之徳自能反聽不待玉瑱而知也王之皮弁㑹亡外反五采玉璂音其象邸丁禮反玉笄易氏曰王之吉服其弁三皮弁用之於眡朝韋弁用之於兵事冠弁用之於田獵兵田之弁有時而用之者也皮弁眡朝則日眡朝之禮其用數矣此弁師所以特言皮弁之制㑹五采玉璂者詩謂㑹弁如星言縫中飾之以玉爍爍而處狀似星也又曰其弁伊綦言其文也詩又作騏騏馬青驪文也李嘉㑹曰璂綦也結也詩云㑹弁如星結五采玉十二以為飾謂之綦鄭鍔曰璂音基有基本之意玉以比徳言用徳以為基也象邸者以象骨飾弁内項上之邸以明託宿之義鄭鍔曰象以比禮言用禮以為主而貫之以玉笄者也鄭鍔曰王之冕諸侯之冕與夫王之皮弁三言玉笄見其皆不可無笄以為固也此所謂皮弁之制若夫韋弁即爵弁也所謂爵弁絰䊷衣是已冠弁即𤣥端也所謂𤣥衣素裳是已二弁與皮弁素積相似㣲有損益言皮弁則韋弁冠弁在其閒王之弁絰弁而加環絰鄭康成曰弁絰王弔所服也其弁如爵弁而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事弁絰服賈氏曰緦之絰則兩股此環絰則以一股纒之不糾李嘉㑹曰弁絰五服之輕者王弔乃五服之外故約言之諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之而掌其禁令鄭鍔曰上言天子之冕弁其九就者上公之冕也若夫侯伯以至孤卿大夫則視其爵等而為之降殺易氏曰上言上公玉繅之數而兼言諸侯之繅斿皆就未及夫冕玉之制此經言諸侯之冕弁而兼及卿大夫冕弁之制盖侯伯之冕七就用玉九十有八而繅皆三采子男之冕五就用玉五十而繅皆二采以至孤四就用玉三十二三命之卿三就用玉十八再命之大夫再就用玉八朱緑而已其韋弁皮弁則侯伯璂飾七而玉皆三采子男璂飾五而玉皆二采孤則璂飾以四三命之卿璂飾以三再命之大夫璂飾以二亦朱緑而已弁絰雖無飾亦有等殺此不言士者司服所謂士之服自皮弁而下則皮弁亦士服也王氏詳説曰韋弁鄭氏以韎韋為弁又以為衣裳引左氏𫝊曰晉郤至衣韎韋之跗注是也釋聘禮謂韎布以為衣而素裳既曰韎為衣又曰韎布為衣既曰韎布為裳又曰素裳盖以軍國之容不同故也韋弁或謂乃爵弁為士之祭服而王服之者哭諸侯即服之鄭鍔曰司服有韋弁皮弁冠弁服弁絰此官惟有皮弁韋弁弁絰鄭康成云不言冠弁冠弁兼於韋弁皮弁不言服弁服弁自天子以下無飾無等而陸佃云韋弁爵弁也故弁師有韋弁而無爵弁也冠弁服弁皆皮弁也故弁師有皮弁而無冠弁服弁康成之説誤矣李嘉㑹曰皮弁用以眡朝故言之特詳韋弁用之於兵事冠弁用之於田獵韋弁即爵弁冠弁即𤣥端也所謂𤣥衣素裳是也二弁與皮弁相似而㣲有損益黃氏曰王不叙韋弁諸臣則叙之皆㣲意也天子親將本非帝王之盛節必大不得已而後行之鄭鍔曰冕弁之制而尊卑貴賤各有其等弁師為之掌其禁令則禮行於六服矣鄭康成曰禁令者不得相僣踰也李嘉㑹曰不説天子之卿大夫者諸侯卿大夫之制既明則天子之卿大夫士可見亦以命數推之周禮訂義卷五十二
