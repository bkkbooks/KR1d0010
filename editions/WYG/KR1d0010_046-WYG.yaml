body:
  text: 周禮訂義卷四十六宋王與之撰典路中士二人下士四人府二人史二人胥二人徒二十人鄭康成曰路王所乗車王昭禹曰巾車謂之車則上下所通乗典路謂之路則主於王車賈氏曰巾車已主王后之五路今此又掌之者以冬官造車訖以授巾車飾以金玉象之等其王及后所乗者又入典路别掌之薛平仲曰玉路之大復有典路以掌之戎車之倅復有車僕以掌之至於旗常之建司常又纎悉而明辨之成周之君亦豈略冕服之用而特致意於此哉前乎史官則冕服盖有職矣後乎史官而車旗未之掌焉先王錯綜於叙官之際申嚴於禮典之防尤當於此而有攷掌王及后之五路辨其名物與其用說書鋭反項氏曰典路專逹王與后之駕說故曰路鄭鍔曰辨其名物當乗金玉者不可以乗象木當用以祀賓者不可用以朝以田鄭康成曰用謂將有朝祀之事駕之鄭司農曰說謂舎車春秋傳曰日中而說若有大祭祀則出路賛駕說賈氏曰巾車云玉路以祀此大祭祀則出路鄭云王當乗之惟出玉路項氏曰王之玉路后之重翟王氏曰出路者或乗之或陳之項氏曰駕豋車說舎車鄭鍔曰大祭祀大賓客或乗玉路或乗金路駕之說之僕與趣馬之職此則賛之使各有其節李嘉㑹曰不說眡朝師田者舉其大以見其餘大喪大賓客亦如之王昭禹曰大喪出路非乗車也出所陳之路焉鄭司農曰書顧命曰成王崩既陳先王寳器又曰大路在賓階靣綴路在阼階靣先路在左塾之前次路在右塾之前漢朝上計律陳屬車於庭故曰大喪大賓客亦如之王昭禹曰亦賛駕說凡㑹同軍旅弔于四方以路從才用反鄭康成曰王出於事無常王乗一路典路以其餘路從行亦以華國賈氏曰惟玉路祭祀之車尊不出鄭鍔曰攷之巾車以朝以賓以祀以即戎以田不見乗路以弔之文學者疑之易氏曰謂因㑹同賓客而行弔事車僕中士二人下士四人府二人史二人胥二人徒二十人黄氏曰僕主也以僕名官以其主戎萃古主射之官名僕射鄭鍔曰乗車必用僕以為御戎僕齊僕道僕田僕皆僕馭王之路者屬於夏官而車僕獨列於此蓋戎僕馭戎路此則掌戎路之萃萃者副貳之名五路皆有貳貳之數不過十有二爾戎路乗以即戎之車戎者國之大事尤事之危進而無繼則是以將卒與敵故戎車副貳尤衆欲其散則可以圍敵而聚則可以自固是故有廣車而廣車有萃有闕車而闕車有萃有苹車而苹車有萃有輕車而輕車有萃萃車既多别設車僕不列於夏官見其不屬於司馬掌戎路之萃七内反下同廣古曠反車之萃闕車之萃苹車之萃輕遣政反車之萃鄭康成曰此五者皆兵車所謂五戎戎路王在軍所乗賈氏曰此言戎路則巾車所云革路王昭禹曰革路用以即戎故又謂之戎路黃氏曰萃副也有萃則有元典路掌之象路木路亦有副惟戎車則置官掌之蓋其施於戎事者不止一車獨曰路者尊王也李嘉㑹曰戎車多萃以倉猝欲備毁折也鄭康成曰廣車横陳之車春秋傳曰公喪戎路又曰其君之戎分為二廣則諸侯戎路廣車也王昭禹曰宣十二年楚子為乗廣三十乗分為左右廣然則車十五乗謂之一廣闕車所用補闕之車也鄭鍔曰楚子使潘黨帥游闕四十乗從唐侯為左拒盖以四十乗為補闕之用楚南蠻也戎車之制如此宜其抗衡於上國苹猶屏也所用對敵自隱蔽之車孫子八陳有苹車之陳王氏曰苹車蓋輜車之有屏蔽者輕車所用馳敵致師之車也王昭禹曰孫武書曰馳車千駟又曰輕車先出其側者陳也蓋用之馳敵致師非輕則不能充其任故馳車又謂之輕車黃氏曰廣闕苹輕其名不同其用亦異鄭康成雖出於意料然考其名義則或是是皆在中軍蓋兵家之樞機不用則為王之衞故楚有王族二廣晉有公行齊有二廣啓牢之名皆在中軍王氏曰此五車皆戎車故各有萃萃隊也各以其萃以其車之卒伍睦焉王昭禹曰易曰萃聚也聚則有隊矣車僕則并其萃而掌之賈氏曰此車僕惟掌五戎之萃其五戎之正不言所掌者巾車雖掌正戎之一其下四戎之正亦掌之凡師共革車各以其萃王昭禹曰凡師共革車則師之所用者其車皆以革鞔之賈氏曰案巾車王所乗惟革路而已即上文戎路是也今此不云革路緫云共革車則革車之言所含者多五戎皆是則王雖乗一路四路皆從是優尊所乗也鄭鍔曰革車亦各有萃所以為不可敗之䇿黃氏曰車僕掌萃車共革車則典路之職萃則車僕共之五戎制度雖異皆革車也愚考六鄉六軍不能備千乗車鄉軍出則以公車充之故車僕掌五戎之萃皆以副王為名居中軍其卒皆鄉兵而乗之者皆官府州鄉之吏射人曰大師令有爵者乗王之倅車是也五戎之元典路掌之王所乗康成謂優尊者所乗其說是王雖以戎路即戎及其在軍則無常乗也其意甚宻㑹同亦如之鄭鍔曰㑹同雖乗金路亦共革車文事必有武備也大喪廞革車鄭康成曰言興革車則遣車不徒戎路廣闕苹輕車皆有焉賈氏曰王遣車九乗除此五乗之外加以金玉象木四者則九乗大射共三乏賈氏曰乏一名容射人云三𫉬三容是也以其為革車用皮乏亦用皮故因使為之若然直云大射共乏至於賓射燕射之等亦使共乏矣舉大射尊者而言先鄭讀乏為匱乏之乏者以其矢於侯匱乏不去故也鄭鍔曰王之大射必張三侯每侯之後必用一乏使持旌告𫉬之人用此自庇車僕掌車之萃使臨敵者得以自蔽之之亦使矢之所及者足以自蔽爾因所職掌以眀其義猶巾車鳴鈴之義司常中士二人下士四人府二人史二人胥四人徒四十人鄭康成曰司常主王旌旗鄭鍔曰九旗之名不同大常九旗之一耳不名官曰司旗獨以常名何也旗可以謂之旂亦可以謂之常郊特牲曰旂十有二旒龍章而設日月明堂位曰旂十有二旒日月之章此指大常而言也而謂之旂豈非旗可以謂之旂乎樂記曰龍旂九旒天子之旌也先儒皆言天子之旌曵地此亦指大常而言也而謂之旌豈非旗亦可以謂之旌乎覲禮曰公侯伯子男各就其旗而立月令曰春載青旂夏載赤旂秋載白旂冬載𤣥旂春之靑者冝曰旂夏之赤者冝曰旟秋之白者冝曰旗冬之𤣥者冝曰旐不謂之旗旟旐而謂之旂豈非旗皆可以謂之旂乎行人曰建常九斿建常七斿建常五斿旂則九斿旟則七斿旗則五斿不謂之旂旟旗而謂之常豈非此亦可謂之常乎掌九旗之官特名曰常以行人質之意可知矣昭禹謂王載大常名官曰司常謂取九旗之尊者名之爾然不曰大常而曰司常則知其非􅃌大常言之也掌九旗之物名王氏曰旗之物則通帛雜帛之屬鄭鍔曰􅃌旗上熊虎龜蛇之類以為物然通帛之旟雜帛之物二旗無異物九旗之物如戎馬一物田馬一物之類皆􅃌色以言之旗之名則旗常旜物之屬自常以下凡九物而旗居其一謂之九旗猶公侯伯子男謂之諸侯也各有屬以待國事黃氏曰司常掌其物名其旗各屬於其官府師都州里而藏之有國事則出而張之以待給嵗時共其更旌而已鄭謂屬徽識非王亦為徽識乎王昭禹曰國有祭祀師田賔客之事自王而下皆有所建之旗司常掌其物名使其屬視而知所從則以待其所用也日月為常交龍為旂通帛為旜之然反雜帛為物熊虎為旗鳥準為旟音餘龜蛇為旐全羽為旞析羽為旌胡伸曰大常王之旗也周以日月為常日往月來未嘗以止惟其無常可以為常者道也物者事也王所事者道臣所事者事故王所建曰常臣所建曰物也方氏曰司常言設日月者無龍章設龍章者無日月特牲言龍章而設日月乃與周禮不同此雜記前代之禮鄭鍔曰九旗各畫物因物以立名胡為日月熊虎鳥隼龜蛇皆取二物交龍則取一物而通雜帛又皆不取一物邪嘗讀鄒陽之䟽觀交龍驤首之言竊以為交者蛟也若謂畫龍一升一降則交龍驤首之言非矣以龜蛇鳥隼例而推之交龍冝作蛟龍亦是二物也通用帛全用帛析其羽全其羽皆不二物又無取於畫也不用畫則因物以明義而已鄭康成曰通帛謂大赤從周正色無飾鄭鍔曰周人尚赤則此通用赤帛爾其他如旂之青旟之白旐之黒常之黄不全用赤可知先儒謂九旗之帛皆用絳失之矣鄭鍔曰以帛相雜者名曰物易曰物相雜故曰文唯雜衆色故文物為可觀鄭謂以帛素飾其側白者殷之正色也徒取殷白色以為言一色之白何足謂之物而彼謂之白素飾側者盖有疑於用絳之說亦失之矣項氏曰通帛以象眀辨而守正也雜帛以象事物之為雜也項氏曰熊虎西方之獸熊毅猛師都謂鄉遂大夫統衆而為軍將者也以其在國都而成師焉鳥隼南方之物剽銳而能擊鄭康成曰鳥隼象其勇㨗也州里則六鄉之羣吏所建也龜蛇北方之物龜智而蛇果鄭康成曰龜蛇象其扞難辟害也縣鄙則六遂之羣吏所建也以其同居故謂之里以其在國之鄙故謂之鄙李嘉㑹曰此三物師都鄉遂之官所建以蕃屏扞衞于王易氏曰王之視朝無非道焉道貴乎渾全故以五采全羽飾之王之游田無非事焉事貴乎辨析以五采析羽飾之鄭康成曰全羽析羽皆五采繫之於旞旐之上所謂注旄於干首也賈氏曰云注旄於干首爾雅之文也若然則此旞旌非直有羽亦有旄故鄭引爾雅注旄以證旞旌明其兩有是以干旄詩云孑孑干旄孑孑干旌鄭彼注云首皆注旄焉明干首旄羽皆有之此雖據旞旌旄羽並有至於大常巳下皆有明矣夏采云乘車建綏復於四郊注綏以旄牛尾為之綴於橦上是其旌首皆有旄之驗也全羽析羽直以羽而無帛而鄭云九旗之帛者據衆有者而言或解以為旞旌之下亦有旄旒而用絳帛也其旄之下斾似不用絳故爾雅云緇廣充幅長尋曰旐繼旐曰斾詩云白斾央央李嘉㑹曰旞旌是小旗道車斿車所載不乘大旗而插小旗鄭鍔曰命旗之名儒者以為有取於制字之意畫日月者名曰常常久也日月得天而能久照王者之道萬世有常而不易也畫交龍者名曰旂旂之為義取諸斤也斤之絶物不犯所畫尤為有辨旂者諸侯所建出則有君道入則有臣道為有辨也全用帛者名曰旜旜之為義取諸亶誠之意孤卿在朝赤心事主以誠信為先也畫以熊虎者名曰旗旗之為義取諸其也其者􅃌物之辭惟威足以服物及可以􅃌物而使之李嘉㑹曰旗者與民相期集也畫鳥隼者名曰旟旟之為義取諸與也動有禮文趨事急疾人孰不我與哉畫龜蛇者名曰旐旐之為義取諸兆也兆者事之所始也公邑閒田民衆至多而軍伍之法實兆於此也旗不用帛獨取於鳥羽全而用之名曰旞析而用之名曰旌旞之為義有取於遂旌之為義有取於生全羽者道車之所載王以朝夕燕出入由道而行也析羽者木路之所載王以田以鄙有所旌别也立名不一故取義不同陳君舉曰交龍為旂熊虎為旗鳥隼為旟龜蛇為旐即左青龍右白虎前朱雀後𤣥武四方之所建也日月為常則居中以􅃌麾之故招摇在上急繕其怒矣乃知五花陣從古而然八陣圖之四魁八尾亦此法也及國之大閲賛司馬頒旗物鄭康成曰仲冬教大閲司馬主其禮王昭禹曰辨旗物之用正掌於治兵之官而司常無所用賛至於大閲其事繁矣辨鼔鐸之用則如振旅辨號名之用則如茇舎辨旗物之用則如治兵故司常賛司馬以頒之王建大常諸侯建旂鄭康成曰王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐黄氏曰孤四命卿六命言孤卿自中大夫以上皆建旜王氏曰師都則孤卿也於其事上謂之孤卿於其涖衆謂之師都於其涖軍又謂之軍吏鄭康成曰孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也黄氏曰雜帛為物必有以為大夫士之别師都六鄉六遂大夫也謂之師都都民所聚也畫熊虎者鄊遂出軍賦象其守猛莫敢犯也州里縣鄙鄉遂之官互約言之賈氏曰州是鄉之官里與縣鄙是遂之官故緫言鄉遂之官云互言者遂之里是下士得與鄉之州中大夫同建旟鄉之閭亦得與遂之縣同建旐遂之鄙得與縣同建旐鄉之黨亦得與州同建旟是互也言約者鄉之族上從黨同建旟比上從閭同建旐遂之鄼上從鄙同建旐鄰上從里同建旟是約也但族師已下并鄙師已下皆是士官雖與在上大夫同建其仭數則短當三仭以下黃氏曰司常國容司馬軍容軍容不免少有屈伸恐其遂以揜國容也故使司常賛司馬於其入也盡反其舊焉九旗以爵秩尊卑職守内外為序謂之建常所建也師都六鄉六遂長官也大司徒遂人致民皆有旗鄉二千五百人為師故謂之師遂自九夫為井至四縣為都井法成焉故遂謂之都五師萬二千五百人為軍不曰軍而曰師遂官皆下於鄉官一等鄭謂鄉遂大夫非也鄉遂大夫皆不與於軍師之事其職可攷鄉自州而登為鄉故州里别見遂自縣而登為遂故縣鄙别見道車象路斿車木路巾車象路建大赤以朝木路建大麾以田王行於道乘象路則載旞有所遊觀則載旌皆非其所常建也故謂之載凡此皆國容也鄭鍔曰軍旅之中所以一人之目者旗物也春官之司常與夏官之大司馬或頒之或辨之職雖不同所以一軍旅之目則一而已然王與諸侯或建或載不出乎大常與旂至於旜則孤卿建之矣師都又載之物則大夫士建之矣鄉遂又載之旗則師都建之矣軍吏又載之旟則州里建之矣百官又載之旐則縣鄙建之矣郊野又載之變易不常何以一人之目邪余以為司常所頒者冬之大閲也司馬所辨者秋之治兵也秋冬所教各不同則旗物所用冝不一蓋兵事多變應變不一則教之之術不可以不多變故秋而治兵用旗物則異乎冬冬而大閱用旗物則異乎秋使民於秋已知其一於冬又知其一秋冬所用各不同而民之所習亦不一有旗物建於上有徽識被於身旗物不同則徽識不同仰視其旗俯觀其徽雖百戰而不亂奚患其不知所從乎又曰秋冬異教則旗物異用凡有職於軍中者可以互建今也所建所載之官吏互不一其說果可攷乎余以為凡教民者欲其易知耳軍吏也孤卿也師都也三者不同名攷其實則皆孤卿而已平日為孤卿有事則命為軍將所謂軍將者非軍吏乎在朝為孤卿食采皆在師都所謂師都者非孤卿乎孤卿可以謂之軍吏又可以謂之師都故所互建者旗也旜也所迭載者亦旗也旜也或曰軍吏或曰師都不過皆孤卿耳人習知其孤卿豈不易知哉鄉遂也大夫士也百官也州里也四者不同名攷其實皆大夫士而已判而言之則曰大夫曰士合而言之則曰百官鄉則有州遂則有里曰鄉遂者緫名也曰州里者各舉其一以名之其實則鄉遂也鄉遂州里之官皆大夫士為之為大夫士者乃所謂官也故所互建者物也旟也所迭載者亦物也旟也或曰鄉遂或曰州里或曰百官不過皆大夫士耳人習知其為大夫士豈不易知哉郊野也縣鄙也二者不同名攷其實皆公邑之吏而已鄉遂餘地與夫封王子弟之餘地謂之公邑亦謂之閒田自其地言之名曰郊野自天子使吏治言之名曰縣鄙夫公邑閒田之地既名郊野又名縣鄙何也盖是田邑也有在六遂之縣者有在采地之縣者康成所謂一百里為州四百里為縣者謂此地爾故所互建者旐也所迭載者亦旐也或曰郊野或曰縣鄙不過皆公邑之吏耳人習知其公邑之吏豈不易知哉且夫周禮王畿之内官吏之衆大抵有三節曰朝廷之孤卿耳鄉遂之士大夫耳公邑閒田之羣吏耳民於每嵗治兵大閲之時見聞習熟安其教訓一旦有軍事仰視其旗雖異其人易識安得不如子弟之衞父兄手足之捍頭目邪道車載旞斿車載旌賈氏曰道車巾車象路也以朝朝所以行道故以象路為道車但在朝則建大赤今以朝夕燕出入則建旞也斿車巾車木路以田是㳺樂之所用故以斿車為木路但正田獵建大麾今小小田獵及廵行縣鄙則建旌也鄭康成曰全羽析羽五色象其文徳也王氏曰旌旞言載在車故也自旐以上言建則凡祭祀㑹同賔客建焉不必在車覲禮所謂上介皆奉其君之旂置於宫皆就其旂而立是也賈氏曰此九旗緫為大閱而言其道車斿車非為軍事也鄭鍔曰大閱之時王乘戎路而建大常象路木路從焉所載者旟旞與旌當是之時玉路金路不出故此但言道車斿車也黄氏說見孤卿建旜下皆畫其象焉官府各象其事州里各象其名家各象其號賈氏曰上言旌旗之大此言其細者鄭鍔曰或謂上言九旗皆有屬此言皆畫其象何邪余以謂象言徽識之象徽識謂之屬所以題别衆臣使之知所繫屬而不散也蓋畫象之說皆謂交龍龜蛇鳥隼熊虎凡著於旗者皆有畫也既畫於旗之上以為􅃌麾又畫於人之身以為徽識也若夫官府各象其事州里各象其名家各象其號形可畫也事與名號如之何其畫邪官府州里與家各畫其物之形乃書其事與名號若曰某某之事某某之名某某之號杜子春云畫當為書其說可取鄭康成曰事名號者徽識所以題别衆臣樹之於位朝各就焉覲禮云公侯伯子男皆就其旂而立此其類也王昭禹曰官府則畫六官象其所掌之事而書之項氏曰若治官則象治官之事教官則象教官之事州里則畫州里之名象其官名而書之項氏曰若鄊則象其鄊之名遂則象其遂之名家則象其家邑之官象其美稱之號而書之項氏曰大夫之食邑各象其家之號事以其所治言民以其所命言號以其名之美稱言王氏曰官府異事所畫象其事則足以相别州里及家無異事故於畫象其名號以别之薛氏曰司馬辨號名之用有六而此所言者有三司馬分言之司常緫言之耳且司馬謂帥以門名又曰百官各象其事即此所謂官府各象其事家以號名即此所謂家各象其號都鄙各以其名鄉以州名野以邑名即此所謂州里各象其名也凡祭祀各建其旗項氏曰凡祭祀各建其旗所以屬衆王則建大常諸侯助祭者百官執事者各有之鄭鍔曰王祀天乘玉路所建者大常今言各建其旗則四路皆從明矣李嘉㑹曰以王推之則諸侯建旂孤卿建旜大夫建物皆可知矣㑹同賔客亦如之置旌門鄭康成曰賔客朝覲宗遇王乗金路廵守兵車之㑹王乘戎路皆建大常王氏曰㑹同賔客各建其旗者衆之所㑹使各視旗而知所從焉鄭鍔曰賔客㑹同則乗金路亦各建其旗言亦如祭祀之時則革路木路亦從明矣易氏曰祭祀在郊廟無事乎旌門之置㑹同賔客在國外及方岳之下則旌門之置乃所以為王者營衞之儀掌舎云為帷宫設旌門設旌於帷宫之門則㑹同賔客之在外者可知也鄭鍔曰王為帷宫以暫止焉則置旌為門以表王之所在也王氏曰置旌門則置之而已於是掌舎受而設焉大䘮共銘旌鄭康成曰銘旌王則大常也士䘮禮曰為銘各以其物建廞車之旌及葬亦如之賈氏曰在廟陳時以廞旌建於遣車之上及葬入壙亦建之鄭康成曰葬云建之則行廞車解說之易氏曰巾車飾其車而司常建其旌也賈氏曰使人各執廞旌也凡軍事建旌旗及致民置旗弊婢世反之賈氏曰當大司馬致衆之時司常建之此言為及致而設也王氏曰置者植之弊者仆之鄭鍔曰軍旅之事用旌旗以􅃌麾則掌建之始焉置之以致民使來終焉弊之以誅後至皆司常所掌也甸亦如之鄭鍔曰田獵無異軍旅或置或弊宜不異矣凡射共𫉬旌鄭康成曰𫉬旌𫉬者所持旌賈氏曰謂若大射服不氏唱𫉬所持之旌三侯皆有𫉬旌也鄭鍔曰射必用𫉬以旌明其中嵗時共更旌賈氏曰受官旌旗用之者歳之四時來換易則司常取彼之舊典此之新易氏曰與巾車嵗時更續之義同鄭鍔曰不曰旗而曰旌泛而言之旌旗一而已矣都宗人上士二人中士四人府二人史四人胥四人徒四十人鄭康成曰都謂王子弟所封及公卿所食邑王氏詳說曰三等采地或謂之都鄙即大宰所司以八則待都鄙之治是巳或謂之稍縣都即載師所謂以家邑之田任稍地大都之田任畺地是巳或謂之師都即司常所謂師都載旗是已或謂之家即司常所謂家各象其號是巳或謂之都家即此所謂都宗人家宗人是巳易氏曰凡典禮者謂之宗在虞氏則秩宗在周人則為大小宗伯皆所以典天神人鬼地􅅘之三禮也天子有宗伯諸侯有宗人春秋躋僖公而夏父弗忌為宗人此諸侯之宗人而都家謂之内諸侯亦有宗人焉都宗人家宗人是巳薛平仲曰禮之漸莫重於􅆫􅆫之漸莫重於祭春官之立始以宗伯掌建邦天神人鬼地􅅘之禮終以宗人掌都家祭祀之禮一皆以宗名官者其事始終於此陳君舉曰案都宗人家宗人掌都家之禮都司馬家司馬令都家之衆都士家士治都家之獄凡此者以地理隔絶去王城甚逺故特設此官於縣都之中以統臨之而屬於内官非謂此為采地之官與鄉遂異制也孫氏曰分畿内而為都家雖各有封疆之限而不得專其政故八則治都鄙一曰祭祀以馭其神於是有都宗人以掌其祭祀焉二曰法則以馭其官於是有都則以掌其法則焉八曰田役以馭其衆於是有都司馬家司馬以掌其兵甲馬至於刑獄之事無不聽於王朝者都士家士雖已闕而方士三月上獄訟於國比訝士掌四方之獄訟有治於士者造焉有亂獄斯往成之則有間矣記曰内諸侯禄也外諸侯嗣也是亦有合於先王之舊内諸侯不過禄田不容襲其地專擅其政掌都祭祀之禮凡都祭祀致福于國鄭鍔曰大都小都不出王畿之内其所封者乃王之子弟與公卿也其地域有山川及因國無主後者為之長者所當祭也況又立其祖所自出之廟則其祭禮尤嚴立都家人以掌其都之祭祀之禮使有其舉之不敢廢也非所當祭者不敢􅆫也太宰有八則以馭之曰祭祀以馭其神又專立一官以掌其禮彼安敢有過差哉王氏詳說曰致福之事見於天官膳夫又見於祭僕都家宗人夫膳夫祭僕既云致福而此又言者盖祭祀王所不與則賜之禽都家亦如之上賜禽于下則下致福于上然致福者宗人也展宗人之致福而受之於膳夫者祭僕也受祭僕之致福而獻之於王者膳夫也李嘉㑹曰必致福于國者皆所以導人心之正以全其愛君之念也正都禮與其服王昭禹曰禮以定尊卑别貴賤辨親踈而明分守而僭亂之生其㣲常起於衣服之間則正都禮與其服不可緩也鄭鍔曰所謂正者與其他所正之禮服異乃奉祭之服恐有偪上之嫌耳若有宼戎之事則保羣神之壝鄭鍔曰郊有羣神之兆則有壇壝之制國有㓂戎之變固所當保也鄭康成曰守山川丘陵墳衍之壇域王氏曰以其掌都祭祀之禮故使與小祝保神壝之在外者小祝言保郊此言保神之壝相備也李嘉㑹曰欲羣神之無警動國有大故則令禱祠賈氏曰都宗人是王家之官王命使禱祠是都内之事明所令令都内之有司有事於神者既祭反命于國鄭康成曰祭謂報賽也反命還白王王昭禹曰祭之命上所出既祭反命于國則逆祀命者無有也王氏曰既祭反命于國則雖非國故禱祠亦必命之祭然後祭家宗人如都宗人之數鄭康成曰家謂大夫所食采邑掌家祭祀之禮凡祭祀致福鄭康成曰大夫采地之所祀與都同若先王之子孫亦有祖廟國有大故則令禱祠反命祭亦如之鄭康成曰以王命令禱祠歸白王於𫉬福又以王命令祭之還又反命賈氏曰禱祠反命則與都宗人既祭反命同祭亦如之是禱祠訖王更命祭祭訖亦反命都宗人亦有此法文不具耳掌家禮與其衣服宫室車旗之禁令鄭康成曰掌亦正也鄭鍔曰都宗人不言宫室車旗之禁令獨此言之者大宰有八則以馭都鄙有家之大夫宫室車旗之從其命數非八則之所馭不可以不正也易氏曰揚雄曰節莫大於僣僣莫大於祭先王設都家宗人之官杜僭亂之原别嫌疑之漸其制禮之深意實寓乎此也李嘉㑹曰禁令與政令不同盖衣服宫室之制甚嚴觀都人士之詩可見凡以神士者無數以其藝為之貴賤之等劉執中曰神士謂明神理而仕者薛平仲曰六典叙官未有無所命名而列之於數者特禮官之末有所謂凡以神士者以官焉謂之神士者不出於巫祝之間先王何為特諄復於此哉嘗觀周家五禮之制以事鬼神示為先六樂之作亦以事鬼神示為首先王之敬鬼神􅅘者如是人之有能以致天神人鬼地示者要必選掄搜訪其藝必有以通幽明之故知鬼神之情狀者然後居之則仕進之貴賤而藝能之踈宻可攷矣鄭鍔曰周家鄊舉里選之法三嵗興鄉里之賢能其次有府史胥徒及庶人之在官入仕之路清矣今乃有以神入仕之人何耶盖先王之於國則憂其有凶荒於民則慮其有札䘮以為幽冥之中有神者主之神之䖏位非人人所能知也必有精爽不擕貳之人能齋肅中正有上下比義之知有光明宣通之聖有光照之明聽徹之聦者或足以猶鬼神􅅘之居而辨其名與其物者矣由是設為入仕之途使由此以進然後使之掌日月星辰之法李嘉㑹曰男巫女巫無數先王既巳言之今又言之恐神附于人如神降于莘之類得以惑亂其民神士之人又非男巫比雖藝之小者亦收之如瞽人之歸于上而掌樂鄭康成曰藝謂禮樂射御書數髙者為上士次之為中士又次之為下士王昭禹曰所謂掌三辰之法以猶鬼神􅅘之居皆以其精於藝者為之也掌三辰之灋以猶鬼神􅅘之居辨其名物鄭康成曰猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神人鬼地示之坐者謂布祭衆寡與其居句賈氏曰神有衆寡多少或居方為之或句曲為之也薛氏曰日月星辰謂之三辰日陽也月隂也星辰亦有隂陽焉隂陽之氣有消息盈虚之理而三辰之法未嘗不由之三辰之數有升降出入往來之變而鬼神􅅘之居未嘗不從之推隂陽而攷三辰觀三辰以居鬼神􅅘非知幽明之故不能也傳曰太極運三辰五星於上元氣轉三統五行於下故知三統之合於三辰也日合於天統則天神可得而猶其居月合於地統則地􅅘可得而猶其居星辰合於人統則人鬼可得而猶其居易氏曰天神位乎上其居為陽即日合天統之法而圖之地示位乎下其居為隂即月合地統之法而圖之人鬼位乎隂陽之間即斗合人統之法而圖之大司樂云黄鍾為宫而天神降函鍾為宫而地示出圜鍾為宫而人鬼可禮此即三辰合三統之義猶之之法則神士者之所掌其法雖不可見大要壇場廟社左右前後各從其類而已故小宗伯位宗廟於陽之左猶日之生於東也位社稷於隂之右猶月之生於西也兆五帝四望四類各以其郊猶星辰之􅄤次也神士者特能掌三辰之法猶其居而已建其位非宗伯不可也王氏詳說曰楚昭王問於觀射父而及重黎絶地天通之事射父所對詳矣大約以謂古之所謂巫覡者以民之精爽不擕貳又能齋肅中正者為之使制神之處位次主是知凡以神士者巫覡之類也掌三辰之法以猶鬼神示之居豈非制神之處位次主乎王昭禹曰鬼神􅅘雖幽深然皆麗乎隂陽不能無所居也辨其名則所命之名也辨其物則其色之物也以冬日至致天神人鬼以夏日至致地􅅘物鬽眉秘反鄭康成曰天人陽也地物隂也陽氣升而祭鬼神隂氣升而祭地祗物鬽所以順其為人與物也百物之神曰鬽春秋傳曰螭鬽魍魎賈氏曰左傳宣三年服氏注曰螭山神獸形魅怪物魍魎木石之怪文公十八年注螭山神獸形或曰如虎而噉虎或曰魅人靣獸身而四足好惑人山林異氣所生為人害賈服義與鄭異鄭以螭鬽為一物故云百物之神薛氏曰致天神而人鬼與之荀卿所謂郊則并百王於上而祭之是巳郊天合百王則郊地合物鬽冝矣鄭氏謂用祭天地之明日於經無據黃氏曰是必有推候之法可睹之實至漢郊祀猶候神先下天子望拜則司樂六變天神降八變地􅅘出九變人鬼格非無其事以禬國之凶荒民之札喪杜氏曰禬除也王昭禹曰致天神人鬼地􅅘物鬽而祭之者以禬國之凶荒民之札喪故也禬所以㑹之則欲在天者無凶荒在人者無札喪緫論宗伯官屬易氏曰春官設屬最有統紀所典之禮五禮為先五禮之中吉禮為本是盖天秩天叙自然之理觀大宗伯其用亦博矣實以天神人鬼地􅅘為主然後小宗伯為之建國之神位肆師為之立國祀之禮而五禮從之自其設屬而言雖五禮之用為不同莫先於祭祀之禮於是因禮事之緩急而為職掌之先後祭祀始於祼而告時告備之禮行焉故鬱人先之鬯人次之雞人次之尊彝几筵瑞玉命服之官又次之以至内外祭祀無不畢舉而凶禮為謹終之事此冢墓職喪所以居五禮之末掌禮之職至此詳且備矣禮之所至樂亦至焉又自大司樂以至司干凡二十職皆列於禮官之次盖聖人制禮所以檢括人心而歸之於中使之周旋鼓舞於聲容之間而至敬存焉是樂之為用皆所以輔成乎是禮者也然禮者理也所以經理斯世者茍有一毫之不盡亦不足以為禮之至又自大卜而下皆卜筮之事大祝而下皆筮祝之事大史而下皆紀䇿書之事是雖文為制度之末而天秩天叙實寓其間聖人率是而行之始於宫庭達於天下其道甚大百物不廢復以神士者終焉寜非吉禮為五禮之本乎陳及之曰六官中惟春官典禮職事無可疑者然司服掌外朝之服當與内司服並建在天官典瑞玉器之藏當與掌節並建在地官司常巾車典路亦當在夏官今並列於春官者以禮儀等級隆殺升降所係故典禮者亦併掌之緫論春官典禮樂之職黃氏曰右春官之屬凡七十自大宗伯至職䘮為一節自大司樂至司干為一節自大卜至御史為一節自巾車至凡以神士者為一節其脉理之聨絡固巳詳言於前矣或曰先王於禮樂至矣然要其分職帥屬之意猶有斯民不與焉者何哉嘗觀諸教官之屬分為鄉遂而鄉遂之民凡闗於禮樂之事者莫不纎悉以及之則禮樂固明逹之天下矣及夫見諸朝廷行諸郊社宗廟百官有司之奉承典章文物之藩飾固有嚴之於上者而安上治民之功移風易俗之本則已潛孚黙運於事物之表矣不然宗伯司樂何為皆以諧萬民為功而正月之吉特不垂象者豈非感化之妙在彼而不在此耶卿大夫士緫數五百九十有四人卿十有三人中大夫五人下大夫四十有八人上士四十有九人中士二百有六人下士二百七十有二人周有六卿兼三孤而為九此言周官卿數之定論也今攷於經六卿既各分職矣而國之六鄉且有六焉后之六宫則又倍焉盖周之卿於是乎凡二十有四人矣夫為卿若是之衆而言者則曰六卿九卿何哉蓋係之六典則曰六卿居於九室則曰九卿然事固有非數者之所能盡間見於六鄉六宫者不可得而略焉是皆屬乎六典之中矣先王任人之道亦豈拘拘焉限於其數而不求以集天下之治哉宜卿不嫌於衆矣愚案說巳見鄉老下府史胥徒工之數二千五百十有四人府百有八人史二百七十有一人胥百九十有一人徒千八百有四十人工百有四人周官府史之數凡府一人而史必倍之此其例也惟春官之府史則有不然者或府之人多於史之數而史之數或等於府之人大略為史者實簡焉此其故何哉意者先王禮樂之具固府藏之所當謹而禮樂之妙非文史之所能載故文書調度之可及者殆非制作之深意法而不說之精微固有在彼而不在此也彼御史之史百有二十人而史又居於府之上者此變例也蓋所以掌賛書者有非一端女奚之數百有二十人女二十有四人不命之官凡四守祧奄八人男巫無數女巫無數凡以神士者無數周禮訂義卷四十六
