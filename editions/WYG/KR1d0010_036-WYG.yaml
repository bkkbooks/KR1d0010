body:
  text: 周禮訂義卷三十六宋王與之撰司服中士二人府二人史一人胥一人徒十人陳君舉曰司服掌王及命夫之服弁師掌其弁冕而皮枲絲屨皆藏於天府之屬既成而頒蓋冢宰制國用宗伯受之以共服御漢初有御府令掌御衣服東西織室亦有令皆屬少府費悉出於禁錢不以調大司農齊三服官亦主作服輸不過十笥其後寖侈又曰典瑞典命司服凡士六人巾車典路車僕司常凡大夫二人士四十二人節瑞命數服飾車旗之用所以表尊卑而寓之數皆典禮之大者秦制車乗主於太僕符璽屬於少府瑞止璽印佩止綬襚衣服車旗之章亦多依戎事務使利便凡古所以辨班服之等悉闊畧不講其存者非文具則徒法也非所以為禮漢因不改於是數者分於有司而太常特為儀官不與政通矣自北齊置主爵後為司封則秩命歸於吏部自魏晉置駕部則車輿歸於兵部自隋置中監尚輦又别領於内省至此併漢失之奚暇治禮耶掌王之吉凶衣服辨其名物與其用事鄭鍔曰王之吉服九自大裘至𤣥冕冕服六自韋弁至冠弁弁服三所謂皮弁素積𤣥衣素裳緇衣𤣥端緫而言之皆曰吉服自服弁服至弁絰是之謂凶服吉則以文飾為主凶則以質素為尚皆欲其稱事稱情而巳司服辨其名物與其用事或以祭或以朝或以甸或以弔非徒以章身為觀美也其被服以行禮則有不易之理人之觀之也亦知其尊卑之差此所以貴其辨易氏曰自王以下皆有吉凶衣服者禮自王始王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之鄭鍔曰祭祀以致福福者事之至吉六冕之服謂之吉蓋專服以祭也愚案天帝義巳見大宗伯鄭鍔曰羔裘無經緯之文而有純一之質無繡繪之巧而有自然之體其色純乎黑則以象道其物能致恭則以象禮不謂之羔裘而謂之大者惟天體為甚大故以名祀天之裘所以象其體也惟大裘之上襲之以衮故記衮謂之被言被之於其上且祀天冝尚質反被以衮蓋陶匏藁秸圓丘埽地雖主乎質鎮圭之繅以藉龍旗之日月四圭有邸六變之樂又主乎文内盡質外盡文以盡事天之道陸氏曰先王祀天以冬至之日為正而裘又服之本也故取大裘以名之然裘之上未嘗無衣而衣之下未有不用裘凡冕之制版廣八寸長倍之前貟後方後仰前俛飾之以布上𤣥下朱貟其前而俛之向明與物交之義方其後而仰之向晦與物藏之義上𤣥以象天道之升下纁以象地道之降名之曰冕言當俛以致恭之意易氏曰王之吉服六自衮冕而下皆有章數惟大裘無章以黒羔皮為之冕即𤣥冠無旒之冕愚案此乃注䟽圖說或以服既同冕豈曰無旒是冕與裘之尚乎質也然司裘以大裘為祀天之服此則言祀昊天上帝而兼及五帝者天道尚質其用一而巳若衮冕以下之五冕則人道以文為貴鄭鍔曰五帝雖天之佐而與天同體故祀之服亦可得而同四圭有邸奏黄鍾歌大吕舞雲門其玉其樂皆同其服何疑之有享先王則衮冕鄭司農曰衮卷龍衣也鄭鍔曰衮之為言卷也畫升降二龍龍之為物變化卷舒無常王者之德造化如之故服之以致享然衮服自龍始其章九楊炯曰衮之衣五章裳四章凡九也衣法天數竒裳法地數偶也不用十二章享之何耶蓋凡奉祭之服從尸之所服周之先王追王也其尸服衮故王亦服衮以享之劉執中曰書稱舜曰予欲觀古人之象日月星辰山龍華蟲作㑹宗􅂜藻火粉米黼黻絺繡以五采彰施于五色作服汝明舜而欲觀乎古則衣裳之章十有二其來逺矣周之禮樂因於虞夏者衆矣鄭康成見司常之職云日月為常則謂周人以日月星辰畫於旌旗而冕服九章登龍於山登火於宗􅂜非也且交龍為旂周之衣不去其龍矣熊虎為旗周之裳不去其虎蜼矣何獨日月為常而去衣章日月星辰乎案周禮典命之職上公九命為伯其國家宫室車旗衣服禮儀皆以九為節則其衣裳九章推而上之天子衮冕十有二章明矣所謂登龍於山登火於宗彞上公之服也日月之合為朔十有二朔而嵗成天之道也天子代天以施德生物故衣裳旂常皆有十二為數日以象其陽德發生萬物月以象其隂德養成萬物星辰以象其經緯以象四時龍以象其變化以配天山以象其生植以配地雉以象其耿介文明之美火以象其光輝化物之功陳君舉曰變化不測而致其神之用者莫如龍崇髙不移而立其仁之體者莫如山文明有體而致其禮之文者莫如華蟲此皆德之上者故㑹之於衣宗彞以象其芬芳事上之誠藻以象其仁物達於幽潛粉米以象其粒民徧於天下黼以象其斷割以建中黻以象其背拂於非義陳君舉曰宗彞宗廟之器其象之有虎所以致其義象之有蜼所以象其智作於物所以昭孝柔順清潔可以薦羞者莫如藻昭明齊肅可以烹餁者莫如火米足以飬人而為粉則其利散而均黼足以立斷而又有黻則既斷而能辨此皆德之下者也故絺繡於裳繢於衣者六德煥於外而心不有其功繡於裳者六行根於中而進退不能忘公侯而下其章數降殺以兩天子之德猶天之覆物是以日月星辰三章髙邈在上非人臣之可及也𤣥冕者言以為衣與王衣同而無衣飾也裳則刺纁而巳王祀昊天上帝則大裘而冕祀五帝亦如之至敬無文以事天享先王則衮冕者繼先王之志者必有為以嗣其德不可以言達作十有二章以象其德服以事之而巳陳氏曰山龍而降始山終黻終始東北也何者山居東北冬春交也龍春也華蟲夏也虎秋也蜼冬也周而復始則藻春也火夏也粉米中央土也黼秋冬交也黻冬春交也龍與華虫陽之陽也故繪而在衣虎與蜼陽之隂也故繡而在裳古者合三辰而在服備十二章以則天數故章與四時相順陳君舉曰衮冕自龍而下九章之服享先王則服之鷩冕自華蟲以下七章之服享先公饗射則服之毳冕自宗彞以下五章之服祀四望山川則服之絺冕自粉米而下三章之服祭社稷五祀則服之𤣥冕則黼而巳一章之服祭羣小祀則服之夫衣服之間既又貴乎文矣而降殺以兩凡以為尊卑之等也尊卑之等既見於所服以祭祀則章天下之有德者亦不可不為之等故公之服侯伯之服推之至卿大夫士莫不各視其命之數者凡以辨之竇氏曰衮冕十二旒鷩冕九旒毳冕七旒絺冕五旒𤣥冕三旒享先公饗射則鷩冕鄭康成曰先公謂后稷之後大王之前不窋至諸盩王昭禹曰以周之祖廟考之先公尊於先王而所服止於鷩冕祭亦各以其服授尸尸服如是王服衮以臨之非所以為敬故不敢愚案經中既說王之吉服下面開說六冕則知尸既服此王亦當服此所謂體物而不可遺也鄭康成曰享射享食賔客與諸侯射也賈氏曰享食則大行人上公三享三食之等但享食在廟故亦服鷩冕與諸侯射者此大射在西郊虞庠之中亦服鷩冕若燕射在寢則朝服賔射在朝則皮弁服也鷩畫以雉謂華蟲也陸氏曰雉之為物五色備而成章故謂之夏翟亦曰華蟲猶中國謂之夏亦謂之華一名鷩也司服七章之服謂之鷩冕者則其名也其衣三章裳四章凡七鄭鍔曰鷩冕無山龍其服自華蟲以下以為章則曰華蟲以名服則曰鷩冕蓋章取其五采之著冕即實以名之也享射接以粲然之文所以取於華蟲祀四望山川則毳冕鄭康成曰毳畫虎蜼謂宗彞或問荆公宗􅂜象孝象者奚取於虎蜼公曰虎義也蜼知也義以制事知以察物然後可以保宗廟故取於虎蜼其衣三章裳二章凡五鄭鍔曰毳冕虎蜼二物不可以偏言以其皆毛物故因名曰毳虎西方之義獸蜼遇雨則以其尾塞鼻獸之有智者二者皆山林之物故服之以祭四望山川而祀四瀆亦服之者以山川通氣故也王氏詳說曰四望山川國之阻固以扞禦於外者故以虎蜼之服祭社稷五祀則希冕鄭康成曰希刺粉米無畫也其衣一章裳二章凡三鄭鍔曰希冕唯有粉米黼黻三章其章為罕故其字用希本又作絺字粉米兩物共為一章言粉其米以為章其在裳則當繡及為三章之首則當畫以在衣不可繡也賈氏曰衣是陽應畫今希冕三章在裳者自然刺繡但粉米不可畫之物今雖在衣亦刺之不變故得希名故鄭特言粉米然則毳冕之粉米亦刺之也粉米養人之物社稷者土穀之養人者也五祀之神則能平五行之政亦有功利以生人者也故祭則同服王氏詳說曰五祀春戸夏竈季夏中霤秋門冬行或謂絺為細葛布上刺繡布豈可繡哉或謂其字音蕭蕭者縫也凡冕服皆𤣥衣纁裳𤣥冕惟有黻之一章刺於裳而巳其衣無章但見其𤣥色黄氏曰宗伯序社稷五祀先於五嶽司服序四望山川先於社稷祭之秩當如宗伯司服自以服為序地祭以社稷見不别出則方澤不服大裘矣諸儒紛紛蓋未嘗攷先王制祀之義鄭鍔曰社稷五祀五岳同於血祭此則用七章之服以祀四望山川又用五章之服以祭社稷五祀蓋此言山川在社稷之上殆非丘陵墳衍之山川也指四望之山川耳何則丘陵墳衍之山川當比羣小祀以𤣥冕祭之不當處社稷之上觀祀五帝享先王祭社稷祭羣小祀而獨於四望山川之祭謂之祀四望山川則其尊可知祭羣小祀則𤣥冕鄭鍔曰羣小祀者以天神言之司中司命風師雨師之類以地神言之則林澤墳衍四方百物之類𤣥者至幽之色其理則妙而不可知小神在天地間固有功矣亦不可一一而指名之故服𤣥冕以祀衣既無章裳乃有黻取其兩已相背之形有萬物分辨之義鄭康成曰𤣥者衣無文裳刺黻而已是以謂𤣥焉鄭康成曰六服同冕者首飾尊也鄭鍔曰首飾尊而在上為上之道欲其不二愚案四望以下等祀其服若是分辨者蓋王者不以尊服臨卑將敬神以安其心也鄭敬仲曰嘗聞諸儒之論以為章服之中羔也龍也鷩也虎也蜼也皆取諸物羔為大裘不名曰羔蓋大裘以道言之尊天神鷩言其名則衮冝曰龍毳冝曰虎蜼而皆不言者蓋龍變化無方没其名者所以見神虎蜼二物不可以偏名也然虎蜼曰毳則鷩冝曰羽龍冝曰鱗亦不言者蓋鱗物不止於龍羽物不止於鷩虎蜼俱為毳物故也若夫宗廟彞器有鷄有鳥有斚有黄獨取虎蜼為說先儒諒必有所傳凡兵事韋弁服王氏詳說曰王吉服九其六用於祭祀其三用於兵田眡朝六服不同同於用冕三服不同同於用弁所以尊首飾鄭鍔曰韋弁服者爵弁也康成引左氏韎韋之跗注為證韎者染赤色以赤色之韋為弁亦服赤色之衣裳李嘉㑹曰兵不可變故上下之色如一禮圖畫爵弁其制如冕但無旒為異陸佃以謂弁如兩手相合冕而俛則弁之首舉矣王安石曰韋弁違物性而制之質而巳其染赤為之則以宣布著盡為義儒者皆以為赤色多矣詩曰韎韐有奭以作六師正謂兵服赤色兵事之弁周韋則皮之巳熟者其性柔順師衆以順為武也赤者南方色火烈不可向邇其威赫然故以赤為服也眡朝則皮弁服鄭鍔曰皮弁服用白鹿皮以為弁言皮則其毛存也上古未有布帛衣其羽皮毛有文皮其質視朝之禮以文質兩全為尚鹿之為物能求其類李嘉㑹曰鹿羣居則環其角以外鄉食則鳴以呼其羣詩之燕羣臣嘉賔取諸鹿鳴亦此也以是為服見君臣類聚之意其服則十五升白布積素以為裳色白以存太古之質先儒謂弁服三其一皮弁素積天子有三朝外朝二内朝一皆用皮弁王氏詳說曰皮弁視朝視外朝也雜記曰朝服十五弁郊特牲云三王共皮弁素積是巳若乃内服𤣥端也玉藻云卒食𤣥端而居則又非皮弁說者謂緇衣羔裘此朝服之衣羔裘𤣥冠不以弔此朝服之冠皮弁素積又為視朝之服何也余聞諸儒之說皮弁素積者天子視朝之服如郷黨云必朝服而朝東首加朝服朝服立阼階皆非皮弁服也故既夕禮云乗車載皮弁道車載朝服玉藻云天子皮弁以日視朝遂以食諸侯皮弁以聽朔於太廟朝服以日視朝於内又朝服以食蓋諸侯皮弁以聽朔於太廟禮畢而後改服以朝羣臣羣臣亦朝服以朝之是皆緇衣𤣥冠之朝服皮弁之朝服天子視朝之服為諸侯聽朔之服諸侯聽朔之服為天子田獵之服降殺之禮冝然天子之皮弁視朝之服以白布其後大夫僭之故玉藻云朝服之以縞自季康子始然天子之皮弁與朝服對言之則曰皮弁若離而言之亦謂之朝服可也陸佃云皮弁一名綦弁皮言物綦言色凡甸冠弁服鄭康成曰甸田獵鄭鍔曰田不言韋不言皮但曰冠蓋承皮弁之下以皮為冠也服則與服皮弁之服同皮弁白布衣冠弁緇布衣此其别也李嘉㑹曰甸亦兵事也不服韋弁而服冠弁者弁則髙廣冠則低小便𤣥於撃刺射獵也王氏曰甸方習武未有事故尚冠弁服者康成以為委貌即𤣥冠也郊特牲曰委安所以安正容貌以形言曰委貌以色言曰𤣥冠禮圖謂朝服之𤣥冠與士之𤣥端大夫之𤣥冠諸侯之冠弁此三冠與天子委貌形制相同其服則緇布衣亦積素以為裳即注說賈氏曰士冠禮云主人𤣥冠朝服緇帶素韠注云衣布不言色者衣與冠同色裳又與韠同色是其朝服緇衣亦如皮弁素積以為裳此即諸侯視朝之服而王於田獵則服之豈非以田者習武事而未用歟陸佃謂冠弁服者亦𤣥弁也左傳衞獻公射鴻于囿孫子寗惠子從之不釋皮冠而與之言又云皮冠以招虞人此田事服弁服之證說者又以為皮冠乃冠弁也王氏詳說曰郊特牲曰委貌周道也章甫商道也毋追夏后氏之道也委貌即𤣥端也𤣥冠則冠弁也𤣥冠朱組纓為天子之冠𤣥冠丹組纓為諸侯之齊冠𤣥冠綦組纓為士之齊冠𤣥冠之用廣矣此冠弁用於田獵者其𤣥冠緇衣素積歟易氏曰兵田之弁有時用之惟皮弁乃日視朝之禮故夏官弁師專言皮弁之制㑹五采玉璂象邸玉笄此王之皮弁韋弁冠弁雖弁師不載考其制與皮弁㣲有損益知皮弁朝服素積以為裳則冠弁韋弁之服可推王氏詳說曰士冠禮云主人𤣥冠朝服緇帶素韠是已然韋弁惟用於兵事皮弁不止於眡朝冠弁不止於田獵但以大者言之案玉藻之制天子𤣥冕聽朔諸侯則以𤣥冕祭天子皮弁視朝諸侯則以皮弁聽朔天子𤣥端而居諸侯則以𤣥端視朝𤣥冠𤣥端大同小異𤣥冠緇布衣皆有正幅為端則同但易其裳凡凶事服弁服鄭康成曰服弁喪冠也其服斬衰齊衰凡弔事弁絰服鄭康成曰論語曰羔裘𤣥冠不以弔弁絰者如爵弁而素加環絰賈氏曰爵弁之形以木為體廣八寸以三十升布染為爵頭色赤多黒少今為弁絰之弁其體亦然但不用爵色之布用素為之凡喪為天王斬衰為王后齊衰易氏曰經書天王惟於此喪事一見之與春秋書天王崩同意謹終之義也天王有父道王后有母道諸侯羣臣為服亦猶人子之為父母服也王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆弁絰鄭康成曰君為臣服弔服也鄭司農曰錫麻之滑易者十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布賈氏曰鄭注喪服縷皆破升為登布八十為登登成也今云十五升則一千二百縷去其半則六百縷云有事其縷其布者皆以水濯治去其垢也鄭康成曰疑言擬也擬於吉賈氏曰擬於吉者吉服十五升今疑衰十四升少一升而已易氏曰父母於子亦有服故王於諸侯羣臣則有錫衰緦衰疑衰之差然至尊不可以服言其首服皆加弁絰既葬除之大札大荒大烖素服鄭康成曰大札疫病大荒饑饉大烖水火為害君臣素服縞冠若晉伯宗哭梁山之崩易氏曰素服如喪禮恐懼修省之意與膳夫言不舉之意同公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服王昭禹曰凡諸侯之服各􅢂其命之數鄭鍔曰上公九命服衮其章九王亦被衮何為公與王同余謂學經者當因經文求先王之制不當信傳注以害先王之制日月星辰登於旌旗王與公同服九章之衮者其說出於鄭康成六經無見也自後諸儒莫敢辨正今以此經文質之其理自明且男子之服自三章之毳冕而下如侯伯則上不服鷩冕可知侯伯之服自五章之鷩冕而下如公則上不服衮冕可知公之服自衮冕而下如王則其上不服日月星辰可知經文謂自衮冕而下如王之服則衮冕而上之章非日月星辰而何有日月星辰則王服十二章明矣若夫同服九章非惟君臣無别又且與經文之言不合且天子之尊國十二門旗十二斿馬十二閑圭尺二寸冕十二旒禮物十二牢其所以取灋於天之大數者非一何獨於祭則執尺二寸之圭垂十二旒之玉而衣九章之服以臨之必不然矣林椅曰九服者上得通乎下下不得僭乎上孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服鄭鍔曰天子之孤六命與子男同五章之服此言孤之服自希冕而下如子男之服其服則三章是指諸侯之孤四命之服三章蓋其冕四斿纓四就則從其命數也天子之卿六命大夫四命卿與孤同大夫與諸侯之孤同三章此言卿大夫𤣥冕則指諸侯之卿大夫故服一章之冕𤣥衣纁裳蓋大國卿雖三命大夫雖再命惟與王之上士中士同爾王氏詳說曰鄭意以為其爵同孤則同於希冕其爵同卿大夫則同於𤣥冕其爵同士則同於皮弁但所謂章者據大章而言别有小章則依其命數此六命之孤與四命之孤三命之卿與再命之卿所以異也雖其說無所經見然以孤執皮帛言之則可知矣天子之孤皮帛公之孤亦皮帛所以異者虎豹其凶服加以大功小功鄭康成曰喪服天子諸侯齊斬卿大夫加以大功小功士亦如之又加緦鄭鍔曰天子諸侯自旁期以上皆絶而不服蓋位尊勢重彼固不敢以戚戚於君此亦以義而斷恩惟卿大夫加以此則自孤而上不服大功小功士之服自皮弁而下如大夫之服鄭鍔曰𤣥冕下有爵弁又有皮弁王之上士𤣥冕中士爵弁下士皮弁故諸侯之士自皮弁為首欲其引類聚朝又欲文質相須之意自皮弁下更有𤣥冠服與大夫同王昭禹曰公侯之士同一命子男之士不命其服無章數其首服以皮弁故曰自皮弁而下如大夫之服則𤣥衣纁裳然典命不言王之士以理推之公侯伯之士皆一命則王之上士三命中士再命下士一命三命再命之士其服當同於一章之𤣥冕則一命之士亦服皮弁矣其凶服亦如之鄭鍔曰亦有大功小功也黄氏曰大夫凶服有大功小功無緦與喪服經傳不同或曰喪服經傳孔氏禮也其齊服有𤣥端素端鄭鍔曰自公之服以下皆言其助祭與朝王之服此則言其齊服自公以下至士之齊服吉齊則𤣥端凶齊則素端吉以𤣥衣凶以素衣皆謂之端言其幅之正也自公而下與士皆同蓋士之衣袂皆二尺二寸而屬幅是廣袤等其袪一尺二寸大夫以上則侈之而巳侈之者蓋半而益一焉半而益一則其袂三尺三寸袪一尺八寸此所以異焉祭將以交於鬼神𤣥北方之色幽隂之極而道之所存也惟極乎至幽而交之以道則神可得而事故齊用𤣥端衣幅之端則心之端見於衣陳氏曰古者端衣或施於冕或施於冠如樂記魏文侯端冕而聽古樂此施於冕者也劉定公曰吾端委以治民董安于曰臣端委以隨宰夫此施於冠者也凡大祭祀大賔客共其衣服而奉之鄭康成曰奉猶送也送之於王所王昭禹曰共王以衣服又奉其事也大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序賈氏曰復衣服謂始死招䰟復魄之服雜記云復者升屋西上則皆依命數天子十二人諸侯九人七人五人大夫士亦依命數鄭康成曰奠衣服今坐上䰟衣賈氏曰守祧職云遺衣服藏焉鄭云大斂之餘也至祭祀之時則出而陳於座上此奠衣服也廞衣服所藏於椁中賈氏曰此則明器之衣服亦沽而小者也王昭禹曰所陳衣服皆有先後之序司服則掌其所陳序典祀中士二人下士四人府二人史二人胥四人徒四十人薛平仲曰天地神􅅘之位則兆于四郊宗廟昭穆之列有祧於外廟者兆于四郊者其壇壝之地人情之所易忽祧于外廟者其世數之踈人情之所易畧有典祀以掌外祀之兆守有守祧以掌先王先公之廟祧外焉兆守謹於四郊内焉廟祧謹於宗廟禮之大本在是掌外祀之兆守皆有域掌其禁令王昭禹曰外祀國外之祀若小宗伯所謂祀五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方是也兆謂之壇兆守謂守其兆域凡國外之祀為之兆守者皆有塋域故也鄭鍔曰其兆之外皆有塋域典祀則掌其禁制灋令蓋求神於此而不嚴為之禁則人或敢渫神不顧享矣若以時祭祀則帥其屬而脩除徴役于司𨽻而役之鄭鍔曰言祭言祀尊者當祀卑者當祭鄭康成曰屬其屬胥徒也脩除芟埽之徴召也李嘉㑹曰外祀不在四郊之内祭時脩除則脩除有時不慢於神亦不瀆於神役之作使之鄭鍔曰當祭祀之時則脩除其兆之壇域草之荒塞帥其屬之下士二人共掌而所役之人則徴諸秋官之司𨽻蓋司隷有徒二百人以給勞辱之事李嘉㑹曰役於司𨽻則不勞民崇祀及祭帥其屬而守其厲禁而蹕之鄭鍔曰及祭殆人君躬出郊而有事於兆域之時乎王昭禹曰厲禁謂藩厲禁止之地蹕所以止行者將祭帥其屬則以脩治為事而致其潔及祭帥其屬則以禁止為事而致其嚴此先王所以事天地神􅅘之義守祧奄八人女祧每廟二人奚四人愚案祧字見小宗伯張氏曰周有百世不毁之祖三昭三穆四為親廟二為文武二世室并始祖而七諸侯無二祧一昭一穆賈氏曰七廟通姜嫄為八廟廟一人故奄八人王昭禹曰逺廟為祧守廟祧而名之曰守祧言祧則廟可知鄭鍔曰祧之為言乃國家基業兆於此其神巳逺超而去也陳氏曰廟所以象生之有廟寢所以象生之有寢建之觀門之内不敢逺其親位之觀門之左不忍死其親家語曰天子七廟諸侯五廟自虞至周所不變故虞書禋于六宗以見太祖周官守祧八人以兼姜嫄之宫則虞周七廟可知張氏曰守祧先公之遷主藏于后稷之廟疑諸侯無祧廟亦藏之於始祖之廟掌守先王先公之廟祧其遺衣服藏焉項氏曰廟謂太祖及三昭三穆之廟祧則逺祖先公則祧于后稷之廟鄭司農曰此王者之宫而有先公謂大王以前為諸侯鄭康成曰遺衣服大斂之餘王昭禹曰守祧掌守先王先公之廟祧其餘衣服藏焉豈特以其常服之衣服為不可䙝而忘亦所以示其體物不遺之意若將祭祀則各以其服授尸王氏曰其遺衣服藏於廟祧若將祭祀則各以其服授尸所以依神王昭禹曰尸服享先王則衮冕享先公則鷩冕所謂各以其服授尸蓋以其所服各有稱也鄭康成曰尸當服卒者之上服以象生時程氏曰古人祭祀用尸極有意人之䰟氣既散必求其類而依之人與人既為類骨肉又為一家之類已與尸各既心齊潔至誠相通以此求神冝其享之後世直以尊卑之勢遂不肯行其廟則有司脩除之其祧則守祧黝堊之鄭康成曰廟祭此廟也祧祭遷主王昭禹曰廟則近而親祧則逺而踈曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧享嘗乃止故守祧黝堊之而已孫氏曰先王之禮降殺有漸其間五廟則有司脩除之即𨽻僕掌五寢埽除糞洒之事屬乎夏官者二祧之禮殺矣委之守祧黝堊而已李嘉㑹曰女祧與奚可黝堊否蓋黝堊者常令其新潔非自為之主掌其黝堊之事耳鄭司農曰黝讀為幽幽黒也堊白也爾雅曰地謂之黝墻謂之堊鄭康成曰脩除黝堊互言之有司常主脩除守祧常主黝堊既祭則藏其隋與其服鄭康成曰隋尸所祭肺脊黍稷之屬藏之以依神賈氏曰案特牲少牢及曾子問皆有隋祭之事特牲禮祝命挼祭尸取菹㮕于醢祭于豆間佐食取黍稷肺祭授尸尸祭之注云肺祭刌脊似誤肺是其隋者彼不言脊此言王昭禹曰其隋則埋以藏之王氏曰隋肉謂之隋隋蓋尸祭之餘易氏曰藏其隋則埋於西階之東其服則藏於廟祧亦以明神所依也周禮訂義卷三十六
