body:
  text: 周禮訂義卷四十二宋王與之撰大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人鄭康成曰問龜曰卜大卜卜筮官之長王昭禹曰物生而後有象象而後有滋滋而後有數蓍者陽中之陰故植而知數龜者陰中之陽故動而知象先王成天下之亹亹定天下之吉凶莫大乎蓍龜名官謂之大卜以龜為主薛平仲曰禮運曰宗祝在廟三公在朝三老在學王前巫而後史卜簭瞽侑皆在左右極至於禮行於五祀而正法則焉然則王之所以賴於左右前後者其闗於禮樂甚大也卜祝巫史不列於此當何屬哉卜象也簭數也先簭以觀其從後卜以驗其合故大卜之於卜卜師賛之卜人又賛之掌龜既専之一官燋龜又専之一官至於眡吉凶計中否以聽於大卜則又有占人而簭人屬之於末而已筮短龜長固以從長此大卜必以下大夫二人而長之也鄭鍔曰三皇以來已有卜筮人之於事不能無心若夫龜筮則何心之有取決於此欲托於無心而已掌三兆之灋一曰玉兆二曰瓦兆三曰原兆易氏曰以龜占象之謂卜以火灼龜其象卜占謂之兆三兆之法専掌於大卜占龜故也鄭鍔曰三兆之書其作者不可攷杜子春以玉兆為帝顓頊之兆兆為帝堯之兆原兆為有周之兆近世説者謂為三代之兆然無所攷也儒者相傳謂名玉兆者言兆之璺罅如玉瑜瑕不相掩玉陽精之純也兆如玉色則事之屬乎陽者也瓦兆者言兆之璺罅如瓦之暴解散瓦生於土兆如瓦解則事之屬乎陰者也原兆者言兆之璺罅如原田之坼裂牽連不斷則陰陽之相雜者也易氏曰鄭氏以為璺罅今攷其義不過陰陽竒耦與夫象之上下左右而已詩以廼生男子為載弄之璋則凡以玉名者皆陽也故卜得陽數之竒而其象在上在左者曰玉兆詩以廼生女子為載弄之瓦凡以瓦名者皆陰也故卜得陰數之耦而其象在下在右者曰瓦兆易之比曰比吉原筮原之為言再也或陰陽竒耦之錯列上下左右之未定再以其變推之曰原兆尚書精義曰道生一一生二二生三三者道之成也故卜用三兆筮用三易取其成法也曲禮曰卜筮不過三儀禮曰占者三人在其南北上盖曲禮言其法儀禮言其人人各掌一法金縢所謂卜三龜一習吉則筮用三也可知矣其經兆之體皆百有二十其頌皆千有二百賈氏曰經兆者龜之正經云體者謂龜之金木水火土五兆之體名體為經鄭康成曰體有五色又重之以墨坼五色者洪範所謂曰雨曰霽曰圛曰蟊曰剋賈氏曰案占人云君占體大夫占色史占墨卜人占坼以其有五行兆體體中有五色既有體色則因之以兆廣狹為墨又因墨之廣狹支分小璺為坼是皆相因之事鄭鍔曰經兆之體者謂三兆所卜之正體一體而五色應五行也五行之變無窮自其墨色坼裂分而配之一色别為二十四體故五行之兆分為百有二十一體十頌所以發明其吉凶推演其禍福故百二十體而有千二百之頌頌者卦繇之辭三兆不同書各異世而體也頌也其數乃無異如此竊意其書之數雖不異其所占則不得而同不然何以為玉瓦原之别乎易氏曰自百有二十以至千有二百則以十日十二辰之數與夫四時五行休王相乗之法推之三易三夢之占倣此掌三易之灋一曰連山二曰歸藏三曰周易易氏曰兼及於三易三夢者易與夢亦占也其屬有簭人占夢大卜為之長故兼掌其法鄭康成曰易者揲蓍變易之數可占者鄭鍔曰連山以艮為首夏人之易其卦艮上艮下故曰連山言如山之相連也劉氏曰艮其背不獲其身人之道也以寅為正穆姜之筮遇艮之八是謂艮之隨者此連山之易歸藏以坤為首商人之易其卦坤上坤下故曰歸藏言如地道之包含萬物所歸而藏也劉氏曰坤者萬物所歸商以坤為首案禮運宋不足徵吾得坤乾焉此歸藏之易周易以乾為首周人之易其卦乾上乾下名曰周言如天覆無不周而變易無窮也劉氏曰夫子不取連山歸藏惟周易之學者以易天道之大兼乾坤艮於其中歴三古而更二聖先儒以連山為伏羲歸藏為黃帝豈不知周易之畫於伏羲耶其經卦皆八其别皆六十有四鄭鍔曰正卦皆八自八相生别而重之八八所以皆六十四卦也然三代之易名異而卦不異盖卦雖同而所占者異也周易以九六為占而連山歸藏以七八為占周易占其變者連山歸藏占其不變者易氏曰傳記所載文王重易為六十四卦今此三易之别皆六十有四則是六十四卦非文王重之李嘉㑹曰文王所重盖繇辭也若乾卦曰元亨利貞是也易大傳十三卦言包犧氏之取諸離黃帝堯舜氏取諸乾坤此故經卦之名曰益曰噬嗑曰隨曰豫曰渙曰小過曰睽曰大壯曰大過曰夬此即重卦之名是知上古已有六十四卦之别但夏殷之易以七八不變者為占周易以六九之變為占襄九年左氏傳所載東宫之筮遇艮之八八即艮之六二為隨杜氏以為雜用連山歸藏二易皆以七八為占是連山歸藏已有隨卦之義此夏殷六十四卦之證或曰伏羲氏畫八卦因而重之葉水心曰詳此則周易之為三易卦之為六十四自舜禹以來用之而後世謂伏羲氏始畫八卦文王重為六十四卦又謂紂囚文王於羑里始演周易又謂河出圖有自然之文學者因之有伏羲先天文王後天之論不知何所本始然則周易果文王所改作而後世臣子不以嚴宗廟參典謨顧乃藏於大卜等於卜筮何媟嫚其先君若是哉凡卦之辭爻之繇筮史所測推數極象比物連類不差毫髮孔子以為不然故孔子之繋易以為必如是而測之由其中正不以禍福利害亂其心者此君子之所以為易學者既不知反援孔子之易同歸於卜筮以為人更三聖世歴三古後成書學者日聾瞽無足怪者掌三夢之灋一曰致夢二曰觭居綺反夢三曰咸陟鄭康成曰夢者人精神所寤可占者王昭禹曰形接為事神遇為夢神凝者想夢自消夢者精神之運也人之精神往來常與陰陽流通而禍福吉凶皆通於天地應於物類則由其夢以占之周官所以有占夢之官而大卜掌三夢之法鄭鍔曰有心而夢出於有所因故曰致孔子之夢周公行道而致也晉侯之夢楚子伏已而盬其腦將戰而致也王昭禹曰致者有所使而至非自至也鄭康成曰致夢夏后氏作觭字從角從竒盖角出竒異所謂怪異之夢趙簡子夢童子倮而轉以歌魯聲伯夢泣而珠盈懐其怪異之夢歟王昭禹曰角一俯一仰為觭人之晝俯仰於事為之間夜則感而成夢雖非出於思慮亦有因而成鄭康成曰觭夢殷人作焉無心感物謂之咸升而有至者謂之陟咸陟言無心所感精神升降有所致而得夢也文王之夢九齡高宗之夢傅説其精神所感之夢歟王昭禹曰無心感物為咸咸則以虚受物因時乗理無所偏係陟之為言升升則無所拘滯則非干思慮非因事為一出於自然鄭康成曰咸陟周人作其經運十其别九十王氏曰占夢以嵗時日月星辰則所謂經運盖嵗時日月星辰之運鄭鍔曰十煇者日之輝光也十夢者夢之運變也精神之運心術之動然後見於夢占書名之曰運占夢之正法有十一運而九變十運而九十變故經運十其别九十以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳鄭鍔曰國之大事有八必問諸龜以決吉凶問之之辭謂之命大卜作其辭命鄭司農曰征謂征伐人鄭鍔曰將用兵以討伐則征不可以妄動鄭康成曰征亦云行巡守象謂災變雲物如衆赤鳥之屬有所象似易曰天垂象見吉凶鄭康成曰象謂有所造立也易曰以制器者尚其象鄭鍔曰與者將合人以共事鄭司農曰與謂予人物劉執中曰與奪之利害謀者始創議以立事也王昭禹曰謀謂圖事於人卜其信否也劉執中曰謀大議之得失也果者進退未決之際而求其決鄭康成曰果謂以勇決為之若呉伐楚楚司馬子魚卜戰令龜曰魴以其屬死之楚師繼之尚大克之吉是也黃氏曰果其事疑信卜其果不也至者為師卜鄭司農曰至謂至不雨者為農祈劉執中曰卜雩祈之雨否瘳者以身求瘳者為疾禱賈氏曰此八者皆大事故待龜而決若小事則入於九筮以八命者賛三兆三易三夢之占鄭鍔曰作八命特以問龜非能定吉凶吉凶大抵占於三兆三易三夢之法此特賛其占王昭禹曰作八命非特占之於龜亦驗之於筮司之於夢黃氏曰三兆三易三夢各有占者大卜緫其事而賛之占有異同則決之鄭康成曰賛佐也鄭鍔曰賛謂以此辭演出其意以觀國家之吉凶以詔救政李景齊曰大卜合龜筮與夢之占觀夫國家之吉凶而預詔王修政以救之知其失而救之則禍可轉而福愚案大卜一官専在詔救政盖國家將興必有禎祥國家將亡必有妖孽既於卜筮前知宜使人君預為修省之道凡國大貞卜立君卜大封則眂髙作龜鄭司農曰貞問也國有大疑問於蓍龜鄭康成曰貞之為問問於正者必先正之乃從問焉王昭禹曰謂以大事卜於龜而正之鄭康成曰卜立君無冢適卜可立者王昭禹曰立君以定繼嗣天下之本卜大封謂境界侵削卜以兵征之若魯昭公元年秋叔弓帥師疆鄆田是王昭禹曰大封以命諸侯一國之本眂髙以龜骨髙者可灼處示宗伯大事宗伯涖卜用龜之腹骨近足者其部髙作龜謂以火灼之以作其兆春灼後左夏灼前左秋灼前右冬灼後右士䘮禮曰宗人受卜人龜示髙涖卜受視反之又曰卜人坐作龜鄭司農曰作龜謂鑿龜令可爇黃氏曰卜師凡卜事眂髙揚火以作龜致其墨是則凡卜卜師作龜惟大貞則大卜作龜大祭祀則眂髙命龜鄭康成曰命龜告龜以所卜之事不親作龜大祭祀輕於大貞士䘮禮曰宗人即席西面坐命龜凡小事涖卜鄭康成曰代宗伯張沂公曰表記曰小事無時日有筮周禮曰凡小事涖卜小事用筮又何涖卜邪曰有事於小神無常時日臨有事則筮之是小事用筮也如大卜職當大祭祀則眂髙命龜凡小事涖卜此小事對於大祭是祭中小事非謂小神也國大遷大師則貞龜鄭康成曰正龜於卜位也士䘮禮曰卜人抱龜燋先奠龜西面是也又不親命龜亦輕於大祭祀黃氏曰大祭祀命龜與凡小事涖卜皆大卜専職䟽注差次涖卜以下皆未必然貞龜與大貞之貞一也大貞合三兆三易三夢而占之立君大封既卜又協之於易夢謂之大貞大封非正封疆正封疆何用大貞大封在司馬為軍禮詩頌有樂章賚是也先王不輕為之國於天地與有立焉何敢輕哉遷國用事事雖不小貞龜而已詩曰宅是鎬京惟龜正之武王成之周公曰朕曷敢違卜凡旅陳龜黃氏曰水旱兵烖皆旅旅事不一故陳其龜隨事用之易氏曰凡旅非大旅陳龜則輕於貞龜鄭康成曰陳龜於饌處士䘮禮曰卜人先奠龜于西塾上南首是也王氏曰陳而不作與陳樂器同凡䘮事命龜鄭康成曰重䘮禮次大祭祀士䘮禮則筮宅卜日天子卜葬兆易氏曰凡䘮非大䘮為之命龜則輕於眂髙命龜黃氏曰亦大卜専職鄭鍔曰卜龜之法有陳龜有貞龜有涖卜有命龜有眂髙有作龜凡六節事逸者尊者為之事勞者卑者任之陳氏曰大卜或作或命或貞或陳其事不一䘮祭輕於大貞則命龜大遷大師輕於䘮祭則貞龜凡旅則陳龜而已攷之儀禮卜人奠龜宗人視髙及坐命龜而後卜人坐作龜然則大卜於大祭祀凡䘮事命之而不作則作者其屬也國太貞作之而不命則命者宗伯也貞龜則正之於卜位而不親命也陳龜則陳之於饌所而不卜也卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆鄭康成曰開開出其占書經兆百二十體此言四兆者分之為四部若易之二篇書金縢曰啓籥見書是謂與其云方功義弓之名未聞鄭鍔曰方兆者占四方之事漢武帝發易占知神馬從西北來非占四方之事乎薛氏曰以意推之麗於形者方也謂之方兆則言其上下陰陽之勢功兆者占立功之事楚司馬子魚卜戰令龜曰魴也以其屬死之楚師繼之尚大克之吉非立功之事乎薛氏曰以力興造者功也謂之功兆則言其廢興成敗之理義兆者占行義之事南蒯筮得黃裳元吉惠伯曰忠信之事則可不然必敗非占行義之事乎薛氏曰度其宜者義也謂之義兆則言其吉凶禍福之宜弓兆者弓有射意故後世有射覆之法東方朔射守宫有䟦䟦縁壁之語非為射覆之事乎薛氏曰能弛張者弓也謂之弓兆則言其曲折長短之象黃氏曰卜師揚火作龜開龜之四兆正謂灼龜其兆有四方功義弓璺坼之象龜筴傳首足俯仰開跲盖其餘法或曰注䟽家謂卜用龜之腹骨骨近足者其部髙春灼後左夏灼前左秋灼前右冬灼後右故謂之四兆然不知方功義弓其義當何如開占書疑若為占人之職辨龜以上下左右陰陽鄭説非每龜皆有左右陰陽持龜必當順其體凡卜事眡髙鄭鍔曰凡卜必以龜骨可灼之髙處眡於涖卜之人王昭禹曰大卜尊於卜師故國大貞大祭祀眡髙卜師卑於大卜故凡卜事視髙以尊者其事略卑者其事繁揚火以作龜致其墨王昭禹曰揚如火烈具揚之揚謂熾其火李嘉㑹曰揚火令菙氏揚其火爇灼之以明其兆墨謂兆廣之大小賈氏曰案占人注云墨兆廣也墨大坼明則逄吉坼稱明墨稱大今鄭云爇灼之明其兆以解墨者彼各偏據一邊而言其實墨大兼明乃可得吉故以明解墨劉執中曰兆之體不過五行之氣因燋而成者其變則旁為兆微而不可以不辨故致其墨食則見而可辨書曰我乃卜澗水東􅈆水西惟洛食即此也凡卜辨龜之上下左右陰陽鄭康成曰所卜者當各用其龜上仰者下俯者左左倪右右倪陰後弇陽前弇以授命龜者而詔相之項氏曰凡龜之上下左右陰陽不同即後六龜辨其名物各從其所當用以授命龜之人鄭康成曰大祭祀䘮事大卜命龜則大貞小宗伯命龜其他卜師命龜卜人作龜則亦辨龜以授卜師又詔相其命辭及其禮劉執中曰命龜者大卜必順而執之然後即而卜之故辨上下以授大卜而詔相之鄭鍔曰命龜之人各因其龜為之辭詔之以言辭相其禮儀辭必正禮必誠則求於鬼神而吉凶審矣龜人中士二人府二人史二人工四人胥四人徒四十人鄭康成曰工取龜攻龜掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之項氏曰物色也色即物體即俯仰之形狀李嘉㑹曰龜不一類以類言之則曰屬其屬既辨而名物可察鄭鍔曰龜以決疑而天地四方所生各有名有物茍不知其名其色以别異之則卜師何從辨之以授命龜者乎六龜之名曰靈曰繹曰果曰靁曰獵曰若攷先儒説謂行而首俯者曰天龜首仰者曰地龜甲長前弇者曰果後弇者曰靁首之左倪者曰南右倪者曰北至論其名有所屬之意則不得而攷以理推之天龜曰靈以見降而交乎地道之意地龜曰繹地道無成而代有終以見繼續不絶之意果或以為羸露之名其形前長而後羸東方物始生決於進也故有果決之意獵或以為田獵之義謂自後而逐為獵南方物寖長故有獵等之意雷陰物而動乎陽西方陰也其龜宜從乎陰首左倪則去陰從陽故爾雅以左倪之龜為不類謂其陰而不類乎陰若順也北方陰其龜右則尚乎陰以陰向陰可謂順之至凡此六龜上下四方其色不同天𤣥而地黃東青而西白南赤而北黒非謂其身之色也記曰青黒縁天子之寳龜也公羊曰龜青純何休以為龜甲􅏋青也千嵗之龜青􅏋然則六龜之色盖亦視其􅏋而已乃若其體不同則有俯有仰有左有右有前有後也曰俯仰左右者以其首言之曰前曰後者以其甲言之曰𤣥黃青赤白黒者以其􅏋言之非龜人孰能辨之哉劉執中曰命名以其形則經以其形相類者為之屬歟易稱錫以十朋之龜爾雅曰神龜靈龜攝龜寳龜文龜筮龜山龜澤龜水龜火龜以為十朋豈亦其屬哉凡取龜用秋時攻龜用春時鄭康成曰秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也黃氏曰物之精華春時皆發見於外鄭鍔曰龜以甲為用甲不堅則無以受鑚灼之火秋則陰用事而堅於是時而取之其甲堅矣脫其筒則不能無傷生之害春則陽用事而物解於是時而攻之其甲坼矣順時而取之可以為鑚灼之用順時而攻之又以存不忍之心各以其物入于龜室賈氏曰物色也鄭鍔曰六龜所藏宜各異室攻其甲矣各入于室以俟異用不可雜也李嘉㑹曰如卜立君當用天龜卜大封當用地龜四時小事之卜順時而各用其龜宜也賈氏曰以蓍龜嵗易秋取春攻訖即欲易去前龜也若夫寳龜非常用之龜不嵗易上春釁龜鄭康成曰上春者夏正建寅之月月令孟冬大史釁祠龜筴相互矣秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳鄭鍔曰至寳之物神或憑依及上春則殺牲以血塗之既以祓其不祥且以神之也天府上春釁寳器及寳鎮釁龜必用上春者亦視為國寳也祭祀先卜鄭鍔曰釁龜之時追報古昔首為龜卜之事以教人者而祭祀之民不知避凶趨吉以犯於患害者多矣有智者出因神物而教之使前知吉凶其仁逺矣烏可忘其功而不報乎然地曰祭天曰祀兼稱祭祀以龜卜之事通天地盖尊之也祭先牧祭先嗇皆不兼言祀意可知也鄭司農曰祭祀先卜者卜其日與牲易氏曰先卜謂前期以卜李嘉會曰先卜所以一人心於至敬若有祭祀則奉龜以往旅亦如之䘮亦如之鄭康成曰奉猶送也送之於所當卜鄭鍔曰若有祭祀與大旅之事莫不有卜或卜日或卜牲皆奉龜而往以待用也菙氏下士二人史一人徒八人鄭康成曰燋焌用荆菙之類鄭鍔曰燋契之狀如捶故名曰菙氏捶與菙一也掌共燋契以待卜事王昭禹曰燋即莊子所謂爝火之爝灼龜之木也契即詩所謂爰契我龜之契開龜之鑿也卜則用燋以灼龜鑿以開龜菙人則共之以待事也鄭鍔曰燋契者合衆荆以為火炬之名聶崇義曰卜人先奠龜于西塾上南首有席楚焞置于燋在龜東注云楚荆也荆焞所以鑚灼龜者燋炬也所以然火者也凡卜以明火爇燋遂龡其焌契以授十師遂役之杜氏曰明火以陽燧取火於日王昭禹曰火生於木縁物為氣古人或取於榆栁或取於棗杏或取於槐檀或取於桑柘隨所取而得之非不明也然非明之至非不潔也然非潔之至唯日為陽精之純取於陽精則為至明於精之純則為至潔唯其明潔之至然後可以鑚精􅀝神相知休咎爇燒也用所取之明火以燒灼龜之木契之銳頭謂之焌曲禮曰進戈者前其鐏盖以契之銳頭火吹之其頭若戈鐏焉故曰遂吹其焌契焌契既燃乃授卜師揚火作龜以致其墨菙氏因而賛相其事為卜師之所役占人下士八人府一人史二人徒八人鄭康成曰占蓍龜之卦兆吉凶掌占龜以八簭占八頌以八卦占簭之八故以眡吉凶易氏曰龜有頌筮有故八卦即上經三易之體李嘉㑹曰六十四卦皆本於乾坤艮巽坎離兌震之八卦故曰八卦八頌即上經八命之頌八故即上經八事之故以筮占頌以卦占筮然後兩眡其從違而斷吉凶鄭鍔曰卜筮各立一官占人専掌占龜筮人専掌占筮各不相干獻公立驪姬卜人知其不可從長之言有謂而發豈曰専以龜為斷以八筮占八頌事有先以蓍而筮者又占之於龜兆之頌也以八卦占筮之八故事有先用龜以卜者又占之於筮之辭也筮有九此言八筮盖所筮之八故事曰征象與謀果至雨瘳謂之八筮亦謂之八故此因八事之故乃有此八筮乃占於頌頌有千二百以八頌為占盖所筮之八事有偶與八頌相符者則從而占於千有二百中之八頌至於用龜以卜既成八卦又參之於筮以占之其所占者乃此八故舍此八故之外不參以筮故曰以八卦占筮之八故然則占人既用卜又參用筮愚案頌者命龜之辭故者命筮之辭緫言之即邦事作龜八命之事古者有大事先筮後卜既卜之八筮復舉已筮之數斷之以龜則曰頌既得之於龜復舉龜所應之卦參酌夫初焉之筮始之以數終之以理此龜筮通占之説若夫筮自有九筮則是從筮而不卜之事與此不同凡卜簭君占體大夫占色史占墨卜人占坼賈氏曰此已下皆據卜言兼云筮者凡卜皆先筮故連言之項氏曰凡卜筮者既筮而後卜是卜其所筮王昭禹曰卜以龜筮以蓍占體占色占墨占坼皆占龜而曰凡卜筮則筮亦占體也詩曰爾卜爾筮體無咎言筮占體於此可見鄭康成曰體兆象也賈氏曰謂金木水火土五種之兆兆之墨縱橫其形體象似金木水火土凡卜欲作龜之時灼龜之四足依四時而灼之其兆直上向背者為木兆直下向足者為水兆邪向背者為火兆邪向下者為金兆橫者為土兆是兆象劉執中曰體謂龜兆五行之正體與卜之時相生相尅有體有王吉凶可知鄭康成曰色兆氣也賈氏曰就兆中視其色氣似有雨及雨止之等是為色鄭鍔曰曰雨曰霽曰蒙曰驛曰克之類是謂色劉執中曰色謂灼龜既兆以成體又色以示象亦與五行四時相為興廢墨兆廣賈氏曰據兆之正璺處為兆廣劉執中曰墨謂兆璺至微可悉辨必食以墨則史得以傳於幣也坼兆璺賈氏曰就正墨旁有竒璺罅者為兆璺劉執中曰坼謂兆之璺坼有首尾有陰陽有蒙似而非有非而是卜人不可不斷其吉凶體有吉凶色有善惡墨有大小坼有微明凡卜象吉色善墨大坼明則逢吉劉執中曰四者共一卦鄭鍔曰凡卜君與大夫卜史共涖其事左傳載齊將伐魯宣公卜之惠伯令龜卜楚丘占之以是知君與大夫卜史俱在然君尊大夫卑卜史又卑其所占者宜有小大詳略君占其大臣占其小禮所當然所以各占其一而君視其大體周公為武王卜曰體王其罔害是也昔漢文帝自代來卜得大橫繇曰大橫庚庚余為天王夏啓以光大橫者龜文之正橫是其體也橫為土文帝有土之象然則君占體亦君之吉凶係於其體色則兆之氣色有體然後有色大夫次君宜視墨之色史又次於大夫故占其墨卜人又次於史故占其坼太史之職大祭祀與執事卜日先儒謂當卜者君與大夫親臨之史掌書卜人掌作龜故雖卜他事而君與大夫史十皆與其休咎觀齊將伐魯之事宣公卜之惠伯令龜卜楚丘占之曰齊侯將不及期君亦不見令龜有咎卜齊伐魯知先公之死惠伯之有咎則是職主其占其身之吉凶亦係乎是然用龜以占有坼有墨有色有體可用以為占若夫筮則用蓍安得有此乃言凡卜筮者盖筮既成卦則有卦體可占經每言卜必兼筮以為言殆指此而已易氏曰凡國之卜事君無親涖之文而執事者咸與焉其次則有大夫之占春官大史大卜皆下大夫而此經自有卜史之占則非此之大夫此大夫次於君其上大夫卿如大宰大宗伯大司馬之莅卜者歟其次小宗伯肆師亦以大夫涖卜此大夫所以占色也其次又有史與卜人之占此史所以占墨卜人所以占坼也王氏曰龜灼之而坼坼而後墨與色可知卜人先占坼史占墨次之大夫占色又次之衆占備焉而後君占體以㫁吉凶事之序也先言占體則以尊卑之序言之凡卜簭既事則繋幣以比其命鄭鍔曰卜筮必有幣以禮神必有辭以命龜卜筮已畢則取禮神之幣書其占繋之於書鄭康成曰既卜筮史必書其命龜之事及兆於䇿繋其禮神之幣而合藏焉書曰王與大夫盡弁開金縢之書乃得周公所自以為功代武王之説是命龜書嵗終則計其占之中否鄭鍔曰俟嵗終計㑹其所占之中否而進退占人盖卜之所占驗與否常在後故俟嵗終計之李嘉㑹曰攷較優劣乃大卜事何為掌之占人盖占人下士八人所見異同於此専之其事必不茍簭人中士二人府一人史二人徒四人鄭康成曰問蓍曰筮其占易鄭鍔曰天地鬼神之妙不逃乎數聖人通乎幽明之故謂夫可以數知故以百嵗神蓍四十九莖揲之以四因所得之多少以為陰陽之爻名之以卦以斷吉凶筮人者専掌揲蓍之事掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶王昭禹曰易以卦言筮以數言定數然後成卦筮定數於始卦成體於終繋辭曰蓍之徳員而神卦之徳方以知以蓍始於數數無定名卦成於爻爻有定體鄭鍔曰大事先筮後卜筮不吉則止而不卜小事用筮不用卜盖尊龜而不敢渫也大事問於龜則有八命小筮問於筮則有九筮掌三易以辨九筮之名易書也筮事也所筮之事必有其名更咸式目易比祠參環是謂九筮也或謂聖人作三易之書首艮者曰連山首坤者曰歸藏首乾者曰周易書名不同同於九筮何邪盖天下之事不勝其衆其事之當筮者然後決之以蓍所當決者不出乎九事是則萬世之所同何獨三代則同邪更與更化之更同國事有可更張此所以簭更鄭康成曰更謂筮遷都邑也莊子曰周徧曰咸則咸之義為皆易咸卦言感人心則咸之義為感也國家欲有所為將以感人心使之皆然此所以筮咸將有所制作而新其法式此所以筮式目謂事目欲有所為未知事目所當用此所以筮目易謂變易也如旱乾水溢變置社稷如諸侯不朝易置其人之類更者更舊也易則有所變此所以簭易鄭氏曰易謂民衆不説筮所改易比謂與人相親比易曰外比於賢又曰比之匪人不知其人果可與比否此所以筮比祠謂祭祀之時日有吉凶犧牲可用與否此所以筮祠車之參乗或可為御或可為右其人可與參乗否此所以筮參環謂致師將􅀾必使勇者挑之僖十五年秦與晉􅀾卜右慶鄭吉㐮二十四年晉致楚師求御於鄭鄭人卜宛射犬吉宣二年楚許伯御樂伯攝叔為右以致晉師此所以筮環愚案此即是發明注説依字義解去後人疑其未然説見後黃氏曰九筮占法也猶龜之四兆如鄭康成説則與大卜八命何異大卜以八命賛筮兆之占占人以八筮占八頌國之占卜不出此八事者大卜通掌之矣筮人不應重出且其職曰掌三易以辨九筮之名則九筮出於三易其為筮法無疑矣蓍法十有八變而成卦三變為一爻三三九變為内卦又九變為外卦此所謂九筮但每變置名當有其義雖然亦不敢謂必如此薛氏曰鄭氏改巫為筮不可考自巫更以至巫環其義不可知又以意而附㑹其説鑿矣故嘗謂古者占筮之名謂之巫世本曰巫咸作筮商為巫咸後世有神巫季咸盖祖其名筮人九筮之名自巫更巫咸以至巫環或以其人名書或以其法名書非若龜之八命凡國之大事先簭而後卜吕氏曰卜筮不相襲者凡常事卜不吉則不筮筮不吉則不卜也獻公卜納驪姬不吉公曰筮之此相襲者也若大事則先筮而後卜洪範謀及卜筮晉納㐮王得黃帝戰于阪泉之兆又筮之則遇大有之睽皆龜筮並用故知不相襲者非大事黃氏曰以卜協筮不以筮協卜王氏曰兼用卜筮而尊龜焉故後之鄭鍔曰自物有象而後有數觀之則先卜後筮盖自無而之有自人求於鬼神言之則先筮後卜盖自明而之幽也上春相簭鄭康成曰相謂更選擇其蓍蓍龜嵗易者與鄭鍔曰上春釁龜龜可以血塗筮則但相視其可用者擇去其不可用者盖天子之蓍九尺大夫七尺士五尺相而更易其舊凡國事共簭鄭鍔曰國有事而筮則筮人共蓍以筮故曰共筮占夢中士二人史二人徒四人賈氏曰夢是精神所感并日月星辰等是鬼神之事故列職於此陳及之曰設官以占夢疑若不急於政事而先王不廢盖六夢之證於事不有以占之則休咎不能知欲先事為備不可得雖然占夢者史官之一事當以他官占之未必特置也掌其嵗時觀天地之㑹辨陰陽之氣以日月星辰占六夢之吉凶鄭鍔曰大卜掌三夢之法占夢所占者六夢以嵗時觀天地之㑹辨陰陽之氣以日月星辰占之者盖所占人君之夢故設官以三夢之書占六夢非此六者之夢則不占易氏曰嵗十二嵗時每嵗之四時天地之㑹謂建厭之所㑹陰陽之氣謂五行生死休王之氣李嘉㑹曰假如春時木王而水以生木而休火以木王而相土以木尅而死金以火勝而囚以日月之嵗時星辰之次舍參攷互驗則夢之所占協於陰陽嵗時者吉背於陰陽嵗時者凶盖可知矣薛氏曰天地之㑹即日月之㑹日行遲一日行一度則一月而三十度月行速日行十三度有竒計二十七日後而周天又以二日餘而行十三度則與日合宿而為日月㑹故月建子則日月㑹於𤣥枵月建丑則日月㑹於星紀之類是也占夢者以其十二嵗十二時觀之日月所㑹之辰因其升降往來之度而合其吉凶休咎之證春秋昭三十一年十二月辛亥朔日有食之是夜也晉趙簡子夢童子倮而轉以歌旦占諸史墨曰六年及此月也呉其入郢乎終亦弗克入郢必以庚辰所以知其入郢之期者以庚日有變而庚辰日在鶉尾可即日在鶉尾而知之知其必入郢者以庚午之日日始有謫可即日之變氣而占之又知其在六年者以辛亥為水水數生於一而成於六數之成者在六年又知其弗克者以午火庚金火勝金故也其入郢而夢見於晉者以晉楚同盟趙簡子為執政之卿其説若近乎附㑹然皆以日月星辰參諸天地之㑹陰陽之氣必成周占夢之遺法尚可以此考其大略鄭鍔曰占夢之法則以是嵗所夢之四時占之嵗或在寅或在夘或在春或在夏此嵗時之不同三陽交為泰天地不交為否春而下降上騰冬則上下不交是天地之㑹合時在春夏在氣為陽時在秋冬在氣為陰是陰陽之氣各異掌其嵗時觀其㑹辨其氣然後攷之於日月星辰天地有㑹不㑹二氣有合不合故見於所夢其者或驗或不驗既觀天地知其㑹矣又辨十二氣知合矣乃視日月星辰以占決之也一曰正夢二曰噩五各反夢三曰思夢四曰寤夢五曰喜夢六曰懼夢鄭康成曰正夢無所感動平安自夢劉執中曰聖人之性正性也其所謂中者乎聖人之情性其情也其所謂和者乎中心無為以守至正感而有夢正夢也中庸曰至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神是之謂正王昭禹曰非噩非思非喜非懼而神非有所變故曰正杜氏曰噩當為驚愕之愕謂驚愕而夢劉執中曰若文王寢疾而武王夢帝與我九齡王昭禹曰噩如周書噩噩之噩辨察之意謂心有辨而後夢王昭禹曰思夢心有思而後夢劉執中曰若髙宗恭黙思道夢帝賚予良弼鄭康成曰寤夢覺時道之而夢王昭禹曰謂寤時而夢王氏曰如狐􅊳夢太子申生也劉執中曰寤夢若漢文帝時夢黃頭郎推之上天寤而得之喜夢喜悦而夢王昭禹曰謂因有所喜而後夢劉執中曰喜夢若詩稱吉夢維何維熊維羆乃生男子載弄之璋懼夢恐懼而夢王昭禹曰謂有恐懼而夢劉執中曰懼夢者光武夢乘龍登天心動悸懼李嘉㑹曰古者生養有道人有常心而精神夢寐與天地陰陽流通而無間夢熊羆為男之祥夢蛇虺為女之祥魚為嵗豐之兆旟為室家之兆後世人以情遷而正噩思寤喜懼之念不本於正膠擾於生理之不足事物之不經感歎歡戚日不足而夜且叢起不可得而占也季冬聘王夢獻吉夢于王王拜而受之乃舍音釋萌于四方以贈惡夢鄭鍔曰先儒之説於理不通安有一嵗之夢當其時則不占至於季冬始聘而問王焉季冬始問始贈何補於一嵗之吉凶惡夢不善至於是時雖贈亦無及矣聘問也如聘女之聘聘而來也贈送也如贈行之贈贈之使往也季冬之月嵗且更始迎新送舊之時也欲王新嵗常得吉夢故聘之欲王新嵗常無惡夢故贈之如謂人臣有吉夢獻於天子天子拜受亦無是理盖亦迎新之際聘其吉者欲其來故獻于王者曰自今以後夢皆吉而無凶矣王乃拜受亦迎受福之意也舍萌謂取菜之始萌者而祭也夢者禍福之萌用菜萌以祭示去其萌芽之義鄭康成曰夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星廻于天數將幾終于是發幣而問焉若休慶之云爾因獻羣臣之吉夢於王歸美焉詩云牧人乃夢衆維魚矣旐維旟矣此所獻吉夢遂令始難毆疫鄭康成曰令令方相氏也難謂執兵以有難郤也杜氏曰月令季春之月命國儺九門磔禳以畢春氣仲秋之月天子乃儺以逹秋氣季冬之月命有司大儺旁磔出土牛以送寒氣賈氏曰子春雖引三時之儺惟據季冬大儺以此經文承季冬之下是以方相氏亦據季冬大儺而言李嘉㑹曰季春仲秋季冬皆有儺今曰始儺者盖在上始行儺禮則諸侯萬民斯可儺也王昭禹曰既舍萌贈惡夢内無釁然後自外至者可索而毆也鄭鍔曰惡夢已去亦不使疫鬼或乗隙而來凡為厲者一切皆絶則惡夢無自而生矣易氏曰始儺所以迎和氣毆疫所以送戾氣眡祲中士二人史二人徒四人鄭鍔曰祲者陰陽之氣相侵日者人君之表以大明之故能照臨下土若為陰陽之氣所侵其明夷矣明君忌之故設官以視其祲鄭康成曰魯史梓慎云吾見赤黒之祲掌十煇之灋以觀妖祥辨吉凶鄭司農曰煇謂日光氣也王昭禹曰十煇皆日傍之氣而其狀貌不同而妖祥吉凶所繋不可不辨鄭鍔曰觀日之光氣或妖則是為惡之證而辨其為凶有或祥則是為善之證而辨其為吉陰陽侵日則光氣損是故名其法為十煇一曰祲二曰象三曰鑴許規反四曰監五曰闇六曰瞢七曰彌八曰敘九曰隮孑兮反十曰想鄭鍔曰案二鄭解十煇之説其同者六其異者四今取隋書天文志之説以為據一曰祲謂陰陽五色之氣浸淫相侵或曰抱珥背璚之屬如虹而短是也二曰象謂形氣或形象如赤烏夾日以飛之類易氏曰謂陰氣附日而凝結三曰鑴日旁氣刺日形如童子所佩之鑴鄭司農曰謂日旁氣四面反鄉如暈狀四曰監謂雲氣臨在日上易氏曰謂陰氣抱日如冠珥而背璚五曰闇謂日月食或曰光脫也易氏曰謂陰氣藏日方晝而闇六曰瞢不光明也易氏曰謂陰氣蒙蔽日光瞢然七曰彌謂白虹彌天而貫日八曰敘謂氣若山而在日上或曰冠珥背璚重疊次序在于日旁鄭司農曰雲有次序如山在日上劉執中曰片叚成列穿日而有序也易氏曰陰氣不常以敘而至九曰隮謂暈氣鄭司農曰隮者升氣也鄭康成曰隮虹也詩曰朝隮于西易氏曰陰氣自下而升于上十曰想謂氣五色有形想青飢赤兵白䘮黒憂黃熟或曰想思也赤氣為人獸之形可思而知其吉凶鄭司農曰想者煇光也鄭康成曰想者雜氣冇似可形想自周之時已有十名漢儒談災異悉本諸此故隋史載之掌安宅敘降鄭康成曰宅居降下也鄭鍔曰書曰降之百祥曰罔有降格大司樂曰天神皆降保章氏曰降豐凶之祲象凡言降者皆自天而下十煇以觀妖祥本於天所降天降災祥則下民有不安其居者王氏曰人不安宅則眡祲掌以其法為之安宅次序其凶禍所下謂禳移之項氏曰安宅謂有覩妖祥而不安者則眡其吉者而安之其凶者以敘移避書曰降丘宅土則宅謂居一曰下安人之所居上敘天之所降劉執中曰十煇祲日各有次舍而十二州有所直焉故掌安宅其災次敘所降之州使無驚擾保章所謂以詔救政訪序事者是也正嵗則行事鄭鍔曰眡祲掌於正嵗行安宅敘降之事敘述降災之故為禳除之語以去之王昭禹曰以豫告于下劉執中曰行其煇之法以占國事嵗終則弊其事鄭鍔曰正嵗行之嵗終弊之又以驗禳除之有效否弊斷也斷其然否所以驗之也李嘉㑹曰計其占之中否則賞罰黜陟不言可知周禮訂義卷四十二
