body:
  text: 周禮訂義卷三十二宋王與之􅁧小宗伯之職掌建國之神位右社稷左宗廟王昭禹曰大宗伯之所建者禮也小宗伯所以佐大宗伯者特禮之物李嘉㑹曰國之神位禮之粗也如成周營洛相宅攻位必召公經營之周公繼至則達觀于新邑營而已易氏曰别而言之天神獨謂之神合而言之人鬼地􅅘皆神鄭康成曰庫門内雉門外之左右賈氏曰鄭以雉門為中門周人外宗廟故知雉門外庫門内之左右王昭禹曰右陰也而地道尊右社稷地類也故右社稷左陽也人道所尚君子於其親事死如事生故左宗廟鄭鍔曰匠人云左祖右社匠人所掌者營作之事小宗伯所主者辨其方位也兆五帝於四郊鄭康成曰兆為壇之營域鄭鍔曰兆始也求神之道始於此地也求神各從其類故蒼帝東赤帝南白帝西黒帝北各於其郊四郊為四帝之兆黄帝之位學者之論不一余以月令攷之中央土位於季夏之後夏火也火生土其相生也乃所以相繼也然則黄帝之兆其同位於南郊乎説者謂玉用黄琮不用赤璋其位乃同南郊何耶余以為祭之玉當放其色求之之方各因其位王昭禹曰昊天之有上帝猶國之有君五精之君猶四方之諸侯諸侯有君道故皆謂之君五精之君有帝道故皆謂之帝又大宰解曰别而言之謂之五帝合而言之亦謂之上帝陳及之曰鄭氏惑六經緯書謂以為青帝靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黑帝汁光紀者五天也於是以昊天上帝為天皇大帝北辰耀魄寶由是有六天之説後世莫能廢至唐許敬宗始立論非之近世學者亦知其誕大宰云祀五帝則掌百官之誓戒掌次曰祀五帝則張大次小次司服曰祀五帝亦如之大宗伯亦曰以青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方小宗伯亦云兆五帝于四郊則是為迎氣設于四郊之中立五兆所謂五帝者五行之精氣東方青帝南方赤帝西方白帝北方黒帝中央黄帝鄭氏所謂五人帝從祀之説則于義未害蓋本月令之言夫人臣如重黎五行之官尚從祀則以五徳之帝配食于五行精氣或者足歟案鄭氏注大宗伯青圭禮東方等謂蒼精之帝然則此所謂五帝者即鄭氏所注大宗伯之文謂五帝精氣之帝者鄭氏於彼注已是於此五帝之下又别為五帝名則為誕矣四望四類亦如之鄭鍔曰魯有三望之祭或以為分野星及國中山川或以為日月星海攷之書云望于山川惟山川則望而祭之故楚昭王曰三代命祀祭不越望江漢睢漳楚之望也即是論之則四望之為五嶽四鎭四瀆明矣諸侯得祭其境内山川而禮下於天子故望止於三天子有天下祭及於四方故凡名山大川在四方者皆望而祭之四望之祭亦如五帝因其方而為之兆也先儒以四類為日月星辰攷之書云類于上帝惟天神則類而祭之以其神非一故也日出於東月始乎西其類宜於東西司中司命陽也其類宜於南雨師水也其類宜於北先儒以風師亦在西郊恐不然也五行箕星好風箕東方之宿也西則違其方位豈理哉兆山川丘陵墳衍各因其方鄭康成曰順其所在鄭鍔曰五嶽四瀆神之最尊者也此言山川則祭法所謂山林川谷陵能出雲為風雨見怪物皆曰神之山川耳不為兆域惟因其所在之方為其卑也李嘉㑹曰原隰則卑下不祭掌五禮之禁令與其用等鄭司農曰五禮吉凶軍賔嘉易氏曰以吉禮言三代命祭祀不越望淫祀無福逆祀有罰此其所禁也天子祭天地四方嵗徧諸侯方祀嵗徧大夫祭五祀嵗徧此其所令也以賔禮言之變禮易樂為不從改制度衣服為畔此其所禁也朝覲宗遇㑹同為君之禮存覜省聘問為臣之禮此其所令也以軍禮言之非賜弓矢不得征非賜斧鉞不得殺此其所禁也大國三軍次國二軍小國一軍此其所令也以嘉禮言之繫之以姓而弗别綴之以食而弗殊百世昏姻不通此其所禁也男三十而娶女二十而嫁仲春為之㑹男女此其所令也以凶禮言之三年之䘮自天子達或短喪而朞或朝祥暮歌此其所禁也歠粥面深墨顔色之戚哭泣之哀此其所令也禁令施於五禮者不一而足大略如此先言禁令後言用等用等待禁令而後辨云耳用等即輕重隆殺之等見於九儀之命者是已鄭氏曰用等牲器尊卑之差王昭禹曰用等之不同有尊卑焉於是有廟祧之昭穆以辨尊卑有貴賤焉於是有衣服車旗宫室之禁以辨貴賤有親疎焉有三族之别以辨親疎鄭鍔曰禁令用等見於形名度數之間小宗伯掌焉其所不當為者則禁之其所得用者則令之如此則上不得以逼下下不得以􅆫上上下之分定矣禮庫曰春秋之時縱逆祀者有見於臧文仲旅泰山者有見于季氏吉禮廢矣歸仲之賵閉秦之糴凶禮廢矣楚子問鼎於周薛侯爭長於魯賔禮廢矣嘉禮益掃地焉强委禽者亂基於公孫覿用幣者變起於宗婦賜五瑴而虢乃同於晉求百牢而魯乃屈於吳以桑林而享晉侯以肆夏而勞穆叔則婚冠享燕之禮又倒置矣辨廟祧之昭穆黄氏曰太祖一祧二親廟四是為七廟言先王先公之廟祧則廟與祧凡七后稷太祖不遷二祧文武親盡當遷而不遷親廟親盡則遷孔安國王肅以髙祖之父髙祖之祖為二祧此據周公制禮之時必欲備七廟以立天子之制其説是矣鄭康成以文武為二祧此據文武親盡當遷而不遷遂以為二祧其説亦是兩説進退為七廟耳愚案鄭氏之説自為王肅所非先儒多非之已見於傳但王肅以下謂文武二廟不毁其説是矣而謂七廟之外更有文武二廟恐未必然鄭氏謂文武為祧亦不無所謂蓋祭法謂七廟之制太祖與親廟四皆月祭而二祧享嘗乃止此常禮也太祖為始自太祖而下三昭三穆共為七廟至八世則遷去其始為昭者九世則遷去其始為穆者若周以文武之故而不遷且以共王之時論之自穆王上至昭王康王成王為四親廟則文武正在二祧之位至懿王時則文王當遷又至孝王時則武王當遷然二廟不可去故存於二祧之位郤自成王遷去又再遷則去康王以次皆然謂文武二廟為祧者正以居祧位而不可毁故以文武以下遷主藏乎此也若文武以上皆文武之父祖故宜遷藏於后稷之廟文武以下之人不可越文武之廟而入后稷之廟則宜遷于文武之廟以人情論之意其如此恐不應七廟之外又有文武二廟蓋是累世之後但以文武居七廟之數此則王肅所謂文武之廟不遷者也薛氏曰父以明察下曰昭子以敬事上曰穆其制蓋祖廟居中而父昭在左子穆在右始死者昭則毁昭廟始死者穆則毁穆廟昭與昭為列而不嫌乎子加於父穆與穆為列而不嫌乎父屈於子猶之賜爵子與祖齒而不嫌乎卑者先父與孫齒而不嫌乎尊者後猶之祭立尸也子無嫌乎南面而坐父無嫌乎北面而立此昭穆之辨不可易矣王昭禹曰禹不先鯀湯不先契文武不先不窋蓋子雖齊聖不得先其父新鬼雖大不得先其故凡以昭穆所辨其序固如此陸佃曰宗廟有迭毁昭穆則一成而不可易左傳曰文王之昭王季之穆又曰文之昭武之穆此宗廟序之昭穆不可易也冢人掌墓地先王之葬居中以昭穆為左右此葬位之昭穆不可易也司士凡祭祀賜爵呼昭穆而進之祭統凡賜爵昭為一穆為一此賜爵之昭穆不可易也左傳曰合族以食序以昭穆此合食之昭穆不可易也生而賜爵合食死而葬祔皆以世序不可易則廟之昭穆可知矣仲尼燕居嘗禘之禮所以仁昭穆中庸宗廟之禮所以序昭穆左傳宫之竒曰太伯虞仲太王之昭虢仲虢叔王季之穆富辰曰管蔡郕霍文之昭邗晉應韓武之穆晉侯曰曹叔振鐸文之昭先君唐叔武之穆其不易可見也鄭鍔曰宗廟世逺而無辨則昭或為穆穆或為昭而其序亂矣守祧則守廟祧而巳小史則掌辨昭穆之書而已至於廟中之昭穆小宗伯掌建國之神位故當辨之也辨吉凶之五服車旗宫室之禁鄭鍔曰吉服之五者九章七章五章三章一章凶服之五者斬衰齊衰錫衰緦衰疑衰辨其吉服則當服三章者不當僭五當服七章者不敢用九尊卑之序所以明辨其凶服則當斬衰者不敢以錫當緦衰者不敢以疑親疎之情所以當易氏曰自衮冕至希冕皆所以象其徳自斬衰至疑衰皆所以稱其情典命言其命數此則禁其踰於命數李嘉㑹曰言五服及車旗宫室者五服已飾已之尊卑以服而顯在國之飾非車旗宫室無以示等級明制度掌三族之别以辨親疏王昭禹曰人之生上親父下親子而已與之為三以父而親祖以子而親孫是之謂以三為五以祖親曾髙祖以孫親曾𤣥孫是之謂以五為九薛氏曰堯親九族此特掌三族何也三族親之本九族親之盡賈氏曰辨親疏者據已上至髙祖下至𤣥孫旁至緦麻重服曰親輕服曰疏其正室皆謂之門子掌其政令鄭康成曰正室適子將代父當門者王昭禹曰三族巳立則本末斯明尊祖故敬宗敬宗故明嫡正室其嫡也王氏曰以其當室謂之正室以其當門謂之門子王氏詳説曰春秋有公族餘子公行以親疎為言詩有公子公姓公族以久近為言此言門子者以嫡庶為言古人重立嫡天子曰太子諸侯曰世子皆以嫡立三族之别亦皆有嫡子在曲禮則曰孤子當室是以當室名其嫡在文王世子則曰世室守太廟是以世室名其嫡此曰其正室皆謂之門子則其重嫡之意深矣黄氏曰諸子政官故掌役守之事宗伯禮官所掌宗法而已鄭鍔曰别親疎明嫡庶使不得以孽代宗程氏曰宗子之法不立則朝無世臣宗法須是一二鉅公之家立法宗法立則人人各知來處毛六牲辨其名物而頒之于五官使共奉之鄭康成曰毛擇毛也鄭鍔曰牧人於陰陽之祀用騂黝之牲皆毛之小宗伯又毛之者蓋牧人於未用之前擇之以待用小宗伯於欲用之時又毛之以待頒賈氏曰辨其名物者六牲皆有名若馬牛羊犬豕雞物色也皆有毛色若宗廟用騂等是也項氏曰名言其稱物指其形是皆知之也而必使宗伯辨之者蓋所以重其事也鄭鍔曰牛地産則頒于地官雞東方則頒于春官馬羊南方則頒于夏官犬西方則頒于司冦豕北方則頒于司空各從其類以致其義不可以不辨辨其名則春官主木不使奉南方之牲司寇主金不使奉北方之畜辨其物則當用黝者不使用騂當用蒼者不使用黄若夫冢宰至尊不當從卑䙝之役故特頒于五官不及冢宰賈氏曰共奉之者謂充人養之至祭日之旦在廟門之前頒與五官使共奉之助王牽入廟辨六齍之名物與其用使六宫之人共奉之鄭康成曰齍讀為粢六粢謂六穀黍稷稻粱麥苽賈氏曰六穀各有名其色異故云名物鄭鍔曰三農之所生者九穀用以為齍者止於黍稷稻粱麥苽故六者辨之使用當其物物稱其儀也然六牲使五官六齍乃使六宫之人者五官助王六宫之人助后王親牽牲故五官之人共奉其牲后親為齍盛故六宫之人共奉其齍盛牲屬乎陽五官亦陽齍盛屬乎陰六宫亦陰也陰陽之義各有所主故共奉之人亦從其類詩言大夫妻可以共祭祀又言可以奉祭祀指物言之則謂之共指事言之則謂之奉此言共奉非惟共其物又奉其事辨六􅃔之名物以待果將鄭康成曰六􅃔雞􅃔鳥􅃔斚􅃔黄􅃔虎􅃔蜼􅃔項氏曰名六者之名物所實之物鄭鍔曰鬱人言祭祀賓客和鬱鬯以實􅃔則六􅃔之盛鬱鬯蓋將以祼也王昭禹曰司尊􅃔掌六尊六􅃔之位詔其爵辨其用與其實尊􅃔之名物既不同故所用亦異小宗伯所以辨其名物以待用也李嘉㑹曰祼將人主精意所寓行于求神之始施于致饗之盛他日錫諸侯襃有功為王朝盛典豈泛泛賔祭所可同别盛以六􅃔以將其厚意故曰祼將辨六尊之名物以待祭祀賔客鄭司農曰六尊獻尊象尊壺尊著尊大尊山尊鄭鍔曰司尊􅃔言朝獻饋獻用尊則六尊之盛齊酒蓋將以獻也鄭康成曰待者有事則給之鄭鍔曰司尊􅃔辨其用矣小宗伯又辨之蓋尊酌以獻􅃔酌以祼名既不同物亦各異司尊􅃔辨於方用之前小宗伯辨之以待行事之用賈氏曰案司尊􅃔惟祭祀陳􅃔尊不見為賓客陳尊此蓋在廟享賔客時也又鬱人掌祭祀賔客之祼則六􅃔亦為祭祀賔客而上文不言者舉下明上也掌衣服車旗宫室之賞賜鄭鍔曰旌人之功者各從其類是故能安民者賜以車馬能富民者賜以衣服能使民和者賜以朱户易氏曰衣服車旗宫室此皆定制固諸侯之所當得小宗伯為之掌其賞賜者蓋賜國賜則賜官必待王命而後行之否則諸侯有所不敢專書曰車服以庸是衣服以待有功又言惟衣裳在笥則有不可妄予者焉詩曰王錫韓侯淑旂綏章序詩者以為能錫命諸侯則是車旗不可以妄予也詩曰王命召伯定申伯之宅序詩者以為能襃賞申伯是宫室不可以妄予也宜小宗伯之掌其嚴如此掌四時祭祀之序事與其禮鄭鍔曰四時各有祭祀於祭祀之時又有先後所當行之事如卜日而後齋戒既祼而後出迎牲之類皆事之序鄭康成曰序事卜日省牲視滌濯饔爨之事次序之時於序事之中又莫不有禮若國大貞則奉玉帛以詔號王昭禹曰謂以事之大者而卜以貞之鄭司農曰謂卜立君卜大封以問知吉凶大卜曰凡國大貞天府曰季冬陳玉以貞來嵗之媺惡鄭鍔曰卜大事必用玉帛以禮神詔大祝使為玉幣之美名玉曰嘉玉幣曰量幣備其物嘉其名致誠盡禮於神大祭祀省牲眡滌濯易氏曰省牲則預擇其純項氏曰省牲則省充人之所繋眡滌濯則預致其潔項氏曰滌濯則無所不用以致其潔也詩云泂酌彼行潦可以灌溉賈氏曰省牲眡滌濯省鑊與大宗伯文同謂佐大宗伯祭之日逆齍省鑊鄭鍔曰祭祀之齍盛其始饎人炊之舎人實之及其祭則小宗伯逆之於廟門之外授大宗伯大宗伯授内人内人授王后鄭康成曰省鑊視亨腥熟項氏曰逆齍則逆􅐪人之所共以入簠簋省鑊則省亨人之所具項氏曰牲與滌濯皆備於將祭之先齍與鑊亨乃見於臨祭之日所以有先後之間告時于王告備于王鄭鍔曰告王以行禮之時行禮有早晚時至則當行事及行禮時畢乃告王以行禮之備禮以時為大殷人祭其闇周人祭其陽季氏之逮闇而祭則失禮矣以雞人之呼旦觀之則祭之時宜早可不告王以其時乎樂師告備則告樂備為樂事之終肆師告備則告備為器陳之具此言告備當是告行禮之畢也易氏曰用玉與鬯禮之大惟大宗伯得涖其事告時告備禮之煩乃小宗伯之專職凡祭祀賔客以時將瓚祼鄭康成曰將送也猶奉也祭祀以時奉而授王賔客以時奉而授宗伯天子圭瓚諸侯璋瓚王氏詳説曰鄭氏謂祭祀以時奉而授王賔客以時奉而授宗伯可謂深達禮意矣昭禹所引皆失也且大宰所謂賛玉幣爵者祀五帝也祀五帝則不用祼所謂朝覲之賛玉爵者祼用玉瓚飲用玉爵君有飲臣之禮無祼臣之禮所以再祼一祼皆大宗伯攝而代之况大宰所賛初無祼瓚二字而强以玉爵為祼瓉是疎於禮學也且内宰之所謂后祼獻則賛與夫賔客之祼獻皆賛者蓋内宰以下大夫為之后宫官之長也后之祼獻自有内宰賛之若后不與則又有大宗伯攝之何預於小宗伯哉况其上文云告時于王告備于王繼之以時祼瓚亦初無后一字而强以為授后是疎於禮學也不可不辨李嘉㑹曰將之以時不緩不驟詔相祭祀之小禮凡大禮佐大宗伯鄭鍔曰祭祀有小大於祭祀之中所行之禮又有小大禮之小者小宗伯詔相之禮之大者大宗伯專之故特佐助焉賈公彦以為王有故不親行事使臣攝祭則為小禮余以為其説亦非經言詔相祭祀之小禮則非以羣臣攝祭為小禮黄氏曰宗伯詔相大禮如卜日視滌濯涖玉鬯省牲鑊奉玉齍詔大號皆是其他則小禮如逆齍省鑊告時告備之屬易氏曰大宗伯言詔相大禮者見於省牲鑊奉玉齍之後則此文亦當繼於告時告備之下以至下經言小祭祀掌事如大宗伯之禮亦當繼於此文之下如此方見禮官之次序賜卿大夫士爵則儐鄭康成曰賜猶命也儐之如命諸侯之儀春秋文元年天王使毛伯來錫公命傳曰錫者何賜也命者何加我服也鄭鍔曰古人賜爵者必於廟示不敢專也將賜以爵必儐而進之使受䇿命於前陳君舉曰諸侯尊故大宗伯儐卿大夫士卑故小宗伯儐小祭祀掌事如大宗伯之禮王昭禹曰大宗伯祀大神􅅘帥執事而卜日以至詔大號小祭祀小宗伯之所掌故其事亦如之鄭鍔曰小宗伯所掌之事皆依於大宗伯以為式蓋祭有小大禮之次序則一而已大賔客受其將幣之齎鄭鍔曰賔客見王必用束帛加璧以為禮是謂將幣行人之官所謂將幣者三享是也享多儀儀不及物君子以為不享故有見王之幣及有將幣之齎齎財也各奉國之所有者以為庭實故齎所有之物以將其幣諸侯奉之以效享上之誠天子受之以見兼容之徳小宗伯辨尊􅂜以待之將瓉祼以禮之典司賔禮其施之既盡則受其所報宜矣若大師則帥有司而立軍社奉主車鄭鍔曰古者大師則先有事於社與廟然後載社主與遷廟之主以行不用命戮于社故載社主將以行戮用命賞于祖故載遷廟之主將以行賞小宗伯掌社稷宗廟之禮宜載以行乃言立者蓋社本不在軍因用師始立之立者出於一時之故廟主為尊載之以行不敢忽也故言奉奉以言其肅欽之至帥有司者蓋帥大祝也大祝職曰大師宜于社造于祖設軍社國將有事于四望及軍歸獻于社則前祝故知此所謂有司為大祝明矣若軍將有事則與祭有司將事于四望鄭司農曰謂軍祭表禡軍社之屬小宗伯與其祭事鄭鍔曰軍將有事則與祭者主帥奉祭小宗伯以職當立之奉之故當與也小宗伯已與祭於軍中則四望之祭必遣其所屬之有司徃行事焉理之宜也先鄭知此意故讀與祭以上為絶句康成以與祭連有司以下讀之恐不成文理戰必禱於神欲氣勢之增倍而四望又山川之尤大者國家所賴以為阻固是以將戰則禱焉欲其為兵之捍蔽黄氏曰春秋有事于太廟有事祭也軍將有事謂將以軍旅有事干鬼神也祭有司主祭禱者也與如字祭禱自有主者小宗伯與之偕軍事重將事于四望謂將其事以徃也兩將字各義若大甸則帥有司而饁獸于郊遂頒禽鄭康成曰甸讀曰田有司大司馬之屬饁饋也以禽饋四方之神於郊郊有羣神之兆鄭鍔曰有司一而巳大師言帥有司大甸亦帥有司乃别言之蓋大師之帥者大祝也以軍社及主車大祝所立奉故也左傳云軍行祓社釁鼓祝奉以從是也大甸之帥者司馬之屬以司馬言徒弊致禽饁獸于郊至於有司將事于四望繼於軍將有事之下則其有司亦指大祝明矣易氏曰大甸者賈氏以為四時之田獵非也大司馬春蒐夏苗秋獮皆無饁獸之文所謂饁獸頒禽特冬狩而已仲冬大閲其田謂之狩禽𫉬為甚多凡四郊之中有五帝四望四類之位以獸薦于神位謂之饁饁訖而後頒禽此豈四時之所常有者耶王昭禹曰獸於禽為大故饁之禽於獸為小故頒之蓋餉謂之饁頒則分之而已且田以簡衆則衆所不欲田以𫉬取禽獸為得焉則衆所同欲先王以所不欲者寓之於所欲於其田也大獸公之小禽私之上殺者以為乾豆次殺者以為賔客下殺者以充君庖而面傷翦毛羽不成其為禽者不以獻還舎于郊饁獸出而頒禽與獸皆不以獻者也以此簡衆則得其同欲而輕其所不欲鄭康成曰頒禽謂以予羣臣詩傳曰禽雖多擇取三十焉其餘以予大夫士以習射於澤宮而分之鄭鍔曰獻神則用其大頒人則用其小尊神之義也既饁獸于神乃頒之于人則又先神而後人也大烖及執事禱祠于上下神􅅘鄭康成曰執事大祝及男女巫求福曰禱得求曰祠讄曰禱爾于上下神祗鄭司農曰小宗伯與執事共禱祠王崩大肆以秬鬯渳鄭司農曰大肆大浴也賈氏曰死者人所惡故以秬鬯浴尸使之香也及執事涖大斂小斂帥異族而佐鄭康成曰執事大祝之屬涖臨也親斂者蓋事官之屬為之喪大記曰小斂衣十九稱君大夫士一也大斂君百稱大夫五十稱士三十稱異族佐斂疏者可以相助縣衰冠之式于路門之外鄭康成曰制色宜齊同黄氏曰喪服輕重宗法著焉故小宗伯掌之及執事眡葬獻器遂哭之鄭康成曰執事蓋梓匠之屬至將葬獻明器之材又獻素獻成皆於殯門外賈氏曰此謂既殯之後事故檀弓云既殯旬而布材與明器士喪禮云獻材于殯門外西面北上請主人徧視之如哭椁獻素獻成亦如之注云形法定為素飾治畢為成鄭康成曰王不親哭有官代之賈氏曰獻明器之時小宗伯哭之哀其生死異也王昭禹曰反而亡焉始於此其生也以禮詔相之故其葬也則感而哭焉卜葬兆甫竁亦如之鄭康成曰兆墓塋域甫始也杜子春讀竁為毳皆謂葬穿壙也既葬詔相喪祭之禮王昭禹曰既葬而祭謂之虞虞死者精神無所歸而祭之也虞祭既畢明日祔于祖父故有祔祭祔者以祔祖屬于廟也成葬而祭墓為位鄭康成曰成葬丘巳封也天子之冢蓋不一日而畢位壇位也先祖形體托於此地祀其神以安之冢人職曰大喪既有日請度甫竁遂為之尸易氏曰小宗伯大喪之禮詳於大宗伯大宗伯春官之長大喪則為上相而巳其禮文次序專屬於小宗伯以建國神位之官而掌此數者之事則其禮嚴矣凡王之㑹同軍旅甸役之禱祠肄儀為位鄭康成曰肄習也賈氏曰禱祠皆須豫習威儀當習儀之時則小宗伯為位鄭鍔曰吉凶悔吝皆生乎動㑹同軍旅甸役之時雖至尊之行百神受職亦必有禱祠蓋以其動也將以交神不可不肅故必習肄其儀而又為王位以習之易氏曰為位者國之神位㑹同軍旅田役禍烖之禱祠乃國家不常之儀故肄儀而後為位天地大烖而類社稷宗廟則有常儀也為位而已國有禍烖則亦如之王昭禹曰禍烖禱祠亦肄儀為位也凡天地之大烖類社稷宗廟則為位王昭禹曰大烖若日月食山冢崩皆非常之變則合聚社稷宗廟之神而禱祠焉故曰類鄭鍔曰天神曰類而社稷宗廟亦曰類者蓋當變故之祭依倣其正禮聚一處以禱祠故以類言之凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀賈氏曰凡言大禮者王親為之小禮者羣臣攝為之鄭鍔曰國之大禮大宗伯之所掌小宗伯姑佐之而已至於小禮則專掌焉其事雖小揖遜周旋之儀則未嘗不同故如大宗伯之儀謂之禮又謂之儀者蓋禮本也儀末也左傳趙簡子問於大叔大叔云是儀也非禮也謂其不同故耳易氏曰上經言大禮小禮則祭祀之禮而巳此終篇則縂結之指五禮之大小言也周禮訂義卷三十二
