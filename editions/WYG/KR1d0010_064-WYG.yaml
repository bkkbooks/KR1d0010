body:
  text: 周禮訂義卷六十四宋王與之撰司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人鄭司農曰圜謂圜土也圜土謂獄城也今獄城圜職中言凡圜土之刑人也以此知圜謂圜土也鄭鍔曰矩屬西方規屬東方規之圜屬東而主仁也先王之於獄求所以生之故為獄則圜其城用仁心為主也薛平仲曰乾為圜則圜者天道之所以仁也夫以罷民之害人者吾為圜土以收敎之則人心轉移之間而善惡易位矣掌收教罷民鄭鍔曰拘之圜土而役之所以收之也勞之苦之使其善心自生所以敎之也劉執中曰嘉石平罷民其罪輕不入于圜土也圜土敎罷民其罪重其役之日月深日則役之夜則收之俾民改情而復性然後舍之為敎亦大矣故曰收敎焉故中士六人下士十有二人徒百有六十人分部而收敎之也項氏曰司寇掌者大故曰聚司圜職者小故曰收凡害人者弗使冠飾而加明刑焉任之以事而收敎之能改者上罪三年而舎中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒鄭司農曰罷民謂惡人不從化為百姓所患苦而未入五刑者故曰凡害人者鄭康成曰弗使冠飾者著墨幪若古之象刑與舎釋之也賈氏曰孝經緯云五帝畫象三王肉刑畫者土罪墨象赭衣雜屨中罪赭衣雜屨下罪雜屨而已鄭鍔曰彼既害人則不知禮矣故弗使冠飾而被辱明書其罪於背所以告人使知其以是罪而至於如此也夜收之圜土晝任以勞役是收而敎之仁也能改者上罪三年而舎中罪二年而舍下罪一年而舍雖量罪之輕重為久近之期而舎之又必待其能改過自新為良民然後舍也其不能改而出圜土者則殺之不能改過又自竄焉其殺冝也雖年滿而出者猶不齒三年甚辱之也凡圜土之刑人也不虧體其罰人也不虧財鄭康成曰圜土所收教者過失害人已麗於法者鄭鍔曰圜土之刑只加以明刑恥之故不至於虧體圜土之罰只加以職事勞之故不至於虧財易氏曰二者雖曰刑罰而非刑罰之正乃所以止刑罰者也司刑言刑虧其體者也職金言罰虧其財者也掌囚下士十有二人府六人史十有二人徒百有二十人鄭康成曰囚拘也主拘繫當刑殺之者掌守盜賊凡囚者鄭鍔曰此官拘繫當刑殺之人然特言掌守盜賊者盖囚雖在所掌而盜賊為難馭於羣囚之中又當守之其事尤嚴故也鄭康成曰凡囚者謂非盜賊自以他罪拘者也上罪梏古毒反拲姜奉反而桎中罪桎之實反梏下罪梏賈氏曰此謂五刑罪人古者五刑不入圜土故使身居三木掌囚守之土氏曰梏在脰桎在足拲在手左氏傳子蕩以弓梏華弱于朝則梏在脰明矣劉氏曰梏者校也在頭曰梏謂之梏者以其在首猶牛馬梏者鄭鍔曰凡囚有上中下之罪凡刑有梏拲桎之殊罪有輕重故三木或備或不備上罪三者皆全中罪二下罪一亦理之宜也王之同族拲有爵者桎以待弊罪鄭鍔曰王之同族有罪者親親之恩以輕為貴故但拲其手而已有爵者冝次於王族故加之以桎也拲則兩手共一木桎則两足各一木故桎比拲為稍重然罪未斷之前皆不可去其拲與桎待斷然後去故曰以待弊罪及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之鄭康成曰告刑于王告王以今日當行刑及所刑姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟鄭鍔曰適朝士者盖以朝士掌外朝王與公卿聽獄訟之所恐或又得而審詳焉重人命之至也適朝士矣以為無可疑則加以明梏於梏上明書其所犯使見者咸知其罪適於市而殺之所以與衆棄之也注謂奉而適朝然後朝士加明梏以士字屬下讀以文考之適朝士與適甸師之文相對則疑其不當下屬劉執中曰士士師也鄭康成曰士卿士也奉而適朝者重刑為王欲有所赦且當以付士凡有爵者與王之同族奉而適甸師氏以待刑殺鄭鍔曰適甸師氏者盖以甸師掌耕藉田以事宗廟藏穀之所隠也旣適甸師則以待刑殺之官来於此行刑殺之事不梏而適市乃所以隠之也有爵者隠之所以尊國體王族亦隠之所謂不與國人慮兄弟此尊尊親親之道也李氏曰先王之時雖同族雖有爵其犯法當刑與庶民無異法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千止為民也厚賞則貴者先得之刑罰則賤者先當上不愧於下下不平於上豈適治之道耶故王者不辨親疎不異貴賤一致於法其所以不肆諸市朝而適甸師氏者為其有恥毋使人見之也文王世子曰公族之罪雖親不以犯有司正術也所以體異姓也刑于隠者不與國人慮兄弟也掌戮下士二人史一人徒十有二人鄭康成曰戮猶辱也旣斬殺又辱之掌斬殺賊諜而搏之鄭鍔曰為之諜者則與賊窺伺乎國家之隙以圖危社稷其罪不可赦也故大者斬之小者殺之鄭康成曰斬以鈇鉞若今要斬殺以刀刃若今弃市王昭禹曰斬殺皆弃人之刑各稱其罪且從而搏之搏與膊同謂磔裂其尸以示人也觀左傳載齊侯圍龍頃公之嬖人盧蒲就魁門焉龍人殺而膊諸城上是磔裂為膊也劉執中曰為賊諜而情有重輕故或斬或殺雖有斬殺而又摶而磔之於城上以懲夫將來者然則賊害於國者情與反間同非盜於財而殺人民者也凡殺其親者焚之殺王之親者辜之鄭鍔曰凡殺其五服之親者不復知有親親之恩夷狄則然也故焚其尸視之如夷狄焉殺王之親者不復知有尊尊之義禽獸則然也故辜其尸視之如禽獸焉王昭禹曰焚以火者不存其形鄭康成曰焚燒也易曰焚如死如棄如辜以磔者不全其體鄭康成曰辜之言枯也謂磔也凡殺人者踣皮北反諸市肆之三日刑盜于市黄氏曰凡殺人者今所謂謀故鬭殺鄭康成曰踣僵尸也劉氏曰謂暴露而不盖覆也肆猶申也陳也賈氏曰除上三者之外皆陳尸於市肆之凡三日也鄭鍔曰盜則不然死罪踣之於市或劓或刖或墨亦皆就市刑之使人知盜之不可為而不敢為也王氏曰人之犯刑皆以趨利趨利犯刑唯盜而已故盗言刖于市凡罪之麗於灋者亦如之黄氏曰謂犯他法宫刖劓墨皆刑於市也揭盜于上鄭言罪惡莫大焉是也鄭鍔曰罪之附麗於法法所當刑則亦行法於市使衆見之故曰亦如之唯王之同族與有爵者殺之于甸師氏王昭禹曰此句旣言於掌囚此復言之者掌囚奉其有罪者適甸師氏而待刑殺掌戮正以殺之為事凡軍旅田役斬殺刑戮亦如之黄氏曰軍旅戮于社而王之同族與有爵者亦於屏處鄭以戮為膊焚辜肆非也即下所謂髠者全其體而戮辱之也古刑戮字皆合輕重稱之鄭鍔曰軍旅田役衆庶所聚不示以嚴則必無所畏故或斬殺刑戮亦有焚之辜之踣之肆之之事故曰亦如之墨者使守門劓者使守闗宫者使守内刖者使守囿髠苦門反者使守積子賜反鄭鍔曰先王於人雖有罪已刑苟有可用未嘗終棄之墨者但黥其額劓者但截其鼻何妨於禁禦耶故或使守門賈氏曰此即閽人掌守中門之禁令者也或使守闗闗謂境上之十二門王城之門也劓比墨為重而截鼻則貌醜亦以其罪之輕重故墨者近而劓者逺也宫則人道絶故使守内賈氏曰此即寺人之類守正内五人之等也刖者不良於行囿游之獸監視牧食不欲其奔逸故使之守囿也五刑之中無髠刑此有髠者康成謂公族無宫刑惡翦其類髠其頭而已公族之有死刑者隠之於甸師氏則其髠者亦可耻冝用於至隠之處所以使守積積謂委積之物其積亦在隠處故也司農謂髠當作完言但居作三年不虧體者也或謂公家不畜刑人觀此則刑人未嘗不見畜特為君者不近之而已閽弑吳子餘祭春秋譏其近刑人非謂不畜之也司隷中士二人下士十有二人府五人史十人胥二十人徒二百人鄭鍔曰羣隷之别有五曰罪閩蠻夷貉也除罪隷之外四夷皆夷翟之人故又謂之四翟之隷有盜賊則搏之國中有辱事則役之百官所任之器則積之囚執人之事則囚之執之祭祀賔客喪紀有煩辱之事則役之無乃後世廂軍之類歟古者取之罪人夷狄以用之惡其聚羣而無統也故設司隷之官以掌其法辨其服色之物而掌其政令以統治之冝矣然王宫之嚴則使之守王舍於野外則守其厲禁又使之各服其邦之服而執其邦之兵以為守衞則其人雖賤而所用為甚重矣此司隷之權所以尤重焉故由漢而後遂置司隷校尉掌刺舉之任武帝使之持節捕巫蠱督大姦猾其重至於專道而行專席而坐秩比二千石其任雄劇摧辱宰相有如鮑宣者盖始於此五隷各百二十人此其正貟也薛平仲曰五隷之貟皆百有二十人而司隷之徒則二百人盖君令出於司隷其徒不能以不繁力役責之司隷其貟不可以不定鄭節卿曰兵衞掌於宫正而王之親兵與四夷之兵則掌於虎賁與司隷漢以南北軍相制而國朝以皇城司殿前司相維持大抵皆周人之遺意掌五隷之灋辨其物而掌其政令鄭康成曰五隷謂罪隷四翟之隷也物衣服兵器之屬帥其民而搏盜賊鄭康成曰民五隷之民賈氏曰序官五隷皆百二十貟貟外皆是民故云五隷之民鄭鍔曰盜竊之徒間有作而力不能搏則合其民以共搏之王昭禹曰未擭者則司隷帥民摶之役國中之辱事為百官積任器凡囚執人之事王昭禹曰國中汚辱之事則司隷帥而役之五隷之屬各有百二十人則足以共其事鄭司農曰百官所當任持之器物此官主為積聚之也鄭康成曰任猶用也李嘉㑹曰囚執人之事若今牢城之兵邦有祭祀賔客喪紀之事則役其煩辱之事鄭康成曰煩猶劇也士喪禮下篇曰隷人湼厠掌帥四翟之隷使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁鄭鍔曰翟與狄同東西南北之夷名雖不同緫而言之皆夷狄耳賈氏曰服其邦之服執其邦之兵者若東方南方衣布帛執刀劒西方北方衣氊裘執弓矢王昭禹曰四夷各有利器冝服齊其政不易其冝修其教不易其俗也黄氏曰四翟守王宫與牧誓羗髳庸㣲盧彭濮同意鄭康成曰野舍王行所止舍也厲遮例也鄭鍔曰王在宫與出在野皆使四翟之隷守之不使罪隷罪隷吾民之有罪者耳使四翟之人見其徳足服四夷司隷正掌其事而師氏又使其屬董之而已劉執中曰彼其死而復生又從而衣之食之盡其所能而役之故用之守王宫與厲禁而賴之以為腹心之衞也愚案四翟之民南方之蠻而閩乃東南之别種東方之夷而貉乃東北之聚落獨不見西戎北狄之隷者盖周自文王時西有昆夷之患北有玁狁之難而道化先被于南雖海隅出日之地徳亦丕冐至武王通道于九夷八蠻所獲之民其服屬有素故帥而為隷其在王宫之守衞則宫正掌之其在野舎則師氏掌之不特此爾南方曰象則有象胥以待蕃國之使東夷之樂曰韎則有韎師以薦宗廟之樂皆此意也罪隷百有二十人鄭鍔曰有罪者之家人從坐則没為奴隷百官與凡有職守者皆得而使令之乃以百二十人為率盖官拘而用者以此數為率耳薛平仲曰罪而至於隷辱之甚者以罪言之斥之逺方誠足為王者之義以情言之處之近地亦不足病王者之仁故帥之師氏者先王教化之功而帥之司隷者先王用刑之極功掌役百官府與凡有守者掌使令之小事鄭康成曰役給其小役鄭鍔曰使令皆家役之小事耳凡封國若家牛助為牽徬鄭司農曰凡封國若家謂建諸侯立大夫家也牛助為牽徬此官主為送致之也鄭康成曰牛助國以牛助轉徙也罪隷牽徬之在前曰牽在旁曰徬賈氏曰車轅内一牛前亦一牛二隷前者牽前牛旁者御當車之牛其守王宫與其厲禁者如蠻隷之事鄭鍔曰守王宫與其厲禁事則與蠻隷同皆執兵以為營衞也然罪隷乃中國之人因親屬有罪而沒入在官與四夷之人不同故不使掌牛馬鳥獸之事易氏曰五隷皆隷也蠻夷閩貉之隷則賔服之民罪隷則沒入為奴之民其民不同其用亦異罪隷則任使令牽徬之冗事四翟之隷則養之而巳雖蠻隷掌役校人養馬之類閩隷掌役畜養鳥之類夷隷掌役牧人養牛馬之類貉隷掌役服不氏養獸之類皆因其俗之所習而使之蠻隷百有二十人鄭康成曰征南夷所獲愚案說見司隷李嘉㑹曰先王必有蠻閩夷貉之隷想欲知其風俗耳然有無亦存其數云耳無則闕之掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁賈氏曰為校人所役使以養馬案校人不見隷者盖是雜役之中王昭禹曰校人其徒八十人有不足以給其役故蠻隷兼役其事也陳藴之曰古之宿衞王宫者不特士庶子而已有虎賁之虎士有司隷之五隷虎士有卒伍而四翟之隷有兵國有大事則守王門舎則守王閑而司戈盾軍旅㑹同授虎士戈盾則王之在國在野可謂嚴矣必使四翟之隷以王者所守在四夷也閩隷百有二十人鄭康成曰閩南蠻之别掌役畜養鳥而阜蕃教擾之王氏曰役則役於掌畜也王昭禹曰阜蕃教擾之與掌畜同事掌子則取隷焉王昭禹曰子謂鳥所生者閩隷掌阜蕃其物則養之而使取隷於已者也因致其義焉鳥之無知飲啄鼓舞而唯閩隷之是從則閩隷之隷於中國豈異於是言掌子則取隷而不言守王宫與厲禁以司隷言掌帥四翟之隷守王宫與野舎之厲禁則閩隷之有守可知夷隷百有二十人鄭康成曰征東夷所獲掌役牧人養牛馬賈氏曰為牧人所役使牧牛牲與鳥言鄭司農曰夷狄之人或曉鳥獸之言故春秋傳介葛盧聞牛鳴曰是牲三犧皆用矣是以貉隷職掌與獸言王昭禹曰鳥之鳴猶人之言也詩曰相彼鳥矣猶求友聲以鳥能鳴以求其友非其言而然乎使夷隷與鳥言亦不為怪矣其守王宫者與其守厲禁者如蠻隷之事陳藴之曰四𨽻所守皆如蠻隷之事者周之時以南方為逺尤貴其来也故掌四夷之官名象胥而奏樂亦以南詩曰以雅以南記曰胥鼓南則周人之意可知矣貉隷百有二十人鄭康成曰征東北夷所獲掌役服不氏而養獸而教擾之王昭禹曰以服不氏掌養猛獸而教擾之故也王氏曰不言阜蕃猛獸非所阜蕃之物掌與獸言王昭禹曰先王必使夷貉之隷與獸言者以鳥獸之無知尚可與言矧夷蠻之民哉此亦先王之㣲意鄭鍔曰蠻人知養馬故以役校人貉人知養獸故以役服不氏各因其能而用之也人之性或能通知異類之語者非人之所能也使夷貉之人與禽獸言不使閩蠻之人者不強其所不能也其守王宫者與其守厲禁者如蠻隷之事周禮訂義卷六十四
