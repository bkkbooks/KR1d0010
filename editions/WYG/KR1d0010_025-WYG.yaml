body:
  text: 周禮訂義巻二十五宋王與之撰遂人中大夫二人鄭康成曰六遂之地自逺郊達於畿中有公邑家邑小都大都陳及之曰鄭氏説六遂之地距王城百里以外至二百里若然則在郊甸中矣然秋官鄉士掌國中遂士掌四郊則六遂之地亦有在四郊者盖六鄉取國中之民作之不足則及四郊而鄉士掌六鄉之獄治在國中也六遂取四郊六鄉餘地作之不足則及郊甸而遂士掌六遂之獄治在四郊也所謂遂者正五家為鄰至五縣為遂必地里相連民居相接然後始成保伍可以相保相受相糾若分散别在他處則何以相管屬耶王氏詳説曰六遂之官與六鄉之官一同六遂之法與六鄉之法一同但六遂之官卑於六鄉一等六遂之法與六鄉相為異同耳且以鄉遂之官言之六鄉有大司徒在六遂則為遂人六鄉有小司徒在六遂則為遂師六鄉有鄉大夫在六遂則為遂大夫六鄉有州長在六遂則為縣正鄙師即黨正也鄼長即族師也里宰即閭胥也鄰長即比長也然大司徒六命之卿而遂人不過中大夫小司徒中大夫而遂師不過下大夫此六遂之間長貳也鄉大夫六命之卿而遂大夫不過中大夫州長中大夫而縣正不過下大夫等而下之皆卑一命故六鄉之下士一命而六遂之下士不命此鄉遂之官異也且以鄉遂之法言之六鄉上地無萊畝而六遂上地則有萊五十畝矣六鄉以一人為正卒其餘為羨卒六遂則以一人為正卒一人為羨卒其餘為餘夫矣六鄉所言伍兩卒旅師軍詳於軍制六遂所言遂溝洫澮川詳於田制然軍旅未始無田田制亦未始無軍要之互文見義也他如遂大夫所謂三嵗大比則帥其吏而興甿即鄉大夫所謂賓興賢能之法鄙師所謂祭祀若黨正所謂祭禜鄼長所謂祭祀即族師所謂祭酺里宰所謂召斂即閭胥所謂召令鄰長所謂徙於他邑從而授之即比長所謂徙於國中及郊從而授之也然五物之詢徳行道藝之攷見於鄉而不見於遂豈六遂無此等人耶薛平仲曰鄉民之居於國中及郊者先王為之興賢能而使之出長入治以為之成市交易而使之各得其所夫然後務本尚實之風始有以轉移斯民之趨向遂居六鄉之外去王城百里之逺斯民朝夕之從事無非耕桑隴畝之務錢鏄耒耜之用如使其心嚻然有惡勞好逸之念亦何能一日自安于田里是以先王居民於野自五家而積之雖無所異於鄉緫而名之曰遂焉所以使之自遂於其間不然吾能教之以稼穡而遂民或至於飽食暖衣而逸居焉豈非先王所懼哉孫氏曰周官内六鄉而外六遂由遂以往采邑參焉一以遂法治之蓋教必始於近以六鄉為四方之標凖耕必勤於野以六遂為王畿之勸相遂雖互文見義亦各有先務也掌邦之野鄭康成曰郊外曰野謂甸稍縣都黄氏曰遂人因六遂而為名六遂在甸則所掌者甸地而已而曰掌邦之野蓋合稍縣都鄙法之當行者通掌之稍縣都鄙居民㕓里授田溝洫治地皆野法與甸同其法悉自遂人出稍為邑縣鄙為都則各聴於其主非遂人之所屬也遂人中大夫秩比小司徒縣二千五百家鄙五百家隨民衆寡而為之甸稍縣鄙居民皆如此惟甸則合縣為遂曹氏曰遂人之職惟以掌邦之野為言然六遂之政令刑禁與稽民授田簡兵教耕令賦起役之事無非本於六鄉之成式遂人以下特其文互見而言之稍略耳以土地之圖經田野造縣鄙形體之灋五家為鄰五鄰為里四里為鄼作管反五鄼為鄙五鄙為縣五縣為遂王昭禹曰土地之圖大司徒所建之國以土地之圖經田野則以所建之國為井牧溝涂田萊之類而經之也鄭康成曰經形體皆謂制分界也王氏曰其縣鄙之地域有形其井邑溝涂有體其所以制而成之則有法王昭禹曰形具而後有體故有縣鄙之形斯為井邑溝涂之類以體之冇王國之形斯為門闈宫室之類以體之其所以體之者莫不有度數存焉夫是之謂形體之法易氏曰小不曰鄰言鄙之成則鄰之成可知大不曰遂言縣之成則遂之成在其中言縣鄙則舉中以見上下項氏曰比則親之至鄰則始相鄰近閭則同門里則同居族則族葬鄼則相賛助而已鄙之名卑於黨縣之名小於州凡遂之制皆放於鄉鄭康成曰異其名者示相變耳王氏曰比相保則鄰亦相保閭相受則里亦相受族相葬則鄼亦相葬矣黨相救則鄙亦相救矣州相賙則縣亦相賙矣鄉相賓則遂亦相賓矣王昭禹曰遂獨不言者鄉以教為主遂以耕為主愚案以五起數以四成之四里則百家乃是數之小成陳宏甫曰周鄉遂之法至百處無不以五起數蓋百人是二隊不百人不足以為甲更調起𤼵不得愚案遂之鄰里鄼鄙縣遂與鄉之比閭族黨州鄉之法無異然司徒於鄉不說經田野者以國中民㕓接比行保伍之法易故不必經與造民野處四散保伍之法難行復用經田野造縣鄙成然後可定民居若小司徒經土地而井牧田野一句乃是制井田起軍賦與制保伍以定民居不同井邑自四井以下則以四起數造縣鄙自五家以下則以五起數井天下之田用丘甸法比天下之居用保伍法故曰地不里居田不井授終苟道也緫論曹氏曰鄉遂王政之本皆以室數制之不容增減自鄭氏參以里數欲求强合始指若干里為鄉若干里為遂既室數與里數不合於是積算王畿千里之地去若干里為山林川澤又去若干里為不易一易再易之數然終有抵牾安有采地之制異於鄉遂之說旁加廣狹之說周家簡易之制未免汨沒於異同之論皆有地域溝樹之使各掌其政令刑禁鄭鍔曰皆有地域以為之辨溝之以水樹之以木有限域之周圍有溝樹之阻固建官設吏以治之使各掌其所治之政令刑禁民可得而治矣易氏曰上言形體之法度地居民之法此言各掌其政令刑禁則命六遂之吏因縣鄙之法而推行井地之法以嵗時稽其人民而授之田野簡其兵器教之稼穡賈氏曰授之田野若下夫一㕓百畝簡其兵器若族師旗鼓兵革黄氏曰鄉以州黨居民㑹其卒伍即為軍法故常自為六軍而田與追胥皆竭作遂雖以縣鄙居民而其軍賦在丘乘軍師田役皆有司馬之法作其衆庶而後㑹其車人之卒伍或多或少不可預定是則正卒猶不盡起况羨卒乎士師掌鄉合州黨族閭比之聨與其人民之什伍使之相安相受以比追胥之事謂之鄉合則非野法也常常比之使之相安相受故倉卒可用遂未嘗比安能臨時盡起而用之乎故以為鄭之說未盡然也惟起徒役無過家一人者似是然野之制軍一甸七十五家耕之共一車則一家一人自有定制是則小司徒所謂無過家一人者仍為鄉法耳六遂民數與六鄉同權力相併事體略等先王誠有深意也地之等不同人之多寡亦異常有進退故以嵗時稽而授之皆農民也故惟教之自衞力穡之事授之田野野蓋虞衡歟王昭禹曰兵器不簡則稼穡不可得而教必先衞其地域而有之然後斯能致力於稼穡不然雖有粟不可得而食凡治野黄氏曰治野言凡通乎邦國都鄙以下劑致甿王昭禹曰劑約劑所謂要書與甿約以征役用下地為率所以致之也黄氏曰致甿其事在旅師鄭康成曰變民言甿異内外也甿猶懵懵無知貌也曹氏曰六鄉授田分上地中地下地為任民多寡之數而此則不復差别一以下地每家止任二人為率蓋六遂既比鄉為差逺而在野之地為最寛宜優其役而厚其力使之受地多而征調少庶民皆願為之甿欲耕於王之野以滋生齒以實遂地陳君舉曰此指授田之夫言之者從役皆以下劑致甿豈有饒逺之間以田里安甿賈氏曰田則百畝之田里則五畝之宅王昭禹曰出則輩作於田入則族息於里授之田則彼得以安其耕授之里則彼得以安其居以樂昬擾甿鄭康成曰樂昬勸其昬姻如媒氏㑹男女擾順也賈氏曰男女人之大欲存焉配以昬姻即順民意以土宜教甿稼穡王昭禹曰十二土名物不同稼穡之所宜亦異甿不能皆知故以土宜教之大司徒教稼穡植藝是也以興耡音助利甿杜氏曰助謂起人民令相佐助劉執中曰興起同井之民更相耡耨則各享其利王氏曰孟子曰唯助為有公田許慎釋耡以商人七十而耡則助耡一也興之以助公田則甿得所私焉所以利之以時器勸甿鄭康成曰時器鑄作耒耜錢鎛之屬王氏曰善其器則以勸謂之時器則器之用各有時若耜以耕銍以穫以彊予任甿鄭康成曰彊予謂民有餘力復予之田若餘夫然李氏曰田作勞人之所憚吾彊其力而予之以地則民也無遺力矣項氏曰若野自六尺以及六十有五是緫論曹氏曰生有常産居有常室而甿之安逸可知婚姻相通禮文相樂而甿之順擾可知壤物之辨則甿知稼穡之宜耡耦之興則甿享共耕之利農具有常器則因其時而勸之丁壯有餘力則加其田而任之咸使之有固志而休養生息無餘憾矣以土均平政黄氏曰鄉民合士與農而教之故授田少役多每月讀法四時田獵春秋祭祀征役喪紀㑹聚多貢稅輕野皆農民專以稼穡任之故授田多役簡貢稅重以土均平政政如字政役不平而後人機巧趨利或遂逃其業利均則政平土均之職可致鄭康成曰政讀為征土均掌均平其稅辨其野之土上地中地下地以頒田里上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之愚案鄭鍔說見大司徒造都鄙及小司徒均土地之下鄭康成曰㕓城邑之居孟子所云五畝之宅樹之以桑麻者也鄭司農曰㕓居也揚子雲有田一㕓謂百畮之居萊謂休不耕者項氏曰里以㕓計田以畮計田有汚萊里無上下故里皆一㕓而田有多寡鄭康成曰六遂之民竒受一㕓雖上地猶有萊皆所以饒逺也項氏曰上地無萊田則非治野致甿之法遂人之致甿必優於鄉曹氏曰遂既以下劑致甿雖上地亦使之少休不耕庶不盡其地力所以優遂民也周氏曰遂人掌邦之野其地必廣而瘠若置都邑處必狹而肥故遂人上地有萊田曹氏曰鄉不言夫一㕓惟言受田而遂之上地中地下地皆言夫一㕓鄉不言餘夫而遂之上地中地下地皆言餘夫亦如之者蓋鄉去王城密邇遂在鄉之外地有逺近勢有重輕赴愬有易難恤察有詳略特示優厚於六遂非以薄六鄉也亦不泄邇忘逺之深指其為均一也薛氏曰先儒謂父子祖孫不可分者為餘夫未知授田之制則何以也曰司徒言均土地而稽其人民上地家七人中地家六人下地家五人今此田萊固有定制為子孫蕃盛家有十人必以五人為正夫受下地之田五人為餘夫受田亦如下地夫之數家十一人以六人為中地正夫而五人為下地餘夫家十有二人則六人為中地正夫而六人為中地餘夫家十有三人則七人為上地正夫六人為中地餘夫家十有四人則七人為上地正夫七人為上地餘夫至於家十有五人則五人為下地正夫其十人則分為兩下地餘夫從此推之雖百口之家亦可分若家止九人則將何為孟子曰上農夫食九人其次食八人彼以此七人而受上地之田則田萊之廣且美豈不能贍九人耶愚案此說頒餘夫田亦如三等受田之數圖說曰先王之於民受地雖均百畝然其子弟之衆或食不足而力有餘則又以餘夫任之詩所謂侯彊侯以經所謂以彊予任甿也然餘夫之田不過二十五畝以其家既受田百畮又以百畝與之則彼力所不逮矣故其田四分農夫之一而已禮言上地田百畮萊五十畮中地二十五畮萊亦二十五畮下地二十五畮萊五十畮則所謂如之者如田萊之多寡而已非謂餘夫亦受百畮之田如正農也鄭氏之說不與孟子合賈氏又從而釋之此附㑹之論也劉氏曰亦如之者亦如其萊也餘夫未具夫婦未當受田如其萊而已孟子曰餘夫二十五畮愚案此說頒餘夫田視正農受萊四分之一大約不過二十五畝求合孟子之說黄氏曰里即其㕓之所在上中下地亦以其人之多寡授之孟子曰餘夫二十五畝鄉田同井則鄉法也遂人上中下地田萊餘夫如正夫之數野法也所謂彊予也一夫百畝以今畝計之為四十畝臣妾閒民移用野法一甸六十四井七十五家耕之上地當授田三百九十九夫田萊公田皆計餘百九十七夫中地當授田四百二十二夫餘百五十四夫下地當授田四百五十夫餘七十六夫上地餘最多王制上農夫食九人其次食八人其次食七人小司徒减上二等自七人為則上地當容此二等也故增一百十五夫而登矣二家増三人中地二家五人蓋與上下相進退也二家五人則一家三人一家二人故增六十五夫而登矣下地餘少増二十五夫而止耳然其下有食四人者有食三人者可任者未必皆二人也要之當使有餘以待増不使當増而不足先王制事無不如此鄭謂六遂之民竒受一㕓本謂民居郭巳受宅又竒受一㕓於野其說誤而疏家又謂餘夫竒别更受㕓備離居之法益疏矣愚案此說作訃夫受田其地有餘又與前二說不同易氏曰或曰上地人數之損則將遷之中地下地乎下地人數之增亦將遷之上地中地乎中地之增損亦然曰非遷其人也因其人之損益為田之進退而已遂師以時登其夫家之衆寡遂大夫以時稽其夫家之衆寡然後遂人以嵗時稽其人民而授之田野正為是也禮庫曰司徒是造都鄙法遂人是頒田里法不容相類陳宏甫曰蓋都鄙受田之制與邦國同六遂受田之制與六鄉同互見其義凡治野夫閒有遂遂上有徑十夫有溝溝上有畛之忍反百夫有洫况域反洫上有涂千夫有澮古外反澮上有道萬夫有川川上有路以達于畿鄭康成曰十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田鄭鍔曰田必資水水欲通於川行必由路路欲達於畿自一夫之田至千夫之田為遂溝洫澮所以通水於川自夫閒之遂至萬夫之川為徑畛涂道路所以通道于畿廣深各二尺曰遂言水自是而之他也廣深倍遂曰溝言十百相交而水相往來也廣深倍溝曰洫言水相流通如人血脉也廣二尋深二仞曰澮言衆水皆㑹乎此也至於川則集衆流而無所不通宜至於海矣通水以此則旱有所資而水亦無浸淫之患遂上有徑可容牛馬溝上有畛可容大車洫上有涂可容乗車一軌澮上有道可容乗車二軌則川上有路可容乗車三軌通道以此則車與徒無所往而不達凡此五溝五涂之制自禹以来至是始備項氏曰先王不能使天下無旱澇能使旱澇不為灾有溝以道水而有涂以防水因夫之多寡而為之道水因水之大小而為之防水水則達扵川道則達扵畿若其廣深則匠人詳之矣陸佃曰小司徒九夫為井匠人亦九夫為井井閒有溝自井地言之遂人十夫有溝自涂言之然遂人百夫有洫而匠人十里為成成閒有洫則九百夫之地遂人千夫有澮而匠人百里為同同閒有澮非一同之閒包以一澮而已謂共閒有澮也成同地之廣者也洫又澮溝之大者也於成舉洫於同舉澮亦其大略云耳陳及之曰周制井田之法通行於天下安有内外之異哉遂人言十夫有溝以一直度之也凡十夫之田田首必有一溝以㵼水以方度之則方一里之地所容者九夫其間廣四尺深四尺者謂之溝則方一里之内凡四溝矣兩旁各一溝中閒二溝遂人云百夫有洫是百夫之地相連屬而同以一洫㵼水以方度之則方十里之成所容者九百夫其閒廣八尺深八尺謂之洫則方十里之内凡四洫矣兩旁各一洫中閒二洫至於澮亦然若川則非人力所能為故匠人不為川而云兩山之閒必有川焉遂人萬夫有川亦大約言之耳大槩遂水㵼於溝溝水㵼於洫洫水㵼於澮澮水㵼於川其縱横因地勢之便利遂人匠人以大意言之遂人以長言之故曰以達於畿匠人以方言之故止一同耳陳氏曰遂人所言者積數也匠人所言者方法也積數則訃其所有者言之方法則積其所圍之内者名之其實一制也陳君舉曰溝洫之制無鄉遂采地之異遂人言夫者指實地者言之山林川澤不在其數匠人以里言者溝洫咸在其中所以用里數也薛氏曰遂人言卜夫有溝以旁加言之也匠人以九夫為井井閒謂之溝以實數言之也愚案遂人自十夫起數匠人自九夫起數井田之法惟九夫共井未有十夫共者此鄭氏所以謂遂人法與匠人不同也必欲合其說宜以大約計之不可拘也遂人所謂夫閒有遂即匠人廣二尺深二尺之遂也遂人十夫為溝即匠人九夫為井井閒廣四尺深四尺之溝也匠人謂九夫而遂人乃云十夫者遂溝以十夫之地約之耳而匠人方十里為成成閒廣八尺深八尺謂之洫計一成之地乃是百井九百夫之地方有洫而遂人言百夫有洫蓋止言百夫之田始共一洫而成閒有洫則緫一成之内九百夫之田凡九洫矣匠人言百里為同同閒廣二尋深二仭謂之澮計一同之地乃是萬井九萬夫之地而遂人言千夫為澮蓋止言千夫之田始共一澮而同閒有澮則緫一同九萬夫之田凡九十澮矣人力所為止於澮此外則自然之川故遂人萬夫有川而匠人一同九萬夫之外亦曰專達於川要知一同之内自澮而達者已有川矣此皆以大約言之黄氏曰此與匠人一法鄉不為溝洫夫屋九比遂野法也溝洫之制詳八家皆私百畝其中為公田溝洫不獨治田且設固焉自甸達於畿皆野法也故曰凡治野遂人十夫有溝匠人九夫為井蓋一井十夫其中為遂而溝環之地居十夫而井實得九夫之地也案司馬法一同萬井九萬夫則雖鄉一井亦謂十夫之地為遂溝與野同不為洫澮孟子言方里而井井九百畝蓋一里十夫容九百畝於其中非謂方一里只得九百畝也治地郊與野異者郊居百里四同之地無多山陵林麓其地之高者為城郭㕓園平者為田負郭之田多膏腴下者為藪牧其間水澤足以灌溉亦必為溝畎以行之但不為洫澮涂路經緯之形如治野耳觀載師郊田則當時因土之宜可見遂溝兼徑畛不能為一夫寛饒之使有餘地也詩中田有廬畺埸有𤓰皆寛饒之地畺埸其界域也積方百夫溝經緯其中而洫環之成方十里千夫之地十除其一為百井九百夫洫經緯其中而澮環之同方百里十萬夫之地十除其一為萬井九萬夫澮經緯其中而川環之遂人言百夫有洫者謂積方百夫而洫居其外也匠人言方十里為成成閒廣八尺謂之洫者開方十里而洫居其中也方十里則為百夫者十遂人言千夫有澮者亦積方千夫有澮在其外也匠人言方百里為同同閒廣二尋謂之澮者亦開方百里而澮居其中也方百里則為千夫者十故曰其法一也遂人言萬夫有川通地勢而著經界之法也匠人言專達於川因地勢以見非人力之所為也然則川形未必正方其旁多華離之地皆不井書曰濬畎澮距川川蓋山澤自然之位故匠人曰凡天下之地勢兩山之閒必有川焉疏家言此川亦人造疎甚鄭康成小司徒注成方十里其中八里為甸六十四井五百七十六夫出稅旁加一里為一成十里三十六井三百二十四夫治溝洫積而至四都八十里旁加十里乃得方百里為一同積萬井九萬夫其四千九十六井三萬六千八百六十四夫出稅二千三百四井二萬七百三十六夫治洫三千六百井三萬二千四百夫治澮乖誤甚矣自十夫積而至十萬夫皆十除其一者九夫共得一夫之地以治遂溝徑畛且有寛餘之地矣其餘洫澮涂路為地可計百夫之洫為地十七畝有竒涂如之積而為一成十里為方百夫者十洫涂之地三夫半而已安用三百二十四夫哉千夫之澮三十五畝有竒路加澮十一畝有竒通為四十六畝積而為同百里為方十夫者十涂路之地四十六夫而已又安用三千六百井三萬二千四百夫哉一同百里為方十里者百洫涂三百四十夫鄭言一同二萬七百三十六夫治洫大抵遂人展地匠人制形一同之地定為萬井溝洫棊布於是以小司徒丘乘之法比之自井為邑為丘而為甸七十五家耕之出車一乘又為縣為都其法備矣一同萬井九萬夫六千四百井出稅賦車百乘其餘二千六百井為山林川澤邑里縣鄙為洫澮涂路溝畛不計猶有餘則為閒田遂人下劑致甿固當常有地以待之六遂賦車千乘而為六軍十二同一同未必盡平地能為九萬夫不足則兼取班孟堅漢書曰同方百里提封萬井除山川淳鹵城池邑居園囿術路三千六百井定出賦六千四百井雖大約言之且其說未必盡合周禮然其論井地則精於鄭矣鄭康成注小司徒曰九夫為井方一里小司徒經之匠人為之溝洫相包乃成其說是矣惟不悟遂人匠人本一法因見遂人以十夫起數則曰此溝洫法也匠人以九夫起數則曰此井田法也兩說既離乃欲合遂人於司馬法以為鄉遂皆無公田皆稅夫又欲合小司徒於匠人則以為畿内不為井田而小司徒丘甸實井田也乃曰此為造都鄙法及見孟子八家皆私百畝其中為公田詩雨我公田遂及我私春秋初稅畝傳言穀出不過藉有若對魯哀公盍徹皆井田也則又欲合之於周禮乃以為周制王畿用夏貢法邦國用殷助法鄉遂公邑之吏役民以公使不得恤其私諸侯專一國貪暴無藝故通其率以什一為正夫豈獨紛錯無統而矯誣先王失建邦設土樹后王君公之大體矣司馬法鄉法也不獨不為公田溝洫之制亦略故以夫屋比地而一同萬井三萬家與小司徒夫屋為合是為鄉法遂人野法也溝澮距川與小司徒井牧為合是為野法經鄉野異條鄭謂之同制何據哉司徒施教法于都鄙比閭族黨鄉州與王國同故以室數制其域不使山川溝洫妨其實地正不為井田而康成反以丘甸為造都鄙法何據哉野九一而助國中什一使自賦孟子教滕文公使復先王舊法則諸侯有野與王國同矣康成知邦國用遂法合於孟子而不知什一自賦亦孟子之言乃謂通其率以什一為正則又何哉曹氏曰因授田而思至於治溝洫因溝洫而思至於治涂路必使縱横參錯曲折而後進不得以率意而直達人以為此特定田制耳此特通水利耳不知先王寓兵於農藏丘乘於井牧而禦外侮防衝突之意已潜寓於其間也以嵗時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施式氏反舎者鄭康成曰登成也猶定也王昭禹曰登上其籍夫家猶言男女也王氏曰遂人既登其夫家衆寡六畜車輦遂師又以時登則遂師登之於遂人遂人登之于小司徒鄭鍔曰小司徒頒比法于六鄉之大夫使各登其鄉之衆寡則頒于六遂從可知也鄭康成曰施讀為弛鄭鍔曰辨其可施以事者與其可舍者則病者得所養而壯者不為游手易氏曰知夫家衆寡之數則上地任三人而舍其四下地任二人而舍其三凡父祖子孫之不可分而兄弟夫婦之交相養者舉在是知六畜車輦之數則老得以食肉祭得以用牲車得以供服乘輦得以載任器者舉在是至於辨老幼廢疾與其施舍者則敬老慈幼與夫養萬民之疾病禄庻人之在官者又非一端而已曹氏曰校登必以嵗時蓋前嵗之已登者逮于今則増損不同矣一時之已登者越三時則耗亡不等矣民自生齒以上皆登于版耕稼起於一夫而王畿千里之民無不各任其力調兵起於伍長而六軍七萬五千之衆無不各禀其令雖車輦器械之𤨏細牛馬六畜之猥冗無不素具于籍一旦有事隨取而足蓋其凡目可稽而儲備有實此功用在乎素講所謂事前定則不困者此也以頒職作事以令貢賦以令師田以起政役鄭康成曰職謂九職分其農牧虞衡之職使民為其事也載師云以物地事授地職互言矣貢九貢賦九賦政役出徒役易氏曰先職事貢賦而後及於師田政役無非因其財力而用之先王豈徒用其財力哉愛養斯民於是乎在若起野役則令各帥其所治之民而至賈氏曰起野役若小司徒起徒役毋過家一人之類鄭康成曰役謂師田若有功作也令各帥其民而至者謂縣正已下縣正云若將用野民則帥而至是縣正受遂人之令也以遂之大旗致之其不用命者誅之鄭康成曰遂之大旗熊虎賈氏曰遂人雖是大夫合用鳥隼之旟致衆今遂人掌衆與大司徒同故得用熊虎為旗王氏曰鄉師致民以司徒之大旗遂人所謂大旗亦司徒之大旗於是建焉於遂言遂之大旗則鄉可知於鄉言司徒之大旗則遂亦可知凡國祭祀共野牲令野職鄭康成曰共野牲入於牧人以待事賈氏曰野職薪炭之屬此官令之委人斂之故委人云斂薪芻凡疏材木材易氏曰遂人掌邦之野故此數節皆謂之野牲曰野牲以六牲出於野共而入於牧人職曰野職以薪芻疏材木材出於野而令委人斂之凡賓客令脩野道而委積鄭康成曰委積於廬宿市賈氏曰大司徒令野脩道委積謂緫令遺人此於百里外野道又令之故注云是亦令遺人黄氏曰大司徒大賓客令野脩道委積小司徒小賓客令野脩道委積遂人凡賓客令野脩道而委積遺人委積以待賓客獨軍旅無所見軍旅急興王師所至得輒發是宜有成法大喪帥六遂之役而致之掌其政令及葬帥而屬音燭六綍音弗及窆陳役鄭康成曰役給墓上事及竁也賈氏曰竁謂穿壙之等黄氏曰帥六遂之役致之鄭云致於司徒恐未然致之於稍人遂人不直致於司徒也稍人曰大喪帥蜃車與其役以至以聴於司徒綍舉棺索賈氏曰據在棺則曰綍據在道則曰引六遂之役不在道故據在棺而言綍用綍旁六執之者天子其千人與賈氏曰雜記諸侯執綍五百人大夫三百人以此約之則天子千人愚案窆字見鄉師賈氏曰六鄉近使主殯及啓朝為始在祖廟之中將行載棺於蜃車屬六綍則六遂為終至於在道言引則還使六鄉為始至壙窆下棺則還使六遂為終黄氏曰及葬大司徒親帥鄉役屬六引遂亦帥野役屬六綍及窆陳列之使背碑引綍司徒皆節制之司徒節制野役見於經者獨此事凡事致野役而師田作野民帥而至掌其政治禁令王昭禹曰言事而又言師田則事乃力政之事鄭鍔曰國有功役之事又有師田之事功役則用當役之人師田則衆民竭作故於事言野役於師田言野民當役之人則致之使自至衆力竭作則其事之大有以作而起之遂人帥而至掌政治禁令以齊一之則衆雖繁不亂矣黄氏曰事為司空事典帥而致於稍人稍人帥而聴於司馬遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人劉執中曰遂大夫各居其遂以施政教遂師則賛遂人居司徒之府以治六遂之政令猶鄉師賛小司徒居於内以治六鄉愚案劉氏之說推之蓋司徒主六鄉遂人主六遂鄉師為司徒之攷遂師為遂人之攷鄉師居司徒府固無可疑遂人遂師亦必居朝以緫六遂之事自鄉遂大夫以下至比鄰之長則各居其所治矣但鄉大夫既曰卿則必朝之六卿兼之以其地在百里之内故其官可居於朝若六遂在二百里則遂大夫必各居其所治之遂可也各掌其遂之政令戒禁賈氏曰遂師所掌如鄉師亦二人共主三遂易氏曰政若頒職作事以起政役之類令若令野職野賦令野脩道之類戒與禁則輔此而已以時登其夫家之衆寡六畜車輦辨其施舍與其可任者王昭禹曰登其籍於遂人鄉師以時稽其夫家衆寡遂師登而不稽者以有遂大夫稽之也鄭鍔曰經言施舍多矣或以施為弛或只讀如本字此辨其施舍繼以與其可任則施當讀為弛蓋對可任而言項氏曰民有貴賤老幼廢疾賢能在所施舍其可任者又有家三人二家五人家二人之異故辨之以知民力劉迎曰遂師之辨施舍與可任將以井牧其田野經牧其田野辨其可食者周知其數而任之以徵財征以作役事則聴其治訟鄭康成曰經牧制田界與井也劉執中曰經牧謂隨地而増萊田也王氏曰猶小司徒所謂經土地而井牧其田野不言井則以下言辨其可食者周知其數而任之故也鄭鍔曰辨其田之可耕則耕之野之可畜則牧之鄭康成曰可食謂今年所當耕者劉中義曰一易之田間一嵗而可食再易之田閒二嵗而可食易氏曰遂之三地有田皆有萊為萊則不耕為田則可以耕而食辨其可食而後可以周知井牧田野之數既知其數然後可以頒地任民曹氏曰遂民授田雖有上中下三等之殊其閒或係於天時人事之不齊則地力所出亦不可以定法而槩論固有上地稍薄亦可以為中者有中地稍薄亦可以為下者倘恃吾定數不加精察則財征役事不為民病者幾希鄭康成曰財征賦稅之事易氏曰取其財謂之財征用其力謂之役事二者周知其數而任之故征不病民財役不傷民力征不均則有治治不服則有訟遂師聴之巡其稼穡而移用其民以救其時事王昭禹曰稼穡之時不可緩民之札喪為無常苟困於札喪而力不逮則時事於是乎廢先王乃移用其民以救之易氏曰水溢旱乾非一遂之民所能勝故移用他民以救之亦如五黨相救之法然則與大司徒之移民何别曰大司徒移民者移之使有餘財遂師移用其民者移之使有餘力凡國祭祀審其誓戒共其野牲王氏詳說曰案大宰職云大祭祀掌百官之誓戒大司冦云涖誓百官戒於百族祀大事也誓戒又祀事之大也大宰掌之所以致其謹大司冦涖之所以防其犯六鄉司徒之官逺在二百里之中誓戒之事固無預焉但審之而已審其誓戒即共其野牲矣是以先期而辨事蓋大司徒預於國之大祭祀小司徒預於國之小祭祀皆奉其牛牲而羞其肆遂官逺矣遂師之共野牲者共於遂人遂人之共野牲者共於牧人六遂何誓戒之有鄭氏闕然無說而以審為聴誤矣王昭禹曰遂人凡國祭祀共野牲遂師又共野牲則賛遂人共牲入於牧人也以遂師登六畜牧其田野故也入野職野賦于玉府鄭康成曰民所入貨賄以當九職九賦中玉府之用者王氏詳說曰六遂之地民曰野民牲曰野牲道曰野道役曰野役職曰野職無適而非野職九職賦九賦大府内府之所掌其所以入于玉府者特式貢之餘財耳今六遂之民而以九職九賦得入於玉府者何耶蓋玉府掌玩好之物成周之制使民各任其所賦若角人掌以時徵齒角凡骨物于山澤之農以當邦賦之政令羽人掌以時徵羽翮之政于山澤之農以當邦賦之政令掌葛以時徵絺綌之材于山農徵草貢之材于澤農以當邦賦之政令野職野賦之得入于玉府者其是歟黄氏曰虞衡本自為一官府而屬於遂以其有農當授地頒職作事通於遂政而遂師徴財征故其當入玉府者由遂師專達其餘則與凡賦入于有司賓客則巡其道脩庀匹尔反其委積鄭康成曰巡其道脩行治道路鄭司農曰庀具也大喪使帥其屬以幄帟先道野役及窆抱磿音歴共丘籠力量反及蜃市軫反車之役鄭康成曰幄帟先所以為葬窆之閒先張神坐使以幄帟先者太宰也其餘司徒也王氏曰幕人大喪共帷幕帟綬今此幄帟非幕人所共矣道野役帥以至墓黄氏曰謂道之居先備緩急用之磿者適歴執綍者名也賈氏曰天子千人分布於六綍之上謂之適歴者分布稀疏得所名為適歴執綍之人背碑負引而退行遂師抱持版之名字巡行而校録之以知在否故云抱磿丘籠之役竁復土也其器曰籠蜃車柩路也柩路載柳四輪廹地而行有似於蜃因取名焉行至壙乃說更復載龍輴賈氏曰四輪廹地而行即輇車以二軸貫四輪四輪即說文云無輻曰輇是也王氏曰蜃車載闉壙之蜃者王昭禹曰遂師則共蜃車之役人也曹氏曰凡取於野之物供朝廷以成禮者勢力號令所驅在後世常有旁科雜擾之患今惟一遂師專之政不出於多門吏不至於並縁而六遂之民亦免於苛征倍役矣軍旅田獵平野民掌其禁令鄭康成曰平謂正其行列部伍易氏曰如大司馬狩田之禮陳車徒有司平之比叙其事而賞罰賈氏曰比叙者校比次叙其行伍而行賞罰周禮訂義卷二十五
