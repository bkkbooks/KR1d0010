body:
  text: 周禮訂義卷二十二宋王與之撰師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人薛平仲曰天祐下民作之君作之師君師之職人主所以承天之寄以善天下之民有一未善先王以為由已致之師保之官特設於教典之中尊之中大夫下大夫之爵責之長善救失之任使人主無動不善所以善天下之本楊謹仲曰書太師太傅太保曰三公蓋周公之所位者也冢宰卿之職也以其為百官之長是以周公或謂冢宰以公任卿之職今師氏保氏乃中大夫下大夫之職司徒之屬官雖職兼詔王媺諌王惡實以教國子為事其徒至百二十人則職至煩冗矣安得以為周召之師保哉鄭鍔曰三代之教世子入則有保出則有師則師氏保氏教世子之官其職掌以媺詔王繼言教國子之事蓋其進則詔王以媺退則掌國子之教故以師名官言其足以為人之模範也程氏曰古者自天子達於庻人必須師氏以成其徳業故舜禹文武之聖亦皆有所從學後世師傅之職不修友臣之義未著所以尊徳樂道之風未成於天下陳君舉曰師氏以教詔傳道為名其所處宜尊嚴而其職宜貴求之於書則與虎賁綴衣同稱詩人亦以趣馬膳夫並列於雅夫虎賁綴衣趣馬膳夫皆賤有司也皆人之所押而玩者也皆不可與啓廸賛襄者也今以教詔傳道之官錯舉而混置之無乃輕乎是不然人主之自治非其廣廷聼決之為難而其深居宴坐之足患非其公卿大夫夾輔之為難而其侍御僕從順適其意之易惰也人主之心帷平時為易縱人臣之言惟卑者為易入陳及之曰師氏以道教國子以媺詔王而其徒百二十人蓋居虎門之左司王朝帥四夷之𨽻以守王門其徒不得不多也掌以媺詔王鄭鍔曰不曰美而曰媺蓋告王為善不待已著然後言於其尚㣲以告焉使王即㣲而為之愚按媺與美同凡人主一言一行之善師氏指其所以善者而詔告之進之於廣大髙明之域如所謂將順其美者也吕氏曰程伊川謂後世知求治而不知正君知規過而不知養德蓋後世諫諍之官所以正君之惡者未嘗不設若從容和緩以養君之德者則闕焉師氏以媺詔王專以從容和緩養君之德不幸君有過則有保氏之官在焉故二官皆言王舉則從聽治亦如之一則優游容與以養君之善德不使有一毫之拂一則秉義守正以正君之邪心不使有一事之違使人君既有所養又有所畏所以二者不可偏廢以三德教國子吕氏曰大司樂掌成均之法以教國子此又以從容和緩以媺詔王之師氏敎國子古人敎國子之意如此鄭康成曰國子公卿大夫之子弟師氏敎之而世子亦齒焉學君臣父子長㓜之道王氏詳説曰周禮所謂國子有并言太子者有不及王太子者望經為解學者不可不辨以王制考之皇太子王子羣后之太子公卿大夫元士之適子此以王太子緫言之也文王世子曰凡學世子及學士必以時此以王太子異言之也夫師氏保氏大司樂樂師之所謂國子者并言王太子也大胥小胥所謂學士者不及王太子也且大胥言掌學士之版以待致諸子王太子不預可知矣小胥言廵舞列而撻其怠慢者以王太子之貴非小胥所得而責之也又可知矣諸子言帥國子而致於太子則是以國子興太子異也又可知矣王昭禹曰上則詔王下則教國之子弟皆出於師氏君臣上下所以同德而無異道陳彦羣曰古者國子之敎極嚴蓋其以父兄之任為官與未命之士不同苟敎之無素而一日用於朝廷宗廟之間與庸人何異漢人不知敎國子而朝廷宗廟之間又率皆以父兄保任為即其後遂欲除任子之令不知任子之不得人由敎養之未至耳先王賞延於世未嘗以官授不才之子弟今之國子監正為敎國子設故太學補選先於國子其為法則優而教養異於古矣一曰至德以為道本鄭康成曰德行内外之稱在心為德施之為行黃氏曰孟子曰規矩方圎之至也聖人人倫之至也㣲纇纎疵非其至也德至而後可以盡道故曰苟不至德至道不凝焉吕氏曰至德者精粹不可名之謂道者溥博淵泉無聲無臭惟至德以為道本故有所據依朱氏日至德云者誠意正心端本清源之事道則天人性命之理事物當然之則修身齊家治國平天下之術二曰敏德以為行本吕氏曰既有至德以為道本又須見之於所行方可敏者不息之謂朱氏曰敏德云者強志力行蓄德廣業之事行則理之所當為日可見之迹也王昭禹曰丕則敏德蓋德不敏則為於暫而廢於久始於勤而終於怠亦無由而至矣三曰孝德以知逆惡鄭康成曰孝德尊祖愛親守其所以生者也孔子曰武王周公其逹孝矣乎孝在三德之下三行之上德有廣於孝而行莫尊焉朱氏曰孝德云者強志力行不忘其所由生之事知逆惡則以得於己者篤實深固有以眞知彼之逆惡而自不忍為也吕氏曰前言道本行本此言知逆惡自非實有孝德於已則犯上陵節之事必有習而不察者惟實有行德能免此黄氏曰孩提之童無不知愛其親然至於為惡逆迭相出入者不知其性者也不知其性固不能有諸已矣是故逆惡乗間而作亦莫能知之夫謂之孝德固無逆惡者臨深履薄之戒雖聖賢終其身不敢已也故曰一出言不敢忘父母一舉足不敢忘父母所謂知逆惡者不待彰著而後知愛親本有之性少有差殊則知之矣此盡心知性之學德未有不本於事親故三德卒歸於孝徳三行自事親推之於尊賢事師無本不立緫論朱氏曰此三德者雖各以才品之髙下資質之所冝而教之然亦未有專務其一可以為成人者是以别而言之以見其相須為用而不可偏廢蓋不知至德則敏德者散漫無所統固不免乎篤學力行有不知道之譏然不務敏德而一於至德又無廣業而有空虚之弊不知敏德則孝德僅為匹夫之行而不足以通乎神明然不務孝德而一於敏則又無以立本而有悖德之累此先王之敎所以本末相資精粗兩盡而不􅀝於一偏也敎三行朱氏曰德也者得於心而無所勉者也行則行之法而巳不本之以德則無所自得而行不能以自修不實之以行則無所持循而德不能以自進是以既教之以三德必以三行􅁇之雖其至末至粗而無所不盡而德之修也不自覺矣然是三者似皆孝德之行而已至於至德敏德則無與焉蓋三者之行本無常師必協於一然後有以獨見而自得之非敎者所得而與言唯孝德則其事可指故又推其類而兼為友順之目以教之以為學者雖誠未得於心而事亦可得而勉使其行之不已而得於心則進於德而無待加勉況其又能即是而充之以周於事而泝其原孰謂至德敏德之不可至哉或曰三德之教大學之學也三行之教小學之學也郷三物之為敎也亦明而詳矣一曰孝行以親父母吕氏曰前言孝德此又言孝行實有諸已謂之德見之行事謂之行既實有孝德於已矣須見於行事之間而後吾之孝德愈進親意愈洽矣二曰友行以尊賢良吕氏曰必盡子弟之職以供洒掃應對之事而後先生長者方肯開𤼵我王昭禹曰君子以文㑹友以友輔仁則友者相尊也相助也吾以友行尊賢良則賢良亦將以友行而助我三曰順行以事師長吕氏曰所謂賢良者國中之先生長者也所謂師長者朝夕與吾處者也朝夕與吾處者其歳月為甚乆其條目為甚煩才有一毫不順便失事師長之道須是十分遜悌方可王昭禹曰師以德行教人者也長以齒位臨我者也荀子曰師然而然則是知若師也此以順行事師之謂記曰悌長而無遺此以順事長之謂緫論黄氏曰六德三德同此德也六德舉其成德之可名者也三德原始要終使之所由入也六行三行同此行也孝悌而已矣司徒以此敎萬民而賔興之師保以此敎國子而推擇之國之賢能皆出於此師氏教國子而掌以媺詔王者君正莫不正也師氏將順保氏正救皆引之以當道也國子成德而後萬民有所觀法故曰行歸於周萬民所望此其所以列于敎官司諫掌糾萬民之德而勸之朋友正其行而強之道藝司救掌萬民之衺惡過失而誅讓之以禮防禁而救之皆列于其下居虎門之左司王朝李景齊曰虎門路寢也畫虎以示威武之象至於中門為雉門亦畵雉以象文明外文明而内威武髙明柔克沉潛剛克之意文明著于外威武潛乎内則王之威亦德威而已朱氏曰正義謂路寢庭朝及庫門外之朝非常朝此是常朝故知在路門外蓋路寢朝在路門之裏議政事則在此外朝在庫門之外國有大事詢衆庶則在此非常朝也毎日常朝王立于寢門外與羣臣相揖而已王又先揖羣臣就位王使入揖亦有髙下不同如天揖同姓是也胡明仲常云近世朝禮每日拜跪乃是秦法周制元不如此鄭鍔曰居門左者左尊而右卑師道尊故也言居門左則保氏居門右可知矣鄭康成曰司察也察王之視朝若有善道可行者則當前以詔王黄氏曰司王朝姦慝滛邪皆得察之掌國中失之事以敎國子弟鄭康成曰中中禮者失失禮者杜氏曰記君得失若春秋是也敎之者使識舊事鄭鍔曰國朝典故人有所不知者必以是而敎之焉陳君舉曰敎以三德三行以立其根本又須敎以國政使之通逹治體故國政之中者敎之以為法不中者敎之以為戒使之洞曉國家之本末源流則他日皆良公卿也凡國之貴游子弟學焉黄氏曰國子又曰國子弟弟繫之於其兄也貴游子弟其父兄之爵尊者也游鄭謂無官司者也司士曰以能任事此蓋不任之以事者與諸子游倅之游同義游倅非適不必貴貴游子弟兼適庶必貴者蓋常與王居者故國中失之事皆使學焉李景齊曰周自有敎國子之官師氏掌以媺詔王今考其職敎國子者尤詳焉乃所以廣於詔王之道非有二事也何者國子所頼以宿衛王宮最於王為近且宻師氏居虎門之左司王朝而以媺詔王則王之所聞者善言所知者正道固可以格其非心然退而寒之者衆則此心易摇故必詳於教國子使之皆善則在王所者長㓜卑尊無非薛居州王誰與為不善古之人臣所以納君於善而古之人君所以自置其身於無過者莫急於此保氏之職掌諌王惡而養國子以道者蓋亦是意後世之君非無所謂諫諍輔拂之臣而深居退處所對不過宦官女子則君心之易蠱冝矣陳君舉曰古者取士先國子次俊造夫國子非但王人之謂也記曰羣后之太子卿大夫元士之適子皆造焉則諸侯子在其中矣今見於經師氏居虎門教國子則􅀫衛王宫之士庶子宫伯所領者也大司樂成均教國子是謂胄子則常在學者也其餘不常在學特名在學士之版則歳春秋之一合諸學其籍在諸子其教則大胥小胥由此觀之列國之子與在周行者同衛王宫同入成均同𨽻學士之版於斯取才焉而用之曽何内外之辨傳言魯公之子伯禽衛康叔之子牟齊太公之子伋俱事成王而宣王欲得國子之能訓導諸侯者樊穆仲以魯侯對略可覩矣猶以為未廣也則鄉黨有賔賢邦國有貢士是謂俊造蓋以三百六十官迭來四方之彦而博極一時之選是故天下無遺才而王室亦無世官之弊故曰凡周之士不顯亦世周衰世卿為政姻婭膴仕而諸侯子不在教育選舉之科小雅刺之曰東人之子職勞不來西人之子粲粲衣服言仕京師者輙得志下國之士壅於上聞甚則衛之賢者仕於伶官簡兮之卒章曰彼美人兮西方之人兮風人以是為冝承事王者而困窮至此先王之澤熄矣漢設左官之律凡仕於諸侯者皆左選也且不得宿衛大樂律曰除吏二千石到六百石關内侯到五大夫以為舞人而諸侯子弟不與焉國子之分内外於是始何示人不廣乎凡祭祀賔客㑹同喪紀軍旅王舉則從才用反聽治亦如之鄭康成曰舉猶行也賈氏曰此數事王行之時師氏則從以王所在皆須詔以美道故也鄭康成曰聽治謂王舉於野外以聽朝賈氏曰上數事皆有朝以聽治之故從王亦如上虎門之左同故曰亦如之王氏曰師氏保氏凡祭祀賔客㑹同喪紀軍旅王舉則從聽治亦如之則是詔媺諫惡之官無適而非從夫然後王無一媺之弗為無一惡之弗去鄭景望曰王之出入起居無不與知隨事而將順正救之則達善於萌止惡於㣲過冝寡而德易成使其屬帥四夷之𨽻各以其兵服守王之門外且蹕音畢賈氏曰屬即序官上士府史胥徒之等使此人帥四夷之隷若秋官蠻隷等王氏詳説曰司隷云掌帥四翟之隷使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁是司隷帥之矣師氏之屬又從而帥之鄭康成曰兵服旃布弓劒不同賈氏曰東方南方其服布其兵劒西方北方其服旃其兵弓矢鄭氏曰門外中門之外蹕止行人不得迫王宫陳君舉曰天子中門之外下有兵衛上有卿大夫子弟之衛今也不設於此而使四夷之隷為衛若以服逺人為美觀則先王慮患疑不如此非我族黨其心必異脫有他禍萌於輦轂之下又豈止美觀而已王氏曰王唯無惡而有媺則四夷服而為役可責以守禦也孫氏曰師氏以媺詔王將欲起其修省之職而警其怠荒之漸故因之統帥焉五𨽻之人衆矣曰其在王宫者曰其守王宫者則亦擇而使之非雜然並進也易氏曰四翟之民即南方之蠻東南之閩東方之夷東北之貉其服屬為有素非西戎北狄比蓋周自文王之世西有昆夷之患北有玁狁之難惟東南之地王化先及以基王業至周公攝政制禮作樂推原乎主化之所始南方曰象則有象胥之職以待蕃國之使東夷之樂曰韎則有韎師之職以為宗廟之樂及此四翟之隷司隷亦帥之以備王室之守也朝在野外則守内列鄭鍔曰非特在國可使之守若朝在野外雖使之守藩盾之内列亦可大抵詔王以媺使吾王之德足以服人則雖無城郭溝池亦足以為固保氏下大夫一人中士二人府二人史二人胥六人徒六十人鄭康成曰保安也以道安人者文王世子曰保也者謹其身以輔翼之而歸諸道史氏曰王者之行美惡而已既有師氏以詔媺又有保氏以諫惡此所以善日加益而不自知孔子語事君之道必曰將順其美正救其惡故上下能相親此保氏不可不立如此掌諫王惡王氏曰師氏未有媺而詔之故曰掌以媺詔王保氏有惡而後諫故曰掌諫王惡鄭鍔曰或謂聖賢之君不免有過自非桀紂孰肯為惡今設官以諌王惡何耶余以為王者正身以正天下故有詔媺之官導之於善又不可無敢諫之臣以諫止其非媺則詔之於㣲若夫惡則必須力陳其非而去之人君未必肯為惡特保氏之官以諫惡為職職在諫惡故能保王之身輔翼之而歸諸道而養國子以道乃教之六藝史氏曰師氏之德行既根諸内而保氏所養養此而已夫有諸内必形諸外則藝也儀也人孰患其不習哉鄭鍔曰説者謂敎以德行則不言養敎以藝儀先言養之以道何也余以為藝則一能之可稱儀則容止之可觀養之以道然後敎之中有所主表裏相符華實相副矣養則涵養其心優而柔之使自求之饜而飫之使自趣之王氏曰道與之才先王達之以為藝道與之貌先王制之以為儀一曰五禮二曰六樂鄭康成曰五禮吉凶軍賔嘉六樂雲門大咸大韶大夏大濩大武三曰五射鄭司農曰五射白矢參連剡注襄尺井儀賈氏曰先鄭云五射已下無正文或别有所見白矢者矢在侯而貫侯過見其鏃白參連者前放一矢後三矢連續而去剡注者謂羽頭髙鏃低而去剡剡然襄尺者臣與君射不與君並立襄君一尺而退井儀者四矢貫侯如井之容儀四曰五馭鄭司農曰五馭鳴和鸞逐水曲過君表舞交衢逐禽左賈氏曰五御者御車有五種鳴和鸞者和在式鸞在衡韓詩云升車則馬動馬動則鸞鳴鸞鳴則和應先鄭依此而言水曲者謂御車隨逐水勢之屈曲而不墮水也過君表者若毛詩傳云褐纏旃以為門裘纏質以為閒容握駈而入轚則不得入榖梁亦云艾蘭以為防置旃以為轅門以葛覆質以為槷流旁握御轚者不得入是其過君表即褐纏旃也舞交衢者衢道也謂御車在交道車旋應於舞節逐禽左者謂御駈逆之車逆駈禽獸使左當人君射之人君自左射故毛傳云自左膘而射之逹于右腢為上殺禮記云佐車止則百姓田獵是也五曰六書鄭司農曰六書象形㑹意轉注處事假借諧聲賈氏曰六書象形之等皆依許氏説文象形者日月之類是也象日月形體而為之㑹意者武信之類是也人言為信止戈為武㑹合人意故曰㑹意轉注者考老之類是也連類一首文意相受左右相注故名轉注處事者上下之類是也人在一上為上人在一下為下各有其處事得其冝故曰處事假借者令長之類是也一字兩用故名曰假借諧聲者即形聲一也江河之類是也皆以水為形以可工為聲但書有六體形聲實多江河之類左形右聲鳩鴿之類右形左聲草藻之類上形下聲婆娑之類上聲下形圃國之類外形内聲闤闠衡銜之類外聲内形六曰九數鄭司農曰九數方田粟米差分少廣商功均輸方程羸不足旁要今有重差夕桀句股賈氏曰皆依九章算術而言云今有重差夕桀句股者此漢法増之王昭禹曰養國子以道然後此之所敎彼之所學相得以意𤼵於心應於手見於面盎於背不待言而後喻其能禮樂也非特鐘鼓玉帛而已禮與天地同節樂與天地同和彼之所及也其能射御也非特主皮執轡而已至於射以觀德行而武可習御不詭其遇而馳必正彼之所及也其能書數也非特記今昔計乗算而巳至於書足以文道德性命之情數足以致髙天星辰之逺彼之所及也六藝之所致理不在乎粗而在乎精則何適而非道乎乃敎之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容鄭鍔曰儀者德性之表見於動容周旋之際者也祭祀有祼獻薦徹之儀其容欲穆穆皇皇鄭康成曰祭祀之容齊齊皇皇賔客有拜迎揖遜之儀其容欲嚴恪矜莊鄭康成曰賔客之容穆穆皇皇朝廷則踧踖如也鞠躬如也其容欲其濟濟蹌蹌鄭康成日朝廷之容濟濟翔翔喪紀則有臨喪之容鄭康成日喪紀之客纍纍顚顚軍旅則有介胄不拜之容鄭康成曰軍旅之容暨暨詻詻車馬則有不内顧不親指之容鄭康成曰車馬之容匪匪翼翼賈氏曰祭祀之容至齊齊翔翔皆少儀文喪紀之容至暨暨詻詻玉藻文車馬之容匪匪翼翼亦少儀文國子異時從事於宗廟朝廷之上詎可不素敎之哉單子視不登帶言不過歩貌不道容叔向以為無守氣晉侯視逺足髙目不在體足不歩目單子以為不能久古之人視威儀省禍福則教國子以容儀誠不可緩然皆以道通之然後敎之則藝儀皆道之所寓歟凡祭祀賔客㑹同喪紀軍旅王舉則從聽治亦如之使其屬守王闈鄭鍔曰闈者宫中巷門王氏曰旁出之小門深宫雖非人所可知然自古史氏所書幽隱之事末有不彰聞於外者諫惡之官尤當自宫闈始史氏曰使其屬守王闈所以幾其出入從而諫也王氏曰師氏保氏皆使其屬守則亦有保之名焉守事非其身之所任矣黄氏曰保氏守王闈則益廹近矣師氏有四夷之隷故在門外然保氏掌諫王惡則其察之當益詳司諫中士二人史二人徒二十人鄭康成曰諫猶正也以道正人行鄭鍔曰官以諫為名乃諫王之職周家保氏諫王惡乃為萬民立司諫何耶余以為王者處心不在一身而在天下巳之德已成而無過亦欲天下之民有德行而無過惡為民設司諫猶巳有詔媺之師為民設司牧猶已有諫惡之保愚按司諫之職即今之提學官而設於敎官之屬以德行道藝之教皆自郷而行之興賢興能之事皆自郷而推之萬一郷里之間好惡不一而學術之或偏毁譽不公而選舉之失實則流弊孰從而禦之先王所以寄耳目於司諫而廵問觀察將以扶植正學而維持公論者實在乎此觀糾正辨考之辭便見有檢察核實之意掌糾萬民之德而勸之朋友正其行而強之道藝吕氏曰天生蒸民有物有則民之秉彜好是懿德非三代之盛誰能理㑹民德鄭康成曰朋友相切磋以善道朱氏曰人之大倫其别有五必欲君臣父子兄弟夫婦之間交盡其道而無悖非有朋友以責善輔仁孰能使之然哉故朋友之於人倫其𫝑若輕而所係甚重其分若疎而所關甚親其事若小而所職甚大此古之聖人修道立敎所以必重乎此而不敢忽非強附乎四者之間也自世敎不明君臣父子兄弟夫婦之間既皆莫有盡其道者朋友之倫廢闕尤甚夫人倫有五而其理則一朋友又其所藉以維持是理而不至於悖者也由夫朋友之義廢而責善輔仁之職不舉彼四者又安能獨盡而乆存哉鄭鍔曰掌糾萬民之德知其所修者德則勸之使親近朋友以自輔蓋自天子至於庶人未有不須友以成修德於内行見於外慮其矯僞怪竒則正其行使歸於中庸又強以道藝使不至於鄙樸廵問而觀察之以時書其德行道藝辨其能而可任於國事者鄭康成曰廵問行問民間也可任於國事任吏職鄭鍔曰廵而問之觀而察之見其德行道藝可書者則以時書之其或才能過人穎脫於倫輩之中他日可任國家之事者又别白而條具之吕氏曰郷官一屬特立一司諫專掌民事甚有意司諫以前若郷大夫考其德行察其道藝州長考其德行道藝黨正書其德行道藝旅師書其孝悌睦婣有學閭胥書其敬敏任恤到司諫􅁍又糾萬民之德而勸之朋友正其行而強之道藝如此詳盡方始以時書德行道藝辨其能而可任於國事者彼此各有一簿書互相參考以考郷里之治以詔廢置以行赦宥鄭康成曰廵問勸強萬民而考郷里吏民罪過以告王所當罪不王氏曰知吏之實故可以詔廢置知民之實故可以行赦宥鄭鍔曰廢置以馭吏赦宥以寛民民之不善非民之罪吏之過先王責吏不責民故吏不能敎民則罪之而民之德行道藝未至乃教之未至也如已為過惡能從吾之諫而改之吏則可廢置而民則可赦宥也鄭景望曰司諫以萬民德行道藝之能否考鄉里之治而詔廢置凡曰鄉州族黨閭比之吏孰敢罔民而欺上王昭禹曰考六郷之治以詔廢置固鄉師之事先王懼鄉師之職考之或有未盡故使司諫廵問而觀察之有以知吏之敎治之實此所以亦委以考其治而詔廢置也然郷師言歳終司諫不言則司諫所以考而詔之者不必歳終也司救中士二人史二人徒二十人鄭康成曰救猶禁也以禮防禁人之過者也王昭禹曰語曰汝弗能救歟則救者所以止其惡也鄭鍔曰易繫辭言小人以小善無益而弗為小惡無傷而弗去是故惡積而不可掩罪大而不可解先王設司救之官救其惡於細微使不至於滅身乃所以救之也史氏曰民之有司諫司救猶王之有師氏保氏所以使之歸媺改惡後世師氏保氏不立而以司諫兼司救之職為王補闕而拾遺民有衺惡過失不知以威誅讓之以禮防禁之而一於刑辟先王之意失矣掌萬民之衺惡過失而誅讓之以禮防禁而救之項氏曰邪與正反惡與善反過則非改失則非悔邪惡雖未麗於法然作於其心害於其事故不可以不救過失雖麗於法然猶未盡刑焉故亦救之而已王昭禹曰衺惡在心過失在事衺惡雖故罪而未麗於法過失雖麗於法然非故未可以施刑先王皆宥之黄氏曰衺惡未麗於罪猶今法輕情重過失麗於罪猶今法重情輕誅責之以法使之知悔而不為防禁之以禮使之自克而不犯皆所以救之於未甚史氏曰誅與讓不同防與禁亦異心之愧恥因辱而生辱之則追悔其巳徃身之犯法因囚而改囚之則思底於自新易氏曰如郷飲郷射祭社祭禜祭酺之類無非救之以禮而納之於善凡民之有衺惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空史氏曰讓者切責之罰者撻擊之士司宼之屬鄭鍔曰衺惡出於故為雖未麗於法害己加於人讓之至於再三乃有不愧畏焉則加以撻罰冝矣撻罰之加又至於三而不改是則怙終之人歸諸士師之官去其冠飾而書其罪惡之狀著之背以明示諸人而恥之可也坐諸嘉石視其罪之輕重定其坐日之久近坐日已滿則使司空役以勞辱之事則衺惡之心自消矣鄭康成曰嘉石朝士所掌在外朝之門左使坐焉以恥辱之既而役之司空使事官之作也坐役之數存於司宼鄭景望曰司諫既糾民之德矣衺惡過失又有司救一官救止於將然防禁於未然而誅讓於已然讓之三而後罰之罰之三而後刑之喻之也悉警之也至待之也久書所謂左右有民師保萬民其在是乎其有過失者三讓而罰三罰而歸于圜土鄭康成曰圜土獄城孫氏曰歸圜土之刑人不虧體罰人不虧財是亦教之以禮非廹之以刑鄭鍔曰過失雖非故為原其過誤讓之可也安有至三皆誤耶故亦三讓而罰不悛晝則任以事夜則歸以圜土視為囚徒也無知之民冝用刑禁以馭之恥之役之俟其改過自新委曲至此蓋重於用刑耳王昭禹曰先王謂人之知慮生於憂患死於安樂且以勞告強其支體汚辱發其志氣是故敎之以圜土平之以嘉石三年之任五等之役則其勞苦以強之辨之有明刑拘之以桎梏則其汚辱以教之黄氏曰司救圜土與司宼圜土輕重不同司宼圜土郷宫斷獄麗罪為當殺司刺訊於臣民以為過失而宥之者也此非司救讓罰之所得行於其初𤼵有司直執而治之卒乃寘之圜土司救圜土即鄭所謂酗醟好訟抽拔兵器誤傷害人雖有罪本其為無意者也是故讓罰行焉不改而納之圜土此其輕重之等不同司救圜土先嘉石司宼嘉石先圜土緫論黄氏曰衺惡雖未麗於罪而誅其意故讓罰不改坐諸嘉石罪之則無其法也過失雖麗於罪而原其意故讓罰不改内諸圜土本以待過失之當宥者是猶以本法治之凡司救調人當行之事皆禀之於司徒與其地治者聽之凡歳時有天患民病則以節廵國中及郊野而以王命施惠史氏曰天患菑眚民病札瘥也以旌節表之使民知施惠出於王命也黄氏曰施惠懼其養之不給而或陷於罪鄭鍔曰郷師言以王命施惠而不持節此乃持節者蓋郷師歳時廵國及野賙民囏阨乃歳之常也此則天患民病遣行廵視一時之恩故執節以為信漢唐以來遣使持節以賑民凶荒其基於此二官持節與否雖或不同以王命施惠欲恩歸於王則一而已楊氏曰衺惡過失非天患民病之類蓋司救以救民為職故凡歳時有天患民病而以王命施惠所以振救之鄭景望曰兼以救民瘼為職也夫為防萬民之過惡而立官以施惠特兼之豈不以民衺惡過失重於烖害也此亦自古皆有死民無信不立之意周禮訂義卷二十二
