body:
  text: 周禮訂義卷五宋王與之撰宰夫之職掌治朝之灋以正王及三公六卿大夫羣吏之位掌其禁令鄭康成曰治朝在路門之外黄氏曰掌治朝之法者冢宰掌邦治故王眡治朝則冢宰贊聽治而宰夫掌其法以正王及諸臣之位法謂其事當聽於治朝者若今三省取㫖軍司引見公事禮部奏進士名三衙進呈軍器之屬是則皆有其法矣王位若今御坐與臨軒也公卿大夫之位其進退升降各有據鄭言其位司士掌焉宰夫察不如儀者非也司士朝儀之位蓋常朝也宰夫治朝之位王聽治當時王者位于此也羣吏府史府主藏史主書將有所治故亦有位王昭禹曰治以致其事皆謂之吏此先三公六卿大夫而後言羣吏則非大夫以上矣蓋自士而下言之王氏詳說曰司士掌治朝之位言公卿大夫必及其孤但治朝以孤為東面外朝以孤為西面耳今宰夫掌治朝之法言公卿大夫而不及孤者卿即孤也典命言其卿六命則孤亦六命矣况三孤與六卿合而為九言卿而不及孤官不必備也若乃羣吏之位則司士謂在路門之左右者也在公卿大夫之後則謂之羣士在公侯伯子男之後則謂之羣吏對文則異散文則否陸氏曰治朝之位孤卿東面外朝之位左孤卿右公侯伯子男射人孤東面卿大夫西面皆尚右内外之禮異也總論三朝孫氏曰案司士朝儀之位王族故士虎士在路門之左南面東上大僕大右大僕從者在路門之右南面西上則知皇居之重宿衛之衆皆屬司馬而治之以軍政惟大宰之贊聽治所謂一相在内無所不統者也使其令不行於朝廷則相權輕而朝綱紊故不盡委諸司馬必使宰夫掌治朝之法而申以禁令之嚴叙羣吏之治而待其命令復逆之至然後提綱振領皆歸一相奔走禦侮各效臣節若夫燕朝則師氏司之外朝則司冦聽之大宰皆不得而參何哉蓋燕朝者居宫中之隠非體貌大臣之地燕安鴆毒乃㳺􅇣淫樂之所從生左右非人則䜛諂面諛所必至於是臨之以師保正之以僕臣友之以史氏詔􅍇諫惡有箴規之益左右先後無便辟之私見聞日廣志意日修則大宰雖不身親乎其列而以人事君莫大於此外朝者其地廣逺諸侯諸吏之所赴州長百姓得而入皆隷於司冦先王之時官各有守而不容以相奪地官掌教則六卿皆受法于司徒宗伯掌禮則朝覲㑹同為上相夏官掌政則軍旅之戒令雖地官之屬亦惟司馬之聽焉司冦之職得專行於外朝又何嫌哉叙羣吏之治以待賓客之令諸臣之復萬民之逆王昭禹曰次叙羣吏凡有預於賔客之令臣民復逆之事者皆是楊氏曰禮之於賔客各有司存宰夫以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽則所與從事者非一職也不叙羣吏之治以待其令則所以奉賔客者或失其叙矣愚案郊勞眡館令之行人儀容辭令令之司儀聚􅈀之事令之野廬委積之事令之委人王氏詳説曰令戒也令之使疾於趍事者宰夫也李景齊曰上有所令而下有所言則謂之復上無所令而下有所言則謂之逆黄氏曰臣民言事為令為復為逆其當否其可行其不可行而必關於羣吏之治故叙而待之王昭禹曰諸臣非無逆也以出納者臣之事故言其復而已萬民非無復也以民之賤不必問焉而以言故言其逆而已然則大僕掌諸侯之復逆小臣掌三公及孤卿之復逆御僕掌羣吏之逆及庶民之復所掌不同者蓋大僕小臣御僕皆王之左右前後所以侍御使令之臣而出入王命者以職之尊卑而分掌宰夫掌治朝之法以事叙羣吏之治使待臣民之復逆則大僕小臣御僕皆宰夫叙之也陳及之曰叙羣吏之治至萬民之逆即漢尚書職事今章奏告㨗是也大僕𫝊令於宰夫宰夫日夕與天子親近執奏掌百官府之徴令辨其八職鄭鍔曰自上召下謂之徴自上使下謂之令百官之府皆有徴召然非其職之所統治則雖有所徴而不至雖有所令而不從宰夫掌徴令而辨其八職使各有所統治然後上可以號下而下不敢以違黄氏曰周禮徴令有二王與冢宰有所徴召之令宰夫百官府之徴令是也征斂稅賦之令司書逆羣吏之徴令是也王召百官府將有所訪問宰夫掌之必辨其八職其凡要在正與師其數目在司與旅其財賄文書在府與史其節次督趣在胥與徒必辨其職則徴召無差忒愚按大宰八法以出治之敘言之故官常為先繼之以官成官法宰夫八職以小大之敘言之故官法為大繼之以官成官常一曰正掌官灋以治要王氏曰以其屬之所取正故謂之正王昭禹曰正則六官之長所謂建其正也王昭禹曰法八法以其用之以治官府故謂之官法鄭康成曰治要若嵗計也王氏曰積凡以為要要則月計要則師之所掌而正治之若夫㑹則正之所掌而王治之矣二曰師掌官成以治凡王氏曰師其官屬所受教者王昭禹曰若小宰之於大宰小司徒之於大司徒所謂立其貳王昭禹曰官成則八成也鄭康成曰治凡若月計也王氏曰積日以為凡凡旬計也宰夫所謂旬終則正日成是也官成則師之所掌以經邦治凡則司之所掌而師治之二曰司掌官灋以治目王氏曰司各自司其職事者王昭禹曰若天官之宰夫地官之鄉師之𩔖所謂設其攷者也王昭禹曰官法即八法所謂官法以正邦治者也劉執中曰司亦曰官法其司之法也鄭康成曰治目若今日計也王氏曰積數以為目目則日計日計則旅之所掌而司治之史氏曰目者凡之細治之枚分條析皆有其名不至於茫然無所攷也四曰旅掌官常以治數王氏曰衆有從謂之旅王昭禹曰六官之士是也六官獨於下士言旅此則合上士中士而言之所謂陳其殷者也王昭禹曰常則八法所陳官常也鄭康成曰治數每事多少異也王氏曰數則一二三四是也官常所以聽官治而旅掌之一二三四之數則府史之所掌而旅治之史氏曰數者目之細治之銖校寸積皆有其數不至於汎然無紀也總論以上四者黄氏曰正師皆是長官也正以糾正為義師以教師為義司以司察為義旅衆也以分職為義正師之治簡司旅之治詳凡詳於要數宻於目鄭氏以大宰為正小宰宰夫為師上士中士為司下士為旅非也下士為旅蓋見六卿之屬有旅下士故據之六卿之屬旅下士亦以分職為義也此言百官府之八職凡官府不必備此八者以其所以稱正稱師與其他所以名官皆可以𩔖通矣官法官成官常即冡宰所治之八法五曰府掌官契以治藏才浪反王昭禹曰府主蓄藏必有要書以為驗故掌官契契要書也其用以合驗為主故謂之契藏則凡所蓄聚之物史氏曰府者主蔵之吏也夫茍欲為治則版圖契券可以得其山川之險易戸口之多寡也不爾則將無所稽雖欲治要治凡治目治數有不可得此府所以治蔵也六曰史掌官書以贊治王昭禹曰六官之事衆矣載而述之必有書史掌官書則於事無所不贊焉故曰贊治蓋正則治要師則治凡司則治目旅則治數府則治藏史則無所用治掌官書以贊之而已蓋史也者能文而不能實可以贊治黄氏曰史案牘可攷於治為贊助七曰胥掌官敘以治敘賈氏曰胥有才智為什長當次序官中須人驅役之處則科次其徒故云次序官中也鄭康成曰如今侍曹五伯𫝊吏朝也王昭禹曰敘先後之倫胥雖賤而在下足次其徒而長之故掌官中事治先後之序也八曰徒掌官令以徵令王昭禹曰徒給役之賤者能往徴令者也鄭康成曰徵令趨走給召呼鄭鍔曰説者謂徒屬百官府者烏有徵令耶盖百官府之徵令則奉在上之命其行徵令者百官也故宰夫掌之徒所徵令則處乎百官之下縣都奔走之人非傳命令者孰從而徵令之乎總論八職史氏曰𫝊曰勞心者治人勞力者治於人自要而總其凡自凡而總其目自目而總其數皆治人者也至於府史胥徒治於人者長貳參佐之執役者也掌治灋以攷百官府羣都縣鄙之治賈氏曰宰夫是鈎考之官故以治法考百官府羣都縣鄙之内治功善惡也鄭鍔曰六官皆有攷各得以攷其屬天官之攷非攷其屬而已又以攷百官府羣都縣鄙之治與夫五官之攷其一官之屬異矣鄭康成曰羣都諸采邑也六遂五百家為鄙五鄙為縣言縣鄙而六鄉州黨亦存焉黄氏曰鄭說非也鄉遂皆官府也縣都之地不為都者皆為都鄙如邊之制遂人可考天子使吏治之故稱之曰羣都縣鄙以同於逆也王氏曰所謂縣者縣師所掌間田之縣也王昭禹曰大宰出法以治之小宰守法以逆之宰夫循法以攷之乗其財用之出入賈氏曰謂上數處用官物者當乗計其用財之出入知其多少黄氏曰大府曰凡官府都鄙之吏及執事者受財用焉故宰夫考其治而乗其出入鄭康成曰乗猶計也賈氏曰計者筭法乗除之名出於此也王氏曰不言㑹而言乘者以一二三四計之則謂之乗總會其數則謂之㑹欲知其總數則冝言㑹欲知其别數則宜言乗今此欲知其失財用物辟名足用長財故言乗其出入也鄭鍔曰利之所在姦偽必萌人能於財利之際不萌貪欲之心者㢘吏也故攷吏治而以乗財用為急凡失財用物辟名者以官刑詔冡宰而誅之其足用長財善物者賞之王氏曰失其所蔵之貨賄謂之失財史氏曰侵欺也非所用而用之謂之失用所失之物非貨賄也而謂之失物鄭康成曰物畜獸也史氏曰失物盜也鄭康成曰辟名詐為書以空作見文書與實不相應官刑在司冦五刑第四者黄氏曰失財用物有過誤有乖違其罪皆可議惟辟名則必行其誅賈氏曰有用而能足財又能長物又能善如此者賞之李景齊曰財之虧者有誅財之裕者有賞是上之人汲汲於此課天下之吏則吏急於規君之賞者毋乃於法外以剥民如後世所謂充羡餘之貢者乎不然周之賦民自有定制彼安得以恣法外之斂宰夫所職之意亦以示羣吏之不敢妄費者矣孫氏曰周家本治以㑹財因財而知治故宰夫治官之攷必掌治法以攷百官府羣都縣鄙之治而後乘其財用之出入使治法無所攷則財用亦不可得而乘之矣司㑹本為邦計設未常汲汲於財所掌者六典八法八則以逆邦國都鄙官府之治為先其參互要㑹亦以周知四國之治而已先王又非以財為不足計也自昔治之與財常若一體不可强分故攷治即所以㑹財也劉執中曰司㑹掌以參互攷日成以月要攷月成以嵗㑹攷嵗成以周知四國之治以詔王及冡宰廢置宰夫掌治法以攷百官府羣都縣鄙之治而後乘其財用之出入以至誅之賞之則内外之財用賞罰總於冡宰然則司㑹之失財用物辟名者宰夫得以攷之而詔於冡宰矣以式灋掌祭祀之戒具與其薦羞從大宰而眡滌濯賈氏曰祭祀大小皆有舊法式依而戒敕使共具之林氏曰式有多少之數法有制度之節孫氏曰式者出於大宰之九式所以制其用財之度也式既定則治事各有法此所以相依而行先王之時百治並舉而財用不遺者以有是式法而已大宰出式法者也小宰宰夫執持是式灋者也又有司㑹總其大計而為之主張維綱焉及其頒財致用也大府既授以式法復從職嵗受之由是散在有司無不奉式法以從事至㑹計之際各以式法贊之職幣又以式法斂其餘焉在易之節曰節以制度不傷財不害民其斯之謂歟王氏詳説曰太宰於祭祀言戒具而未嘗言法不掌法矣宰夫式法兼掌此所以見治小而詳也鄭康成曰薦脯醢也羞庶羞内羞也賈氏曰儀禮鄉飲酒鄉射燕凡單言薦者皆脯醢也庶羞謂天子八豆諸侯六豆之𩔖内羞謂祭祀食後所加言内者少牢所謂房内之羞糗餌粉餈是也王昭禹曰小宰以法掌戒具以贊大宰宰夫又以贊小宰也凡禮事贊小宰比毗志反官府之具鄭康成曰比校次之王氏曰小宰以法掌祭祀朝覲㑹同賔客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用所謂官府之具者此也祭祀則吉禮之事朝覲㑹同賔客則賔禮之事軍旅田役則軍禮之事喪荒則凶禮之事王昭禹曰禮事不一則比敘之者亦非一官府小宰以禮校比其具宰夫又從而贊之凡朝覲㑹同賓客以牢禮之灋掌其牢禮委于偽反積予賜反膳獻飲於鴆反食音嗣賓賜之飱音孫牽與其陳數鄭康成曰牢禮之法多少之差及其時也三牲牛羊豕具為一牢王氏詳説曰牢禮之法者蓋委積膳獻飲食賓賜之飱牽無非牢禮按聘禮云賔至大夫帥至於館宰夫朝服設飱是賔始至則有飱禮飱小禮又曰聘致饔是賔已至則有饔禮饔大禮先鄭以飱為夕食非也賈氏以饔餼為牢禮亦非也夫賔至設飱何待夕乎凡禮皆有牢何必饔乎委積膳獻飲食賓賜之飱牽掌客行人所掌可攷而知上公五積侯伯四積子男三積地官遺人所謂十里有廬廬有飲食三十里有宿宿有委五十里有市市有候館候館有積是委積往來道路間所給用也膳則掌客所謂上公殷膳大牢以及歸侯伯殷膳則無及歸子男又無殷膳矣此之謂膳獻則掌客所謂上公乘禽日九十雙侯伯七十子男五十唯上介皆有禽獻飲則行人所謂饗禮九獻侯伯七獻子男五獻此所謂飲食則行人所謂上公食禮九舉侯伯七舉子男五舉此之謂食賔賜掌客所謂凡介行人宰史皆有飱饔餼以其爵等為牢禮之陳數曰賔賜云者以其賔之故而賜其羣下耳此之謂賔賜飱牽則是自委積以下膳獻飲食賔賜皆有飱牽掌客所謂上公飱五牢饔餼九牢其死牢如飱之陳牽四牢侯伯飱四牢饔餼七牢其死牢如飱之陳牽三牢子男飱三牢饔餼五牢其死牢如飧之陳牽二牢此謂飱牽但致積致飱致饔餼致饔食與夫賔賜皆有牢禮必曰飱牽者以客始至之禮為言耳委積雖不言牢數然積視飱牽三問皆脩羣介行人宰史皆有牢鄭氏謂君用脩臣用牢非禮以為脫誤當矣由是言之委積亦有牢委積往來皆有之此所以先於膳獻飲食也言飱不及饔言牢不及死牢義亦在其中矣王氏曰陳數則以爵等為之牢禮所陳之數鄭鍔曰簋十有二牲三十有六皆陳醢醢百甕皆陳所謂陳數也凡邦之弔事掌其戒令與其幣器財用凡所共者鄭康成曰弔事弔諸侯諸臣也幣所用賻也器所致明器也始死弔而含襚𦵏而賵贈其加恩則有賻焉賈氏曰謂王使人弔諸侯自弔諸臣須從王行者并有贈喪之具百官當共故宰夫總戒令之與幣器財用凡所共者也大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之鄭康成曰大喪王后世子小喪夫人以下小官士其大官則冡宰掌其戒令賈氏曰三公六卿喪尊故宰夫與春官職喪帥其於喪家有事之官有司治之大夫喪卑故宰夫不自為使在已之旅下士帥有事於喪家之有司而治之陳及之曰鄭氏說治共辨也此不惟共辨而已古者卿大夫之喪其禮各視其命數所謂諸侯七介遣車十乘大夫五介遣車五乘與夫大斂小斂衣衾棺椁明器之𩔖悉有隆殺有功則升有罪則降王制曰大夫廢其事終身不仕死以士禮𦵏之是大要也春秋猶有此制臧哀伯死𦵏之加一等共仲孟穆伯則降之范獻子𦵏魏舒去其柏椁趙孟自誓柏椁三寸不設屬辟其禮必自上制之也然宰夫特案其大要其官府專掌之者固自有職喪也嵗終則令羣吏正嵗㑹月終則令正月要旬終則令正日成而以攷其治治不以時舉者以告而誅之賈氏曰嵗終周之嵗終鄭康成曰正定也賈氏曰攷其治者㑹要成總考之也王昭禹曰宰夫治官之考其職掌贊大宰小宰故嵗㑹月要日成皆使羣吏正之嵗㑹則使入于太宰月要則使入于小宰日成則宰夫受之治則案所入之計書而攷之先王以時興事治不以時舉則違時令而失其㑹罪莫大書曰先時者殺無赦不及時者殺無赦先王謹時令其嚴如此則違時者法之所必誅也王氏曰以告而誅者不待三嵗大計而誅之者也正嵗則以灋警戒羣吏令脩宫中之職事書其能者與其良者而以告于上鄭司農曰正嵗之正月以法戒敕羣吏林氏曰羣吏在宫中者王昭禹曰以法警戒者使之各謹於用法也正嵗小宰既以宮刑憲禁于王宫令于百官府今宰夫又警戒羣吏脩宫中之職事蓋賛小宰而令之也愚案能者才藝之優長良者器質之粹美宫中官吏與百司庶府不同凡飲膳酒漿之供幄帟次舎之役非有能者莫勝其任故先以書其能者彼才能雖優而器質不美有如姦邪柔佞之行便嬖側媚之人或濫厠其間亦足以蠱惑人主之心術故繼以書其良者林氏曰稽功緒則有能者糾徳行則有良者王昭禹曰書所以識之王氏曰宫正稽其功緒糾其徳行嵗終則㑹其行事然後宰夫得以攷其㑹而正嵗書其能者良者以詔于上鄭康成曰上謂大宰小宰王昭禹曰告于上將以賞之宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人鄭康成曰正長也主宫中官之長李景齊曰凡官言正皆萬民之所取正也宫正者王宫於是而取正掌王宫之戒令糾禁王氏曰戒戒其怠忽糾糾其緩散令使之有為禁使之勿為易氏曰戒而後令作其為善糾而後禁止其為惡王昭禹曰侍衛不嚴無以備非常左右不正無以謹近習况王宫者百官之治事皆㑹于此天下之治忽實本乎此不嚴其制何以謹近習而備非常先王擇人以為之正又使之掌戒令糾禁焉如是則在宫中者無非公正之士忠義之人非僻之心無自而啓姦宄之變無自而作以時比毗志反宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之鄭鍔曰先儒謂時四時也然宿衛欲嚴頃刻不可無禁安有四時始一校比之當與時禁之時同義鄭康成曰比校次其人之在否官府之在宫中者若膳夫玉府内宰内史之屬次諸吏直宿若今部署諸廬者舍其所居寺也版其人之名籍待待戒令及比也夕莫也莫行夜以比直宿者為其有解惰離部署鄭司農曰柝戒守者所擊也易曰重門擊柝以待暴客春秋傳曰魯擊柝聞於邾王氏曰夕擊柝而比之若今酉㸃故謂禍災令宿宿衛王宫春秋傳曰忘守必危况有災乎鄭康成曰故凡非常也文王世子公有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此謂諸侯也王之庶子職掌國子之倅國有大事則帥國子而致於太子惟所用之令宿之事蓋亦存焉賈氏曰令宿其比亦如之亦如夕擊柝已上之事王氏曰若今坐甲王昭禹曰先王之於宿衛其比之也以時其待之也以版固已詳矣而又夕擊柝而比之以宿衛於王宫者冝致其嚴故也陳及之曰胡五峯云先王之制凡官府次舍列于庫門之外所以别内外嚴貴賤也今宫正乃比宫中之官府次􅃕之衆寡又曰去其竒衺之民則是妃嬪與官吏雜處㢘陛不嚴而内外亂矣殊不知宫正所掌者宫中徒役之民與夫典婦功典絲枲染人屨人等官皆士人也皆有宫廬官署在内雖在宫中不應與妃嬪雜處漢郎吏舍衛士廬周匝殿内自後世而觀亦與宫嬪雜處耶稍有政事亦必有節制矣如胡氏之說則凡在外朝者悉士民可也凡在宫中者悉妃嬪可也餘說見内宰辨内外而時禁易氏曰王宫有内外自雉門内以至燕寢則為内自雉門外以至外朝則為外王昭禹曰王宫之官府與夫次舍之人在内者在外者劉執中曰内者有版也外者有門籍也無籍而入有版而不宿衛者辨而禁之不失其時也史氏曰外之入内之出不可不辨王氏曰時其出入啟閉之禁稽其功緒糾其徳行鄭康成曰稽猶攷也計也王昭禹曰興事造業謂之功功事有倫謂之緒功緒有多寡故稽之徳行有邪正故糾之王氏曰稽之防其怠糾之防其邪鄭鍔曰治職業者或有既成之功或功未成而已有端緒者從而稽之始見其任官之能謹操修者或有自得之徳或徳之成而見於所行者從而糾之始知其修身之美幾其出入均其稍食王氏曰幾謂微察其出入愚案宫正所幾乃宫中之羣吏固非士庶子亦非閽人所幾於中門之禁也王氏曰均平頒之也鄭康成曰稍食廩禄也賈氏曰言稍則稍稍與之月俸是也陳君舉曰此見先王廩給之意非若今糧料院使士大夫各持券書往請所以䕶養士大夫亷耻多矣伊川先生初赴召居闕下日用窘迫假貸於朝臣當時諸公謂其俸給不足索糧料院文書視之則自赴召以來未嘗往請正以持狀而請非先王養賢之意也先王之時只是各頒之官長使自均給之陳及之曰王朝之環衛宫正均其稍食王宫之内人内宰均其稍食王朝之諸臣稾人共其食愚案此皆庶人養之以稍食者若士庶子則有秩矣去起居反其淫怠與其竒音寄衺似嗟反之民鄭康成曰淫放濫也怠解慢也竒衺譎觚非常王昭禹曰竒無常也邪不正也淫怠竒衺不去則淪胥而敗矣凡在宫中之民尚然况吏士乎鄭鍔曰閽人言竒服怪民不入宫則竒衺之民是也民之行怪者或習為妖術以冒惑人茍留宫中之官府𫝊入宫禁而左道巫蠱之禍起易氏曰司𨽻掌帥四翟之𨽻使之各服其邦之服執其邦之兵守王宫此宫中之民其四𨽻之民耶㑹其什伍而教之道藝鄭康成曰五人為伍二伍為什王氏曰㑹其人以為伍㑹其伍以為什使之相保然後教以道藝也王昭禹曰道本藝末也道實藝華也教之道藝欲其本末華實俱得也君子學道則愛人小人學道則易使也惟愛人然後可以使之近君惟易使然後可責以守衛故教之道藝然不先㑹其什伍則莫相勸督而務學矣總論王氏詳說曰師氏以三徳教國子所謂道也保氏教之六藝所謂藝也然則師氏保氏分道藝而教之以致其詳宫正合道藝而教之以致其要師氏帥其屬守王門保氏使其屬守王闈初未嘗㑹其什伍也宫正則非惟教之道藝且㑹其什伍矣故以宫正名官月終則㑹其稍食嵗終則㑹其行事賈氏曰稍食謂宫中官府等月禄鄭康成曰行事吏職也王氏曰月終㑹其食為小宰受其月要故也嵗终㑹其行事為大宰受其嵗㑹故也王昭禹曰稍食必以月㑹行事必以嵗㑹而疏數不同者蓋養之詳而責之略矣夫事君先其事而後其食人臣之義也使人養之詳而責之略人君之仁也凡邦之大事令于王宫之官府次􅃕無去守而聽政令賈氏曰大事謂祀與戎則令于王宫之官府次􅃕使之皆在次􅃕不得去部所守而須有所為也春秋以木鐸脩火禁史氏曰火星三月見於辰九月伏於戍脩火禁於宫中必待春秋順時令也王氏詳說曰周禮有民火有公火司爟掌火之政令民火也司烜以夫遂取明火於日公火也王氏賈氏徒見司爟有季春出火季秋内火之文遂以為春秋火禁之證非也蓋宫正脩火禁於宫中而出納火者民火耳至於司烜中春脩火禁于國中言春而不及秋以出火為主耳宫正脩于宫中也司烜脩于國中也宫中非國中之比故併及其春秋王氏曰春秋脩火禁若今皇城四時戒火也凡邦之事蹕音畢宫中廟中則執燭王昭禹曰蹕則以嚴於禁止為事執燭則以明於照察為事皆衛至尊之道也事鄭氏謂祭事凡邦事孰非事也何謂祭事而已宫中廟中鄭氏謂祭社稷五祀於宫中祭先王先公於廟中史氏曰出入皆蹕禁馳驟而肅喧譁也祭則執燭禁昏晦而防不虞也大䘮則授廬舍辨其親疏貴賤之居鄭康成曰廬􅀝廬舍堊室賈氏曰猗廬謂於路門之外東壁􅀝木為廬堊室者兩下為之與廬異也親者貴者居􅀝廬疏者賤者居堊室雜記曰大夫居廬士居堊室史氏曰禁殽亂而别嫌疑也宫伯中士二人下士四人府一人史二人胥二人徒二十人鄭康成曰伯長也掌王宫之士庻子凡在版者愚案天子以天下為家守在四夷公卿大夫之子弟以天子為家守在王宫或謂王宫以士庻子守之則可若虎賁氏在國亦守王宫司𨽻帥四夷之𨽻執其邦之兵亦守王宫何也不知自中門以至路門皆宫也而王宫之衛自分内外各有其人士庶子之守在路寢之内次舍之中虎賁翟𨽻不屬之宫伯此必在寢門外明矣鄭康成曰士謂適子庶子其支庶王昭禹曰庶未命也士則為適也王氏曰非王族則功臣之世賢者之𩔖王以自近而衛焉故君臣國家休戚一體上下親而内外察王昭禹曰平時教之道藝以之充宫庭之衛冝也賈氏曰凡在版者子弟皆有名籍以擬校比也掌其政令行其秩敘作其徒役之事史氏曰凡所施者皆政所稟者皆令鄭鍔曰秩如常膳常酒之𩔖所當得之常賜也敘如下士中士之𩔖所當遷之等級也為人之子弟未有禄稍以廩之未有列位以􅂌之必有敘以進之謂之行者言當推而行之使無留滯壅遏也說者謂只於宫伯與里宰二官言行其秩敘何也蓋里宰之秩敘所以勸農夫之力田不行則農不勸此所以勵士庶子之衛上不行則忠節不立王氏曰有役焉則作其徒也王昭禹曰諸子國有大事則帥國子而致於太子惟所用之則作其徒者以其太子之役故也夫其親則役於其君子弟則役於太子此休戚所以一體而無異慮歟授八次八舎之職事鄭康成曰衛王宫者必居四角四中於徼候便也次其宿衛所在􅃕其休沐之處王氏曰授宿衛之職事也史氏曰次􅃕必以八者環八方以衛宸居如宿之拱極也職事者嚴更擊柝静蹕無譁以躬其勞也鄭鍔曰宫正言次舎此言八次八舎何也宫正掌官府之在宫中者則固有直廬矣此乃子弟分以授之或處四角或處四中授以所次之廬所宿之舎使各任徼候之事則與已有職異矣若邦有大事作宫衆則令之賈氏曰事亦謂冦戎之事也作起也易氏曰士庶子之職有當行者有不當行者出而守禦國鄙如諸子所謂帥國子而致于太子唯所用之此在所當行而宿衛王宫若宫正所謂令于王宫之官府次舍無去守而聽政令豈所當行者哉令之令無去守而已月終則均秩嵗終則均敘王氏曰秩酒秩膳之𩔖日月有焉故月終則均之勞逸劇易冝以嵗時更焉故嵗終則均之王昭禹曰㑹為之大計均平頒之而已宫正尊於宫伯故主其㑹宫伯卑於宫正故主其均以時頒其衣裘掌其誅賞鄭康成曰頒讀曰班班布也衣裘若今賦冬夏衣也賈氏曰夏時班衣冬時班裘也易氏曰此誅賞之法即推行宫正戒令糾禁之法者也戒而後令作其為善糾而後禁止其為惡此宫正所以列之於始為善不怠勉之以賞為惡不悛厲之以誅此宫伯所以敘之於終李景齊曰稍食所以養之衣裘所以被之食人之食則思所以死人之事被人之衣則思所以懷人之憂先王所以厚之也者亦使之有以充其責而已掌其誅賞者凡以懲勸之而巳言誅賞而不言所告則冢宰大臣也廢置誅賞尚以詔王則宫伯可知矣衣裳之頒所以示其仁誅賞之行所以示其義仁以親之義以制之先王所以治國子者固有道矣此所以用之於宿衛則無間之可乘用之於守固則無患之弗禦安危一心而上下以親休戚一體而内外以察總論薛平仲曰宫正比宫中之官府次舍之衆寡視王朝之官府為親矣宫伯掌王宫之士庻子以授八次八舍之職事視宫中之官府為親矣陳君舉曰凡環衛有二等其一是公卿大夫之子弟分置八隅宫伯領之其職云掌王宫之士庻子是也其一是官府凡在宫庭者徒役錯置於士庻子八次八舍之間周列環衛以固王室宫正領之其職云掌王宫之戒令糾禁比宫中之官府是也二者皆環列之衛至於人主切身侍御僕從則令掌於大僕故宫伯宫正所掌是總於冢宰春秋猶存此意如楚潘崇為之師掌環列之尹至漢則宫伯所掌者謂之兵衛屬之衛尉而大僕惟掌天子輿馬及扈從至於羽林佽飛之屬乃𨽻於光禄勲為天子私人官職分散矣愚案先王陳設兵衛皆使冢宰統之召伯以西伯為相命仲桓南宫毛俾爰齊侯吕伋吕伋大司馬之屬亦須命而後行蓋宰臣統宿衛此最有意鄭伯謙曰宿衛之兵有四居則有宫中之徒役公卿大夫士庶子以為環列腹心之衛宫正宫伯所掌是也出則有虎士八百人掌先後王而趨以卒伍視朝則在路門之右若虎賁所掌是也奉輿馬督扈從視朝則在路門之左則有大僕以掌之執其兵器服其兵服以衛王門之外朝在野外則守内列則有司𨽻以掌之所謂使其屬帥四夷之𨽻是也由是言之環列腹心之衛非兵衛在内而不出虎士之衛王不出亦不行四翟則以王之出而環衛諸門侍御僕從之役則以王之行而飭整騶從此宿衛之别也又曰宫正宿衛之士統於大宰而虎賁之虎士八百人亦王之親兵乃不統於太宰而散諸司馬者何也曰此司馬亦聽命於大宰耳必散諸司馬者内外雖不以相統而彼此不可不相持是以兵衛掌於宫正而王之親兵與四夷之兵則掌於虎賁司𨽻漢以南北軍相制而國朝以皇城司殿前司相維持大抵皆周人遺意陳及之曰王者一身以徳為車以樂為御禮樂可為干櫓忠信可為甲胄其居可以屏環衛其出可以消外侮夫何變難之有而必如是委曲詳盡者亦為人主之道不可如是簡率也故其居則有士庶子之環衛諸門則有閽人夷𨽻之掌守其出則有虎賁八百人條狼氏八人掌舎設梐枑設轅門若有肘腋之變則扞衛有人是豈自削弱者哉周禮訂義卷五
