body:
  text: 周禮訂義卷六十一宋王與之撰鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鄭司農曰鄉士主六鄉之獄鄭鍔曰鄉之刑官最多葢六鄉之人民至衆而小人無知觸法者多也非特刑官之衆史胥共二十四人而徒則百有二十人亦豈非六鄉之廣追逮之多故歟掌國中黄氏曰六鄉之民王所自治故其獄在國中六鄉教之詳矣其刑亦不同故司徒曰鄉八刑司寇曰鄉刑是也百官之獄亦聽於此王昭禹曰鄉之獄訟不聽於鄉而聽於國遂之獄訟不聽於遂而聽於郊縣之獄訟不聽於縣而聽於野以其所掌逺而察之欲其近也各掌其鄉之民數而糾戒之鄭康成曰鄉士八人言各者四人而分主三鄉王氏曰鄉士通掌國中而分掌其鄉也鄭鍔曰鄉民之數教官掌之此又掌其數者葢欲行糾戒非正治其數也黄氏曰糾戒之恐其昏迷抵誤而䧟於法也然六鄉四郊郊獄或别主郊刑恐亦有與鄉不同易氏曰聖人於刑獄非得已而用分職降典而後折民惟刑相我受民而後能和其庶獄則夫戒之糾之令之毋使罪麗於民聖人之本心也聽其獄訟察其辭鄭康成曰察審也鄭鍔曰聽其獄訟而不察其辭則曲直失當情無由伸王昭禹曰獄訟以辭為主書曰師聽五辭又曰察辭于差以盡其情而已辯其獄訟異其死刑之罪而要之旬而職聽于朝鄭鍔曰惟察辭已知其詳乃從而辨之注以辯為辨别之辨今本字皆作辯是辯論其獄與其訟之情狀也其有死罪者則别異其文書使與不死之刑異不有以辯之又安能異之耶賈氏曰異其死刑之罪者死與四刑輕重不同文書亦異王氏曰死刑之罪定而又要之若今責伏辯矣鄭鍔曰罪之要辭謂之要尚書曰丕弊要囚皆謂罪人所犯之定論也賈氏曰雖得要實之辭罪定仍至十日乃復以斷刑之職聽斷于外朝恐囚虚承其罪十曰不飜即是其實然後向外朝對衆更詢乃與之罪鄭鍔曰入聽於朝必待一旬則在已所思者欲審容囚者亦得以反覆也黄氏曰職聽謂典其獄者典獄移而聽于朝司寇親聽之易氏曰外朝之位羣臣羣士西面諸侯羣吏東面而三公北面州長衆庶在其後職聽於此則將以盡人之情司寇聽之斷其獄弊其訟于朝王昭禹曰司宼聽之者以司寇正刑明辟也弊其訟於朝則無所容其私賈氏曰弊亦斷也異言耳陳及之曰自方士以上凡獄訟輕者得自斷必死刑然後職聽於朝司寇不敢專也自春秋以來凡死刑必請于上然後殺晉祁氏擅殺其家臣而晉人殺之趙鞅擅殺趙午而晉人以為始亂猶舊制也至於諸侯將自専之故訝士得諭刑罪于邦國凡四方之有治於士者造焉耳羣士司刑皆在各麗其灋以議獄訟賈氏曰吕刑之師聽五辭是也恐専有濫故衆獄官共聽之易氏曰又欲盡羣士司刑之情鄭康成曰麗附也各附致其法以成議王氏曰若司刑掌五刑之法司刺掌三刺三赦三宥之法又或掌官法或掌官成或掌官常各麗其法鄭鍔曰當聽獄之時羣士司刑皆在各出所見引法以為證攷其人所犯之罪而附麗於法共評議之使罪與法相應也愚案議之如何王制曰凡聽五刑之法必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聦明致其忠愛以盡之此足以想見當時之所議王氏詳説曰鄉遂縣方皆云職聽于朝司寇聴之羣士司刑皆在而不及三公參聽羣士司刑皆在則是三公亦在但周公設官之意不欲使卑者臨尊舉卑以見尊耳獄訟成士師受中王昭禹曰獄訟成謂獄訟之辭成而無虧鄭鍔曰及議已定然後士師受中成者議已定而不變也中者所斷之得中無過不及也易氏曰書謂之中若書所謂咸中有慶小司寇所謂登中於天府葢獄訟至於中則無不當焉王昭禹曰士師受中謂受其事實之書協日刑殺鄭司農曰協合也和也和合支幹善日若今時望後利日賈氏曰子丑等是支甲乙等是幹鄭鍔曰擇其可殺之日然後行刑刑欲期無刑故擇其支干皆利之日肆之三日賈氏曰肆陳也殺訖陳尸鄭司農曰語曰肆諸市朝春秋𫝊曰三日弃疾請尸鄭鍔曰逮三日之久使人共知然後弃之王昭禹曰所以懲衆若欲免之則王㑹其期鄭康成曰免猶赦也劉執中曰死刑而欲免之用八議也鄭康成曰期謂鄉士職聽于朝司寇聽之日王欲赦之則用此時親往議之陳及之曰縣士以上三官皆云若欲免之則㑹其期夫人苟犯吾法既委之司寇且羣士司刑皆在議刺赦宥之已詳而又欲免之亦不忍之心存焉耳雖然苟其罪不可赦亦從有司之議焉李嘉㑹曰一人有罪王與三公羣臣盡心協力以議其罪果不可免人亦何辭王氏詳説曰王制有三宥文王世子三宥之外又有必赦書曰宥而不曰三宥又有所謂辟者焉鄉士遂士縣士則曰免而又不曰三宥又有所謂㑹其期者書為商頑民設也故曰宥不曰三宥又曰在辟文王世子為公族設也故又云走出致刑于甸人而又有必赦之語此不曰三宥者三宥已見於司刺矣若欲免之且㑹其期豈有不至三乎大祭祀大喪紀大軍旅大賔客則各掌其鄉之禁令帥其屬夾道而蹕賈氏曰大祭祀若祭天四時迎氣即於四郊大喪紀當葬所經道大軍旅王出行所經過大賔客四方諸侯來朝各由方而入並過六鄉路以是故各掌其郷之禁令鄭康成曰屬中士以下王昭禹曰祭祀喪紀軍旅賔客之大者與邦之大事大役掌其禁令而蹕則以獄官掌之欲無敢犯而其所掌則有尊卑故也三公若有邦事則為之前驅而辟賈氏曰三公有邦事湏親自入鄉則鄉士為公作前驅引道而辟止行人鄭鍔曰使敬大臣王昭禹曰公卿大夫教治政事之所自出非刑官先而辟焉則有所不行故也其喪亦如之賈氏曰公卿大夫之喪死於此者及葬為之前驅而辟凡國有大事則戮其犯命者賈氏曰謂征伐田獵之大事故有犯命刑戮之事鄭鍔曰民雖鄉官所治刑戮則在鄉士黄氏曰權時之法遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人鄭鍔曰考遂士以中士十有二人為之先儒謂鄉士主六鄉之獄遂士主六遂之獄所以鄉士使上士官尊而人少遂士使中士官卑而人多者六遂去王國逺故官卑以六遂在逺郊外兼主公邑地廣人衆故官多今考鄉士之官雖用上士止於八人然又有中士十有六人又有旅下士三十有二人然則鄉之官多於遂矣先儒殆弗深考掌四郊鄭康成曰謂其地則距王城百里以外至二百里言掌四郊者此主四郊獄也六遂之獄在四郊賈氏曰亦若六鄉地在王城外獄在城中王氏曰所謂四郊非鄉地所謂野非遂地葢公邑之在郊野者各掌其遂之民數而糾其戒令鄭康成曰遂士十二人言各者二人分主一遂王氏曰鄉士言糾戒之而遂士言糾其戒令者鄉治詳故鄉士不特糾之而已又戒焉縣遂治略無所戒也違其戒令則糾之而已聽其獄訟察其辭辯其獄訟異其死刑之罪而要之二旬而職聽于朝賈氏曰去王城漸逺恐多枉濫故至二旬容其反覆也王氏曰鄉士一旬而職聽于朝謹用刑也遂士以二旬縣士以三旬則逺故也司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其灋以議獄訟獄訟成士師受中協日就郊而刑殺各於其遂肄之三日鄭康成曰就郊而刑殺者遂士也遂士擇刑殺日至其時往涖之如鄉士為之矣賈氏曰鄉士獄在國中不湏言就此去郊差逺故云就郊也六鄉之獄并在國中不得言各六遂之獄分在四郊之外故湏言各也若欲免之則王令三公㑹其期鄭康成曰令猶命也王欲赦之則用遂士職聽之時命三公往議之王昭禹曰鄉之獄則王親㑹之遂之獄則王令三公㑹之縣之獄則王令六卿㑹之所以聽而議之以逺近為之差也王氏曰士師為王前驅鄉士為三公前驅遂士為六卿前驅縣士為大夫前驅今鄉士以王㑹其期遂士以三公㑹其期縣士以六卿㑹其期至於大夫則不復㑹其期此所㑹之期以尊者為先可知矣若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕黄氏曰大事即大祭祀大喪紀大軍旅大賔客也鄉舉其目遂舉其凡不必言王所親也邦之大事遂未必盡與政令及之則聚其衆庶遂士掌其禁令賈氏曰四郊之外無大祭祀大喪紀惟有大軍旅大賔客出入所經二者有聚衆庶之事故緫云大事聚衆庶耳賈氏曰此雖不言夾道亦當夾道蹕也六卿若有邦事則為之前驅而辟其喪亦如之賈氏曰六鄉近則使三公六遂差逺使六卿凡郊有大事則戮其犯命者黄氏曰其事在郊有犯命者遂士専戮之遂獄在郊也縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人黄氏曰縣士所掌野獄自三百里至五百里稍縣都之餘邑王自使人治之者也家都之獄方士治之稍不為家縣都則為餘邑其獄縣士治之謂之縣士鄉法成於州野法成於縣稍縣都餘邑皆行縣法如遂緫稱之曰野各掌其縣之民數合稍縣都之餘邑分為三十二而各主其民數也康成之説是掌野王氏詳説曰鄉士上士八人鄭氏以為四人分主三鄉是二分治其六鄉之獄遂士中士十二人鄭氏以為二人分主一遂是六分治其六遂之獄縣士中士三十二人賈氏以為三百里之稍地地狹人寡以十人治其公邑之獄四百里之縣地五百里之都地地廣人多以二十二人分治公邑之獄方士十有六人鄭氏以為四人主一方是四人分治其三等采地之獄然縣士之説賈氏失之賈氏亦本鄭氏之意而為是説也縣之名不一而足大司徒四甸為縣是二十里之縣也遂人五鄙為縣是二千五百家之縣也載師小都之田任縣地是四百里之縣也縣師掌邦國都鄙稍甸郊里之地域夫外而邦國内而郊里繫之縣師者是天下亦得謂之縣也中而都鄙稍甸繫之縣師者是四等公邑亦得謂之縣也鄉士掌鄉獄遂士掌遂獄方士掌采地之獄則知縣士掌四等公邑之獄矣惟六鄉無公邑之田自遂達畿自二百里至五百里而公邑之田在是矣先鄭鄉士遂士之説謂百里二百里與後鄭同而以三百里至四百里為縣非也以四百里至五百里為方亦非也後鄭鄉遂縣方之説最合於經但以距王城二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都為都縣野之獄焉其意以為四等公邑而二百里之甸所有公邑之獄遂士兼之故止於三等公邑也殊不知遂士之不可兼治公邑猶鄉之不可兼治六遂況縣士三十有二人則是以八人主一等公邑是四分治公邑之獄設官之數豈不曉然乎鄭氏得之於縣師而失之於縣士學者所未喻各掌其縣之民數賈氏曰序官縣士三十二人縣獄既有三處葢三百里地狹人少當十人四百里五百里地廣民多當各十一人故云各掌糾其戒令而聽其獄訟察其辭辯其獄訟異其死刑之罪而要之三旬而職聽于朝賈氏曰去王又逺故加至三旬林椅曰鄉遂縣士糾其民數而戒之當其未犯有司之時其明于五刑以弼五教之意至矣所謂民訟以地比正之葢有獄訟則鄉遂都家之長同聽之麗于刑則歸之士司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其灋以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日鄭康成曰刑殺各就其縣者亦謂縣士也若欲免之則王命六卿㑹其期鄭康成曰期亦謂縣士職聽之時賈氏曰以其差逺不使三公若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之賈氏曰直言大役不言大事又不言帥屬而蹕則非王行征伐之事謂起大役使民衆故直言各掌縣之禁令而已黄氏曰自稍以往惟共邦役凡野有大事則戮其犯命者鄭康成曰野距王城二百里以外及縣都黄氏曰野有大事謂其事在野者方士中士十有六人府八人史十有六人胥十有六人徒百有六十人易氏曰掌都家之獄訟者謂之都士家士獄訟成則告于方士方士掌都家亦以都家在王畿之四方故也掌都家鄭康成曰都王子弟及公卿之采地家大夫之采地大都在畺地小都在縣地家邑在稍地賈氏曰縣士自掌三等公邑之獄方士自掌三等采地之獄且縣士親掌之若方士遥掌之采地自有都家之士掌獄有事上於方士耳聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國易氏曰聽都士家士所告之辭又辨其一死四刑輕重之書言上于國而不言聽于朝葢鄉士遂士縣士自以其職而列於九棘下故曰職聽于朝方士掌都家不必職聽上獄訟于國而已王昭禹曰三月而後上於國者則以其所掌又逺其待之又宜久也鄭康成曰三月乃上要者又變朝言國以其自有君異之賈氏曰異之謂異於郷遂縣士等司寇聽其成于朝羣士司刑皆在各麗其灋以議獄訟鄭康成曰成平也鄭司農曰春秋𫝊曰晉邢侯與雍子爭鄐田久而無成賈氏曰上三處言司寇聽之此獨云聽其成成謂采地之士所平斷文書亦異於上也獄訟成士師受中王氏曰又言獄訟成前所謂成都家聽斷之成也後所謂成司寇羣士司刑聽議之成也書其刑殺之成與其聽獄訟者鄭康成曰都家之吏自協日刑殺但書其成與治獄之吏姓名備反覆有失實者王昭禹曰書其刑殺之成則知其所犯之罪書其聽獄訟者則知其聽獄訟之人先王欲其獄成而孚輸而孚者黄氏曰書其成以與都家之聽獄訟者葢都士家士也凡都家之大事聚衆庶則各掌其方之禁令鄭康成曰方士十六人言各掌其方者四人而主一方也其方以王之事動衆則為班禁令焉以時脩其縣灋若歲終則省之而誅賞焉鄭康成曰縣法縣師之職也其職掌邦國都鄙稍甸郊野之地域而辨其夫家人民田萊之數及其六畜車輦之稽方士以四時脩此法歲終又省之則與掌民數亦相近黄氏曰縣法即甸法也後鄭謂縣師之法是也都鄙比法小司徒掌之此獨省其治野法然則都鄙有鄉有遂可知都家各有主者使方士省之因其聚衆庶掌禁令故使掌修其法猶馭衆也劉迎曰縣法司宼所縣象魏之法自挾日既斂之後方士以時修之至歲終則省其功過而誅賞焉以待來歲之再縣耳先儒乃謂修縣師之法夫縣師地官之屬所掌不過邦國甸稍郊里之地域與方士之士治了無干豫況方士掌公卿王子弟采地之刑凡有罪則書其刑之成于國此正縣象魏之法也非以為縣師五百里恐民之久而易犯故以時修之至歲終而行誅賞也先儒誤以縣為縣又以為縣師之法亦已妄矣鄭鍔曰彼既不屬鄉遂慮其法易以廢壊歲終將廵省之以行誅賞則不可不以時使之脩也凡都家之士所上治則主之易氏曰都士家士上所治之獄方士主之以上於國黄氏曰都家後鄭説是言民不純屬王非司徒教法頒之于邦國都鄙使之各以教其所治民教之不至而入于罪戾治之者當任其咎故其民數其長各主之獨上其獄訟于國而羣士議法則冢宰所謂刑以馭其威畿内當有統也又曰罪與法疑而讞者也訝士四方之有治于士者鄭謂之讞此乃謂之小事不附罪何耶訝士中士八人府四人史八人胥八人徒八十人黄氏曰案其職邦有賔客則與行人送逆之故鄭遂以為逆迓之迓與掌迓同掌迓固為迓賔客也訝士獄官而送逆賔客者葢有前驅辟蹕與司寇以下分其事賔客自外至則使訝士主之至其稱訝士者本為迎受四方之獄云爾李嘉㑹曰訝迎也王氏易氏皆云以言逆人謂之訝有賔客與行人逆逆則訝也而掌諸侯之獄者罪刑所當諭亂獄當往成亦以言為上也然大體以迎候防衞賔客為急讀誓命及五禁亦言也掌四方之獄訟鄭司農曰四方諸侯之獄訟諭罪刑于邦國鄭鍔曰諭其人所坐之罪與王朝行刑之意于邦國使四方知王朝所以斷此事者意如此也黄氏曰罪疑於重輕法疑於進退則皆諭之劉執中曰非其民之獄訟故曰諭罪刑于邦國凡四方之有治於士者造焉鄭鍔曰四方獄事有疑者來治于王朝之士師則先造于訝士訝士乃為之通于士師使其事無不達四方有亂獄則往而成之鄭鍔曰亂獄其國之臣下干名犯分彼内自亂無自致其事以上達之理則奉王命以往而成之謂斷定其非常之罪鄭康成曰往而成之猶吕歩舒使治淮南獄王昭禹曰成者使兩議皆成而莫之虧也邦有賔客則與行人送逆之入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕鄭康成曰送逆謂始來及去也鄭鍔曰邦有賔客至則與行人之官送逆之行人掌其禮而訝士治其刑使人畏也賔入國為之前驅而辟在野亦然以刑先焉使人不暴客也客已入館則環其外而蹕止行人易氏曰行人以禮言訝士以刑言刑以肅其禮而已誅戮暴客者王昭禹曰客者國之所禮而暴客則刑之所取也故誅戮之客出入則道之有治則賛之鄭康成曰出入謂朝覲於王時也春秋𫝊曰晉侯受䇿以出出入三覲鄭鍔曰客之出入恐人得而犯故道而引之有事當治於王朝則賛而相之此所以名官曰訝凡邦之大事聚衆庶則讀其誓禁賈氏曰大事者自是在國征伐之等聚衆庶非諸侯之事則訝士讀其誓命之辭及五禁之法王昭禹曰誓禁之所施訝士讀之而已非掌之也必使訝士者犯誓禁則施刑故也周禮訂義卷六十一
