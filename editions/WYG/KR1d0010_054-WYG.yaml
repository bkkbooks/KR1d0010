body:
  text: 周禮訂義卷五十四宋王與之撰齊側皆反右下大夫二人鄭康成曰充玉路金路之右賈氏曰案巾車王路有五下文僕亦有五惟此戎右已下有三不見玉路以祀之右又不見木路以田之右故以田戎相類齊祀相因以類相兼戎右兼田右齊右兼祀右也鄭鍔曰祀天之時罕不特置玉路之右以金路之右兼之王氏曰金路以賔而謂之齊車者王敬賔事如祭故也薛平仲曰金路以承賔而右曰齊右固敬齊之無不在也象路以朝而曰道右固出入之無非道也其所以為右者要皆以衛王為重則齊右又必以下大夫二人居之道右亦以上士二人也王氏詳説曰周之時虎賁旅賁皆欲得人車右之右必取其賢而有力者至春秋時卜右慶鄭可見不然漢景之時使刀鋸之人參乗何以謂天子所與共輿者皆天下英豪乎如曰有力而已則宋之羊斟皆可得而為矣與其羊斟之非人不若莱駒之失戈也掌祭祀㑹同賔客前齊車王乗則持馬行則陪乗鄭康成曰前云者已駕王未乗之時賈氏曰曲禮曰僕執策立于馬前備驚奔謂未乗時此亦未乗之時王昭禹曰荀卿曰馬駭輿君子不安輿乗則持馬亦所以備駭輿之患鄭康成曰陪乗參乗謂車右也賈氏曰王與僕及車右參乗也易氏曰所以嚴翼衛也王氏曰齊右王弗乗則前馬方乗則持馬既乗而行則陪乗凡有牲事則前馬鄭康成曰王見牲則拱而式居馬前郤行備驚奔也曲禮曰國君下宗廟式齊牛賈氏曰今曲禮云式宗廟下齊牛此所引不同者宗廟尊宜下彼經誤也鄭改之鄭鍔曰當其式時前視馬尾端拱而立懼馬或驚故亦立其前也惟其如是車無駭輿之馬王有安輿之心齋戒之誠不動乎中易氏曰是齊右于齊車之事無一不致其敬而祭祀㑹同賔客之禮行矣道右上士二人鄭康成曰充象路之右鄭鍔曰象路名曰道車其右謂之道右盖象路以朝又以朝夕燕出入王能體道可以臣天下而朝之至於朝夕出入俱合乎道可以為臣下之矜式使人君因名以求其義也賈氏曰上四事簡故兼職此道右日日視朝行事繁故不兼其事卑於齊戎故官卑也掌前道車王出入則持馬陪乗如齊車之儀王氏曰三者皆與齊右同黃氏曰司常有道車有游車道車謂出入在道乗之自車上諭命於從車鄭康成曰自由也鄭鍔曰若王有命令欲逹于貳車則自車上而告諭之黃氏曰在道有命令當𫝊逹于有司者也賈氏曰馭夫掌馭貳車從車彼注云貳車象路之副從車戎路田路之副此所論從車即彼之貳車與彼從車别同名耳詔王之車儀鄭鍔曰掌詔告王以乗車之儀不違乎道也王昭禹曰朝有朝儀射有射儀祭祀燕饗以儀而行賔客昏冠以儀而立王之在車其儀獨可後乎記曰不廣欬口之儀也不妄指手之儀也立視五巂式視馬尾目之儀也顧不過轂首之儀也以至升車必正立而執綏不疾言不内顧無非車之儀也如是則周旋中規折旋中矩無非禮之動以蹈於放佚道右之詔豈小補哉王式則下前馬王下則以盖從鄭鍔曰王下車則執盖以從所以表尊賈氏曰盖有二種一者禦而二者表尊此表尊之盖也易氏曰道右在車則為右下車則為從左右前後無乎不在雖下車之際亦未嘗不以儀而輔乎王也然道右言下車以盖從而齊車不言者齊以敬神為主道以尊君為主各有所寓焉爾鄭鍔曰盖從不言於齊右者朝夕燕出入有時而下車也大馭中大夫二人鄭康成曰馭之至尊王氏詳説曰不以僕名而以馭名所以重玉路也孔安國𫝊書以大僕正為大馭得之矣然下而祝則曰馭登而左執轡則曰僕僕與馭亦通稱矣薛平仲曰右者在車之右以用五兵僕者在車之左以節馬力盖乗車之禮君居車左右居車右僕居車中而實以侍王焉所謂馭者即僕也然一車之中非右則君無所賴其力非僕則右無所用其力此大馭雖掌馭玉路以祀然因馬以制其進退犯軷以禳其險阻其法儀固戎僕之不可違也故大馭以中大夫二人居之戎僕亦以中大夫二人居之繼之以齊車又繼之以道車又繼之以田車而僕之所任在齊車則下大夫二人在道車田車皆以上士十有二人而馬力之進退一皆有法有儀矣若夫戎路則有倅車道路則有貳車田路則有佐車所謂從車使車也其用既繁其馬亦衆則分公馬以駕治之要非一人所能任此馭夫之官既畀以中士二十人又輔之下士四十人也雖然車右車僕任中大夫下大夫者必二人任上士者非二人必十有二人彼一車之中各一人居之耳顧若是之備何哉車右車僕皆所以奉至尊惟人才有餘而後備用之無虧彼府史胥徒不列於屬者僕之與右固以身任其責也掌馭玉路以祀及犯軷蒲末反王自左馭馭下祝之又反登受轡犯軷遂驅之鄭鍔曰乗玉路以祀天則行犯軷之禮以其出郊故也鄭康成曰行山曰軷犯之者封土為山象以菩芻棘栢為神主既祭之以車轢之而去喻無險難也春秋傳曰跋涉山川易氏曰軷為祭道以南郊之祀在國門八里之外賈氏曰鄭注月令祀行之禮為軷壇厚三寸廣五尺此道祭亦宜然也當犯軷之時王於車右自執其馭大馭下車祀禱乎神既祀矣乃登車而受王所自執之轡而執之乃犯所祭之軷遂驅車而行也李嘉㑹曰犯軷惟玉路戎路則有之其他則無盖玉路則出郊而祭戎路則踰國境二者不可不先厭勝以安君心不曰僕而曰馭者祀重事也非餘可比易氏曰王非所以為馭而自馭者以敬已之道敬神也大馭非所以為祝而使之祝者以事人之道事神也王者行郊祀之禮其動静出處與天為一然出户而巫覡有事出門而宗祝有事出郊而僕馭有事非必於神也致謹於禮而已及祭酌僕僕左執轡右祭兩軹音紙祭軓音犯乃飲鄭鍔曰軹者車之兩轊是謂轂末又謂之軓軓車轍也軓者車軾之前字音范字或亦為􅓶又為範字也其祭軷之時使人酌酒以飲僕僕併轡執於左手以右手持酒而祭兩軹與軓以為車行必賴兩轊之力王式必賴軓以為固車有神以為之助也左執轡者言執轡非已之力也左者無為之儀右祭軹與軓者言車之行皆係於軹與軓也右者用力之地既祭乃飲受神之福也王安石乃謂僕大僕祭祀則賛牲事既祭王使馭酌焉明與之並受福也不知四路皆有僕此無玉路之僕而有大馭則所謂僕者玉路之僕故先儒云僕即大馭也凡馭路行以肆夏趨以采薺鄭康成曰凡馭路謂五路也肆夏采薺樂章也賈氏曰樂師亦有此二句彼下有車亦如之則上云行趨者據步迎賔客法此既馭路亦云行趨者雖馭路行趨遲疾惟步迎賔客為法故雖車亦行趨也爾雅堂上謂之行門外謂之趨行雖在堂亦人之行由堂始發故堂至門皆謂之行鄭康成曰行謂大寢至路門趨謂路門至應門王昭禹曰行欲其舒則歌肆夏所以節其行趨欲其齊則歌采薺所以節其趨薛氏曰肆夏之詩雖不可見肆之為義取其舒緩而不廹采薺之詩雖不可見薺之為義取其齊肅而不亂樂師教樂工而歌其詩大馭馭車而應其節此二官所以皆言之也凡馭路儀以鸞和為節鄭康成曰路儀舒疾之法也鸞在衡和在軾皆以金為鈴薛氏曰大馭先言馭路後言馭路之儀者豈和鸞為儀肆夏采薺獨不謂之儀乎盖儀必上下相應前後相成周旋進退無不中節今肆夏以節其行何由而知其為車之行采薺以節其趨何由而知其為車之趨乎是肆夏采薺之所節亦未足以為儀也故儀必見於和鸞之節升車則馬動馬動則鸞鳴鸞鳴則和應鸞在衡而唱於先和在軾而應於後一唱一應一徐一疾皆秩然而不紊馭路之儀始見於此故和鸞之聲舒緩而不廹吾知其為車之行歌肆夏則有以節其舒緩之儀和鸞之聲齊肅而不亂吾知其為車之趨歌采薺則有以節其齊肅之儀車之行趨視肆夏采薺為之正肆夏采薺視鸞和為之節而鸞和之聲又因車之行趨以為之應鸞和不聞雖有肆夏采薺無益也尚何足以為儀乎故鸞和言儀而肆夏采薺不言儀和鸞言節而肆夏采薺不言節此其意也王昭禹曰王之行趨有環佩之聲鏘鳴于左右車之行趨又有和鸞之聲相應乎衡軾是以倫清而聽聰心虚而氣和戎僕中大夫二人鄭康成曰馭言僕者此亦侍御於車王昭禹曰自戎僕以下不曰馭者尊玉路也黃氏曰射人令有爵者乗王之倅車戎僕掌王倅車之政必曰王倅車者皆親兵也倅車車僕所掌闕車廣車苹車輕車之萃也皆從其帥在中軍臨時隨事用之戎僕掌其政故戎右與戎僕秩皆髙掌馭戎車鄭康成曰戎車革路也鄭鍔曰武王戎車三百兩與紂戰于牧野王自將則乗戎路戎僕為之馭掌王倅車之政正其服鄭鍔曰戎路之貳謂之倅象路之貳謂之貳田路之貳謂之佐倅貳皆副佐之名以其所用者異故異其名耳曰佐者為之助耳田獵非對敵之時後車助之可也王制云大夫殺則止佐車佐車止則百姓田獵是也王氏曰如衆臣之佐其君曰貳者所以兩之也如小祭一貳之貳朝夕燕出入文物之飾欲其大備故亦謂之從車道右云自車上諭命于從車是也王氏曰若世子之貳其父有故乃攝而代之曰倅者言其為副也即戎之事為大而左右前後所以相援者不可以無副也如國子之倅所以副其適故車僕於廣車闕車苹車輕車皆謂之萃萃即倅也戎車所賴於倅為尤多劉執中曰倅副之也戰陳之事不以王當其鋒王有所行則倅車副之以致其勇所以摧鋒而衛䕶于戎路也貳陪貳之也禮樂之事以王居先王之所行從而隨之所以陪貳以成其道焉佐佑之也從禽之事致王于必獲則佐佑羽翼使逆無遺命故設驅逆之車以圍背已之禽佑王獲也黃氏曰玉路金路無副表尊也鄭鍔曰正其所衣之服以戎事之服異乎乗車之服乗車之服主於文而戎事以武為主則皆服皮弁黃氏曰服春秋𫝊所謂袀服也國容不可以入軍容當一以戎衣從事不可以不正也易氏曰王于軍事服韋弁而有爵者之乗王倅車亦韋弁服所以衛䕶至尊而重軍旅之威然有等殺存焉故戎僕從而正之此即倅車之政也愚案王服韋弁而下同副乗將以疑敵於境外副乗韋弁眡王有等差所以辨分於軍中犯軷如玉路之儀王昭禹曰王以兵出故有犯軷之儀田路不言犯軷則以戎路見之凡巡守及兵車之㑹亦如之鄭鍔曰出國門則跋履山川故行犯軷之祭乗玉路以祀天則出郊即戎則適逺臨危巡守則適四方兵車之㑹雖非戰伐然提兵於外則危道也故犯軷以求助於神其犯軷之儀則一而已王昭禹曰凡巡守則戎車從焉兵車之㑹亦乗戎車異于乗車之㑹乗金路矣掌凡戎車之儀易氏曰上文言馭戎車則王之革路此言凡戎車則衆之兵車也項氏曰廣闕輕苹之類武王戎車三百兩其進退之節不愆于六步七步不愆於四伐五伐六伐七伐乃止齊焉則戎車之儀可知至大司馬於蒐田之時亦有所謂坐作進退疾徐䟽數之節戎僕所以掌其儀者此也鄭鍔曰非特掌犯軷之儀又掌戎車之儀君子耻服其服而無其容以甲胄而乗戎車貴有不可犯之色况于威儀可丕嚴毅乎李嘉會曰儀非獨甲胄有不可犯之色如保氏曰車馬之容以前數官攷之馭路尤以儀為重齊僕下大夫二人王昭禹曰僕以馭車不可兼職故齊右兼祭祀賔客之事而馭則異官鄭鍔曰玉路以祀祀必齊以致其誠則宜名齊金路以賔乃名齊車齊右言祭祀㑹同前齊車玉路止於祀天而已其他祭祀皆乗金路以其致齊之多名之曰齊車宜矣掌馭金路以賔鄭康成曰以待賔客朝覲宗遇饗食皆乗金路其灋儀各以其等為車送逆之節鄭鍔曰諸侯之朝也有享王之禮春夏受之於朝秋冬受之於廟雖名不同至於朝畢而饗食則同也朝覲宗遇饗食皆乗金路金西方之義制諸侯者以義為主其禮制與其禮儀各視諸侯爵等之尊卑而為車送逆之節上公九十步侯伯七十步子男五十步或以車逆或以車送初不以意而為輕重兹所以為制諸侯之義攷周家之法春夏受贄於朝無迎賔之禮受享則迎之秋冬朝享皆受於廟則俱不迎此則朝覲宗遇之下言各以其等為車送逆之節豈秋冬之時亦有送逆乎果有送逆則郊特牲謂覲禮下堂而見諸侯為天子之失禮自夷王始何以譏之方氏曰天子之待諸侯朝而下堂禮也覲而下堂則失禮矣盖春夏出而與物交秋冬出而與物辨朝覲之别如此周官齊僕各以其等為車送逆之節此朝禮下堂之儀也由夷王而降乃有覲而下堂之儀豈非失禮乎竊謂此文𫝊為饗食設當朝覲宗遇之時王有饗食之禮饗在廟則有送逆故先儒謂因此朝覲宗遇而行享食則有迎賔之法也易氏曰大行人言賔主車介步數皆曰朝位是知非特在廟之禮况經言饗食列于朝覲宗遇之後則是數者皆有送逆之法明矣餘見大行人及樂師道僕上士十有二人賈氏曰朝夕在朝往來駕稅難而且煩故人最多掌馭象路以朝夕燕出入其灋儀如齊車鄭鍔曰朝夕者早晚朝見之名也早朝曰朝暮朝曰夕左𫝊云百官承事朝而不夕又曰右尹子革夕國語曰朝日夕月凡此皆謂早晚之朝王之早晚朝見羣臣皆乗此路閒暇燕遊而出入亦乗是路以道名之使人君知所警也道僕馭之其法儀皆如齊車謂其禮同王昭禹曰其法儀如齊車者則朝夕也燕出入也其度數動容亦各以其等為之節也掌貳車之政令鄭康成曰貳亦副也鄭鍔曰貳車之出入亦欲其由道也非大路與齊車無貳車也以為燕出入尤當謹其後車故特以掌其政令言之易氏曰貳車猶掌其政令則道車之用嚴矣田僕上士十有二人賈氏曰人亦多者王有四時之田兼有園囿遊獵及取鮮獸之等亦事煩故也掌馭田路以田以鄙鄭康成曰田路木路也鄭鍔曰王田必乗木路者盖木徳盛於東方仁也王者之田不合圍仁也然謂以田以鄙者或以為都鄙王者亦無循行縣鄙親自省耕之理然則或田於三田之地或田於縣鄙之地王者循行縣鄙不専用田車與田僕而已掌佐車之政鄭康成曰佐亦副李嘉會曰道僕曰貳車田僕曰佐車曰貳曰佐各有異義佐則所以佐之王昭禹曰記曰大夫殺則止佐車佐車止則百姓田獵則佐車於田獵可知矣劉氏説見戎僕鄭鍔曰田必有佐車掌其政令使當田者則田當止者則止所以全人君之仁設驅逆之車鄭鍔曰田必設驅逆車自後驅禽使之就獲自前逆禽使不出圍令獲者植旌鄭康成曰以告獲也植樹也鄭鍔曰獲者植旌使人望其旌而知其獲禽不獨為已有也山虞植虞旗澤虞植虞旌為屬禽設此則令獲禽自植以告獲也及獻比禽鄭鍔曰及田者獻禽校次而比之則大小各從其類然後大獸可得而公小禽可得而私凡田王提馬而走諸侯晉大夫馳鄭鍔曰田之日天子親乗木路駕馬於所田之處諸侯大夫皆從焉為田僕者當有以號令乎諸侯大夫使知馭馬以從王之禮王者提馬而走則諸侯當晉諸侯之馬既晉則大夫當馳提者挈舉之義言提馬首以走則馬疾馳而前諸侯惡可不進乎易之晉卦云晉進也以進為主有進而無退也諸侯已進大夫烏可以不馳乎詩云載馳載驅言其速也又非特進而已此三者皆行馬之節然後尊卑之分定矣田獵雖從禽之樂君臣不可並驅必有先後遲速之等乃所以為田禮先儒以為提遲於馳皆取尊者體促之義深知經者也王氏曰提節之晉進之馳則亟進之尊者安舒卑者戚速劉執中曰田路者將以趨禽而射之也故諸侯則進其事大夫則馳之皆以翼禽致獲于王也詩曰悉率左右以燕天子馭夫中士二十人下士四十人王昭禹曰自大馭以至田僕皆王五路之馭者也馭夫則馭貳車從車使車而已其車既衆非多其員則有所不給故馭夫以中士二十人下士四十人為之李嘉㑹曰戎副曰倅田副曰佐其馭與右皆不常任惟貳車從車使車則常設故通使六十人乗之與賈氏曰馭夫總六十人案校人三乗為皁皁一趨馬三皁為繫繫一馭夫則馬三十六匹一馭夫計良二千一百六十匹則六十馭夫又駑六麗一師六師一趨馬六趨馬一馭夫主駑四百三十二匹駑共千二百九十六匹則馭夫三人并前為六十三人與此不合者此序官脫三人也掌馭貳車從車使車王氏曰貳車副車從車謂屬車也使車謂使者所乗之車王氏詳説曰嘗攷巾車五路之外而道右有從車戎僕有倅車田僕有佐車又有驅逆之車此曰貳車從車使車以經攷之初不相重複也曰從車者謂駕玉路則餘路為從若駕金路等路則玉路不復出此典路所謂以路從是已曰倅車者倅戎車之倅有五與從車之四則屬車九乗矣此車僕所謂戎車之倅闕車之倅革車之倅是已曰佐車者田車之佐也少儀所謂乗貳車則貳佐車則否是已曰驅逆之車乃逐獸之車大司馬所謂既陳乃設驅逆之車是已曰使車則宫中給繇役之車巾車所謂良車散車者是已大率公車從車之外天子朝祀之副車曰貳戎車之副曰倅田車之副曰佐諸侯田車戎車之副則併曰佐矣若大夫又以驅逆之車為佐車王制所謂大夫殺則止佐車是已鄭氏以貳車為象路之副以從車為戎路田路之副以使車為驅逆之副失之分公馬而駕治之鄭鍔曰五路之馬曰種曰戎曰齊曰道所駕有定法此三等之車凡在官之馬皆可駕也馭夫分而駕之且治其事焉王昭禹曰三者皆公車故分公馬而駕治之劉氏曰駕而調治之俾閑習齊一安于五御而去其驚奔賈氏曰趣馬自主駕説故知此是調習六種三馬也周禮訂義卷五十四
