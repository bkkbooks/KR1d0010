body:
  text: 周禮訂義卷六十五宋王與之撰秋官司寇下布憲中士二人下士四人府二人史四人胥四人徒四十人王昭禹曰布以敷施之憲以表示之鄭鍔曰國朝自淳化三年始置諸路刑獄事乃周家布憲之意然不止於二人而已今謂之憲臺原於此歟掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁鄭康成曰憲表也謂縣之也刑禁者國之五禁所以左右刑罰者鄭鍔曰大司寇正月之吉布刑于邦國都鄙又縣刑象以示萬民小司寇於正嵗帥屬觀刑象及宣布于四方憲刑禁矣布憲復掌之者蓋大司寇布之者舉其綱也小司寇宣之者行於朝也四方萬里或未之知布憲執旌節適四方而宣布之所至之處又從而表縣之無有不明刑禁之為不可犯也以詰四方邦國及其都鄙達于四海鄭康成曰詰謹也使四方謹行之爾雅曰九夷八蠻六戎五狄謂之四海李嘉㑹曰表示其刑禁于四方及乎四海苟犯刑禁則從而詰之俾不至於太甚也易氏曰先王之治有刑必有禁知禁而自止則不至於罪知罪而自反則不至於刑此宣布而憲之有不容已者所謂以詰四方邦國及其都鄙達于四海者蓋無此疆爾界之異凡逺近同而上下察也劉執中曰以中士二人下士四人徒四十人而行四方達四海欲正月而必聞其刑禁者未有能達也必書其刑禁之冝憲于民以達於州伯州伯以達於卒正卒正以達於連帥連帥以達於屬長屬長以達於諸侯諸侯以達於其國之都鄙而要服以達於四海布憲則執旌節以巡行於四方詰其違於禁令者庶乎其可及也凡邦之大事合衆庶則以刑禁號令賈氏曰征伐巡守田獵皆大事合衆庶也以其是布刑禁之官故使以刑禁號令王氏曰謂鄉合州黨族閭比之聫與其民人之什伍則以刑禁號令焉項氏曰刑以懲惡禁以輔刑發以警戒之謂之號命之謹守之謂之令禁殺戮下士二人史一人徒十有二人鄭鍔曰天下有不逞之人強陵弱衆暴寡善良隂被其禍先王設官以禁擅殺戮為職謂夫為天吏則可以殺人愚案自禁殺戮至脩閭氏八職皆幾防盜賊姦宄者幾防嚴則姦宄無清刑之原也掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之鄭康成曰司猶察也鄭鍔曰將以禁之必專司之禁之者法也司之者專伺候乎是也司其私相斬相戮者及傷人見血而里閭擁遏不以告于有司者黄氏曰傷人不禁必至於殺矣漢約法三章傷人及盜抵罪不以告私相和也將以罪相證於獄而攘奪其所證之人使不得同至於獄者黄氏曰或曰赴逮而攘奪之若簒囚也將以辭訟於官而恃勢力以止遏之使不得以上訴者皆以告於有司而誅之然所司察者四事也特以殺戮名官蓋四者之罪莫大於擅殺故也劉執中曰謂不應斬殺戮而斬殺戮之者應告其傷隠之而不告者應治其獄攘之而不治者應聼其訟遏之而不聼者掌察四者以告於司寇而誅之所謂淫朋比德者也不誅之無以建中于民李嘉㑹曰斬殺戮之人上所置以懲惡也或以財賄交結而寃枉不申有如下四者皆告於正而誅之禁暴氏下士六人史三人胥六人徒六十人黄氏曰禁殺戮禁暴氏皆閭里禁令鄭鍔曰詩曰亂是用暴又曰州吁用兵暴亂凡言暴者皆謂為惡之凶暴也苟無以禁之民蒙其害可勝數耶此乃設為禁暴氏之職以正之也王昭禹曰以刑教中則民不虣者教官之事以刑禁暴者刑官之事教施於未然之前刑施於已然之後二者相為終始而已掌禁庶民之亂暴力正者撟居表反誣犯禁者作言語而不信者以告而誅之李嘉㑹曰前者在公行法之人此者在民害治之人王昭禹曰逆理害治者謂之亂劉執中曰亂謂悖於人倫恃強虐物者謂之暴劉執中曰暴謂敢作威怒惟亂惟暴乃以力而正之人之力有所不敢敵則不得已而聽服焉是之謂力正也黄氏曰正猶正長之正以強力雄長人者即武斷也此則召亂之萌安可不禁之哉鄭鍔曰撟則矯稱上之命令誣則誣人以無有之事惟撟惟誣敢犯士師之五禁造為浮言以相恐動其言不實乃能鼓蕩人心凡此皆禁之使不敢為若敢為者則告於有司而誅之所以息其暴亂之漸李嘉㑹曰禁暴所禁以告司寇而誅之也劉執中曰王制曰析言破律亂名改作執左道以亂政殺行偽而堅言偽而辨學非而博順非而澤以疑衆殺以其出於邪情而無補於中道又從而害於風俗殺之冝矣凡國聚衆庶則戮其犯禁者以狥易氏曰前五者之禁為庶民設也此於聚衆庶則人情雜遝其暴尤甚故必戮其犯禁者以狥鄭鍔曰國家有事大集衆庶之際一人犯禁則千萬人視而傚之勢將不可遏矣不特戮之又用以狥衆焉凡奚𨽻聚而出入者則司牧之戮其犯禁者易氏曰奚謂女奴之為奚者𨽻謂男奴之為𨽻者既以罪役故必司牧其出入牧養也王昭禹曰於其出入則或司以察之或牧以治之亦以防其暴也或有犯禁從而戮之則非不教之誅是二者亦所以禁其暴也緫論陳及之曰考比閭族黨之法凡所以為政之道纎悉備矣二官所禁大抵暴横足以侮上陵下鄉官或未能禁止之也於是王朝為之立官以遏絶之庶幾鄉遂之官長得以從政焉然周公之時天下安有此是亦先事為備也野廬氏下士六人胥十有二人徒百有二十人王昭禹曰野道之小室謂之廬所以待行旅也公劉之詩始曰于時廬旅終曰于豳斯館則館大而廬小先王設官以比國郊及野之道路宿息之類故名官以野廬氏黄氏曰野廬氏掌通達道路其下蜡氏至庶氏皆道途事類次第相從掌達國道路至于四畿鄭康成曰達謂巡行通之使不陷絶也去王城五百里曰畿王昭禹曰達國道路至于四畿則遂人所謂千夫有澮澮上有道萬夫有川川上有路以達于畿是也謂之四畿自王城五百里四面皆達之也遂人既治野之道路而野廬氏必掌達其道路凡以輔成遂人之事而已而司險又掌達其道路則非特王畿之道路而已凡九州山林川澤之阻者也比國郊及野之道路宿息井樹鄭康成曰比猶校也項氏曰校實數不闕劉執中曰案比而肅其守衛宿息廬之屬賔所宿及晝止者也王氏曰三十里有宿宿有路室所謂宿也十里有廬廬有飲食所謂息也鄭鍔曰遺人凡國野之道十里有廬廬有飲食欲夫行者至有所止也合方氏所達者四方之途也遂人所治者田間之道路也欲其無所陷絶自國之郊及郊外之野所通行之路皆有宿息井樹夜可以寢晝可以憩有井以備飲食有樹以為藩蔽野廬氏專掌之則行者之至如歸矣孰不願出於王之途乎易氏曰晉文公之為盟主也司空以時平易道路圬人以時塓館宫室諸侯賔至𨽻人牧圉各贍其事百官之屬各展其物此晉之所以霸若單襄公聘於宋遂假道於陳以聘於楚道茀不可行候不在疆司空不視塗道無列樹國無寄寓野無施舍此所以知陳之將亡則野廬氏達國之道路比及野之道路宿息者所以為先王之制若有賔客則令守涂地之人聚􅈀之王昭禹曰先王之時涂地皆有人以為之守有賔客則令其人聚而擊柝所以待暴客也有相翔者則誅之王昭禹曰論語翔而後集彼翔而觀伺有欲習為寇盜之意故誅之所以禦姦也鄭鍔曰如是安有凡伯見伐之禍凡道路之舟車轚音訃互者叙而行之鄭鍔曰轚者相值而礙也互者交互而不行也推車於陸行舟於水阻隘之地偶相值而有轚互之阻鄭康成曰車有轅轅坻閣舟有砥柱之屬人有争先之心必無相遜之理因其先後至之敘以次而行之劉執中曰掌其先後貴賤老幼往来以為其行之敘而通之故有爵有節者得以辟之而不滯也凡有節者及有爵者至則為之辟鄭鍔曰執節而来者奉王命之使有爵之人皆王朝之臣至於其地則為之辟既以尊王臣之来又以見貴貴之理王昭禹曰有節者至則欲達之而無留難有爵者至則在所承而無敢慢故皆為之辟行人使避焉然則野廬氏其徒百有二十人則使其徒為之辟也禁野之横行徑踰者鄭鍔曰田野之中有町畦焉皆禾稼之地苟或横行則踐人之田而害其穡事有隄渠焉皆防水之處苟或徑踰則決人之水而壞其隄防此争端之所由起不可以不禁鄭康成日皆為防姦也横行妄由田中徑踰射邪趨疾越隄渠也凡國之大事比脩除道路者賈氏曰大事謂若征伐巡守田獵郊祀天地王親行所經並須脩除道路及脩廬校比民夫使有功效王昭禹曰治其壊謂之脩去其穢謂之除有脩除道路者野廬氏則比較其人之數所以防患也鄭鍔曰道路圮壊則車馬不通固有脩除之人此則校而比之使無圮茀之虞掌凡道禁鄭鍔曰道必有禁此則掌其犯禁者則王國大事肅然而無譁矣王昭禹曰若脩閭氏所謂以兵革趨行者與馳騁於國中者是也然野廬氏所禁者在野之道脩閭氏所禁者在國之道邦之大師則令埽道路且以幾禁行作不時者不物者王氏曰言國之大事在國中而已邦之大事則通國野焉王昭禹曰令埽道路所以致潔鄭鍔曰國大用師道路之行欲無荒穢不祥之事苟於是時不當行而行不當作而作失蚤晚之時非所當衣而衣之非所當操而操之非其物而有異常之狀皆姦人之為寇盜者也㣲伺而幾察之以防變也周之制於田野之道十里之逺設官以治其廬舍禁止姦盜如此之嚴則道不拾遺豈不冝哉後世十里有亭亭必有長其法亦出於此惜夫不復脩也蜡清預反氏下士四人徒四十人鄭康成曰蜡骨肉腐臭蠅蟲所蜡也月令曰掩骼埋骴此官之職掌除骴劉執中曰枯骨曰骼肉腐曰骴人獸皆同職掌揜而埋之不令暴露於溝壑道路也鄭鍔曰王政行於天下生者有養死者有歸安有枯骨遺棄而不收尚待設官以除之耶然月令亦有掩骼埋骴之文太平之世雖無餓莩然死於道路而無主後者亦未必無也有是事而不為之收掩則傷人君之仁無是事而省是官則仁於枯骨之意亦形於天下矣凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賔客亦如之王昭禹曰大祭祀先王所以致精神之至而交乎神明之隠不蠲刑者任人則在所惡凶服則在所可哀故蜡氏令州里除而禁之郊特牲言祭之日喪者不哭不敢凶服汜掃反道亦謂此也鄭康成曰蠲讀如吉圭惟饎之圭圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服服衰絰也此所禁除者皆為不欲見人所穢惡也王氏曰大賔客則承事如祭有齊敬之心焉李嘉㑹曰大師大賔俱尚清浄不令所可惡者亂其目也若有死於道路者則令埋而置楬音竭焉書其日月焉縣音刺其衣服任器于有地之官以待其人鄭鍔曰若行者出王之塗不幸而死則埋而置楬書其日月縣其衣服與夫所執任之器以俟其家人来則收𦵏之如是則無腐敗之骴矣鄭康成曰有地之官主此地之吏也賈氏曰若比長閭胥黨正之輩掌凡國之骴禁鄭康成曰禁謂孟春掩骼埋胔之屬鄭鍔曰骴與胔同然其字乃與蜡祭之蜡字同昭禹謂蜡祭百物昔之羽蠃鮮毛介之物畢致焉蜡祭所致者神蜡氏所治者形形神相聚而為生相離而為死二者實相待焉故其字同然蜡者索也無乃索朽腐之骨肉而除之者乎雍於勇反氏下士二人徒八人鄭鍔曰隄防止水之官乃名曰雍氏盖所慮者尤莫大於水之害稼雍塞以止之故也陳及之曰其職掌事頗重而命官止下士二人徒八人而已盖頒格令於民間使民戸知之勸農重榖之意掌溝瀆澮池之禁凡害於國稼者鄭鍔曰水相交通謂之溝竇水而行之謂之瀆㑹水而聚之謂之澮畜水而止之謂之池池以止水溝澮瀆以行水皆有禁焉行者不得擅塞止者不得擅行非所當行而行非所當止而止大焉則害於國小焉則害於稼此所以設官以掌其禁也王昭禹曰溝瀆澮池有禁然後其害去其利均亦所以息爭止訟也旣掌溝瀆澮池之禁又掌凡害於國稼者謂禽獸也禽獸害稼如春多麋之類禮記田䑕田豕之類劉執中曰通溝瀆澮池之壅塞而水潦溢漲害國之苗稼者春令為阱在性反檴胡化反溝瀆之利於民者秋令塞阱杜擭鄭康成曰阱穿地為塹以禦禽獸其或超踰則䧟焉世謂之陷阱擭柞鄂也堅地阱淺則設柞鄂於其中賈氏曰柞鄂者或以為豎柞於中向上鄂鄂然所以載禽獸使足不至地不得躍而出鄭鍔曰春農就田禽獸或出而為害水利或有通塞則為阱擭為溝瀆皆以是時也然五溝五涂以通灌漑之水至春又為溝瀆何耶盖五溝者五野之中一定之制不待至春乃為之此乃里閭之間春雨水集溝澮皆盈水去不速不可不通之也然阱擭設於春可也秋稼已登苟或常設禽獸亦無以遂其生故至秋塞之此先王愛物之心也然不言秋塞溝瀆者因利民而為之則無時而可塞故也鄭康成曰秋而杜塞阱擭收刈之時為其陷害人也書費誓曰杜乃擭敜乃穽時秋也伯禽以出師征徐戎禁山之為苑澤之沈者鄭鍔曰苑囿之設則為禁籞環繞以防人之入耳若夫與民共利之山芻蕘者往焉雉兎者往焉詎可以設禁籞乎鄭司農曰不得擅為苑囿於山也黄氏曰苑恐當為宛曲也山泉徙而曲之必有私其利者為宛言非其自然也魚鱉所生之澤鱗者介者藏焉遊焉詎可沈毒螫乎人君囿游固有苑矣民庶為苑則是僣上無法矧可以即山以為苑乎漁人取魚固有餌矣下毒於水則是竭澤而漁人之食將有中其毒者矣其設禁也冝哉劉執中曰即獸所居為苑以誤之即魚所淵沈藥以毒之則不仁不信為禽獸之所憚也故設官以禁之萍氏下士二人徒八人鄭康成曰萍氏主水禁萍之草無根而浮取名於其不沈溺劉氏曰神農書曰萍能勝酒欲其制之也陳及之曰其職掌水禁及幾酒謹酒特下士二人徒八人而已或者不足以幾禁之耶曰是特國中人耳近而鄉遂逺而都鄙委之其官掌焉愚案酒正内官自酒人以下皆奄奚為之勢不可呵禁外事萍氏刑官之屬掌之冝矣掌國之水禁王昭禹曰水雖有潤澤灌溉之利而犯之則濡溺之則死故水之險惡能害人之所與夫不時入水而捕魚鱉者一切禁之乃所以為仁政之周黄氏曰非禁捕魚也魚禁􅘋人掌之幾酒謹酒黄氏曰幾酒苛察之也冝若絶之謹酒為其不能不用也萍氏掌水禁而使禁酒亦水之害人者也故為之設禁焉王昭禹曰幾酒則於飲酒㣲察其不節也謹酒則於用酒制其無度也陳藴之曰或謂酒誥謂西土之人承先王教朝夕祀兹酒而已其他未嘗羣飲也何俟幾察之曰立政以垂將来豈以今日之故而廢之耶總論吕氏曰周公作酒誥一篇其刑之重矣至於盡執拘以歸于周予其殺此是最初謹酒恐人沈湎浸漬傷徳敗性至於周官之禁酒皆此意及漢文帝為酒酺景帝以嵗旱禁民酺酒盖恐耗縻米榖民食不足此猶有重本抑末之意及𢎞羊建𣙜酒之利設心大不同不過私家不敢擅利公家却自專其利耳古者惟恐人飲酒至後来惟恐人不飲酒禁川游者鄭鍔曰大川之逝雖烏獲之力有所不能止又況可游乎游謂游浮而行禁之宜哉司寤氏下士二人徒八人王昭禹曰寤而覺謂之寤使掌夜時非覺而不寐者安能定其漏刻之蚤晚哉所以名官謂之司寤氏掌夜時鄭鍔曰專掌夜時則所主欲於夜而覺寤以察時之蚤晚鄭康成曰若今甲乙至戌亥賈氏曰甲乙則蚤時戌亥則晚時以星分夜以詔夜士夜禁鄭鍔曰夜雖有時其分則以星晚而見星則為夜蚤而星沒則非夜仰觀天星之沒見以分之不分以月者月出有蚤晚唯星麗乎天至夜必見故也易氏曰此謂施於國中者盖國中有啟閉之候國事有朝夕之禮以星分夜則星見為夜星沒為晝朝夕啟閉於是乎在以是詔夜守之士鄭康成曰夜士主行夜徼候者如今都候之屬嚴夜禁之法禦晨行者禁宵行者夜㳺者鄭鍔曰姦盜常發於暮夜之間是以尤謹夜行之禁或禦之使勿行或禁之使不敢行皆以防姦盜也先明謂之晨晨言時之尚蚤王昭禹曰日出為旦晨則昧爽之爾而日未旦之時中夜謂之宵宵陰浸而陽生通夕謂之夜夜言日之昏而暝左傳言晨往寢門闢矣詩言夜向晨則知晨見明也詩曰肅肅宵征熠耀宵行又曰夜如何其夜未央經言夜呼旦以􅑧百官以辨軍之夜事則宵與夜固異矣晨行則未當行而行故禦而止之若夫中宵固不可行夜豈遨逰之時故曰禁所以不同劉執中曰其晨侵於夜而行者暮侵於宵而行者不可測其姦非也夜而遨遊者妨衆息也故皆禁也司烜音毁氏下士六人徒十有二人鄭康成曰烜火也讀如衞侯燬之燬易氏曰掌明水火而其官謂之司烜者取大易日以烜之之義盖萬物形成於地精成於天月遡日之光其本皆出於日故也王氏詳說曰司爟司烜皆掌火一事而二官何也曰有國火有民火司爟所掌謂民咸從之其民火歟司烜所掌以共祭祀明燭其國火歟然行於民未嘗不本於國故司爟曰四時變國火以救時疾行之於國未嘗不用之於民故司烜曰中春以木鐸脩火禁于國中掌以夫遂取明火於日以鑒取明水於月鄭司農曰夫發聲陸氏曰夫道也是以謂之夫大夫能遂事故謂之遂鄭康成曰夫遂陽遂也賈氏曰以取火於日名陽遂猶取火於木為木燧也鑒鏡屬取水者也世謂之方諸鄭鍔曰取明水於月者謂之鑒亦謂之方諸其實皆鑑也陸氏曰夫遂以義言鑒以體言互相備也鄭鍔曰水生於坎之陽而為陽中之陰火雖生於離之陰而為隂中之陽王者向明而治皆以陽為主故尊明火為先易氏曰日陽之精月陰之精離為日為火為電者火之氣也坎為月為水為雲者水之氣也水火以氣而升降日月之精薄之則夫遂可以召陽而為火鑒可以召陰而為水所以謂之明水火言取於日月而非人力之所能致明之至也鄭鍔曰或謂鑒遂之齊同用金錫之半可以取水亦可以取火何也盖金錫半者陰陽之雜用諸晝則陽氣應之而為火用諸夜則陰氣應之而為水以共祭祀之明齍明燭共明水鄭鍔曰明水火所以共祭祀之明齍明燭及明水也用是水以滫齍盛則曰明齍用是火以照燭則曰明燭五齊三酒所尚者明水取於月中之水以共之記曰其謂之明水也由主人之潔著此水也謂此耳王氏詳說曰凶事所用之物謂之明所謂明器明弓矢是也吉事所用之物亦謂之明所謂明水明火是也先鄭失於明水之說後鄭亦失之郊特牲曰明氷者神明之也謂主人之潔著此水也著成也主人之潔則此水乃成矣以隂鏡取水於月之中其可多得乎且祭有明水又有𤣥酒𤣥酒取於潢汙行潦之水而為之則是降於明水矣鬱齊配以明水三酒配以𤣥酒此郊特牲所謂明水涗齊貴新也几涗新之也是知明水所用止於斯二者而已先鄭以為明水滫滌粢盛黍稷是不讀泂酌之詩也泂酌之詩曰可以濯罍可以餴饎夫豈明水哉後鄭謂明水以為𤣥酒是不讀禮運也禮運曰𤣥酒在室醴醆在戸粢醍在堂澄酒在下夫豈明水之為𤣥酒哉共明水火者司烜也執明水火而號祝者大祝也奉明水火者大司寇也共而後祝之祝而後奉之其序如此王昭禹曰祭祀必取明水火者以物言之則得隂陽之潔氣也以道言之則潔而清明乃可以承祭祀也凡邦之大事共墳扶云反燭庭燎力召反鄭司農曰墳為蕡蕡燭麻燭也鄭康成曰墳大也樹於門外曰大燭樹於門内曰庭燎皆所以照衆為明賈氏曰樹於門外者非人所執也燕禮云甸人執大燭於庭不言樹者彼諸侯禮不樹於地門内在路寢之庭故曰庭燎之百由齊桓公始注云公五十侯伯子男三十其百者天子禮庭燎所作以葦為中心以布􅅶之飴蜜灌之若今蠟燭百者或百根一處或百處設之若人所執者用荆燋為之執燭抱燋曲禮云燭不見跋足也中春以木鐸脩火禁于國中鄭鍔曰中春大火之星見於辰季春出火司烜先脩火禁警以木鐸使無不聞則除去故火以待新火也王昭禹曰為季春將出火先事而戒也鄭康成曰火禁謂用火之處及備風燥易氏曰司烜氏脩火禁於國中而已宫正脩火禁乃宫中之事詳於國此所以為内外之辨軍旅脩火禁鄭鍔曰衆之所聚器甲資糧勝敗所係則火禁不可不謹也邦若屋誅則為明竁昌絹反焉鄭鍔曰司農謂三夫為屋屋誅夷三族也康成以為若其刑剭之剭謂所殺於甸師氏者余謂屋誅合一家而盡誅之邾婁定公所斷之獄殺其人壞其室洿其宫者屋誅也人有罪大無俾遺育故舉一屋而誅之罪人夜葬故為明竁欲人知其罪也如設梏加明刑之類易氏曰竁謂壙埋之地楬其罪於竁上而屬於司烜氏以明為義故爾條狼氏下士六人胥六人徒六十人鄭鍔曰狼之為物貪且狠故世有不率教化不遵檢押之人謂之狼戾條狼氏掌執鞭以禦不率之人故名曰條狼言滌去其狼戾如逐豺狼也條當為滌器之滌蕩滌而去之使潔清也黄氏曰鄭以條為滌亦通但其官主趨辟不主滌除易氏曰凡世之弗率教化如狼貪狠然先王設官以治之使之整整有條故曰條狼氏王昭禹曰以王與賔客之出入宜致肅焉故也掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人鄭康成曰孔子曰富而可求雖執鞭之士吾亦為之言士之賤也王昭禹曰執鞭以為威劉執中曰掌執鞭趨以辟道路之穢惡及車馬人物之壅窒而不通者王昭禹曰趨則走而致肅辟則所以使人避也條狼氏所以衞上者如此條狼氏以下士六人為之而其徒有六十人則帥其徒以趨辟與朝士帥其屬以鞭呼趨且辟同意然朝士主在朝之事而條狼氏所掌在道路而已鄭鍔曰自王用八人而下公用六人侯伯用四人子男用二人亦以禮有隆殺不可僭用也賈氏曰序官條狼氏下士六人今云天子八人少二人矣盖取胥徒中兼充也凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘户串反誓大夫曰敢不闗鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨易氏曰上執鞭以趨辟重主威也此執鞭以趨於前且命之重軍事也黄氏曰因其執鞭辟行人遂使命誓大抵主警肅也鄭鍔曰誓用之于軍旅祭祀亦有誓故言凡誓賈氏曰誓自有大官若月令田獵司徒北面以誓之誓時此條狼氏為之大言使衆聞知故云且命之鄭鍔曰有司已誓辭則條狼氏必命以罰無赦之辭此又言僕右及馭以下則專指軍旅之誓以為言易氏曰軍中之羣吏犯難赴敵於是乎在其聽誓於陳前者不得不嚴其告戒之㫖車莫先於僕右謂其右於戎車者勇力之士或不用命則勇力無所施揚干亂行於曲梁魏絳戮其僕是也故誓僕右曰殺賈氏曰僕大僕與王同車賛王鼓車尤聽命於其馭馭者驅馳不及則車之進退無所用其力晉使張骼輔躒救鄭近楚師其馭不告而馳之幾以不免是馭能危之也故誓馭曰車轘王氏詳說曰刑不上大夫此云鞭五百王氏以為誓其大夫之屬鄭氏以為誓大夫以文攷之何大夫之屬之有然鄭氏以為誓者出軍及將祭祀之時但師與大史小史主禮樂之事謂祭祀時耳曾不謂皆誓之於軍也大師職云大師執同律以聽軍聲是軍之有大師也大史職云大史抱天時與大師同車是軍之有大史也小史云大軍旅佐大史是軍之有小史也僕右與馭數者亦以大夫為之案戎僕中大夫也戎右亦中大夫也大師下大夫也大史亦下大夫也六誓之中惟小史為中士五以職名一以官名者謂大夫之銜命出使以官不以職也故以下大夫命之刑不上大夫而誓之嚴如此軍事以嚴終也甘誓可見矣軍國異容非祭祀之誓祭祀之誓大宰掌之大司宼涖之何與條狼氏易氏曰墨輕於鞭鞭輕於殺所謂殺寘之死而已若轘則不止於殺輕重不同何也車之進退主於馭馭不職則敗國事其罪所以最重僕掌侍衞之事右掌擊刺之事大史掌占驗之事一或不職皆足以誤軍事此其罪所以亦重至於大夫銜命而失其職其罪次之大師聽軍聲而失其職其罪又次之小史官卑而聽不專其失職之罪又次之輕重不同各有攸當使羣吏之聽誓者各以其職而共王命此軍旅之所以無不勝陳及之曰親眤之官如車右馭大史者誓之詞嚴其軍有司以下則詞寛為其親眤者曰誓我者如此之嚴則馭下可知矣而其下亦曰彼車右也車僕也邦之大吏也皆命大夫也而誓之如是則馭下可知矣脩閭氏下士二人史一人徒十有二人王昭禹曰里門謂之閭里有閭所以通往来扞制内外鄭鍔曰六鄉之法二十五家為閭一門而入自有閭胥主之又設脩閭氏之官者蓋緫其脩治之事使無廢壞也掌比音鼻國中宿互􅈀音託者與其國粥音育而比其追胥者而賞罰之易氏曰比謂檢閲夜士之守宿者鄭康成曰國中城中也鄭司農曰宿謂宿衞也互謂行馬所以障互禁止人也􅈀謂行夜擊􅈀賈氏曰宿互􅈀者宿者所互守衛復擊􅈀持更也鄭鍔曰閭之門以為往来者之防故命國中之人宿守其互􅈀或有姦盜之變當用人以追胥而守閭之人不可以往則使國粥之人任其追胥之事鄭康成謂粥養也國所粥養謂羨卒也正卒守閭而不動則羨卒之行亦其宜也王氏曰國粥謂行粥牣於國中者市官所不治故脩閭氏比之每閭各有互柝以防寇盜脩閭氏掌比校其人使先後相代又校羨卒追胥之事鄭康成曰追逐寇也胥讀為偦以賞罰待之劉執中曰國之羨卒使之什伍以追胥禽捕寇盜獲多者賞之不獲者罰之一閭之政無不舉而人自安於里閭矣王昭禹曰脩閭氏校比者止於國中若邦野則弗預也禁徑踰者與以兵革趨行者與馳騁於國中者鄭鍔曰每閭各有防限敢有徑越以從便者王昭禹曰謂行不由橋梁與野廬氏同意然脩閭氏所禁者國中之行者也野廬氏則施於野而已不言禁横行則國中故也苟以兵甲趨行與夫躍馬馳騁則人相恐動或因以亂也鄭康成曰皆為其惑衆故皆禁焉鄉之閭亦如此則遂可知邦有故則令守其閭互唯執節者不幾音畿賈氏曰有故謂大喪寇戎等恐有姦非則命各守閭閭巷門黄氏曰令守其閭互令當守者耳鄭謂令閭胥里宰之屬非劉執中曰各守閭而互之以斷出入而考其不在者易氏曰守閭雖以防非常惟執節者不幾又深辨乎往来緩急之所在國中之禁其嚴如此賈氏曰惟有執節公使者不幾呵也周禮訂義卷六十五
