body:
  text: 周禮訂義卷七十宋王與之撰冬官考工記上趙氏曰先王建官始於天官掌邦治至冬官而經理之事終矣名官以冬此其㫖也工百工也考察也以其精巧工於制器故謂之工以其所制之器從而察其善不善故謂之考小宰六曰冬官其屬六十掌邦事則冬官之事不止於制器記者止謂之考工何也鄭注云此篇司空之官也司空篇亡漢興購求千金弗得此前世職其事者記録以備大數爾然秦火之後司空居四民時地利之事亡矣先儒據所聞者記之而已賈氏曰周衰諸侯惡典籍之害已皆滅去之司空篇亡已乆有人尊習舊典録此三十工以為考工記雖不知其人其作在何日要之在秦前故遭秦焚書有韋氏裘氏等缺也此記雖不同周禮體例亦為叙致首尾相承總有七段鄭鍔曰司空之職用是以考百工之事其篇亡其記存漢儒劉歆校理秘書得之用以備司空之闕今觀所記如營國為溝洫等事尚有居四民時地利之遺意但不若制器之為詳豈非當時諸儒於先王制器之法聞之頗悉故記之特備歟至于有一二可疑者意其古制不可悉聞則間自為説以補其亡爾茍於理未大戾當尊經可也愚按漢儒謂冬官亡補以考工記司空果亡乎以周官司空之掌攷之司空未可以為亡也夫周官言司空掌邦土居四民時地利凡經言田萊溝洫都邑涂巷者非邦土而何農工啇賈市井里室廬者非居民而何桑麻榖粟之所出山澤林麓之所生非地利而何及攷小宰言六官設屬各有六十今治官之屬六十有三教官之屬七十有九禮官之屬七十有一政官之屬六十有六意者秦火之餘簡編脫落司空之屬錯雜五官之中先儒莫之能辨遂以考工記補之其實司空一官未嘗亡也夫攷工記可以補周官者非三十工之制有合周之遺法也獨考工之序其議論有源委非深於道者莫能之夫論百工之事不止於工上立説上而本於王公士大夫則知工雖末伎非王公𤼵明乎是理士大夫推而行之其藝固不能以自成下而及於商旅農婦則知工雖有巧非商旅之懋遷貨賄農夫之飭力地財婦工之化治絲麻其材於何而取給也創此者有知述此者有巧業則𫝊於世守功則歸于聖人工何嘗獨立於天地間能使器利用便乎惟此等議論近古足以𤼵明聖經之秘此所以取而為補亡之書也如捨此而索於制度之末則論周人上輿奚及乎上梓上匠之制論周人明堂奚取乎世室重屋之制言溝洫澮川非遂人之制也言旂旗旟旐非司馬司常巾車之制也其他纎悉有不可盡信者甚多㮣以為周家之制度豈其然乎國有六職百工與居一焉劉氏曰坐而論道一職也作而行之二職也審曲面埶三也通四方之珍異四也飭力以長地財五也治絲麻六也此文首尾自明不須以六官説之鄭鍔曰王公士大夫固可謂國之職百工啇旅農夫婦功分各不同貴賤殊等乃大宰所授九職中之四者而已詎可取並列而為六耶記攷工者將言百工之事為甚重故以六職之大而司空之職有百工之事亦參與其中則百工不可以為賤藝而忽之故取攷工之事以足六職之名非以農工商旅與王公並肩無復等降也賈氏曰小宰冬官屬六十此百工即其屬言百舉大數耳或坐而論道或作而行之或審曲面埶音勢以飭音勑五材以辨皮莧反民器或通四方之珍異以資之或飭力以長丁丈反地財或治絲麻以成之鄭康成曰言人徳能事業之不同賈氏曰論道即周官云大師大傅大保兹惟三公論道經邦燮理隂陽三公所論之道即所經邦燮理者也經者經綸之謂燮理者和調之謂明則邦國幽則隂陽幽明之所以然乃所謂道也經綸之用藏於無迹和調之妙間不容聲亦何待於論乎論云者擬議以成其變化講明啟沃而精一之者也非經綸天下之大經參天地之化育者不足以與此故官不必備惟其人鄭康成曰作起也葉氏曰天下之事不難於行而難於論論之者在上行之者在下未有論之不當而行之不悖於理者也人君欲建乆長之䇿必先謹股肱之臣鄭鍔曰審曲者審其曲也面埶者面其埶也材有曲直直者不待審而可知審其曲然後見其理之所在勢有向背背者不可向以為用面其勢然後順其體之所向賈氏曰若弓人夾弓庾弓往體多來體寡若之類皆審察五材曲直方面形勢之宜也斬轂之道矩其隂陽皆記其隂陽之面背也陳藴之曰面字非物之面乃人向道之面也撢人云以正王面召誥云面稽天若皆向之謂也審其曲面其勢皆人為之耳又説見下文趙氏曰飭修治也鄭鍔曰審其曲面其埶以飭治乎五材左氏言天生五材民並用之說者謂金木水火土也鄭康成於此則曰金玉皮賈氏曰知有玉皮者以函人玉人等知之木土蓋據考工之篇所用之材以為說耳賈公彦從而為之説曰水火單用不得為器物故不以水火備五材之目以下文八材攷之則金木雖可為器若非水火何自而成輪人斬轂以火養其隂水之以眡其輪之平沈之均弓人為弓撟幹欲熟於火䰞膠則欲水火相得推此類而言之工安可無水火乎二子之説非矣陳用之曰五者加皮玉采色是謂八材大宰言百民工飭化八材而此言五材盖若珠玉丹青之美在有不得而用者以辨民器為主宜舉其並用者言之鄭康成曰辨猶具也鄭氏鍔曰具其器用使之無或不足也王安石以民器各有宜不可以不辨資取也項氏曰所貴所異彼此不通無以相資商旅所以遷之𫝊曰夏則資皮冬則資絺旱則資舟水則資車以待乏易氏曰古者珪璧金璋錦文珠玉不鬻於市又司市凡之蓄珍異害者亡靡者微禁惟恐不嚴此乃通以資盖攷工之珍異非必金玉錦繡之物也但地之所無而人以為貴者則謂之珍地所罕見而人以為不常者則謂之異此正切於民用者故通之也賈氏曰飭勤也地財榖物皆是王氏曰治絲為帛治麻為布易氏曰長者長於始也成者成於終也坐而論道謂之王公作而行之謂之士大夫趙氏曰此言其職業之人名而復結上文愚按王公乃王與三公也與王一體故廣厦細旃之上相與坐而論道或以帝王無職事不當與臣同列於六職曷不思天職覆地職載聖職教化要知天地聖人所謂職者無職之職而三公亦非可以常職拘或以言王之三公欲别於上公之公亦恐未然賈氏曰士大夫則設官分職治職教職之等王昭禹曰王公尊而事道故坐而論之逸而無為也士大夫卑而事事故作而行之勞而有為也致治之序本在上末在下王公務本以經治故坐而論道以謀其始士大夫務末以贊治故作而行之以成其終坐則無為而未始有作論則言之而未始有行然則作而行之者推王公所論之道以見於事業而已鄭鍔曰時有汚隆則道有可升降當其時所宜行者不以不論為王公者坐廟朝之上所論若此為士大夫者奔走於下聴其所論從而行之陳用之曰言公則孤可知言大夫則卿可知先王而後公尊卑之序先士而後大夫小大之序於上則先尊而後卑於下則先小而後大言之法也鄭敬仲曰考工必及於王公大夫之職何也盖百工之事固不可耕且為故也後世有為彭更之言謂無事則不可食豈知通功易事以羨補不足者乎有為許子之言者謂賢者與民並耕而食豈知一人之身百工之所為備豈必自為而後用之乎審曲面埶以飭五材以辨民器謂之百工鄭鍔曰自審曲面埶而下凡有四職大抵論百工之為急鄭康成曰五材各有工言百衆言之也王昭禹曰五材者民器資之以有成也一材不可闕一器不可廢則百工之事烏可後哉然欲辨民器必先乎飭五材欲飭五材必先乎審曲面埶惟窺理所在然後能審曲惟正體所向然後能面埶五材天之所生必致力以修飭之然後可以為民器若飭木而為舟車弓廬之屬飭金而為量鼎劒削之屬飭土而為甗甑簋䇺之屬飭水火而運用之以成乎衆材之屬飭材以為器而民器各有宜焉不可以不辨其為輪也辨其髙下之地其為弓也辨其安危之人其為庇也辨其地之堅柔其為劒也辨其士之上下故曰以辨民器通四方之珍異以資之謂之商旅鄭康成曰商旅販賣之客賈氏曰行曰商坐曰賈旅賈也飭力以長地財謂之農夫鄭鍔曰出於地而利於人者地財也必得人有事於地而財始長能勉致其力不憚勤苦以有事焉則地無遺利矣斯可謂之農夫陳用之曰非特受田之焉夫而已山澤之農皆與盖三農生九榖園圃毓草木虞衡作山澤之財皆所謂長地財也治絲麻以成之謂之婦功鄭鍔曰絲枲人所賴以禦寒暑非嬪婦化而治之無以成布帛故制絲以成繒纊組文之物治麻以成布緦絺綌之物斯可謂婦功總論王昭禹曰六職之序王公制法以示百工者也士大夫行法以治百工者也商旅通物以資百工者也農夫長財以養百工也嬪婦化治以成百工也故王公大夫之序在百工之上商旅農婦功之序在百工之下鄭敬仲曰記之所載自王公士大夫以至於農夫婦功皆有職于國者也而百工者事職之所主故列於事官而為之屬也然上無道揆則下無法守朝不信道則工不信度三公坐而論道則上有道揆而朝信道此道徳之所以明也士大夫作而行之則下有法守而工信度此風俗之所以同也先王之時所以同風俗者尤謹於百工以其衣服器械之所由出也然則其可不屬之以官乎又曰勞心者治人勞力者治於人然無君子何以治野人故六職先以王公士大夫焉治于人者食人治人者食于人然無野人何以養君子哉故六職成之以工商農婦焉本在上末在下在上者無為而執要在下者有為而治詳無為者精於道有為者精於物也粤無鎛音博燕無函而南反秦無廬魯呉反胡無弓車粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也趙氏曰粤燕秦胡地名也鎛函廬弓車器名也鎛治田之器詩云庤乃錢鎛其鎛斯趙是已注謂粤地塗泥多草薉而山出金錫鑄冶之業田器尤多以職方氏考之揚州即粤地也其利金錫竹箭則粤多金錫信矣函甲胄之屬謂之函者取能包函人之意孟子云函人惟恐傷人是以注謂燕近强胡習作甲胄則燕地之人能為函也鄭氏鍔曰燕之地東有漁陽右北平遼東遼西西有上谷代郡鴈門廹近强胡以人人習作鎧甲而工于為函廬戈㦸之柲即廬人為廬器也如今鎗刀之柄以木之堅强者為之注謂秦多細木善作矜柲是也鄭氏鍔曰秦之地有鄠杜竹林南山檀柘天水隴西山多林木故其民長於攻木以為柲弓車射乗以攻戰之器注謂匈奴無屋宅田獵畜牧逐水草而居皆知為弓車是也鄭氏鍔曰胡者謂之匈奴唐虞三代之時所謂山戎玁狁熏粥也居于北邊隨草畜牧兒能騎羊則彎弓射鳥䑕少長則射孤兎其俗專以射獵為生無云者謂四國之人皆能為是器極其巧妙無所優劣故無鎛函廬弓車之長也人之為藝必有所短而後見所長有所拙而後見所巧今舉國皆能之所以云無注謂人皆能作是器不須國工王解謂官府無是工皆未是新義云段氏為鎛器函人為甲廬人為廬器弓人為弓車人為車考工所以有是五工者謂人不皆能故設工以為之至于粤燕秦胡夫人皆能之故曰無非無其工乃無其名也考工又慮人不知其故所以下申解之曰非無也以夫人能為之也知者創物巧者述之守之世謂之工趙氏曰此段是推原制器本末先後之序無所不通之謂智惟智者明物燭理所以世間原無此器智者以心思之妙理致之精自我創出來巧謂工之巧者見智者之創體立而不備法具而未詳以其心術之巧又依舊制上繼述而増修之創是開端造始之意述是繼述不作之意始弧矢之利取諸睽耒耨之利取諸益棟宇取諸大壯棺椁取諸大過前人只創得大㮣後來如考工為弓矢耒耜宫室等制度添了許多節目又如智者觀轉蓬則以為輪觀雲氣則以為旗而巧者述之則為軹為較為轛為輿不止於輪為熊虎龜蛇九斿七斿之類不止於旗皆是巧者因仍増益之功至於自祖及孫世世守而勿失如函人之子常為甲弓人之子常為弓之流𫝊愈乆則技藝愈精然後謂之工焉百工之事皆聖人之作也趙氏曰考工又慮後世以百工為器數之末初無妙理可觀遂至于忘其本所以繼之曰百工之事非百工之自為皆聖人之作也愚按上既言智此又言聖則創之者自是智者之事作之者自是聖人之事創則不離乎物而作則有得乎形而上者之道䟽以智為聖人非也王昭禹曰易言備物致用立成器以為天下利莫大乎聖人盖百工之事雖形於度數之粗而天下之至賾寓焉非聖人孰能作之故斷木為杵掘地為臼臼杵之利則取諸小過弦木為􅋃剡木為矢弧矢之利則取諸睽或為耒耜以取諸益或為􅃠罟以取諸離為棟宇則取諸大壯為棺槨則取諸大過一方一圓而具天地之象一竒一耦而具隂陽之數或曲或直而有剛柔之理或厚或薄而有盈虧之義豈淺淺者所能及哉𫝊曰作者之謂聖殆以此也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也趙氏曰考工既言百工之事皆聖人之作又慮無實跡可據又恐或者見聖人創物制器將謂窮人力竭智巧一切用其使然之功于此又指其實而言之見聖人皆順物理自然處爍謂鎔鑄金乃堅剛之物非以火銷爍之如何能為刃如劒削戈㦸皆是爍金為之也凝注謂堅也堅凝是結聚之意土是散亂之物非以水凝結之如何為得器如陶人為甗旊人為簋者皆是凝土為之也作車作舟亦然但考工獨于車輿舟言作者盖土與金則就其質而成器故可爍可凝至于車舟則斷削衆木而後成其工其器非一而足又制度規模與金土不同非聖人立為成式以貽後世誰能作之也然曰爍曰凝曰作皆其物質可以爍之凝之作之使物質不可以為用聖人亦不强為之也然則聖人之作亦曰順萬物自然之性而已此所以申言皆聖人之所作也易氏曰太極動而為五隂陽布而為五行是行者天地生成自然之理刃之以金為體者以火為用故于金言爍器之以土為體者以水為用故于土言凝水行乗舟以濟不通陸行乗車以任重致逺則木之為用無徃而不利記考工者舉此四者以推五行造化之理以明聖人器用之利使天下因物以窮理又不特此四者而已天有時地有氣材有美工有巧合此四者然後可以為良賈氏曰此一段言工雖巧不得天時地氣材之美者則不良王昭禹曰隂陽寒暑在天運之以為時者也剛柔燥濕在地化之以為氣者也萬物盈天地間得時以生得氣以成及其成材天地之美具焉故曰工有巧此四者相有以相成合而用之闕一不可故曰合此四者然後可以為良良甚善也若良知良能出於天合之自然也是故斬轂之道必矩其隂陽其斬陽木必以仲冬其斬隂木必以仲夏弓人為弓於冬則析幹於春則液角於夏則治筋於秋則合三材此因天時也貢金錫責之揚貢杶幹責之荆孤桐責於徐漆枲責于豫以至鄭之刀宋之斤魯之削呉粤之劒此因地氣也相幹欲其赤黒而鄉心陽聲而逺根相筋則小簡而長大結而澤漆則欲測絲則欲沈以至燕之角荆之幹妢胡之笴吴粤之金錫凡此皆材之美也輪人為輪則可規可矩可水可縣可權可量輿人為輿則員者中規方者中矩立者中縣衡者中水直者如生繼者如附三材既具巧者和之以為輪六材既具巧者和之以為弓凡此皆工之巧也材美工巧然而不良則不時不得地氣也鄭鍔曰世不明寒暑燥濕之理徒謂吾有美材矣有工巧矣不患乎器不良也而器之成卒不甚善者上不得天時下不得地氣而已是故斬木者必順其隂陽陽木必斬于仲冬隂木必斬于仲夏為弓者必順乎春夏筋必治于夏角必液於春他非無時也以為非此時則不順乎天而不足以為良也為刀必于鄭為斤必于宋為削必于魯為劒必于吴粤他非無地也以為非此地則不得其氣而不足以為良也如使其不順天時不得地氣雖材美工巧欲為良詎可得哉趙氏曰不時注謂不得天時也劉執中云不言不得天時地氣而曰則不時不得地氣者盖東西南北之異宜在地之氣不均也而器遷乎其地而不能良者則於地之氣有得有不得之辨若天時春夏秋冬之行孰有不同之方歟其失之者非時不然也人也此說甚好橘踰淮而北為枳音紙鸜音衢鵒音欲不踰濟貉音鶴踰汶音問則死此地氣然也趙氏曰橘是江南之物過淮以北則變為枳殻鸜鵒飛鳥春秋昭二十五年有鸜鵒來巢𫝊曰書所無也盖鸜鵒本濟西穴處之物今乃踰濟而東為巢於魯之中國故云書所無也貉注謂善緣木之猨也汶水在魯北即汶陽之田與則吾必在汶上矣是也貉踰汶則死亦地氣不宜爾鄭氏鍔曰萬物賦形于天地推氣于隂陽宜無所往而不遂其生育之理然植者非其地則變其本質故橘踰淮而北遂化為枳飛者非其地則有所不居故鸜鵒處濟之西不肯踰之而東走者非其地則不能以一曰生故貉踰汶水則必死彼其生植飛走類疑若無知不必擇地而安也然而若此者由地氣非所宜故爾陳用之曰橘非可以移之淮北氣有所感亦與俱化何妨乎有之鸜鵒不宜有而有者未必死也貉踰汶則死矣斯三者言之淺深之序鄭之刀宋之斤魯之削呉粤之劒遷乎其地而弗能為良地氣然也賈氏曰據經所言以鄭之刀鐵移向宋而作斤宋之斤鐵移向鄭而作刀皆不得為良鄭鍔曰鄭刀宋斤魯削呉粤之劒其為器甚良矣然遷去其地而作焉終不敵五國制作之善豈天下之工皆不如五國之功工天下之金皆不如五國之剛哉地氣非所宜則雖有良工精金亦莫克使之良也故曰地氣然者言橘貉鸜鵒賦性以生者猶非其地則不能生況刀斤削劍之器出于人為者乎引彼喻此以見地氣之不可不順也燕之角荆之幹妢扶云反胡之笴古老反呉粤之金錫此材之美者也鄭鍔曰燕幽燕也燕角之美别無所見荆楚也禹貢荆州貢杶幹栝栢鄭氏康成曰可為弓弩之幹則材之出於荆者美可知矣妢胡在楚之旁春秋所言頓子胡子是也杜氏曰妢胡地名笴箭槀也與槀人所掌之槀一也鄭氏康成曰笴矢幹也呉粤揚州之域禹貢揚州貢三品之金則金錫之出於吴粤者美可知也牛未嘗無角而出于燕者美木可以為弓幹而出于荆者美竹可以為箭而出于妢胡者美金錫可以為兵器而出于吴粤者美孟子曰充實之謂美美者材質之良充實乎其中而發見于其外也此四材之美者由土地所宜特異乎他邦之所産也天有時以生有時以殺草木有時以生有時以死石有時以泐音勒水有時以凝有時以澤音亦又釋此天時也鄭鍔曰天之運也一為春夏而萬物生一為秋冬而萬物死此生殺之時也草木之生也蘖萌于子紐牙於丑畢入於戌該闗於亥此生死之時也石之解散謂之泐鄭司農曰泐讀如再扐而後卦之扐至堅者莫如石疑若不能泐矣然盛暑之氣鑠石流金則堅者或至于解散澤當為釋至柔者莫如水疑若不能凝矣然隆冬沍寒則堅凝而為氷既堅矣疑若不能釋也及暖氣和融則復消釋而為水凡此皆天時使之然也惟天之時寒暑之不常物之寓形乎天地間者亦不常如此則夫工之制器可不因其寒暑隂陽哉陳用之曰物之屬乎天時者皆是此特舉數者為言言水則火可知言石則金可知天生五材民並用之火無常形托物為體金之為物化而不已故論時之變化而不及斯二者趙氏曰天時地氣材美各有定限而巧出于人之心斡旋運用其妙不可指名故此一段不言工巧凡攻木之工七攻金之工六攻皮之工五設色之工五刮古八反摩音磨之工五摶音團埴時職反之工二賈氏曰此一段言工之多少總數毛氏曰凡此諸工以職多者上寡者次之尤寡者為下鄭康成曰攻猶治也鄭鍔曰設色者敷布其采色也刮摩刮去而摩鑢也司農以刮摩為玉工然玉人磬人謂之玉工可也雕人以雕刻為事楖人為楖矢人為矢豈亦玉工也哉則刮摩之工不止于玉而已鄭康成曰摶之言拍也埴黏土也鄭氏鍔曰與禹貢徐州厥土赤埴墳之埴同陶旊之工摶拍黏土以為器坯謂之摶埴之賈氏曰以手拍黏土以為培乃燒王昭禹曰天生五材民並用之水火金木土是也加之以皮玉設色則為八材焉九職所謂百工飭化八材是也以土治水以水治火然後水火為用以火治金以金治木然後金木為器皮玉設色之事亦不離于五者然後八者之工備此百工之務也攻木之工木工也攻金之工金工也摶埴之工土工也金木言其體摶埴言其用攻皮之工以函為主設色之工以畫為主刮摩之工以玉為主皮色言其體刮摩言其用若夫水火之材則飭化以運用此六者而已故于水火不言工陳用之曰此言設色之工五而其實四也言攻木之工七而其實則八盖輪輿弓廬匠車梓七者之外有舟人焉其工八明矣盖先王置之其目三十先儒敘之於攻木之工遺輈人以畫繪之工為二遂以足三十之數歟攻木之工輪輿弓廬匠車梓趙氏曰以下是别其工之職事鄭司農曰此七者攻木之工官别名也王昭禹曰輪人為輪輿人為車弓人為弓廬人為廬器匠人為宫室之屬車人為耒之屬梓人為筍簴之屬此攻木之工七陳君舉曰輈人不與其數者一器而工聚焉者車為多攻金之工築冶鳬音扶㮚音栗段桃王昭禹曰築氏為削冶氏為殺矢鳬氏為鐘㮚氏為量段氏為鎛桃氏為劍此攻金之工六攻皮之工函鮑韗況萬反又音運韋裘鄭司農曰鮑讀為鮑魚之鮑書或為鞄蒼頡篇有鞄韗讀為歴運之運王昭禹曰函人為甲鮑人之事韗人為臯陶韋氏裘氏闕此攻皮之工五設色之工畫繢鍾筐㡛音芒鄭司農曰㡛讀如芒芒禹迹之芒王昭禹曰畫繢之事官異而職同鍾氏染羽㡛氏湅絲筐氏闕此設色之工五刮摩之工玉楖音櫛雕矢磬鄭司農曰楖讀如巾櫛之櫛王昭禹曰玉人之事磬氏為磬矢人為矢楖人雕人闕此攻玉之工五趙氏曰矢人為矢鏃磬氏為石磬如摩其耑之類亦是刮摩而成以此知刮摩之工不必専指玉然注云玉工者以刮摩之工施于玉者為多故特以一事之所主言之摶埴之工陶旊鄭康成曰旊讀如放於此乎之放鄭司農曰旊讀如甫始之甫王昭禹曰陶氏為甗旊氏為簋此摶埴之工二易氏曰三十工有以人名者有以氏名者有以事名者惟畫繪職獨言所職之事其他如輪人輿人之類則以人名之謂工以巧為能不必責之世守也如築氏冶氏之類則以氏名之謂官有世功族有世業必世習之為貴也言人則上經所謂工有巧是也言氏則上經所謂守之世謂之工是也然攻木無稱氏者攻金摶埴無稱人者蓋制木必以巧而金土貴乎世習寧非記者深得先王制作之意乎有虞氏上陶夏后氏上匠殷人上梓周人上輿鄭鍔曰此欲言作車之工故言周人以車為上欲言周人上車之由故言虞夏商周四代之主所尚各異陶陶土以為器也虞氏去古未逺世質民淳故貴乎瓦器之質也記曰有虞氏之瓦棺又曰泰有虞氏之尊也則虞之上陶可知矣匠匠人為宫室為溝洫者也夏后荒度土功卒有天下故貴乎平土之匠也語曰禹卑宫室而盡力乎溝洫則夏之上匠可知矣梓梓人也攻木以為筍簴為飲器者也商人所以上梓者變虞夏之土器而用木漸革其質而趨于禮樂之文也輿車也周人所以上輿者禮至是而大備用乗車以嚴貴賤之分也易氏曰上之為言尚也昔聖人逆推世變之所趨而為之黙制其變所謂一代之制初非偏尚之為徇有虞氏之泰尊固尚陶矣夏后氏之山罍亦未始不尚陶夏后氏之世室固尚匠矣殷人屋用重檐亦未始不尚匠殷之崇牙固尚梓矣而夏氏之龍簨簴周人之璧翣亦未始不尚梓周之乗路固尚輿矣而有虞氏之鸞車夏后氏之鉤車殷之大路亦未始不尚輿由是言之設一官制一器固不足以盡四代之所尚捨是亦不足以推世變之所寓要知考工之說特舉一代所専尚者言之耳趙氏曰天下之文物盛而制度備者莫若輿有篆縵彩繢之飾有金玉象革之美然不曰車而曰輿者盖車之制始于輿又所謂任載者在輿故也然虞夏稱氏殷周稱人者純於帝者天道純于王者人道虞夏稱氏以其嗣於先則純乎帝也商周稱人以其興于後則純乎王也故一器而工聚焉者車為多鄭鍔曰周之所尚者輿也故作車之工為多易氏曰故者繼上文而言也攻木之工七弓廬梓匠各居其一而輪人輿人車人乃居其三又于三者之中輿人居其一輪人析而二車人析而三其外又有輈人為輈是車之三工又别而為七此一器而工多惟車為最陳君舉曰車制用在輪故察車自輪始輪之外輮為圍圍之中直指湊轂者為輻輻之所蓄而利轉者謂之轂轂裏之大穿謂之賢轂外之小穿謂之軹轂中空處謂之藪轂上横通通載者謂之軸軸末以防輪而固謂之舝軸上横伏而納輈者謂之轐轐上所載三面材謂之任正任正之上謂之軫輿前掩軓版謂之隂輿深謂之隊植于輿兩旁謂之輢蔽風塵謂之茀横于兩輢而為人所憑者謂之式中系驂馬内轡處謂之輢式下之植從者謂之轛兩輢之上出于式者謂之較較之下從者謂之軹以革輓式以皮覆式謂之韈以簟衣式謂之車軓納轡之環謂之韈著車之衆環謂之指有曲轐而出從前稍曲而上謂之輈輈前持衡者謂之頸頸下衡者謂之衝衝下兩馬謂之服服外兩馬謂之驂兩服之四轡兩驂之四轡謂之八轡兩驂之内轡系于式其在手者外轡與服馬之四轡謂之六轡前系于衡後系于軫以防驂馬之入者謂之脅驅驂馬之系車四條謂之靷内兩條納于隂者謂之隂靷外系于軸者謂之外靷拘二靷以絆其背者謂之韅背為環以管外内轡謂之游環削革三就當胷謂之繁纓縷金以當盧謂之錫著鈴于兩鑣謂之鸞置鈴于式謂之和兩驂内轡謂之勒車上之覆則有盖盖之斗謂之部蓋上撩謂之弓蓋之小柄謂之達常大扛長八尺謂之桯此車之通制也車有六等之數鄭鍔曰易兼三才而兩之故六車之為葢以象天為軫以象地人立其中則三才之道備矣六等之數殆亦兼三才而兩之之意毛氏曰在内而尊者莫若乗車在外而重者莫若兵車乗車王者所乗所以表其尊故必以三材為象兵車將率所乗欲兵器之有序而已故總計之而六等也若田車則不與焉者田車六尺有三寸加軫與轐則不及四尺之等與諸物參差而不齊故不備以等也大抵言軫及蓋而不言人不失為三材之象言軫及人而不及蓋不失為六畫之象車軫四尺謂之一等鄭康成曰此謂兵車楊謹仲曰學者多疑軫之名以鄭氏之説未明也前言車軫四尺謂之一等注以為輿後横木後言加軫與轐焉四尺也注以為軫輿故學者惑焉軫正是輿之名盖四畔各以木加于輿上以閑其所載詩所謂俴收也其四方則象地故曰軫方象地惟四畔皆木也故論軫之髙則以後横木為度六分其廣以一為軫圍車廣六尺六寸則是輿後横木圍一尺一寸徑三寸三分寸之二輪六尺六寸故軹髙三尺三寸并後軫與轐七寸共髙四尺自後而登人長八尺登下以四尺為得中故指後横木為髙之度軫之義不止後横木也謂加軫與轐者轐名伏兔在車軸上伏兔尾後上載車軫故曰輿轐轐本不髙也惟學者止認横木為軫方之義則疑其為方不知方木安得名軫之圍而其方又安能象地不可不辨趙氏曰兵車之輪六尺有六寸軹崇三尺有三寸軹謂轂末貫于輪之中者又加軫與轐之七寸軫謂輿後横木轐謂伏兔置于輪輻軸上如兩短柱以承軫者軹崇三尺三寸又加軫轐七寸則軫去地四尺矣故曰車軫四尺謂之一等戈柲音祕六尺有六寸既建而迆以氏反崇于軫四尺謂之二等趙氏曰自軫而下皆以四尺為差戈殳㦸矛是車上所插兵器古者車戰兵器插在車工以刃向外使人不敢犯人立于兵器之後欲以此自衛也戈謂刃柲謂柄毛氏曰柲以木為之合衆物之柲柄則曰廬單舉一物之柄則曰建謂插在車上迆謂放邪倚也毛氏曰邪置車輢之上下以迤鐵為之範圍惟戈言迆餘不戈柲雖長六尺六寸然邪倚則有折除之數其實只髙四尺崇謂髙也故曰崇於軫四尺謂之二等易氏曰既建而迤止戈為武之義出先刃則邪向前入後刃不以刃向國以有國者之所宜逺也人長八尺崇于戈四尺謂之三等殳長尋有四尺崇于人四尺謂之四等車㦸常崇于殳四尺謂之五等趙氏曰殳下有鑄鐏而上無刃是撃打人之器㦸戈類也戈兵之最健者其别於戈而言車㦸者以其長則不必皆倍尋惟逹于車者必然鄭鍔曰人長八尺立於車上則又崇于戈者四尺是謂三等八尺謂之尋倍尋謂之常殳長尋有四尺則丈二也其崇于人者四尺是謂四等㦸則倍尋其長丈六其崇于殳者四尺是謂五等易氏曰殳㦸酋矛皆置之車旁備而不用之義酋矛常有四尺崇于㦸四尺謂之六等趙氏曰酋矛勾兵也其刃曲可以鉤物常有四尺則長二丈矣又崇于㦸四尺故謂之六等毛氏曰酋矛為發語之聲盖以酋矛短故合口促聲而言之夷矛長故開口引聲而言之然此言聲而已若以義求酋則酋斂酋斂則促故有短之義夷則平緩平緩則伸故有長之義然則夷矛者其步卒之所用歟故廬人云無過三其身者指人而言其身明不係於車也王氏曰五兵之用逺則弓矢射之近則矛者勾之然後殳者撃之戈㦸刺之司馬法曰弓矢圍殳矛守戈㦸助凡用此者皆長以衛短短以捄長令此戈殳矛㦸皆置之車旁不言弓矢則乗車之人佩之易氏曰觀兵車之制先王不急于用兵可推矣車謂之六等之數趙氏曰始言車有六等之數終言車謂之六等之數上文未曽列此等數則云有既列此等軫數則云謂之以申結上文立言之法如此凡察車之道必自載于地者始也是故察車自輪始鄭康成曰先視輪也自從也王昭禹曰載物者莫先于車運車者莫先于輪趙氏曰道謂道理又謂法也大凡察車自有道理自有要法必自載于地者始言須以輪為先也觀必自之辭可見一定不可改易之意考工又言曰是故察車自輪始夫載于地者便是指輪言也又分明說破車自輪始以見輪為車之樞要所以言之重複表其諄諄𦂳切之意鄭氏鍔曰車之所以運轉不窮致逺不泥者以有輪也輪運乎車下而載于地上苟輪不能運雖有盖軫徒為虚器耳則輪者車之本車所資以運行也漢志曰古之聖人觀轉蓬始知為輪輪行可載因物智生復為之輿輿輪相乗流轉罔極則車之行以輪為先可知矣審車而不先審其輪是不知察之之道也故又曰察車自輪始凡察車之道欲其樸普剥反又音僕屬章欲反而微至不樸屬無以為完乆也不微至無以為戚速也易氏曰車之材衆矣然載于地而衆力之所資者輪而已故察車自輪始其次則輪之用以完乆為固輪之行以戚速為利是三者皆察之之道故曰察車之道言道則超乎形數之表有非目力之所能給矣鄭鍔曰察車之道必觀乎輪而觀輪之法又自有術輪以三材合而為之故欲其樸屬樸屬者言其附著之堅固也輪以圜轉急疾為工故欲其微至微至者言其至地者少也附著不堅則敝壊甚易欲其全且乆不可得也至地者多則留滯不行欲其急蹙而速不可得也戚音促趙氏曰戚與速皆行容輪轉快疾之狀耳輪已崇則人不能登也輪已庳音婢則於馬終古登阤大爾反也毛氏曰輪樸屬而微至固盡善矣而髙下又不可以無節鄭康成曰已大也甚也崇髙也齊人之言終古猶言常也阤版也輪庳則難引易氏曰古人制器内窮天下之理外盡天下之法故大不踰尋丈小不踰方寸所謂輪崇六尺有六寸天下之中制也輪過于崇則其軫亦過于四尺矣故軫為太髙而人力有所不能登輪或已庳則其軫亦不及四尺矣故軫為太下而馬之力有所不能引人不能登則其力怠馬不能引則常若登阪而倍用其力此非車之善者也王昭禹曰輪庳則馬髙馬髙則引輪也矣常若登阪然雖倍用力馬疲而車不進故兵車之輪六尺有六寸田車之輪六尺有三寸乗繩證反車之輪六尺有六寸毛氏曰人之登下以車為節車之崇庳以馬為節鄭康成曰兵車乗車駕國馬田車駕田馬鄭鍔曰馬有髙下故車輪亦有髙下馬之髙者其輪髙馬之下者其輪卑或駕種馬或駕齊馬或駕道馬其與戎馬皆國馬之髙八尺者故輪六尺六寸田馬馬之髙七尺者也故輪六尺三寸李氏嘉㑹曰乗車五革車則兵車田車則木車木車輪低逐獸利也賈公彦云先言兵車者重戎事也田獵與戰伐相類故即言田車而後别言乗車之等也余以為兵車所以即戎田車所以講武而乗車者王于無事之時則乗者也戎車之不戒武備之不修雖有乗車惡得而自樂耶六尺有六寸之輪軹音只崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節鄭康成曰此車之髙也易氏曰輪中為轂轂中横截者謂之軸轂之末謂之軹詩經疏匏有苦葉曰説文云軹小穿也轊車軸端也考工記司農云軹轊也又云小穿也鄭𤣥曰轂末也然則轂末軸端其在一處而有軹轊二名也圖説曰軹有二轂末謂之軹較之植者横者亦謂之軹輿人云去一以為軹圍是也薛氏曰軹亦謂之轊又謂之軓少儀曰祭左右軹鄭氏謂軓軹同是轊頭也愚案轂末之軓又見輪人為盖庇軹之下兩轍之軌又見匠人然車中有所謂軌者車旁從九龜美反有所謂軓者車旁従凡音范二字易於相亂今先辨軓字於此軌字自見輈人軌前十尺之下輿後之横木謂之軫軸上之伏兔謂之轐毛氏曰兎隂物僕賤類以其在軸之承上如兔之伏以其在軸之下如僕之伏兔尾後即所以御軸上載車軫者自軫而上即車輿也輪崇六尺有六寸則軹居其中得三尺有三寸加軫與轐之七寸則車輿去地四尺矣人長八尺與車輿去地之尺適得其半其長短升降適相稱焉故曰登下以為節鄭鍔曰田車輪六尺三寸則軹三尺一寸半鄭康成曰乗車之軌廣取數于此軌廣八尺旁出輿亦七寸也周禮訂義卷七十
