body:
  text: 周禮訂義卷五十宋王與之撰掌固上士二人下士八人府二人史四人胥四人徒四十人鄭康成曰固國所依阻者也鄭鍔曰記言城郭溝池以為固易言王公設險以守其國險固一耳既設掌固又有司險葢在野謂之險在國謂之固野之險則山川自然之形國之固則人所捍築以為防者也鄭康成云國曰固野曰險觀掌固所掌乃城郭溝池樹渠是知王國之中人以為固矣愚案掌固司險不列於地官而屬於司馬不統於職方特專於一職者葢司馬所以統軍旅之重而要害之地皆攻守之大計必有所守則邊境無空虚之患掌修城郭溝池樹渠之固劉執中曰浚溝之土所以為城也鑿池之土所以為郭也溝池深於外則城郭固於内用其深以增髙也渠又在其外所以出水因之設固植木其上守固之材出焉鄭康成曰樹謂枳棘之屬有刺者王氏曰古者有城守則樹焉國語所謂城守之木是也有溝涂則樹焉司險所謂設國之五溝五涂而樹之以為阻固是也司險樹之掌固修之鄭鍔曰城郭本於築者有時而傾溝池本於鑿者有時而塞樹則所植以為阻塞之木也渠則所導以通不行之水也渠有時而淺涸樹有時而枯槁則吾所依以為固者不足恃矣故掌固修之葢治壊之名也頒其士庶子及其衆庶之守鄭鍔曰有以修之無以守之無益也於是頒其士庶子與衆庶以守焉王氏曰士者公卿大夫之適而已命者也庶子者國子之倅而未命者也衆庻則其地之人民逓守者也夫士庻子所使帥衆庶而頒其守則逺近均焉勞逸更焉鄭鍔曰士庻子宿衞王宫之人使外與掌固之事者葢以所親信者守之黄氏曰士庶子守固與宿衞王宫同其事任霍光曰函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令漢人猶識此意王氏詳説曰宫伯云士庶子之在版者謂守於王宫也此謂頒其士庶子之守謂守於城郭等處也賈氏謂士庶子不合在城郭而掌固言此者兼掌士庶子宿衞之事失之設其飾器鄭鍔曰守必有器如矛㦸之類器加以飾所以為觀美之容李嘉㑹曰設器以為俻必設飾以為美觀則險固之地斯壯而固矣如今門㦸之類分其財用均其稍食王氏曰分其財用以給守事均其稍食以養守者劉執中曰財用曰分隨地守之所用也稍食曰均計功力之所當也鄭鍔曰守必有財用金城湯池亡粟不守故分之使無偏聚之處稍食守吏之禄廪其守固則其給宜均任其萬民用其材器鄭鍔曰萬民近地之民居近則自任其責鄭康成曰任謂以其任使之也材則近地所出之財用易氏曰材謂材木可為楨榦者器則土人所使畚築之具易氏曰器謂器械可備任載者守其地則用其材又用其器取之近地不勞於輸將出於民則人各便其習而不患其扞格如是則固可以長守矣易氏曰周人守禦天概以民為固以人心為本設其飾器所以聳動觀聽之具而又分其財用則隨其地守之所當得均其稍食則計其功力之所當予凡此皆奮𤼵人心於平時之素也若夫城郭之所以為固者亦不過任萬民而用其材器使其地之人自為守而已凡守者受灋焉以通守政有移甲與其役財用唯是得通與國有司帥之以賛其不足者黄氏曰凡守者皆受法于掌固故得通守政鄭康成曰凡守者士庶子及他要害之守吏通守政者兵甲役財難易多少轉移相給也其他非是不得妄離部署王昭禹曰甲兵有時而不足用則無以扞患力役有時而不足供則無以即工財用有時而不足給則無以同事以其有餘者移之以足一時之所頒不亦可乎若守者則不可移故曰唯是得通易氏曰與國有司帥之則非掌固之所敢專帥之於掌甲掌役掌財用之有司亦以賛其甲役財用之不足者鄭康成曰賛佐也項氏曰所以防其自妄予劉執中曰受法于掌固必通其守政不可執一隅而死其所守也與國有司帥其所移之物以賛其不足者此之謂通守政焉晝三巡之夜亦如之夜三鼜音戚以號戒易氏曰此掌固所設之法非其自巡也晝三巡則察其部伍之失次者鄭康成曰巡行也行守者為衆庶之懈惰夜事尤謹故亦如之劉執中曰此其守者受法於掌固也夜則不見其三巡故以鼜及號為信也愚案鼜字見鼓人鎛師易氏曰每巡必鼓鼜鼜即鼓軍事之鼖鼓也鼜其聲也號則呼其所守者之名黄氏曰號即司馬號名辨夜事者也戒則警其所守者之事若造都邑則治其固與其守灋王昭禹曰上文所言皆王國之守固也若造都邑則治其固與其守法則都鄙之事鄭康成曰都邑亦為城郭黄氏曰或曰鄙或曰畺守法詳焉凡國都之竟音境有溝樹之固郊亦如之鄭康成曰竟界也鄭鍔曰外焉國都畺竟之上王昭禹曰王國都邑之境則為之溝池種植樹木以為固四郊之内鄉遂之民所居也亦為之溝樹焉黄氏曰於是設關葢外焉環而守之則中邦可無意外之患民皆有職焉鄭康成曰職謂守與任鄭鍔曰國中也都邑也國都之竟也近地之民各有職於所守之地非惟各愛䕶其國亦不患其力之不給劉執中曰邊境之民則受田以養之分地以任之使治溝種樹猶邊洫者受田以治溝洫也若有山川則因之鄭康成曰山川若殽臯河漢賈氏曰殽若殽有二陵臯若東成臯漢若楚之漢水河為四瀆之宗又齊西有濁河王昭禹曰因之以為阻固也夫為髙必因丘陵為下必因川澤因其髙下自然之勢以為之阻固則用力不勞而為備也易矣楊氏曰因之不為城郭溝池樹渠以為固也司險中士二人下士四人史二人徒四十人薛平仲曰掌固所以先其在國司險所以詳其在野自國而野自野而疆逺近勢異今也先其國中之固而及諸野外之險則險固可恃而内外之勢立矣李嘉㑹曰晉悼公十年方理㑹得一虎牢而後鄭人服以司險失職而鄭人得之掌九州之圖以周知其山林川澤之阻而達其道路鄭康成曰周猶徧也王昭禹曰九州之圖山林川澤之阻若職方氏所謂東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖之類是也鄭鍔曰易之坎指山川丘陵為地之險則險者地勢自然之阻非人所為固也九州之地各有險王者制御諸侯不可以不周知也使司險之官案圖以周知凡水絶壤斷之處山髙水深之所皆欲知之無遺也鄭康成曰達道路者山林之阻則開鑿之川澤之阻則橋梁之設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路賈氏曰此五溝五涂而言樹之林以為阻固皆有守禁非遂人田間五溝五涂也此溝涂所作隨大小為之皆準約田閒五溝五涂溝上亦皆有道路以相支湊故以五溝五涂言之劉執中曰王畿之内非鄉遂都鄙之地可以田者為五溝五涂不可田者樹以林木用為險固必因其地之民授之田使職其守禁鄭康成曰樹之林作藩落也項氏曰以備不虞楊氏曰知山林川澤之阻而達其道路者達其阻以為道路也達其道路而不設溝涂林木以為阻固非王公守國之義為之阻固而無守禁則湮茀而不治芻蕘者往焉其弊有不可勝言者雖有阻固不足恃矣又皆有守禁而達其道路項氏曰皆有守禁而達其道路則人不得以妄踰而有常行之道於守固於往來兩得之矣國有故則藩塞阻路而止行者以其屬守之唯有節者達之鄭康成曰有故䘮災及兵也易氏曰守以道路為急阻以道路而後險為可恃使内外無禁往來不察而姦偽者邪慝者物之犯禁者人之有罪竒衺者或得乗間而入雖險猶無險也故司險於國有故則藩塞阻路而止行者鄭鍔曰已藩塞阻路則使其徒四十人守之李嘉㑹曰司險之屬胥徒止四十人其屬如何能守天下之險葢有王官之屬有守地之民凡姓名屬乎上者則令守之惟有節者則達焉而無旌節者不使得通也鄉大夫於國有故則令民各守其閭以旌節輔令則達之者所掌止於六鄉之中也掌節凡通達於天下者必有節無節者有幾則不達所掌及於天下也此指王國險要之地而已楊氏曰惟國有故時為然以備不虞非設險為國之常法也鄭鍔曰周家始都豐鎬其後周公有雒陽之卜以為後世有徳易以興無徳易以亡周公所恃以安周者不專於宅險也然設法守禦如此其備信夫王公設險以守其國雖聖人亦不能已也掌疆中士八人史四人胥十有六人徒百有六十人鄭康成曰疆界也易氏曰千里王畿畿之境謂之疆載師所言大都之田任畺地是已而邦國都鄙亦有畿疆之制大司徒所言制其畿疆而溝封之是已此官雖逸而以司險推之則掌王國之疆以及邦國都鄙之疆也審矣賈氏曰守疆界亦禁戒之事故在此候人上士六人下士十有二人史六人徒百有二十人鄭康成曰候候迎賔客之來者鄭鍔曰讀候人之詩言彼候人兮何戈與祋其官可謂卑矣詩人以為歌詠何也葢曹之共公不能用賢所謂賢人君子俱充何戈祋之役以送迎賔客而三百赤芾者乃皆服芾之小人也周人乃以上士六人為之葢待賔客之來往治其禮事亦所以懐逺人之道黄氏曰其職各掌其方之道治其官上士六人則四方分為六鄉愚案掌疆候人之職徒役特多古人於邊備嚴矣賈氏白亦是武事故在此各掌其方之道治與其禁令以設候人鄭鍔曰境必有候所候不一處故曰各掌其方之道治鄭康成曰國語曰候不在境譏不居其方也王昭禹曰道治道路之治治謂出入迎送治其事也禁謂止其所犯若傳所謂壊其館垣之類是也令謂令使為之若傳所謂教其不知恤其不足是也鄭鍔曰凡扞衞防閑禁其侵掠之類皆掌之鄭康成曰以設候人者選士卒以為之賈氏曰選士卒者即徒百二十人皆是甲士步卒之内為之王氏曰方各設其人以候有方治者致之送之若有方治則帥而致于朝直遥反及歸送之于竟鄭鍔曰或各以其方之事來質正於王朝以求治者則帥而致之於朝去則衞而送之於竟迎其往來之使致其勤也如是而春秋之世晉欒盈奔楚道周周西鄙掠之至盈訴諸朝王乃使候出諸轘轅此諸侯所以不朝而王室卒至於陵遲定王使單襄公聘楚假道于陳候不在竟單子知其必亡是又不知先王設候人意環人下士六人史二人徒十有二人黄氏曰以環名官取巡邏周匝之義王昭禹曰環之為物肉好一其肉好皆旋之而不可窮也環人之官巡察内外若環之終始相循而不窮鄭鍔曰夏官環人掌軍中循環往來無所不察之事而秋官環人則掌送迎賔客循環往來之事皆以循環往來為義軍中之環人有戰攻之事則置之非如秋官掌送迎之職易氏曰在秋官者掌送逆邦國之通賔客令其守涂地者為之聚􅈀謂之四靣環之可也在夏官者止於徒十有二人何以環之乎今攷簭人九簭之名九曰巫環鄭氏謂簭可致師不此則以為致師之簭孟子曰環而攻之必有得天時者矣既謂之天時非四靣環之之意環得天時之吉則其為簭名信矣掌致師王昭禹曰兵法曰善戰致人而不致於人夫我案兵無動而致敵使來以逸待勞宜勝之矣鄭鍔曰戰必致師葢使環人犯敵以致吾必戰之志使敵人怒而求戰其致之自我也左氏載晉楚交戰楚許伯攝叔樂伯致晉師之事司馬出師而敵人不速出戰則環人致之察軍慝他得反鄭康成曰慝隂姦也視軍中有為慝者則執之鄭鍔曰茍有欲為姦於軍中者無以察之則變從中起而外應敵人矣故掌察乎軍慝所以消姦惡於内李嘉㑹曰察軍之姦謀隠而未彰者此上兵伐謀之意如韓信伐趙知其不用廣武君策而後進師之類所以言之於先也環四方之故鄭鍔曰若外焉有締交之人將攻于我師無以環之則變生於外四靣並至矣故又環送而巡之所以折衝而禦侮也易氏曰察軍慝則察其在我者環四方之故則環其在人者巡邦國搏音博諜音牒賊王氏曰自此以下皆環人巡邦國之事鄭鍔曰徧巡四方而無不知有諜賊則反間或行焉又當巡邦國而搏其諜則無敢窺我師者矣鄭康成曰諜賊反間為國賊訟敵國鄭鍔曰諸侯之國力足相敵不為辨其紛争之訟則有相攻擊之患以分我師之勢矣鄭康成謂敵國兵來則往與之訟曲直引齊國佐如晉論蕭同叔子事以為證環人仗王朝之威何為往與之訟耶葢訟敵國者往為決兩國之争黄氏曰環人與候人聨官夫事不治則訟訟不已必以師已用師矣而猶訟之訟其曲使知而服之則師可已也劉執中曰訟敵人之過惡以激我師俾無不怒之也揚軍旅鄭鍔曰有不服之國已圍其邑不宣揚王國之威武以降之必至於多殺其人民此皆環人之職鄭康成引尚父鷹揚彼言揚者揚威武以待敵耳如環人又安能鷹揚哉以叔向平丘㑹觀之謂魯人曰寡君有車四千乗在牛雖瘠僨於豚上其畏不死乎環人宣揚國威殆此類也降户江反圍邑鄭康成曰圍邑欲降者受而降之春秋傳曰齊人降鄣黄氏曰環人掌致師志於戰也而以降圍邑終焉不殺之仁也雖然受降如受敵斯亦當察故環人掌之易氏曰此六者非其徒十有二人之所能及必環人簭之而後舉此所以繼於致師之後挈壺氏下士六人史二人徒十有二人鄭康成曰挈讀如絜髮之絜壺盛水器也世主挈壺水以為漏易氏曰挈壺之制不可攷以唐制推之水海浮箭四匱注水始自夜天池入于日天池自日天池入于平壺以次相注入于水海浮箭而上以浮箭為刻分晝夜計十二時每時八刻二十分每刻六十分箭四十八二箭當一氣嵗統二百一十九萬一千五百分悉刻于箭上銅烏引水而下注浮箭而上𤼵至於晝夜之刻分至之候冬夏長短昏曉隠見與周官晷影無差鄭鍔曰或謂挈壺氏司漏刻以分隂陽晝夜宜與保章馮相同列乃列於夏官何耶以齊國風攷之襄公之時朝廷興居無節東方未明而召羣臣至使之顛倒衣裳不顧時之早晚為挈壺氏者不能辰夜不夙則莫若是類正司晝夜之事若夫掌挈壺以令軍井挈轡以令舍挈畚以令糧此行師用兵之時舉以示師徒安得不列為司馬之屬哉掌挈壺以令軍井挈轡以令舍挈畚音本以令糧鄭鍔曰軍之所聚不可無井穿井及水則舉壺示人使見壺者知其地有井葢壺者所以盛水故也乗車馬者必執轡止則解焉軍之所至或當舍止則舉轡示人使見轡者知當解鞍息馬葢舍則不執轡故也盛糧者必用畚軍於其地或當廪給則舉畚以示人使見畚者知其下有糧葢畚者盛糧之器故也是三者非挈壺之職皆有取於挈壺之義葢軍旅所屯號令難於相聞各以其物表之於事便於力省也易氏曰飲食居處人之大欲存焉故因其令軍井而兼以令之是三者皆挈於竿首而表之雖軍衆不齊莫不目擊而心㑹鄭氏所謂省煩趨疾是已凡軍事縣音𤣥壺以序聚􅈀凡䘮縣壺以代哭者皆以水火守之分以日夜王昭禹曰縣壺以盛水分刻漏也鄭康成曰擊􅈀兩木相敲行夜時也鄭鍔曰軍中之守尤嚴於夜故行夜者必聚而擊􅈀以戒非常必更代而次序之使之適平縣壺為漏時至則代先後有倫非惟無獨賢之歎且使擊柝者不倦而事益嚴也野廬氏於賔客至則令其地之人聚􅈀之修閭氏掌比國中之互􅈀者秋官環人賔客所舍則令聚􅈀宫正於宫中則擊柝而比之防患之術尤戒於夜況軍中乎鄭康成曰代亦更也禮未大歛代哭易氏曰守之以火則均其晷刻之多少守之以水則知其漏箭之遷易鄭康成曰分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之時間有長短焉大史立成法有四十八箭賈氏曰此據漢法而言以器盛四十八箭各百刻以壺盛水懸於箭上節而下之水水淹刻則為一刻四十八箭者取倍二十四氣也及冬則以火㸑鼎水而沸之而沃之鄭司農曰冬水凍漏不下故以火炊水沸以沃之謂沃漏也薛氏曰以火㸑鼎使之不凝以火守壺使之不差施之於軍事所以嚴守警施之於䘮事所以嚴凶哀朝廷朝夕之禮亦常以是為節然春官雞人凡國事為期則告之時而此復特掌之挈壺氏者葢天子備官挈壺掌漏雞人告時諸侯則掌漏告時一於挈壺氏而已射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人薛平仲曰險固之守必有其本射人之屬是固王政之本務歟夫射者男子之事弧矢之利其為威天下也乆矣先王於大祭祀則有射於賔客則有射於燕飲則有射當君臣相事於禮文之交而不忘武事於弓矢之用此射人必以下大夫二人為之長者所以重其本也賈氏曰射武事故在此掌國之三公孤卿大夫之位三公北靣孤東靣卿大夫西靣黄氏曰此即司士朝儀之位射人掌公卿大夫其初命見於王則其位如朝儀之位而有摯故知其為初命始見也司士掌擯士者膳其摯是則士初命始見亦有摯矣此日視朝之朝所謂治朝也常朝司士掌其位聴朝宰夫掌其位聽治于此則曰治朝射于此則曰射朝康成謂將射始入見君之位非也將射始入見君其位或當如此而何用摯哉經文自此以上未有射事是其設職不專為射也諸侯來朝國有吉凶慶弔之事即聴於此射人掌其戒令詔相其事朝覲法見畢有所請治亦於此射人掌其治達故緫稱之曰諸侯在朝使射人專詔相之異於諸臣也大抵射人本掌選擇卿大夫故在國則使正其位等其摯㑹同朝覲則作大夫介凡有爵者大賔客則卿大夫從戒大史與大夫介大師則於此選將焉將在車則主射故使治射儀以射名官此建官之本意也鄭徒見以射名官遂謂其職皆射事若以射名官其職獨為射而已則建官之意淺矣夫君射人師扶左僕人師扶右是亦為射乎賈氏曰三公北靣者君南靣答陽臣北靣答君三公臣中最尊故屈之使北靣答君之義孤東靣者西方賔位孤無職而賔客之也鄭鍔曰三孤貳公𢎞化特立無朋君不盡臣之故位乎西而東靣王氏詳說曰朝士外朝之法孤卿大夫同於西靣射人司士則孤東靣卿大夫西靣者三孤無常職時乎與卿大夫同又時乎與卿大夫異乗夏服希冕所以與之異也位九棘爵六命所以與之同也卿大夫西靣者皆有職故在東近君居主位也鄭鍔曰卿大夫用事於朝者也其徳雖尊其職則卑故位乎東而西靣純於臣道也自王南靣觀之則西靣者在王之左東靣者在王之右劉氏曰孤東靣卿大夫西靣朝廷之序以右為尊鄭鍔曰或謂宰夫言正三公六卿大夫羣吏之位而司士又正朝儀之位王南靣三公北靣孤東靣射人又正之何耶葢治朝之位王日視朝司士掌之而宰夫治其不法者以肅其儀爾射人專夫賔射之位然君南靣三公孤卿或北靣或東西靣不以為賔之故而亂之也其摯三公執璧孤執皮帛卿執羔大夫鴈王氏曰三公執璧則以有君之體而不致其用也薛氏曰公之爵一也或曰執璧或曰執桓圭者公雖無異命然或在朝或在國在國則逺君逺君者其勢伸故以九命而執圭在朝則近君近君者其勢屈故以八命而執璧猶之月焉逺日則為望近日則為晦古人謂日有君道月有臣道者此也王昭禹曰三公事道也王之所承有弗敢臣也宗伯之摯不序於其職而射人以主賔射為先則三公之摯言於此亦以見賔而弗敢臣之意易氏曰孤執皮帛以其有衣被文采之義卿執羔則羣而不失其類大夫鴈則夙夜奉上而不懈其義黄氏曰司士朝儀之位亦無士王與諸侯賔射士位卑而不獲預故無位於朝禮記所謂朝不坐燕不與是也賈氏曰下文豻侯二正則士得自行賔射不得與君賔射矣賈氏曰儀禮諸侯有燕朝及射朝不見正朝周禮天子有射朝正朝不見燕朝諸侯射朝與燕朝位同則天子燕朝亦與射朝位同諸侯正朝亦與射朝位同是天子諸侯三朝名自同故鄭引儀禮互見為義諸侯在朝則皆北靣詔相息亮反其灋鄭康成曰謂諸侯來朝而未歸王與之射於朝者皆北靣從三公位劉氏曰三公輔弼之長諸侯方州之長故皆北靣以正臣禮黄氏曰外朝諸侯東靣賔之也治朝諸侯北靣臣之也賈氏曰法謂在朝進退周旋拱揖之儀王昭禹曰謂朝射之法也若有國事則掌其戒令詔相其事鄭鍔曰賔射之時或有國事掌其戒令以諭告之使致其嚴矣又從而詔相其事慮其出封之久或不知國事之始末也鄭康成日謂王有祭祀之事諸侯當助其薦獻也戒令告以齋與期黄氏曰國事不止祭祀戒令亦不止齋與期凡事皆有戒令士之戒令司士掌之國于戒令諸子掌之然則公卿大夫戒令射人掌之歟掌其治達鄭鍔曰若有所治之事將以上達于王則掌為之達之慮其自外而來朝左右之臣或壅蔽之使其情不得以上通也鄭康成曰謂諸侯因與王射及助祭而有所治受而達之於王王有命又受而下之王昭禹曰上治達乎下若告命之屬是也下治達乎上若諸侯之復萬民之逆也王氏曰射之為道利以直達有括則不至治達如之故掌治達者在射人也以射灋治射儀黄氏曰自此以下則射事也射法自王而下各有其法故以射法治射儀射法必自射人出故射人雖不掌士而士之法儀具焉王昭禹曰射之法不可以不正射之儀不可以不文先王因其度數而制之以為法因其動容而制之以為儀自王而下其耦或六或四或三其侯或二或一其樂歌則異節以至其容其獲其正皆有多寡之差焉此射之法也又烏有不正哉以是法而治之其效見於内志正外體直持弓必審持矢必固揖遜有度卑者不得以抗尊升降有序先者不得以居後其為儀也又烏有不文哉鄭康成曰治射儀謂肄之也緫論三射陳及之曰射有三等有大射有賔射有燕射所謂大射者王將有郊廟之事於射宫擇諸侯及羣臣與邦國所貢士可以與於祭者而與之祭司裘曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠射人云王大射則以貍步張三侯梓人云張皮侯則春以功凡此皆大射也所謂賔射者謂諸侯來朝王與之射以燕樂之射人云王以六耦射三侯三獲三容眡瞭云賔射則奏鐘鼓梓人云張五采之侯則逺國屬凡此皆賔射也所謂燕射者王與羣臣燕飲而射也梓人云張獸侯則王以息燕郷射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畵以虎豹士布侯畵以鹿豕凡畵者丹質此謂燕射也王氏詳説曰司裘所言諸侯内諸侯之大射也射人所言諸侯外諸侯之賔射也陳氏曰大射在廟則賔射在朝可知賔射在朝則燕射在寢郷射州射在序亦可知也王以六耦賈氏曰古之射者行同能耦則别之以射而勝者則飲不勝者此射之所以有耦易氏曰大射則大司馬合諸侯之六耦鄭鍔曰王耦之數十二所以法天之大數若賔射則諸侯與王射而合卿大夫以為六耦以至諸侯之四耦卿大夫士之三耦亦各以等殺而辨射食亦反下同三侯王氏詳説曰荆公以司裘之虎侯熊侯豹侯即射人之三侯司裘之熊侯豹侯即射人之二侯司裘之麋侯即射人之一侯陸農師謂王射三侯於侯内以五采畵正諸侯二侯以二采畵正卿大夫一侯以二采畵正其説皆失之司裘所言者大射也射人所言者賔射也梓人曰張皮侯而棲鵠則大射之侯也又曰張五采之侯則賔射之侯也又曰張獸侯則燕射之侯也司裘言侯而及鵠射人言侯而及正鄭鍔曰大射之侯用皮飾其側則以皮為鵠賔射之侯用皮飾其側則以五采為正此所以不同射人所謂三侯當如康成謂五正三正二正之侯也諸侯二侯即三正二正之侯也卿大夫一侯則二正而已若以司裘之熊侯豹侯而降殺之則梓人所謂皮侯與五采之侯何别乎若謂天子之侯皆五正則是天子與諸侯卿大夫射而同其侯矣臣下與天子角勝負可乎當從康成之説謂異其侯葢上得以兼下下不得以僣上也陳君舉曰王大射張三侯乃是養人主不争之徳以萬乗之尊下與諸侯羣臣射射有中否則有勝負使人主有争勝負之意則不可故特設三侯於侯道九十弓之地一侯髙一侯其侯又廣其弓又良又有相助之者則易為中雖以優至尊乃是養其不争之徳諸侯二侯亦此意諸侯於其國大射亦張三侯三獲三容鄭鍔曰射必有人執旌以告獲每侯用一人故三侯而三獲其名曰獲獲者得之難謂中侯難也射必有容其制如屏風一名曰乏矢力竭於此告獲容身於此以為隐蔽也每一侯用一容故三侯而三容易氏曰獲即數中之旌服不氏執之以待獲也容即蔽身之乏服不氏待獲而居乏也樂以騶虞九節五正音征鄭鍔曰樂用騶虞天子之射雖志於中然以仁心愛物為主故也愚案騶虞又見樂師鄭康成曰九節七節五節者奏樂以為射節之差樂記曰明乎其節之志不失其事則功成而徳行立賈氏曰九節者侯道九十弓七節者侯道七十弓五節者侯道五十弓鄭司農曰正所射也詩曰終日射侯不出正兮鄭康成曰考工梓人職曰張五采之侯則逺國屬逺國謂諸侯來朝者也五采之侯即五正之侯也正之言正也射者内志正則能中焉畫五正之侯中朱次白次蒼次黄𤣥居外三正損𤣥黄二正去白蒼而畫以朱緑其外之廣皆居侯中參分之一中二尺王氏詳説曰鄭司農謂方十尺曰侯四尺曰鵠二尺曰正四寸曰質孔叢子謂張布謂之侯侯中謂之鵠鵠中謂之正正方二尺正中謂之􅈏􅈏方六寸夫大射之禮重於賔射賔射之禮重於燕射若從司農孔叢子之説鵠中有正正中有􅈏則是賔射燕射重於大射矣鄭康成謂大射之侯用鵠賔射之侯用正燕射之侯用質以梓人攷之康成之説為長圖説曰大射射鵠賔射射正郷射射質而燕射則因郷射之侯郷射禮曰天子熊侯白質諸侯麋侯赤質則郷射射質之證也燕射必因之者葢諸侯之射必先行燕禮大夫之射必先行郷飲酒之禮故射侯相因鄭氏注儀禮以燕張獸侯郷射當張采侯誤矣鄭鍔曰或謂大射名曰鵠賔射名曰正何耶葢大射擇士故取於鵠鵠之言直也所以直己之志人君中之可以為君鵠人父中之可以為父鵠以直其志為義若夫賔射取於尚文徳以懐賔客故以五采為之所尚者文而已故曰張五采之侯則逺國屬諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豻五旦反侯一獲一容樂以采蘩五節二正鄭鍔曰諸侯在國賔射則四耦而射二侯熊豹也樂用貍首之詩以㑹天子為義也三節以聽四節以射其正則去𤣥黄而用三色也孤卿大夫自與其賔射則三耦而射一侯糜侯也樂用采蘋以能循法度為貴也一節以聽四節以射其正則去白蒼而畫以朱緑也天子元士在家賔射用三耦而射一侯豻侯也豻胡犬也犬之能守者莫如胡犬之良士以守節事君為義故射豻侯或謂司裘言天子諸侯卿大夫之侯而不及士射人乃有射豻侯之法何也葢司裘所言者大射也射人所言者賔射也士無大射而有賔射故於正特言豻侯以有賔射而言也其侯則用二采以為正與孤卿大夫同樂用采蘩以能守職為貴也侯不同而正與節皆同葢士之位去卿大夫為不逺其禮可以與之同孫氏曰自諸侯卿大夫等而下之莫不有别而所歌之詩亦使之各諭其志而安其守然後雍容禮遜之交修乖争陵犯之不作信可以觀徳矣若王大射則以貍步張三侯鄭鍔曰射之侯梓人為之司裘共之射人張之其張也必用貍步為法射人主賔射嫌於張大射之侯不貍步也故併言及之大射如此則賔燕之侯可以類推鄭司農曰貍步謂一舉足為一步於今為半步李嘉㑹曰貍步再舉則為六尺一弓六尺九十弓七十弓五十弓者象貍步之弓以定逺近也鄭康成曰貍善搏者也行則止而擬度焉其𤼵必獲是以量侯道法之鄭氏儀禮説曰設侯之次大侯則在東參次之干次之使宻不至相掩踈足以射其勢參差相入是謂貍步此非謂射者之志謂張之者之法也鄭氏以為射當如貍之擬物何預於張侯乎侯道者各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺大射禮曰大侯九十參七十干五十是也圖説曰陳禮書曰儀禮大射曰大侯九十參七十干五十即所謂虎九十弓熊七十弓豹麋皆五十弓者也葢王射虎侯則於熊豹為大故一名大侯詩所謂大侯者虎侯也參即熊侯言其參於虎豹之中也干即豹侯言其以下干上而又繼熊虎之後也黄氏曰自此至佐司馬治射正皆蒙大射射人雖主射法無賔燕射文大射射法皆射人掌之射人典法之官也侯正樂節通乎賔燕貍步張侯服不氏待獲射鳥氏取矢太史數射中司馬治射正官具物備足為射法賔燕略具於此矣小臣職曰賔射掌事如太僕之法則賔射太僕亦不掌也王射則令去侯立于後以矢行告卒令取矢鄭司農曰射人主令人去侯所而立于後賈氏曰負侯之人服不氏也鄭鍔曰射已張侯獲者執旌以負之不使去侯以避矢則有誤殺傷人之過鄭司農曰以矢行告射人主以矢行髙下左右告于王大射禮曰大射正立于公後以矢行告于公下曰留上曰揚左右曰方鄭鍔曰射以中為主王弓已𤼵不告以矢之髙下左右則王不知其中否王昭禹曰射畢令射鳥氏取矢也故射鳥氏曰射則取矢矢在侯髙則以并夾取之祭侯則為位鄭鍔曰射既設侯則祭其神司馬實爵以獻服不氏既受獻則於侯所北靣而祭之李嘉㑹曰賔射大射祭侯之禮一同射人主為之位者以其知儀位故也王氏曰侯而祭之則神無不在而君子無所不用其至易氏曰梓人祭侯之禮其辭則欲諸侯之寧侯也與大史數所主反射中鄭康成曰射中數射者中侯之筭也大射曰司射賈氏曰大射諸侯禮謂之司射天子謂之射人適階西釋弓去扑襲進由中東立于中南北靣視筭賈氏曰大史數筭射人但視之耳王昭禹曰必與大史則以大史凡射事飾中舍筭執其禮事故也李嘉㑹曰筭之多寡太史治之以定黜陟鄭鍔曰射人與之共數葢專掌射法故也佐司馬治射正鄭鍔曰射必有正梓人張之大司馬治之射人則掌其事司馬合諸侯之六耦射人則掌其五正三正之法故也黄氏曰正猶政也孔子射於矍相之圃射至於司馬則司馬主射故也鄭氏曰射正射之法儀賈氏曰若命去侯命取矢乘矢之等皆當佐之治者預習之也易氏曰於大史言與於司馬言佐尊卑之序王氏詳説曰天子有射人諸侯有司射皆所以治其射儀也負侯者服不氏令之者射人也取矢者射鳥氏令之者射人也祭侯服不氏為之位者射人也數射中者有大史在而射人又與焉治射正者有司馬在而射人又佐焉知此則知射人之官為尊故以下大夫為之祭祀則賛射牲相孤卿大夫之灋儀易氏曰祭祀之禮以牲為重視牲分牲養牲巡牲見於未祭之先將祭之時則夕牲展牲牽牲射牲割牲無非禮者射人所掌則射牲之禮而已國語曰禘郊之事天子必自射其牲此雖天子自為之曰王昭禹祭祀王必親射牲示誠敬之盡親其事也方其迎牲於門則君執紼卿大夫從士執芻至於君親射牲而孤卿大夫咸與焉此射人相孤卿大夫之法儀以其掌射法治射儀故也鄭鍔曰射人賛之謂賛之以射禮也當射牲之時孤卿大夫從王以射明其射法又相其射儀所謂以射法治射儀也㑹同朝覲作大夫介凡有爵者賈氏曰作使也黄氏曰作興起之鄭康成曰有爵者命士以上不使賤者鄭鍔曰王出而㑹同諸侯來而朝覲王使公卿有事焉當用大夫以為上介其凡有爵者以為衆介射人則作之易氏曰射人則以法儀而作之黄氏曰自此以下至大喪作卿大夫掌事皆因事定其材等以待進退李嘉㑹曰凡此數端掌之射人屬於司馬所以辨論官材大師令有爵者乘王之倅七内反車鄭康成曰倅車戎車之副易氏曰大師王乗戎路其廣闕苹輕之倅不可虚位故以有爵命士以上乗其倅王昭禹曰士卑不嫌於特尊鄭鍔曰或作之又或令之良由於賔射之時掌孤卿大夫之位故耳有大賔客則作卿大夫從才用反鄭康成曰作者選使從王見諸侯戒大史及大夫介鄭康成曰戒其當行者覲禮曰諸公奉篋服加命書于其上升自西階東靣大史氏右王昭禹曰太史與事者以太史主協禮事故也鄭鍔曰卿大夫從王以見諸侯則射人作之公卿有事於諸侯而介以大史及大夫則射人戒之重賔客之禮也大喪與僕人遷尸作卿大夫掌事比毗志反其廬不敬者苛罰之鄭康成曰僕人大僕也僕人與射人俱掌王之朝位王崩小歛大歛遷尸于室堂朝之象也檀弓曰扶君卜人師扶右射人師扶左君薨以是舉黄氏曰射人大僕皆法度之事易氏曰卿大夫掌朝位之事則射人作之賈氏曰比其廬當比其本服親踈及貴賤鄭康成曰苛謂詰問之鄭鍔曰此言作大夫介作卿大夫從作卿大夫掌事皆以作為言葢命之使行者王也射人則作之謂作而起之也㑹同朝覲賔客大師大喪之禮初無與於射而掌於射人取其射之法儀而已服不氏下士一人徒四人鄭鍔曰物之不易服者莫如猛獸設官以服之名服不氏言能服其不服所以示王朝之威無所不能服也黄氏曰射人與司士諸子聯職而以服不氏以下參其間終射義也李嘉㑹曰夏南方也南方屬鳥故自服不氏以下數官繼於射人之後掌養猛獸而教擾之鄭康成曰猛獸虎豹熊羆之屬擾馴也鄭鍔曰徒能養之不能教擾之使馴則傷人而為害矣教者教以服習進退之節擾者所以擾馴其心陳及之曰鳥獸在山澤則適其性為人所養則失其所教擾之使不至於夭閼無腥臊羶香之病則可以奉祭祀供肴羞矣若地官牧人掌牧六牲而阜蕃其物亦其類焉充人賛碩牲肆師之省牲皆始也阜蕃教擾之不失其性則奉以告神乃無媿詞也王昭禹曰鳥獸草木無不治然後為政之至故舜命益作虞則曰若予上下草木鳥獸則養猛獸而教擾不為過矣凡祭祀共猛獸鄭鍔曰祭祀欲備四海九州之美味故獸雖至猛茍中膳羞者無不共焉如獸人冬獻狼之類是也養之者所以待用爾故於祭祀之時則共之以其養之有素故也賔客之事則抗皮鄭鍔曰賔客以虎豹之皮為庭實必布於庭服不氏則抗舉其皮以示王朝之威虎豹之為物雖則猛不可制吾猶得而舉之先儒引聘禮有司二人賈氏曰二人即服不氏舉皮以東者以證抗之為舉也不鄭司農曰服氏主舉藏之抗讀為亢其讎之亢射則賛張侯以旌居乏而待獲鄭司農曰賛佐也大射禮命量人巾車張三侯王昭禹曰凡射侯共於司裘張於射人服不氏賛射人張之也鄭鍔曰使服不氏賛之者以其力足以服不服故雖熊虎豹之物皆能張之也杜氏曰乏讀為匱乏之乏待獲者所蔽愚案乏字見車僕鄭鍔曰執旌所以為表識居乏所以自隱蔽執旌居乏待射者之中則舉旌以唱獲王氏曰抗皮賛張侯待獲皆服不服之意故服不氏掌之射食亦反鳥氏下士一人徒四人賈氏曰射鳥亦武事故在此黄氏曰服不氏待獲射鳥氏取矢各因其類李嘉㑹曰二職兼焉明射筭之不可茍也掌射鳥鄭康成曰鳥謂中膳羞者鳬鴈鴇鴞之屬王昭禹曰掌畜共膳獻之鳥則射鳥氏掌射鳥亦以共膳獻之用然掌畜以養鳥而共之射鳥氏以射鳥而共之陳及之曰射鳥氏掌射鳥羅氏掌羅鳥鳥所以備祭祀肴羞之用二官非宂也不特此庖人之共喪紀之庶羞賔客之禽獻膳夫之饋羞用百有二十品悉取于是祭祀以弓矢敺起俱反烏鳶凡賔客㑹同軍旅亦如之鄭鍔曰射鳥氏之設又非為供膳羞之用及祭祀賔客軍旅㑹同之時用弓矢以敺之其所敺者特烏鳶而已葢烏鳶之為物翔於野外而下食烏能汙人鳶善鈔物於人所聚之地祭祀之兆域在郊野之外吾將致潔乎鬼神而彼敢乗便攫拏或以不潔汙之則吾事神之禮不謹矣詎可不敺而逺之若夫賔客㑹同軍旅之時非惟有殺牲告神之禮畏其汙也亦以為衆之所聚防其不潔也賈氏曰㑹同皆有盟詛之禮殺牲之事軍旅亦有斬牲巡陣之事故須敺烏鳶射則取矢矢在侯髙則以并夾取之鄭司農曰王射則射鳥氏主取其矢矢在侯髙者矢著侯髙人手不能及則以并夾取之并夾鍼箭具夾讀為甲司弓矢職曰大射燕射共弓矢并夾薛氏曰儀禮大射則取矢以小臣郷射則取矢以子弟周官必以射鳥氏以其視髙者審歟王氏曰先王置官大抵兼職射鳥氏雖無所兼其所射以共賔祭膳獻亦足以償禄矣使敺烏鳶以并夾取矢雖若不急然上下無乏事則以事為之制故也羅氏下士一人徒八人鄭康成曰能以羅網搏鳥者郊特牲曰大羅氏天子之掌鳥獸者鄭鍔曰烏鳶烏鳥之類其物則同所用以取之物則異烏鵲之卑飛者則為羅以取之其髙舉不可以羅者則射之也賈氏曰羅鳥亦武事故在此掌羅烏鳥鄭康成曰烏謂卑居鵲之屬王昭禹曰烏以羣集雖人所惡亦可取而備用故羅氏掌羅烏鳥而掌畜掌養鳥則羅氏取之而掌畜養之也蜡則作羅襦汝俱反鄭康成曰作猶用也蜡建亥之月此時火伏蟄者畢矣豺既祭獸可以羅網圍取禽也王制曰豺祭獸然後田又曰昆蟲已蟄可以火田今俗放火張羅其遺教薛氏曰漢書云人皆一襦吾獨五襦晉史云先且作襦後當作袴帬襦襠婦人之飾也郊特牲言嵗十二月合聚萬物而索饗之四方諸侯草笠而至大羅氏天子掌鳥獸之官致鹿與女戒諸侯曰好田好女者亡其國然以禮屬民而飲酒存國家之大體豈可真致鹿與女哉以鹿不可致故作羅以示之女不可致故作襦以示之耳鄭鍔曰致鹿與女非必用鹿與女也葢用取鹿之具與婦人之裙襦而已用羅襦以示之者羅以戒其好田也襦以戒其好女也然使羅氏作之而已先儒以羅襦為一物殆未之思歟李嘉㑹曰襦細宻之羅惟國將蜡則共之中音仲春羅春鳥獻鳩以養國老行羽物易氏曰中春蒐田非羅弊之時故以火弊而搜取其物之不字乳者此言羅春鳥何也以奉至尊為主而已其次則獻鳩以養國老又其次則頒羣臣而謂之行羽物此外一毫不可以輕取鄭鍔曰射鳥氏泛言掌射鳥而下乃言敺烏鳶此指言羅烏鳥又言獻鳩鳩固禮物之所須也須羅而後得陳及之曰天子之於老也其所養者三國老也庶老也死政者之老也貴胄謂之國子與庶人之俊者同其學所以一道徳國老與庶老異其學所以别分義記之所言四代養老是也而又有死政之老焉故羅氏獻鳩以養之者國老也司徒以保息養之者庶老也司門以財養之者死政之老也若夫外饔酒正稾人所謂耆老者緫三者而言之也掌畜下士二人史二人胥二人徒二十人鄭康成曰畜謂歛而養之鄭鍔曰射鳥氏射其髙舉之鳬鴈羅氏羅其卑飛之鳥鵲此則畜其可以畜養者如鵝如鶩之類皆是也掌養鳥而蕃阜教擾之鄭康成曰阜猶盛鄭鍔曰養之欲其阜大而蕃多教之使之服習而馴擾如雞之可以為牲鳬鴈之可以為羞鷺之羽可以為翿翟之羽可以為旌旗之飾鳩之可以養老其小小羽物仲春仲秋用以賜臣下皆邦國所須而不可闕者安得不畜之以待不時之須乎掌畜之設殆若此祭祀共卵鳥鄭鍔曰共其生卵者以卵亦可薦故也劉氏曰鵝鶩雞鴨皆有卵之鳥王氏曰共卵及鳥嵗時貢鳥物王氏曰物與獸同義翠毛羽翮之屬是也鄭鍔曰因時而獻新共膳獻之鳥鄭康成曰雉及鶉鴽之屬王昭禹曰王之膳羞賔客之禽獻之類皆掌共之緫論鄭鍔曰先王置官欲其簡而不冗自服不氏以下或教猛獸或射飛鳥或羅烏鵲或養畜鳥葢一官可以兼數職也今物有其官意謂禮不可以簡而廢茲四官者其事固微然所掌者供鬼神之祭祀有之供人君之膳羞有之供賔客之禽獻有之設官以備物物備而禮舉凡以嚴國體而尊天王也孰為冗且濫耶周禮訂義卷五十
