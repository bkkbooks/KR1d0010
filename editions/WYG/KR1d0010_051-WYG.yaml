body:
  text: 周禮訂義卷五十一宋王與之撰夏官司馬下司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人劉執中曰凡以道藝仕於國不以貴賤緫謂之士始附于版者士也故曰司士王昭禹曰自公至士皆事人皆事事合而言之謂之司士鄭鍔曰以序官攷之朝之上士二百五人六鄉之族師每族上士一人則七百二十人鄙師每鄙上士一人則一百二十人何止於八十一元士哉中士以千計之幾五千下士以萬計之幾五萬其數之衆如是故雖公卿大夫咸載於版而特以司士名官也王氏詳説曰今之六部古之六卿也攷其職則天官冢宰為尚書令非吏部也司士掌羣臣之版其吏部歟黄氏曰自大夫以上屬射人猶今吏部尚書選也士屬司士猶今吏部侍郎選也今之兩選絶不相知尚選常病其濫侍選常患其壅周之羣臣版籍盡在司士而詔爵詔禄必由之葢有貟則置無貟則否事出於一而本末舉賈氏曰其職掌詔爵詔禄與司馬進賢興功同故在此掌羣臣之版以治其政令歳豋下其損益之數辨其年歳與其貴賤鄭司農曰版名籍也黄氏曰今版簿也賈氏曰羣臣之版謂畿内朝廷及鄉遂都鄙羣臣名籍也王昭禹曰治其政令即損益之數與辨其年歳貴賤之等是也鄭鍔曰自朝廷而數至於羣臣不勝其衆茍非政令何以治之少而壮者方入仕而益老而衰者或已死而損鄭康成曰損益謂用功過黜陟者黄氏曰不獨黜陟死者致仕者皆在此數官年之乆近齒歳之老少位之尊而貴職之卑而賤王昭禹曰貴謂大夫以上賤謂士以下黄氏曰五十以上為大夫以下為士也莫不書於版每歳登之下之以知其人之損益又從而辨其年齒則異其貴賤之等緫論世臣胡安國曰帝王不以私害公故仕者世禄而不世官任之必以其賢使之必以其能卿大夫子弟以父兄故而見使則非公選而政由是敗上世有自躬耕釣渭擢居輔相而人莫不以為冝伊陟象賢後相大戊吕伋世美入掌兵權不以世故疑之崇伯殛死禹作司空蔡叔見囚仲為卿士亦不以父故廢之惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要途施及童稚公道不行然後夷狄侵陵國家傾覆雖有智者不能善其後世卿非禮裳裳者華何以作乎曰功臣之世世其禄世卿之官嗣其位禄以報功也故其世當延位以尊賢也故其官當擇官不擇人世授之柄黨與傾衆威福下移大姦根據而莫除人主孤立而無助國之不亡幸耳春秋於周書尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也愚案世臣之説自古有之但古者有世臣無世官始曰象賢濟美皆一世之選伊尹之後有伊陟巫咸之後有巫賢太公之後有吕伋所以扶持國家者未嘗不頼之也至春秋時世臣之説遂變為世官是以三家世為魯卿六卿世將晉軍田氏專齊甯氏專衞自春秋以來所以治世官者甚嚴叔向所謂欒郤胥原狐續慶伯䧏在皂隷瑕禽所謂七姓從王今皆為篳門圭竇世臣淪喪一至於此此無他世官之禍熾故世臣之説廢也加以三家併魯六卿分晉田氏併齊時君世主力戒此事所用皆雜進傾巧朝廷所藉以扶持國家者殆無其人甚者相他國之人如秦張儀相楚齊孟嘗相秦國不自信其臣而取之他國之人范睢蔡澤獵取秦相世臣淪喪至此極矣豈非懲世官之弊而遂廢世臣耶孟子親見當時禄去公室政在大夫之禍自夫人觀之豈敢復以世臣為論然告宣王乃曰國君進賢如不得已將使卑踰尊䟽踰戚可不慎歟孟子意以為不得已而用䟽逺之人當詳其賢否若傾巧相奪者冝勿用也不特此也如論君不當視其臣如犬馬草芥其意可見惜乎孟子之説不行周知邦國都家縣鄙之數卿大夫士庶子之數王昭禹曰邦國者諸侯也都家謂大都小都家邑鄭康成曰縣鄙鄉遂之屬黄氏曰縣鄙遂官列於鄉而見鄉為國中賈氏曰士庶子亦如宫伯卿大夫之子謂適子庶子其支庶宿衞王宫者也黄氏曰必知此數而後其貟闕為可知有卿大夫有士庶子獨無士士其所掌治也卿闕選於大夫大夫闕選於士庶子士闕固不專取於士庶子升進之法著於此士庶子其秩視士而猶繫於其父兄未命也士庶子有常貟以詔王治項氏曰詔其任用進退也劉執中曰大宰歳終則令百官府各正其治受其㑹聽其治事而詔王廢置此又詔王治者大宰詔之於職事之終也司士詔之於論定之始也王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後禄之則司士者司馬之屬以徳詔爵以功詔禄以能詔事以乆奠音定食項氏曰此謂試官始進者其有徳者則試之以爵待其有功乃授之以正禄此以待賢者也能者先試之以事待其乆而事成乃定其稍食此以待能者也鄭鍔曰有某徳者詔王以某爵有曰三公曰孤曰九卿曰大夫之等有某功者詔王酬以某禄有三大夫倍上士有上士倍中士之别有某能者詔王任以某事如知禮者命以典禮知樂者命以典樂居是官也已乆如倉庫氏之類則定食於此官使子孫為氏也黄氏曰以能任事其官以才選使之治軍旅使有爵者乘王之倅車覜問慶弔遣使皆是也雖有秩乆亦當定其食共工工官掌水土之事而特舉鯀治水則其大者也易氏曰爵有髙下皆以徳詔禄有豐殺皆以功詔此為公卿大夫士之受命而為王臣者設也然當時之士亦有不命者焉鄭氏謂府史為官長所自辟除又謂胥徒為民之給繇役者凡此皆服役於公上亦既因能而詔以事矣惟其不命故以乆奠食而不言詔奠其食則未為禄也校人曰等馭夫之禄宫中之稍食宫中則師圉府史以及為胥徒者所以言食馭夫則僕夫趣馬等之為大夫士者所以言禄葢當時一命以上謂之禄庶人在官者稍食而已如宫正則月終會其稍食醫師則歳終稽其醫事而制其食稾人則乗其事試其弓弩而下上其食凡此皆奠其食於任事既乆之後者也賈氏亦曰據能者先試之以事事成乃定以稍食其能堪用乃後亦詔授之以正爵禄其序如此陳藴之曰爵禄事皆稱詔惟奠食不言詔者則知爵禄事皆有去取進退惟上之特命而奠食乃其常俸所當得之稍食故不言詔也言乆者計其歳月之乆所當食之俸若書稱徳懋懋官功懋懋賞位事惟能皆此理也陳及之曰後世但以官府煩多疑周官不知當時以事之多寡而損益其貟數觀卿士之賢能而為爵禄之予奪則位無虚設禄無虚受官安得至於冗長哉唯賜無常王氏曰賜出於王之恩恩有厚薄則賜有多寡又何常之有且賜而有常則辟無以作福矣易氏曰繼於司士以詔王治之後則亦有可常者矣鄭鍔曰司勲曰凡賞無常此曰唯賜無常何也葢賞者因有功可賞則賞之其無常者特以功為輕重賜則出於人君之恩其無常者乃以君命從事此其所以異正朝儀之位辨其貴賤之等王南郷許亮反三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大音泰下同僕大右大僕從者在路門之左南面西上鄭康成曰此王日視朝事於路門外之位黄氏曰王日視朝羣臣朝焉蓋常朝也司士與射人聯官故其所掌皆法度儀制治朝治軍無二道也司士掌羣臣之版故使掌朝儀之位鄭鍔曰宰夫射人朝士皆有正位之事司士又掌正朝儀之位者射人所掌賔射之位朝士所掌外朝之位宰夫司士皆治朝也司士正位而辨其等宰夫則察其不如儀者也鄭鍔曰朝必有儀儀本於位有以正之則其儀不亂爵各有等等所以别貴賤有以辨之則其等不差兹朝儀所以肅黄氏曰辨其貴賤之等將擯王揖易氏曰位著雖有貴賤而布置所向無非尊王王氏曰鄉明以聽天下者王也故南鄉面王而答之者公也故北面孤佐王者也故東面卿大夫佐王者也故西面王族故士虎士大僕大右大僕從者則從王者也故南面順王所向焉三公東上則北面以左為右故也自孤以下皆以近尊為上鄭鍔曰孤東面則處王之右賔之也卿大夫西面則處王之左任事之責也北面者東上東向者北上西向者亦北上皆以近王為上王族之故士親則王之族而爵則故為士而晚退者也李嘉㑹曰王族故士故為士者留以宿衞必有年勞者未仕雖王族不留王宫也黄氏曰王族故士王族之常為士者已老而賢者使日朝焉親親尊賢敬老其義一也故卿大夫冝亦有位虎士則虎賁之宿衞者陸氏禮運解曰故士有謀者虎士有勇者在路門之右備非常也大僕則出入前驅者大右則羣右之長也大僕從者則凡祭僕御僕隷僕皆是也賈氏曰所謂上者皆據近王為上不據隂陽左右也在路門之左備駕乗也易氏曰以其居王之後不嫌於南面或南面東上或南面西上同王所嚮而在路門之外亦以近王為上也劉執中曰位於路門左右且南面者居王之後故王還則左右揖之王氏曰公以下皆言面王獨言嚮不斥其體尊故也易氏曰一位著之次而尊王之意已著見於左右前後之列朝儀之不茍如此王昭禹曰朝士掌外朝之法曰左九棘孤卿大夫位焉羣士在其後與此不同者朝士所掌者外朝聽獄弊訟詢衆庶之朝也羣士則公卿大夫之屬官故在公卿大夫之後司士擯鄭鍔曰位已正則王出視朝司士乃擯王出揖羣臣接下思恭欲羣臣自盡以奉上所以致體貌之隆小宗伯於命諸侯賜卿大夫爵之時則儐其字為儐此司士擯其字為擯蓋儐之為義進也擯之為義相也臣下儐之則敢進故於賜爵用之人君之出則擯而相其禮故於視朝用之孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右鄭鍔曰三孤貳三公𢎞化九卿列職佐王皆在所尊禮也故特揖焉特謂一一揖之也大夫作而行事之臣有中大夫有下大夫同其爵之等則旅揖焉旅衆也緫一等之爵則衆同一揖也黄氏曰士無位士卑不常朝也今大中大夫以上始常朝然士旁三揖則士亦有位於此矣今大朝㑹陞朝官皆赴蓋若是歟士不著位而以揖見從可知也鄭康成言羣士東面約外朝而言也然經言士旁三揖則東西皆有士矣鄭又言公卿大夫得揖乃就位士發在其位未必然經文自公以下位皆定而後司士擯之揖與鄭説異士三揖者猶以其等也易氏曰王族故士虎士在路門之右大僕大右大僕從者在路門之左其位皆南鄉而在王之後故還而揖之鄭鍔曰在王門左右者皆順王所嚮故王將以揖之則必還揖還者謂回而嚮之乃揖也鄭鍔曰觀周人之詩於天保之序曰君能下下以成其政攷此特揖旅揖三揖之儀則周之盛王可謂能下下矣衮冕巍巍尊無與二而視朝之際徧揖羣臣然後大僕正位無乃太過乎漢諸侯羣臣朝正月謁者治禮引以次入殿門傳曰趨殿下郎中俠陛陛數百人功臣列侯諸將軍吏以次陳西方東嚮文官丞相以下陳東方西嚮鴻臚設九賔臚句傳皇帝輦出房百官執㦸傳警諸侯王以下莫不震恐肅敬帝乃知皇帝之貴亦異於周人之禮矣司士之揖豈可行於後世乎大僕前鄭鍔曰既揖矣大僕自門左之列進而前正視朝之位王入内朝皆退黄氏曰大僕前導王入也王入内朝句絶王入内朝即路寢之庭燕朝也鄭康成曰王入入路門也王入路門内朝朝者皆退反其官府治處也王氏詳説曰天子有三朝外朝治朝燕朝是也庫門之外為外朝則路寢門外與路寢門内之朝皆為内朝矣但以日眡事則曰治朝退適路寢之庭聽政則曰燕朝内外之朝本無定名以燕朝為内朝則治朝為外朝矣庫門之朝為外朝則治朝又為内朝矣玉藻曰朝服以日眡朝於内朝退適路寢云退適路寢者是内朝之内又有内朝也是燕朝也文王世子曰其朝于公内朝則東面北上以齒其在外朝則以官司士為之夫司士所掌之朝治朝也玉藻以路寢之外為内朝而文王世子又以司士所掌之朝為外朝治朝可以兼内外之名也掌國中之士治凡其戒令易氏曰國中之士治謂士之在國中者詩曰濟濟多士文王以寧非公卿大夫以下之緫號歟黄氏曰國中自郊關以内治有所請治也自甸以徃各有所屬鄭鍔曰周制有國中之士有邦國之士有異姓之士國中之士王朝之士也王朝之士其數至多司士掌其治所謂損益之登下之與夫年歳貴賤之辨是也平居治之有素矣及夫用之則有戒以飭之使畏有令以督之使行其人雖衆安得不從吾治哉項氏曰若今吏部掌黜陟授士進退也掌擯士者膳其摯賈氏曰擯士謂初得命為卿大夫士執摯見於王司士擯之使見王也鄭康成曰膳者入於王之膳人鄭司農曰膳其摯者王食其所執羔鴈之摯易氏曰諸臣之六摯猶諸侯之五瑞五瑞用以享故三璧則受之而復之書所謂如五器卒乃復是也六摯不用享故三帛二生一死則受之而不復各適其冝而已三帛則共王之服二生一死則共王之膳以示納用其徳也黄氏曰庶人工商皆有摯賤不通孫氏曰周家三載賔興雖曰出長入治莫攷爵命之詳獨於司士掌擯士者膳其贄古者不為臣不見見而有贄則入仕之初也蓋先王待新進之禮常厚而律新進之法常嚴禮所以養其自重難進之風法所以勵其趨事赴功之操方賔興之始有三公六卿以涖於上有羣吏衆庶以賛於下待以鄉飲酒之禮而獻其書于王王者既再拜而受登於天府之籍内史又從而貳之以為異時爵禄之階待之之禮可謂厚矣及擯見於王委贄為臣也乃屬諸司馬而詔爵詔禄詔事一惟司士之聽王制云升之司馬亦不為無據蓋新進乍起草萊故役之祭祀賔客㑹同之事使知登降揖遜動容周旋之節律以軍旅之法而警懼其茍且怠惰之心斯皆為有用之材而不病於見聞之陋矣若夫諸侯歳貢士於天子亦於司士隷屬焉三歳則稽士任之得失而進退諸侯之爵禄庶幾四方之彥皆獲仕於王朝而無敢鹵莽應選者矣凡祭祀掌士之戒令詔相息亮反其灋事及賜爵呼詔昭穆而進之易氏曰祭祀之時羣臣羣有司與焉或助其禮或執其事此所謂士則同姓之士也鄭鍔曰以下文言賜爵必呼昭穆而進知之也掌士之戒令則卜日以後之戒令也詔相其法事則凡祼獻之法事也王昭禹曰法者謂事之存於度數者賈氏曰告語併擯相其行禮之事鄭康成曰賜爵神惠及下也鄭鍔曰王之族為士而助祭故序以昭穆於祖行為昭者立於昭位於父行為穆者立於穆位祭末旅酬之時呼以昭穆而賜以爵薛氏曰宗廟之禮所以辨昭穆三昭三穆則設於室中之昭穆羣昭羣穆則與於祭者之昭穆室中之昭穆則教化天下而使皆知尊祖之道祭者之昭穆則教化天下而使皆知長㓜之序黄氏曰專為同姓大夫以上則燕士賤賜爵而已帥其屬而割牲羞俎豆易氏曰此繼宗廟祭祀而言當在賜爵之前今乃言於後重其事故特言之鄭康成曰割牲制體也劉執中曰謂朝踐獻腥則豚解為七體也饋食獻熟則為二十一體而爓之也犬豕牛羊則辨其骨肉之貴賤以為衆俎焉鄭鍔曰使司士帥其屬割之又羞而進何邪蓋割牲者欲得其正而俎豆者行禮之器凡元士皆習於禮者然後為之割之正也非知禮者不能也易氏曰司士言割牲則割其牲之體諸子正六牲之體則正牲之全體禮之輕重不同而職之先後或異所謂聯事也黄氏曰射人賛射牲司士割牲相終始也凡會同作士從才用反賔客亦如之鄭康成曰作士從謂可使從於王者薛平仲曰作之云者蓋勉而進之公卿大夫之列也夫為士而有進進不自已之心而無悽悽不獲伸之意則一旦與之從金革歴行陣蓋有臨難而不顧其身見危而能致其命者矣鄭鍔曰㑹同士則當從司士選其同行者也㑹同朝覲之時射人則作大夫介大賔客則作卿大夫從司士掌士治故所作者皆士也詩人之詠文王曰濟濟多士文王以寧蓋人必用士以為輔無所徃而不從然師保二官㑹同之際王舉則從不待於作若士則非師保之比作之則從不作則不從其當從者司士作之也作士適四方使色吏反為介鄭鍔曰若王遣使傳命於四方而奉使之人用士以為介者亦司士作之虎賁氏有適四方使之文然考之左傳適四方為使有專用士以往者亦使卿大夫往而為之介者如天王使石尚來歸脤蓋專用士為使也説者又謂司士作其適四方為使者亦使作其適四方為介者其説亦可用賈氏曰聘禮大夫為次介餘皆士介天子使大夫下聘諸侯亦使士為介若使卿大夫則射人作之故射人云作卿大夫從王氏詳説曰有士大夫有公孤卿大夫士大夫者有官君子之通稱也公孤卿大夫士者五等諸臣之異稱也司士掌羣臣之版自三公以及大僕從者各正其位以司士名官者謂公孤以下皆有官君子為己之所司也鄭氏既以擯士士從之類為執羔鴈卿大夫矣而於作士適四方引春秋石尚為證意謂天子使大夫適四方而元士為介也曽不謂天王使宰渠伯糾來聘宰周公來聘安知此所謂適四方者非上卿乎上卿聘則大夫為介矣大喪作士掌事鄭康成曰事謂奠歛之屬易氏曰司士掌羣臣之版而緫謂之士是以掌三者作士之事㑹同賔客作士從謂卿大夫之可使從於王者也作士適四方使為介謂天子使卿適四方則大夫為介使大夫適四方則元士為介也大喪作士掌事如奠遣之類作六軍之士執披方寄切鄭康成曰作猶使也披柩車行所以披持棺者有紐以結之謂之戴賈氏曰柩車蜃車也披者車兩旁使人持之若四馬六轡然故名為披也謂之戴者喪大記云纁戴是也黄氏曰皆有爵者也比長以上郷役屬引而使其長執披司徒曰役司士曰軍事任可知賈氏曰六軍之士即六鄉之民但天子喪用千人而此云六軍者千人出自六軍故號六軍之士非謂執披有七萬五千人也楊謹仲曰大司徒大喪帥六鄉之衆庶屬其六引遂人大喪帥六遂之役而屬六綍要之披也綍也引也皆所以扶持棺以行者而執之者皆此千人則鄉遂皆有其人非止六鄉也凡士之有守者令哭無去守音狩鄭康成曰守官不可空也易氏曰不以喪而廢其職國有故則致士而頒其守鄭康成曰故非喪則兵災易氏曰亦不可以故而弛其防凡邦國三歳則稽士任而進退其爵禄易氏曰上經言士者緫公卿大夫士而言之此言邦國則諸侯之卿大夫士亦緫曰士也鄭康成曰任其所掌治王昭禹曰邦國之士皆命於王其任有勤惰有功過而爵禄有進退者則司士於三歳而稽攷之此黜陟勸沮之法所以皆本於王朝而國無異政歟春秋列國之君爵位名號皆自己出或禄或繼皆非王命孔子所以譏之愚案此是稽諸侯貢士之賢否以行賞罰周禮諸侯貢士一項不見他官想司士得兼其稽攷進退之權諸子下大夫二人中士四人府二人史二人胥二人徒二十人鄭司農曰燕義曰古者天子之官有庶子官與周官諸子職同文王昭禹曰掌國子之倅而名官謂之諸子者蓋公卿大夫士之子自其衆而言之陳君舉曰諸子隷於司馬何也古者大夫士國子皆從金革之事而不征於司馬既非其官之長素禀命焉一旦用之將有不如令者舍之則不能以正衆遽用法亦難乎為上矣俾之屬以傳軍正用之則其官自為帥其徒自為伍所以整衆亦所以全恩也李嘉㑹曰諸子不屬之司士主公卿大夫士之子或曰庶子亦如宫伯所掌不屬之宫正也在此者與司士等皆是辨論官材之事掌國子之倅七内反黄氏曰燕義曰周有庶子官諸子即庶子也國子適庶兼稱倅副貳也庶子副貳適子故曰國子之倅周官適子為門子小宗伯掌其政令適子承襲庶子有才則諸子進而爵秩之故與司士聯職而獨掌其倅易氏曰故書倅為卒鄭氏以下文有游倅故改為倅職末言修徳學道固游倅之事此主下文兵甲之事則卒之一字即有什伍之意王氏詳説曰國子有正有倅已仕其正也未仕其倅也所謂國子存游倅凡國之貴游子弟學焉是也此王制所謂不世爵者歟王昭禹曰國子之教師氏掌其正者也諸子掌其倅而已鄭鍔曰人君於功臣之類賢者之世欲與之共治天下既教其適又治其庶他日人才源源不窮矣故設官以掌之如此吕芸閣曰古之為國其使君臣相信非一日之積也太子君之貳也國子之倅諸侯諸臣之貳也以諸侯諸臣之貳事其君之貳學相同則好相合矣王制曰春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子皆造焉是也事相同則情相信矣國有大事則帥國子而致於太子唯所用之是也故太子雖未為君也君臣之交際已盡賢不肖之知己悉可任使之材已備則先王之慮後世者不為不豫也掌其戒令與其教治辨其等正其位方氏曰戒之使勿怠令之使有為教之以其藝治之以其事知其戒令而後可以教治也則所主在乎戒令然後及教治焉故於戒令言掌於教治言與鄭康成曰戒令致於太子之事教治修徳學道鄭鍔曰既有戒令又有教治則教以道徳而治其事焉劉氏曰辨其等以其父之爵為之等鄭鍔曰别其為卿為大夫之倅使尊卑有等賈氏曰謂才藝髙下等級也方氏曰經言以攷其藝而進退之則等有上下矣藝之等則庶子之官所自制故冝别其詳吕氏曰正其位謂在朝廷則尚爵在學校則尚齒也劉氏曰叙其齒而為之位也凡入學以齒賈氏曰位謂朝太子時依父䕃髙下為列鄭鍔曰其父之爵尊者其位髙其父之爵卑者其位下使上下有序方氏曰言諸侯卿大夫之士庶子則位有貴賤矣爵之位則人君之所先故冝正其位國有大事則帥國子而致於太子唯所用之若有兵甲之事則授之車甲合其卒子忽反伍置其有司以軍灋治之吕氏曰國有大事謂大祭祀大喪紀大賔客大燕饗之類賈氏曰下有兵甲之事則此大事謂祭祀黄氏曰諸子不掌適子國有大事則帥國子而致於太子適庶咸在太子居則監國出則撫軍皆大事也故諸子盡帥國子而致之鄭鍔曰公卿大夫王所用也公卿大夫之子太子所用也王用其父太子用其子兹其所以為御臣之術帥國子而致於太子唯太子之令是從則太子之令行而權有所歸矣李氏曰王者之師非直興之閭里又取諸世族彼以父祖富貴之相承冝有報上之心而況徳行道藝之素習孰不知忠孝之美任之以金革則與干賞蹈利庸徒鬻賣者有間矣且太子將為君國子將為臣君臣之分未定而恩義固已接矣今日之遊倅安知不為嗣王之將帥哉文王世子曰公若有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天下之事而有不用力者乎吕氏曰古者太子與卿大夫之子同在學或有大故則使太子帥其餘子在宫中天子同其父御兵于外其子弟佐太子守宫於内此見得内外相維持不拔之理夫太子素與諸侯之子弟朝夕習熟故後來諸侯之子立為諸侯時事太子為君此正是封建諸侯之本平日在學時必擇其能為諸侯則他日立為諸侯有不可立者則不立也如國語宣王欲得國子之能訓諸侯者樊穆仲曰魯侯肅恭明神而敬事耆老賦事行刑必聞於遺訓而資於故實王乃命魯孝公於夷宫此是諸侯子弟同在學者又如楚世家曰周當成王時楚子熊繹與魯公伯禽衞康叔子牟晉侯爕齊太公子伋俱事成王亦可以見太子素與諸侯子弟相處此其意可以槩見至春秋鄭太子忽在周猶有此意鄭鍔曰或有甲兵之事國子隷於太子其捍患也不可無車甲其在師也不可無卒伍諸子授之以車使得以載乗授之以甲使得以自衞又合之使為卒伍各相連屬鄭康成曰軍法百人為卒五人為伍又為之置軍中之有司亦如司馬之類得以統攝之王昭禹曰若伍之有公司馬卒之有長一切以軍法從事王昭禹曰其坐作其賞罰若軍旅之事而已蓋膏粱之習有所恃而不用軍令者治以軍法則人知所畏矣上言掌國子之倅下言自帥國子而下皆言國子而不及倅豈非無事之時國子隷於師保惟有事與用兵諸子兼將而統之歟李嘉㑹曰太子之職在於侍膳問安朝夕侍君父者今合國子自成一軍得無任之重乎其賢耶固可無慮不賢耶能無可慮乎是不然也如漢太子監屯兵必有子房為少傅叔孫通為太傅況周家太子師傅之官最所慎重茍専任師傅寧得有他患乎所可慮者國子多與太子同學人情宻熟或以情撓法則將奈何此所以貴乎以軍法治之也司馬弗正音征下同凡國正弗及鄭康成曰弗不也王氏曰司馬弗正國正弗及則是諸子正之太子用之而已鄭鍔曰六軍之衆司馬得而治之國子隷于太子雖司馬掌征伐之權其有軍賦亦不得而正之正謂軍賦也此與為俊造之士升於司徒者不征於鄉升於學者不征於司徒事異而意同黄氏曰不惟兵甲之事凡國征賦皆弗及所謂貴者賢者皆舎後世亦然春秋楚有東宫六卒至唐遂置太子六卒劉迎曰國之俊造之士尚弗征於司徒司馬寧有國子乃公卿之子弟既致於太子而唯太子所用豈有諸子既正之軍法而復正於司馬與正於國乎先儒謂正為征言司馬有軍事弗賦則是征為賦矣至後子世宰相之子不免戍邊皆此啓之不知國子於太既於患難相左右緩急相倚仗他日為君臣心腹股肱皆是人耳所以治於太子惟諸子正之歟若夫都司馬亦嘗掌都之士庶子車馬兵甲之戒令而以國法掌其政學矣然為國子則諸子正之封於都邑則都司馬掌之其為車馬甲兵之事一也劉執中曰聖人防微䕶國之根本使諸侯卿大夫之子為太子之肘腋而倅於王也司馬弗正正者政也司馬之政得正於鄉遂及天下之諸侯而不得施於諸子之卒伍也則國之根本不可得以動摇矣凡國正弗及者言冢宰之治所以正六宫範諸侯也唯弗及於諸子則太子得以為王之腹心而可以御羣臣矣周公之制防微固本傍及於此而後代反以為非者蓋無三代所以教太子胄子之道也是以先王之治必先學校者以能正人心而致其忠義於君父也文王世子其教者可見矣易氏曰治之以軍法與司馬之所以用其民者同不以貴者而廢乎法公其法也不正於司馬之賦亦不與司徒之力役不以有司之法而律貴者重其事也大祭祀正六牲之體鄭康成曰正謂朼載之鄭鍔曰祭祀凡牲在鼎一人以匕出之一人載之於俎司士割之而使諸子正之蓋割不正不食況祭祀之事神乎劉執中曰諸子學禮樂詩書將世其父而本之以為用者割牲羞俎豆則已仕者為之而司士掌焉諸子則涖而觀之朝踐而豚解必腥以獻也酳尸而體折必熟以獻之至於犬豕牛羊升首薦血六牲之體必叙以獻而中乎禮樂之節皆有司為之也茍失其敘有不中禮則諸子得以正而敘之故曰正六牲之體習之以其行也黄氏曰六牲六官之所奉也司士割之諸子正其體教之為有漸矣凡樂事正舞位授舞器鄭康成曰位佾處賈氏曰樂有舞之處皆使正舞人八八六十四人之位并授其舞之器文舞則羽籥武舞則干戚王昭禹曰正舞位謂國子之在舞位者授舞器謂國子之受舞器者蓋先王之教國子成之以樂而大司樂教之以樂故凡樂事則帥之而舞而諸子所以正之授之者如此黄氏曰大胥合舞致諸子故諸子於此正舞位授舞器李嘉㑹曰正之授之於未入大胥之日者諸子也故大胥曰掌學士之版以待致諸子者此也大喪正羣子之服位黄氏曰羣子庶子也喪之服位庶子不得與適子齒特言羣子著其别也賈氏曰服謂公卿大夫之子為王斬衰與父同位謂殯宫外内哭位易氏曰樂事則舞有出入之位亦有文武之器大喪則有親踈貴賤之服亦有親踈貴賤之居授之正之皆諸子之責㑹同賔客作羣子從鄭鍔曰從非必盡從也作其當從者耳黄氏曰㑹同賔客當從王則選行者其餘則與適子俱侍太子漢蕭何識此意李嘉㑹曰從曰羣子又非惟諸子所掌之倅凡國之政事國子存遊倅使之修徳學道春合諸學秋合諸射以攷其藝而進退之鄭鍔曰先儒謂政事者繇役之事國子存遊倅者言有事之時此國子存遊暇無事之倅中使修徳學道竊疑存字之義未通近世王安石謂國子服政故事之遊倅弗服政故存之而已以凡國之政為一句事國子為一句存遊倅為一句穿鑿尤甚要知為國家有政事之時為國子者當有事焉或唯太子之命是從或授甲車以從軍國子於是時不得以自暇也若夫未仕之庶子則不與事矣其為學不可以或廢也於國子中存其遊倅使之修徳學道也遊倅者未仕之倅遊如逸遊之遊見其無事之意黄氏曰國子與王子弟共學國有政事國子雖盡有職任而必存遊倅使之修徳學道學校不可一日廢也一人元良萬邦以貞先王所務莫上焉遊言其無職任也易氏曰使之修徳即師氏所謂三徳教國子者使之學道即保氏所謂養國子以道而教以六藝者徳原於性故謂之修道公乎人故謂之學鄭鍔曰徳本於一性之所自得在我修焉而已道出於聖人之所傳非學則不知徳既使之修道既使之學茍無以攷校之則勤者亦怠矣故春則合諸學秋則合諸射以攷其藝而進退之焉學謂東序在王宫之左者射謂射宫虞庠之在西郊者其為學則一也以其合之以攷道藝故以學言之以攷射故以射言之王氏詳説曰大司樂掌成均之法以教國子弟又曰祭於瞽宗夫東序夏人之大學也瞽宗商人之大學也上庠周人之大學也成均五帝學之緫名成王之時所兼用也初不及其小學此曰春合諸學秋合諸射學大學也射澤宫之學也所謂養庶老於虞庠在周之西郊是以養庶老在是擇士而習射者亦在是以其養庶老故以虞庠稱之以其習射故以射宫稱之射小學之謂也道藝文事也文學屬乎陽故春合之射武事也武事屬乎隂故秋合之先王於國子教之以文欲其徳行道藝足以表人教之以武欲其有事之際能任甲兵之事又欲其功之易成故因時順氣以合之大胥之教諸子也春入學舎菜合舞秋頒學合聲所專主者教以樂舞也王制曰春秋教以禮樂冬夏教以詩書其所專主者造以四術也諸子既教以文又教以武先王之世非唯為國子者有文武之才凡為遊倅者亦教之有素也李嘉會曰無職事之國子始曰遊倅修徳學道冝專心致意焉故可行進退之法王昭禹曰宫正㑹其什伍而教之道藝教之於宿衞之時諸子春秋合之於方學之時攷其藝而進退之則能者在所進不肖者在所退也易氏曰進者任以國事而退者亦有以勉其所未至劉執中曰攷其藝而進退之王制曰小樂正簡不帥教者告于大樂正大樂正告之于王王親視學又不變屏之逺方王昭禹曰先王之時貴而國子賤而萬民其教之也文徳武事無乎不備況公卿大夫涖職於外者其子弟宿衞於王宫涖職於内者其子弟守固於邊鄙則諸子掌其教治如此不亦冝乎司右上士二人下士四人府四人史四人胥八人徒八十人鄭康成曰右謂有勇力之士充王車右王氏曰人之左手不如右強故車置勇力之士謂之右王昭禹曰羣右之長所以謂之司右劉氏曰司右羣屬車之右若王之五路右其玉路金路者下大夫也右其象路者上士也右其戎路木路者中大夫也故司右上士二人下士四人徒八十人者皆羣屬車之右也黄氏曰左主射右持車故司右與射人聯職而虎賁以下扈從王者列於其下朝儀之位大右大僕虎士列於路門右右皆主衞從也羣右列於甲兵戈盾弓矢官之下不聯大右甲兵嚴飭而後戎車駕事之序當如此司右雖主羣右之政令而其秩卑於僕御御射固髙於右也戎右中大夫其事重也掌羣右之政令鄭鍔曰或謂乗車之路尊者在左御者在中勇力之士在右車必有右況王之五路乎今攷之經有道右有齊右有戎右而玉路田路俱無右先儒謂齊右兼玉路之右戎右兼田路之右然則玉路以祀金路以賔皆文事之容戎路以即戎田路以田以鄙皆武事之容故獨以兼之司右乃衆右之長羣右皆其所統治也李嘉㑹曰戎右齊右道右天子乗車之右皆中大夫下大夫非司右之屬也司右之右乃兵車之右用以征行侵伐故凡國中之有勇力者皆屬焉一旦有事則取之以為右凡軍旅㑹同合其車之卒伍而比毗志反其乗繩證反屬其右鄭鍔曰王有軍旅㑹同之事以車從車之卒伍亦如萬民之卒伍司右令之使相聯屬也賈氏曰左傳云其君之戎分為二廣廣有一卒卒偏之兩司馬法二十五乗為偏百二十五乗為伍是車之卒伍也王氏曰車之卒伍車僕所謂車之萃也比其乗使車皆有行列屬其右使車右皆有統攝王氏曰比其乗則比其乗之馬使齊力屬其右則屬其右之人使同心黄氏曰凡乗王倅車者皆比之而其右皆屬之司右主車故獨合車之卒伍古法五人為伍百人為卒後世兵法有以七十五人將重車合一車而為百人鄭康成曰合比屬謂次第相安習也凡國之勇力之士能用五兵者屬焉掌其政令鄭康成曰勇力之士屬焉者選右當於中司馬法曰弓矢圍殳矛守戈㦸助凡五兵長以衞短短以救長鄭鍔曰為車右者勇力之士皆用五兵者也五兵非人之所能用而勇力過人者尤非易得幸而有焉選百得十選十得一凡國中之有斯人則使之屬於司右庶得選擇以為用也何則有車上之五兵有歩卒之五兵戈也殳也㦸也酋矛也夷矛也是謂車上之五兵無夷矛而有弓矢是謂歩卒之五兵非勇力之士則不能用屬於司右非惟選之以待用亦掌其政令使強有力者無所肆其暴矣王氏曰先王既合萬民之卒伍以時習之皆使知戰又屬勇力之士能用五兵者於司右使掌其政令則軍旅之事有選鋒以待敵齊民得免死焉無事之時武夫皆寓於官府無所奮其私鬭矣王昭禹曰唐之弊也一旦有警而宿衞之士皆不足以授甲又烏知成周之法虎賁音奔氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人薛平仲曰虎言其有力如虎也旅言其旅力方剛也虎賁有虎士八百人用之以先後王而趨非部分之嚴節制之素難乎為衞矣故虎賁氏則以下大夫二人為之黄氏曰虎賁氏有所主帥且為近衞故髙其爵鄭康成曰不言徒曰虎士則虎士徒之選有勇力者易氏曰此言虎士八百人與牧誓言虎賁三百人其數為不同蓋此以衞至尊為王惟衆而後可以備儀衞陳及之曰虎賁八百人蓋天子親兵六軍之外禁衞惟此而已王不出則虎士不出及其敝也以之從軍旅賜諸侯非舊制矣胡康侯曰自古盛王雖用文徳必有親兵專掌宿衞周公指虎賁與常伯同戒成王欲其知恤虎賁者猶今侍衞親軍也康王初立太保奭命齊侯吕伋以虎賁百人逆于南門呂伋者太公望子自諸侯入典親軍猶今殿前歩軍都帥也勲徳世臣緫司禁旅虎賁衞士宿衞王宫其為國家慮深逺矣吕東萊曰周公戒成王何故以虎賁與任人牧人準人同一般説此最是周公養成君徳深厚處大抵外朝之臣人君臨朝方得入覲而人君見其望髙徳厚待之為嚴不敢䙝近侍衞僕御朝夕親比若得正人動作起居黙移隂化須到聖賢地位故虎賁綴衣位最賤職最親所以亦須要得人鄭節卿曰宫正宿衞之士統於大宰而虎賁之虎士八百人亦王之親兵而屬諸司馬此司馬亦聽命於大宰耳必散諸司馬者内外雖不可以不相統而彼此之勢則不可不相持是故兵衞掌於宫正而王之親兵與四夷之兵掌於虎賁與司隷漢以南北軍相制國朝以皇城司殿前司相維持大抵皆周人之遺意掌先悉薦反後戸豆反王而趨以卒伍軍旅㑹同亦如之鄭鍔曰王出則或居王前以為之先或居王後以為之後其先後也欲嚴以肅故皆趨其趨也必以卒伍如軍法焉劉氏曰雖趨亦不離其卒伍示衆以嚴肅也不特國中為然王者有軍旅㑹同之事皆然舎則守王閑王在國則守王宫國有大故則守王門大喪亦如之鄭鍔曰王所止舎之處設梐枑再重以為閑則守乎其外王在國雖處宫禁之嚴又守乎其内易氏曰入而在國則五寢次舍以衛宫若有大故其所防者尤當致嚴又守王門資之以衞至尊易氏曰五門出入必幾門鄭康成曰非常之難要在如是則八百人之衆不足恠也及葬從才用反遣車而哭鄭康成曰遣車王之魂魄所馮依賈氏曰遣車將葬盛所苞奠遣送之車其車内既皆有牲體故云魂魄所依適四方使所吏反下同則從士大夫若道路不通有徴事則奉書以使於四方鄭鍔曰王朝或遣使於四方所遣者士大夫也必從以虎賁劉執中曰虎士從之䕶王命也多難之世宼攘姦宄或為患於道路道路不通王命壅遏或有徴召於諸侯虎賁氏奉王之書以使於其國惟其武勇故使之犯難而往也旅賁氏中士二人下士十有六人史二人徒八人鄭鍔曰旅如旅力方剛之旅旅有力之意故人之背旅謂之膂以其有力故也賈氏曰旅見其衆賁見其勇或謂有虎賁氏八百人矣又有旅賁氏十六人何耶蓋八百人分為卒伍而趨於王之前後則既衞其前又衞其後也旅賁氏之十六人則夾車而趨或防其左或防其右此其所以異李嘉㑹曰大夫不可徒行故旅賁氏止用中士不使大夫掌執戈盾夾王車而趨左八人右八人車止則持輪鄭康成曰夾王車者其下士也下士十有六人中士為之帥鄭鍔曰夾王之車執戈所以撃刺執盾所以捍衞左右必皆八人人主上法乎天而左右之衞亦取象於八卦故數皆八也車之運行其勢疾矣及其止也餘力未定慮其運而不止故持其輪而止之自非旅力過人安能然也王氏曰持輪所以為安也李嘉㑹曰王止則亦止而衞王凡祭祀㑹同賔客則服而趨鄭鍔曰祭祀賔客㑹同王則吉服旅賁亦以服而從先儒以為王衮冕則旅賁齊服服𤣥端竊以為不然言服而趨者謂軍旅夾王車或以介祭祀㑹同賔客則無用介惟服其所當服之服而已王昭禹曰服而趨者其服亦如王祭祀賔客之服何以眀之下文言軍旅則被甲而趨蓋能自保衞然後可以衞至尊有兵甲之事尤不可不先自備或使之服其介也亦以重天子之威喪紀則衰七雷反葛執戈盾鄭康成曰葛葛絰武士尚輕賈氏曰臣為王貴賤皆斬衰麻絰至葬乃服葛今王始死即服葛故云武士尚輕軍旅則介而趨鄭康成曰介被甲王氏曰旅賁則王衞之尤親者王吉服則亦吉服王凶服則亦凶服王戎服則亦戎服亦與王同其憂樂也易氏曰祭祀㑹同賔客喪紀軍旅各以吉凶之服衞于王軍國之容有足觀者矣節服氏下士八人徒四人黄氏曰其服衮冕名之曰節以著别也鄭鍔曰或謂春官有司服掌王之衣服冝可得而節此官所言初無撙節之意何以為上節王之衣服耶夫王之衮冕裘冕固非臣下所可服然有時而服之亦以行禮之故爾行禮則服之事已則止其服也固有節矣此序官節服之意掌祭祀朝覲衮冕六人維王之大常鄭鍔曰祭祀朝覲王乗五路建大常服衮冕此禮之至文而盛也又使節服氏六人與王同服以維持大常之旒蓋大常十有二旒其長曵地必用人以維持之維者以縷綴連之義每旁三人則法陽數之成而以象天陽俾服衮冕同王之服以尊天之象易氏曰王於郊祀服裘冕而節服氏之二人者亦服裘冕王於祭祀朝覲服衮冕而節服氏之六人者亦服衮冕若是何以為節曰是乃所以為節也春秋之法貴賤不嫌於同號以其有節存焉王眡治朝其位亦南鄉王族故士虎士在路門之右大僕大右大僕從者在路門之左其位亦南鄉則尊卑何以無辨位同乎南鄉從王於後也服同乎衮冕裘冕從王於左右也既有前後左右之節矣則位序服飾乃衞至尊而崇威嚴亦何嫌於同愚案此便是顧命一人冕執劉一人冕執戣相似諸侯則四人其服亦如之賈氏曰禮緯天子旌九仞十二旒曳地諸侯七仞九旒齊軫大夫五仞五旒齊較士三仞三旒齊首彼或異代法故旒不依命數周諸侯之旌皆交龍為之上公九旒侯伯七子男五今緫云四人則不得兩兩維之但一畔二人分而維之耳鄭鍔曰諸侯之祀也建交龍之旂亦謂之建常用四人以維之其服與諸侯亦同王六而諸侯四降殺以兩又四者隂之數諸侯雖有君道而視天子則臣也故取隂之數焉郊祀裘冕二人執戈送逆尸從車鄭鍔曰祀必有尸雖郊祀亦有尸士師言祀五帝則沃尸春秋傳曰晉祀夏郊董伯為尸此言郊祀送逆尸則是郊亦有尸也郊祀王服大裘而冕王服大裘則尸亦服大裘尸服大裘故節服氏送逆尸亦服大裘事至尊之神以類求類欲其純一而不雜如此節服氏八人六人維大常故二人送逆尸也然亦惟郊祀則有裘冕執戈之禮他祀則不用也始焉逆之終焉送之皆從尸所乗之車事尊神者其禮當致其謹也或謂王服衮冕節服氏亦衮冕近於無等差先王制禮必有毫釐之辨何為至尊之衮冕與臣下同耶蓋祀天之禮内服大裘則外被冕故曰衮冕又曰裘冕司裘言為大裘以共王祀天之服而不言衮司服言祀天則衮冕而不言裘王服衮則曰衮冕王服裘故云裘冕郊祀以維大常而送逆尸之故乃分而二之使節服氏八人各服其一大常以文為主故服以衮送逆尸以質為主故服以裘服衮者無裘服裘者無衮豈不有毫釐之辨哉王之奉祀也以内則盡質以外則盡文故兼論乎裘衮又以見名官曰節服氏之意方相氏狂夫四人王昭禹曰方相氏者以其相視而攻疫者非一方也月令於季冬命有司大儺則曰旁磔亦以方之所在非一方鄭鍔曰或謂每歳有時儺之事所謂季春命國儺仲秋天子乃儺季冬命有司大儺見於月令者是也三時有儺夏則無之方相氏乃為夏官之屬何耶蓋方相氏以狂夫為之康成謂方相猶放想可畏怖之貌義無所攷殆猖狂之意也因四方而驅疫必狂夫為之蓋陽勝則為狂隂慝則為疫狂夫陽之太過者也夏則陽盛而火王陽盛而太過則為狂矣使之索隂慝之鬼亦厭勝之術賈氏曰執戈揚盾亦武事故在此緫論薛平仲曰四官之設先王必使世其官者合庶士以衞至尊其事至難使為之長者或更進迭用而非世守之舊則人心渙散不屬所關甚大此虎賁旅賁必以氏為名節服氏以衮冕維大常其職與旅賁氏相關非世其官不足以明禮典之冝方相氏以索室驅疫非世其官不能明鬼神之故此節服方相亦以氏為名也掌蒙熊皮黄金四目𤣥衣朱裳執戈揚盾帥百隷而時難乃多反以索室敺疫鄭康成曰蒙冒也鄭鍔曰熊之為物猛而有威百獸畏之蒙熊皮所以為威也金陽剛而有制用為四目以見剛明能視四方疫癘所在無不見也𤣥者北方之色天事之武也朱者南方之色地事之文也以𤣥為衣所上者武以朱為裳輔之以文李嘉會曰鬼神隂物狂夫四目𤣥衣朱裳皆象陽氣以抑隂氣執戈擊刺揚盾自衞黄氏曰執戈揚盾猶尚勇歟帥百隷以為之王昭禹曰帥罪隷蠻隷之屬賤者之職也王昭禹曰時儺以時而儺月令季春仲秋季冬是也鄭鍔曰季春仲秋之儺有國之禮庶人不得為季冬之儺謂之大儺孔子於鄉人儺則朝服而立於阼階以安室神謂季冬之儺大儺驅索諸室中而逐之故朝服以安祖先之神爾鄭康成曰索廋也王昭禹曰室者隂慝之所藏大喪先匶鄭康成曰葬使之道劉執中曰凶事多邪慝乗之及墓入壙以戈擊四隅敺方音罔良音兩鄭康成曰壙穿地中也天子之槨栢黄腸為裏而表以石焉方良罔兩也國語曰木石之恠夔罔兩鄭鍔曰葬則用木石木石乆而變恠生故始葬則敺之亦厭勝之術易氏曰占夢季冬聘王夢遂令始儺敺疫則令此而已鄭鍔曰喪則使之為前驅以辟凶邪葬則使之入壙擊罔兩所以安神靈周禮訂義卷五十一
