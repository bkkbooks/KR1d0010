body:
  text: 周禮訂義卷四十五宋王與之撰内史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人薛平仲曰内史一屬所以次於大史之後者事固有所由始造命之地則一人風化之所由出命令之逹則四方觀聽之所由歸左右夾輔之助則一人心腹耳目之所由寄内史之官既以中大夫一人又以下大夫二人輔之蓋端本澄源於内者既有可紀之實然後付諸大史以脩之而待後世之有攷孫氏曰史官隸之宗伯以宗廟典籍具存非博古通今之士不能勝其任也黃氏曰内史掌八枋之法與冢宰同地愈親任愈重故其爵秩髙而置員廣皆先王精意自漢始以尚書緫朝事其後離而為中書又離而為門下而朝廷日以卑非成周建官之意掌王之八枋兵病反之灋以詔王治一曰爵二曰禄三曰廢四曰置五曰殺六曰生七曰予八曰奪鄭康成曰大宰既以詔王内史又居中貳之鄭鍔曰大宰權之所在内史書之所在用其權可以馭羣臣案其書可以詔王治詔王雖同權與書不侔矣大宰謂之柄取能執之意字從丙丙者嚮明而執之故於詔王馭羣臣言之枋則取刻制之義字從方方者義執矩之所同故於詔王治言之曰殺不曰誅内史法之所在有罪則當殺耳愚案八柄詔於冢宰内史復掌以詔王史官者公論之所出權柄有一不公史氏得直筆以書之凛乎其可畏也屬諸禮官其選清矣而得參稽乎朝廷爵禄之事豈惟足以制冢宰之自專而廟堂進退亦將日與儒者參訂矣執國灋及國令之貳鄭康成曰國法六典八法八則王氏曰上以道制之下守以為法上以命使之下禀以為令鄭鍔曰國有一定之法又有一時之令掌其法書其令各有官守内史皆執其貳而已李嘉㑹曰拘一定之說不酌諸人情世變上或以法制自勝下或以虚文為欺損益升降無所變通其弊乃甚必二者並行治本時宜彼此兼濟斯無難行之患以攷政事以逆㑹計王昭禹曰以攷政事則所主在治以逆㑹計則所主在財用鄭鍔曰與大宰司㑹更相參稽掌叙事之灋受納訪以詔王聽治鄭康成曰叙六叙也六叙六曰以叙聽其情王昭禹曰其法之所掌皆先尊而後卑先貴而後賤先上而後下先大而後小所以謂掌叙事之法葉氏曰有事斯有法軍旅之事則有軍旅之法田役之事則有田役之法以至祭祀喪紀㑹同之事莫不皆然内史所掌敘事之法者法有不便於民先王不恃法以為便不任己以為明故必納訪於民而使内史受焉其所便者因之其所不便者革之損益必利於民然後可以治天下故先受納訪然後詔王聽治鄭鍔曰王者有所咨詢謂之訪臣下有所復白謂之納鄭康成曰納訪納謀於王也黄氏曰自内而出曰訪自外而入曰納上有所訪則下有所納訪者不一則其所納亦不一矣内史掌敘事之法以納訪之事先後有倫不相雜糅乃詔王而聽其治非他史職比李嘉㑹曰納訪者因事變而訪問由已見而論奏與臣民之復逆之有常者不同必曰掌敘事之法者盖所訪納者非一事但其序不可紊亂而雜聽耳黃氏曰龍之於舜仲山甫之於宣王盖其職也今自内出者中書受之自外入者通進銀臺司受之職久分矣凡命諸侯及孤卿大夫則䇿命之項氏曰諸侯有土之君孤卿大夫在朝之臣皆書辭於䇿以命之賈氏曰周法爵及士餘文更不見命士之法明士亦内史命之不言者略之也朱氏曰内史掌􅁽命諸侯羣臣故賢能之書内史貳之謂副本也古者封建諸侯内史讀冊而命之非特命諸侯亦以命在廷訪其可否愚案典命四命大夫加一等出封為子男故命大夫則作䇿命士則不作䇿以其爵猶卑未可以出封也王氏詳說曰言命諸侯及孤卿大夫則䇿命之為出封者設爾蓋䇿命非常命也書曰􅇣祝冊惟告周公其後書序曰康王命作冊畢左氏曰王命内史叔興父冊命晉侯為侯伯後世有内制其古之䇿命歟凡四方之事書内史讀之賈氏曰諸侯凡事有書奏白於王内史讀示王鄭康成曰若今尚書入省事愚案事書若萬民之利害為一書禮俗政事治教刑禁之逆順為一書悖逆暴亂作慝猶犯令者為一書札喪凶荒厄貧為一書康樂和親安平為一書小行人得其書反命于王内史乃從而讀于閒暇之日則尊居九重明見萬里曾無壅蔽之患黄氏曰今門下書讀猶存古意四方事書即外史所謂以書使于四方者王制其令内史讀之外史書之愚案此以事書作上諭下之書亦通恐以為外史之書使不可書使是錫書之使非事書之使或曰四方事書無所不具命内史以讀之者蓋格物窮理之端參之朝夕事為之際所謂人求多聞時惟建事者王制禄則賛為之鄭康成曰王制云王之三公視公侯卿視伯大夫視子男元士視附庸賛為之為之辭鄭司農曰諸侯下士視上農夫禄足以代其耕中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄以方出之賞賜亦如之鄭司農曰以方版書而出之杜氏曰方直謂今時牘也黄氏曰制禄之方司禄受之賞賜之方職嵗受之是皆考之八枋之法不可得而濫也項氏曰賞賜或以土田或以車服或以器物皆賛其等書之於方出而命之鄭鍔曰行爵出禄無非人君之命或以䇿或以方其别也盖命以爵者必有徳之人為䇿命之所以述其徳與以禄者必義所當與之人用方出之所以著其義䇿者簡牘之辭方版也其制方方言其義内史既掌為䇿命以言其人之徳及其人治四方之事以書來上則使讀之所以驗前日䇿命之言不為溢美若夫賞賜出於一時之喜亦出以方見其合義然後予亦非人君之私既賛為之又以方出之則王命合義矣可書之以為後世法又藏其貳則他日有所攷春秋之世城濮之役晉侯有功襄王命内史叔興父䇿命之為侯伯則周之家法猶有可攷晉之克齊使鞏朔獻捷定王使禮之如侯伯克敵使大夫告慶之禮又私賄鞏伯使相告之勿籍則賞賜之非義而内史不書又可知矣内史掌書王命遂貳之鄭康成曰副寫藏之項氏曰凡有王命既書以出遂藏其貳皆史所當載也外史上士四人中士八人下士十有六人胥二人徒二十人陳君舉曰内史猶今内制翰林也外史猶今外制舎人也凡䇿命之出皆黜陟予奪大小臣工爵禄之事其與人主圖之者固冢宰也而上意之然否師言之叶否非有文墨議論之士講求參酌或不當於功罪雖當功罪而襃貶益損之文或作於好惡往往傷王言之體於是以二史屬春官而冢宰詔王大宗伯之屬得以陳誼補過於其間是故號令罔不臧而賞罰公亦三公所以輯衆美昭令聞也其見於傳襄王使召武公及内史過賜晉惠公命使大宰文公及内史興賜晉文公命則二史從公之事觀其道天子諸侯德誼文辭甚美雖東周尚如此亦足以觀史氏之典刑矣自秦變古寖失此意辭令在尚書郎則尚書重在中書舎人則中書重方漢重尚書至號喉舌之官事歸臺閣三公失職則尚書遂擅天下魏晉重中書則並掌職務至有中書監遷尚書令自謂有奪􅃫池之恨而中書亦擅天下兩省相傾至今並置最後開元别置學士院白麻獨在學士為天子私人稱内相矣以一辭令之官所鄉輒偏重權傾君相而朝廷不尊然後知周家以冢宰建六典實掌六卿而二史分𨽻宗伯道揆在上權綱歸一而無專遂之私法守在下衆職交修而無詭隨之患所謂周道如砥者以此掌書外令項氏曰王言惟作命不言臣下罔攸禀令則上出之為命下禀之為令故内史書内謂之命外史書外謂之令王氏曰命後世所謂制也故内史書之令後世所謂詔也故外史書之外令國令也外史掌書之而内史執其貳謂之外令以别於女史之内令王昭禹曰一定而不可易者命也因事而告者令也李嘉㑹曰不曰作而曰書者如行人子羽脩飾之而後書可以達諸王國之外黄氏曰凡王命内史書而出之外史受而書行之今中書舎人書行蓋合而為一内史留柢遂以為國令之貳掌四方之志鄭康成曰志記也劉執中曰四方之志謂九州列國四海百蠻世系之所自出封建之所由興朝貢之斷續政教之違從禮樂之更革俗尚之醜好若土均土訓誦訓之所職皆為志以藏之以待王之顧問孔安國曰九州之志謂之九丘言九州所有土地所生風氣所宜皆聚此書其此之類歟王昭禹曰掌四方之志則下以知風俗之所在黄氏曰為有四方之事當攷故實也陳君舉曰古者諸侯無私史外史掌四方之志者諸侯各有國史書國中之事以達于天子天子又時廵以察之有二伯以詢之内史以董之故列國之史多藏之周室孔子亦西過周室考史記舊聞具於魯而次於春秋孟子曰晉之乘楚之檮杌魯之春秋今攷晉史自殤叔時始有之楚自武王以上有世次而無年月魯之春秋乃自𨼆公始則諸侯私史亦東周以來有之非西周之制也不特諸侯之史藏之周室而列國圖志亦藏之故以春秋之時楚子問鼎之大小輕重以鼎象九州之山川形勢得周鼎亦可以識天下矣掌三皇五帝之書鄭康成曰楚靈王所謂三墳五典李嘉㑹曰書斷自皇帝以下大道常道所可備記者此後凡有書莫不兼掌夏商周所紀不言可知王昭禹曰上以攷古昔之所行黄氏曰必掌皇帝書者凡王之命皆當聨次於尚書也漢御史掌蘭臺秘書其遺意也掌達書名于四方鄭康成曰謂若堯典禹貢達此名使知之黄氏曰皇帝書名在四方久矣何以逹為朝廷常有書周書自泰誓之後皆是至東遷猶有書四方未知朝廷制作之意故以其名逹之王氏曰書名者字也字所以正名百物故謂之名鄭康成曰或曰古曰名今曰字使四方知書之文字得能讀之鄭鍔曰四方言語不同上世音讀與後世亦異欲使天下誦讀之際無東西南北之訛無古語今言之異則書之名不可以不達逹之于四方欲使之皆同也大行人几歳諭書名蓋外史逹之九嵗之久慮其不一又使行人往諭之愚案黄氏以書名為古之書逹其名以廣帝王之道王氏以書名為今之字書亦通但與上下文恐不相協若以書使所吏反于四方則書其令王昭禹曰以書使于四方外史書其令則掌外令故也黄氏曰令猶今言制敇也書猶今言制書敕書也易氏曰亦所以明王政之所從出鄭鍔曰書名既正道徳乃一風俗乃同其有不同遣使以正之因書而使故曰以書使四方也書其書使之令以為證知其國書名之不正天子曾遣使以正之愚案古者邦國之書皆錫於王其國已有此書惟達其名使天下知一人所重者在此其國未有此書若遣使以頒之必書其令使天下知一人所錫者在此於是邦國無私書天下無異學御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人鄭康成曰御猶侍也進也其史百有二十人以掌賛書人多也愚案周之諸史皆是王者之史獨御史一官無王字所輔者是冢宰所攷者是百官大槩是簿書期㑹之所從出所以御史之史至百二十人秦重刀筆見得其事權稍重挈而列之於冢宰之下百官之上至漢遂與大臣爭衡並列為三公吕氏曰御史之名見於周官以中士下士為之特小臣之傳命令者耳至於戰國其職益親故獻書多云獻書於大王御史澠池之㑹各命御史書事淳于髠亦曰御史在前執法在後是又掌記事糾察之任也掌邦國都鄙及萬民之治令以賛冢宰凡治者受灋令焉王昭禹曰邦國都鄙及萬民之治令所謂六典以治邦國八則以治都鄙官成以待萬民其法則冢宰以道治之其命則御史掌之故以賛冢宰為職鄭鍔曰出治令者王也推王命令而行之者冢宰也掌書治令為冢宰之助者御史也所掌如此故凡邦國都鄙萬民有所當治之事皆於此受法令蓋書寫傳播本於此故也王昭禹曰九職九貢九式九兩之類有其法也御史掌其令而治之法令皆書於此凡治者即是而受也掌賛書凡數從政者王昭禹曰凡則如師掌官成以治凡之凡同數則如旅掌官常以治數之數同鄭鍔曰數則以小數計之凡則以緫數計之知其凡數則官之冗省可得而見矣黄氏曰若今班簿歟御史掌之其事與宰夫八職相通凡數從政者謂以凡以數而從政者御史皆掌而攷校之則以凡與數皆載於書故也蓋自公卿以下至于庶人之在官莫非從政者不可以不知其登下多寡之計故有凡數李嘉㑹曰曰凡曰數則師旅之從政者御史皆以史而賛書之則國之法令治令斯無邪徑而雜出者矣巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人劉迎曰巾猶車之衣以巾覆車所以障其塵垢冪人掌共巾冪則以巾冪尊彝巾車則以巾覆車不特職於出而又職於藏今物之藏者謂之巾箱巾笥則巾車之為藏可識矣鄭鍔曰續漢書云古之戰車雕朱輪輿不巾不盖故知首飾謂之巾路用玉金象以為飾者皆飾諸末猶人之首加巾以為飾也王昭禹曰巾設飾之物車人為車别於冬官百工之事而巾車所掌則設飾為主故也薛平仲曰車而蒙之以巾則車為尊掌車而必以大夫則車為重黄氏曰車旗之政有財賦有法度故尊其爵秩其屬則有工百人則車之制作云備又曰自宗伯辨車旗之禁掌車旗之賞賜典命以命數而定諸侯諸臣之節則車旗之制亦嚴矣使即其敘次而論則巾車一屬當在典命司服之後今特次之史官之末大抵先王之制禮樂所以為扶持三綱五常之具而史官之寄襃貶又以為扶持禮樂之用固有以嚴後世變禮易樂之防矣巾車一屬又列於史官之後豈不曰器之藏禮莫大於車周人所上者莫先於車茍知簡書之可畏將於此而敢僣乎王氏詳說曰有車必有馬有馬必有僕有僕必有右曰馬曰僕曰右皆見於夏官而五路獨見於春官蓋春官所以為禮夏官所以為兵車屬於禮馬僕與右屬於兵掌公車之政令辨其用與其旗物而等敘之以治其出入鄭康成曰公猶官也王昭禹曰自王之五路至庶人乘役車以上皆典於公非私車故謂之公車用謂祀賓之屬旗物大常以下等敘之以封同姓異姓之次序王氏曰等謂差其上下叙謂次其先後則以治其出入故有先路綴路次路之名鄭鍔曰掌政令以治其出入凡公車之數與其新故成毁無不周知之李嘉㑹曰用車之時尊卑並至何以辨之旗物以為之别耳等敘不同所用亦異出入之際誠不可不謹而治之也王之五路賈氏曰路門路寢路車路馬皆稱路路大也王之所在以大為名諸侯亦然劉執中曰皆大之稱而無所擬倫故曰路一曰玉路鍚音陽樊歩干反纓十有再就建大常十有二斿音留以祀鄭康成曰玉路以玉飾諸末賈氏曰凡言玉路金路象路皆是以玉金象為飾不可以玉金象為路鄭云飾諸末者凡車上之材於末頭皆飾之鄭鍔曰玉者陽精之純可以交三靈故以玉飾路則乘以祀天鄭康成曰鍚馬靣當盧刻金為之所謂鏤鍚賈氏曰眉上曰鍚故知當額盧案韓奕詩鉤膺鏤鍚金稱鏤故知刻金為之樊讀如鞶帶之鞶謂今馬大帶鄭司農曰纓謂當胷士喪禮下篇曰馬纓三就禮家說曰纓當胷以削革為之三就三重直龍反三匝也鄭康成曰玉路之樊及纓皆以五采罽飾之十二就就成也大常九旗之畫日月者正幅為縿斿則屬焉王氏詳說曰明堂位曰魯君孟春乗大路載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也郊特牲曰乗素車貴其質也旗十有二旒龍章而設日月以象天也詩閟宫曰龍旂承祀夫王建大常日月也諸侯建旂交龍也詩人言魯為龍旂而記又言龍章而及日月是旂常無辨也按司馬法云章夏以日月尚明商以虎尚威周以龍尚文周雖以日月為常以龍為章但賜魯以龍章其龍有升降不同耳項氏曰玉路以玉為飾温潤而澤見於仁縝宻以栗見於智垂之如隊叩之清越見於禮樂瑜瑕不掩孚尹旁達見於忠信備徳之美也大常以三辰為飾日月麗天以象重明日月久照以象久於其道相代而成晝夜相推而成嵗時體道之常備道全徳可以事神故以祀鄭鍔曰所駕之馬鍚以昭其聲樊纓十有再就以昭其文所建者大常象天之明斿十有二合天之大數祀天則乘所以極其尊也李嘉㑹曰大常之旗非獨祀則用之仲秋治兵王則建之㑹同戎路王則建之見人君之徳同乎天地撫世應俗與日月同運此日月所以為君之旗而名之以常也金路鈎樊纓九就建大旂以賔同姓以封鄭康成曰金路以金飾諸末鈎婁頷之鈎金路無鍚有鈎亦以金為之賈氏曰詩云鈎膺鏤鍚鈎連言膺明鈎在膺前以今驗古明鈎是馬婁頷其樊及纓以五采罽飾之而九成大旂九旗之畫交龍者以賔以㑹賔客同姓以封謂王子母弟率以功徳出封雖為侯伯其畫服猶如上公若魯衞之屬其無功徳各以親踈食采畿内而已李嘉㑹曰同姓封爵無子男之卑而止於伯者皆所以尊之也若異姓有公侯之貴亦不可不以金路項氏曰金路以金為飾蓋其形堅剛義也其性從革和也方之為方圓之為圓惟冶之所鑄大之則大小之則小惟物之所感皆主於和也大旂繢交龍龍徳施物主於恩上下交感主於通既通且和則以講饗燕之禮賔之而弗臣宜矣封同姓之國親之而弗踈亦宜矣鄭鍔曰無鍚有鈎就以九金成數也王出迎賔則乘之屈至尊而接賔以示君臣之義也同姓之封非以私恩也斷之以義也王昭禹曰路車以王所乗為主其賜諸侯以路車者所以為王之􅌋意故詩有路車乗馬之辭王氏詳說曰案定公四年祝佗云武王分魯公以大路大旂分康叔以大路少帛綪茷旃旌分唐叔以大路杜氏謂大路金路也綪茷大赤也夫三叔皆同姓所封之車則同於金路所封之旂魯用大旂衞則用大赤唐則不復有矣曰祝佗所言謂武王時耳此禮至周公時然後定象路朱樊纓七就建大赤以朝直遥反異姓以封鄭康成曰象路以象飾諸末王昭禹曰以象齒為飾象路無鈎以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛劉執中曰周之旗以朝以日視朝賈氏曰以日視朝者謂於路門外常朝處乘之此雖據常朝而言至於三朝皆乘之案司常云道車建旞注云道車象路也王以朝夕燕出入乘此象路則建旞若在朝廷大赤也其車則同異姓王甥舅項氏曰象南方獸文明之方也其齒堅强而不撓皆明辨之義李嘉㑹曰象其堅在牙其用在鼻而南則屬禮堅强在我而以禮接人此所以為象路以朱飾勒以赤為旗皆南方之義故以之視朝則君臣上下之禮明以封異姓則考禮正刑之義辨鄭鍔曰象齒有文以比禮也無鍚無鈎以朱飾勒朱南方之色王出視朝則乗之視朝向明以禮為主異姓之封彼為貴戚欲由禮而動李嘉㑹曰惟有明徳可以懐異姓林椅曰五路行人建常樊纓有公侯伯子男之别而巾車止有同姓異姓之分蓋巾車所辨乃分器耳革路龍音龎勒條他刀反纓五就建大白以即戎以封四衞鄭康成曰革路鞔之以革而漆之無他飾賈氏曰自玉路金路象路皆以革鞔即冬官云飾車欲侈但象路以上更有玉金象為飾謂之他物則得玉金象之名革路亦用革鞔以無他物飾則名為革路龍駹也以白黒飾韋雜色為勒賈氏曰龍勒者馬之轡飾勒靣則在靣條讀為絛其樊及纓以絛絲飾之而五成不言樊字蓋脫爾以此言絛知玉路金路象路飾樊纓皆不用金玉象大白殷之旗猶周大赤蓋象正色也李嘉㑹曰大白屬西方兵戎貴盛勵四衞貴藩屏皆取西方之義以成之也即戎謂兵事四衞四方諸侯守衞者蠻服以内鄭鍔曰革之為物鞏物而固之堅而不可解以象信也上三路用罽以文為貴此以條為纓則欲其固而已其纓之就以五土之數也所建者大白以信為主也王即戎事則乘之諸侯守衞中國者則以此封之用兵貴其堅守而守衞中國之諸侯則以信固結之王昭禹曰革所以扞内而蔽外義之制也大白象秋正西方之物惟白為能受采則以義受之之譬也木路前子踐反樊鵠户篤反纓建大麾以田以封蕃國鄭康成曰木路不鞔以革漆之而已前讀為緇翦之翦淺黒也鄭鍔曰木路至質無文以淺黒色飾韋為樊鵠色飾韋為纓不言就蓋此實三就爾見其質也鄭康成曰不言就數飾與革路同王氏詳說曰木路以封蕃國蕃國爵不過子子男五命其五就也宜矣所建者大麾以黒色主殺為事鄭康成曰大麾不在九旗中以正色言之則黒夏后氏所建王出田則乘之鄭康成曰田四時田獵王氏曰建大麾以田司馬辨旗物之用不言者司馬所辨教治兵而已既教治兵遂以獮田於是建大麾焉蕃國之君則以此封之鄭康成曰蕃國謂九州之外夷服鎮服蕃服田則主殺待蕃夷之君則亦至質而無文也緫論鄭鍔曰玉路一曰大路金路一曰先路象路次金路革路次象路故同謂之次路木路最後綴於諸路之後故曰綴路方其以多為貴則玉路樊纓十有二就金路九象路七革路五木路三不言木路三以上四路推而知之方其以少為貴則大路樊纓一就先路三次路五與七綴路九禮記不言綴路九就亦以上四路推而知之禮器曰大路一就次路七就此以少為貴郊特牲曰大路一就先路三就次路五就此以少為貴且言於郊特牲郊祀之間則以少為貴盖祀天之時也凡車上之材皆飾其末革路無他飾故正名曰革木路則木上無革故正名曰木陳君舉曰郊特牲曰大路繁纓一就先路三就次路五就又丹漆雕幾之美而素車之乘此言商制也所謂大路即素車而周官所謂木路也商以大路為尊次路為下其樊纓自一推至於五則為禮之殺蓋尊其樸貴其質而已周以玉路為先木路為後其樊纓十二損而至於五則為禮之殺盖尊其飾貴其文而已易氏曰周人尚輿玉路實備於四代蓋自陶唐氏以彤車而乘白馬其制略矣有虞氏則因彤車而制鸞車夏后氏則因鸞車而制鉤車殷人則因鉤車而制大路周人則因大路而制乘路是五路之制惟周為盛自以祀至以田則上得以兼乎下自同姓以封至以封四衞則下不得以擬乎上然同姓如魯衞未至乎九命何取乎金路之九數異姓如宋杞不止乎七命何取乎象路之七數四衞亦有五等之侯國又何拘乎革路之五數蕃國夷狄雖大曰子何為木路獨不言數蓋以是為王朝出封之儀典命所言在國車旗之數也若夫王者兼用五路宜若必玉路而後建大常必金路而後建大旂必象路而後建大赤必革路而後建大白必木路而後建大麾然以大司馬攷之仲秋教治兵王載大常是以革路載大常司常亦曰凡祭祀各建其旗㑹同賔客亦如之先儒亦謂兵車之㑹則以戎路建大常賔客㑹同則以金路建大常是知五路之建大常者天子之制而此四旗不言斿者兼諸侯之制亦猶王之五服兼用衮鷩希毳而有大章焉有小章焉賈氏曰凡五等諸侯所得路在國祭祀及朝天子皆乘之但朝天子之時乘至天子館則舍之於覲館禮記云偏駕不入王門謂舎之於客舘乘墨車龍旂以朝王后之五路鄭鍔曰王有祀有朝有賔有即戎有四時之田故所乘之路有五王后有從王祀先王先公之禮有從王見賔客之禮有朝王之時有採桑之時有宫中乘行之時此五者皆當乘路故路亦有五以其與王同尊故亦稱路然不以路名車曰重翟厭翟安車翟車輦車又見其次於王也李嘉㑹曰后前曰路示王同體也後止曰車則有臣妾之義重直龍反翟鍚靣朱緫鄭康成曰重翟重翟雉之羽賈氏曰凡言翟者皆謂翟鳥之羽以為兩旁之蔽言重翟者皆二重鄭鍔曰從王祀先王先公之所乘鄭司農曰鍚馬靣鍚王昭禹曰鍚靣以飾馬鄭鍔曰所謂鍚鸞和鈴昭其聲也緫著馬勒直兩耳與兩鑣賈氏曰凡言緫者謂以緫為車馬之飾若婦人之緫亦既繫其本又垂為飾故皆謂之緫鄭鍔曰以朱為緫取陽明之義見其於宫中有君道也厭於涉反翟勒靣繢緫鄭康成曰厭翟次其羽使相廹鄭鍔曰飾以翟羽相厭次焉示其厭䧏故不復重從王見賔客則乘之鄭康成曰勒靣謂以如王龍勒之韋為當靣飾鄭鍔曰謂馬之靣如王革路為龍勒之飾不設飾繢畫文也鄭鍔曰謂以白黒青赤之色如繢畫之飾以為緫見相雜之文安車彫靣鷖烏兮反緫鄭鍔曰安車則飾不用翟漆之而已婦人坐乘獨此車名安朝王所乘取安處之義賈氏曰曲禮云婦人不立乘又云大夫致事乘安車則男子坐乘亦謂之安車然王后五路皆是坐乗獨此得安車之名者以餘者有重翟厭翟翟車輦車之名可稱此無異物之稱故獨得安車之名彫靣謂刻革為馬靣之飾不龍其勒鄭司農曰鷖讀為鳬鷖之鷖鷖緫者靑黑色以繒為之皆有容蓋鄭司農曰容謂幨車山東謂之裳幃或曰潼容賈氏曰衞詩漸車幃裳毛氏赤云潼容鄭康成曰蓋如今小車蓋翟車貝靣組緫有握鄭康成曰翟車不重不厭以翟飾車之側爾鄭鍔曰採桑則乘之鄭康成曰貝靣貝飾勒之當靣鄭鍔曰貝者水蟲餘貾餘泉之類物之美而可寳者王昭禹曰組緫以織組為緫鄭鍔曰組者五色絲絛文之美而相雜者賈氏曰朱緫繢緫鷖緫皆以繒為之則組緫以組絛為之鄭鍔曰有幄者謂之帷幕以為幄有幄則無容蓋鄭康成曰如今軿車賈氏曰漢法軿車無蓋故舉以況之輦車組輓音晚有翣所甲反羽蓋鄭康成曰輦車不言飾后居宫中從容所乘但漆之而已為輇輪人輓之以行賈氏曰雜記注引許氏說文解字曰有輻曰輪無輻曰輇雜記注輇崇蓋半乗車之輪乗車髙六尺六寸則此當三尺三寸鄭鍔曰以組為輓鄭康成曰有翣所以禦風塵以羽作小蓋為翳日也總論易氏曰重翟之鍚靣朱緫亦玉路之鍚樊纓也厭翟之勒靣繢緫亦金路之鉤樊纓也安車之彫靣鷖緫亦象路之朱樊纓也翟車之貝靣組緫亦革路之龍勒條纓輦車以人輓之而已蓋擬木路而其制略自安車以上皆有容蓋自翟車以上皆有幄自輦車以上皆有翣羽蓋五路之等如此鄭鍔曰衣褘衣則乘重翟衣褕狄闕狄則乘厭翟衣展衣則乘安車衣鞠衣則乗翟車衣褖衣則乗輦車王之䘮車五乘繩證反木車蒲蔽犬􅍜莫歴反尾櫜音羔䟽飾小服皆䟽鄭康成曰木車不漆者鄭司農曰蒲蔽謂臝蘭車以蒲為蔽天子䘮服之車漢儀亦然鄭康成曰蔽車旁禦風塵者犬􅍜以犬皮為覆笭鄭康成曰犬白犬皮賈氏曰古者男子立乘須馮軾上須皮覆之故云犬􅍜士䘮記主人乗惡車白狗幦是也黄氏曰康成以尾櫜以犬尾為戈㦸之弢小服刀劔短兵之衣始遭䘮所乗為君之道尚微備姦臣未必然䟽家引禮䘮事無等亦恐未盡此言王之䘮車五等則非諸臣之制鄭自始遭喪至􅎭次五等恐當如此或曰喪車尾櫜䟽飾小服皆䟽尾末也車之大木末皆布韜之以為飾小木則皆布之素車棼蔽犬􅍜素飾小服皆素鄭康成曰素車以白土堊車棼讀為薠薠麻以為蔽其􅍜服以素繒為緣王氏曰素車蔽􅍜服皆素則少變而飾以素不皆䟽矣蓋後車變而彌吉以至於喪除鄭康成曰此卒哭所乗黄氏曰素車素飾不言尾櫜因上文且言小服皆素則尾櫜可知漢文帝遺詔無布車及兵器其制至漢猶在薻車以下不言小服則如常車施革駹車又漸漆矣薻音緫又音藻車薻蔽鹿淺􅍜革飾杜氏曰薻讀為華藻之藻鄭康成曰薻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺􅍜以鹿夏皮為覆笭賈氏曰夏時鹿毛新生為淺毛又以所治去毛者緣之王氏曰革不言色蓋如素車用素鄭康成曰此既練所乘駹車萑音丸蔽然􅍜髤香求反飾鄭康成曰駹車邊側有漆飾也賈氏曰下文漆車全有漆則此時未全為漆萑細葦席也以為蔽者漆則成藩即吉也然果然也賈氏曰果然獸名髤赤多黒少之色韋杜氏曰髤漆王氏曰髤與萑不言物蓋如薻車用革鄭康成曰此大祥所乗漆車藩蔽豻五旦反􅍜雀飾鄭康成曰漆車黒車賈氏曰凡漆不言色者皆黒且大夫所乗墨車及篆縵之飾直得墨名是凡車皆黒漆也藩今時小車藩漆席以為之豻胡犬賈氏曰胡地之野犬或作狐字者謂狐與犬合所生雀黒多赤少之色韋也此禫所乗緫論李嘉㑹曰喪車五乗必有蒲棼藻萑藩為之蔽者居喪衣服麄惡形貎毁瘠不可見人人亦不可見己故有蔽以自遮也又用犬鹿然豻之皮以為􅍜者蓋喪服之中雖不治人事而防身之道不可不謹獸之害人以其皮而為之防亦示服猛之義然喪車既無他飾而戈㦸之弢與小服刀劒短兵之類必言之者自衞其身不可不謹與書曰虎賁百人逆子釗於南門者是也又喪車五乗貴賊皆同者惟喪不辨貴賤自天子達于庶人皆終三年之喪故有官者必曰解官持服與無官同劉執中曰三年之喪皆乗惡車謂木車也齊衰之喪皆乗素車大功之喪皆乗薻車小功之喪皆乗駹車服緦者乗漆車賈氏曰天子至士喪車五乗尊卑等則大夫士禫亦得乗漆車與吉同者禮窮則同也服車五乗孤乗夏篆音瑑卿乗夏縵莫干反大夫乗墨車士乗棧才産反車庶人乗役車鄭康成曰服車服事者之車夏篆五采畫轂約也鄭司農曰篆讀為圭瑑之瑑王氏曰夏篆以采篆飾車也項氏曰孤主𢎞化故夏篆以象文徳之敷夏縵亦五采畫無瑑爾王氏曰墨車墨而不采鄭鍔曰以革鞔而漆之者項氏曰墨車無五采而其色幽北方之智也大夫以智帥人者賈氏曰棧車不革鞔而漆之者此則冬官棧車欲弇恐有坼壊也王氏曰棧車則無飾矣考工記只棧車欲弇飾車欲侈墨車以上皆飾車也項氏曰士棧車唯質而無飾弇而不侈則以士主事人鄭康成曰役車方箱可載任器以共役王氏曰謂之乗非特載任器而已項氏曰以庶人主役故名役車詩云有棧之車行彼周道黄氏曰庶人府史也服公事者皆乗公車鄭鍔曰貴者乗車賤者徒行古之制也此言服車五乗上不及三公下乃及庶人盖三公非不乘車坐而論道不可以服事言孤卿大夫有爵雖貴亦當作而行事乃自孤卿所乗者言之庶人則􅃌府史胥徒在官者非在官之庶人亦徒行耳胡為掌其車耶五色謂之夏染人所謂染夏是也孤之車轂畫以五采而篆之卿車雖五色則縵而不篆篆以見其文之著縵以言其文之不足也孤尊矣宜别異於卿卿又宜異於大夫大夫乘墨車則鞔之以皮而漆焉又不及於夏縵之文大夫又宜異於士士乗棧車則不革不漆又不及於墨車之飾士又宜異於庶人故乗役車為方箱以載任器又不及於棧車之純素尊卑之分上下之等皆即乘車見之王氏詳說曰周禮有言公而不及孤有言孤而不及公有併言公孤典命王之三公八命其卿六命此言公而不及孤巾車云孤乗夏篆卿乗夏縵此言孤而不及公射人云三公北靣孤東靣三公執璧孤執皮帛此併言公孤人臣受君之命莫大於車服何王之三公八命所乗之車不見於巾車所衣之服不見於司服蓋周制外而五等諸侯其車服有常制内而五等諸臣其車服無常制豈非以諸侯逺王而諸臣近王近王而無常制者正所以别嫌使八命六命四命皆從其所命之車服得無嫌乎詳攷公卿大夫之制大率相為異同司服無三公之服者服下同於孤巾車無三公之車者車下同於孤三公下同於孤而大夫亦上同於卿盖卿大夫同於西靣又同於𤣥冕者以此劉執中曰諸侯之孤猶孤也卿大夫猶卿大夫也上得以兼其下則孤備服車五乗矣其貳車則各從其命數是以天子之孤貳車六乗大夫四上士三巾士二下士一乗所建旂斿如其貳車之數凡良車散素旱反車不在等者其用無常賈氏曰良車散車不在服車五乗之等列精作為功則曰良王昭禹曰良車與良裘之良同謂其質之甚善也麄作為沽則曰散王昭禹曰散車與散樂之散同謂其非法度之所用王氏曰自役車以上皆有等者其用固有常餘或良或散惟所用而已易氏曰或以共在上之恩賜或以共在公之役使故其用為無常李嘉㑹曰良車在五乗之上散車在五乗之下此非制度所闗故其用無常凡車之出入歲終則㑹之賈氏曰出謂出給官用入謂用罷歸官於當時録為簿帳至嵗終則緫㑹計完敗多少以入計㑹凡賜闕之鄭鍔曰君於有功之臣則車服以庸有用以賜臣下者不必㑹計闕之可也王昭禹曰凡賜無常惟上所用故闕而不㑹不可以有司之法制之毁折入齎音咨于職幣杜氏曰齎讀為資資謂財也乗官車毁折者入財以償繕治之直李嘉㑹曰取之而車不佳則必不取其過在造車之工取之未久而折壊其過在乗車者如此則造者取者皆致謹矣黃氏曰戒其不謹敬毁敗公車雖入齎而以共賜予不茍於財也鄭鍔曰為職幣掌餘財故爾大喪飾遣弃戰反車遂廞之行之賈氏曰遣車言飾還以金象革飾之如生存之車但粗小為之耳鄭氏曰遣車一曰鸞車鄭康成曰廞興也謂陳駕之行之使人以次舉之以如墓也王氏曰廞之於宫行之以適墓及葬執蓋從才用反車持旌鄭康成曰從車隨柩路持盖與旌者王平生時車建旌雨則有蓋今蜃車無盖執而隨之象生時有也賈氏曰執旌在柩車之前而文在下者以執蓋是巾車因言持旌非謂持旌亦從車及墓嘑啓闗陳車鄭康成曰關墓門車貳車士喪禮下篇曰車至道左北靣立東上賈氏曰鄭知車是貳車者以其遣車在明器之中案既夕陳明器在道東西面此不言明器而别陳車是貳車可知天子貳車象生時當十二乗小喪共匶路與其飾鄭康成曰柩路載柩車也飾棺飾也歳時更續共其弊車杜氏曰更續更受新共其弊車歸其故弊車也鄭鍔曰物之弊若不有以續之則無以繼每歳以時更而續之則車不闕於用材之尚可用者不可以盡棄車雖已弊亦共於車人則工不闕於材已弊之車猶且擇其可用者而用之古人為國愛財如此大祭祀鳴鈴以應雞人鄭康成曰雞人主呼旦鳴鈴以和之聲且警衆必使鳴鈴者車有和鸞相應和之象項氏曰鈴和鈴也詩和鈴央央升車則馬動馬動則鸞鳴鸞鳴則和應則和鈴主應故大祭祀雞人呼旦以鈴應之鈴在旂亦以将駕玉路以行禮周禮訂義卷四十五
