body:
  text: 周禮訂義卷七十六宋王與之撰冬官考工記下玉人之事鄭鍔曰􅅣玉為器非一器也故曰玉人之事君子於玉比德德有小大故玉有純雜之異焉追􅅣之巧皆自玉人而制度所寓玉人有不知其妙理者此所以謂之事王氏詳說曰考工記多戰國間故事惟玉人一職與典瑞同但典瑞言其名以及其用玉人言其名而又及其所制之尺寸豈非玉人為之典瑞掌之乎此所以為周制也然文經秦火非錯則闕不若典瑞之文為有倫理也典瑞以王晉大圭以下為一節自四圭有邸以下為一節自珍圭以徵守以下為一節自駔圭璋璧琮以下為一節而五禮之用畢矣玉人所載固詳於典瑞何其文錯且闕乎言公侯伯之圭而不言子男之璧言繼子男而不言孤言案十有二而不言王后凡皆闕文也言天子圭中必當在天子服之之下不容間於皮帛之後言天子用全上公用龍侯用瓉伯用将當在宗祝以前馬之下不容間於以朝諸侯之後言瑑琮八寸諸侯以享夫人當在璧琮以享天子之下不容間於旅四望之後大璋亦如之諸侯以聘女當在天子以聘女之下不容間於宗祝以前馬之後宗后以為權當在天子以為權之下不當間於以治兵守之後璧羡度尺以為度當在宗后以為權之下不容間於琰圭易行之下宗后守之當在天子守之之下不容間於宗后以為權之下以至四圭兩圭圭璧璋邸射當為連文琬圭琰圭瑑圭璋當為連文亦不容間斷凡此皆錯文鄭氏雖知不言子男之璧為闕文其他無一言之此所以不容無失今改其文讀之玉人之事鎮圭尺有二寸天子守之大琮十有二寸射四寸厚寸是謂内鎮宗后守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸七當為五謂之躬圭伯守之缺二句繼子男執皮帛缺一句天子執冒四寸以朝諸侯大圭長三尺杼上終葵首天子服之天子圭中必四圭尺有二寸以祀天兩圭五寸有邸以祀地以旅四望圭璧五寸以祀日月星辰璋邸射素功以祀山川以致稍餼祼圭尺有二寸有瓉以祀廟大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以廵守宗祝以前馬天子用全上公用龍侯用瓉伯用將土圭尺有五寸以致日以土地琬圭九寸而繅以象德琰圭九寸判規以除慝以易行瑑圭璋八寸璧琮八寸以覜聘牙璋中璋七寸射二寸厚寸以起軍旅以治兵守璧琮九寸諸侯以享天子缺二字瑑琮八寸諸侯以享夫人穀圭七寸天子以聘女大璋亦如之諸侯以聘女璧羡度尺好三寸以為度駔琮七寸鼻寸有半寸天子以為權駔琮五寸宗后以為權案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯缺數字鎮圭尺有二寸天子守之鄭鍔曰鎮圭王所執圭也以十二寸為度灋天數也瑑山以為飾取其安靜而不動惟天子灋天之大數惟天子能安天下而不撓居則守此圭以保其國不可以不知守之之道也能守其圭可以君天下而朝萬國命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之鄭鍔曰受於天子而天子以䇿命之使執是圭故曰命圭命如春秋錫命之命其九寸者􅅣為桓楹之象曰桓圭公於國家如柱石然故執桓圭趙氏曰桓圭琢刻䨇直文在圭上注云䨇植謂之桓桓宫室之象所以安其上也盖公藩屏王室以桓為象者禮書謂取强直不撓以安上為已任之意其七寸者或􅅣為人身之伸者曰信圭或􅅣為人身之屈者曰躬圭則侯與伯守之盖侯比於伯其禮為稍伸而伯視於侯其勢為稍屈故也能守之然後可以保其國鄭康成曰命圭者王所命之圭朝覲執焉居則守之愚案餘說見典瑞王昭禹曰上公九命侯伯七命其禮儀各視其命之數故其圭有九寸七寸之差王氏詳說曰天子之圭言尺寸而不言厚薄以宗伯内鎮圭之文則知廣四寸厚一寸矣諸侯之圭言尺寸而不言廣厚以雜記之文則知廣三寸厚半寸矣王昭禹曰大宗伯作六瑞則制其度數執之以行禮故皆言執行人成六瑞則奉其成事用之以合符故皆言用玉人斵玉以為器器以藏禮而守之以保其國故皆言守鄭鍔曰玉人則作之而已或成其信或著其禮皆非所知也盖作在此守在彼天子執冒四寸以朝諸侯趙氏曰冒所以冒諸侯圭以齊信瑞方四寸邪刻之盖冒圭之制邪刻其下以為驗其形則方正其大則四寸天子命臣為諸侯則班瑞玉與之使守之以為寳及其來朝則輯而合之以為驗故諸侯瑞圭則邪銳其首天子冒圭則邪刻其下以邪銳之圭首合天子之冒一則表君徳之無不覆鄭康成曰名玉曰冒者言德能覆盖天下一則驗諸侯之無僭禮相踰以四寸者或謂象德冒四方鄭鍔曰鎮玉大圭或尺二寸或三尺而冒圭特以四寸為度者盖有以大為貴者亦有以小為貴者以大為貴使諸侯不得以並其尊以小為貴則四寸以示其冒四方之意與書所謂丕冐海隅出日之冒同或謂取其形之方正以上率下當方正也或謂天子以貴臨賤常患於驕以尊接卑常患於亢故諸侯之圭或九寸或七寸而天子朝諸侯之圭則四寸示其以少為貴而屈已以接下也此乃新意兼本注說極好陳用之曰天子諸侯之玉用則執之居則守之或言守或言執相備也天子用全上公用龍侯用瓉伯用将鄭鍔曰此言裸圭也天子之裸圭則全用玉以為之龍以前注瓉以成鬯将以執持趙氏曰裸器一物也其名有三其頭有龍口故謂之龍其中有瓉如盤如盞様盛鬯酒在内故謂之瓉即詩玉瓉黄流在中也後有柄用圭以為之所以為人把執而用之者凡此三者用一玉而俱成故謂之全盖天子之德純而不雜故用全以崇其德之純也若夫公侯伯而下則其德殺於天子矣故其用玉亦從而降殺上公用祼器之龍如天子之龍用玉其瓉其将皆石之似玉者為之侯用祼器之瓉如天子之瓉用玉其龍其将皆石之似玉者為之伯用祼器之将如天子之将用玉其龍其瓉皆石之似玉者為之以器言之龍處其首瓉處其中将處其後以德言之公居其上侯居其中伯居其後則次第不為無意也盖不貫三而為一無以表天子之德之純不裂一以為三無以見諸侯之德之虧尊卑隆殺之義明矣康成云全純色也其說是矣乃謂龍瓉将為雜名而言卑者下尊以輕重為差玉多則重石多則輕公侯四玉一石伯子男三玉二石不知此非論其輕重也王安石之說亦然皆未之思也其曰用龍者如記言夏后氏以龍也用瓉者如經言裸圭有瓉也用将者如詩言祼将于京也将圭柄也惟柄可以執而用故曰将不言子男所用者大行人言子男不酢則不用祼器此所以不言也王氏詳說曰此四句疑在宗祝以前馬之下繼子男執皮帛趙氏曰帛以表其道足以衣被人皮以表其有炳蔚之文章鄭鍔曰有天子之孤有諸侯之孤大宗伯曰孤執皮帛者天子之孤也典命曰公之孤四命以皮帛眡小國之君者諸侯之孤也二者皆執皮帛特所用以飾之皮異耳飾以虎皮者天子之孤飾以豹皮者諸侯之孤天子之孤不當繼子男之後故康成以為此公之孤也然典命又有諸侯適子未誓則以皮帛繼子男之文則公之孤與諸侯適子之未誓者皆執皮帛而列子男之後歟此文獨立上無所承意其斷簡失次也天子圭中必鄭康成曰必讀如鹿車縪之縪謂以組約其中央為執之以備失隊劉迎曰詩瞻彼洛矣有曰鞸琫有珌釋者謂天子玉琫而珧珌知琫之有珌則知圭之防失隊者其執之中必有珌以約之也趙氏曰必者取可必其無失之意王氏曰天子平旦而櫛冠日出而視朝一物不應亂之端也冝兢兢業業以致其謹焉故執此以為之戒賈氏曰案聘禮五等諸侯及聘使所執圭璋皆有繅藉及絢組所以約圭中央即此中必之類此不言諸侯舉上以明下鄭鍔曰特言天子之必者尊王之意四圭尺有二寸以祀天趙氏曰案典瑞注云中央為璧圭著其四面又云邸本也圭本著於璧四圭有邸謂圭末四出然未知璧在中央通兩畔緫為尺二寸或除璧兩畔圭各長尺二寸據下文祼器尺有二寸則恐一圭長尺二寸今觀典瑞䟽謂用一大玉􅅣出中央為璧形亦肉倍好孔四面􅅣出四圭各尺二寸與鎮圭同其璧為邸徑六寸緫三尺與大圭三尺等皆一玉俱成兩圭祀地者亦然據此則四圭是就璧平出不是植立起者邸則於璧中􅅣成㝢穴然邸言宿邸歸着處也此圭乃植在神坐前欲天神降而依憑託宿於其中如人有旅邸相似此是禮神之玉非事神所執之玉書云植璧秉圭是也夫銳首曰圭凡物銳則利用故銳圭以象其用之利必四圭者象天德之覆無乎不周必尺二寸者又以象天之成數璧貟則象天之體然不特祀天知此旅上帝亦以之王昭禹曰於典瑞言邸於此言尺有二寸互相備也大圭長三尺杼上終葵首天子服之王昭禹曰典瑞所謂王晉大圭以朝日是也鄭鍔曰長至於三尺所以謂之大鄭康成曰終葵椎也賈氏曰齊人謂椎為終葵為椎於其杼上明無所屈也杼閷也趙氏曰杼與輪人行澤者欲杼同謂大圭三尺長上頭謂之首今於首處餘六寸令方正如椎頭自六寸下兩畔微殺已下依舊方正鄭鍔曰長三尺者貫三極之道也杼上者所以致用也又為之葵首則圜其體以覆其上殆又攝用以歸體之意歟易氏曰圭以大名象道之體三尺為數象道之成杼上終葵首象道之用鄭鍔曰服之者搢於衣帶之間或謂之搢或謂之服其實一也是圭也亦謂之珽玉藻曰天子搢珽方正於天下也相玉書曰珽玉六寸明自照也玉藻言笏度二尺有六寸二尺者其長六寸其椎陸佃云以寸之葵首計之則有餘去葵首而計之則為不足意其非天子之笏故孔頴逹以為諸侯以下之度豈其然歟由是攷之天子有鎮圭有冒圭有大圭鎮圭冒圭其用有時執鎮圭服大圭者朝日之禮也執冒圭服大圭者見諸侯之禮也然執冒圭以驗諸侯之瑞其用也暫而已王之見諸侯亦未嘗不用鎮圭也大宗伯小行人之言鎮圭皆繼以公侯伯子男所執之玉明朝見諸侯皆用鎮圭之意土圭尺有五寸以致日以土地鄭康成曰致日度景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而制其域鄭鍔曰或謂測日景以驗地之逺近必由尺有五寸者何耶盖天地相去三萬里尺有五寸以知其一萬五千里也立八尺之表以度景至否冬至之景丈有三尺而夏至則景尺有五寸也正以夏至之景為圭之長則可以知地中也然土圭之用非惟以度日景又以土地故不可以用丈有三尺為之何則建國封諸侯度地之灋景一分差百里尺有五寸者一萬五千里之景也五等諸侯惟取五分景已下無取尺寸之意陳用之曰土圭非特可以致日又可以致月致日者冬夏致日是也致月者春秋致月是也若堯典所謂敬致者特夏之時然爾冬至之日亦可以致焉盖夏至者短之極冬至者長之極春秋二分日於是乎中不可以致矣於是用之以致月焉玉人制其器故言其用之所至典瑞辨其用故言其用之所該大司徒用之求地中故止言測土深正月景而已祼圭尺有二寸有瓉以祀廟薛氏曰圭璋其柄也瓉其勺也柄則圭璋純玉為之勺則玉多石少者可矣鄭司農謂瓉四玉一石是圭瓉璋瓉則玉為之圭璋之勺則裝以金焉玉人所謂黄金勺青金外是也鼻寸所以流鬯也衡四寸勺徑也圭璋瓉制盖如此王氏詳說曰舊圗以瓉下有盤口徑一尺其說出於鄭氏固然矣然瓉盤之制出於漢儀六經所載初無此事陸氏謂瓉形如盤徑四寸鼻上寸為龍形圭璋為柄當矣但陸氏以黄金勺青金外朱中鼻寸横四寸有半謂勺為龍口矣復有杜氏之說以勺為尊中之勺何其依違两間乎盖勺之事一而其制有二明堂位曰夏后氏龍勺商之䟽勺周之蒲勺此謂尊中之勺也此曰黄金勺者謂圭瓉之首鼻勺之勺也杜氏鄭氏分為二說惟鄭氏之說為優鄭鍔曰圭瓉以祼前有龍中有瓉後有圭以為柄此言祼圭尺有二寸而又曰有瓉則不兼瓉以言尺寸盖其圭之長如此也王所執以祼則灋天之大數也冝矣天地大神至尊不祼唯人道之宗廟有祼而已故曰以祀廟也祼圭夲以祀宗廟為主先王以事神之道事賔故因而用之於賔客耳如四圭有邸以祀天而典瑞又曰旅上帝也論其本意則為祀天設而已玉人言其制作之本意典瑞言其所用之備也琬圭九寸而繅以象德鄭康成曰琬猶圜也趙氏曰凡物員則順方則逆圭圎其首是以順為義繅藉圭之物文采在上錫命是文事故以繅象燦然相接之文此是王使之瑞節諸侯有德王命賜之如天王使毛伯來賜公命使者遂執琬圭以致命焉象德象王者親愛諸侯之德或謂象諸侯有德鄭敬仲曰德出於人性之固有先王乃順而治之好出於人情之常然先王乃順而結之故琬圭則因其銳以順為主也以治德則用之於錫命之時以結好則用之於時聘之際二者皆文事也故又繅之以象德也王昭禹曰典瑞言以治德以結好而此言以象德者惟象德然後可以治德結好也象德言圭之制治德結好言圭之用玉人言其制典瑞言其用琰圭九寸判規以除慝以易行趙氏曰琰之為言剡也謂此圭剡一半至首為鋒芒取戈兵之象半則圎焉判言半也規言圓也半其圓而剡之故曰判規琬圭不剡琰圭不琬琰圭是規圎上出頭尖銳者即書琬琰在西序是也劉執中云易以離為戈兵盖離火也火之形上銳有戈兵之象然判規於圭上雖示惡也亦有仁愛之意以其半尚琬也鄭敬仲曰易行謂諸侯之為不善者以此責之而使改過易惡也除慝謂用之於衆覜之時行人言殷覜以除邦國之慝也易氏曰易行除慝先王之義剡與瑑飾各居其半以示聖人威嚴不可犯之意趙氏曰九陽數也惟辟作福作威非體元用九之君不得用此故二圭同以九寸璧羡度尺好三寸以為度鄭司農曰羡徑也賈氏曰羡為不圜之貌造此璧之時應圜徑九寸今减廣一寸以益上下之袤一寸則上下一尺廣八寸好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環賈氏曰兩畔肉各三寸兩畔共六寸是肉倍好也薛氏曰璧貟九寸好三寸延其袤為一尺旁各損半寸則廣八寸矣然則璧羡袤十寸廣八寸同謂之度尺以十寸之尺起度則十尺為丈十丈為引以八寸之尺起廣則八尺為尋倍尋為常故鬴深十寸内方八寸而為嘉量幣長一尺八寸而為制幣凡此皆璧羡縱横之尺數然也度必為璧以起之則圍三徑一之制又寓乎其中矣度起於羡權起於黄鍾之長先王制器豈徒然哉凡以存天下萬世之灋劉氏曰好三寸者數之始也袤一尺者數之成也貟寸以九者無窮之用廣尺以八者不變之體以三合六而為九以九合一而成十直而行之其用不窮横而置之其體無變立成器以為天下利豈私智乎陳用之曰三者之體皆貟其制皆外實而内虗實者其體也故以肉名之虚者其心也故以好名之因物寓理以謂虚而無物心所尚也圭璧五寸以祀日月星辰賈氏曰圭璧謂以璧為邸旁有一圭易氏曰圭銳以象天之用璧圓以象天之體而其制五寸者殺乎祀天之璧又以象天數之中鄭鍔曰五天地之中數所以象三光運行乎天地之中趙氏曰日月星辰其用照臨不息故以圭而象其用其徃來運轉皆麗於天故以璧為邸以象其託宿於天之意然亦欲星辰之神降而依憑於邸也非祭祀所執與四圭祀天同但日月星辰為天之佐不及天之用為甚大故祀天以四圭而此則殺之止以一圭而典瑞曰圭璧以祀日月星辰是也典瑞不言五寸於四圭言邸不言璧璧即邸也亦互見爾璧琮九寸諸侯以享天子陳用之曰貟謂之璧方謂之琮璧以辟為義琮以宗為義王者父事天母事地盖繼天而為之子故也諸侯之於天子猶天子之於天也其尊之如天故享以璧其親之如地故享以琮天子當陽諸侯用命故璧琮之制同以九寸為度鄭以享為獻是也享必有獻獻指物享言義鄭鍔曰廟中将幣之時用以享獻於天子王昭禹曰小行人合六幣璧以帛琮以錦盖侯伯之享禮也璧禮天之玉也故以享天子琮禮地之玉也故以享后此言享天子而不言享后者以諸侯來享以天子為主故也由此推之則二王後之享用圭璋子男之享用琥璜玉人不言以小行人見之也王氏詳說曰鄭氏不知闕文而以聘禮享君以璧享夫人以琮直欲㣲見其意謂琮不可享天子當用之享后此鄭氏之失也穀圭七寸天子以聘女易氏曰穀善也王氏曰以穀不失性生生而不窮故天子以納徴鄭康成曰納徴加於束帛鄭鍔曰七寸者少陽之數天子而用七寸盖男下女之義易氏曰聘女嘉禮之至善者也王昭禹曰典瑞言以和難以聘女此不言和難盖玉人為穀圭以用於天子聘女為主趙氏曰和難聘女二則通彼此之情而歸之善一則諧夫婦之禮而有嗣續所以二事皆用榖圭以穀是天地至和之氣所鍾大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬趙氏曰自大璋至前馬皆天子巡守過山川祭酌之具盖三璋據為勺柄黄金勺以下據為杓頭盖銳首曰圭半圭曰璋圭以象陽之生物璋以象隂之成事地以終天之功為事山川以成地之功為事故祀山川以璋邸射而廵狩用事於山川亦以璋凡以象隂之成事故也然謂圭璋之勺形制並與圭瓉同是有事山川用此盛酒以灌神之器但圭瓉以圭為柄故謂之圭瓉此以璋為柄故只謂之璋瓉皆用玉為之大璋加文飾用於大山川中璋殺文飾用於中山川邊璋半文飾用於小山川言大璋中璋則知邊璋為小不言小而言邊以特飾其邊如籩之有籩縢籩脣也飾其邊計其分寸得大璋之半注所以言半飾飾謂彫􅅣成文也射四寸謂就璋上剡出一半已上至首令削得尖細以貫勺勺即瓉也其半以下不琰處則為文飾是大璋中璋邊璋寸數雖不同而射處皆尖四寸射如射之貫以象山澤通氣與璋邸射同不射則貫勺不得厚寸則三璋皆如此厚也鄭鍔曰祼圭之盤謂之瓉璋之盤則謂之勺見其所容者少也勺以黄金為内青金為外黄者地之盛色也青者東方少陽之色也中央其地之正位歟地之成物則色以黄為盛也故黄金為勺則山川之位正乎中央而成功之盛也隂之美發生自東青者地道發生之色歟故青金為外則山川之功始見之東方之義也朱中者朱者至陽之色山川雖為隂之聚然實含陽乎中中不含陽則無以發生萬物故以朱飾乎中以象山川者陽氣之藴也鼻寸者圭瓉之龍所以前注勺之鼻則瓉之龍也瓉言龍緫舉其形而言也勺言鼻舉龍之一而言焉以見山川通氣之義也以一寸為度如上文厚寸之意也一寸則十分也十者地數之成也衡横也勺如盤然横乎中央故謂之衡鄭康成曰衡謂勺徑衡四寸者以象山川捍蔽四方之意有繅者用之時當以繅藉為飾以象山川為國之文飾也言天子廵守四方之時所過山川或當有祭祀則用之也必以馬以牲盖馬之為物行地無疆故校人言将事于四海山川則飾黄駒用馬以祭之時宗祝則執此勺以前之盖用馬以祈神也大祝云過山川則用事言宗祝者尊之之辭陳用之曰鄭氏有事山川則用灌焉豈其然乎宗廟有灌求神於隂天地不灌而山川地􅅘豈復灌之云乎大璋亦如之諸侯以聘女陳用之曰以文攷之當繼天子以聘女之後亦如之者亦如穀圭之七寸盖聘女天子以圭諸侯以璋為降殺之等若以繼邊璋之後則邊璋與黄金勺用以酌者聘女加於束帛非酌事禮安所用哉瑑圭璋八寸璧琮八寸以頫聘鄭康成曰瑑文飾也趙氏曰瑑謂有圻鄂瑑起覜視也聘問也衆來曰覜時來曰聘聘禮曰凡四器者惟其所寳以聘可也鄭鍔曰諸侯朝於天子公侯伯以圭而其臣覜聘亦以圭子男以璧而其臣覜聘亦以璧圭之外又加以璋璧之外又加以琮八寸雖降於公而實過於侯伯子男臣非可以踰乎君其分異也或曰據先儒所釋則瑑圭聘天子而以璧享之瑑璋聘王后而以琮享之八寸之制特言上公之臣而已不知經言瑑圭璋璧琮則與圭璋璧琮固不同也五等諸侯以桓信躬蒲穀飾其圭璧而其臣特瑑之而已其制既有降殺則公侯伯之臣何嫌乎圭璋子男之臣何嫌乎璧琮又何嫌乎其制皆八寸必欲强為六寸四寸之說趙氏曰此是諸侯遣臣覜聘乎王之所執非是天子使人於諸侯所用者盖天子有事諸侯遣卿大夫來聘遂執此以見王然上公以九為節而曰八寸者盖璧琮九寸諸侯以享天子此諸侯之臣不得用本君玉故等而降之為八寸也據行人注二王後用圭璋五等諸侯用璧琮諸侯之臣降一等子男之臣不得同本君則用琥璜以此知玉人圭璋琮是五等之諸侯所執至五等諸侯之臣唯上公臣執此八寸其餘則殺而子男之臣則執琥璜經不言二王舉尊以見卑也况乎諸侯之三采三就二采再就而諸臣特二采一就其尊卑隆殺固不待辨而明陳用之曰大宗伯以玉作六器以禮天地四方自蒼璧禮天至於𤣥璜禮北方此六物之制本以禮神而幣亦用之盖此六物者人之所寳用以為幣誠足達情也故天子之於諸侯諸侯上交於天子與夫諸侯之相為禮咸用焉即行人所謂以和諸侯之好故是也此言瑑圭璋八寸璧琮八寸以頫聘則天子使人於諸侯所用以為禮者瑑謂為之文以飾之别於禮神之物故也王昭禹曰於玉人言其長之數以斵玉為器其制存於玉人於典瑞言采就之數以成器然後設飾以為用其禮成於典瑞牙璋中璋七寸射二寸厚寸以起軍旅以治兵守趙氏曰牙璋謂有鉏牙之飾於琰側如牙齒參差而有尖鋒之状故曰牙璋中璋亦然是牙璋之中様者故不言牙而言中以此發兵若後世銅虎符發兵之類軍多則用牙璋軍少則用中璋以中對牙則牙璋大而中璋為小可知王昭禹曰事有大小故有牙璋中璋之異牙有噬齧搏擊之威如爪牙然以牙為象取其能制人而人畏之璋象隂之成事兵隂事也詩以祈父為王之爪牙祈父司馬也兵事正掌於司馬而謂王之爪牙與此意同七寸其長也射二寸則邪剡二寸為牙其下有五寸為體不琰也五中數也五寸之體而加以二寸之琰為七寸七過中數豈非取剛過中以為用有誅戮之象乎鄭鍔曰三璋雖異皆以七寸為度則射皆二寸則以地二生火天七成之軍旅之事赫赫炎炎耀威於天下使人不敢嚮邇則取火生成之數也冝矣易氏曰白虎通曰璋為南方陽極而生隂兵隂也故以起軍旅以治兵守趙氏曰以起軍旅謂發兵必以此為信言軍旅則必有征誅之事也以治兵守則用兵守禦去處以此璋治之使不失其備不必有征誅之事也此與典瑞牙璋以起軍旅以治兵守同彼不言中璋互見也禮書引春秋宋司馬請瑞以命其徒攻桓氏杜預注曰瑞是符節發兵者此事甚親切在哀公十四年駔琮五寸宗后以為權趙氏曰駔注讀為組以玉為琮方而以組帛繫其鼻故名為駔琮亦如以玉飾豆即名玉豆以玉飾案即名玉案也五寸其闊五寸也權謂王后以此為稱錘以稱物之輕重鄭鍔曰權者銖兩斤鈞所由生宗后以組繫五寸之琮以為權盖用之於内也然則獻璽稱絲之用其以此歟毛氏曰玉堅剛之物用以為器庻不損壊因之而麗其灋則灋亦與傳而無窮故先王即璧以為度即琮以為權然不用圭璋者權以等物之輕重冝先平正焉圭璋上銳而下方又長而狹非平正故也璧雖平正然中空不可以為鼻而組無所施惟琮八方其中實足以為鼻故組之為宗后之權陳用之曰謂之宗后以為權以其繼天子理内治為天下所宗故也易氏曰駔琮以為權與璧羡起度之意同盖璧之體圎而象乎天琮之體方而象乎地天地為萬物之所始而萬物之數莫不取灋於天地此權所以取乎琮而度之所以取乎璧也知璧羡起度而度不以璧則知駔琮為權而權不以琮是駔琮可以為權之始不可以為權之用盖權之為器灋度之所自出而政事係焉先王慮其制之不存故託其制於駔琮耳大琮十有二寸射四寸厚寸是謂内鎮宗后守之王昭禹曰琮方以象地故大琮后以為所守之玉謂之大琮則以守内治者玉莫大於此也十有二寸與鎮圭之數同王繼天而為子故備天數后繼天子而致内治故同於王鄭鍔曰琮本八寸爾其射二寸兩旁各射二寸是為四寸四寸之射八寸之琮此所以十有二寸鄭康成曰射其外鉏牙賈氏曰據八角鋒故云鉏牙趙氏曰謂之内鎮者對天子執鎮圭為内天子則執鎮以治外后則守大琮以治内禮書云亦刻山鎮在上如鎮圭又或謂猶天府所謂玉鎮取其鎮壓之意非瑑四山鎮在上二說皆通易氏曰守之為言各有分守之謂也盖天子聽外治必能守是職而後可以鎮乎外后聽内治必能守是職而後可以鎮乎内苟違其守則外内失其政尚奚足以言鎮乎駔琮七寸鼻寸有半寸天子以為權鄭敬仲曰琮有宗之道能為人之所宗者然後能出灋以為權鄭鍔曰駔琮七寸其穿組之鼻則寸有半天子用以為權盖用之於外也然權冝一出於天子后之權以五寸之琮天子之權以七寸之琮者盖内外雖異位皆不可以無權天子之權非不可用於内也以為宗后治内則灋冝出於后也然内之權則出於五寸之琮外之權則出於七寸之琮又以見王與后之權不能無輕重之等易氏曰七成數也以成數為權則成而不可變也五中數也以中數為權則中而不可易陳用之曰天子理陽道后治隂德陽道主變隂則有常而無變焉惟無變故所謂權者不出乎中惟有變故所謂權者不執乎中容有過中之事焉五中數也后之所謂權者不出乎中故其制以五七過中之數也天子所謂權不執乎中故其制以七然天子天道也冝以璧為用后地道也冝以琮為用天子用琮以為權何也盖后地道也其灋止於用琮君則能天而能地可得而兼用焉故為度以璧而為權以琮上焉而天下焉而地無所不該之義也權不用璧而用琮者盖莫髙於天長短之所由生莫厚於地輕重之所由積所以審輕重者冝乎用灋地之器毛氏曰后之權用之宫王之權用之國先王非務為異也亦欲灋度之不壊不幸失其一尚存可資之則也於天子言鼻則后可知言寸有半則后一寸可知兩圭五寸有邸以祀地以旅四望趙氏曰兩圭亦是用玉􅅣成方琮却於琮兩邊􅅣出兩圭相對其圭各長五寸邸者取其托宿之意天則以璧為邸地以琮為邸必以五寸則以地數不過五如書五曰土也此亦植在神坐前欲地􅅘降而依憑存宿於中非所執之玉也此即典瑞兩圭有邸以祀地旅四望玉人制此器故特言其寸數易氏曰兩圭祀地對四圭祀天而言也天以徤為體其德無不周故其用為四圭其數為尺二寸地以順為體其德有所止故半之而為兩圭殺之而其數為五寸知四圭尺有二寸而托邸於璧則知兩圭五寸而托邸於琮瑑琮八寸諸侯以享夫人趙氏曰瑑謂就上雕􅅣成文縷要别於禮神之琮即如上文瑑圭璋璧琮也琮祀地玉諸侯享天子用璧享后用琮則享夫人以瑑琮冝矣上文璧琮九寸以享天子則后在其中天子以九寸至夫人則分卑降用八寸冝矣陳用之曰禮之道施報而已觀后夫人有致飲于賔客之禮則諸侯之於后夫人其有享也冝矣享夫人以琮則享后之用琮亦從可知矣言夫人而不言后舉卑以見尊也先儒不此之思徒泥享夫人之文以謂諸侯自相朝所用致享豈其然乎案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯鄭鍔曰以玉飾案其廣十有二寸每案以棗㮚為列十二案故十二列賈氏曰棗㮚謂案案皆有棗㮚為列十有二者據案十二為數不謂案之上十有二也案餙以玉所以明憑恃以為安者在德也陳用之曰案十有二寸者具成數棗㮚之陳亦以十二之數而加之於案非謂十有二案也趙氏曰棗之為物其實赤㮚之為物其體堅所以取其信敬堅實之義女所用以為贄者春秋𫝊曰棗㮚以告䖍也女贄不過此事在荘公二十四年鄭司農曰夫人天子夫人王氏詳說曰禮天子之妃曰后諸侯曰夫人而天子亦有三夫人矣后夫人皆預於賔客之事案聘禮云夫人使下大夫勞以二竹簋方說者謂諸侯夫人待聘者之禮有竹簋以盛棗㮚而無案及勞二王之後則有案矣是案十有二為后設也鄭氏既知勞二王之後為案十有二矣然不知其闕文乃以為記時諸侯僭稱王而夫人之號不别曾不謂考工惟此一職為周制使夫人之號與王后不别又何以有宗后為權與夫宗后守之之文乎鄭康成曰純猶皆也王后勞朝諸侯皆九列聘大夫皆五列則十有二列者勞二王之後陳用之曰諸侯純九大夫純五謂以棗㮚而列於十有二寸之案其勞諸侯也純以九焉其勞諸侯之大夫也純以五焉不以命數之多寡為節盖厚之也王昭禹曰夫人佐后以致内治王於賔客致酒后致飲而夫人亦致飲王於賔客有膳與饗食之禮而夫人亦致饗食與膳故王勞賔客而夫人亦勞諸侯隂陽相成之義趙氏曰勞諸侯以王后為主然言夫人則王后在其中乃舉卑以見尊也璋邸射素功以祀山川以致稍餼趙氏曰半圭為璋圭象用之利天以生物無不周故祀以四圭地不及天故以兩圭日月星辰不及天故祀以圭璧山川屬地其用亦不及地之大故祀以璋表其得地利之半耳璋邸者就方琮上出一璋以璋而邸於琮琮方所以象地之體以琮為依托之邸所以象山川之麗於地也與圭璧之意同亦欲山川之神降而依存於璋邸中亦植在神坐前非手所執之玉鄭康成曰邸射剡而出也賈氏曰向上謂之出璋首邪却之處從下向上緫邪却之名為剡而出易氏曰射言剡出而貫於邸素功則朴質而無瑑飾之文所以象山川有阻固之功賔客有藩屏之功陳祥道曰王制曰五嶽視三公四瀆視諸侯書大傳曰其餘山川祀者小者視子男周禮諸侯為賔諸侯臣為客山川賔客等衰雖殊其以造贈用邸射一也鄭康成曰致稍餼造賔客納廪食也王昭禹曰以致稍餼則典瑞所謂以造贈賔客也造贈則言造館以贈稍餼則指其物互相備也陳用之曰玉人之事專以治玉而成器然非玉人所治工記之者盖附言耳櫛人闕易氏曰櫛比也雕人闕易氏曰雕刻也磬氏為磬趙氏曰考工名官有假物而名者有假意而名者有直以器而名者如鳬氏為鐘㮚氏為量此假物而名官也如築氏為削鍾氏染羽此假意而名官也至於物無可假意無可取直以所制器名官如輪人為輪矢人為矢與磬氏為磬是也鄭鍔曰磬以石之似玉者為之梁州豫州皆貢而不若徐州之美泗濵浮磬盖取石之浮者為之欲其音之清也先儒謂磬為立秋之音以聲之清故也論韶樂則曰戞擊鳴球論武樂則曰磬管鏘鏘以球為難調也故先王教之有磬師為之有磬氏然有大磬有編磬大磬特懸磬也明堂位曰叔之離磬盖編則離離則特故也王昭禹曰詩曰依我磬聲盖樂器之中磬為最清衆樂依之以為凖也樂記曰石聲磬磬以立辨惟其聲之清故動出而能辨也磬者樂之細也細則大聲為貴故欲其將將焉凡樂大者從細細者從大故石聲主角焉銳瑑而決吻數目而顅脰小體而騫腹無力而輕其聲清揚而遠聞以之為簴則擊之而由其簴鳴矣先王用磬其詳如此倨句音鈎一矩有半鄭康成曰必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也賈氏曰一矩為句據上曲者一矩為股據下直者弦謂兩頭相望者假令勾股各一尺今以一尺五寸觸兩弦其句股之形即磬之倨句折殺也趙氏曰作磬依律長短前長三律二尺七寸後長二律一尺八寸此是黄鍾特垂之磬其他磬皆依律起度倨句一矩有半者謂股與鼔兩處分為兩矩一矩為句一矩為倨注作股字恐錯了雖是股與鼔廣狹長短不同難勻分為兩矩然廣處短狹處却長以此準折恰各占一矩甚均此謂倨句也兩處形様寸數既分作兩矩了却於磬垂下兩角處中間放彎折共要一矩有半此上邊倨句處減半矩據此數是減四分之一此謂一矩有半也以尺寸論之上邊倨句處共四尺五寸則此下邊兩弦之間恰有三尺三寸七分半然所以必要一矩有半者盖此磬體要半折不要帶方折如一矩有半恰好若過此數則太過於直不及此數又忒彎曲印圗謂股廣短鼓狹長以長掩短則鼔長於股者半矩是倨得一矩有半也以廣掩狹則鼓廣於股者亦半矩是句亦得一矩有半也此倨句各得一矩有半之意然則說上邊尺度不見觸兩弦之意矩者只是起數之名如車人半矩謂之宣冶氏以中矩歸於胡以倨句歸於援又匠人以溝洫說水磬折豈皆以方論賈氏曰案樂經之磬前長三律二尺七寸後長二律一尺八寸是磬大小之制此經倨句各一矩并矩半皆假設言其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚鄭康成曰博謂股博也博廣也鄭鍔曰磬以上大者謂之股以其非所擊故短而博陳用之曰股取況於股肱之股盖其體之肥故也磬之下小者謂之鼓以其所當擊故長而狹陳用之曰鼔取名於鼓舞之鼓擊者為前而在内不擊者為後而在外内者在下外者在上故康成謂股外面鼓内面也趙氏曰為一為二為三是分作三節筭分數博為一謂股闊廣一律計九寸股為二謂股長二律計尺八鼓為三謂鼔長三律計二尺七寸三分股博去一為鼓博則鼓廣六寸二分鼔博以一為厚則通上下其厚二寸此黄鍾磬餘皆以律準數已上則摩其旁已下則摩其耑趙氏曰凡樂厚則聲清薄則聲濁已上謂聲太清已下謂聲太濁毛氏曰太清生於厚故摩其兩旁而使薄太濁生於薄不可復摩故但摩其兩端使之短短則勢緩而聲自然清陳用之曰此記其調之之灋周禮訂義卷七十六
