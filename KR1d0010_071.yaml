body:
  text: 周禮訂義卷七十一宋王與之撰輪人為輪斬三材必以其時愚案自此以下皆攻木之工鄭鍔曰有車無輪則車不行為輪不專於一工則輪不精此所以特立輪人之職察車自輪始此輪人所以居衆職之先陳氏曰總而言之謂之車别而言之則車之體有三輿也蓋也輪也合此三者而成名者也總而言之謂之輪别而言之則輪之體有三轂也輻也牙也合此三者而成名者也鄭康成曰三材所以為轂輻牙者也鄭鍔曰轂輻牙各有所冝之木而木有在隂者有在陽者斬之非時則在隂者或失之太柔在陽者或失之太剛以之為轂輻牙必不勝其任故取材之道要當順時仲冬斬陽木仲夏斬隂木因天時之冬夏變木材之隂陽其材必美李嘉會曰三者之材各欲得時三材既具巧者和之王昭禹曰轂輻牙之材生於天而成於人和者天也和之者人也故曰巧者和之鄭康成曰和調其鑿內而合之鄭鍔曰三材以為輪必為之孔入轂入牙皆使得所是之謂和非巧者不能焉百工之制器惟輪人為輪弓人為弓皆曰巧者和之者蓋輪合三材以為之弓合六材以為之惟材之合者多故貴乎工之巧始能調和使不乖戾合五聲以為樂必精於樂如師曠者然後能和其聲合五味以為食必精於味如易牙者然後能和其味轂也者以為利轉也輻也者以為直指也牙音訝也者以為固抱也鄭鍔曰轂者衆輻之所湊唯其中虛則輪得行故老子曰三十輻共一轂當其無有車之用於其無有之處而車賴之以為用蓋唯中虛則運轉必利故曰轂也者以為利轉也陳用之曰轂當輪之中以虛受轊以實受輻輻者所以實輪而湊轂者也其入轂入牙皆以直為貴惟直而不曲則輪賴之以指其所之而不偏側故曰輻者以為直指也周圜轂輻者謂之牙牙輪揉也揉之使兩頭相迎欲其堅固而合抱惟其固而能抱則輪賴之以久而不壞故曰牙也者以為固抱也陳用之曰牙揉木而周圍其外故以為固抱抱者合抱不脫以固其體也牙輮也謂之輮蓋以揉木為之謂之牙以其為之固抱故借齒牙之牙以明義焉牙之生也固抱且其用在旁而上下襲焉者也王昭禹曰惟利能轉惟直能指惟固能抱輪敝三材不失職謂之完鄭鍔曰利轉者轂之任直指者輻之任固抱者牙之任三者各有職矣苟能各當其任至於輪之久而敝猶且各居其職任而不動然後可以命之曰完完也者全而不闕之義莊子曰不以物挫志之謂完望而視其輪欲其幎莫厯反爾而下迆也進而視之欲其微至也無所取之取諸圜也趙氏曰此段是分别察輪之節目據牙輻轂綆四者而言皆謂輪已成而視其所作之善否非謂方制輪之時上文以轂為先輻次之牙次之自內言之至於外也此以輪為先輻次之轂次之自外以及內也方其制輪則自內以及外及其既成而視之則自外以及內事之序如此王昭禹曰轂輻牙分而言之謂之三材合而言之謂之輪言望其輻望其轂而不言望其牙輪兼於牙矣毛氏曰望者逺視也進者進其車而使之行也望為逺視則進為近視進為行車則望為止車迆邪也與既建而迆之迆同戈迆則向上而稍邪輪則向下而稍邪故曰下迆下迆者勢也微至者本也勢以逺而見故必望視之體以近而見故必近視之王昭禹曰輪貴於圜故欲其幎爾而下迆幎如巾之羃物言均致也陳用之曰若巾之幎物然均而無旁突故也鄭鍔曰其至地者微小則其行必戚速其所以取者無他惟取其圜而已蓋輪已圜故能運轉而不滯望其輻欲其揱音蕭又稍爾而纎也進而視之欲其肉稱尺證反也無所取之取諸易以豉反直也賈氏曰凡輻皆向轂處大向牙處小言揱纎據向牙處小而言陳用之曰揱爾而纎殺如手之揱然詩曰摻摻女手手之揱也欲其肉稱者雖以纎殺為善又欲其體之壯不肉稱則體瘦而弱矣肉稱謂如手之揱然而又肉稱之也王昭禹曰易則無節直則無撓曲鄭鍔曰逺而望之入牙者欲其纎近而視之入轂者欲其稱其所以取之者無他惟取其易直而已蓋輻以無節目不撓曲為盡善望其轂欲其眼音限也進而視之欲其幬音疇之廉也無所取之取諸急也鄭鍔曰轂則三十輻之所輳初作時則隱然起後以革挽之眼者隱起之急如人之眼然也幬覆也廉隅也覆之以革革之急而廉見也王昭禹曰幬之廉則下文所謂幬必負幹也幬則幔轂之革廉則廉隅之見於外惟幬之負幹其革急而不緩然後能至是此轂所以取諸急也眼以其顯於外者言之廉以其隱於內者言之鄭鍔曰逺而望之欲其突然而出如人之眼近而視之欲其革之所挽如屋之隅其所以取之者無他惟取其急而已蓋轂以急為盡善視其綆音餅又姑杏反欲其蚤音爪之正也圖説曰不漆而踐地者謂之綆王昭禹曰綆謂輪箄也下文所謂六尺有六寸之輪綆三分寸之二是也薛氏曰鑿牙而其孔向外侵三分寸之二輻外箄輻股外箄則車不掉賈氏曰凡造車輪皆向外箄外箄者鑿輪之外孔大於內孔使蚤入者從外向上承之則蚤不脫而永固矣偏頭大故也故曰外箄鄭康成曰蚤當為爪謂輻入牙中者也輪雖箄爪牙必正也賈氏曰爪入牙中鑿孔必正直不隨邪也察其災側吏反蚤不齵五溝反又音隅則輪雖敝不匡賈氏曰凡植物於地中謂之災此輻入轂中似植物地中故亦謂之災人之牙齒參差謂之齵此三十輻入轂與蚤入牙一一相當不相佹戾亦是不齵也王昭禹曰入牙之蚤入轂之災上下兩相當而無齟齬之不齊則輪雖久敝而無方而不轉之患匡言方也凡物圜則運而轉方則礙而止故也鄭鍔曰輪之外箄為易見故曰視其綆至於災與蚤欲其不佹尤為難見冝察之詳特謂之察其災凡斬轂之道必矩其隂陽易氏曰斬轂之道猶察車之道道無不寓雖察車斬轂皆有道存焉王昭禹曰凡木之生於山南而向日則謂之陽生於山北而背日則謂之隂趙氏曰山南向日雖是陽木然此木之背依舊不向日未免隂氣轂是以一條全木為之既要純乎陽不得不於隂處以火飬之使山南之木皆可謂之陽斬轂者何必更以火飬為哉陽木則足於陽而寡於隂隂木則足於隂而寡於陽必齊其隂陽然後可用以為轂故必矩其隂陽將火養而齊之也鄭敬仲曰傳曰五寸之矩足以盡天下之方斬轂之道所以養其隂而齊其陽者豈徒然哉亦有法而已矣然而本隂陽之理察剛柔之性雖寓於規矩法度之間豈徒形器而已蓋有形而上者之道存焉故曰必矩其隂陽李嘉會曰矩者注謂斬轂之時先就樹刻之既知孰為向日孰為背日背日可以火養其隂而齊乎陽愚謂矩者中分初斬之木以定身隂陽之多少陽也者稹音軫理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃耗又音固鄭鍔曰陽木向陽則受至陽之氣其文必稹密其材必剛蓋陽氣之所鍾也隂木向隂則受至隂之氣其文必闊踈其材必柔蓋隂氣之所聚也王昭禹曰陽木則其體實故稹理而堅隂木則其體虛故疏理而柔稹叢緻也疏不密也堅至剛也柔至弱也稹與疏以文言之堅與柔以材言之鄭康成曰火養其隂炙堅之也王昭禹曰藃若蒸氣出之貌故暴起謂之藃賈氏曰若不以火養隂柔之處使堅與陽齊等後以革挽隂柔之處木則瘦減革不著木必有暴起以火養之雖敝盡不藃暴也轂小而長則柞音窄大而短則摯楊謹仲曰司農以柞與摯為輻非也轂長三尺二寸則兩頭拘定車軸故雖轆轤而不至臲卼大而短則摯卼矣轂圍三尺三寸徑一尺一寸三分去一以為空則中間空寬故轆轤而不迫窄小則迫窄矣鄭鍔曰轂以容三十輻則其長短小大當其法取足容輻而已小而長則輻窄狹而不能容柞迫側而不寬也大而短則轂末淺短而不能固摯動搖而不安也摯與下文無摯而固之摯同是故六分其輪崇以其一為之牙圍鄭康成曰六尺六寸之輪牙圍尺一寸易氏曰田車之輪六尺有三寸乘車兵車之輪六尺有六寸今以乘車之輪言之六分其輪崇以其一為之牙圍則牙圍尺有一寸當分為兩面鄭氏不分兩面只就一面尺有一寸下便説三分牙圍而漆其二若是則輪圍兩面為牙圍共二尺二寸矣實與經意不合今以兩面牙圍共一尺一寸言之則每面各得五寸半共為尺有一寸如此而後合六分取一之數參分其牙圍而漆其二易氏曰牙圍每五寸半合先以四寸半分之每分得一寸半是漆其二者為三寸其一不漆者為一寸半外餘一寸三分之是漆者得三分寸之二兼上三寸共為三寸三分寸之二不漆者獨得三分寸之一兼上一寸半以半寸為十五分三分寸之一作十分是不漆者共為一寸三十分寸之二十五鄭氏謂不漆其踐地者也如牙厚一寸三分寸之二之説此以意推之非經之正文皆有所不取椁其漆內而中詘音屈之以為之轂長以其長為之圍鄭司農曰椁者度兩漆之內相距之尺寸陳用之曰不謂之度而謂之椁則義取諸棺槨謂自外圍之則以度其內焉王氏曰槨其漆內而中詘之以為長則長短得矣將論轂圍而先牙圍者轂之小大長短以牙圍為法凡輪牙之砥踐地而行固無事漆牙之兩旁與土相摩亦不必漆漆者指牙之兩旁而言非計其踐地易氏曰若謂牙厚一寸三分寸之二便為漆內則非矣既曰漆內安可便以牙厚計之漆內之制未明則轂長三尺二寸圍徑一尺三分寸之二亦非也今以經之文意推之除不漆其踐地者只據漆者三寸三分寸之二則兩面為七寸三分寸之一兼上輪崇六分之五為五尺五寸是漆內共得六尺二寸三分寸之一中詘之為三尺一寸三十分寸之五此轂之長也亦所以為圍以其圍之阞音勒捎音蕭其藪音叟鄭康成曰阞三分之一鄭鍔曰阞者分散之義初無定數凡物之餘數則謂之阞如王制言祭用數之阞蓋取經用之什一以為阞也如易之大衍言歸竒於阞蓋取四分之餘以為阞也捎除也藪者轂空壺中也疏云轂必大頭寬小頭狹當輻入處謂之藪中處寬而已名曰藪者冇取於蜂窠孔藪之義也鄭氏謂圍之阞為三分寸之一以其藪徑三寸九分寸之五也王氏取繫辭之阞為説謂阞者四分之一也圍既三尺二寸矣取其四分之一以除藪則藪凡八寸矣然下文賢徑六寸五分寸之二與此藪徑三寸九分寸之五然後小大相稱以為八寸恐大小不等矣則阞當為三分之一從鄭説可也易氏曰老子曰三十輻共一轂當其無有車之用注無有謂空虛轂中空虛輪得行以一轂之圍得三尺一寸三十分寸之五而為三十輻之所湊苟藪孔稍廣則轂之力弱而有不勝任之患故三分其圍而除一為藪圍三尺一寸三十分寸之五以此三分之只得一尺尚餘一寸三十分寸之五以一寸為三十分又三之為九十分以三十分寸之五為十五分共得一百五分三分之一則為三十五分是藪之制得一尺九十分寸之三十五藪中大小穿皆以金錮其內而貫軸焉五分其轂之長去起吕反一以為賢去三以為軹賈氏曰上經言轂空壺中此言轂大小兩頭鄭司農曰賢大穿也軹小穿也楊謹仲曰三分轂之長二在外一在內在內為大頭其空寬則賢也在外為小頭其空狹則軹也賢與軹以金為之圍厚一寸置之轂頭空之中用以拘其軸使之久而不敝也以其轂之長五分去一以為賢之圍則其徑六寸五分寸之二金厚一寸故其空徑四寸五分寸之二此藪之所捎者為寬也鄭鍔曰若依經文去一為賢則大穿徑八寸十五分寸之八大小俱不等故鄭氏以去一為誤賢者才有過人之稱車轂大穿謂之賢亦以其過人之意以其轂之長五分去三為軹之圍則其徑四寸十五分寸之四金厚一寸故其空徑二寸十五分寸之四比藪之所捎者為狹也故疏以為當輻之處寬狹處中是矣王氏曰謂之軹者蓋轂以利轉至軹而窮焉有冝只之意易氏曰轂長三尺一寸三十分寸之五圍三徑一則圍三尺者得徑一尺尚餘一寸三十分寸之五以一寸為三十分又二之為九十分又以五分三之為十五分共得一百五分三分之一為三十五是藪之徑亦得一尺九十分寸之三十五與藪相稱焉五分去一以為賢以一尺五分而去一得八寸以九十分寸之三十五而三之為二百七十分寸之一百五五分去一則得二百七十分寸之八十四是賢徑為八寸二百七十分寸之八十四去三以為軹則半賢之數是軹徑為四寸一百三十五分寸之四十二然賢徑倍於軹則大穿為太大宜以去一為去二然則大穿去五分轂長之二亦得六寸二百七十分寸之六十三愚案此説與注疏不同始於以牙圍兩面共作尺一寸容轂必直陳必正施膠必厚施筋必數音朔幬必負幹鄭康成曰容者治轂為之形容也鄭鍔曰轂以運轉不直則輪不可行故治轂而為之形容必欲直而不曲易氏曰如凡為甲必先為容而已趙氏曰轂約也不專指軹而言蓋轂以革鞔之約謂鞔也於鞔之上而飾以采色如巾車孤乘夏注亦謂夏五采畫轂約也陳設其采之文則欲正而不邪陳用之曰陳先儒以為轂約夏夏縵未審所謂孤乘夏卿乘夏縵對大夫乘墨車士乘棧車為言豈止謂轂乎此所謂以識之若下文二在外一在內鑿之廣深之類則其為之也必有以識而定之陳必正惡其偏而差也毛氏曰謂刻其轂而陳列其絲以約也易氏曰采以約之謂之轂之有約以待施筋施膠幔革之用苟或不正則幬何以負幹故必欲其正既正矣然後施膠以附麗之必欲其厚施筋以固結之必欲其數鄭鍔曰膠所以附離異木以為固薄而不厚則附離者有時而解剝筋所以纒束柔木以為堅疏而不數則纒束者有時而柔弱陳用之曰凡用筋之法縱之則其體往而緩數之則其體束而急也以革縵轂謂之幬革與木相附麗則轂必急革若不隱著於木是之謂不負幹不負幹則是有盈不足而轂必急矣故幬欲負幹陳用之曰負如背有所負然著於體上故也既摩革色青白謂之轂之善鄭鍔曰以革縵轂矣則以骨丸之丸之已乾又以石摩之摩之然後漆焉若既摩而革色青白是為轂之盡善蓋青者東方之陽白者西方之隂隂陽均調故其色青白則知其剛柔得所矣所以為美之至參分其轂長二在外一在內以置其輻趙氏曰三分轂長二在外一在內者此是論置輻於轂相去逺近之法外謂轂之趨軹處內謂轂之趨賢處陳用之曰外謂旁出之端所謂軧者是也內謂向輿之端向於內者也與輿相近以轂長三尺二寸三分之以二分為外以一分為內於二者之間而置輻焉陳用之曰所謂藪者是也注云令輻廣三寸半除輻箄轂之處則輻內有九寸半輻外有一尺九寸此説是也然所以在外數多在內數少者蓋一車用兩轂而兩轂之間置輿輻內數少則兩輪近輿有倚靠處自然牢固而行得穩輻外數多則轂行無所礙轂欲止時其轂體長可以持住經所謂車止則持輪是也所以內外有多寡之分易氏曰經文既言三分轂長則當復除輻廣二寸半謂轂長三尺二寸亦未為當今以經之文意考之則知轂長三尺一寸三十分寸之五以三尺言之二在外則得二尺矣尚餘一寸三十分寸之五以一寸為三十分又三之為九十分又以五分三之為十五分共為一百五分是二在外者得二尺九十分寸之七十其一在內者得一尺九十分寸之三十五於二在外一在內之中而置輻焉凡輻量音良其鑿音造又如字深尸鴆反以為輻廣趙氏曰鑿即是藪所以容輻災者注謂以深為廣各三寸半方相應蓋轂鑿三寸半然後能受輻之入輻廣亦如之然後稱鑿之受所以三寸半者以圍之阞捎其藪而知之轂徑一尺三分寸之二今三分取一作空中空中徑三寸九分寸之五兩畔得二分恰有七寸九分寸之一兩廂分之一畔得三寸九分寸之五故輻深廣各三寸半鄭鍔曰鑿以容輻之廣必欲與鑿之深相稱使無有餘不足斯無危槷之患輻廣而鑿淺則是以大杌音兀雖有良工莫之能固鄭康成曰杌搖動貌鄭鍔曰苟輻廣三寸半而鑿孔太淺不及三寸半則所入不深不深則不固必大隍杌而動搖矣雖有良工無所施其巧而使之固也鑿深而輻小則是固有餘而強不足也鄭鍔曰轂大而鑿孔得深其輻亦冝大苟輻小而鑿深二者不相稱或失之有餘或失之不足轂大鑿深可謂有餘矣輻小不及其深可謂不足矣以是而相入所謂固其有餘而強其不足也如是則輻失於太弱安能勝轂之所任乎故竑音宏其輻廣以為之弱則雖有重任轂不折趙氏曰竑謂度也弱輻災也鄭鍔曰此弱與前文所謂災理則一也輻入轂中謂之災亦謂之弱度其輻之廣狹以為災之大小長短則災與輻其力相稱雖任重載轂亦不毁陳用之曰天下之理強弱不兩立強在此而弱在彼鄭氏謂災者是也轂本也輻枝也強弱之名生於相形災而謂之弱則小不可勝大末不可勝本之義也不折則其強可知參分其輻之長而殺去聲其一則雖有深泥亦弗之溓音黏也鄭康成曰殺衰小也賈氏曰假令輻除入轂之中其外長三尺則殺一尺以向牙以本粗末細塗則向下利故泥不粘著之參分其股圍去一以為骹音爻又效圍鄭康成曰謂殺輻之數鄭鍔曰上言殺其一據長短之中殺其一分而已未明其股骹之大小如何也向轂大處謂之股向牙小處謂之骹此蓋以人之足為譬也凡人足髀大處名股脛小處名骹言股以喻大言骹以喻小輻向轂處之圍而三分之去其一以為向牙處之圍假令近轂處圍六寸則近牙處圍四寸矣王昭禹曰以輻三分之長殺一向牙以股三分之圍去一以為骹則本大末小此所以深泥莫之粘也揉輻必齊平沈必均鄭鍔曰木有曲直不能皆易直故以火矯揉其曲者使與直者齊則三十輻之直必等矣木有虛實不能無輕重故平而沈諸水以觀其入水之淺深入深者知其必重入淺者知其必輕從其重者而削之則必平矣陳用之曰平謂其陽平於水面沈謂其隂沈於水下夫揉以求其直沈以求其均者蓋輻之入牙以直為貴故也易氏曰水火無心之物古人善用之而已揉輻以火所以齊曲直沈輻以水所以均輕重齊曲直者取其易直也均輕重者取其肉稱也毛氏曰輻衆則大小患於不齊齊則同強而大小無所偏浮沈各從其類故曰均均則同堅而輕重無所雜於轂與牙不言者以轂與牙所治者一木耳直以指牙牙得則無𣙗魚列反而固不得則有𣙗必足見賢遍反也趙氏曰輻直以撑指者牙也輻資牙以指牙資輻以抱兩者皆要相得而後可鄭康成曰得謂倨句鑿內相應也賈氏曰先鄭讀𣙗為危𣙗之𣙗故更轉從摋後鄭讀𣙗即是𣙗蘇結切云讀如涅謂涅物於孔中之涅又解𣙗字以其用木為𣙗故從木李嘉會曰𣙗即梫七甚反也前曰綆者孔中出外今曰𣙗則梫之木也牙之入輻但必用栘無梫則不固鄭鍔曰輻直而倨牙曲而句倨句之勢難乎相得苟輻之直而指牙牙與輻二者相入而各得其正雖無𣙗亦固也況於有𣙗乎若夫佹戾各不相得雖有木以𣙗之其𣙗不隱必有時而見矣足見謂其𣙗之大也輻之入牙未有不用𣙗而能固者也但二者相得則有𣙗而小似無𣙗焉其勢亦固不相得則有𣙗必大雖大亦不能固上云無𣙗而固非無也必其相得若無也陳用之曰輻與牙相得則其體周密無間可投勢自固矣何以𣙗為𣙗楔也毛氏曰用𣙗則一時之固耳及其服勞之久則牙動於內𣙗必躍而出其足見矣何則無故以合必無故以離故𣙗交牙必鋭其首而厚其末此言末見故曰足六尺有六寸之輪綆方潁反參七南反又三分寸之二謂之輪之固趙氏曰六尺六寸之輪謂兵車乘車也綆即視其綆之綆謂輪箄也注謂車輪外箄則車行不掉蓋凡造車必置綆於輻外一頭入轂一頭入牙所以遮護撑住著輪使行時不至於搖杌也三分寸之二注謂出於輻股鑿之數疏釋云鑿牙之時孔向外侵三分寸之二使輻股外箄據疏之意謂綆在輻外近轂處輻廣三寸半輻是側安者此處甚高必礙住綆綆不容與輻一般排鑿孔使兩頭俱入牙所以鑿轂與牙之時綆鑿孔向外侵三分寸之二疏雖只説鑿牙其實兼轂而言蓋綆那頭必入轂故也所謂三分寸之二者以一寸三分之而得其二也以數計之則綆離輻災爪鑿孔六分有竒如此則綆不被輻髙處閣起又輔助住輻輻有倚靠則車行不掉輪自堅固所以謂之輪之固也據輪人為蓋疏云則向外謂近輿處綆是安在輪之內面外面無有綆然車人為車大車崇三柯綆寸注云綆輪箄綆寸者謂輪之正面外一寸則安乃不止三分寸之二者蓋大車之輪是九尺之輪實牛車也其牙又厚似六尺六寸之輪故綆之鑿孔在牙與轂處相離輻災爪恰好一寸不止於三分寸之二也此段所以指殺言六尺六寸之輪以見六尺六寸之輪綆之制又别也或謂綆兩頭俱入於牙不入於轂此説不然蓋輻中間髙閣住綆綆如何俱入於牙得若使綆一頭不入於轂皆入於牙疏當言出於輻骹鑿數不當言輻股矣輻股是近轂處故也李嘉會曰綆繼𣙗説者綆其孔也𣙗其木也故繼説凡為輪行澤者欲杼音紵行山者欲侔愚案此言牙耳非謂輻也言輪則兼於牙鄭鍔曰凡為輪則所謂牛車大車皆舉焉觀車人為車有行澤者欲杼行山者欲侔之異則知此所謂不專指兵車乘車而已王昭禹曰三分其股圍去一以為骹圍者此輪之常制也至於行山行澤又加損益焉以從其冝是以行澤必於骹圍者薄之故欲杼杼言削薄其踐地者行山必骹股等也故欲侔侔言上下之適侔陳用之曰抒謂殺而鋭也侔謂外內相等而相侔也杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶音團以行石也是故輪雖敝不甐音吝於鑿鄭康成曰附著也摶圜厚也鄭司農曰不甐於鑿謂不動於鑿中鄭康成曰甐亦敝也以輪之厚石雖齧之不能敝其鑿旁使之動鄭鍔曰澤之下溼厥土惟塗泥輪之踐淺處不薄則附著必多而滯留不行苟削而杼之如以刀割塗然塗分裂而自解則有所不能附而車行速矣山之髙峻其地皆犖確輪之踐地處不圜厚則磨磷必速而鑿孔易動矣苟等而侔之如圜物行石然著地者多則不至於偏受其任雖輪已敝而牙之鑿孔亦不動也甐之為言動也毛氏曰澤多泥泥善附附則不利山多石石善掉掉則不穩如刀之割塗言其利之至如摶之行石言其穩之至凡揉牙外不廉而內不挫旁不腫謂之用火之善鄭鍔曰輪所賴以為用者不一而牙者實所以為固抱其揉之也尤不可以不盡善於是又言揉牙之法牙車輞必屈一木以為之屈木而不用火以矯揉之不可得而曲毛氏曰內牙之抱輻也外牙之踐地也旁則牙之兩邊也廉言皮膚之外皺鄭康成曰廉絶也挫言理脈之內絶鄭康成曰挫折也腫言肥內之外腫李嘉會曰腫負起也免此患則為用火之善蓋用火或過或不及惟中為善廉挫者用火之過腫者用火之不及言不柔紉也是故規之以視其圜也萭音矩之以視其匡也鄭鍔曰輪既成矣察之之道又如此萭矩也匡方也趙氏曰輪圜物也中規則可如何欲其中矩蓋以規合之固可驗其不貟處以矩合之其四方四角有不貟處亦可因矩以驗之毛氏曰試輪之法必先規以視其圎衡運生規則規之者用衡也疏謂規之以繩非矣注謂等為萭蔞以運輪上輪中萭蔞則不匡刺者蓋為萭蔞與輪相等而運於其下輪行一圍而不礙則為不匡刺規者仆於地而規之萭則扶而運之使與萭等縣音玄之以視其輻之直也賈氏曰縣謂以輪側於一邊輪輻三十兩兩上下相直從旁以繩縣之兩兩中縣則鑿正而輻直矣水之以視其平沈之均也鄭鍔曰繩所以見其輻之直未知其輪厚薄之善否也又浮之水上以觀之上文言平沈必均言揉輻之時也此則輪已成又置之水欲其平沈之均毛氏曰上載輪之法備矣然所試者一輪而已此又合兩輪於水而試之以觀其浮沈之均則輪之行用力侔矣量其藪以黍以視其同也鄭鍔曰輪之轂空壺中當輻災者謂之藪藪孔藪也兩藪皆欲其無贏不足置黍其中以量其深淺苟其容受皆同則知壺相同矣必用黍者以其滑而齊為易驗故也權之以視其輕重之侔也鄭康成曰侔等也稱兩輪鈞石同則等矣輪有輕重則引之有難易故可規可萭可水可縣可量可權也謂之國工易氏曰此又總括輪人一篇之意大抵注目而視方貟不如付諸規矩之為公騰口而議平直不如付諸準繩之為審援手而度多寡輕重不如付諸權量之為當六者設則天下之為方貟平直多寡輕重者皆不能外是固不容加毫末於其間也鄭鍔曰自規之以視圜至權之以視輕重之侔皆一定之法所當然若夫不必用規用矩不必沈之水縣以繩不必量以黍權以稱皆自然合乎法度可以規可以矩可以水可以縣可以量可以權而試之是則得之於手應之於心出乎技巧之外而非世所能及也是謂國工謂舉國皆無出其右也輪扁斫輪不能以傳其子其子不得而學正謂是歟經言謂之國工者三輪人為蓋廬人為柲與此輪人為輪皆以其難而能至於盡善人不能及也毛氏曰工之作器以意上之試工以法意無常用法有定式然而無不當於法此其所以為國工歟凡謂之國工者名擅一國者也豈一長之足美哉必也試之以難責之以全考之於其終乃可授名焉李嘉會曰聖人寧使人心之朴不欲人心過於巧百工之事未必皆中於法度惟國工而後可輪人為蓋鄭鍔曰輪人之職掌為輪者也又使為車蓋者蓋先王役人固不強人之所不能苟制作相似因其巧智亦足以為者從而任之是亦因任之道輪之與蓋或運乎下或庇乎上用雖不同然貴乎圜則一又況蓋之二十八弓與三十輻之制亦無以異蓋之逹常與桯與轂之制亦無以異則因其為輪又使為蓋何不可之有陳用之曰其工雖同其事則别故特以輪人為蓋目其職事焉達常圍三寸鄭司農曰達常蓋斗柄下入杠中也鄭鍔曰蓋柄有二節達常則下入乎桯桯則上含乎達常名曰達常以其通乎上下無所更變其體有常也鄭康成曰圍三寸徑一寸王昭禹曰蓋之制上為部中為達常下為桯旁為弓達常小於桯桯小於部故非部無以納弓於其旁非桯無以含達常於其中桯音楹圍倍之六寸鄭司農曰桯蓋杠也讀如丹桓宫楹之楹賈氏曰楹者蓋柄下節粗達常一倍向上含達常鄭鍔曰名曰桯者猶屋之有楹所以直而上承王氏曰桯立於下蓋之材賴之以呈露故謂之桯鄭康成曰圍六寸徑二寸足以含達常信音伸其桯圍以為部廣去聲部廣六寸鄭司農曰部蓋斗也賈氏曰部者蓋之斗四面鑿孔內蓋弓者於上部髙隆穹然謂之為部鄭鍔曰蓋斗最處蓋之上者名之曰部言穹窿而髙處乎上部以總衆弓如部伍然也信當為伸取其在下之圍以為在上之徑故以伸言之伸六寸之桯圍以為此部之廣廣徑也桯圍六寸則部之徑六寸徑六寸則圍尺有八寸部長二尺鄭鍔曰部徑六寸正指部言之部長二尺又指達常為部也達常者蓋之上節貫入乎部中者惟其入乎部中故亦可謂之曰部何以言之部尊一枚則不長二尺今曰部長二尺則是逹常長二尺毛氏曰部厚一寸而曰二尺者注謂兼達常言之以其達常之在桯中者出入不時常與部相收故部可以兼達常然則達常在部一寸其不入于部者尺九寸愚案上言蓋圍先以達常起數而後及部廣以見部廣於達常此言蓋之長短止言部長而不及達常以達常上納於部下納於桯人所不見所可見者部與桯耳其實部自是部達常自是達常注以部即達常非也桯長倍之四尺者二鄭鍔曰達常長二尺而桯長倍之則四尺矣倍四尺而又有二則其倍者八尺也以此八尺上含達常之二尺則蓋之髙凡一丈矣人長八尺而蓋十尺雖則立乘猶有二尺之髙不蔽目矣上言達常與桯之圍下言達常與桯之長中言部之廣則蓋之形制大體具矣十分寸之一謂之枚鄭康成曰為下起數趙氏曰以一寸而十分枚計一分也蓋十分為一寸枚只得十分之一故也部尊一枚鄭鍔曰前言部廣六寸未見其髙之如何故於此言其髙尊髙也凡居乎髙者未有不尊故以尊言髙焉蓋斗中之上穹窿而髙其髙者一分毛氏曰部厚一寸又尊髙一分欲其稍峻而髙去水疾故也弓鑿廣四枚鑿上二枚鑿下四枚鄭康成曰弓蓋撩也圖説曰鑿部上災弓者也鄭康成曰廣大也鄭鍔曰四方鑿孔以納弓弓鑿之廣其廣四分故曰弓鑿廣四枚弓鑿之上則餘二分鑿之下則餘四分以鑿廣四枚與上二枚下四枚計之則部凡厚一寸易氏曰弓鑿廣四枚者則鑿孔之廣所以容弓者四分也鑿上二枚者以鑿孔之上無所受而不用力故二分也鑿下四枚者以鑿孔之下有所受而用力多故四分也毛氏曰部廣六寸則圜當尺八寸一寸十分則百八十分蓋弓二十有八每弓居部之四分則總百十二分其所不居者七十二分大抵兩鑿相去才二分有半耳鑿深二寸有半下直二枚鑿端一枚易氏曰上言部廣六寸達常圍三寸則達常入部其徑一寸是達常兩畔猶有五寸則鑿深二寸有半正合兩畔五寸之數而弓鑿不侵達常也趙氏曰下直二枚者注謂鑿空下正而上低二分疏云上云鑿下四枚今於內畔於下亦四枚與外正平故經謂之下直而注謂鑿空下正也上云鑿上二枚今於內畔孔低二分鑿上亦四枚故經謂之二枚而注謂上低二分也下直鑿之下二枚鑿之上此一句指兩事而言也毛氏曰下直二枚者謂在內者向下鑿之其下正二枚爾若其孔則止放一枚是鑿上有七枚為不鑿者也若然則外鑿髙而內鑿低矣蓋不如是無以使蓋弓之上仰故也鑿端一枚者謂部髙一寸今鑿上鑿下俱四枚已占了八枚其中只有二枚在以二枚之中取一枚鑿深放尖故云鑿端一枚端謂鑿頭也所以如此以弓外畔上下方正大四枚今於弓入鑿內處少剡其弓下畔二分於弓尖處又削去一分以納入鑿中使與鑿孔恰好相應如此則弓向處頭仰却以蓋弓三分之近部一分揉放低外二分為宇曲又以衣蒙之則弓雖低而其力常健雖曲不至一向低斜了去注所以云欲令蓋之尊終平不蒙撓也此皆仰其弓故如此若俯其弓則弓自部以下皆低而蔽目矣先儒論蓋鑿有言鑿上二枚鑿下四枚指鑿之外也下直二枚指鑿之內也鑿廣而內狹上低而下正先髙而揉之使下弓本仰而覆之使俯斯言盡之矣易氏曰一枚為一分部廣六寸圍三之則尺有八寸其數不過百八十分而止弓鑿四分而二十八弓已占一百一十二分外止餘六十八分則部中實少而虛多又以弓鑿一百一十二分其深各二寸有半而共湊於達常一寸之徑其數似不相合然古人深察物理上下相制自然堅固縝密非常工所能測識者弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫趙氏曰庇謂覆也軹謂轂末也輪謂輪牙也軫謂輿後橫木也鄭鍔曰車有大小故蓋有大小蓋大故弓長長則所庇者逺弓長六尺謂之庇軹者蓋弓之一面長者六尺對為丈二中有部廣六寸則弓長六尺者蓋大一丈二尺六寸也車輿六尺六寸車兩轂共六尺四寸凡一丈三尺矣以七寸承輿七寸為軌凡減一尺四寸則車之兩軹才廣一丈一尺六寸耳弓之長者共一丈二尺六寸又有宇曲之減故其覆庇所及者至於軹是弓長則其庇逺也故謂之庇軹之蓋長五尺者其庇及輪謂之庇輪之蓋長四尺者其庇及軫謂之庇軫之蓋蓋小於輪輪又小於軹故弓每減一尺短則其庇近也漢世名蓋弓為撩子參分弓長而揉其一鄭鍔曰揉與揉牙揉輻之揉同撓而曲之謂之揉參分弓長而揉其一者假如弓長六尺則曲其二尺也蓋鑿孔之時外畔弓下四分弓上二分內畔上下俱四分由弓頭仰故須近部撓其二尺使平其長四尺以為宇曲也參分其股圍去一以為蚤音爪圍鄭康成曰蚤當為爪鄭鍔曰股與輻之近轂者謂之股同弓之近部者亦謂之股以其大也蚤與輻之入牙者謂之蚤同弓之宇曲者亦謂之蚤以其小也上云弓鑿四枚以弓鑿之廣為股圍圍三徑一則此圍當一寸六分也於一寸六分之數而去其一分以為蚤圍則弓之蚤圍凡一寸十五分寸之一參分弓長以其一為之尊鄭康成曰尊髙也鄭鍔曰前云部尊一枚言部之髙耳若弓之入部則三分其長以其一為之尊假如六尺之弓則以二尺近部為髙也上欲尊而宇欲卑鄭鍔曰弓上近部者二尺則欲髙其長四尺為宇者則欲卑弓之隤下處謂之宇如屋宇然因以名之上尊而宇卑則吐水疾而霤力又反逺鄭鍔曰所以上欲尊而宇欲卑者蓋本為雨設苟上尊而宇卑則其吐水也必速而水之霤所及者必逺矣古人云猶髙屋之上建瓴水言自髙而下其勢速也左氏云三進及霤禮云家主中霤霤謂水流也蓋上髙則霤逺此必然之理蓋已崇則難為門也蓋已卑則是蔽目也是故蓋崇十尺薛氏曰蓋部并達常二尺桯長八尺共十尺也古者以人為法人長八尺二寸為宇曲卑於此則蔽人目髙於此則難為門鄭鍔曰車出入乎門蓋太髙則門不能容人立乘乎車蓋太卑則目無所見古人制蓋之法欲無害於門欲不蔽乎目故以十尺為度鄭康成曰十尺其中正也良蓋弗冒弗紘殷音隱畝而馳不隊音墜謂之國工鄭鍔曰為蓋者必冒之以衣必紘之以帶如紘綖之紘謂以帶而維繫之也冒之紘之則弓有所恃以為固而不墜矣此作蓋之常也若夫善為蓋者無衣以冒無帶以紘以橫馳於隴畝之上殷而馳則行不正隴之上則地不平能使弓不墜落是國工之巧者所為非常才所可及陳用之曰畝平夷之地非謂壟上也殷若殷其雷之義車震地之聲馳之疾則轉而有聲矣總論鄭鍔曰巾車惟王后五路重翟安車言皆有容蓋輦車言有翣羽蓋彼婦人車蓋疑非此輪人所專掌也夫車未有不用蓋者而巾車王之五路不言豈所辨者旗物之異當建旗之時無所用蓋故不言歟或謂車之有蓋專為雨設然道右掌前道車言王下則以蓋從又不專為雨而用蓋也反覆考之車有軫以象地有蓋以象天而蓋弓二十有八又以象星王者乘之取法如此則蓋無時而可去也去蓋則象天之道缺蓋去而弓隨則法星辰之道又缺矣設蓋之意恐不專為雨也説者謂五路在祭祀朝覲田獵即戎之時即建旗不用蓋他時在國巡行必設蓋豈其然乎周禮訂義卷七十一
