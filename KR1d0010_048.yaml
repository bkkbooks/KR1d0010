body:
  text: 周禮訂義卷四十八宋王與之撰中音仲下同春教振旅鄭康成曰凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入收衆專於農王氏曰春陽用事非兵之時鄭鍔曰是時兵當藏也王昭禹曰振如振領之振振而整之也方其出則治之以行陳之事均服同食以一衆心無暇整其儀飾及其入焉明尊卑辨貴賤此所以整之也黄氏曰四時之田先教振旅王者之兵出於萬全李嘉㑹曰一嵗之功必因春之興作𤼵生而後萬物成振旅必於春示一勞而永逸也司馬以旗致民平列陳直覲反下同如戰之陳鄭康成曰以旗者立旗期民於其下賈氏曰熊虎之旗鄭鍔曰司徒於大軍旅大田役以旗致六鄉之民遂人於起野役以遂之大旗致六遂之民民之目熟於熊虎之狀乆矣及是時鄉遂之官致之而來司馬亦以旗致之因民之所習熟者使之易知爾王昭禹曰田獵所習無非軍事故平列陳如戰之陣平者髙下如一之謂易氏曰合其衆以成列陳其列以為陳王氏曰雖如戰之陳而平列陣則無事於戰矣辨鼓鐸直各反鐲直角反鐃女交反之用王執路鼓諸侯執賁扶云反鼔軍將執晉鼓師帥執提徒兮反旅帥執鼙薄兮反卒長執鐃兩司馬執鐸公司馬執鐲賈氏曰春夏秋各教其一必春辨鼓鐸鐲鄭鍔曰春陽用事雷始出地於卦為震而韗人冒鼓必以啓蟄之日教以此時從其類也黄氏曰有節制而後能勝金鼓所以節制也故於教振旅辨之王雖親征六卿分將元帥居中甘誓常武城濮陳有古法鄭鍔曰路鼓四面之鼓王於軍中自鼓軍事冝執鼖鼓乃使諸侯執之自執路鼓何邪王道之大無所不通以道統衆不必自執軍中之事李嘉會曰路鼔不類大常非軍事所冝用蓋象人君聲教當四達而無間諸侯從王欲使軍將以下皆聽命故用之於諸侯王昭禹曰鼓之大謂之鼖諸侯以敵王愾為事則執賁鼓鄭鍔曰軍將者卿六各為一軍之將王昭禹曰晉以進為義將以統衆而役敵有進而已故執晉鼓鄭司農曰提讀如攝提之提謂馬上鼓有曲木提持鼓立馬髦上者謂之提項氏曰提鼓之有柄者鄭鍔曰使師帥執之者五百人之衆左提右挈在掌握之意陳氏曰鼙應鼙也大鼓謂之鼖小者謂之應鄭鍔曰旅帥視師帥為卑故執鼙者鼓之小而卑者也項氏曰鼙以令鼓故旅帥執之王昭禹曰軍法自旅而上然後有旗以非旗不足以指麾故也自旅而上然後有鼓以非鼓不足以令衆故也黄氏曰進則患怯退則患紛軍將執晉鼓以鋭其進卒長執鐃以肅其退鄭鍔曰百人之卒長知其當止則止故使執鐃以止鼓二十五人之兩司馬知其當進則進故使執鐸以通鼓五人之長曰公司馬軍制自五人始人之寡不能節制則衆皆無節矣故使執鐲以節鼓其職至卑其名乃同於司馬欲重其權以服人也王氏曰謂之公以别於私亦稱司馬所謂家司馬是也王氏曰鼔陽也尊者執之金隂也卑者執之鐃以止鼓與陽更用事焉故卒長執之通鼓節鼓佐陽而已故兩司馬公司馬執之李嘉㑹曰賁鼓晉鼓提鼙鐃鐲鐸之器考之鼓人或和鼓或節鼓或止鼓相雜成聲以起其歡喜鼓舞之心而寓其進退作止之節踴躍感動而知所防範此金鼓相間而作之意以教坐作進退疾徐䟽數音朔下同之節鄭康成曰習戰法賈氏曰坐作進退疾徐䟽數之節大閲具言於此畧說黄氏曰鄉民自爲六軍以衛天子出則從其教之也不惟四時田獵坐作進退鼓鐸旗物而仁義禮樂之訓行焉故三代之兵皆士也所謂干城腹心非虚語也大司徒施敎法于邦國都鄙使之各教其所治民比閭族黨州鄉一用鄉法教之三代教兵必如此而後可用李嘉㑹曰兵事冝尚威武敏捷必以進退疾徐䟽數教民者觀武王伐商六歩七歩乃止齊焉兵在於結陳之固進退之齊武侯八陣進則皆進止則皆止所以不可破齊之技擊魏之武卒秦之銳士終不可以當桓文之節制者由此而已遂以蒐田有司表貉莫駕反誓民鼔遂圍禁火弊獻禽以祭社王昭禹曰攻鬭而冒矢石人情之所不欲馳騁而逐禽獸人情之所同欲以情之所不欲者寓於所同欲之間此人情樂為之用而四時教戰所以皆寓於田愚按鳥獸之害人者消然後人得平土而居之獵獸於田亦見害去而利可興之意項氏曰春田謂之蒐蒐擇也春恐害物故擇而取之不圍澤不殺胎不夭妖不覆巢不取麛卵是蒐也蓋無事而不田曰不敬暴天物者不以禮蒐而取之敬且有禮矣賈氏曰大自狩田以下云云此亦當如彼春非大備故亦畧言鄭鍔曰將田之初有司行表貉之祭司馬以軍法誓民所謂有司者肆師甸祝也肆師大田獵祭表貉則為位甸祝掌四時之田表貉之祝號則有司謂此二官明矣鄭康成以爲大司徒考大司徒無表貉事其說非也鄭司農曰貉讀為禡禡謂師祭也書亦或為禡鄭康成曰表貉立表而貉祭也薛平仲曰表貉而後誓可以肅衆李嘉㑹曰要之以神則民知敬而節制禁止自冇所持循而不慢鄭康成曰誓民誓以犯田法之罰也誓曰無干車無自後射立旌遂圍禁旌弊爭禽而不審者罰以假馬賈氏曰無干車無自後射者據漢田律而言世假馬謂獲禽所筭之籌爭禽不審即罰去其籌鄭鍔曰雖教之有素一且出田野臨干戈安得不三令五申之此司馬所以誓之也賈氏曰誓民即大閱羣吏聽誓於陳前鼓者即中軍以鼙令鼓鼓人三鼓以下鄭康成曰禁者虞衡守禽之厲禁既誓令鼓而圍之遂蒐田吕大臨曰春者鳥獸孳尾之時君子飬其仁心重傷生物之類至不得已而後取則多取之為暴不如寡取之圍澤掩羣皆多取也取麛卵傷未成之物也大司馬春蒐田遂圍禁則天子合圍矣記言國君不圍澤下於天子也大夫不掩羣則諸侯掩羣矣王制云天子不合圍諸侯不掩羣又云不麛不卵與此異者王制所言不純用周禮也鄭康成曰火弊火止也春田主用火因焚萊除陳草皆殺而火止鄭鍔曰月令仲春之月毋焚山林司馬乃用火田蓋春而焚萊将以田也春而焚山林傷生意也此所以有無焚之令獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻豜于公春田主祭社者土方施生也王氏曰社者土示也賈氏曰此祭社因田獵而祭非月令仲春祭社也中夏教苃蒲末反舍如振旅之陳鄭鍔曰詩曰召伯所苃又左傳言晉大夫苃舍從之凡言苃者皆草舍也教苃舍者教以草止之法賈氏曰草字釋苃止字釋舍軍行而草止未有營壘之所草止之地防患尤嚴防患之道夜事尤急教之無素則是以衆予敵矣教苃舍獨於中夏以月令考之孟春草木萌動季春生氣方盛惟夏之時生於春者至是益長長於春者至是益茂軍屯其中患生不虞又况暮夜之時李嘉會曰春曰振旅猶見振厲威武夏曰苃舍如書所謂敬致南訛蓋陽居大夏長飬萬物于時以苃舎教之見得兵以安集吾民為急羣吏撰息轉反車徒讀書契賈氏曰羣吏謂軍將至伍長各有部分皆選擇其甲士歩卒之等鄭鍔曰晝而戰目足以相識至於夜則惟以耳相聞茍不辨其號名則無以為别故命羣吏各撰述其車徒之數以知多寡之目又讀誦其書契之文以辨名號之用軍中之書契如後世所謂尺籍伍符先儒謂師田之簡稽疑簡稽不可謂之書契撰者述陳之義語曰異夫三子者之撰謂述陳為撰也先儒讀曰筭然有改字之嫌讀其簿書之籍使知其或用名或用號以為别目見耳聞名已習熟則草舎雖在深叢翳薈之中聞其號名皆知其為某人辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事賈氏曰辨號名者此帥以門名已下是也黄氏曰號名為夜事今軍夜有號康成以為徽識被之以備死事夫徽識綴於膞上夜事将何以辨鄭鍔曰帥為六軍之帥鄭康成曰謂軍将及師帥至於伍長公邑閒田謂之縣小都謂之鄙鄭康成曰謂縣正鄙師至鄰長大夫謂之家鄭康成曰謂食采地者之臣鄉謂六鄉鄭康成曰謂州長至比長野六遂也鄭康成曰謂公邑大夫或以門或以號或以邑或各以其名皆有一定之稱為主將者名號若此為卒伍者從而稱之耳聞而心知心存而意屬暮夜之間亦識所從矣帥以門名黄氏曰帥皆卿也王城十二門自國中以達于郊分為鄉六鄉治之是則一鄉二門故以門為號所引東門襄仲桐門右師皆是也易氏曰以所居門名之見平日統御之方蓋門者人之所由以出入帥者人所由以進退取象猶門也縣與鄙一為天子之吏一為公卿王子弟故各以其名所以别異其為某縣某鄙之人大夫用號者則為美稱也鄭謂公卿大夫其身在朝其臣在采地若公山弗擾之類是以家號為名也項氏曰若費若成易氏曰以見平日訓治之素六鄉有六州長鄉之軍法至州而成故以其州之名名之言某州之師也鄭康成曰鄉則南鄉甀東鄉為人是也賈氏曰甀為人皆當時鄉名六遂於鄰長言邑中之政於里宰言掌比其邑之衆寡於遂大夫言凡為邑者此六遂為邑之證也故言某邑之師黄氏曰縣鄙遂兵州六鄉餘兵居四郊者比閭族黨州猶鄉法也獨不為鄉耳故稱州焉甸稍縣都皆野也甸以縣鄙見稍以家見稍不為家縣都不為鄙則亦為邑天子使吏治之而通稱為野王畿之兵盡在此矣都鄙自有主者鄭康成曰百官以其職從王者黄氏曰百官有軍事在軍者各象其事以為號名鄭康成曰夜事戒夜守之事草止者謹於夜於是主别其部職愚按苃舎之教乃下寨法專以辨軍之夜事蓋休兵偃師之時宿火而寢目固無見也銜枚而處耳固無聞也將以鼓鐸而聲之則所聞必亂将以旗物而徽之則所見必昧於是專以號名為尚而號名又必外假者所以防姦細及間諜等事先儒不知夜事與夜戰不同多以管仲内政之作使之晝戰目相視夜戰聲相聞引證司馬夜事在於休兵管仲夜戰所以用兵豈可同日語其他皆如振旅王昭禹曰若平列陳與夫以教坐作進退疾徐䟽數之節皆然遂以苖田如蒐之灋車弊獻禽以享礿餘若反王昭禹曰夏苗在田如去草而已為苖除禽獸之害故也如蒐之法則其他表貉誓民鼓遂圍禁之類皆與蒐同鄭康成曰車弊驅獸之車止也夏田主用車所取物希皆殺而車止賈氏曰車行遲故取獸少王昭禹曰夏田以車為主以物生於春長於夏以車馳逐而取之其利宻於春之用火矣以東山之詩攷之其言曰敦彼獨宿亦在車下則苃舍夜事宜用車矣鄭康成曰王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵賈氏曰引王制者據始殺訖而言毛詩傳云天子𤼵抗大綏諸侯𤼵抗小綏據始殺而言也王制注佐車驅逆之車案田僕掌佐車之政設驅逆之車則佐車與驅逆之車異但王制佐車與田僕驅逆之車為一田僕佐車自是田車之貳曰佐王昭禹曰享礿則所謂以禴夏享先王鄭鍔曰礿以飲為主四時之享皆用孟此中夏而享礿非常祭也蓋因田而享也田已得禽則歸而享祀猶戰而得雋則歸而告廟也然四時之田春秋祭社與祊維冬夏享廟何邪春田為民祈秋田為民報田以民事為主先成民而後致力於神中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書音畫其事與其號焉其他皆如振旅崔氏曰中秋隂氣始肅在於殺物故用治兵為稱王昭禹曰旗物以作戰也故以教治兵辨旗物之用鄭鍔曰九旗曰常曰旗曰旜曰物之類其義不一自王而下以至於百官分而載之各寓意義於其間非茍然也得天而乆照者日月之常治兵載大常所以見王者有常徳而立武事之意凡旗之畫皆二物旂獨畫龍相交非也交與蛟同諸侯於國有君道龍之象也入朝有臣道蛟之象也所以載蛟龍之旂熊虎之噬百獸畏之軍吏者六軍之帥當以威武為先載熊虎之旗使将卒畏威而趨令也通帛則不畫他物純而不雜也師都則公卿大夫王子弟之在都鄙者也爾身在外乃心罔不在王室所以載通帛之旜此言鄉遂又言郊野則師當為都鄙之吏明矣雜帛為物則雜而不一也鄉之分而為六其民散而為比閭族黨之名遂之分而為六其民散而為鄰里都鄙之號可謂雜而不一矣所以載雜帛之物龜有甲以自衛蛇有螫以毒人皆北方之屬也天地之氣始於北方幽隐之所聚而龜蛇者至幽隂之物畫之於旐以示夫殺氣之所始也先能自衛者然後可以殺敵所以載龜蛇之旐書曰我則鳴鳥不聞謂鳳也隼之物主擊殺乃貪殘之鳥也詩曰鴪彼飛隼其飛戾天易曰公用射隼於髙墉之上彼乃鷹鸇之類安可與鳳為伍邪此言鳥隼説者皆以為鳳及隼疑當為鷹隼也與隼共文不可謂之鳳明矣交龍取其能變化熊虎取其有威龜蛇取其能自衛則鷹隼取其勁疾矣百官者六卿之屬欲其臨事之勁疾所以載鳥隼之旟凡行左青龍而右白虎前朱雀而後𤣥武謂此四者然軍法正成於鄉遂而鄉遂大夫乃不預四旗之列而載物者説者謂其象已屬於軍吏已無所將故也凡旗皆謂之載者言載之於車上也既有旌旗又有小徽識之上各書其事與號以為别識也鄭康成曰書當為畫事也號也皆畫以雲氣司常謂之畫此謂之書王安石謂書詳於畫既書又畫使人易辨而已余以為司常指大閱而言此指治兵而言大閲畫治兵書各有所主不一法也薛氏曰大閱閱軍實而已治兵則軍法在焉軍法行前朱雀後𤣥武左青龍右白虎則諸侯載交龍之旂於左軍吏載熊虎之旗於右百官載鳥隼之旟於前郊野載龜蛇之旐於後鄉遂師都載旜與物於其旁然後王載大常於其中而加髙焉故曰招搖在上此治軍所以有軍法也大閲則閱軍實而已孤卿建旜孤卿之常及治兵之際向之孤卿即謂之師都故師都亦載旜大夫士建物大夫士之常及治兵之際向之士大夫即謂鄉遂大夫士之帥衆者矣故鄉遂亦載物大閲之師都建旗治兵之軍吏載旗者蓋師都軍吏皆以孤卿為之所以皆有取乎旗大閱之州里建旟治兵之百官載旟者蓋州里之長即為軍中之百官所以皆有取乎旟至大閱則縣鄙建旐治兵則郊野載旐蓋田役軍旅皆王之事雖命服不同而同於四斿其所辨者有名號存耳若夫大閱有師都而無軍吏治兵有軍吏又有師都蓋師都所以治徒者也軍吏所以將卒伍者也大閱以治徒役為主特有師都而已治兵以將卒伍為主亦治徒役者也故軍吏師都並立焉大閱師都之所建治兵軍吏之所載皆熊虎之旗則大閱所以威衆者師都也治兵所以威衆者軍吏也皆以孤卿為之故其序在州里鄉遂之上謂之吏則任以事也謂之師則帥其衆也謂之都自采地言之也王氏詳說曰九旗之用凡有所將者有所畫則日月交龍熊虎鳥隼龜蛇是也無所將者無所畫通帛雜帛全羽析羽是也大閱之時孤卿大夫士與夫六鄉六遂三等采地之大夫咸在師都將都鄙之兵州里縣鄙將鄉遂之兵此師都所以有熊虎之旗州里所以有鳥隼之旟縣鄙所以有龜蛇之旐孤卿大夫士則從王耳此所以建旜建物也治兵之時孤卿大夫士不必盡出所以從王者百官也命卿之為軍吏者三等采地及鄉遂之兵皆屬於命卿矣雖師都不過載通帛之旜鄉遂不過載雜帛之物至於郊野雖有龜蛇之旐邑外曰郊郊外曰野特四等公邑之大夫將四等公邑之兵以四等公邑之兵不屬乎命卿故耳是以司徒於軍旅田役以旗致萬民鄉師於四時之田以司徒之旗致衆庶而鄭氏皆以為熊虎之旗且司徒卿也卿當建旜而必建旗以其於師田則為軍吏矣此熊虎之旗在司常則列於旜物之下在司馬則列於旜物之上豈非以所將為主乎緫論鄭鍔曰司常之大閱自王與諸侯而下有孤卿有大夫士有師都有州里有縣鄙先儒之説曰師都者六鄉六遂之大夫也州里縣鄙者鄉遂之官互見約而言之也且大閱之時内而國中外而鄉遂逺而都鄙公邑之兵宜無不在安有朝之孤卿大夫盡出而下則六鄉六遂之大夫不出焉又其下則止於鄉遂之官而已矣鄉遂大夫與鄉遂之官不過皆鄉遂之吏既曰師都又曰州里又曰縣鄙寕非雜而無辨乎大司馬之苃舎自帥而下有縣鄙有家有鄉有野有百官先儒之説曰縣鄙謂縣正鄙師至鄰長也家謂食采地之臣鄉謂州長至比長野謂公邑大夫且自内而外則六鄉也六遂也家邑也都鄙也是其序矣今先言六遂之縣鄙後及大夫之家邑又其後乃及六鄉又其後乃及野之公邑又其後乃及百官而都鄙不與焉又所謂縣鄙者不過六遂之屬耳特言各象其名家也野也百官也人非不衆反不以名言之豈非雜而無辨歟大司馬治兵自王與諸侯而下有軍吏有師都有鄉遂有郊野有百官先儒之説曰師都者遂大夫也鄉遂者郷大夫也郊者鄉遂之州長縣正以下也野者公邑之大夫也且師都之名一耳於大閱以為六鄉六遂大夫至是又專指為遂大夫何也六鄉有鄉大夫經之明文也至是又以鄉遂皆為鄉大夫何也鄉遂可謂之郊野公邑閒田亦可謂之郊野至是分郊以為鄉遂之州長縣正以下分野以為公邑大夫何也豈非雜而無辨歟蓋成周法制如織有經司常之大閱王也諸侯也孤卿也大夫士也不言可知若所謂師都者都鄙之長耳所謂州里者六鄉之吏耳所謂縣鄙者六遂之吏耳何以謂師都為都鄙之長蓋四百里之小都五百里之大都皆衆之所聚也自其有先君之廟言之曰都自其人民為甚衆言之曰師則師都者非六鄉六遂大夫明矣何以謂州里為六鄉之吏蓋一鄉者五州之積里者即民所居之稱州長言大攷州里鄉師言受州里之役要皆指六鄉言之則州里非遂之官明矣何以謂縣鄙為六遂之吏蓋一遂者五縣之積遂有縣正有鄙師故通以縣鄙稱之遂為縣鄙猶稱州里知其為鄉也則縣鄙者非鄉之官又明矣大閱之際内而六鄉外而六遂遠而都鄙皆以兵從其為法制真不亂也今謂師都為六鄉六遂大夫安得不雜而無辨歟雖然大閱有縣鄙苃舎亦有縣鄙其名則同其人則異夫苃舎與大閱法制如一所謂師都即孤卿耳百官即大夫士耳鄉以州名即六鄉耳野以邑名即六遂耳家即大夫之有采地者耳若夫縣鄙則公卿王子弟所治之地與大閱之縣鄙異也經稱縣鄙固有二説以六遂之中有縣正有鄙師故舉縣鄙以名六遂以小都之田任縣地而大都在王之鄙故公卿王子弟所治之地亦以縣鄙名之是其名則同其人則異今攷大閱之縣都知其為公卿王子弟之所治者以其序在家鄉野之上由小大之序知之非特小大之序可知觀經言各象其名亦可以見何則遂之縣都統於一遂不當以各言之惟都鄙然後可以謂之各蓋各象其名則知所謂縣者自是小都所謂鄙者自是大都也非特苃舎與大閱法制如一乃若治兵之制亦然何則治兵所謂軍吏即大閱之孤卿與苃舎之帥也所謂百官即大閱之大夫士與苃舎之百官也所謂師都即大閱之師都與苃舎之縣鄙也所謂鄉遂即大閱之州里縣鄙與苃舎之鄉及野也若夫郊野則指公邑閒田之吏而已與鄉遂之郊野異矣蓋内而鄉遂外而都鄙皆有閒田天子使吏治之謂之公邑縣師六官所謂甸稍郊里之地域是也其地皆在郊野故緫而名之耳然於大閱於苃舎皆不預者非在此不用其兵在彼不聼乎役也蓋内而鄉遂外而都鄙衆無所不起則公邑之師理無不起而經俱不言者舉内外以包之也由是言之周家之制可指而數未嘗雜而無辨愚按餘説見司常遂以獮田如蒐之灋羅弊致禽以祀祊音方鄭康成曰秋田為獮獮殺也鄭鍔曰秋氣肅殺故田以殺為主羅弊罔止也秋田主用罔中殺者多也皆殺而罔止王昭禹曰以物成於秋所取者衆故也王制曰鳩化為鷹然後設罻羅則秋用羅宜矣鄭鍔曰羅之網物其取為尤急王氏曰火之利不若車車之利不若羅祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方賈氏曰鄭以祊為誤者祊是廟門之外惟祭宗廟及繹祭乃為祊祭今因秋田而祭當是祭四方之神王昭禹曰春物始生故為民祈而祭社秋物既成故為民報而祀祊中冬教大閲鄭鍔曰春秋凡書大蒐大事大閲皆謂事之尤大也左氏為之説曰大閲簡車徒也以大司馬觀之春教以鐃鼓夏教以號名秋教以旗物至冬農隙則合三時所教者大習之故名曰大閱奚止簡車徒而已王氏詳説曰春辨鼔鐸鐲鐃之用夏辨號名之用秋辨旗物之用至冬則戒衆庶修戰法而及於旗物鼔鐸鐲鐃要之辨鼓鐸者未始無旗物所謂以旗致民是也辨旗物者未始無號名所謂各書其事與其號也三時之田各以其所辨者為主耳前期羣吏戒衆庶脩戰灋鄭康成曰羣吏鄉師以下鄭鍔曰戰必有法法不修則廢未閲之前先戒之使修其法如鄉師四時之田前期簡鼓鐸旗物修其卒伍之類是也戰法既修然後合衆庶以出田虞人萊所田之野為表百歩則一為三表又五十歩為一表鄭司農曰虞人萊所田之野芟除其草萊令車得驅馳詩曰田卒汚萊易氏曰表以歩度之歩長六尺百歩則一為三表是三表相去二百歩又五十歩為一表則四表為二百五十歩矣大閲必用四表所以寓王者節制之師而大武之四表實象之蓋周都西南一表在南所謂武始而北出矣振之而駟伐則有振鐸作旗之義歴二表三表而至四表則再始以著徃者也商都東北四表在北所謂四成而南國是疆復亂以飭歸則有鼓退鳴鐃且郤之義歴三表二表而復於一表則樂終而徳尊者也大閲亦然賈氏乃謂後表在北士卒由後表以至南表復回身向北以至後表與樂記之言不合樂記言大武則周家一代寓兵之良法當以樂記為正或謂三表相距各百歩毎表各六十丈何以容大閲之衆若以開方論其勢誠窄若據虞人萊所田之野則㢠野左右何有紀極鄭氏謂左右之廣當容三軍此指一旁而言若左右兩旁當容六軍又云歩數未聞則六軍分行左右開張取其容六軍之衆不以歩數拘也如此則地勢廣袤豈止容六軍而已李嘉會曰必為表者為進退先後之節百歩則一冝若不足以容六軍自後而前至此百歩而止若後之人不在百歩之内亦何害也然百歩止於六十歩者後有驟趨不可逺也鄭鍔曰遇敵之地不一則教戰之法亦冝不一今以二百五十歩為定凖坐作進退不出四表之中一旦遇敵或為員方曲直之陣或有為鸛為鵝之陣其何以應變邪王者之兵以正取勝故敎之之法亦不出乎正而已坐作進退不踰乎四表三鼓而皆作在此也兵法所謂人既專一則勇者不得獨進怯者不得獨退此用衆之法也鄭鍔曰凡此萊野立表仆旗聽誓鼓行以至於擊刺如戰之陳皆四時教戰之常法不於振旅苃舎治兵述之獨詳具於此蓋以明其為大閲故也田之日司馬建旗於後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐李嘉㑹曰四表止於二百五十歩坐作進退歩行趨驟為力不勞軌範易習民之左右顧瞻皆其鄉黨鄰里自然情親勢一敵不可乘此古人結陳堅固也易氏曰及田之日司馬建熊虎六斿之旗於虞人所設後表之中據樂記舞位而言則後表當是在南一表於是羣吏如鄉師以下以其旗物及鼓鐸鐲鐃等各帥其民而致於大司馬鄭康成曰質正也弊仆也易氏曰質明仆旗猶有後至者是慢令也王昭禹曰前期既戒衆庶矣又後至焉故必誅軍法後期者斬而此言誅則方致民也下文言不用命者斬則知言誅未遽以死處之乃陳車徒如戰之陳田之所習無非戰法故車徒之所陳皆如戰之陳焉鄭康成曰皆坐當聽誓也黄氏曰自此以前皆司馬主之羣吏聽誓於陳前斬牲以左右徇陳曰不用命者斬之鄭康成曰羣吏諸軍帥也陳前南面鄉表也易氏曰衆庶已集命之皆坐於在南之一表羣吏聽誓則自軍帥而下皆南面向表誓於陳前王昭禹曰以小司徒攷之乃㑹萬民之卒伍而用之以起軍旅以作田役特掌其戒禁而已未嘗掌誓記月令者謂司徒搢扑北面以誓誤矣士師以五戒先後刑罰一曰誓用之軍旅則誓衆者士師也黄氏曰戰誓書所謂用命賞於祖不用命戮於社蓋自此始以軍法用人之死鄭鍔曰坐而聽誓斬牲以徇所謂三令五申也今見於司馬法曰夏后氏誓於軍中欲民先其慮也商誓於軍門之外欲民先意以待事也周將交刃而誓之以致民志也車徒皆坐使羣吏聼誓者羣吏各帥其衆有誓而羣吏聽之則傳逹於所統之衆簡而易知無敢不從矣鄭康成曰斬牲者小子也王氏曰使民以其死刑誅不如是之嚴則民弗為使矣然前期戒衆庶而後至可誅既陳而誓然後不用命者可斬中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝音鹿鐲羣吏弊旗車徒皆坐鄭康成曰作起也愚案中軍自注以為中軍之將後之説者以大将之車將自居中所謂居鼓之將自擊此鼓節制三軍雖王親征亦自擊鼓遂引左傳郤克傷於矢援枹而鼓之趙簡子伏弢嘔血鼓聲不衰為證至鼔人指為軍將師帥旅帥不思軍將自執晉鼓不執鼙而執鼙自是旅帥所以易氏謂旅帥居軍師之中故曰中軍若以中軍不可指為旅帥只云中軍之將雖執晉而晉以鼙為令者蓋晉以進為義軍將鼓其晉孰敢不進度未敢進而鼓動寕免拂乎人情旅帥為百人之長下察人情知其可進以鼙令鼓然後中軍執鼓之人三鼓以進之則車徒皆作可使之同心同力勇進而不怯矣易氏曰中軍以鼙令鼓則旅帥執鼙者也以旅帥居卒伍軍師之中故曰中軍鼓人皆三鼓則軍將之執晉鼓者也司馬振鐸則兩司馬之執鐸者也鼓行鳴鐲則公司馬之執鐲者也鄭康成曰伍長一曰公司馬當是時旅帥以鼙令鼓故軍將三鼓而作之兩司馬振鐸以通之可以作矣故羣吏作旗車徒皆作既作矣軍将又鼓以行之公司馬又以鐲而節之可以行矣故車徒皆行及表乃止既止矣軍三鼓以警之兩司馬摝鐸以止之可以止矣故羣吏弊旗車徒皆坐此謂自南表以至向北之二表所以象武始而北出觀兵於盟津之時又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初鄭康成曰趨者赴敵尚疾之漸春秋傳曰先人有奪人之心易氏曰言驟趨則士卒赴敵之心固勇於車徒之行者矣然不可無以節之由是及表乃止而軍將三鼓以警之兩司馬又摝鐸以止之可以止矣故曰坐作如初此謂自二表以至向北之三表所以象再成而滅商戰勝於牧野之時乃鼓車馳徒走及表乃止易氏曰於是軍将又鼓以作之則車為之馳徒為之走王昭禹曰驟馳者車也趨走者徒也驟言聚其足而進馳言決圍而去也徒以人言故曰趨走趨言其走之肅走言其行之速也言馳與走則士卒赴敵之心尤勇於車驟徒趨者矣然亦不可無以節之由是及表乃止則教習已備而無事于坐作之節但止之而已此謂自三表以至向北之四表所以象三成而南克殷有餘力功成而反者也鼓戒三闋若穴反車三發徒三刺鄭康成曰鼓戒戒攻敵王昭禹曰鼔聲止謂之闋易氏曰至此則鼓已三闋車已三𤼵徒已三刺於此皆戒焉鄭鍔曰毎鼓一闋則車一𤼵而徒一刺至三而止是謂節制之兵三𤼵即書所謂不愆於六歩七歩乃止齊焉三刺即書所謂不愆於四伐五伐六伐七伐乃止齊焉之意易氏曰必三鼓者至於三則節制之正也故大閱之教表為三表鼓為三鼓車以三𤼵徒以三刺坐作以三而為之止皆三之為節制也乃鼓退鳴鐃且郤起畧反及表乃止坐作如初鄭康成曰鐃所以止鼓軍退卒長鳴鐃以和衆鼔人為止之也易氏曰謂至北之四表軍將即令鼓以退之公司馬復鳴鐃以郤之於是軍吏士卒回身向南而立復行至表皆為之止坐作如初此又謂自北之四表以至三表二表而復於向南之一表皆如上文之坐作其異者廢鐲鳴鐃而已所以象四成而南國是疆五成而分周公左召公石六成而復綴以崇者也遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒間以分地前後有屯百歩有司廵其前後賈氏曰遂以狩田已下緫論教戰訖入防田獵之事鄭康成曰冬田為狩言守取之無所擇也王昭禹曰以大獲獸守之以人為取之大者以冬物之成衆也故冬田謂之狩賈氏曰六軍分三軍各處東西為左右各一門鄭鍔曰軍中用轅以為門此乃用旌為和門何也以車為藩則仰轅以為門蓋軍行偶有所止則然也設為和門者田而教戰欲使衆心之和一也愚按門分左右則人分彼此相勝相爭由此而生名門皆曰和欲其進退由禮心無所爭則和矣鄭康成曰敘和出用次第出和門也王昭禹曰叙者前後之倫也出以先後之倫則行者有敘而不亂矣然不先正其左右之行列將欲叙之有不可得故先分左右以陳其車徒又使有司平之使各當其分然後由左右而出者其行列皆正矣有司鄉師也以鄉師正掌田法而修其卒伍故平其左右之行列屬於鄉師也鄭康成曰鄉師居門正其出入之行列雖不見經居門正出入宜亦有司之事春秋傳曰流旁握御轚者不得入車軌塵馬候蹄是必有有司督察之也黄氏曰有司謂伍長以上平正也各正其部署以結陳也和平一義也王昭禹曰軍法自旅而上然後有旗蓋旅師所建之旗也四兩為卒五卒為旅此旅師所建之旗所以居於卒間以分地而調其部曲也賈氏曰軍吏各領已之士卒執旗以表也李嘉㑹曰百人之中旗分為兩五十人為一隊也鄭鍔曰司馬以旗分地為二必以百歩為準者近則士卒無所騁其能逺則首尾不相應也李嘉㑹曰所謂步間容歩隊間容隊也有司鄉師也廵其前後視其廣狹也鄭康成曰前後有屯百歩車徒異羣相去之數也黄氏曰司馬法一成三百家出車一乘若皆以二家五人計之三百家為七百五十人田與追胥竭作自此以前卒旅車為陳至此車與卒異部前此列陳如戰之陳教坐作進退至此逐禽有殺獲之事故車與卒異部險野人為主易以䜴反野車為主黄氏曰大抵兵分合為難分合有竒正而以野之險易制其宜然則一車三十人定法也増減進退其法黙存乎其間鄭居前之說未必盡然王昭禹曰宣王因田獵而選車徒故詩曰東有甫草駕言行狩此則易野車為主也又曰選徒囂囂搏獸于敖此則險野人為主也陳氏曰險野非不用車而主於人易野非不用人而主於車動則足以衝突止則足以營衛將卒有所庇兵械衣裘有所齎詩云君子所依小人所腓則車之為利大矣昔周伐鄭鄭為魚麗之陳先偏後伍伍承彌縫偏則車也伍二十五人伍從其偏也先其車足以當敵後其人足以待變古者車戰之法畧可知也禮庫曰先王車戰不求大勝求為不可敗而已鄭莊欲驅馳中原始為徼利之名故鄭莊始用徒兵自中行穆子乃毁車以從卒自左師展始乘馬自趙武靈王始用胡騎先王兵制敗壊而不可復實自莊公始既陳乃設驅逆之車有司表貉於陳前易氏曰驅謂驅禽獸使趨於圍逆謂逆禽獸使不出圍鄭鍔曰驅則自後驅之使出逆則自前迎之使入驅其後則獸無所逃逆其前雖欲出防而不可得王昭禹曰既陳則行列正矣然後可田焉故設驅逆之車者田僕也校人則帥之而已故校人曰田獵則帥驅逆之車則將田矣於是禱祭焉故有司表貉於陳前即甸祝掌表貉之祝號是也李嘉㑹曰表貉者警人而欲其無慢心中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳易氏曰中軍以鼙令鼓鼓人皆三鼓如習戰之時則師田之法一焉鄭康成曰羣司馬謂兩司馬也枚如箸銜之有繣結項中軍法止語為相疑惑也進行也鄭司農曰大獸公之輸之於公小禽私之以自畀也詩云言私其豵獻肩于公一嵗為豵二嵗為豝三嵗為特四嵗為肩五嵗為慎此明其獻大者於公自取其小者鄭鍔曰大獸不公無以教事上之義小禽不私無以示及下之仁李嘉會曰人逞其勇必不舍大而取小大獸必公者既非一人所可制亦非一人所専得所以必公於衆者正欲合夫人之力也獲得也得禽獸者取左耳當以計功王昭禹曰不専取左耳則効功者疑於獲一而効二取左耳以効功所以謂之馘也及所弊鼓皆駴胡楷反車徒皆譟素報反鄭康成曰至所弊之處田所當於止也天子諸侯蒐狩有常至其常處吏士鼓譟象攻敵克勝而喜也疾雷撃鼓曰駴易氏曰駴如馬之駭鄭鍔曰功雖已成敵雖已勝不可以不戒譟讙也書曰前師乃鼓䵾譟亦謂喜也易氏曰譟如鳥之譟以示勝敵鄭鍔曰人心有踴躍之義徒乃弊致禽饁於輒反獸於郊入獻禽以享烝王昭禹曰冬物成而多可取者衆故以徒為主凡田用火用車用羅非不用徒也特所主者有異耳鄭康成曰徒乃弊徒止也黄氏曰徒取禽車列陣不動雖戰亦然至此徒止遂獻禽鄭康成曰致禽饁獸於郊聚所獲禽因以祭四方神於郊月令季秋天子既田命主祠祭禽四方是也易氏曰春社夏礿秋祊不言入獻禽而冬烝獨言之者以外行致禽饁郊之禮然後獻禽於宗廟故謂之入鄭鍔曰此戰勝而歸獻捷於廟社之意也郊言饁獸烝言獻禽豈用大於郊而用小於廟分而言之則禽獸有大小之殊合而言之獸亦可謂之禽也緫論王氏詳説曰田法大率詳於冬狩以文意攷之亦四時所並用也請以蒐田明之其曰執鼓執鐲而繼之以教坐作進退疾徐䟽數之節者即冬狩所謂中軍以鼙令鼓以下為一節及三鼔以下為一節坐作如初乃鼓以下為一節是也其曰有司表貉者即冬狩所謂虞人萊所田之野為表百歩則一為三表又五十歩為一表又曰有司表貉於陳前是也其曰誓民者即冬狩所謂羣吏聼誓于陳前斬牲以狥是也其曰鼓遂圍禁者即冬狩所謂中軍以鼙令鼓車徒皆作繼之以大獸公之小禽私之獲者取左耳鼓遂圍禁是也苖田獮田一如蒐田但大閱之禮其徒車為甚備耳陳及之曰四時教習逺如都鄙皆調𤼵之大都之地去王城五百里則一年四次習於國内比屋竭作嵗嵗如是而民不亦勞乎大司馬欲盡辨旗物號名之用故併師都郊野言之其實司馬所教者止鄉遂之人也而又遞閱之亦不一時俱起王畿之内鄉黨之間皆有習射之地嵗時因民聚㑹而教之則民無道路之苦國家無煩擾之政而民皆精練矣詩云東有甫草駕言行狩建旐設旄搏獸於敖則周制田獵或盡習於東都也蓋宣王以王畿之内東去王城逺甚恐民有來徃之苦遂大㑹於東都所謂因田獵而選車徒也楊氏曰春秋大閱一蒐五治兵一狩二得禮乎曰何禮哉先王於閒暇無事之日修其軍禮所謂振旅苃舎治兵大閱之政講焉鼓鐸旗物名號戰法之用熟焉禽獸之害物者與其時之可殺者得焉得之之道又有節焉大獸公之小禽私之得不敢先享必獻於鬼神焉是則先王之時田禮一舉而有六善豈徒好兵而禽獸之獲哉今魯之大閱與治兵蒐狩之舉是未嘗求先王之善意縣師曰掌邦國田役之戒受法於司馬以作其衆庶大宗伯曰以軍禮同邦國大田之禮簡衆也魯之治兵不掌於縣師不受於司馬不同於宗伯此春秋所以不與也林椅曰周家因祭祀而用田因田而敎戰王與諸侯軍將之旗鼓特建之以教戰陳之法王與諸侯不必親亦不必成軍也如今敎習必立六纛五方旗之類又司馬百歩為一表為三表則三百歩又五十歩為一表則三百五十歩耳歩兵前後左右各二歩車易戰之法五車為屯十車為列前後相去三十歩左右十六歩險戰之法十車為聚十二為列前後二十歩左右四歩隊閒五十歩險戰皆半之又隊閒容隊曲閒容曲度百歩一表則可教者僅一旅鄉師出田法於州里遂師審其誓戒都司馬家司馬以國法掌其政學則是一旅以上隨處自講可也至大軍旅則合而用之所謂及師大合軍是矣及師大合軍以行禁令以救無辜伐有罪易氏曰及者繼事之辭未有師也謂時田以習戰以為用師之備而已王昭禹曰及師大合軍謂命將或王親征之時鄭鍔曰大合軍旅非以肆暴也以行禁令所以申明乎九法也以救無辜所以明王者之仁也以伐有罪所以明王者之義也若大師則掌其戒令涖大卜帥執事涖釁主及軍器易氏曰若有强梗弗率者負固弗服者與夫侵犯王畧而自干天誅者天子於是親帥六師方伯連帥從焉謂之大師大司馬掌其戒令則方伯連帥以至軍將師帥莫不受戒令焉鄭鍔曰或謂用師則大司馬爲大将固當掌號令以指麾六軍此言若大師則掌其戒令者蓋此乃王親出征之時也王自出軍則王自将號令在王大司馬惟掌戒令則專治六師之法而已鄭康成曰涖臨也臨大卜卜出兵吉凶也司馬法曰上卜下謀是謂參之鄭鍔曰大卜作龜之八命一曰征司馬於出征之卜則親涖之以决吉凶主謂遷廟之主及社主在軍者也愚案廟社主見小宗伯軍器鼓鐸之屬凡師既受甲迎主於廟及社主祝奉以從殺牲以血塗主及軍器皆神之賈氏曰小子職云釁邦器及軍器彼官釁之而司馬臨之李嘉㑹曰涖大卜釁主及軍器惟大師則有之及致建大常比軍衆誅後至者鄭司農曰致謂聚衆也黄氏曰致於王也故建大常比軍衆謂各以其黨相聮合也鄭謂鄉師致民於司馬非鄉師致六鄉之民於司徒此當有邦國都鄙甸稍之民稍人受法於縣師作其同徒輂輦帥而至者買氏曰司馬而用王之大常者以上文大師王親御六軍故司馬用王之大常致衆若王不親則司馬自用大旗致之王氏曰鄉師致民以司徒之大旗則司馬致民冝以王之大常矣凡此皆示其致民之命有所受之也鄭康成曰比校次之也易氏曰比其伍兩卒旅軍師之全缺也鄭鍔曰誅後至則懲其不率而後期及戰廵陳眡事而賞罰易氏曰及其成陳而戰也廵其陳之隊伍䟽數與夫車徒旗鼓之出入莫不眡之鄭鍔曰廵陳而視其勇怯鄭康成曰事謂戰功也王昭禹曰眡其鼔鐸鐲鐃旗物車從坐作進退之事有功者賞逆令者罰也若師有功則左執律右秉鉞音越以先愷樂獻於社鄭康成曰功勝也律所以聽軍聲鉞所以為将威也鄭鍔曰軍行必聽同律而鉞者大将所執也有功則執律者示師出以律而取勝也陽六為律左陽也故左執之鉞所以主殺隂也右亦隂也故右秉之胡氏曰牧野乃誓王左杖黄鉞右秉白旄以麾孔穎逹云殺戮用右手左手仗鉞示無事於誅右手把旄示有事於教詩云左手執籥右手秉翟舞人所執於事便也鄭康成曰先猶道也易氏曰大司馬左執律右秉鉞以先愚案此㸃極是功雖勝大司馬猶執律秉鉞郤行而身先以見有功不伐安不忘危之意賈氏曰趙商問大司樂王師大獻則令奏愷樂注云獻於祖與此異鄭答曰司馬主軍事之功故獻於社大司樂宗伯之屬宗伯主宗廟故獻於祖然軍有功二處俱獻以出軍之時告於祖冝於社故反必告也王氏詳説曰祖本仁故獻愷在春官社本義故獻愷在夏官鄭鍔曰司馬主九伐之法故獻於社示法隂而行誅伐也愚按愷樂説見大司樂若師不功則厭於陟反而奉主車鄭司農曰厭謂厭冠喪服也軍敗則以䘮禮故秦敗於殽秦伯素服郊次鄉師而哭賈氏曰曲禮云厭冠不入公門彼差次當緦小功之冠以義言之五服之冠皆厭以其䘮冠伏反吉吉冠扵武上向内縫之䘮冠於武下向上縫之冠在武故得厭㐲之名李嘉㑹曰矣厭冠奉主車以歸於廟示有忝於祖鄭鍔曰無功非王之故也司馬不能致果以殺敵也故自厭損明已之威令不伸以致然也不言無功見王師無敗績之理易氏曰不言敗而言不功王者之師無敵於天下不特不功而已鄭康成曰奉猶送也送主歸於廟與社鄭鍔曰奉主車以歸肆師助牽之故肆師云師不功則助牽主車黄氏曰司馬教戰有功無功皆其任也執律秉鉞以先愷樂獻於社先王有其事而無其心厭而奉主車先王有其禮而無其事王弔勞老報反士庶子則相息亮反鄭康成曰師敗王親弔士庶子之死者勞其傷者則相王之禮庶子卿大夫之子從軍者或謂之庶士鄭鍔曰士庶子宿衛王宫者也王親征則從王在軍而屬司馬有死者王親弔之司馬相其弔勞之禮以其在軍故也王氏詳説曰成周之時其待士庶子也至有功則飲之食之有不幸之事則弔之勞之外饔云邦饗耆老孤子則掌其割烹之事饗士庶子亦如之是饗之以食也酒正曰饗士庶子饗耆老孤子皆共其酒是饗之以飲也此曰弔曰勞直謂車甲間有不幸之事大役與音預慮事屬音蠋其植直吏反受其要以待考而賞誅劉氏曰若國有城邑之大役司徒司空計慮其事則與焉鄭鍔曰觀左傳宣十一年蔿艾獵城沂昭三十二年士彌牟營成周屬役賦丈書以授帥凡大工役不可不先慮其事也大司馬與慮於未興工之前及興工則屬其植工已畢則受其要始焉慮之既已計其工役之用終焉不可不㑹計其效也司農謂植為部曲將吏引左傳云宋城華元為植黄氏曰植版築主帥也而康成謂植為築城楨榦未知孰是蓋以木之植者謂之植則植者楨榦之木可植於地以築者也築者以植為主未嘗聞部曲將吏其名曰植者也易氏曰植謂築城板榦髙博制度係焉則屬之於司空始焉慮其事中焉屬其植黄氏曰先鄭以屬為聚會後鄭謂賦丈尺與其用人數二説蓋相備終焉受其要鄭司農曰要者簿書易氏曰要謂役人數目功程多寡係焉則受之於司徒則本末纎悉無不周知然後可以待攷功而行誅賞焉易氏曰待攷而賞誅必以植要為本違者有誅勞者有賞言賞而後誅大役既事行賞為先不得已而後有誅也王氏曰大司馬於大役與慮事欲知其故之可否屬其植欲知人之多寡受其要欲知其功之等差事成而攷之以行誅賞大㑹同則帥士庶子而掌其政令鄭康成曰帥師以從王王昭禹曰諸子之職曰若㑹同賔客作羣子從則帥士庶子而掌其政令在司馬也鄭鍔曰或謂士庶子乃宫伯所掌司馬何以掌其政令嘗攷宫伯之職言邦有大事作宫衆則令之所謂令者作而行之而已必湏有統率之人以政令治之可也然則大㑹同之時令之而使屬於司馬明矣司馬帥之以從王安得不掌其政令黄氏曰宿衛則宫伯掌其政令扈從則司馬掌其政令前漢郎官宿衛屬光禄勲後漢又屬焉若大射則合諸侯之六耦鄭康成曰大射王將祭射於射宫以進賢鄭鍔曰賔燕之射用卿大夫為耦惟大射用諸侯以其射禮之尤大故也觀禮樂者必以射射而有耦則揖遜而進威儀可觀而射之能否亦易辨也大射六耦皆用諸侯使之同心一徳以尊天子合謀并力以敵王愾也二人為耦二耦同射一侯則十二人也射人掌以六耦射三侯合其耦者乃在司馬以其掌九法足以馭諸侯故也大祭祀饗食音嗣羞牲魚授其祭易氏曰大祭祀謂廟享之禮饗食則禮公侯等於廟鄭康成曰牲魚魚牲也祭謂尸賔所以祭也賈氏曰大祭祀授尸祭饗食授賔祭祭者魚之大臠即少牢云主人主婦尸侑食各一魚加膴祭於其上膴謂魚之反覆者公食大夫亦云授賔祭也若王祭則膳夫之授王祭是鄭鍔曰先儒謂司馬授之司馬夏官陰氣所起魚水物亦隂類故也竊謂魚者沉潛深渺之物夏官之政足以及深逺則雖沉潜隱伏者可得而制之項氏曰詩曰誰能烹魚易曰包無魚皆以喻民衆司馬掌大師故共魚劉迎曰魚者易潰之物而不可擾也魚擾之則潰民擾之則離大司馬之於民作其徒役而用之於師田易以擾之故耳此祭饗所以命羞魚牲者不擾之意黙寓於中大䘮平士大夫易氏曰平則正䘮禮之職與其位也賈氏曰司馬之屬有司士主羣吏王䘮不得使司士故司馬平之䘮祭奉詔馬牲鄭康成曰王䘮之以馬祭者蓋遣奠也奉猶送送之至墓告而藏之鄭鍔曰馬則夏官所掌故䘮祭奉其牲以詔告乎神小司馬之職掌鄭康成曰此下字脱滅札爛又文闕漢興求之不得遂無識其數者凡小祭祀㑹同饗射師田䘮紀掌其事如大司馬之灋賈氏曰小祭祀已下皆蒙此小字對大司馬大祭祀之等軍司馬輿司馬行司馬易氏曰已上官闕而列於司馬之後者以序官知之也義見序官李嘉㑹曰若札爛文闕則中間數語併闕可也何乃獨留乃知用兵機要先王不敢輕泄於外以開天下後世智術之端至天下阨塞險要去處亦不輕以示人秦之圖籍亦然深防人心之流於禍而多變也今七書百将傳顯㣲闡奥流布天下其啟人之爭何時而已愚案三代國容不入軍軍容不入國儀禮吉凶軍賔嘉逹於天下而軍禮獨藏於大司馬號司馬法若國有師田之事縣師始受法於司馬以作其衆庶小司馬之職掌不悉書而軍司馬輿司馬行司馬皆不備官有事斯置其不欲觀兵蓋如此周禮訂義卷四十八
