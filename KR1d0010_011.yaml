body:
  text: 周禮訂義卷十一宋王與之撰司㑹中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人賈氏宫正疏曰諸稱司若司裘司市之類皆是專任其事事由於已故以司言之陳君舉曰鄭氏以司㑹若漢之尚書其實不然漢尚書自是少府屬官當時諸府皆有尚書所以分為四曹後漢分為六曹鄭氏但以尚書為司書計之官遂以比司㑹之職不知漢諸官府各自有㑹計非若周之司㑹以中大夫為之其職甚隆凡內外府應干財用皆計於司㑹漢髙帝時獨蕭相國知此領天下之財以柱下史張蒼為計相此近周之司㑹其後諸府各自置府官以管㑹計乃其局分之人與周之司㑹不同如大尉之金曹自主貨幣鹽鐵倉曹自主倉庫之類是也本朝奉宸庫乃周之玉府內藏庫乃周之內府左藏庫乃周之外府渡江以來又置激賞庫今之南庫是也周之三府分為四府凡天下金玉之物皆歸於奉宸山澤鹽鐵之賦皆歸於內藏其他額外所入一歸於南庫謂之宰相兼制國用至於天下户口租入歸之户部所以今版曹不可為者正以分散四出權不歸一薛平仲曰大府為諸府之長蓋財用所自出職不過於下大夫而司㑹之職既以中大夫二人居之又以下大夫四人贊之權任之重亞於小宰司書為之掌文書之藏職歲職內為之課出入之數而餘財之可録者職幣又從而掌之是何若是之不容簡邪蓋府藏之官初無與於貨賄之用而貨賄之出入則㑹計之所冝盡心也事權均則不足以相臨職守略則不足以參稽周官理財之法大抵不患府庫之無餘財惟患出入之無定用然則司㑹之職烏得而不重司㑹之屬又烏得而不備愚案自大府至掌皮皆掌財賦之官然大府以下大夫為之司㑹以中大夫為之大府既為長則司㑹為屬乎夫以大臨小可也以小臨大可乎今列於大府掌皮之間何也蓋司㑹一官誠有關乎天下之利害雖無財賦可掌簿書可職得以持法計天下之財用王后六宫世子與夫宰相大臣卿大夫士其有用度不當皆得鉤考舉正之此其所係大矣故其官甚尊非大府比謂之屬於大府不可也司㑹一官只成周有自秦漢以下便無此官蓋緣先王都無毫髮之私故容得這般議論後世所以不立此官只為人主不便巳耳且如今內庭官者比之外庭請給數倍若司㑹一官立便須理㑹去緣此所以不肯立大抵掌出納財用者其事至易而持法以較出入之當否者實艱其人本朝財計總之三司微有古意然司㑹止計其用而不治藏三司則用與藏兼主之又曰度支頗有似司㑹遺意然不過郎曹與成周之中大夫相去逺矣掌邦之六典八法八則之二以逆邦國都鄙官府之治鄭康成曰逆受而鈎考之劉執中曰司㑹掌會計而必掌典法則之二者聖人謂職㑹計者不顧國政之是非不度民情之疚弊惟私是積或傷於仁惟節是求或害於禮非所以存國體也故必知六典八法八則為治之大本則財用可致而有傷乎國有蠧乎民者得以舒卷裁成王道也鄭鍔曰司㑹掌天下之大計而為計官之長欲括天下之財用以㑹其數不可不掌典法則之二小宰執其二以佐大宰之治使人不敢搖動其已成之法而司㑹則鈎考之官掌其二以㑹天下之財其語雖同其事則異以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用鄭鍔曰職在㑹計雖掌其二至於生財之術悉禀諸大宰是故邦國之財用則用大宰九貢之法以致之田野之財用則用大宰九賦之法以令之民職之財用則用大宰九功之法以令之節邦之財用則用大宰九式之法以均之賈氏曰九式用九賦大宰均節而用之司㑹主鈎考故亦言均節也其致也其令也其均也皆用大宰之法此之謂掌其二孫氏曰周之賦入不過九貢九賦九功而已九貢者諸侯之歲貢還以待邦國弔恤賑救之用而畿內無所仰給也九功者國中及四郊之民所入閭師斂之則以充府庫備緩急而公上亦不賴其用也所謂九賦乃廛里及疆地之有田至於都鄙者之賦載師掌之以當歲之百需考之司勳可見矣司勳掌六鄉賞地之法即載師任之於逺郊者也必參分之一食乎公上唯加田然後無國征焉非加田不得而免矣賈氏曰九賦之內惟關市幣餘國中非田野自外四郊以下盡是田野據多言之故曰田野愚案陳止齊說見載師凡任地後掌國之官府郊野縣都之百物財用凡在書契版圗者之二以逆羣吏之治而聽其㑹計賈氏曰大宰九賦一曰邦中二曰四郊此不言邦中而言官府者以官府在邦中故舉以表之其實官府不出賦鄭康成曰郊四郊去國百里野甸稍也甸去國二百里稍去國三百里縣四百里都五百里賈氏曰此皆依太宰九賦言之百物財用以民之出賦不必皆使出泉以百物當之亦得故大宰亦云斂財賄也鄭氏曰書謂簿書契最凡也賈氏曰書契即小宰八成之書契最凡謂計要之多少以為契要也版戶籍也圗土地形象田地廣狹愚案版圖巳見小宰王昭禹曰凡書皆掌於司書又掌邦中之版土地之圗則書契版圗司書掌其正司㑹掌其副逆謂有所治正有所治正則司㑹案書契版圗以逆之矣而又聽其㑹計之書焉㑹謂歲㑹計謂月要日成書契版圗掌之於此歲㑹月要日成録之於彼以此所掌稽彼所録則財用之多寡羣吏之實僞昭然若辨黑白矣以參互考日成以月要考月成以歲㑹考歲成薛氏曰鄭康成以參互謂司書之要二與職內之入職歲之出至王昭禹又以三考之為參以兩考之為互以職內考其入以職歲考其出以職幣考其餘是所謂參也以職內及㑹以逆職歲職歲以式法贊逆㑹是所謂互也日成之事少故以職之相參相互者考之二說皆不通周官三百六十以象當朞之日分職任事皆有日成何獨於三官言之耶蓋天下之事合衆數而為目合衆目而為凡合衆凡而為要合衆要以為㑹目則日計謂一日之內錢穀獄訟幾何總而結之曰目凡則旬計謂十日之內錢穀獄訟幾何總而結之曰凡要則月計以三旬而總之㑹則歲計以十二月而總之司㑹以天下官府之職一日所涖之事有數總其數而計之有目總十日之數而結之有凡以凡考目以目考數以數考凡是之謂參凡與數相考數與目相考是之謂互不然月成既考以月要歲成既考以歲㑹則日成亦當考以日計之數目何獨於日成獨云職歲職內職幣司書之數官乎以周知四國之治以詔王及冢宰廢置鄭康成曰周猶遍賈氏曰四國謂四方諸侯之國司㑹鉤考之官須知諸侯得失以此治職文書詔王及冢宰廢置詔及冢宰者以冢宰副二王之治事故并告之劉執中曰八州諸侯之國禮樂刑政能致中和於其民者必周知之則歲㑹雖不足而其治有可旌者歲㑹雖嬴而其治有可廢者故以詔王及冢宰廢置以治為本愚案王制曰司㑹以歲之成質於天子冢宰齊戒受質司書上士二人中士四人府二人史四人徒八人鄭鍔曰司㑹總天下之大計而鉤考之茍或無書漫然不可得而知故設司書之官專以典司簿書為職百官有司財用之數具載於此司㑹得以案籍而稽考此所以為司㑹之屬掌邦之六典八法八則九職九正音征九事邦中之版土地之圗以周知入出百物王昭禹曰六典八法八則大宰大史之所建小宰司㑹掌其副二之書司書則正掌其書而巳林氏曰司書目九貢九賦為九正而書稱文王以庶邦惟正之供蓋古之王者必正經賦以足經用未嘗有無名橫斂司書掌羣吏之徴令必使知此意故言正焉黃氏曰九事九式式特用財之程式耳變言事凡羣吏之所當聨事合治者莫不舉也財出而事不舉則為妄費司書計羣吏之治必使知此意故言事焉事成而後版圗簿書幣餘之財於是可斂矣王昭禹曰邦中之版則都邑之內籍民數之版也土地之圗則十有二土五地之圖也司書掌邦中之版則以知夫家之數土地之圗則以知山林川澤之數司㑹掌凡在書契版圗者之二而此掌邦中之版土地之圖則司書掌其正司㑹掌其二史氏曰古者有書必有圗案圗以知其形即書以知其數圖書並用久矣賈氏曰此官所掌邦之六典已下至入出百物所掌與司㑹同者以司㑹主鉤考司書掌書記之司書所記司㑹鈎考之故二官所掌其事通焉九職即司㑹九功也九正即司㑹九賦九貢也九事即司㑹九式也邦中之版土地之圗即司㑹版圗也周知入出百物即司㑹百物財用也以敘其財受其幣使入于職幣鄭康成曰敘猶比次也謂鉤考其財幣所給及其餘見為之簿書鄭司農曰受受財幣之簿書王昭禹曰以職幣振掌事者之餘財斂凡用邦財者之幣故入職幣凡上之用財用必考于司㑹鄭鍔曰以天子之尊用天下之財有為天下之公而用之者有以一人之私而用之者所用者公固不論也若出於私而無以稽考之則蕩然無法私欲縱矣司書記録用財之數抱其書而往考於司㑹此豈公用之財哉是必防一人之私有以縻費乎國計庶幾㑹計之臣詔上以節用耳鄭康成曰上謂王與冢宰王雖不㑹亦當知多少而關之司㑹以九式均節邦之財用王氏詳說曰膳夫言王之膳不㑹庖人言王之膳禽不㑹酒正言王之飲酒不㑹外府言王之服不㑹司書以上之用財用而必考于司㑹是王之用財用亦有㑹乎曰不㑹者不計其所用必考于司㑹者所以知其多少而預為之備三歲則大計羣吏之治以知民之財器械之數以知田野夫家六畜許又反之數以知山林川澤之數以逆羣吏之徵令鄭康成曰逆受而鈎考之王昭禹曰大宰於三歲大計羣吏之治而誅賞之則此所謂大計羣吏之治者亦以贊成大宰之事而已蓋司書正掌㑹計之書以佐大宰黃氏曰徵令貢賦之令也小司徒曰以行徵令鄭鍔曰凡民財之數或有或無器械之數或備或闕田野有開闢之數夫家有衆寡之數六畜之數或有登耗山林川澤之數或有童涸無所不稽焉考其數而知之所以逆羣吏之徵令於民者果當否也民足於財而徵令寡則知其有愛民之心民乏於財而政令數則見其無恤民之意不本於書以考其數將何以逆之哉史氏曰知民財器械之數是欲使其民居而足食行而足兵也知田野夫家六畜之數是欲使其戶口繁富牛羊被野也知山林川澤之數是欲使其澤梁無禁材木不可勝用也故設官分職以為民極非止於賦斂而巳李景齊曰豳詩陳王業之由不出於夫婦耕饁烹葵剝棗之間孟子論王道之始亦不過於雞豚狗彘無失其時與夫魚鱉不可勝食材木不可勝用之數語大抵古人之於民事有不可緩而張官置吏所以分治于下者莫不以是為先故周官羣吏之治治此而已三歲之計計此而已吾觀冢宰之職有曰三歲則大計羣吏之治而誅賞之意其所計必功過之大者至司書之職有曰三歲大計羣吏之治以知民財器械之數以知田野夫家六畜之數以知山林川澤之數而後知其所計者但如此耳然則民財器械之備與乏田野夫家六畜之治與耗山林川澤之贏與縮潤與涸皆羣吏之黜陟係焉亦足以見先王之致意於民事如此後世課羣吏者責辦賦稅與夫簿書獄訟之末民生之厚與否里野之闢與否不恤也安識成周計吏之本意凡稅斂掌事者受法焉及事成則入要二焉鄭康成曰法猶數也應當稅者之數黃氏曰田野穀粟藪牧六畜山澤各以其物皆民職貢賦考其足否贏者取之寬也不足者取之隘也司書於是通其有無平其緩急而出其稅斂之法使掌事者受而行之貢賦皆有定制不可易移稅斂雜征故可隨事通融而使考官掌其法事成又入要二以備考易氏曰成周財用所出不過九貢九賦九功而巳無他取於民今司書又有稅斂之事近代釋經者謂稅斂在貢賦之外不能明指其說或者疑焉以小司徒考之其言以任地事而令貢賦凡稅斂之事言貢賦而不言九職則知稅斂者九職之稅斂所謂三農生九穀園圃育草木以至虞衡藪牧之職又至百工商賈之職又至嬪婦臣妾閒民之職凡有職者有征故總以稅斂為名何以明之以小司徒言稅斂於貢賦之後而明之不然閭師任民即九職之貢而曰以時征其賦非稅斂而何鄭鍔曰大宰以九賦斂財賄而閭師旅師之官無非掌稅斂之事者書之所在則法之所在故凡稅斂掌事者俱受法於此則取諸民者不敢取於法之外事畢使之入要二之書其要將以致諸朝其二則藏之以為鈎考之證史氏曰要者若今之正本二者若今之副本書具則其數不可得而隱王昭禹曰使入要二于司書則以知稅斂之多少故也凡邦治考焉王昭禹曰凡治於邦者司書則蚤正其書以待其來考蓋六典八法八則九職九正九事邦中之版土地之圗其書藏於司書則司書無所不掌矣職內上士二人中士四人府二人史四人徒二十人吕氏曰職內主㑹計邦賦之入掌邦之賦入辨其財用之物而執其總以二官府都鄙之財入之數以逆邦國之賦用賈氏曰九職九貢九賦之稅入皆掌之獨云賦入者賦是總名下言賦者皆類此黃氏曰大府頒財于府藏且以其數豫職內職內辨其物等總計而執之鄭康成曰辨財用之物處之使種類相從總謂簿書之種别與大凡史氏曰執其總者以見數之浩穰茍無所總何所稽考惟職內執其數之所入以是而逆邦國之賦用以是而書其二令以受財以是而逆職歲與官府財用之出以是而敘其財以待邦之移用皆不出吾所入之數所謂執其總者可得其要矣執者確然不易之謂入數既定但當量所入之多寡以制一歲之用耳捨此欲於數外廣用職內所當堅執也冢宰制國用必于歲之杪者非職內有以執其總何所據而為之黃氏曰官府財入謂內府外府之屬凡入貨賄者皆是都鄙財入蓋縣都財賦留其處以待用而其副皆在職內王昭禹曰大府曰凡官府都鄙之吏及執事者受財用焉蓋官府都鄙之吏有受財用于大府是大府入于都鄙官府職內則掌其副二之書項氏曰賦用即諸侯之貢蓋所貢與九賦九功不同若曰祀曰嬪皆指所用言之大宰亦曰九貢致邦國之用不然則逆賦用當是職歲事何以在職內黃氏曰邦國用之於國貢之於王其數皆逆知凡受財者受其二令而書之愚案職內掌入不掌出則鄭氏謂受財於職內以給公用似與職歲相亂所謂凡受財者意有司凡受財之入者其二令皆職內掌焉黃氏曰二令蓋職歲式法與府藏給豫之數此其副本也謂之令必禀於上也類聚書之備考閲及㑹以逆職歲與官府財用之出鄭康成曰亦參互鈎考之賈氏曰及㑹者至歲終㑹計職歲主出職內主入以已入財之數鈎考職嵗出財之數與夫職歲出財與官府所用之數並鈎考也而敘其財以待邦之移用黃氏曰及㑹以逆職歲與官府財用之出有餘不足可得而知矣則敘之以待大府移用鄭鍔曰國有大用內府之所共國有小用外府之所待若夫有無多寡備乏盈虛出于天之所為非人力所能及者必預備於此緩急之際通融相資是以謂之移用職內又當次敘其用知物之久近以待邦之轉移之用不特每歲之常用而已夫惟蓄財以待用又叙財以待轉移之用此所以國無匱乏之憂民無加賦之歎王氏詳說曰移用之法見於職內以其邦之賦用取具焉耳職歲上士四人中士八人府四人史八人徒二十人史氏曰不謂之職外而曰職歲者以冢宰制國用必在歲之杪推一歲之周乃得而㑹計故謂之職歲陳及之曰職內所掌盡㑹計邦賦之入職歲所掌盡㑹計邦賦之出職入者以歲所入考其所出職出者以歲所出證其所入互相稽考以防姦僞而總屬於司㑹鄭氏謂亦掌財用非也史氏曰職歲之官當視職內以為低昻彼職內所入定矣職歲乃得以式法而用之其用之多寡職歲固不敢必陳止齊曰職幣與職歲通職皆有府愚案有府者不必藏財用而文書亦當有府以藏之而職歲無賈者以職幣辨物奠録而書楬之也掌邦之賦出王昭禹曰自大府而下掌財者固非一人又有職歲者總計一歲用財之數以待歲終之考校其詳審周密一至於此雖有姦僞之吏無所肆其貪盜之罪劉執中曰其入也非職內之令則不受焉其出也非職歲之令則不授焉以二官府都鄙之財出賜之數以待㑹計而考之賈氏曰職內云以二官府都鄙之財入之數此云以二官府都鄙之財出賜之數二官一出一入皆書其二共相鈎考故職內云以逆邦之賦用此云以待㑹計而考之其事通也此官所出皆由上令所出故亦書其二令編存為案以待㑹計而考之凡官府都鄙羣吏之出財用受式法于職歲賈氏曰出財用皆為有事事有舊法用有常職歲出財皆有舊法式在於職歲故須受法於職歲易氏曰凡頒財大府以九式之法授之職歲舉大府之所授者豫之故曰受式法于職歲凡上之賜豫以敘與職幣授之王昭禹曰幣餘之賦以待賜豫職幣掌幣餘之官故賜豫則以敘與職幣授之鄭康成曰敘受賜者之尊卑王氏曰禮記所謂上先下後也王昭禹曰賜豫者王之私恩敘者先後之倫雖私恩之仁未嘗妄施焉必有禮以節之黃氏曰財出無式賜豫無敘皆不得行此所以相副二也凡二皆所以相參考大府以官府都鄙當受財用之數豫職歲職歲據之以授式法府藏憑之以出給若今之幫勘也及㑹以式法贊逆㑹賈氏曰司㑹逆羣吏之治而聽其㑹計此官主式法出財用故以敘助之黃氏曰贊逆㑹以其出數逆而知之以贊㑹計賜豫不㑹職幣之敘不與焉王昭禹曰歲㑹掌於大宰書則掌於司㑹職內及㑹以逆職歲與官府財用之出則職歲贊逆㑹者凡與職內同贊司㑹而已職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人王昭禹曰掌斂官府都鄙與凡用邦財者之幣故以職幣名官鄭鍔曰古者行禮無所不用幣以為君子雖不可以貨取亦不可以虛拘故必實幣帛於筐篚以將其厚意周官特設一官以掌之意蓋如此掌式法以斂官府都鄙與凡用邦財者之幣愚案鄭氏曰幣謂給公用之餘凡用邦財者謂軍旅非也幣未可言餘下文始是餘者蓋職幣掌斂幣振餘二事皆辨物定録以詔賜豫黃氏曰以式法出之復以式法斂之不茍贏也必使善其物足於用而有長財則為得也林氏曰幣以行禮斂以聚之而已振掌事者之餘財鄭康成曰振猶拯也檢也賈氏曰以財與之謂之拯知其足剩謂之檢掌事謂以王命有所作為賈氏曰奉王命有所造為者職幣檢其所餘則受取也王昭禹曰振者以時舉之掌事者之餘財必以時舉之以其既出以給用恐積久或易遺忘故也孫氏曰九賦斂財賄其經常之賦八焉而已先王乃於八者之中斂所用之餘以當其賦之一而足成九焉蓋散在官府者雖至寡而聚歸一職則其數亦足用彼之所損者皆有餘之物此之所補者乃可以共賜豫之頒與其沉滯而不舉不若振刷以來歸無暴橫之政以殘民也黃氏曰財用之數驗之以書契督之以要成證之以二令考之以參互制之以式法辨之有類執之有總小數之則乘大數之則㑹職內所敘職幣所振雖餘財必加嚴焉皆辨其物而奠其録以書楬其列反之以詔上之小用賜豫鄭康成曰奠定也鄭司農曰楬之若今時為書以著其幣賈氏曰既斂得幣皆當辨其物知其色類及善惡而定其所録簿書色别各入一府府别各為一牌書知善惡價數多少謂之揭王昭禹曰皆辨其物則色以别之防其或以賤貿貴也而奠其録則定其數防其或以多為少也以書楬之則明言而表之黃氏曰以書楬之詔上使知己出見餘之數不獨賜豫不免時有小用於是取之王昭禹曰幣餘之賦以待賜豫以賜豫為用財之餘事故也然賜豫亦非獨取於幣餘而已蓋賜豫之物或共於外府內府或取於典絲典枲以幣餘之餘類寡或不足以給其用故以詔上之小用賜豫而已歲終則㑹其出凡邦之㑹事以式法贊之黃氏曰王之用不㑹獨㑹其出以知餘見耳其數皆關白司㑹賈氏曰職幣主出故歲終與司㑹㑹之下贊之亦謂贊司㑹之事陳君舉曰人主逸樂常生於有餘節儉多出於不足漢武帝因貫朽索腐故得以放縱生事唐明皇見大盈庫於是賞賜無極成周職幣之官所以覺察餘財辨其物奠其録以書楬之歲終則㑹正恐人主以餘財妄用也愚案職幣餘財特賦用之餘者其所存甚微不可以漢唐豐富之財為比所以振其餘者特患有司以其微而為弊耳總論黃氏曰天下財計至浩繁也國之用度至難程也豈惟姦弊之不可考凡事之緩急先後物之精粗功苦財用之有餘不足萃於一司雖明辨強有力者猶懼不能支周之所以為善制者其大者為之九式各有制節不相踰越其小者使百司庶府凡用財者分受之是故大府受貨賄之入以式法頒之於府藏賦入之二在職內賦出之二在職歲職歲以式法授羣吏之受財者府藏無職歲式法則財不出若三司憑由勘合也羣吏既受財則以二令豫職內若三司磨勾也官府都鄙之百物財用皆有版圖在司書其二在司㑹以行㑹計之政司書敘其幣餘之財歸於職幣宰夫於是詔辟名之誅善物之賞嗚呼條綱相統脉絡相貫甚煩而有至簡者存甚博而有至要者存後之言理財者烏能易是而為善制哉司裘中士二人下士四人府二人史四人徒四十人薛平仲曰自外府掌邦布之入出而百用足以如志王者衣服之用且於是乎取之則致美以華其躬將何所不可然則邦用之均節於終者蓋司裘之所以成其始也禮庫曰司裘掌皮既有皮毛齒革亦是財賦所屬而屬大府如今軍器監屬戶部可見掌為大裘以共王祀天之服鄭司農曰大裘黑羔裘服以祀天示質也鄭鍔曰冬至祭天於圓丘王服大裘以黑裘為之說者謂黑者北方之色以象道也羔之為物羣而有禮以象禮也格天當以道事天當以禮此所以服黑羔之裘不曰羔裘而曰大裘唯天為大也賈氏曰以其祭天地之服故以大言之非謂裘體侈大也王昭禹曰大裘以簡大為名與記所謂大禮必簡同意大裘無經緯之文無繪繡之功嘗考司服之職曰王祀昊天上帝則服大裘而冕郊特牲曰郊之日王被衮以象天戴冕璪十有二旒自司服觀之則祀天之時服裘而戴冕自特牲觀之則被衮而戴冕今考是官掌為大裘以祀天與特牲之文不協然記禮之言衣裘皆為有衣以為之裼裼覆也為其䙝故必覆之其說以為表裘不入公門入公門尚不敢況敢表裘以祀天乎冬至之祀以寒故服裘於裘之上則被衮衣裘被衮則同一冕故司服王之服六而冕有五然則特牲言被衮周禮言大裘雖若不協其實一也說禮者有不敢服裘而被衮之義則據大裘不裼之文又有大裘冕無旒之論皆不足據也中音仲秋獻良裘王乃行羽物鄭康成曰良善賈氏曰謂之良者下文功裘臣所服見人功粗良裘與大裘皆君所服針功細密故得名良王氏曰致人功謂之功裘良裘非特致人功而已質又良焉仲秋鳥獸毛毨因其良時而用之良裘玉藻所謂黼裘歟薛氏曰裘之名備見於玉藻以黼裘狐白裘為君之裘以錦衣狐裘為諸侯之裘以狐青裘玄綃衣麛裘絞衣羔裘緇衣狐裘黃衣為君子之裘以虎裘狼裘為君左獮周右之裘其曰惟君有黼裘以誓省釋者以為省當為禮仲秋教治兵遂獮田則中秋黼裘所以誓獮歟鄭司農曰行羽物以羽物飛鳥賜羣吏鄭康成曰羽物小鳥鶉雀之屬王昭禹曰王乃行羽物以頒賜也先王消息盈虛與時偕行故仲春行羽物則以隂氣畢於此罻羅為將禁之矣仲秋行羽物則以隂氣盛於此罻羅為既設之矣黃氏曰戒寒候之將至詩曰七月流火九月授衣言寒為有漸也希革毛毨天地生物之仁民之無衣無褐何以卒歲王已受裘豈嘗一念忘此羽物之行頒裘繼之欲公卿大夫皆知此意為當體也季秋獻功裘以待頒賜鄭康成曰功裘人功微粗謂狐青麛裘之屬賈氏曰玉藻君子狐青裘豹褎麛裘青犴褎鄭云君子大夫士也以其褎用雜故為大夫士若君則用純故鄭引此證功裘有狐青麛裘以待頒賜也鄭鍔曰詩之七月言一之日于貉取彼狐狸為公子裘此乃獻於季秋之月者蓋九月授衣之候寒氣將至隕霜而裘可具王者襲重裘則思臣下之寒故使先獻於授衣之時待時至則頒之宫伯以時頒其衣裘若後世之賦冬夏衣所頒者宫中之士庶子此以待頒賜則不止於宿衛之臣耳王昭禹曰仲秋者隂於是乎中是月也寒氣將至王既迎寒則禦寒之具不可不備仲秋獻良裘於王乃其時也季秋者隂於是乎盛是月也寒氣總至方命民入室之始則以裘而頒賜乃其時也王大射則共虎侯熊侯豹侯設其鵠古毒反諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠史氏曰射有三曰賔射曰大射曰燕射唯大射擇士而與祭故射義曰射中者得與於祭然必以射擇人者取其內志正外體直持弓矢審固然後可以言中心在焉故也祭之有求於隂其心能若射之取中則神格矣故祭有取乎射愚案陳及之三射說見射人鄭康成曰諸侯謂三公及王子弟封於畿內者卿大夫亦皆有采地其將祀其先祖亦與羣臣射以擇之凡大射各於射宫賈氏曰從王已下至大夫射各自於其西郊之學射宫之中知然者案儀禮大射云公入驁自外而來入明王已下皆於郊學也陳及之曰大射所以擇與於祭者司裘掌王之事而已畿內諸侯大夫采地無限司裘豈能一一供之鄭康成曰侯者其所射以虎熊豹麋之皮飾其側又方制之以為􅙯謂之鵠著于侯中所謂皮侯賈氏曰侯中上下俱有布一幅夾之所飾者惟兩傍之側其鵠還以虎豹皮為之鄭鍔曰侯以布為之貴人事之始用虎熊豹麋之皮示服猛討迷惑者賈氏曰虎熊豹是猛獸麇者還也黃氏曰天子三侯所服者摯而衆也虎摯於熊豹摯於麋麋觸而不搏王氏曰王及諸侯以正物為事正物以服猛為先獨王共虎侯則虎尤猛故也卿大夫之德則能養人而已不能除患不足以養人鄭康成曰王之大射虎侯王所自射熊侯諸侯所射豹侯卿大夫已下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十糝七十犴五十逺尊得伸可同耳梓人疏曰天子九十弓無文約畿外諸侯言之賈氏曰逺近三等有尊卑分為三節尊者射逺卑者射近故知王射虎侯諸侯卑於天子其自射熊侯明助王祭亦射熊侯卿大夫卑於諸侯以其自家射麋侯五十步明助王亦射豹侯五十步卿大夫更言已下者兼有士亦射豹侯愚案大射儀曰量人量侯道以貍步大侯九十參七十干五十大侯之崇見鵠於參參見鵠於干干不及地武射器皆入梓人畫物大史俟于中所以聽政司射誓之曰公射大侯大夫射參士射干射者非其侯中之不獲蓋凡髙大逺皆尊者所宜君之射道獨遠於臣下乃理之當然也至於當射釋獲之時卻又優君故大射儀云司射請釋獲于公公許司射西面命曰中離維綱揚觸捆復公則釋獲衆則不與唯公所中中三侯皆獲是則不必至遠不必中鵠亦自釋獲也學者觀此可以曉得禮意鄭康成曰所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯士不大射士無臣祭無所擇鄭景望曰諸侯卿大夫以下侯道視王每降以二十弓雖曰德之殺亦王所以責已者重而待物者恕也鄭康成曰侯中之小大取數於侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈尊卑異等此數明矣賈氏曰二寸據把中側骨中身也弓别取二寸以為侯身也考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較直也射所以直已志鄭鍔曰禮記射義之說則曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠謂鵠之言直也射所以直已之志然則諸侯卿大夫謂之皆設其鵠蓋如此也王氏曰凡射以服禽獸服禽獸然後得其皮以為裘則共侯者司裘之事鄭鍔曰侯在梓人飾之以皮設之以鵠則在司裘大喪廞許金反裘飾皮車賈氏曰周禮稱廞者多故書皆為淫先鄭皆為陳後鄭皆從興者車僕云大喪廞革車圉人云廞馬亦如之即是所廞車馬又禮記檀弓云竹不成用瓦不成沫琴瑟張而不平竿笙備而不和皆是興象所作明器非陳設之理故不從先鄭也廞裘則興象生時裘為之謂明器中之裘王昭禹曰廞裘與廞樂同意廞者陳之而無實用陳之非所以致死不惡於不仁無實用非所以致生不惡於不智凡廞儀物者亦仁智之盡也鄭康成曰皮車遣車之革路王昭禹曰明器之車以皮飾之事死如事生之意凡邦之皮事掌之歲終則㑹唯王之裘與其皮事不㑹王昭禹曰歲終則㑹者㑹其一歲用皮之數惟王之裘與其皮事不㑹所以優至尊不言后者后之服無以皮為之者掌皮下士四人府二人史四人徒四十人鄭鍔曰百工之制一歲所用皮革不勝其多如函人為甲韗人為鼓輪人為輪而鞔轂輿人飾車而鞔輿與夫鮑人韋氏裘氏五工之所用無非皮也故立掌皮之官王氏詳說曰考工記曰攻皮之工五函鮑韗韋裘是已然考工今有函人鮑人韗人而韋氏裘氏缺焉裘氏其司裘歟韋氏其掌皮歟知此則知考工記一篇必非漢儒作陳君舉曰古之皮幣乃國家所重天府所用甚廣故禮贄皆以皮幣為主觀當時皮事無所不㑹唯王之裘與其皮事不㑹故知出入之數極多大較與貨賄相敵此所以亦屬大府皆司㑹為之長掌秋斂皮冬斂革春獻之史氏曰皮有三始折謂之皮已乾謂之革賈氏曰許氏說文獸皮治去其毛曰革既熟謂之韋其實一物賈氏曰秋斂皮者鳥獸毛毨之時其皮善故秋斂之革須治用功深故冬斂之王昭禹曰春則用皮之事於是乎始故春獻之鄭康成曰皮革踰歲乾久乃可用獻之獻其良者於王以入司裘給王用遂以式法頒皮革于百工鄭鍔曰以式法頒于百工當用皮者頒以皮當用革者頒以革用舊式以頒之則多寡為有度循邦法以頒之則非法所當用者不與之史氏曰式法者有常之數懼其用之無藝而取之多賈氏曰既獻其良者於司裘其餘則入百工即冬官裘氏韋氏函人之類用皮者共其毳只鋭反毛為氈以待邦事史氏曰毳毛之細縟者緝而為氈貴其溫賈氏曰若掌次張氈案則掌皮共毳毛與冬官使作氈易氏曰邦事自祭祀以至喪紀無不用故掌皮皆有以待之歲終則㑹其財齎王昭禹曰泉布謂之財行費謂之齎斂之則用財斂而散之則有行費史氏曰歲終不㑹其皮事而㑹其財齎者皮革既斂春已獻而入于司裘用之者司裘耳至於斂時之財齎則在掌皮也其曰財齎行者有裹囊也蓋禽獸逺人不聚於城郭而息於山林掌皮之斂豈敢千里疲人以輸送必使齎其財而市之其財曰財齎以明斂者非強取周禮訂義卷十一
