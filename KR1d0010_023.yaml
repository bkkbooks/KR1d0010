body:
  text: 周禮訂義卷二十三宋王與之撰調人下士二人史二人徒十人鄭康成曰調猶和合也史氏曰凡人之心方其有觸則怒怒則爭爭則鼎鑊在前不顧也及其怨隙已成殺傷被執退省其身已無生路追念其父母妻子不可復見未始不悔悟而恨旁人之不我救止先王灼知人情之隠設調人以諧和於始使不至於此地忠厚之至也掌司萬民之難乃旦反下同而諧和之項氏曰難相與仇讎凡民之難常起於有已有物己與物偶不能無愛惡愛惡相攻則忮心生故有以一日之忿而為終身之仇讎眦睚必報雖死無恨此其為難豈勝言哉先王於是命調人諧和之凡過而殺傷人者以民成之鄭康成曰過無本意也成平也鄭鍔曰過誤殺傷在此無可讎之理在彼有必讎之義調人合鄉里之民立為證佐共明其非本意以平其怨怒之心亦省刑罰之一端劉執中曰成之必以民者使其比閭相親愛之民勸佐而行其成則不敢變渝而復不平鄭康成曰春秋傳曰惠伯成之之屬鄭景望曰故殺故傷斷以正刑無所復議過非本意而報以正刑聖人所不忍周家之法五刑之疑雖大辟皆有赦有罰司刑者原刑定法則如此鳥獸亦如之鄭康成曰過失殺傷人之畜産者項氏曰如魯人以介共雞而相攻亦難之所起也凡和難父之讎辟音避諸海外兄弟之讎辟諸千里之外從才用反父兄弟之讎不同國君之讎眡音視父師長之讎眡兄弟主友之讎眡從父兄弟弗辟則與之瑞節而以執之史氏曰凡怨讎蓄積於心不見則已見則不可已故和之之法亦在於弗使之見此謂之辟項氏曰和難者非能止忠臣孝子之心和之使勿讎也亦不過勸之使辟焉爾鄭康成曰和之使辟於此不得就而仇之九夷八蠻六戎五狄謂之四海主大夫君也春秋傳曰晉荀偃卒宣子盥而撫之曰事吳敢不如事主鄭鍔曰一國之主有儀有衛胡為有過誤兄殺耶所謂主者乃主以利得民之主左傳所載家臣謂大夫皆曰主彼為主君則其臣事之人豈無豫讓之於智伯者乎瑞節玉節之剡圭黄氏曰瑞與節也節豈旌節歟和之而不肯辟者是不從王命也王以剡主使調人執之治其罪也劉氏曰若襄二十二年子展所以黜游氏之義項氏曰與讎者瑞節使執其讎以歸於官有節則無敢敵者而忠臣孝子不至於遭害又執之於官殺之則非民之專殺而其讎之子孫不能以復報也賈氏曰父之讎已下皆是殺人之賊王法所當討即合殺之未殺之閒雖以㑹赦猶當使離鄉辟讎此經畧言其不言者皆以服約之愚案唐虞之法省過無大康誥亦曰乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺調人所言謂過而殺人耳然過者在所赦而於人有父兄君臣之讎不可同處傷孝子順孫之心故使之辟非謂凡傷殺者皆然趙商問春秋之義子不復讎非子臣不討賊非臣楚勝之徒猶言鄭人在此讎不逺矣不可以見讎而不討子夏曰居父母之仇如之何孔子曰寢苫枕干不仕不與共天下遇之市朝不反兵而鬭天下尚不反兵海内何為和之項氏曰父母之讎不與共戴天凡四海之逺雖有至孝之心不能往矣故辟之海外兄弟之讎不反兵然千里之外足矣從父兄弟之讎不同國同國則必報君與父同師長與兄弟同主友從兄弟同史氏曰海外逺矣千里之外次之不同國又次之親疎之義豈無等差黄氏曰殺人者罪不至死非其子弟之心故為辟讎之法上之人行法原情故過誤殺傷許和解至於子弟之心豈能㤀故又使相辟而後其難可和不然各奮私義怨讎滋多民不和矣鄭景望曰子弟之心視其父兄見殺見傷而從末減也則有所不能忍聖人又忍其情使殺人之父兄者辟之逺方異地以伸夫為子弟之情弗辟則論其違令之罪而拘置之於其地於過誤而弛重辟之施縁人情而立辟讎之法茍在四海之内在千里之内與之同國而不報焉非臣子也故得而報之者臣子之志𫉬伸而在海外在千里之外在異國雖不得報亦足以慰其志矣此調人之官所以謂之和難也王氏詳說曰復讎之人本為父兄子弟設交遊師長主友之家則何預於外人哉賈氏以無子為言得之矣凡殺人有反殺者使邦國交讎之賈氏曰既殺一人其有子弟復殺之恐後與己為敵而害已故鄭云欲除害弱敵其殺人者或逃向鄰國所之之國得則讎之也史氏曰殺人者死王已殺之仇家復思報焉與邦國共棄之鄭鍔曰此蓋有司以法殺人有敢讎而殺之者其所殺者雖有司之身原其意乃不服國家之法宜天下所不容凡殺人而義者不同國令勿讎讎之則死劉氏曰殺人而合於義為𨼆謀禍惡之未發而能先事殺之朝士曰凡盜賊軍鄉邑及家人殺之無罪是也遷其子孫使居異國鄭鍔曰此蓋當刑而逃竄不𫉬官許人捕者也人有捕之格鬭致死雖曰兩下相殺然殺之合義故令辟而之他彼人之父兄子弟皆勿得而讎之讎之則是殺奉命之人烏可不死哉史氏曰宜殺者勿使讎異國而處息其怨心若有讎者是不知上之法禁殺之可也項氏曰殺人而義則彼必不義也然猶使之不同國先王不忍使人臣子與殺其君父者同處然既義而不同國則不可讎矣讎之必死以伸義也愚按曲禮曰父之讎弗與共戴天兄弟之讎不反兵交游之讎不同國檀弓子夏問孔子居父母昆弟之讎意亦類此然後知復讎一事其重如此周官調人之職乃使其父兄師長之讎皆有所辟然則禮經豈教人殺人調人豈縱惡容姦者乎蓋禮記所言主為復讎之人言周禮所言主為人讎之人設且調人之和難乃過殺人者耳非過殺人者自許以復讎也又曰凡殺人而義者不同國令勿讎讎之則死謂如為衆殺之得其宜則不當讎故亦勿讎朝士曰凡殺仇讎者書於士殺之無罪此仇讎謂所當殺者然後書於士無罪不書是有過也如此則調人之職甚明其所和者在於過而其所不讎者在於義使謂之縱惡也瞽瞍殺人臯陶為士則執之法之所在雖天子不得庇其父豈有人君立法又汲汲於和其難哉吾以是知調其過與義者乃所以順其情也故公羊子曰父不當誅子復讎可也父受誅子復讎此是為子之道此雖論有司之事與調人之職語異而意同其讎之可復與不可復亦視其當殺與不可殺耳唐𤣥宗時殿中御史楊萬頃殺張審素二子手殺萬頃繋表於斧言父寃狀議者多言當宥𤣥宗下勅曰國家設法期於止殺各伸為子之志誰非徇孝之人展轉相求何有紀極遂杖殺之使其父果有寃死烏得行一切之意至憲宗時韓愈因梁恱事作復讎狀以為據禮經則義不同天考法令則殺人者死禮法二事皆王政之大端殺之與赦不可一例宜集議奏聞酌其宜而處之則經律無失其㫖是觀其當誅則用調人交讎之義觀其不當誅則用調人復讎之說凡有鬭怒者成之不可成者則書之先動者誅之鄭康成曰鬭怒辨訟者也史氏曰鬭怒平之則不至於爭不受平者為籍以紀使其不可以再犯先動者誅則雖有怒者不敢先𤼵以麗於罪此皆息怨息訟之要術也王昭禹曰好勇鬭狠將亡其身以及其親必有以成之使彼此各無虧焉茍其不可成亦强梁而不可教者也故必書以誌其事茍又先動所謂怙終賊刑則必誅之陳及之曰胡五峯曰昔先王盛時不令而行不禁而止天下風動無一不得其所令行禁止天下無寃民今司徒之屬有調人者掌諧和萬民之難有辟讎之法有交讎之令有成鬭怒之書此下陵上替政令不行之明驗周公經世之典顧如是哉嗚呼周公之法令豈特為當時計哉為當時計則成王之為君周召之為臣其百執事有司皆賢大夫也不令而行不禁而止固不當有如調人者可也若以周公身致太平此等官不必置是相率為茍安之計一日周公死後人無所倚仗矣且司市之法曰國君過市則刑人赦夫人過市則罰一幕世子過市則罰一帟夫設罰以禁過市者為其燕遊無度也以成王之君夫人世子豈至於燕遊無度哉設法以防之為後世也凡此等可以類推鄭鍔曰調人之法不以復讎為重乃許以辟免戰國遂有借交報仇以成閭里之俠如郭解之徒皆報私怨儒者之論復讎如韓愈栁宗元紛紛不一調人之法果可行於後世乎媒氏下士二人史二人徒十人鄭康成曰媒之言謀也謀合異類使和成者今齊人名麴􅨠曰媒賈氏曰媒氏在此者集名云配儷男女取地道生息故也薛氏曰人之至情室家子孫之望無以繋縻其志則為善之心有不可得而固於是有媒人焉掌萬民之判而合之故凡男女之無夫家者上之人實為之制禮而㑹合之使夫内有室家保守之安下有子孫長久之望則教可得而致矣掌萬民之判鄭鍔曰魯昭娶吳為同姓謂之吳孟子陳司敗譏其不知禮蓋婚姻合二姓之好當辨氏别族有百世而不可通者周人立媒氏之官慮萬民之愚不知其别乃為之掌其判使男女者知其别然後可以通婚鄭康成以為判者半得耦為合主合其半成夫婦也余以為判别也謂男女之别知其族類之所由别則無同姓為婚之失也史氏曰曲禮曰男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨朋友以厚其别也蓋有判則有合凡男女自成名以上皆書年月日名焉吕氏曰成名者案内則子生三月之末男角女羈以見於父父名之宰書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯藏諸州府其制詳宻如此戰國以來不復重民之生此制廢闕久矣史氏曰若春秋桓六年九月丁夘子同生是也鄭鍔曰男女始生三月父名之際必記於版則知其二十三十可以嫁娶之時矣令男三十而娶女二十而嫁鄭康成曰二三者天地相承覆之數也易曰參天兩地而倚數焉賈氏曰王肅曰家語哀公問孔子曰男子十六精通女子十四而化是則可以生民矣開禮男三十而有室女二十而有夫豈不晚哉孔子曰夫禮言其極亦不是過男子二十而冠有為人父之端女子十五許嫁有適人之道於此以徃則自婚矣然則三十之男二十之女中春之月者所謂言其極法耳李氏曰㛰姻之禮要在及時國無鰥民則桃夭之詠作喪其配耦則有狐之刺興彼室家而繋之以王者之風為人主者不可不察孟子對齊宣曰内無怨女外無曠夫王如好色與百姓同之於王何有誠哉是言也人主知好色而不知下無室家知逞欲而不知下有怨曠其可乎天地不合萬物不生有夫有婦然後為家上得以養父母下得以育子孫生民之本於是乎在故設官主判合之禮凡娶判妻入子者皆書之鄭鍔曰娶妻者若媒氏書之而判妻入子亦書之者蓋判之為言分别而去也民有夫妻反目至於仳離巳判而去書之於版記其離合之由也入者不宜入者也已無嗣子或入同宗之子以為嗣如今世之立嗣入其所不宜入茍不記之則他日之㛰姻無别矣司農以入子為嫁女康成謂媵姪娣不聘之者甚失入子之義矣鄭景望曰後世之法不許收養異姓子孫與此意同蓋慮同姓為㛰亂人理也然法存而入子者未嘗書於官嫁娶者無官以司其判則姓雖異而實同禮雖備而人理實亂者有矣先王所深惡也中春之月令㑹男女鄭康成曰中春隂陽交以成昬禮順天時也王氏詳說曰王子雍執孫卿之言以為霜降逆女冰泮殺止遂别家語以為說曰霜降而婦功成嫁娶者行焉又曰冬合男女且疑仲春之月遂非婚姻之期曾不謂詩之所言大率以春為正如曰有女懐春如曰春日遲遲女心傷悲如曰倉庚于飛熠燿其羽皆以春為正於是時也奔者不禁若無故而不用令者罰之鄭鍔曰或謂是時令㑹男女之當嫁娶者使得以及時則奔者宜禁反不禁之鄭康成以謂重天時權許之是否余以為康成一語之謬傷敗風教至今牢不可破可勝嘆哉周人立法之本意言奔者不禁若無故而不用令與今律文言若之若同若之為言及也謂不禁男女之奔及無故不用令者俱有罰耳奈何以為重天時權許之耶陳君舉曰奔者不禁不當行而行也無故不用今宜成禮而不成禮也故當皆有罰史氏曰納采問名納吉納徴請期㛰禮之當也當中春之月而是禮有不備者皆謂之奔奔者不禁聴其殺禮而成㛰也内則曰聘曰妻奔曰妾先王重聘禮故有是說其實皆由媒氏而合可謂之淫奔乎國有凶荒家遇喪禍必待備禮男女失時矣此謂之故無故而不備禮其罰也宜矣鄭景望曰罰者罰其父母兄弟尸㛰嫁之責也司男女之無夫家者而㑹之鄭康成曰司猶察也無夫家謂男女之鰥寡者凡嫁子娶妻入幣純帛無過五兩鄭康成曰純實緇字納幣用緇婦人隂也凡於娶禮必用其類王氏曰㛰姻欲致一故用純色之帛五兩十端也必言兩者欲得其配合之名十者象五行十日相成也王氏曰天數五地數五五位相得而各有合五兩則以天地合數為之士大夫乃以𤣥纁束帛天子加以穀圭諸侯加以大璋雜記曰納幣一束束五兩兩五㝷然則每端二丈鄭鍔曰記言男女無幣不交不親昬禮必用幣幣以將厚意亦禮之所寓也純帛五兩富者無過乎此貧者亦可以及焉禮之中制也然娶妻入幣而嫁子亦入幣者蓋嫁女則彼當入幣入入於女家禁遷葬者與嫁殤者鄭康成曰遷葬謂生時非夫婦死既葬遷之使相從殤十九以下未嫁而死者生不以禮相接死而合之亦是亂人倫也史氏曰男女生為夫婦死則同穴遷葬者謂以死者求婦嫁殤者謂以死者求夫不經之甚以此坊民後世猶有蒼舒而合葬者王昭禹曰婚姻所以合二姓之好天地之義受命則於祖親迎則於扉三月而後廟見未廟見而死猶不遷於祖祔於皇姑歸葬於女氏之黨以示其未成婦殤而死者乃妄為嫁娶豈禮之意乎凡男女之隂訟聴之于勝國之社其附於刑者歸之于士鄭鍔曰男女隂訟言不可道也豈可宣露於人哉勝國之社國亡則社存奄其上棧其下不受霜露之氣隂閉無所通隂訟聴於此隱而不露儒者相傳云召伯聴男女之訟於甘棠之下余嘗笑其不考行露甘棠二詩甘棠美召伯之教明於南國而行露乃聴訟詩耳召伯若於甘棠之下聴男女之訟聞周公勝國之社之說寧不愧耶王氏曰社隂故於兹聴隂訟神所在也明當敬而不䙝鄭康成曰不在赦宥者直歸士而刑之不復以聴士司冦之屬司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人薛平仲曰夫婦男女人之大欲存焉其次則財利之所交先王既為之設媒氏以遂人之大欲矣而就利之心容可不致其規畫哉方其致民而交易人情固易譁也非有位尊權重者以鎮之則情偽紛紛殆有不可得而遏者故司市必以下大夫為之長而質人之質其成門里人之斂其布亦各士為之其大綱固巳舉矣而猶慮夫情偽之不勝窮而耳目之不足以盡防也彼其市肆之間固有深知其情偽而足以為耳目之用者於是自胥師至肆長夫皆居之門里次而諳於市道者必使司市辟之故精於伺察者則以為胥師善於物價者則以為賈師司虣以禁鬭嚻司稽以執盜賊胥以襲其不正肆長以平其名實凡市治之所當曲防者莫不各庀其司焉彼其徒既樂於上之用矣其有梗於門里市者曾不得苟容於其間則雖使五尺之童入市而莫之或欺矣及其市治之可行也其所謂商賈者能無淹沮之憂乎所謂齊民者能無倉卒之須乎於其後也則有泉府之官以門里人之征布而制斂散之權焉用以濟市政之窮四民之相須者於是有定志矣掌市之治教政刑量度禁令劉氏曰治謂正萬民交易之法賈氏曰即下文云大治小治教謂使三市信義不欺賈氏曰即下文以次敘分地之等謂教之處置貨物也政謂平百物輕重之價賈氏曰即下文政令禁物靡等刑謂制盜賊姦偽之民賈氏曰即下文以刑罰禁虣量謂執五量以定穀米之平度謂謹五度以定布帛之制賈氏曰即下文量度成賈者禁謂壊法亂俗之物不儥於市令謂宣教立政之事必憲於民賈氏曰即下文賈民禁偽是也八事者司市之大經王昭禹曰致天下之民聚天下之貨使之懋遷有無阜通貨賄者莫大於市茍無官以司之則智詐愚勇怯暴攘奪誕慢決性命之情以爭無所不至矣先王由是設官以司之治以理之教以化之政以正之刑以制之以量多寡則有量以度長短則有度止使勿為則有禁敕使為之則有令治教者本政刑者末量度者所以輔治教之器禁令者所以輔政刑之具八者既立防制曲備雖有智者不能逞其姦雖有勇者不敢肆其暴鄭景望曰攷有司治市之法乃善俗之政也天下之亂積於人心之趨利利之所聚莫甚於㕓市於此致詳焉是亦所以正人心而遏亂源也養之必有以教之利之必有以防之細大畢舉無有偏枯罅漏之處斯其為王政歟以次敘分地而經市鄭鍔曰治市雖有上八者之法將以經理之使井井有條則又當有九法鄭康成曰次謂吏所治舎思次介次也若今市亭然敘肆行户剛反列也王昭禹曰敘所謂各於其地之敘是也劉執中曰謂司市二十有八人各以其所居之次為序分其地掌其肆鄭康成曰經界也賈氏曰經界其市使各有處所不相雜亂以陳肆辨物而平市鄭康成曰陳列也王昭禹曰物所聚當陳之使買者易見辨之而使不雜則貨賄各以類聚無混淆之患此市所以平也以政令禁物靡而均市鄭司農曰靡侈靡也王昭禹曰物之侈靡易以豉反售受又反民將貴異物而賤用物故以政令禁之則物無異尚人無異好市適於均而無不平之患矣以商賈音古阜貨而行布鄭康成曰通物曰商居賣物曰賈阜盛也鄭司農曰布謂泉也王昭禹曰貨資商賈而後阜布資貨物而後行蓋布者所以權百物而通之貨苟不阜則布無所通故必以商賈阜貨而行之以量度成賈音嫁而徵儥音育鄭康成曰徵召也史氏曰招誘也儥買也賈氏曰儥字所訓不定下文貴儥鄭注貴賣之亦望文為義也王昭禹曰量以量多少度以度長短既以度量而平之則物價之高下既定然後可以召儥儥賣也以質劑子隨反結信而止訟愚案質劑見小宰史氏曰質以人證劑以書約信要立則市無爭訟矣鄭鍔曰空言無信負則不償訟乃不止為之長質短劑結為一定之約有信不欺則爭訟可止矣以賈民禁偽而除詐鄭康成曰賈民胥師賈師之屬鄭鍔曰以偽飾貨民被其欺則詐不可除用賈民以為市胥知物情偽則詐可除矣以刑罰禁虣而去盜鄭康成曰刑罰憲徇扑項氏曰以强害人謂之虣非其有而取之謂之盜王昭禹曰利之所在强梁者或不能無虣貪汙者或不能無盜不懲之以威則不能禁而去之故大則以刑小則以罰以泉府同貨而斂賒鄭康成曰同共也王昭禹曰凡市之不售與貨之滯於民用者則以其價買之此所以斂之也物楬而書之以待不時而買者各從其抵而予之此所以賒之也斂之則民無賤儥之患賒予之則民無貴買之患如此則開闔斂散出於一人盈虚有無通乎上下豈非與民同其貨乎大市日昃音則而市百族為主朝市朝時而市商賈為主夕市夕時而市販方萬反夫販婦為主鄭康成曰日昃昳中也市雜聚之處言主者謂其多者也鄭司農曰百族百姓也賈氏曰百族或在城内或在城外容其來往故於日昃以後主之言百族為主則兼有商賈販夫販婦商賈為主則兼有百族販夫販婦販夫販婦為主則兼有百族商賈鄭鍔曰百族殆市之豪族大姓以財雄之人歟商賈阜通不過視其財之多寡豪族大姓獨饒於財盡合商賈之財貨而有之於日昃之時繼商賈之後靡物不聚則其市大於商賈矣言於朝市之前謂其市之為甚大王昭禹曰自朝至於日中為商賈交易之市百族乃百官族姓非專市利則宜避商賈故大市日昃而市百族為主販夫販婦所得纎微至夕而罷故夕為主王昭禹曰販夫眅婦朝貨夕賣衣食於日力其販也以日之餘力故夕市夕時而市凡市入則胥執鞭度守門市之羣吏平肆展成奠音定賈上時掌反旌於思次以令市市師涖焉而聴大治大訟胥師賈師涖於介次而聴小治小訟鄭鍔曰先儒之說謂市在一院之内則宜有門市者以時入門市胥執鞭度以守之市之羣吏上旌以令之市師是時入於思次鄭司農曰市中候樓也鄭康成曰若市亭胥師賈師入于介次鄭康成曰市亭之屬别小者也黄氏曰序官胥師賈師皆二十肆則一人介次其治舍也有訟則聴之所謂平旦側肩而入者敢冐法慢吏而罔市利哉鞭度者無刃之殳繫鞘於上則為鞭因其長刻尺寸則為度爭門者則執鞭以威之爭長短者則執度以齊之物一而用二又因以禁戢焉羣吏則自胥師以下各平其列肆使有分界而不爭展省其貨之成否使中度而不罔利王氏曰器中度布帛精粗中數木中伐鳥獸魚鱉中殺此所謂成也肆定物成乃奠價之高下而揭柝羽之旌於思次以令市使人望而知其當市也利之所在皆有貪得之心上旌之次其名曰思使之見利而思義耳市師鄭康成口市師司市也涖此所以聴大治大訟則亦冝先致思歟若夫胥師賈師雖市小吏而小治小訟亦於介次而聴之言介則知思之為大言思則知介者思之次也市師聴治訟之大胥師賈師聴其小豈非大事從其長小事則專達歟凡萬民之期於市者辟布者量度者刑戮者各於其地之敘王昭禹曰期於市者謂有賣買要約於市也賈氏曰凡萬民之期於市者有此已下三事黄氏曰辟法也布泉也四方之布雜至必於是攷法非法不用賈誼曰錢法不立鄭曰攷實諸泉入其意當如是王氏詳說曰辟若宰夫之所謂失財用物辟名之辟同謂名存而實亡也王昭禹曰辟布者謂犯法所罰之布黄氏曰度量者官為之式掲以示民使凡為斗斛丈尺者取法於此也鄭言若今處斗斛及丈尺恐亦以此賈氏曰謂斗斛處置於米粟之肆丈尺處置於絹帛之肆賈氏曰敘則諸物行肆之所王昭禹曰敘則前所謂以次序分地而經市者也劉執中曰辟布者犯罪於司市所謂出布者以馬得罪則立之於馬肆以量得罪則立之於粟米之肆以度得罪則立之於布帛之肆其刑戮而尸於市皆亦有常也不失其敘者所以令衆而懲其惡凡得貨賄六畜者亦如之三日而舉之鄭康成曰得遺物者亦使置其地貨於貨之肆馬於馬之肆則主求之易也三日而無識認者舉沒入官凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微鄭鍔曰貨賄之為用六畜之為養珍異之為玩懋遷其有無雖資於商賈作法以低昂實本公上鄭司農曰亡者使有無此物則開利其道使之有鄭康成曰利利於民謂物實厚者害害於民謂物行苦者使有使阜起其賈徵之使亡使微抑其賈卻之侈靡細好使富民好奢微之而已王昭禹曰物之靡者特賤以却之使微而已李景齊曰先王因物之盈虚善否適時而為之低昂不惟使之有無相通亦習俗所係不可不正凡通貨賄以璽節出入之黄氏曰璽節掌於司關貨出入皆司闗受之入達於市出達於其所至此市政也故見於司市職貨之出内必有司闗之闗節王之司市邦國之司市不自為出内鄭言非也王昭禹曰貨賄用璽節以防其欺出自市達於門關入自門關達於市國凶荒札喪則市無征而作布鄭鍔曰凶荒札喪之際民方困阨茍市有征則物貴而民重困故市無征當是時民困於財錢不乏則民蘇故宜鑄作布泉也周景王時鑄大錢單穆公曰古者天降災戾於是乎量資幣權輕重以救民卒鑄大錢以勸農贍不足百姓䝉利焉然則凶荒札喪而作布乃救患之一術陳及之曰市既無征則物聚多物多則錢重錢重則物反輕非所以便商賈也作布則物雖多而錢不重商賈𫉬其利則來者多矣凡市偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二鄭鍔曰市者姦偽淵藪利之所在有禁以禁之則不敢為有刑以刑之則不敢犯禁莫先於偽飾蓋姦人欺民以罔利眩偽以為真能禁其偽飾則人不受其欺矣王昭禹曰王制曰有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市戎器不粥於市犧牲不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五穀不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市周官司市所謂在民在商在賈在工者十有二乃此類也凡此之類其數有二十四在工不得作在民不得畜在商不得資在賈不得粥别而言之故各有十二蓋圭璧一金璋二命服三命車四宗廟之器五戎器六用器七兵車八姦色九錦文十珠十一玉十二凡此在工不得作也犧牲一布二帛三衣服四飲五食六五穀七果實八木九禽十獸十一魚鱉十二凡此在民不得畜者也商則資此而通之者也賈則因此而粥之者也故分而言之亦皆十有二劉執中曰偽飾之禁十有二而四民共當其罰刑無敢犯之者所以立制度而厚風俗也陳君舉曰豈惟慮民之欺亦不使之廢業以作無用之物人廢業則本不厚矣物無用則國不實矣市刑小刑憲罰中刑徇罰大刑扑罰其附於刑者歸於士鄭鍔曰司冦五刑如國刑如野刑之類而無市刑今有三等之刑又有歸於士之刑者蓋衆之所聚不可以常刑治而爭利於市以犯有司者皆姦民之雄少縱不治則市不肅俟其已甚斷於士師則無及故隨其犯之輕重而用三等之刑非五刑之刑小刑已决罰必表憲其所犯之由中刑則行而徇路使人見其鞭笞之狀大刑不决罰於官府往就其地扑以示之使其知司市而不可犯也三刑之外有犯五刑者則歸於士師司市不敢專司徒於萬民不服教而有獄訟者媒氏男女之隂訟與此皆言附於刑者歸於士蓋謂用五刑而已國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷鄭康成曰謂諸侯及夫人世子過其國之市大夫内子過其都之市市者人之所交利而行刑之處君子無故不游觀焉若游觀則施惠以為說國君則赦其刑人夫人世子命夫命婦而使之出罰異尊卑也鄭鍔曰不言天子公卿乃言國君以下過市之事者蓋侯國逺去王畿無所畏憚則游觀易縱所宜防也陳君舉曰自國君過市刑人赦以下先王所以禁其過市者蓋此等宜在朝不宜在市正所以别市朝分貴賤定士農工商之業劉迎曰先王之立法防人欲於未然之前不待其已然而禁之夫市者不特利之所在天下竒技淫巧之物聚焉一或過市則所見異於前竒靡淫侈之物得以蕩其心而變所守於内矣故以赦市之刑人愧之所以制其心於未然而不敢為過市之舉也至於夫人世子命夫命婦皆不期而驕侈者故罰其帷幕帟蓋正所以責其無以自蔽而見淫侈之物也國君而下尚然况天子何求而不𫉬者乎王氏曰過市非所以明逺利也市人犯刑以利而已國君近利則市人何誅焉故國君過市則刑人赦所謂刑人亦憲徇扑三者而巳幕也帟也蓋也皆庇下之物為上近利則無以庇下矣黄氏曰匿王與后而不見以為攷禮正徳必不當有此凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事鄭康成曰市司司市賈氏曰市司帥而從以其知物賈者也闕氏曰所謂市者非特國市而已遺人五十里有市市有候館則所以待賓客㑹同師役之事量人營軍之壘舎量其市朝州涂軍社之所里則道路之與軍社亦有市矣有市則有賣儥之事而當時未嘗有外市之官特以國市總之惟㑹同師役之時則市師帥賈師而從之是以國市之官而分任其事王昭禹曰如此則師衆所聚無賤儥貴買以傷民財之患矣周禮訂義卷二十三
