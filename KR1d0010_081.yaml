front:
  text: 周禮訂義後序東巖王君次㸃彚周禮數十家説衷以已見為訂義若干卷真文忠公既序之矣又拳拳俾予贅卷後辭十數不獲将行束擔弛日以竢予文遂勉為之言周禮一書先儒疑信相半横渠氏最尊敬之五峰氏最擯抑之二説交馳學者幽冥而罔知所從甞平心思之周禮真周公書漢志所謂周官六篇是也獨不幸有三可憾在成周未能為成書在後世不得為全書此予每深致其惋惜嗟嘆之意何以的知為周公書是書之首曰惟王建國辨方正位體國經野設官分職以為民極此言宅洛建官之㫖司徒職曰日至之景尺有五寸謂之地中乃建王國大宰職曰掌建邦之六典以佐王治邦國此演而伸其㫖也洛天下之中地六官太平之盛典以中地行盛典此周公佐成王宅洛之本心周書召誥曰旦曰其作大邑其自時中乂洛誥亦曰其自時中乂萬邦咸休此周公之心也又書周官載六卿自冡宰至司空雖不條陳設屬亦曰六卿分職各率其屬大㫖與六典合所以的知為周公書然向使周公得輔成王於洛邑推行其六典事制曲防之間文理密察之際必猶有所改定庶幾為成書以詔後世惜也洛宅未及遷六典有書未嘗行可憾一也仲尼慕周公者也從周之歎發於閒居使得遂其為東周之志六典必見於推行討論潤色益至於大成備周公之未備者不在仲尼乎横渠氏謂仲尼繼周損益可知是也惜明王不興天下莫能宗之不復夢周之歎方形而天復不憖遺矣可憾二也秦火後經籍多殘失禮書為甚漢武帝時河間獻王始得周官於民間比詩書最晚出故武帝詔有禮壊之歎顔師古謂亡其冬官補以考工記有所亡有所補非全書也此伊川氏所謂禮經多出於掇拾煨燼之餘安得句為之解是也可憾三也有是三可憾則是書之存於天下後世固足以見周公為萬世開太平之大㫖然前之既未為成書後之又不得為全書則不能不使萬世而下抱不得見周公經制大成之深恨先儒乃盡歸咎於劉歆以為勦入私説迎合賊莽不亦甚乎次㸃研精覃思十餘年而訂義成顯幽闡㣲商是確非其有發先儒所未發者多矣至其釋周公将整齊六典以為宅洛計不幸殁而成王不果遷規摹不獲究冬官未嘗亡錯見於五官中諸儒不能辨而補以考工記則尤有見於是書本末之端的故子特表出之嘉熙丁酉夏中伏日古汴趙汝騰茂實序于卷末
