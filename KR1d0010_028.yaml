body:
  text: 周禮訂義卷二十八宋王與之撰角人下士二人府一人徒八人賈氏曰角人至掌蜃亦是徴歛之官故在此鄭鍔曰齒者象之牙骨則麋鹿骨之類獨以角名官何耶以弓人為弓攷之角也者以為疾也穉牛之角直而澤老牛之角紾而昔長二尺有五寸三色不失理謂之牛戴牛一弓之用角如此其多則此之齒骨冝不同也掌以時徴齒角凡骨物于山澤之農以當邦賦之政令鄭康成曰山澤出齒角骨物大者犀象小者麋鹿陳氏曰齒角骨物玉府繕人等皆用之李嘉㑹曰齒角筋骨可供器留於民無用强取之恐匿而不出以之當邦賦則君不徒取民亦樂輸陳及之曰自此下凡所謂山農澤農蓋平時以射田獵取絺綌及染草為業者非此則不徴吕氏曰角人征齒角於山澤之農羽人征羽翮於山澤之農皆以當邦賦之政令蓋各隨其所産以當其賦視後世以錢為賦責民之所無者異矣曹氏曰有山之農有澤之農有平地之農田平地之田使供十一之税是謂平地之農山澤之利亦各據其土地所産所入而賦之是謂山澤之農其曰以當邦賦蓋以山澤所冝有者畧倣十一之制以輸於公上亦如平地之農輸穀粟十一之租於公上也李景齊曰周自田賦之外至於羽毛齒角一草一木之微莫不有征凡以邦國之不可闕冡宰所謂山澤之賦是矣然觀角人羽人與失掌葛之所征者皆曰取之山澤之農以當邦賦之征令則是出所征之物則可以當邦賦而不復出田税以度量受之以共財用鄭鍔曰官之受之欲其尺寸之中度其他齒骨之類不可以尺寸度者必量其多寡故以度量受之羽人下士二人府一人徒八人鄭鍔曰車服旌旗則用以為斾矢則用以為括物之資羽多矣掌以時徵羽翮之政于山澤之農以當邦賦之政令鄭康成曰翮羽本也賈氏曰此羽人所徵羽者當入於鍾氏梁以為后之車飾及旌旗之屬凡受羽十羽為審百羽為摶十摶為縳古本反鄭康成曰審摶縳羽數束名也爾雅曰一羽謂之箴十羽謂之縳百羽謂之緷其名音相近也一羽則有名蓋失之矣鄭鍔曰審言察其數之詳摶言束百枚而可執縳言其數多則卷而束之舉物之數未嘗無名獨羽之名見於此亦猶詩載五紽五緎五緫以記絲之數也易氏曰以度受之則知其物之長短以量受之則知其物之多寡以權受之則知其物之輕重其或不可受之以權以度以量者則為審為摶為縳無非參酌其數以當邦賦之政則所用有補於國所賦不加於民緩急可以相資有無可以相通賦用兩得於是為至掌葛下士二人府一人史一人胥二人徒二十人掌以時徵絺綌之材于山農凡葛征徵草貢之材于澤農以當邦賦之政令王昭禹曰詩言葛之覃兮繼之是刈是濩為絺為綌則絺綌皆葛也言其物則曰葛言其服治之功則曰絺綌精者為絺麄者為綌鄭康成曰草貢出澤䔛紵之屬可緝績者鄭鍔曰草貢即閭師所謂貢其物李嘉會曰物雖微細不敢强取於民必曰當邦賦俾知賦不可免自然竭力為之彼有餘力上無乏使此法之善也權度受之鄭康成曰以知輕重長短也賈氏曰角人齒角不須稱直言度量此經葛草不須量故以權度受之使知斤兩長短掌染草下士二人府一人史二人徒八人鄭康成曰染草藍蒨象斗之屬賈民曰藍以染青蒨以染赤象斗染黒掌以春秋斂染草之物項氏曰春秋草生成之時故斂染草待時而頒之則夏纁𤣥秋染夏之時李嘉會曰染草不斂於染人而斂於掌染草者慮染人縁色日而求多於山澤之農故或斂或用不專於一官王氏曰掌染草至掌蜃所徵亦必當邦賦之政令而不言者則以角人羽人掌葛見之以權量受之以待時而頒之鄭康成曰權量以知輕重多少時染夏之時賈氏曰案天官染人云春暴綀夏纁𤣥秋染夏夏為五色至秋染五色故鄭云染夏之時時謂秋時也王昭禹曰染人春暴練夏纁𤣥秋染夏則纁𤣥之物頒以夏染夏之物頒以秋掌炭下士二人史二人徒二十人掌灰物炭物之徵令以時入之鄭康成曰皆山澤之農所出也鄭鍔曰灰者㡛氏綀帛之所用炭者宫人爐炭之所共皆邦用之所須其掌之有官冝矣王昭禹曰掌葛掌染草莫不有徵斂之時掌灰炭之政令但曰以時入之何也蓋角羽草葛其生成有時非時則其物未成而不中用故徵斂皆有其時若夫炭灰則無時而不有故亦無時而不徵特以時入之而已以權量受之以共邦之用凡炭灰之事掌荼下士二人府一人史一人徒二十人鄭康成曰荼茅莠也掌以時聚荼以共喪事鄭康成曰共喪事者以著物也既夕禮曰茵著用荼賈民曰案既夕禮為茵之法用緇翦布謂淺黑色之布各一幅合縫著以荼柩未入壙之時先陳於棺下縮二於下横三於上乃下棺於茵上是也鄭鍔曰荼以禦濕非常用之物設官以聚之豈豫凶事哉孝子所盡心雖過求何害徵野䟽材之物以待邦事凡畜聚之物鄭康成曰荼茅莠䟽材之類因使掌焉徵者徵於山澤入於委人賈氏曰以委人掌斂野之賦斂疏材等故也掌蜃下士二人府一人史一人徒八人鄭康成曰蜃大蛤月令孟冬雉入大水為蜃掌斂互物蜃物以共闉壙之蜃劉氏曰互物龜鼈屬項氏曰有甲互掩者蜃物蠯蛤屬鄭康成曰闉猶塞也將井椁先塞下以蜃禦濕也賈氏曰士喪禮筮宅還井椁於殯門之外注云既哭之則徃施之竁中是未𦵏前井槨材乃徃施之壙中未施椁前巳施蜃灰於椁下以擬禦濕也王氏曰用蜃以禦濕除貍蟲鄭司農曰春秋傳始用蜃炭言僣天子也祭祀共蜃器之蜃鄭司農曰蜃可以白器令色白賈氏曰案左氏云石尚來歸蜃公羊以為冝社之肉以蜃器而盛肉故名肉為蜃是祭社之器為蜃大行人云歸脤以交諸侯之福則宗廟社稷之器物謂之為脤是其宗廟社稷之器皆蜃灰飾之愚案祭有酒器有肉器亦皆有以蜃為飾者鬯人云凡山川四方用蜃是酒器也大宗伯云以脤膰之禮親兄弟之國是肉器也共白盛之蜃鄭康成曰盛猶成也謂飾牆使白之蜃今東萊用蛤謂之义灰云賈氏曰爾雅地謂之黝牆謂之堊黝黑也堊白也然則比經所云白盛主於宗廟堊墻也易氏曰四者微物而用不可缺故設官以掌緫論陳及之曰凡此皆民業以自利者也先王之時凡民於田税之外至有趨末作者一切徵其物大意欲抑末重本熈寧間京師市井凡販賣小民雖拾髮鬻薪提茶等類悉出免行錢不出者毋得販鬻市道其意亦曰抑末作游手之民然不知先王之世民無不受田者雖商賈家亦受田特減於農民抑其末作使反其本則退有可耕之田不至失業饑寒自井田既壞小民亡立錐之地勢不免販賣以自資今而曰抑之歸農則退豈有可耕之地哉故重税適所以啟其怨咨之心饑寒之患而曰使之務本惡在其為政也介甫常曰周禮一書理財者幾半周公豈好利者哉觀此言若非為利然安在其不為利也囿人中士四人下士八人府二人胥八人徒八十人鄭康成曰囿今之苑薛平仲曰遂自虞衡之官極而掌蜃之微莫不有職君子所以治野人者悉矣而天子之囿游始見諸此謂之囿游信非棄田以為園囿使民不得衣食者比也掌囿游之獸禁項氏曰囿游苑囿游牧之獸或曰燕游處也禁者其蕃衛之禁劉迎曰獸人冬獻狼夏獻麋春秋獻獸物皆所以備祭祀賔客之須囿人之牧百獸以為死獸生獸之共耳其曰囿游之獸禁則囿游如芻蕘雉兎之徃是也謂之禁則不得侵取之非謂為囿游以為行樂焉或者文王之囿方七十里焉夫靈臺靈沼之樂其有麋鹿魚鼈則先王豈無囿游哉先儒以侈心待先王謂以囿游備行樂卒以開人君盤游之樂而離宫别館未必不自此啟也牧百獸鄭康成曰備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳧鶴備焉李嘉會曰獸既供於獸人又供於囿人蓋獸人所得或生而致之則養之於囿人故曰牧祭祀喪紀賔客共其生獸死獸之物王氏曰獸人共生獸死獸囿人共生獸死獸之物者獸人所其田獵所罟囿人所共囿游所牧共其物若麋膚熊蹯之類劉執中曰物者所共有名件也場人每場下士二人府一人史一人徒二十人鄭康成曰場築地為墠季秋除圃中為之詩云九月築場圃十月納禾稼薛平仲曰囿人以掌天子之園囿示民以其所同樂也然可樂之事易流則當務之急者易緩此場人之官又以列于此也夫以場人掌國之場圃而場人之官且曰每場下士二人府史各一人徒二十人則場圃之在國中者意亦多由是觀之先王始終於農事者固於此乎見場圃隨在而有者抑於此乎見地利蓋無遺於國中矣掌國之場圃而樹之果蓏珍異之物以時斂而藏之王昭禹曰載師以場圃任園地所謂國之場圃則屬於公者場人之所掌也所謂民之場圃則屬於私者閭師之所任也賈氏曰此據祭祀喪紀賔客者徴斂藏之其餘則閭師徵斂之也鄭康成曰果棗李之屬蓏瓜匏之屬項氏曰有核曰果無核曰蓏一云在木曰果在地曰蓏珍異蒲桃枇杷之屬王昭禹曰先王之時徑行必有桑疆場必有𤓰所以盡地力而無遺利方物之生則闢場為圃所以種植及物之成則築圃為場所以收穫凡祭祀賔客共其果蓏享亦如之鄭康成曰享納牲也賈氏曰此謂祭祀宗廟二灌後君迎牲納之於庭時后夫人薦朝事之豆籩中有果蓏之物故云享亦如之易氏曰珍異果蓏物之至微而場人專掌之者以祭祀賔客之奉皆於此乎出也廪人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人薛平仲曰場人既已為登穀之備矣則倉廩之官當有以為儲蓄之備也先儒以廩為藏米以倉為藏穀李嘉㑹曰廩造於平地之上倉造於屋之下故廩人之官必以下大夫二人居之賈氏曰此官使下大夫為首徒三百人以米廪事重出納又多故也自穀而舂揄以為米則米之為用所當貴重愛惜者而官其可輕卑哉是以廩人為之長而倉人以中士為之屬焉然廩人之後必繼之以舍人倉人之後必繼之以司禄不為無意蓋舍人之職其主宮中官府之次舍者也而宫中官府之稍食又非穀禄比於此焉不汲汲以均之則所以為養亷怙恥之本者得無有虧於自公退食之際而請謁行於私昵之閒其弊有不可勝慮矣是則舍人所以次之也若夫穀禄之制自公卿大夫以至庶人之代其耕者多寡高下固有定數矣彼其以田賦禄而征其租上以共王賦下以享宗廟給私奉業子孫又非一時稍食者之比於此焉不知所以裁之則無功受禄者特未免有伐檀之刺而世禄之家鮮克由禮者亦豈無自而致哉是則司禄所以次之也是蓋先王務農重穀之教故敘次其設官如此掌九穀之數以待國之匪頒賙賜稍食鄭鍔曰廩人掌穀謂米出於穀故耳易氏曰天府職曰若祭天之司民司禄而獻民數穀數則知九穀之數專掌於司禄今復見於廩人何也賈氏謂廩人掌米倉人掌穀其義誠然蓋倉人掌粟入之藏辨九穀之物則掌穀可知廪如御廩常廩之類則皆米也不然明堂位何以曰米廩有虞氏之庠釋者以魯謂之米廪虞帝上庠今藏粢盛之委焉非米而何以廪名官所掌者米而云掌九穀之數者兼掌九穀之數也李嘉㑹曰數則一歲所入之目以數而入以數而出正廪人所掌故不曰物而曰數是知倉人掌穀司禄掌九穀之數廪人即其九穀之數以知廩米之數凡以待國之匪頒賙赐稍食而已鄭康成曰匪讀為分分頒謂委人之職諸委積也李嘉㑹曰分頒者使自隨其數而入之不獨委人也委人特一而已賙賜謂王所賜予給好用之式鄭鍔曰君於臣下廪人繼粟者是也稍食禄廪賈氏曰此即司士以功詔禄又王制云下士視上農夫九人禄中士倍下士之類以歲之上下數邦用以知足否以詔穀用以治年之凶豐項氏曰歲言其成歲年言其收成若歲終定時成歲皆以成歲言若有年大有年皆以收成言制國用者必於歲之終穀粟之既入故曰以歲之上下數邦用斂穀粟必於秋之成穀粟之始熟故曰以年之上下出斂法禮曰制國用必於歲之杪是也易氏曰年之有凶豐歲之所以有上下鄭康成曰數猶計也項氏曰以歲之升降得穀之多少計國之所用多則足少則否乃詔在上用穀之隆殺以治年之凶豐故年適豐雖粒米狼戾不侈於有餘年適凶雖饑饉薦臻不苦於不足則以有治之之術也易於萃言用大牲於升言利用禴是也易氏曰制其財之多寡權其禮之增損非廪人之事特以邦用之足否詔之於上凡以治年之凶豐而巳年之凶豐天也所以治之者人也治之則權其多寡增損而為之開闢斂散其於豐也不為妄費以蠧其國其於凶也不為過取以害民李嘉㑹曰歲自立春至次年立春天時也年自正月朔旦至歲除王政也天時雖不同王政不可闕合三者治之斯可凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也賈民曰萬民食食者謂民食國家糧食者上謂大豐年中謂常年下謂少儉年此雖列三等以中年是其常法鄭康成曰此皆謂一月食米也六斗四升曰鬴楊謹仲曰國之量非後世比㮚氏為量方尺深尺其實一鬴乃六斗四升今人所用之斛深亦一尺而方幾二尺止容五斗而以古之量少今之量幾五倍於古矣然以中歲均人月食三鬴則是旬食一鬴日食六升四合矣量至漢猶然趙充國以為卒武賢欲引萬騎出張掖以一馬自負三十日為米二斛四斗麥八斗則訃人日食米八升王莽欲立威乃議六十萬衆齎三百日糧十道並出嚴尤曰計一人三百日用糧十八斛則是人食六升以此考之周之中矣歲人日食六升四合上歲人日食八升五合不為過王氏曰民之食可以鬴計者校登夫家貴賤老㓜廢疾之數觀稼省斂稽比財物其法詳也王昭禹日先王之民生齒以上有食之端已書于版校登稽比之法又詳則凡民之幼壯孤寡登耗無不知也以口授田以田制食觀稼省斂又以時出焉則凡其食之有餘不足無不知矣若食不能人二鬴則令邦移民就穀詔王殺邦用易氏曰冡宰制國用其穀之所積皆有定所凡荒政所不能聚者均其逺近之所就穀而巳鄭康成曰殺猶減也王氏詳説曰大司徒云大荒大札則令邦國移民通財為外諸侯設也廪人云若食不能人二鬴則令邦移民就穀為内諸侯設也蓋鄉遂公邑但移用其民而已郤非移民通財與移民就穀也鄉遂公邑同為天子之民若夫都鄙則各從其主矣鄭氏釋此以為就穀都鄙之有者誠得其説鄭鍔曰梁惠王移民就粟孟子譏之何耶蓋周官之民有田以耕其饑偶出於天時之水旱而已惠王不能制民之産凶歲則移民是為無政劉氏曰古者三年耕必有一年之蓄九年耕必有三年之蓄以三十年之通計雖有旱乾水溢民無菜色猶設廪人就穀之法則患未至而預為之防李嘉㑹曰儲蓄所以立國非有大凶旱鳥可輕動凡邦有㑹同師役之事則治其糧與其食王昭禹曰治者量逺近為之節鄭康成曰行道曰糧謂糒也止居曰食謂米也鄭鍔曰㑹同師役有逺近之異則曰糧曰食亦冝不同逺則治其糧莊子言適百里者宿舂糧適千里者三月聚糧蓋言逺也近則治其食詩云朝食于株左氏云食時而至蓋言近也易氏曰糧乃㑹同師役之所急者太宰以九式均節財用而不及㑹同師役之式小宰之七事有所謂㑹同軍旅田役之戒具共其財用然㑹同所用者不過牢禮委積膳獻飲食之飱牽則有賔客之式矣軍旅田役所用者不過工事幣帛芻秣匪頒之數者則有工事之式幣帛之式芻秣之式匪頒之式矣惟最急之糧食乃無式焉蓋式法出於九賦之中乃國家之經費冡宰制國用則以邦國之貢待弔用萬民之貢充府庫二者之外隨處而積以待邦之大用則㑹同師役之類凡九式所不載者皆取具於此不然倉人共道路之穀積飲食之具遺人凡賔客㑹同師役掌其道路之委積若非前二者之積將何所從出然特道路之所費而已若廪人之治其糧與其食又兼在道之費及止居之費也大祭祀則共其接盛鄭康成曰接讀為壹扱再祭之扱扱以授舂人舂之易氏曰接猶承也天子親耕藉田以共粢盛非有司親承之與常穀同何以致敬於鬼神故甸師以時入之於廪人廪人接之以藏於神倉及大祭祀之時廪人則共其所接之盛是以舂人接之則舂穀而為米􅐪人接之則炊米而為食然後王者得以親承祭祀其為敬至矣王昭禹曰謂之接盛則其所以接神者在是歟鄭康成曰大祭祀之穀藉田之收藏於神倉者也不以給小用緫論陳及之曰廪人至食人凡九穀出入盡掌之而不㑹計何也以司㑹考之以九賦之法令田野之財用以九功之法令民職之財用掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聽其㑹計則是官府與府藏財賦無不係焉而廪人以出入之大計聽之司㑹矣舍人上士二人中士四人府二人史四人胥四人徒四十人鄭康成曰舍猶宫也主平宫中用穀者賈氏曰舍人主米穀故與廪人倉人連類在此掌平宫中之政鄭康成曰政謂用穀之政賈氏曰舍人緫主給米之事而掌平王宫中之政謂平其給米多少李嘉㑹曰宫中之政非獨六宫凡官府次舍皆在焉禄廪既衆非舍人掌之不可易氏曰有王宫有后宫王宫之宫宫正為之均其稍食后宫之宫内宰為之均其稍食所以平宫中之政則舍人也王昭禹曰舍人掌宫中之政以賛宫正内宰之事者也故宫正掌王宫之政令糾禁内宰治王内之政令而舍人則掌平宫中之政黄氏曰舍人猶詩言室人於内者也耕者勞於外食者逸於内先王存糜耗之戒焉故以其職曰掌平官中之政以至掌其出入既無事而食而其政不平出入不以法不其甚歟分其財守以灋掌其出入賈氏曰財即米也喪大記云納財朝一溢米黄氏曰守謂積聚米給予也易氏曰守禁之所謂之財守鄭康成曰分其財守者計其用穀之數分送宫正内宰使守而頒之也而行出於廪人其有空闕則計之還入賈氏曰必送米與宫正内宰者以二宫皆有宿衛之人須米料之數也愚案此可見成周時凡官長各受其財而分之所屬易氏曰出之於廪人入之於官中皆有法存焉廩人不妄供宫中不妄取所謂平其政者莫先於此凡祭祀共簠簋實之陳之鄭康成曰方曰簠員曰簋賈氏曰孝經云陳其簠簋注謂内員外方受斗二升者直據簠而言若簋則内方外員旊人云為簋實一觳豆實三而成觳豆四升三豆則斗二升可知但外神用瓦簋宗廟當用木鄭鍔曰用簠以盛稻粱用簋以盛黍稷王昭禹曰實之以言其物陳之以言其數王氏曰既共簠簠之器又以􅐪人所共之實實之陳之也賔客亦如之共其禮車米筥米芻禾鄭康成曰禮致饔餼之禮賈氏曰聘禮曰致饔餼使卿韋弁歸饔餼米百筥設于中庭車米三十車陳于門外禾三十車芻薪倍禾又掌客上公米百有二十筥車米四十車禾五十車芻薪倍禾侯伯米百筥車米三十車禾四十車芻薪倍禾子男米八十筥車米二十車禾三十車芻薪倍禾皆言陳是其所陳多少之數鄭鍔曰車米以車載之筥米以筥盛之也林氏曰掌客掌其禮而舍人共其物喪紀共飯米熬穀鄭康成曰飯所以實口不忍虚也君用粱大夫用稷士用粢賈氏曰喪大記文皆四升實者惟盈賈氏曰士喪禮文熬穀者錯于棺旁所以惑蚍蜉賈氏曰蚍蜉欲向棺置此惑之王昭禹曰使異物不得親其膚而已喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚腊焉以歲時縣穜稑之種以共王后之春獻種鄭康成曰縣之者欲其風氣燥達鄭司農曰春王耕于藉則后獻其種也后獻種見内宰職賈氏曰内宰上春后獻種且助王耕事此歲時縣者從納禾治得子即縣之以至春獻之掌米粟之出入辨其物鄭康成曰九穀六米别為書賈氏曰九穀之名已見大宰注六米者九穀之中黍稷稻粱苽大豆六者有米麻與小豆小麥三者無米歲終則㑹計其政鄭康成曰政用穀之多少王昭禹曰宫正月終㑹稍食歲終㑹行事内宰歲終㑹内人稍食舍人掌米粟之出入而辨其物歲終則㑹計其政亦所以通職聨事也倉人中士四人下士八人府二人史四人胥四人徒四十人項氏曰倉人掌藏粟者掌粟入之藏鄭康成曰九穀盡藏焉以粟為主賈氏曰月令首種不入鄭注引舊記首種謂稷也即種粟是五穀之長下文九穀此云粟是以粟為主李嘉㑹曰一歲所收粟則先熟兼中國之地率多種粟蓋粟耐乾雖歲之旱不至太失此九穀之物必以粟而緫其名辨九穀之物以待邦用項氏曰穀各有所冝用故辨其物以待用鄭鍔曰邦之用穀也有匪頒賙賜稍食之殊則其精粗亦異故冝辨其色焉若穀不足則止餘灋用有餘則藏之以待凶而頒之鄭康成曰止猶殺王氏曰法式所用有雖不足不可以巳者有待有餘然後用者所謂餘法用則待有餘而餘用者愚案黄氏説見遺人以待施惠之後易氏曰大府所謂式貢之餘財以供玩好幣餘之賦以待賜予委人所謂凡其餘聚以待頒賜止餘法用止此者歟有餘則藏之以待凶而頒之是樂歲則取之於民凶年則遂以頒之於民取之不以為虐頒之乃所以為利無非充裕民之仁政凡國之大事共道路之穀積食飲之具王昭禹曰大事則戎祀之類蓋戎以出征而祀亦有在郊者故倉人共道路穀積食飲之具若戎祀之外則非所共也黄氏曰大事大師役也其小者遺人委積自足共之其大者倉人共其穀積食飲之具食糗糒飲漿酏也司禄中士四人下士八人府二人史四人徒四十人劉迎曰司禄者司穀禄先儒誤為爵禄矣不然何以與倉人司稼同列耶易氏曰司禄逸篇弗可攷矣此經猶存其官之名者以序見之不特見之序官而已天府曰若祭天之司民司禄而獻民數穀數則受而藏之鄭氏謂司禄為文昌第六星禄之言穀也則以掌天下之穀數者謂之司禄亦猶掌天下之民數而秋官有司民之職蓋民之損益關乎天穀之豐耗係乎民此司民及三年大比則以萬民之數詔司寇司寇及孟冬祀司民之日獻其數于王王拜受之且有天府之登知司禄之於穀數亦然則王者以民為天民以食為天其類同其義可推矣司稼下士八人史四人徒四十人鄭康成曰種曰稼如嫁女有所生薛平仲曰以廪人倉人之藏而制為舍人司禄之用其數固有權度矣然不知稼事之為勤怠徒取諸彼以予此則民得不以為厲巳哉舍農事而趨末作棄生養而就游惰是又先王之所甚懼於是司禄之官復有以繼於後誠以夫取稼事之已成者人知禄食之所當得勤之於稼事之方興者不知民力之為甚至司稼則因天之時察地之利軫念民勞而督趨之上之厚於民者如此則民之奉於上者當如何耶掌巡邦野之稼王昭禹曰種曰稼穫曰穡先王既有以教之又觀之巡之則有時治之則有法而此又有巡稼之官者蓋稼事而滅裂則穡事亦以滅裂故致詳於稼事以作其始則穡事之所以成終可知矣而辨穜稑之種周知其名與其所冝地以為灋而縣于邑閭鄭康成曰周猶徧也徧知種所宜之地縣以示民後年種穀用為法也易氏曰所謂法者周自后稷播種百穀以為鄉師天以其粒食生民國其子孫千有餘年而後王業始大南宫括以躬稼有天下而歸之於稷原其始也公劉太王王季文王武王周公六君子可謂不替其業者周公作六典舉前日播種之法而備見於大司徒即以其法而責於司稼之官司稼復以其法而縣於邑閭使稼者取法焉播種之法明為稼之效著當時所以善其始者有道矣巡野觀稼以年之上下出斂法陳君舉曰鄭氏謂周制畿内用貢法邦國用助法司稼之職為貢法設豈知司稼不是這法是預前觀其稼而後上下其出斂之法若不預前觀稼如何上下其法後劉晏正傳此法每四方水旱則先知之然後為賙救收斂之政愚案周行井田借民力以耕非復有所謂斂則司稼所謂以年之上下出斂法者蓋年之上則為民斂而藏之於年之下則為民出而賑之倉人所謂有餘則藏之則斂之之謂所謂以待凶年而頒之則出之之謂常平義倉之法豈不見於此哉掌均萬民之食而賙其急而平其興鄭康成曰均謂度其多少賙廪其艱阨李嘉㑹曰司稼尤近民故賙急平興以先之又不足廪人始有移民就穀之事愚案平其興亦當如旅師謂平均其所興舉之粟以給之黄氏曰司稼巡稼知歲之豐凶民之寛急為最切故通掌其事舂人奄二人女舂抌二人奚五人賈氏曰舂人有奄者以與女奴同處故也鄭康成曰女舂抌女奴能舂與抌者抌抒臼也詩曰或舂或抌黄氏曰舂人饎人稾人皆宫中之事以用穀故屬地官舂抌炊㸑因祭祀賔客使内人皆識其勞苦煩辱不止稼穡之艱難掌共米物鄭康成曰米物言非一米祭祀共其齍盛之米賈氏曰器實曰齍則黍稷稻粱是也在器曰盛則簠簋是也王昭禹曰稷謂之粢實於簠簋謂之盛祭用衆穀而緫曰粢者舉粢以該衆也鄭鍔曰祭祀共齍盛之米共之饎人陳氏曰楚語云天子親舂郊禘之盛又曰天子郊禘之事王后必舂其粢穀梁曰三宫米而藏之御廪蓋祭祀貴於出力以致養而後可以交於神明則舂盛固所以自盡也然王耕藉不過三推則舂盛之禮蓋亦如此然後舂人卒其事以共之賔客共其牢禮之米賈氏曰下别言饗食則此言牢禮謂饔餼之米鄭氏謂實筐筥知非車米者以其公車米四十等非舂人所共故也然則車米出於税禹貢五百里米是也王昭禹曰賔客共其牢禮之米則以共饎人簠簋之實牢禮之米多矣必共其饎人簠簋之實者鄭鍔曰賔客共牢禮之米則共之於掌客則以賔客車米筥米自舍人所共故也凡饗食共其食米鄭康成曰饗有食米則饗禮兼燕與食掌凡米事饎人奄二人女饎八人奚四十人故書作􅐪鄭司農曰饎人主炊官特牲饋食禮曰主婦視饎㸑賈氏曰祭祀共盛共王后六食不在天官者以其因舂人又因地道之成故在此掌凡祭祀共盛鄭康成曰炊而共之共王及后之六食鄭康成曰六食六穀之􅐪李嘉㑹曰食不及世子蓋世子養於王宫女􅐪所當共若出就外傅女􅐪不得而共凡賔客共其簠簋之實鄭康成曰謂致飱饔饗食亦如之王氏曰舂人舂穀以為米饎人炊米以為食其職事相成故舂人祭祀共齍盛之米饎人祭祀共盛舂人賔客共牢禮之米而饎人共其簠簋之實饎人共王及后之六食饔飱亦共簠簋之實而舂人不言其米則以言祭祀賔客從可知也稾人奄八人女稾每奄二人奚五人鄭司農曰稾讀為犒師之犒主冗食者故謂之犒賈氏曰與廩人連類在此李嘉㑹曰以用奄八人蓋分俵諸處不可不多其員陳君舉曰自膳夫至腊人不過充君之庖者悉領於冡宰至於共外内朝冗食者反不領於冡宰顧見於地官之稾人夫飲食男女人之大欲存焉於共奉天子飲食而必掌之外朝之士大夫者蓋恐内官奄人求巧於飲食之中而彌縫其意以導諛納諂故使外朝之士大夫掌之而太宰實領之者誠以檢防踰侈遏絶僥倖所以正人主之心術者在此也至於内外朝冗食者之食見於稾人之職而主之奄人意者猶後世之所謂賜食焉而或取之内厨者是也潁考叔為潁谷封人有獻於鄭莊公而公賜之食以此類推之所以示其隆禮愛賢之義而稾人共冗食者之食其猶漢世之所謂主熟食者乎至若内外朝之俸禄廪給則所以掌之者固有其人非盡出於一奄人之手也掌共外内朝冗食者之食易氏曰外朝庫門外之朝内朝路門外之朝鄭鍔曰天子有三朝此特言内朝外朝而不及路寢之朝非冗吏治文書之所也賈氏曰冗散也外内朝上直諸吏謂之冗吏亦曰散吏以上直不歸家食稾人共之因名冗食者若饗耆老孤子士庶子共其食鄭康成曰士庶子卿大夫士之子弟宿衛王宫者掌豢祭祀之犬鄭康成曰豢犬豕曰豢不於饎人言者其共至尊雖其潘灡戔餘不可褻也李嘉㑹曰食之餘者惟利乎犬因以豢焉先王不使一物之無用鄭鍔曰祭祀之牛牲繫於監門而犬則豢於稾人各有以處之職雖卑者所繫亦不輕矣緫論司徒官屬陳君舉曰周禮六官大宗伯治禮司寇治刑司馬治兵司空治事而天官治典最難攷然其職無非切於王后焉夫綱紀出治之所猶可説也至於地官掌教則又難曉焉以屬官考之自鄉老至比長自遂人至鄰長皆鄉遂之官自封人至畜人皆畺場畜牧之官自載師至均人皆掌財賦征役之官自司市至泉府皆掌市井自司門至掌節皆掌門關自旅師草人稻人虞衡以至掌染草炭荼蜃極於場人囿人無非山林川澤田疇之官幾於六十官所謂教官者師氏保氏司諫調人司救鼓人不過六七而已其他則整頓田疇分擘郊里征斂財賦掌管山澤紀綱市井管鑰門關而巳當時謂之教典何也説者謂司徒典教止五六人而已其如鄉遂關市山澤之官蓋分托焉而非專於教事是以教官為後世治文墨語言誦授者設也殊不知先王教民自經界始八八為井五五為軍市有奠居里有聨比無非習民於正而寓之以道德之意俾之分定而慮不易事同而心臧生厚而德優易直而淳龎以服從上令是曰教典師保諫救調媒之官則其導媺惡訓禮刑判合昬冠者也而豈徒謂是哉豳詩述風化之所由孟子言王道之本無非田圃之事誠知本者後世政教殊軌疆理之問不登於廟堂徃徃大臣能設學置博士弟子員則曰是有志於教化者何以納民於善也吕氏曰司徒之職皆是均土受民不見所謂掌教者蓋生養便是教既富能教資富能訓使他衣食足各保其生方教以君臣父子夫婦長幼之義穀粟如水火而後民興於仁制其田里使養其老聖賢之論富民未有不及於教所謂富而教之者也或曰唐虞三代學校與後世大段不同只學官一事可見在舜時命䕫典樂教胄子在周時大司樂掌成均之法以治建國之學政而合國之子弟焉何故皆是掌樂之官掌教欲得優游涵養鼓舞動盪深入其心這一个所在不是官司自秦漢以後把做官司看了故與唐虞三代題目自别雖足以善人之形而不足以善人之心雖是法度具舉然不過以法制相臨都無深入人心道理大抵教與政自是兩事後世錯把教做政看學者但當看三代所以設教命官教養之意且如周禮一書設官設教所以便民若師氏保氏大司樂大胥小胥之類所教不過是國子然當時所謂鄉遂所謂興賢能在周三百六十官之内並存不見有設教之官雖是州序黨庠畧見於周禮然未嘗見其州序是何人掌之其法又何如只看此亦是學者所當深思且如周禮設官下至於射夭鳥至微至纎之事尚皆具載豈於興賢能國之大教反不見其明文蓋凡領六官者皆是法之所寓只縁學校不是官司非簿書期㑹之事故不領於六官其上者三公論道不載於書其下者學校設官不領於六官蓋此二者皆事大體重非官司所領惟國子是世禄之家鮮克由禮以蕩陵德不可不設官以教養之至其所以教養之意均非簿書期㑹之可領學者當識先王之意可也蓋先王設教雖非六官所掌而所以設教未嘗有理無事有體無用本末亦自備見但只不在官聨官屬之中舜之時自國子之外畧不見其掌教之官然庶頑䜛説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而颺之如此之備在周人學官雖不領於一屬然而比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成終始備具至不率教者屏之逺方終身不齒又見體用本末無窮處三代以上所以設教命官至理精義要當深攷愚案司徒所掌大抵田賦等事似與大宰九貢九賦太府以下等官相類細考之則大宰官屬所掌皆國之財賦而司徒所掌皆教之田野之事所以謂之教官後世謂六部如六官故謂户部如司徒抑不知今户部所掌乃大宰屬官太府等事初無與乎掌教之職矣黄氏曰右地官卿一人中大夫五人下大夫十五人上士四十八人中士一百三十人下士二百八十八人王之門關十二下士各二人則又四十八人府一百三十人史二百十九人賈八人胥二百二人徒二千四百五十六人又舞徒四十人奄十二人女舂抌二人女饎八人女稾十六人奚八十五人是皆著於數者也山虞林衡川衡澤虞場人皆中下士闕府史胥徒又司市立胥徒又司市立胥師賈師司虣司稽胥肆長皆不能計其數者也鄉老皆公即三公鄉大夫皆卿即六卿六鄉三十州州長皆中大夫州五黨黨正皆下大夫黨五族為七百五十族族師皆上士族四閭為三千閭閭胥皆中士閭五比為萬五千比比長皆下士六遂大夫亦中大夫六遂之縣視州鄙視黨鄼視族里視閭其餘各下於六鄉之一等六鄉之餘民居四郊其官為四郊之吏稍不為邑縣都不為都有吏主之皆不可以數計也吕氏曰緫計地官公卿大夫士通用三十萬夫有竒府史胥徒不在數虞衡迹人等亦不在數據畿内之地似難容得許多官司畿内户口難供得許多官須考愚案陳及之説見前論官職多寡周禮訂義卷二十八
