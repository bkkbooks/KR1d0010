body:
  text: 周禮訂義卷三十三宋王與之撰肆師之職鄭康成曰肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛鄭鍔曰肆師禮官之考所陳者皆祭祀之儀物禮官之屬皆取法於是故以下大夫為之以師名之王昭禹曰禮之義㣲而難知禮之數粗而可陳大宗伯掌建天神地示人鬼之禮則得於㣲而難知之義肆師掌立國祀之禮以佐大宗伯則明於粗而可陳之數所以謂之肆師掌立國祀之禮以佐大宗伯鄭康成曰佐助也鄭鍔曰大宗伯言其禮之所當用肆師備其物以致用故皆謂之立言祀禮以此而立王昭禹曰神位既定然後國祀之禮可立大宗伯建天神人鬼地示之禮建其意義而已必有玉帛牲牷之物籩豆簠簋之器然後其禮立焉故掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲劉氏曰天神地示人鬼皆國祀也即其祀中各有三等之差故以玉帛牲牷明其大小則祀典立矣鄭司農曰大祀天地次祀日月星辰小祀司命以下鄭康成曰大祀又有宗廟次祀又有社稷五祀五嶽小祀又有司中風師雨師山川百物黄氏曰山川社稷恐不當為次祀典瑞璋邸射以祀山川有玉風雨功用博必非小祀亦有玉宗伯實柴槱燎血祭貍沈自以其類相從未必盡為大小之等鄭鍔曰祀必以玉者取陽精之純以禮神也崔氏曰宗伯奉玉謂禮神之玉肆師所陳自論燎玉之差降正義所觧自言禮神之質必以帛者取人功之勤以交神也陸氏曰禮神之幣則帛在牲之上若大祀用玉帛牲牷是也從爵之幣則帛在牲下前牲幣各放其器之色是也必有牲者取天産之精所以事神也易氏曰牲色之純者謂之牷上言牲牷下特言牲則其色之不必純也幣帛一也自其質言之謂之帛制而用之謂之幣玉則陽精之貴者大祀貴精純而尚質故用玉帛牲牷次祀則加以文焉故用牲幣小祀則牲以致其味以其禮之近乎人情者也故用牲崔氏曰猶三牲俱足以禋為名稱若少其一則但云實柴若少其二則以燎薪為名尊卑之差其理可喻然大宗伯六器禮天地四方皆有牲幣則大祀無幣典瑞言圭璧璋邸射之類與牧人言凡時祀之牲必用牷物則次祀小祀非無王與牲肆師立國祀之禮禮者體也上下小大有一定之體所用之物不容不辨以歲時序其祭祀及其祈珥鄭康成曰序第次其先後大小鄭鍔曰一歲祭祀各因其時以舉其禮序其先後不以其大先不以其小後易氏曰小子職曰珥于社稷祈於五祀羊人職曰凡祈珥共羊牲正與肆師之文同至秋官士師職則曰凡刉珥奉犬牲若以祈為刉則肆師之文為非後鄭皆改祈為刉謂毛牲曰刉羽牲曰珥且以珥之字當從血為衈取其以血為釁之義引雜記言曰成廟則釁之謂宫兆始成則有釁禮其説非無所據然羊人小子亦有言釁積釁邦器釁軍器之事兹數者皆直謂之釁不應宫兆始成之釁而獨謂之祈珥况祈珥見於經者三不應以三出之祈盡改為刉又羽牲曰珥如司約言珥而辟藏者固曰以血塗户至山虞職言致禽而珥則又曰取左耳以效功言效功則與釁禮不同言取左耳則與毛牲曰刉羽牲曰珥之文自相背馳何耶案劉氏中義云珥當為弭字之誤也祈謂小祝之祈福祥弭謂小祝之弭兵烖然則社稷五祀曰祈曰弭山川曰侯曰禳落成曰釁各有倫類其説今存之義見山虞大祭祀展犧牲繋于牢頒于職人鄭康成曰展省閱也王昭禹曰牲之純者謂之牷牲之完者謂之犧春秋魯郊牛口傷周景王時雄雞自斷其尾不可謂之犧大祭祀肆師展犧牲視其完也鄭鍔曰充人展牲則告牷而肆師又展犧牲者盖祭祀之牲牧人共之肆師展之於未為牲之前知其可用頒於職人及視牲之夕宗人展牲充人直告牷而已肆師展之則其擇已精矣充人繋之則其養也專焉鄭康成曰職讀為樴樴可以繋牲者此職人謂充人王昭禹曰牛人牧人共牲者也牛人牧人共牲然後肆師從而展則職人非牛人牧人凡散祭祀繋於國門則職人非門人矣充人之職掌繋祭祀之牲牷祀五帝則繋於牢芻之三月享先王亦如之則職人其充人之謂充人而曰職人則以充人職其事故也故牛人凡祭祀共其求牛享牛以授職人而芻之亦謂充人也李嘉㑹曰充人謂之職人者以所當任之職也凡祭祀之卜日宿為期詔相其禮鄭康成曰宿先卜祭之夕賈氏曰凡祭前有散齋七日致齋三日若然卜日吉則齋今云祭祀之卜日宿為期則是卜前之夕與卜者及諸執事以明旦為期陳及之曰太宰云祀五帝前期十日帥執事而卜日遂戒大宗伯曰凡祀大神享大鬼祭大示帥執事而卜日太卜云大祭祀則眡髙命龜以肆師及太宰大宗伯太卜四官考之則祭祀必卜日也余參周禮大司樂及禮記祭天地有卜日者有不卜日者大司樂謂冬日至於地上之圓丘奏之夏日至於澤中之方丘奏之則圓丘祭天方澤祭地有期日未嘗卜也其當卜日者若孟春祈穀孟夏大雩季秋大享與夫大禘四時祭無期日必當卜也程伊川曰春秋有卜郊但卜上辛不吉則卜中辛中辛不吉則卜下辛更不吉便用不當更卜春秋乃三卜四卜五卜至於不郊非禮也詔相禮謂詔告相助其卜之威儀及齋戒之禮眡滌濯亦如之王昭禹曰宿為期卜前之夕也眡滌濯祭前之夕也李嘉㑹曰滌濯若事之㣲者太宰眡之大宗伯小宗伯又眡之今肆師不獨眡之且曰詔相其禮盖内而六宫外而有司其滌濯摡拭之類小大次第之節不可紊也祭之日表齍盛告絜展器陳告備鄭康成曰故書表為剽剽表皆謂徽識粢六穀也在器曰盛鄭鍔曰祭祀之齍盛共於甸師舂於舂人然後􅐪人炊之舍人實之小宗伯逆之大宗伯奉之而肆師表之者盖其物不一各為徽識以表之庶幾六宫之人共奉之各得其當王昭禹曰簠以盛稻粱自簋以盛黍稷粢盛王之所致者也表而出之所以明其自致之誠易氏曰黍稷稻粱謂之粢盛必肆師告潔而後用李嘉㑹曰詩曰吉蠲為饎記曰黍曰薌合粱曰薌萁稷曰明粢皆以潔為義鄭康成曰陳列也王氏曰展器陳者則器及陳皆展之禮有告具有告備具有所不備者備則非特具而巳鄭鍔曰一器不備一禮必闕已陳列之則以備告小宗伯告備於王則此所告告小宗伯小宗伯以告於王也及果築䰞相治小禮誅其慢怠者鄭鍔曰祼必用鬯以鬱金和之鬱金必築煮然後用鬱人和之肆師主其築煮之事賈氏曰果築煮謂宗廟有祼鬱人掌鬱此又掌之者彼官正職此肆師察其不如儀也鄭鍔曰自犧牲粢盛以至於器用之陳列築煮之㣲細無所不掌則禮官之考其預於祭祀之禮者可謂纎悉畢知之矣故茍有不䖍不恭之人皆得而誅罰之掌兆中廟中之禁令鄭康成曰兆壇塋域王昭宇曰兆即宗伯兆五帝於四郊者賈氏曰四郊之上神兆多矣皆掌不得使人干犯神位七廟亦然劉氏曰兆中廟中執事者衆欲其行事致肅故有禁令項氏曰神則有兆鬼則於廟禁則禁其所不得為令則令其所當為凡祭祀禮成則告事畢王氏曰事畢於禮成故禮成則告事畢大賔客涖筵几築鬻鄭康成曰此王所以禮賔客王昭禹曰司几筵設之肆師則臨而觀之替祼將鄭康成曰酌鬱鬯授大宗伯載祼鄭鍔曰鬱鬯鬱人共之肆師築煮以和之其祼也小宗伯將之肆師賛之先儒謂此為賛小宰余以為小宰之職言凡賔客賛祼者為賛王言小宗伯言祭祀賔客以時將瓉祼肆師言賛祼安得為賛小宰賛小宗伯明矣大朝覲佐儐鄭康成曰為承儐王昭禹曰儐所以接賔之人有上儐中儐末儐佐儐者上儐之佐則中儐是也所以佐宗伯焉大宗伯㑹同朝覲為上相則肆師為佐儐乃佐大宗伯小行人將幣為承而儐則末儐其小行人歟共設匪罋之禮王昭禹曰匪以實幣罋以實醯醢其物其事掌客籩人等共之其所設之禮肆師共之鄭康成曰設於賔客之館公食大夫禮曰若不親食使大夫以侑幣致之豆實實于罋簋實實于篚匪其篚字之誤與禮不親饗則以酬幣致之或者匪以致饗賈氏曰肆師不掌飲食而共設匪罋者依禮使掌客諸官共設之鄭鍔曰賔客朝覲俱為見王之諸侯然謂之大賔客則以客禮而見天子者謂之大朝覲則以臣禮而見天子者惟其為賔故有筵几祼將之禮惟其為臣故有匪罋饗食之禮饗食授祭鄭康成曰授賔祭肺賈氏曰祭謂祭先造食者必知祭肺者有虞氏祭首夏后氏祭心殷祭肝周祭肺故知祭者祭肺也王氏詳説曰享用大牢食用大牢鄭氏以授祭為祭肺惜其説不廣也曲禮曰祭食祭所先進又曰殽之叙徧祭之所謂夕祭牢肉是已鄭鍔曰待以享食之盛禮賔客當祭肆師授之以所祭之品王食則膳夫授祭享食賔客則使肆師授之為佐儐以待賔客與祝侯禳于畺及郊鄭鍔曰王者公天下以為心不祈福於一已欲銷變於四方故國有不祥則有侯禳禱祠之事侯之為言候嘉慶祈福祥也禳之為言卻災變除禍咎也畿五百里畺百里曰逺郊五十里曰近郊侯禳必在疆境欲災害逺去之意也肆師與小祝俱徃以行侯禳之祭盖所掌者祭祀祈珥之事小祝則掌侯禳禱祠之祝號耳易氏曰小祝實王侯禳之官肆師與之偕徃以見國祀之立雖侯禳之小祀不廢大喪大渳以鬯則築䰞鄭康成曰築香草煮以為鬯以浴尸香草鬱也令外内命婦序哭賈氏曰外内命婦即下文注内外命女是也鄭康成曰序使相次秩賈氏曰哭法以服之輕重為先後然則内命婦于王斬衰居前諸臣之妻從服齊衰者居後也禁外内命男女之衰不中灋者且授之杖鄭康成曰外命男六鄉以出也内命男朝廷卿大夫士也黄氏曰内命男王之宗族服兼親其衰更有與諸臣異者其妻為外命女喪服為夫之君齊衰不杖内命女王之三夫人以下賈氏曰外内男女衰皆有升數多少及裁制故禁之使依法諸臣妻為夫之君義服衰六升諸臣為王義服斬衰衰三升半三夫人已下為王正服斬衰衰三升鄭康成曰不中法違升數與裁制者王昭禹曰小宗伯縣衰冠之式于路門之外則衰法固已示之矣若不中法者肆師又從而禁之鄭司農曰三日授子杖五日授大夫杖七日授士杖此舊説也喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖無七日援士杖文賈氏曰外内命男及内命女為王斬衰者有杖外命女為王齊衰者無杖故云且見不定之義凡師甸用牲于社宗則為位易氐曰師甸者田而後用師者必載社之石主祖之木主示有所受命鄭鍔曰大甸獵之甸乃四時蒐苗獮狩之田師甸則大用師以對敵之時何以明之以所祭之神知之用師則載社主與遷廟之主以行此用牲於社宗大戰則類造于上帝封于大神祭兵於山川此有類造封祭之事豈四時之田所宜有耶故知以師甸言社者主也宗者遷廟之主不曰祖曰宗者宗繼祖者也載主而行不在國之常位而祭不可以無位無位則鬼神無所依故為位然後祭小宗伯於軍旅甸役禱祠為位則止為位於肄儀之時肆師於用牲以祭時則為位者盖所掌者立祀用牲之禮故也類造上帝封于大神祭兵于山川亦如之鄭鍔曰上帝至尊不可以瀆因其事類然後告祭故名曰類類者上帝之祭造者祖廟之祭此曰類造上帝何也盖王者出征所至以事類告天故兼言之鄭康成曰造猶即也為兆以類禮祭上帝也類禮依放郊祀而為之者王昭禹曰聚其神而祭則謂之類至其所而祭則謂之造記曰類于上帝宜乎社造乎襧小宗伯類社稷宗廟則為位大祝之六祈一曰類二曰造盖造非特襧上帝亦謂之造類非特上帝宗廟社稷亦謂之類也項氏曰上帝非祀不造焉故特類而祭若祖廟則必造焉此言類造則在軍中類其位而造焉盖一祭也封者累土增髙非山川之大神則無累土為壇以封崇之禮鄭康成曰封謂壇也大神社及方岳也王昭禹曰書曰至于岱宗柴詩曰廵狩告祭柴望也言封上而告柴則燔燎以達氣焉記曰因天事天因名山升中于天謂此也黄氏曰即宗伯大封告后土也兵之所在必增髙以祭之非頓兵之山川則無類禡之祭兵之所在則宜有祭賈氏曰山川衆多不可並祭故祭軍旅所依險阻者王氏曰祭兵于山川若武成吉所過名山大川凡此三者非常祭故皆為之位盖肆師主立國祀之禮耳易氏曰以上皆軍祭之禮肆師為之位無非依神以為之助而欲民之用命以有功王昭禹曰亦如之肆師為之位亦如師甸用牲于社宗凡師不功則助牽主車鄭鍔曰勝敗乃兵家之常王者之師亦有時而不勝而謂之師不功戰所以全宗社不功而失乎主車是失宗社肆師掌為位以祭社宗為職大司馬於師不功則厭而奉主車肆師為大司馬之助而已李嘉牽㑹曰助主車亦所以安神靈也凡四時之大甸獵祭表貉則為位鄭康成曰貉師祭也於所立表之處為師祭造軍法者禱氣勢之增倍陳氏曰其神蚩尤也黄帝與蚩尤戰于版泉軍法之興始于此故後世祭之詩曰是類是禡記曰禡于所征之地禡與貉一也貉之祭盖使有司為之而立表于神前甸祝掌祝號既事然後誓衆而師甸焉古者將卜則祭先卜將用馬則祭馬祖將用火則祭爟是則將師田而禡祭者不特為禱而已易氏曰二者皆肆師為之位以肆師立國祀故耳嘗之日涖卜來歲之芟鄭康成曰芟芟草除田古之治耕者除田種穀嘗者嘗新穀此芟之功也卜者問後歲宜芟不詩云載芟載柞其耕澤澤易氏曰嘗嘗穀之祭也因穀祭而卜田事使人預知之而盡力于芟也獮之日涖卜來歲之戒鄭康成曰秋田為獮始習兵賈氏曰春蒐夏苗非正習兵戒不虞也卜者問後歲兵寇之備鄭鍔曰易曰君子除戎器戒不虞故知戒為禁備之事陳及之曰天府云季冬陳玉以貞來歲之美惡先王之時必預戒來歲之事者欲先事為備也春秋時鄭石㚟言於子囊曰先王卜征五年而歲習其祥祥習則行不習則增修徳而改卜則是卜不吉必修徳而豫戒然後為治世之事社之日涖卜來歲之稼鄭康成曰社祭土為取財焉卜者問後歲稼所宜鄭鍔曰詩人言太田多稼曰以社以方故知稼為田苗之事祭社有二春祈秋報知此社非春祈者以嘗與獮無非秋事知此為秋報祭之社也易氏曰三者之卜凡陳龜貞龜命龜眡髙作龜使卜師卜人等為之肆師特涖之而已若國有大故則令國人祭鄭康成曰大故謂水旱凶荒所令祭者社及禜酺賈氏曰地官州祭社黨祭禜族祭酺六遂亦然是國人所祭之事鄭鍔曰國有大變故不止肆師涖卜又令舉國之人皆祭所謂靡神不舉王昭禹曰令之祭故略於神者不得不祭令然後祭故蔽於神者不得數歲時之祭祀亦如之賈氏曰歲時之常祭也亦命國人祭也鄭鍔曰因大故而令之祭出於一時之非常四時而令之祭本於一歲之常禮一歳之常禮又令之使祭盖民未必能知遵其常月令於仲春必命社謂此耳凡卿大夫之䘮相其禮鄭康成曰相其適子王昭禹曰相其家人也易氏曰非相其家禮相其國之喪禮而職喪聴之者也凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮鄭康成曰治謂如今每事者更奏白王禮易氏曰肆師掌立國祀之禮則專於佐大宗伯凡國之大事而言佐宗伯凡國之小事言掌事如宗伯之禮者兼大小宗伯而言故於佐宗伯則謂之事於佐大宗伯則謂之禮鄭鍔曰小宗伯所佐無非禮肆師所佐無非事豈事之外别有禮禮之外别有事哉盖以其官之尊卑别言其所掌之本末而已言禮者舉其本言事者舉其末皆禮也鬱人下士二人府二人史一人徒八人薛平仲曰禮莫重於祭祭莫重於灌灌之為義先王所以致精神之交敬淵泉而貫㝠漠也故灌用鬱鬯者草木之芬香者也鬯者酒味之暢達者也和鬱以為灌言芬香之交暢於上下也周人先求諸隂故既灌而後逆牲夫子曰禘自既灌而徃者吾不欲觀之矣精誠所交唯灌為至此鬱人鬯人所以首見於此賈氏曰鬯人所掌是秬米為酒不和鬱者若祭宗廟及灌賔客則鬯人以鬯酒入鬱人鬱人得之築鬱金草煮之以和鬯酒則謂之鬱鬯也王昭禹曰築而煮之肆師也掌共秬鬯者鬯人也鬱人則和鬱鬯用之於祼王氏詳説曰有秬鬯有鬱鬯鬱鬯用之於宗廟秬鬯用之於天地社稷等祀表記曰親耕粢盛秬鬯以事上帝是祭天不用祼然亦用秬鬯鬯人之社壝用大罍禜門用瓢齎是社祭等祀亦用秬鬯但鬱鬯求諸隂用之於宗廟掌祼器鄭康成曰祼器謂彛及舟與瓉鄭鍔曰典瑞於祼圭有瓉特辨其名物司尊彛於彛舟特詔其爵辨其用盖不掌其器鬱人取所築以煮之鬱金以和秬鬯實之於六彛故并祼器掌之凡祭祀賔客之祼事和鬱鬯以實彛而陳之鄭鍔曰天地大神至尊不祼此言祭祀謂祭宗廟社稷山川四方祼以求神而出之賔客亦有祼事者以待神明之道待賔客尊之至也鄭康成曰築鬱金煮之以和鬯酒賈氏曰即鬯人所造者鄭司農曰鬱草名十葉為貫百二十貫為築以煮之鐎中停於祭前鬱為草若蘭王昭禹曰必用鬱者明其徳之香鄭鍔曰王之祼鬯必和以鬱金取其芬芳也王度記云天子以鬯諸侯以薫大夫以蘭芝士以蕭庶人以艾欲芬芳條暢耳李嘉㑹曰諸侯未賜圭瓉和酒以薰得賜始用鬯鬱金黄色色黄非天子不可用凡祼玉濯之陳之以贊祼事鄭康成曰祼玉謂圭瓉璋瓉賈氏曰祭統君用圭瓉大宗伯用璋瓉鄭云大宗伯亞祼容夫人有故攝焉然則王用圭瓉后用璋瓉可知鄭鍔曰禮記所謂祼以圭璋用玉器也正謂是耳王昭禹曰濯之所以致潔陳之所以備用於用祼則又因以賛其事詔祼將之儀與其節鄭鍔曰詔告以祼將之儀與夫多少之節賈氏曰儀即奉玉送祼之威儀奉玉謂王與后祼時奉玉瓉而酌鬱鬯云送祼謂送之以授尸尸得祭之嚌之奠之不飲故司農上文注云停于祭前也鄭鍔曰小宗伯賛祼將小宰賛祼肆師亦賛祼將鬱人詔之以其儀節而已凡祼事沃盥賈氏曰凡祼事皆鬱人沃以水盥手及洗瓉也易氏曰凡此皆鬱人周旋祼禮之次序大喪之渳共其肆器鄭康成曰肆器陳尸之器喪大記曰君設大盤造冰焉大夫設夷盤造冰焉士併瓦盤無冰設牀䄠第有枕此之謂肆器天子亦用夷盤黄氏曰案肆因祼而為名疑如今沃酹者本以沃神王崩則以渳尸肆器盖所以盛沃鬯非陳器簠之屬也及葬共其祼器遂貍之鄭康成曰遣奠之彛與瓉也貍之於祖廟階間明奠終於此大祭祀與量人受舉斚之卒爵而飲之鄭司農曰斚讀如嫁娶之嫁斚器名明堂位曰殷以斚周以爵王氏曰斚者先王之爵惟王禮用焉卒爵若儀禮所謂皇尸卒爵是也易氏曰祼為祭事之始有始則有終受卒爵而飲之不亦宜乎鄭鍔曰嘗得陸佃之説曰宗廟之祭始祼之時尸入於室王與后既祼獻矣及殺牲迎尸於堂王即以肝洗鬱齊而燔之制祭於主前於此之時尸既即席祝乃詔之使安坐王以玉角酌𤣥酒以獻尸后以玉斚酌清酒以亞獻是之謂從獻郊特牲曰舉斚角詔妥尸當此節也鬱人賛祼量人制從獻之膰脯時相及事相成故受舉斚之卒爵酌而飲之王氏曰明與之同其事必與之同其福也以康成之説考之舉斚角詔妥尸之時無鬱人量人受酌爵飲之法惟有受嘏時受王卒爵飲之禮謂尸食訖主人酳尸尸酢主人在户東西面受尸酢時尸命祝嘏主人以大福遂以黍稷肺授主人主人承之納於懐中掛於季指乃拜而飲卒爵執爵以興出於是有獻鬱人量人之禮故得以受卒爵而飲之也故康成改斚為嘏然有改字之嫌陸佃之説雖不改字以理考之方其祭之始獻而妥尸薦腥薦熟之禮尚未及行而鬱人量人先已得飲卒爵豈合人情也耶王氏詳説曰記曰天子之祭也與天下樂之諸侯之祭也與境内樂之夫樂以天下豈終日之祭而執爵執炙者不蒙其福乎此鬱人量人所以欲舉斚之卒爵鬯人下士二人府一人史一人徒八人鄭康成曰鬯釀秬為酒芬香條暢於上下秬如黒黍一稃二米王昭禹曰一稃二米天地至和之氣所生名之曰鬯言和氣條暢鄭鍔曰以秬為鬯以鬱和之分為二官何耶盖祼者祭之始禮之尤重者故使鬱人掌其器鬯人掌共秬鬯而為器之飾重其事故分二官以主之或謂鬱鬯專用以祼表其徳之馨香足以感神秬鬯專用以祀表其徳之中和足以事神其義各有所主故二官分掌豈其然乎掌共秬鬯而飾之王昭禹曰鬱人所和者乃用以祼鬯人所共秬鬯則不和鬱者用之以陳而已鬱鬯之有秬鬯亦猶三酒五齊之有𤣥酒也此亦反本復古不忘其初之意鄭鍔曰鄭以設巾為飾非也考下文祼器有用脩者有用蜃者有用概者皆以盛秬鬯鬯人所飾者乃此器耳内備其物故鬯必用秬外致其美故器必用飾易氏曰鬯人共秬鬯而不言祭祀天地之用是天地之秬鬯純用朴素而無事乎文采其餘未免有飾焉祭社于壝而用大罍若近乎瓦尊然以雷為文則瓦尊之有飾者也禜祭于國門而用瓢齎若近乎匏尊然割瓢以為齎則瓢尊之有飾者也廟用脩者如司尊彛凡酒脩酌之義則以人力脩之而為脩者也凡山川四方用蜃者如掌蜃共蜃器之類蜃則又以蜃物為飾者也凡祼事用概者謂以朱帶飾漆尊而横概以落腹者也凡疈事用散者謂散尊雖無琢刻而亦用漆以為飾者也六者之用各因其宜而已凡祭祀社壝用大罍鄭鍔曰社壝者社之外委土為壝埒其中為壇王昭禹曰社壝則封人所設王之社壝王社之示比於天地之神為近人情則宜交之以人道故有秬鬯異於人道則非鬼故不加鬱而不祼鄭康成曰大罍瓦罍鄭鍔曰社祭土以瓦罍出於土器雖出於土然非用人工以陶冶器無自而成祭祀社壝則用大罍以盛秬鬯以見土者人所用功而社神有功於土禜門用瓢齎鄭康成曰禜謂營鄼所祭門國門也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之魯莊公二十五年秋大水鼓用牲于門王昭禹曰禜則黨正春秋祭禜是也鄭鍔曰禜祭必於國門意以災害屯塞人事有所不通門者人所出入徃來交通之所盛秬鬯則用瓢齎盖瓢齎者取甘瓠割去其柢以齊為尊質略無文之器夫雪霜風雨水旱疫癘之變良由政失於此變見於彼兹其為過也大矣君子有過則謝以質故用瓢齎所以表其純質之義禜之於門以兾其通變之意王安石云雩禜所以除害門所以禦暴除害禦暴皆所以養人甘瓠則有養人之美道以之為瓢又中虚為善容亦有門之象易以艮為門闕八音以艮為匏説爵之意無乃穿鑿之甚觀祭天用瓦泰瓦甒又用瓢爵禮記言器用陶匏以象天地之性物莫足以稱天地之徳故貴全素而用陶匏此所謂大罍則瓦甒之類用瓢齎則瓠之類皆質而已廟用脩鄭鍔曰考宗廟之中尊盛五齊三酒不盛秬鬯凡此所言祼器非廟中之彛改字為卣非也王安石以脩為飾之義是王昭禹曰用脩則増飾之以彩色廟以享人鬼人道尚文陸氏表記觧曰脩爵也鄉飲酒義曰脩爵無數凡山川四方用蜃鄭鍔曰四方山川則用漆尊而畫為蜃形先儒謂為蚌蛤一名含漿則是容酒之類余謂此乃海上能吐氣為樓臺者非蚌蛤之比四方山川為國扞蔽通氣乎天地之間蜃之為物外堅有阻固扞蔽之義且能一闔一闢其通亦有時焉故四方山川之祼尊則畫以為飾凡祼事用概鄭鍔曰祼事用雞鳥六彛見於司尊彞之官鬱人亦曰凡祭祀賔客之祼事和鬱鬯以實彞而陳之則祼事不用概明矣大宗伯有貍沈疈辜之祭此下有疈事用散之文則此祼字為貍字無疑矣黄氏曰鄭改祼為貍沈祭山川之名此指言山川用蜃則非用概也凡祼事則不獨祭也知賓客享適子冠凡用祼者皆以概盛鬯鄭鍔曰祼事用概概亦漆尊也上下黒漆以朱落其腹為飾猶横概然山林川澤材用百物之所出人所取足而為之神者初無私焉其功利及物可謂平矣王昭禹曰凡祼必和鬱鬯而多少之齊宜適平故其罍以朱帶為飾而横概落腹以概落腹能平物故也凡疈事用散王昭禹曰疈辜以祭四方百物言疈則辜可知鄭鍔曰祭四方百物則疈磔牲體其尊用散取其散在四方各以羣分之意王昭禹曰自概以上皆有飾惟疈事之罍無飾故謂之散與樂之散者謂之散樂車之散者謂之散車同意鄭鍔曰上文所謂四方山川者五嶽四瀆下文所謂貍則山林川澤小宗伯兆四望之下又有兆山川丘陵之文則知山林川澤與四方不同陸氏表記解曰罍以盛鬯瓢以酌之脩以獻之社壝言用大罍禜門言用瓢齎廟言用修相備也社壝禜門廟言變山川四方貍事疈事言常亦互相備大喪之大渳設斗共其釁鬯鄭康成曰斗所以沃尸釁尸以鬯酒使之香美者賈氏曰鬯酒非如三酒可飲之物大喪以鬯浴尸明此亦給王洗浴使之香美王氏曰共其釁鬯既以鬯渳又以釁凡王之齊事共其秬鬯鄭鍔曰王之齊事將以致敬於鬼神秬鬯者非如三酒可飲之物共以給王之浴而已内以致其精明之徳外則用其芬芳之物内精明外芬芳宜其馨香之至可以交於神明凡王弔臨共介鬯鄭康成曰以尊適卑曰臨春秋傳曰照臨敝邑鄭鍔曰禮記所謂臨諸侯畛於鬼神曰有天王某是也王或親弔諸臣之喪或適四方舍於諸侯祖廟之時雖曰至尊於人之祖先神明有所不敢忽使介執鬯以禮之鬯人共介鬯王亦未嘗親摯所謂天子無摯也李嘉㑹曰非惟安諸侯之室神亦以警人君之不可妄動陳氏曰天子無客禮於天下而有摯禮於鬼神天子以鬯為摯共介鬯則以介致之而巳觀天子宗廟之灌以圭瓉廵狩之灌以璋瓉則摯鬯之禮盖圭璋也天子之摯不特鬯耳其摯鎮圭以朝日猶諸侯執圭璧以朝君皆摯瑞也雞人下士一人史一人徒四人鄭鍔曰王安石謂雞於十二辰屬酉於二十八宿屬昴而反列於春官盖雞之為物向隂伏向陽鳴主於司晨日之晨猶歲之春則雞東方之畜余以易之八卦觀之巽為雞巽東南也五行東方之木為皃皃不恭是謂不肅厥咎狂時則有雞禍盖雞有冠距文武之皃故不為威儀容皃毁則木不曲直雞禍應之此雞為東方之畜列於春官劉氏曰宗伯主雞牲雞牲為物至微而設官者尊祭祀必預畜養之薛平仲曰古之事親者毎日雞初鳴咸盥潄盖人於此時旦晝之所為未交夜氣之所存未動精明純一洞洞屬屬而無間者也况夫一人行灌事於先而百官嚴祀事於下雞人警之於呼旦之時者人心當何如哉是以雞人次乎此掌共雞牲辨其物鄭康成曰物謂毛色辨之者陽祀用騂隂祀用黝大祭祀夜嘑旦以嘂古弔反百官鄭康成曰夜夜漏未盡雞鳴時呼旦以警起百官使夙興凡國之大賔客㑹同軍旅喪紀亦如之凡國事為期則告之時鄭鍔曰賔客㑹同軍旅喪紀皆不可後期而晏起既呼旦以嘂之又先期而告之時告之如是雖惰慢廢弛之人詎可安枕哉鄭康成曰象雞知時也告其有司主事者少牢曰宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事告時者至此旦明而告之賈氏曰案齊詩東方未明序云朝廷興居無節號令不時挈壺氏不能掌其職焉盖天子備官挈壺直掌漏刻之節雞人告期彼齊詩是諸侯兼官故挈壺氏兼告期凡祭祀面禳釁共其雞牲王昭禹曰禳以卻災禍面禳所禳非一方古者諸侯禳於畺及郊於四方皆有禳焉釁以厭妖怪鄭康成曰釁釁廟之屬釁廟以羊門夾室用雞鄭鍔曰釁以除去不祥鄭鍔曰二者之祭用雞為牲掌共雞牲又言於此者以面禳釁之用出於非常也周禮訂義卷三十三
