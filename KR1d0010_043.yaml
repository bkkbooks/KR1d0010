body:
  text: 周禮訂義卷四十三宋王與之撰大祝下大夫二人上士四人鄭康成曰大祝祝官之長黃氏曰卜祝秩皆髙鄭鍔曰曲禮言天子建天官先六大以大祝為天官之屬與大宰大宗同列者商人之制也周則為祝史而已薛平仲曰卜也者先王所以求諸幽以決吾心之疑祝者先王所以告諸幽以薦吾心之信此叙官之相為先後歟大祝之官必以下大夫二人居之輔之以小祝以見其辭之不可輕喪必有祝甸必有祝盟詛以結好又有祝作言語以質鬼神其所關者如此則夫降興上下之神以驗其昭格之實司巫之職又相與聨事於此也自大卜之職修而眂祲之官皆足為推測之應自大祝之職修而男女之巫皆足為昭格之具胡仁仲曰醫卜祝史技數也然切於人心而人理之所不能不用者先王之時世掌其事屬身於官醫以十全為上誤而殺人者有誅大事訊之卜疑事決之卜而吉凶軍賔嘉凡有告于鬼神者必祝史宣其意然後主事者得全其精神而與神明交今世不然散于民間取人者無罪驕人者無禁殺人者無誅妙達隂陽之寇有十全之功者亦莫之旌用國有大事事有大疑內不反謀諸心外不謀之於士庶精不謀之於龜筮而卜道以亡噫五禮之不得其理久矣君子漫不知其義祝史豈能知其義哉故民間惟有疾病則卜而卜者率皆誑言以恐惑之民率破産祀鬼而不求醫至有收事荒夷之神驅除其祖考而不薦者豈不傷人情逆天理乎是故君天下欲仁其民者雖醫卜祝史之流亦必如先王之世然後可行也掌六祝之辭以事鬼神示祈福祥求永貞鄭鍔曰宗伯以吉禮事天神地示人鬼大祝又以事鬼神示為職蓋宗伯所掌者禮也大祝以薦信為事用辭而巳故掌六祝之辭所祝雖六其要不過祈福祥求永貞賈氏曰此六辭皆祈禱之辭說以告神其事有六祈福祥即吉祝是也項氏曰祈則有所請天所祐為福福所兆為祥求永貞即年祝是也鄭康成曰永長也貞正也求多福歷年得正命特取二事為總目欲見餘四者亦有福祥永貞之事鄭鍔曰六祝之求非為已之私要使天下均受多福均保正命漢文帝知祠官祝釐專為朕躬而不為民故詔罷之豈先王為已計哉項氏曰六祝所以求福六祈所以禳禍李嘉㑹曰大祝掌六祝六祈六號九祭九拜事至不一而以作六祝之辭為先者大祝陳辭於鬼神當以誠信先之此事鬼神之本一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰策祝劉執中曰先儒咸以小祝小祭祀候禳之事以解六辭非也大祝所以祝大事郊祀天地社稷宗廟大享則用之鄭鍔曰六祝曰順曰年曰吉曰化曰瑞曰策見於小祝則有祈福祥順豐年逆時雨寧風旱彌災兵逺罪疾之目冝用以參相發明可也一曰順祝謂祈三才協順四海和同鄭鍔曰祈豐年也順成之方蠟祭乃通年無必豐之理祝其順成載芟之詩之類二曰年祝謂所祈五氣時若常大有年鄭鍔曰求永貞也欲民躋仁壽之域有天年之永如父不哭子兄不憂弟之類三曰吉祝謂祈斂時五福敷錫庶民鄭鍔曰祈福祥也身其康強子孫其逄吉有五福之備無六極之凶是謂吉四曰化祝謂祈休徴化被六極以同風氣鄭鍔曰弭災兵也災兵之起欲使之銷載戢干戈載櫜弓矢變禍亂為和平移哭泣為歡笑是之謂化五曰瑞祝謂祈順氣成象天降甘露地出醴泉鄭鍔曰逆時雨寧風旱也欲時無風旱而時雨應期所以為祥瑞貽我來牟嘉禾合穎固豐年之瑞矣必須風雨順旱災消然後有之故小祝指時雨風旱以為言是乃瑞祝之證六曰策祝謂祈鬼神龜筮不違於人大同而卦吉六者皆王者內藴誠明之德達于天民而天地合德故祝因郊祀各有其辭以祈報應鄭鍔曰逺罪疾也武王之疾周公請以身代史乃祝冊蓋為策書以述其謝過之情兾天地鬼神不加罪於其身策祝之為逺罪疾可知黃氏曰如隨季梁言曰今民餒而君逞欲祝史矯舉以祭是不稱其實也以是策祝恐祝史不能正辭而奉牲奉盛奉酒醴之際或有愧於其神而祝之也掌六祈以同鬼神示劉執中曰六祝因祭享祀祝之此六祈者特為因事祭而祈之黃氏曰皆非常事各有禮法悖禮亂法則不舉鄭鍔曰鬼神依人而行好惡未嘗不與人同然亦有時不同人惡疾癘疾癘或至人惡災害災害或生師欲有功或不功年欲順成或不順成未必其心皆同故以六祈祈其同項氏曰神人一理使是理常相依而行則雖無所祈可也一或不合變故生焉故必有類造以求之禬禜以告之攻說以責之使神人之情通則福可致禍可禳不曰通而曰同者以神人不同也然而大人與鬼神合其吉凶則同之其有道矣李嘉㑹曰鬼神示如何曰同六者之祭不可混雜别之於初則可責鬼神示之同於報我矣一曰類二曰造三曰禬四曰禜五曰攻六曰說鄭司農曰皆祭名也鄭鍔曰上帝之尊欲其同也因出師之時以事類而祈之曰類王昭禹曰合其類而祭之先祖之神欲其同也因出師之時則造廟而祈之曰造舜類于上帝雖因攝位以事告天然大抵類造為師祭之名詩云是類是禡說者以為師祭四時有常享不名曰造非有兵事不敢造焉項氏曰司馬法曰將用師乃告皇天上帝日月星辰以禱于后土四海神祗山川冢社乃造于先王此類造之别鄭鍔曰禬則禳災而㑹福之祭女祝所謂掌以時招梗禬禳之事王氏曰禬國之凶荒民之札喪之屬蓋禳則禳去其災禬則㑹聚其福鄭司農曰禜日月星辰山川之祭春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之鄭鍔曰攻者犧牲既成粢盛既潔然而旱乾水溢災變不巳是神之罪故以辭攻而責之如小子鳴鼓而攻之之攻王昭禹曰攻以治去其害若翦氏以攻禜攻之之屬劉執中曰說謂以論說祈求若湯之旱告於雩曰政不節歟使民疾歟宫室崇歟婦謁盛歟苞苴行歟讒夫昌歟六者自責以說天鄭康成曰董仲舒救日食祝曰照照大明瀐滅無光奈何以隂侵陽以卑侵尊是之謂說王昭禹曰以辭責之之謂說若庶氏以攻說禬之之屬項氏曰造類禬禜皆有牲攻說用幣而已作六辭以通上下親踈逺近劉執中曰王者欲保寧邦國興大利除大害天地鬼神羣臣兆姓未諭其意情有不通乃因六事以作六辭用通其情鄭鍔曰六祝之辭皆告神之語非鼓舞天下之動也王昭禹曰禮之文待辭後著禮之情待辭後見明以通乎人幽以通乎神皆有待乎辭則上下親疏逺近皆待辭以通上下以位言親疏以情言逺近以勢言李嘉㑹曰作六辭是掌代王言之人合在太史內史小史之屬今以太祝作之蓋六辭者多於廟中發之其辭無愧於神則上下親踈逺近之情可通一曰祠二曰命三曰誥四曰㑹五曰禱六曰誄劉執中曰祠謂祠享先王於廟祝受尸嘏于主人曰皇尸命王祝承致多福無疆于汝孝孫來汝孝孫使汝受祿于天冝稼于田眉壽萬年勿替引之主人奠酢爵再拜稽首受持黍稷懷之實于左𬒮黃氏曰祠用於祭祀所以交接鬼神者皆當有其辭武成曰敢昭告于皇天后土惟有道曾孫周王發將有大政于商商王受無道暴殄天物害虐蒸民此亦為祠蓋特祭非常祭也鄭康成曰祠者交接之辭春秋傳曰古者諸侯相見號辭必稱先君以相接祠之辭也鄭鍔曰命者述其意以命神如命龜之命蓋有指使之言如曰假爾泰龜有常假爾泰筮有常乃所以命之也鄭司農曰命論語所謂為命禆諶草創之黃氏曰古者大誥命發於廟臨之以鬼神畢命王朝步自宗周至于豐以成周之衆命畢公保釐東郊命之于廟洛誥王在新邑蒸祭歲王命作冊逸祝冊惟告周公其後告之于廟史逸作冊寶祝冊史官兼祝官歟鄭司農曰誥謂康誥盤庚之誥之屬盤庚將遷于殷誥其世臣卿大夫以道其先祖之善功故曰以通上下親疏逺近鄭康成曰㑹謂㑹同盟誓之辭黃氏曰鄭說㑹同是也盟非也大祝六辭無盟辭誓或有之詛祝作盟詛之載辭是則盟非先王所貴也春秋傳曰齊桓公葵丘之盟載書五禁曰無曲防無遏糴無專殺大夫無以妾為妻無冇封而不告不㰱血耳猶當有辭以告鬼神鄭司農曰禱謂禱于天地社稷宗廟主為其辭也春秋傳鐵之戰衛太子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晋午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面夷無作三祖羞大命不敢請佩玉不敢愛若此之屬鄭司農曰誄謂積纍生時德行以賜之命主為其辭春秋傳孔子卒哀公誄之曰閔天不淑不憖遺一老俾屏余一人以在位嬛嬛豫在疚嗚呼哀哉尼父無自律此皆有文雅辭令難為者也故大祝官主作六辭或曰誄論語所謂誄曰禱爾于上下神祗黃氏曰凡此皆所以詔告鬼神可以通人情能使上下親踈逺近無所壅隔也詩曰惠于宗公神罔時恫斯之謂矣先鄭引盤庚誥其世臣卿大夫道其先祖之善功其意是也上下親踈逺近間隔不通甚者則有盟詛盟詛亦有辭雖非先王所貴猶足以救衰世故使詛祝掌之然則大祝之職任可知辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號鄭鍔曰神示百物各有其名以名舉則失於䙝易其名而為之美稱所以致敬以尊神明見其肅敬之意大祝掌辨而為之鄭康成曰神號若云皇天上帝鬼號若云皇祖伯某示號若云后土地祇鄭司農曰牲號為犧牲皆有名號曲禮曰牛曰一元大武豕曰剛鬣羊曰柔毛雞曰翰音齍號謂黍稷皆有名號曲禮曰黍曰薌合梁曰薌其稻曰嘉疏少牢饋食禮曰敢用柔毛剛鬣士虞禮曰敢用潔牲剛鬣香合幣號若玉云嘉玉幣云量幣辨九祭一曰命祭二曰衍音延祭三曰炮白交反祭四曰周祭五曰振祭六曰擩而泉反祭七曰絶祭八曰繚祭九曰共祭鄭鍔曰食必有祭示不忘先宗廟之中尸祭有九大祝辨之非賔主飲食之祭而康成皆引賔主之食以言不可不辨王昭禹曰飲食必有祭先王所以仁鬼神蓋飲食人之大欲上古未有火化食草木之實鳥獸之肉飲血茹毛非所以飬生地聖人有作然後修火之利以炮以烹以炙以為醴酪而養之具實始乎此先王豈忘其本哉命祭若曾子問師行無遷廟之主則何如孔子曰主命以皮幣告祖檷載命以行每舍奠焉貴命也是謂命祭鄭引玉藻君命使祭之禮非大祝所辨也衍者餘也尸之餘也下佐食取尸祭之餘以授上佐食上佐食以授主人主人以祭是謂衍祭鄭引曲禮主人延客之禮非大祝所辨者炮不煩改字封人云歌舞牲及毛炮之豚蓋尸取所炮之豚以祭祀是謂炮祭周亦非曲禮遍祭先鄭謂四面為坐以祭百神是謂周祭振祭擩祭二祭本同所以異者尸未食之前以菹擩于醢祭於豆間是謂擩祭蓋擩則祭之鄭司農曰擩祭以肝肺菹擩鹽醢中以祭繚祭以手從肺本循之至於末乃絶以祭尸將食之時主人獻尸賔長以肝從尸右取肝擩于鹽振祭嚌之加于昕爼是謂振祭蓋振者先擩復振而擩祭則不振絶祭繚祭二祭亦本同所以異者繚祭以手從肺本循之至于末乃絶以祭不循其本直絶肺以祭禮多者繚之禮略者絶則祭之此所以為異共祭豈膳夫所共乎廟中則大祝受王以當祭者也辨九􅉔音拜一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀黃氏曰九􅉔專施於祭祀餘禮亦有拜不備九拜故太祝辨九拜以享右祭祀拜致敬也敬莫著乎祭九拜各有所施施不失節而後禮可觀為能事鬼神太祝辨九拜教敬也王昭禹曰卑之於尊賤之於貴與夫自敵已以上欲通其致敬之誠未有不用拜者非特是也舜拜臯陶禹拜善言太甲之拜伊尹成王之拜周公以至獻民數獻賢能之書王皆拜受此又至尊至貴自屈伏其體以通致敬之誠於其下禮之情大小輕重不一則拜之儀多寡低昻有不同大祝因其事以辨之而已鄭鍔曰稽之為言久也拜頭至地其留甚久此拜之最重者也頓之為言暫也頭雖叩地頓而便起不久留焉此稍重者也空首頭略至手其中空濶頭手不相密邇其禮輕矣臣之於君則稽首故魯人告吳曰非天子寡君無所稽首記曰大夫之臣不稽首非尊之也蓋避天子耳然以魯成公如晉而稽首晉人曰天子在而君辱稽首寡君懼焉季武子曰敝邑介在東表密邇仇讎惟君是賴敢不稽首此又謬為恭敬非禮之常也頓首自敵已以下用之秦嬴頓首於宣子之前是也空首君用於臣也振動者或云以兩手相擊振動其身今婦人之拜如此有所肅敬變動悚栗而下拜也杜氏曰振讀為振鐸之振動為哀慟之慟黃氏曰振動在吉禮若今舞蹈也魏犨曲踊三百其類歟凶禮振動劈踊吉拜則自凶向吉所謂拜而後稽顙凶拜則純乎凶所謂稽顙而後拜陽數竒隂數耦則竒者一拜褒拜則既拜矣又報一拜所謂再拜鄭康成曰再拜神與尸推手曰揖引手曰肅肅者不下拜俯下其手而復引之見其肅敬之至此軍禮所常用故曰介胄之士不拜郤至於戰三肅楚使而退是也王於廟中亦有時而當肅鄭康成云肅拜今之撎是也釋文曰撎於至切即今之揖張氏曰肅者婦人之拜古者首低至地肅拜也因肅遂屈其膝今但屈其膝直其身失其義矣賈氏曰九拜中四種是正拜稽首頓首空首婦人肅拜其餘五者逐事生名依四種正拜而為之振動凶拜褒拜並附稽首吉拜附頓首竒拜附空首陳氏曰大祝言禮之重者先稽首而繼之以頓首空首振動言禮之輕者則先竒拜而繼之以褒拜肅拜則頓首振動禮之漸殺者褒拜肅拜禮之尤殺鄭康成曰享獻謂朝獻饋獻右讀為侑侑勸尸食而拜賈氏曰九拜不專為祭祀以祭祀重故舉而言凡大禋祀肆享祭示則執明水火而號祝劉氏曰大禋祀祭天圓丘肆享宗廟大禘祭示祭地方澤三者禮最大故特言鄭康成曰明水火司烜所共日月之氣以給蒸享鄭鍔曰大祝執之以號祝既為之美名又從而告之蓋言主人之明潔若此水火者也王昭禹曰神鬼示之號則尊神而致之牲齍幣之號則敬神而致之禋祀肆享祭示皆禮之大者其事特嚴先期於致鬼神示後以祝通其意故先號後祝若夫小祝甸祝詛祝類皆言祝號者蓋小祝掌侯禳禱祠之祝號甸祝掌表貉之祝號詛祝掌盟詛類造攻說禬禜之祝號皆事小者故先祝後號小祝大師掌釁祈之號祝亦先號後祝者蓋大師亦國之大事故也隋釁逆牲逆尸令鍾鼓右亦如之易氏曰隋謂尸祭之餘釁謂薦血之事二者以誠為主故亦取乎明水火之用先儒以隋釁在逆牲逆尸之前既未逆尸安得有尸祭之餘既未逆牲安得有薦血之事遂謂凡血祭曰釁謂如大宗伯以血祭祭社稷五祀五嶽者且小祝於大祭祀逆齍盛逆牲逆尸沃盥贊隋贊徹贊奠無非所以佐大祝者豈有小祝施大祭祀而大祝乃施於血祭等禮乎是知隋釁繼號祝之文逆牲逆尸以後方言祭祀之禮王昭禹曰逆牲則以二祼之後王出廟門而迎牲逆尸則向祭之晨王出廟門而迎尸王昭禹曰隋釁逆牲逆尸皆以鐘鼓為節大祝則令鐘鼓鄭鍔曰侑食之時亦令擊鐘鼓故曰亦如之右當為侑即鄭說謂勸侑尸食來瞽令臯舞鄭康成曰臯讀為卒嘷呼之嘷來嘷者皆謂呼之入王氏曰來瞽則樂師詔之大祝來之臯舞則樂師詔之大祝令之鄭鍔曰樂師詔大祝而大祝乃來之令之相尸禮鄭康成曰延其出入詔其坐作既祭令徹賈氏曰祭訖尸謖之後大祝命徹祭器即詩云諸宰君婦廢徹不遲王昭禹曰九嬪贊后薦徹豆籩樂師帥學士而歌徹內宗及以樂徹則佐傳豆籩然則大祝令徹者令九嬪之屬大宗伯曰凡大祭祀王后不與則攝而薦豆籩徹蓋后雖不與九嬪之屬亦與徹事焉大喪始崩以肆鬯渳尸相飯贊斂徹奠鄭康成曰肆鬯所謂陳尸設鬯鄭司農曰渳尸以鬯浴尸賈氏曰相飯者浴訖即飯含故言相飯不言相含者太宰贊含玉贊斂者小斂十九稱在户內大斂百二十稱在阼階冬官主斂事大祝贊之徹奠者小祝注云奠爵也謂正祭時此文承大喪之下故奠為始死之奠小斂大斂奠並大祝徹之言甸人讀禱鄭康成曰言猶語也禱六辭之屬甸人喪事代王受眚災大祝為禱辭語之使以禱於藉田之神王氏曰於甸人讀禱則大祝言於匶使知焉付鄭康成曰付當為祔練祥掌國事賈氏曰祔謂虞卒哭後祔祭於祖廟練謂十三月小祥練祭祥謂二十五月大祥除衰杖此三者皆國事大祝掌之黃氏曰似衍國字其孰非國事哉鄭康成曰掌國事辨護之國有大故天烖彌祀社稷禱祠鄭康成曰大故兵寇天烖癘疫水旱彌猶遍也遍祀社稷及諸所禱既則祠之以報焉鄭鍔曰國有災故祀社稷之神以弭息之始禱祈終報祠皆掌之大師宜於社造於祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝鄭鍔曰大師必載社主與遷廟之主以行故有宜社造祖之祭祭社曰宜蓋以事宜而祭之非春秋之所報祭祖曰造蓋特造至而祭之非四時之常享此二者國內之禮及軍之所在必設軍中之社於其地以事類而告上帝此二者國外之禮小宗伯所謂帥有司而立軍社謂此也國有事于四望則將祀地之四望與夫軍有功歸而獻于社凡此二事大祝處前告神故曰前祝鄭康成曰前祝者王出也歸也將有事於此神大祝居前先以祝辭告之王昭禹曰大祝前羣祝大會同造于廟冝于社過大山川則用事焉反行舍奠賈氏曰王與諸侯時見殷見或在畿內或在畿外亦告廟而行鄭康成曰用事亦用祭事告行也玉人職有宗祝以黃金勺前馬之禮是謂過大山川與賈氏曰反行還祭七廟非時而祭曰奠鄭鍔曰舍奠之禮所以告至陳氏曰釋奠者設薦饌酌奠而已無迎尸以下事古者釋奠或施於山川或施於廟社或施於學鄭康成曰曾子問曰凡告必用牲幣反亦如之李嘉㑹曰大師先社後廟㑹同先廟後社大師屬隂會同屬陽故也建邦國先告后土用牲幣王昭禹曰大宗伯言大封告后土今此言建邦國則建邦國為大封矣鄭康成曰后土社神也鄭鍔曰先告后土然後分封示不敢專也大宗伯掌其禮大祝則掌告也告之之時其事用牲其禮用幣以為割裂土宇故用盛禮焉王昭禹曰大宗伯不言用牲幣以大祝見之然必於大祝言之以大祝辨牲幣之號也禁督逆祀命者王昭禹曰非所命而祀則在所禁命之祀而弗祀則在所督鄭鍔曰大祝掌祀典以求神為職故禁之使不得為督之使不敢犯鄭康成曰有逆者則刑罰焉督正也凡邦國都鄙之祀皆命於王故命之祀而弗祀非所命而祀皆謂之逆祀命頒祭號于邦國都鄙鄭康成曰祭號六號王氏曰頒其所得用之祭號王昭禹曰名位不同禮亦異數名號者先王所以命其實故天子所用者諸侯不得僭諸侯所用者大夫士不得僭所以嚴其分也小祝中士八人下士十有六人府二人史四人胥四人徒四十人鄭鍔曰大祝小祝薦信則一分小大以别尊卑可矣大祝則用下大夫小祝乃用中士等降遼絶如是何也余以為大宗伯掌天神地示人鬼之禮大祝亦以事鬼神示為職凡所以事鬼神示者皆其所掌小祝雖亦以祝為職然不過侯禳禱祠之事雖中士為之足矣掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺罪疾王昭禹曰非祀大神享大鬼祭大示皆祭祀之小者侯以候福之將至鄭康成曰侯之言候候嘉慶禳以却禍之方來者禱以先事而求之賈氏曰求福謂之禱祠以後事報之賈氏曰報賽謂之祠言小祭祀將事而繼之以侯禳禱祠之祝號則小祭祀所奉事者亦祝號而已故并侯禳禱祠言之賈氏曰祈福祥順豐年逆時雨三者皆是侯項氏曰此三者侯與禱之所因也寧風旱彌烖兵逺罪疾三者即是禳項氏曰是三者禳與祠之所用也劉執中曰有年矣又順民心為之祭報以祈來歲之豐故曰順豐年鄭康成曰逆迎也鄭鍔曰農民之望甘雨欲以時而至故逆之而來劉氏曰寧風旱謂恆風恆暘皆反休而為咎故祭以寧之鄭鍔曰風之偃禾旱之為災皆人所懼故寧之使不作鄭康成曰彌讀曰敉敉安也王昭禹曰災天患也兵人難也故彌以止之劉執中曰弭烖兵亦有祭焉以見王者不得已而用兵王昭禹曰罪自貽之毒也疾癘氣之作也故逺以避之劉執中曰罪疾謂天降罪罰札瘥其民為政者之所恐懼故設祭禳以逺之鄭鍔曰災兵人所畏故欲其彌罪疾人所患故欲其逺黃氏曰所謂祈順逆寧彌逺與大祝六祝相參錯但小祝所掌皆小祭祀不為辭掌其祝號而巳鄭鍔曰此即大祝之六祝大祝為尊尊則掌其目故以一曰二曰稱之小祝為卑卑則掌其事事之來不常不可以先後序故言其事也王昭禹曰祝者陳信於鬼神而無愧辭者也於是六者豈徒尚其虛拘之文哉大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠王昭禹曰齍盛所以親耕而自致者在是故大祭祀小祝則逆之所以尊之也五官奉牲而六宫之人奉齍則牲事尊於齍矣故大祝逆牲而小祝逆齍盛賈氏曰逆齍盛者祭宗廟饋獻後尸將入室食小祝於廟門之外迎饎人之齍盛於廟堂東實之薦於神座前送逆尸者為始祭迎尸而入祭末送尸而出祭義云樂以迎來哀以送往是也王昭禹曰大者事略小者事詳故大祝逆尸小祝送逆尸送往而迎來也不曰迎而曰逆者猶逆暑謂之逆所以尊也沃尸盥者尸尊盥不就洗按特牲少牢尸入于廟門外盥於盤其時小祝沃水易氏曰大祝相尸禮小祝沃尸盥沃盥小於相禮也鄭康成曰隋尸之祭賈氏曰贊隋者特牲少牢尸始入室拜妥尸尸隋祭以韭菹擩于醢以祭於豆間小祝其時贊尸授之王昭禹曰贊隋則大祝所謂隋釁而小祝則贊之贊徹者大祝既祭命徹諸宰君婦徹時小祝贊之鄭康成曰奠奠爵也賈氏曰贊奠者大祝酌酒奠于鉶南郊特牲注天子奠斚諸侯奠角小祝其時贊之鄭康成曰祭祀奠先徹後反言之者明所以佐大祝非一也凡事佐大祝鄭康成曰惟大祝所有事大喪贊渳杜氏曰渳謂浴尸王昭禹曰王始崩大祝以肆鬯渳尸小祝贊之設熬置銘杜氏曰熬謂重也檀弓曰重主道也殷主綴重焉周主徹重焉賈氏曰熬謂熬穀殯在堂時設于棺旁所以惑蚍蜉杜氏曰檀弓曰銘明旌也以死者為不可别故以其旗識之賈氏曰置銘者銘謂銘旌書死者名既殯置於階西上所以表柩及葬設道齎之奠分禱五祀鄭康成曰齎猶送送道之奠謂遣奠分其牲體以祭五祀告王去此宫中不復反故興祭祀王七祀祀五者司命大厲平生出入不以告劉執中曰既設道齎之奠又分禱五祀以告王喪之行大師掌釁祈號祝王昭禹曰蓋軍行殺牲以血釁鼓以禦妖釁求其所祈焉故謂之釁祈小祝則號致焉而後祝鄭鍔曰祓社釁鼓以除去不祥祈軍有功大祝掌宜社造祖之事小祝掌其釁祈之祝號王氏曰大師掌釁祈號祝則左傳所謂軍行祓社釁鼓祝奉以從有寇戎之事則保郊祀于社鄭鍔曰有寇戎則事出不虞兵自外作則出而保郊四郊兆域皆神之所處人心不安神或失所依小祝事神者也故就其所保而守之以安神也社在國內但祀以弭烖兵可也鄭康成以保郊祀于社為一句其說不可用黃氏曰郊非有司所當祀也直保之祀社而已王昭禹曰保郊以防患祀社以弭兵凡外內小祭祀小喪紀小會同小軍旅掌事焉賈氏曰司服注小祭祀謂林澤四方百物是外小祭祀其內小祭祀謂宫中七祀之等小喪紀者王后以下之喪小㑹同諸侯遣臣來王王使卿大夫與之行㑹同之禮小軍旅者王不自行遣卿大夫征伐此數事皆小祝専掌其事易氏曰此皆謂祝號之事喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人掌大喪勸防之事易氏曰勸謂執纛居匶前以勸率六引防謂執披居旁以防傾側及辟令啓鄭司農曰辟謂除菆塗椁令啓謂喪祝主命役人開之檀弓曰天子之殯菆塗龍輴以椁加斧于椁上畢塗屋天子之禮劉執中曰天子七日而殯用輴畫轅為龍先置於西階之上又置棺四重於輴車之中而大斂于阼階訖奉尸入棺加蓋乃置熬於四傍而攢之以椁加黼於棺覆以椁材然後畢塗四面霤屋故曰菆塗龍輴凡七月而後葬則喪祝命役人辟除其塗令啓棺菆及朝御匶乃奠鄭司農曰朝謂將葬朝於祖考之廟而後行則喪祝為御柩檀弓曰喪之朝也順死者之孝心其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬劉執中曰商人始死斂訖即以柩朝於廟而殯於祖七月而後葬周人殯於路寢七月將葬始朝於廟先適禰廟七廟後至始祖之廟而出葬焉故春秋傳曰凡夫人不殯于廟不祔于姑則弗致也晉文公卒將殯于曲沃就宗廟晉宗廟在曲沃故曰曲沃君之宗又曰丙午入于曲沃丁未朝于武宫賈氏曰御柩者發殯宫輴車載至廟喪祝執纛居前以御正柩鄭康成曰乃奠朝廟奠賈氏曰乃奠者既夕禮朝廟之時重先奠從燭從柩從彼奠昨夜夕奠至廟下棺於廟兩楹之間棺西設此宿奠至明徹去宿奠乃設此朝廟之奠於棺西王氏曰朝朝廟也奠奠柩也以祝御匶則象其生時及祖飾棺乃載遂御鄭司農曰祖謂將葬祖於庭象生將出則祖也故曰事死如事生檀弓曰飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以即逺也祖時喪祝主飾棺乃載遂御之喪祝為柩車御也或謂及祖至祖廟也易氏曰又及祖廟設祖祭之禮加帷荒以飾棺乃移所載匶車於庭中遂為之御六引鄭康成曰御之者執翿居前郤行為節度及葬御匶出宫乃代王氏曰既御匶出宫後祝代之執事鄭康成曰喪祝二人相與更也劉執中曰出宫乃代者至於外則鄉遂師代之及壙說載除飾鄭司農曰壙謂穿中也說載下棺也除飾去棺飾也四歰之屬令可舉移安錯之小喪亦如之易氏曰小喪謂王后及世子以下之喪亦如其殯葬次第掌喪祭祝號鄭康成曰喪祭虞也檀弓曰葬日虞不忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭易氏曰以虞易奠皆有祝號王弔則與巫前鄭司農曰喪祝與巫以桃厲執戈在王前檀弓曰君臨臣喪以巫祝桃茢執戈惡之也所以異於生也春秋傳曰楚人使公親襚公使巫以桃茢先袚殯楚人弗禁既而悔之君臨臣喪之禮故悔之賈氏曰桃者鬼所惡茢菼帚所以掃不祥桃茢二者祝與巫執之執戈者是小臣也按喪大記小臣二人執戈立於前二人立於後掌勝國邑之社稷之祝號以祭祀禱祠焉劉執中曰周勝於商取其社以祭之故曰勝焉弇上以絶天之陽也棧下以絶地之生也北其牖而祭之為其國亡也故使喪祝掌其祀事賈氏曰君自無道被誅社稷無罪故鄭謂存之重神也陳君舉曰不止是也存先代之後忘子卯之日陳埀和之器古人如此皆有深意如詩稱有客白馬助祭于廟皆是此意若曰商之聖賢六七作豈謂其處此哉皆警戒修省之意作夏社與此同意王氏曰勝國邑之社稷喪之類故喪祝掌其事凡卿大夫之喪掌事而斂飾棺焉賈氏曰言掌事者雖禮有降殺勸防以下皆掌之兼主斂事故總云掌事而斂飾棺焉甸祝下士二人府一人史一人徒四人鄭康成曰甸之言田也田狩之祝鄭鍔曰王田必於甸故田獵之祭名祝為甸掌四時之田表貉之祝號杜氏曰貉讀為百爾所思之百書亦或為禡貉兵祭也甸以講武治兵故有兵祭詩是類是禡爾雅曰師祭也鄭康成曰謂田者習兵之禮故亦禡祭禱氣勢之十百而多獲劉執中曰田以習兵教以戰陳而後乃田故亦禱焉鄭鍔曰肆師掌為位甸祝掌其祝號而已舍奠于祖廟禰亦如之鄭康成曰舍讀為釋釋奠者告將時田若將征伐鄭鍔曰將出田必行釋奠之禮以告于廟乃載遷廟之主以行其載以祖為主故舍奠于祖廟鄭司農曰禰父廟鄭鍔曰禰則但祭而不載言亦如之謂其舍奠也李嘉㑹曰四時之田亦近郊耳必舍奠于祖禰者為人君出入不可不謹重也師甸致禽于虞中乃屬禽鄭康成曰師甸謂起大衆以田也王氏曰凡言師田師不必田田不必師今此言師甸其事皆田又甸祝所掌是用師以田而已鄭鍔曰田畢虞人植旌旗於所表之處令獲者各致禽其中甸祝則㑹而屬之使禽獸以類相從王昭禹曰致禽屬禽山澤之虞也及郊饁獸舍奠于祖禰乃斂禽鄭康成曰饁饋也以所獲獸饋于郊薦于四方羣兆入又以奠于祖禰薦且告反也王昭禹曰饁獸者司馬鄭康成曰斂禽謂取三十入臘人項氏曰一為乾豆二為賔客三為充君之庖王氏曰小宗伯言頒禽此言斂禽互相備鄭鍔曰此小宗伯大司馬之事甸祝則為之祝也禱牲禱馬皆掌其祝號劉執中曰禱禱也禱牲禱馬者又因斂禽以祭牲牢之神求其博碩肥腯以祭馬祖之神求其六間四種孔阜奕奕詩云吉日維戊既伯既禱其此之謂乎詛祝下士二人府一人史一人徒四人鄭康成曰詛謂祝之使沮敗也掌盟詛類造攻說襘禜之祝號鄭康成曰八者之辭皆所以告神明賈氏曰按秋官自有司盟之官此兼言之者司盟直掌盟載之法不掌祝號與載辭易氏曰㰱血以詔明神謂之盟渝盟則詔明神以殛之謂之詛鄭鍔曰所謂盟諸大門之外詛諸五父之衢則盟與詛不同春秋諸侯皆以一時之事言不相信故盟以結之耳然亦有詛焉如鄭伯使出豭犬雞以詛射潁考叔者非詛乎鄭以大事用盟小事用詛非也盟也詛也類也造也攻也說也禬也禜也凡此八事皆掌告神之祝號其六則大祝之六祈也祝號乃掌於此蓋盟詛之時用此六祈則掌之也賈氏曰類造以下即大祝六祈大祝不掌祝號故此詛祝與盟同為祝號王氏曰於人也盟詛以要之於鬼神也類造攻說禬禜以求之民之所不能免也先王與同患焉因為典禮置官以掌之彌亂救災於是乎在矣作盟詛之載辭以叙國之信用以質邦國之劑信鄭康成曰載辭為辭而載之於䇿坎用牲加書于其上黃氏曰祝號非辭盟詛有辭載其所以盟之故而要結於鬼神賈氏曰人多無信故為要誓之辭對神要之使用信故云以叙國之信用王昭禹曰國之信用謂王國為載辭以使人信而用之有先後之序焉鄭康成曰國謂王之國邦國諸侯國也質正也成也文王修德而虞芮質厥成劉執中曰劑謂盟約之載謂彼不信而渝盟以負于神故叙國之信以詛之于神用以質邦國之劑信俾明神信其劑而降禍於渝者則天下無敢特不信以事其君無敢渝盟以事不信鄭鍔曰司盟掌盟載之法詛祝則掌為之辭其辭則叙述王國之所信用者非後王所僞為也諸侯祖先受先王誓告之辭書於質劑傳以為信固可以為驗也使為諸侯者歸而求之故府知夫故事則無敢不率者李嘉㑹曰盟詛帝堯之所去惟苗民罔中于信則用之今詛祝作為載辭所以輔其信於悠久而安人心於無所反覆特不可屢盟而為長亂之道必繼以質邦國之劑信者觀春秋之鄭屢爭盟於上國慮大國一時之言或偏狥而難從必盟載作於王朝則邦國之要約乃可質以為信易氏曰王者以信待人故天下不期信而自信焉用是㰱血之盟與夫渝盟之詛哉先施於民者信而已然後以盟詛輔之司巫中士二人府一人史一人胥一人徒十人黃氏曰卜祝巫史皆世官巫秩中士巫咸乂王家大史下大夫大史司寇蘇公皆為公卿先王取士可見鄭鍔曰薦信於鬼神固不可以無祝史既有大小祝又設司巫與羣巫何耶蓋巫與祝異祝則以辭告神巫則神所降古者民之精爽不擕二者神明降之在男曰覡在女曰巫是故國家用之使制神之處位次主分而言之有覡巫之異合而言之皆謂之巫巫既多故立司巫以統之陳藴之曰先王之時安有巫詛之事今特設巫祝一項官十餘員周公豈好巫者正是周公通幽明之理所以安鬼神之道與堯命重黎相似重黎雖不是巫亦是此意到漢無此一項官淫祀諂祭無所不有遂有巫蠱之事看漢如此淆雜方知周公之意思深長掌羣巫之政令王昭禹曰司巫為羣巫之長故掌羣巫政令若國大旱則帥巫而舞雩王氏曰帥女巫也不言女以女巫見之鄭康成曰雩旱祭也賈氏曰春秋緯云雩者呼嗟求雨之祭王昭禹曰陽亢在上阻隂而旱帥巫而舞雩所以助達隂中之陽鄭康成曰天子於上帝諸侯於上公之神賈氏曰月令大雩帝習盛樂據天子雩五帝按彼下文命百縣雩祀百辟卿士百縣謂畿內鄉遂明畿外諸侯亦雩祀百辟卿士即古上公勾龍柱棄之等鄭司農曰魯僖公欲焚巫尫以其舞雩不得雨國有大烖則帥巫而造巫恆杜氏曰司巫帥巫官之屬㑹聚常處以待命劉執中曰恆常也謂鬼神皆有恆德人而事之不以常道則為災故造巫恆者改過自新作巫之常道以彌災患子曰南人有言曰人而無恆不可以作巫醫黃氏曰鄭謂當按視所施為直按視之非造也蓋事當從冝不拘常轍故謂之造鄭鍔曰巫者禳變之術難以一定言故曰造巫恆言造為其所恆行之術鄭康成曰恆久也巫久者先巫之故事造之當按視所施為祭祀則共匰音丹主及道布及蒩館杜氏曰匰以器名主謂木主鄭鍔曰主在廟則藏於石室謂之宗祏及合祭於廟則以匰盛而至祭所祝取主而匰退道布新布三尺鄭康成曰道布者為神所設巾中霤禮曰以功布為道布屬于几鄭鍔曰道妙無方神者得之故所用巾謂之道布鄭康成曰蒩之言藉也祭食有當藉者館所以承蒩若今筐也士虞禮曰苴刌茅長五寸實于筐饌于西坫上又曰祝盥取苴降洗之升入設于几東席上東縮鄭鍔曰蒩者茅也鄉師所謂共茅蒩是也盛蒩名曰館者如人之館舍然謂茅託於其中也主先匰蒩後館互言之者明共主以匰共蒩以筐大祝取其主蒩陳之器則退也鄭鍔曰三者皆司巫所共以其與神交凡祭事守瘞鄭康成曰瘞謂若祭地祇有埋牲玉者鄭鍔曰祭有瘞埋牲玉之禮禮瘞埋於泰折祭地也不止地示宗廟之中亦有瘞繒之類祭而瘞埋祭之終也司巫守之俟禮畢乃去見欽神之至也凡喪事掌巫降之禮鄭康成曰降下也賈氏曰人死骨肉下沉於地精魂上歸於天天地與神人通故使巫下神王氏曰巫神所降故喪事有巫降之禮焉盡愛之道也黃氏曰其禮雖亡其意猶可知先王之於鬼神察矣故曰知幽明之故知死生之說又曰知鬼神之情狀男巫無數鄭康成曰巫能制神之處位次主者王昭禹曰國語曰古者民神不雜民之精爽不擕二者而又能齊肅𠂻正其智能上下比義其聖能光逺宣朗其明能光照之其聰能聽徹之如是則神降之在男曰覡在女曰巫通而言之皆巫矣楚語之言則是謂在男曰覡在女曰巫誤矣神降之然後在男曰巫在女曰覡故男巫女巫皆不豫為員數掌望祀望衍授號王昭禹曰祝與巫皆事神者故巫所以佐祝凡祝所掌之祀禮巫則掌降其神焉此所以掌望祀望衍也望祀謂凡祝所祀之神男巫則望而降之望衍謂尸祭之餘尊而祭之凡祭之衍祭是也男巫於衍祭亦望而降其神黃氏曰望祀四望之類是望衍小祭祀如四方百物之類是衍之言多也既多矣不正則為黷秦漢以來淫祀何可計數康成改為延協於大祝之衍祭其曰延而進之獨用幣義亦通杜氏曰授號以所祭之名號授之鄭鍔曰授奉祭之人以神之號使知其為某神之至爾鄭康成曰二者詛祝所授類造攻說禬禜之神號男巫為之招旁招以茅鄭鍔曰用茅以招之神來無方其招亦非一方也故曰旁招茅之為物柔順潔白惟潔白可以見誠敬之心惟柔順可以致懷柔之禮劉執中曰男巫掌侯禳之小祭游魂浪祟失位無依而為厲於人者則望其方而祀之黍稷蒩脯兼衍而祭亦以不祥無名之祟倏忽為禍者則望其所而衍祭之其有名有依不安其所而耀其虗怪以病乎人者則因其所歸而祭之以授其名號旁招以茅謂將祭於二者則於偏旁幽僻之地束茅以招之然後望授焉冬堂贈無方無算鄭鍔曰冬則贈送不祥與季冬贈惡夢之贈同李嘉㑹曰占夢所贈止惡夢也若司巫凡有不祥者皆贈去之凡送行必自堂始自內而外故於堂上行贈送禮以送之其送也無定方或東或西或南或北其路則無算數或千里或萬里欲其去之之逺劉執中曰冬者歲之窮理宜推故以納新者也况堂乃人之所寢而安之者不冝有邪氣以妨春陽之來不冝有妖祟以礙吉祥之至故男巫以脯醢幣帛繞堂而贈以遣之故曰無方小大多少莫不除之故曰無算春招弭以除疾病鄭康成曰招招福也弭讀為敉字之誤也敉安凶禍也招敉皆有祀衍之禮劉執中曰春陽既來則亦祭以招吉祥以弭去邪祟則疾病可得而除今之男巫尚有然者豈古之遺法歟鄭鍔曰冬則日星窮而歲終故行堂贈之禮春則歲事之初禍福所由始行招弭之事王弔則與祝前鄭康成曰巫祝前王也賈氏曰喪祝云王弔則與巫前二官俱在王前也李嘉會曰王弔祝可往也巫何與焉祝則以辭巫則用桃茢以除害也女巫無數其師中士四人府二人史四人胥四人徒四十人鄭節卿曰神所在而有之先王隨所在而祭之故在內則女祝在外則有司巫而男巫女巫又各有别內外不敢互用也掌歲時祓除釁浴鄭康成曰歲時祓除如今三月上已如水上之類釁浴謂以香薰草藥沐浴賈氏曰一月有三已據上旬之已而為祓除之事見今三月三日水上戒浴是也鄭鍔曰每歲以時祓除釁浴其宫中之事乎王昭禹曰求神以去凶禍謂之祓若社之類是也除舊以致新謂之除若以除疾病之類是也項氏曰釁器以厭妖沐浴以去惡若此者歲時有之女巫皆掌其事李嘉㑹曰既曰歲時非止上已意宗廟之神主以香薰草藥沐浴之也及宫人有疾病則祓除之後世祖行之以為上已之禮耳旱暵則舞雩賈氏曰此謂五月以後修雩故有旱暵之事暵熱氣也劉執中曰常暘則大旱矣帥女巫而舞助隂氣也鄭司農曰求雨以女巫故檀弓曰歲旱繆公召縣子而問吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎若王后弔則與祝前鄭康成曰女巫與祝前后如王禮賈氏曰與天官女祝前后也凡邦之大烖歌哭而請王氏曰歌以致神哭以祈哀鄭康成曰有歌者有哭者冀以悲哀感神靈李嘉㑹曰歌與哭兼之者若五子之歌及今喪家挽歌其哀怨尤甚孫氏曰祠祝禬禳本於人心之不能免者聖人既因之以為節文鬼神巫覡出乎天道之不可測者聖人亦存之以銷怪妄後世儒生學士乃欲一切絶之不知其不容絶也夫大祝小祝用之宗廟朝廷可也宫閫嚴密之地亦有女祝以供祭祀之役先王不慮其蠱惑兆釁何哉蓋命之為祝而領之天官乃可以盡奉祀之誠而習禮法之正凡非其鬼而祭之者不容入矣男巫女巫凡以神士者皆不限其數而録用於官府蓋必神降之而後在男為巫在女為覡凡以神士者掌三辰之法以猶鬼神示之居亦本於天象而狀其神位者也鄭氏曰巫既知神如此又能居以天法故聖人用之夫聚之官府而不散於鄉黨水旱疾疫為民以祈而鬼神盻饗乃見先王慮事之周矣周禮訂義卷四十三
