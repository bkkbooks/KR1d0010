body:
  text: 周禮訂義卷五十五宋王與之撰校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人鄭鍔曰用木相交為圈檻以制禽獸之出入者謂之校校人掌馬官之長制馬必以校字從木不從才從才則音教或謂校比其數非也薛平仲曰自戎右至馭夫凡九職掌五路之車自校人至圉人凡七職掌五路之馬先王時國馬足以共軍公馬足以稱賦周制六軍所謂馬牛車輦者皆因嵗時以數之若校人而下所謂頒馬者非分頒於民頒之卿大夫之從軍旅也是以王馬之政校人必以中大夫而較視之趣馬則趣走以養乘之巫馬則相醫而攻治之阜蕃於牧師計數於廋人圉師既教圉人以養馬矣圉人則役圉師以教事焉馬有駑良之不齊人有多寡之不一官有崇卑之不同事有詳密之不類其養之也至其教之也悉此馬政之在周為不可及也總論馬政吕氏曰自黃帝堯舜觀象立制服牛乘馬自此馬始為用考三代之制天子萬乘諸侯千乘大夫百乘立國制賦之法莫不以馬為本所以乘馬之法在古今最為精密然大而天子次而諸侯下而大夫乘馬之數多寡不同細考當時之數所謂牧養之馬有養之於官有藏之於民如丘甸嵗取馬一匹之類皆是藏之於民不仰國家芻秣如有事田獵征伐臨時徵召在天子之都諸侯之國大夫之家未嘗不自蓄馬此是養之於官者舉此一件論之便可見天子十有二間先儒論數謂不過三千餘匹衛文公承夷狄所滅之後新造之國末年亦至騋牝三千若以制度論之衛以諸侯之國又當殘亂之餘其他固未及論如何便及成周全盛乘馬之數所謂天子十有二間是養之於官者衛文公所謂騋牝三千舉通數言之又以當時春秋戰國論之如鄭西宫之亂子國為盜所殺子産以車十七乘出討賊子産當時謂之百乘之家若是徵求馬於郊野之間盜賊卒至如何便得集所謂十七乘之馬乃是育之於家者以此數事論之三代馬政固有在官者必有在民者數之多者在民平時無芻秣之費數之少者在官征伐無不至之虞當時法度最為詳備到漢家所謂三十苑之馬亦是官司所養之馬若是其他郡國民間養馬雖多亦是養之於民如衛青霍去病之徒伐胸奴有所謂官馬有所謂私馬則其制尚存到後周隋唐之閒治兵之制天子間廄監牧馬非不盛然府兵未嘗給馬初不過給之以錢使府兵自買馬若是不過衆人共出錢買馬以此知尚有古人遺法後來府兵之法漸壞府兵貧不足以買馬然後方以監牧之馬給之乃是制度之壞如此掌王馬之政孫氏曰車曰公車馬曰王馬以别其在民者先王寓兵於農隱武於國凡征行調發車馬器械所至必具縣師受法於司馬作而赴之不待仰給於官然散於閭里未易猝集畜之官府當為豫防蓋不特祭祀賔客之須使命出入君恩賜豫之用校人等馭夫之祿且曰宫中之稍食則十二間在宫中矣鄭鍔曰校人所掌自天子而下有邦國之間有大夫之間特以掌王馬之政為言是乃尊王之義鄭鍔曰王馬之多必有政以治之辨其物色使之勿雜而養之必有其所乘之必有其人是之謂政鄭康成曰政謂差擇養乘之數月令曰班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物鄭康成曰種謂上善似母者鄭鍔曰種馬者馬之最善育其種類使生生不窮以次差之玉路駕種馬鄭鍔曰于戎齊道田則以車名馬獨玉路之馬不名則種馬者駕玉路之馬特以種言之見其最尊非可以常馬駕也戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役鄭鍔曰馬有良有駑駑者馬之卑下奴在人下者也以供凡乘載之任不可與良馬比王昭禹曰其毛其足其力皆所謂物也司馬法曰宗廟齊毫尚純也田事齊足尚疾也戎事齊力尚强也此其物不可不辨鄭鍔曰六馬之屬用各不同或欲其毫之齊或欲其足之齊宜以類相從可也故名一物而使不雜凡頒良馬而養乘繩證反之乘馬一師四圉三乘為皂才早反皂一趣倉走反馬三皂為繫音係繫一馭夫六繫為廏廏一僕夫六廏成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫鄭康成曰良善也善馬五路之馬王昭禹曰頒良馬則頒之于圉師圉人趣馬馭夫僕夫也鄭鍔曰養之兾其繁盛乘之兾其調良乘馬一師而四圉之則牧馬之僕也師則教圉以養乘之法也四馬為一圉則養之必専四圉為一師則教之必審合三乘為十二匹則同一皂𫝊曰牛驥同皂皂言皂𨽻之所掌也王氏曰趣馬下士皂一人鄭鍔曰合三皂而三十六匹則同一繫繫則繫屬於此而不散之義王氏曰繫一馭夫則中士一人賈氏曰案馭夫中士二十人下士四十人正充此良馬之馭夫鄭鍔曰合六繫而二百一十六匹則同一廄廄則數至於此而已終既也先儒謂乾之策二百一十有六於易乾為馬天子之馬應爻之䇿其數盡於此故以廄名之易氏曰鄭以僕夫為上士非也玉路之僕曰大馭金路之僕曰齊僕象路之僕曰道僕木路田僕也革路戎僕也總而名之為僕夫五僕中惟道僕田僕為上士大馭戎馭為中大夫齊僕為下大夫豈皆上士乎不然則良馬五種既以駕五路所謂僕夫者非五路之僕而何鄭鍔曰合六廄而成一校而六廄又分為左右則十二間矣劉氏曰以中大夫二人為校人是謂馬六種十二間易氏曰六廄成校則一千二百九十六匹也校有左右則二校為十二廄凡馬之數當計二千五百九十二匹鄭氏謂校變言為成者明六馬各一廄而王馬少備也由此觀之則良馬五種分為十廄駑馬一種分為二廄一廄之馬凡二百一十六匹則二廄之馬為四百三十二匹矣以良馬一種而在二廄者四百三十二匹則五種十廄合二千一百六十匹外二廄為駑馬一種當四百三十二匹正合十二廄二千五百九十二匹之數鄭鍔曰自圉師而上則有趣馬有馭夫有僕夫有校人各掌其養馬之事黃氏曰康成謂六馬各一廏校有左右則良馬一種者四百三十二匹駑馬三之則為千二百九十六匹蓋欲牽就詩之騋牝三千非也馬官列職圉師趣馬馭夫僕夫僕夫蓋自田僕而上至大馭是也良馬六繫為廏廏一僕夫大馭戎僕齊僕各二人道僕田僕各十二人通三十人六繫馬二百十六匹三十僕夫則六千四百八十匹也種戎齊品貴難得通六廏耳然六廏成校校有左右則一僕兼二廏也良馬合左右校為一萬二千九百六十匹左右各五校也戎僕二人則戎馬四廏矣戎馬不止四廏此蓋選馬材力絶品以駕王路者薛氏曰駑馬三良馬之數則二校之馬獨有一千二百九十六匹故六種十二間而其數三千四百五十六匹此駑馬之在廏者亦三倍於良馬之在廏者也何者良馬駕五路之馬養之不可不専故二廏之數雖止乎四百三十二而不為寡駑馬其用甚微故二廏之數雖極於一千二百九十六而不為多黃氏曰良馬之數因僕之列官而可計也馬三皂為繫繫一馭夫良馬當三百六十馭夫而列官六十人蓋以選取二車從車使車合六十乘故以六十人列職其餘則與趣馬圉師因馬而計其數為可見也鄭鍔曰必三其數者蓋駑力之所駕服者其事不一惟多然後於事不乏黃氏曰駑馬八麗八師八趣馬鄭皆改為六未必然自八麗積而為一馭夫為馬一千二十四匹三十八馭夫則三萬八千九百十二匹三良馬之數多三十二匹耳良馬共王駑馬給乘國馬者與輦挽駑馬無僕僕御王也廏養馬之庌間置廏處若今監牧也良駑分居十二間其或多或寡不可知而良駑必異處良馬占地狹是為可知者此皆據經文不改字於義為安王昭禹曰良馬自圉師至於校人則以中大夫為之其官為稍尊駑馬自圉師至馭夫而止者以其材下於良馬故掌養乘之者兼其數而掌其事則官至於中士之馭夫而已然八趣馬則一馭夫掌之亦兼總於校人矣天子十有二間馬六種邦國六間馬四種家四間馬二種鄭鍔曰間防也不曰防防以防其外入間以間其內出防馬者使之無自內而逸出耳鄭康成曰凡馬每廏為一間易氏曰天子有十二間謂六廏成校而校有左右故十二也邦國六間家四間直謂一廂不分左右耳邦國六間馬四種者謂良馬三間為齊馬道馬田馬黃氏曰四種鄭謂齊道田駑亦謂同姓之國異姓象路何用齊馬四衛革路何用道馬而駑馬三良馬之數亦三間是三間良馬為六百四十八匹三間駑馬亦六百四十八匹總六間為一千二百九十六匹也家四間馬二種者謂良馬一間而駑馬三良馬之數亦三間是一間良馬為二百一十六匹三間駑馬為六百四十八匹總四間為八百六十四匹鄭鍔曰周制自上而下禮之降殺各以兩獨諸侯之於天子不止於兩而已天子六軍諸侯則三軍天子之馬十二間諸侯則六間而已其降殺不止於兩者為其地近而嫌也故曰成國半天子之軍則馬之間半乎天子豈不宜哉天子法天之大數故馬六種分為十二間每一種而分兩間故也諸侯有齊馬道馬田馬駑馬四種分為六間半天子之制也大夫有田馬駑馬二種分為四間又半諸侯也趙商以為十二間三千四百五十六匹六間二千五百九十二匹四間千七百二十八匹以司馬法論之甸方八里有戎馬四匹長轂一乘大夫采地四甸一甸供王其餘三甸才有馬十二匹謂與校人之職甚異康成以為司馬法為民出軍賦無與於天子國馬之數余以其說考之古者天子有國馬有民賦之馬民馬出於井田之賦如所謂提封萬乘馬四萬匹提封千乘馬四千匹者是也若乃國馬則國所自養牧以待用者即此校人以下所云是也蓋養於國者為車路之備出於民者為用兵之防此所以各足其事而不相傷也陳氏曰周制天子十二間間馬不過三千四百五十六匹而已春秋時晉悼公使程鄭為乘馬御六騶屬焉彼衛之騋牝三千齊之有馬千駟三千近於十二間之數千駟又過之是皆僣侈而踰禮也凡馬特居四之一鄭鍔曰說者謂特為牡馬也詩曰實維我特又曰百夫之特則特者雄而特立之義四馬而特居其一蓋三牝則育必多一特則氣必同如是而育馬其性必相似矣陳藴之曰此言養之時若疏言駕之時牝牡雜則不可御矣春祭馬祖執駒鄭鍔曰馬未嘗有祖此言馬祖者賈氏謂天駟也以天文考之天駟房星也房為龍馬馬之生者其氣實本諸此則馬祖為天駟可知於春則祭春者萬物始生之時駒始生之馬血氣未定不可通淫順春祭祖之時則執而維縶之以馴其始生之氣鄭司農曰執駒無令近毋猶攻駒也二嵗曰駒三嵗曰駣夏祭先牧頒馬攻特鄭鍔曰先始教人以放牧者也鄭康成曰先牧始養馬者其人未聞夏草方茂馬皆出而就牧思其始教以養牧之法故祭於夏夏者放牧之時可以就牧故頒而牧養之夏火方盛馬者火畜又况馬之特乎至夏而氣益盛不可制畜故祭先牧之時則攻而治之使皆調伏王氏曰攻特者駒之不可習者廋人攻之矣及成焉而不可習則校人攻之鄭康成曰夏通淫之後攻其特為其蹄齧不可乘用秋祭馬社臧僕王昭禹曰馬社廏中之土示凡馬日中而出日中而入秋馬入廏之時故祭馬社鄭鍔曰皂廏所在必有神焉賴乎土神以安其所處故祭馬社王昭禹曰僕御五路之僕王氏曰臧僕則簡馭者簡其臧亦簡其或不臧鄭司農曰謂簡練馭者令皆善也鄭鍔曰簡僕夫以待他日之用冬祭馬步獻馬講馭夫鄭康成曰馬步神為災害馬者鄭鍔曰寒氣總至馬方在廏必存其神使不為災唐人之頌曰冬祭馬步存神也王昭禹曰馬步為馬禱行冬則大閲之時故祭馬步賈氏曰馬神稱步若𤣥冥之步人鬼之步之類與酺字異音同義鄭鍔曰及冬之時自春所養乘者至是皆見其良矣乃擇其良者以獻于王如物至冬成而可獻也於是之時則講馭夫謂講論其知馭車之法能與不能也與臧僕之意同講必以冬馭夫則主馭者將使之馭使車二車佐車之人五馭必有法安可不講其藝乎於冬講之一年之事也黃氏曰馭夫員多於是講習而選之劉執中曰講馭夫一嵗之功過而上下之焉鄭鍔曰馬之難育也必祈諸神以為之助故春祭馬祖夏祭先牧秋祭馬社冬祭馬步四時各有所祭之神順其時各有蕃馬之法凡大祭祀朝覲㑹同毛馬而頒之鄭康成曰毛馬齊其色也頒授當乘之王昭禹曰如詩之六月所謂比物四驪有駜所謂駜彼乘黃凡此皆齊毫也爾雅言宗廟齊毫此于朝覲㑹同亦毛馬者承賔如承神故也鄭鍔曰王者非特資馬以為乘駕及其用各稱事而頒之祭祀朝覲㑹同以文為主馬欲其色之純而可觀故毛馬所以為文軍旅以力為主馬欲其足之齊而並進故物馬所以為力或謂宗廟齊毫尚純而朝覲㑹同亦毛馬而後頒何也賔客之來尤以華國為先李嘉㑹曰以其毛色物馬而頒之使各從其類飾幣馬執撲而從之鄭鍔曰天子之於諸侯亦有以馬為禮而賜之者謂之幣馬加文飾以致其華美鄭司農曰校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北面奠幣于其前士喪禮下篇曰薦馬纓三就入門北面交轡圉人夾牽之馭者執策立于馬後執箠撲以馭其奔逸凡賔客受其幣馬鄭鍔曰賔客行朝享之禮有庭實之馬以為幣亦謂之幣馬則受而養乘以待用大喪飾遣車之馬及葬埋之鄭康成曰言埋之則是馬塗車之芻靈賈氏曰古以泥塗為車以芻草為人馬神靈田獵則帥驅逆之車鄭康成曰帥猶將也鄭鍔曰統御長以進退黃氏曰田習戰于是知其可用不可用賈氏曰驅逆之車田僕設之校人帥領田僕而已凡將事于四海山川則飾黃駒鄭鍔曰若有祭祀於四海山川則必擇黃色之駒加文飾以將事焉此皆校人之職或謂大宗伯以沈貍祭川澤而祭祀之牲各放其色四海山川乃均用黃駒何耶以玉人之職考之王巡守過大山川所用之璋不同然皆以黃金勺前馬則知均用黃駒者海與山川均為地道黃者地之中色若夫用駒則以巡守而行四方駒有千里之足而行地莫如馬駒雖馬之小者禮以小為貴飾黃駒乃郊用犢之意項氏曰一曰土神尚黃校人飾貴誠也凡國之使者共其幣馬賈氏曰王使之下聘諸侯王行禮後更以此幣馬私與主君相見謂之私覿聘禮私覿是也王昭禹曰或以賜諸侯非特私覿也凡軍事物馬而頒之鄭康成曰物馬齊其力王昭禹曰爾雅言戎事齊力田獵齊足戎事非不齊足以齊力為主田獵非不齊力以齊足為主也陳及之曰周制甸出革車一乘馬四匹則是馬亦民自備也校人云凡軍事物馬而頒之者亦頒於官府共軍事者耳不然校人六廏凡三千四百匹安能及庶民乎自井田既壞凡征戰則國家賦馬與民漢時大僕牧師諸苑三十六所分布西北邊養馬三十萬頭武帝時天下亭亭有馬自是以來未嘗俾民自養馬也雖唐府兵之制有井田遺意而當給馬者豫其直市之每匹豫錢二十五千刺史折衝果毅嵗閲不任戰事者鬻之以其錢更市不足則一府共之熙寧間介甫罷祖宗馬監令民自養馬每一都限馬十五匹十五年而足謂之保馬郡縣茍阿上意不二三年而足於是天下騷然病矣等馭夫之祿黃氏曰馭夫中士趣馬下士良馬三百八十馭夫列員者六十其餘蓋選趣馬攝之馬有良有駑於良駑之中又有等馬故其祿不同使校人等之亦足見古人升選之法未嘗不各因其事鄭康成曰馭夫于趣馬僕夫為中舉中見上下宫中之稍食鄭鍔曰養天子馬於宫苑之中者亦當為之等其稍食嫌其特厚於宫中牧圉故特言等其稍食於馭夫之下鄭康成曰師圉府史以下項氏曰廄庫皆近王宫一云馬有養于內非也趣馬下士皂一人徒四人鄭鍔曰趣馬以下士為之馬十二匹為皂每皂一趣馬而爵之卑則下士其職之微則養馬而已周公作立政以戒成王與任人準人牧夫偕言之大夫之刺幽王與司徒卿士師氏內史連言之其微如此而所係反重以其近王故也李嘉㑹曰自趣馬而下至圉人不曰下士止曰人數皆官長所除然必特置官名何也蓋不可以胥徒為之懼其太卑亦不以命士為之懼其太䙝特立官名使其上自辟除之職有所統矣掌贊正良馬而齊其飲食簡其六節鄭康成曰贊佐也佐正者謂校人臧僕講馭夫之時鄭鍔曰良馬所以駕玉路然駕玉路之種馬不可以駕田戎之車駕田戎者不可以為齊道之用校人雖辨之猶恐其不正趣馬又贊而正之項氏曰贊正者贊校人之政駕路雖不同而飲食不可不齊或摧之或秣之摧之所以養之也劉執中曰養之使無飢渴害之也鄭康成曰簡差也節猶量也差擇王馬以為六等王昭禹曰所以間之分十二間六種之等也詩曰比物四驪間之維則四牡修廣其大有顒以養而間之如此劉執中曰目以知其瞻之不驚口以知其性之不悖耳以知其力之不殫鬛以知其血之有餘毛以知其氣之不暴蹄以知其行之不跲六者簡馬之大節也節同然後信為良馬掌駕說始鋭反之頒王昭禹曰駕以行說以止有勞佚之節鄭鍔曰使久勞者必佚久息者必行故以敘而頒之劉執中曰馬雖良而駕御御不得其方或奔踶者非其性然也故頒其說于三圉師十二圉人焉所以養成其材也辨四時之居治以聽馭夫鄭康成曰居謂牧庌所處賈氏曰牧庌者放牧之處皆有庌厰以蔭馬二月以前八月以後在廄二月以後八月以前在牧故云四時鄭鍔曰四時所居自日中而入之後所居者間廏日中而出之後所居者牧庌執駒攻特之事則春夏治之臧僕獻馬之事則秋冬治之皆不可以不辨王昭禹曰以聽馭夫惟馭夫之所役也巫馬下士二人醫四人府一人史二人賈二人徒二十人鄭康成曰巫馬知馬祖先牧馬社馬步之神者馬疾若有犯焉則知之是以使與醫同職李嘉會曰馬有醫可也而曰巫何故巫則知馬祟也相醫攻疾則兼醫也醫巫必兼言之先王愛物之心與愛人同賈氏曰有賈者治馬死生須知馬價故有賈人掌養疾馬而乘治之相息亮反醫而藥攻馬疾受財于校人馬死則使其賈音嫁粥音育之入其布于校人王昭禹曰馬疾不可以乘用故養之然疾之所在為難知必驅步之以發其疾可驗而療故乘治之若獸醫觀其所發而養之是已鄭鍔曰馬有疾必養之乃乘之治之養以足其氣乘以發其病養而不乘無以知疾之所在不可治也馬醫四人賈二人與巫同官雖禱馬要之正用藥為治疾之本為巫者特相助之而已攻謂擊而治之藥不足療者乃用攻焉猶瘍醫所謂五毒攻之鄭鍔曰醫馬之財宜有所自使藥物之資常足用而無窮故馬死使賈人粥之其財入于校人則所以醫馬者其財蓋本諸此李嘉會曰受財于校人使取財近而易以及物鄭司農曰賈謂其屬官小吏賈二人粥賣也鄭康成曰布泉也牧師下士四人胥四人徒四十人鄭康成曰主牧放馬而養之鄭鍔曰地官有牧人掌牧六牲則馬亦在牧又有牧師者蓋牧人所牧以共祭祀之牲牷非以備駕車之用此牧師正掌牧馬之地不與牧人之官相通掌牧地皆有厲禁而頒之鄭鍔曰水草繁多之地可以放牧馬之就牧者甚衆而官之所掌各有數之多寡故頒之以地鄭康成曰頒馬授圉者王氏曰頒其地于牧人必為厲禁然後計地以較焉可以責其繁息也賈氏曰厲禁謂可牧馬之處亦使其地之民遮護禁止不得使民輒放牛馬陳君舉曰古人養馬處處皆有牧地所謂牧馬是也可井則井之不可井則為牧地如華山之陽牧于坰野皆是牧馬既在民雖小國亦有官以掌之少康所謂牧正者大抵皆寓兵於農之意但農事勿擾則馬政日修故詩人稱馬政者必歸之農定之方中言命彼倌人星言夙駕說于桑田魯頌美僖公亦曰務農重穀牧于坰野故修農政則馬政自修馬既在民特設官以掌之孟春焚牧鄭鍔曰孟春草將生焚去地之陳根使發生新芽則馬食而充肥中春通淫鄭康成曰中春陰陽交萬物生之時可以合馬之牝牡也月令季春乃合纍牛騰馬遊牝于牧秦時書也秦地寒凉萬物後動掌其政令凡田事贊焚萊鄭康成曰焚萊者山澤之虞劉執中曰虞人焚萊而牧師贊之所以護牧地弗盡萊之也廋人下士間二人史二人徒二十人鄭鍔曰觀孔子言人焉廋哉廋為隱藏之義天子十二間皆馬之所在掌事於間中其名曰廋取其隱藏也先儒以廋為數不可考李嘉㑹曰一間下士二人廋其隱者而治之乘養攻治如其職之所言非一端而止也掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬王氏曰政以正之教以𨗳之鄭康成曰九者皆有政教鄭鍔曰考此文二及字之義當為七事耳廋人職卑安得主馬祖之祭於校人祭馬祖之時已則祭間之先牧於校人命執駒之時已則散馬耳圉馬原二及之文當為七事可也馬欲其蕃盛其阜之固有法鄭康成曰阜盛壯也詩曰四牡孔阜特者馬之雄其佚之必以時一特三牝所以阜之也安其血氣以時通淫所以佚之也佚者使之安佚不勞也鄭康成曰用之使不甚勞黃氏曰佚特使乘匹也特曰佚牝曰游一也三嵗曰駣可以任載乘則教以進退之節黃氏曰攻駒止乳不使其母羸也二嵗曰駒氣盛而未調也則攻以治其蹄齧之性王氏曰阜馬者養馬而阜之既阜矣又佚特以蕃之既蕃矣又教駣以成之攻駒則不可教者及其未駣攻之也祭校人夏祭先牧乃祭夫始教牧馬之人此祭間之先牧則祭始作間以牧馬之神黃氏曰間各有先牧執駒為血氣未定使勿佚也先儒謂散馬耳者以竹括押其耳頭動搖則括中物後遂串習不復驚也然謂之散者豈非以其踈散而不知畏故聒其耳歟圉猶禁圉之圉蓋禁而制之使不得以近母王氏曰圉馬則成馬而圉之圉馬以校人執駒為節也正校人員選鄭康成曰校人謂師圉也賈氏曰凡言正者以尊正卑自趣馬以上非廋人所正故知所正者師圉黃氏曰校人馬官之長廋人得正校人員選者廋人掌十二間之政教以阜馬所謂執駒攻特祭馬祖先牧皆與校人通職是則廋人専習馬蓋馬師也校人非其人則牧養乘治將不得其道理矣故使廋人正校人員選王氏曰正其員使員稱馬數正其選使選惟其能李嘉㑹曰因馬而定其員數因人而别其藝能馬八尺以上為龍七尺以上為騋六尺以上為馬王氏曰小大異名使各從其類以待乘頒及以為種鄭鍔曰八尺絶髙矣出乎其類追奔電逐遺風一去千里故以龍名之易氏曰以象天駟為蒼龍之星是其品之尤異者唯天子可備乘路之駕月令言駕蒼龍是也七尺以上亦異乎其類矣不謂之馬而謂之騋意其由種而生既髙且大有所自來矣豈種馬之子孫乎易氏曰以騋之牝驪牡𤣥是其色之尤異者天子諸侯得以兼用詩于衛文公言騋牝三千是也六尺以上則正名曰馬蓋馬之髙者正以六尺為常也或謂校人掌王馬辨六馬之屬則馬之名龍名騋者當辨也廋人之職其卑如是乃於此言龍騋之尺寸何耶蓋十二間之廣二千五百餘匹之多馬有超然卓異藏乎其中人所不見自非主者表而出之則神駿之才逐電之足誰其知之故特於廋人言之圉師乘一人徒二人鄭康成曰養馬曰圉四馬為乘王昭禹曰以教圉人養馬故圉師名官賈氏曰圉師即校人一師四圉者也掌教圉人養馬春除蓐音辱釁廄始牧夏庌馬冬獻馬鄭鍔曰春馬出而就牧廏中虛矣蓐者所寢之藉也久則穢惡而不潔故因其出而除之馬處於廏神實主之釁之以血所以除不祥故因其出而釁之王昭禹曰日中而出謂春分也日中而入謂秋分也故春始牧夏庌馬也鄭康成曰庌廡也廡所以庇馬凉也鄭鍔曰夏暑酷而馬尤畏熱必為廡以凉之項氏曰冬則所産之馬成矣故獻之射則充椹質茨牆則翦闔鄭康成曰充猶居也易氏曰充澤宫習武之居鄭鍔曰充如充籠箙之充蓋習弓試武之時取足其數也劉執中曰共椹質盤草以代侯也王昭禹曰司弓矢共其弓矢圉師則充椹質也李嘉會曰椹質謂以木為之非乃束草縳為圍如今射墮鄭康成曰茨蓋也闔苫也王氏曰次草謂之茨詩曰牆有茨苫謂之闔以銼草為苫易氏曰剪之以茨牆也鄭鍔曰蓋牆必用闔闔與左𫝊戎子駒支所謂苫蓋之蓋同茨牆之時必使圉師以翦其闔皆以其莝斬馬草熟於其事也易氏曰二者皆圉人所習故圉師因而使之圉人良馬匹一人駑馬麗一人鄭康成曰良善也麗耦也黃氏曰趣馬皂一人圉師乘一人良馬設員不可兼取駑馬亦有趣馬有圉師而設員不著趣馬兼取於圉師八師一趣馬也圉師兼取於圉人八麗一師也至圉人則不可兼取矣故良駑各著其員掌養馬芻牧之事以役圉師王昭禹曰芻以食馬牧以放馬皆所以養之鄭康成曰役者圉師使令焉凡賔客喪紀牽馬而入陳廞馬亦如之鄭康成曰賔客之馬王所賜之者詩云雖無豫之路車乘馬喪紀之馬啓後所薦馬賈氏曰喪紀謂將葬朝廟時在祖廟中陳設明器之時亦遣人薦馬及纓入廟陳之廞馬遣車之馬賈氏曰亦于祖廟陳此明器易氏曰賔客之時陳馬於館喪紀而葬陳馬於廟遣車明器之時則陳之於壙以圉人養馬故使之牽而陳之總論馬政鄭鍔曰周之馬政掌之有官牧之有地出入有時禱祈有祭教之有法養之有人其詳若此不聞蕃息之數如衛文公之騋牝三千何耶蓋經之所載皆成王持盈守成之際用以駕路車錫諸侯華國以為文飾幣以為禮而已至宣王中興南征北伐吉日庚午之詩國馬之盛莫不有自來其後馬政隨廢秦并海內六萬騎之國盡得而有之漢興天子不能具醇駟而將相或乘牛車厥後發易占之謂神馬當從西北來及得烏孫馬名曰天馬而奉使者爭言大宛有善馬在二師城遂拜李廣利為二師將軍期至二師取善馬至發卒十八萬與天下七科適以征之僅得善馬數十匹中馬以下牝牡三千餘匹更名烏孫馬曰西極馬以宛馬為天馬以馬之故天下蕭然耗矣唐興得突厥馬二千匹又得隋馬三千於赤岸從之隴右遂立監牧之制領以太僕其屬有牧監副監監有丞有主簿凡辟置長一人十五長置尉一人又以尚乘掌天子之御左右六間總十二間為二廏曰祥麟曰鳯苑太僕張萬嵗領羣牧自貞觀至麟德四十年馬七十萬六千置八坊岐豳涇寧間地廣千里四千三百三十頃募民耕之以給芻秣八坊之馬為四十八監馬多地狹又析八監列布河西豐曠之處凡馬五千為上監三千為中監餘為下監皆有左右當時天下以一縑易一馬自秦漢以來唐馬最盛其後卒能弱西北蕃人其所立之制髣佛周家遺法較於西漢過之逺矣周禮訂義卷五十五
