body:
  text: 周禮訂義卷三十一宋王與之撰以王作六器以禮天地四方鄭鍔曰能通三靈交之者莫如陽精之純故禮神有王祀神又有王崔氏曰若禮神之王置之神坐事訖收藏於玉府所謂植璧秉圭是禮神之王祀神之王燒之貍之不復收藏以玉作六器者所以禮神也或象其體或象其用或象其形或象其義皆以禮之而已禮者薦於告神之始也鄭康成曰禮謂始告神時薦於神座李嘉會曰六器列於六摯之後見得人道盡則天道可求以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以元璜禮北方愚案鄭氏以大宗伯有蒼璧璜琮之文典瑞無之而云四圭有邸以祀天兩圭有邸以祀地遂以蒼璧所禮者冬至圎丘之祭四圭所禮者夏至郊天之祭璜琮所禮者崑崙之神兩圭所禮者神州之神其説甚誕已於典瑞見之鄭康成曰禮神者必象其類賈氏曰爾雅肉倍好謂之璧好倍肉謂之瑗是璧圜也劉氏曰璧圓中虛象天也鄭鍔曰天圎而運乎上故璧圎以象其體天之蒼蒼其正色也故璧蒼以象其色色用蒼以壯陽發散之色求之地方而奠乎下故琮方以象其體黃者地之中色故琮黃以象其色用黃者以極隂之盛色求之説者又謂天地之玉用蒼與黃典瑞又有四圭兩圭之異何也余以為大宗伯之用蒼黃者禮神之玉所謂植璧也典瑞所云祀神之玉所謂秉主也鄭康成引以為證是矣林氏曰天以始事為功故以蒼地以終事為事故以黃鄭康成曰禮東方以立春謂蒼精之帝太昊勾芒食焉圭鋭賈氏曰雜記贊大行云圭剡上左右各一寸半是圭鋭也象春物初生易氏日圭鋭而首出其色以青象帝出乎震而物生東方之義也鄭康成曰禮南方以立夏謂赤精之帝炎帝祝融食焉半圭曰璋象夏物半死易氏曰璋明也其色以赤象物之相見乎離南方之義也鄭鍔曰隂生於午終於子午者南方之正位陽方用事而隂已生則夏者隂陽各居其半禮以半圭見隂功居其半不言祀中央者熊氏以為中央黃帝亦用赤璋然以類求神中央土色宜用黃孔氏以為當用黃琮然則土與地一類故不言鄭康成曰禮西方以立秋謂白精之帝少昊蓐收食焉琥猛象秋嚴易氏曰琥威也其色以白象秋之肅物西方之義也鄭鍔曰琥乃西方之義獸白色黑文尾倍其身一名曰騶故唐開元中辟諱而云禮西方以騶虞六玉之制不同獨於琥則取其形以物形成於秋故也古者鹽為琥形以示武敔為虎形以止樂亦此意而已李嘉會曰隂至於秋氣肅物成象之以琥言物雖已成威則可畏易於臨卦二陽已復亦曰至于八月有凶觀物思變宜豫防如此鄭康成曰禮北方以立冬謂黑精之帝顓頊元冥食焉半璧曰璜象冬閉藏地上無物唯天半見易氏曰黃者用藏也其色以元象乎物之歸藏北方之義也鄭鍔曰陽生於子終於午子者北方之正位隂方用事而陽已生則冬者隂陽各居其半禮以半璧見陽功居其半也皆有牲幣各放其器之色鄭鍔曰六器之色有蒼黃赤青白元之異牲之與幣各從其類蓋求神之道貴乎純一也或謂六器牲幣各放方色牧人之官所謂陽祀用騂牲毛之隂祀用黝牲毛之何也余以為禮有降神之玉又有祀神之玉大宗伯器幣各放其色者禮神以降之則宜象其類至於祀神以盡其道則因其隂陽以告純全而已然則大宗伯放其色即牛人所謂求牛也牧人言陽騂隂黝即牛人所謂享牛也以天産作隂德以中禮防之以地産作陽德以和樂防之愚案天産地産其説頗多今取其近似者敘之然後併述所見以待智者辨焉薛氏曰或者謂隂德柔德也柔德易至於委弛故以天産作之天産者天之所稟賦而得之者因其所稟賦而作其委弛之氣又以中禮防之蓋禮所以治心飬性約而歸之喜怒哀樂未發之中也陽德剛德也剛德易至於暴戾故以地産作之地産者地之所積習俗而成之者也因其所積習而作其暴戾之氣又以和樂防之蓋樂所以移風易俗裁而節之於喜怒哀樂既發之和也孫氏曰天之所産是為隂德在人為四端五常無以防之未免流於偽地之所産是為陽德在人為耳目口鼻四肢無以防之未免縱於情自中禮和樂交舉並行內以正性外以飬形水心曰民偽者天之屬民情者地之屬偽不可見而能匿情故為隂情可見而能滅偽故為陽禮樂兼防而中和兼得則生正而身安此古人之微言篤論愚案以上説天産地産為人之稟賦於天地者而防之以禮樂與司徒以禮樂防民相似恐大宗伯之職不然鄭康成曰天産動物謂六牲之屬地産植物謂九榖之屬隂德隂氣在人者隂氣虛純之則劣故食動物作之使動過則傷性制中禮以節之陽德陽氣在人者陽氣盈純之則躁故食植物作之使靜過則傷性制和樂以節之如是然後隂陽平性情和而能飬王昭禹曰六牲之屬皆味存焉謂之天産五榖之屬皆氣存焉謂之地産精之不足者補之以味形之不足者補之以氣先王以氣味作之則晝夜之所存平旦之所息無非精形之飬飬精之至隂德生焉飬形之至陽德生焉作之者使之生而無息也隂德作已而教之以隂禮則民可以無怨陽德作已而教之以陽禮則民可以無爭隂德民之所淫以中禮防之則民不淫矣陽德民之所怠以和樂防之則民不怠矣愚案以上説天産地産作動物植物以隂德陽德就人身隂陽之氣解之吕氏曰易曰大哉乾元萬物資始一元統天天之産也資始之初形氣方萌隱而未見有而未成此隂德之作也聖人以人心有喜怒哀樂未發之中與天産之作隂德同故以中禮而防民之失其中易曰至哉坤元萬物資生一元行於地地之産也資生之後形氣已成顯而可知彰而可見此陽德之作也聖人以人心有喜怒哀樂發而中節之和與地産作陽德者同故以和樂防民之失其和中和合於禮樂而還以正夫人心致中和則天地位萬物育故以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物無往而不在於中和也天産作隂德天之中也地産作陽德地之和也以中禮和樂防之以人之中和而同於天地也愚案此説天産地産作法天地生物之德為禮樂防民之用亦只説得大司徒教民以中和之事薛氏曰詩曰天生蒸民有物有則民之秉彞好是懿德則德者人心同然固有之性而非外鑠我也喜怒哀樂未發謂之中此中德也在人心所存者神而未嘗有隂德之名喜怒哀樂之中節謂之和此和德也在人心所過者化而未嘗有陽德之名殆夫判情偽為兩塗岐動靜為二理倚於靜者湮沒而不復振世始名之以隂德倚於動者矜暴而不可遏世始名之以陽德有名則有偏有偏則有纍謂之隂德則其身知入而不知出知收而不知縱如聚土如積塵如稿木泯泯然而日微矣謂之陽德則其心知出而不知入知縱而不知收如奔走如搖旌如驚濤顯然而日露矣靜者愈靜而至於忘動者愈動而至於助長聖人於此其可無作之之術乎由是靜而為隂德則作之以天産之樂動而為陽德則作之以地産之禮記曰樂由天作則樂為天産又曰禮由地制則禮為地産作之以天産之樂則斯民有鼓舞動蕩之志而向之湮沒不振者有所作矣作之以地産之禮則斯民有齊莊中正之心而向之矜暴不可遏者有所作矣聖人猶以為未也樂勝則流禮勝則離彼其狃於偏勝而過於有所激未有不至於蕩而無統乖而或離也故樂之勝者以中禮防之約而歸之於喜怒哀樂未發之中禮之勝者以和樂防之裁而節之於喜怒哀樂中節之和中和有以相濟禮樂有以相資渾渾乎其為懿德也哉愚案此説天産地産為禮樂蓋以經有樂由天作禮由地制之語其於産字自説不出易氏曰樂記凡言禮樂者無非以天地為本如曰著不息者天也著不動者地也一動一靜者天地之間也故聖人曰禮樂云夫禮樂豈玉帛鐘鼓云乎哉其説正有合乎天産地産之義蓋天之所産萬物者陽也陽以動為主即樂記所謂著不息者惟其動而不息是以流行發達或至於不中然而至陽之中作之以隂德則隂之靜者足以濟乎陽之動其散見於萬物者無非秩然品節為造化至中之理聖人體是中而制為之禮亦所以防天下之不中地之所以産萬物者隂也隂以靜為主即樂記所謂著不動者惟其靜而不動是以深沉重厚或至於不和然而至隂之中作之以陽德則陽之動者足以濟乎隂之靜其萃見於萬物者無非翕然交暢為造化至和之理聖人體是和而作為之樂亦所以防天下之不和大宗伯之言隂陽所以明禮樂之各有其體樂記之言動靜所以明禮樂之交相為用知一動一靜於天地之間者皆自然之禮樂則知天産作隂德地産作陽德者實禮樂之本也此下經復言禮樂合天地之化百物之産不然三産字一也世儒二之何耶愚案此説得之而未徹愚案天産者日月風雲雨露雷霆霜雪凡屬乎天者皆天之産然聖人以為天産所作之德謂之隂者以其德隱然難見若日月之暖雨露之滋萬物資之以生所以生者莫得而測皆天産所作之隂德也天産之作易於或過如愆陽伏隂凄風苦雨與非時雷霆過時雪霜所不能免聖人必以禮為之防蓋禮由隂作謂之中者有所止之謂禮以中止有以裁成其過而歸之中則天産不至於過作而暴地産者山林川澤丘陵墳衍原隰凡屬乎地者皆地之産然聖人以為地産所作之德謂之陽者以其德顯然易見若山起於卷石之多及其廣大草木生之禽獸居之水起於勺水之多及其不測魚鱉生焉貨財殖焉皆地産所作之陽德也地産之作易偏而不及如土敝則草木不長水煩則魚鱉不大甚至山童澤竭若動若植無所容山崩海泄若寶藏若貨財無所聚聖人必作樂以為之防蓋樂由陽來謂之和者有所諧之謂樂以和諧有以導達其不及而歸之和則地産不至於不及而亂如是則禮樂之用可以合天地之化百物之産與司徒教民之事大不同近世説者不知宗伯所掌之禮樂關於參天地贊化育之功拘於司徒五禮教中六樂教和之説釋之始失其旨以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物易氏曰上言禮樂之所從出故中和所寓有天地隂陽之異體此合天地之化百物之産則髙卑上下之際渾乎其為一致不知孰為天地耶孰為隂陽耶以事鬼神以諧萬民以致百物又皆不出乎天地隂陽之妙而中和實有以感發之孰謂禮樂為形氣之末哉王昭禹曰天以陽生地以隂成隂陽相摩鼓之以雷霆潤之以風雨動之以四時暖之以日月冬無愆陽夏無伏隂寒暑雨暘各適其中則天地之化是謂太和百物資天之陽以生資地之隂以成莫不負隂抱陽沖氣以為和則百物之産是亦天地之委和而已先王之作禮樂一本於中和則其合天地之化百物之産亦以其自然之和也夫樂由陽來禮由隂作合生氣之和導五行之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交於中而發作於外其至也極乎天蟠乎地上下與天地同和節則禮樂之大和也其施於物也感動其善心移易其邪行無悖逆詐偽之心無淫泆作亂之事天地欣合隂陽相得覆育萬物以至於萌區達羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕育胎生者不殰卵生者不殈則禮樂之委和也記曰樂者天地之和禮者天地之序惟其為天地之和序故能合天地之化又曰和故萬物皆化序故萬物皆别惟其能化别羣物故能合百物之産惟其和氣以通乎幽則鬼神之無形可得而事矣以治乎明則萬民之至愚可得而諧矣以格乎物則百物之有知可得而致矣鄭鍔曰合者會聚其氣使渾然不虧交通咸和也夫禮樂極乎天蟠乎地行乎隂陽通乎鬼神窮髙極逺不測深厚如此故幽焉以事鬼神則天地神示人鬼可得而禮明焉以諧萬民則發於朝廷形乎閨門行乎道路至乎州巷能使人心至於極和而極順微焉以致百物則以此之中和導彼之中和凡稟中和之氣者不期至而自至致猶以土圭致日月四時之致記曰大人舉禮樂則天地將為昭焉然後草木茂區萌達羽翼奮角觡生則知禮樂之功用深妙如此凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號楊氏曰所謂人鬼大鬼非止先王而已凡在祀典如勾龍共工之類皆是故通謂之鬼若帥執事卜日至相王大禮惟大神示大鬼為然其餘小祀則大宗伯不與故不言先王而曰大鬼所以别小祀若肆獻祼饋食禴祀蒸嘗則施於宗廟故皆稱先王鄭康成曰執事諸有事於祭者鄭鍔曰大宰總百官大宗伯亦為其所帥宗伯禮官之長帥禮官之屬以從大宰鄭康成曰宿申成也項氏曰宿是致齋記曰三日宿孟子曰齋宿與大宰卜日遂戒同滌濯溉祭器也鄭司農曰涖親也王昭禹曰玉以禮神鬯以求神皆宿視而臨蒞之賈氏曰天地有禮神之玉無鬱鬯宗廟無禮神之玉而有鬱鬯然宗廟有主瓉璋瓉亦是玉故曲禮云玉曰嘉玉李嘉會日天地用蒼璧黃琮四圭兩圭皆所以安神之靈宗廟有尸在位可以安神之靈於是用鬱鬯以求神然宗廟非不用玉不以玉為主兼天地而備有之則以人道為尚薛氏曰祭惟宗廟用祼天地社稷山川等祭則設秬鬯而已故鬯人共秬鬯鬱人共鬱鬯鄭康成曰鑊亨牲器也劉氏曰牲鑊在廟門之外以亨牲備熟獻兼省之焉鄭鍔曰亦躬省焉懼其不潔而鬼神不享鄭鍔曰黍稷謂之齍以玉器盛之謂之玉齍康成分玉與齍以為二物非是也王昭禹曰於祭之日奉玉與齍鄭康成曰大號六號之大者以詔大祝以為祝辭賈氏曰六號是大祝王昭禹曰以牲幣齍奉鬼神示以鬼神示建保邦國而不為名號以尊大其美以辨名其類則其盡志也略其盡物也瀆矣易氏曰大宰云祀五帝止享先王亦如之非特文之先後與此不合而事之輕重亦不能不異大宰於祀五帝而卜日此則曰祀大神享大鬼祭大示帥執事而卜日豈非鬼神示之大禮大宗伯之所專掌而大宰嫌於逼故止及於五帝之祀乎大宰言及執事視滌濯而此則曰宿視滌濯豈非大宗伯先期而視之大宰則至期而視之乎大宰言贊玉幣爵之事而此則曰涖玉鬯蓋玉用之於天地而鬯獨用之於宗廟大宰之祀五帝無祼豈非蒞鬯之輕於贊玉幣爵之事乎大宰言及納亨贊王牲事而此則曰省牲鑊蓋君袒而迎牲卿大夫贊君是大宰贊殺生之事大宗伯省牲鑊而已豈非省牲鑊之輕於贊牲事乎大宰贊牲而此則奉齍蓋祭祀以牲為貴齍次之小宗伯言五官奉六牲六宫之人奉六齍則齍之次於牲明矣大宗伯言祀大神示享先王亦如之而此則言祀大神祭大示享大鬼且及於大號大禮始終皆以大禮為言以其職之所專故正其名大宰嫌於逼故大神大示大鬼之禮特見於祀五帝之後兹所以不同治其大禮詔相王之大禮王昭禹曰治其大禮凡禮事之大者詔相王之大禮王禮之大者鄭鍔曰始焉治之則次序其先後之倫簡習其進退之節使有條而不亂雜説曰先自治而後可以詔乎王帝曰伯夷汝作秩宗夙夜惟寅直哉惟清行事則詔王又以相王使王不失其行禮之節黃氏曰今郊祀宰相為大禮使無職掌獨隨天子升降蓋宗伯詔相之事也若王不與祭祀則攝位黃氏曰王有三年之喪百官總已以聼於冡宰至祭祀則宗伯攝其意為可知矣鄭鍔曰禮官之長掌建祭祀享之禮故使之得以攝祭位王氏詳説曰祭祀大事也見於天官大宰又見於春官宗伯是以二卿皆得以攝行其事若王不與祭祀則攝位此宗伯之明文大宰攝祭不見於常職而見於量人量人云凡宰祭與鬱人受斚歷而皆飲之是大宰攝祭之事凡大祭祀王后不與則攝而薦豆籩徹王昭禹曰豆籩有薦謂正祭祀時豆籩有徹謂祭祀方畢鄭康成曰薦徹豆籩王后之事易氏曰宗廟六享王與后同裸獻后親薦八籩八豆九嬪贊其薦又贊其徹王后不與則大宗伯攝而薦之又從而徹之是大宗伯所攝之禮於王則見於祭祀之常者於后則見於祭祀之大者凡以節文乎是禮者也鄭鍔曰王后不與亦出於一時之故后既不與九嬪亦不蒞事故自始至終無不兼攝大賔客則攝而載果劉執中曰謂攝后耳鄭氏謂君無酌臣之禮誤矣鄭鍔曰后亞王禮賔故亦有祼獻之禮當后之亞祼也內宰贊之故內宰之職曰凡賔客之祼獻瑶爵皆贊若后有故而不與祼賔之事則大宗伯攝而載祼載之為言承之以往也言酌鬱鬯載於璋瓉往而禮賔也后於賔客固無親相授受之禮其禮也雖親酌之實盛載以往大宗伯之攝取王后待賔客之義亦以載為言此承上文王后不與之下當為攝王后祼賔客耳易氏曰載者以舟載之也司尊彞言六彞皆有舟是已言載彞以舟而酌之以璋瓉所謂攝者如此朝覲會同則為上相王氏詳説曰小行人曰為承而擯此則曰為上相者何耶夫擯相一也司儀曰掌擯相之禮是已但出接客曰擯入詔禮曰相王氏曰相者相王擯者擯諸侯因其事而異其名耳成周重賔禮故朝覲會同使宗伯為上相使行人為承擯在宗伯言相在行人言擯出入異辭也然小行人既為承擯矣而肆師又云大朝覲佐擯又何耶蓋佐亦承也小行人於常朝覲為承擯肆師於大朝覲則為承擯大宗伯於凡朝覲皆為上相矣擯者五人卿為上相宗伯卿也鄭鍔曰擯相一耳分而言之不同合而言之擯亦相也鄉黨曰君召使擯為接賔客言之公西赤曰願為小相為相主人言之大喪亦如之王哭諸侯亦如之鄭康成曰大喪王后及世子也哭諸侯者為薨於國為位而哭之檀弓曰天子哭諸侯也爵辨絰䌶衣胡康侯曰周制王哭諸侯則大宗伯為上相司服為王制緦麻宰夫為掌邦之弔事戒令與其幣器財用是王者所以懷諸侯王命諸侯則擯賈氏曰命謂以簡䇿以辭命之并加以服鄭康成曰擯進之也王將出命假祖廟立依前南鄉擯者進當命者延之命使登內史由王右以䇿命之降再拜稽首登受䇿以出此其略也諸侯爵祿其臣則於祭焉易氏曰王命諸侯則擯是以接賔客之禮待之也胡康侯曰凡封國大宗伯擯司几筵設黼扆內史作册命是天子大權非諸侯所得擅而行焉國有大故則旅上帝及四望鄭鍔曰旅非常祭也如禹貢言荆岐既旅蔡蒙旅平九山刋旅之類皆因水災之後而合祭也五帝因變故而有禱焉則合五帝與四望之山川旅而祭之不如常時之祭以事出於一時之變故不能如禮也鄭康成曰上帝五帝也薛氏曰典禮所載羣神之祀各有底定獨於四望未有名言以四望為天神耶舜典望秩山川則為地以四望為地示耶此四望列于五帝則為天故嘗謂望雖以名山大川為主實兼上下之神故時邁之詩言巡守告祭柴望且曰懷柔百神及河喬嶽周禮於望皆言祀不及祭又典瑞四望與山川異玉大司樂四望與山川異樂左氏曰望郊之細也公羊曰方望之事無所不通則望兼上下之神聖人望而祀之明矣鄭司農曰四望日月星海杜預曰望祀分野之星及封內山川許慎曰四望日月星辰河海太山鄭元謂五嶽四鎮四瀆是各以一説為證也望祀或設於郊天之後或設於巡守之方或旅於大故之時則望有常有不常之祀也王大封則先告后土賈氏曰大封若典命公八命卿六命大夫四命其出封皆加一等是其大封之事對封公卿大夫為采邑者為小封封是土地之事故先以禮告后土劉氏曰王封諸侯取大社之土苞之以白茅而授之為其將取是土故大宗伯先告焉敬其事也黃氏曰注疏説后土非也古人常以后土對皇天春秋傳曰君履后土而戴皇天后土地也五行之神后土黎所食者稱號同耳禹貢徐州貢土五色孔傳王者封五色土為社建諸侯則各割其方色土與之使立社周禮大封告后土謂將裂土而封之不曰社而曰后土社生物后土主土祈告因其事類而稱之五行之神后土四時分王與黃帝祭於南方建國非其事類故武成告于皇天后土孔傳曰告于天社是也大封宗伯告后土建邦國大祝告后土易氏曰以大封之意告大示也乃頒祀于邦國都家鄉邑鄭康成曰頒謂班其所當祀及其禮陳及之曰鄭説是也天子祭天地祭天下名山大川諸侯祭社稷祭名山大川之在其地者若魯人祭泰山晉人祭河不特此也凡其境內之山川悉祭之若顓臾祀東蒙須句祀有濟其國之在其地而無主後者亦祭之先王之世祀事悉舉人鬼不相殽亂蓋知其所憑依也實沈臺駘之祟於晉相之奪衛享是鬼神無所依也其所不頒則不得祭春秋時季氏祭泰山楚人祀江漢睢漳晉人祀夏郊則此禮不行久矣易氏曰都家即三等采地亦有先君及社稷五祀之禮鄉邑即六鄉六遂亦有祭社及祭禜祭酺索鬼神之禮雖小大異等必以王命而後舉所以繼於頒祀邦國之後王昭禹曰諸侯之國其制地有都家有鄉邑祭社之禮皆有等降則典祀所頒尤以為重楊子曰節莫差於僭僭莫僭於祭先王於此尤致其詳其所防豈不至哉周禮訂義卷三十一
