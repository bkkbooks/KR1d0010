body:
  text: 周禮訂義卷六十三宋王與之撰司刺下士二人府一人史二人徒四人劉迎曰名官司刺而掌三刺三宥三赦刺蓋刺舉之刺也刺史謂之刺以其掌刺舉故耳訊羣臣謂之刺訊羣吏訊萬民亦謂之刺既曰訊矣而又曰刺猶三覆五覆而問之訊其果無罪則刺舉於上而行赦宥也李嘉會曰小司寇既有三刺三宥司刺加以三赦而以刺名官專主刺取人情之當否而後施上下所服之刑雖曰下士二人聖人審刑之意詳矣掌三刺三宥三赦之法以贊司寇聽獄訟鄭鍔曰刺取其實然後殺之無愧矣黃氏曰其罪已正臣吏民皆以為當殺則殺之故謂之三刺以刺名官以訊為職先王之意可見康成言訊而有罪則殺之非也鄭康成曰宥寬也赦舍也王昭禹曰人之犯罪重者有至於殺故有三刺之法其罪有被之以五刑為已重加之鞭撲為已輕則宥以寬之故有三宥之法至於其情可矜而五刑疑於無罪則從而赦之故有三赦之法此三者皆有法而所謂法者內以求民情外以斷民中而巳司刺以是法贊司寇聽獄訟也小司寇所謂以三刺斷庶民獄訟之中以至於聽民之所刺宥以施上服下服之刑是也司寇不言赦言刺宥則赦可知矣舜典言欽恤五刑先眚災肆赦而後怙終賊刑先輕而後重所以示上有好生之德周官司刺先三刺而後三宥三赦先重而後輕所以示有司執法之堅上有好生之仁則知所以恤民焉有司有執法之堅則民莫之敢犯仁之至義之盡也一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民劉執中曰訊問也掌以司寇巳成之獄訟問於衆人鄭鍔曰先王非有心於用刑大抵以赦宥為心三刺一則先訊羣臣詢諸公卿之尊者也二則訊羣吏詢諸府史之卑者也以為左右及諸大夫皆曰可殺為未足信三則訊萬民萬民以為可殺然後殺之故曰國人殺之也一宥曰不識再宥曰過失三宥曰遺忘鄭司農曰不識謂愚民無所識則宥之黃氏曰謂不知其義者也汲黯曰愚民安知市買長安中而文吏繩以為闌出財物如邊關乎過失若今律過失殺人不坐死鄭康成曰若舉刃欲斫伐而軼中人者鄭康成曰遺忘若間帷薄忘有在焉而以兵矢投射之王昭禹曰若律在宫殿中作罷而不出之類也鄭鍔曰罪雖可刺又以三宥之法求以寬之豈其人之所不知識乎豈其人之過誤乎豈其人之遺失偶忘之乎一赦曰幼弱再赦曰老耄三赦曰憃愚王昭禹曰幼弱則幼而又弱也記所謂七年曰悼是也鄭鍔曰幼弱者安得犯刑意其連坐之人尤為可憫故一赦則先之老耄則老而又耄也記所謂八十九十曰耄是也鄭司農曰幼弱老耄若今時律令年未滿八嵗八十以上非手殺人他皆不坐鄭鍔曰憃者癡騃而不辨菽麥之人也憃而又愚則無知甚矣故亦可赦然比老耄又宜次之王氏曰幼而不弱老而不耄愚而非憃則不在所赦賈氏曰三赦與前三宥所以異者上三宥不識過失遺忘非是故心過誤所作雖非故為比三赦為重據今仍使出贖此三赦之等比上為輕全赦無贖李氏曰古之所謂赦宥如斯而已大赦之與郊赦自漢唐以來見之胡氏曰舜典口眚災肆赦易於解封曰君子以赦過宥罪吕刑曰五刑之疑有赦五罰之疑有赦周官司刺三赦三宥止及於此未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人得以幸免春秋肆大眚譏失刑也以此三法者求民情斷民中而施上服下服之罪然後刑殺王昭禹曰以此三法者求民情斷民中則情盡於內而辭孚於外矣情重者上服情輕者下服或刑或殺各得其罪而無疑也鄭康成曰上服殺與墨劓下服宫刖也司約職曰其不信者服墨刑凡行刑必先規識所刑之處乃後行之司約下士二人府一人史二人徒四人鄭康成曰約言語之約束薛平仲曰或以司約司盟非盛世之事遂因以疑周官之書風氣之開久矣使天下或私相為約私相為盟以紛紛於下孰若設官於上以司之使不可逾乎盟約不逾則獄訟可息獄訟可息則刑法可措甚矣先王之不得巳也掌邦國及萬民之約劑鄭康成曰六約者諸侯以下至於民皆有焉劑謂券書也鄭鍔曰約者以言而書其約者以劑劑如質劑之劑蓋兩書一札同而别之買賣之約長曰質短曰劑此則名曰約劑蓋亦兩書一札也先王之於臣民以為一時之言雖相與以無疑萬世之後或無所質證故為之約而設官以司之治神之約為上易氏曰六者大約劑也其中又有輕重存焉鄭康成曰治者理其相抵冒上下之差劉迎曰神約若盟詛載誓是也劉執中曰謂先王創有基祚必因輔佐之功若文王之周公召公武王之太公皆封之大國約以子孫百世與周無疆者也其人雖亡其神猶在七世之廟親盡而猶可遷其約不可渝焉易氏曰宗廟有位山川有域有社禝之壝有五祀之次所以祀神者不待約矣至於非其所祀而命之祀則書其所以命之者以為約若魯用郊禘之類是也治民之約次之劉迎曰民約若誥誓訓祝是也鄭以征稅遷移仇讎既和為民約非易氏曰分鄉以寓軍制邑以授農以旌節而辨遷徙以萃逋迅為顯戮所以容民者不待約矣至於非其所當有而分以授之則書其所以分之者以為約若分衛以殷民七族分魯以殷民六族分唐叔以懷姓九宗是也治地之約次之劉迎曰地約則傳别契券之屬鄭以經界所至田萊之比為地約非鄭鍔曰若昭九年周甘人與晉間嘉爭閻田王使詹桓伯言吾東西南北之土何邇封之有定四年載衛取於有閻之土以共王職取於相土之東以會王之東搜之類劉執中曰謂公侯伯子男所封之土各有定制而封疆之存不可以大而侵小用強以陵弱吞併其地也治功之約次之劉迎曰功約則銘誓帶礪之屬鄭以王功國功之爵賞為功約非黃氏曰功約水土之功鄭下注訟約引春秋將城成周宋仲幾不受功即此功也今民間受溝洫橋梁先後小大之差亦有約但其事固不可指狀而大概如此愚案功約不必專為水土如勳在王室藏於盟府也治器之約次之鄭康成曰器約謂禮樂吉凶車服所得用也鄭鍔曰如魯得用四代之服器六瑚四璉崇牙八翣之類劉執中曰謂若諸侯之有勳勞則賜之弓矢斧鉞俾專征伐者後世不可以渝之也治摯之約次之項氏曰摯約謂玉帛禽鳥相往來凡婚姻之屬也若公孫黑使強委禽焉劉執中曰治摯之約謂若五玉三帛二生一死贄先王以之敘諸侯分貴賤莫不依其爵祿髙下以為之贄也鄭鍔曰自神而民自地而功曰器曰摯上許之下承之或為上或為次以事之大小輕重為次序耳易氏曰即大以推小萬民之約劑亦可知矣王氏曰凡此諸治皆有許與之約焉不信而訟則司約掌之凡大約劑書於宗彝小約劑書於丹圖鄭康成曰大約劑邦國約也書於宗廟之六彞欲神監焉小約劑萬民約也丹圖未聞或有雕器簠簋之屬有圖象者與春秋傳曰斐豹隸也著於丹書今俗語有鐵劵丹書此豈舊典之遺言王昭禹曰自治神至治摯其事皆有大有小大則書於宗彞盟諸鬼神示無疑也小則書於丹圗丹圖以書之而其色則丹示其宣布著盡而無隱昧也劉迎曰約劑之設信之不足故也此所以書于宗彞丹圖若有訟者則珥而辟藏其不信者服墨刑鄭康成曰訟訟約若宋仲幾薛宰者也鄭鍔曰如諸侯萬民有因此而訟者當用舊約劑以質證之故為之珥而辟藏視諸故府也珥者殺雞取血以釁塗其户所以祓去不祥也鄭康成曰珥讀曰衈賈氏曰謂爭約劑不決者則以血塗户乃開辟其户以出本約劑之書勘之王氏曰珥而辟藏重其事也已見故府之文而尚不信則昏墨甚矣故服墨刑以示其昏墨無識之意若大亂則六官辟藏其不信者殺王昭禹曰有訟則辨訟而已大亂則僣忒而變先王之政刑鄭康成曰六官辟藏明罪大也六官初受盟約之二鄭鍔曰大史言約劑亂則辟法不信者刑之但其約之差錯而已故言辟法而刑其不信者此則為大亂而辟藏非特約劑之亂而已僣禮犯分為亂已大不可不殺也司盟下士二人府一人史二人徒四人鄭康成曰盟以約辭告神殺牲歃血明著其信也曲禮曰涖牲曰盟鄭鍔曰説者見春秋書盟謂為衰世之事其説出於禮記所謂盟詛不及三王也考之書載苖民罔中于信以覆詛盟則五帝之世已有是事苐苖民覆之故數之以為罪也詩云君子屢盟亂是用長非謂不可盟謂其盟之屢而無信學者不察以周官太平之書胡為玉府有珠盤玉敦之事戎右有贊牛耳桃茢之文於此又設司盟之官遂信何休戰國陰謀之説不考之於詩書爾古者結繩足以示信盟詛雖有而未必用去古稍逺淳厚一散世未嘗皆君子而無小人皆善良而無嵬瑣此司盟之官所由設王昭禹曰世之治也人以心相與家以誠相示知畏於神而不敢欺也知敬於神而不敢慢也先王因其有畏敬鬼神之心而躬信畏以先之而因以覆詛盟為大戮至其成俗則盟邦國之不協焉萬民之犯命而詛其不信者有獄訟者使之盟詛弭亂息爭豈小補哉掌盟載之法鄭康成曰載盟辭也盟者書其辭於䇿殺牲取血坎其牲加書於上而埋之謂之載書春秋傳曰宋寺人惠牆伊戾坎用牲加書為世子痤與楚客盟易氏曰以法行之謂之盟載之法盟而加之以約又謂之盟約之載凡邦國有疑會同則掌其盟約之載及其禮義鄭康成曰有疑不協也鄭鍔曰此謂合諸侯而盟將與之有所作為而未知其心之同否此所以有疑必有會同會同必有盟盟則司盟掌其法與禮義焉王昭禹曰禮其物義其容也北面詔明神鄭康成曰明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也鄭鍔曰神之明者吉凶禍福必審神向幽以神為幽而南面人將告幽故北面也詔之者使神察背盟之人是誅是殛也鄭康成曰詔之者讀其載書以告之也王昭禹曰幽則質諸神而盟者神之所為也明則證諸人而約者人之所為也盟諸神約諸人所以結信之道既盟則二之鄭鍔曰左傳襄十一年載亳盟之文甚悉而可考已盟則司盟藏其二蓋諸侯各受其盟誓之辭而此有副二以為異日之證王昭禹曰其正則藏於天府司盟則藏其二也大司寇曰大史內史司會及六官皆受其二而藏之則藏其二者非特司盟而已盟萬民之犯命者詛其不信者亦如之鄭鍔曰此謂合萬民而盟民有犯禁令者既待之以刑矣又慮有敢效而為之者於是盟其犯分之人蓋與共盟戒以無或如彼犯命者所為也左傳魯人盟臧紇曰無或如臧紇犯門斬關以出是其類也萬民有不信者謂向已結言而今背之無復信義則與衆共詛之詛者咒之以言欲使背信之人必蒙其禍也盟與詛異盟者戒其未然詛者懲其已往左傳鄭伯使卒出豭豚行出犬雞以詛射潁考叔者謂已射之後故追詛之也盟詛雖異禮儀皆北面以詔明神故曰亦如之黃氏曰犯命不信皆當刑鄭引臧紇斬關罪當連坐而衆不可施刑故乃盟臧紇氏又引詛射潁考叔者射考叔當坐而子都謫以避罪莊公不能正其罪故詛之獄訟覆情匿詐無質證不可推究者多矣雀角鼠牙非召公之明安能聽之是故株連則恐其枉故為盟詛以止之詩蘇公刺暴公之語曰出此三物以詛爾斯是蓋耻格之風猶在不敢自欺其心敬畏昭明故其事可行也苗民罔中于信以覆詛盟則以亂濟亂而已左丘明論鄭事曰政以正民刑以止邪邪而詛之將何益哉反諸本之謂也王昭禹曰邦國有疑會同掌其盟約之載者貴者之盟也盟萬民之犯命者詛其不信者亦如之賤者之盟也凡民之有約劑者其二在司盟鄭鍔曰民之有約劑書於丹圖司約掌之此則藏其二以備遺失賈氏口此謂司約副寫一通來入司盟有獄訟者則使之盟詛鄭鍔曰有約劑而不信至於獄訟者使之詛盟則中有所愧者不敢聽而獄訟自息矣此乃省刑獄之術凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯鄭鍔曰民有盟詛則鄰里當共其牲既使衆庶共質之而鄰里共牲之人必能詰責之者彼將知愧而自悔也黃氏曰使衆人共牲共酒脯等以昭告于衆詭詐不信人皆恥之矣已盟又與司盟共酒脯以祈神祈其盟之必驗也神之小者用酒脯故祭侯之禮以酒脯醢也考經之所載竊疑周家之於獄訟者先使之盟詛已訖乃使之入矢鈎金既入金矢乃為之受理而聽之然則刑措之術本諸此乎職金上士二人下士四人府二人史四人胥八人徒八十人鄭康成曰職主也鄭鍔曰金玉石錫皆國家之用物而名官特以金者玩好之至貴者莫如玉故玉府雖有金玉特以玉名府國之所用而用金為尤多五行皆金也故職金雖掌金玉錫石而以金名職黃氏曰職金屬司寇金行殺戮也矛戟弓矢斧鉞刀鋸其用一也玉石丹青其類也故兼主之是亦一府藏也職金以上皆聽斷其下則施刑掌凡金玉錫石丹青之戒令鄭康成曰青空青也鄭鍔曰荀卿言南海則有曾青丹干注云曾青銅之精可繪畫及化黃金者亦出蜀山越雋所謂青者殆此類耳賈氏曰此數種同出於山故職金總主其戒令然地官草人已主又職金主之者彼官主取此官主藏也薛平仲曰金玉錫石之利皆人情易誘而競趨者也司徒蓋有草人以掌其厲禁矣職金從受其入征焉貨利之所自出而有官以職之則下不敢逞其競利之私上有以弭其競利之患天下誰為有司之犯哉鄭鍔曰戒則欲其物之不苟取令則欲其入之以時受其入征者鄭司農曰受其入征者謂主受采金玉錫石丹青者之租稅鄭鍔曰受其入則取諸地而官所自入者受其征則取諸民而官所稅賦者王昭禹曰取於有地者之征而已上以政取謂之征辨其物之媺惡與其數量褐而璽之鄭鍔曰辨其美惡以知其精粗辨其數量以知其多少楬以表之璽以封之鄭司農曰璽者印也所以謹其藏入其金錫于為兵器之府入其玉石丹青于守藏之府鄭鍔曰草人則掌其所産之地此則掌其入焉金錫可以為兵器而玉石丹青可以為器用修飾之資故所入之府各異也王昭禹曰金錫則入於稿人玉石丹青則入于玉府王氏詳説曰有兵器之府又有為兵器之府玉府云掌兵器內府云掌兵器此兵器之府也今曰入其金錫于為兵器之府又曰入其玉石丹青于守藏之府守藏之府為內府玉府矣是知為兵器之府非兵器之府也之考工記曰攻金之工六築冶鳬栗段桃所謂為兵器府其此歟要知職金一官與天地夏冬之官並相為聨事其曰守藏之府是與天官通其曰為兵器之府是與冬官通受其金於草人是與地官通入其金于司兵是與夏官通職金如此他可知也入其要鄭康成曰要凡數也鄭鍔曰既頒入之則入其會計之要職金為刑官之屬則要當入于司寇非入太府李嘉會曰物之與書各有所司不相混雜掌受士之金罰貨罰入于司兵黃氏曰金罰即民入鈞金而理曲遂罰之貨罰司關所謂舉其貨也鄭説非舜有贖刑周於經無所見其後穆王始訓夏贖刑舜穆王贖刑不同舜漸輕之穆王漸重之此關世變鄭鍔曰士有過而被罰謂贖刑也貨罰士非關之人安得罰其貨蓋或以貨而當金者也司市則有帷蓋幕帟之罰亦貨罰之類歟士之在官者或有過則罰之不言大夫則刑不上大夫也項氏曰金罰貨罰皆士官掌之士入于職金職金入于司兵鄭康成曰入于司兵給冶兵及工直也陳及之曰齊管仲令有罪者以甲兵贖自此始旅于上帝則共其金版饗諸侯亦如之項氏曰金版蓋皇邸之飾為後版屏風者金以示依於義饗諸侯亦如之承賔如承祭凡國有大故而用金石則掌其令賈氏曰用金石而云大故止謂寇戎為禦捍之器有用金石者也鄭康成曰用金石者作槍雷椎椁之屬鄭康成曰主其取之令也鄭鍔曰大故則非常時所用或有須於金石多寡輕重出於常數之外不可以無法度也故掌其令司厲下士二人史一人徒十有二人鄭鍔曰厲凶暴之名司厲所以察凶惡暴戾之人王昭禹曰春秋傳曰鬼有所歸乃不為厲盜賊之厲於人猶鬼之厲也故掌盜賊之任器貨賄謂之司厲薛平仲曰鬼物之病民者謂之厲則厲蓋人之所共惡今以官之治盜賊者命曰司厲則惡而絶之殆亦甚矣掌盜賊之任器貨賄易氏曰非其有而取之者謂之盜因盜而肆害於人者謂之賊鄭鍔曰任器者所用以傷害人之器也貨賄者殺越人而劫剽其所有之財物也辨其物皆有數量賈而楬之入于司兵劉執中曰盜賊之器與物入于司兵非數莫知其多少非量莫知其短長非賈莫知其貴賤楬是三者則物與器常存而不可移易鄭鍔曰入于司兵使以其物充兵器之用取諸盜賊以為除盜賊之具而已鄭司農曰若今時傷殺人所用兵器盜賊贓加責沒入縣官士有罪而罰之取其金貨以入于司兵者義也盜賊有罪而罰之取其任器貨財以入于司兵者亦義也其奴男子入于罪隸女子入于舂稿鄭鍔曰古者父子罪不相及然罰之大者則有孥戮之法既服刑矣其從坐之人有不可加以刑者則沒入官為奴男子入于罪隸使為隸以役於百官府女子入于地官之舂人稿人使共舂抌飲食之事所入不同其名曰奴則一也劉執中曰罪惡之重雖沒其身未足償也又奴其男女而隸役舂稿皆有常養以存其生焉凡有爵者與七十者與未齓者皆不為奴鄭康成曰有爵者謂命士以上齓毁齒男八月生齒八嵗毁齒女七月生齒七嵗毁齒鄭鍔曰有爵而不為奴貴貴也七十不為奴老老也未齓不為奴慈幼也盜賊之罪冝加以無餘刑故凡親戚皆從其家有爵者有老幼者特免為奴而已易氏曰先王之於天下固有殺未足以懲惡亦有不刑可以勸善者此之謂夫犬人下士二人府一人史二人賈四人徒十有六人鄭鍔曰犬金畜也其性皆守屬乎義也故犬人屬於秋官黃氏曰犬逐盜故以犬人次司厲六牲之官皆以義類相從如春官雞人掌雞牲而以呼旦序於鬱鬯之後掌犬牲凡祭祀共犬牲用牷物伏瘞於例反亦如之鄭鍔曰司寇祭祀奉犬牲犬人則掌共其可以為牲者牲必用純牷之色貴純一也鄭司農曰牷純也物色也王行乘車則有祀軷之禮用犬伏於車下以車轢之而去謂之伏賈氏曰伏謂王將祭而出國軷道之祭即大馭所云者但軷祭時犬羊俱得故生民詩云取羝以軷祭地必瘞鄭司農曰瘞謂埋祭也爾雅曰祭地曰瘞埋祀軷祭地皆禮之盛者亦貴純全故亦如之凡幾珥沈辜用駹可也易氏曰幾祈也珥衈也王昭禹口幾珥士師所謂刉珥則奉大牲是也沈以祭川辜以磔門鄭司農曰大宗伯職曰以貍沉祭山林川澤以疈辜祭四方百物四者用牷正也無則以駹代之亦可也鄭司農曰駹謂不純色也王昭禹曰用駹不若用牷之為善故曰可也凡相犬牽犬者屬焉掌其政治賈氏曰犬有三種一田犬二吠犬三食犬若田犬吠犬觀其善惡若食犬觀其肥瘠故皆相之牽犬謂呈見之少儀云犬則執紲是也鄭鍔曰牽則不失其左右之防皆不可無政治也王昭禹曰相犬者屬焉以其屬有賈四人牽謂用則係而導之以其屬有徒十有六人也王氏曰掌其政治則并掌田犬周禮訂義卷六十三
