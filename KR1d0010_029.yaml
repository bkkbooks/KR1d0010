body:
  text: 周禮訂義卷二十九宋王與之撰春官宗伯上項氏曰春官以治教之始在於禮象天地之化始於春鄭鍔曰自舜命伯夷典三禮其官曰秩宗周人因名曰宗伯說者謂宗尊也伯長也天下所宗者惟宗於禮此禮所以為尊也近世王安石云宗典祀禮者也宗伯掌天神地示人鬼之禮故謂之宗然宗伯所主何獨祭祀之禮哉自四方言之東者嵗之始自四時言之春者時之始宗伯於四時之官獨為長故以伯稱之春秋之際魯有夏父弗忌為宗人蓋周之舊也惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國鄭康成曰禮謂曲禮五吉凶軍賓嘉其别三十有六鄭鍔曰禮猶火取之槐檀則火在槐檀取之杏棗則火在杏棗取之柞槱桑柘則火在柞槱桑柘火無所不在禮亦無所不在有君臣則禮在君臣有父子則禮在父子有夫婦則有夫婦之禮有朋友則有朋友之禮行乎道路至于州巷放乎搜狩修乎軍旅冠昏喪祭飲食起居無非禮也掌禮之官詎可以專乎一哉如司尊彞司几筵之名司為禮官之屬所謂籩豆之事則有司存項氏曰禮之用以和為貴民生有欲而無分則爭爭則乖先王制禮為之節文以事其鬼神示其餘則賓以親之軍以同之粲然有文足以相接則乖爭之患何自而作故曰和程氏曰古者冠昏喪祭車服器用等差分别莫敢踰越故財用易給民有常心今禮制未修奢靡相尚卿大夫之家莫能中禮商販之類或踰王公禮制不足以檢飭人情名數不足以旌别貴賤既無定分姦詐攘奪人人求厭其欲而後已呂氏曰禮官之長是為宗伯壇場昭穆之等聘享射御之節貫本末而等文質者所謂禮也神人之所以治上下之所以和失其禮則僭亂諂妄而瀆乎神乖爭陵犯而悖乎人上下皆失其分安得而和成周萃禮樂於一官和云者蓋亦包樂於其間後世禮樂廢壞治人者不過簿書期㑹之末至於祀典尤為不經間有一二僅存不過曰使先王文物不廢乎吾世而已所謂治人者漫不知其語矣愚案六卿自冢宰以下皆以有司言獨宗伯不言司四官皆言垂象獨宗伯不言象以見禮樂法而不說而致中和之用足以為參贊化肓之功非可以有司比也禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人薛平仲曰禮有小大有本末大者經小者紀本者義末者數經既立則紀不可以偏廢故犬宗伯之二有小宗伯焉義既明則數不可以不具故宗伯之屬有所謂肆師焉肆之為言陳也郊特牲曰其數可陳也其義難知失其義而陳其數祝史之事也知其義而敬守之天子之所以治天下也然則有宗伯以明其義又有肆師以陳其數則周之禮可不謂之大備乎大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國鄭康成曰建立也立天神地示人鬼之禮謂祀之祭之享之禮吉禮是也李嘉㑹曰和邦國諧和其情也建保邦國則各安其分守矣天神人鬼地示各安其分推以化民治國特餘事耳唐氏曰虞書巡守修五禮臯陶謨言自我五禮至命官則曰典朕三禮蓋五禮兼神人三禮事神之禮也宗伯先言建邦之天神人鬼地示之禮則所謂典三禮次之以吉凶軍賓嘉則五禮也鄭康成曰保安也王昭禹曰合五禮而言則曰佐王和邦國别三禮而言則曰佐王建保邦國蓋封國則頒祀此之謂建祭則受福此之謂保黃氏曰伯夷降典折民惟刑功配禹稷而其事始於事鬼神是則建保邦國誠有其本也紂謂祭無益犧牲粢盛既于凶盜祖伊以為商亡之決如是也賈氏曰上單言邦據王為言以佐王建保邦國則統侯國言之矣以吉禮事邦國之鬼神示黃氏曰吉禮居其首禮主敬敬莫著乎祭鄭鍔曰祭祀之交於神明有受福之道故以吉名之鄭康成曰吉禮之别十有二事王氏曰謂之建則禮當自王出謂之事則非特王國而已王氏詳說曰或言鬼神示或言神示鬼何曰此所以為秩宗之官也以上下秩之則曰神鬼示以內外秩之則曰鬼神示以尊卑秩之則曰神示鬼孫氏曰先王明於天地之故察於人之理知所以接三才者即吾保邦之實政不容外三才而自任其私智也故天以氣覆物吾則用禋祀實柴槱燎以祀之地以形載物吾則用血祭貍沈疈辜以祭之至於人鬼之奉則立之尸以人道饗焉凡此者皆實致其義實當其情求之於心驗之於事一有違於天有悖乎地有愧乎先則為不克祀不克祭不克享矣惟聖人能享帝孝子能享親此之謂也以禋祀祀昊天上帝愚案自此至雨師皆祀天神張氏曰鄭注禋祀則變禋為煙取其尚臭據洛誥曰明禋又國語曰精意以享曰禋遍觀書傳皆言禋是精潔致祭之名凡祀天日月星辰風師雨師皆取煙燎不言可知今祀天言禋祀日月言實柴祭天禮重故取禋敬之名以别之鄭不明此意改禋為煙謬哉書曰禋于文玉武王又曰禋于六宗鄭鍔曰謂之禋祀明在乎致其心齊精明誠一為主而已陳及之曰祀昊天上帝總言祭天耳昊天猶言蒼天也程氏曰孝經云郊祀后稷以配天宗祀文王於明堂以配上帝天與帝一也天言其體也帝言其主也在郊則言天以其冬至物生之始故祭於員丘而配以祖陶匏藳鞂掃地而祭宗祀言上帝以季秋物成之時故祭於明堂而配以父以宗廟之禮享之王昭禹曰昊天之有上帝猶國之有君五精之帝則猶四方之諸侯諸侯有君道故皆謂之君五精之帝有帝之道故皆謂之帝天者帝之體帝者天之用體嫌於不能降用嫌於不能辨故言其降而與物接則以昊言天言其升而與物辨則以上言帝鄭鍔曰周禮有言天有言昊天上帝有言上帝有言五帝言天則百神皆預大司樂所謂天神皆降之類是也言五帝則無預乎昊天上帝司服所謂祀昊天上帝祀五帝亦如之之類是也言上帝則無預乎五帝掌次所謂旅上帝張氊案祀五帝則張大次之類是也言天言帝神各不同至於昊天上帝則兼舉其統天言之以其氣之浩浩故曰昊天以主位乎上故曰上帝位為最尊物無以稱其德惟致其精意可以享之故以禋祀祀昊天上帝國語所謂精意以享謂之禋是也愚案天之與帝其實則一如伊川之說無疑如五帝之談鄭氏亦失之詳見小宗伯以實柴祀日月星辰項氏曰日司晝月司夜星辰司次十有二辰二十有八星鄭司農曰實柴實牛柴上也鄭鍔曰日月星辰民所瞻仰而在祀典者必以氣臭而達之故用實柴實牲燔柴則氣臭上達矣陸氏曰古者之祀日月其禮有六郊特牲郊之大報天而主日配以月一也玉藻曰朝日于東門之外祭義曰祭日于東祭月于西二也小宗伯四類兆日于東郊兆月于西郊三也大司樂樂六變而致天神及象物月令孟冬祈來年于天宗天宗者日月之類四也覲禮拜日于東門之外禮日于南門之外拜月于西門之外禮月于北門之外五也左傳雪霜風雨之不時于是乎禜之六也夫因郊報而祀之非正祀也類禜而祀之與覲禮諸侯而禮之非常祀也春分朝日于東門之外秋分夕月于西門之外此祀之正與常也日言朝則于日出之朝朝之月言夕則于月入之夕夕之日壇謂之王宮以其君道也月壇謂之夜明以其明于夜也以槱燎祀司中司命飌音風師雨師鄭康成曰槱積也三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也王氏曰柴而實牲然後槱燎天祀之所同也或言實柴或云槱燎相備而已賈氏曰先鄭以司中是三台司命是文昌今三台與文昌皆有司中司命故後鄭不從武陵太守星傳云文昌宮六星一上將二次將三貴相四司命五司中六司祿又云三台一名天柱上台司命為太尉中台司中為司徙下台司祿為司空鄭鍔曰祭法王立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈此所謂司命者乃七祀之司命所謂司中者其七祀之泰厲乎蓋人受命以生萬物之命繫于司命人受中以生萬物之性繫于司中論者謂人之性正則中過則厲司中以正言之泰厲以反言之其實一也七祀之神其五者託體乎地故以血祭祭之此二者託體乎天故以槱燎祀之各從其類也春秋緯云月離乎箕風必揚沙是風師箕也詩云月離于畢俾滂沱矣是雨師畢也崔氏曰祭司中司命風師雨師之法皆謂隨其類祭之所以然者謂星辰運行無方故兆日于東郊兆月于西郊象日月之生兆風師于西方不從箕星者箕星天位爾兆司命于南郊既無風雲取放故直以天神是陽兆于南郊兆雨師于北郊者水位在北也風師箕雨師畢司中司命文昌第四第五星或曰中能上能其牲則少牢故鄭注祭法云牲以少牢其祭之法先以牲體置于薪上而燔之以升煙于天以降神然後以玉禮神于坐玉則用璋邸射以祀之用半圭之璋取殺于四望以血祭祭社稷五祀五嶽愚案自此至百物祭地示也鄭康成曰隂祀自血起項氏曰血毛告幽全之物又曰血祭盛氣也則以地道有幽隂之義而求之以血也鄭鍔曰血之為物有象而非虛有形而非實物之幽蓋亦求之于虛實之間陸氏曰社祭五土之示稷祭五榖之神祭社必及稷以其全功均利以養人也祭必有配社配以勾龍共工氏子稷配以柱烈山氏子商之時又易柱以棄其功利足以侔社稷故也鄭節卿曰五祀見於周禮禮記雜出於史傳多矣左傳家語則以五祀為重該熙黎勾龍之五官陳止齊曰案春秋傳魏獻子問于蔡墨以為社稷五祀誰氏之五官對曰少皥氏四叔重為勾芒該為蓐收修及熙為𤣥冥此其三祀也顓頊氏子黎為祝融共工氏子勾龍為后土此二祀也后土為社稷為田正然則社稷五祀當為一句月令以五祀為門行户竈中霤白虎通范曄高堂隆以五祀為門井户竈中霤鄭氏釋大宗伯之五祀則用左氏家語之說釋小子之五祀則用月令之說釋王制五祀則用祭法之說門户人所資以出入中霤人所資以居竈井人所資以飲食鄭鍔曰中霤土也季夏祀之井水也冬祀之門金也秋祀之户木也春祀之竈火也夏祀之皆五行之小神在地者故其祭亦自血始或謂天子七祀此祭其五何也余以為司中泰厲以槱祀之矣王氏詳說曰此即王氏之說雖本於月令然乃宮中之小祀豈可與社稷五嶽同科左氏傳載魏獻子問於蔡墨以為社稷五祀誰氏之五官其說甚明鄭康成曰五嶽東岱宗南衡山西華山北恆山中嵩高山不見四瀆者或省文黃氏曰鄭謂四瀆五嶽之匹非四瀆川祭四望則四瀆在焉鄭鍔曰五山為國重鎮者國所賴以鎮則神皆託於土故此三者同於血祭黃氏曰春秋傳曰觸石而出膚寸而合不崇朝而雨遍天下者惟泰山乎其功用大故與社稷同其秩祭以貍沈祭山林川澤鄭鍔曰山林有功於貍藏川澤有功於涵容祭山林之牲則埋之祭川澤之牲則沈之各象其德張南軒曰古者祭山川以其能雲雨澤潤萬物為之壇壝立之祝史設之牲幣所以致吾禱祠之實而交孚乎隱顯之際誠之不可掩如此後世亦有山川之祠而人其形封其地則失之矣崔氏曰祭之法各當其時山林于壇川澤于坎故禮記云四坎壇祭四方牲用少牢王服𤣥冕牲玉各放其方之色樂則奏𬎼賓歌函鍾舞大夏以疈辜祭四方百物王昭禹曰疈者肆而磔之辜者制而磔之四方異體肆而不全故祭以疈百物異用制而不變故祭以辜亦各以其物宜崔氏曰蠟祭之法昔者伊耆氏始為蠟蠟索也周則十有二月合聚萬物而索享之祭先嗇一神農是也司嗇二后稷是也農三謂田畯郵表畷四表畷者田畯督約百姓于井間之處猫虎五坊六水庸七昆蟲八凡祭之禮以先嗇為主司嗇為佐猫為食田鼠虎為食田豕坊庸為止水等皆為田事其祭之法視四方豐耗而祭之不成之方缺而不祭故記云年不順成八蠟不通既蠟之後黃衣而臘先祖五祀于是勞農而休息之總論胡仁仲曰成身莫大於禮禮莫重於祭王者繼天為子故祭天於郊祭地於社祭名山大川五祀各於其方後世儒者論祭天地之禮於天則有昊天上帝有五方帝有感生帝夫土不可以有二王而天可以有七帝乎於地則或立方澤或立方丘員丘為母齊衰期不敢亢其父者尊無二上故也王者父事天母事地而可崇地以抗乎是故兆於南郊掃地而祭者昊天上帝而已天言其氣帝言其性社祭土所以神地道名山大川者寶貨財用之所出四方之所據依也五祀者土與水火金木人所日用不是之報將誰報焉行與門户舉失輕重豈禮也哉禮之所貴貴其義是故王者祭天以柴燎牲使氣上達語其精神則謂之禋語其感極則謂之類語其方兆則謂之郊指事異名其實一也以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王鄭鍔曰廟祭之序始者王以玉瓚酌鬱鬯獻尸是為祼獻既祼於是迎牲而殺乃行朝踐之事朝踐禮畢乃行饋獻之事則薦以今世之食以其序推之則肆饋獻也獻朝踐也祼始祼也謂之肆者詩曰或剝或亨或肆或將剝者解牲體肆者解而陳之俎也始而祼以求之中而薦腥則以神事焉終而薦熟則以人養焉此經乃以肆獻祼為序何耶余考鄭康成之說云於祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食著有黍稷互相備王安石以為羞其肆而酌獻焉則以祼享先王其祼也猶事生之有享羞其熟而饋食焉則以食享先王其食也猶事生之有食也然祫以合食為主未嘗無食禘以審禘昭穆為主未嘗不祼祼主於敬食主於愛二者亦互見祠春禴夏嘗秋蒸冬之享時祭之名也禮不豐不殺所以稱時有以少為貴者有以多為貴者春夏以搜苖而奉祭祀時物方生可獻者寡故春以詞為主夏以樂為主而已尚詞者為物不足以言詞道意也尚樂者陽氣浸盛樂由陽來也此所謂以少為貴也秋冬以獮狩而奉祭祀百物既登可獻者衆故秋以薦新為主冬以備物為主焉嘗者物初成始可嘗於是而薦新也蒸者物畢皆可蒸於是而備物也此以多為貴者也王昭禹曰至于蒸則衆物盡矣其備小物水草之葅陸産之醢在焉其備美物也三牲之俎八簋之實在焉其備陽物昆蟲之異在焉其備隂物也草木之實在焉天之所生地之所産茍可以薦者莫不咸在此其所以為盛與陳君舉曰祠禴嘗蒸此四時孟月王親祭于祖廟之禮肆獻祼饋食四時孟月吉皆用此二禮注謂為六個祭名不是陳及之曰爾雅曰禘大祭也蓋天子四時之祭曰祠禴嘗蒸而三年大祭曰禘其祖之所自出為東鄉之尊其餘皆合食於前皆為禘也喪服小記大傳所謂王者禘其祖之所自出以其祖配之祭法謂有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀殷人禘嚳而郊后稷皆謂三年大祭祭其祖之所自出諸侯亦四時有祭而三年之祭曰祫合食於祖廟而食大夫亦有時而祭而三年之祭曰殷春秋傳謂殷以少牢鄭氏所引魯禮則非魯不當有禘孔子謂魯之郊禘非禮也周公其衰矣又曰禘自既灌而往者吾不欲觀之矣蓋成王之賜伯禽之受皆非也孔子於春秋欲貶而不勝書故因事而貶若吉禘莊公禘于太廟用致夫人是已此大宗伯所謂肆獻祼及饋食者謂祭之禮有此四等也而必兩言之者明宗廟有祼鬯禮既灌而獻有薦腥禮既薦而肆有薦熟禮既肆而饋有饋食禮自禘及四時祭皆然總論王氏詳說曰天神之祀以煙為歆神之始地祗之祭以血為歆神之始人鬼之享以祼為歆神之始其實天神同於煙地示同於血人鬼同於祼且詩曰芃芃棫朴薪之槱之書曰柴望大告武成記曰燔柴於泰壇祭天也今以日月星辰為實柴司中司命風師雨師為槱燎然則祀昊天上帝非柴非燎何以為煙乎是禋祀云者取其歆神之始耳記曰郊血大享腥三獻爓一獻熟夫郊天也大享祫也三獻社稷也一獻羣小祀也用血者未始不熟用熟者未始無血此所以謂腥其俎熟其殽也今以社稷五祀五嶽為血祭則貍沈疈辜何以為非血乎是血祭云者取其歆神之始耳司尊彞曰春祠夏禴祼用雞彞鳥彞秋嘗冬蒸祼用斚彞黃彞今以肆獻言祼而饋食與四時之享何以為不用祼乎是肆獻祼者取其歆神之始耳以凶禮哀邦國之憂鄭康成曰哀謂救患分烖凶禮之别有五鄭鍔曰天子之於諸侯位雖君臣情則父子未有子疾病痛苦父不為之憂者故邦國有憂則有凶禮以哀之愚案盛衰消長天之道也聖人不患其凶患無其備故以是禮繼於吉禮之後以喪禮哀死亡鄭康成曰哀謂親者服焉疏者含襚鄭鍔曰隱公之時天王使宰咺來歸惠公仲子之賵文公之時王使榮叔歸含且賵是也以荒禮哀凶札鄭康成曰荒人物有害也曲禮曰嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂札讀為截謂疫癘以弔禮哀禍烖鄭康成曰禍烖謂遭水火宋大水魯莊公使人弔焉廏焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道易氏曰神所祟謂之禍天所毁謂之烖以禬禮哀圍敗易氏曰國之見圍謂之圍師之敗績謂之敗以禬禮哀之於是合財以補其乏若澶淵之㑹諸侯謀歸宋財是也賈氏曰大行人云致禬以補諸侯之災小行人云若國師役則犒禬之以恤禮哀寇亂鄭康成曰恤憂也鄰國相憂兵作於外為寇作於內為亂鄭鍔曰左傳言救邢之事曰簡書同恤禮有相救之道隱公亦云君命寡人同恤社稷之難則恤禮者問之勞之見天子憂恤之意王昭禹曰恤以救之若衛有狄人之難而齊桓救之王氏曰喪禮凶禮以彼喪荒哀之也弔禮禬禮以我弔禬恤哀之也以賓禮親邦國鄭康成曰親謂使之相親附賓禮之别有八黃氏曰賓禮皆王之所以禮答諸侯朝覲宗遇㑹同諸侯修王事王皆以禮見之也鄭鍔曰天子之於諸侯以分言之則君臣以情言之則賓主故先王不待以純臣之義而以賓禮親之我有以親之彼安得不吾親哉易氏曰臣道以尊天子為主賓道以親諸侯為主春見曰朝夏見曰宗秋見曰覲冬見曰遇鄭康成曰朝猶朝也欲其來之早易氏曰朝如日出如寅之朝而朝于天宗尊也欲其尊王易氏曰宗如萬物相見于南方而其類皆有所宗覲之言勤也欲其勤王之事易氏曰覲謂物成之時各覲其實以報乎上遇偶也欲其若不期偶至易氏曰謂閉藏之時其相見若邂逅之遇胡康侯曰古者有遇禮不期而㑹以明造次亦有共肅之心春秋書遇私為之約自比于不期而㑹者直欲簡其禮耳故凡書遇者皆惡其無人君相見之禮也鄭鍔曰朝宗則在朝時則用春夏其位則諸公東面諸侯西面說者以為萬物交際之時以象生氣之文人君則於堂下而見之所以通上下之情覲遇則在廟時則用秋冬其位則諸侯一於北面說者以為萬物分辨之時以象殺氣之質也人君則於堂上而見之所以正君臣之分記曰覲禮不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下蓋朝宗出迎賓則下堂覲禮不迎賓則不下堂也朝則天子當寧而立寧者門屏之間以象陽之出布散於外覲則天子當扆而立扆者户牖之間以象隂之入收藏於內此又朝覲之别也李嘉㑹曰當寧若今臨軒將以圖事諏政當扆退立於扆以受諸侯之獻功陳及之曰大宗伯曰春見曰朝至冬見曰遇大行人曰春朝諸侯而圖天下之事秋覲以比邦國之功夏宗而陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政又曰侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見司馬曰春以禮朝諸侯圖同事夏以禮宗諸侯陳同謨秋以禮覲諸侯比同功冬以禮遇諸侯協同慮時以禮㑹諸侯發同禁殷以禮同諸侯施同政鄭康成以六服之內以時分來或朝春或宗夏或覲秋或遇冬賈公彥從而廣之曰春則東方盡來夏則南方盡來秋則西方盡來冬則北方盡來以余論之皆未允以為春則東方諸侯盡來耶則比功之禮未嘗施之矣以為夏則南方諸侯盡來耶則協慮之禮未嘗施之矣若圖事專以待東方諸侯比功專以待西方諸侯陳謨專以待南協慮專以待北則王政豈無偏黨之患哉案周官云六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽又案王制諸侯於天子比年一小聘三年一大聘五年一朝然則四方諸侯六年惟一朝耳若然以春來則曰朝以夏來則曰宗以秋來則曰覲以冬來則曰遇耳猶漢律春曰朝秋曰請吳王濞春不朝使人為秋請是也又尚書康王初即位太保率東方諸侯入應門右畢公率西方諸侯入應門左則是康王初即位四方諸侯以朝適皆在京師又安有春則東方來夏則南方來秋則西方來冬則北方來耶其所謂圖天下之事等語作禮者之詞而司馬又承之也而其有可疑者大行人謂六服諸侯朝有疏數之節六年而畢近世蘇東坡說書亦以一朝為畢朝未約其實也當從識者論之愚案古人封建諸侯有人民有社稷焉若以春則東方諸侯皆來夏則南方諸侯皆來卒不幸有乘間而起如昆夷玁狁之難孰從而折衝禦侮之空其一方同時畢集斷無此理茍縱其自便不朝京師萬一有專擅難制之事如唐之藩鎮又何以為制馭諸侯之權要知王者欲親諸侯必設為可親之禮或不能朝於春則可以宗於夏或不能覲於秋則可以遇於冬但六年之內不可不一次來王不然巢本南方國巢伯來朝何以曰朝不曰宗韓本北國韓侯入覲何以曰覲不曰遇要知古人立為朝覲宗遇之禮於春夏秋冬之間以見四時皆來王之日而禮非有所輕重於其間時見曰㑹殷見曰同鄭康成曰時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而㑹是也鄭鍔曰以有事而㑹則時見者國有事之時而來見其㑹之有時故謂之㑹鄭康成曰殷猶衆也十二嵗王如不巡狩則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉如王巡狩殷見四方四方分來終嵗則遍鄭鍔曰易有殷薦禮有殷奠則殷為盛多之義殷見者合衆多之國而來見其來必同故謂之同也黃氏曰殷有三義衆也正也盛也殷見殷類義皆當為正協時月正日同律度量衡考禮修德正刑故謂之殷同王氏詳說曰時㑹則事出非常故無常時殷同則有常時亦如常朝之嵗但㑹同之禮因朝覲之時行之故又曰大朝覲時聘曰問殷眺曰視王昭禹曰時聘殷眺王人之所以賓於諸侯時聘施於時見之後以恩問之故時聘曰問黃氏曰時聘存眺省也各以其時行之猶時㑹時巡五嵗而遍殷眺施於殷見之後以事有所察治故殷眺曰視鄭鍔曰聘以財為禮其名曰問有問遺之意眺以見為禮其名曰眺有省視之意考行人言時聘以結諸侯之好殷眺以除邦國之慝此乃王見諸侯之文槩以為諸侯聘眺乎天子則與行人之文不合槩以為王者之禮則又與大宗伯諸侯見王之文不合合二官考之蓋聘眺之禮王與諸侯交用之何以言之時聘曰問殷眺曰視繼於春見曰朝夏見曰宗之下則曰問曰視者為諸侯問視乎王之禮也若以行人結好除慝之文例之則又是王者聘以結諸侯之好眺以除邦國之慝也人徒見古者比年小聘三年大聘小聘使大夫大聘使卿皆臣聘乎君遂謂君無聘乎臣之理殊不知小行人有曰王之所以撫邦國諸侯者嵗遍存三嵗遍眺五嵗遍省則王有眺禮於諸侯明矣其所以異者諸侯行之則曰問視天子行之則曰除慝結好天子之眺見於小行人三嵗之制若夫聘禮則無傳春秋之時王臣來聘于魯者八亦可以為證周禮訂義卷二十九
