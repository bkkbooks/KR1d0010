body:
  text: 周禮訂義卷三宋王與之撰以九兩繫音計邦國之民鄭康成曰兩猶耦也所以協耦萬民繫連綴也賈氏曰謂王者於邦國之中立法使諸侯與民相合耦而聨綴不使解散也愚案民心無常難合易睽非平時眷戀不忍去必非一人名位可得而留惟大牧以地長以貴主以利吏以治藪以富足以係民之身師以賢儒以道足以係民之心宗以族使知天屬之親不可離友以任使知人道之交不可間然後相安相養相親相遜雖有變故之死靡他後世九兩既廢人心亦離匹夫匹婦不獲所求而樂國樂郊之思發於中而形於言者上之人果何道而聯屬其心耶曾子所謂上失其道民散久矣者此之謂也一曰牧以地得民鄭康成曰牧州長也九州各有封域以居民也賈氏曰即王制二百一十國以為州州有伯伯即州長也陳君舉曰古者牧伯更代諸侯世襲如周初荆州之牧則蔡仲其後則申伯豫州之牧則管叔其後則虢公而周公君陳則迭居東郊也漢諸侯王自景武以後若寄居然至唐藩鎮則舉五侯九伯汝實征之之事而付之世襲其弊始不勝矣二曰長音掌以貴得民鄭康成曰長諸侯也一邦之貴民所仰也愚案王制云五國以為屬屬有長八州三百六十長自唐虞以來諸侯亦有以長名者鄭氏之説亦未可非也王昭禹曰下文曰施則于都鄙則曰建其長是也所謂內諸侯也三曰師以賢得民鄭康成曰師諸侯師氏有德行以教民者黃氏曰師掌教之官卿大夫師氏保氏也吕氏曰師言賢而不言道身即道也莫重於儒莫尊於道至於師而二名皆不至焉師之任易乎哉四曰儒以道得民鄭康成曰儒諸侯保氏有六藝以教民者黃氏曰儒學士也通乎其下傳道授業者愚案師則德成行尊足以表率斯世故得民以賢儒則發明此道以教詔斯世故得民以道五曰宗以族得民李氏曰大宗者其先祖之負荷族人之紀綱乎大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼高祖者五世則遷者也别子謂公子若始來及其在此國者後世以為祖也别子之適子適孫世世繼别子為大宗百世不遷之族人五世外者皆為之齊衰三月母妻亦然故大宗有族食族燕之禮所以收族也夫五服者人道之大治也然而上盡於高祖則逺者忘之矣旁盡於三從則疏者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎重宗者尊祖之義也薛氏曰百夫無長不散則亂一族無宗不離則疏先王因族以立宗敬宗以尊祖故吉凶有以相及有無得以相通尊卑有分而不亂親疏有别而不二貴賤有等而不間然後一宗如出一族一族如出一家一家如出一人此所以得乎民也鄭鍔曰大宗則收族故族於喪則必服而冠娶妻者必告其所收者廣雖無服之親亦係屬而不散故以族可以得民吕氏曰古者建國立宗其事相須春秋之末晉執蠻子以卑楚楚司馬制邑立宗焉以誘其遺民而盡俘以歸當典刑廢壞垂盡之時暫為詐偽之計猶必立宗前此可知左傳翼九宗五正逆晉侯欲理會封建其次便當立巨室蓋巨室大宗係國家輕重更相維持以固結人心如晉九宗五正不獨是制度武王分殷之餘民懷姓九宗於晉至春秋見故家猶在孟子曰為政不難不得罪於巨室蓋有千乘之國有百乘之家所以互相維持相視如一體六曰主以利得民王昭禹曰有國者謂之君有家者謂之主然則主者大夫之治都鄙而不為長者是也鄭鍔曰左氏載荀偃卒宣子撫之曰事吳敢不如事主杜氏曰大夫稱主是也鄭康成曰利讀如上思利民之利謂以政教利之賈氏曰上思利民左傳季良之辭此謂大夫宣君政教民則采邑之民也七曰吏以治得民鄭康成曰小吏在鄉邑者賈氏曰若比長閭胥或在鄉或在公邑采邑以治政得民也王氏曰凡治民皆謂之吏八曰友以任得民鄭康成曰友謂同井相合耦鋤作者孟子鄉田同井出入相友守望相助疾病相扶持則百姓親睦王昭禹曰學校之友相任以道則以道而相得鄉田之友相任以事則以事而相得故曰以任得民九曰藪音叟以富得民鄭康成曰藪亦有虞掌其政令為之厲禁使其地之民守其財物以時入于王府頒其餘于萬民富謂藪中材物王昭禹曰揚有具區荆有雲夢豫有圃田青有望諸兖有大野雍有弦蒲幽有貕養冀有楊紆并有昭餘祁凡皆藪之大者先王之制於大澤大藪則立中士四人下士八人以掌之於中澤中藪則立下士六人以掌之於小澤小藪則立下士三人以掌之藪之所在掌之既有其人又有厲以限其妄入有禁以止其非法則其間所生之物充牣繁庶而民取之足以為富故曰以富得民王氏曰川澤之虞山林之衡皆富得民而獨言藪則舉小以見大正月之吉始和布治于邦國都鄙鄭康成曰正月周之正月吉謂朔日劉執中曰正月之吉陽生隂復其氣始和歲事將興而春令行矣故因其始和而布治焉賈氏曰自此以下皆謂施前事條也愚案治邦國都鄙官府之法固自一定不可易者然時移事改豈能無少變處故每歲終必修焉月令季冬有曰是月也天子乃與公卿共飭國典論時令以待來嵗之宜修之於歲終而後布之於正月王氏詳説曰典法則之所施言邦國都鄙官府而治之所布不言官府者蓋布治者官府之事也施法于官府而有所建立者非官府之事也乃縣音玄治象之法于象魏使萬民觀治象挾日而斂之鄭康成曰大宰以正月朔日布王治之事於天下至正歲又書而縣于象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而往皆所以重治法新王事也賈氏曰鄭知乃縣為建寅月者以小宰所以佐大宰彼云正歲縣之與此一事也鄭司農曰象魏闕也故魯災季桓子御公立于象魏之外命藏象魏曰舊章不可忘賈氏曰周公謂之象魏雉門之外兩觀闕髙巍巍然孔子謂之觀春秋定二年雉門及兩觀災是也云觀者以其有教象可觀望又謂之闕鄭司農曰從甲至甲謂之挾日凡十日王昭禹曰必至於挾日者蓋近或知之矣逺者庸有未知焉觀之挾日則使逺近皆遍知故也乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔王氏曰既以治象示人於是乃以所建典法則施於邦國都鄙官府也鄭康成曰以侯伯有功德者加命作州長謂之牧所謂八命作牧者愚案牧説見前九兩一曰下監謂公侯伯子男各監一國王氏詳説曰王制曰天子使大夫監於方伯之國國三人則是大夫謂之監也梓材曰王啓監厥亂為民則是諸侯謂之監也蓋商人之制八州八伯使大夫監之雖武王之初亦因商制所以三監監武庚是也成周之制九州九牧牧下有伯所謂五侯九伯是也九州九牧每牧之下有二伯則十八伯矣二伯分掌九州之牧伯則是有四牧之半為九伯也蓋五侯者舉全數也周既以伯佐牧矣則不復大夫監之也皆立其監者謂諸侯之自監其一國耳參謂卿三人賈氏曰左氏傳杜泄云吾子為司徒夫子為司馬孟氏為司空則諸侯三卿司徒司馬司空禮記檀弓疏曰諸侯三卿司徒兼冢宰司馬兼宗伯司空兼司冦愚案先王命諸侯以國凡官屬皆自辟置然後亦不敢自專故大國三卿二卿命於天子如齊有天子之二守國髙是也必自天子命之者非使之伺察諸侯示以不敢専之意耳自秦人置監郡魏晉以下有典籖専以宰制諸侯為事五代時不置監郡殊失古人之意伍謂大夫五人賈氏曰謂司徒下二大夫一為司徒大夫一為大宰大夫司空下二大夫一主司空事一為司冦大夫司馬事省闕一大夫故五人禮記檀弓疏曰三卿之下有五少卿為大夫司徒之下立小宰小司徒司馬之下事省立小司馬兼宗伯事司空之下立小司冦小司空殷衆也謂衆士王制諸侯上士二十七人其中士下士各居其上之三分輔謂府史庶人在官者鄭鍔曰牧長正皆以建言之如建國建極之建不可得而動搖之意史氏曰建者必有册命告于祖廟監兩二皆以立言之如有所立不可得而傾仆之意參伍考皆謂之設如方設居方之設布而置之之意獨邦國之伍以傅言之蓋大國既設三卿矣五大夫則又附於三卿之下使有所依傅之意賈氏曰傅者謂大夫上有卿下有士受上政傅於下受下政傅於上也殷曰陳謂其衆也史氏曰陳者設張之輔曰置謂賤也史氏曰置者録存之爵有尊卑辭有輕重以别之耳乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔鄭康成曰長謂公卿大夫王子弟食采邑者賈氏曰典命三公八命卿六命大夫四命大宗伯云六命賜官注云王六命之卿賜官者使得自置其官治家邑如諸侯則此之長惟據公卿巳上大夫四命不合立官鄭并言大夫者是廣解長義其實大夫不合有兩卿五大夫當與諸侯之卿同官事當相兼也王子弟食邑其親者與三公同在五百里疆地各百里其次疏者與六卿同在四百里縣地各五十里已上二者得立兩卿五大夫其次更疏者與大夫同在三百里稍地各二十五里不得立兩卿五大夫亦職相兼也兩謂兩卿也不言三卿者不足於諸侯賈氏曰畿外諸侯南面而尊故得伸而言立三卿天子公卿雖尊以在天子之下故屈而立兩卿也乃施法于官府而建其正立其二設其考陳其殷置其輔鄭康成曰正謂冢宰司徒宗伯司馬司寇司空也王氏曰正官長也謂之正則以官屬所取正故也二謂小宰小司徒小宗伯小司馬小司寇小司空也王氏曰二者所以副二於六官而專逹其事之次者考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考王氏曰考則考殷輔之治者也總論王昭禹曰先王之治於邦國之諸侯以其逺於王而有君之道故其官致詳而少損於王朝於都鄙之主以其近於王而有純臣之道故其官致略而少損於邦國官府者六官分職以治事者也是皆王朝之官散而各居其府者也故又略於都鄙其尊卑隆殺不同而官之名亦因以異矣凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賔客之治賈氏曰皆言以者當别有篇卷使人執持施行之鄭康成曰成八成也賈氏曰上文官成在八法治官府中今特出之者以其八成本待萬民在官府者欲見官府執行禮記云誰能秉國成禮賔禮也王氏詳説曰官成雖用之於官府然八成所謂政役師田閭里稱責等事無非民事也禮賔雖用之於萬民然大小行人司儀掌客所掌無非國家之賔客也愚案大臣之職惟講求典法則之所由出其條目付之有司者治來則應之而已故邦國都鄙宫府萬民之治皆下一待字祀五帝則掌百官之誓戒與其具修王氏曰五帝五精之君昊天之佐也愚案注疏説五帝之名甚誕已於小宗伯辨之劉迎曰誓戒者誓其所當戒者也如所謂前期十日帥執事而卜日遂戒戒百官以所當奉祭之事恐其不敬也王昭禹曰誓者誓以言而使信戒者敬其事而使謹鄭康成曰誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之略也劉迎曰具修者特具之禮所當修使無闕事也如所謂視滌濯贊牲事贊玉幣爵之事皆百官所當修具王昭禹曰具則所當集者也修有所加損者也具之所以致其物修之所以致其治鄭鍔曰欲奉祀之人致誠而勿慢必有戒誓焉欲奉祀之物應禮而不闕必有具修焉前期十日帥執事而卜日遂戒鄭康成曰前所諏之日也王氏曰記云七日戒三日齋又曰散齋七日以定之致齋三日以齊之齊之之謂齊定之之謂戒散齋七日致齋三日凡十日也鄭康成曰執事宗伯大卜之屬既卜又戒百官以始齋王昭禹曰祭祀之禮致其誠而已先王之至誠幽有以逹乎鬼神用卜者所以達鬼神之意也古者卜上辛不吉則卜中辛中辛不吉則卜下辛下辛不吉則不卜可也魯四卜郊此春秋所以譏之也卜日既定遂戒戒者所以敕其事而使之不敢怠忽也及執事視音視滌直歷反濯直角反賈氏曰及至也儀禮特牲云前祭日之夕視壺濯及豆籩王昭禹曰執事之别有二凡預祭祀之人謂之執事向祭之辰執事之節亦謂之執事此謂執事蓋及執事之節也鄭康成曰滌濯謂溉祭器及甑甗之屬及納亨普庚反贊王牲事鄭康成曰納亨納牲將告殺謂向祭之晨既殺以授亨人賈氏曰禮器云納牲詔于庭殺訖毛以告純血以告殺腥其俎豚解以腥之以此訖乃納與亨人爓祭此言納亨者以牽牲也明堂位君肉袒迎牲于門卿大夫贊君贊王牲事者即卿大夫贊幣一人也及祀之日贊玉幣爵之事鄭康成曰日旦明也玉幣所以禮神玉與幣各如其方之色賈氏曰大宗伯以玉作六器以禮天地四方青圭禮東方赤璋禮南方白琥禮西方玄璜禮北方又曰皆有牲幣各放其器之色彼牲幣不是禮神之幣亦云各放其器之色是其禮神幣與玉亦各如其方之色爵所以獻齊酒賈氏曰冪人疏布冪八尊八尊者五齊三酒之尊也不用玉爵尚質也三者執以從王至而授之賈氏曰謂至此祀圜丘方澤祭所而授之王親自執玉幣奠於神座親酌以獻尸也總論王氏詳説曰考之大宗伯非惟文之先後與此不同而其事之輕重亦不同大宗伯曰祀大神享大鬼祭大示帥執事而卜日此則曰祀五帝而繼之以卜日豈非五帝之祀為重乎大宗伯曰宿視滌濯此則曰視滌濯蓋滌濯之事宗伯先期而視之大宰至期而視之豈非以滌濯之事為微乎大宗伯曰省牲鑊此則曰納亨贊王牲事者蓋君肉袒迎牲于門卿大夫贊君是贊其殺牲之事也宗伯則省其鑊而已豈非以贊牲之事為大乎大宗伯曰涖玉鬯此則曰贊玉幣爵是贊爵而不贊鬯也蓋玉鬯用之於宗廟此則曰祀五帝則是祭天無祼也豈不以贊爵之重於涖鬯乎大宗伯曰奉玉齍此則止於贊牲是贊牲而不贊齍也蓋祭祀以牲為大而齍盛次之故小宗伯之職以毛六牲使五官共奉之辨六齍使六宫之人共則牲之大於齍也明矣大宰雖不預於奉牲而特預於贊牲豈不以贊牲之重於奉齍乎大宗伯曰祀大神享大鬼祭大示此則曰祀大神示亦如之享先王亦如之蓋宗伯禮官也掌建天神地示人鬼之禮故正而名之大宰特嚴重其事而已初無預於正名之事豈非以大宰之職為尊祀大神示音祗亦如之享許兩反先王亦如之贊玉几玉爵鄭康成曰大神示天地也賈氏曰謂冬至祭天於圜丘夏至祭地於方澤王昭禹曰凡在天者五帝星辰皆神也故昊天為大神凡在地者社稷山川皆示也故澤中之所祭為大示賈氏曰亦如之者自百官誓戒巳下至贊幣皆如祀五帝之禮劉氏曰享先王謂宗廟六享也鄭康成曰玉几所以依神天子左右玉几宗廟獻用玉爵賈氏曰别言贊玉几玉爵則天地不用玉几玉爵也大朝直遙反下文同覲會同贊玉幣玉獻玉几玉爵鄭康成曰時見曰會殷見曰同大會同或於春朝或於秋覲舉春秋則冬夏可知助王受此四者玉幣諸侯享幣也其合亦如小行人所合六幣云史氏曰束帛加璧玉幣也玉獻獻國珍異亦執玉以致之史氏曰來獻其琛玉獻也玉几王所依也立而設几優尊者賈氏曰知立而設几者司几筵云大饗射凡封國命諸侯王位設黼依依前南向左右玉几是立設几也玉爵王禮諸侯之酢爵賈氏曰大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢此大宗伯攝祼非冢宰所贊諸侯酢王用玉爵則冢宰贊王受之王朝諸侯立依前南面其禮之於阼階上愚案朝覲會同贊導威儀其大者宗伯之事其細者司儀行人之職冢宰與君同體鎮撫諸侯乃其道也而下與交際之禮曰大朝覲會同非周家細事所謂坐明堂以朝諸侯昔者武王克商所未舉也成王新立周公攝政則一切舉行之不特五等諸侯咸在八蠻五戎六狄九貉環列而會所以制禮作樂頒度量而天下大服也此一代希濶之典故大宰於此不得視為微文末節進而贊之所以成天下之大禮章一王之盛事大喪贊贈玉含户暗反玉鄭康成曰助王為之也贈玉既窆所以送先王含玉死者口實天子以玉雜記曰含者執璧將命曰寡君使某含則諸侯含以璧鄭司農曰含玉璧琮王昭禹曰含禮行於始死之時贈禮行於既窆之後王氏曰贈玉含玉大喪之大事贈在含後而先言贈者贈比含尤送終之大者以其禮事之大故亦大宰贊之作大事則戒于百官贊王命賈氏曰前已言祀五帝及大神祗祭事戒百官訖此云作大事惟戎事耳鄭引春秋傳云國之大事在祀與戎證此大事是戎事愚案國家之舉事凡其大者不可不戒飭百官故戒百官則有命命即訓戒之言也大宰贊助王者之出教令若書之多士多方所以誥多士庶邦皆言王若曰是也王視治朝則贊聽治視四方之聽朝亦如之鄭康成曰治朝在路門外羣臣治事之朝王視之則助王平斷愚案聽朝庫門之外臯門之內乃朝士所掌之朝王之所以朝諸侯斷疑獄者在是比治朝則為外鄭以朝于方嶽之下非是詳見司士凡邦之小治則冢宰聽之待四方之賔客之小治鄭康成曰大事決於王小事冢宰專平薛氏曰説者謂治之小者八法之治官府八則之治都鄙之類則大宰専而不以佐王然以八法八則論之則官府都鄙之權盡總乎大宰非小事也以此為小事則何者為大事乎小宰所謂大事則從其長果以何者為大事乎此所謂小治即王視治朝聽朝之小治前言王視治朝則贊聽治視四方之聽朝亦如之蓋王者坐廟堂有斧扆以朝諸侯其權甚重其事甚大大宰不敢與其政特贊其聽治而已至朝諸侯之時資糧之費饔飱幣帛之奉以至出入往來之具皆小治也豈可無以應之故王者視朝於路門之內冢宰有以聽邦之小治王者視四方之朝冢宰為之待四方賔客之小治先儒以此為兩事失之賈氏曰重出冢宰之名據百官總焉故特云冢宰歲終則令百官府各正其治受其會鄭康成曰正正處也賈氏曰謂正處其所治文書王昭禹曰為將受其會故各使之先自正其治也會大計也王昭禹曰受其一歲功事財用之計聽其致事而詔王廢置王昭禹曰受其一歲功事財用之計聽其所致以告于上之事則其吏之治行可知矣於是乎詔王廢置然此非特為廢置也歲終平在朔易之時亦欲以知所當調制以待正月之吉布施之也三歲則大計羣吏之治而誅賞之鄭司農曰三載考績鄭康成曰事久而聽之大無功不徒廢必罪之大有功不徒置必賞之易氏曰嵗終之考核方嚴則行之以天子之命三歲之考核既審則守之以一定之法司會曰以周知四國之治而詔王及冢宰廢置則廢置之詔王可知也宰夫曰凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之則誅賞之責於大宰可知也王昭禹曰不言詔王者歲終廢置尚以詔王其誅賞可知矣總論會計吕氏曰成周時冢宰既受百官之會聽其致事而詔王廢置三歲大計羣吏之治而誅賞之矣而司徒又自考其屬正要會而致事司寇又命於其屬入會政致事下至宫正會其行事而自考其職之所統內宰稽其功事而自考其職之所統雖醫事之微醫師亦於歲終稽其醫事此各考於其屬上下遞察而冢宰實提其大綱至於會計之煩又専設一司會以考察之司會曰以逆羣吏之治而聽其會計以參互考日成以月要考月成以歲會考歲成以周知四國之治以詔王及冢宰廢置此可見成周之時各考於一職之長而後考於一官之長考於一官之長始盡考於司會而後逹於冢宰歟故各考其屬於下則寡而難欺提其綱於上則簡而易見而又俱考於司會則精詳而遍察可以防其隱蔽矣孫氏曰周之會計惟司徒司寇先會其屬而其餘悉惟大宰是聼以大宰之尊而親會計之煩何也大宰以八柄詔王馭羣臣凡廢置誅賞必於會計得之詢事考言皆有紀載之實課功計效不參以毁譽之私然後足以勸羣工熙庶績也宗伯司馬又不自會其屬何也宗伯掌禮而禮費歸於計財之官司馬掌政而兵賦屬於長民之吏不若刑官獄訟之事教官土地人民之事煩且冗也王昭禹曰舜三載考績三考黜陟幽明周官之法則歲終廢置三歲誅賞之何也蓋先王之治因時而已堯舜之時其法略其事簡故至於三載考績九載然後黜陟幽明當周之時其法詳其事繁故歲終則廢置三歲則誅賞孫氏曰昔者平水土教播種開山澤必皆遲之歲月而後有立更厯三代則功成治定玩愒從生在有虞不得不寬而成周不容不密也總論大宰孫氏曰論道經邦燮理隂陽然後為一相之任今大宰不過從事文書法令之間無以别於五官奚取一相哉蓋古之論道經邦者未嘗離事物而尚清談文書法令莫非道也故大宰事任之重體貌之尊特加冢宰以别之小治得専聽歲會得専受官刑得専決治令得専出好賜之給於內府者有司可得而共廢置之參乎八柄者有司可得而詔邦國待之均平生齒賴以經制成周委重一相於斯可見周禮訂義卷三
