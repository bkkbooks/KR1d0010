body:
  text: 周禮訂義卷五十三宋王與之撰司甲下大夫二人中士八人府四人史八人胥八人徒八十人司兵中士四人府二人史四人胥二人徒二十人鄭鍔曰天生五材民並用之闕一不可誰能去兵此兵甲弓矢戈盾之類為之有工而司之有官掌五兵五盾各辨其物與其等以待軍事王昭禹曰五盾則授兵舞者之盾貳車之盾乗車之盾旅賁虎士之盾藩盾凡五李嘉㑹曰兵有五宜也盾亦有五者先王害人之意少而自衛之意多故有五兵必有五盾鄭鍔曰物色也各辨其物色使以類相從等者所制之長短小大鄭康成曰等謂功沽上下各辨其等使與人相宜也辨之有素以待有軍事則頒之及授兵從司馬之灋以頒之及其受兵輸亦如之及其用兵亦如之鄭鍔曰司兵授之以兵則從司馬之法多乎其數則闕國之守備寡乎其數則乏軍之用器軍之行也從其法而頒之劉執中曰一旅之衆車徒異授也兵盾異能也弓殳異職也則司馬之法存焉及其還也受其所輸亦當如始者所頒之法茍有亡矢遺鏃之事亦如之矣康成謂用兵者出給守衛之兵上言頒兵從司馬法此又言用兵則知非軍旅所用明矣守衞之人亦司馬之所統治故亦從其法而頒之陳及之曰周制甸出革車一乗凡兵甲盾戈旗物鼓鐸悉備焉在農則四時田獵合其卒伍治其徒役簡其兵器與夫旗物鼓鐸一一治之其調發則各以其具行而官府不與知然司兵所頒者頒諸卿大夫士從軍旅㑹同者也是以司兵者曰及其受兵輸亦如之是諸官府既畢事則又歸之若民兵自藏之民間耳吕東萊曰古者藏兵於廟大夫家不藏甲必取於廟而後授之兵者國之重事出必告於廟歸亦必飲至以見其不敢輕舉之意如用命賞于祖不用命戮于社亦此意鄭莊公將伐許授兵於大宫魯莊公治兵于廟楚武王授師孑之類此見春秋初其制猶存祭祀授舞者兵鄭康成曰授以朱干玉戚之屬賈氏曰祭統云朱干玉戚以舞大武李嘉㑹曰不令樂官舞師等掌之而掌於司兵者兵器不可妄委之他人也大䘮廞五兵鄭康成曰廞興也興作明器之役器五兵也軍事建車之五兵㑹同亦如之鄭鍔曰軍旅之車上必建五兵出先刄入後刄也㑹同王乗車則亦建焉皆以示威也易氏曰如考工之六等與夫廬人之六建莫不建之以備軍旅㑹同之用司戈盾下士二人府一人史二人徒四人黃氏曰司兵掌五兵五盾戈盾用稍多故别設官其實司兵之支屬掌戈盾之物而頒之鄭鍔曰五兵之便於用者戈而已戈柲六尺有六寸其便用者柲短而易持其胡其援廣而易入可以摏可以刺可以擊可以殺觀左𫝊所載冨父終甥以戈摏僑如之喉狼以戈斬秦囚子南以戈擊子晳長魚矯以戈殺駒伯則戈之便於用可知凡戰伐戡戮之字皆從戈謂此也盾干也用以自衛也如書云敿乃干詩云龍盾之合蒙伐有苑伐中干也又云干戈戚揚五兵之用長以衞短則人持其一矣盾則夫人有之書云比爾于干欲其比則夫人有之可知矣司兵掌五盾又有司戈盾之官者盖司兵掌辨之司戈盾正掌其物而頒之劉執中曰物者時其脩全俾適於用然後頒之易氏曰頒之以給祭祀軍旅㑹同之用黃氏曰凡戈盾頒之授之輸之皆有司馬之法其文不備因司馬為可知祭祀授旅賁殳故士戈盾授舞者兵亦如之鄭康成曰亦頒之也鄭鍔曰殳長尋有四尺如杖而無刄詩云伯也執殳為王前驅又云彼候人兮何戈與祋祋即殳也王昭禹曰旅賁氏執戈盾夾王車而趨此言祭祀授旅賁殳者盖執戈盾而趨者謂軍旅㑹同之時也若祭祀則執殳而已鄭康成曰故士王族故士與旅賁當事則衛王鄭鍔曰祭祀之時王親出郊故嚴其守衛之備旅賁當執殳王族故士當執戈盾隨其所當執而授之以物也黃氏曰旅賁職執戈盾夾王車而趨至此執殳故士不執兵至此執戈盾皆非其常必有司馬之法故曰云云舞者不曰戈盾而曰兵當是五盾皆有五兵制亡雖先儒亦不能言鄭鍔曰舞者執戈盾未嘗執殳所謂亦如之者亦如授故士以戈盾也軍旅㑹同授貳車戈盾建乗車之戈盾授旅賁及虎士戈盾鄭康成曰乗車王所乗車也軍旅則革路㑹同則金路鄭鍔曰貳車言授則授之於其人貳車所以衛王故必人自執之黃氏曰象路之副曰貳車革路之副曰倅車覲禮貳車十二乗故授戈盾倅車無數故平頒乗車所以為節故特建之於車較及輿也劉執中曰旅賁夾王車左右而虎士趨王車後先舍則守王閑則殳與戈盾戒備之尤急者也非其有屏蔽之用乎黃氏曰虎賁在國不執兵於此執戈盾及舍設藩盾行則斂之鄭康成曰舍止也藩盾盾可以藩衛者如今之扶蘇與鄭鍔曰王之所舍設梐枑再重以為藩又於梐枑之外設藩盾欲以為衛故行則斂而藏之易氏曰皆所以衛至尊尚崇嚴也鄭氏鍔曰言授言建言設皆不同知五盾各異用故也司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人李嘉㑹曰司弓矢用大夫而為弁師下士之屬先王重其所職不以爵之尊卑為間鄭康成曰司弓矢弓弩矢箙官之長易氏曰五兵之用逺則弓矢射之近則矛者勾之然後殳者擊之戈㦸刺之此司兵掌五兵司戈盾之掌戈盾司弓矢之掌六弓四弩八矢相為先後者也鄭鍔曰弧矢之利以威天下則弓矢之制其來尚矣後世有事則用之於戰無事則用之以行禮所以擇士者在是觀徳者亦在是故設官以掌之為弓矢之制見於考工記者詳矣其法實掌於此掌六弓四弩八矢之灋辨其名物而掌其守于又反藏才浪反與其出入鄭康成曰法曲直長短之數鄭鍔曰曰王曰弧曰夾曰庾曰唐曰大辨其名也彤弓赤盧弓黑天子之弓彤與玈質其物也王昭禹曰守之則有人藏之則有府出則頒之入則受之司弓矢於其名物則辨之於其守藏出入則掌之鄭鍔曰掌其出入守藏盖兼總而周知之也中音仲下同春獻弓弩中秋獻矢箙音服鄭鍔曰弓必有韞矢必有箙箙之長短視矢而為之籠用竹而箙用皮詩曰象弭魚服陸璣云東海魚獸宜為弓鞬服鄭康成曰箙盛矢器也以獸皮為之書曰垂之竹矢考工記曰妢胡之笴家語曰南山之竹羽而鏃之王昭禹曰中春則陽氣方和之時中秋則陰氣將堅之時薛氏曰鄭氏謂弓弩成於和矢箙成於堅夫弓弩矢箙其用一也烏有弓弩取其和而不取其堅矢箙取其堅而不取其和弓人為弓曰冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流冰析灂則審環春被弦則一年之事鄭氏謂朞嵗乃可用是弓弩之制必以春而成何獨於此而言其和槀人曰春獻素秋獻成鄭氏亦謂矢箙春作秋成是矢箙之制必以秋而成何獨於此而言其堅李嘉㑹曰易氏以此言獻而不言成盖獻槀人之所已成不知夏秋冬造之至春始被之弦乃可獻也及其頒之王弓弧弓以授射食亦反下以意求之甲革椹張林反質者夾古洽反弓庾弓以授射豻音岸侯鳥獸者唐弓大弓以授學射者使所史反者勞者鄭鍔曰弓有强弱事有難易而射有逺近頒與人射宜各因事而量其所當用則人與弓相得射可以必中何則弓有王有弧有夾有庾有唐有大六者不同有射甲革椹質者有射豻侯鳥獸者有學射者使者勞者事既分難易則所射有逺近詎可以茍頒乎攷之攷工記謂往體寡來體多者曰王弓弧弓其弓往體寡則反而曲來體多則正而長名曰王其為天子之所用也名曰弧其法天之弧星也其弓至强以射堅可也故頒之以授射甲革椹質者甲革説者謂即革車也然左𫝊曰楚潘尫之黨與養由基蹲甲而射之徹七札焉禮記曰貫革之射息康成於此注謂為革甲又於弓人注曰革謂干盾國語亦有三革之制則甲革者甲與革也質正也植椹以為射正荀子曰質的張而弓矢至焉圉師云射則充椹質甲革椹質堅而難入必用强弓以射之然此下文澤共射椹質之弓矢非射於澤宫不用椹質矣澤宫者將祭而擇士先習射於此也試弓習武宜用至强之弓而射至堅之物往體多來體寡曰夾庾庾字師儒相傳讀為庚攷工記作庾説者謂夾則能衛人恃之而後保庾則能濟人待之而後藏王安石云謂之夾以其射至弱必夾而輔之然後可用謂之庾如露積之庾須臾而為廪非可以為久也此皆取庾廪之義似失之鑿然師儒相傳為夾庚者豈非以其弱必夾而後用以其不可久必庚易而用歟庚有庚易之義如干日之庚庚有變意易所謂先庚後庚是也夾庾往體多則弓反而直來體少則弓正而短合五而成規者也豻侯士所射之侯所謂干五十者是也豻侯五十步可謂近矣射鳥獸亦近而後得故止用弱弓而已往體來體若一曰唐大强弱適中之弓合七而成規也惟强弱適中故學射者用之初學用中而後習强弱皆可也使者奉君命而行有或逺或近之差勞者從國事而有功有或難或易之效故授之以此取其中也以彫弓彤弓盧弓推之則王弧者彫弓也唐大者彤弓也夾庾者盧弓也惟唐大可以頒之使者勞者故詩以彤弓錫有功諸侯平王以彤弓錫晉文侯襄王以彤弓賜晉文公則唐大之為彤弓可知矣士用夾庾而荀卿曰大夫黑弓則夾庾之黑為盧弓可知矣易氏曰或謂王弓弧弓往體寡來體多宜為弱弓何謂之强夾弓庾弓往體多來體寡宜為强弓何謂之弱賈氏曰往寡來多者弛之五寸張之一尺五寸往多來寡者張之五寸弛之一尺五寸往來若一者弛之一尺張之亦一尺其理可信故王弧授射甲革椹質者皆射堅者也非强而何夾庾授射豻侯鳥獸者則皆射近者也非弱而何唐大往來均則强弱中以授學射者使者勞者盖用强弱之中則逺近焉可也崔氏曰或問鄭注司弓矢云豻侯五十步近射用弱弓當用夾庾則射大侯者用王弧射參侯者用唐大矣則列國之君得張三侯及其射時當用何弓若君用王弧卿用唐大則諸侯僣君非禮也君用唐大卿用夾庾則弱而不及亦非其義而畿外諸侯之射又用何弓答云弓之名制本非有定班授諸侯逺近之名既非所定則不得言僣列國諸侯禮自得伸侯同天子既云應等則卿用唐大亦有何嫌是以鄭注六弓但云近者用弱弓則射大侯用王弧射參侯者用唐大矣亦不云天子用王弧諸侯用唐大大夫士用夾庾所以通之於外土諸侯也其矢箙皆從其弓鄭康成曰從弓數也鄭鍔曰頒弓之際一弓而百矢百矢而一箙也賈氏曰書文侯之命及左𫝊皆云彤弓一彤矢百凡弩夾庾利攻守唐大利車戰野戰鄭鍔曰夾庾至弱利用攻守者守城以近自保攻城以近追人惟近然後發故用其弱者則疾也唐大至强利於車戰野戰盖車戰則逺而驅馳野戰則望而進退惟逺而發故用其强者則力大也黃氏曰車戰平原兩陣相當也野戰憑險而戰也多徒兵矣車戰未合野戰勢便則用之鄭康成曰弩無王弧常服弦往體少者使矢不疾賈氏曰凡弓用則服弦不用則弛惟弩則用與不用一張之後竟不弛故云常服弦用弱者以其强弓久而不弛則就弦弱則随體不就弦也又王弧往體少使之常服弦則矢不疾故不用也凡矢枉紆往反矢絜苦結反矢利火射用諸守城車戰殺矢鍭音候矢用諸近射田獵矰音增矢茀扶弗反矢用諸弋射恒矢庳方二反矢用諸散射鄭鍔曰弓以强弱論矢以輕重論五分而二在前三在後其逹逺其行疾是名枉矢絜矢三分而一在前二在後不能及逺而行遲是名殺矢鍭矢七分而三在前四在後最輕而及逺是名矰矢茀矢八分而四在前四在後其行平而得中是名恒矢庳矢凡此皆以輕重論也若命名之義則枉矢取其變星以為名天之枉矢狀如流星飛行有光絜則有結約之義二矢皆結火以射故用諸守城車戰殺矢最重中則必死故曰殺鍭之言候也可以候問其近者而中之故曰鍭用諸近射田獵矰矢言可結繒繳之矢也矰髙也茀矢亦結繳之矢可以刜羅飛鳥也茀刜也㣲輕可以及髙故用諸弋射孔子曰弋不射宿孟子曰思援弓繳而射之皆弋射也恒矢常用之矢也庳矢卑下平等之矢也故或習射或禮射之類皆用之鄭康成曰枉矢殺矢矰矢恒矢弓所用也絜矢鍭矢茀矢庳矢弩所用也王氏詳説曰弩之為用不若弓之為用廣夾庾之弓用之於射豻侯鳥獸而夾庾之弩用之攻守而已唐大之弓用之於學射者使者勞者而唐大之弩用之車戰野戰而已弓有王弧而弩無王弧鄭氏以王弧之制為弩不疾此弩之所以無王弧也然上文云四弩之用於攻守與戰下文以枉矢絜矢用諸守城車戰是以二矢而當四弩之用明矣二矢既當四弩其餘六矢當六弓之用豈不曉然經曰王弓弧弓以授射甲革椹質者甲革椹質軍射也殺矢鍭矢用於田獵之射也田獵所以治兵講武則軍射田射一事也故考工記矢人之兵矢田矢亦同其制則以此二矢而當二弓明矣經曰夾弓庾弓以授射豻侯鳥獸者而考工記曰夾庾之屬利射侯與弋今矰矢茀矢用諸弋射則此二矢而當二弓明矣若夫唐弓大弓即彤弓玈弓恒矢庳矢即彤矢玈矢彤玈以色言之唐大恒庳以名言之唐大之弓授學射者使者勞者即散射也今恒矢庳矢用於散射則此二矢而當二弓明矣李嘉會曰矢鐵在前多者則矢重中者必深而不可以及逺矢鐵在前得中者其行疾而中者必淺矢鐵在前者小其行則低而中者亦輕弓弩强者用重矢弱者用輕矢近者用重矢逺者用輕矢此在随宜而用之必先為之比配則拘矣先王之制不得不言其大體制而用之則在乎人天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊婢世反弓王昭禹曰規者正圓之器謂之規則圓之至也鄭鍔曰方為矩而主義圓為規而主仁於其弓弛而未張則合以取圓雖已見弓之體而實寓其仁而不殺之意天子之弓王弧也長而且直數至於九合之乃圓此則射大侯之九十步也諸侯之弓唐大也短長得中曲直適正數至於七合之乃圓此則射麋侯之七十步也士之弓與大夫同射豻侯五十步也謂之合三成規者先儒云實無合三之弓託之耳合三之弓可謂至句曲矣是謂弊惡之弓差等之義如此其實合三而圜之弓何以射王昭禹曰其體曲而可以句物者謂之句則句者曲之甚也弓以強為上以弱為下則直者善而句者為惡矣黃氏曰康成以為弓體往來之衰若然天子之弓皆王弧諸侯之弓皆唐大大夫之弓皆夾庾也恐不如此王弧以授射甲革椹質者是凡射甲革椹質者皆得用天子之弓矣夾庾以授射豻侯鳥獸者凡射鳥獸者皆得用大夫之弓矣恐亦不如此大抵弓六物三等强弱中之異也合九合七合五長短曲直之形制也强弱不同優尊者也鄭合而言之故牴牾李嘉㑹曰此皆角弓反張不被絃而合之者也大抵天子不當勢屈故其體直諸侯不得不屈故其體俛大夫與士其勢轉卑則倍屈而俛宜也鄭敬仲曰剛健者乾之徳君之道也柔順者坤之徳臣之道也合多而成規者其弓剛合少而成規者其弓柔易氏曰弓之强弱因人之形體志慮血氣不可以尊卑言經必以尊卑言者設此以明分而已六弓之體雖係乎分而六弓之用實闗乎力凡祭祀共射牲之弓矢鄭康成曰射牲示親殺也殺牲非尊者所親惟射為可國語曰禘郊之事天子必自射其牲薛平仲曰祭之日王袒牽牲子姓答之卿大夫從之樂工奏韶夏封人從而歌舞之及詔於庭而麗於碑卿大夫割而毛王執割刀以刲焉大宰大僕賛其事封人共其水藁牛人共其互與盆簝國語曰郊禘之事天子必自射其牲則此之凡祭祀者豈特郊禘哉鄭鍔曰或謂六弓八矢俱掌於此則事至而必共又於射牲椹質别言其所共者盖天子之弓王弧也若射牲亦用王弧非所以為事神之禮何以言之以田獵射禽觀之自左膘而射逹于右腢為上殺射左脾逹于右䯚餘繞反為下殺中腸胞而死遲則不以充庖况射牲以享宗廟備王射之禮非用九十弓以示威之射也則所共弓矢宜不必以王弧可知兹所以别言至澤中之射則將祭於澤宫而射澤與祭之人試弓習武故射椹質椹質至堅非强弓不足以中則所共之弓矢宜不同乎射鳥獸之類澤共射椹質之弓矢薛氏曰有習大射之所有正大射之所射義曰天子將祭必先習射於澤鄭司農曰澤澤宫也所以習射選士之處澤者所以擇士也已射於澤而後射於射宫射宫之射正大射也澤之射習大射者也大射選士將以求其可用也試於澤而知其有勝堅之力然後察其有可用之實故司弓矢必為之共射椹質之弓矢上云王弓弧弓以授甲革椹質鄭曰質正也椹質以為射正射甲與椹試弓習武也射椹質必以王弓弧弓者盖以强弓而後入也充椹質必以圉師者以所習而使共也是皆取其堅也試射之時既知其有勝堅之才則大射之時豈不能察其有可用之實乎王氏詳説曰上云甲革椹質下云澤宫椹質當為二事而甲革椹質軍射也澤宫椹質習射也記曰左射騶虞右射貍首而貫革之射息左傳曰養由基蹲甲而射之是所謂甲革也甲革之射以椹為質非澤宫習射之椹質也大射燕射共弓矢如數并夾黃氏曰此無賔射有燕射小臣有賔射無燕射意者賔射即燕射鄭鍔曰大射燕射之名有耦弓矢當如人數而共之且併共其并夾詩曰四矢反兮然則如數者一人四矢也并夾取箭之具王昭禹曰并夾所以取矢之髙者射鳥氏所謂矢在侯髙則以并夾取之是也司弓矢共之射鳥氏取之大䘮共明弓矢鄭康成曰弓矢明器之用器士䘮禮下篇曰用器弓矢凡師役㑹同頒弓弩各以其物從授兵甲之儀鄭鍔曰師役用兵之時㑹同行禮之時事異禮異故各以其所當用之物而頒之鄭康成曰物弓弩矢箙之屬王昭禹曰各以其物則弓有六弩有四各以其物而共之從授甲兵之儀凡頒弓弩其多寡之數一視兵甲之儀而已田弋充籠箙矢共矰矢王昭禹曰籠與箙皆所以盛矢籠以竹為之箙以革為之詩曰象弭魚服田弋之時則共矢以其矢充實於籠之中鄭鍔曰充之欲其滿足而無闕鄭康成曰矰矢不在箙者為其相繞亂將用乃共之鄭鍔曰矰矢有繩繳非籠箙之物故别言之凡亡矢者弗用則更音庚鄭康成曰更償也鄭鍔曰射而亡矢不當償也惟不用於射而亡則使之償故曰弗用則更更與馬質以其物更之更同繕人上士二人下士四人府一人史二人胥二人徒二十人鄭康成曰繕之言勁也善也鄭鍔曰觀左傳有繕甲治兵之言謂甲必脩治之極其善美為貴耳弓弩也矢箙也矰矢也抉拾也皆供王射之物茍非脩治善美不可以奉至尊故名官曰膳人掌王之用弓弩矢箙矰弋抉拾賈氏曰司弓矢選擇大善者入繕人以共王用也易氏曰箙所以盛矢詩所謂魚服是已矰則矢之有繳者用之於弋詩所謂弋鳬與鴈是已王昭禹曰抉著右手巨指拾著左臂裏以韋為之所謂韛扞也掌詔王射鄭康成曰告王當射之節賈氏曰王射先行燕禮以大夫為賔賔與王為耦所告之事亦如大射禮大射正告公之儀賛王弓矢之事鄭康成曰授之受之賈氏曰大僕已授受弓矢此又為者大僕尊大僕賛時此官助賛也鄭鍔曰此則擇其善羙者以奉王射凡乗車充其籠箙載其弓弩賈氏曰充實也王昭禹曰乗車王乗之車也充其籠箙則以矢實籠箙之中也載其弓弩則載之於車也既射則斂之鄭康成曰斂藏也詩云彤弓弨兮受言藏之無㑹古外反計鄭康成曰亡敗多少不計鄭鍔曰至尊所用不敢制以有司之法槀古老反人中士四人府二人史四人胥二人徒二十人鄭鍔曰此官掌以財給弓矢之工而以槀名官先儒云箭幹謂之槀其字當作笴而音舸此槀字音杲乃禾稈也王安石云木髙則氣澤不至而槀弓矢之材以木之槀者為之其説求之太過今欲從先儒箭幹之義以舸音讀之掌受財于職金以齎音咨其工鄭鍔曰作弓矢必有工工而無齎則弓矢無自而成槀人取財以齎工必於職金者秋官職金掌以士之金罰貨罰入于司兵盖取其所罰之金貨以供甲兵之用槀人於職金受財以為工直之資彼之罰也以義而取之此則用之以為利國之器是亦以義為利之意鄭康成曰齎其工者給市財用之直黃氏曰凡工皆屬事官而司馬置官以攷弓矢之工故有齎給饗勞之事劉執中曰兵器不用國之正賦弓六物為三等弩四物亦如之黃氏曰三等即强弱中也鄭引弓人上中下制非也弓人以人長短不同故弓各稱其身而服之若以為六物三等四物三等當如何説易氏曰弓凡六物皆視其身之長短而為三等之制弩四物亦三等又眡其弓之長短而為之也矢八物皆三等箙亦如之賈氏曰案司弓矢注弓弩各有四矢應作四等而言三等盖據長短為三等法易氏曰矢人為矢曰五分其長而羽其一注謂羽者六寸則知矢長三尺是恒庳矰茀枉絜殺鍭之矢凡八物皆視其弓弩之勢以三尺增減其長短而為三等之制箙以盛矢亦為三等又視矢之長短而為之春獻素秋獻成鄭鍔曰春則嵗事之始百工造事亦於是始故始定其素則獻之見其功之所自始秋則萬寳之成百工造事亦於是成故飭治已畢則獻之易氏曰此經繼於弓弩矢箙之下即弓弩矢箙皆春獻素秋獻成也鄭氏釋之則曰矢箙春作秋成而不及弓弩者盖以弓人為弓之制自冬析幹春液角以至寒奠體冰析灂春被弦則一年之事合於司弓矢中春獻弓弩之説故不及弓弩而專言矢箙攷此文意則矢箙取乎秋之獻其成而弓弩亦未嘗不同其獻然司弓矢之説與槀人之説何其不同耶盖槀人受財于職金以齎其工故工以時而獻其器春為始事則獻素秋為既事則獻成乃入功於司弓矢焉然後司弓矢取槀人之所已成者為中春中秋之獻故止言獻而已與槀人所謂獻素獻成者各有次第不相侵紊豈可牽强而求合乎弓人為弓之説要之弓人為弓之制未必皆槀人之法鄭説類乎鑿書其等以饗工鄭司農曰書工巧拙髙下之等鄭康成曰饗酒肴勞之也上工作上等其饗厚下工作下等其饗薄賈氏曰下文自有上下其食此文饗據以酒肴饗之先鄭以為饗食非也王昭禹曰工事雖賤先王資以制器亦不可忘其勞無勸懲之義故饗之亦有厚薄之差乗其事試其弓弩以下上時掌反其食而誅賞鄭司農曰乗計也計其事之成功王昭禹曰試謂試其良窳易氏曰饗固足以示其恩未足以示勸懲之方必因其工事而乗之乗與宰夫乗其財用之出入同謂計其所作之事而試其所作之藝試之既審則巧拙良窳皆有不可掩善者為之上其食不特上食而已其尤善者必有賞不善者為之下其食不特下其食而已其尤不善者必有誅乃入功于司弓矢及繕人鄭康成曰功成也王昭禹曰入功于司弓矢以待頒也王氏曰入于繕人則共王用也凡齎財與其出入皆在槀人以待㑹而攷之亡者闕之王昭禹曰槀人藏受財以齎其工財之出入必有數焉具載於書以待㑹計而攷之則操之以為驗鄭鍔曰攷之知所用之財幾何所成之弓矢若干鄭康成曰闕猶除也弓弩矢箙棄亡者除之計今見在者李嘉會曰亡者闕之此論矢也此官以矢為重戎右中大夫二人上士二人鄭康成曰右者參乗此充戎路之右田獵亦為之右賈氏曰右者參乗若在軍為元帥則將居鼓下將在中御者在左兵車則射者在左御者居中若在國則尊者左御者亦居中其右是勇力之士執干戈常在右故云右者參乗朱氏曰凡御車皆御者居中乗者居左惟大將軍之車將自居中所謂居鼓下大將自擊此鼔為三軍聽他節制雖王親征亦自擊鼓易氏曰戎車革路也王於軍事乗革路則用勇力之士為右乃以中大夫為之君有常尊兵革重事故也黃氏曰自射人以下中堅之法在焉戎右先羣右秩最髙特車主戰事羣右莫加焉古人皆臨時卜而置之陳君舉曰諸右自戎右而外諸馭自戎僕而外皆用之平居而𨽻於司馬何也凡車馬之政在國猶在軍一以師律之賈氏曰戎右并下僕馭皆防衛之官故在此李嘉㑹曰自戎右而下止説大夫士而無府史胥徒等人是皆臨時差攝無特置胥徒也掌戎車之兵革使黃氏曰掌戎車之兵革使盖戰事也戰重戎右專使事也鄭引左氏萊駒斬囚事其小者耳王氏曰戎右與君同車在車之右執戈盾備非常并充兵中役使故云掌之李嘉㑹曰主通上下之情以審處其謀詔賛王鼓鄭康成曰既告王當鼓之節又助擊其餘面黃氏曰軍之進止在是傳王命于陳直慎反中鄭康成曰為王大言之王昭禹曰以軍衆所在懼其有不聞故也易氏曰𫝊於大司馬而逹於軍中鄭鍔曰𫝊逹於陳中則戎右𫝊之非勇士之力則命有時而不通㑹同充革車黃氏曰㑹同五戎皆從行充猶備也革路戎右固為右自左御是戎僕耶愚案㑹同雖以乗車㑹而革路亦為從車故充革路之右者戎右也鄭見曲禮有乗君之乗車不敢曠左之言遂以充之者為居左殆失之盟則以玉敦音對辟盟遂役之鄭司農曰敦器名鄭鍔曰㑹同或盟其不協者用血以為歃戎右則執其玉敦而開盟載之書遂充盟事之役取其勇足以禦侮使不協者有所畏玉府言若合諸侯則共珠盤玉敦盤盛牛耳而敦以盛血以玉敦而辟盟者奉血以告神乃辟開盟載之書也鄭康成曰將歃血者先執其器為衆陳其載辭使心皆開辟也大史有辟法之文言開辟以觀法也黃氏曰辟盟先鄭説是大史職所謂不信者刑之盟而不信然後有戰争然則辟盟者開辟盟載之書也鄭康成曰役之者𫝊敦血授當歃者賛牛耳桃茢音烈鄭康成曰尸盟者割牛耳取血助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執也鄭鍔曰盟雖歃血必有尸盟者執牛耳又用桃與茢以掃去不祥牛牲至順用牛耳者取其順從以聽命也桃之為物百鬼所畏而苕茢可以掃除也左𫝊哀公同齊侯盟于蒙孟武伯問於髙柴曰諸侯盟誰執牛耳季羔曰鄫衍之役呉公子姑曹發陽之役衞石魋武伯曰然則彘也盖盟則小國尸盟則牛耳者小國所執矣襄公在楚楚䘮公弔使巫以桃茢先拂殯則桃茢者凶事所用矣盟則殺牲而要諸鬼神事之凶者也故有用桃茢之禮戎右賛其事而已周禮訂義卷五十三
