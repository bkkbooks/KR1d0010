body:
  text: 周禮訂義卷七十九宋王與之撰匠人為溝洫趙氏曰匠人攻木之工而兼為溝洫蓋匠人主造宫室凡城門堂室道涂皆屬之而五溝五涂亦是分畫地勢其事相類故兼為焉陳用之曰溝也遂也洫也澮也川也皆匠人所為者也總而言之謂之五溝以其十百相冓故也或說謂之溝洫則舉中以見上下鄭鍔曰為國之本在農農民之利在水旱乾水溢者天時之不常故為之溝洫以瀦以蓄焉為農民之利而又以决以導焉除田間之害故命匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒音畎田首倍之廣二尺深二尺謂之遂鄭鍔曰為溝洫廣深之法其原必起於耜廣五寸耜者耒之金耕者所用惟耜為急故用為造溝洫之則賈氏曰二耜為耦者二人各執一耜若長沮桀溺耦而耕此兩人耕為耦共一尺鄭康成曰其壟中曰􅍒􅍒上曰伐伐之言發也􅍒畎也賈氏曰一尺深者謂之畎畎上髙土謂之伐伐發也發土於上故名伐鄭鍔曰古者耕種在􅍒上而水流乎􅍒中一耦之所發者其土廣深各一尺名之曰􅍒則􅍒為田間流水之道矣又於田首倍其數而廣深各二尺名之曰遂遂之為言水之所直逹也廣深不倍欲水直逹不可得矣此言一夫所受之田如是也薛氏曰遂人言五溝之制而始於遂匠人言五溝之制而始於􅍒則􅍒非溝也乃播種之地而已古者上地一畝三􅍒中地一畝二􅍒下地一畝一􅍒故上地田百畝中地田二百畝下地田三百畝乃是一夫受三百􅍒之田􅍒縱則遂橫􅍒橫則遂縱由遂以逹澮其橫縱如之詩曰南東其畝蓋天下地勢西北髙而東南下故古者或東其畝或南其畝畝之所向溝涂隨之然亦其大致如此不必盡然也九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮鄭鍔曰及命九夫而為一井一井之間又倍乎遂廣深各四尺以容乎遂中之水者其名曰溝溝之為言十百相交也惟其衆遂之所通則有十百相交之形矣九夫為井一里也四井為邑二里也四邑為丘六里也四丘為甸八里也於八里之地旁加一里是為一成之田積至於成則出長轂一乘井田之法始成故名曰成成間之廣深四尺者名曰洫洫之為言謂水之血脉至是通利而無壅也四甸為縣四十里也四縣為都八十里也旁加二十里是為一同一同之中積百井九百夫之地言至是而法大同也故名曰同同間之廣二尋深二仞者名曰澮澮之為言水之㑹也八尺曰尋七尺曰仞廣而且深水所趨焉因以㑹名之故曰同間廣二尋深二仞謂之澮餘說見遂人専逹於川各載其名鄭康成曰逹猶至也謂澮直至於川復無所注入愚案専逹者謂衆水合於澮而遂直逹於川無他岐焉故謂之専逹於川然其源之所從出自遂以至於澮蓋不一焉必各載其名有所考稽而後壅塞者知其所在疏導為易也故既合其流必别其源趙氏曰匠人通水之法遂極小涂極大水始於遂注入溝自溝注入洫自洫注入澮自澮注入川乾旱則自川而取之以流至於遂水溢則自遂而導之以歸於川總論溝洫王氏詳說曰遂之制詳於溝洫都鄙之制詳於井田井田未嘗無溝洫也匠人為溝洫是已溝洫未嘗無井田也載師所謂屋粟是已但鄉遂溝洫稠多都鄙溝洫稀少耳禮圖曰地形有逆順水勢有遲速故遂人之溝洫密而匠人之溝洫疏蓋匠人所營有司之事而已故其營國也為朝在某處為市在某處為涂若干為門若干皆有常制其為溝洫也為溝洫若干為川澮若干其廣幾何其深幾何亦皆有常制若夫遂人則異於是蓋隨地而制之有出入焉要之使治可也故曰凡治野其為法大率圎而無弊夫是之謂治然則匠人之法死遂人之法圎易氏曰遂人井田之法乃成周開方之數若匠人言井間之溝為一里十倍之而為十里之洫又十倍之而為百里之澮特言其一靣之長者而已蓋匠人方十里之洫是每一靣各十井以開方而論則方十里者為方一里者百是洫為百井乃九百夫之地果何與於遂人百夫之洫匠人言方五百里之澮是每一靣為百井以開方而論則方百里者為十里者百是澮為萬井乃九萬夫之地果何與於遂人千夫之澮鄭氏疑之而不得其說故曰此畿內采地之制其說無所依據或者欲以匠人溝洫求合乎遂人治野之制若必欲以一靣而牽合其數則十夫之溝為一里之井十倍之為十里之成又十倍之為百里之同以是推之自百里之同而至兩山之川得無大遼絶乎以是知匠人溝洫不可拘以成周之法或出於夏啇之制未可知也何以明之通十為成成十為終終十為同文王司馬法為商末之制則有合乎十里百里之說益稷之書曰濬畎澮距川是自然之川則有合乎兩山之間之說知此則匠人為前代之制遂人為成周之制明矣凡天下之地藝兩山之間必有川焉大川之上必有涂焉鄭康成曰通其壅塞王昭禹曰有山斯有川有川斯有涂川積兩山之水而為之故曰兩山之間必有川焉涂通往來而依川為之故曰大川之上必有涂焉然此所謂川涂雖非遂人治野之法彼有出於地勢者固非人力所得而易也先王亦因之而已易氏曰此言同間有澮之水入川川在兩山之間與遂人萬夫之川其說大異蓋遂人夫間有遂其地百畝十夫則其首為橫溝方一里十溝則東畔為南北之洫方三里有竒十洫則於南畔為橫澮九澮則於四畔為川是萬夫之川故其為川方三十二里少半里又九之而後方一同以南畝圗之九澮而川周其外又從而九之則一同之間方八十一澮何其澮洫之稠多也此遂人之制詳密備具井井皆有條理所以謂之井田至匠人則百里一同始有一澮逹於兩山之川而已李嘉㑹曰平地必以夫地多少為限然後成川則川不泛立地不虛占矣中原多平地不可不有遂人二法兼用乃可凡溝逆地阞音勒謂之不行水屬音注不理孫音遜謂之不行鄭康成曰溝謂造溝易氏曰凡溝五溝也賈氏曰言凡溝非田間廣深四尺者當是人所造溝瀆引水者鄭康成曰阞謂脉理屬讀為注趙氏曰屬是聨屬之屬謂流屬溝洫使有所歸孫順也不行謂決溢也禹鑿龍門播九河為此逆阞與不理孫也陳用之曰順則行逆則止凡物皆然而水為甚孟子曰禹之治水水之道也所謂道者順水所赴而勿逆焉之謂也夫阞者地之理也地阞陷下水赴而泐焉順而道之則水由地中行一逆其勢無自而可故凡為溝之勢逆地阞則謂之不行豈特地阞為然哉凡水之屬皆欲其順理遜者言乎其順也故屬不理孫謂之不行蓋莫非行也激而行之豈水之性哉梢音簫溝三十里而廣倍陳用之曰梢木之末也溝上小下大若木之梢故名之鄭康成曰謂不墾地之溝薛氏曰梢溝溝末也自溝末言之謂之梢溝自田端言之謂之田首鄭鍔曰自然之溝非人所造者謂之梢溝與梢其藪之梢同梢際也水所自齧而成至三十里其廣必倍蓋始齧之處其口必小其行寖逺衆水所㑹其溝自廣故也王昭禹曰水欲潄齧而成溝亦出於地勢之自然而已故積三十里而其廣倍之然後水勢流行而無所壅薛氏曰溝逺而不倍不足以容水凡行奠音亭水磬折以參伍陳用之曰奠之為言定也謂行水於此停蓄而定也水停而定則不行矣或有所妨礙或引以浸灌於是乎行之行之必以磬折之法勢冝之也蓋水之勢有激必有旋故易以坎為弓輪坎者水也其激也為弓其旋也為輪激則直而注旋則紆而曲行奠水之法一於直而注則有湍決蕩溢之患必以磬折之法行焉參伍鄭氏謂直行三折行五是也欲其形之曲如磬之折故取以為法趙氏曰如直行三丈又曲轉行五丈所以如此者要直曲得所也如此則水勢雖湍激流疾而不壅却便得水勢徐徐漸殺而不衝突也欲為淵則句音鈎於矩趙氏曰矩之法方正不曲是乃謂凡川溝欲使深而為淵當使水流之勢勾曲於矩矩是方角之形今又曲其矩方之勢則形曲過於矩如是則水勢倒向上流轉成曲尺回旋反繞斯潰蕩而為淵矣上行停水要磬折只是要水去此則要水住句於矩十分要曲非止於磬折之三五也李嘉㑹曰水行句曲其下必回峻自然深為淵也凡溝必因水藝防必因地藝善溝者水潄音瘦之善防者水淫之趙氏曰凡溝謂凡作溝必因水流之勢而就為溝也防為隄防而止水者必因地勢之髙低而就為防也此為髙必因丘陵為下必因川澤之意欲其易為力耳鄭鍔曰溝以行水冝因水勢之下而於下地為之防以瀦水冝因地勢之堅而於堅地為之善為溝而因下地為之則水奔趨而赴之必速故曰水漱之善為防而因堅地為之則水淫液而淤泥必附故曰水淫之夫水之所以不漱不淫者非水之過也為溝為防者不盡善而已鄭康成曰漱猶齧也鄭司農曰淫讀為廞謂水淤泥土留著助之為厚李嘉㑹曰善溝善防本乎人之力水漱水淫他日其勢自然耳苟非善乎初何以至是若曰因乎地勢如今因山口為斗門此固為善也然居平地者多安能一一若是凡為防廣與崇方其閷參分去一鄭康成曰崇髙也方猶等也閷者薄其上毛氏曰廣言其基之闊崇言其基之髙假令長丈二闊與崇等也其閷三分去一則上之廣冝閷焉假令闊丈二者其上則冝廣八尺是為三分去一也凡纍土者土不相勝則其圯自上始故善防者欲下厚而上薄如此則勢不傾而可以持久鄭鍔曰防以隄水惟固則不傾惟髙則不溢其基廣則其所載者固其形髙則其所禦者逺廣而不崇則水溢而過崇而不廣則勢危而圯壞故廣與崇兩者如一焉與梓人為侯之意同下之廣上之崇雖當相等至於上下大小則冝有差為之閷削之勢蓋減其上之厚使微薄也然其閷當三分而去一耳此亦防之小者其法當爾大防外閷鄭鍔曰為大防則於三分去一之外又當去之蓋防大則下冝愈厚上冝愈薄然後不崩故也陳用之曰若夫大防非特閷其內而已又閷其外焉則末勢弱而本勢强矣夫惟防閷而水淫則無泄下之圯而水亦無自而決此所以為善也凡溝防必一日先深之以為式毛氏曰為溝者掘土而為深為防者積土而為髙此溝防皆曰深者要其成則皆土向下以為深也章程之法以日為度蓋一人之力於一日之間以成其深則丈尺步數有定式矣雖積萬人之衆纍千日之久以此準之則功無毫髮之差故五寸之矩足以盡天下之方一日之深足以盡衆夫之力鄭鍔曰唯先為之式則用人之多寡計功之久近可坐而知以是賦功指日而成不愆於素矣里為式然後可以傅衆力鄭康成曰里讀為已聲之誤也趙氏曰已為式了則衆力可以傅著而用之不敢荒怠廢功王昭禹曰但依一里為之式則衆力可以傅著而用之也毛氏曰傅附合也言可以合衆力而為一注以傅為付亦通易氏曰此謂溝防有定法而後可以齊衆志蓋自􅍒深尺廣尺以至澮之廣二尋深二仞非朝夕之積也必先深一日以為式自方里之井以至方百里之同非跬步而至也必以一里之廣以為之式如此則自小可以準大自近可以準逺而溝防之功可以漸而成矣凡任索約大汲其版謂之無任毛氏曰索約繩也繩又謂之縮蓋以繩約物故謂之約板橫而繩直故曰縮汲引而長之也約版者節度必密大長則版撓而土虛矣非版之過乃約之罪故曰無任詩曰約之閣閣㭬之橐橐其縮版也如閣之載然言其牢也其㭬土也若槖之盛然言其密也由版之牢故其上密則大引其版非所謂約之閣閣者也陳用之曰言約之大過則椓土之時索有不勝其任矣趙氏曰謂索斷也葺屋參分瓦屋四分鄭鍔曰以茅蓋屋謂之葺草之為物易腐難久冝以時修葺故以名之也葺屋之峻冝過於瓦屋三分四分者取其屋之尺數以為峻之度也草之去水為遲瓦之去水甚疾故其峻之勢冝有差也賈氏曰東西為屋則三分南北之間尺數取一以為峻假令南北丈二尺草屋取四尺為峻瓦屋取三尺為峻也陳用之曰自此至堂涂十有二分皆隨其冝而閷之之勢主以去水而已囷窖音教倉城逆牆六分鄭康成曰囷圜倉方穿地曰窖賈氏曰地上為之方曰倉鄭鍔曰倉窖囷皆藏穀之廪王昭禹曰城則在郭內以為捍蔽毛氏曰城冝方城以圍宫室鄭康成曰逆猶卻也築此四者六分其髙卻一分以為閷賈氏曰假令髙一丈二尺下厚四尺則於上去二尺為閷上惟二尺囷倉城地上為之須為此閷其窖入地亦為此閷者雖入地口冝寬則牢固也毛氏曰凡屋之類必峻其上不峻無以去水凡牆之類必殺其上不殺其上不能勝水堂涂十有二分項氏曰堂涂階前之陳也詩曰胡逝我陳趙氏曰謂堂前磚階也鄭康成曰分其督旁之修以一分為峻賈氏曰中央為督督者所以督率兩旁修謂兩旁上下之尺數假令兩旁上下尺二寸則取一寸於中央為峻峻者取水兩向流去也李嘉㑹曰言兩旁十二分取一分於中央以為髙竇其崇三尺鄭康成曰宫中水道王昭禹曰必崇三尺所以防壅塞也李嘉會曰若今之街中間突起兩邉峻下水從兩邉去也牆厚三尺崇三之鄭康成曰髙厚以是為率足以相勝王昭禹曰牆基廣三尺則髙九尺蓋不髙九尺不足以為防蔽不厚三尺不足以為完久其他皆以是為率車人之事趙氏曰此段是總言車工起數之法以車人造車其事不一而足故以事名之如畫繢之事半矩謂之宣鄭康成曰矩法也所法者人也鄭鍔曰人長八尺以八尺而三分之則每分各長二尺六寸三分寸之一是一矩言用是以為矩法也凡人頭髮早白而落者名曰宣易以巽為宣髮是也取人長之一以為一矩以為宣則長一尺三寸三分寸之一也是為人頭之長毛氏曰宣為人頭者在上而宣露故也一宣有半謂之欘鄭康成曰欘斫斤柄爾雅曰句欘謂之定易氏曰一宣之度為一尺三寸三分寸之一宣之半則為六寸三分寸之二合而言之則二尺焉故謂之欘一欘有半謂之柯易氏曰一欘為二尺半欘為一尺合而言之則三尺焉故謂之柯鄭康成曰伐木之柯柄長三尺詩曰伐柯伐柯其則不逺鄭司農曰蒼頡篇有柯欘一柯有半謂之磬折易氏曰柯長三尺而一柯有半則為四尺五寸謂之磬折趙氏曰磬折謂人所立之儀蓋人磬折立則上俯玉藻曰參分帶下紳居二焉紳長三尺謂人長八尺繫帶在四尺之上帶以下有四尺五寸人磬折之節在此一柯有半計長四尺五寸今人磬折之長故謂之磬折想車工造車皆以此度量長短也陳用之曰宣也磬折也取之身而為之法數者也柯也欘也取之物而為之法數者也車人為耒王昭禹曰車人為車而亦為耒者易曰揉木為耒耒之為物其體曲其用利而車之為物或揉曲木以為體或資利轉以為用器殊而事類此車人所以為耒也庛音刺長尺有一寸中直者三尺有三寸上句者二尺有二寸鄭鍔曰庛者耒之面耜者耒之金庛則在耒下而前曲接耜名謂之庛者謂其曲接耜之所容有庛之義易氏曰耒之前接者耜也耜之前接者耨即所謂庛也以金刺土者也匠人言耜廣五寸鄭氏謂古者耜一金是也陳用之曰易曰斫木為耜揉木為耒耒耜之利以教天下蓋耒也耜也以木為之耨則以金為之而用於耒耜者也何以知耨之災於耒也蓋古文耨從耒或從金從金言以金為之從耒言耒之為用何以知耨之用於耜也蓋古文耜從木從以從木言以木為之從以言以金焉以之為言用也然則先儒以耜為耒頭之金豈知易所謂斫木為耜而古文耜從木之意歟鄭氏讀庛為刺理或冝然以謂前曲接耜恐誤其長以尺有一寸為度當中而直者耒之身也在庛之上故謂之中直也其長以三尺三寸為度人手所執者謂之句句在上而句故謂之上句亦謂之首也其長以二尺二寸為度合而言之則耒也王昭禹曰合三者之數則耒之長凡六尺有六寸自其庛緣其外以至于首以弦其內六尺有六寸與步相中也陳用之曰緣謂循而上之弦謂直而度之外謂邉也首謂上也內謂中也自庛緣其外以至于首度其左右上下小大多寡之數均矣然後以此而弦直其中以審其度焉以弦其內得六尺有六寸之數則其度不差矣與步相中者蓋言其用之時則器之度與人之步適相當焉趙氏曰自外曲量之則六尺六寸從上下兩曲之內相望如弦量之只得六尺以上句與下庛曲占了寸數也必欲中步者蓋在野冝度以步人執耒耕也前後相距止六尺行一步則如此闊耒太長則髙而難執太短則俯而難行皆不便耒適要六尺長所以中步鄭康成曰耕者以田器為度冝賈氏曰耒自長六尺若量地時脫去耜而用之堅地欲直庛柔地欲句庛直庛則利推又湯雷反句庛則利發倨句磬折謂之中地陳用之曰堅地剛而難入而直庛則利推柔地著而難起而句庛則利發直庛者其庛之勢微直而下也句庛者其庛之勢微句而上也鄭鍔曰推者推而前也發者舉而起也王昭禹曰中地之庛則合於磬折而句直欲得其中陳用之曰不過於句不過於直適如磬折之勢焉則用於剛柔得上下之中所以謂之中地車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首毛氏曰凡車有駕馬者有駕牛者駕馬者一轅而兩馬君子所乘所謂五路是也駕牛者兩轅而一牛所以載物大車柏車羊車是也是三等之車皆以載物但行澤者為大車行山者為柏車在平地者為羊車所以異等耳鄭以大車為平地之車誤矣賈氏曰此車人造車之事凡造作皆用斧因以量物故先論斧柄長短及刃之大小易氏曰柯長三尺博三寸厚一寸有半以斧柄言也五分其長以其一為之首以斧刃言也鄭康成曰首六寸謂今剛關頭斧總論毛氏曰欲論柯則先言宣欲論造車則先言柯明長短之有所本也轂長半柯其圍一柯有半賈氏曰下文柏車别論轂輻牙此是大車鄭康成曰大車轂徑尺五寸輻長一柯有半其博三寸厚三之一趙氏曰輻長一柯有半四尺五寸也博言闊也厚三之一則一寸也薛氏曰輻長一柯有半合兩輻言之則為九尺故又曰大車崇三柯輪人言乘車之制則崇六尺六寸此言大車之制則崇九尺渠三柯者三鄭司農曰渠謂車輮所謂牙鄭鍔曰謂之渠者言如水之溝渠然屈曲其勢以受衆水也輮木為牙以受衆輻亦猶渠也其長三柯者三則長二丈七尺也輻長四尺五寸上下兩相之輻共為九尺故以二丈七尺之長而屈曲之圍三徑一則當徑九尺矣然則大車之輪髙九尺也趙氏曰渠圍二丈七尺輪徑九尺上文輻長一柯有半兩兩相對九尺可知然尚有轂空壺中在恐不止九尺以此知徑九尺者通計轂數其實輻無一柯有半李嘉㑹曰二丈七尺之牙何以包得九尺之輪及轂一尺五寸惟有菑有蚤入之極深則可包矣行澤者欲短轂行山者欲長轂短轂則利長轂則安毛氏曰此又簡脫冝承下文仄輮則完之下與六分其輪次何則當先言行澤行山之異冝而後言其制乃其序也不當以行澤行山間之使文不成也項氏曰轂欲短即前半柯者也轂欲長即後轂長一柯者也愚案下文短轂謂大車長轂謂柏車王昭禹曰輪人言轂小而長則柞大而短則摯此特中地之轂而已若夫行山澤則必有以適其地之冝蓋行澤則多泥泥多則行必鈍故欲短轂轂短則雖有深泥亦莫之黏故利行山則多險險多則行必危故欲長轂轂長則輻短而無搖兀之患故安毛氏曰轂短則泥之所附者少故車不濡滯而利轂長則其勢足以勝石故不震掉而安行澤者反輮行山者仄輮反輮則易仄輮則完王昭禹曰此言牙也易氏曰反輮大車之制仄輮柏車之制鄭鍔曰輮謂屈木以為渠行澤之車其渠之木則冝反輮毛氏曰心在外而膚在內者木心多滑反而輮之則滑易而去泥為甚利矣行山之車其渠之木則冝仄輮毛氏曰仄輮者與皮膚各居一偏也山多沙石輪易損敝惟仄木以為渠則堅刃相補不偏壞矣六分其輪崇以其一為之牙圍毛氏曰此大車之輪冝在渠三柯者三之下故知其簡脫也賈氏曰輪崇九尺鄭康成曰輪髙輪徑也牙圍尺五寸薛氏曰輪人言乘兵車所謂牙圍者尺一寸也此言大車牙圍者尺五寸也柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍鄭鍔曰行山之車以柏木為冝柏木至堅山地至險以至堅之木而為車則行險而不甐歟轂長三尺圍六尺則徑二尺也輪三尺其渠則二柯者三蓋長一丈八尺也二柯六尺也二柯者三三六十八也以一丈八尺而輮之則輪之徑六尺也以六尺之輪五分之取一為牙圍則牙圍一尺二寸也然則柏車之輪與乘車大車皆不同矣陳用之曰以大車為大則若柏車者可名於小故除轂長與圍之外其輻其渠其輪崇其牙圍視大車之數皆減焉賈氏曰柏車山行故轂長輪崇又下皆欲取其安故也陳用之曰博厚則與大車之制同大車崇三柯綆音景寸牝服二柯有參分柯之二毛氏曰上文雖載車渠之數與六分其輪崇以為牙圍然其崇之數猶未備也故再備其數焉薛氏曰輈人云大車轅直必縊其牛則大車牛車也鄭康成曰轂長半柯者也鄭鍔曰崇三柯者言輪髙九尺鄭康成曰綆輪箄賈氏曰輪箄謂輪之四面外一寸則安毛氏曰駟馬之車六尺六寸之輪其綆三分寸之二則大車九尺之輪其綆固冝一寸矣鄭司農曰牝服謂車箱服讀為負鄭康成曰牝服長八尺謂較也鄭鍔曰其長八尺則箱中所容物多矣陳用之曰大車轂長尺五寸圍尺五寸輻長四尺五寸渠圍二丈七尺牙圍一尺五寸羊車二柯有參分柯之一鄭康成曰羊善也善車若今定張車賈氏曰漢世定張車未知何用但知在宫所用故差小為之謂之羊車鄭鍔曰以史考之晉制羊車一名輦上如軺伏兔箱漆畫輪晉武帝宫中每乘羊車宫人以竹葉插户鹽汁灑地以引帝車則宫中之車名曰羊車以羊駕之也齊因晉制御史皇太子所乘梁因之亦名輦貴賤通得乘名輦子隋大業始更謂之羊車小吏駕果下馬其大如羊唐亦因之經於王之五路獨無宫中之車意其此也鄭康成曰較長七尺陳用之曰羊車牝服得中焉則其轂輻輪崇牙圍從可知矣薛氏曰大車牛車柏車山車羊車小車大車以行澤柏車以行山羊車以行宫中柏車二柯鄭康成曰較六尺柏車輪崇六尺其綆大半寸鄭鍔曰羊車冝小反有七尺之較柏車冝大乃有六尺之較蓋羊車不言輻轂牙之制則較雖長而車小矣柏車較雖短然備述其輻轂牙之制其大於羊車可知凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺賈氏曰輪崇雖不同其轅各自三其輪崇假令柏車輪崇六尺則轅丈八尺大車輪崇九尺則轅二丈七尺鄭司農曰鉤鉤心王昭禹曰徹謂車廣賈氏曰徹廣六尺者不與四馬車八尺者同鄭司農曰鬲謂轅端厭牛領者毛氏曰所以鬲牛不使之外縱故謂之鬲賈氏曰鬲長六尺者以其兩轅一牛在轅內故狹也四馬車鬲六尺六寸者以其一轅兩服馬在轅外故鬲長也薛氏曰大車兩轅鬲長六尺則與六尺六寸之衡不同是兩轅之車一牛在轅內故鬲短而徹狹一轅之車兩服在轅外故衡長而徹廣易氏曰曰輪曰轅曰牝服雖有三等之不一至其為鬲為徹廣則一而已愚案輈人乘車兵車轅長一丈四尺四寸此所言三其輪崇者止言大車柏車羊車也其曰凡為轅者合三車而言之總論易氏曰此三車者擬以乘車兵車之制輪即乘車兵車之所謂輪也牝服即乘車兵車之所謂較也轅即乘車兵車之所謂輈也徹廣即乘車兵車之所謂軓廣也鬲即乘車兵車之所謂衡也以乘車兵車而論之輪崇與輿廣衡長同於六尺有六寸者故曰參如一謂之參稱較即輿上之兩輢而出乎式者也其制亦如之衡即一轅容兩服馬者也其制亦如之軓廣雖八尺然亦因輿之廣而加之也輈長雖丈四尺四寸然亦因輿隧之深而加之也至於車人之車則不然柏車行險阻之地其較冝於短大車行平夷之地其較冝於長羊車用於宫中冝於長短之中而已是三者既有長短其為轅也亦各隨其輪之制是數者皆非乘車兵車三稱之制此所以命之車人而特見於考工之末歟周禮訂義卷七十九
