body:
  text: 周禮訂義卷五十八宋王與之撰秋官司寇上鄭鍔曰秋者天地嚴凝之氣肅殺萬物之時刑者人君所以肅天下之不肅故掌刑之官屬乎秋言刑之用如秋氣之肅殺易氏曰刑以弼教寇則敗其教之成者故掌刑者謂之司寇李嘉㑹曰疏以寇者害也蒙上九曰利禦寇上下順也司寇凡有害而總禁之此秋官體上天肅萬物之意後世亦謂之司敗是刑所以懲敗類賈氏曰獄官之名有虞曰士夏曰大理周曰司寇天子諸侯同故魯晉皆有司寇至衰世隨意所造故晉有士榮為大士楚有司敗惟王建國辨方正位體國經野設官分職以為民極乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國鄭康成曰禁所以防姦者刑正人之法劉迎曰大司寇帥屬冝以掌邦刑為職如冢宰掌邦治司徒掌邦教可也今所掌止於邦禁佐王始正其職以刑邦國聖人設司寇之意常欲禁於未然果不可禁然後以刑見其愛惜保護斯民恐陷於罪戾孫氏曰不曰掌邦刑而曰掌邦禁禁明則刑可不用鄭鍔曰掌邦禁言制法之本佐王刑邦國言用刑之事然刑非大司寇之所敢專作威者人君之權此特佐之刑官之屬大司寇卿一人陳宏甫曰先王設官分職最當詳考其錯綜互見不可倫類又有截然不可易者如大司寇之屬凡朝廷之獄大司寇士師掌之六鄉之獄鄉士掌之六遂之獄遂士掌之甸稍縣都之獄縣士掌之都鄙之獄方士掌之四方之獄訝士掌之凡此類皆獄訟之事故雖自鄉遂之外如甸稍縣都外而邦國一皆聯絡而盡屬諸司寇鄭康成曰士察也主察獄訟之事大司寇之職掌建邦之三典以佐王刑邦國詰起吉反四方鄭康成曰典法也易氏曰典常也舉皇極之道時措於天下故三者皆謂之典劉執中曰民失其常則立法以治之使復其常乃謂之典諸侯則治之以三典萬民則治之以五刑王昭禹曰三典即大宰刑典合而言之故曰刑典别而言之則刑有三等鄭康成曰詰謹也書曰王耄荒度作詳刑以詰四方鄭鍔曰四方與邦國一耳王昭禹曰邦國謂中國也四方謂四夷也言刑又言詰何也諸侯之邦有不率者刑得而加之至四方之逺殊俗異域或羈縻而處之或不得而盡臣之於其不率詰責之有文告之辭詰之不改然後臨以甲兵之大刑或謂大宰言以詰邦國以刑百官何也大宰掌其典以御邦國者總其綱尚寬故言詰治內者欲其詳而尚嚴故言刑詰之寬也刑之嚴也又與刑官之事異吕氏曰司完掌邦禁凡邦之刑辟皆總焉曰詰姦慝刑暴亂姦慝隱而難知故謂之詰蓋推鞫窮詰而求其情暴亂顯而易見直刑之而已天下罪惡雖萬狀要不出於隱顯之兩端曰詰曰刑皆有以待之一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典鄭鍔曰國之新者或乘衰亂之後廢故而立新或闢荒逺之地新立君以懷輯其民黃氏曰新辟地立君固有之始封初徙之國如申伯封謝齊徙臨菑皆新立也教化未洽習俗未一苟有麗于刑辟用輕刑以治之憫其為未化之民陳及之曰若周公告康叔以治殷民曰勿庸殺之姑惟教之國之平者教化已明習俗已成人心安和風俗醇美苟有麗乎刑辟用中典以治之懲其有過中之民可也易氏曰若成王命君陳尹東郊之意陳及之曰平國之民素間政教苟有罪不可赦也故三刺三宥自有國家之常法亦不得戾乎是惟中而已所謂求民情斷民中而施上服下服之刑是中典者一定而不可易國之亂者叛逆篡弒之國其民頑暴不率訓典非嚴刑峻法以御之未有能勝其凶暴之習故用重典以治之蓋處之常法之外黃氏曰不聼不訊一切行是蓋軍法歟陳及之曰凡在官在宫者殺無赦班孟堅以中典為三千五百之刑重典為三千之刑非也然制刑雖有一定之制及觀其所冝而用猶醫之用藥隨病輕重而加減要之使適於安而已王氏曰用輕典以柔乂之用中典以正直乂之用重典以剛乂之書曰惟敬五刑以成三德易氏曰以聖人之意推之輕典所以進其善重典所以懲其惡皆所以為中也以五刑糾萬民鄭康成曰刑亦法也糾猶察異之賈氏曰此五刑與墨劓等正刑别或一刑之中而舍五或此五列全不入五刑一曰野刑上功糾力二曰軍刑上命糾守音狩三曰鄉刑上德糾孝四曰官刑上能糾職五曰國刑上願音願糾暴賈氏曰言野則國外若鄉大夫野自六尺之類王氏詳說曰野刑之於六遂鄉刑之於六鄉是也然以軍刑間於鄉遂之間者以鄉遂之間軍之所在也其曰官刑謂在官者設也其曰國刑謂王畿之內九十三國者設也又非三典所以刑邦國之國鄭康成曰功農功力勤力命將命也守不失部伍德六德善事父母為孝能能其事職職事修理願慤慎暴當為恭字之誤易氏曰上者各有所上也糾者糾其渙散也蓋渙散非用刑之時而刑之所糾期於無渙散而已王氏曰野刑為事故上功糾力力所以致功軍刑為政故上命糾守守所以致命鄉刑為教故上德糾孝孝所以致德官刑為治故上能糾職職所以致能國刑刑也故上願糾暴失願而暴刑所取也劉執中曰以五刑糾萬民者建六典以為民極也是故六卿各職其官建之使必行於天下行之使必範於後世者大司寇正其刑典也乃建事典佐王以富邦國以任百官以生萬民者用野刑焉農耕也溝涂也隄防也井邑也宫城也百工也凡役民以作其事而奉國家者以成功為上以不致力為糾則冬官之職待之而後立焉乃建政典佐王以平邦國以正百官以均萬民者用軍法焉振旅也苃舍也治兵也大閲也伐國也戍疆也凡役民以立其政而尊國家者以用命為上以不死守為糾則夏官之職待之而後立焉乃建教典佐王以安邦國以教官府以擾萬民者用鄉刑焉六德也六行也六藝也五禮也五品也凡役民以行其教而佐邦國者以成德為上以不致孝為糾則地官之職待之而後立焉乃建治典佐王以經邦國以治官府以紀萬民者用官刑焉六官六屬百官府史也凡役民以立其治而造國家者以賢能為上以不稱職為糾則天官之治待之而後立焉乃建禮典佐王以和邦國以統百官以諧萬民者用國刑焉君臣也父子也兄弟也夫婦也朋友也家國也祭祀也凡役民以踐其禮者以恪願為上以不致其恭為糾則春官之職待之而後立矣五者國之大典聖人建極於天下以參天地而贊化育待之以成焉然非刑典之正莫得以成之不曰詰邦國刑百官糾萬民乎鄭鍔曰觀此五刑之用而有所上所糾之意則愛人而不忍刑可見墨劓刖宫大辟五者刑之名也五刑之名固不可改而此有野刑軍刑鄉刑官刑國刑亦以五刑稱之蓋或有野民犯焉有軍中犯焉有鄉民犯焉有在官者犯焉有在國者犯焉故也野中之民犯刑曰野刑刑其不率於田野之中者也然野中所上者勤於農功爾苟其人在野常自力不怠今雖犯刑又當糾其平日能勤力於農而宥之可也軍中之人犯刑曰軍刑刑其不率於軍中者也然軍中所上者能用命爾苟其人在軍常謹守部伍而不散離今日犯刑又當糾其平日能堅守之故而宥之也不率於鄉中而犯刑則曰鄉刑然鄉中所上者德爾苟其人平日鄉黨稱其孝今雖犯刑又察其在家能孝其親而宥之可也不謹於官職而犯刑曰官刑然在官所上者才能爾苟其人修舉職事事成效著今雖犯刑又察其能足稱職而宥之可也不率於國中而犯刑曰國刑刑其不恭謹於國中者然國中所上者願慤而已苟其人平日能恭敬而不慢今雖犯刑又當察其在國有恭敬之實而宥之可也暴字鄭康成以為當作恭篕言糾暴則與上糾力糾孝之文不類也五刑各有所糾如此經言糾其德行糾其過惡之類皆謂其難知故糾之也民有不幸而犯刑者苟不察其平日有可取之善遂從而刑之抑何無決擇歟故糾之如此糾而無可取則刑之無愧大宰亦曰以糾萬民正謂是也李嘉㑹曰用刑雖貴當其情然必以事之所尚為重如今治主僕之訟必以名分為先有如大體所關不先因其事之所尚則一情之得一法之當未必不妨其餘豈可不隨冝而施以圜土聚教罷音皮民凡害人者置之豉反之圜土而施職事焉以明刑恥之鄭康成曰圜土獄城也鄭鍔曰天之體圜而大德曰生獄城必圜主於仁而已民為不善有致死之道聖人之心常欲生之王昭禹曰以兩儀言之則乾為圜以五則言之則規為圜鄭康成曰聚罷民其中困苦以教之為善也民不愍作勞有似於罷劉執中曰罷謂不服教而困於禮義之民言其拂于中也鄭鍔曰民不能自強於為善者謂之罷民夜納之圜土而晝則施以職事何以謂之教蓋民有過失者其害人之罪雖非故為然其罪已著夜置於圜土以囚之晝施職事以役之明書其所犯之罪於大方版加諸背而恥之劉執中曰書其罪狀與姓名表示於人則明刑也使之猶有人之心焉則變惡為善殆不旋踵是乃以不教教之也其能改者反于中國不齒三年賈氏曰能改謂在圜土不出自思已過也鄭康成曰反于中國謂舍之還於故鄉里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者不得以年次列於平民易氏曰鄉里謂之中國者周以圜土代五流之法有絶於中國之義於是反于中國三年不齒則雖可與為善未能保其必善當是時也州長屬民而讀法者屢矣而罷民不在所聼黨正屬民而飲酒者屢矣而罷民不在所序年運而往亦既久矣昔之不善固將自化然後齒之倫類不為幸民鄭鍔曰其能改過則得反乎鄉里與其遷善之意也猶使不得以齒於平民者三年蓋御惡人者不一而足三年之外則久矣故必釋之也其不能改而出圜土者殺鄭鍔曰既不能遷善又逃遁而出于圜土不畏甚矣如斯人者殺之而已李氏曰先王之時雖用肉刑然人之麗刑者實未嘗遽用之故司寇以圜土教罷民其害人也實法之所當誅而先王之心有所不忍憫其不能自強於為善無以開其改過自新之路則人道絶矣是以凡害人者姑置之圜土而施職事焉所以役使勞苦之使知所自強以明刑耻之所以書其罪惡而汙辱之使知所自好彼其能改則釋之可也其不能改則誅之未晚先王用刑其委曲至此以兩造七報反禁民訟入束矢於朝然後聼之鄭康成曰造至也使訟者兩至項氏曰訟謂以貨財相告必使兩人皆至於公庭王氏曰兩造聽之而無所偏受則不直者自反而民訟禁矣易氏曰禁則止其刑於未然鄭康成曰古者一弓百矢束矢則百個與詩曰其直如矢必入矢者取其直也鄭鍔曰訟以直為主入矢所以自明其直也不入矢是自服不直矣入矢而辭屈又因而沒入於官以罰之如是可以致民於無訟以兩劑子隨反禁民獄入鈞金三日乃致于朝然後聽之鄭康成曰劑今劵書也使獄者各齎劵書鄭鍔曰以罪相證必兩者皆有契劵然後可用一有而一無則無以斷其獄矣無兩劑則不聽是乃所以禁之書曰無簡不聽惟有簡書然後聽也王昭禹曰方言於公者訟也因而守之者獄也蓋爭而不已必訟訟而不已必獄王氏曰以兩劑聼之無所偏信則不直者自反而民獄自禁矣劉迎曰鈞金三十斤銅也金百鍰三百鍰則罰於赦刑之後鈞金三十斤蓋入於未聽之前若今先立罪賞以信其辭使不敢輕犯所謂禁民獄也鄭鍔曰獄以堅為主金之為物至堅入金所以明其堅不入金是自服其獄之不堅矣入而不堅又從沒入於官以罰之如是可致民於無獄王氏曰必三日而後聽者重致民於獄黃氏曰兩造禁訟兩劑禁獄其廉恥之素行乎故入束矢鈞金而後聽之欲其自悔也小曰訟大曰獄鄭謂以貨財相告為訟非也貨財固亦有獄士師職曰凡以財獄訟者案小司寇上服下服若今杖以下為輕罪徒以上為重罪此獄訟之别鄭鍔曰罰其矢以為武備罰其金以足國用既以止獄訟又以利乎國愚案井田之民財入有限儻非理直而辭堅必不肯廢財以好爭聼民獄訟先使入束矢與鈞金此亦禁止之一端至於不可得而禁而甘入于官必其情之大不得已然後上之人不容不聼其情至齊桓患無兵器管仲使民之訟者入束矢以為兵始失先王之意以嘉石平罷民鄭康成曰嘉石文石也樹之外朝門左賈氏曰嘉善也有文乃稱嘉故知文石也欲使罷民思其文理以自改悔平成也成之使善易氏曰上經罷民害人而麗於法者此則未麗於法而不可以法加者也雖無大罪可置圜土若舍而弗治亦有害於州里之善俗於是平之以嘉石謂石雖嘉而抑之於外朝之左所以恥之凡萬民之有罪過而未麗於法而害於州里者桎音質梏古毒反而坐諸嘉石役諸司空鄭康成曰有罪過謂邪惡之人所罪過者麗附也未附著於法也黃氏曰未麗於法則刑不當施害於州里不可直舍蓋今所謂法輕情重者木在足曰桎在手曰梏役諸司空坐日訖使給百工之役劉執中曰桎梏其手足而坐外纍其形也役諸司空內苦其心也鄭鍔曰罷民以為可罪耶其罪未麗於法以為可恕耶然所為之罪過又有害於州里是故加以手足之桎梏使坐嘉石以恥之坐日已滿又役諸司空以勞之所以激其為善之心王氏曰先王著是法以為刑人也不虧體罰人也不虧財非特如此而已司空之役不可廢也與其淫平民而苦之孰若役此以安州里之為利重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之鄭鍔曰重罪十三日坐役之朞年其次或九日或七日或五日或三日役則或九月或七月或五月或三月隨其輕重為五等而有久近焉役訖而州里任之則宥而舍之州里不任是鄉人所不容苟或舍之又將為害於州里任則舍之乃使州里相安賈氏曰州里任之者恐習前為非而不改故使州長里宰保任而舍之鄭康成曰宥寬也李氏曰萬民有罪過及害於州里者冝法所不貸今不過桎梏而坐諸嘉石以恥之雖罪之重者不過旬有三日而去矣役諸司空以疲之雖罪之重者不過一朞而去矣五刑蓋未之及也何以懲一而戒百哉嗚呼此萬民之有罪過又曰未麗于法蓋其罪之輕者吾觀已麗于法而置諸圜土者猶姑惟教之而未遽加以刑況未麗于法而坐諸嘉石者豈不尚在可教之域以肺石逹窮民鄭康成曰肺石赤石也賈氏曰坐赤石者使之赤心不妄告也鄭鍔曰人之氣由肺而通石之形似肺而色赤者使窮而無告之民立於其上寃抑之氣由此而通王氏曰肺在五臟其情為憂其竅為鼻窮民以憂在內而不能自逹則立於肺石而逹之或謂大僕建路鼓於大寢之門外以待逹窮者大司寇又以肺石置於外朝門之右以逹窮民窮民有告于朝其事一耳孰冝擊鼓孰當坐肺石耶以二官考之路鼓掌於大僕大僕政官也肺石掌於司寇司寇刑官也窮民之擊鼓者豈以政之不善之故而坐肺石者無乃以刑之寃枉歟先儒以為窮民先在肺石朝士逹之乃得擊鼓奚為哉凡逺近惸其營反獨老幼之欲有復於上而其長丁丈反弗逹者立於肺石三日士聽其辭以告於上而罪其長賈氏曰言逺近者無間畿內畿外鄭康成曰無兄弟曰惸無子孫曰獨復猶報上謂王與六卿報之者若上書詣公府言事長謂諸侯若鄉遂大夫鄭鍔曰惸獨老幼欲告訴于上長吏不以上聞其立也必及三日之久士師聽其辭以告于朝而罪其長吏蓋君門萬里不有肺石之逹則無告之民無由知不俟三日之久則非誠實無告者或妄得以瀆朝廷立法如是此先王之世所以無窮民易氏日大僕建路鼓欲窮民速逹甚於遽令此則三日而後聽何也為罪其長者設也罪其長而不遲之以待其辭之定則下瀆其上而上無以信於下非此設也速逆以逹何容心焉正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之王昭禹曰刑者侀也侀者成也冝無所加損亦量時而有輕重正月之吉始和布刑于邦國都鄙為是故也先王之法若江河貴乎易避而難犯使民觀象者凡使之知所避而已易氏曰布之使民有逺罪之心斂之使民無瀆刑之心聖人重刑尤有甚於治教與政也凡邦之大盟約於妙反涖其盟書而登之于天府大史內史司㑹及六官皆受其二而藏之鄭康成曰涖臨也賈氏曰大盟約者謂王與諸侯因大㑹同而與盟所有約誓之辭易氏曰盟約二事也約為之信書而已盟則㰱牲焉大司寇兼言之則冝兼掌其事今以盟書為重而不及乎約以司約大史見之鄭康成曰天府祖廟之藏六官六卿之官二副也鄭鍔曰大盟約所以結諸侯之信司盟掌其書刑官不親涖之則人無所畏涖其盟要於天地鬼神乃登而藏於天府與賢能之書民穀之數同大史掌邦之典法則之二以待逆者也內史掌八枋之法以詔王治者也司㑹掌邦之典法則之二以逆治者也六官六卿之長皆使受盟書之二重其事故藏之也謹備其失墜故二之者衆王氏曰大史內史司會皆受其二而藏之者各以考事焉非特備失亡而已黃氏曰大史內史史官也受盟約之二職也司㑹六官皆受之何也盟所以息爭不信而後有盟苟或不可恃而刑不能禁必至於生事費財隳體敗德無所不有故使司㑹六官俱受其二豈徒為有司存藏考覆之事而已哉故其事屬大司寇李嘉㑹曰司寇所涖天府所登太史內史司會六官所受皆大盟約也非大盟約則不若是凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊必世反之劉迎曰諸侯之獄訟定之以邦典蓋有輕典中典重典之不同以此三典定其罪也卿大夫之獄訟斷之以八法蓋八辟之麗邦法有議親議故議賢之不同以此八法斷其罪也萬民之獄訟弊之以八成蓋有邦汋邦賊邦諜之不同以此八成弊其罪也先儒以邦典為邦之六典以邦法為官府之八法以邦成為萬民之八成此蓋冢宰之治法非司寇刑官之所得與不知大司寇自有邦之三典以刑邦國非此邦典而何小司寇自有八辟以麗邦法非此邦法而何士師自有士之八成非此邦成而何惜乎先儒不考誤以冢宰之六典八法八成附㑹之王昭禹曰弊詳於斷斷詳於定諸侯尊於卿大夫故言定卿大夫貴於庶民故言斷萬民卑賤其治之為愈詳故言弊鄭鍔曰弊輕於斷斷輕於定定則一定而不可移若夫萬民之訟亦可以言斷故大司徒言萬民之田則曰斷其爭禽之訟百官亦可以言弊故小宰言以六計弊羣吏之治賈氏曰大宰有八則治都鄙此不言者都鄙獄訟都家之士告于方士治之大祭祀奉犬牲鄭康成曰奉猶進也鄭鍔曰六官奉六牲各因其類以明其義犬之為物金性而能守西方之畜司寇秋官西方之義也故祭祀奉犬牲若禋祀五帝則戒之日涖誓百官戒于百族項氏曰禋者精意以享祀五帝王氏曰於天地二官未嘗言禋則所以佐王事上帝有在於此鄭鍔曰大宰祀五帝前期十日而卜日比謂戒之日則既得吉卜而戒以齊戒不欽將待以刑王氏詳說曰郊特牲曰卜之日王立于澤親聼誓命受教諫之義獻命庫門之內戒百官也太廟之內戒百姓也百官云者百執事也百族云者王之族姓也族姓之與於祭為重於百官矣故戒百官於庫門之內而戒百姓於太廟之內正所以辨親踈之義王昭禹曰百官凡官府之執事者百族凡百官之族姓與祭者陳氏曰庫門之內象法之所示戒百官於此所以謹之也太廟先祖之所在戒百姓於此所以親之也祭之前期十日而有誓有戒誓則重於戒也大宰云祀五帝則掌百官之誓戒與其具修小宰云以法掌祭祀之戒具小宰言戒而不及誓言具而不及修則誓為重於戒明矣夫祭莫重於齊齊又莫重於誓戒誓百官者大宰也涖其誓者大司寇也大司寇涖百官之聼誓於大宰云爾賈氏以大司寇不得涖大宰遂以為大宰掌其誓而誓者餘小官是有見於大宰而無見於大祭祀也百官言誓百族言戒又知百族無預於執事有預於從祭此所以聼戒而不聼誓也王氏謂互文見義又失之及納亨前王祭之日亦如之賈氏曰納亨致牲謂將祭之辰祭之日謂旦明也此二者大司寇為王引道故云亦如之鄭鍔曰納亨將祭之時是時大宰贊王牲事司寇則前王以刑禁先焉則人知畏禁而自入於禮易氏曰大司寇以刑官前王禮也尊天子之威儀一臣下之志慮而已奉其明水火劉執中曰以陽燧得火於日謂之明火以隂鑑得水於月謂之明水隂陽之精義以見聖人精意於鬼神示也賈氏曰明水火司烜氏所掌者水以酌鬱鬯與五齊火以給㸑亨鄭鍔曰明者潔也言主人明潔故成水火也刑官以清而察獄訟之辭必明而燭蔽欺之情故使之奉之以明其義王昭禹曰書曰明清于單辭此亦刑官明清之事凡朝覲㑹同前王大喪亦如之鄭鍔曰朝覲㑹同賔客所在刑官先焉然後人知尊王鄭康成曰大喪所前或嗣王易氏曰納亨及祭尚嚴也朝覲㑹同尚肅也大喪之事尚哀也此前王之禮所係為甚重然明水火之奉與否者朝覲㑹同喪紀以人道言之祭祀之禮以神道言之各當於禮而已大軍旅涖戮于社鄭康成曰社謂社主在軍者鄭司農曰書曰用命賞于祖不用命戮于社王氏曰涖戮刑官之事凡邦之大事使其屬蹕鄭康成曰屬士師以下蹕止行也劉執中曰邦之大事役民衆矣難以致其肅使刑官之屬蹕之則罔不肅黃氏曰不肅不清違禮犯禁刑辟施焉蹕與前王一義王氏曰小司寇國之大事使其屬蹕則事在國中而已大司寇邦之大事使其屬蹕則事之所在通國野焉周禮訂義卷五十八
