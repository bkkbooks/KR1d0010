body:
  text: 周禮訂義卷二十七宋王與之撰土均上士二人中士四人下士八人府二人史四人胥四人徒四十人鄭康成曰均猶平也主平土地之政令吕氏曰此所以周道如砥其直如矢賈氏曰土均草人稻人皆土地之事薛平仲曰自稍人之令丘乘則民知國事之當力委人之歛薪芻則民知野賦之當備然使均齊之政不行則民將以厲巳為怨孰知聽命之為義是則土均所由設也王氏詳説曰均人所掌非止於土政之政有力政存焉土均所掌則止於土而已故均人云地職土均則曰他事均人云力政土均則曰地貢薛平仲曰鄉有均人以均力政於郷遂有土均以均地政於遂鄉豈無任於地事遂豈無職於力役蓋鄉之環於王城者役為重固力政之所當審遂之列於田野者耕為重尤地政所當審此其職之所由分李嘉㑹曰均人所急在力政故用中士而事簡土均所掌者廣故用上士而官衆掌平土地之政王氏曰均人無所不均故曰均地政土均雖有及乎地征然以土為主未及乎均人故言平土地之政鄭康成曰政讀為征所平之税賈氏曰下文云以和邦國都鄙故知北平者亦據邦國都鄙若鄉遂公邑征税則均人平之以均地守以均地事以均地貢易氏曰此即閭師任民之職而均之也自農圃至藪牧皆謂之地守曹氏曰鄉遂井田地域溝封之守山林川澤掌固司險之守皆是也自耕植至畜養皆謂之地事曹氏曰凡有事於地如治溝洫設涂木之類皆是也自九穀草木鳥獸至山澤之材皆謂之地貢均之則高下媺惡重輕適其平黄氏曰均地貢自甸始推而行之於天下然其本必起於均地政地政均則地事地守皆可均蓋與均人一法均人所以不均地貢者國中九貢閭中之法無不均矣王氏曰有職必有事有事必有職均人均地職而不均地事土均均地事不均地職均人均力政不均地貢土均均地貢不均力征者互見也以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之灋而行之掌其禁令曹氏曰先王雖有均平天下之政不至於和未免一於任法則前日均平之政將以齊民反以戾民政令刑禁施舍皆朝廷已定之法也法可守也而其間法之所不能盡者得無猶有未便於人情乎猶有未盡於地力乎猶有未冝於風俗乎是必察夫土地纎悉之異冝者而平之凡禮文之異同見於古先之已行者不必遽易沿襲之積乆見於習俗之便安者不必輒變凡施之於喪紀祭祀者皆不敢盡決於朝廷之法更以地之媺惡為其厚薄輕重之節而後可以使人各適其適斯其所謂和也項氏曰和之如何以地媺惡為輕重之法而行之政令之緩急刑禁之寛猛施舍之宜否禮俗之因革喪祭之豐約冝者令之不冝者禁之使之適於和而已和則中節之謂也禮器曰禮也者合於天時設於地財順於鬼神合於人心理於萬物黄氏曰為之輕重之法使無偏廢難行之節所謂和也必本於地之媺惡蓋其豐儉厚薄皆於此乎可見刑禁亦必有以和之則一切之法以律天下冝其所難行矣掌其政令蓋已和而著為禁令也緫論吕氏曰古之設官有緫大法操體統者又有斟酌損益彌縫其間者兩者交相濟然後大綱舉而萬目不遺所謂土地之政載在大司徒小司徒如以土㑹之法辨五地之物施十二教井牧其田野此是緫大法操體統者乃是大為之防然一鄉之間其土又有肥瘠厚薄無縁事為之制曲為之防須設官斟酌彌縫於其間此土均之法所以設也土均所均之土地非在大司徒小司徒之外即是大司徒所掌之上而斟酌損益之若論大綱土地司徒已自平之正縁其間有曲折厚薄肥瘠不同土均之職其位正可以入出阡陌周旋井里隨鄉土均之蓋雖説山林然山林之中又有高下雖説川澤州澤之中又有高下惟是土均周旋阡陌然後能均所謂均地守者是分民授土各守其地均地事者是各任其事均地貢者隨土而出貢以和邦國都鄙之政令刑禁和者是斟酌調和言不改大法而就中斟酌也所謂禮俗喪紀大法巳有大司徒掌之此又就中觀其媺惡其中又有重中之輕輕中之重雖有王者所頒之禮然隨鄉各自有俗君子行禮不求變俗刑不上大夫禮不下庶人若冠昬喪祭大者固不出先王所頒其他細微又從其俗喪紀厚薄之等祭祀多寡之數皆相其媺惡為輕重厚薄地美俗厚法從重地惡俗薄法從輕此所謂輕重之法且如大司徒施十二教以祀禮教敬又須土均就祀禮中斟酌得冝凡事莫不如此草人下士四人史二人徒十有二人鄭康成曰草除草也易氏曰掌土化之法而名官以草人者草乃所以為化也薛平仲曰均一之政既行則斯民之從事於耕稼者是雖有地利之難致且將為之致力所謂土化之法下地之稼孰不各興其事而使地之無遺利哉此固草人稻人列於土均之後也掌土化之灋以物地相其冝而為之種王昭禹曰移瘠而肥移惡而美夫是之謂土化土化者因形移易之也劉執中曰既相其地髙下之冝種之九穀又取九獸之糞以化其土然後種之非特用其糞以令其民薙草而灰之以和其糞則地有可化之理故月令季夏大雨時行燒薙行水利以殺草若欲化也則以水火變之今之農民莫不如是凡糞種騂剛用牛赤緹音低用羊墳符粉反壤用麋音眉渴其列反澤用鹿鹹潟音昔用貆呼丸反勃壤用狐埴時力反壚音盧用豕彊㯺音檻用蕡扶云反輕爂孚照反用犬項氏曰夫土不能皆美以形質則有肥磽以地利則有厚薄於此必致人功焉化薄而厚化磽而肥非糞種不可然地各有冝故草人物色其地冝相而為之糞種糞種者積壅穢以培毓之今南方田皆然鄭司農以為以獸骨汁漬其種失矣鄭鍔曰地之色有騂赤而性剛者有既赤而又為縓緹之色者項氏曰一染謂之縓有墳起而又壤解之者鄭氏曰墳壤潤解也胡氏曰無塊曰壤其性和緩特起曰墳其性高燥有舊為澤而今則渴竭者有本鹹苦而又潟鹵者有勃壤則粉解而粘者有埴壚則粘疏而不墳者胡氏曰土粘曰埴其性膠固卑下曰壚其性次塥有彊㯺則堅强而不和柔者有輕爂則輕脆而不厚重者凡此九等物其色知其性將以化之則隨其所冝或用牛或用羊或用麋鹿或用貆狐或用豕犬或用麻蕡者易氏曰八物皆以糞化草此則獨以草化之耳王氏曰糞種以糞糞之唯用蕡非以糞而亦謂之糞者其用之也亦如以糞糞之皆可以變惡而美易瘠而肥稻人上士二人中士四人下士八人府二人史四人胥十人徒百人薛平仲曰以三農生九穀言之則九穀之種皆民職之當事何獨於稻人而命官哉蓋下地之卑水之所鍾水之勢不達則稻之利不興徐導其壅溢之勢以致其稼穡之利夫蓋有難為功者矣是又稻人之所特設必以上士居之掌稼下地易氏曰職方氏辨九州之國皆有所冝之穀惟稻一種獨冝於荆揚蓋荆揚二州厥土惟塗泥乃沮洳下濕之地故言其穀冝稻此稻人所以掌稼下地李嘉㑹曰稼下地必先治水而後治草者蓋草生則地不見草死則地益肥積之數次其上益高其根益宻而積壅淤於水靣乃可種焉此稼澤之法以瀦畜勅六反水以防止水以溝蕩水以遂均水以列舍水以澮冩水易氏曰稻稼下地冝於水而巳然水所以養稼亦所以害稼使水之徃來不窮而下地無旱潦之憂亦恃吾之所以治水者有其道耳鄭鍔曰地之下者水之所聚當先為瀦以畜水左傳云規偃瀦禹貢云彭蠡既瀦謂畜水使不流王氏曰待旱也水内有所瀦而外焉無防以止水之來無益地故又當為防以止之王氏曰待水也將以動蕩餘水使之行則為廣深四尺之溝項氏曰稻冝下地民之食為多黍稷冝高小旱不足患故專設下地之官瀦畜之以防旱止之必有以行之故蕩之於溝將均受其平地之水則為廣深二尺之遂項氏曰行之必有所歸故均之以遂之田首小溝王昭禹曰遂𫝊受諸瀦而之者也鄭康成曰遂田首受水小溝也將以棄水而去之則為小列而舍項氏曰由遂而入田之畦畎則謂之列賈氏曰先鄭以舍為舍去之舍後鄭為止舍之舍下文澮是冩去水則此舍為止水於其中將使水去之速則為廣二尋深二仞之澮以冩之使歸於川項氏曰水於是㑹焉既處之必有以去之故冩之以澮澮田尾大溝去水者也王昭禹曰澮者通諸溝而之川也黄氏曰水政蓄泄掌在稻人則以稻之所急也以涉揚其芟作田王昭禹曰毁草為芟鄭康成曰作猶治也開遂舍水於列中因涉之揚去前年所芟之草而治田種稻黄氏曰草芟着土則復生故以涉揚之草死田肥故曰作田凡稼澤夏以水殄草而芟荑之鄭康成曰殄絶也鄭司農曰春秋傳曰芟爽藴崇之鄭鍔曰稼於下地以去水為先若夫稼澤則法又不同澤者草之所生所以去草為先盛夏水熱芟之夷之以水殄之草不生則地可稼王氏曰夏以水殄草則以夏水如湯利以殺草也澤草所生種之芒種賈氏曰水鍾曰澤有水及鹹鹵皆不生草即不得芒種故云草所生李嘉㑹曰澤地草易生而害其種種以芒練草或生焉則不至以害其種之茂易氏曰芒種稻之有芒者旱暵共其雩斂項氏曰旱暵則其雩祭之所斂以稻所急水者也愚案雩祭所斂必是下地所産卑濕之物須稻人以共喪紀共其葦事鄭康成曰葦以闉壙禦濕之物賈氏曰言禦水之物則在棺下用之王氏曰喪紀共其葦事葦生下地故也曹氏曰澤冝於芒則有芒種之種旱急於雨則有雩祭之斂澤冝於葦則有喪紀之供古人於下地無一而有棄物矣土訓中士二人下士四人史二人徒八人薛平仲曰遂自草人稻人之官設而治地之事畢矣土訓之地圖誦訓之方志凡其載九州之所有土物之所生風氣之所冝於是乎為王訓之以廣其見聞然後制其賦而各因其有施其教而不易其俗其所關蓋甚大也雖然二官皆以訓為名明辨而啟迪之開陳而敷宣之之謂也山川土田之冝風俗美惡之尚古今封域之所更厯代聖賢之所迹彼其岸谷高深之異變封壤離合之異勢先後之相禪盛衰之相代其必有故矣訓之以圖而事有可鑒訓之以志而事有可稽則一人之所以奄方輿攬圖籍於民上者其將兢業於此乎曹氏曰土訓誦訓皆以訓名官則其開廣王心啟沃君德其所關至不少也況當天子省方之時二官夾王車以從行于以備顧問進諷諫覽今而思古即舊見而訂新聞涉歴愈深觀省愈的天下之利害愈審斯其為訓也豈尋常誦説之謂乎易氏曰此二官為王巡守設也且地圖掌於司徒方志掌於外史更何與於此二官之職今土訓緫言天下之地圖以詔地事之利害誦訓分言天下之方志以詔觀事之媺惡非巡守而何然王者巡守四方雖萬乗之尊儀衛嚴備無不順適其所欲至於五方異氣寒燠燥濕異候剛柔輕重異齊茍不為之精察其利害媺惡則非臣子愛君之道故土訓於詔地事之後為之道地慝以辨地物而原其生以詔地求者此以膳羞奉養為主也誦訓於詔觀事之後為之道方慝以詔辟忌以知地俗者此以次舍居處為主也二者既詔其慝則能精察其利害媺惡然後膳夫庖人得以别其品掌次掌舍得以辨其冝二官實左右之掌道地圖以詔地事鄭康成曰道説也説地圖九州形勢山川所冝告王以施其事也王昭禹曰其地異冝其民異數其穀異種王將制其職貢巡其封域而物之有無事之利害莫不知之則土訓道地圖詔地事與有力焉道地慝以辨地物而原其生以詔地求劉執中曰慝惡也惡風惡氣惡水惡獸惡山惡路惡川皆為地慝而辨其所産之物有害於人者以豫詔於王鄭康成曰辨其物者别其所有所無原其生生有時也以此二者告王之求地所無及物未生則不求也林氏曰上有所求各以其所有則下之所共易致冝於青者不冝於揚冝於豫者不冝於兖則土訓之詔地求可知鄭鍔曰道地圖以詔地事則以地形告使知地事之所冝道地慝以辨地物則以地氣告使知地物之有毒原其生以詔地求則以地利告使知地物之所産曹氏曰凡地慝地物地求三者皆於訓説之間而敷陳之則利害知所避就取予知所防閑王巡守則夾王車鄭康成曰巡守行視所守也天子以四海為守愚案必使土訓夾王於巡守之時以其知四方土地之利害歟誦訓中士二人下士四人史二人徒八人鄭康成曰能訓説四方所誦習及人所作為乆時事林氏曰土訓之所訓者土地之圖誦訓之所訓者方志之書掌道方志以詔觀事鄭鍔曰方志如宋有宋志鄭有鄭志一方之志載其一方之事則凡一方之可觀者具載於書道其方志則王有游如少昊之墟如大庭之庫如殽之二陵相之帝丘之類王可問而知劉執中曰四方地里山川人物皆有其書以志之掌誦其書訓其義從王有所觀瞻而未知本末者則以其志誦訓以詔之掌道方慝以詔辟忌以知地俗項氏曰方慝其方言語動作所惡者以詔人君辟忌而勿言之勿為之恐惑人瞻聽且不茍於言行也詔之者如是則地俗皆可知矣或曰方慝五方之氣能使邪以病人者詔其起居飲食毋犯其所忌也然此説近於土事非方志也陸氏曰李巡曰兖信也徐舒也揚軫也荆强也豫舒也雍壅也冀近也謂西河之間情性相近其論方俗之情性大槩如此蓋民生天地之閒剛柔緩急係水土謂之風好惡趨舍隨君之情欲謂之俗故太平之人仁丹穴之人智大蒙之人信崆峒之人武秦人尚氣力先獵射燕人少思慮多輕薄此皆風使之然也吳楚之信巫重祀鄭衛之亟㑹流淫魏之少恩生分周之高冨下仕韓之椎剽燕之輕急齊之偽詐不情吳越之好劒輕死豳貴正信而尚禮器魯重亷恥而尚禮義宋多君子而多稼凡此皆俗使之然也地高者冝黍稷下者冝稻麥山氣多男澤氣多女東南多絲纊西北多織皮先王於民因其地以施教順其俗以施政山者不使居川澤者不使居中原居山者不以魚鼈為禮居澤者不以鹿豕為禮騂剛之地糞種不以羊赤緹之地糞不以牛然後五方之民各安其性樂其業無偏蔽之患此大司徒土均載師土方土訓誦訓所以有功於天下也曹氏曰凡方慝辟忌地俗三者皆於訓説之間而敷陳之則醇厚之風可囘而竒衺之俗可易王巡守則夾王車王昭禹曰土訓道地圖誦訓道方志王嘗聞之矣巡守夾王車備王或質所聞王且見而知之矣山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人賈氏曰山林皆土地之事故在此愚案大者曰虞故山虞澤虞皆中士小者曰衡故林衡川衡皆下士然大山大澤大藪徒八十人小者皆徒二十人此等皆山澤之民有斬伐之事則共其役事已則還受職於山澤何嘗有厚禄以養之王氏以山川林麓澤藪所出之冨足以禄此徒非也薛平仲曰山澤天地之藏財用之淵國家之所資者厚民生之所賴者衆如使括而歸之於上適以開斯民競利之心縱而委之於下重以啟斯民忘本之念是以先王為之虞焉以虞度之以嚴其法也為之衡焉以權衡之以平其政也民知利之為可資而不知利之為可餌則土物愛而厥心臧教化之端孰切於此陳及之曰周禮有頒田法而山澤未嘗頒之民太宰以九職任萬民乃有虞衡以作山澤之材則知畿内山澤皆官物也特置虞衡之官以掌之分山林川澤為上中下三等而設官有多少之異卻令山澤之農以時入山林川澤入山林者供薪蒸木材入川澤者共川澤之奠以當邦賦然則周制何以不頒之民而乃設官以掌之民自有之則有田不耕趨末者衆矣今也設官以掌使旁近之民以時而入又俾各供所有以當邦賦則上之政令有制而下之取有節掌山林之政令物為之厲而為之守禁賈氏曰案下文林自有衡官掌之彼是竹木生平地者此是山内之林也易氏曰山有虞林有衡此兼言掌山林之政令者以林衡受法于山虞也所受之法即所守之厲禁林氏曰為之厲則别其地以為之限為之守則命其人以為之守為之禁則設其法以為之禁養之有道取之有時用之有禮則貪殘之民不得以暴天物矣李景齊曰利之出於山林川澤者先王與民共之而周禮皆有禁焉何也蓋利之所在人所競趨官不為之守禁則紛爭力奪何時而巳雖山林川澤各置虞衡之官而有以示其禁焉則兼并者不得逞而其利可以均及於民矣王昭禹曰文王治岐澤梁無禁蓋商之末世猶凶年也以荒政拯之而巳成王周公之時茍不禁之謂之無政矣仲冬斬陽木仲夏斬隂木鄭康成曰陽木在山南者隂木在山北者冬斬陽夏斬隂堅濡調曹氏曰日之所在木必堅刄可用故仲冬仲夏之斬木為材者必相其山之南北王氏曰考工記曰凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃所謂陽木則稹理而堅者也所謂隂木則疏理而柔者也䟽理而柔冝以火養則斬以仲夏使盛陽暴之與火養同意隂木如此則陽木斬以仲冬冝矣王昭禹曰斬陽木必以仲冬以水之盛氣養其堅則齊諸其隂也斬隂木必以仲夏以火之盛氣養其柔以齊諸其陽也如此則堅者不失倔强柔者不失於弱矣凡服耜斬季材以時入之賈氏曰服謂牝服即車平較皆有鑿孔以軫子貫之所以謂之牝服耜謂耒耜隨曲長六尺六寸車人所造二者皆須堅韌故斬季材少木為之王氏曰季標枝也蓋因其材而揉焉時即上文仲冬仲夏之時王昭禹曰夫財美工巧然而不良則不時不得地氣也故以仲冬斬陽木以仲夏斬隂木凡服耜斬季材因天時以養材因天材以養氣然後工之巧行焉令萬民時斬材有期日鄭康成曰時斬材斬材之時也有期日入出有日數為乆盡物王昭禹曰草木零落斬木之時使終是時而斬之則將貪取而盡物故令之以時又期之以日有期日則節其時凡邦工入山林而掄材不禁曹氏曰邦工朝廷之梓匠鄭康成曰掄猶擇也賈氏曰上文仲冬斬陽木仲夏斬隂木堅韌之極時但國家須材不在冬夏故此邦工入山林不禁又不言時節須即取之足故也春秋之斬木不入禁賈氏曰上文據國家使工擇木故非冬夏亦得入山林此據萬民取木故十月入山林春秋斬木不入禁斬四野之木可也雖斬四野未至於三月亦不得伐桑柘故月令季春云無伐桑柘曹氏曰掄材雖不禁而春秋之不可斬材則自有禁也凡竊木者有刑罰鄭康成曰竊盜也劉執中曰謂厲禁之内王昭禹曰竊木者有刑罰然後厲守禁令莫敢犯焉曹氏曰天之生物有限人之用物無窮若蕩然無制暴殄天物則童山竭澤何所不至刑罰之施至是不得不行若祭山林則為主而修除且蹕鄭康成曰為主主辨護之賈氏曰辨護者謂供時用相禮儀項氏曰山虞山神之所依也故使之主祭焉修除治道路塲壇王氏曰修修祭事除除地為墠王氏曰蹕止人犯其祭虞主山林掌其政令且為之厲禁也若大田獵則萊山田之野及弊田植虞旗于中致禽而珥如志反焉鄭康成曰萊除其草萊賈氏曰謂於防南擬教戰之處芟去草萊南北二百五十步東西步數雖未聞廣狹可容六軍三三而居一偏或曰舜使益烈山澤而焚之禽獸逃匿鳥獸之害人者消則虞人因田獵而萊山澤者亦以除民之害故也弊田田止也山虞有旗以其主山得畫熊虎其仞數則短也賈氏曰禮緯旌旗之杠天子九仞諸侯七仞大夫五仞士三仞若軍吏是卿大夫則杠長五仞今山虞雖有熊虎為旗仞數則短冝三仞田止樹旗令𫉬者皆致其禽而校其耳知𫉬數也賈氏曰以聽鄉任左故皆取左耳也易氏曰大田獵者天子親行之禮萊山田之野則聨於大司馬之職弊田植旗則獸人所謂令禽注于虞中是已致禽而珥珥如小子珥于社稷之類田畢而祭也鄭氏謂珥當為衈取其左耳以効功故曰衈蓋取字之偏旁以為左耳其説未為不善如肆師小子羊人言祈珥鄭氏亦曰珥當為衈羽牲曰衈且引雜記之言成廟則釁之與此効功之言不同人取左耳為毛牲謂羽牲曰衈之文自相背馳況大司馬言致禽以祀祊致禽饁獸于郊皆行祭禮於致禽之後不應致禽之後方取左耳以効功劉執中釋肆師之職曰珥當為弭字之誤也弭謂小祝之弭兵災蓋田獵所以訓兵弭兵烖正田獵之事肆師於狩之日涖卜來歲之戒亦弭兵烖之意義見肆師祈珥説曹氏曰祭祀田獵凡有關於山林者皆使山虞掌之既身為之主以示神之所依又修除且蹕以肅其壇墠之所既萊其田以開其可陣之地又植旗弭禽以示其田獵之當止一則以敬鬼神之森列凡一木斬伐不敢分幽明為異觀一則以蒐獵為不得已故於驅馳逐利之祭不敢使衆欲無所限節先王於林木一物其謹重如此非仁矣乎林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞鄭康成曰衡平也曹氏曰官以衡名惟欲其權衡之平耳有所偏重則非平矣平林麓之大小及所生者竹木生平地曰林山足曰麓賈氏曰山虞尊使中士為官首下士為之佐林衡卑故下士為官首胥徒多於山虞者以林麓在平地盜竊材木者多故須巡行者衆劉執中曰胥徒増多於山虞者麓在山下養材為多共國者衆則用之者倍去民為近則其守為勞掌巡林麓之禁令而平其守項氏曰山虞掌其政令衡巡察之而巳王氏曰林之政山虞掌之林衡掌其巡之禁令而已澤之政澤虞掌之川衡掌其巡之政令而已然則林衡正於山虞者也川衡正於澤虞者也巡之則知其守而均平之使各得其冝鄭康成曰平其守平其地之民守林麓之部分王氏曰澤虞言使其地之人守其財物而林衡不言林衡言平其守而澤虞不言互見也以時計林麓而賞罰之項氏曰以時㑹計林麓之繁耗而賞罰守者若斬木材則受灋于山虞而掌其政令鄭康成曰法萬民入出時日之期賈氏曰山虞官尊故設之林衡若斬木材期於虞邊受焉王昭禹曰山林之政令林衡不得掌之其斬木材之政令而已仲冬斬陽木仲夏斬隂木斬木之法也服耜斬季材萬民時斬材斬材之法也曹氏曰山虞以時斬材而林衡則受法于山虞以嚴其戒一有不平則計其守者之功過而賞罰之矣川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人鄭康成曰川流水也禹貢曰九川滌源賈氏曰官及胥徒多者以其川路長逺巡行勞役故也掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之鄭康成曰舍其守者時案視守者於其舍申戒之劉執中曰時謂獺祭魚之後則舍其守禁以縱萬民漁焉不平其守則淵潛不可得以遂性不舍其守則鮮食不可得以養民劉執中曰犯禁謂以數罟入於汙池非時取魚鼈者也王氏曰澤亦必如此而不言亦互見也祭祀賔客共川奠鄭康成曰川奠籩豆之實魚鱐蜃蛤之屬王氏曰共川奠共川物之奠也不言物以澤虞見之澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡鄭康成曰澤水所鍾水希曰藪禹貢曰九澤既陂爾雅有八藪賈氏曰案鄭詩云叔在藪火烈具舉舉藪明知無水又爾雅藪在釋地篇故知水希曰藪若職方澤藪曰具區之類及毛傳云藪澤皆為一者以其有水則為澤無水則為藪元是一物又曰用中士尊於川衡者以澤中之所出物多也掌國澤之政令為之厲禁使其地之人守其財物賈氏曰案上山虞林衡川衡皆不言國獨澤虞云國澤者文有不同皆互見李嘉㑹曰澤屬乎國懼民因地以致爭今海之沙岸湖之陂渚凡利入之厚無不租稅于官而後漁焉此之謂也王氏曰使其地之人守其財物則人自為守所以澤雖大莫或害其養蕃以時入之于玉府頒其餘于萬民黄氏曰國澤為有皮角珠貝非民所得有者故以時入于玉府而頒其餘鄭康成曰入之以當邦賦劉執中曰時取之有時澤藪之利非民田之正税故入于玉府以供王之好賜然玉府有常數也王氏曰山林川澤皆有財物帷澤入于玉府者澤物最小也所以自養取薄所以養人從厚夫是之謂王德又頒其餘于萬民則雖澤物亦不盡利黄氏曰蓤芡葦蒲與民共之劉執中曰謂令其守發其厲俾萬民雉兎者徃焉芻蕘者徃焉漁獵者徃焉期日既滿則復其厲禁所以長育蕃阜俾之生生而不窮故曰藪牧養蕃鳥獸則山藪無物不遂其性凡祭祀賔客共澤物之奠鄭康成曰澤物之奠亦籩豆之實芹茆蓤芡之屬喪紀共其葦蒲之事鄭康成曰葦以闉壙蒲以為席若大田獵則萊澤野及弊田植虞旌以屬禽王氏曰澤野所謂藪也鄭康成曰澤虞有旌以其主澤澤鳥所集故得注析羽王昭禹曰山虞以旗致禽則熊虎山物也澤虞以旗屬禽則鳥羽澤物也賈氏曰云屬禽者謂百姓致禽訖虞人屬聚之别其等類每禽取三十焉若然則致禽與屬禽不同而鄭云屬禽猶致禽者鄭互見為義王氏曰或言致禽或言屬禽則皆致而屬之不言珥以山虞見之緫論易氏曰有政令有禁令禁令即政令之所禁者也山林之政令山虞專掌之國澤之政令澤虞專掌之林衡川衡特巡山林川澤之禁令而已是林衡正於山虞川衡正於虞衡然林衡列於山虞之後川衡列於澤虞之前者以山林川澤為序也山虞物為之厲而為守禁澤虞為之厲禁使其地之人守其財物林衡川衡之所謂平其守者平此者也山虞以時入木材而令萬民時斬材而林衡之斬木材則受山虞之法澤虞以時入財物于玉府頒其餘于萬民而川衡則以時舍其守山澤之利與民共之者也林衡正於山虞故以時計林麓而賞罰之川衡正於澤虞故犯禁者執而誅罰之平其守者之守其禁也若夫大田獵之日虞人萊所田之野為表百步此山虞澤虞之職林衡川衡無與焉山虞以旌致禽而澤虞以旌屬禽者以熊虎之象冝於山而鳥羽之飾冝於澤也兹其辨爾陳君舉曰古者金玉之所出皆掌之王官侯國不得擅而有也關譏所禁皆歸之公上侯國不得擅而私也是以名山大澤畿外不以封列土之諸侯畿内不以頒禄仕之王臣皆天子使吏治之而納其貢賦諸侯自食税田之外餘不敢過而問焉蓋先王不以予諸侯之意所以抑制其强而防閑其侈心也考之周禮凡山澤之數司書掌之以計吏治山澤之賦大府掌之以待邦用九州之川浸山藪職方掌收天下之圖而諸侯無所𨽻焉至於伯禽侯于東魯而錫之山川乃天子之加賜是固異恩而非可以例觀也人謂周制山林川澤有虞衡之官為之厲禁疑若專利於上而無遺利在民矣考之山虞令萬民時斬材有期日未嘗不與民共之而有司特禁其過不使戕賊而已澤虞則使人守其財物以時入于玉府則實為民守之王官特以其賦入於玉府而推本先王領於王官之意蓋使侯國不得以障管云爾非不知與民共財也周德既衰凡王國所恃者諸侯皆得專利之齊幹山海之藏晏子告之以山澤各有所守不可為也是猶知守先王之法至於桃林之塞古函谷也晉守之郇瑕之地古解池也晉實有之凡天子之塞邑皆不領於王官而惟私意是取春秋之作於鄭不系虎牢於衛不系楚丘其類非一蓋所以别天下之重慮侯國擅而兼之也自秦殫天下之財賦歸之公上凡山澤陂池之賦皆為天子私藏而漢制屬之少府以供養天子然初制踈闊山海之在吳者得以鑄錢煮鹽而因以成七國之禍至武帝之時凡五嶽盡在天子之郡而不𨽻諸侯而郡國亦置鹽鐵官以𨽻司農湖官雲夢官凡郡有山澤之處皆使置吏掌之諸侯惟食租税而巳雖曰抑制諸侯之强而先王不盡利以遺民之意蕩然無復存矣迹人中士四人下士八人史二人徒四十人賈氏曰掌邦田之政亦是地事故在此王氏曰名曰迹人以迹知禽獸之處而後可得田而取矣薛平仲曰自虞衡有以司山澤之藏則山澤所出非民生日用之常者先王蓋不以輕動斯民之心非國家經用之冝者先王亦不以强抑斯民之心故從禽可欲也而田獵之禁則有迹人以掌之寳貨可欲也而金玉錫石之禁則有卝人以掌之夫然後自角人至于掌蜃其取諸山澤之農者皆以當邦賦之政令夫自太宰之九職言之其所以任山澤之農者蓋如彼而所以取山澤之賦者則如此既已使民之不貪而又使民之易從此先王所以順山者不使居川不使居渚者居中原而弗敝也其教化則流行乎中矣掌邦田之地政為之厲禁而守之鄭康成曰田之地若今苑也賈氏曰迹人主跡禽獸之處有禽獸處則為苑囿以林木為藩籬使其地之人遮厲守之王氏曰邦田無地則鳥獸無所生有地而無政則其生不能蕃息雖有政不為厲禁以守之則侵地盜物所以干有司者衆矣雖為厲禁以守之然雉兎者徃焉亦弗禁也易氏曰邦田常田也田之義有三大田之時虞人萊所田之野教民以戰陳之事天子為之乗革路建太常見於司馬者是也其次牧畜于囿設囿游之禁以時取其獸而不廢乎祭祀賔客之用天子為之載斿車之旌見於囿人者是也若夫邦田之地政非囿人所禁之囿亦非大司馬所萊之野平田之地迹其鳥獸之所萃者謂之迹人迹人掌其地政則為之厲禁以守之當邦田之時天子為之載木路巾車言木路以田是也楊氏曰邦田之地自天子至諸侯大夫時田之所故天子殺則下大緌諸侯殺則下小緌大夫殺則止佐車佐車止則百姓田獵先王山林川澤皆有厲禁況邦田之地乎惟以時入則不禁如獺祭魚然後漁人入澤梁之類曹氏曰太宰九職任民四曰藪牧養蕃鳥獸養蕃之任有二祭祀賔客之供囿人掌之其曰囿游之獸禁又曰牧百獸則牧是也蒐苗獮狩之所取迹人掌之其曰掌邦田之地政為之厲禁而守之則藪是也獸而可牧不過羊豕六畜之類取於囿足以供矣若田獵之獸非可以常獸牧之其地之廣將以備教兵之用不可以比於囿其獸之多非林藪之深茂不能養蕃於其中不為之厲禁則獸之奔軼四出不能遂其蕃息之性他日無以供田獵之取則於教戰之典為有闕矣故凡邦田之地盡使迹人大為之防而為之厲禁焉而後蹤迹以取之非若囿而牧之可以隨取而得也凡田獵者受令焉鄭康成曰令謂時與處也項氏曰令之以所取之法賈氏曰其受令者謂夏官主田獵者易氏曰受迹人之令則不至於罷民力禁麛卵者與其毒矢射者劉迎曰麛卵庶禽之胎也皆不中殺之物毒矢毒弓矢以攻獸也所謂餧獸之藥先王仁及禽獸豈專以生之為事哉取之而中於用則何惡於取殺之而得其死則何害於殺王昭禹曰禁麛卵者生之以其時禁毒矢者殺之以其禮王氏詳説曰迹人所謂禁麛卵與毒矢者一年之中未始不禁月令禁麛卵於孟春非孟春則不禁矣禁餧獸於季春非季春則不禁矣是三百六旬之中禽獸之得幸免者三十日耳則知周之與秦法意逺矣卝人中士二人下士四人府二人史二人胥四人徒四十人賈氏曰金玉出於地故在此鄭康成曰卝之言礦也金玉未成器曰礦易氏曰金玉之函於石者謂之卝取玉則破卝而得取金則煅卝而成怪石黄金非卝所出緫名以卝人者舉其類言之劉執中曰石而函金銀者謂之卝卝或又函於石中必穿石而後見煅之以火則金石分焉而金多産於土中或雜於沙中今邕州之西南䏍山生竹皆方其下有黒石方如骰子中必函銅謂之塊金石其土中有金或塊登數兩者耕種其田者多𫉬焉白金之卝多函於中夜有光如疋者其氣也民多宿于山以候之鄭鍔曰寶貨所在不設官以守則豪族巨室擅發地藏而利權不歸於公上後世坑冶之官原起於此掌金玉錫石之地而為之厲禁以守之鄭康成曰錫鈏也賈氏曰為之厲禁亦謂使其地之民遮護守之劉執中曰全地之道以養五行易氏曰天地之寶生於山澤金玉錫石之貴饑不可食寒不可衣先王不盡以予民設之官為厲禁以守之非私之也上以資邦用下以使斯民之棄末厚本而已若以時取之則物其地圖而授之王昭禹曰天之財地之利盛衰消息不能常齊取之者適其盛衰消息之時也鄭康成曰物地占其形色知鹹淡也鄭鍔曰物其地則視其土色以别其所産授之教取者之處易氏曰使其案圖而取之曹氏曰物其地者乃示所當取之處不使之廣肆其鋤鑿也圖而授之者乃示以所冝取之品色不使之縱意旁搜也巡其禁令鄭康成曰行其禁明其令易氏曰利孔所在姦弊百出既禁之又令之又從而巡之鄭鍔曰巡其禁令以防竊取然後卝人取之而入于職金職金受之而入其金錫于為兵器之府入其玉石丹青于受藏之府所以待邦之大用玉府所以共王之玩好者也周禮訂義卷二十七
