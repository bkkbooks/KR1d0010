body:
  text: 周禮訂義卷七宋王與之撰甸師下士二人府一人史二人胥三十人徒三百人鄭康成曰郊外曰甸賈氏曰公邑之田任甸地即在百里逺郊外天子藉田又在南方甸地故稱此官為向師也甸法正在甸師王昭禹曰田是也黃氏曰王藉在野故以甸名官有教民之義故曰師鄭氏謂共野物官之長禽獸魚鱉莫非野物而以稼穡先之重本也列於膳庖之後飲血茹毛在黍稷之先故本其所從來也劉執中曰列於亨人之次祭祀以粢盛為本故也王氏詳說曰王之耕藉其種則獻於六官其穀則藏於神倉甸師掌帥其屬而耕耨王藉而已然種之所獻則見於天官之內宰穀之所藏則見於地官之倉人者蓋耕藉者雖為天官之事而藉田所在夫豈能外於地官鄉遂之閒哉此廩人掌九穀之數舍人掌平宮中之政倉人掌粟入之藏舂人掌其米物􅐪人掌凡祭祀共盛所以同屬於地官賈氏曰徒三百人特多者天子藉田千畝藉借此三百人耕耨故多也王氏曰藉田千畝而甸師徒三百人為其以薪蒸役內外饔之事非特耕耨王藉故也掌帥其屬而耕耨乃豆反王藉以時入之以共齍音資盛鄭康成曰其屬府史胥徒也賈氏曰除府史也史氏曰以耒犛地謂之耕以金耘草謂之耨孟子曰深耕易耨是也鄭康成曰王以孟春躬耕帝藉天子三推三公五推卿諸侯九推庶人終於千畝庶人謂徒三百人藉之言借也王一耕之而使庶人藝芓終之也王昭禹曰王必三推者身先以帥天下也以庶人耕耨之者續終以尊天子也王氏曰公田謂之藉以其借民力治之也王所親耕謂之藉則亦借民力終之故也王與諸侯各有藉田故甸師所耕耨謂之王藉賈氏曰以時入之謂麥則夏熟禾黍秋熟則十月穫之送入地官神倉也鄭康成曰齍盛祭祀所用穀也粢稷也穀者稷為長易氏曰在穀曰齍在器曰盛薛氏曰齍盛共之以舂人炊之以􅐪人實之以舍人奉之以大宗伯逆之以小宗伯然後立之以表而六官之人共奉之九嬪贊玉齍者玉敦受黍稷也大宗伯奉玉齍者奉玉與齍也廩人共接盛施於大祭祀而已接猶曾子問接祭之接也王昭禹曰以天子之尊而必親耕則天下之為農者孰不勸於耕以天子所親耕者其齍盛則天下之為子者孰不勸於養宣王不藉千畝虢文公諫曰民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在和協輯睦於是乎興財用蕃殖於是乎始厚龎淳固於是乎成天子親耕藉田厚本之道孰大於是祭祀共蕭茅杜氏曰蕭香蒿也鄭康成曰詩云取蕭祭脂郊特牲曰蕭合黍稷臭陽達於牆屋故既薦然後􅌊蕭合馨香合馨香者是蕭之謂也鄭氏曰蕭或為莤莤讀為縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮縮浚也愚按鄭氏說茅縮酒是矣不必改蕭為莤王昭禹曰易曰藉用白茅是取茅以藉祭也齊桓責楚不貢包茅曰無以縮酒是取茅以縮酒也王氏曰必用茅者謂其體順理直柔而潔白承祭祀之德當如此也陸氏曰茅有貢於萬國者禹貢荆州之土貢春秋齊侯之責楚是也有共於甸師者祭祀共蕭茅是也然甸師之茅或入鄉師或入司巫鄉師之所共者大祭祀司巫之所共者凡祭祀也茅之為用或以縮酒如記曰縮酌用茅司尊彞醴齊縮酌是也或以藉物士虞禮曰鉤袒取黍稷祭于苴鄉師共茅蒩也至男巫謂旁招以茅則又除不祥也易氏曰蕭合黍稷亦以祭脂茅以共葅亦泲酒醴王昭禹曰必俟甸師共之以其出於王藉乃所以盡志也共野果蓏之薦易氏曰植生曰果桃李之屬蔓生曰蓏瓜瓞之屬王氏曰為其非場圃所出故稱野焉薦於王藉共之則盡志而已史氏曰必於千畝取之者不唯表王者之勤亦以見無擾於四方也陳及之曰甸師之徒三百人以耕耨王藉而又共蕭茅及果蓏安所自出哉蓋古者田疇之間無有廢地方禾黍未登疆場未當用者則以樹蕭茅及果蓏之屬故詩曰中田有廬疆埸有瓜雖帝藉亦不使荒蕪也喪事代王受眚生景反烖史氏曰人過曰眚天降曰烖國有眚烖王當祗畏以修德引咎以歸已故曰受鄭景望曰國有大變毋乃粢盛不蠲鬼神弗享歟夫何使至於斯於是時也新王在疚欲請命于神祗而身受譴罰有不可得也故使甸師代行焉非謂使甸師受眚烖於已甸師掌耕王藉共齍盛者也故司其事鄭康成曰太祝作禱辭授甸人使以禱藉田之神受眚烖弭後殃王之同姓有罪則死刑焉易氏曰死與刑為二等重罪則死于甸輕罪則刑于甸文王世子曰公族有死罪則磬于甸人謂其罪之重者又曰其刑罪則纎剸亦告于甸人謂其罪之輕者賈氏曰必在甸師者以甸師在疆場多有屋舍以為隱處故就而刑焉愚按甸師非斷獄之官但待刑殺耳王昭禹曰同姓有罪不免於死者義也刑而不暴於外者仁也非義無以公天下之法非仁無以顯同姓之恩黃氏曰同姓死刑于是事人事鬼無二道也詩曰惠于宗工神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦反道敗類近在其族教帥之不至忝其先人寧不自愧乎死刑于是蓋自以為事鬼神之未盡怨恫之必不能免也記曰不與國人慮兄弟兄弟之有可慮麟趾仁厚之化安在哉知此則知冢宰設屬大意帥其徒以薪蒸役外內饔之事鄭康成曰役為給役也木大曰薪小曰蒸鄭鍔曰耕耨之暇則率其三百之徒以採取薪蒸給內外饔之亨爨饔人薪蒸亦出於甸則纍不及民耕耨之暇人各採薪則無游手之人矣獸人中士四人下士八人府二人史四人胥四人徒四十人愚案鳥獸魚鱉咸若皆其德懋之所致自獸人以下莫不以時取之而共其膳亦所以贊天地之化育輔相萬物之自然非窮口腹之欲暴殄天物也掌罟音古田獸辨其名物鄭康成曰罟罔也以罔搏所當田之獸賈氏曰名物者謂獸皆有名號物色也案夏官四時田獵春用火夏用車秋用羅冬用徒各有一以為主無妨四時兼有罔也鄭鍔曰辨其名物則取其所當取而無殺胎夭天之過隨取隨得而無禮物不備之愆冬獻狼夏獻麋春秋獻獸物楊謹仲曰疏謂狼山獸山主聚故狼膏聚而溫麋澤獸澤主銷散故麋膏散而凉案月令仲冬隂極陽生而麋角解仲夏陽極隂生而鹿角解則知狼陽物其性自溫故冬獻之麋隂物其性自凉故夏獻之非必山主聚澤主銷也豈山物皆溫而澤物皆凉耶鄭鍔曰王安石謂冬物成之時狼害物之尤者夏田稼之時麋害稼之衆者各於害物之時罟而獻之明官主以除民之害果如此說則獸人當與秋官冥氏穴氏同科不當獨列於此天官自膳夫而下皆養生之職則獸人冬夏所獻者養生之用也養至尊之禮調和其隂陽以平其心則用溫涼之膏以救其時氣之過亦其宜也又凡除物之害必須先時而為之若及害物之時則除之晚矣王政為不然安石之說陋矣春秋獻獸物不名其所獻何也蓋春物方服乳未可取者不當獻秋物已成苟可獻者無不用故不言所獻之名惟使之因時可獻者則獻矣時田則守罟及弊田令禽注于虞中賈氏曰時田謂四時田獵鄭康成曰守謂備獸觸攫也鄭鍔曰田獵之時使獸人守其網獸之罟以備觸攫宜矣然田而設罟不為不廣奚以能遍守之哉蓋王者之田當防鷙猛之物或驚屬車之塵則此二人之所分而守者有以護至尊而已鄭康成曰弊仆也仆而田止鄭司農曰謂春火弊夏車弊秋羅弊冬徒弊賈氏曰注謂聚也王氏曰令田衆以所獲禽置虞旗所植之中謂之注則衆赴而注焉若水之注也王氏詳說曰王之膳禽賔客之禽獻見於庖人祭祀之獻禽見於夏官大司馬不有獸人令注于虞中則何以待此等用乎凡祭祀喪紀賔客共其死獸生獸鄭康成曰共其完者賈氏曰以下文獸入于臘人是不完者故知此為完者凡此所共者與庖人以供王之膳劉執中曰四時之田所獲生獸則囿人牧之于囿及其將用獸人取之于囿以共焉其死而未共者則入于臘人凡獸入于臘人鄭康成曰當乾之也史氏曰一為乾豆入于臘人也皮毛筋角入于玉府鄭康成曰入玉府給作器用也王昭禹曰玉府掌王之玩好等物與貨賄之藏則入于玉府以供王之服器等用也鄭鍔曰王者不以一己之私好廢天下之公用司皮掌裘羽人角人皆須皮毛筋角以供邦用如使盡以入玩好之府則國家何賴焉故穴氏冥氏或言獻其皮角齒須備或言以時獻其珍異皮革皆不言入于玉府蓋以供邦用也若夫獸人魚人皆取於養蕃之地而非取於山林川澤者惟此可以供王之玩好之用聖人特於三官言入于玉府蓋以防人君縱私好以妨國用王氏何謂除其害則不入玉府耶凡田獸者掌其政令賈氏曰凡田獵取獸者所有政令獸人掌之以其知田獵之法故也史氏曰其政令有所掌則其出有時不戈宿不掩羣無麛卵懼其殘生傷性以銷蝕天地之和氣其意止欲鳥獸之害人者消是以去之而獸人因辨其良者以進非若後世列卒滿澤羅罘滿山使珍怪禽獸充牣其中以為游觀誇其禹不能名尚不能計也漁人中士二人下士四人府二人史四人胥三十人徒三百人賈氏曰馬融云徒三百人者池塞苑囿取魚處多故也掌以時漁為梁賈氏曰取魚之法歲有五月令孟春云獺祭魚此時得取一也季春云薦鮪於寢廟者二也鱉人云秋獻龜魚三也王制云獺祭魚然後虞人入澤梁與孝經緯云陰用事木葉落獺祭魚同時是十月得取魚四也獺則春冬二時祭魚也潛詩云季冬薦魚與月令季冬漁人始魚同五也惟夏不取魯語云宣公夏濫於泗淵里革諌之以其非時鄭司農曰梁水偃也偃水為關空以笱承其空詩曰敝笱在梁賈氏曰謂偃水兩畔中央通水為關孔也笱者葦薄以薄承其關孔魚過者以薄承取之史氏曰魯隱矢魚于棠臧僖伯諫之不從魯宣夏濫於泗淵里革諫之而止皆以其非時也先王設漁人之官必貴其以時者蓋有生之類皆有孕育之時不欲併傷其生也春獻王鮪位軌反鄭康成曰王鮪鮪之大者王氏曰王言大也物之大者多謂之王鄭鍔曰王鮪則鮪之尤大者非常時所有唯春乃獻周頌之潛曰季冬薦魚春獻鮪月令於季春言薦鮪于寢廟此漁人亦言春獻王鮪王者皆周人之事宗周在西鮪魚非西周之水所有前輩謂鮪魚岫居出河南鞏縣至春浮陽乃入西河至漆沮上龍門以俟變化故周人取以獻新獻所無也觀其字從有謂不常有辨魚物為鮮薧若老反以共王膳羞凡祭祀賔客喪紀共其魚之鮮薧凡漁者掌其政令鄭康成曰鮮生也薧乾也賈氏曰共王膳羞者共於膳夫以供王也祭祀賔客喪紀所共者共於內外饔以膳夫不掌祭祀之事也政令者凡取魚者所有政令漁人掌之以其知取之時節及處所也鄭鍔曰魚之為物或用其鮮者或用其薧者漁人當辨之以供用事至尊則先事而預辨故言辨而後言供祭祀賔客喪紀則臨事而始供故言共而不言辨漁者取魚受政令於漁人禀命而行則無數罟竭澤之害靈沼於牣圉圉洋洋常有以供禮食而無闕也凡漁征入于玉府賈氏曰謂近川澤之民於十月獺祭魚之時其民亦得取魚水族之類其中鬚骨之事堪飾器物者所有征稅漁人主收之送入于玉府以當邦賦也王昭禹曰文王之時澤梁無禁而周公之法則漁人有征蓋方商之季山林川澤宜弛以與民故無禁成王之時民之財用已足茍若無征則民之棄本者衆故征之所以抑末鱉人下士四人府二人史二人徒十有六人鄭鍔曰鱉龜蜃之類莫不有甲名官特以鱉何也蓋龜主用以卜蜃主用以飾器皆不專主於食有甲之美而食者之衆無如鱉詩曰炮鱉鮮魚曰炮鱉膾鯉莊子言獨鱉於江甘味尤美而食者甚衆獻尊者物冝取其美則其名官冝矣賈氏曰鱉人臘人之類有徒無胥得徒則足不假長帥掌取互物鄭司農曰互物謂有甲㒼胡龜鱉之屬史氏曰漁人所取皆其乘時而出者易致之物也鱉人所取凡其埋藏沉潜之物也故所用有待於互物互者交互之象若今之魚叉是也凡魚鱉龜蜃必窟宅於深淵而埋藏於淺泥有網罟所不能及者此叉之所以適用也以時簎魚鱉龜蜃凡貍物賈氏曰言以時者即下經春獻鱉蜃秋獻龜魚王昭禹曰先王之於物愛之而弗仁惟其弗仁故有以取之惟其愛之故取之必以時鄭司農曰貍物龜鱉之屬鄭康成曰謂鱴刀含漿之屬賈氏曰爾雅刀魚鱴刀也蚌含漿觀鄭此意鱴刀為一物蚌為含漿亦一物孫氏注爾雅刀魚與鱴别非鄭意也王昭禹曰藏伏於泥中者謂之貍物則不止于魚鱉龜蜃之屬而已互物言其體貍物言其性鄭鍔曰貍藏泥中者冝以簎取若魚則遊浮水中此亦兼言簎魚者冬寒則魚貍于泥至春乃上水此以簎言之殆取魚於冬也春獻鱉蜃秋獻龜魚劉中義曰春獻鱉蜃用之春也陽在內其美可獻而非生育之時也秋獻龜魚用之秋也伏藏之物浮陽在外育生既畢可食矣王氏曰獻龜以秋者龜主以十全而用之故取其堅成之時魚美於秋冬而冬為尤美不以冬獻則鱉人所獻以簎得之故先為梁之時而獻鱉尤美於夏以避其字乳之時而弗獻唯王不以飲食之養害仁政之法度如此然後率天下之民以成魚麗之功告神明矣祭祀共蠯薄隹反螺即戈反蚳直其反以授醢人掌凡邦之簎事鄭司農曰蠯蛤也杜氏曰蚌也賈氏曰蛤蚌亦一物也鄭康成曰螺螔蝓也賈氏曰一物兩名也史氏曰蠡也杜氏曰蚳蛾子也賈氏曰謂蟻之子取白者以為醢也賈氏曰按醢人有蠯醢螺醢蚳醢故以此三者授醢人王氏詳說曰按宣公濫于泗淵里革諫曰澤不伐夭魚禁鯤鮞鳥翼鷇卵蟲舍蚳蝝古之制也說者謂蟻子可以為醢也然里革以舍蚳為仁而周公以蚳醢為禮何耶蓋宣公之夏濫非時也周公以時取何不可之有史氏曰邦之簎事凡非網罟可取而器之有類於義可以得魚鱉者皆是也先王設鱉人之官非為口腹為先王寢廟當薦故終曰祭祀而已臘人下士四人府二人史二人徒二十人鄭康成曰臘之言夕也賈氏曰朝曝而夕乃乾也史氏曰凡臘皆乾肉也田獸之獲或有多寡乾豆之物在所先者故必以為臘焉掌乾肉凡田獸之脯臘膴胖之事賈氏曰凡乾肉以下並是獸人所共鄭康成曰大物解肆乾之謂之乾肉若今涼州鳥翅矣薄析曰脯捶之而施薑桂曰煆修臘小物全乾鄭司農曰膴膺肉也鄭氏曰胖讀為判杜氏曰膴胖皆謂夾脊肉又云禮家以胖為半體史氏曰臘有骨脯去骨膴全體胖半體禽獸之形有大有小小而全薧大而半薧取其易乾王昭禹曰膴胖既掌共於內外饔臘人又掌共之者蓋由獸人入于臘人由臘人入于內外饔也凡祭祀共豆音羞脯薦脯膴胖凡臘物鄭康成曰脯非豆實當為羞聲之誤也賈氏曰按籩人有栗脯則脯乃籩實非豆實也籩人職云共其籩薦羞之實鄭云未飲未食曰薦已飲已食曰羞羞薦相對下既言薦脯明上當言羞脯也史氏曰晏平仲祀其先人豚肩不掩豆則脯有時而登豆矣謂之豆脯非無所據也賔客喪紀共其脯臘凡乾肉之事賈氏曰所共共外內饔也史氏曰先王之設臘人意若曰吾不因田之所獲以儲待之一有闕焉使之弋獵以求則不勝其擾將人與物俱斃吾之所享幾何而使寰區之內飛潛蠕動不聊其生哉然則儲之以待用所以廣王者好生之德劉迎曰宰相內親附百姓外鎮撫四夷而遂萬物之冝者一動植一蟲魚皆宰相造化中物此伊尹所以一夫不獲時豫之辜丙吉之於牛喘亦止車而問皆宰相責也鱉人漁人安得不屬於大宰周禮訂義卷七
