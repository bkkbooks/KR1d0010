body:
  text: 周禮訂義卷五十九宋王與之撰小司寇中大夫二人小司寇之職掌外朝之政愚案天子諸侯有三朝説已見司士此外朝即朝士所掌乃在庫門之外鄭謂雉門外非也王氏詳説曰三朝之制有掌其位者有掌其政者朝士掌外朝之位掌其政者小司寇司士掌治朝之位掌其政者大宰小司寇掌外朝之政而大宰云王視治朝則贊治是也外朝言政而治朝言治豈非大宰尊於司寇而治尊於政乎但燕朝正其服位大僕也出入王之大命亦大僕也知此則知三朝之制有降殺矣鄭鍔曰小司寇刑官之二宜以掌刑為先今首言掌外朝詢萬民之政所謂聽獄訟之事乃列乎後豈不以邦之大事未有過於三事之詢民當詢民之時掌擯民而敘進以對人君之問必列於前以重其事以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君劉迎曰於此詢萬民亦古總章衢室之遺意鄭司農曰致聚萬民也詢謀也鄭康成曰國危謂有兵寇之難鄭鍔曰寇難已迫危而不安問民以圖安之計哀元年吳入楚陳懷公朝國人而問焉王昭禹曰若周公之討亂是也鄭鍔曰國遷則都邑不寧將去故即新問民以遷居之利害盤庚之都亳殷是也鄭康成曰立君謂無冢適選於庶也鄭鍔曰或冢適不賢將立支庶問民以孰宜為君如隱四年衛人立晉是也王昭禹曰若文王舍伯邑考立武王是也劉執中曰三者國之大政皆順民而為之故小司寇掌外朝之政以致萬民而詢之者州長也黨正也族師也閭胥也比長也而三公為之師以六卿為之帥備六卿之官而百職舉焉謹六鄉之教而三物修焉行大比之禮而賢能出焉周之致萬民其道如是故有大政大疑大謀則必詢之乃能輔王之志而弊王之謀李氏曰以匹夫細民得與公卿並列於王朝之上亦足以見古之盛時公道大明而下情上達其位王南鄉許亮反三公及州長丁丈反百姓北面羣臣西面羣吏東面王氏曰三公鄉老上言三公中言州長下言百姓則六鄉皆在矣上言萬民下言百姓則相備也愚案百姓以族姓言萬民以人衆言鄭鍔曰詢民正以民為主三公答王而北面是其常也今鄉之州長與百姓皆北面者得以答君羣臣卿大夫也在東而西面羣吏府史胥徒也在西而東面則左右以輔相之爾王公而下府史皆在而王之所詢者民爾民非有位於朝者及詢之得以北面於此見民為貴薛氏曰州長百姓分為甚微與三公列於北面何也教官之序鄉老二鄉則公一人六鄉乃三公也尊之於鄉憲其言行不纍以事故稱老焉方其任賢選能則三公出為鄉老率六鄉衆庶而賔興之若鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之是也方其聽獄弊訟則鄉老入為三公率六鄉衆庶而詢之若小司寇朝士所言是也帥羣吏衆寡而興賢能即王制所謂爵人於朝與衆共之帥州長衆庶而決獄訟即王制所謂刑人於市與衆棄之州長衆庶亦不得不繼於三公之後鄭康成曰其孤不見者孤從羣臣卿大夫在公後賈氏曰案射人及司士孤西方東面此云東方西面從羣臣之位者孤無職尊之如賔當在西此三詢之朝乃朝士所掌之位朝士云左九棘孤卿大夫位焉故知孤從羣臣之位小司寇擯兵刃反以敘進而問焉鄭康成曰擯謂揖之使前王氏詳説曰司士掌治朝擯者司士也所謂司士擯是已大僕掌燕朝擯者大僕也所謂王視燕朝掌擯相是已惟朝士掌外朝不為擯而小司寇擯蓋非常朝也詢萬民耳萬民而造天子之庭其不熟朝儀也必矣朝士既掌其位又帥其屬以鞭呼趨且辟正所以禁其錯立族談者何暇及於為擯乎此小司寇之所以為擯也然司士大僕以下大夫而為治朝燕朝之擯小司寇以中大夫反為外朝之擯又所以見周家之擯多以命之尊者為之古人重擯相之官介其次也擯即相也入而詔禮則以相名之出而接賔則以擯名之且朝覲會同大宗伯為上相而肆師不過佐擯而已諸侯入朝郊勞視館將幣亦大宗伯為上擯而小行人不過為承儐而已夫小行人與肆師皆下大夫尚為佐擯與承擯何獨於小司寇為擯於外朝而疑之哉以衆輔志而弊謀鄭鍔曰凡大事人君之志固當先有所處謀亦有所嚮其所以詢民者蓋詢衆人之言以衆人之見而輔吾志然後合衆人所見以斷其謀志先定而取衆人之言以佐其決而已黃氏曰朕志先定雖然觀望風旨為可戒也故虛而後明生焉恭而後賢生焉康誥曰勿庸以次汝封鄭謂輔志者尊王賢明其説好王氏曰以王志為主而輔之以衆以衆謀為稽而弊之於王以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法王昭禹曰五刑司刑所謂墨劓宫刖殺也鄭鍔曰刑止於五而獄訟不一彼雖不一吾所以聽之者不可以出乎五刑之外惟用五刑於此以聽其辭於彼黃氏曰皆聽于朝鄉士以下所謂司寇聽之者也鄭康成曰附猶著也故書附作付訊言也鄭鍔曰聽其辭矣知其罪之所麗可附於某等之刑又慮彼雖服而事未必然也又用吾之情以訊之以情度情庶幾可以得其真情也王制曰一成而不可變故君子盡心焉用情之語可以見君子盡心之意矣訊已得實又至于旬乃斷之其斷則先讀鞫問之書使囚聞之知其所犯之實然後用法焉蓋至于旬則我思之審讀其書則彼知其詳鄭司農曰讀書則用法如今時讀鞫已乃論之劉氏曰以斷罪之書讀之于囚審而弗變乃用法焉乃若成王之誥康叔至於旬時丕弊要囚蓋以旬為率者一定之常也成王使之至于旬時亦誥戒之切而已凡命夫命婦不躬坐獄訟凡王之同族有罪不即市鄭康成曰為治獄吏褻尊者也躬身也不身坐使其屬若子弟也喪服傳曰命夫者其男子之為大夫者命婦者其婦人之為大夫妻者春秋傳曰衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士鄭鍔曰獄訟之人必對辭曲直兹其常也命夫命婦不躬坐使左右代焉貴之也有罪者殺之市朝與衆共棄之亦其常也王之同姓則不殺諸市親之也禮記曰公族有罪刑于隱者不與國人慮兄弟也甸師氏言王之同姓有罪則死刑焉是也一以責亷恥一以重國體夫為我所以貴之親之者如此彼敢恃親與貴而犯禁撓法乎哉以五聲聽獄訟求民情鄭鍔曰人心險於山川況獄訟之際詎肯吐其情乎聽以五聲茲乃求其情之術凡此五者皆以辭為主故皆曰聽一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽項氏曰心者形之君辭者心之聲聲發於中不能掩於外其辭信則色定氣舒耳目不亂其辭偽則色變氣索耳目皆惑以此聽之人焉廋哉五者雖異要皆因辭而後見鄭康成曰辭聽觀其出言不直則煩王昭禹曰聽其辭因察其色以色著乎顔而為心之表故也彼脅肩諂笑者有愧於心其色赧然則察其色固足以得其心矣鄭康成曰觀其顔色不直則赧然以色為未足又察其氣以氣充於體而為心之運故也彼行有不慊於心氣為之餒則察其氣亦足以得其心矣鄭康成曰觀其氣息不直則喘耳目者心之樞機心之情偽寓於耳目視聽之際察其視聽亦足以得其心矣鄭鍔曰心有不直則耳所聽者必疑而不定目所視者必眩亂而失真鄭康成曰聆不直則惑視不直則眊黃氏曰康成謂言不直則煩而下是其一端也強怯柔很明暗戇狡五者之動皆足以知之皆謂之聽猶以發於聲者參之也故曰以五聲聽獄訟求民情此在事狀之外能言與不言其情發見與隱伏皆於是求之非有司之事也故聽之于朝將行刺宥以八辟麗邦法附刑罰鄭康成曰麗附也易曰日月麗乎天黃氏曰麗邦法以其本罪附于邦法而議之應宥應刺應輕應重著於刑罰之所當施者議亦非常法鄭鍔曰先王制刑一定不易有罪者必麗於刑書而犯刑之人或有不可加以刑如茲八者與衆議之以示至公可也茲所以有八辟之議八辟以待八議之人俟其議定已麗於邦法乃附之於刑罰是謂無一定之制也辟法也不謂之法而謂之辟者制法謂之辟八辟蓋近於法而未麗於法自是然後制焉耳一曰議親之辟鄭鍔曰親者王之族也有罪可刑矣然刑之則傷親親之恩鄭司農曰若今時宗室有罪先請是也二曰議故之辟鄭鍔曰故者王之故舊也有罪可刑矣然刑之則失故舊之好三曰議賢之辟鄭康成曰賢有德行者鄭鍔曰罪固可刑然刑之則其人為鄉大夫所興之賢鄭司農曰若今時亷吏有罪先請是也四曰議能之辟鄭康成曰能謂有道藝者春秋傳曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者鄭鍔曰罪固可刑然刑之則其人為鄉大夫所舉之能五曰議功之辟鄭康成曰謂有大勳勞立功者鄭鍔曰凡有司勳所謂六功之人刑之則無以報其功六曰議貴之辟賈氏曰周時大夫以上皆貴也鄭司農曰若今時吏墨綬有罪先請是也鄭鍔曰凡有爵之人刑之無以尊其貴七曰議勤之辟鄭鍔曰勤勞王事之人刑之是忘其勞八曰議賔之辟鄭康成曰賔謂所不臣者三恪二代之後王昭禹曰賔謂四方之賔客鄭鍔曰刑之無以尊三代之後賈氏曰自議勤以上七者雖以王為主諸侯亦有之惟八曰議賔據王者言之耳總論劉執中曰議親者教天下之愛其親議故者教天下之厚其故議賢者教天下之慕其賢議能者教天下之礪其能議功者教天下之懋其功議勤者教天下之勸其勤議貴者教天下之忠其君議賔者教天下存亡繼絶而不棄先王之德八者天下之大教非天子私親故而撓其法將以行之教天下用中於民焉人倫之美莫斯為大孟軻以舜為天子皋陶為士瞽瞍殺人則執之而不禁舜棄天下而終身焉豈知所以教天下之愛其親乎王氏曰謂之議則刑誅赦宥特未定也然以皋陶為士瞽瞍殺人舜不敢赦其議之可知矣愚案皋陶以公而守天下之法舜以私而伸人子之情彼此輕重各得其宜如王氏以法之不可撓於已私是申商刑名之學劉氏謂當以親故宥之又幾於任情而廢法皆知有一而不知有二故王族有罪不免于刑者法也刑于甸師不與衆同者情也後世待宗族之恩薄至殺人反不加罪是未嘗以已恩厚其親徒以人命私其親也其悖先王之情與法甚矣以三刺斷丁亂反庶民獄訟之中鄭鍔曰獄訟之情所患不得其中耳已得其中從而斷之胡為不可聖人猶未審以為果中否又為三訊之法以刺取衆人之意果以為中然後斷之凡言刺有二義刺取也殺也如春秋刺公子偃之刺則刺者殺也此云三刺則有探取之義刺取臣民之意皆以為可殺然後斷其中而殺之所謂國人殺之也王昭禹曰中者事實之書與天府謂之治中告天謂之升中同意賈氏曰庶民以上皆應有刺直言庶民者賤者尚刺則已上可知一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑鄭鍔曰人之深情不可臆度將以刺取其意必先設辭以訊之故三刺之法則有三訊訊問也鄭康成曰訊言也問之以刺取其意耳或謂訊者或訊於公卿大夫之羣臣或訊於府史胥徒之羣吏或訊於比閭族黨之萬民而特聽民之所刺所宥然後施刑何也竊以為此所欲斷者庶民獄訟之中故也雖訊官吏而實以民為主而訊官吏者能達萬民之情而致於上故也黃氏曰義理難盡羣臣知之故例可用羣吏知之人情隱伏萬民知之幸其不皆以為可殺則亦不敢輕殺之民以為可刺則宜施上服之刑民以為可宥則宜施下服之刑上服之説先儒以為上服劓墨施於面者也下服宫刖施於下體者也然書言五刑有服五服三就者謂上服服上刑下服服下刑也吕刑云上刑適輕下服下刑適重上服者若以為墨劓施於面為上服宫刖施於下為下服則吕刑所謂適輕適重與五刑有服之説為無用矣愚案三刺之斷不敢自決而訊及於三此必罪大惡極或輕或重關於風教上服下服係於人心雖則已麗於刑必待三訊而後斷也民以為可刺則服上刑無可説者民以為可宥亦非全然宥之特服下刑比上刑為輕耳黃氏曰小司寇前訊繼詢外朝之政今訊繼議刑獄之序大司寇不獨宥也圜土聚教而遂免之小司寇上服下服猶施刑焉於此可見命官制職之意及大比毗志反登民數自生齒以上時掌反登于天府內史司會冢宰二之以制國用王昭禹曰三年之久民之生死登下亦已多矣故及大比登民數焉鄭康成曰人生齒而體備謂男八月而生齒女七月而生齒易氏曰王之為王以得乎丘民而已故自生齒以上皆書於版欲周知其數王氏詳説曰天府以天為名尊之至也賢能之書登于此盟約之書登于此獄訟之書登于此民數之書登于此王所以重其事但天府曰祭天之司民司祿而獻民數榖數則受而藏之司祿之官缺矣必知榖數亦登于此為司祿之所掌是已然書之所藏有不書其二者民數也不止一官書其二者盟約也登其書於天府其為重則一初不可以書之二與否及所書二多少之數為輕重但觀其事之所施行耳易氏曰考司民登萬民之數及大比以詔司寇是司寇受其數於司民於孟冬祀司民星之時乃獻其數于王王拜受之登于天府刑官致重於民數如此冢宰於司會登民數之後又為之二其數而制國用焉蓋古者三年耕必有一年之食九年耕必有三年之食冢宰以三十年通制國用而大比之制國用實所以為三十年盈虛斂散之儲內史於此二之則以其所掌者會計之書司會於此二之則以其所掌者會計之事二官卑而列於始冢宰尊而繼於後非以統百官之任而統其成者歟由是觀之民之盛衰係乎刑故司寇登民數於地官大比之時財之豐耗由於民故冢宰制國用於刑官登民數之後數官聨事而合治皆所以重乎民也陳及之曰必知民數則可以制國用何故蓋先王之世士農工商四者不可闕一而農為重以三分率之農居三分之二則榖粟始可給不然工商與農相半則野有曠土榖粟寡乏則四民俱病矣是以王者之制農民必三分之二也以九職任民凡育草木者作山澤之材者養鳥獸者化八材者通貨賄者斂疏材者化治絲枲者轉移執事者常不過農民三分之一而廩人每嵗以嵗上下數邦用月以三釜為準司民獻民數廩人獻榖數大史書之司會會之三年耕必有一年之食九年耕必有三年之食以是而制國用雖有水旱民無菜色以民數榖數素定也管仲制齊國之政工商之鄉六士鄉十五是三分而率一也其練習民政哉愚案古者只計民數則知國賦後世色目既多不可只以民數計小祭祀奉犬牲鄭康成曰奉猶進也王昭禹曰大司寇大祭祀奉犬牲故小司寇小祭祀奉犬牲鄭鍔曰職有尊卑凡禋祀五帝實鑊水納亨亦如之劉執中曰實鑊以滌牲納亨以煮牲鄭鍔曰禋祀五帝令實鑊水納牲於鑊以亨則亦如之者蓋惟清與潔然後可以事上帝而用刑之官克明清於獄訟之辭故足以合上帝之心鑊之實水卑者之職而使司寇主之此鑊也此水也必清潔斯可以祀上帝為刑官者詎可以汙穢而不清潔乎大賔客前王而辟鄭司農曰小司寇為王道辟除姦人若今時執金吾下至令尉奉引賈氏曰為王辟亦謂於宫中饗燕在寢及廟時也王昭禹曰大司寇凡朝覲會同前王小司寇大賔客前王而辟則非特前王又為王闢道也后世子之喪亦如之賈氏曰后世子之喪當朝廟之時王出入亦為王辟也小師涖戮鄭康成曰小師王不自出之師王昭禹曰大司寇大軍旅涖戮故小司寇小師涖戮凡國之大事使其屬蹕鄭康成曰屬士師以下賈氏曰國之大事即士師云諸侯為賔是也王昭禹曰大司寇凡邦之大事使其屬蹕故小司寇凡國之大事使其屬蹕言邦則通邑都焉言國則主於國中而已孟冬祀司民獻民數於王王拜受之以圖國用而進退之鄭鍔曰軒轅之角有大民小民之星其神實主民説者謂春官祭之然春官天府但受其數耳司民之官言司寇及孟冬祀司民之日獻其數則司民之祀正司寇之所主明矣先王以為民之登耗必有神主之故每嵗孟冬物成之時使司寇祀之亦以刑者所以馭民而民之多寡皆本乎刑之繁省故也司民已祀則獻民數於王見其奉天以用刑而刑不至於殘民故其生成之數如此王拜受之以圖國用則以民之登耗知斂之豐匱由是而進退所用之物鄭康成曰進退猶損益也民多賦足則進之而備禮民少賦乏則退而殺禮上言以制國用此言以圖國用者制其有無者有司之職圖則所謀者天下之大計是乃王者之權故言於王拜受之之後也揚氏曰冢宰雖制國用而進退之則在王而已嵗終則令羣士計獄弊訟登中于天府賈氏曰羣士謂鄉士遂士以下王昭禹曰計獄者計其多寡之數弊訟者察其情而斷之為有疑也計非不弊弊非不計各有攸當而已王氏曰中獄訟之中言事實之書鄭鍔曰天府之職掌受中也登於天府則寶之至又以見允合乎天心之義正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士李嘉會曰刑象既布木鐸既徇羣士猶然不見不聞而不用法者此常刑之不恕王昭禹曰令羣士則令于士師鄉士以下使之稟法故也與小宰帥其屬觀治象同意鄭鍔曰六十屬為衆矣所視以效法者在吾之羣士使近而羣士能率法不越則彼逺而外者詎有不恤於刑乎故先言帥屬乃言令羣士也乃宣布于四方憲刑禁鄭康成曰宣遍也王昭禹曰宣布于四方則非一國鄭康成曰憲表也謂縣之也刑禁士師之五禁林椅曰刑所以行法故布法觀法司寇獨備焉乃命其屬入會乃致事項氏曰乃命其屬不獨羣士凡秋官之屬皆入計李嘉會曰入會會其獄訟一嵗多少之數乃令致之於王易氏曰王氏謂餘官以嵗終入其會獨司寇以正嵗入之所以謹其始非也乃者繼事之辭令羣士乃宣布于四方以嵗終期之至大宰受會之時乃命其屬入會乃致事所以紀小司寇一職之終也周禮訂義卷五十九
