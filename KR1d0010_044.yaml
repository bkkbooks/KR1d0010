body:
  text: 周禮訂義卷四十四宋王與之撰大史下大夫二人上士四人鄭康成曰大史史官之長林椅曰巫史卜祝冝以鬼神為類彼六典八法八則八枋皆治職事類也顧列於此者謂宗廟之典祏歟鄭節卿曰太宰命令大史必與焉書之顧命國語藉田之事類皆可考愚案史官公道所係清議所出君相有一過舉史氏直書此所以權重宰相列之春官雖大宰不得統攝之鄭鍔曰禮記言天子建六官先六大曰大史大祝今大祝大史皆以下大夫二人為之無乃祝史之史曰不然昔季梁謂隨侯曰祝史矯舉以祭子木言武子之祝史陳信無愧辭而禮記又云失其義陳其數祝史之事是乃祝史之史今此官掌典法則掌約劑掌正歲年頒告朔掌祭祀卜日讀禮書掌朝覲執書以詔王掌大師抱天時掌大遷國抱法掌射飾中正左傳所謂天子有日官居卿以底日者也鄭康成曰居猶處也言建六典以處六卿之職王氏詳説曰大史雖非卿而實卿之職此所以居史官之上日官不在六卿之數而位從卿是乃大史之職昔老子為守藏史復為柱下史四方所記文書皆歸柱下秦時張蒼為御史主柱下方書漢司馬遷之祖本出重黎之後掌天官遷之父談稱大史公遷亦稱大史以天官治太初之厯與此大史所掌無異雖與大祝同為下大夫非其倫也薛平仲曰有卜而後有祝有祝而後有史祼之冥冥之幽而載之昭昭之顯天理人事相為貫通此小祝巫史之所由敘次記月令曰乃命大史守典奉法司天日月星辰之行又曰大史執簡記奉諱惡此蓋夏商之遺制而成周所以分之以小史别之以馮相保章而大史實總之王氏詳説曰禮記玉藻有左史書動右史書言是記有左右史然以左傳考之左史即大史右史即內史襄二十五年傳載大史書崔杼之事非書動乎僖二十八年載王命內史䇿命晉侯之事非書言乎書曰大史友內史友是之謂也禮庫曰古者史官不易業不兼官不二事如周之史佚魯之史克晉之史蘇史黯史趙史墨皆世世掌之後來亦略有此意如大史談之後有遷班叔皮之後有孟堅劉知幾之後有劉餗近日乃百官遷轉之地古人惟史官之流不易業卜官樂工亦世世掌之此其所以精歟掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治愚案典法則字説見大宰逆字説見小宰王昭禹曰建者作而立之也大宰以道揆者也大史以法守者也以道揆則所建者法之所自出以法守則所建者書之所自成史以掌官書為事所謂建特作而立其書以道制法有不與也鄭鍔曰典法則小宰二大宰之治司會考用財之數其書則建於大史書者不刋之典茍無其書雖大宰之尊亦無所稽考謂之建也冝哉李嘉會曰六典曰建法則不曰建何也如大宰之建六典蓋政賦以隨凶豐刑典以隨亂平故曰建今大史所掌者年歲尤當隨年歲以為設施所以必建也若八法八則有常法矣守之可也凡辨法者考焉不信者刑之鄭康成曰謂邦國都鄙以法爭訟來正之者易氏曰刑之以司約之法而刑之王昭禹曰上之制下以有法也其書皆藏於大史有疑焉則使辨於大史而考之不信者是謂非法其刑之冝矣林椅曰五官具見之法多有其目而無其數蓋周公宅百揆總其網於上其數在有司故也若大史辨法者考焉六官之法當盡在是矣愚案三代之時有議論而無誹謗有面辨而無腹非朝廷法度至使天下之懷疑者得以致辨而上之人又反覆考正之當是時下無撓法之心求質其所未安上無恃法之心求釋其所未信辨者既明考者既當起信險膚者猶肆其利口以阻亂吾之法則焉得不絶之然則未信者吾與之開導反覆不信者然後刑之則古人之忠厚可見矣凡邦國都鄙及萬民之有約劑者藏焉以二六官六官之所登黃氏曰劑不獨劵書詛祝質邦國之劑信凡有約者皆有劑司約所謂大約劑小約劑是也小宰聽賣買以質劑亦謂有劑可質鄭康成曰二猶副也賈氏曰以二六官者六官各有一通大史亦副寫一通也六官之所登者約劑相續不絶在後六官更有約劑皆副寫一通上於大史以藏之黃氏曰觀文意似多一六官字邦國都鄙萬民約劑六官既登之又藏於大史所以副二六官易氏曰司約以其約劑登于六官又以其副登于大史為六官之二王氏曰司約掌邦國及萬民之約劑若大亂則六官辟藏其不信者殺蓋六官所藏約劑有登于司約而藏焉者大史又藏焉則以二六官所藏及其所登者參之考之故也若約劑亂則辟法不信者刑之黃氏曰辟之為言正也大史掌邦法若約劑紛亂抵冒不可考則以法正之愚案法字疏家以為約劑不如黃氏作邦法辟字鄭鍔以約劑藏於故府啓籥乃見故以辟為開黃氏謂辟之為言正也不如作開辟若六官約劑亂則大史辟開所藏之二亦好書言后非民罔以辟四方正之以法是非曲直自不可掩然猶怙亂嚚訟刑不容巳易氏曰刑之與上經同鄭鍔曰邦國都鄙之君與所治之民上下相臨猶有待約劑為信考左傳鄭桓公與商人世有盟誓相信曰爾無我叛我無強賈母或丐奪爾有利市寶賄我勿與知然則國君與民有時而用約劑也藏於大史者蓋彼以聞於王朝之六官六官以登於大史其藏也所以二六官備遺忘若此等約劑邦國都鄙有之六官有之大史亦有之時移世變久而或亂君民相疑入而質證於王朝則大史辟啓舊藏觀其所登辟法以示之猶有不信者非不信吾法是終欲亂其約劑也可不待以刑哉正歲年以序事頒之于官府及都鄙賈氏曰中數曰歲朔數曰年一年之內有二十四氣正月立春節雨水中至十二月小寒節大寒中皆節氣在前中氣在後節氣一名朔氣中數一名中氣節氣有入前月法中氣無入前月法中氣匝則為歲朔氣匝則為年假令十二月中氣在晦則閏十二月十六日得後正月立春節此即朔數曰年至後年正月一日得雨水中此中氣匝此是中數曰歲中朔大小不齊不置閏則中氣入後月須置閏以補之正之以閏若今時作厯矣愚案此以歲年作朔數中數説鄭鍔曰周以建子為正而四時之事有用夏正建寅者用建寅謂之歲用建子謂之年事有用建寅者如正歲則讀法三歲大計羣吏之治之類事有用建子者如司稼以年之上下出斂法豐年則公旬用三日之類大史正歲與年而次序其事頒于官府都鄙使以次舉先後不失其序如月令所建十二月之事是亦併與歲而皆正也愚案此以周人建子兼用夏正説極是爾雅云周曰年夏曰歲經所謂正月之吉者建子之正年只讀法朝會等事用之而歲則便於事功然有合用周時之正亦有合用前王之正不可不正之以敘其事也豳風七月一詩稱一之日二之日與夫七月八月即此義孔子作春秋亦兩存之書四時而兼月用時王之正則建子書四時而不月則行夏之時而建寅如書二月無冰以夏正論之二月春暖無冰亦是時之常不知此二月乃用周正夏之十二月王昭禹曰王國之事時定矣然後可以及邦國故繼之以頒告朔于邦國頒告朔于邦國鄭司農曰頒讀為班班布也鄭康成曰天子頒朔于諸侯諸侯藏之祖廟至朔朝于廟告而受行之鄭鍔曰惡其不告也故不曰頒正朔而謂之告朔王昭禹曰玉藻曰諸侯皮辨聽朔于大廟吉月必朝服而朝則古人重朔如此文公四不視朔子貢所以欲去告朔之餼羊賈氏曰此及論語稱告朔玉藻謂之聽朔春秋傳謂之視朔視者君入廟視之告者使有司讀祝以言之聽者聽治一月政令所從言之異耳閏月詔王居門終月胡伸曰周天三百六十五度四分度之一日行天度之一故歲則周天月小餘之一故歲復減六積三歲未周之度與所減之日乃置閏鄭鍔曰治厯明時非置閏則四時無自而能定閏雖可以定四時然斗指兩辰之間天無是月也大史則詔王居門何邪以月令考之王者之位春則青陽之左右個夏則明堂之左右個秋則總章之左右個冬則玄堂之左右個閏月非常月也大史詔王居路寢之門其意以為門者往來不窮之地閏乃天道所由以變通也王者終月聽政於此示變通之意也王氏詳説曰明堂位曰大廟天子明堂其説出此故黃氏亦云明堂有四門路寢亦有四門閏月居門者聽朔於明堂中還處於路寢門中終月以閏非常月故無常月故無常居之處案玉藻曰閏月則闔門左扉立於其中言立云者是謂聽閏月之朔於明堂門中此云居門終月言居云者是謂聽朔而退居於路寢門中若夫非閏之月則聽朔於路門之外而寢於燕寢矣楊謹仲曰孟子曰明堂者王者之堂也是天子聽政之堂故有四門八窗七十二牖取其明也非獨以祀上帝而已今鄭以此居門為路寢之門疏復以為明堂路寢宗廟皆有五室十二堂四門而曰十二月聽朔於十二堂以為聽朔疑其為宗廟此既言居門終月非特聽朔可知況天子頒朔於諸侯藏之祖廟至朔告廟而受行之此諸侯事也今以天子居十二堂為聽朔可乎又曰若在明堂告事之時立行祭禮無居坐之處以為明堂無居坐之處疑其為路寢此既言居中門與月令居青陽大廟居青陽左右個同閏月不居大廟及左右個乃居中門則居明堂矣惟於宗祀明堂無居坐之處若平時聽政焉得無居坐之義李嘉會曰十二月天子各有所居者月令之説月令吕不韋集諸儒而作三代無明文今曰詔者得非閏月不常大史詔王居門以應之以順上天裁成制度之義其餘則有常居不在所詔矣王昭禹曰王之居門凡以應天而已終月者所以成其事也大史則詔王而已易氏曰於正歲年而言序事則知官府都鄙以敬民為主於頒而言告朔則知邦國以敬王為主於詔王居門而言終月則知王者以敬天為主大祭祀與執事卜日鄭康成曰執事大卜之屬與之者當視墨易氏曰大祭祀之禮有所謂羣執事此言與執事卜日則卜日之執事而已大宰大宗伯則涖卜之執事所謂大夫占色是也大卜卜師占人等則卜龜之執事所謂卜人占坼是已大史以下大夫為春官之屬不敢言帥而言與者史與之占墨故也若六官以下皆有事於祭祀則謂之羣執事戒及宿之日與羣執事讀禮書而協事賈氏曰戒謂散齋七日宿謂致齋三日當此日與羣執事預祭之官讀禮書而協事恐事有失錯物有不供故也王昭禹曰祭之事繁矣具載於禮書之文故讀禮書按其文而協其事之所當共也鄭康成曰協合也祭之日執書以次位常易氏曰祭之日羣執事之位亦不一矣亦皆見於禮書之所載大史執書以辨其位故曰次位常賈氏曰執書謂執行祭祀之書若今儀注以次位常者各居所掌位次此一定常行不改故云常也鄭康成曰謂校呼之教其所當居之處鄭鍔曰有受誓之時有宿齋之時合羣有司讀禮書以示之使無事不協至祭之日執前日所讀之書以次序其祭位所常行之事而已辨事者考焉不信者誅之鄭康成曰謂抵冒其職事鄭鍔曰有來辨其事者用舊書以考焉有不信者誅之告之不信則誅責之所謂國有常刑也王昭禹曰法者上之所以制下辨而不信其罪重故刑之事者下之所以事上辨而不信其罪輕故誅之大會同朝覲以書協禮事鄭鍔曰大朝覲會同列國君臣咸在有大國之人有小國之人合五等之圖案禮書以示之使無國不協鄭康成曰亦先習録之也及將幣之日執書以詔王賈氏曰將送也幣謂璧帛之等王者與諸侯行禮之時大史執禮書以告王使不錯誤李嘉會曰讀書則與衆同讀參所見以共協其事也執書則執書之常然以定其位常之不可易也以書則即禮儀之等級品物之髙下一皆聽之於書而已如是既定然後執書以詔王在上者不可得而私在下者不可得而變君臣上下一由乎規矩典常之內此書者史之所掌也大師抱天時與大師同車鄭司農曰大出師則大史主抱式以知天時處吉凶史官主知天道故國語曰吾非瞽史焉知天道春秋傳曰楚有雲如衆赤鳥夾日以飛楚子使問諸周大史大史主天道王氏曰謂史抱知天時之器項氏曰知天之書易氏曰天時兵家趨吉避凶之書方師之出也筮人之職固已有巫環之筮環人即其筮以為致師之舉孟子所謂環而攻之必有得天時者鄭鍔曰用兵之際欲卜勝負則上觀天時下聽軍聲大史主厯數者大師主吹同律者其職雖異其事則相須必使大史抱天時之式與大師同車共載庶上觀天時以參所聽之聲既審且達勝負立決也李嘉會曰大史以厯知天大師以樂知兵彼此參合則吉凶可以明矣大遷國抱法以前鄭康成曰法司空營國之法抱之以前當先王至知諸位處鄭鍔曰國或大遷如盤庚遷亳成王宅洛之類抱遷國之法以前蓋相其隂陽而定宗廟社稷之位不可無故常之法大喪執法以涖勸防易氏曰法者六引六紼之法鄭司農曰勸防引六紼愚案説見喪祝王昭禹曰喪祝掌大喪勸防之事大史執法以涖之而已遣棄戰反之日讀誄鄭康成曰遣謂祖廟之庭大奠將行時也人之道終於此纍其行而讀之大師又帥瞽廞之而作諡瞽史知天道使共其事言王之誄諡成於天道賈氏曰曽子問云惟天子稱天以誄之彼注引公羊制諡於南郊瞽史既知天道又於南郊祭天之所稱天以誄之是王之諡成於天道若然先於南郊制諡乃於遣之日讀之葬後則稱諡黃氏曰瞽誄其德行故作諡史記其言動故讀誄凡喪事考焉鄭康成曰為有得失小喪賜諡黃氏曰小喪王子弟之喪鄭謂卿大夫非也卿大夫賜諡讀誄小史掌之賈氏曰大史賜之諡小史讀之故小史職云卿大夫之喪賜諡讀誄卿大夫將作諡之時其子請於君君親為之制諡諡成使大史特往賜之小史至遣之日往為讀之知義然者見禮記檀弓云公叔文子卒其子戍請諡於君凡射事飾中舍音釋算執其禮事賈氏曰飾中者謂飾治使潔淨也項氏曰中以盛算算以記中算多則勝方射之時設算於中大夫兕中士鹿中皆取服猛之義賈氏曰鄉射大射算皆於中西設八算於中內耦升將射大史取中之八算執之待射中則更設於中待第二耦射第三耦已下皆然鄭鍔曰諸侯之制射於國則皮樹中於郊則閭中於境則虎中中盛以算其制尺有二寸則知天子之射中或以皮樹或以閭虎射中則釋算以記其中之數舍釋也大史釋之者職當記注故以記其中之數也疏謂射之禮事者射之先則燕禮也余以為言執其禮事則非特燕禮可知凡射時之升降揖遜皆禮事也書掌於此則禮事冝執於此守而勿失者謂之執黃氏曰射人與大史數射中射人主皮大史治禮小史中士八人下士十有六人府四人史八人胥四人徒四十人掌邦國之志奠音定繫户計反世辨昭穆若有事則詔王之忌諱鄭鍔曰或謂小史掌邦國之志外史掌四方之志司農謂邦國之志乃春秋傳所謂周志國語所謂鄭書之屬康成謂四方之志若魯之春秋晉之乘楚之檮杌邦國與四方初無以異分為二官之所掌二鄭亦分為二説何邪曰不然四方之志乃周志鄭志之類若夫邦國之志非雜記邦國之事乃志諸侯所出之世繫與其廟祧昭穆之志如魯出於周公鄭出於桓公晉出於叔虞世繫綿逺傳序寖多昭穆久而或亂王朝亦有志以記之小史掌其志奠其本繫之所出與世數之逺近鄭司農曰繫世謂帝繫世夲之屬小史主定之瞽矇諷誦之又辨其昭穆若其國有事則詔告之以王朝之忌諱使無犯焉易氏曰王朝有事如賔祭之禮則小史詔王之忌諱忌謂先王終日諱謂先王之名詔王於行禮之時使之知避是數者小史專之所謂邦國之志如此説者疑所奠之繫世所辨之昭穆非諸侯國之事殊不知王之繫世與昭穆非小史之所能掌以經考之小宗伯辨廟祧之昭穆又掌三族之别以辨親踈則王朝屬籍所付不輕矣後世立宗正一司以掌玉牒此豈小史事今云掌邦國之志又云詔王之忌諱王豈庸不知有事之時始以詔王此何理哉陸佃曰秦興滅學小史職廢繫世昭穆失其本宗及司馬遷約世本修史記因周譜名世家乃知姓氏所由出至賈弼有姓氏簿狀賈希鏡有姓氏要狀唐李守素有肉譜郭沖有姓系録路敬韋述之徒傳之不一惟辨昭穆使不相亂昏姻得之而有别親踈得之而有屬則姓氏之學不可忽國語教之世為之昭明德而廢幽昏以怵懼是則姓氏又可以示天下後世之勸戒姓非天子不可以賜氏非諸侯不可以命大祭祀讀禮法史以書敘昭穆之俎簋賈氏曰此大祭祀唯謂祭宗廟三年一祫之時有尸主兼序昭穆俎簋也鄭鍔曰大祭祀大史讀禮書矣小史則讀禮法以戒百官也禮書者祭祀之典故禮法者祭祀之戒令既讀法則令其官八人以禮書敘次昭穆之俎簋簋以盛黍稷俎以載牲體昭穆有尊卑俎簋之數有多寡案典故以敘之李嘉會曰因昭穆而敘之不致典祀而豐于昵黃氏曰大史之屬史八人史掌書以書敘昭穆之俎簋謂此史也小史主定繫世辨昭穆故并史事敘於此大喪大賔客大會同大軍旅佐大史凡國事之用禮法者掌其小事鄭鍔曰賔客會同之事則為大史之佐小事禮法者已得專逹之卿大夫之喪賜諡讀誄鄭康成曰其讀誄亦以太史賜諡為節事相成也馮音慿相息亮反氏中士二人下士四人府二人史四人徒八人鄭康成曰馮乘也相視也世登髙臺視天文之次序天文屬大史月令曰乃命大史守典奉法司天日月星辰之行宿離不貸鄭鍔曰古者天子有靈臺諸侯有觀臺以占視天象其臺巍然而髙則觀天者得以乘髙而相視之故名曰馮相氏鄭鍔曰質之堯典四時平秩之文此馮相氏乃羲和之職然只用中士為之疑其職卑其實不然帝堯之世止羲和四子耳周家正歲年頒告朔有大史以下大夫二人為之又有馮相氏又有保章氏殆不一職官尤詳備若此奚可以尊卑論邪掌十有二歲鄭康成曰歲謂太歲歲星與日同次之月斗所建之辰樂廣説歲星與日常應太歲月建以見然則今厯太歲非此也愚案疏注歲星太歲之説乃古今成説然猶有未明者蓋歲星逆行於每月日月所會在天之十二次自丑而子自子而亥戌者也大歲則順行於每月斗柄所建在地之十二辰自子而丑自丑而寅卯者也凡斗柄所建即是太歲但斗柄每月移而大歲則一年始移耳王氏詳説曰在天有歲星在地有太歲歲星右行太歲左行在斗曰星紀在女曰玄枵在危曰娵訾在奎曰降婁在胃曰大梁在畢曰實沈在井曰鶉首在柳曰鶉火在軫曰鶉尾在氐曰壽星在心曰大火在箕曰析木此所謂歲星右行在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戍曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若此所謂太歲左行左行者謂自東而南自南而西自西而北右行者謂自北而西自西而南自南而東至於日月之行猶是也天道左旋而經星從之日體右轉而歲星從之故日行北陸為冬西陸為春南陸為夏東陸為秋然歲星行天一歲移一辰率百四十四歲而跳一辰若再跳則厯又改矣春秋保乾圖曰三百年斗厯改憲者以此十有二月賈氏曰十有二月者謂斗柄月建一辰十二月而周也鄭鍔曰正月為陬二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為玄十月為陽十一月為辜十二月為塗是謂十二月之位十有二辰賈氏曰十有二辰者謂子丑寅卯等劉執中曰謂所舍之次在天為次在地為辰十日賈氏曰十日謂甲乙丙丁等二十有八星之位賈氏曰二十八星謂東方角亢氐房心尾箕北方斗牛之等位者總五者皆有位處五者皆依四方四面十二辰而見辨其序事以會天位鄭鍔曰歲月辰日星在天之定位各推其所在欲人之行事不違乃辨其先後之序以會之如春則平秩東作欲合乎日中星鳥之時夏則平秩南訛欲合乎日永星火之時以至民之析因夷隩國之寅賔寅餞凡事之敘皆求合乎天是之謂會堯典之平秩所以謂之辨秩者正此所謂辨其序事王氏詳説曰伶州鳩對周景王曰武王伐商歲在鶉火月在天駟日在析木之津辰在斗柄星在天黿此所謂五位案武王伐商以十一月二十八日戊子於夏為十月是時歲星在張故曰鶉火房為駟月行至房故曰天駟日行至箕故曰析木戊子後三日為周正月朔日月會於斗故曰斗柄是月辰星始見於玄枵故曰天黿玄枵一名天黿歲日月星辰此五位也以會天位亦猶是歟黃氏曰堯典厯象日月星辰厯推其數象占其行大史掌厯馮相氏象之日月星辰皆動也雖有常度而不免或贏或縮其差常在毫釐渺忽之間積而漸逺故古人有厯則有象隨而正之歲星大約一歲歷一次十二歲而小周故以位定歲歲十二月日與月合於十二辰是為朔相直為望此月之位故以定十二月周天三百六十五度日行一度自甲至癸為十日天運一日一周二十八星每月更迭昏旦中日日而差積十日為一旬積三旬為一月積十二月為一歲此日之位故以定十日大史正歲年以序事馮相氏於此平辨之以合於歲月日之位而知厯之精疏中否此其大法也冬夏致日春秋致月王昭禹曰日為陽而實故致於長短極之時月為隂而闕故致於長短不極之時鄭康成曰冬至日在牽牛景丈三尺夏至日在東井景尺五寸此長短之極極則氣至冬無愆陽夏無伏隂春分日在婁秋分日在角而月弦於牽牛東井亦以其景知氣至否陸佃曰黃道北至東井南至牽牛東至角西至婁夏至日在東井而北近極髙閎曰夏至日去極六十七度則晷短而表景尺五寸冬至日在牽牛而南逺極髙閎曰冬至日去極百十五度則晷長而表景丈三尺春分日在婁秋分日在角而中於極星則晷中而表景七尺三寸夫日陽也陽用事則日進而北晝進而長陽升故為溫為暑隂用事則日退而南晝退而短隂勝則為涼為寒若日失節於南則晷過而長為常寒失節於北則晷退而短為常燠此四時致日之法也月之九行在東西南北有青白赤黑之道各二而出於黃道之旁立春春分月行青道立秋秋分月行白道立冬冬至北旋黑道立夏夏至南從赤道古之致月不在立而常在二分不在二分之望而常在弦者以月入八日與不盡八日得隂陽之正平故也然日之與月隂陽尊卑之辨若君臣然觀君居中而逸臣旁行而勞臣近君則威損逺君則勢盛威損與君異勢盛與君同月逺日則光盛近日則光缺未望則出西既望則出東則日有中道月有九行之説蓋足信也劉迎曰馮相氏但言十二月十日二十有八星之位而無土圭之文此以二至長短之極與二分之中而致日月耳不必謂以土圭致日景也以辨四時之敘鄭鍔曰辨字本亦作辨説者謂見景之至否可以辨説其晷刻以正閏餘使四時之敘無有差忒黃氏曰夏至日景極長冬至日景極短春秋分平日景平則日亦平致言長短與平各至其數四時之氣定矣於是而置閏所謂以閏月定四時成歲也保章氏中士二人下士四人府二人史四人徒八人黃氏曰推步雖精星辰日月之動晷度從違吉凶之證者焉則又設官以觀占之名曰保章氏保安也章明也占天象以詔救政務在保安時變章明天意不為怪誕誑幻鄭康成曰保守也世守天文之變鄭鍔曰詩云倬彼雲漢為章于天蓋言星辰昭回于天之章其著象也章章可觀為國家者仰察其垂象之文可知為政之得失劉氏曰馮相氏考諸厯數以知天道者保章氏占於天象以察時變者也鄭鍔曰二官俱以氏為名意以為天象固非常人所能知必天文之家父祖子孫世守其職始知其詳也名官曰氏欲世守之掌天星以志星辰日月之變動以觀天下之遷辨其吉凶王昭禹曰掌天與星所謂日月之變動五雲之物十有二風皆天也所謂星辰分星者皆星也劉執中曰掌天星謂占視之志者記載其變動之順逆以知天下之遷易而辨其吉凶之小大淺深以詔於為國者也鄭康成曰星謂五星有贏縮圜角賈氏曰天文志云歲星所在其國不可伐可以伐人超舍如前曰贏贏為客晚出為縮縮為主人故人有言曰天下太平五星循度無有逆行云圜角者星備云五星更王相休廢其色不同王則光芒相則內實休則光芒無角不動搖廢則少光色順四時其國皆當也辰日月所會項氏曰辰有至否日有薄食暈珥賈氏曰此即眂祲職文月有盈虧朓側匿之變賈氏曰月有盈虧即禮運三五而盈三五而缺也朓側匿之變者五行傳云晦而月見西方謂之朓朔而月見東方謂之側匿七者右行列舍天下禍福變移所在皆見黃氏曰二十八星十二辰隨天左旋日月星辰右旋天日月五星皆動物也觀諸天星而星辰日月之動為可志矣堯典日中宵中日永日短蓋以其星志之不曰天之動而曰星辰之動天之動不可見也不言五星日月五星為七政從可知也星辰日月之動有疾徐贏縮循軌不循軌日月薄蝕五星陵犯皆於此乎占之天下之遷遷變也變則其占不可常梓慎論孛曰夏數得天火作宋衛陳鄭當之占歲曰歲在星紀而淫於玄枵蛇乘龍宋鄭必飢禆竈曰歲棄其次而旅於明年之次以害鳥帑周楚惡之星孛大辰而占在宋衛陳鄭失次在星紀而占在宋鄭周楚是皆所謂遷也夏數得天蛇乘龍害鳥帑皆其占法注家雖附會其説然其所以用之者終不能知也歲失次梓慎禆竈之占亦異其後崔浩占熒惑亦曰星亡必以庚辛秦也是當入秦此猶得古人遺法循軌為吉不循軌為凶又有時變如當食不食當陵犯不陵犯為吉暈珥朓匿圜角失色皆非晷度之正為凶以星土辨九州之地所封封域皆有分扶問反星鄭康成曰星土星所主土封猶界也劉執中曰角亢氐兖州房心豫州尾箕幽州斗牛女揚州虛危青州室壁并州奎婁胃徐州昴畢冀州觜參益州井鬼雍州柳星張三河翼軫荆州薛氏曰星土之説不明舊矣有為北斗之説者以謂七星主九州若雍屬魁星冀屬樞星兖青屬機星徐揚屬權星荆屬衡星梁屬開星豫屬搖星之類是也有為五行之説者以為十二次主九州若降婁玄枵主於岱歲星位焉鶉首實沈主於華太白位焉之類是也以今考之則不然星土蓋分星之十二次分屬九州十二次雖分十二土然合而言之為九州而已成周盛時諸侯封域棊布九州大者百里次者七十里小者五十里附庸小國又不能五十里者固不容皆有分星之次大率所封之分星皆以九州舉之自春秋之時不明九州之星土即分星之所次至韓趙魏三家分晉而堪輿之説起初分十二諸侯上配天文十二次彼戰國時強者陵弱大者并小其分疆錯壤雖連亘數千里然侵奪去取初無定論果能盡合於天文之度乎況星紀於天文在東北乃以當東南之吳越鶉首於天文在東南乃以當西北之嬴秦周都關河天地之中而鶉火則南方之次齊都營丘實負東海而玄枵則北方之次止分十二國猶不當天地之度況乎國千八百欲盡以天文分星槩之邪賈氏曰歲星或西或北不依國地所在以古之受封之月歲星所在之辰屬焉耳先儒謂九州中諸國分星其書亡矣堪輿雖有郡國所入度非古數也謂堪輿非古數是也謂亡其分星之書則未之思矣豈知諸國之分星即分其九州之星土以為分星乎吾固謂十二次之星麗於九州則為星土分於天下諸侯則為分星何則青州之星土則玄枵也齊之分星屬焉揚州之星土則星紀也而吳越之分星屬焉以至兖之壽星荆之鶉尾皆星土而為鄭與楚之分星雍之鶉首冀之大梁皆星土而為秦與趙之分星若夫梁州之實沈其地入於雍豫則星土亦分於雍豫而為豫之分星徐州之降婁其地入於青兖則星土亦分於青兖而為魯之分星今以傳論之左傳昭公十年有星出于婺女鄭禆竈曰今兹歲在顓帝之墟薑氏任氏實守其地釋云顓帝之墟謂玄枵也則知玄枵為齊之分星而青州之星土也左傳昭公三十二年夏吳伐越晉史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶釋云歲在星紀故知星紀為越之分星而揚州之星土也爾雅云析木謂之津箕斗之間漢津也釋云箕龍尾斗南斗天漢之津梁為燕分而幽州之星土也左傳襄公九年曰陶唐氏之火正閼伯居商丘祀大火而火紀時焉故商主大火宋為商之後故知大火為宋分而豫州之星土也昭公十七年星孛于大辰及漢梓慎曰漢水祥也衛顓頊之墟故為帝丘其星為大水此娵訾為衛之分星而冀州之星土也襄公二十八年梓慎曰歲在星紀淫于玄枵蛇乘龍龍宋鄭之星故知壽星為鄭分而豫州之星土也鄭語周史曰楚重黎之後黎為髙辛氏火正則知鶉尾為楚之分左傳昭元年鄭子産曰遷實沈于大夏主參唐人是因知實沈為晉分而并州之星土也皆分星之見於書傳可考也然諸國之封域既列於九州之內則諸國之分星即九州之星土尚何泥於北斗五行之説乎以觀妖祥黃氏曰日月五星其動者二十八星不動者二十八星各有所主後鄭言古數之存者十二次之分而已唐僧一行分星度豈非堪輿遺學歟其鑿亦甚日月五星占其動故言觀天下之遷二十八星占其不動故言九州之地皆有分星鄭云主用客星彗孛之氣為象恐非彗孛五星之變則其動者常星自有變當占王昭禹曰以觀妖祥則分星所主在地者妖祥兆於天以所主之分星觀之則九州之妖祥灼然可見矣以十有二歲之相息亮反觀天下之妖祥愚案十二歲説見馮相氏鄭鍔曰歲星之行十二歲而周天是謂十二歲色欲明光潤澤赤而角則其國昌赤黃而沉其野大穰故其占色相色相變異則天下之妖祥皆可得而知歲星所在其國有福春秋之際越得歲而吳伐之遂受其凶左傳言歲在顓帝之墟居其鶉首而有妖星焉告邑薑也視其相則又觀其有妖星也黃氏曰先儒説歲星太歲為祥獨不言相為何義然觀天下之妖祥不獨以分土占之也星書言歲為五星長君象其應在天下梓慎禆竈之占可見劉執中曰十有二歲則大歲也是謂歲隂木星之神大歲左行於地歲歷一辰玄枵之歲在子星紀之歲在丑而歲常右行於天而居其舍也所謂相者木之相火星也火之相土星也土之相金星也金之相水星也水之相木星也歷十二年而五星更生星循度或合於一舍為吉祥三合兩合贏縮流逆失度則為兵災水旱凶札各如其占焉以五雲之物辨吉凶水旱鄭康成曰物色也視日旁雲氣之色鄭司農曰以二至二分觀雲色青為蟲白為喪赤為兵荒黑為水黃為豐故春秋傳曰凡分至啓閉必書雲物為備故也故曰凡此五物以詔救政降豐荒之祲象鄭康成曰降下也知水旱所下之國李嘉會曰氣為祲形為象王昭禹曰言降豐荒之祲象則與視祲所謂敘降同矣蓋下其説於國使民知之焉故謂之降事未至而使之備患未生而使之防先王所以仁民也可謂厚矣以十有二風察天地之和命乖别之妖祥王昭禹曰十有二風風之生於十二辰之位者也蓋天地六氣合以生風艮為條風震為明庶風巽為清明風離為景風坤為涼風兊為閶闔風乾為不周風坎為廣莫風八風本乎八卦傳曰舞以行八風謂此也四維之風兼於其月故艮為條風而立春亦曰條風巽為清明風而立夏亦曰清明風坤為涼風而立秋亦曰涼風乾為不周風而立冬亦曰不周風故八風變而言之又謂十二風也李嘉會曰八卦主八風惟辰戌丑未之月有立春立夏立秋立冬在其中故風無定風今注云十二風意者立春在前月則兼前月之風在後月則兼後月之風立夏立秋立冬皆然或云於乾坤艮巽既有定名之風安得云四立無定風蓋四立有在前月法有在後月法以卦氣所屬參酌之則可知矣十二月之風各應其月為天地之和不然則為乖為别而妖祥可得而命劉迎曰十二風以十二月占之如風自東來為震名明庶南來為離名景風風蓋有八以十二月占之則為十二風先儒以十二辰皆有風吹律以知和否若吹十二律以知十二風則十二歲之相五雲之物又將吹何而觀之此穿鑿之説鄭鍔曰至治之世天地之氣合以生風風從律而不姦則氣和可知風氣不應由隂陽不和不和為乖不應為别見其乖别可以命其妖祥王昭禹曰命以告人使之知所備王氏曰乖别在人妖祥先見於風亦人與天地同流通萬物一氣故也豐荒之祲象言降乖别之妖祥言命皆命而降之命謂名言之凡此五物者以詔救政訪序事賈氏曰五物謂掌天星以下王氏曰詔以詔上訪以訪下鄭康成曰訪謀也見其象則當豫為之備以詔王救其政且謀今年星天時占相所冝次序其事黃氏曰序事即太史序事星辰日月有變動則訪其事當行當止以承天意是為救政劉執中曰序事者馮相氏以厯數而考之者也故以所志之變動訪於厯數者以稽合而使王信之則恐懼生而救政出矣鄭鍔曰占辨於方萌之始詔人君以救災應變之道而已救災者必貴乎有政應變者不可以無事以政而救災者王之職也故行應變之事當先後之序必詢訪然後知易氏曰政者國之大本詔救政於上則人君知修省之道事者有司之常職訪序事於下則人臣知警戒之意李嘉會曰救政詔於上序事訪於下五物之變可以感通君上之心而盡臣下欲言之情後世因災異以求直言近之周禮訂義卷四十四
