body:
  text: 周禮訂義卷七十四宋王與之撰㮚氏為量王昭禹曰栗之為果有堅栗難渝之意先王之為量使四方觀之以為則萬世守之以為法以立天下之信而無致渝焉所以名官謂之㮚氏鄭鍔曰言王之堅則曰縝密以栗言風之急則曰二之日栗烈婦人之贄用栗取其謹飭而堅守也改煎金錫則不耗鄭鍔曰量所以量多寡摩於物者其敝必易故必改煎金錫以為之使之縝密而堅實然後磨而不磷堅而不耗改煎者煎而又煎則消融者去已盡矣其所留者皆其精而不能減耗者矣六分其金而錫居一謂之鐘鼎之齊量與鐘鼎同齊而不同工者豈非以其用金錫又有改煎之法故歟不耗然後權之權之然後準之趙氏曰準謂既鍛煉了金錫令平正之齊其塊之大小也鄭鍔曰準是準其金錫六分金一分錫準其多少也準平也知其輕重又欲平其多寡毛氏曰將煎金錫固當稱之而不能無消釋既煎矣又從而稱之準之然後量之鄭鍔曰準以平其多寡量乃量其多寡以納於模範之中疏謂假令為兩釜必為兩模其說正謂此賈氏曰量謂既準訖量金汁以入模中鑄作之時趙氏曰此只是說金錫材料權準言未鑄時量言正鑄時皆是稱度金錫多寡上下文可覆量之以為釜音甫深尺內方尺而圜其外其實一釜其臀音豚一寸其實一豆其耳三寸其實一升趙氏曰釜正是量之身釜形深一尺內方一尺其外卻圓臀量足也其砥深一寸耳量兩耳也深三寸釜處中正為量身注謂內方尺者據釜裏面向下處圓其外者外謂向上口脣處繞口圜之又厚以為之脣耳在兩旁可以手舉臀為量底正釜之下著地者釜仰以受物臀覆以受物耳疏謂覆之所受解謂仰以受物以理推之恐是仰以受物蓋臀被釜蓋了不得不覆以受物耳在上無所遮蔽何用覆以受物內方者不變之體外圓者無窮之用鄭鍔曰覆釜用砥砥深一寸可容一斗覆釜用耳耳深三寸可容一升王氏曰內方而外圓則天地之象一寸三寸則隂陽竒耦之義毛氏曰量之為器有自十而登者若班固所稱是矣有自四而登者若左傳所稱是矣今記所載亦以四為節趙氏曰周用四營之數四籥為合四合為升四升為豆四豆為區四區為釜其實一釜則四區計六斗四升也其實一豆則四升也其實一升則四合也釜為六斗四升其說不可易矣彼云自籥而斛皆以十衍之者乃西漢之量觀律厯志言自籥而斛皆以十計之殆倍半於周量之數豈可與㮚氏同論周用指尺八寸為量漢用秬黍十寸為量大小本不同禮書亦謂周以釜為量止於三升豆釜是也漢以斛為量為法備於籥合升斗斛是也法止於三故自升而上登之以四則升四而豆豆四而區區四而釜故釜六斗四升法備於五故自合而上登之以為升升十為斗斗十為斛故斛十斗周制旁為升臀為豆腹為釜漢制左耳為升右耳為合籥至於豆釋疑謂古者或以木或以瓦木豆實四升醢人言四豆之實是也瓦豆實十升旊人言豆實三而成斛是也梓人所謂豆亦瓦豆爾臀之實當與木豆同數然亦不必如此說蓋豆止實四升周禮中並無一斗之豆籩人掌四籩之實注謂籩如豆其實皆四升醢人掌四豆之實與旊人豆實三而成斛注亦謂豆實四升如舍人共簠簋注云豆四升簠簋實三豆皆一斗二升惟梓人注改豆作斗此乃注之誤禮書云一獻而三酬非謂三畨酬謂獻以一升而酬以三升也并而計之為四升觀此則㮚氏之豆實四升明矣但耳實一升而升之中則别合與籥徑十分左右不必問也重一鈞陳用之曰三十斤為鈞積萬有一千五百二十銖聖人衍易以萬有一千五百二十當萬物之數蓋萬物之情參差不齊至於鈞而止量以量物不可偏也故其重取鈞然則權度之用不然乎曰權衡量其法始於權而成於量量如此他可知矣薛氏曰㮚氏之釜深尺內方尺而圜其外其重一鈞律厯之斛亦方尺而圜其外其重二鈞其方尺圜外則同其所容之多寡所權之輕重不同者以尺有長短之異也周人璧羡之制從十寸橫八寸皆為度尺釜亦如之則外深尺者十寸之尺也內方尺者八寸之尺也自方八寸而八之則為方六十四寸漢無八寸之尺斛內之方皆十方也故言方尺而不言深尺自方十寸而十之則為百寸此其實所以不同也故周量方尺而狹故其實一釜而重一鈞漢量方尺而大故其實一斛而重二鈞二鈞猶不失周人權衡之制而尺之長短則差矣後世不特尺之差而併失其權衡之制晉氏之遷亡其彞量後世小大之制增損不同在隋以三升為一升三兩為一兩一尺二寸為一尺開皇十七年校正張文收所定律云以常用度量校之尺當六之五衡皆三之一此隋之制也唐用隋制本朝因之著為令式李昭議樂乃用太府尺自為其法六其籥為合十合為升十其升為斗九升五合得太府量斗十斗為尺校大府尺得七寸八分六釐權衡一斤得大府七兩二十一銖半弱則古之權衡度量至漢而失隋而增今而倍之范鎮樂書云開皇官尺今之太府尺是也今之權衡亦古之權衡也臣今所鑄編鐘之黃鍾重半鈞周之釜重一鈞漢之斛重二鈞其聲皆中黃鍾乃知尺與權衡相傳至今不變唯量有不同今之太府量比古量半之夫史書以開皇變古之度量衡而增其數鎮以聲合黃鍾而謂隋尺為古尺不知鎮所謂聲合黃鍾者果真與古合乎古人之制失於漢增於隋而倍於今鎮乃認今尺為隋尺以隋尺為古尺故謂今之黃鍾重半鈞而周之釜一鈞不知周公之一鈞即今之半鈞也量比古得其半其半即古人之全也權度既失尚足以言量乎趙氏曰一市之間用量亦衆矣若如㮚氏之制民得量而用不亦難乎又況三十斤之重何以運用而舉之乎又升合釜萃於一器何以分别而量物乎以理究之意者周時止鑄一量藏於王府又鑄數量每侯邦則豫一量亦使藏於侯府周公頒度量是制定於上使民倣其制而自為量欲為升則放王府之釜耳欲為斗則倣王府之釜臀俾多寡之數須依王府量若民妄自增損或侯邦家量貸公量收則以王府之制正之或量法亡則依此制亦可再舉行舜巡狩同度量是也所以下文繼之以永啓厥後兹器維則其聲中黃鍾之宫王昭禹曰黃鍾為律之本而宫為五聲之綱量之所制其本起於黃鍾之籥其成聲也又復於黃鍾之宫豈非以天下之法於此乎出而五則之法於此乎成歟毛氏曰十二律以黃鍾為首五聲以宫為君必取黃鍾之宫為之聲者明制器之出乎君故也非特此也律首黃鍾得黃鍾之聲可以制餘律聲出於宫得宫可以正四聲先王寓其聲於釜者亦猶寓度於璧羡是又藏禮於器之意薛氏曰古者神瞽考中聲而制量則知量法本起於黃鍾之籥蓋黃鍾中聲也其始以秬黍為之容故其實一籥律長九寸而餘律皆起於此是以五度之法皆起於其長五權之制皆起於其重五量之容皆起於其籥而衆法具焉量之所容既起於黃鍾之籥則四籥而合四合而升四升而豆四豆而釜其制一定初無毫釐之差則量之成而中黃鍾者亦自然而然也況乎五度皆起於黃鍾之長而釜方尺深尺有合乎黃鍾之度五權皆起於黃鍾之重而釜之重一鈞有合乎黃鍾之權量之成而中黃鍾也宜矣鄭氏以黃鍾之宫為應律之首不知其制惑矣鄭鍔曰聲無形而寓於器聲亡而器存則聲可復矣故得度量權衡者可以制律而調律者亦可以制度量權衡此量起於律而聲欲中律之首之意槩而不稅陳用之曰槩平也謂斗槩以竹木為之五量資之以為平月令仲春正權槩管子曰釜鼓滿則人槩之但欲平而已非有取之之意趙氏曰謂㮚氏之量是官量在司市所以勘驗諸廛而不容加也易氏曰槩所以平物也不稅所以公天下也後鄭以為守斗斛者之稅非謂斗斛有稅也以斗斛受其稅耳不然則角人之齒骨以度量受之豈皆謂之稅哉以此量槩之平通用於民亦通用於官此所以為不稅其銘曰時文思索允臻其極鄭康成曰銘刻之也賈氏曰謂在模上刻之鄭康成曰時是也允信也毛氏曰極至也言文德之君有經緯之文故思索能造其理之至處也揚子曰存神索至此之謂也易氏曰聖人制量本乎黃鍾之籥五權五度六律六吕皆始於此而禮樂寓焉非時文之君何足以探制作之理中庸曰有其位而無其德不敢作禮樂有其德而無其位不敢作禮樂德與位兼者非時文而何惟時文之君內忠於心外索於物信臻乎是理之極鄭鍔曰古者作為銘文皆所以詔後世非苟眩文以為工此銘量之人自謂作是銘文以銘此量非苟為銘蓋深思精求所以制作之道知其為是量也允信乎臻於至極制作之用至矣盡矣後世不可復加矣王昭禹曰先王以天下之法所以摧壞而不明者常自器始所以僭差而不一者常自量始五量之法苟或亡焉則後世無所取則故為之銘焉所以識之使天下後世由是文而思索以通其意則五量之法信歸於中而有以庇民也嘉量既成以觀四國王昭禹曰嘉者美之至而合禮之善也五量既成其為器也實以藏禮其為禮也實以教中故謂之嘉量鄭康成曰以觀示四方使放象之陳用之曰嘉量既成於是以觀四國俾咸用之觀與中正以觀天下觀兵於盟津之觀同觀四國使同其用則雖有私智無所施也永啓厥後兹器維則鄭康成曰永長也厥其也兹此也又長啓道其子孫使法則此器長用之鄭鍔曰啓如啓迪我後人之啓易氏曰則謂五則之則非特後世五量取則於此如五權之輕重五度之長短六律六吕之髙下亦皆取則於此王昭禹曰嘉量既成以示四國則四國莫不於是而取中以示後世則後世莫不於是而取法然則先王出之以內宰掌之以司市一之以合方同之以行人凡以觀四國而使之有所則焉故也昔舜之巡狩所以同度量孔子亦曰謹權量而四方之政行焉凡以天下之法於此為重故也後世變亂是則者乃以公量收私量貸此陳氏所以竊民譽莊周欲剖斗折衡而民不爭者亦有激而云凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也杜氏曰狀鑄金之形狀賈氏曰此鑄冶所候烟氣以知生熟之節趙氏曰成周鑄量須用金錫相和欲堅明不裂也此獨言金者蓋金有三品銀銅鐵錫皆謂之金鄭鍔曰欲鑄金以為器必先消煉之以求其精消煉之精粗必觀其氣候氣候者消煉之煙也五行木生火火生土土生金然則金者稟氣自東方之木託形於中央之土青者木之色黃者土之色木猶金之父土猶金之母而白者西方之色乃金之本質也黑濁者陰陽不辨之氣也始而煎之則黑濁之氣生蓋金錫相雜兩者交戰於烈火之熖故氣之上達者當然也是氣竭則黃白次之蓋金土之氣始見及其久也黃白之氣竭則所以托形為母者盡矣然後青白次之是則受氣之父與本質皆見矣久而青白之氣竭而青氣獨見則金之本質之氣亦不復留惟所以受氣者獨存則其反本復始歸於其初將百煉而不耗矣如是乃可鑄也陳用之曰輕清者陽也重濁者隂也凡得陽之氣者皆輕以清得隂之氣者皆重以濁自物質觀之輕清者其精者重濁者其粗者也鑄金之狀以青氣為度青之為言精也自黑濁之氣一變而至於黃白再變而至於青白則革者屢矣然昏昏乎其猶有惡也必至青色之純而後精者得焉斯不亦治之至乎夫如是故其為器也其明如燎其淨如洗其澤如沃而用之可久矣李嘉會曰鑄金之狀不止於量獨於量言之鑄金莫急於量也段氏闕易氏曰段氏為鎛器以序工知之凡農器耕以錢耨以鎛穫以銍鎛之為利大矣臣工之詩曰庤乃錢鎛庤具也良耜之詩曰其鎛斯趙趙刺也周家以農事開國而盈成之世以此為告成功之頌宜乎段氏以鎛器專其職而記考工者又以粵無鎛為首稱即此意推之則段氏雖亡而不亡矣函人為甲趙氏曰孟子曰函人惟恐傷人謂之函者取其包含之義甲能包裹人身物不能傷所以名官以函人也傅說告髙宗曰惟甲胄起戎魯侯誓師曰善􅙀乃甲胄蓋古人用兵本以自衛故以甲為重陳祥道曰甲亦曰介曰函曰鎧則甲猶植物之有甲也介猶互物之有介也函所以周其身鎧所以致其愷經言甲而不及鎧則古者之甲以革為之後世乃用金耳管子曰蚩尤以金為鎧不可考也犀甲七屬之樹反兕甲六屬合甲五屬犀甲壽百年兕甲壽二百年合甲壽三百年鄭康成曰屬謂上旅下旅札續之數賈氏曰謂上旅之中及下旅之中皆有札續一葉為一札上旅之中續札七節六節五節下旅之中亦有此節毛氏曰凡甲以皮為之其皮方正析而成片如書札之札故謂之札札之相重如木葉之續故謂之葉札葉相連而成列相屬焉故謂之屬鄭鍔曰屬連綴之義上旅下旅以札相續其名曰屬取其連屬也趙氏曰用革須要堅實所以必擇犀兕之皮為之鄭鍔曰犀皮雖堅然生於水水柔物也故不若兕兕獸之尤暴猛者也然兕皮雖堅又不若合皮之為堅也皮堅則札長皮不堅則札短犀皮甲不甚堅故七屬兕皮甲稍堅蓋其札長故以六屬相續而成也至於取獸之皮去其裏而取其表以二皮之表相合為甲則其堅也極矣其皮堅則札長故五屬而成可也犀皮可以延百年之久兕皮可以延二百年之久合皮可以延三百年之久皮愈堅者壽愈逺也然古之合甲者亦罕聞惟犀兕為常故左氏載華元棄甲之事曰犀兕尚多棄甲則那荀子言楚之人鮫革犀兕以為甲越語言夫差衣水兕之甲億有三千豈犀兕為常歟則合甲其費倍故也陳用之曰犀甲兕甲指其物合甲言其工李嘉㑹曰甲資線以為固縱甲可壽百年二百年三百年線必不可如是之固蓋言壽者非言線言甲耳線則久而可易也凡為甲必先為容然後制革鄭鍔曰為甲必制革以為札札葉也一葉為一札制而裁之豈可失長短廣狹之度故必先為容然後乃裁割之容謂人之形有長短小大制甲將以衣之必先為之式象趙氏曰象式謂看人形容了卻自做箇樣制故謂之容必甲恰好容其身而後可王昭禹曰為劒者必審上下之制為弓者必辨安危之人則為甲者亦然因服者之形而為之容以之制革則無贅虧之患權其上旅與其下旅而重若一賈氏曰謂札葉為旅者必以札衆多故言旅旅即衆也鄭司農曰上旅謂要以上下旅謂要以下賈氏曰上旅謂衣下旅謂裳春秋𫝊曰棄其甲裳鄭鍔曰上旅之續札有七節者有六節者有五節者下旅之續其節亦然稱其上旅下旅之葉使其重如一然後被甲者無上下不等之處於戰便矣以其長為之圍毛氏曰長言從圍言橫從橫而尺數同假令旅長三尺合前後之圍亦三尺鄭鍔曰上旅言其長也若夫腰圍之廣惟取其一旅之長以為之廣如此則長短廣狹又如一矣凡甲鍛丁亂反不摯音至則不堅已敝則撓鄭鍔曰鍛者治皮之名鍛皮為甲不可太過又不可不及摯謂熟之至也鍛治不至於熟則不堅熟之太過至於敝困則甲必柔而易曲惟無過不及然後為善凡察革之道趙氏曰此是論察革之節目蓋衛人者在甲為甲者在革革之美惡由人鍛之善否察不詳不知其病故察革亦有道焉鄭鍔曰車之行也必假於輪之圓察車者必察其輪是為得察車之道甲之制也必由於革之堅察甲者必察其革是為得察甲之道然察車不言察輪而察甲乃言察革者蓋輪未成則車不可得而察察輪言察車則要其已成然後知也甲未制則革先在所察甲言革則自其未成必欲知之也或知之於未成之前或知之於已然之後各因其器而致精焉兹其所以為有道也故曰察革之道視其鑽空音孔欲其惌音宛也毛氏曰凡言視者以目視之鄭司農曰惌小孔貌惌讀為宛彼北林之菀鄭鍔曰堅革雖鑽之以孔而孔不寬故視其鑽孔欲其惌惌者其孔閉而不開也視其裏欲其易去聲也鄭鍔曰煆革之熟則革之裏必平易而無敗薉故視其裏欲其易易者治之精而無薉也與孟子以百畝不易為已憂之易同毛氏曰易者和易而不乖言扎葉之相續若不相得則必乖而不易陳用之曰易謂坦易而明視其朕直忍反欲其直也趙氏曰朕謂革之制樣以其有端倪朕兆可見也但鍛煉未成之時視之方可言朕若鍛成則形迹顯然不可言朕矣苟直而無撓則其制善而無惡故下文繼之以制善也毛氏曰裏非不欲直外非不欲易凡以相備云爾櫜之欲其約也鄭鍔曰櫜謂甲之衣制甲已成卷藏於櫜中則欲其約約者縮而小也弓矢之衣謂之櫜故記曰甲若無以前之則袒櫜奉胄與此櫜之欲其約同鄭司農曰春秋傳曰櫜甲而見子南趙氏曰此是鍛得革軟熟故卷時甚少如此革密緻而能周革內更無少生硬處故下文繼之以周也舉而視之欲其豐也毛氏曰舉者以手舉之鄭鍔曰豐者侈大之貌舉甲而視之則欲其雖小而若大雖狹而若侈故曰欲其豐毛氏曰櫜而藏則見於不用故欲約之則小而易制舉而張則見於臨事故欲豐之則足以周其身自非鍛之至造之精何能豐約而隨體哉衣於既反之欲其無齘户界反也毛氏曰衣者以身被之鄭鍔曰齘者齒之介辨也齒齘則齟齬不齊衣甲於身則欲其甲葉不相參差無若齒齘而不齊故曰欲其無齘毛氏曰人之臨敵坐作進退不一衣宜從欲故欲不齘齘音械謂齒噤也齒怒也噤而怒則梗而不通衣之不能從欲矣視其鑽空而惌則革堅也鄭鍔曰此又覆說上文革不堅則孔不惌孔之惌則知其革之堅實矣視其裏而易則材更也陳用之曰更謂材更之而可久鄭鍔曰材不更則裹不易裏之易則知其材之纍更鍛治也視其朕而直則制善也鄭鍔曰朕之直者必其裁制之盡善毛氏曰衆札相比未必上下之直惟善制者矯枉以為直合異以為同所以致其朕之直櫜之而約則周也鄭鍔曰制之周密而不寬故櫜之必約周如周于德周于利周言其密也舉之而豐則明也鄭鍔曰色澤鮮明則人視之雖小若大故舉之而豐明如三辰旗旗昭其明言其著也衣之無齘則變也鄭司農曰變隨人身便利鄭鍔曰其制巧妙隨人身更變所衣者宜故衣之無齘變如上下無常惟變所適之變易氏曰衣甲於身以無齘齧為利則回旋而適於用毛氏曰上言材更據制時言之此言變據衣時言之總論李嘉會曰皮堅則難入今而惌則革堅矣兩皮合縫易於突今裏面和易則材必更練矣兩面朕直則制直而不撓卷而約則緻密而周舉而豐則四面皆見而無隱衣之無齘則坐起拜跪皆便而能變通也陳用之曰甲以自營戎事所先先王於此尤致其悉焉書曰善穀乃甲胄敿乃干無敢不弔甲也胄也干也所以自保者尤所當急故既言善矣又言弔也即是三者言之甲又在所先焉函人所記之詳得無謂乎周禮訂義卷七十四
