body:
  text: 周禮訂義禮類一周禮之屬提要臣等謹案周禮訂義八十卷宋王與之撰與之字次㸃樂清人淳祐二年六月行在祕書省准敕訪求書籍牒溫州宣取是編知溫州趙汝騰奏進特補一官授賔州文學後終于通判泗州此本省牒州狀都司看詳及敕㫖均録載卷首蓋猶宋本之舊前有真德秀序作于紹定五年壬辰下距進書時十年又有趙汝騰後序作于嘉熙元年丁酉下距進書時六年故汝談奏稱素識其人又稱德秀殁後與之益刪繁取要由博得約其書益精粹無疵也所採舊說凡五十一家然唐以前僅杜子春鄭興鄭衆鄭元崔靈恩賈公彥六家其餘四十五家則皆宋人凡文集語録無不搜採蓋以當代諸儒為主古義特附存而已德秀序稱鄭賈諸儒析名物辨制度不為無功而聖人微㫖終莫之睹惟洛之程氏關中之張氏獨得聖經精微之藴永嘉王君其學本于程張云云蓋以義理為本典制為末故所取宋人獨多矣其注考工記據古文尚書周官司空之職謂冬官未嘗亡實沿俞廷椿之謬說汝騰後序亦稱之殊為舛誤然廷椿淆亂五官臆為㸃竄與之則僅持是論而不敢移掇經文視庭椿固為有間至其以序官散附諸官考陸德明經典釋文晉于寶注周禮雖先有此例究事由意創先儒之所不遵不得援以為據也惟是四十五家之書今佚其十之八九僅賴是編以傳雖貴近賤逺不及李鼎祚周易集解能存古義而搜羅宏富固亦房審權周易義海之亞矣又案邱葵周禮補亡序稱嘉熙間東嘉王次㸃作周官補遺由是周禮之六官始得為全書今本實無補遺未審别為一書或附此書內而佚之然憑臆改經之說正以不存為最善固無庸深考也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀朝奉郎直煥章閣權知溫州軍州兼管內勸農事趙汝騰右臣汝騰龔準祕省公移索臣所領樂清縣管下士人王與之周禮訂義以俟聖覽臣即命工匠就其家印寫二本繳納臣竊詳諸經訓解皆有先儒折衷彚集成書獨二禮闕周禮又不幸遭王安石不善用以禍天下學者望而疑之雖程皓頤張載三先生尊信此書僅有緒言見於語録近世大儒朱熹辨明甚至皆有意表章之然亦未嘗作為訓義以行于世與之以山澤臞儒乃能遍營天下前後儒先講解或一說之精或一義之當搜獵無遺間亦自附已見剖析微眇是非審確故參預真德秀擊節是書為之序德秀殁與之益加意刪繁取要由博得約今其書益精粹無疵矣上可以裨聖明之治下可以釋學者之惑有功於六典甚多縉紳韋布爭欲得之與之刋於家臣嘗識其人近來假守益得之於旦評履踐無玷節守不渝皓首著書數種周官特其一也真經明行修之士臣職在師帥每欲薦之於朝適㑹祕省取其著書臣用敢以姓名聞欲望聖㫖下祕省索與之訂義以備乙夜之觀仍少加旌異以風厲天下學者幸甚謹録奏聞伏候敕㫖淳祐二年十二月日朝奉郎直煥章閣權知溫州軍州兼管內勸農事趙汝騰奏三年正月初六日奉聖㫖下祕書省宣入十八日奉聖㫖降付尚書省送檢正都司都司擬上照得溫州布衣王與之皓首窮經其書滿家若周禮訂義最為精粹與之守志厲行無求於世今祕省取其書守臣上其名與獻書自鬻者不同欲特補一官以示旌異四月二十六日奉聖㫖王與之敕授賔州文學其周禮訂義付祕書省行在祕書省牒溫州勘㑹本省準尚書省劄子節文祕書省備奉聖㫖臣僚奏乞劄令州縣守宰多方詢問寄居官及士庶之家撰述修纂未進之書備禮求之令所在州軍於係省錢內支撥收買紙札雇人印寫二本一樣如法裝背申發赴省收藏內一本用黃帛裝背祗備御前宣取右劄付本省照應施行當省今訪聞得溫州樂清縣王與之字次㸃有周禮訂義真文忠公序有刋本請照已降聖㫖指揮事理疾速錢內印造或騰寫各二部裝背申發前來祗備御前宣取須至公文牒請詳牒內備坐聖㫖指揮疾速印造或謄寫裝背申發勿請違滯謹牒淳祐二年六月日牒朝奉郎祕書郎兼吳王益王府教授蘆壯父奉議郎祕書郎兼宗學博士陳晉接奉議郎祕書丞兼權樞密院檢詳諸房文字焦炳炎字位過密無法顯示曽宏迪祕書監闕溫州近準祕書省牒訪聞本州樂清縣王與之字次㸃周禮訂義印寫各二本內一本用黃帛裝背祗備御前宣取事所準指揮本州繼即遵禀關所屬印寫到樂清縣王與之周禮訂義計五十冊寫本三十冊用黃帛裝背作二盝今專差兵士潘阜賫發見到合具申聞者右謹具申祕書省伏乞照㑹謹狀淳祐二年十一月日承直郎溫州軍事推官施洽狀承直郎溫州軍事判官周夢發承務郎特添差通判溫州軍州兼管內勸農事趙與薇朝奉郎通判溫州軍州兼管內勸農事趙賁夫朝奉郎直煥章閣權知溫州軍州兼管內勸農事趙汝騰周禮訂義序周禮之難行於後世也久矣不惟難行而又難言然則終不可行乎曰有周公之心然後能行周禮無周公之心而行之則悖矣然則終不可言乎曰有周公之學然後能言周禮無周公之學而言之則戾矣孟子曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦公之心禹湯文武之心而其學則禹湯文武之學也以此之心布而為政以此之學著而為書故能為成周致太平而為萬世開太平蓋自古禍亂之原非一而大略有四焉君心縱於逸樂而羣下不敢言也賢才壅於疏逖而在位非其人也元元愁痛而上不聞蔽耳目之近而逺弗察也六官之屬凡能導人主以侈欲者一以冡宰統之三公之論道師保氏之詔諌又皆以輔導為職而君者立於無過之地矣士之有德行道藝者民自興之而因使長與治焉修於家者莫不達於朝廷則人才無陸沈天官弗私豫矣居民有法養民有政斂民有制刑民有典舉天下疲癃惸獨無不樂其生者又自王畿之近至于六服之逺地之相去或千萬里而情之相通如一家凡此皆禹湯文武之政公之所思而得者畢萃於書非有公之心者其能行非有公之學者其能言乎新室盜也宇文狄也其所經營皆自私也志先王之道者莫如唐太宗然無端身刑家之本而欲規井田議封建宜其卒莫能行也自劉歆用之既悖儒者譁而攻之曰周禮不可行也吁歆之井田安石之泉府直竊其一二以自蓋爾安得纍吾聖經邪彼何休者指以為六國隂謀之書既幾於非聖無法而近世之闢荆舒者又謂其廢孔子之春秋用劉歆之周禮也獨不思春秋固出於周禮邪使周禮常行於天下則春秋不作矣蓋後世之行周禮者其悖如彼而言者又其戾如此故曰不惟難行而又難言也鄭賈諸儒析名物辨制度不為無功而聖人微㫖終莫之睹惟洛之程氏關中之張氏其所論說不過數條獨得聖經精微之藴蓋程張之學公之學也有公之學故能得公之心而是書所賴以明也永嘉王君次㸃其學本於程張而於古今諸儒之說莫不深究著為訂義一編用力甚至然未以為足也方將蚤夜以思深原作經本指以曉當世其心抑又仁矣以是心而為是學周禮一書其遂大明矣嗚呼使是書而果大明在上者以周公之心行三王之事則太平之路開禍亂之源窒豈空言哉豫嘉次㸃之志故為序于篇端而勉使益用力焉紹定五年閏九月甲戌建安真德秀書編集條例分序官目録於每職之前欲因爵之尊卑權之輕重與其屬府史胥徒之多寡有無以知所職之事安在諸家說經先後以經文為序諸家先訓詁次文義倣朱文公語孟集注例或諸家說同注疏而注疏不甚分明者只録諸家之說諸家辨析字義敷演㫖意可以補前說者效吕氏讀詩記注其下諸家解文或牽引枝蔓止留其主意餘繁文亦不録諸家說只取其至當者低正經一字寫其餘說亦可取倣東萊讀詩記注其旁如所說未明經㫖雖注疏不録至辨其不然及自出己見者以愚案為别諸說或總論一職大意各具逐職之末或貫說數官本末見於末官之後或總論六十屬大意則各具逐官之末序周禮興廢孟子曰周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦張南軒曰方是時周公相成王欲以立經陳紀制禮作樂成一代之法故推本三代四聖之心而施此四事達之天下以為無窮之事業也又曰凡井田封建取士建官禮樂刑政雖起於上世莫備於周是皆周公心思之所經緯本諸三代而達之者也周公之心孟子發明之至矣愚案已上論周公作周禮本㫖書惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸於宗周董正治官孔氏曰周禮每官列其人之貟數及職所掌立為定法授與成王即政之初即有淮夷叛逆未暇以立官之意號令羣臣今既滅淮夷成王乃以周公所制周官六職頒示羣臣以此告之鄭康成曰周公居攝而作六職謂之周禮營邑於上中七年致政成王以此禮授之使居洛邑治天下鄭鍔曰以洛誥考之周公營洛乃是欲使成王自服于土中亂為四方新辟乃作六典之書以授之使往治于洛邑其言曰子齊百工伻從王于周乃汝其悉自教王往新邑伻嚮即有僚蓋為成王齊整建官之法使王往新邑自教率之各效其職也成王滅淮夷而歸在豐董正治官始以新書從事然只在豐而不往洛邑故周禮雖成終不盡用故經之授田等事今皆難信正由成王不宅洛故有其法制之文終不見行之實也若如此論則經之首篇惟王建國辨方正位之語始有所歸其它疑非周公全書皆可以意曉愚案已上論周公授周禮于成王左傳齊仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不巳將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也魯不棄周禮未可動也閔元年晉侯使韓宣子來聘且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也昭二年杜預曰韓子所見蓋周之舊典禮經也愚案巳上見周禮至春秋猶存孟子北宫錡問曰周室班爵祿也如之何孟子曰其詳不可得聞也諸侯惡其害己也而皆去其籍然而軻也嘗聞其略也孫氏曰周官在漢最晚出孔氏既無明言孟軻之徒或未之見疑信猶未决也不幸劉歆用之而大壤王安石用之而益壤儒生學士真以為無用於後世矣夫去古遼逺雖使先王之制爛然在目固難盡棄今之法而求復其初也然究觀其書以道制欲以義防利以德勝威以禮措刑尊鬼神敬卜筮親賔客保小民藹然唐虞三代極盛之時非春秋戰國以後所能髣佛也學者欲知先王經制之備捨此書將焉取之愚案已上見周禮至戰國已亡賈氏曰武帝始除挾書之律開獻書之路既出於山巖屋壁復入于祕府五家之儒莫得見焉至孝成帝逹才通人劉向子歆校理祕書始得列序著于録略然亡冬官以考工記足之時衆儒並出共排以為非是惟歆獨識知其周公致太平之迹具在于斯遭天下兵革並起弟子死喪徒有里人河南緱氏杜子春尚在永平之初年且九十能識其說鄭衆賈逵往受業焉衆逵洪雅博聞又以經書記𫝊相證明為解逵解行於世衆解不行然衆時所解說近得其實案藝文志成帝時以書散亡使謁者陳農求遺書於天下詔光祿大夫劉向校書經傳諸子詩賦向輒條其篇目撮其意録而奏之會向卒哀帝復使向子歆卒父業歆總羣書奏七略歆之録在哀帝時馬融乃云成帝命歆考理祕書始得列序著於録略成帝時劉向父子並被帝命至向卒哀帝命歆卒父所修鄭𤣥序云世祖以來通人達士太中大夫鄭少贛興及子大司農仲師衆故議郎衛次仲宏侍中賈君景伯逵南郡太守馬季良融皆作周禮解詁二鄭同宗大儒明理于典籍粗識皇祖大經周官之義存古字發疑正讀亦信多善徒寡且約用不顯傳于世今讚而辨之庶成此家世所訓也然周禮起於成帝劉歆成于鄭𤣥附離者大半故林孝存以武帝知周官末世瀆亂不驗之書作十論七難以排棄之何休亦以為六國隂謀之書惟鄭𤣥遍覽羣經知周禮乃周公致太平之迹故能答林碩之論難以為訓注使周禮義得通焉愚案已上見周禮待漢以後諸儒而始明論周禮綱目程氏曰有關睢麟趾之意然後可以行周官之法度張氏曰周禮惟太宰職難看蓋無許大心胸包羅記得此復忘彼其混混天下之事當如捕蛇龍搏虎豹用心力看方可故議論天下之事易處天下之事難孔子常語弟子如或知爾則何以哉其他五官便易看止一職也愚案已上見周禮不可徒行三禮正義曰周禮儀禮並周公所記所謂禮經三百威儀三千禮經則周禮也威儀則儀禮也朱氏曰制度之書惟周禮儀禮可信周禮必竟是出於一手謂周公親筆作成固不可然大綱却是周公意思李景齊曰仲長統以為周禮禮之經禮記禮之𫝊禮記作於漢儒雖名為經其實𫝊也蓋禮記所記多有春秋戰國間事不純乎唐虞夏商周之制故王制紀朝覲為文裏時事月令說太尉官名為戰國間事曾未若周官之純于周禮也愚案已上見周禮與儀禮禮記不同朱氏曰周禮好看廣大精密周家之法度在焉陳及之曰周禮一書周家法令政事所聚或政典或九州或司馬教戰之法或考工記後之作史者纂其典章法度而成一代之書有周公之舊章有後來更續者猶風雅頌通謂之周詩誓誥命通謂之周書也信之者以為周公作不信者以為劉歆作皆非也論五官目録陳君舉曰讀周禮須熟讀五官目録次知所屬有定局更將西漢百官志及歷代官志與今官制參考但其時須知尊卑貴賤緊慢親疏不同謂如內宰一職乃士人為之至秦漢時便為大長秋有大長秋猶存此職東漢以來豈復有此又如醫師食醫等職周官時士為之至本朝御藥院是和安大夫或承宣使宣徽使領之便見得緊慢尊卑貴賤之意須是以此考校古今識得徹底方可讀愚案此說所以分目録於每官之首令學者易見論天地四時官名愚案成周所以取名天地四時者非必曰掌天地四時之事上古雲龍鳥火之號固因天道以建官至唐虞推廣是意其職漸分故堯之官亦不止羲和四子舜之官亦非専掌天地四時陳止齊曰自顓頊有南正重司天北正黎司地之官至堯分為四職上掌天時下兼人事以書之命辭考之知其猶在王朝預聞政事此天人之合也至成周此意漸分取羲和四職分配於六卿是以虛名加實職求其名官之意皆號云耳論公孤不列於六職吕氏曰案周官三公論道經邦燮理隂陽三孤二公𢎞化寅亮天地弼豫一人見得公孤之分不同周禮一書惟三公不見何故自冢宰以下各領其職所謂作而行之三公默然無為坐而論道所謂司萬化之原者不是耳目經歷簿書期會之計非有司繩墨所能制只去本原上整頓朝夕納誨格人主之非心論道經邦便是燮理隂陽處何嘗去空虛渺茫處理會大抵人主一心萬化之原一都一俞論道之間使人主果識本原於此上轉得則上而日月星辰無不順下而山川草木莫不寧便是三公之職至三孤則𢎞大三公之化隂陽以氣言天地則有形燮理在其上寅亮在其下公卿之分於是著矣然弼豫一人乃格君心之任於孤言之而公之職不與者成王尊三公之至若不敢以身煩之蓋曰斯人也乃造物之友非豫一人之弼尊之至也論官職多寡王昭禹曰唐虞稽古建官惟百夏商官倍至周又增為三百六十先王建官或多或寡非矜異也稱事之繁簡帝者之世其事簡故百官足矣王者之世其事繁故夏商倍之周禮樂官備增而為三百六十不如是則事繁而不舉官之多寡亦各趨時而已矣陳及之曰周禮雖以設官三百六十為額然職事貟數不止此以天官考之凡卿大夫命士三百五十餘人地官除鄉遂山虞林衡司關司門不可考者四百餘人春夏秋三官皆五百餘人凡六官中大略以春夏秋三官為準以少乘多皆以五百人為額凡三千人其間兼攝者必相半也何者先王之制因事而命官作史之人因官而分職以三公六卿論之如周禮所云二鄉必公一人六卿各掌其職冝若不可兼而成王時周公以公兼太宰召公以公兼宗伯蘇忿生以公兼司寇故書洛誥云司徒司馬司空也成王將崩同召太保奭芮伯彤伯畢公衛侯毛公則是六卿中召公畢公毛公亦上兼三公矣吕氏曰三公無職六卿則有職者也三公論道而六卿則行道者也以三公兼六卿合本末精粗於一源可離非道也由是推之先王之制其職則不可廢其官未必一一有舉其大略則土訓誦訓無他職事掌葛徴絺綌掌染草徴染草掌荼徴荼掌炭徴炭角人徴齒角羽人徴毛羽每官掌一事無事之日多矣軍司馬行司馬輿司馬戎僕戎右有軍旅則用之甸祝田僕有田獵則用之有喪紀則用夏采喪祝有盟會則用詛祝建邦國則用土方氏來逺方之民則用懷方氏先王豈能以祿食養無用之官待有事然後用之亦臨事兼攝爾盟府命士也太公兼之所謂載在盟府太師職之是也作禮者以職不可廢故各設其官職以待智者决擇耳又六卿內治一官外兼一鄉則周官每鄉卿一人每官卿一人若是者皆非事實也齊桓公令國子髙子各率五鄉晉景公命士會將中軍且為太傅命韓厥將新軍且為僕大夫晉悼公令戎御屬校正司右屬司士皆古人之制也或者以書謂唐虞稽古建官惟百夏商官倍亦克用乂今豫小子仰惟前代時若訓迪厥官則周之建官不能逺過夏商與其有兼攝相半亦千五百人矣曰有朝廷官有田野官所謂建官惟百夏商官倍者指在朝者也若總千里之內安能勝其事哉今考六官中大率在朝廷者什之二三耳其他則分散甸稍縣都之內與尚書無甚戾或者又謂鄉遂設官最冗六鄉之民不過七萬五千家今設官至萬八千九百三十人為大夫者百八十八六遂之民亦不過七萬五千家而設官乃三千九百九十八人為大夫者四十人鄉遂共十五萬家大抵官吏至二萬三千人如因民之入以賦官祿則十五萬家之人所入能幾何而足以養二萬三千官吏也殊不知鄉遂之官吏皆土居人其大官如卿則朝臣兼之以下大夫命士之屬分散在他處且如鄉遂人數勢不可得兼者則各置焉李景齊曰古人自抱關擊柝而上皆以下士為之無非鄉舉里選德行道藝之人此成周建官之美意論六官次叙先後陳君舉曰凡六官敘官之法義有二一則以義類相從謂宫正宫伯同主宫中事膳夫庖人內外饔同主造食如此者皆是類聚故連類敘之二則次敘六十官不以官之尊卑為先後皆以緩急為次第故宫正等士官在前內宰等大夫官在後論六官所屬交互陳君舉曰周禮設官分職大抵朝廷之事治官掌之邦畿之事教官掌之邦國之事司馬掌之今自朝廷以上纎悉皆歸於大宰自國中以及近郊逺郊小都大都皆屬教官而職方土方撢人凡邦國之事皆屬司馬此其大略也其有截然一定不可易者若司寇之屬凡朝廷之獄大小司寇士師掌之六鄉之獄鄉士掌之六遂之獄遂士掌之甸稍縣都之獄縣士掌之邦國之獄方士掌之四方之獄訝士掌之謂其皆刑獄之事故雖自鄉遂之外甸稍縣都郡國四方一皆聯絡而盡屬諸司寇其他又有不然者如大史內史掌六典八法八則八柄之二宜屬天官乃屬春官大小行人司儀掌客宜屬春官乃屬秋官宰夫掌臣民之復逆矣則大僕小臣御僕之掌復逆宜屬天官乃屬夏官宰夫掌治朝之位矣則司士正朝儀之位宜屬天官乃屬夏官地官掌邦畿之事凡造都邑建社稷設封疆既悉掌之矣而掌固司險掌疆候人又見於夏官天官掌財用之事自大府至掌皮既悉領之矣而泉府廩人倉人又見於地官自膳夫至臘人不過充君之庖者悉領於天官至外朝百官之廩祿府史胥徒之稍食畨上宿衛之廩給乃見於地官自內司服至屨人凡王宫服飾之用悉領於天官而司服司常典瑞巾車之屬乃見春官此其分職皆有不可曉者自漢以來凡禮事皆屬大常兵事皆屬將軍光祿勳中尉刑事皆屬廷尉其分量職守較然不紊然臨事之際反不免遺闕先王設官如此當時不見文移回復職事侵紊之患何也六官之設雖各有司存然錯綜互見事必相關春秋時叔孫豹卒杜泄將以輅葬季孫不從杜泄曰夫子受命於朝而聘於王王賜之輅復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空書勳夫諸侯之國惟三卿耳一人受賜三卿皆與從周法也後世禮官専治禮刑官専治刑兵官専治兵財官専治財並不相關雖有遺失他官不得撙節而廢曠多矣又曰古之體羣臣者何其均也大祭祀特一事耳大宰贊玉幣司徒奉牛牲宗伯奉玉齍司馬奉馬牲司寇奉明水火六卿聨事亡所次第居則六卿各掌其一不但司徒出則六軍各掌其一不但司馬至列職授任各司其局則相須而不相奪莫尊於冢宰而朝覲會同必大宗伯為上相司徒居四民而軍旅田役之事使其屬受令於司馬若夫諸子固夏官之屬耳掌國子之倅雖以軍法治之司馬弗正也大司寇蒞誓書六官皆受其二小司冦登民數雖冢宰制國用亦不過二之而已蓋由上公至百執事其班爵有差而各宿其業其職掌有小大而各得行其志故其士條達展布自盡以奉上而無詘於形勢約束之患官師相規不為讒慝僚友相稱不為比黨上有違德朝有闕政亦皆敢於諫諍譏刺而無忌諱考之於詩祈父作於爪士大東作於談大夫小辨作於太子之傅甚者傷讒之刺寺人孟子能之鑄無射之諫伶州鳩能之此無他上待之也均而下報禮重當時朝廷邦國之間所以遇下亦致禮敬今夫鄉飲酒與賓介獻酬矣雖主人必獻工祭既與卿大夫士餕矣雖君必畀輝庖翟閽故宣王中興吉甫有大功於南征而其來歸飲御諸友之詩曰侯誰在矣張仲孝友中興功臣略見於二雅張仲不知為何官未有著名於世而吉甫凱還之卒章歸功於仲若曰微斯人無以及此者嗚呼盛矣又曰師保內朝之官非直地官之屬司士治朝之官非直夏官之屬朝士外朝之官非直秋官之屬而分𨽻於三卿者何也立政三宅曰宅乃事宅乃牧宅乃準事凡蒞事者也牧凡長民者也準凡法令者也注疏以準但為獄官非是中外之官略具是矣而三宅之設惟準人常重於他官非號令之所出則憲章之所存人主威福於是行焉而宅事宅牧之所受約束承風㫖者故王事鞅掌嘗病於出入風議之臣陵三軍者懼朝廷之議居勢使然先王知其患將至於偏重而官失其守於是位至準人布之三朝而不専嚮於一官本夫司會以法裁定邦計者也則𨽻天官太史以典法則計羣吏內外史書王命者也則𨽻春官至於師保職在內朝若漢諫大夫則地官領之司士職在治朝若漢殿中御史則夏官領之朝士職在外朝若漢司𨽻校尉則秋官領之且冢宰蒞百官則五官皆司存也其屬或為史得以辭令道上指意以賞懲其下或為師保得以道德勸迪其上且正救其遺闕或為司士蒞羣臣之朝見或為朝士蒞諸侯之會同是故號令所出憲章所存五官皆與聞之無偏而不舉之處故三朝適平而百官正先王之意非徒以是互相伺察迭為長伯也不如是非所以體羣臣故也嘗觀於經周之大事同召六卿師氏與焉立政卒篇獨告太史詩人刺皇父亦曰聚子內史楀維師氏小司冦敘制國用以內史司會冢宰並稱文王世子記外朝之政曰司士為之凡此皆以準人故特言之假如六官専嚮一卿則宅事宅牧將為冗曹而體羣臣之道虧矣他如職方氏以下冝不𨽻司馬行人以下宜不隸司冦亦錯置二卿之間大抵類此自此道不復見凡主意所嚮小臣百司遂擅朝政若秦専任獄吏獄吏得親幸博士雖七十人特備員弗用丞相諸大臣皆受成事且有所謂加官所加或列侯將軍獨在禁中而公卿不與至於漢有百官以下事大將軍家奴視丞相蔑如者甚矣後世之不師古也欽定四庫全書周禮訂義序目宋王與之撰編類姓氏世次漢杜氏子春見本經注今作杜氏鄭氏興字少贛河南人見本經注今作鄭氏鄭氏衆字仲師見本經注今作鄭司農鄭氏𤣥字康成見本經注今作鄭康成唐賈氏公彥見本經疏今作賈氏崔氏靈恩間有數說今作崔氏國朝劉氏敞字原父立說見七經小傳今作劉氏臨川王氏安石字介父有全解今作王氏南康劉氏恕字道原間有數說今作劉氏明道程氏灝字伯淳有數說見語録今作程氏伊川程氏頤字正叔間有數說見語録今作程伊川橫渠張氏㦸字子厚秦人有數說見語録今作張氏龜山楊氏時字中立惟辨王荆公數十處及語録有數說今作楊氏王氏昭禹字光逺有詳解用荆公而加詳今作王昭禹陸氏佃字農師採之禮記解中今作陸氏南城李氏覯字泰伯有周禮致太平論今作李氏禮圖說未詳誰氏所編得自閩中大槩用三禮圖禮象圖或立新說考證最明今作圖說曰禮庫未詳誰氏今作禮庫曰建寧胡氏安國字康侯間有數說今作胡康侯五峯胡氏宏採之語録并集中今作胡氏陳氏祥道有禮書見於禮圖今作陳氏劉氏彛字執中有全解號曰中義今作劉執中方氏慤採之禮記解中今作方氏三山林氏之竒字少穎有全解祖荆公昭禹所說今作林氏三山鄭氏鍔字剛中有全解淳熙十年經進今作鄭鍔四明史氏浩字直翁有天地二官講義今作史氏建安朱氏熹字元晦見集中今作朱氏東萊吕氏祖謙字伯恭士人𫝊其集解內有數說今作吕氏永嘉薛氏季宣字士隆有釋疑今作薛氏永嘉陳氏傅良字君舉其說有一集及經進四篇今作陳君舉永嘉鄭氏伯熊字景望文集有數說今作鄭景望劉氏迎間有數說今作劉迎王氏未詳誰氏建陽作王狀元詳說刋行今作王氏詳說永嘉楊氏恪字謹仲間有辨疑今作楊謹仲永嘉陳氏汲字及之間有辨疑今作陳及之山隂黃氏度字文叔有五官解刋在浙東倉同今作黃氏永嘉鄭氏伯謙字節卿有太平經國書刋行今作鄭節卿括蒼項氏安世字平甫間有數說今作項氏莆陽李氏叔寶字景齊有周禮精意刋行今作李景齊龍泉葉氏適字正則有數說見習學記言今作葉氏長沙易氏祓字彥祥有周禮總義皆推廣諸家說今作易氏金華薛氏衡字平仲有周禮序官考今作薛平仲天台陳氏用之有考工解今作陳用之鄭氏敬仲間有數說今作鄭敬仲廬陵周氏必大字子充有講義數條今作周氏永嘉曹氏叔逺字器逺有地官遂人至槀人講義今作曹氏永嘉林氏掎字竒卿有周禮綱目於開禧間曾進金華趙氏溥字蘭江有蘭江考工記解今作趙氏永嘉陳氏汪字藴之集傳中間有數說今作陳藴之永嘉李氏嘉㑹字子華有小集今作李嘉㑹山隂孫氏之宏字偉夫有小集今作孫氏已上共五十一家以氏言者或同姓數人以前說者為氏若鄭興說在鄭衆鄭𤣥之前故言鄭興為氏之類或一姓一人以其姓為氏若賈姓止有賈公彥故曰賈氏之類以官名者别前說之出氏别後說之出名字若鄭衆以司農言前以别鄭興之言氏後以别鄭康成言其字鄭鍔言其名之類以字言者别前同姓之已稱氏若鄭𤣥言康成以别鄭興先言鄭氏之類以名言者不詳其字若陳祥道言其名之類或其名最著若王昭禹不言其字而言其名之類以號名者共聞其號若程伊川之類以書名者但見其書若圖說之類其餘散於他書者得一二說著其姓氏而已若毛彥清之類
