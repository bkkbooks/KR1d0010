body:
  text: 周禮訂義卷六十宋王與之撰士師下大夫四人鄭鍔曰虞舜命臯陶作士自是名刑官為士士察也欲其能察也士師又為羣士之所師法故名官曰師柳下惠為士師李嘉會曰士師以下不曰寇而曰士者各專掌刑之職治獄斷罪皆欲其當故曰士自古刑人之官曰士薛平仲曰事固有病於過察者惟刑則貴於加察此士師所以為司寇之考又以教羣士之必察也是以內自國中之鄉以達於四郊之遂自遂以達於公邑之縣自縣以達於四方之都家以訝於四方之邦國其地各置其官其官各名曰士凡內外之有獄訟者皆非地治之所可專而一歸之王國之士焉及總而聽之於朝士之外朝王與公卿大夫以議於上羣吏與衆庶之卑以參於下刑於是乎定矣士師之職掌國之五禁之法以左音佐右音又刑罰王昭禹曰禁之為仁刑罰之為義禁之不止而猶犯然後加之以刑罰鄭康成曰左右助也助刑罰者助其禁民為非鄭鍔曰刑罰施於已為之後先王之意欲人無犯故用五禁之法禁於未為之先是乃所以左右之也人之一身有手足焉左以佐之右以佑之則身無為矣五禁左右刑罰殆亦如是易氏曰古者有五刑無五罰五罰自周穆王始古所謂罰刑之輕也舜之象以典刑則常刑也以常刑為重故以五流之法宥之猶以為重又設為三等之輕刑曰鞭作官刑撲作教刑金作贖刑贖刑即後世所謂罰而其輕又居三等輕刑之下至周人設刑官之職初無五罰之法而司圜所謂罰人不虧財則知舜之贖刑即此所謂虧財者也輕亦甚矣考之士師則成王周公之心非特欲其無刑亦欲其無罰故左右刑罰則有五禁先後刑罰則有五戒凡以此而已後世人情日薄而抵冒滋衆穆王於是作五刑之法以損五刑之舊司刑所掌五刑之屬二千五百而穆王之三千以枚數之雖增於前然墨劓所增者各五百皆輕刑也宫所損者二百大辟所損者三百皆重刑也惟其禁戒不立而左右先後之無術觀其目則哀矜之意固可見觀其凡則文勝俗弊亦可推矣一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁鄭康成曰宫王宫也鄭鍔曰閽人所謂不入宫者是也劉執中曰鄉刑糾孝本於室家故曰宫禁鄉刑之禁也官官府也鄭鍔曰無故不得擅入者是也國城中也鄭鍔曰入國而問禁是也鄭鍔曰野禁今之田律野中之禁軍禁歡囂夜行軍中之禁五禁見於經今之刑統律令是其類也大司寇有野刑軍刑鄉刑官刑國刑謂之五刑此謂之五禁蓋士師揭示五禁禁之不從至於犯刑則大司寇待之以刑實相為表裏或謂此有宫禁大司寇何以無宫刑竊以為小宰掌邦之宫刑則王宫之事天官掌之非大司寇所得預也皆以木鐸徇之于朝書而縣音玄于門閭賈氏曰爾雅云巷門謂之閭則縣于處處巷門使知之鄭鍔曰以木鐸徇之于朝所以示貴者書而縣于閭巷之門所以示賤者貴賤皆知禁刑將措而無用以五戒先後刑罰毋使罪麗于民王昭禹曰禁止使勿為施於未然之前戒敕其怠忽施於事為之際李嘉會曰禁則欲其畏戢而不為戒則欲其防謹而知避鄭鍔曰五禁謂之左右五戒謂之先後五禁則揭諸書而示之以文五戒則形諸口而告之以言以刑罰為正而五禁左右之以刑罰為中而五戒先後之左右以言其佐助也先後以言其誘掖也先王不欲人之犯刑既書之以使之觀又諄諄然誥誡之先謂未犯之前既有以教之後謂已犯之後復有以懲之或先或後丁寧切至不欲使民麗於罪也王氏曰先後之若盤庚上篇則以誥先之也若盤庚下篇則以誥後之也劉氏曰在蠱曰先甲三日後甲三日在巽曰先庚三日後庚三日夫五戒者先事戒之使毋麗于刑罰一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙鄭鍔曰用兵然後有誓誓者折之以言使斷然必信湯誓泰誓作於用兵之時是也諸侯畢會王將有為則作為文誥之辭以誥之使知其所以然也大誥作於洛邑四方和會之時是也師田行役兵衆所聚人或肆行則殘暴天物故其戒謂之禁城邑之中姦盜得以並容不有以糾之則不及知故其戒謂之糾王昭禹曰若刑典之糾萬民都鄙不出王畿之域其所當行者皆視王朝以為法故其戒謂之憲言當憲法於王朝也雖然此特别而言之爾若通而言之憲糾禁無所不用如小宰言凡宫中之糾禁憲禁于王宫之類是也誓誥於書可見而此三者則久而無傳名雖不同所以戒民則一故總曰五戒王昭禹曰誓之所用非特軍旅也而軍旅為主祭祀田役之類皆有誓也禁之所用非特田役也而以田役為主宫中官府皆有禁也以此推之則誥也糾也憲也亦若是而已掌鄉合州黨族閭比之聯與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞鄭康成曰鄉合鄉所合也王昭禹曰六鄉之內比其居則有州黨族閭比其民則有什伍合州黨族閭比者以比合比以閭合閭所以聨其居也合其人民之什伍者以伍合伍以什合什所以聨其人也聨比其居什伍其人鄉官之事而士師又掌之使之相安相受故也王氏詳説曰大司徒族師比長特言相受未嘗有相安之文此士師掌鄉合州黨族閭之聨而云相安者正所謂誅亂民以安民也此所以為刑官之考易氏曰人有罪過未麗於法而害於州里者去之則不善者逺而善者得以相安上罪期役以至下罪三月役任於州里者舍之則不善者反而善者得以相受相安相受是與衆同欲也與衆同欲則與衆同惡也以比追胥之事劉執中曰追襲寇盜也猶春秋追戎于濟西胥伺也相聚夜宿以伺盜賊之謂賈氏曰以比追胥以比什伍使任追胥二事也則出入相友守望相助是有利存焉以施刑罰慶賞則賞一人而同所勸罰一人而同所戒是有義存焉王昭禹曰廢事者施刑罰有功者施慶賞此士師所以掌鄉而弼六鄉之教也鄭鍔曰此皆小司徒與族師之職乃使士師掌之者蓋司徒官屬專治其事而刑官之屬以刑助之教以誘之於先刑以鞭之於後則民知所畏而六鄉之政成矣李嘉會曰士師所聨比而用之者亦止追胥刑罰慶賞之事若有大於此者則司徒司馬當任之曰相安相受者使斯民知聨比之合在諸刑官自然相安相保不然刑官得以責罰之矣掌官中之政令劉執中曰官中政令謂秋官之屬所行政令鄭鍔曰上文言掌鄉合州黨族閭比之聨嫌於侵官以為司徒之官府而政令皆出於此也故又言掌官中之政令見其專掌司寇之官府不可以侵官察獄訟之辭以詔司寇斷獄弊訟致邦令易氏曰察獄訟之辭則刑官之屬若鄉士遂士縣士方士各上其獄訟之不決者而致其辭於士師士師因其辭而察之以詔司寇斷獄弊訟獄訟既審合於邦令士師則又以其邦令而致之於鄉士遂士縣士方士上下聨事精察如此此獄所以得其中李嘉會曰必察獄訟之詞情理若何詔諸司寇而斟酌之然後方可以致邦令鄭鍔曰司寇議令於朝士師承之以逹諸外王氏曰掌官中之政令其政令施於官府之中而已致邦令則致之于邦國都鄙也王昭禹曰政令邦令必使士師掌而致之以違令則刑之所取也掌士之八成一曰邦汋上約反二曰邦賊三曰邦諜音牒四曰犯邦令五曰嬌音矯邦令六曰為邦盜七曰為邦朋八曰為邦誣賈氏曰士即士師以下鄭司農曰八成者行事有八篇若今時決事比鄭鍔曰成者條例品式前世所立可依據以為比者是也小宰八成皆治民之成法故大宰以待萬民之治此八成則專以治士以經考之中士以千計者幾五千下士以萬計者幾二萬其多如此雖其興也本於鄉大夫書考之詳不幸有姦邪者出乎其間非專立成法以馭之士師何以治之哉汋如斟酌之酌酌取也隂有包藏欲為嚮背而未決乃探聽國家機密斟酌其事以為姦宄是謂邦汋左傳云蓋酌之也意亦如此賊如寇賊之賊隂為不仁不義以毒王民生亂階是謂邦賊諜則反間之人隂為諸侯刺探國事是謂邦諜王昭禹曰邦賊謂小人作於內而為賊者邦諜謂姦人來於外而為諜者上有令而下弗從逆也邦有成令故違犯之是廢格法令之人故曰犯邦令鄭康成曰犯令干冒王教令者嬌如矯制之矯上無是令輒出已意矯而為之是有無上之心故曰嬌邦令盜民財國貨以自封殖如陽虎竊寶玉大弓之類是為邦盜易氏曰謂竊持邦柄以作威福相與交結唱和雷同如漢唐之時羣小朋黨共為傾邪之類是為邦朋王昭禹曰為私黨以亂民是者誣以為非曲者誣以為直變亂黑白使事無不失實是為邦誣王昭禹曰造訛言以惑衆凡兹八者亂之階也八成之法專以馭士意豈淺哉黃氏曰此八者士師皆有成法直致其罪者也雖然猶有情焉賊諜必殺故司戮曰掌斬殺賊諜而摶之子服景伯曰吾力猶能肆諸市朝行士師之職也王昭禹曰先王患夫姦人所以為禍本者如此立八成之法使士師掌之俟其類至從而治之則制治保邦所以防其芽蘖者豈不至哉若邦凶荒則以荒辨音貶之法治之劉迎曰荒辨之法所以别其荒歲之輕重而知其中年凶年無年欲為移民通財糾守緩刑之備使凶札而無辨安知食二釜與不能人二釜者哉上飢則發上年之粟中飢則發中年之粟下飢則發下年之粟未必不自荒辨之法知之先儒既以辨為别鄭司農曰救荒之政十有二而士師别受其教條是為荒别之法又改為貶而援刑貶為證則荒辨豈特緩刑之一乎鄭鍔曰司徒荒政有緩刑而無移民通財糾守事獨掌於此蓋不移民不通財不糾守者斯待以刑也凡此皆荒貶之法以治凶荒之時不用平時之法先儒謂辨當為貶引朝士慮刑貶為證余以為貶則減損也若夫凶荒之時當辨論其荒之輕重而講究時事以為辨救之法不必改為貶也劉執中曰不辨其荒而槩施救政則僥幸之民出矣故士師治以荒辨之法林椅曰荒政雖有六聨而荒辨之法存於士師蓋鄉合之聨民人什伍有以糾其守而後荒政可舉令移民通財糾守緩刑王昭禹曰移民若梁惠王移其民於河東劉執中曰民可徙則移之就榖不可徙則移榖以賙之通財若晉飢秦輸之粟糾守則糾四封之守以防寇警緩刑則刑雖不可去亦緩之而不急王氏詳説曰大曰邦小曰國此鄭氏之説也邦為王者之邦國為諸侯之國正以大宰掌建邦之六典大司徒掌建邦土地之圖大宗伯堂建邦之天神地示人鬼之禮大司寇掌建邦之三典豈非邦為天子之事乎惟大司馬掌建邦國之九法言邦及國兼諸侯而言耳此周禮之法言也然邦為王者之邦亦為諸侯之邦也且移民通財非王者之事大司徒以荒政十有二聚萬民未嘗言移民通財也大司徒於職末云大荒大札則令邦國移民通財是移民通財所以待諸侯也此云令移民通財而繼之於若邦凶荒之後是邦又為諸侯之邦也然則邦國字無定説凡以財獄訟者正之以傅别約劑易氏曰傅謂地傅以為之保别謂判書以為之合約謂書其期約者劑為之要書者鄭鍔曰因爭財而有獄訟必以傅别約劑正之小宰八成所謂聽稱責與賣買者是也稱責之財則傅之以約束别而為兩人執其一買賣之財則立為限約而有劑劵以自執故以財致訟者操此以為決則加之以刑無愧矣王氏曰民知無傅别約劑之不可治皆無敢苟簡於其始訟之所由省也林椅曰當其稱責已有傅别是制治於未亂若祭勝國之社稷則為之尸鄭鍔曰勝國國為吾所勝也則無主後矣然實我用兵以勝之如周之勝商不廢亳社以湯之故不絶祀是以祭之陳君舉曰忌子卯之樂保垂和之器皆警戒之意作夏社與此同意易氏曰郊特牲曰社祭土而主隂氣也又曰天子大社必受霜露風雨以達天地之氣喪國之社屋之不受天陽也亳社北牖使隂明也言亳社則勝國之社也亳社以隂為主而刑乃隂之類媒氏以男女之隂訟而聽於勝國之社類也此祭勝國之社而刑官為之尸亦類也劉執中曰鳬鷖之詩宗廟社稷七祀皆有尸未聞用刑官為之勝國之社稷其祭五土之神與先稷與夫興王之社稷無以異矣必屋其壇用士師為之尸祭其社稷而威其亡國之妖邪耳鄭鍔曰為其勝之也本於用甲兵之大刑故使刑官為尸乃所以示戒王燕出入則前驅而辟易氏曰自治朝而退居於內謂之燕朝自燕朝而退居於寢謂之燕寢此出入所以謂之燕出入也賈氏曰謂宫苑皆是士師前驅而辟則王者燕間之際蓋無一節之不謹車謂之道車者其意亦可推矣鄭鍔曰使刑官驅辟則人畏刑而無敢犯黃氏曰前導蹕辟皆使刑官自大司寇而下隨事之尊卑用之總論王氏詳説曰夏官小臣王之燕出入則前驅此王燕出入則前驅而辟蓋成周之時萬乘至尊其為衛至矣以經考之有前馬有前車有前王有前驅有前王而辟有前驅而辟初不可混為一説前車者謂車已駕而王未乘之時如齊右掌祭祀會同賔客前齊車王乘則持馬行則陪乘以王乘而繼前車之後非前車為未乘之時乎前馬者謂車已行而王憑式之時如道右王式則下前馬王下則以蓋從以王下而繼於王式之後非前馬為已行之時乎前王者謂王之在廟而步行之時也大司寇若禋祀五帝及納亨前王以前王而繼於納亨之後非前王為在廟步行之時乎前驅者謂車之或行或趨之時大僕王出入則自左馭而前驅小臣王之燕出入則前驅以前驅而繼於王出入之後非或行或趨之時乎然前王一也有前王而辟者有前王而不辟者前驅一也有前驅而辟者有前驅而不辟者大司寇尊矣故前王而不辟前王而辟其小司寇歟然大司寇前王於納亨小司寇前王於大賔客抑亦宗廟之中無有辟止行人之理也大僕掌正王之服位於王出入則前驅小臣掌正王之燕服位故燕出入則前驅皆前驅而不辟也士師以刑官之考不避者刑之此所以前驅而辟與小司寇之辟不避者刑之則同但小司寇前王而士師前驅耳若夫辟之之外又有蹕焉見於經者又皆可考天官宫正凡邦之事蹕夏官𨽻僕掌蹕宫中之事大司寇凡邦之大事使其屬蹕小司寇凡國之大事使其屬蹕士師諸侯為賔則帥其屬而蹕于王宫鄉士各掌其鄉之禁令帥其屬夾道而蹕此又不可不辨也宫正掌王宫故以邦事言𨽻僕掌五寢故以宫中之事言大司寇掌邦之三典故以邦之大事言小司寇掌國之五禁故以國之大事言士師無預於邦國之大事故以諸侯為賔而蹕於王宫言鄉士掌六鄉王之祭祀軍旅賔客有出入於六鄉者故以夾道而蹕言然宫正掌王宫而言蹕邦之事與士師蹕於王宫相為異同者蓋宫正言凡邦之事則王宫之祭祀等事無所不蹕士師特蹕於諸侯為賔之時而已曰辟曰蹕皆以刑官主其事正所以重萬乘之勢也若乃王之三公六卿大夫出入於鄉遂公邑之間亦有辟禮而無蹕禮外諸侯入於王國則有辟禮居於客館則有蹕禮鄉士云三公遂士云六卿縣士云若大夫皆言為之前驅而辟是知三公六卿大夫之有辟禮而無蹕禮也訝士云邦有賔客入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕是知外諸侯有辟禮而又有蹕禮也然三公六卿大夫在鄉遂公邑之間則辟在王城之內則否以邦事則辟非邦事則否諸侯自有其國而且辟於王之國蹕於客之館在國得用此禮也明矣祀五帝則沃尸及王盥洎鑊水鄭鍔曰祀五帝必有尸李嘉會曰五帝五人帝也五帝亦有尸者尸神主也周公祭太山以大公為尸祭天亦有尸此説當審尸之尊如天帝然固無就洗之理其入門也以盤匜盥水則士師沃之王有獻尸之事必就洗以致潔士師亦沃之鑊水本小司寇所實士師則洎而增之凡此皆取其明清於用刑使之沃使之洎也洎猶暨暨及也故有增之之義鄭康成曰洎謂增其沃汁王氏曰沃尸及王盥所以致潔除污穢王昭禹曰小司寇實鑊水士師續司寇之事而終之也賈氏曰此直言祀五帝沃尸及王盥其餘冬至夏至及祭先王先公所沃盥小祝則沃尸盥小臣沃王盥也鬱人凡祼事沃盥惟在宗廟為祼時凡刉音幾珥而志反則奉犬牲鄭鍔曰刉珥二事總謂釁禮羊人及肆師皆作刉珥刉謂刲割也以釁成廟之禮雍人舉羊升屋自中屋南面刲羊血流於前乃降刉字與刲同義用犬為牲大小祭祀以司寇奉之士師則奉於所釁之時珥當為弭與小祝彌災兵之意同注謂珥當為衈用牲毛者曰刉羽者曰衈不知此奉犬牲犬豈有羽哉愚案詳見肆師諸侯為賔則帥其屬而蹕于王宫大喪亦如之鄭鍔曰或謂諸侯為賔行燕享然也蹕王宫何耶蓋饗在廟燕在寢帥屬蹕王宫則在寢時也易氏曰帥其屬而蹕王宫所以肅朝廷之儀李嘉會曰大喪有廬舍之居亦當蹕宫以備非常王昭禹曰大司寇小司寇言使帥其屬非必親帥之也士師言帥其屬則親蹕矣大司寇蹕邦事小司寇蹕國事故士師蹕王宫而已大師帥其屬而禁逆軍旅者與犯師禁者而戮之鄭鍔曰王師所過而敢有沮遏或所須而有不從令者軍中之禁而輒敢干犯則不循軍法之人也安可不戮耶晉魏絳將與狄人戰于太原荀吳之嬖人不肯即卒則斬之雞澤之盟晉侯之弟揚干亂行於曲梁魏絳戮其僕正謂是也易氏曰帥其屬而行其戮所以正軍旅之法凡此皆以刑官之士師任其職重其事也歲終則令正要會鄭鍔曰令刑官之屬爾易氏曰小司寇於正歲命其屬入會乃致事者入此歲終所正之要會也鄭康成曰定計簿正歲帥其屬而憲禁令于國及郊野鄭康成曰去國百里曰郊郊外謂之野鄭鍔曰小司寇所宣布者及四方之逺士師憲其近也周禮訂義卷六十
