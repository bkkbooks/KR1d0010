body:
  text: 周禮訂義卷十六宋王與之撰凡造都鄙制其地域而封溝之以其室數制之不易之地家百畝音畝一易之地家二百畝再易之地家三百畝鄭康成曰都鄙王子弟公卿大夫采地其界曰都鄙所居也春秋傳曰遷鄭焉而鄙留賈氏曰是鄙所居不遷賈氏曰此謂三等采地也載師家邑之田任稍地則大夫之采也小都之田任縣地則六卿之采也大都之田任疆地則三公之采也親王子弟與公同處而百里次疏者與卿同處而五十里次疏者與大夫同處而二十五里愚案周公言都鄙者甚多當於司徒造都鄙之文著其詳焉蓋據載師言之特謂大夫采地在王國之三百里卿采地在王國之四百里公采地在王國之五百里爾未嘗明言公卿大夫采地各有幾里也小司徒注始總言之賈氏疏遂定為公百里卿五十里大夫二十五里後世説禮者因仍不易若然又與王制所謂百里七十里五十里之制異矣王氏詳説曰王制是夏制也文王孫子本支百世文之昭武之穆與夫周公之祚嗣有功德者皆以次出封而無功德者亦各以親疏食采畿內借使周之內諸侯與外諸侯之分土一同則雖極禹迹所至之處亦不足以封螽斯衆多之子孫大抵皆有以處之也圖説曰孟子曰天子之卿受地視侯大夫受地視伯元士受地視子男以八命之公六命之卿其地視九命七命之公侯以四命之大夫其地視七命之伯以三命之元士其地視五命之子男蓋在內者卑其命而祿必視其外則名有所屈而實有所養在外者崇其命而祿不異乎內則名有所伸而實有所守載師以宅田士田任近郊之地等云者此所謂視侯伯子男者也士之受田寡矣而近地為可食故任之於近郊公卿大夫之田多矣非逺地不可故任之於縣疆此周采地之别也夫以武王之母弟八人雖曰五叔無官然所謂曰管曰蔡曰成曰霍曰毛者亦其采地也商之三仁箕子微子以爵言而比干特謂之王子比干無可食之采地他可知矣試以縣內九十三國之數明之為百里者九而三公之田與三公之致仕者處其六所以待王子弟者三而已為七十里者二十有一而六卿之田與三孤及六卿之致仕者處其十五其所以待王子弟者六而已為五十里者六十有三而二十七大夫與二十七大夫之致仕者處其五十有四所以待王子弟者九而已知此則知夏商之內諸侯為少而周之內諸侯為多多少不同其數則廣狹不同其封也明矣愚案此言食采之數本疏五十里二十五里之説愚案周之建都鄙外有封域溝樹之固內有城郭市朝社稷宗廟之别使之朝夕涖事王朝而退食於家其家不出王城而都鄙乃在三百里以至五百里之內猶民之㕓里在國而受田於鄉茍必還在采邑之都則其列職常往返于數百里之逺而在途之日多在朝之日鮮矣要知都鄙之主則以吏居之如冉求為季氏宰而後采地之封者不過得食其祿此尹氏崔氏春秋所以譏世卿歟鄭鍔曰造者為而成之之義王制曰凡居民量地以制邑度地以居民地邑民居必參相得史氏曰封之所以止其窺覘溝之所以禁其侵奪然後屋室得以安居焉鄭康成曰城郭之宅曰室詩云入此室處以其室數制之謂制丘甸之屬黃氏曰造都鄙與建邦國不同建邦國以土圭土其地而知其廣狹遂以制其域居其所當授之民宜必有餘地造都鄙直以其所當授之民室數制其地山川溝塗皆豁除以實地計固不使不足亦不使有餘故其下出易法陳君舉曰此其制邑之地制非田制一邑之內則有肥磽之不等茍以百畝之地拘之則不足以容百里非所以為邑惟以室數制之所以立不易一易再易之制田則遂人掌之史氏曰不易者土力厚一歲一種再易者土力薄再歲一種三易者土力益瘠率三歲而一種易者更迭而種也再易一倍不易之地三易二倍不易之地而其所出不過同為百畝之獲也薛氏曰古之南北一步東西百步六尺為步歲不易者為上田農夫受上田百畝歲一易者為中田農夫受中田二百畝歲再易者為下田農夫受下田三百畝一易再易非苦世俗之説荒之而不耕也不易者只是一畝三甽一易者二畝三甽再易者三畝三甽所以愛惜地力如甽廣一尺甽高一尺詩所謂十千維耦者耜廣五寸二耜為耦合耕正得一甽也晉作爰田乃不問一易再易之地破其疆甽任民自耕不間水旱凶荒至商鞅破井田開阡陌則又以二百四十步為畝昔之南北一步者開為百步故謂之陌東西百步者開為千步故謂之阡開拓土疆除去煩細令民自盡力於其間其意蓋以田愈實則兵愈增而先王之意亡矣陳君舉曰王制正義農夫受田實有九等案大司徒不易一易再易之地惟有三等者大司徒言其網其實不易一易再易各為三等則九等地見異議説愚案左氏異議見小司徒九夫為井下林氏説最詳鄭鍔曰遂人頒田里土地田百畝萊五十畝以至萊二百畝與此正同然都鄙不易之地無萊者遂地有萊以利上農實遂地以強本也此不論餘夫之地者蓋都鄙之地小於鄉遂造之之法止以授田之家計之而已餘夫非所當計也愚案餘説見小司徒乃分地職奠地守制地貢而頒職事焉以為地法而待政令王昭禹曰凡有職於地者皆地職若三農園圃虞衡藪牧之類凡有守於地者皆地守若山虞掌山林之政令物為之厲而為之守禁黃氏曰變職言地守特出之定山澤界域不使與井牧殽雜凡山澤有田其民耕之謂之山澤之農而其地乖離不可井牧定其界域焉凡有貢於地者皆地貢也若農以耕事貢九穀圃以植事貢草木既分地職奠地守制地貢則分命使各為其所職之事頒者以等級分之也王氏曰頒職事典田之官各有所掌黃氏曰職事即下所頒十二職先王常恐其殽亂工飭材賈通財猶本於地之所生學藝世事服事治人者也地法則地職地守地貢各有度數存焉故謂之地法頒職事以為地法亦所以待上政令之事黃氏曰自建國而下至此總敘之見授職奠守制貢之為一法也鄭鍔曰地職已分地守已定地貢已制則其法立矣乃頒職掌於都鄙之長使之循此以為地法以待王朝之政令史氏曰政者上為之章程令者下得以奉行孟子曰仁政必自經界始黃氏曰政令凡師役會同賔客喪紀稅斂皆是以荒政十有二聚萬民鄭康成曰荒凶年也鄭鍔曰金穰水毁木飢火旱或不可逃所恃以無恐者有救荒之政以聚之則雖荒而不流徙矣史氏曰大司徒裂土以封諸侯度地以授萬民宜先於賦斂而首及於荒政聚民之教有以見先王本以恤民為主一曰散利史氏曰民茍離散則財聚何益記曰財聚則民散財散則民聚此荒政所以先於散利李氏曰夫家之征則薄之山澤之禁則弛之關之譏則去之所以充一歲之入而為國之經費者今皆以豫民則已厚矣而又散利果何從給乎吾是以知其所以為荒政之備者其蓄積有素也王昭禹曰若遺人云縣都之委積以待凶荒是也後世常平義倉斂散之法美意出於此二曰薄征鄭司農曰薄征輕租稅也鄭鍔曰賦必取盈則民方艱食固無以輸不取則國有所須將何以給姑從其薄而已三曰緩刑鄭鍔曰凶荒則犯禁多憫而不刑則犯者益衆嚴以示禁則飢民之犯或出於不得已姑緩之可也易氏曰若朝士於邦凶荒則慮刑貶是也四曰弛力鄭司農曰弛力息徭役也王氏詳説曰若均人云凶札則無力征是也五曰舍禁劉執中曰山澤林麓既不以封於諸侯則設虞衡之禁所以蕃鳥獸育草木以盡乎萬物之性也民既失食則宜開其禁故舍禁之政行焉六曰去幾王氏詳説曰先鄭以為關市不譏誠得其説矣然諸儒惑於司關之文有曰國凶札則無關門之征猶幾曽不謂門關與市蓋異乎司市曰國凶荒札喪則市無征而作布去幾者市之去幾也門關所以防姦人之出入不幾得乎況荒政十有二有可據經為説者有不可據經為説者舍禁之事不見於虞衡殺哀之事不見於宗伯多昏之事不見於媒氏除盜賊之事不見於司寇要之荒政之設為後人設耳七曰眚禮鄭鍔曰掌客云凶荒殺禮則眚禮者損夫吉禮也眚與省同劉執中曰省祭祀之禮所以節財用厚賑恤也八曰殺哀鄭康成曰殺哀謂省凶禮劉執中曰國之哀戚必有重禮以將其誠以斯民之困殍有所不能備則殺哀之政行焉九曰蕃樂鄭鍔曰先儒謂蕃樂者蕃當為藩有閉止之義凶荒則宜止樂而不作大司樂於大札則令弛縣其意一也十曰多昏劉執中曰昏必用六禮禮以荒而不可備時雖荒而不可失也故多昏之政行焉史氏曰古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民十有一曰索鬼神劉執中曰鬼神雖幽能助隂陽以為水旱札瘥者必索而祭之王氏詳説曰若司巫云國有大災則帥巫而造巫恆是也史氏曰詩云靡神不舉靡愛斯牲圭璧既卒寧莫我聞遇災而索鬼神所以祈民福也十有二曰除盜賊李景齊曰除盜賊必見於荒政者誠以盜賊於凶年為多盜賊不可不除然使賙救拊循之責未盡而遽欲除之則是罔民而已故散利薄征弛禁去幾凡所以生養吾民無所不盡其至而彼猶為盜賊之歸則不得已而除之故荒政以除盜賊為末史氏曰傳曰牧民如牧羊當去其敗類者凶荒而除盜賊防其嘯聚為民害也總論吕氏曰荒政十有二其目須當詳講一曰散利二曰薄征此兩者荒政之始散利是發公財之已藏者薄征是減民租之未輸者已藏者既發之未輸者又薄之荒政之大綱既舉矣三曰緩刑四曰弛力緩刑謂民迫於飢寒不幸而有過失緩其刑辟以示哀矜之意弛力者平時用民之力歲不過三日今則當用者亦弛之不用所以休息百姓五曰舍禁平時所謂山虞林衡皆有所掌至荒政則徹去藩籬恣民取之六曰去幾平時關防皆有幾察荒歲必要百物流通使天下商旅出於其市此救荒之要術七曰眚禮此則專理會荒政凡禮文之可省者省之如有弊無牲之類八曰殺哀凡是喪紀之節一皆減損所謂不以死傷生專理會荒政九曰藩樂時和歲豐所以與民共樂樂民之樂亦當憂民之憂所以荒歲不樂十曰多昏凶荒之年多是匹夫匹婦不能自保所以殺禮而多昏使男女自相保之義十有一曰索鬼神靡神不舉並走羣望之類是也十有二曰除盜賊前面説緩刑此説除盜此便是經權皆舉處既與民共憂不幸民有過固可哀矜至於姦人亦有伺變竊發者凶荒之歲民心易動一夫呌喚萬夫皆集所以必以除盜賊終之此止亂之道大抵聖人之經蓋通萬世而可行者其條目皆止於此然周禮之書六官分職合之則有總散之則有所司其關節脈理皆自相應只去大司徒上看未盡若遍考六官則荒政秩序可見且如散利須考大府天府內府凡掌財賦之官如薄征須考九職九賦九貢如緩刑須考司寇士師所掌之刑它莫不然參觀遍考然後可知以保息六養萬民史氏曰救荒之政醫者之攻療保息之政醫者之調養既有以救之又有以養之民不相保而蕃息者未之有也易氏曰息有生生不窮之義保其息而使之有所養者聖人也鄭鍔曰有以保之使之安而不危有以息之使之生而不傷李景齊曰先王之時户口有版生齒有數其切切然計民數之多寡誠以民生或耗必其養民之政有所未備者兹所以保息之道有六蓋欲天下無一夫之不獲其所以求民生之蕃息也先王盛時户口極多者蓋出於此一曰慈幼鄭鍔曰保息之道莫先於慈幼人方幼稚如木初萌偶搔而絶之可以絶其類將以養民宜自幼者始王制十四以下不從征役後世之法亦有生子三人則與之母者慈而愛之也二曰養老鄭康成曰七十養於鄉五十異粻之屬鄭鍔曰八十九十曰耄百年曰期頤月有所給或行復除乃所以養之三曰振窮鄭鍔曰鰥寡孤獨謂之窮民皆有常餼乃所以振之也四曰恤貧鄭康成曰貧無財業廩貸之劉執中曰不幸而有凶喪禍患陷於貧窶不能自存者則鄉閭有以恤而贍之不得貧困焉五族為黨使之相救五黨為州使之相賙此其一端也五曰寬疾鄭鍔曰人有疾者茍遲而俟之使得以調治或有能生之理見其疾也又從而勞役之不少寬假則以小疾而斃者多矣故特以寬為言六曰安富鄭鍔曰富家巨室小民之所依賴資其有餘以補其不足茍謂其富厚而賦取無藝富者不安小民亦失所依非國家之福漢武因豪富算緡錢中人之家大抵皆破而海內蕭然蓋不知安富之道李氏曰大司徒十二教先曰以度教節則民知足謂以法度教之使知尊卑之節則民之所用雖少自可以足也以本俗六安民其六曰同衣服謂民雖有富者衣服不得異皆深衣而已則富者安也自周綱解紐禮樂崩壞商賈大者衣必文繡食必粱肉以其資厚交通王侯以富相軋以利相傾千里遊遨冠蓋相望乘堅策肥履絲曵縞兼并豪黨之徒以武斷於鄉曲宗室公卿大夫以下爭于驕奢室廬輿服僭於上無限度而貪人恣行矣凡風俗之所以薄獄訟之所以繁者民貧故也以本俗六安萬民鄭康成曰本猶舊也項氏曰本其俗之所習則民心乃安劉執中曰本謂根本也使俗有本安於其生如木之不可拔則曰本俗而可以安萬民使之戀其里閭雖有災難不忍舍之而適于他邦一曰媺宮室鄭康成曰媺謂約椓攻堅風雨攸除各有攸宇劉執中曰謂野廬及邑居之宮室里正以時預飭修治必使牢密媺而不弊詩云上入執宮功穹窒熏鼠塞向墐户入此室處媺其邑居也又曰晝爾于茅宵爾索綯亟其乘屋其始播百穀媺其野廬也二曰族墳墓鄭康成曰族類也劉執中曰考妣祖先族而葬之萃于一處則子孫之心有所依慕不忍舍之以適他邦故一其志安於里閭也鄭鍔曰太公封於營丘比及五世皆反葬於周是也愚案呂氏説見冡人三曰聨兄弟鄭康成曰聯合也鄭鍔曰自一世二世而後分房析族寖以疏逺相視如路人者以兄弟之不聯也劉執中曰井田之法民受一夫而兄弟衆多者必使受田同井則手足相應衣食相資父母相接子孫相親亦所以安之而使不能去四曰聯師儒鄭康成曰師儒鄉里教以道藝者劉執中曰百家為族則同其族室有儒以教之五族為黨則同其黨庠有師以範之少小同其師儒長立同其道藝情親義合亦有以安之而不忍去孫氏曰先王之於民隆師儒之教而不具學校之制非故略之也亦有所不必具也周之建國固嘗為之學矣然所合者國子弟而已後之作王制者曰國之俊選皆造焉質之周官無明文不知果與乎其間否邪借使得與胄子並進不過已興於鄉者惟州長有所謂州序黨正飲酒于序以正齒位不指州而言疑黨亦自為序然皆不載制度之詳豈非州黨之間切磋琢磨之地相會以時相先以禮本無法制之可言即如使後世羣天下之士於學廩之有食然後為教養之盛則浮薄囂競之風已熾於斯時矣奚取乎長育人材之道哉五曰聯朋友劉執中曰道合為朋志合為友交相琢磨成其德行則其義益不可忘亦足以安之而不可去也六曰同衣服鄭康成曰同猶齊也民雖有富者衣服不得異王昭禹曰古者長民衣服不二以齊其民而民德歸一則同衣服者本俗所以成終始可謂民德之成也劉執中曰𧖟桑機織之事非一婦可成同井之家更相為助然後衣服得以同時而成詩曰女執懿筐遵彼微行爰求柔桑八月載績載玄載黃為公子裳則婦女所以聯其衣服之道也正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾子協反日而斂之李景齊曰此亦冢宰垂治象之意夫先以保息養萬民次以本俗安萬民而後繼以垂教象之法蓋所施之次第若此未有以養之安之而遽欲教之則無常産固難責其有常心徒有以養之安之而無以教之則飽食逸居正恐其鄰於禽獸耳此庶富教之序鄭康成曰正月之吉周正月朔日也司徒以布五教至正歲又書教法而縣焉史氏曰其曰教象見乃謂之象也鄭鍔曰教象之法謂六德六行六藝與夫書考賔興之法皆國之舊章非每歲更變其舊蓋因歲首示更新之意而已必垂而示之使之熟觀洞曉至於十日然後收而藏之仁民之意深矣乃施教法于邦國都鄙使之各以教其所治民鄭鍔曰或謂已言布教于邦國都鄙又言施教法于邦國都鄙何也蓋有教典有教法布以教典使之知所守施以教法使之知所行教法既布都鄙邦國宣化承流之職各推而行之以教其所治之民令五家為比毗志反使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙音周五州為鄉使之相賔鄭康成曰此所以勸民使之者皆謂立其長而教令使之項氏曰人之生有天屬焉有人屬焉天屬則不待教而相親至於人屬無事則相往來有事則相棄背非上之人有以教之不可也是故先王為比為閭則必有以令之相保相受則必有以使之令之則不容於或遺使之則不容於或背鄭康成曰保猶任也呂氏曰五家為比其居甚近非特同其休戚亦可察其奇邪故使之相保保有二義有保民而王之保有不保其往之保此蓋兼言鄭氏曰閭二十五家受者宅舍有故相受寄託也王昭禹曰二十五家為閭門則居足以相容使之相受鄭康成曰族是百家陳君舉曰百家之中不幸有死者相與辦其葬事不使五家與二十五家供之者以百家然後衆輕易舉也呂氏曰族獨以四為數欲湊成百人故也鄭康成曰黨五百家救救凶災也陳君舉曰大利害大患難非百家所可禦必五百家然後足以相救鄭康成曰州二千五百家賙謂禮物不備相給足也陳君舉曰水旱凶荒欲以相賙又非五百家所能辦惟二千五百家則其地必闊必無皆水皆旱之理庶幾有無可以相通鄭康成曰鄉萬二千五百家賔賔客其賢者鄭鍔曰三歲賔興之時彼賢彼能我從而賔之我賢我能彼亦賔乎我故使之相賔陳君舉曰閭胥書其敬敏任恤賢於五比而已族師書其孝悌睦姻有學賢於四閭而已黨正書其德行道藝又五百家之賢而已州長考其德行道藝則又二千五百家之賢而已至於一鄉萬二千五百家所謂賢者必灼然可用使之相賔王昭禹曰鄉遂之制始於五家之寡而終於萬有二千五百家之衆居雖異室而從容若一家體雖異腹而和合若一心司徒以安之則相為愷悌焉司馬以用之則相為憂患焉鄭鍔曰凡此比閭族黨州鄉之制載於地官蓋王國之六鄉而在近郊百里之內也平居使之相保相受如此故有事則用而為六師余考諸侯大國三軍次國二軍小國一軍蓋合比閭族黨之民以為之而不見其制今觀此文乃施教法于邦國都鄙使之各以教其所治民令五家為比五比為閭乃知諸侯之邦亦用王畿六鄉之制合為比閭族黨也蓋上言施法於邦國都鄙下文言使之又言令之則所使所令者乃邦國都鄙之君也以是觀之諸侯之國六鄉之制與王國皆同可知圖説曰鄉遂之制上公之國三鄉三遂侯伯之國二鄉二遂子男之國一鄉一遂書曰魯人三郊三遂蓋言郊則知遂之在野言遂則知郊之為鄉魯大國也故三郊三遂大宗伯乃頒祀于都家鄉邑大司馬簡稽鄉民以用邦國則邦國亦冇鄉遂明矣頒職事十有二于邦國都鄙使以登萬民王昭禹曰頒以九職三事也王氏曰登言進而成之九職任萬民加三事焉所以進而成之也鄭鍔曰言用此以進其業也民之常情好逸惡勞自安而不知勉此業所以不能進任以職事使之勉勵赴功乃所以登之矣大宰九職用於王畿之內然邦國都鄙不可無任民之職於是設為十有二職以頒之使用是以登進之也劉執中曰大宰主治任之以職而已司徒主民不止任之以職又登于籍焉謂能稼穡者則登於三農之籍能樹藝者則登於園圃之籍也一曰稼穡二曰樹藝三曰作材四曰阜蕃五曰飭材六曰通財七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事鄭司農曰稼穡謂三農生九穀也樹藝謂園圃育草木作材謂虞衡作山澤之財阜蕃謂藪牧養蕃鳥獸飭材謂百工飭化八材通財謂商賈阜通貨賄化材謂嬪婦化治絲枲斂材謂臣妾聚斂疏材生材謂間民無常職轉移執事鄭鍔曰間民無常職宜不能生材然而轉移執事其材實賴以生焉學藝謂學道藝世事謂以世事教能則民不失職黃氏曰學藝士也夫人皆得學之世事公卿大夫士之胄嗣古者進興不出此二者服事謂為公家服事者賈氏曰公家服事若府史胥徒庶人在官者孫氏曰九職之外加以三焉則以三者與九職之民共之使民心服上之教而保其職業者也學藝民材所由興世事民志所由定服事軍旅田役追胥所由習若夫閭師所任者國中四郊之民因以征斂其材賦所謂九功之貨賄也以鄉三物教萬民而賔興之愚案三物八刑皆言鄉者蓋教法始於六鄉故也鄭康成曰物猶事也史氏曰無形無名者道也有形有名者物也得之於心為六德行之於身為六行習之於事為六藝是三者有形有名矣故謂之三物鄭康成曰興猶舉也民三事教成鄉大夫舉其賢者能者以飲酒之禮賔客之既則獻其書於王矣李景齊曰成周賔興萬民者不一而足若所謂三物者曰德曰行曰藝是也德不足則取之以行行不足則取之以藝其取之亦廣矣未也所謂德行藝者皆析而六之曰智仁聖義忠和曰孝友睦姻任恤曰禮樂射御書數誠恐難以責其材之全則凡於六德六行六藝之中得其一者皆足以自進此天下所以無遺材之恨然則取士之目最廣者蓋莫詳於周而謂其不以科目取士何哉是古非今者類欲屏去後世之科目而復還古人里選之制不知古人所以來天下之才者特以其科目之廣耳若夫才必就於其所養而成於其所教此大司徒所以教以三物而後賔興之歟一曰六德知仁聖義忠和鄭鍔曰成於性者德也德則有知仁聖義忠和之别臨事不惑先事而知者知也項氏曰知動而明事自博愛而兼愛者仁也鄭康成曰愛人以及物通睿而能化者聖也史氏曰以其無不通能制事變使各得其宜者義也教人以善推誠不欺者忠也鄭康成曰忠以中心喜怒中節不為崖異斬絶之行者和也鄭康成曰不剛不柔凡此皆成於性而自得者故名之為德二曰六行孝友睦姻任恤鄭康成曰善於父母為孝善於兄弟為友睦親於九族姻親於外親任信於友道鄭鍔曰能信乎朋友者任也恤振憂貧者鄭鍔曰能周恤於患難者恤也鄭鍔曰凡此皆見於所行故名之曰行三曰六藝禮樂射御書數鄭鍔曰禮者知揖遜之威儀史氏曰五禮所以防其偽樂者達節奏之高下史氏曰六樂所以防其情射則明五射之法史氏曰五射之儀足以觀其德御則熟五御之節史氏曰五御之節足以觀其知書則明六書之品史氏曰心畫見於六書數則知九數之計史氏曰物變見於九數是皆才之所長故命之為藝説者曰射御書數曰藝可也禮樂之妙與天地同流古之所謂賢聖亦由通於此而已名為一藝用以教人何也通乎天地者禮樂之理也可以教人者禮樂之法也六藝之禮樂如此而已易氏曰六德藴於內六行形於外隨所寓而見皆可得而指言之惟道隱於六藝之中不可以指言故總而名之曰道藝所謂六德者非曰六鄉萬民之衆皆可以為聖知為仁義為忠和也取其明而不惑者謂之知公而不私者謂之仁通變能化者謂之聖制變得宜者謂之義誠實不欺者謂之忠喜怒中節者謂之和此六德為天下之全德由是推之於六行則自孝而友自友而睦自睦而姻以至任於朋友恤於鄉閭而皆得乎親疏內外逺近之序是又此德之所發見也若夫五禮六樂之見於玉帛鐘鼓者為六藝之首五射五御之見於弓矢綏䇿者為六藝之次六書九數之見於文字籌算者為六藝之末是雖藝成而下實有形而上者之道充之以德行則為天下全才之士然先王以全才望天下而不以全才律天下或以德進或以事舉或以言揚曲藝皆誓之茍有一善之可名無不撫而納諸程度繩墨之中以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟音悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑鄭康成曰糾猶割察也不弟不敬師長賈氏曰此不悌即上六行友是也上文言友在睦姻之上專施於兄弟此變言弟退在睦姻之下兼施於師長鄭鍔曰兄宜念鞠子哀弟當念天顯然制刑之意終不為卑者而罪其長故六行則教兄以友而制刑則謂之不弟使少者不敢凌長也鄭鍔曰教民之三物曰六德六行六藝糾民則止於六行何邪人之性有厚薄昏明之異則德不可以皆同人之材有能有不能之别則藝不可以皆能夫六行者日可見之行人人所當勉者也茍不修其行則害于其身禍于其家亂人倫而傷聖治王法所不容人類所不齒是之謂戮民也加之以刑可以無愧矣鄭康成曰造言訛言惑衆亂民亂名改作執左道以亂政也史氏曰五刑之屬三千而罪莫大於不孝故八刑之設以不孝為首而以其餘次序之若夫造言亂民之罪既無與於六行大司徒何與哉蓋造言而不禁則風波以起衆人之疑簧鼓以惑衆人之聽亂民而不禁則淫侈之行興澆詐之風熾如是而望教之行不可得也王制曰析言破律亂名改作執左道以亂政殺而孔子數少正卯之罪亦曰行偽而堅言偽而辨學非而博順非而澤然則造言亂民豈不為害教之大者乎宜大司徒所終禁也有賔興之禮以勸之於前又有八刑以驅之於後民若何不歸君子長者之途哉項氏曰賔興則所謂格則承之庸之也繼之以八刑所謂否則威之也以五禮防萬民之偽而教之中以六樂防萬民之情而教之和鄭司農曰五禮謂吉凶軍賔嘉鄭康成曰禮所以節止民之侈偽使其行得中六樂謂雲門咸池大韶大夏大濩大武鄭康成曰樂所以蕩正民之情思使其心應和賈氏曰獨申禮樂二事者化民以禮樂為急項氏曰偽則有所作為中本湛然作則反中矣情常患於流放和貴中節流則非和矣是故以五禮六樂防之禮非能教中也防其偽則中自不失矣樂非能教和也防其情則和自不失矣或謂制其欲以復其性非也禮樂直防之使不作耳非謂情偽已入復從而制之也鄭鍔曰惟五禮由中而制所以著誠而去偽故可以防其偽惟六樂由和而作所以滌邪心而全正性故可以防其情情偽已去則反其自然之中和何不可之有禮樂之制雖掌於春官用以教民則在司徒而已凡萬民之不服教而有獄訟者與有地治者聽而斷之其附于刑者歸于士鄭康成曰不服教不厭服於十二教貪冒者也史氏曰教而不服則有爭爭而不已則有言於公故曰訟訟而不已則置之狴犴圜扉以折其憤很之氣須其自怨自艾以服吾之教故曰獄鄭康成曰有地治者謂鄉州及治都鄙者也賈氏曰將斷割之時恐其不審故與治民之官共聽而斷之史氏曰大司徒不專聽斷必與其屬共之不以尊嚴自居不以貴勢自驕周流田野諄諄然教其長老以慈順教其子弟以孝悌使比閭族黨燦然有文歡然有恩恤其疾隱致其忠愛未嘗一日不與民接必使王者之教沾濡浹洽無有不服然後已黃氏曰司徒教官而預聽訟之事未歸于士猶冀其可教也項氏曰司徒聽斷止於不服教而有爭訟者爾前所謂孝友睦姻任恤之類凡與於教者是也不與於教而麗于刑者司徒所不當治皆歸于士宜也説者謂司徒與有地治者斷其刑而使士行刑非也鄭康成曰附麗也士司寇士師之屬鄭司農曰士謂主斷刑之言春秋傳曰士榮為大士或謂歸于圜土圜土謂獄也獄城圜史氏曰王制凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之此非大司徒不能也及夫成獄辭史以獄成告于正正聽之正以獄成告于大司寇大司寇聽之棘木之下然後告王而制刑則歸之士者豈得已哉呂氏曰刑與教對立出彼則入此出此則入彼無非左之右之防間天下使遷於善祀五帝奉牛牲羞其肆託歷反鄭康成曰牛能任載地類也奉猶進也鄭鍔曰或謂祭祀之時大宗伯毛六牲而頒之五官使共奉之牛則奉以司徒何也余以為六牲之奉非惟以盡事神之禮蓋使居其官者知其所職之義也牛於五行為土其性順而易制觀千鈞之牛三尺之童持尺箠而驅之弭而行略不敢違者以其順也司徒掌教所以成天下之大順惟因天下自然之性而教之則大順成而天下治矣祀享之時使奉牛牲始也奉之而進終焉解體而羞之因其事以明其義使知設教之本意也史氏曰大司徒為奉牲之長至是不得不奉牛牲也鄭司農曰羞進也史氏曰肆者解其牲體而陳之於俎鄭康成曰進所肆解骨體士喪禮曰肆解去蹄賈氏曰後鄭不從先鄭者案禮運云腥其俎熟其殽注云腥其俎謂豚解而腥之熟其殽謂體解而爓之祭祀之法先豚解後體解經云奉牛牲謂初牽入時即云羞其肆明先豚解享先王亦如之賈氏曰享先王者謂四時并祫禘也亦如之者亦如祀五帝但禘郊之事先全蒸後豚解奉牛牲謂全蒸獻腥也羞其肆謂體解而進之若宗廟之事則無全蒸先豚解次體解奉其牲者腥獻也羞其肆者熟獻也大賔客令野修道委積鄭康成曰令令遺人使為之也少曰委多曰積皆所以給賔客黃氏曰鄭曰令遺人以遺人掌委積也修道則非遺人之事矣遂師曰賔客巡其道修庀其委積司徒令遂人遂人令遂師使各於其遂行之遺人掌委積之政守在遂師鄭鍔曰大賔大客之來往道路以通往來之途委積以共行李之費使賔至如歸亦設教之官修文德以來逺人之意也大喪帥六鄉之衆庶屬其六引而治其政令賈氏曰六鄉七萬五千家唯取一千人致之使為挽柩之役故鄭康成云衆庶所致役也鄭司農曰六引謂引喪車索也鄭鍔曰六鄉內也故屬在前之引六遂外也故屬在旁之紼因其逺近內外理當然也六鄉主六引六遂主六紼賈氏曰遂人職云及葬帥而屬六紼在棺曰紼行道曰引項氏曰引在車所以挽車紼在柩所以弼柩大司徒則檢校六引之事故曰治其政令大軍旅大田役以旗致萬民而治其徒庶之政令賈氏曰凡軍旅田獵所用民徒先起六鄉之衆史氏曰軍旅所以用衆大田所以簡衆大役所以任衆衆之所聚政令行焉不有旗表其觀視何所趨向哉鄭康成曰旗畫熊虎者也徵衆刻日樹旗期民於其下鄭鍔曰余考周家之制熊虎為旗大閲之時師都載之治兵之時軍吏載之蓋衆之所在以威為先也大司徒於大軍旅田役則用旗以致萬民既以為號令且以示威也官尊勢重統而治之彼安得不惟令是從乎易氏曰大司徒以旗致民致之於比閭族黨州鄉之聨也大司馬以旗致民致之於平列陳之際也黃氏曰此六鄉之衆庶用於國中者若起野役則遂人以遂之大旗致若帥諸侯之師則司馬以大常致與追胥竭作故言萬民也若國有大故則致萬民於王門令無節者不行於天下鄭康成曰大故謂王崩及寇兵史氏曰致民於王門備不虞也鄭鍔曰變出於非常姦雄或將乘之故致民守於王門王宫固有宿衛之人鄉遂之衆宜守王門之外鄭康成曰節六節有節乃得行防姦私也大荒大札則令邦國移民通財舍禁弛力薄征緩刑鄭康成曰大荒大凶年也史氏曰水旱蟲螟謂之荒大札大疫病也史氏曰天行謂之札移民避災就賤其有守不可移者則輸之穀春秋定五年夏歸粟於蔡是也劉執中曰凶民可移而豐或不受穀貴可通而賤或閉糶是以移民通財之令出焉劉氏曰令之急於困窮聖人之大務也王氏詳説曰荒政十二所以聚萬民然與令邦國則不同且移民通財政之所無而令邦國之所有也自散利至除盜政之所有而令邦國之所無者天子家天下人中國民吾民也何民之移財吾財也何財之通是移民通財可用於邦國而不可用之於王畿豫奪持之於王威福作之於辟禮樂出之於天子邦國何預焉此散利去幾眚禮殺哀等事可用之於天子而不可用之於諸侯歲終則令教官正治而致事正歲令於教官曰各共爾職修乃事以聽王命其有不正則國有常刑鄭鍔曰歲終周之季冬今之十月正歲夏之正月今之建寅也歲終令致事所以終時王之事正歲聽命則施教自建寅始也王昭禹曰大司徒所掌者教而已故所令止於教官鄭康成曰教官其屬六十正治明處其文書致事上其計簿史氏曰不曰不共而曰不正者以此知先王之教本以正天下也周禮訂義卷十六
