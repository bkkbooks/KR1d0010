body:
  text: 周禮訂義卷四十宋王與之撰大胥中士四人小胥下士八人府二人史四人徒四十人鄭康成曰胥有才知之稱禮記文王世子曰小樂正學干大胥賛之鄭鍔曰閭胥以胥名之謂其才智足以長人樂官名胥胥者相也惟有才智然後能相人大胥相樂官之樂政其所相者於諸胥為大掌學士之版以待致諸子王氏詳説曰文王世子曰凡學世子及學士必時是學士者國子之謂以其父兄有爵於國者言之則曰國子以其衆言之則曰諸子以其教言之則曰學士周之時喬木有世臣棠華有賢者之後夫豈無自哉鄭司農曰版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之黄氏曰學士之版凡學者皆著籍於此獨致諸子將合之於舞位不敢使適子與於此適子嘗學小舞何為至合舞始别異之干戈羽籥不可以不學合舞則有什五有長少將以其才為之等適子雖非才猶不使庶子臨之況有王世子焉漢世取二千石闗内侯子為舞人皆適子不知其義鄭鍔曰宫伯掌士庶子凡在版者司士掌羣臣之版此所謂學士之版皆書名於版以待有用則致之使自至王氏曰其已至者以待之其不至者以致之劉執中曰來學者待而籍之徳成者致其名於王王氏詳説曰大胥既待致諸子夏官復以諸子名官何耶葢夏官諸子掌國子之倅國有大事則帥國子而致於太子若有車甲之事則授之車甲是教之以兵也此教之以樂李嘉㑹曰夏官有諸子掌國子之倅今不曰公卿大夫之子又不曰庶子乃曰諸子者葢諸子所掌之國子修徳學道合學合射其藝已進故令大胥掌其籍而升致之必曰待者待諸子之教治已成此則致之而已故大胥一職止見合舞合聲不見教事以有諸子之教在前也名曰學士非徒國子必國子之才藝者掌其名數之版有其人則充之亦待意也春入學舍采合舞鄭康成曰春始以學士入學宫而學之賈氏曰舍即釋采即菜也鄭鍔曰禮有釋奠有釋菜莫厚於釋奠莫薄於釋菜葢釋奠則有迎牲有酌獻有授舞者器之禮所以致恭於先聖釋菜則不舞不授器不殺牲但以蘋蘩蕰藻之類告䖍於先師而已崔氏曰先師謂禮樂詩書之官周禮凡有道有徳者使教焉死則以為樂祖祭於瞽宗所謂知樂者也若有詩書之徳者亦各祭於其所教之學漢時禮有高堂生樂有制氏書有伏生詩有毛公此之謂先師也藍氏曰釋菜禮之至簡者皆不在多品貴其誠也其用有三每嵗春合舞而行之月令云仲春命樂正合舞釋菜也始入學則行之文王世子云既興器用幣然後舍菜是也學記云太學始教皮弁祭菜示敬道也鄭康成曰合舞等其進退使應節奏黄氏曰樂師教舞帗羽干旄皇人未嘗合也大胥春始入學合而教之秋頒學合聲鄭鍔曰月令春入學合舞秋入學習吹學無二義皆學宫也葢周家建五學其中謂之辟雍水南曰成均水北曰上庠水東曰東序水西曰瞽宗春令學士始入學所入者辟雍也總處於此以觀其能至秋則所觀者已久知其所宜矣於是分而處之宜學禮者處之瞽宗宜學書者處之上庠宜學干戈者處之東序宜學語者處之成均非惟不分學字以為二義又合周家立學之制易氏曰合舞於入學之後合聲於頒學之後是知其為瞽宗之學葢瞽宗見於大司樂有所謂成均之法又有所謂樂祖之祭皆所以為禮樂之教春入學舍采者即入瞽宗之學舍采於樂祖秋頒學者即以成均之法頒之於瞽宗之學楊氏曰鄭解頒學亦有意勝於諸説但亦有過當處頒學只是秋時入學分典學者齋舍為一冬習業居隩避寒之地與春時入學不同故異其文謂之頒學案尚書大傳耰鋤已藏新榖巳入嵗事已畢餘子皆入學距冬至四十五日始出學任農事是一冬九十日當在學之人數甚多非一學所容須分在諸處若四時在學者惟國子與國之俊造其春誦夏弦秋學禮冬讀書皆有常處禮樂皆在瞽宗書在上庠不應至秋時方始分鄭康成曰合聲亦等其曲折使應節奏王氏曰樂之聲以言為本書曰詩言志歌永言聲依永律和聲鄭鍔曰合舞必以春合聲必以秋葢春陽用事徳在木木曰曲直而主乎貌舞見於形貌之間或俯或仰木之象也故合舞以春所以順乎陽秋陰用事徳在金金曰從革而主乎言聲見於辭氣之間或抑或揚金之象也故合聲以秋所以順乎陰王氏詳説曰王制春秋教以禮樂冬夏教以詩書春夏陽也詩樂者聲聲亦陽也是春未嘗不學聲文王世子春夏學干戈秋冬學羽籥干戈武舞羽籥文舞是秋未嘗不學舞此言合舞以春合聲以秋葢大合舞大合聲與平日之學舞學聲異記所言者主教國子此言者主合國子平日所教所以不同以六樂之㑹正舞位以序出入舞者易氏曰合舞合聲教之序也此教之成也故言六樂之㑹鄭鍔曰及教以舞則以六樂之㑹正其舞之位方其分樂而各奏不患其舞位之不正及㑹合而並奏其人多其列衆位始不正矣於是焉必正其位如雲門大卷不可以處後大濩大武不可以居前之類其位已正乃序當舞之人已舞者出未舞者入使先後不失其倫劉執中曰六樂之節疾徐不同六舞之位逺近不一故立表以㑹其節與其位自南表而舞至北表者再表為一成則六成矣自北舞而南者一故舞為九成而樂為九變則表為六樂之㑹者歟出入其表以就八佾者皆以長少為序比樂官鄭康成曰比猶校也鄭鍔曰比校作樂之官欲無一樂之不備杜氏曰次比樂官也展樂器鄭康成曰展謂陳數之鄭鍔曰展省作樂之器欲無一樂之或缺大司樂展其聲此則展其器凡祭祀之用樂者以鼓徴學士鄭康成曰擊鼓以召之文王世子曰大昕鼔徴所以警衆王昭禹曰召之使興舞也序宫中之事王昭禹曰宫中之事謂序王宫之中國子之宿衛而學道藝者春秋之所學各有其序如大胥之所掌是宫正言比宫中之衆寡㑹其什伍而教之道藝則大胥序宫中之事者如此李嘉㑹曰宫伯所掌之事小胥掌學士之徴令而比之王昭禹曰徴則召之使來令則使之有為比則校叙其多寡之數使之類聚而羣分賈氏曰大胥掌學士之版以待召聚舞者小胥賛大胥為徴令校比之攷其在否觵其不敬者鄭康成曰不敬謂慢期不時至也觵罰爵也詩云兕觵其觩劉氏曰罰以示媿恥焉廵舞列而撻其怠慢者鄭康成曰撻猶抶也抶以荆扑鄭鍔曰八人為列左右前後各以其序茍立於其列有怠慢不謹者必撻以記之王氏曰肆師誅其怠慢則祭以懲慢為先小胥撻其怠慢則學以懲慢為急祭言誅之政也學言撻之教也易氏曰比之而不敬然後有所謂觵觵之而怠慢然後有所謂撻正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲鄭康成曰樂縣謂鐘磬之屬縣於筍簴者王氏詳説曰凡樂縣有鐘磬鼔鎛此所謂金石之樂也然磬則無所不縣鐘與鼔鎛則有所謂縣者有所謂不縣者葢周人縣鼓與鎛惟縣一而已是故鎛有不縣者磬師云擊磬擊編鐘磬編鐘則磬師擊之不編鐘則鐘師奏之是鐘有不縣者此磬所以謂衆聲之首也鄭司農曰宫縣四面縣軒縣去其一面判縣又去其一面特縣又去其一面四面象宫室四面有墻故謂之宫縣鄭鍔曰王以宫言見王徳之備周乎四方諸侯則有所缺而不備而況於大夫士乎軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯之禮也故曰唯器與名不可以假人王氏詳説曰天子南面諸侯北面自宫縣以下曰軒縣則缺南面曰判縣則併缺北面曰特縣則非東即西案大射云樂人宿縣于阼階東笙磬西面其南笙鐘其南鎛皆南陳西階之西頌磬東面其南鐘其南鎛皆南陳是阼階西階其位皆北其面在南者皆無縣然又云一建鼔在西階之東南面則是又有南面者何耶説者以為諸侯與其臣大射其縣皆三面所謂南面者鼔而已曰鍾曰磬曰鎛則無縣焉知此則知大夫之判士之特皆無南面所以尊天子矣春秋之時衛侯從仲叔于奚曲縣之請為非禮晉侯賜魏絳歌鍾之半為得禮鄭鍔曰既正其縣又辨别其聲欲其節奏之不爽易氏曰鐘磬鼔鎛其聲不一必待辨而後正項氏曰其聲所用各有律吕故辨其隆殺又正其堵肆之名以見其等降之不同聲不爽則樂必和名不同則禮不僭官曰小胥其所掌豈小哉李嘉㑹曰樂縣不同豈諸侯大夫在國之時其縣則然亦豈朝聘之時王燕享之而所縣之樂若是也葢在國與朝王所用之樂皆然凡縣鐘磬半為堵全為肆薛氏曰杜氏以鐘十六枚為一肆則堵者八枚矣此説然也而鄭氏以各十六枚為一堵鐘一簴磬一簴為肆宜不然春秋傳曰歌鐘二肆是三十有二枚矣故編鐘十有六然後一簴之鐘全編磬十有六然後一簴之磬全一簴之所垂者鐘磬各止於八然後謂之堵鄭氏以鐘一簴磬一簴為肆其半者其或有鐘而無磬有磬而無鐘乎其説固不通矣又曰半之者謂諸侯之卿大夫士諸侯之卿大夫半天子之卿大夫其説未是但泥於十六枚為一堵之説不知八枚為一堵之器至其論士之特縣則曰天子之士縣磬而巳不知鄭氏何所見而言有磬而無鐘不知果何以和樂吾固謂天子之士鐘磬各十六枚為一肆諸侯之士鐘磬各十八枚故為堵鄭鍔曰編鐘八編磬八共十六枚同在一簴名謂之堵堵如墻堵謂其半也十六編鐘為一簴十六編磬為一簴則謂之肆肆如市肆之肆謂其全也左傳鄭人賂晉侯以歌鐘二肆又觀晉侯以樂之半賜魏絳魏絳於是乎有金石之樂晉諸侯耳當三面之軒縣葢得二肆之半分為左右歟易氏曰天子宫縣每面鐘磬各十六枚四面各六十四枚諸侯以下降殺以兩諸侯三面鐘磬各四十八枚卿大夫兩面鐘磬各三十二枚士一面鐘磬各十有六枚雖尊卑多寡不同而每面皆各十六枚故謂之肆若諸侯之卿大夫判縣則每面鐘磬八枚兩面共鐘磬各十有六士特縣各八枚而已惟其得每面之半故謂之堵大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人眡瞭三百人府四人史八人胥十有二人徒百有二十人或曰大師之職專在和合樂聲故夫子語大師樂非善知音聲何能職此哉薛平仲曰自司樂至小胥所掌皆樂之事則樂事之或奏或歌要必有所屬是故奏歌其樂者瞽矇也所以相瞽而奏歌者則眡瞭也以奏歌而教瞽矇者小師也所以使瞽矇之有所取正者則大師也是以大師之官必以下大夫二人居之賈氏曰此下直云瞽矇三百人無府史胥徒者以其無目不須人使是以有眡瞭三百人李嘉㑹曰瞽矇祭祀所用不若是多也而數之多至三百人先王以待天下之瞽矇焉耳掌六律六同以合陰陽之聲陽聲黄鍾大蔟姑洗𬎼賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾愚案六律六同詳見大司樂胡氏曰律以統氣類物吕以旅陽宣氣黄鍾者中之色為六氣之元始於子在十一月二曰大蔟蔟奏也言陽氣奏地而達物也位於寅在正月三曰姑洗洗潔也言陽氣洗物姑潔之也位於辰在三月四曰蕤賔蕤繼也賔導也言陽始導陰氣使繼養物也位於午在於五月五曰夷則則灋也言陽氣正灋度而使陰氣夷當傷之物也位於申在七月六曰無射射厭也言陽氣究物而使陰氣畢剥落之終而復始亡厭已也位於戌在九月吕者一曰大旅旅旅也言陰大吕黄鍾宣氣而芽物也位於丑在十二月二曰夾鍾言陰夾助大蔟宣四方之氣而出種物也位於卯在二月三曰仲吕言微陰始起未成著於其中旅助姑洗宣氣濟物也位於已在四月四曰林鍾林君也言隂氣受任助蕤賔君主種物使長大茂盛也位於未在六月五曰南吕南任也言陰氣旅助夷則任成萬物也位於酉在八月六曰應鍾言陰氣應無射該藏萬物而雜陽該種也位於亥在十月皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹愚案文之播之詳見大司樂王昭禹曰太𤣥曰聲生於日律生於夜聲非十二律不能發律非五聲不能節五聲非變不能盡故一律之中莫不具五聲五聲之中有所謂五變五聲之本生於黄鍾黄鍾為宫管九寸九之則其數八十一三分宫而去一下生徴其數五十四三分徴益一而上生商其數七十二又三分商去一而下生羽其數四十八三分羽益一而上生角其數六十四多者濁少者清大不踰宫細不踰羽徴之聲又清於角角之聲又清於商其配則土火木金水其象則君臣民事物易氏曰五聲寓於八音八音實直乎八卦金鐘也屬兑石磬也屬乾土塤也屬坤革鼔鼗也屬坎絲琴瑟也屬離木柷敔也屬巽匏笙簧也屬艮竹簫管也屬震薛氏曰以方言之金石土類也西凝之方故三者在西匏竹木類也東生之方故三者在東絲成於夏故在南革成於冬故在北大師之序先之以金石土中之以革絲後之以匏竹木葢西者聲之方虚者聲之本故音始於西而終於東西則先金石而後土者陰逆推其所始東則先匏竹而後木者陽順序其所生革絲居南北之正而先革後絲者亦先虚之意歟李嘉會曰萬物盈天地間若堅若脆若勁若韌若實若虚若沈若浮莫過於金石土革匏絲竹木而天下之音具有焉鄭鍔曰文之以五聲足以相生未足以為樂必以八音播之則樂成而可聽矣播言播而散之也金石以動之絲竹以行之匏以宣之瓦以賛之革木以節之此樂之所以成教六詩曰風曰賦曰比曰興曰雅曰頌鄭鍔曰大師掌吹陰陽之管以和樂又教六詩夫詩之六義彼人安能通知以教人耶康成以為教瞽矇彼為瞽矇者安能有六徳以為本耶愚謂是説康成之失也以理推之葢教國子以歌六詩耳彼疑國子不當學詩於樂工殊不知古者作樂必歌詩以為音風賦比興雅頌皆所歌之音知音調之高下惟大師耳國子不學於大師而誰學耶大司樂能教之以其義大師能教之以其音故曰教六詩王昭禹曰一國之事繫一人之本謂之風鄭康成曰風言聖賢治道之遺化也言天下之事形四方之風謂之雅鄭康成曰言今之正者以為後世法美盛徳之形容以其成功告於神明謂之頌鄭康成曰頌之言誦也容也誦今之徳廣以美之風出於徳性雅出於灋度頌出於功業三者詩之體也直述其事而陳之謂之賦鄭康成曰賦之言鋪直鋪陳今之政教善惡以其所類而況之謂之比鄭康成曰比見今之失不敢斥言取比類以言之以其所感𤼵而比之謂之興鄭康成曰興見今之美嫌於媚諛取善事以勸諭之三者詩之用也即其章言之則曰六詩即其理言之則曰六義大師教之以樂章故曰六詩以六徳為之本鄭鍔曰此六徳乃大司樂所教國子中和祇庸孝友之徳若以為教瞽矇則彼賤工詎可責以中和祗庸孝友之徳哉王昭禹曰君子之學詩豈徒誦其空言要之本於徳而巳以六律為之音鄭鍔曰六徳為之本所以成其性六律為之音所以和其聲大司樂之教施於前然後大師之教行於後康成又謂以律視其人為之音乃引子貢問師乙以已宜歌之事為證子貢所論者人之性非論六律為音之義亦康成之失黄氏曰聲成文謂之音不以六律音不可得而正也王氏曰以六徳為之本故雖變猶止乎禮義以六律為之音則書所謂聲依永律和聲也王昭禹曰言以六徳為之本則知所謂音者末也言以六律為之音則知所謂本者性也教六詩雖以六徳為之本然非播之於音則其聲無所𤼵非和之以律則其音無所正楊氏曰以六徳為之本故可以觀可以怨仁言不如仁聲之入人深也以六律為之音故可以美教化移風俗大祭祀帥瞽登歌令奏撃拊鄭司農曰登歌歌者在堂登歌下管貴人聲也賈氏曰謂下神合樂皆升歌清廟故將作樂時大師帥瞽人登堂於西階之東北面坐而歌者比瑟以歌詩也王昭禹曰撃拊即書云撃石拊石此堂上之樂也黄氏曰明堂位曰拊搏玉磬揩擊大琴大瑟中琴小瑟四代之樂器也是登歌則擊磬戞擊鳴球搏拊琴瑟皆擊也玉磬琴瑟皆有擊拊之名鄭司農曰樂或當擊或當拊是也鄭康成曰拊形如鼔以韋為之著之以糠賈氏曰拊所以導引歌者故先擊拊瞽乃歌也歌者出聲謂之奏王昭禹曰小師云登歌撃拊則擊拊者小師而大師令奏之下管播樂器令奏鼓􅉧賈氏曰歌者在上匏竹在下故云下管鄭司農曰吹管者在堂下鄭康成曰特言管貴人氣也賈氏曰聲出曰播謂播揚其聲奏即播也黄氏曰播以樂器播詩也樂器鼗柷敔塤簫管也賈氏曰樂器即笙簫及管鄭鍔曰康成謂鼓􅉧管乃作葢以鼔為考擊之義然經文既言奏不當又言鼓則令奏鼓􅉧者令樂工奏大鼔與小鼔也鼔為衆樂之號令故欲播樂器必奏鼓將奏鼓必奏􅉧以為之引也鄭司農曰朄小鼓也先擊小鼔乃擊大鼓小鼓為大鼔先引故曰朄􅉧讀為道引之引易氏曰奏撃拊以導歌而後瞽者歌焉奏鼓􅉧以導管而後樂器播焉樂之與歌必有所導而後從必有所令而後奏此節奏之序大饗亦如之王昭禹曰所以敬諸侯亦如祭祀之禮大射帥瞽而歌射節鄭鍔曰帥瞽矇而歌騶虞貍首采蘋采蘩之詩以為射節李嘉會曰大射則有歌小射則不歌亦如大獻之有愷歌小獻止於樂也大師執同律以聽軍聲而詔吉凶鄭康成曰大師大起軍師兵書曰王者行師出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士强角則軍擾多變失士心宫則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威明易氏曰六律陽聲六同陰聲即陰陽以候其氣則葭灰一動而八風從律以十二律應十二風而後可以察天地之和大師以是而聽軍聲宜其吉凶應焉王昭禹曰師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功古之人所以望敵而知吉凶先事而知勝負者用此術也然王者之師而猶聽軍聲而詔吉凶葢兵凶器戰危事聖人不敢輕也易氏曰占軍旅之勝者無過於天時大史抱天時與大師同車亦以同律之所聽者可信不誣故耳大喪帥瞽而廞作匶諡王昭禹曰死則陳儀物於庭序以興觀者欽則謂之廞鄭康成曰廞興也興言王之行謂諷誦其治功之詩考列其徳行而誄之以言則謂之諡於大喪之廞則帥瞽而作匶諡以瞽掌樂王徳成於樂諡則成徳之名也凡國之瞽矇正焉鄭康成曰從大師之政教李嘉㑹曰國之瞽矇不屬樂師者亦以正於大師不使淫邪之入人聽也小師掌教鼓鼗柷敔塤簫管弦歌鄭康成曰教教瞽矇也黄氏曰鼓鼗皆教眡瞭柷敔塤簫管弦歌皆教瞽矇鼗亦教瞽矇鄭鍔曰此言鼓如孟子所謂今王鼓樂於此之鼓瞽矇受教於小師其所播者鼗也柷也敔也塤也簫也管也弦也歌也而不言鼔則知此鼓為鼓樂之鼓矣鄭謂出音曰鼔是也鄭康成曰鼗如鼔而小持其柄揺之旁耳還自擊鄭司農曰柷如漆筩中有椎項氏曰柷以合樂敔木虎也鄭鍔曰敔如伏虎背上有七十二鉏鋙所以止樂聶崇義曰塤燒土為之大如鴈卵謂之雅塤郭璞爾雅注云大如鵝子鋭上平底形如稱錘六孔小者如雞子謂之頌塤凡六孔上一前三後二又笙師掌吹塤世本云暴辛公作塤圍五寸半長三寸四分鄭康成曰簫編小竹管如今賣飴餳所吹者賈氏曰廣雅云簫大者二十四管小者十六管有底三禮圖云簫長尺四寸頌簫長尺二寸通卦驗注云簫管形象鳥翼鳥為火火成數七生數二二七一十四簫之長由此鄭司農曰管如箎六孔鄭康成曰如篴而小併兩而吹之今天子樂官有焉項氏曰弦琴瑟也琴長三尺六寸六分象周天之度廣六寸象六合七弦象七星瑟長八尺一寸九九之數廣一尺八寸二九也二十七弦三九也鄭康成曰歌依詠詩也易氏曰有堂上之樂有堂下之樂有上下兼用而不可缺者弦歌用之於堂上鼔鼗塤簫用之於堂下柷敔則堂上堂下皆用之以為作止之節書曰戞擊鳴球搏拊琴瑟以詠戞擊柷敔用之以節堂上之樂者也又曰下管鼗鼔合止柷敔用之以節堂下之樂者也堂上言聲堂下言器若大師所言登歌下管則歌者在上匏竹在下此不易之定制而小師以弦歌列於塤簫之下者小師所言者教樂之序而大師所言者用樂之序也大祭祀登歌擊拊胡伸曰拊革鼓也樂以登歌為貴凡以詠者舉堂上之樂愚案登歌擊拊説見大師易氏曰登歌則瞽矇擊拊則小師大師令其奏而已下管擊應鼔鄭康成曰應鼙也應與􅉧及朔皆小鼓所用别未聞賈氏曰擊鼓者先擊小後撃大故大射云應鼙在東朔鼙在北黄氏曰朔鼙應鼓朔鼙所謂朄也鄭鍔曰及下管則擊應鼓大師令奏鼔􅉧小師則擊應鼔不鼔􅉧葢朄者所以引衆鼓而應則以為衆鼓之應也周頌所謂應朄縣鼓正謂是王昭禹曰應鼙為朄鼓之和朄鼓為應鼙之引朄必有應應必有朄互相備也徹歌鄭康成曰於有司徹而歌雍李嘉㑹曰徹歌無大師之命而自歌者乃其職也大饗亦如之王昭禹曰説見大師陸氏曰明堂位以禘禮祀周公於太廟升歌清廟下管象文王世子曰天子養老登歌清廟下管象祭統曰大嘗禘升歌清廟下管象天子之禮康周公故以賜魯仲尼燕居曰兩君相見升歌清廟下管象天子之祭祀養老饗諸侯諸侯之相見魯之嘗禘皆升歌下管貴人聲也歌清廟示徳也象管示事也小師大祭祀大饗登歌而小祭祀小樂事不登歌猶小祀不興舞也大喪與廞鄭康成曰從大師凡小祭祀小樂事鼓朄鄭康成曰如大師黄氏曰小祭祀不當擊雷鼔靈鼔則擊朄舞師掌鼔四方旱暵之舞是也掌六樂聲音之節與其和鄭鍔曰六代之樂並作慮其聲音或失之過既掌其節又掌其和先儒以和為錞于謂以金錞和鼔然小師不掌錞于認一和字指為錞于何所據竊謂當為子與人歌而善必使反之而後和之之和掌其音節使一人倡之衆工從而和之乃所以為節耳王昭禹曰六樂之作其先後曲直則有節而小大清濁相應而不相陵則和矣國語曰聲應相保曰和又曰大昭小鳴和之道也李嘉㑹曰職專於是則所責亦在是故特表而出之瞽矇鄭司農曰無目眹謂之瞽有目眹無見謂之矇有目無眸子謂之瞍賈氏曰詩有矇瞍書有瞽瞍此有瞽矇三者皆文不具司農參取三處為三等解之無目眹謂無目之眹脉有目眹而無見謂之矇謂矇然有眹脉而無見也有目無眸子謂之瞍者謂目睛黒白分明而無眸子人鄭鍔曰王者作樂欲審音以知政必使瞽矇者謂其收視於内不亂於外聽必審也然人而無見乃廢疾也使其疾而見廢則先王之所不忍是故使之司聽兹又不忍棄人之仁也掌播鼗柷敔塤簫管弦歌鄭康成曰播謂𤼵揚其音賈氏曰此八者皆小師教此瞽矇令於作樂之時播揚以出聲也李嘉㑹曰瞽矇播之小師教之止見於八音而已若磬師之鐘磬緹樂燕樂縵樂眡瞭之頌磬笙磬笙師之竽笙應雅則皆不與何故葢大師小師瞽矇所掌皆宗廟祭祀之樂及大饗大射大師之樂也諷誦詩世奠繋鼔琴瑟劉執中曰諷誦詩而不言六詩者因大師作匶諡而諷誦先王平生功徳之詩鄭鍔曰或謂誦詩所以知古人之興衰又誦其奠繋小史掌奠世繋謂為史官當定公卿大夫與夫帝王之世繋今此瞽矇又安知世奠繋之事乎愚攷先儒之説以奠為帝謂世帝繋者乃古書之紀述帝王之本繋又嘗攷國語曰教之春秋而為之聳善而抑惡以戒勸之教之世而為之昭明徳而廢幽昏焉以怵懼其心以春秋對世言則知世如世本之類使之諷誦乎詩與世又定其所傳之繋以諷誦使人君知古之傳世者有徳則子孫緜逺而世繋不衰無徳則子孫之傳不逺所言者不定則其聞也不信故必奠而後諷誦之鄭康成云世之而奠其繋竊謂當讀諷誦詩世一句奠繋為一句黄氏曰諷誦其詩以其世定繋次其盛衰為可知今詩之有繋次瞽矇傳之也曹儈之詩失之矣愚案誦詩而及於世奠繋者如商頌五篇作於商高宗之世周頌風雅合九十篇作於成王之世既知世之所尚則奠樂以繋焉定那樂章係之祀成湯定清廟樂章係之祀文王誦詠之以五聲弦歌之以琴瑟將以歌之播於樂章而奏諸祭享之時若小史之奠繋世是奠其所出之世系非誦詩之世奠繋也鄭鍔曰先王使公卿大夫士各致其規諫非不足以聞道彼賤而樂工乃使之諷誦古詩及世繋何邪得於言則其聽也未必審得於樂則其聞也入必深情之所樂者在是則耳之所聞者必詳因悦樂之時得規諫之益其效㨗於公卿士大夫之諫當諷誦之時則鼔琴瑟所以和平人君之心心和平則聞規戒之言不惟不怒且樂而無倦黄氏曰諷誦鼔琴瑟諷誦而鼔琴瑟即書搏拊琴瑟以詠掌九徳六詩之歌以役大師陳藴之曰九徳用於大祭大祭帥瞽登歌是也六詩用於大射大射帥瞽歌射節是也愚案九徳説見大司樂六詩説見大師鄭康成曰役為之使眡瞭鄭鍔曰孟子曰胷中正則眸子瞭焉眡瞭之職皆明目者為之葢樂工用瞽矇三百人故用眡瞭亦三百人扶之其視明瞭又明樂掌凡樂事播鼗撃頌磬笙磬王昭禹曰瞽矇掌播鼗而眡瞭亦播鼗二者皆受教於小師故小師曰掌教鼗鼔鄭鍔曰播鼗鼓本瞽矇之事為其無目故眡瞭先播使之聞之皆言播鼗葢有先後也薛氏曰磬之應鏞者曰頌磬頌即鏞也磬之益笙者曰笙磬大射禮曰樂人宿縣於阼階東笙磬西面是應笙之磬也又曰西階之西頌磬東面是應鏞之磬鏞尚金則土類也西凝之方也古人作樂金石土列於西方故頌磬在乎西竹則木類也東生之方也古人作樂匏竹木列於東方故笙磬在乎東若鄭氏以東方之磬曰頌則詩所謂笙磬同音書所謂笙鏞以間者何異義乎一説謂鐘磬之應歌者曰頌磬其應笙曰笙鐘笙磬春秋傳有歌鐘二肆與頌鐘磬之義同周禮有鐘笙之樂與笙磬之義同近之矣黄氏曰升歌則撃頌磬笙歌則撃笙磬掌大師之縣鄭康成曰大師當縣則為之賈氏曰大師無縣樂之事案大師掌六律六同五聲八音以其無目於聲音審本職雖不言縣樂器文寄於此明縣之可知眡瞭為之者以有目也凡樂事相瞽鄭康成曰相謂扶工王昭禹曰瞽無相倀倀然其何之哉眡瞭之設正謂是也大喪廞樂器大旅亦如之賈氏曰樂器謂明器司干疏云眡瞭所廞謂鼔與磬鐘師不云廞則鐘亦眡瞭廞之瞽矇大師小師皆不云廞者以其無目瞽矇所云柷敔等皆眡瞭廞之也不云奉而藏之文不具也黄氏曰廞與陳義本同而廞則有感動悲戚之意陳則陳列之而已鄭康成廞皆為興廞為興訓則當為興起之興所謂感動悲戚也鄭以為興作或為興造如大喪明器皆可言作大旅廞樂器乃以為旅非常祭於時乃興造其樂器則何義邪大旅有災故而樂不作眡瞭祭祀正樂故廞之見憂戚之意笙師樂器惟笙用於祭非其盛者陳之而已王昭禹曰大喪廞樂器則陳樂器於庭序也大旅有大故而祭亦陳樂器而不作故亦如之賓射皆奏具鐘鼔黄氏曰鐘師凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩瞽歌眡瞭奏其鐘鼓鄭康成曰鼓􅉧以奏之其登歌大師自奏之鼜愷獻亦如之杜氏曰鼜戒守鼓也王氏詳説曰鼔軍事者鼖鼔也鼜鼓其聲也案司馬法曰昏鼓四通為大鼜夜半三通為晨戒旦明五通為𤼵煦此三鼜也鄭康成曰愷獻獻功愷樂也黄氏曰愷獻有歌鼜亦或有歌鼜歌今警場有歌自大師至眡瞭其設職皆以升歌聨下管而及射愷獻愷有歌故眡瞭通掌之獨不掌九夏九夏謂之金奏鐘師専職周禮訂義卷四十
