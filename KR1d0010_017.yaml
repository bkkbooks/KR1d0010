body:
  text: 周禮訂義卷十七宋王與之撰小司徒之職掌建邦之教法鄭鍔曰或謂周之教典建於大宰大司徒則施其教法小司徒地官之二於教法亦掌建之何也蓋設教而無法則教不行有法而不建則法不立教官之長推其法教官之二掌建其法所以相成焉大宰則建於朝廷之上以示百官小司徒則建於教官之府使其法不廢不以建為嫌也以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾及征役之施舍鄭康成曰稽猶考也史氏曰國中王畿也四郊畿外也都鄙野外也易氏曰稽國中及四郊都鄙者舉王畿千里言之也不言六鄉六遂邦甸者舉上下以見其中史氏曰夫謂其身家謂其居如止知其居則土著之民在爾僦寓轉移之民何自知之此夫家所以兼言也易氏曰夫謂上地中地下地皆一廛舉其凡也家謂上地七人中地六人下地五人則其目也愚案比輔也相親比也黃氏曰九比夫三為屋屋三為井也三三比之故曰九比小司徒專掌比法蓋鄉法也非若野法八家皆私百畝其中為公田也故其職又曰及大比六鄉四郊之吏考夫屋以待政令國中六鄉也四郊六鄉之餘邑也六鄉四閭之吏司馬法閭方百里三萬家四閭十二萬家六鄉為七萬五千家其餘五萬五千家為四郊此亦大約也鄉之民雜必比而居之者使各從其類而習其事也邦國都鄙皆本司徒鄉法以教其所治民故小司徒以九比之法稽都鄙夫家之數而邦國則受其比要內外之勢詳略不同林氏曰九職之民比居之數也愚案周家比法自五家始故小司徒有九比之數大比之要鄉師有國比之法族師有邦比之法鄭康成曰貴謂為卿大夫黃氏曰賤臣妾也閒民也不登於比閭之籍其賤亦可恥鄭康成曰廢疾謂癃病也王昭禹曰貴治賤者也賤事貴者也老者在所養幼者在所慈廢疾則不可任事在所寬恤也愚案疏征謂稅之役謂徭役昭禹因以施惠謂之施舍政役謂之舍不知粟米謂之征力役亦謂之征征役之施舍只是凡征民力以受役者於貴賤老幼廢疾則弛其力而舍之施字依鄭注作弛即鄉師辨其可任者與其施舍者鄭景望曰施猶加也或加之或舍之必辨其實所以息幸民之心與其祭祀飲食喪紀之禁令賈氏曰祭祀謂州祭社黨祭禜族祭酺飲食若行鄉飲及族食喪紀謂若四閭為族相葬之等皆有禁令不使失禮法史氏曰衆之所聚不可無禁與令鄭景望曰言邦之教法而曰稽國中以下云者則教實行乎其中也貴賤老幼廢疾而舍其役則貴貴養老慈幼寬疾之意足以示民矣祭祀飲食喪紀皆有禁令則養生喪死之節踰禮越制之誅足以範民矣陳君舉曰小司徒既掌建邦之教法矣自此以下不聞設教之意大抵皆是校登民數整頓軍賦何也先王之世寓兵於農養男以禮以井邑丘甸易部伍之名以搜田獮狩更戰陳之習教之之意正在於是晉文公入教其民出定襄王以示義伐原以示信大搜以示禮故城濮之役少長有禮其可用也衛靈公問陳孔子答以俎豆諸葛孔明出入行陳間文中子以為可興禮樂殆是意歟若將教民之事作清談看了最害事乃頒比法於六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以嵗時入其數以施政教行徴令王昭禹曰頒比法者頒校比之度數也楊謹仲曰即五家為比使之相保以至於相賙相救者卿大夫以嵗時登其夫家之衆寡其校比則有法矣其比法則自司徒而頒之鄉大夫則受其法於小司徒而用之王氏曰登者上其籍也鄭氏曰登成也成猶定也鄭康成曰衆寡民之多少賈氏曰車謂革車及大車輦人挽行鄭康成曰物家中之財賈氏曰謂辨其家中財物多少史氏曰物雖民之物緩急有用當辨其可用與否易氏曰六畜以備公家之用車輦以待師田之役亦且登之以籍而辨其可用之物入其數則衆寡六畜車輦皆有一定之數賈氏曰以嵗之四時小司徒而施政教徴索於民及所施政令皆據民物等數而行之易氏曰施政教則據其數而舉飲射之類行徴令則據其數而起師田之類黃氏曰徴令貢賦之徵令政教必觀其豐約而為之隆殺徵令必稽其有無而為之寬急故入其衆寡六畜車輦之數而後施行之王氏曰凡民數有數之者閭胥以時數其衆寡是也有稽之者鄉師以時稽其夫家衆寡是也數之則以所屬之人寡稽之則以其所屬之人衆有校而登之者族師以時屬民而校登其夫家衆寡是也有登而不校者鄉大夫以嵗時登其夫家衆寡是也登之而不校則其登之也因族師之所校而已孫氏曰先王之登民數有講其安養之實者有明其愛敬之義者講安養之實則利見於當時明愛敬之義則法傳之萬世司徒之登民所以講安養之實司寇之登氏所以明愛敬之義自司徒頒九比之法使各以時而登之又從而校之故計口而田度力而役鰥寡孤獨廢疾者有所養貴者賢者能者服公事者知所舍地足以容其民民足以治其地此所謂講安養之實也然司徒登其民而不獻其數司寇獻其數而不掌其藏蓋司寇治刑之官舉生齒之數悉登而獻之王拜而受之則知民之重其可輕殺乎天府祖廟之司受民數之登與玉鎮大寶器並藏之則知國本所繫其可輕視乎君臣上下通知愛敬爾民愛敬之義明於上則安養之實達於下常相表裏及三年則大比大比則受邦國之比要鄭氏曰大比謂使天下更簡閲民數及其財物也鄭司農曰五家為比故以比為名今時八月案比是也劉執中曰三年則大比謂簡去其老疾不任役者補其闕落不成伍者鄭司農曰要謂其簿黃氏曰邦國羣吏大比縣師考之小司農受其要而已治之略也末言大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器則詳治之比法不施於六遂鄭曰亦受鄉遂非也比要在司徒為民籍簡稽在司馬為軍籍鄭鍔曰言邦國者指天下諸侯之國以别六鄉之所入也六鄉內也故入其數邦國外也故受其要受其要者民已分於諸侯則不責其詳歟乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍易氏曰㑹聚也小司徒以軍制聚萬民自五兩以至軍師咸在焉獨言㑹萬民之卒伍者先王之軍制調兵必五數出兵必百數不五數不足以調兵故積數起於五人之伍不百數不足以出兵故積數起於百人之卒以百人之卒成一小陳五百人之旅成一中陳二千五百人之師成一大陳萬二千五百人之軍成五大陳鄭氏曰用謂使民事之賈氏曰小司徒佐大司徒掌六鄉六軍之士出自六鄉故須預配卒伍用之者即軍旅田役是也鄭康成曰五兩卒旅師軍皆衆之名兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人此皆先王因農事而定軍令者也鄭鍔曰五家之比即五人之伍五比之閭即五伍之兩四閭之族即四兩之卒五族之黨即五卒之旅五黨之州即五旅之師五州之鄉即五師之軍也萬二千五百人為鄉合之以為一軍王之六軍出於六鄉舉一軍之制則六軍之制皆可得而知楊氏曰先王之制民居則為比閭族黨州鄉故比卦衆在內一陽在上為之主君象也出則為伍兩卒旅師軍故師卦衆在外一陽在下為之主將帥之象也陳君舉曰軍旅之法立於伍成於卒五夫數也五人為伍則手足耳目以相及不待徽幟可以别識不待旌旗可以指揮五伍為兩則以人為伍以卒為旅以旅為師以師為軍則手足耳目不相及而徽幟旌旗用焉故以四兩為卒縱橫皆兩參兩什伍之法定於此其為軍賦因此而已鄭鍔曰說者謂五人為伍則左右前後四人而一人居其中五伍則二十五人矣兩兩相比則謂之兩二十五人縱橫皆五何以謂之兩耶蓋自二十五人而四之以為卒則橫縱皆兩矣唯卒之橫縱皆兩也其法起於五人之伍故以兩名之朱氏曰出軍之制五人為伍五伍為兩四兩為卒到第三便著一個四成一百人若又是五則成百二十五人便有竒零不整齊處陳君舉曰小司徒㑹萬民之卒伍而用之士不特選皆吾民也將不改置皆吾吏也有事致之行陳無事歸之田里無招收之擾無廩給之費故曰先王足兵而未嘗有兵也李景齊曰天子曰萬乘諸侯曰千乘天子六軍大國不過三軍此定制也然嘗考司徒卒伍之制而約之以司馬法不能無疑司馬法曰兵車一乘甲士三人步卒七十二人是則一乘者七十五人之所容也約而計之兵車一乘則三兩之數五伍為兩則二十五人三兩則七十五人四乘則三卒之數四兩為卒則百人三卒則三百人也百乘則三師之所合五旅為師則二千五百人三師則七千五百人五百乘則三軍之所合三萬七千五百人積而至於千乘則六軍聚焉七萬五千人是則六軍之數適足以容千乘以天子之六軍言之則不足於萬乘以諸侯之千乘言之則不應有六軍是何也大抵悉天子之畿內以為軍則足以容萬乘而所謂六軍者特寓於六鄉乃天子宿衛之兵爾其餘六遂都鄙之兵蓋不與焉悉諸侯之國以為軍則大國有千乘而所謂不過三軍者僅止於五百乘耳非其不足於千乘也亦可以天子宿衛之兵數約之此周人居重馭輕之法唐人府衛君子謂其得鄉遂之遺者蓋出此以起軍旅以作田役以比追胥以令貢賦鄭鍔曰軍制已定則有征伐之時起之以為軍旅四時之間作之使趨田役有盜之際比之使作追胥閒暇之時令之使出貢賦無不可也劉氏曰貢賦制軍須也黃氏曰鄉之軍制寓於比閭族黨州鄉故㑹其卒伍而為伍兩卒旅軍蓋常自為六軍也用之於起軍旅作田役比追胥令貢賦皆鄉法也軍旅曰起部伍素定由是而起也田役曰作田竭作車少人多役隨事多少車不出皆臨時作之田雖為六軍蓋不止七萬五千人矣追胥亦竭作當時比之不使臨事紛錯也野皆不如此不㑹卒伍大抵鄉車人不相須其用在人而或竭作故㑹之於卒伍野車人相得其用在車無竭作之事故合之於五乘此其所以不同也六軍為車千乘以司馬法三百家共一車約之七萬五千家止得車二百五十乘不能充其賦也大抵六鄉皆守兵㑹同征伐其出甚少故六軍備其人而已車馬之賦不盡出於民則以公車充之校人有馬牛人有牛皆以共公車鄉賦閭師徵之鄭鍔曰遂人言貢賦師田政役與此先後不同何也蓋小司徒㑹六鄉之萬民以為卒伍軍法起於鄉故先言以起軍旅而後及於貢賦遂人治邦之野以供財用財用出於野為多故先言頒職作事以令貢賦而後及於師田政役也然㑹卒伍以為軍法宜屬之大司馬而小司徒掌之何也蓋事不預備不可以應卒司馬主於用兵茍非司徒教之有素合之有法司馬一旦欲合而用之不可得矣乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人鄭康成曰均平也周猶遍也賈氏曰均上地下地等使得均平故曰均土地既給土地則據土地計考其人民可任不可任之事而周遍知其人數鄭鍔曰上文於嵗時入數大比受要之後而言乃㑹萬民之卒伍則民數既定然後軍法可制也軍法既成乃言均土地以稽其人民而周知其數何耶蓋㑹萬民之卒伍者所以起軍旅也此言可任之人數者所以作田役也將作田役必先知其可任之人將以知其可任之人必先稽其受地之等家有七人者必授以上地觀其所受者上地則知其可任者一家可出三人矣家有六人者必授以中地觀其所受者中地則知其可任者二家可出五人矣家有五人者必授以下地觀其所受者下地則知其可任者一家可出二人矣蓋因其受地之優劣足以知其力之有餘不足也說者謂受田有九等之法此以七五六為三等者蓋因中以寄明上下之義賈氏曰案王制上農夫食九人其次食八人次食七人次食六人次食五人彼言五等此言七五六三等其人不同故鄭云有夫有婦乃成家自二人至十人為九等二人三人四人是下地三等五人六人七人是中地三等八人九人十人是上地三等此經唯言七六五者據中地三等則知有上地中地下地三等余以為此言六鄉受地之法學禮者見遂人頒田里自上地夫一㕓田百畝至餘夫亦如之乃謂六鄉受田之法與六遂同特因中以寄明上下之義殊不知經之所載自王畿之鄉遂都鄙至於諸侯之邦國凡授田之法自有四節大司徒言不易之地家百畝一易之地家二百畝再易之地家三百畝此一節也小司徒言上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人此又一節也遂人言上地夫一㕓田百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之此又一節也大司馬言上地食者三之二其民可用者家三人中地食者半其民可用者二家五人下地食者三之一其民可用者家二人此又一節也即是四節考之大司徒言都鄙之制小司徒言六鄉之制遂人言六遂之制大司馬言諸侯國之制何以明之司徒言凡造都鄙而繼以不易一易再易之地其為都鄙之制明矣小司徒言上地中地下地之制不與遂同又不與都鄙大司馬同非六鄉田制而何何則上地當食十人九人八人中地當食七人六人下地當食五人此固常法也六鄉在內不及十人九人但家有七人則授以上地家有六人則授以中地家有五人則授以下地所以然者將以强內故也若六遂所授則不可與鄉同故别言之曰上地夫一㕓田百畝中地夫一㕓田百畝下地夫一㕓田百畝見其如常法而已然又有萊五十畝萊百畝萊二百畝不與鄉同則以遂地逺而瘠授之萊乃所以饒逺而已又以爵位考之鄉大夫爵與遂大夫同鄉師爵與遂師同小司徒爵與遂人同遂人掌授遂田則小司徒掌授鄉田矣遂人言六遂之制則小司徒所言為六鄉授田之制何疑之有若夫外造都鄙則大司徒事故都鄙之田於大司徒言之施政職於九畿之外而令其軍賦則大司馬事故邦國之田於大司馬言之以是觀之謂因中以寄明上下之義者妄說也吕氏曰司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人以小司徒參之司徒之可任者如此其多司馬法之出士徒數如彼其少古人用兵皆為不勝計以慮敗也故不盡用之雖敗尚可扶持故小司徒只言其可任者非實數也自此以後調發者皆用實數幸而一勝不幸而一敗則皆不可救矣晉作州兵乃是盡數調發甚非先王之制他如魯成作丘甲曹操案户籍得三十萬衆蘇秦以齊王臨淄之中七萬户不下户三男子而卒以二十一萬而曹操謂崔琰曰昨案户籍可得三十萬衆故為大州是皆以實數調發惟諸葛孔明僅有此意一蜀之大其兵多不過十二萬孔明所用八萬常留四萬以為更代蜀之所以强者以孔明不盡用之及蜀之亡尚有十萬二千數年之間所折者不過二萬耳凡起徒役毋過家一人以其餘為羡唯田與追胥竭作鄭司農曰羡饒也王氏曰可任者或家三人二家五人家二人而起徒役無過家一人蓋用徒役不必一時皆遍計所役久近取勞佚均而已不於一役家起二人所以寬民也王昭禹曰以其餘為羡則所用者正卒而已然正卒又有可代者為之備此民所以有餘力而不困於役也鄭司農曰田謂獵也追追寇賊也陳及之曰竭作鄭氏謂盡行非也程氏曰竭作如唯為社事單出里唯為社田國人畢作單畢皆盡互言之也田獵所以教民習兵事則不可不皆教之及其當田也今日發某甲明日發某甸亦不一時俱起所以休民力而互教也至其追胥則不案籍起人其家丁男皆可行矣故曰竭作若曰盡行不勝其擾也王氏曰唯田與追胥竭作則獵取禽獸與衆同欲逐向盜賊與衆同惡所役近且不久故也李景齊曰因地之上中下以處其民因民數之多寡以任其力此周家均民之良法以司徒之制約之三農八家四十有八而可任止於二十人者以一家之中老幼常居七分之四少壯常居五分之二也平居而耕有故而戰者皆其家之少壯也曰平居而耕可也有故而戰而少壯者悉任之則無乃妨農事乎無乃闕於仰事俯育乎蓋家之可任者雖或二人或三人而凡起役徒無過家一人則農桑之不費仰事俯育之無所撓者以其有羡卒不之征也若夫田獵以習戰追胥以捕盜賊則竭作何也蓋田與追胥其暫耳則不妨于盡征也雖然司徒之制率三農八家其可任者二十人而又有羡卒之法此其用民力至寬也以一井八家而任二十人則甸六十四井為夫一千二百八十八人矣司馬法則曰甸出甲士三人步卒七十二人司徒通籍民數如彼其衆而征於司馬不能十之一若曰凡起徒役毋過家一人則以甸計之一井八家則六十四井為家五百一十有二宜士徒滋多也而僅止於七十五人民盡可以為兵而不盡以為兵也不特是耳司馬法又曰井十為通通十為成成方百里三百家士十人徒二十人此百里之成自甸之外又加三十六井宜其所任者益多而今特三十人又何耶籍民以為兵者甚備而至於征調則不過此耳然則民之可伍者不悉以為兵而𨽻之以為兵者比征調則又益損焉先王之休民力如此凡用衆庶則掌其政教與其戒禁聽其辭訟施其賞罰易氏曰用衆庶者正之以政導之以教則無殃民之失飭之以戒止之以禁則無視成之暴如是不服而有辭訟則為之聽其詞訟用命者有功而不共命者有過又為之施其賞罰焉鄭鍔曰平居無事族師掌其戒令政事黨正掌其政令教治州長掌其教治政令之法鄉大夫掌其政教禁令鄉師掌其教與其戒令糾禁非不素明而熟曉矣及起衆庶而用之小司徒又掌其政教與其戒禁何耶能以政教訓治之者未必能制馭之能以戒禁制馭未必能訓治之惟位尊爵高者合政教與戒禁而兼掌之則民服而且畏之矣誅共犯命者鄭康成曰命所以誓告之賈氏曰謂若大司馬羣吏聽誓於陳前司徒北面以誓之凡國之大事致民大故致餘子鄭氏曰大事戎事大故災寇鄭司農曰當徴召㑹聚百姓則小司徒召聚之餘子謂羡也鄭鍔曰經文言大事又言大故者不一以理推之大事乃國之常事特於常事為大耳若夫大故則事起於意外患生於不測其所以處之宜出於常理之外是故周人設為致民之法又别為致餘子之法民則一家受田之夫也餘子則家之羡卒也常事之大如田役之類家起一人足矣故止致其平時授田之夫至於變故之大家出一人不足以禦之故致其餘為羡之卒也徒役言起追胥言作此則以致為言余以為自邦法言之則宜曰起曰作自司徒言之則曰致致之為言使自致也司徒立大旗於此使之趨令自至蓋均土地稽人民之法既已素定當供公家之役者則聞令自至非一一號召之大小司徒俱以致為言可見矣乃經土地而井牧其田野黃氏曰此治野之法乃者繼之辭鄉法備又著野法焉必著野法者貢賦當自司徒出師役則相因矣康成曰造都鄙采地井田異於鄉遂其說最乖誤野純農夫故為公田九一之法以出租稅為丘乘四一之法以治車馬鄭鍔曰經野則分其田野而井牧之可耕之地則為井田之制可畜之地則為牧養之區左傳所謂井衍沃牧隰臯各相其地所宜而已愚案方里而井井九百畝公田處其中而私田包乎外是之謂井其田野也上地授萊視田半下地授萊視田倍比中地田萊之相等是之謂牧其田野也王氏詳說曰受地之法大率三夫受六夫之地上地百畝不易中地百畝一易則為二百畝下地百畝再易則為三百畝通率計之是三夫受六夫之地二牧而當一井黃氏曰牧居髙崖下隰不井今所在猶有繫官牧地鄭曰九夫為牧二牧而當一井非也九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都鄭鍔曰井地之法始於一夫之受田百畝積而至於九夫則地方一里凡三百步為田九百畝是為一井黃氏曰孟子所謂八家皆私百畝其中為公田是也王氏曰九夫為井則九夫之地所飲同井故也積四井三十六夫之田縱橫皆二井則地方二里為田三千六百畝是為一邑王氏曰民以里居四井同邑故也黃氏曰邑合也言民之合於此也積四邑一百四十四夫之田則地方四里為田一萬四千四百畝是為一丘王氏曰民以族葬四邑同丘故也黃氏曰丘聚也言民之聚於此也積四丘五百七十六夫之田則地方八里為田五萬七千六十畝是為一甸田至於甸方八里旁加一里乃得方十里斯為一成甸又謂之乘言車乘之法至是始成王氏曰田包於洫名之曰甸黃氏曰丘乘之制成於此漢志甸六十四井出長轂一乘是也田至於一成則四成積為四百井四百井三千六百夫則方二十里矣於是為縣王氏曰未成為都故取名於大夫所治縣也陳及之曰一甸之中以五百十有二家為凖而籍於公上者七十五人必七十五人者為一乘之人也至於田稅則一以井計之李景齊曰成公作丘甲春秋譏之者蓋甲當賦於一甸而魯於一丘為之則軍賦極重耳至於四縣則方四十里矣於是為都田至於都方八十里旁加十里乃得方百里斯為一同王氏曰未成為國故取名於公卿王子弟所治都也愚案鄭氏以甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田稅三十六井三百三十四夫治洫四都方八十里旁加十里乃得百里為一同積萬井九萬夫其中四千九十六井三萬六千八百六十四夫出田稅二千三百四井一萬七百三十六夫治洫三千六百井三萬二千四百夫治澮黃氏曰見遂人凡治野雖橫渠亦從其說殊不知小司徒四井為邑至四縣為都皆以四數言之言田之實數司馬法自井十為通至終十為同皆以十數言之兼山川城池而言小司徒四丘為甸即司馬法通十為成甸六十四井而成百井者其三十六井為山川城郭也小司徒四都之地即司馬法一同之地四都方八十里止六千四百井而同乃萬井者其三千六百井為山川城郭大約小司徒之法比司馬法皆是三分之二實地鄭氏旁加之說其算法則是但不必謂旁加之人專治溝洫陳君舉亦曰溝洫之事嵗嵗有之而軍賦不常有若專以某人治溝洫某人出軍賦則不均矣至以周制畿內用夏之貢法稅夫無公田邦國用商之助法公田不稅王氏詳說復為之說曰畿內用貢法者以鄉遂及公邑之吏旦夕從事於民耳邦國用助法者諸侯專一國之政恐其稅民無藝耳都鄙雖在畿內然實諸侯此所以用助法鄭伯謙疑此豈有天子之國自稅民田而令諸侯但為公田而不稅哉又謂周之畿內以及天下諸侯一用貢法稅夫無公田也公田商禮也文王為商諸侯其田猶依商禮至武王得天下周公攝政遂變之此皆泥於康成采地制井田異於鄉遂及公邑之說至黃文叔以此為遂法謂六鄉之民職業不同而其授地或多或寡或不授地參差不齊故不為井田之法必使備六軍而人徒車輦不相須故不為丘乘之法大約鄉教士野教農鄭言井法備於甸而止於都者食采地者皆四之一蓋以此為都鄙井田之制其說轉乖司馬法成三百家一車七十五人而調一人也小司徒四甸為縣為四車四車亦三百人而調一車一車七十五人亦四而調一也故丘甸縣都皆自四而登至都止者十六車而調四車自足為行列故丘乘之法備於此野法皆四而調一鄉三百家出一車十馬見司馬法野七十五家出一車四馬十二牛見漢志輕重不同鄉役多野役少鄉授田多野授田少大抵先王之制常優內殊不知井田之法通行於天下安有內外之異孟子曰鄉田同井則鄉未嘗不以井授也特鄉之地近內多沃壤可耕而放牧者少則有井而無牧至於野外之地不無媺惡肥磽之差豈必如指掌之平碁局之畫惟有井有牧比折而行方是井田活法故小司徒之經田野必兼井牧而言而井牧之法於遂言之為加詳井以九起數邑以四成之則制地之數可於是通行矣若夫縣都之名偶同於公卿采地之名亦非以此為采地薛氏之說分明薛氏曰自九夫之井以至四縣之都特多寡之異名耳丘甸則用之鄉遂及公邑縣都則用之於采地夫鄉遂公邑非無縣都也有縣都之制而民之受地者特一夫之田與夫宅田士田賈田公邑之類未至於縣都也此所以用者止於井邑丘甸而已采地之所受亦非無井邑丘甸也井邑丘甸固在縣都之中惟卿大夫之所受者或四十里或八十里此所以畫為縣都之制也總論井田愚案周家井田之法惟小司徒見之謂八家皆私百畝同種公田百畝此孟子之說也謂八家各耕百十畝以十畝為公田餘二十畝為廬舍此漢志之說也今因録諸家之說於後王氏曰田畝有類於井而公田之中又鑿井焉故謂之井田一井之田九百畝八家八百畝公田居中亦百畝除二十畝八家分之得二畝半以為廬舍合在城之地二畝半孟子所謂五畝之宅是也公田八十畝八家耕之是為助法廬舍居中貴人也私田環列於公田之外蓋衛王之意八家私百畝至於興兵之際乃八陳圖之法陳及之曰一井九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍所謂什一而稅通王畿之內至天下諸侯皆然孟子曰周人百畝而徹又曰詩云雨我公田遂及我私由此觀之雖周亦助也張橫渠曰百畝而徹是透徹之徹透徹而耕則功力相驅無一得惰者及已收穫則計畝數衮分之以衮分之數取什一之數而歸諸公是亦一說要之公家但取什一之稅看民如何耕耳或一家耕百十畝亦可或一家合耕八十畝亦可而徵斂稅必視年之豐耗故司稼云巡野觀稼以年之上下出斂法愚案此主漢志說為是圖說曰漢志引孟子說失其㫖由是何休注公羊范寧解榖梁趙岐注孟子宋均說樂緯以為然理不可通何則言井九百畝中為公田則百畝共為公田不得家取十畝言八家皆私百畝則百畝皆屬於公何得復以二十畝為廬舍言同養公田則八家共理公田何得家分十畝自治若家取十畝自治安得謂之同養若二畝半為廬舍則家别二畝半亦入私矣何得八家皆私百畝愚案此謂漢志之說非林氏曰井方一里是謂九夫古者制井之法有以地里名方里為井是也有以田夫名九夫為井是也以地里名者所以正地界以田夫名者所以定征賦周時皆用井田凡田皆用徹法孟子曰鄉田同井則是鄉皆用井哀公問年饑用不足有若告以盍徹是邦國亦用徹法周禮一書皆通率而言所謂互見者以班固之言考孟子九夫為井全無虧缺後世為圖亦以縱橫成列不知九夫為井除山川林麓三分去一則是六百畝又有一易再易之地三分去一則一井地止三百畝若如孟子班固所計則是一井之田皆平地其說皆不通蓋周公之井地特以通率備言之案左氏異議說山林之地九夫為度九度當一井藪澤之地九夫為鳩八鳩當一井京陵之地九夫為辨七辨當一井淳鹵之地九夫為表六表當一井疆潦之地九夫為藪五藪當一井偃豬之地九夫為規四規當一井原防之地九夫為町三町當一井隰臯之地九夫為牧二牧當一井衍沃之地九夫為井左傳楚蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃今曰井九百畝非必皆平土皆上地也因地之所寓而為之計度可以知井田之說且知夫天下通行之理若據圖言井九百畝亦徒見其不同耳禮運說大道既隱而曰以立田里是三王之初已有井甸田里之法信南山序成王能疆理天下以奉禹功而其詩曰信彼南山維禹甸之論語說禹盡力乎溝洫與匠人井間有溝同臯陶謨畎澮距川與匠人井間有澮專達於川同觀孟子曰夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一以貢徹皆天下之什一若非丘甸之法何以能行什一之法故井田之法始於唐虞以至夏商稍稍葺治大備於周愚案此說却貫通以任地事而令貢賦凡稅斂之事鄭鍔曰井邑丘甸縣都之制已立乃以之授民而任以地事令之出貢賦與夫凡稅斂之事俾皆供上之求蓋治地有法則民可得而任民任其事則上可得而取黃氏曰鄉野皆以軍法令貢賦貢賦皆有定制不容有不供者故以軍法令之野有稅斂雜征薪芻疏材之屬鄉無之委人可考貢賦稅斂民食必參相得而後其令可行鄭曰地事農牧虞衡地貢九穀山澤之材亦非此自九夫立法則皆為農事藪牧虞衡視農為别農定法而後藪牧虞衡皆可立也乃分地域而辨其守施其職而平其政黃氏曰域界也井邑丘甸縣都各有界域鄭康成曰守謂虞衡之屬王昭禹曰山虞掌山林之政令物為之厲為之守禁澤虞掌國澤之政令為之厲禁使其地之人守其財物所以辨山林川澤之守職謂九職王昭禹曰先王制職以任民若三農園圃虞衡之屬皆因地以有職政稅也王昭禹曰三農則使之貢九穀園圃則使之貢草木虞衡則使之貢山澤之物所以平地職之政鄭鍔曰分其地域則曰邑曰丘有邑丘之限曰縣曰都有縣都之殊因其所至而辨其守則不敢以相踰蓋井邑之制在是一亂其守則井地壞矣施其九職則農圃之民有農圃之職工商之民有工商之職施其所職而平其政賦則各適於其宜蓋征賦本出於此一失其平則怨怒生矣康成謂政當作征是也易氏曰六鄉六遂公邑都鄙之地域皆有山林川澤丘陵墳衍原隰之地守既分其域必奠其守然後施之以職王畿如此邦國亦然如是皆以貢賦稅斂令之則逺近輕重各得其均故曰平其政凡小祭祀奉牛牲羞其肆黃氏曰大司徒祀五帝奉牛牲羞其肆享先王亦如之外此大司徒不奉不羞皆小司徒為之謂之小祭祀自與大司徒相對為大小大宰杞五帝贊玉幣爵之事祀大神示享先王亦如之小宰凡祭祀贊玉幣爵之事大宗伯祀大神享大鬼祭大示卜日視滌濯涖玉鬯省牲鑊奉玉齍詔大號小宗伯小祭祀掌事如大宗伯之禮皆可具考此皆有精意鄭以王𤣥冕所祭為小祭祀非也小賓客令野修道委積鄭氏曰小賓客諸侯之使臣大軍旅帥其衆庶鄭鍔曰大軍旅則大司徒以旗致民小司徒帥其衆庶以趨大司徒之所致小軍旅巡役治其政令黃氏曰役卒役也小雅曰勞還役賈氏曰小軍旅謂使臣征伐大軍旅天子親行小功役之事小司徒巡行若大功役則大司徒巡行之鄭鍔曰小軍旅之時人徒雖寡然戰危事也安得無築軍壘修城塹之役宜有政令以齊一之小司徒巡行其役而治其政令則人畏威而趨事無敢慢矣黃氏曰六鄉不與於司馬之征發有王命起之則小司徒帥而致之司徒司馬調發郊軍則其吏帥之小司徒巡察之而治其政令王氏詳說曰小司徒於大軍旅帥衆庶而不言治政令於小軍旅言治政令而不言帥衆庶是衆庶之事小司徒可帥而致於大司徒而不可得而治也政令之事小司徒可用於小軍旅而不可用於大軍旅也大喪帥邦役治其政教鄭康成曰喪役正棺引窆復土史氏曰興土工以為因山之役黃氏曰對遂人為野役治其政教愛敬行焉凡建邦國立其社稷正其畿疆之封賈氏曰諸侯亦有三社三稷謂國社侯社勝社皆有稷配之言立其社稷謂以文書法度與之不可國國身往鄭鍔曰大司徒設其社稷之壝制其畿疆之封矣小司徒又立之正之蓋地官掌二權重位尊諸侯受土以置社或為之設壝或為之立祠分土以建國或為之制封或為之正封則權在朝廷而諸侯不敢以自擅矣凡民訟以地比正之賈氏曰民有爭訟是非難辨故以地之比鄰知其是非者共正斷之史氏曰地比者相親相保之法可以情義斷也易氏曰即大宰八成比居之法地訟以圖正之鄭氏曰地訟爭疆界者史氏曰圖者道里疆界之形賈氏曰凡量地以制邑初封之時即有地圖在官府於後民有訟者則以本圖正之易氏曰即太宰八成版圖之法嵗終則考其屬官之治成而誅賞鄭康成曰治成治事之計劉執中曰施其政典政令禁戒而不躬行刑罰者大司徒宜然也是以屬官之誅賞小司徒得以專之黃氏曰嵗終則考其屬官之治成自鄉郊至都鄙有地治者皆為屬官地治詳悉事亦多細小故小司徒考其日成得自行誅賞月要嵗㑹則致之冢宰治成蓋冡宰所施之八法也令羣吏正要㑹而致事賈氏曰羣吏謂當職六十官王昭禹曰凡言吏皆指賤者自士以下皆是不特府史胥徒之屬上經治成據日小成之計此言要㑹謂月計嵗計總為簿書而致其事之功狀以待考也易氏曰小司徒致事致之於大司徒大司徒致事致之於冢宰正嵗則帥其屬而觀教象之法徇以木鐸曰不用法者國有常刑令羣吏憲禁令修法糾職以待邦治王昭禹曰禁令將使民避行之宜表楬之使知故憲之修法則使各修其所守之法防虧廢也糾職則使各糾其所治之人防緩散也及大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器以待政令賈氏曰大比亦三年大挍比户口六鄉四郊之吏謂比長閭胥以上布列在四郊者王昭禹曰言六鄉而兼四郊乃六鄉之閒田縣師所治之地林氏曰教治者所主在教若十二教之屬項氏曰平其所掌之教治劉執中曰平章其教治之優劣政治者所主在政若土地之政之屬項氏曰正其所行之政事劉執中曰論正其政事之得失王氏曰考夫屋考其受田之夫居里之屋亟其乘屋令其及時乘之以正治其怠惰宜矣鄭康成曰夫三為屋屋三為井出地貢者三三相任劉執中曰稽考其夫屋之羸不足也黃氏曰六鄉餘民居於四郊之內專以處工商藪牧之屬故敬仲治齊有士鄉有工商之鄉放於先王為之考夫屋其無公田可知王氏曰考其衆寡六畜兵器則亦以知登耗有無以待征役施舍誅賞之政令賈氏曰以待國家政令所須則供之也項氏曰政令即大比有所鉤考也周禮訂義卷十七
