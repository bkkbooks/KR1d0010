body:
  text: 周禮訂義卷四宋王與之撰小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁鄭康成曰宫刑在宫中者之刑建明布告之黄氏曰王宫内外自宫室庖膳醫藥酒漿貨賄嬪婦皆統於大宰而小宰建宫刑以治之鄭鍔曰考之於經不見宫刑之目蓋宫中之刑宜𨼆也觀王族有罪磬於甸人而禮以謂刑于𨼆者不與國人慮兄弟則王宫之刑宜益加𨼆可知王氏詳説曰凡者總之辭凡宫則王宫后宫總在是矣鄭康成曰糾猶割也察也鄭鍔曰糾以察其𨼆匿禁以止其干犯有内宰以憲禁令于北宫而糾其守矣小宰又建宫刑以治其糾禁其孰敢犯之哉愚案糾以約其慢怠禁以止其邪僻不惟邇臣知所畏而後宫近習亦知所畏此乃先王治内之道鄭鍔曰周家之制有王宫有后宫后宫則王之北宫王宫則路寢一小寢五是也至尊所居欲其嚴肅必有刑禁以治其政令故使小宰建之然非特治王宫而已凡宫之糾禁皆得以治之蓋欲治其國先齊其家人君雖正身以齊家茍不用刑以威之則或恃恩而無所畏然齊家用刑則傷恩故使大臣馭之以刑也法在大臣恩在人主家其有不齊乎是刑之建宜使大宰今乃使小宰者豈非大宰論道佐王所以正其身而掌刑以治糾禁近於有司之職非所以尊論道之臣故歟然使大宰之貳掌之則察治者豈不尊且嚴哉陳及之曰大宰於内外事無所不關預小宰宰夫是其屬官也天官中既有内宰下大夫治王内之政令矣權豈不足以統宫内而又俾小宰之屬預其事何也蓋自宰夫以下即叙宫正宫伯二官宫正掌宫中徒役及諸官府在内者宫伯掌貴游子弟宿衛王宫者彼二官皆命士耳權輕不足壓人望故又俾小宰宰夫總之若内宰特治王内之政令以禮儀教王后夫人及九嬪世婦耳而宫中徒役宿衛之事無所干預也漢制雖有周官遺意以衛尉掌兵衛如周官宫正之職以光禄勲掌郎從宿衛如周官宫伯之職而大司馬以三公都試郎羽林之屬凡兩宫地城門衛北軍兵屬焉近周制宫正宫伯之權統于小宰矣掌邦之六典八灋八則之貳以逆邦國都鄙官府之治鄭司農曰貳副也楊氏曰小宰司㑹皆曰掌六典八法八則之貳蓋貳大宰之治也司書則掌其書而已逆邦國都鄙之治則不與焉小宰司㑹皆中大夫司書則上士則小宰司㑹非司書之副明矣司書如今監制敕庫之𩔖賈氏曰逆迎受勾考之使知功過所在也鄭鍔曰天下之事及其來也從而受之則順當其未来也先求而受之則逆典法則者治之本也從則治違則亂待其已違之後而亂已生然後攷之不亦晚乎小宰逆而攷之則其攷也在於從違之間於其未至而先鈎考故以逆言之王氏曰逆者有所治正也有所治正則逆之矣所治在太史則太史之所逆也所治在司㑹則司㑹之所逆也所治在小宰則小宰之所逆也非太史司㑹小宰所逆然後太宰以典法則待之劉執中曰大宰施六典八法八則於嵗首責邦國官府都鄙以其治者也小宰掌其貳於歳終鈎考其成以㑹其治之優劣者也故曰以逆其治焉執邦之九貢九賦九式之貳以均財節邦用王昭禹曰九貢九賦九式之書其正在大宰司㑹而其貳在小宰大府故於小宰言執史氏曰周之邦財所蓄至於不可勝用豈獨冢宰制國用之力小宰固執其法而不變乃能用之不匱也茍執之不固則始均而終必偏始儉而終必侈雖有法將誰與守貢賦之入歳有常數九式之用國有定規彼有餘此不足小宰均之以裨不給則九式不愆於其禮矣節邦用者非其式則不之用而王者之欲不節而自中乎禮儀矣楊氏曰大宰以道揆事王其制國用也惟共王之用如羞服匪頒好賜之𩔖皆得以式均節之故曰均節財用通言財用則邦國在其中矣小宰而下有法守者也量貢賦之入均之以應九式之用則與大宰同而所節則邦之用而已所以共王者不得而與也故以節邦用邦用如祭祀賔客喪紀之𩔖是也司㑹掌㑹事而已王及后之服與夫膳禽飲食不㑹則共王之用者雖多寡之計亦不得而與焉故均節邦之財用而巳與小宰之均節亦異也以官府之六敘正羣吏鄭康成曰敘秩次也王氏曰敘敘其倫之先後也官吕氏曰左傳作執秩以正其如小宰六敘正羣吏是也秩敘不正其餘皆亂鄭節卿曰考之六官小宰月終受羣吏之要則以官府之敘宰夫掌百官之徴令則有胥以治敘宫伯掌王宫士庶子之政令而月終必均其秩敘内史以八枋之法詔王治而納訪必掌其叙下而郷師之與里宰凡邦事令作秩敘凡歳時合耦于耡亦行其秩敘六敘之本末一曰正其位此則始正其舊敘耳至於進其治而作其事無非挽之而使前作之而使不怠於是制其食而食有多寡之異聼其情而情有誠偽之不同或陞其次或増其秩而百官府之人雖不待歳終三歳而廢置誅賞可以逆知之矣漢繼周之後有歳終超遷至大中大夫者有一歳而九遷者此皆周人六敘遷轉之遺意也鄭鍔曰經言羣吏有自大夫以下言之者有自士以下言之者有總六屬之吏言之者如司㑹言逆羣吏之治則卿以上非司㑹可得而逆則自大夫以下言之者也宰夫掌正三公六卿大夫羣吏之位於大夫之下書羣吏則自士以下言之也大宰言大計羣吏之治與此六敘正羣吏則總六屬之吏以言之也蓋大宰所大計者非一官之吏而小宰所正者凡在官府之羣吏也一曰以敘正其位王昭禹曰宰夫掌治朝之法以正王及三公六卿大夫羣吏之位固有尊卑也位以徳興徳以位敘因其人之徳有小大而授之以位之尊卑則爵以階而升命以等而進矣劉執中曰以品秩為敘則位可正矣二曰以敘進其治賈氏曰卿大夫士有治職功狀文書進於上亦先尊後卑也王氏曰以其位之敘進之進之謂若治目有功進使治凢也三曰以敘作其事史氏曰有官斯有職有職斯有事至於各共其事而不敢怠忽者有敘以作之也王昭禹曰月有所攷以稽其行之有造歳有所㑹以簡其業之大成此所謂以敘作其事黄氏曰以敘進其治未嘗不欲其治也又惡其陵節犯上出位邀功故以敘進之頺靡廢曠不可以不戒也則又以敘而作其事四曰以敘制其食王昭禹曰餼廩稱事所以勸百工也上農夫食九人中食七人下食五人而庶人在官者其禄以是為差上士倍中士中士倍下士而下士之禄與庶人在官者同則食之多寡厚薄固有常數矣以敘制之而先後得其倫則士無素飱而滅裂於其職矣五曰以敘受其㑹賈氏曰歳終進㑹計文書受之亦先尊後卑也王昭禹曰功事財用之計謂之㑹有以㑹其治者若大宰歳终令百官府各正其治受其㑹是也有以㑹其事者若宫正歳終則㑹其行事是也有以㑹其食者若宫正月终則㑹其稍食是也史氏曰非有敘以受之則事之繁夥數之浩穰不得其要領矣六曰以敘聽其情鄭康成曰情爭訟之辭也王氏曰自㑹以上不得其情而至於訟訟則各以其敘聽之王昭禹曰不曰聽其訟而曰聼其情聼訟者在於得其情故也總論陳君舉曰小宰言六敘在前言六計在後此是考課法中間皆是官府事且㝷常人說六敘只作尊卑説殊不知此中有尊卑有先後有緩急以敘正其位是尊卑治者功状也謂如今日朝諸侯且先還諸侯奏功状其他不混在這裏以敘作其事者謂如今日理㑹朝諸侯事則朝諸侯事便在前其他且後今日理㑹祭祀便是祭祀事在前其他又後耳制其食亦有𦂳慢處如聼其情雖是一人聽了一人說須是有體統朝廷上既將六敘去區處百官便有六計去察他廉也今一人善便察見得他是此善又或有能而不正者有正而不善辨者各各察他廉庶㡬天下無遺材以官府之六屬舉邦治賈氏曰立長官必當以屬官佐之邦治得舉也一曰天官其屬六十掌邦治大事則從其長小事則専達二曰地官其屬六十掌邦教大事則從其長小事則専達三曰春官其屬六十掌邦禮大事則從其長小事則専逹四曰夏官其屬六十掌邦政大事則從其長小事則専達五曰秋官其屬六十掌邦刑大事則從其長小事則専達六曰冬官其屬六十掌邦事大事則從其長小事則専達陳君舉曰六官各六十凡三百六十周天之數也治官之屬六十三教官之屬七十九禮官之屬七十一政官之屬六十有六小宰皆曰六十舉成數耳易氏曰聖人法天建官天度奇而不齊聖人亦不如是之拘也鄭康成曰大事則從其長若庖人内外饔與膳夫共王之食小事専達若宫人掌舎則各為一官也賈氏曰鄭直舉天官之内其事顯者各言其一也其餘若大府則治藏之長地官司市則市官之長春官大司樂則樂官之長夏官司甲則兵戈盾官之長如此之𩔖甚多不可具陳小事専達若天官亦甚衆不可具言也史氏曰大事雖畧所係則重故當從長小事雖煩所係則輕故當専達李景齊曰卑而尸大功則勢有所不行尊而尸小功則力有所不及故大事則從其長所以示其有所統一而小事使之専達者則在下者亦得以自盡其才此成周之世所以無曠官無廢事也以官府之六職辨邦治賈氏曰六官各有職若天官治職地官教職其職不同邦事得有分辨故云以辨邦治也愚案制為成書則曰典待人而行則曰職六典以書言故及於官府百官之職六職以人言故百官府不必言一曰治職以平邦國以均萬民以節財用王氏詳說曰平詳於經均詳於紀黄氏曰平邦國均萬民上之財用不節何可為也故冢宰制國用劉氏曰邦國制度由天官以裁處故以節財用為職否則制度崇而力不能供矣王昭禹曰大宰以道揆之故財欲均用欲節小宰以法守位但謹其出入而已故以節財用而不言均二曰教職以安邦國以寧萬民以懷賔客王昭禹曰教典之為書教官之為職同於安邦國而已賈氏曰教典云擾萬民此云寧萬民擾為馴馴則寧義無異也王氏曰教官之屬以其職推而行之然後可以寧萬民也鄭康成曰懐亦安也賔客來共其委積所以安之賈氏曰大司徒有遺人掌十里有廬廬有飲食之等故云共委積也黄氏曰敎之以君臣之義長㓜之序是故諸侯各述其職而合邦交之好焉其道通乎下故洪範八政七曰賔詩曰既見君子為龍為光又曰燕笑語兮是以有譽處兮是之謂懷劉氏曰邦國人民由地官以安擾故以懷諸侯為職否則人民擾而邦國不寧矣王昭禹曰中庸九經亦終於懷諸侯三曰禮職以和邦國以諧萬民以事鬼神王氏曰禮典禮職皆以和邦國諧萬民者蓋禮者體也體定則禮典之為書禮官之為職不能有所加損也邦國不和則無與事其先王萬民不諧則無與致其禋祀故禮職以和邦國諧萬民而後以事鬼神也鄭鍔曰邦國萬民皆已和諧則明而人心悅矣鬼神依人而行先成人然後致力於神斯能以事鬼神也四曰政職以服邦國以正萬民以聚百物王昭禹曰政典之為書止於平邦國而已政官之屬推而行之然後有以服邦國賈氏曰服由平定使之然則服亦平也均與正義亦一也王氏詳說曰服詳於平正詳於均鄭康成曰聚百物者司馬主九畿職方制其貢各以其所有黄氏曰軍旅田役貢賦皆司馬政典稼穡財貨馬牛車輦器械之屬聚則公私俱足鄭言職方制貢蓋其一事耳劉氏曰不以聚百物為職則兵事興而民力殫矣王氏曰聚百物以求之邦國萬民而已不能服之正之則其財豈肯供上之所求故政職以服邦國正萬民而後以聚百物也五曰刑職以詰邦國以糾萬民以除盗賊王昭禹曰刑典刑職皆以詰邦國糾萬民者蓋刑者形也形成也故刑典之為書刑官之為職亦不能加損焉劉氏曰不以除盗賊為職則刑罰濫而大寇作矣六曰事職以富邦國以養萬民以生百物王昭禹曰事典之為書事官之為職同於富邦國而已事典之為書止於生萬民事官之屬推而行之然後有以養萬民也生則使之蕃息而已未有以相養也愚案事職多百工事百工飭化八材蠧物則有之何以使百物之能生劉氏曰不以生百物為職則事為廣而八材枯此乃指考工記補亡書言之非古之事職書曰司空掌邦土居四民時地利百物雖生於土必四民各安其居地利不失其時然後生長繁殖物物皆遂事職之生百物猶三農之生九穀所以言於富邦國養萬民之後總論葉氏曰六卿九職各以數字之微使歸統敘一職之内各有條目使就績用充其所行而三才之道無遺憾矣以官府之六聯合邦治劉迎曰天下之事無大於賓祭凶荒軍旅田役用人最多分職最衆所以有聯事而合治黄氏曰凡官府之相關通者聯合之王昭禹曰八法之官聯以㑹官治此云官府之六聯合邦治者大司徒曰天地之所合也風雨之所㑹也兩之謂合衆之謂㑹㑹官治則所㑹者衆矣合邦治則所合者官聯與邦治而已一曰祭祀之聯事王昭禹曰玉幣牲牢之屬酒醴器皿之𩔖所用者非一官大宰賛玉幣爵而小宰亦賛之大宰眡滌濯而大宗伯亦宿視之五官供六牲而小宗伯又毛六牲而頒之于五官司尊􅉓掌六尊六彝之位而小宗伯又辨其名物以待祭祀若此𩔖皆祭祀之聯事二曰賓客之聯事王昭禹曰大朝覲㑹同大宰賛玉幣玉獻玉几玉爵而小宰亦賛凡受幣之事大宗伯以賔禮親邦國而大行人亦掌大賔之禮大客之儀大宗伯朝覲㑹同為上相而小行人於將幣則為承而擯宰夫掌其牢禮委積膳獻飲食之陳數而掌客亦掌四方賔客之牢禮餼獻飲食之等數若此𩔖皆賔客之聯事三曰喪荒之聯事賈氏曰荒謂年穀不熟王昭禹曰大喪大宰贊贈玉含玉而大司徒大喪則率六郷之衆庶屬其六引而治其政令大司徒大荒則令邦國移民通財而小行人若國凶荒令賙委之若此𩔖皆喪荒之聯事四曰軍旅之聯事王昭禹曰古者軍將皆命卿而師旅卒長之屬皆下大夫士掌其事大司徒大軍旅以旗致萬民治其徒庶之政令而小司徒令萬民之卒伍而亦帥其衆庶郷師大軍旅正治其徒役與其輂輦大司馬及戰廵陳眡事而賞罰若此𩔖皆軍旅之聯事五曰田役之聯事王昭禹曰田所以簡衆役所以任衆大司徒大田役以旗致萬民而治其徒庶之政令郷師凡四時之田以司徒之大旗致衆庶大役則帥民徒而至治其政令小司徒㑹萬民之卒伍以作田役大司馬有蒐苖獮狩之事而大役則與慮事屬其植受其要若此𩔖皆田役之聯事六曰斂弛只氏反之聯事王昭禹曰斂民之財謂之斂弛民之力謂之弛即鄭說言斂則散利可知也言弛則薄征亦可知也大宰掌九貢九賦而大府司㑹司書之𩔖亦掌之所謂斂也鄉大夫國中貴者之𩔖皆舎征而小司徒凡征役之施舎亦掌之所謂弛也凡此𩔖皆斂弛之聯事凡小事皆有聯王昭禹曰非祭祀賔客喪荒軍旅田役斂弛六者之大事餘皆小事也若膳夫之官有庖人亨人内外饔之𩔖通職聯事司關掌國貨之節以聯門市皆小事也以官府之八成經邦治賈氏曰官府中有此八事皆是舊法成事品式依而行之以經紀邦國之政治王昭禹曰事為之制物為之防終始皆備其法一定而不可虧是乃謂之成民有爭焉以此聽之故曰經邦治黄氏曰此即大宰八法官成也八法為屬職聯成計其目皆在小宰大抵小宰治官府最詳八成所以待萬民之治也事莫繁於此大小宰通職小宰任其繁則大宰所治皆要也其曰經邦治治之所由以立也劉氏曰八成者民物簿書圖籍之事皆有定制而不可亂所以養民之信自古皆有死民無信不立禮樂刑政待信而為本民無信雖有禮樂刑政何所措哉李景齊曰自伏義造書契以代結繩之政而人之要約益嚴誠信益薄聖人豈固欲如是紛紛世變之所趨不得不然周公為周豈不能還斯民於淳樸之域而小宰以八成經邦治若所謂比居簡稽版圖傅别禮命書契質劑要㑹無非切切於簿書惟恐防姦之不密者其待民不既薄矣乎大抵周公制作凡所為纎悉委曲者不獨為一時言實為後世慮也教化之孚者誠不待要約之固而後世誠信之已薄則文籍之可稽猶足濟治道之窮故雖春秋諸侯侵暴猶知惡其籍則知簡書之可畏亦足以維持人心周公可謂長慮一曰聽政役以比居王昭禹曰上之所施謂之政下之所從謂之役記曰五十不從力政則政者力政也施政於上而興力於下故謂之政役鄭司農曰比居謂伍籍也王氏曰聽政役者欲知其可任與其施舎者故以比居聽之比謂國比居謂民居以國比正之而不服則又以民居正之以國比正之若後世以五等簿差役也以民居正之若後世以簿差役不服則檢視屋産也史氏曰出則有比入則有居以此聽政則力政公以此聽役則力役省民之姦偽不行矣二曰聽師田以簡稽王昭禹曰師所以用衆田所以簡衆鄭司農曰簡稽士卒兵器簿書王氏曰簡謂閱而選之稽謂考而計之簡稽皆有書焉師田者欲知其車徒之所任財器之所出故以簡稽聽之黄氏曰車徒牛馬器械皆具於此三曰聽閭里以版圖賈氏曰在六鄉則二十五家為閭在六遂則二十五家為里閭里之中有爭訟則以户籍之版土地之圖聽决之王氏曰欲知人民所屬故以版聽之欲知地域所守故以圖聽之易氏曰版謂夫家生齒之版圖謂土地風氣之圖既有成法矣欲校登其閭里人民之數則以版圖聽之四曰聽稱責以傅音附别彼列切王昭禹曰舉物以就貨為稱謂貧不足者也責其所償者為責謂富有餘者也愚案孟子云又稱貸而益之稱謂舉責也鄭司農曰傅傅著約束於文書别别為兩兩家各得一也賈氏曰謂於劵背上大作一手書字札中央破之為二段以别之也爭此責者則以傅别劵書決之劉迎曰傅别乃地之劵書質劑乃市之平賈朝士之職曰凡屬責者以其地傅而聽其辭此地之有傅也王氏曰責有傅其事若今責契立保又曰凡有責者有判書以治則聽是别者判書此地之有别也王氏曰判書稱責之要也别謂人執其一書其所與之數使責者執之書其所償之數使稱者執之以其償責或不能一而足故也聽地訟以傅别則曲直分矣不然聽稱責以傅别何以繼之聽閭里版圖之後乎五曰聽禄位以禮命王氏曰禮有數命有等禄位視此以制鄭康成曰禮之九命之差等賈氏曰言大宗伯九儀也有人爭禄之多少位之前後則以禮命文書聽之也六曰聽取予以書契王氏詳說曰貸而生息謂之稱責貸而不生息謂之取予地官泉府云掌以市之征布歛市之不售貨之滯於民者買者各從其柢都鄙從其主國人郊人從其有司然後予之此所謂取予也又云凡民之貸者與有司辨而受之以國服為之息此所謂稱責也王昭禹曰民之通財不能無取予取予者謂彼有所取而此有所予也利之所在而爭心存則取予者不可無書契載於簡牘謂之書合而驗之謂之契王氏曰契謂人執其一予者執左取者執右合而驗之也别也契也皆要也稱責之謂别則其用以别為主取予之謂契則其用以契為主黄氏曰書契酒正凡有秩酒者以書契授之則凡取與者皆有此七曰聽賣買以質劑王昭禹曰商賈之阜通貨賄則不能無賣買先王以日中為市致天下之民聚天下之貨使之交易而退各得其所防其有爭心焉故大市所以致信也質其事者若今市契立見也劑則為要書而巳正之以質則其人足以驗也正之以劑則其書足以驗也賈氏曰案質人云大市以質小市以劑注云大市人民牛馬之屬用長劵小市兵器珍異之物用短劵今鄭注謂兩書一札同而别之者蓋謂前後作二契於中央破之兩家各得其一皆無手書字故異於傅别也有人爭此市事者則以質劑聽之王氏詳說曰傅别背有手書而質劑則無手書鄭氏之說似出臆說亦似近人情夫結繩作而有書契以書契為未足而有質劑以質劑為未足而有傅别取予輕於賣買賣買輕於稱責此三者所用不同以有輕重也八曰聽出入以要㑹古外反鄭司農曰要㑹謂計最之簿書月計曰要嵗計曰㑹故宰夫職曰嵗終則令羣吏正嵗㑹月終則令正月要王昭禹曰出謂給以用入謂振以藏於財之出入而有治焉小則以月計正之大則以嵗㑹正之如此則財之出入無不當者矣賈氏曰此出入者正是官内自用物有人爭此官物者則以要㑹簿書聽之總論王氏詳說曰要之八成皆文書也比居簡稽版圖禮命要㑹文書之用於公者也傅别書契質劑文書之用於民者也黄氏曰比居簡稽版圖禮庫曰掌在貴有司而民間得案據以為証禮命以辨賤蔵於有司凡宫室車旗衣服禮儀皆有節制有㑹爭者則通考之以息其訟若夫傅别書契質劑要公私皆有之衣服宫室馬牛兵器珍異之屬取予則以書契買賣則以質劑皆所以通財物也出有傅别入有要㑹皆所以防抵冐也經邦治而以八成者蓋言皆有成法其不協於官府之成法則不得行也以聽官府之六計弊羣吏之治鄭康成曰聽平治也平治官府之計有六事黄氏曰聽謂聽察之也孔子曰如有所譽者其有所試矣計訃其功狀也曰善曰能曰敬曰正曰法曰辨所以斷其才等也凡此言者有其一皆可以治故謂之治行弊斷也一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨愚案廉者猶廉問廉察康成謂六事以廉為本非也廉特善之小言善則廉在其中而廉非為善之主後世貪濁者多始以廉潔為貴周以六計弊吏治先之廉善者問其吏之善否何謂善如詩之淑人君子是也有其善何施而不近厚繼之廉能者問其吏之能否何謂能如孟子之能勝其任也有其能則何事之不立王昭禹曰能事神人然後可以典禮能諧八音然後可以典樂茍為不能瘝官曠職者衆矣問及於敬則必其恪居官次於心不欺於事不茍而後謂之敬如或怠忽荒散不得而茍容也問及於正必其操履端方治行清嚴不為勢奪而後謂之正如或起信險膚不得而濫冒也法貴能守大綱小紀不可亂也作聰明者或逞智以紛更之則吏之守法如之何而不問事欲其辨是是非非不可眩也蔽耳目之近將事至而不能決則吏之能辨與否又如之何而不問以此六者聽之則羣吏之治可得而斷矣李景齊曰後世考課之法即小宰六計之遺意也雖然吏以廉善為上而能次之故六計必以廉善居其首而以廉能居其次若夫廉敬廉正則以其行已之能敬能正也廉法廉辨則以其當官之能守法辨事也以灋掌祭祀朝覲㑹同賔客之戒具軍旅田役喪荒亦如之鄭康成曰法謂禮法也易氏曰法式也天下之事不豫則不立祭祀朝覲㑹同賔客以至軍旅田役喪荒之事凡七者皆國之大事不先具則必有緩不及事之患故平居之際戒其所當為之事具其所當用之物小宰皆以式法掌之而待其事焉戒具戒官有事者所當共鄭伯謙曰小宰以法掌祭祀朝覲㑹同賔客之戒具軍旅田役喪荒亦如之今九式之中不及朝覲㑹同軍旅田役何也曰朝覲㑹同之用不過牢禮委積膳獻飲食賔賜飱牽而已此則賔客之式也軍旅田役之用亦不過幣帛芻秣匪頒工事而已而外府共財用之幣齎委人共委積薪芻司勲掌賞地宫正頒衣裘車人矢人繕人槀人司弓矢司甲兵之𩔖一切皆有式法以給其財此則幣帛芻秣匪頒工事之式也王氏詳說曰七事皆六聯也七事不言六聯之歛弛六聯不言七事之朝覲㑹同者七事之下所謂共其財用非歛乎治其施舎非弛乎六聯所言合邦治而已七事則共其財用治其施舎財用施舎在朝覲自為一事㑹同自為一事賔客自為一事不可比而同之此又見周公立法之意也王昭禹曰祭祀所謂吉禮朝覲㑹同賔客所謂賔禮軍旅田役所謂軍禮喪荒所謂凶禮也禮有五而此不及嘉禮者蓋嘉禮有脤膰之禮則祭祀之事也有享燕之禮則賔客之事也然則言祭祀賔客則足以兼嘉禮矣宗伯正掌禮之官故其事詳小宰治官聯事通職而已故其事畧七事者令百官府共音恭其財用治其施舎聽其治訟鄭康成曰七事謂先四如之者三也王昭禹曰祭祀一也朝覲二也㑹同三也賔客四也與軍旅田役喪荒三者凡七也施舍不給役者賈氏曰即上六聯注引鄉大夫國中貴者賢者能者服公事者老者疾者是也王氏曰理其事謂之治爭其事謂之訟財用出於官府而施舎加於人民治訟則或以財用之不共或以施舎之不治故先言共其財用次言治其施舎後言聽其治訟王氏詳說曰財用所共自有大府而令之者小宰也施舎所治自有鄉大夫而令之者小宰也史氏曰於五禮以法繩其要於七事以令總其繁凡祭祀贊玉幣爵之事祼將之事鄭鍔曰大宰所贊者祀五帝祀大神享先王之時也小宰凡祭祀皆贊之賈氏曰大宰祀五帝贊玉幣爵今此又言贊此三者謂小宰執以授大宰大宰執以授王是相贊助也王氏曰祼謂祼而將瓚也鄭康成曰將送也陸氏曰商人尊神交於明故先樂而求諸陽周人尊禮求諸幽故先祼而求諸隂鄭氏謂王酌鬱鬯以獻尸尸受之啐之奠之然尸神象也初受而自祼非禮意也鄭氏又謂宗廟有祼天地大神尊不祼考之禮於典瑞玉人鬯人則祼先王賔客社稷宗廟山川四方而已是祼不施於天地然大宗伯凡祀大神享大鬼祭大示涖玉鬯表記曰親耕粢盛秬鬯以事上帝蓋祀天有鬯者陳之而已非祼也王氏詳說曰祭惟祭宗廟用祼其他天地社稷山川等祭則惟秬鬯而已鬱人之職與鬯人異祼鬱鬯謂以鬱金草實彝而陳之所謂築之而煮之是也鬯人云掌共秬鬯而飾之社壝用大罍禜門用瓢齎則是天地等祀皆有秬鬯但不用鬱為祼耳鄭鍔曰祭祀用玉用幣用爵所以見禮神之文祼將之事所以見求神之實王薦玉幣爵而小宰贊之王酌鬱鬯以祼而小宰將之贊則執以授王使薦獻不失其節將則奉以授尸焉大宰無祼將之事其所贊者主祀五帝言之天神不祼也惟人道宗廟有之然宗廟之祼大宰贊王亦不將送其將者小宰故特言祼將之事也凡賔客贊祼凡受爵之事凡受幣之事賈氏曰凡賔客贊祼者大行人云上公再祼而酢謂諸侯來朝朝享既畢王禮之有此灌酢之禮也王昭禹曰大享之禮惟不入牲其他皆如祭祀先王以祭祀之禮待賔客所以致敬而神之也鄭鍔曰凡此言贊皆贊王也考大宗伯之文曰大祭祀王后不與則攝薦豆籩徹其下乃言大賔客則攝而載果蓋后有酌璋瓚祼賔之禮偶不與焉宗伯攝之烏可以此贊祼為助宗伯受爵謂王受賔客之玉爵受幣謂王受賔客之玉幣凡此二事亦贊王受之先儒以為助大宰非也王昭禹曰大宰於幣爵之事無所不贊小宰所贊特受幣受爵而已王氏詳說曰大宰於幣爵言贊不言受此言受又言凡所以見小宰之治其小也喪荒受其含襚幣玉之事賈氏曰喪謂王喪諸侯諸臣有致含襚幣玉之事荒謂凶年諸侯亦有致幣玉之事鄭康成曰春秋傳曰口實曰含衣服曰襚凶荒有幣玉者賔客所賙委之禮王氏曰喪荒有幣玉則賻贈賙委之物也賈氏曰大宰不言則此小宰得專受之月終則以官府之敘受羣吏之要贊冢宰受嵗㑹鄭康成曰主每月之小計也賈氏曰月計曰要毎月之終使官府致其簿書之要受之當先尊後卑故言敘嵗計曰㑹助冢宰受一嵗之計也王昭禹曰日成掌於宰夫月要掌於小宰嵗㑹掌於大宰尊卑詳略之敘嵗㑹正掌以大宰小宰者大宰之貳故贊冢宰嵗終則令羣吏致事王昭禹曰嵗終日窮于次月窮于紀星回于天數將幾終嵗且更始天子與公卿大夫共飭國典論時令以待來嵗之宜羣吏治事必有所致以告于上者焉鄭康成曰使齎嵗盡文書來至若今上計賈氏曰謂使六官各致一年功狀將來攷之故也大宰於嵗終聽其致事小宰則令羣吏致事而已必小宰先令致事然後大宰得以聽之正嵗帥治官之屬而觀治象之灋徇以木鐸曰不用灋者國有常刑鄭康成曰正嵗謂夏之正月得四時之正以出教令者審也賈氏曰大宰以周之正月始和布之天下至此建寅正嵗之正月縣于象魏其小宰亦助大宰帥治官之屬及萬民以觀之呉徳方曰鄭康成每以正嵗為夏正建寅之月正月之吉為周正建子之月竊以為不然周以建子為正凡事皆用本朝正朔若知有不可行處依前參用前代正朔則不必建子可也經中言嵗終即繼之以正嵗為建寅則嵗終非建亥周家自廢其正朔矣若以嵗終為建亥即始终有接續無縁住兩月也正月之吉為周正一嵗之始無疑事有非朔日可行故云正嵗不拘朔日亦可愚案此說謂嵗終與正嵗正月相連不應隔絶固然參以凌人十二月斬冰内宰上春獻種中春始蠶與詩四月維夏六月徂暑見於周幽王仍襲之後月令次序十二月行事見於秦人未改正朔之初曷嘗不以建寅紀月其餘又見大史正嵗年說不可不攷鄭康成曰古者將有新令必奮木鐸以警衆使明聽也木鐸木舌也文事奮木鐸武事奮金鐸王昭禹曰垂以治象使有目者皆覩徇以木鐸使有耳者皆聞猶有犯焉宜刑之所取也常刑官刑也黄氏曰常刑謂國法掌在司寇乃退以宫刑憲禁于王宫王昭禹曰小宰掌建邦之宫刑憲禁于王宫憲謂表而示之使之知禁之所在賈氏曰凡刑禁皆出秋官今云憲禁者與布憲義同故小宰得秋官刑禁文書表而懸之於宫内令于百官府曰各脩乃職攷乃灋待乃事以聽王命其有不共則國有大刑王昭禹曰此王宫中之百官府也蓋百官有治事於王宫者既憲禁於王宫又明為告令使皆知之鄭康成曰乃猶汝也王昭禹曰脩乃職令之各脩所治王宫中之職也攷乃法則令攷所奉行之法以避憲禁也待乃事則其事有待王宫之政令焉故也令以聽王命則欲其疾於聽從故也苟有不共則事上之職怠故告之以國有大刑大刑則非特常刑也故告以大刑以宫刑宜嚴於官府今律宫殿中所坐比常法有加亦是意也費誓於馬牛臣妾越逐不復與夫竊馬牛誘臣妾皆誓之以常刑至於峙乃糗糧峙乃芻茭不逮不多則誓以大刑蓋事之輕則誓以常刑事之重别誓以大刑與此同林椅曰不共者先事之戒不正者已事之攷不用法者方事之為總論小宰陳君舉曰小宰之職蓋貳冢宰以掌邦治而宰夫又所以貳小宰也故冢宰掌其典而小宰率其職冢宰操其柄而小宰治其糾禁凡小宰之所聽所弊所刑雖非冢宰之所自為而百官之所以聳動警飭而不敢不勉者蓋曰嚴冢宰也夫是以君宰尊嚴朝廷清明百工稱職而不敢易紀律蓋本諸此周禮訂義卷四
