body:
  text: 周禮訂義卷六十七宋王與之撰大行人中大夫二人唐氏曰伯夷降典折民惟刑司儀行人之官必屬司寇此古者禮刑相表裏之意陳及之曰大小行人司儀掌客宜屬春官而乃屬秋官者以六服諸侯之朝貢王之所以撫存眺省巡守亦邦禁所係也薛平仲曰五禮固不止於賔客而達於天下之相親者惟賔禮為至是以掌禮之官必命曰行人因其事宜以致其小大之稱故大行人以中大夫二人專掌禮之綱小行人以下大夫四人專掌禮之籍威儀煩縟屬之司儀小事纎悉逹之行夫衛其行李以送逆之責之環人及夫五服之外若蕃國之入見雖不能盡同於中國之禮先王待之又特建夫象胥之官無所往而不接於禮天下亦何事於刑禁之防哉掌大賔之禮及大客之儀以親諸侯鄭鍔曰奉一人之命供行李之役以往來于諸侯之邦者行人也掌大賔之禮及大客之儀則以别乎其小者也六服羣辟謂之大賔則外近乎蕃夷者其君謂之小賔矣諸侯之孤卿謂之大客其大夫士來謂之小客矣大宗伯曰以賔禮親邦國蓋等降浸邈人情隔踈待以賔客且有禮儀使歡欣交通乃所以親之也於賔曰禮於客曰儀禮本也儀末也語其體則曰禮見於揖遜周旋則曰儀行禮未嘗不見於威儀威儀未嘗不本於禮大賔為尊故以禮言大客為卑故以儀言耳大宗伯以九儀之命正邦國之位典命掌諸侯之五儀則諸侯之尊何嘗不貴於有儀乎小行人言使適四方協九儀賔客之禮且言君之禮也臣之禮也諸侯之臣何嘗不貴於有禮乎其所以異言者别尊卑耳春朝諸侯而圖天下之事秋覲以比毗志反邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮賈氏曰此有考績之事故以王見諸侯為文大宗伯無事相見故以諸侯見王為文鄭鍔曰王者之於諸侯當其朝覲宗遇之時凡天下之事無不與之圖非止春朝則圖之邦國之功無不比非止秋覲則比之天下之謨無不使之陳何止於夏宗諸侯之慮無不使之協何止於冬遇此蓋因四時之朝分四等之名因時以明義而已蓋一歲之計在於春春者始事之時也故春言圖事謂春為造事之始耳秋者物成之時人之立事自春而圗之積功至秋亦可以成矣故秋言比功謂秋為萬物之成耳夏者文明之時謨欲其明顯然著於耳目故取文明之時以陳之冬者收藏之時慮欲其隱故取收藏之時以協之謨欲衆共知故言陳慮恐人人異志故言協王者因諸侯之來而屈禮以接之欲與之經營圖為者如此三時不言諸侯則省文於事與謨言天下則非一國之事一國之謀可知至於比功特言邦國協慮特言諸侯者校其功之髙下非合衆國比之何以見其優劣若夫謀慮則恐諸侯之心不與天子協言諸侯者對天子之言也易氏曰所謂春朝而圖事者若王制言諸侯之朝而考禮正刑是也然事作于先者功必成于後又於秋覲而比之所以察其禮刑之成二者見於春秋之時故因春朝秋覲之禮而行之所謂夏宗而陳謨者舜典言羣后之朝而曰敷奏以言是也然謨之見于外者慮必定於內又於冬遇而協之所以核其敷奏之實二者見于冬夏之時故因夏宗冬遇之禮而行之王昭禹曰先事後功功以成事故也先謨後慮終則有始故也獨春朝不言以者春為朝禮之正非直為圖事也愚案朝於春而圖事以謹其事之肇端覲於秋以比功以述其功之告成二禮特重故序朝覲於夏宗之先宗則名其禮之知所尊遇則名其禮之適相合非其所急故夏宗有謨則陳無則已也冬遇慮乖則協否則已也故二禮不為重王者將以順適諸侯之情不得不立為四時之禮黃氏曰諸侯平居無事之時王者於德意志慮則道之使知度量法則則諭之使同好惡已一於心用舍己一於事及其入王又會而圖之以四海為一家以中國為一人蓋如此時會以發四方之禁殷同以施天下之政鄭鍔曰四時之朝常朝也時會者其會有時非一定之時蓋諸侯有不奉王命而王將有征討之事於是時則會諸侯於國門之外殷同者其同甚衆非一國之至蓋天子於十二歲或未行巡守之事於是時則六服羣辟同見於天子之朝黃氏曰殷正也使天下同歸於正故謂之巡守殷國此二者非常朝也乃發四方之禁乃施天下之政各視其事之冝士師有五禁之法用以左右刑罰耳非所以為四方之禁大司馬九伐之法以正邦國是謂四方之禁必以時會之時發之者蓋諸侯有馮弱犯寡賊賢害民等事不遵法禁王將有征討焉則會諸侯而發以示之使承命往伐兹其事之不常固有時而發矣地官有均齊天下之政然用以治內地爾非所以為天下之政大司馬以九畿之籍施邦國之政職是謂天下之政必於殷同之時施之者蓋諸侯有當各朝之年雖示之以政職未必信其為均不均也於九畿並朝之年則合而為一施布以命之使同見其所貢之等示其政之無私故於同而施之也黃氏曰禁繫之四方禮俗人情有不同不可得而一也政繫之天下四方內外不容其或異也政即協時月正日同律度量衡是也易氏曰此六者即大宗伯所謂賔禮也大宗伯詳其賔禮之名大行人又以詳其命諸侯之實然宗遇會同亦或總以朝覲名者曲禮曰天子當依而立諸公東面諸侯西面曰朝鄭氏謂夏宗依春此圖事陳謨皆所以責其始冬遇依秋此比功協慮皆所以考其終故曲禮言朝覲而經亦多以朝覲為主至於會同之發禁施政又因朝覲之時而行其禮故經亦謂之大朝覲此朝覲宗遇之名雖異先王行禮之意一也王氏詳説曰大宗伯大司馬法與大行人載此各相為異同宗伯言朝覲之禮行人言朝覲之事至於司馬法謂春以禮朝諸侯圖同事夏以禮宗諸侯陳同謨覲遇會同亦如其説言朝而必言禮言事而必言同事蓋同者有同與不同之義焉此所以為司馬法愚按餘説見大宗伯時聘以結諸侯之好呼報反殷眺通弔反以除邦國之慝鄭鍔曰諸侯之事天子則有時聘殷眺之文大宗伯所謂時聘曰問殷眺曰視是也天子之於諸侯亦有以報其禮故此行時聘殷眺之禮以答之但天子遣行人以往則曰結好除慝此所以不同也諸侯比年小聘三年大聘矣王又以時遣人聘之春秋書天王使凡伯來聘之等是也聘則有財以為禮所以結好於諸侯先儒謂天子有事諸侯使大夫來聘親以禮見之遣之所以結其恩好考其文意似非是也諸侯於一服朝之歲皆使卿以聘禮來眺是也眺省視也王者省視其所為慮其有相惡之慝慝者怨惡之匿乎心也積怨不除至於相吞滅者有之為之講解使消除焉合方氏所謂除其怨惡殆此類也先儒謂諸侯使卿來眺天子命以政禁除其惡行亦非也黃氏曰鄭見宗伯序聘眺於朝覲宗遇會同之下故皆以為王見諸侯之臣然大行人間問歸脤賀慶致禬與殷眺聯文不知何以分之又鄭注典瑞琬琰圭則曰王使之瑞節至此乃以為王見諸侯之臣蓋自叛其説矣大抵存眺省聘問小行人所謂臣禮者存眺省王撫諸侯王臣行之聘問諸侯邦交諸侯之君行之諸侯固有當朝而偶有故不能朝者於經則有世子攝君之文未見諸侯使卿大夫聘王之名或君有故未有世子則如之何曰寧賜毋朝不使臣代其君禮也間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災鄭康成曰此四者王使臣於諸侯之禮鄭鍔曰諸侯之於天子有時聘之問天子間一歲亦一問之是謂間問蓋諸侯之衆未必皆能通曉吾志之所在者間歲問之告之以言語書名使其心曉然知王朝之意下文所謂七歲諭言語九歲諭書名是也諸侯之於天子有致福之禮天子之祭亦歸之以胙是謂歸脤蓋諸侯以福致之王王祭畢亦取胙肉以歸之乃所以交其福凡此時聘殷眺間問歸脤固有一定之期若夫賀慶致禬遇時則舉初無常數之拘以物賀者曰賀與禮記賀娶妻之賀同以言慶者曰慶慶與左傳諸侯皆慶寡人之慶同所以贊其可喜也鄭康成曰贊助也王昭禹曰所以與之同其樂若夫禬禮諸侯之國為災害所困則會財以與之以補其闕與孟子所謂補不足之補同鄭康成曰致禬凶禮之弔禮禬禮也補諸侯災者若春秋澶淵之會謀歸宋財王昭禹曰所以與之同其憂然大宗伯有禬禮以哀圍敗之言故學者專指圍敗為説余以為天災流行國家代有皆當賑恤之不特國為人所圍敗然後會財以補之也大宗伯分而言之大行人合而言之黃氏曰間問王自以日月闊踈恐情意隔絶則間遣使而諭之漢中山靖王來朝天子置酒聞樂聲而泣問其故具以吏所侵聞上乃厚諸侯之禮宗伯無間問朝覲宗遇會同歸脤賀慶致禬皆已見大行人又見宗伯典籍之所存也大行人上下所由以交際也故宗伯總其綱目大行人明其事義禮樂不興則刑罰不中矣大行人列於刑官之屬漢叔孫通所撰禮儀與録藏於理官固為略知此意而本末不相副專欲倚法而行卒之法家不傳而臣民莫有能言者總論王氏詳説曰宗伯賔禮皆言諸侯於天子之事不言天子於諸侯之事至於饗燕之親四方脤膰之親兄弟慶賀之親異姓反見於嘉禮蓋賔禮為諸侯而設嘉禮為萬民而設以諸侯歸脤慶賀之事與萬民同其禮所以正君臣之分使諸侯不得與天子分庭抗禮也此周公制禮之深意然宗伯以歸脤慶賀分同姓異姓而大行人槩以為諸侯蓋宗伯言其定制行人言其通用也不然齊為異姓宰孔何有加勞一級之語宋為二王後皇武子何以有天子有事膰焉之語乎況歸脤以交諸侯天子歸脤於諸侯諸侯亦歸脤於天子都宗人謂致福於國者此也然則凡言諸侯者不以同姓異姓為義例也若夫致禬以補諸侯之災皆凶禮之五者是也凶禮之别曰喪禮荒禮弔禮禬禮恤禮皆以哀為文是同其事也可知鄭氏以致禬為凶禮之弔禮禬禮賈氏以致禬為凶禮之弔禮鄭氏之意但謂弔禮哀禍災禬禮哀圍敗而此曰致禬補諸侯之災也賈氏之意謂禬禮用之於圍敗非用之於禍災遂以此惟言弔禮餘四者非行人之事也從鄭氏之説則一句不容有二名從賈氏之説則二字不容合而為一句二説皆失之嗟乎春秋之時天子待諸侯之禮雖存諸侯待天子之禮已廢書諸侯之朝於魯者三十有四而魯之朝于天子也不過僖二十八年兩書公朝於王所而已初非來朝也書天王之來聘於魯者有八來錫於魯者有三莊元文元成八來求於魯者有二桓十九文九來歸脤於魯者有一定十四年初不聞魯之來聘來錫來求來歸脤於天王也魯之懿親能秉周禮者且如此他可知也王昭禹曰朝覲宗遇會同六者諸侯致勤於王也時聘殷見間問歸脤賀慶致禬六者王致愛於諸侯也諸侯以禮致其勤王以仁致其愛以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客鄭康成曰九儀謂命者五公侯伯子男爵者四孤卿大夫士鄭鍔曰有命本由有爵諸侯之命為尊不止於爵而已故以命言有爵未嘗無命諸臣之命為微命不足道也故以爵言典命言諸臣五等之命則諸臣未嘗不以命為别書言列爵惟五則諸侯未嘗不以爵為主此各因其盛者言之命言辨爵言等命之尊者以五以七以九為節數至於繁則易於亂以辨為言欲其數之有别也若夫爵則不然同為士也而有小大若次國之士同為大夫也而有小大若次國之大夫同為孤卿也而有小大若次國之孤卿此所以為難齊是故次國之上卿當大國之中中當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫各因其國之小大以齊之不然小大無等待之之禮無時而可同矣易氏曰爵命不同如此而曰同邦國之禮者非謂舉其倍蓰不同者而同之也命同於上公皆以九為節命同於侯伯皆以七為節命同於子男皆以五為節以至爵同於孤則皆以四為節爵同於卿大夫而有大國次國小國之異命則亦各視其命之數而為節以此待賔客則大行人之所掌有定籍而其爵命之上下隆殺各當以禮而舉不敢踰其分其為同也至矣鄭鍔曰王朝之禮如此亦欲邦國知其如此苟王朝用之邦國不同何以使賔客之禮歸乎一哉惟辨其命等其爵斯可得而同矣九儀以辨其君之命等其臣之爵命同者其禮以命而同爵同者其禮以爵而同如是則內外其知禮之無二矣上公之禮王氏曰三公八命出封加一等則謂之上公鄭鍔曰周封魯以上公之地是同姓之為上公也建微子以為上公是異姓之為上公也公視侯伯固巳尊矣而曰上公尊而又尊之辭執桓圭九寸繅藉九寸賈氏曰執桓圭九寸者以桓楹為飾繅藉九寸者所以藉玉鄭康成曰繅藉以五采韋衣板若奠玉則以藉之鄭鍔曰天之大數不過十二故王者法之陽之極數過於九而必亢以九而止故上公法之圭之寸服之章常之斿樊纓之就車之乘介之人皆以九為節所以法陽數之極以明人臣之位極於此矣冕服九章建常九斿鄭康成曰冕服著冕所服之衣九章者自山龍以下鄭鍔曰上公所建交龍之旗爾至於日月之常王所建也今曰建常者蓋别而言之指畫日月者為常總而言之凡爵命之尊所得而建之旗皆可謂之常謂其常得而用之也王氏曰謂之建常以象其道也非有取於日月為常之義此所以稱王之所建者為大常言大者以明於旗之中為最大鄭康成曰斿其屬縿垂者賈氏曰爾雅云纁帛縿練旒九正幅為縿謂旌旗之幅也其下屬旒故云屬縿垂者也鄭鍔曰凡此皆諸侯命數所當用樊音盤纓九就二車九乘繩證反鄭康成曰樊纓馬飾以罽飾之每一處五采備為一就就成也二副也鄭鍔曰後乘之車介九人禮九牢鄭康成曰介輔巳行禮者王昭禹曰以相禮曰介以相賔曰儐介儐所以傳辭賈氏曰介九人者陳於大門外賔北面時介皆西北陳之鄭鍔曰禮九牢以下則朝享之時王朝所以待之之禮也禮則掌客所言饔餼之大禮也三牲備為一牢王朝禮賔之禮莫盛於此然其禮常致於既朝享之後賈氏曰饔餼大禮朝享後乃陳於館今乃敘於介九人之下為非其敘蓋述禮者因其數之用九故併列之耳愚按餘説見後擯者五人其朝位賔主之間九十步鄭鍔曰凡諸侯之來朝春夏則受其贄於朝乃受其享於廟所以象陽氣之布散秋冬則受贄受享一於廟中而已所以象隂氣之收斂春夏之分也以明賔主秋冬之合也以正君臣此言朝位賔主之間步數者指春夏之言也蓋春夏於朝受贄王不迎賔巳受贄訖乃受享於廟王於是有迎賔之法其朝見之位分為賔主相去九十步者王與上公相逺之數鄭康成曰朝位謂大門外賔下車及王車出迎所立處易氏曰於是王行四十五步以近賔賔行四十五步以朝王陳君舉曰賔主立禮公九十步主人便合近前四十五步方相揖以下便降殺此意思極佳記曰覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下此漢儒之陋今不取之立當車軹鄭鍔曰惟其為賔主故諸侯得用上服乘所得乘之車而至及門下車當車軹而立軹車轂之末賈氏曰車轅北面向在西邉亦去大門九十步公於車東東西相望當轂末車有二軹一是轂末一在軓前此謂轂末之軹鄭康成曰王始立大門內交擯三辭乃乘車而迎之齋僕為之節上公立當軹侯伯立當疾子男立當衡王立當軫與賈氏曰王立當軫差約小向後為尊故也擯者五人賈氏曰擯五人者大宗伯為上擯小行人為承擯嗇夫為末擯其餘二人是士也鄭鍔曰前言介此言擯者賔自用人以輔已行禮則名曰介王朝用以相禮賔而進之者則名曰擯大宗伯王命諸侯則擯論語謂君召使擯是也廟中將幣三享鄭康成曰廟受命祖之廟鄭鍔曰既擯而入廟王受其享享必用幣上公將送幣以享王其享也必至於三則禮成於三矣鄭司農曰三享三獻也鄭康成曰三享皆束帛加璧庭實惟國所有朝士儀曰奉國地所出重物而獻之明臣職也朝先享不言朝者朝正禮不嫌有等也薛氏曰多儀不及物為不成享此所以貴乎將幣恭敬者幣之未將君子不可以貨取此所以貴乎廟中也廟中者昭穆之所序祖考之所安諸侯於此以其物陳其幣蓋以王者之所以事祖考者事其君也其將幣不敢以授王也治官之尊者授之大宰贊玊幣小宰凡授幣之事是也又以禮官之尊者受之小宗伯受其將幣之齎是也清廟曰駿奔走在廟則朝諸侯而受享也鄭鍔曰公侯伯子男所以將幣享王者同以三而成禮故皆曰將幣三享為下之道不可以有二也王禮再祼而酢賈氏曰王禮者自是已下鄭司農曰祼讀為灌再飲公也而酢報飲王也鄭鍔曰賔主之道報施為先賔既致禮於主主當致禮於賔故受享已訖王乃禮賔其禮也再祼而酢祭祀之有祼酌鬱祼以求神也王之事賔如事神尊之之至故王既祼之后又祼之是為再祼再祼之後賔乃酢王所以報王尊己之誠然康成説王使宗伯攝酌圭瓉而祼王既拜送爵又攝酌璋瓉而祼后又拜送爵以為非王與后親為之也嘗考小宰之職曰凡賔客贊祼謂贊王也若宗伯攝酌豈可以天官小宰贊之乎內宰之職曰凡賔客之祼獻瑶爵皆贊謂贊后也若宗伯攝酌何用內宰以贊之乎康成之説蓋因大宗伯言大賔客則攝而載裸遂失之耳大宗伯於王后不與之下而有是説此則王與上公分為賔主親自迎之其禮如是其恭何獨於祼為待賔之至乃使人攝行其禮乎康成誤矣饗禮九獻食禮九舉賈氏曰饗禮九獻謂後日王速賔賔來就廟中行享鄭鍔曰饗禮者設盛禮以飲賔也有房蒸以成其禮有體薦以示其儉有備物以象其德設几而不倚立飲也爵盈而不飲肴乾而不食樂非雅聲則不奏物非正色則不列所以定禮儀其禮則九獻蓋王酌獻賔賔酢主人主人酬賔之後更八獻而禮畢猶宗廟之九獻見其禮之至也鄭司農曰舉舉樂也鄭康成曰九舉舉牲體九飯也鄭鍔曰食禮者大牢以食賔設酒不飲以食為主也以樂侑食賔九舉牲體而九飯樂亦九奏也掌客云三饗三食三燕此言饗食而不及燕蓋饗食在廟燕在寢此方言朝享之禮賔主之儀在廟中之事故不及寢中之事蓋饗以酒為禮食以食為禮而燕則脫屨升堂坐飲至醉以示慈惠而已非朝享之正也出入五積鄭康成曰出入謂從來訖去也鄭鍔曰出入從來有禾米芻薪以供其僕從車馬之費亦用牢禮以致之謂之積五十里有市市有積積言委積之多也賔自外而入謂始至也自內而出謂將歸也或來或去其積皆五以為僕從車馬之費不可一日闕焉以五為節天地之中數也鄭康成曰每積有牢禮米禾芻薪愚按賈氏説見掌客文三問三勞鄭鍔曰問者問其不恙勞者勞其勤苦以三為節禮成於三也觀諸公之臣為國客之禮出及中門之外有問君之禮曰君不恙乎問大夫曰二三子不恙乎則上公之來其問之也可知然諸臣所問問於既見之後此三問在三勞之上則不俟面見然後問也蓋間闊之久聞其來則使卿大夫致其問之之禮既問矣及境則一勞至逺郊則一勞至近郊則又一勞勞者勞其跋履山川行道之勞也鄭康成曰問勞皆有禮以幣致之賈氏曰三問者按司儀諸公相為賔云主國五積三問皆三辭拜受皆旅擯注云間闊則問行道則勞其禮皆使卿大夫致之若然天子于諸侯之禮亦當使卿大夫問之亦有禮以致之所行三處亦當與三勞同處也三勞者按小行人逆勞於畿按覲禮云至於郊王使人皮辨用璧勞注云郊謂近郊其逺郊勞無文但近郊與畿大小行人勞則逺郊勞亦使大行人也總論王氏詳説曰此一節皆言饗禮非朝禮也皆主在廟非主在朝也且朝禮皮辨此云冕服按覲禮云侯氏禆冕在廟覲天子是知非在朝也明矣朝禮乘墨車此云樊纓按覲禮云偏駕不入王門是知非在朝也明矣朝禮無下堂見諸侯之禮雖覲於廟亦無下堂見諸侯之理此云朝位賔主之間九十步七十步五十步按齊僕云朝覲宗遇饗食各以其等為車送逆之節是知非在朝也明矣且諸侯朝王始勞于畿使小行人往小行人之明文也三勞于近郊使王人往覲禮之明文也但勞于逺郊而禮無明文其亦使王人歟至於國天子館之前朝皆受命於朝前朝者即庫門外之外朝也以其右九棘為五等諸侯之位耳惟朝禮則受贄於朝覲禮則受贄受享一皆於廟享之日次於朝覲之日也二鄭説此相為異同然後鄭之説皆約儀禮而為之説也按聘禮在大門外去門有立位陳介之所後鄭以朝位為在大門外是約儀禮之聘禮而為説也按聘禮受朝聘於先君之祧後鄭以廟中將幣為受命祖之廟是亦約儀禮之聘禮而為説也按覲禮行享皆有庭實後鄭以三享為束帛加璧庭實是約儀禮之覲禮而為説也按覲禮王使人皮辨用璧勞是問勞皆有幣矣後鄭以問勞皆有禮以幣致之是約儀禮之覲禮而為説也然三享在祖廟饗食在禰廟燕在寢此言廟中是不及燕也雖不及燕左傳云饗終乃燕燕可知矣飱五牢則饔餼九牢飱四牢則饔餼七牢飱三牢則饔餼五牢此言禮九牢七牢五牢是不及飱也雖不及飱掌客云積視飱牽曰問曰積飱可知矣易氏曰皮辨日視朝而巳玊藻曰禆冕以朝注謂公衮侯伯鷩子男毳乃冕服之制知此則知命圭五等以至繅藉冕服之三等皆朝禮也偏駕不入王門王門之外而已庭燎之詩曰君子至止鸞聲將將注謂君子諸侯將將鸞鑣聲乃樊纓之制知此則知建常樊纓以至二車之類凡三等皆朝禮也經之齊僕曰朝覲宗遇享食皆乘金路其法儀各以其等為車送逆之節注謂迎賔及送相去逺近之類知此則知朝位賔主之間步立之儀皆朝禮也上公之禮其位相去九十步侯伯七十步子男五十步後鄭雖不得其説止曰賔下車及王車出迎所立處若賈氏直以為在廟乃有此迎賔之法經既明言朝位則是外朝之位有此迎賔之法矣朝禮既訖然後於祖廟行受享之禮故將幣三享以至王禮之祼諸侯之酢又至於享禮食禮皆廟中之禮此廟與朝禮其别如此豈可強為之説諸侯之禮執信音伸圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賔主之間七十步鄭康成曰七章者自華蟲以下鄭鍔曰信圭繅藉冕服建常樊纓二車介及牢禮賔主之步享食之禮在侯所當用者以七為節在王所以待之者亦以七為節其視上公降殺以兩而然也立當前疾鄭鍔曰其立則當前疾蓋又進而在軹之前也司農謂前疾為駟馬車轅前胡下垂拄地者蓋輈人之輈深四尺七寸其軾前之曲中者名曰前疾進而立前疾則比之車軹為稍近矣擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞鄭康成曰禮侯伯一祼而酢者祼賔賔酢王而已后不祼也鄭鍔曰擯者四人出入四積再問再勞皆視上公而減殺也諸伯執躬圭其他皆如諸侯之禮鄭鍔曰禮如諸侯所異執躬圭而已諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賔主之間五十步鄭康成曰五章者自宗彞以下鄭鍔曰穀璧繅藉冕服建常樊纓二車介及牢禮賔主之步享食之禮在子所當用者皆以五為節在王所以待之者亦以五為節其視侯伯降殺以兩而然也立當車衡王昭禹曰車衡謂在輈下軛兩服之領前是也鄭鍔曰公侯伯子男以臣事主其禮一耳今其待主之迎或立乎軹有止意或立乎前疾有速意或立乎車衡有平意卑者前而尊者後小者近而大者逺何耶蓋尊者大者其體隆故其文縟所以遲而後則其趨而進也舒而緩卑者小者其體卑故其文殺所以進而前則其趨而進也蹙以速擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞鄭康成曰禮子男一祼不酢者祼賔而已不酢王也不酢之禮聘禮禮賔是與總論鄭鍔曰王於上公再祼而酢則王與后皆祼之於侯伯子男則皆一祼蓋后不祼待之之禮不敢同於上公矣均於一祼幾乎無等故侯伯受一祼則不酢酢雖一也猶有賔主之禮不酢則非賔也此所以别小國之君不敢純以賔道自居但王禮之以為賔而已王所以賔之者有大小國之異諸男執蒲璧其他皆如諸子之禮鄭鍔曰諸男之禮皆與諸子同所以異者執蒲璧而已劉執中曰其地等者其禮必同其命殊者其數亦異分六服所以齊其逺邇當朝者不敢不至矣封五等所以齊其大小當朝者不敢不行矣至於圭玉繅藉冕服旗常纓就車乘介牢朝位步立前後幣享等差祼酢獻舉積數問勞莫不為之降殺一其禮儀者所以辨上下定諸侯之志能使人之安於其位樂於其職不敢僭上以作其好不敢陵下以作其威遵主之道以建其極凡長民者舉皆如是用中之道行乎四方矣凡大國之孤執皮帛以繼小國之君鄭康成曰此以君命來聘也賈氏曰若行正聘則執瑑圭璋八寸不得執皮帛也但侯伯以下臣無此更見法惟大國孤尊故天子别見之易氏曰經言執皮帛者三大宗伯言孤執皮帛則天子之孤也典命言凡諸侯之適子未誓則以皮帛繼子男又言公之孤以皮帛視小國之君此言大國之孤則為上公之孤大國之孤執皮帛而上同乎天子之孤者天子六命之孤而執皮帛束帛而加之以虎皮也上公四命之孤而執皮帛束帛而加之以豹皮也若夫諸侯之適子未誓者以皮帛繼子男不純乎子男也以公之孤執皮帛繼小國之君亦不純乎小國之君也鄭鍔曰此等諸臣小爵以同其禮也大國之孤公之孤也所執者皮帛若以君命來聘其位在子男之後子男行朝覲之禮畢乃繼其後而進也典命云公之孤四命以皮帛視小國之君言宫室車旗衣服禮儀也故言視與此下文其他皆視小國之君之意同此言進見天子之敘故言繼與典命言諸侯適子未誓則以皮帛繼子男之意同出入三積不問一勞朝位當車前不交擯廟中無相息亮反以酒禮之其他皆視小國之君鄭鍔曰出入之積問勞之禮視子男而降殺其朝位則當車前愈卑則進而近君也愈蹙以速也其傳辭則不使介交于王之擯必親自對擯王氏詳説曰即聘禮所謂賔來在末介下東面上儐亦至末擯下親相與言是也行聘享於廟之時亦不用相禮之人王氏詳説曰即聘禮所謂儐者納賔入門左介皆入門左北面西上是也以其介西上而不東上故曰廟中無相王禮之一用酒而已不加鬱鬯其他如二車及介牢禮賔主之間擯者祼酢享食之禮皆與子男同易氏曰昭二十三年叔孫婼曰列國之卿當小國之君固周制也此所謂視小國之君者也視之為言輕重不同皆效其禮則不純乎小國之君明矣凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之黃氏曰鄭謂此以君命來聘者非引聘義諸侯邦交之禮也孤卿大夫士從其君來朝當見入貢獻功以事特來亦當見孤視小國之君卿下其君二等即小行人禮籍也臣工諸侯來朝遣于廟之詩而曰嗟嗟臣工敬爾在公遣其君而戒其臣古人之意深矣鄭鍔曰凡諸侯之卿有公之卿有侯伯之卿有子男之卿或三命或再命之不同然王朝禮之也各視其國之君而降二等謂介與朝位賔主之步降二等也其餘各以其爵焉若夫其下之士大夫又降其君二等故曰皆如之公以九其卿則降而以七其大夫士則降而以五以侯伯言之侯伯以七其卿則降而以五其大夫士則降而以三以子男言之子男以五其卿則降而以三其大夫士則降而以一故聘義曰上公七介侯伯五介子男三介正謂是也士雖無介與步數同降者牢禮之等也王氏詳説曰臧宣叔有言曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫王制皆如臧宣叔所言但加一位字然臧宣叔言卿大夫而不言士王制言卿大夫而又言士所謂其有中士下士者數各居其上之三分是二家之言皆以次國小國之卿大夫士視大國而降一等二等也此言諸侯之卿其禮各下其君二等及其大夫士者蓋以本國之卿大夫士視本國之君而各降二等正與聘義上公七介侯伯五介子男三介同矣然大國之孤繼小國之君即子男是也子男以五為節故凡禮皆五今上公之卿七介是孤為降於卿矣曰此正周公制禮之深意也其曰孤執皮帛繼小國之君則小國之君受贄于朝而孤亦得受贄于朝卿雖七介但不過受享於廟則是天子待上國之孤其禮二而待上國之卿其禮一而已然舜典以五玊三帛二生一死贄連文者直謂從諸侯而見天子耳非因聘而自見也宗伯所謂以禽作六贄者又直謂作之以等諸臣爾非因聘而得受之於朝也且諸侯之臣從其君以見天子得執其贄從其君以見外國之君亦得執其贄如定八年公會晉師於瓦范獻子執羔趙簡子中行文子執鴈是也若夫初仕見已君亦得執其贄士相見禮云卿初仕見己君皆見以羔是也況大國之孤與次國之卿來聘其行享亦異其日如成三年臧宣叔之言以丙午盟晉丁未盟衛是也邦畿方千里其外方五百里謂之侯服歲一見其貢祀物又其外方五百里謂之甸服二歲一見其貢嬪物又其外方五百里謂之男服三歲一見其貢器物又其外方五百里謂之采服四歲一見其貢服物又其外方五百里謂之衛服五歲一見其貢材物又其外方五百里謂之要服六歲一見其貢貨物易氏曰邦畿言畿而六服言服內外大小之辨也周之邦畿即禹貢之甸服周之侯服甸服即禹貢之侯服周之男服采服即禹貢之綏服周之衛服蠻服即禹貢之要服胡伸曰謂之要服者則羇之而已政不致其詳刑不致其嚴使無乖離散徙以為中國害又曰要則約之而已非治之所及周之夷服鎮服即禹貢之荒服是禹貢之與周制其九州之地皆五千里無可疑者職方氏所載雖時有損益而皆不改乎禹貢之舊孰謂其廣地於禹貢九州之外耶然而夷服鎮服不列於六服者以其為禹貢之荒服非天子巡守之地然在九州之內則其待之也實與要服同其禮惟此六服朝畢十二年王乃巡守則是王巡守之禮止及六服故也王昭禹曰書言五服一朝者以侯甸男采衛言之方是時限朝止於五服而已陳君舉曰武成敘諸侯之助祭洛誥稱諸侯之來會止言五服又言六服承德者兼要服而言之蓋近中國之夷狄承德矣行人六服則要服非特承德又能入貢以來見焉則制禮以致太平此其極也鄭鍔曰此言侯服甸服男服采服衛服要服來見之歲與所貢之物康成謂六服隨服來朝六年一遍孔安國據左傳歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明之文以為諸侯三年一朝六年一會十二年一盟是周之正朝法其大行人依服數見者是諸侯遣使貢獻而見耳今考此文言歲一見二歲一見三歲一見則正言諸侯來朝之歲數大宗伯云春朝夏宗秋覲冬遇與夫時見殷見者皆言諸侯見王之名知此所言非指遣使明矣諸儒所以紛紛者正以見而貢物疑之耳大宰以九貢致邦國之用司會以九貢之法致邦國之財用王朝所以仰給者諸侯之貢為多若一嵗來者始貢祀物二歲來者始貢嬪物以至六歲來者始貢貨物則王朝所須無時而可具又況小行人令諸侯春入貢為每嵗之常安有如此之希闊乎先儒謂九州諸侯依服數來朝因有貢物與大宰九貢及小行人春入貢别彼二者是嵗之常貢也余以為先王制貢之法初無異也顧讀經者不深考耳竊謂此行人言見與貢自是二事非聨之也侯服歲一見也其所常貢則祀物甸服二歲一見也其所常貢則嬪物男服三歲一見也其所常貢則器物采服四歲一見也其所常貢則服物衛服五歲一見也其所常貢則材物朝見固有歲數之不同若貢物則是其服每歲之常安可以為來朝始有貢乎見者自其君之親來貢則每歲或遣使而入耳説者合而為一兹所以紛紛也侯貢祀甸貢嬪男貢器采貢服衛貢材要貢貨者亦以內外逺近為之緩急輕重也內而近者冝貢其物之急而重者用物之尤急則欲其致之速凡重而大者取諸近則力所能致也故祀物嬪物器物使侯甸男貢之祀者奉祭祀之物包茅之屬是也鄭康成曰犧牲之屬嬪則嬪婦所化治之物絲枲是也器則祭祀之器宗廟樽彞之類是也王氏詳説曰鄭氏於九貢以器物為銀鐵石磬丹漆以此貢器物為尊彝之屬何一事而兩説蓋天官九貢歲之常貢也行人六貢因朝而貢也嵗之貢不容得貢成器所以與因朝而貢異也古者天子班彝器於諸侯所以鎮撫其社稷也諸侯薦彞器於天子所以鎮撫其王室也昭十五年晉荀躒如周籍談為介以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有是責其不能薦彞器也然則因朝而貢器物其彞器歟此鄭氏所以兩立其説其用急其物重責於內而近者冝矣外而逺方宜貢之緩而輕者用物之尤緩則不欲其致之速凡輕而小者取諸逺亦量其力之所能致也故服物材物貨物則使采衛要貢之服則織纊纎縞之類材則珠象金玊之類鄭康成曰材物八材也貨物則物之輕而可寶者龜貝之類其用緩其物輕責於外而逺者冝矣然九貢所致有幣貢有斿貢有物貢不見於此六服之外誰貢之哉蓋王所責於諸侯者惟服食器用之物而已若夫燕遊之所須雜物之無名幣帛以將意皆不可立為定名以責之也諸侯自有享上之誠欲自致于王則可也大宰言致亦使之自致耳此言貢使以為歲事之常故所致之敘與此不同則知行人為一定之制而大宰非一定之制矣唐氏曰禹貢九州貢物各以其所有東西南北異處産物不同大行人言土貢四面如一先儒不能明也而信之不知六服諸侯貢物凡有九貢大行人姑整齊言之不復别某國貢某物也楚於周非侯服而包茅不入齊得以責之則祀貢不止於侯服行人之言蓋亦互見耳非以為限也黃氏曰九服職方已見此又見朝節貢物著於此違禮則刑不王則誅六官所以合治也九州之外謂之蕃國世一見各以其所貴寶為摯易氏曰夷鎮二服實在九州之內蓋先王以其荒逺非巡守所至使不列於六服鄭氏徒見此二服不列於六服遂槩以為九州之外曰九州之外夷服鎮服蕃服也經止言蕃服鄭氏乃加之以夷鎮二服非也且弼成五服至於五千乃舜之十二州禹治水成功别為九州塗山之會執玉帛者萬國則亦九州內之五服在周則夷服蠻服以上是也若夫外薄四海咸建五長即周之所謂蕃服者當時雖不言所貢之逺物而言五長則有職必有貢故也至周人始詳其制天子巡守止於六服而夷鎮二服在九州之內則其朝貢繼於要服之後九州外之蕃國雖列於九服之末然世一見則不責以中國之禮各以其所貴寶為贄則不同於中國之物如武王克殷而西旅貢獒肅慎氏貢其楛矢以其所貴寶為贄也故明堂位朝諸侯于明堂而四夷皆在四門之外以成王之嗣位也世一見明矣鄭康成曰九州之外其君皆子男也無朝貢之歲父死子立及嗣王即位乃一來耳各以其所貴寶為贄則蕃國之君無執玊瑞者是以謂其君為小賔臣為小客所貴寶見傳者若犬戎獻白狼白鹿是也其餘則周書王會備焉鄭鍔曰贄與禽作六贄之贄同非常貢也王昭禹曰自要服以上所貢有常物而蕃國則各以其所貴寶為贄者詳於治內而略於治外也唐氏曰夷服鎮服尚在九州之內行人不言者見贄與蕃國同也言蕃雖以面言五百里為率通曰九州之外無道里之限矣王之所以撫邦國諸侯者鄭康成曰撫猶安也鄭鍔曰諸侯事上既以盡其禮王之所以撫邦國諸侯者凡以致其恩也故言撫撫必遣使自巡守之明歲為首間一歲則眺之又間一歲則省之又間一歲則屬其象胥又間一歲則遣行人逹瑞節同度量成牢禮同數器修法則然後王乃巡守不巡守則殷國皆所以撫之也易氏曰撫諸侯而言邦國諸侯者非獨厚其君也凡先王所以建君公后辟上以蕃王國下以輯百姓而已使其於百姓而不能推其德意於王室而不能守其政刑雖曰撫之非所以撫之也歲遍存三歲遍眺五歲遍省鄭康成曰歲者巡守之明歲以為始也存眺省者王使臣於諸侯之禮所謂間問也王昭禹曰存者問而存之也劉執中曰存問其安否眺者問而視之也劉氏曰眺視其治效也省者巡而察之也劉氏曰省察其風俗眺則詳於存省則詳於眺鄭鍔曰愈久則愈致其勤此五歲間問其名各異黃氏曰存眺省其為禮冝有不同時聘上已見此又出上舉其節此疏其當行之事歲月詳焉存俯省皆間一歲侯國衆實二歲而遍也侯甸采衛皆然無降殺其惠均也存眺省五歲而周也七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聽聲音鄭康成曰屬猶聚自五歲之後遂間歲遍省鄭司農曰象胥譯官也鄭康成曰胥讀為諝王制曰五方之民言語不通嗜欲不同逹其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始有越裳重譯而來獻是因通言語之官為象胥云諝謂象之有才知者劉執中曰以其象胥屬王之象胥則言語可諭於其俗辭命可協於其民鄭鍔曰諭言語曉之使知鄭康成曰辭命六辭之命鄭鍔曰為國之制必出辭命或以交鄰國慮其所作體制不同故協而合之王昭禹曰賔主不交無辭不相接欲民之無相褻也協辭命所以使之交也易氏曰通五方之言語合九等之辭命皆象胥之職鄭康成曰瞽樂師鄭鍔曰諸侯掌樂之官史大史小史鄭鍔曰諸侯掌書之官劉執中曰以其瞽史屬王之瞽史則六書可諭也而書名為先六樂可聽而聲音為本鄭康成曰書名書之字也古曰名聘禮曰百名以上易氏曰逹六書之文察五音之和皆瞽史之職鄭鍔曰自七歲而下皆可謂之省者不止於視之察之而已又有以教之焉患其言語辭命之異也則會象胥以教告之患其書名聲音之異也則會其瞽史以教告之患其法度之廢壞而或變革也則遣行人往焉其省之也如是各有事焉不徒省爾李嘉會曰必召象胥以諭言語協辭令聚瞽史而諭書名聽聲音者無非通內外上下之情而知其好惡嗜欲也十有一歲逹瑞節同度量成牢禮同數器修法則鄭康成曰逹同成修皆齎其法式行至則齊等之也王昭禹曰瑞六瑞也節六節也逹瑞節所以逹四方而交之鄭鍔曰瑞者所執之玊有璧有圭節者所用之節有金有竹逹之使無不通鄭康成曰度丈尺也量豆區釜也鄭鍔曰量有小大度有長短同之使無或異鄭康成曰成平也平其僭踰者也鄭鍔曰享禮之用牢或九或七或五恐其或異成之使彼此所用各適於平無有僭踰之過數器者鄭康成曰銓衡也禮制之所寓名分之所等合方氏之所同者也恐其多寡小大之不齊於是一之法則八法八則也法則者王朝所施於邦國都鄙而匡人之所逹者也恐其久而或廢修者治之也使數器之法復歸乎正無有廢壞之時易氏曰至十有一歲然後為之察諸侯之政刑瑞節見於小行人之官從而逹之牢禮見於掌客之官從而成之法則正於匡人之官從而修之度量數器一於合方氏之官從而同之凡此皆所以待王之巡守也李嘉會曰王將巡守必告戒之於先苟或不然則幾於不戒視成謂之暴矣十有二歲王巡守殷國鄭鍔曰至十二歲王乃巡其所守變禮易樂者可以知其畔革制度者可以知其逆或討或流於是行焉若或有故而不巡守則合天下諸侯皆來朝王於京師考其制度焉是謂殷國殷者衆也言命衆國而皆至也吕氏曰巡守之禮此乃維持政治攝提人心聖人運量天下妙處大抵人心久則易散政治久則必有缺一次巡守又提攝整頓一次此所以新新不已之意王氏詳説曰書曰協時月正日同律度量衡此虞舜巡守之制也王制曰命大師陳詩命市納賈命典禮考時月定日同律此夏商巡守之制也書與王制所載亦與此屬象胥瞽史逹瑞節同度量等事無以異也但虞夏商待巡守而後行之周則已行而後巡守此所以十二歲而一巡守亦不為踈也況周禮所言巡守必及殷國殷國者衆見曰同之謂也謂王不巡守耳按襄十三年鄭石㲋言於子囊曰先王卜征五年而歲習其祥祥習則行不習則增修德而改卜是知王不巡守者亦為卜征五年之不習其祥爾然則聖人以順動其可輕乎楊氏曰虞舜之世其事簡其人寡其於巡守也兵衛少征求輕故行之五歲不為數成周之世其事繁其人衆其於巡守也兵衛多征求重故行之十二歲不為踈吕氏曰唐虞五歲一巡守周却十二年蓋周時文治已成禮文漸備所以十二年方舉巡守之事此是成王知時變識會通凡諸侯之王事辨其位正其等協其禮賔而見之賈氏曰王事謂諸侯朝王之事鄭鍔曰左氏云宋公不王謂不朝王也朝王無非事者行人則辨其位如朝士所謂右九棘公侯伯子男位焉之位賈氏曰謂九十七十五十步之位正其等如司儀所謂公於上等侯伯於中等子男於下等之等賈氏曰謂冕服旌旗二車之類皆有等級所立之位則辨之所次之等則正之又恐其拱揖不齊進退失節則協其禮使相合如一賈氏曰謂牢禮享燕積膳之禮然後賔而見之使得以進見乎天子若有大喪則詔相諸侯之禮鄭康成曰詔相左右教告之也賈氏曰諸侯為天子斬其哭位周旋劈踊進退皆有禮也若有四方之大事則受其幣聽其辭鄭康成曰四方大事謂國有兵寇諸侯來告急者禮動不虛皆有贄幣以崇敬受之以其事入告王也聘禮曰若有言則以束帛如享禮易氏曰文二年秦伯使西乞術聘魯且言將伐晉襄仲辭玉客曰不腆幣器致諸執事以為瑞節此用幣以告用兵之證諸侯相告如此而況告於天子乎然行人之官乃以此待小客蓋小客不交擯受其幣而聽其辭冝也此言大事則非小客不交擯之比鄭氏乃引聘禮曰若有言則束帛如享禮所謂有言者蓋因聘而有所請於王言則天子聽之束帛則天子受之非大行人所得而與若援此以證必如享禮則緩不及事大行人受其幣而聽其辭為諸侯之告急者設也凡諸侯之邦交歲相問也殷相聘也世相朝也王昭禹曰邦交謂鄰國之往來賈氏曰聘禮云小聘曰問大聘使卿小聘使大夫也鄭鍔曰問則問其不恙以言為禮王昭禹曰聘義云天子制諸侯比年一小聘三年一大聘歲相問則比年之小聘也殷相聘則三年之大聘也大聘施於小聘之中歲故曰殷殷中也黃氏曰殷亦為衆鄭鍔曰殷在二年五年之中聘則遺之以物以財為禮也左氏昭九年僖子如齊殷聘禮也杜預曰自叔老聘齊至今二十年禮意久曠今修盛禮也鄭康成曰父死子立曰世凡君即位大國朝焉小國聘焉此皆所以習禮考義正刑一德以尊天子也必擇有道之國而就修之鄭鍔曰嗣君新即位則相朝所以繼好息民也文元年公孫敖如齊聘左氏以為凡君即位卿出並聘踐修舊好忠信卑遜之道也成十八年公如晉朝嗣君也襄三年公如晉始朝也襄九年衛子叔晉知武子來聘左氏云凡諸侯即位小國朝之大國聘焉以繼好結信講事補缺禮之大也胡氏曰謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰典制大壞或來朝而不報其禮或屢征而不納以歸無合於殷聘世朝之制矣程伊川曰先儒有王臣無外交之説非也若天下有道諸侯順軌豈有內外之限其相交好乃常理也然不安官守而逺相朝無是道也周禮所謂世相朝謂鄰國耳王氏詳説曰春秋之時晉叔向以為明王之制間朝以講禮是三歲一朝也鄭子太叔又以為五歲一朝然比之世相朝則與子太叔之言異與叔向之言大異叔向為晉地則欲諸侯朝數之數故以三歲為言子太叔為鄭地則欲諸侯朝數之踈故以五歲為言其去周禮遠矣若夫禮記王制與聘義戴記一家又自為異同之説聘禮曰天子制諸侯比年一小聘三年一大聘是以諸侯之自為聘為文也王制曰諸侯之於天子比年小聘三年大聘五年一朝是以諸侯之朝聘天子為文也聘禮之言比年小聘合於周禮之歲相問言三年大聘異於周禮之殷相聘蓋殷聘者謂久無事則行盛禮初無年歲之限如孟僖子如齊殷聘服氏以為殷中也自襄之二十年叔老聘於齊至今二十一年故中行盛禮是知殷聘雖為大聘然即非所謂三年也此聘義之所以與周禮異王制言小聘大聘其年數雖與聘義同然其意則與聘義異抑以聘義謂諸侯之相聘而王制謂諸侯之聘天子耳聘天子猶可也以五年而後一朝天子可乎使居衛服而五年一朝為得禮矣若侯甸男采謂之得禮乎知此則知王制之言雖紀夫四代亦雜於春秋之制鄭氏以王制所言五年一朝為晉文公霸時制雖未必然亦有所近似周禮訂義卷六十七
