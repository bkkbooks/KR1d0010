body:
  text: 周禮訂義卷十九宋王與之撰州長每州中大夫一人鄭司農曰二千五百家為州鄭鍔曰書言唐虞之時弼成五服至於五千外薄四海咸建五長而王制言千里之外設方伯五國以為屬屬有長則長之為尊可知周官之制一鄉而五州一州二千五百家之衆用中大夫一人為之長如五國之長然蓋以一州之人為已衆有事而起則為二千五百人之帥不得不重其權任以統治之各掌其州之教治政令之法賈氏曰教謂十二教治政令之法謂十二教之外所施政令皆治之史氏曰州長非獨使之相賙有教焉所以篤父子睦兄弟欽長上之道詳矣又有治政令之法所以齊不齊正不正驅其不帥教者也正月之吉各屬其州之民而讀法以考其德行道藝而勸之以糾其過惡而戒之鄭氏曰屬猶合也聚也因聚衆而勸戒之者欲其善也鄭鍔曰有邦法有教法黨正言正月屬民讀邦法此但言讀法觀下文言正嵗則讀教法如初則知所讀者為教法愚案餘説見黨正李景齊曰古者人才之盛雖得之鄉舉里選之公亦其所以長養成就之者自有道也蓋以五家之比已有下士一人為之長而有以禁其竒邪之心至於教法之所示則閭胥於聚衆庶之時族師於每月之吉黨正以孟月之吉州長以正月之吉皆屬民而讀法無非導民之知所從而使之不戾吾教所以漸摩誘掖之者詳且至矣猶未也人才不以漸而進則真賢碩能何以責備於一旦卒然賓興之日故自比長有以禁其竒邪之心而敬敏任恤則閭胥書之孝悌睦姻有學則族師書之德行道藝則黨正書之夫所書至於黨正則是才之已成矣猶恐其或濫也州長又有以考其德行道藝而勸之糾其過惡而戒之夫然後鄉大夫於三年大比而賓興之則其賢書之獻悉有以公天下先王之於人才其教之不苟而進之有漸如此後世取人類薄其所以長養成就之者而一旦旁求博取務得真才亦疏矣若以嵗時祭祀州社則屬其民而讀法亦如之賈氏曰上云嵗時皆謂嵗之四時此云嵗時惟春秋二時耳春祭社以祈膏雨望五穀豐熟秋祭社以百穀豐稔所以報功故云祭祀州社鄭鍔曰周制春祈於社秋報於社孟冬割祠於公社則嵗時不一祭也此云嵗時祭社則不一時矣王安石以為嵗時者則嵗一屬而已殆未之考耶王昭禹曰因祭社民之所聚而讀法亦無所勞其民矣亦如之亦并考其德行道藝而勸之糾其過惡而戒之林氏曰讀法有因於時者若正月之吉之類時之所在易為知有因於事者若祭祀之類事之所聚易為力春秋以禮會民而射于州序鄭鍔曰先王教民之法未有不因時以論其意射之為藝用於朝覲賓燕之時其事為文用於田獵攻守之時其事為武故以春秋教之春陽用事所以明其事之為文秋隂用事又以明其事之為武因時而教其藝易進因以明義王昭禹曰古者男子生以桑弧蓬矢六射天地四方示其有四方之志先王之為射禮因以習武事焉因以繹志而觀德行焉故必內志正外體直持弓矢審固定而後發則無不中矣春秋以禮會民而射於州學凡以觀德行而已序者州之學也孟子曰序者射也蓋射以序進且以别其賢否也易氏曰序皆鄉學之名五百家之黨以禮而屬飲者既謂之序二千五百家之州以禮而會射者又謂之序萬二千五百家之鄉既有鄉射之名則其學安得不謂之序耶不以序言舉州黨以見之王氏詳説曰四代學名見於王制見於孟子見於學記何其不一學者不可不辨王制曰有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序商人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠此四代之國學孟子曰夏曰校商曰序周曰庠謂三代諸侯之學學記曰古之教者家有孰黨有庠術有序國有學謂商人之鄉遂學且王制言四代學制言養國老固知為國學矣知孟子所言為三代諸侯之學者蓋校諸侯之鄉學所謂鄭人欲毁鄉校是已鄭以校名其學本夏之名耳亦猶子産謂鄭伯為男同義鄭以男名其爵本商之制耳所以知孟子所言為諸侯之鄉學知學記所言為商之鄉遂學者蓋周禮於州長言射於州序黨正言飲酒于序今曰黨有庠術有序夫術即遂也周人以序名鄉學商人以序名遂學況學記所言皆引説命為説所以知學記所言為商之鄉遂學賈公彥以州黨之學名序則鄉之學名庠故遂引鄉飲酒曰主人迎賓于庠門之外失之矣黨有庠則六鄉之學皆以庠為名遂有序則六遂之學皆以序為名是主人迎賓於庠門之外商制也非周制也不然則州黨之學既同曰序何鄉之學獨為庠乎曰黨有庠舉其中以該上下也曰遂有序總而名之也鄭鍔曰州長有射黨正有飲或飲而不射或射而不飲何也州黨俱未可以謂之鄉至於為鄉乃有飲射觀鄉大夫言以禮禮賓之則鄉飲可知又言以鄉射詢之則鄉射可知射義言鄉大夫將射先行鄉飲酒之禮則有射有飲乃為鄉飲州黨之中未可以行鄉飲故但言以禮會以禮屬之而已凡州之大祭祀大喪皆涖其事鄭康成曰大祭祀謂州社稷也大喪鄉老鄉大夫於是卒者也涖臨也若國作民而師田行役之事則帥而致之掌其戒令與其賞罰賈氏曰師謂征伐田謂田獵行謂巡狩役謂役作鄭康成曰致之於司徒掌其戒令賞罰則是於軍因為師帥黃氏曰六鄉之軍聽於王主於司徒平居常自為六軍之教其法詳其兵精司馬作軍六鄉不與理勢當如此故六鄉徴發則稱國言有天子之命獨見之於州長州長承其命也帥而致之軍旅致之於小司徒役致之於鄉師小司徒鄉師各以其事總帥之而致於大司徒嵗終則會其州之政令正嵗則讀教法如初鄭康成曰雖以正月讀之至正嵗復讀之因此四時之正重申之陳君舉曰五黨為州州長正月讀法則五黨之民已皆在州而黨正復屬民讀法五族為黨黨正孟月讀法則五族之民已皆在黨而族師復屬民讀法一日之間既於州長又於黨正又於族師民將奔走之不暇不知當時何以分别愚案鄉大夫每鄉卿一人往往是六卿兼為之只在朝廷所謂正月之吉受教法于司徒及正嵗令羣吏考法于司徒以退此兩日想若吏若民但聚聽於司徒之府其餘處則不讀鄉吏之首既是州長亦有正月之吉正嵗讀法之事者乃是受法於鄉大夫以退而讀之於州鄉是五州之積想其地亦不甚相逺又次而黨正則四孟之吉與夫正嵗想除正月之吉正嵗兩日就聽於鄉州其三孟之吉則讀之於黨又次而族師則月吉屬民想又除四孟之外其餘八個月吉則讀之於族又次而閭胥既比讀法除月吉讀之外其他無時不讀之於閭逺於民者其讀彌疏近於民者其讀彌數此則先王建置鄉黨分布教條之本旨若讀法日分可以類推三年大比則大考州里以贊鄉大夫廢興鄭司農曰贊助也鄭康成曰廢興所廢退所興進也王昭禹曰州長鄉官之次也於考勸糾戒務致其悉故言考其德行道藝而勸之糾其過惡而戒之則終之以贊鄉大夫廢興鄉大夫鄉官之長於賓興賢能則以教之既成也然後賓興之其不言廢則以見鄉教之成人皆有成才可用而人之過惡與其可廢者不足以言之矣史氏曰不曰誅賞而曰廢興者鄉大夫之教民興賢能廢愚不肖而已至於誅賞則大司徒詔王之事也黨正每黨下大夫一人鄭司農曰五百家為黨鄭鍔曰周家之制一鄉則二十五黨每黨以下大夫一人為之則以正一黨之人而為黨人所取正各掌其黨之政令教治鄭鍔曰政令以隄防之教治以訓迪之及四時之孟月吉日則屬民而讀邦法以糾戒之鄭康成曰以四孟月朔日讀法者彌親民者教彌數劉執中曰正月在州三時在黨鄭鍔曰周制治民之具有教法又有邦法民知教法則不違乎理義民知邦法則不麗乎刑辟法立於上其意不同不使之讀則莫知乎法之意讀不以時則又有擾民之煩矣州長正月之吉讀法其下文言正嵗讀教法如初觀如初之言則知所讀者純於教法黨正四時孟月吉日讀邦法其下文言正嵗屬民讀法則知其所讀者不止邦法又讀教法雖有教法實以邦法為主故州長之讀則有勸有戒黨正之讀則有糾戒而無勸蓋專以邦法從事使民有所畏而疾趨乎善民畏黨正之糾孰敢不從州長之勸戒耶春秋祭禜榮敬反亦如之鄭鍔曰一黨之中必有禜祭左氏所謂日月星辰之神則霜雪風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之鄭康成曰亦為壇位如祭社稷賈氏曰黨正不得與州同祭社故亦春秋祭禜神國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位王昭禹曰郊特牲以嵗十有二月合聚萬物而索饗之則索鬼神而祭祀乃萬物之神鄭鍔曰大蠟之祭亦謂之索蠟言其名索言其義蓋萬物所以生所以成凡人之欲皆有以養之凡人之求皆有以給之孰為此者其神乎先王於是有報禮焉方其嵗功之成則索萬物之神而祭之雖水庸昆蟲有所不遺而况造物之元功乎大宗伯以疈辜祭四方百物籥章國祭蠟則吹豳頌擊土鼓息老物凡皆索鬼神之祭所以報本而反始既蠟而屬民飲酒於序所以休老勞農報本反始於嵗功之成休老勞農以正齒位則又申之以孝弟之義黃氏曰社禜酺皆鄉祭惟蠟為國祭蓋亦命祀也教法禮樂詳於鄉者以其士大夫也而使其民學焉鄭言為民三時務農將闕於禮至此農隙教之尊長養老非也鄉之教法非專為農民亦非為農隙而始肄習之春秋祭祀四時田獵正月之吉讀法正嵗讀法孟月之吉讀法月吉讀法何嘗一日不教以禮觀各職則其教農民者可知矣商邑翼翼四方之極此之謂矣鄭鍔曰行禮雖人之所難飲酒實人之所樂因其所樂寓其所難尊尊之義在是貴貴之義在是孝弟之道自達乎鄉黨矣因蠟祭之時飲酒以正齒位理蓋若此自周而後蠟祭雖存而屬民之禮廢觴酒豆肉而怪民之犯齒袵席之上而怪民之犯貴悲夫楊氏曰凡飲酒者始乎治常卒乎亂况大蠟一國之人皆聚若狂而飲酒不以禮正之則其卒於亂也明矣陸佃曰其屬飲則於鄉學其主人則以鄉官其賓介則處士賢者其謀介則就先生先生致仕在鄉里者坐主人於東南僎於東北坐賓於西北坐介於西南此正位也一命齒於鄉里再命齒於父族三命而不齒六十者三豆七十者四豆八十者五豆九十者六豆此正齒也王氏詳説曰鄉大夫三年一行鄉飲酒禮黨正一年行鄉飲酒禮鄉大夫行此禮以賓興黨正行此禮以正齒位一命齒于鄉里再命齒於父族三命而不齒鄭康成曰凡射飲酒此鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也陳君舉曰一命者天子之下士公侯伯之上士子男之大夫而與鄉里齒焉再命者天子之中士公侯伯之大夫子男之卿而又與族齒焉三命者天子之上士公侯伯之卿雖云不齒亦異席而巳非敢居其上鄭康成曰不齒者席於尊東所謂遵賈氏曰鄉飲酒鄉射皆酒尊在室户之東房户之西賓主夾之鄉人謂鄉大夫來觀禮為鄉人所遵法謂之為遵席位在酒尊東公三重大夫再重故知不齒朱氏曰古人貴貴長長並行不悖雖説不序齒亦不相壓别設一位如今之挂位史氏曰習鄉尚齒仕而反鄉曲雖至王公安得不與士齒耶蓋周之士大夫仕於其鄉故黨正不得不以貴而節文之仕至三命則不問鄉族皆當臨而治之而與之雜居齊齒將何以正色而帥乎下此不當齒之義黃氏曰一命受職齒於鄉者則以鄉之老者長者先之再命受服齒於族者則以家之老者長者先之三命而不齒者貴貴之禮也教之長謂其近於兄教之老謂其近於父教之貴謂其近於君凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其戒禁鄭康成曰其黨之民鄭鍔曰祭祀喪紀冠昏飲酒俯仰揖遜進退周旋尤貴以禮為主於五百家之黨立一黨正之官使民於此五事之中動必以禮從事然禮所得為者不可以不戒禮所不得為者不可以不禁故又掌其戒禁此所以能化民成俗也凡作民而師田行役則以其法治其政事鄭康成曰亦於軍因為旅帥鄭鍔曰師田行役衆庶所聚非致嚴以馭之不可也以法而治其政事又異乎平日之教以禮事矣嵗終則會其黨政帥其吏而致事賈氏曰帥族師以下之吏致其所掌之事於州長正嵗屬民讀法而書其德行道藝鄭康成曰書記之鄭鍔曰或謂黨正四時孟月之吉與夫春秋之禜有糾戒之讀法嵗十二月又有正齒位之飲酒於是時也不書其民德行道藝至於正嵗讀法則一書之何也蓋讀法而糾戒之特以勉勵其修為之始大蠟而正齒位特以變革其田野之習正嵗始一書者見德行道藝之難能使人終嵗修之以俟一朝之見録非正嵗則黨正不書非修習之已成則正嵗不書聚民讀法以書之重難其事如此彼見書之人豈一朝而幸得之哉王昭禹曰黨正之所書固非一日之積州長所以考而勸之者亦因黨正之所書而已鄉大夫所以考而興之者又因州長之所考而巳以嵗時涖校比鄭氏曰涖臨也易氏曰以上臨下謂之涖鄭司農曰校比族師職所謂以時屬民而校登其族之夫家之衆寡辨其貴賤老幼廢疾可任者及其六畜車輦如今小案比黃氏曰校而比之賈氏曰校比之時黨正往臨之恐其差失也及大比亦如之賈氏曰族師至三年大案比黨正亦涖之王昭禹曰鄉大夫三年之比也族師每族上士一人鄭鍔曰六鄉之官無非掌教獨於族以師名官何也蓋先王之制鄉也合四閭而為一族環一族而聚百家其意以為治民者猶治家一家之中受姓為氏受氏為族合族既衆儻不率馴教訓則卑陵尊幼犯長而家道不正况百家之聚詎可不先有以教之乎以師為名乃是合族而教之之意各掌其族之戒令政事鄭康成曰政事邦政之事賈氏曰謂國之征役皆是也鄭鍔曰族師之官以掌教為主乃使之各掌其戒令政事不及於教何也嘗以州長黨正考之長以表率為義正以董正為義故二官皆言掌其教治師者人之模範名官曰師則不待言而知其所掌者教矣然設教之道能使人畏服於不言之表則其教必不肅而成是故官以師為名而專命以掌其戒令政事戒以使人勿犯令以使人必從大有政小有事則事為之制曲為之防人人皆有所畏則師嚴而道尊教化不行者無有也月吉則屬民而讀邦法書其孝弟睦姻有學者鄭康成曰月吉每月朔日也王昭禹曰鄉官之讀法與夫書考民之德行道藝孝弟睦姻每於屬民者非特衆而巳亦所以公是非而明好惡每於嵗之正月吉日非特謹其始而已亦使日有所改月有所化鄭鍔曰每月之吉聚而教之當使之讀法可也今乃使之讀邦法者蓋常人之情畏拘檢而樂放逸將欲之率教化必先使之識邦法使知邦法為不可犯則莫不轉而循教法是則每月之讀邦法乃所以驅之使從教法賈氏曰此云孝弟睦姻惟據六行之四事黃氏曰孝弟睦姻人之性質皆有之惟學則德進而行成不學無足觀也孔子曰十室之邑必有忠信如丘者焉不如丘之好學故書其有學者勸之王昭禹曰黨正賢於其黨而已其賢不足乎州長故黨正書其德行道藝州長考其德行道藝而勸之族師賢於其族而已其賢不足乎黨正故黨正書其德行道藝族師書其孝弟睦姻有學者春秋祭酺亦如之鄭康成曰酺者為人物災害之神故書酺或為步校人職又有冬祭馬步則未知此世所云蝝螟之酺與人鬼之步與蓋亦為壇位如雩禜云賈氏曰案州長春秋習射有飲酒禮黨正十月農功畢亦有飲酒禮皆得公酒為之今此族卑不得公酒為禮故云族無飲酒之禮鄭知祭酺有民飲酒禮者案禮器云周禮其猶醵與鄭注云合錢飲酒為醵又明堂禮乃命國醵鄭據禮器明堂禮皆有醵法以不得官酒故須合錢耳鄭鍔曰漢律三人以上無故羣飲罰金四兩詔得橫賜則會飲幾日謂之酺説者謂酺之言布也王布德於天下而合聚飲酒也周人之酺殆此類王昭禹曰祭酺必於族祭禜必於黨祭社必於州者凡以其祭有大小之不同故即其所聚之衆寡為異唯為社事單出里唯為社田國人畢作然則社之祭大矣故祭社於二千五百家之州禜之祭次之故祭禜於五百家之黨酺之祭為小矣故祭酺於百家之族鄭鍔曰當祭酺之時復書其孝弟睦姻有學之人豈非少長咸集又得諸公論而知其實歟以邦比之法帥四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦賈氏曰以邦比之法者案比之法國家有常故據其常法以案比之鄭鍔曰比法者小司徒頒於六鄉之比法也在鄉師則謂之國比言是法本於王國而非臣下之所私在族師則謂之邦比言是法行於邦中而非特一族之所專賈氏曰四閭之吏者族師管四閭二十比吏則閭胥比長王昭禹曰校其數而登其籍於鄉大夫項氏曰夫以田言家以居言如家七人為衆五人為寡貴賤老幼廢疾則不任可任六尺以上七尺以上者六畜牛馬羊豕犬雞車駕輦挽皆辨之五家為比十家為聨五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋愚案先王既以伍法比其居不可無什法以聨其居若伍而不什仍舊人自為伍家自為伍彼此締絡籓籬愈甚不止如疏所謂擬入軍時相并也黃氏曰比閭黨州皆以五而登惟閭四為族變其中者所以為聨法也故五家為比有聨則閭合四閭為族有聨則黨合如是則比閭族黨無不合者居則五家為比十家為聨行則五人為伍十人為聨五伍也十什也故士師曰掌鄉合州黨族閭比之聨與其人民之什伍是也鄉合非野法也四閭為族八閭為聨八閭二百家軍法雖四而調一要必以是而起鄭康成注稍人曰以人數調之使勞逸遞焉是也大司馬有車有徒故十人為聨則伍合二伍二百人為聨則卒合二卒以二百人計之七十五人共車三伍百二十五人為徒兵五伍皆伍也合則皆什也晉荀吳毁車為行而曰以什共車必克又曰困諸厄又克蓋當險野利用徒盡合車人而用之故謂之以什共車此本先王微意荀吳窺見之耳然必素相聨合故倉卒可用愚案相保是見居者則任之相受是新徙者則受之餘見大司徒王昭禹曰刑罰相及相共則惡者所同惡而無所比慶賞相及相共則善者所同好而無所蔽賈氏曰刑罰慶賞相及者趙商問族師之義鄰比相坐康誥之説門內尚寬書禮是錯未達旨趣鄭答族師之職周公新制禮使民相共敕之法康詰之時周法未定又新誅三監務在尚寬以安天下先後異制各有云為李景齊曰古者聨比其民而歡洽其心使之有相保相受之法而一有為不善者則衆庶之所共棄使為不善者亦或從而保受之焉則其罪必及之矣此先王驅民而之善之意故族師相及相共必繼於相保相受之後而比長有罪相及亦繼於相受相和親之後然先王之驅六鄉之民皆期於德行道藝之歸而一為不善則比閭之所不齒而其身不得以自容斯民安得而不移於善哉聖人善俗之道其微權實寓於此項氏曰相保相受則司徒比閭之説猶懼其末足也故使之為聨互相保受則姦私竒邪無所容於其間而善惡公矣然徒使之保受無利害則保受亦虛設也故又有刑有賞有罪則相及有賞則相若夫如是則保受無所妄矣故入可以受邦職出可以役國事死可以相葬埋皆有託也王昭禹曰職隨其所能而任之凡邦之民莫不然事隨上所作惟國中而已賈氏曰友助益至以相葬埋則四閭為族正以相葬為事故也黃氏曰事益易辦鄭鍔曰平居如此則有事而在軍中前日之受邦職者今其敢廢軍政乎前日之以役國事者今其敢顧私家乎前日之相葬埋者今其敢畏死而不相救乎然則族師之法實軍政所寓矣陳氏曰鄉遂雖有內外之别然遂之相保相賙相葬不異於鄉鄉之相受相糾不異於遂鄉之田法同於遂遂之軍法同於鄉先王之於家也既以五家為比為鄰積而上之至於萬二千五百家為鄉為遂其於人也既以五人為伍為兩積而上之至於萬二千五百人為軍又十家為聨以聨其居十人為聨以聨其人鄉則聨之以八閭遂則聨之以八里如此則居作相友戰守相衛而心同體一矣若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰嵗終則會政致事鄭鍔曰一族之衆居則有比閭之聨而卒伍猶未之合有耒耜之用而兵器或未之精至於作之而師田行役族師遂為一卒之長欲其師行之有統則必合為卒伍王氏曰以伍聨伍故謂之合欲其攻戰之必勝則必簡其兵器合則使之聨而不散簡則使之精而無敝又用鼓鐸旗物率之至於師田行役之所賈氏曰帥而以至者帥至於鄉師以致於司徒也猶恐其在軍之不肅復掌其治令戒禁刑罰既巳防之於其前又有以驅之於其後孰敢不率哉至嵗終會其一嵗所行之政而致其事於鄉大夫則一族之政舉矣閭胥每閭中士一人王昭禹曰閭二十五家而同其門中有胥以統之鄭鍔曰或謂庶人在官者曰胥所謂府史胥徒是也中士為一閭之長亦以胥名之不嫌其與胥徒伍耶蓋胥者有才能之稱取其才智足以長人爵既為中士固足以自别於庶人之在官者矣名不嫌其與同各掌其閭之徵令史氏曰閭胥於民尤近掌其征令而已異於師也徵令者上之所言皆是也鄭鍔曰有所求取於民則曰徵有所役使於民則曰令閭之政令小司徒行之閭胥掌率一閭之民以聽之故曰各掌易氏曰徵令乃奔走之事屬於庶人在官之徒宰夫所謂徒掌官令以徵令是也閭胥掌之數其閭之衆寡而辨其施舍特以贊族師之校登也以嵗時各數其閭之衆寡辨其施舍王昭禹曰二十五家其數寡而可以數計之鄭鍔曰説者謂一閭之中不過二十五家其衆寡何難知之又必以嵗時各數之耶蓋一閭之民有可任者亦有可施舍者彼其或老或幼茍不知其可舍而一切任之豈恤民之道哉閭胥之數唯先有以辨之則鄉大夫得以嵗時入其書凡春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其敬敏任恤者鄭康成曰祭祀謂州社黨禜族酺也役田役也政若州射黨飲酒也王昭禹曰分而言之則曰師曰行役合而言之同謂之役政黃氏曰役政師田也司馬政典也喪紀大喪之事也黃氏曰四閭為族使之相葬王昭禹曰即州長所謂大喪之事閭胥特以聚衆庶為事而已若作民而用之非所掌四者及比皆會聚衆民因以讀法以敕戒之黃氏曰數謂其事之有數者比謂因其敘而比之居則五家為比故讀法亦使比而聽之以祭祀聚則讀祭祀之法以役政聚則讀役政之法以喪紀聚則讀喪紀之法大抵州黨族各有法則各以其時而讀之閭亦自有法則因其聚而讀之賈氏曰族師以上官尊讀法雖稀稠不同皆有時節閭胥官卑於民為近讀法無有時節但是聚衆庶比之時即讀法故云既比則讀法黃氏曰任任其事也史氏曰任信於朋友恤憂其事也史氏曰恤憫其窮困任恤必敬敏者於是書焉鄭鍔曰六行之教曰孝友睦姻任恤而已初未嘗教以敬敏也今乃書其敬敏任恤者蓋世有好名之人以任恤為能者臨事或慢侮而待人不敬赴事或遲緩而應機不速必視其能敬敏於任恤之事然後書之皆不足以為高行此與族師書其睦姻有學者意同賈氏曰閭胥親民更近故除任恤六行之外兼記敬敏王昭禹曰敬敏任恤其事易見其行易知閭胥之賢不足於族師故書其敬敏任恤而已任恤與孝友睦姻同為六行任恤為末孝友睦姻為本故族師書其孝友睦姻閭胥書其任恤而已凡事掌其比觥古橫反撻吐達反罰之事賈氏曰言凡事則是鄉飲酒及鄉射飲酒有失禮者皆須罰之掌其比者人聚則有校比之法皆掌之黃氏曰凡事謂祭祀役政喪紀當其比時有違失則以觥撻罰之王昭禹曰閭胥主於聚衆庶而比之則所謂觥撻罰之事者特於比衆庶之時也詩曰兕觥其觩則兕觥罰爵也鄭康成曰爵以兕角為之賈氏曰輕者觥酒罰之書曰撻以記之則撻罰撲也賈氏曰重者以楚撻之林氏曰事有大小則比之使聚行有不中則觥之使中才有不達則撻之使達為有過失則罰之使恥閭胥致詳於事如此史氏曰二十五家之失禮疑若不足關於治亂而先王之罰不恕如此固不以二十五家而廢治也鄭鍔曰既書其行則不遺片善又罰其過則不容小惡周家之民所以能遷善而逺罪也比長五家下士一人史氏曰民之治自族黨州鄉為附庸為侯邦為天下其本則出於此欲治天下必行比法可也是故先王於此尤所致意雖合為六鄉統為天下其法亦必以此名之鄭鍔曰聖人作易地上有水則名卦為比以水與地至相親也五家可謂親矣故名曰比然其長下士也乃同乎州長之長殆亦以其位卑爵微不足以長人故命名之義不嫌於上同禮庫曰比長閭胥之屬只民間推擇為之可以表率五家者為比長表率二十五家者為閭胥即非官司案鄉官遂官皆不設局無府史胥徒之屬非官司也後世論成周設官併鄉遂數之遂疑其太多此不考之故楊氏曰先王度地以居民因田以制祿天子之縣凡九十三國其餘以祿士以為間田載師有士田則士之受田即祿也故孟子曰仁政必自經界始經界既正分田制祿可坐而定夫五家為比以一下士長之王畿合六鄉之衆比長以萬計若以受天子賦貢祿之則以財不足為疑無足怪者王制言王者之制祿者則曰天子三公之田視公侯卿之田視伯大夫之田視子男元士視附庸自三公以下皆以田言之制祿以田明矣故太宰以九賦斂財賄九貢致邦國之用各有所待而士祿不與則不以賦貢祿之又可知矣各掌其比之治五家相受相和親有罪竒邪則相及楊氏曰竒者常之反邪者正之反鄭康成曰邪猶惡鄭鍔曰相受則以容言之項氏曰相容不相擠排相和親以情言之項氏曰相好不相乖離王昭禹曰大司徒五家為比使之相保五比為閭使之相受比長言相受不言相保者蓋分而言之則比相保閭相受合而言之則皆相保受相和則不乖相親則不踈如此則愷悌和樂之風形而乖爭陵犯之變無由而作矣先王禁民為非於其微而致察故始於五家之比史氏曰周之治本於閨門又以比法輔之則五家之家法素嚴矣其相受相和親固然也所慮者竒邪之民忽生其間遂能敗羣亂俗同比之民不能絶其萌相帥於無過之地至於有罪豈不相及乎相及者若今連坐也項氏曰五家有罪惡姦宄則相及賴其相察鄭鍔曰一比之中如此及合為一伍則歡愛之心足以相死一伍如此軍政定矣徙於國中及郊則從而授之王昭禹曰孟子曰死徙無出鄉者其常也此言徙于國中及郊于他者其變也黃氏曰國中即六鄉也鄉大夫曰國中自七尺至六十野自六尺及六十有五舉國中對野則六鄉為國中可知此舉國中對郊蓋六鄉餘民居于四郊者自郊徙國中自國中徙郊若為進退升黜之法者鄭鍔曰軍政寓於鄉一家遷則一伍廢而軍法壞今乃有徙居之法蓋地有廣狹民有衆寡勢不能無遷鄭康成曰謂不便其居也然非民得以自遷為比長者授之行之則奉上令而遷也鄭康成曰皆從而付所處之吏明無罪惡若徙于他則為之旌節而行之賈氏曰當鄉之內遷徙直須伍長送付彼吏若徙于他是出向外鄉則當為旌節乃行之陳君舉曰至遷于他所則為之旌節而行之蓋非甚大不得已則不容其遷不然鄉民盡出遷居則六鄉為虛矣為之旌節以防呵問者鄰長謂徙於他邑則從而授之亦謂在其遂中至徙之他則亦如是先王於鄉遂中蓋嚴如此史氏曰若徒于他則不可面相授受豫之旌節以為信則彼得以受之矣何者知其無過也若無授無節則唯圜土內之劉迎曰居鄉無授出鄉無節此無根著之人故以圜土內之鄭康成曰獄必圜者規主仁以仁求其情史氏曰無授無節非有過則必其無土著者彼之得之寧不呵問內之圜土者既防其姦偽又冀其回心而止於無過此先王之仁政也豈有罪者耶司圜掌圜土之官其曰收教罷民又曰任之以事而收教之固非獄矣但以土為圜而立之出入之限先儒謂繫之圜土而考辟之則真以為獄也其實不然其刑人也不虧體罰人也不虧財非有罪者可知吕氏曰先王之民無一人無係屬者徙於彼又授之於他徙於他則為旌節無授無節則是無係屬之民而囚之圜土矣間民無常職但不服職而已有身則有家有家則係於此可知如是則雖有遊手機巧之民亦將日漸月化而不自知使成周之君長守法則雖姦雄豪傑且俯首而不敢倡惟其失此法遂至於民無附著而遊手機巧遍天下矣周禮訂義卷十九
