body:
  text: 周禮訂義卷三十宋王與之撰以軍禮同邦國王昭禹曰先王以賓禮一天下有不帥則軍禮於是乎用鄭康成曰同謂威其不協僭差者軍禮之别有五賈氏曰僭差若郊特牲云宮縣白牡朱干設錫之類皆諸侯僭也鄭鍔曰凡此五禮天子用之侯國亦用之所以謂之同項氏曰出而軍師卒伍入而比閭族黨皆一致也故大師之禮無以異于大均之禮大田之禮無以異於大役之禮惟封亦然用田役師均封雖若不同其所以為軍禮未始異故曰同然同之不以禮無異于不同故必以禮同之愚案軍禮之設謂之同邦國者以見戢姦慝平暴亂王者未嘗不與人同必若鰥寡之有辭于苖而後大師之禮因衆所共惡者以用衆必若庶民樂有靈臺而後大役之禮因衆所用欲者以任衆賦役欲其均於是有大均以恤乎衆車馬在所簡於是有大田以簡夫衆以至民心所恃以為固者在邦國之封域則行大田之禮以合夫相保之心舎此數者曷嘗勞民動衆以從一已之欲易之師曰師衆也能以衆正可以王矣觀師之義則知王者之制軍禮將以合人心於大同故毎事以衆言之從衆則同不從衆則異其義可見易氏曰軍禮統六師大師之禮而已大均大田大封大役何以亦謂之軍禮蓋制軍有常勝之道有幸勝之道幸勝之道求勝在敵常勝之道求勝在我先王所以有征無戰以在我有是五者之禮也大師之禮用衆也鄭鍔曰五軍以為師以師統軍以軍統旅以旅統卒以卒統兩以兩統伍上下相統聞鼓進聞金止此大師之禮以用衆故欲其同楊氏曰先王行師其坐作進退以鼓鐸鐲鐃為之節而不可亂左不攻左右不攻右則刑誅隨之五伐六伐七伐乃止齊焉勇者不敢先怯者不敢後所謂大師之禮用衆以此大均之禮恤衆也王昭禹曰因地以令賦因家以起役地有肥磽而賦有輕重家有上下而役有多寡此所以恤其事鄭鍔曰以衣服則均而無等降之殊以飲食則均而無貴賤之别貴而為將者暑不張蓋賤而為士者亦宿車下左傳所謂均服振振自廬以往振廩同食此大均之禮也以恤衆固欲其同大田之禮簡衆也鄭康成曰古者因田習兵閱其車徒之數王昭禹曰春教振旅夏教茇舍秋教治兵冬教大閱此所以簡其能鄭鍔曰艾草以為防褐纒旃以為門裘纒質以為槸閒容握驅而入轚則不得入田車欲其好四牡欲其阜閱其丁壯數其器甲此大田之禮也以簡衆故欲其同大役之禮任衆也黄氏曰大役之禮如召誥命庶殷丕作是也王昭禹曰大役則帥其民而至起徒役則無過家一人豐年則公旬用三日中年則公旬用二日無年則公旬用一日此所以任其力鄭鍔曰量之以逺近賦之以丈尺程其力計其功或城郭道塗之脩或宮室橋塹之役致之以大旗鼔之以鼛鼓此大役之禮也以任衆故欲其同大封之禮合衆也鄭康成曰正封疆溝塗之固所以合聚其民黄氏曰如康誥封康叔是也建牧立監所以糾合邦國王氏曰合衆者地有定域民有常主所以合其志也鄭鍔曰封人之封四疆也或百里或二百里或三百里或四百里或五百里各有封域以為阻固此大封之禮也以合衆故欲其同以嘉禮親萬民鄭康成曰嘉善也因人心所善者而為之制嘉禮之别有五王昭禹曰可欲之謂善充實之謂美美之至則為嘉蓋兄弟之義男女之情朋友之信故舊之愛賓客之好善之實也無以文之不能充善而至於美充美而至於嘉鄭鍔曰吉之與嘉皆美善之義祭祀之禮謂之吉以祭有受福之道也嘉則非特吉而已雖美亦未足以盡之易曰亨者嘉之㑹又曰嘉㑹足以合禮且天運至於南方萬物相見無所不通然後為嘉之㑹人道至於亨嘉之㑹然後足以合禮兹嘉所以為美之至也飲食冠昏賓射享燕脤膰賀慶之禮皆人心之所善安得不為美之至與黄氏曰嘉禮所以教民相親也飲食昏冠自天子達於庶民以飲食之禮親宗族兄弟王昭禹曰飲食之禮所謂族食族燕之禮以昏冠之禮親成男女王昭禹曰昏冠之禮謂昏禮冠禮鄭康成曰親其恩成其性鄭鍔曰昏者禮之本冠者禮之始昏則以親男女之情冠則以成男女之徳也以賓射之禮親故舊朋友鄭康成曰射禮雖王亦立賓主王之故舊朋友為世子時共在學者天子亦有友諸侯之義武王誓曰我友邦冢君司寇職有議故之辟議賓之辟黄氏曰立賓主敵也是故謂之耦亦謂之朋孟子曰友也者友其徳也不挾貴不挾長而友射亦有燕其樂章小雅伐木是也鄭鍔曰待以賓禮而與之射見人君不忘故舊之情不棄朋友之好以饗燕之禮親四方之賓客鄭鍔曰諸侯來朝曰賓諸侯之臣曰客待以享燕之禮所以示隆厚之情享在朝燕在寢享則設几而不倚爵盈而不飲以訓恭儉燕則脫履升堂行無算爵以醉為度以示慈惠說者見定王謂公當享卿當燕謂禮各有所施余以為行人於諸侯上公則三享三燕侯伯則再享再燕子男則一享一燕其實諸侯與其臣朝聘有享又有燕彼定王之言特示公卿之别爾如管仲平戎于王王以上卿之禮享管仲則大夫亦享也湛露之詩天子所以燕諸侯則諸侯亦燕也故以四方賓客總言之王氏詳說曰行人言享不及燕掌客并言享燕然行人言享者言其獻數掌客言享者言其數疎之數享終乃燕雖不言燕燕在其中王氏曰宗族兄弟飲食之而已致其愛也四方賓客則有燕享之禮致其敬也陳祥道曰行葦燕九族同姓棠棣燕兄弟伐木燕朋友若燕諸侯則有湛露燕羣臣嘉賓則有鹿鳴燕夷狄則所謂蓼蕭王燕則諸侯毛此燕諸侯以齒王燕飲則為獻主非王自為燕於大僕見王之所以燕者必於内朝之地故曰王燕則相其法於酒正見王之燕飲有多寡之數故曰王燕共其計也於鞮鞻氏見王之燕必有樂故曰燕亦如之以脤膰之禮親兄弟之國薛氏曰腥曰脤王昭禹曰脤謂祭祀之肉盛以蜃器者膰謂熟肉助祭執事因賜之以為胙者熟曰膰大宗伯以血祭祭社稷以饋食享先王是社稷主腥故謂之脤宗廟主熟故謂之膰兄弟之國親也故兼脤膰以賜之諸侯之國疎也故歸脤而已故脤膰以親兄弟之國歸脤以交諸侯之福是也鄭鍔曰分而言之社稷之肉曰脤宗廟之肉曰膰以左傳攷之成十三年劉康公成肅公㑹晉侯伐秦成子受脤于社不敬又定公十四年天王使石尚來歸脤則脤為社稷祭肉明矣然左傳又云國之大事在祀與戎祀冇執膰戎有受脤而孟子言夫子以膰肉不至而行說者皆以為宗廟之祀則膰為祭宗廟之肉矣愚案鄭鍔以祭社稷曰脤祭宗廟曰膰是矣薛氏以腥曰脤謂社稷用腥以熟曰膰謂宗廟主熟親如兄弟若祭社稷之脤祭宗廟之膰皆當及之疎如異姓歸脤而不及膰則所及者止於社稷之肉或者見公羊榖梁有生居俎上曰脤熟居俎上曰膰遂以肉欲不壊盛以脤器凡助祭執事皆賜膰以為胙不知兄弟之國分處於外未必皆與乎祭而熟肉亦不可以至逺特於以祀以享之際不欲以已專其福思與兄弟共之當有牲以折其俎然必曰脤膰者為此乃脤膰之胙以示其致享致愛之道然也劉氏謂其廣祚𦙍而嗣祖先得之然非兄弟之國至二王後及異姓為王所特尊者亦得與焉如王使宰孔賜齊侯胙又曰宋先代之後也天子有事膰焉又所以廣其福也以賀慶之禮親異姓之國鄭鍔曰情之親者因物以示恩情之疎者託言以見意異姓之國情之疎者鄭康成曰異姓昏姻甥舅必有文辭以見意故有可賀之事則以言賀之有可慶之事則以言慶之若夫賀慶之别則賀或有財而慶則專以言而已觀行人言賀慶以贊諸侯之喜不别同姓異姓而總謂之諸侯則同姓之邦非無慶賀要以待異姓為主以九儀之命正邦國之位鄭鍔曰出於人君有貴賤之殊者命也見於文物有隆殺之别者儀也列於表著有高下之等者位也命有貴賤故儀有隆殺儀有隆殺故位有高下欲正其位必先辨其儀欲辨其儀必先定其命諸侯之國既分列於四方其位不可得而序惟以九儀之命正之則位之高下無不當矣項氏曰此皆自王國言之諸侯之制倣此王昭禹曰命以徳定其數儀以命制其節位以儀辨其分車旗衣服之數此所謂五儀職服位器之類此所謂九儀職服位器之類茍無王命以行之則下不得以聴上不得以使是故九儀有命然後職足以莅事服足以稱徳位足以臨人器足以行禮則足以治官足以使國足以守牧足以分州伯足以分方然後邦國之位先後有序高下有等謂之邦國指侯國言之王氏詳說曰典命所言分諸侯與諸侯之臣為言宗伯所言并諸侯與諸侯之臣為言上公九命侯伯七命子男五命此諸侯之五儀四命三命再命一命不命此諸臣五等之命豈非分言之乎自一命至九命自受職至作伯豈非并言之乎宗伯九儀之命皆可約典命為解也但典命所言之命自尊及卑宗伯所言之命自小及大自尊及卑正其分也自小及大又權之所在也此宗伯所以為春官之長王昭禹曰先王之時有定命之數典命掌之有加命之數宗伯掌之加命非定命也故謂之九儀之命李嘉㑹曰有命則有儀今曰九儀之命知命之所以貴者以有儀也知儀之有别則知命之所由辨然不曰正羣臣之位而曰邦國則諸侯五等之爵卿大夫士四等之序舉别之壹命受職王氏詳說曰一命者典命公侯伯之士一命子男之卿一命是已天子之下士一命雖不見於典命然府史胥徒皆官長所自辟除若士則為六卿之屬矣豈有不命者為之乎一命受職則此三等與王昭禹曰所治謂之職未命之士非無職然非受於王至一命則所受之職受於上矣鄭康成曰始見命為正吏王昭禹曰子男之士不命則此或加子男之士為之再命受服王氏詳說曰再命者典命公侯伯之大夫再命子男之卿再命是已天子之中士亦再命以下士而知也卿大夫服𤣥冕鄭康成曰謂受𤣥冕之服卿大夫自𤣥冕而下如孤之服黄氏曰自𤣥冕而上猶今服緋為章服也士服爵弁賈氏曰凡言士者無問天子士諸侯士皆爵弁以助祭士冠禮皆有爵弁再命受服則此三等與王昭禹曰公侯伯之大夫與子男之卿皆再命固已受服矣以公侯伯之士與子男之大夫皆一命則此或加公侯伯之士子男之大夫為之三命受位王氏詳說曰三命者典命公侯伯之卿三命是已王之上士三命以中士而知也蓋公侯伯之卿無非命於天子是命於天子之卿者三命也始有列位於王朝者曲禮曰諸侯之大夫入天子之國曰某士大夫即卿也是與天子之上士等也三命受位則此二等與陳及之曰三命與上士有位於朝元士也鄭子産謂有位於朝是亦受位者也檀弓謂朝不坐燕不與是無位也鄭康成曰三命有位於王者闕官至陞朝也管仲曰天子之二守國高是也四命受器王氏詳說曰四命者典命王之大夫四命公之孤四命是已曲禮曰無田祿者不設祭器卿以下必有圭田是大夫之有田祿也四命受器則此二等與鄭鍔曰有王朝之大夫有諸侯之大夫其名同其命異故有當造當假之殊公侯伯之孤與王之大夫皆四命得以自造若公侯伯之大夫再命未得受器則其也假用也固宜不假是為僭禮禮運以是謂亂國黄氏曰四命王之下大夫食采於稍地始得祭其有功徳者受地於小都是為中大夫公之孤亦四命孟子曰惟士無田則亦不祭未受地也陳及之曰祭器凡籩豆之類命士雖有之而不具為大夫則始具祭器不假於人是為受器王昭禹曰公之孤固已受器矣公侯伯之卿皆三命則或加公侯伯之卿為之五命賜則鄭鍔曰竊意公侯伯之孤四命矣加以五命為子男之君賜以此八則使比王畿都鄙之長蓋外為子男之君校其爵等正與畿内都鄙之長同也劉迎曰先儒以則為未成國之名大夫四命出封加一等賜之子男之國謂之未成固不可若未出封亦賜之采地則為都鄙矣以八則治都鄙列之都鄙則可以為賜則也不然秋官都則豈非治都鄙八則六命賜官鄭鍔曰王朝之卿六命若封於大都小都之地得自置臣屬治其家邑如諸侯故得賜官蓋大夫不得具官有地而得置官者設一官以兼攝衆事耳故管仲官事不攝孔子譏之惟六命之卿得以具官及其出封則為侯伯故晉侯之臣荀偃自稱曰其官臣偃實先後之彼為侯伯有官臣即在朝六命而具官者爾李嘉㑹曰古者大夫之家必有宰治其家事六命之卿又加於大夫得以自置其臣於是有賜官使其賜國為諸侯自然有卿大夫士之位不待乎上之賜然所以賜之官者止家宰耳七命賜國易氏曰子男未足為成國之稱至侯伯然後可以言國或以王之卿而出封或以子男有功而加封皆得以有其國鄭鍔曰六命之卿加以七命出為侯伯則賜以附庸之國侯附庸九同伯附庸七同然子男亦有五同三同之附庸獨於七命言之者子男附庸不足以謂之國八命作牧鄭鍔曰七命之侯伯有功徳者加以八命則為諸侯之長謂之牧太宰所謂建其牧是也王制曰二百一十國以為州州有伯伯即牧也商謂之伯虞夏與周則謂之牧故曲禮曰九州之長入天子之國曰牧鄭司農曰王之三公亦八命九命作伯鄭康成曰上公有功徳者加命為二伯得征五侯九伯者陸氏曰書與周禮伯常稱牧蓋自内言之則屈於二伯故稱牧大宗伯八命作牧曲禮九州之長入天子之國曰牧是也自外言之則伸於諸侯故稱伯王制所謂方伯之國是也虞十二牧夏九牧周九州則九伯而王制言八州八伯則王畿之内不見伯焉鄭氏以為商制是也然周牧伯之名見於經傳多矣連帥特見於詩序若夫五國之屬於經無聞左傳曰晉侯享公請屬鄫豈非所謂連屬與公羊傳曰自陜以東周公主之自陜以西召公主之書曰畢公帥東方諸侯入應門左太保帥西方諸侯入應門右所謂九命作伯也與周所謂天子之老二人同矣周有九伯則畿内亦牧而太宰言施典于邦國建其牧主為邦國故也愚案餘說見大宰陳及之曰所謂命為天子所命也其出受地則恩出於上不可為常例也命諸侯則大宗伯擯命卿大夫則小宗伯擯其策文則内史作之書文侯之命冏命之類是也其禮儀衣服車旗宮室國家各視其命之數與夫命圭藻藉建常樊纓貳車牢禮之數一一有隆殺當攷典命及大行人之官總論鄭鍔曰職服器位皆曰受者自下言之命出於上臣之㣲者受之而已則與官國皆曰賜自上言之非天子之賜則人臣不得而有也牧與伯皆曰作者其權重其勢逼其位尊非有人臣所不能為之功不可得而作也王安石云九儀之命皆加命也其說是矣以玉作六瑞以等邦國劉氏曰舜陟帝位始受天下之朝則輯五瑞既月乃日覲四岳班瑞于羣后是玉作六瑞古有之矣鄭康成曰等猶齊等也鄭鍔曰君臣不可無辨故執瑞玉以辨等降之差俱以玉為之以比其有徳之義名曰瑞則以為合符之驗也觀其所執有以知尊卑之等今乃王執鎮圭與公侯伯子男並列何以謂之等邦國耶蓋鎮圭尺有二寸天子守之平居無事守之以鎮國未嘗執至諸侯之朝或執圭或執璧天子則執鎮圭以臨之諸侯所執者九寸七寸五寸而天子執尺有二寸之圭以受其朝不患其無别也王執鎮圭鄭鍔曰鎮圭則琢以四鎮之山以為飾山安靜不動明王者能鎮安天下職方氏九州各有鎮山皆琢於此或曰鎮圭猶天府所謂玉鎮非四鎮也林氏曰鎮圭尺有二寸則天數也繰藉五采五就備文徳也其玉用全無龎雜也王氏詳說曰王之圭不止於鎮大圭搢之以朝日冒圭受之以朝諸侯至於鎮圭則所用廣矣小行人以見諸侯典瑞以徵守以恤凶荒故言六瑞必特曰鎮圭鄭鍔曰王有大圭又執冒四寸以朝諸侯此獨言鎮圭者蓋朝則執冒以冒諸侯之圭璧至於大圭則搢於衣帶之間耳然邦國之君或圭或璧特始朝則執以為合符而已後亦止於用笏故記曰凡笏天子以球玉諸侯以象大夫以魚須飾竹士用竹笏所以書思對命不常執圭也公執桓圭鄭康成曰公二王之後及王之上公雙植謂之桓桓宮室之象所以安其上桓圭蓋亦以桓為瑑飾圭長九寸竇嚴曰博三寸厚半寸剡上左右各半寸賈氏曰桓謂若屋之桓楹檀弓云三家視桓楹注云四植謂之桓彼據桓之豎而立則有四稜此於圭上而言下二稜著圭不見惟有上二稜故以雙言宮室在上須桓楹乃安天子在上須諸侯乃安崔氏曰桓者柱柱者所以安上明宮室棟梁之材非柱不安象上公方伯佐王治天下所以匡輔王國為王所慿安也胡伸曰桓之為物其體則仁其用則壯以承上為徳也所以承之者非一也故有兼制博用之意庇下容衆者賴之以立而不有其力故有背私之意鄭鍔曰上公為二伯者執之見為國柱石之義王昭禹曰公執桓圭射人三公執璧者蓋方其在朝為三公則近於王而有所屈則致君之體而不致其用故執璧及其在外為上公則逺於王而有所伸則有為君之位而致其用故執桓圭鄭鍔曰上公在外則其勢以尊與諸侯並見則欲辨等級故所執者圭在朝賓射之時其勢當異於常時之笏故特執璧所以異乎子男者特不琢蒲穀以為以耳侯執信圭伯執躬圭鄭鍔曰鄭說侯信圭琢人身之伸者以為飾伯躬圭琢人身之曲者以為飾陸佃云圭形直者為信圭曲者為躬圭不作人屈伸之狀蓋為侯則其勢伸伯之於侯其勢猶屈也崔氏曰文縟細者為信圭文麄者為躬圭信者明忠信謹敬以事上躬者欲其謹行而保其身鄭敬仲曰侯視伯為尊尊者其道伸伯視侯為卑卑者其道屈崔氏曰執圭亦取圭潔之理明其潔以奉上子執穀璧男執蒲璧鄭鍔曰子男百里二百里未成國之君說者謂子有字人之徳故其璧則琢穀以為飾以穀能養人也穀又訓善以善養人也男以安人為事故其璧則琢蒲以為飾蒲之為席人所安也又取蒲以柔從之義記曰柔從若蒲葦是也崔氏曰執蒲璧以象天地所生之物劉氏曰璧有中虛所以受益有循環所以勤道治民之徳未大成不可以忘其道則其執璧宜矣李嘉㑹曰榖璧欲其有所養於内不遽求用於外蒲璧欲其有所安於下不遽求伸於人以之安分以之成徳總論鄭鍔曰圭之制下方上圓取象天地而剡其上以象運用之無不利自王至伯皆君道也既得天地之體又盡天地之用故所執皆圭内有孔謂之好好有玉謂之肉肉倍好謂之璧璧之肉倍乎好其形圓明有體而無用也子男有君之體而用未足焉故所執皆璧胡氏曰圭之為物上銳下方其博三寸蓋以為上則利為下則正而博則主生萬物焉此天徳之用也璧之為物肉倍於好而其體員蓋以實成體則為有餘以虚致用則若不足而其體周而無間運而不窮此天徳之體也項氏曰圭璧之異者圜殺直玉藻天子搢珽方正於天下諸侯前屈後直讓於天子大夫前詘後詘無所不讓亦此之類胡氏曰男蒲子穀逺取諸物者侯信伯躬近取諸身者公桓則以若作室家譬之也以禽作六摯以等諸臣鄭鍔曰古之始見君者必有摯摯之為言至也執物以表其至誠之心也蓋君子於其所尊不敢質也故用贄焉非特見君為然下而婦人童子亦莫不有摯記曰無辭不相接也無禮不相見也欲民之無相瀆也林之奇曰禮諸侯所執者玉而已幣帛禽鳥皆非所執也彼據周官有執之之文孔氏注書正自周官誤之大宗伯言執皮帛執羔執鴈至於工商執雞春秋書大夫宗婦覿用幣不聞執幣也惟左氏曰禹㑹諸侯于塗山執玉帛者萬國蓋因玉連文其實執玉奠帛也若以帛可執則皮亦可執乎執皮帛猶可也羔鴈雉其可執乎臣之見君鞠躬屏氣而乃手執羔鴈為禮容乎至尊之前羔鴈生物不知如何拜趨俯伏乎至於執死雉以見君豈其宜哉蓋古者君臣始相見必其土地所有為摯見之禮首以五玉者不敢自有其寶也其餘則以為庭實也呂氏曰古者以禽為摯執之以見其所尊敬之物也摯用禽者所以致其養故膳夫之職以摯見者受而膳之司士掌擯士者膳其摯鄭鍔曰各執一摯所以表臣徳之各不同君受而膳所以見君徳之無不納孤執皮帛諸侯執圭璧孤與諸侯之貴執摯亦以禽則偪於下矣皮帛可制以衣裘圭璧則寶貨因以比徳焉所以異於諸侯而為之等也婦人無外事惟酒食是議故摯用棗栗脯脩不用玉帛禽鳥天子無客禮無所用其摯唯告於鬼神用鬯以為摯宗伯以禽作六摯以等諸臣虞書亦云三帛二生一死贄此孤卿大夫士庶人之贄也王氏詳說曰凡摯天子鬯諸侯圭卿羔大夫鴈士雉庶人之摯匹此曰禽作六摯蓋曲禮廣言之故天子之鬯諸侯之圭亦得謂之摯宗伯分言之故六等之玉謂之瑞六等之禽謂之摯曲禮所言雖廣於孤之皮帛工商雞又缺焉二禮所以不同也孤執皮帛鄭鍔曰三孤貳公洪化寅亮天地以弼一人其名曰孤蓋三公之下六卿之上位漸進乎上矣要當特立無朋然後足以稱其位有天子之孤有諸侯之孤非有衣被人之徳與夫炳蔚之文著見乎外者不可以當此選崔氏曰執虎豹之皮者義取有文而能服猛故執以皮帛蓋束帛為摯飾之以皮皮實於庭而執帛以見也天子之孤以虎諸侯之孤以豹帛之色孔安國於書之三帛以為纁𤣥黄則諸侯世子公之孤附庸之君執之鄭康成以為赤白黑則高陽高辛之後與其餘諸侯執之周家三孤之帛其色有别固可知第於經無攷耳王昭禹曰三公三孤與王坐而論道燮理隂陽則其道大同於物故公之摯則執璧璧之為物其形圓也孤則貳公𢎞化寅亮天地而已於道則不足於物則未能大同於徳則不羣於物為能無朋故其摯執皮帛劉迎曰羣臣之見天子莫不各有所摯宗伯以六摯等諸臣惟不及三公三公執璧乃見於射人之職夫以三公下執子男之璧非所以改容而禮之者不知子男已出封禮不嫌於亢若三公未就封則臣子也見天子之摯而執上公之圭幾於太逼是以宗伯禮官之長不列之諸臣亦以三公不必備惟其摯非若孤卿大夫有常員有常也止見之射人有深㫖哉卿執羔鄭康成曰羔小羊鄭鍔曰羔羣而不黨跪乳而有禮六卿分職各率屬以佐王輔弼之臣不可從諛故欲其羣而不黨循禮恭遜則民不爭故欲其致恭以有禮此所以執羔也易氏曰以純厚禮信為徳羣而不失其類者卿之道也故執羔大夫執鴈鄭鍔曰鴈來往順時行列有序為大夫者循道以進退視義而去就欲如鴈之知時而行不失序此所以執鴈也易氏曰候時而行夙夜奉上而不懈者大夫之道也故執鴈呂氏曰左傳公㑹晉侯于瓦范獻子執羔中行文子趙簡子皆執鴈魯於是始尚羔周禮盡在魯而卿大夫羔鴈之制且因晉卿大夫方知以此見當時之禮散在諸國不能備雖魯且如此也夫魯之禮周公所傳想無所不備而卿大夫所執正是帝王巡守之所脩五禮三帛二生一死贄在虞則五載一巡狩所脩在周則十二年巡狩所脩尊卑上下之分全在玉帛采章以别等差魯所以不辨羔鴈亦是周東遷後巡狩之禮久不講故耳士執雉鄭鍔曰雉耿介而守死五色皆備而成章為元士者欲其備文以相質又欲其耿介守節而不屈執雉宜矣易氏曰自士以下不用飾士於諸臣為卑也庶人工商則尤其卑者也此其等差皆其分守存焉崔氏曰雉用死者為不可生服也庶人執鶩鄭康成曰鶩取其不飛遷王昭禹曰府史胥徒庶人之在官者則庶人非特府史而已凡民在焉或聯於鄉遂相資以生或聯於官府相須以行欲其不散遷故執鶩工商執雞鄭康成曰雞取其守時而動王昭禹曰工興事造業以利其上商懋遷有無以利其上欲其趨時而動故執雞鄭鍔曰古之工商亦有見君之理如工執藝事以諫鄭商人以乘韋先牛犒師匠慶伶州鳩之徒皆工商之得以見君者也工制器商貿遷皆欲其不違乎時其摯以雞宜矣總論王昭禹曰先王之時卿效其徳大夫效其智士效其節庶人工商效其職其才有餘不敢過其分其實不足不得執其物賈氏曰天子諸侯之卿大夫士命數不同但爵稱孤皆執皮帛爵稱卿皆執羔爵大夫皆執鴈士執雉庶人已下雖無命及爵皆執鶩易氏曰孤卿大夫士諸臣也庶人工商未為臣亦謂之諸臣以率土之濱莫非王臣茍有以自致於天子之庭皆得以執摯總論六瑞六摯王昭禹曰君道一故六瑞一以玉為之玉陽物也有君道焉此玉所以為瑞天子受而復賓之也臣道二故六摯以衆禽為之禽者制馭於人者也為人臣者無以有已此禽所以為之摯天子受而不復臣之也周禮訂義卷三十
