body:
  text: 周禮訂義卷七十五宋王與之撰鮑人之事鄭康成曰鮑故書或作鞄鄭鍔曰鞄人治革則字之從革為近今從魚字恐無謂也陳用之曰説文鮑柔革之工鄭司農曰蒼頡篇有鮑莞然皮而去其毛為革熟之為韋考工所記既有韋氏而鮑人所記又皆柔革之事蓋韋氏之篇亡矣所掌不可得而考而鮑之所掌皆治革而柔之之事王昭禹曰鮑人治革雖以一物之微而作治之效為最多或用之為鞔飾或用之為器物一皆取足於鮑人所以獨言鮑人之事也與夫畫繢之事車人之事皆言事同意望而視之欲其荼白也鄭鍔曰治革者以色之白為美故逺而視之欲其如荼之白荼者先儒以為茅莠也詩曰誰為荼苦菜也葉似苣而細斷之有白汁非此所謂荼白也茅之為物潔白易曰藉用白茅茅本自白矣茅之始生者曰荑則又柔而白也欲其荼白蓋指茅之荑為荼也易氏曰凡革之制望而視之其色多晦今欲如荼色之白進而握之欲其柔而滑也鄭康成曰謂親手煩撋之鄭鍔曰鍛革至於極熟則握之必柔而滑進而握之以手欲其柔滑蓋以熟為貴卷而摶音轉之欲其無迆也鄭司農曰卷讀為可卷而懷之之卷摶讀為縳一如瑱之縳謂卷縳韋革也迆讀為既建而迆之之迆無迆謂革不陳用之曰卷而摶之欲其無迆迆邪行也治革而厚薄不常則卷而摶之而文理邪行矣故欲其無迆視其著欲其淺也陳用之曰所謂著之於物趙氏曰淺薄也鄭鍔曰革若調善則鋪著之處雖厚如薄故謂之淺其著者淺則調善可知察其線欲其藏也杜氏曰線謂縫革之縷鄭鍔曰革若堅縮則受縷也必沒而不露其線若藏則革之堅縮可知革欲其荼白而疾浣之則堅鄭鍔曰此又覆説上文王昭禹曰革色白如荼莠其質雖美必疾浣之不使久居水中則堅而難壞鄭鍔曰疾者革體之急疾也苟其體之急疾及其濯之以水則必堅矣蓋物體之緩散者見水則益弱皮以堅為體故浣之欲其堅非疾則不能堅也趙氏曰此革既欲荼白又欲柔滑則知不為甲明矣又甲用生皮鮑人乃熟皮鮑人之革諒是為裹轂矢箙韠舄之類要柔耎光白皮方可用韋氏却是工於穿縳皮條為韋辨等物欲其柔滑而腛音渥脂之則需音軟鄭司農曰腛讀如沾渥之渥趙氏曰如詩既優既渥言漸漬之厚􅧶讀如柔需之需趙氏曰需言軟也謂厚脂之韋革柔需鄭鍔曰革雖欲其握之柔而滑然又以脂為貴脂者革體之潤澤也苟其體之潤澤及其用脂以治之則必需矣蓋物體之焦枮者脂之而不相入皮以需為用故脂之欲其需然非握則不能需也今治皮者多用脂膏以柔之蓋古之遺法歟需與軟同謂柔弱也毛氏曰浣欲疾脂欲厚蓋用脂可過用水不可過引而信音伸之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴音踐也毛氏曰引而伸之以下數句當在卷而摶之之後脫誤在此鄭鍔曰革若引而伸之平正而無邪曲則是始焉取其材之端正而不偏若伸之而邪枉不正則是左右二方必有緩急之偏如左右有緩有急則他日用之其急處先裂急處先裂則是用博大之物裁翦為小狹之物也何則革體既博一方先裂不可棄也必裁去其裂者而用其不裂者則壞廣為狹也故曰以博為帴帴與小戎俴收之俴同俴俴小之貌卷而摶之而不迆則厚薄序也鄭康成曰序舒也謂其革均也愚案此又覆説前之卷而摶之冝其邪迆而突出能不迆者必其厚薄有序均一無差故爾視其著而淺則革信也陳用之曰信讀為屈信之信謂不縮急也愚案所附著者厚厚不能使之薄能淺其著者由革之伸直無縮緩故爾察其線而藏則雖敝不甐音吝鄭司農曰甐讀為磨而不磷之磷謂韋革縫縷沒藏於韋革中則雖敝縷不傷也韗人為臯陶趙氏曰成周制鼓其冒以革其質以木臯陶即鼓之木名注云謂之臯陶者正言鼓木是也臯言始也陶言中虛如陶冗然也鼓始於斫木以為質終於制韋以成聲臯陶之義取此韗字無意義可解李嘉會曰韗字從軍鼓用於軍鼖鼓用於師役正韗人之事長六尺有六寸左右端廣六寸中尺厚三寸易氏曰謂鼓木之版此鼓二十版每版兩頭各廣六寸其圍丈有二尺而鼓面徑四尺矣中尺謂鼓板之中一尺其圍二丈其鼓之中徑六尺六寸三分寸之二矣此鼓之中徑即所謂穹者而復言穹者三之一如鼓面徑四尺則版穹一尺三寸三分寸之一兩面倍之則二尺六寸三分寸之二加鼓四尺則穹徑亦六尺六寸三分寸之二正與上文六尺之徑合王昭禹曰左右端與中廣雖不同而版之厚則同於三寸穹者三之一毛氏曰天中髙而四垂故其勢穹而版亦中央起兩端斂故其中央謂之穹言穹則與賁圍亦異矣圍合四圍而言穹則據圍之半言之耳合穹成圍穹加鼓面三之一則圍必加三之二謂鼓廣徑四尺其穹五尺三寸三分寸之一其圍六尺六寸三分寸之二矣鄭康成曰穹窿者居鼓面三分之一其鼓四尺者版穹一尺三寸三分寸之一也倍之二尺六寸三分寸之二如鼓四尺穹之徑六尺六寸三分寸之二此鼓合二十版賈氏曰經不言版數而鄭知版數者以上下相約而知此鼓言版之寬狹不言面之尺數下言二鼓皆面四尺不言版之寬狹明皆有鼓四尺乃鼓版之寬狹也上三正趙氏曰上三正謂鼓版輳合就要兩頭趨革冒處并中央一平作三節平直兩頭雖邪下去然亦要正直去否則不成面四尺但要稜角起不要弧曲如臯鼓之磬折曰上三正者言數鼓匡上有三處平正穹處一直也注謂三處居二尺二寸以其長六尺六寸故也鄭鍔曰此鼓版長六尺六寸其穹窿而上者與上下兩端三處其長皆欲平正如一也上長二尺二寸中央穹長二尺二寸下端長二尺二寸皆平正如一無長短減殺也毛氏曰上下中謂之三正而獨曰上者省文陳用之曰鄭以正為直既曰穹矣奚以直為疑正如射侯之正言所飾也鄭鍔曰鼓人六鼓此有鼖鼓臯鼓之制其雷靈路三鼓或八面六面四面不合此六尺六寸之制以理考之謂為晉鼓或然也易氏曰先儒以此為晉鼓其説不經見已上皆臯陶之制鼓長八尺鼓四尺中圍加三之一謂之鼖鼓鄭鍔曰鼓長八尺言其身也鼓四尺言其面也其中之圍加其面三之一則其圍五尺三寸三分寸之一前所謂穹者三之一蓋其一旁所加之數故兩旁加二尺六寸三分寸之二也此則只加其面三分之一耳與彼所謂穹者異鄭康成曰中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一今亦合二十版則版穹六寸三分寸之二耳鄭鍔曰鼖之為言大也李嘉會曰道大謂之路事大謂之鼖長八尺大四尺可謂大矣故以鼓軍事言其事之大也趙氏曰鼓用於軍旅要聲洪大所以長八尺然書言鼖鼓維鏞則不特軍事用之為臯鼓長尋有四尺鼓四尺倨句磬折鄭鍔曰臯者長也緩也惟長故緩用民之力不欲亟故長其鼓之形欲其聲之緩此則用於役事是也王昭禹曰昔魯築郎囿季平子欲其速成叔孫昭子曰焉用速成以勦民也然則用民之力其可趣之使疾乎詩曰百堵皆興鼛鼓弗勝者蓋以臯陶節之使緩而不能勝其疾也趙氏曰八尺曰尋尋有四尺長一丈二尺也倨直勾曲曲與直要如磬折旋之勢不三正也毛氏曰凡磬之折股為二則在上者大而短鼓為三則在下者小而長今此鼓丈有二尺而磬折則自四尺而上曲而大自八尺而下直而小所以然者以鼓兩面皆方四尺既不三正不曲其上而直其下則無以致鼓面之皆四尺其欲聲之逺聞亦不可得鄭鍔曰二鼓之面各以四尺為率者鼓以聲之四逹為主故也總論易氏曰此經先言鼖鼓之制以軍事為先次言臯鼓之制役事次於軍事故也陳用之曰鼓之名多矣此所記者二而已蓋韗人一篇或言其鼓之制或言其鼓木之制或舉中圍以見上下使後世可觸類而長之然則雷鼓靈鼓之大鼙鼓鼗鼓之小皆可知矣凡冒鼓必以啓蟄之日鄭康成曰冒蒙鼓以革也啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所取象鄭鍔曰雷之發蟄聲震百里鼓欲其聲如雷故冒鼓必取啓蟄之日先王之制器其取法天道纎悉必考有如此者良鼓瑕如積環鄭鍔曰瑕者漆之文理也鼓之革調急則漆之也其瑕如纍積玉環然蓋環之纍相重積其文理周圍環合可觀冒鼓之革苟調而急則既漆之後其文理周圍環合而圜亦如環也若急而不調則其漆所幔文不能然唯如環之積乃驗其為良矣王昭禹曰其革之調急而瑕臯陶周圍若環之積於內而著見於外毛氏曰冒鼓欲急急則聲彰然一偏急則所漆之瑕必有偏而不得如環之重積故曰良輈環灂則知其用力之均良鼓環灂則知其治革之調鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞王昭禹曰鼓之聲隨其形之大小長短而已鼓大而短其勢促而迫故聲疾而短聞鼓小而長其勢展而伸故聲舒而逺聞則為鼓者不可不審其然也鄭鍔曰皆鼓之病與鐘同韋氏闕易氏曰韋氏之篇亡矣其所掌不可考上經鮑人之事則治革而柔之者蓋皮之去毛則為革熟之則為韋革如革車之類不必其熟也韋如韋辨服之類必待熟而後可或者韋氏所掌用於辨服之類云耳裘氏闕易氏曰裘氏亡篇亦不可考然天官掌皮為大裘以至良裘功裘此經復有裘氏亦猶春官有典瑞此經復有玉人之事或者裘氏掌其制而掌皮言其用畫繢之事雜五色陳用之曰畫為之畫而已繢為之繪五采焉畫繢之用不止於衣裳之間故不言其所繢而統言其事王昭禹曰畫繢之事不過五色而已模成物體而各有分畫故謂之畫分布五色而會聚之則謂之繢所謂青與白相次赤與黑相次此之謂繢也所謂山以章此之謂畫也故司几筵有所謂繢純則繢而後純有所謂畫純則純而後畫此畫繢之别鄭鍔曰自隂陽判為五行五行之位正而五色遂章左傳所謂天有六氣發為五色是也然各奠其方各形其色未足以為文采之美惟畫繢之工取五行而雜錯之然後其文為可觀既著為文彩則其離道也益逺故以事言焉東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃鄭康成曰此言畫繢六色所象及布采之第次繢以為衣鄭鍔曰東方震之位震為木木始生則其色青南方離之位離為火火炎熾則其色赤西方兊之位兊為金金之色白北方坎之位坎為水水之色黑天位乎上觀之蒼然不可得而名謂之玄者以其逺而最微所可見者玄而已玄者黑色之尚微乎地位乎下土壤不齊不可得而名謂之黃者以其成物之功所最盛者黃而已黃者地色之得中乎凡取其四方上下位色之著者而名之故皆以謂之為言然其色之别有六畫繢之事獨以五色為言何也項氏曰五而六者玄即黑也蓋玄之與黑皆北方之色黑者隂之正北方者萬物歸根復命之地而純隂之所聚也乃取其正者以名之然亦可謂之玄焉自其辨而言之則玄淺而黑深自其體而言之初不甚相逺也然則畫玄黑者殆難辨也故特以雜五色言焉易氏曰六入為玄則有黑有赤赤者陽之正黑者隂之正惟天體備隂陽之正色而運此五行者也青與白相次也赤與黑相次也玄與黃相次也鄭鍔曰此言畫繢之事取其自然之色而合之先後次第各有所冝趙氏曰注謂此布采之次第是繢於衣者其説恐拘蓋木者金之配故青與白相次火者水之配故赤與黑相次地者天之配故玄與黃相次想布采畫之時青必與白相對其他亦然如畫火在南邊是赤必畫黑色者在北邊此又順方隅之次第易氏曰相次非次序之謂亦雜比以為設色之美而已以天地之色與四方之色並列於四時之間亦猶乾坤二卦與六子之卦並列於十二月之氣青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻鄭鍔曰此又言畫繢之事取其自然之色而雜之文章黼黻各有其義易曰爻有等故曰物物相雜故曰文文者言隂陽之雜也青與赤謂之文者合青與赤二色相雜乃名曰文也蓋東方之青少陽之色少陽柔也南方之赤盛陽之色盛陽剛也以青合赤剛柔相雜粲然可觀兹其所以為文歟傳曰東南為文謂此也易氏曰巽位乎東南萬物趨於文明之地故青與赤謂之文易曰分隂分陽迭用柔剛故易六位而成章章者言隂陽之相成也赤與白謂之章者取其隂陽之成其功最著而言之自春徂夏生者終乎假大自夏徂秋長者漸至於揫斂赤者夏之色萬物潔齊而文明白者秋之色萬物肅殺而刻制以赤合白隂陽相成其功著見兹其所以為章歟傳曰西南為章謂此也易氏曰坤位乎西南萬物均成於致役之地故赤與白謂之章然二位皆合赤以為之者蓋東者陽之位西者隂之正西南者隂陽之所雜東之文非赤則不能著西之章非赤則不能成也王昭禹曰東之青則純乎陽南之赤則雜乎隂陽剛而隂柔雜之故青與赤謂之文南之赤則陽之生氣於是乎極西之白則隂之殺氣於是乎中隂出而以成陽為事故赤與白謂之章文者章之始章者文之就剛柔雜於東南而為文至西南而後章雜固其所也包氏曰文者取其文明之義而青與赤則純於東南之陽有文明之象焉故青與赤謂之文章者取其成章之義而赤與白則以陽而雜於西方之隂有剛柔相成之義焉故赤與白謂之章黼畫為斧形斧之為物能斷制也非義則不能斷白與黑謂之黼者惟義惟智然後斷故也蓋白者西方之金金刻制所以為義黑者北方之水水明內景其照在內所以為智以卦推之其位為乾乾西北也惟乾剛健故能決天事之武在於是也王巾皆黼王位設黼依皆取諸此而已此白黑所以謂之黼也黻兩已相背相背所以見其辨也黑與青謂之黻者蓋黑北方之色北方者萬物歸根復本之地藏而不見青東方之色東方者萬物出萌坼甲之時見而不藏黑色在北其卦為復復者反也青色在東其卦為震震者動也反則入動則出一出一入其辨明矣人道之别在於是也黻衣繡裳以賜諸侯亦取諸此而已此黑青所以謂之黻也陳用之曰乾位西北其道主斷故白與黑謂之黼艮位東北隂陽各止其所而辨故黑與青謂之黻鄭敬仲曰斧所以立威天地嚴凝之氣盛於西北西北用武之方黻則兩已相背蓋北則物藏之方東則帝出之方包氏曰黼取其斷決其象畫一斧形而白黑色是純隂之色有決斷之義且黑與白色判然不侔故謂之黼黻取其辨其象兩已相背有殊異之義而黑與青是以色之隂而雜乎陽有剛柔相辨之意故謂之黻項氏曰青以白次赤以黑次玄以黃次此六色之相配者繢之以為衣青以赤繼赤以白繼白以黑繼黑以青繼此五色之相生者繡之以為裳陳藴之曰繪事則青白赤黑玄黃而對方繡事則青赤赤白白黑黑青而比方何也繪陽事也陽則尊而不親故對方而不比繡隂事也隂則親而不尊故比方而不對五采備謂之繡趙氏曰五采備是上五色備具然後謂之繡注云繡是施於裳此雜五色皆繡於裳者易氏曰書言六章之裳宗彞藻火粉米黼黻絺繡言藻而繼之以火青與赤之文也言火而繼之以粉米赤與白之章也言粉米而繼之以黼白與青之黼也言黼而繼之以黻黑與青之黻也惟黃之色無所見而宗彝繡以虎蜼則亦以黃為色兹實五采備之證言五采而不言五色蓋畫繢主乎設色而繡則以五采為用故耳若上文六色與六色相次恐凡繢畫皆然經不曽指名是衣上用難拘以繢於衣也始疑畫繢只理會彩畫不預繡事然疏云凡繡亦須畫乃刺之故畫繢二工共一職則知考工之繡係用五采畫成物象却就上模著繡刺也徐氏曰凡物資始於天者必生飬於地而後成就此裳所以獨備五采而成繡易氏曰畫繢陽也施采未備象陽也繡隂也隂道常乏常嫌於不備故五采備謂之繡土以黃其象方天時變鄭鍔曰土者地也黃者地之中色故畫以黃地道成矩惟矩則方故畫地之形則以方惟天以一氣運而為四時四時之色春則為青夏則為赤秋則為白冬則為黑故畫天則隨時而變其色趙氏曰想畫天時必占青赤白黑四時爾謂備其四色非謂春間則畫青色之類然上文玄何也蓋言玄者所以述天之色玄妙處考功不得已而強名之若畫天上以玄則玄豈足以定天之色莊子云天之蒼蒼其正色邪此所以於畫形處却言天時變也王昭禹曰地道靜而有常天道動而無常則化者地之用而變者天之用故曰天時變火以圜趙氏曰地二生火其神無方其體非體而託於物以為體其用非用而因於物以為用其形雖鋭而性則圜而無不周畫火難定其形只得畫其性之圜爾山以章趙氏曰鄭改章作獐是山中物對下水以龍此未是蓋章是山之草木星辰天之章草木地之章畫山雖有形須畫出草木之文而成章王解引爾雅曰山曰上正章謂畫山雖畫其章亦必畫其上正之形謂畫一坐山上頭尖要正亦不必如此説水以龍趙氏曰龍水中神物畫水不畫龍則無以見變化之神鄭鍔曰火以圜者體神而妙用山以章者即仁以顯道水以龍者因智而樂動王昭禹曰以上皆畫於服鳥獸蛇趙氏曰鳥鳥隼之屬獸熊虎之屬蛇龜蛇之屬注云此即華蟲也是蟲之有毛鱗文采者疏云即是華蟲蓋蟲有生之總名此言鳥以其有翼獸以其有毛地以其有鱗王解謂畫在旗上恐有此理蓋合九旗所畫之象故也鄭鍔曰是三物者有於旌旗而畫之有於衣服而畫之不盡言所取象之物者殆舉其一以見其二之意李嘉會曰羽鱗毛介不可定名舉此三者可以類推總論王昭禹曰古之畫繢之事以見於衣服車旗宫室器械之間者其為象豈一端而已仰以觀天之文俯以察地之理近取諸身逺取諸物或象其形與其性或象其色與其用道德之義性命之理皆寓乎中將使天下之人目擊心喻而得乎不説之大法土以黃則象其色也其象方則象其形也天時變則象其用也火以圜則象其性也至於山以章水以龍鳥獸蛇之類亦皆象其形也雜四時五色之位以章之謂之巧鄭康成曰章明也繢繡皆用五采鮮明之是為巧王昭禹曰五行播於四序而人觀以為時五行發於五氣而人觀以為色四時之錯行五行之迭運然後嵗功待之以為成物曲資之以為利四時之協此五色之間施然後服飾得之以為盛彰施因之以為明然所以雜施之者在乎工所以章之者在乎巧非聖人不能作而探其道非智者不能創而明其法而巧者述聖人之道循智者之法以為文而已凡畫繢之事後素功陳用之曰素者質也繢者文也苟無其質文何所加質者在所先則文在所後矣易氏曰甘受和白受采畫繢之事先以粉地為質而後施五采焉子夏問詩云素以為絢兮而夫子曰繪事後素子夏即有禮後乎之對蓋禮必以忠信為質猶繢事必以粉素為質以粉素為質而謂之功者猶言彰施五采必待此而後為功張橫渠曰因萬物之理以用其智則智不鑿反天下之文以歸於質則文不弊畫繢之事文采既極而以素功為後焉豈非反天下之文以歸於質耶易之賁曰白賁無咎夫賁之極以白總是欲歸質也鍾氏染羽陳用之曰鍾聚也染羽之工名以鍾氏取其色之聚也賈氏曰染布帛在天官染人此惟染鳥羽而已夏采注云染鳥羽謂之夏采即此鍾氏所染也王昭禹曰羽之為物雖微而旌旗車服之用衆而不可廢此先王所以獨立官以染歟鄭鍔曰堯舜之世羽畎夏翟徐州貢之周時豈無設官以染羽何耶蓋有虞之時尚質而未文雖用尤寡後世日趨於文以周制觀之王后之衣服則用羽后之車容蓋則用羽國之旌旗則用羽舞者所執則用羽其他用為衣服之飾多矣况以愛物為心者不忍多殺也於是有染羽之法取夫羽之可染者而染以用之毛氏曰四方之貢有限而邦國之用無時必求其自然而用之或不給矣此先王所以有染羽之法以朱湛子潛反丹秫音述三月而熾之王昭禹曰朱謂朱砂以為朱也鄭司農曰湛漬也鄭康成曰曰讀如漸車帷裳之漸丹秫赤粟鄭康成曰熾炊也賈氏曰初以朱湛丹秫當在春日預浸至六月之時而染之王昭禹曰以朱湛漸赤粟以染羽至於天時之一變而後炊熾之以羽之入色為難故也淳章均反而漬之鄭康成曰淳沃也以炊下湯沃其熾蒸之以漬羽漬猶染也賈氏曰既熾之即以炊下湯淋所炊丹秫取其汁以染鳥羽而又漸漬之也王昭禹曰淳與㡆氏所謂渥淳其帛之淳同熟之使自厚也蓋始以朱秫湛熾之其色為未深又從而淳熟而漬之謂之漬非一朝一夕之故緩而入之有漸次爾三入為纁許云反五入為緅側留反七入為緇鄭鍔曰爾雅云一染謂之縓縓音茜朱與丹秫所染故始入必茜也再染謂之竀竀音赬詩有魴魚赬尾言其赤也三染謂之纁纁赤而黃之色也與此言三入為纁同然不見四入之也士冠禮有朱紘之文康成謂朱則四入歟然則以纁入赤汁則為朱矣纁不入赤汁而入黑汁則為紺矣若以紺入黑則為緅緅爵頭之色赤多黑少與紺相類之色故孔子云君子不以紺緅飾自緅而入則為玄康成謂玄六入之色自玄入黑汁則為緇矣故曰七入為緇緇玄色之尤深也禮制所用者玄纁與緇色為多而此只言纁緅而已至於青黃非不用也皆不言焉豈非羽之所染者只此三色故歟趙氏曰玄緇相類所以染人言玄而不及緇鍾人言緇而不及玄也否則三色顔色濃厚染羽為難故特記之以見其所重耶乃若染人夏纁玄秋染夏則絲帛五色備焉此為異也設色之工五畫繢鍾筐㡆今以天官染人考之春暴練者其㡆氏歟其職所謂湅絲湅帛是也夏纁玄者其鍾氏歟其職所謂三入為纁五入為緅七入為緇雖不言玄鄭氏謂玄在緇緅之間是也若夫染夏雖不見於考工而經有五采備之文不然其筐人之職乎李嘉會曰羽貴乎五采今不説朱而説纁不説玄而説緅不説黑而説緇以所入之詳略而定其色之深淺使後人自以意為入之詳略而其色可别矣筐人闕㡆氏湅絲王昭禹曰治絲帛而熟之謂之㡆絲帛熟然後可設飾為用故其字從巾從荒㡆言治之使熟也猶荒土以為田巾則設飾之服陳用之曰㡆氏治絲而湅者名謂之㡆治荒之意也毛氏曰染人掌染絲帛而㡆氏掌湅絲帛則㡆氏之湅以待染人之所染蓋素功不立采色無所附焉此㡆氏所以預設色之工以涗音稅水漚其絲七日去地尺暴步卜反之鄭鍔曰湅絲之法以涗水漚之漚如漚麻之漚蓋浸漬之也以水泲灰謂之涗如涗酌之涗蓋以茅而泲酒故謂之涗酌也用涗水以漚其絲所以去其不蠲以致潔也趙氏曰謂以水和解其灰澄清而洗濯之以浸漬絲也唯潔淨然後能受色既漚七日矣乃取而暴之日中其暴也當去地一尺而已必以去地一尺為度者不欲其髙懼陽氣燥之則其色失於燥而不鮮明也毛氏曰絲以柔為善暴之太過則失其柔而變其性故去地尺暴之欲其地氣之相接晝暴諸日夜宿諸井七日七夜是謂水湅鄭康成曰宿諸井縣井中王昭禹曰晝暴諸日則以陽氣溫之也夜宿諸井則以隂氣寒之也謂水湅則非渥淳之使熟也以隂陽之氣使之熟而已毛氏曰暴雖在晝而夜必宿於井又欲其水氣之相蒸鄭鍔曰必以七日七夜為度者欲其得隂陽之氣一於平而不偏也湅帛以欄音練又蘭為灰渥淳其帛實諸澤器淫之以蜃易氏曰絲弱於帛帛壯於絲湅絲不過涗水而漚之湅帛則以欄為灰煮而熟之以至淫之盝之又至於塗之宿之其法為特詳趙氏曰以欄為灰謂燒欄木以為灰也渥淳以灰煮熟漸漬其帛也淳沃也渥漬之使厚也既曰渥淳不可遽至乾熇故實諸潤澤之器蜃白蛤也以蛤為粉浸淫器中欲令帛白也淫即善防者水淫之之淫陳用之曰既曰渥淳必有水焉非特灰而已故實於澤器欲其不遽以乾熇故也淫謂粉蜃以淫其上則閉其濕於澤器之中而得以漸漬之矣毛氏曰以欄為灰變生而熟以蜃為灰變質而白清其灰而盝之而揮之鄭康成曰清澄也於灰澄而出盝晞之晞而揮去其蜃毛氏曰於器從而振之謂之盝陳用之曰盝以盛之王昭禹曰灰既澄而清則盝而出之而揮去其所染之蜃灰而沃之而盝之而塗之而宿之鄭康成曰更渥淳之王昭禹曰既揮其灰沃之以水又從而盝出之既盝出矣又從而塗之以蜃灰而宿之則使經宿焉毛氏曰自此不復用練亦不須和以水其帛且濕但塗以乾灰而已豈非變生為熟易而變質為白難乎陳用之曰或言實諸澤器不言塗宿或言塗宿而不言灰蜃之用相偹以見也明日沃而盝之毛氏曰塗之矣復以清水沃而盝之者去其所塗之灰也然塗之宿而已明日從而盝之與夫清其灰而盝之異矣此盝之二每事不同因其事也晝暴諸日夜宿諸井七日七夜是謂水涷王昭禹曰又從而暴諸日而溫之以陽氣宿諸井而寒之以隂氣總論鄭鍔曰上文湅絲記水湅之法此文湅帛記灰湅之法夫絲帛事之末者也凡為女工者能之何待設官掌其事耶蓋先王為國以禮之制所辨者在於毫釐之際其於服色之間尤致其謹也如玄以象天黃以象地青以象東方白以象西方赤以象南方黑以象北方如纁之赤黃如緅之赤青如縓之赤黑如朱之象正陽如緇之象正隂如紫如緑之為間色一失其辨則分因而不明一失其色則義從而無所考詩人所謂赤芾玄衮赤舄朱英緑縢之類彼豈區區然辨其色哉義各有所主分各有所明故也色之所係者乃分之所寓則絲帛之所以染乎色者詎可易而為之哉染人云春暴湅然則所謂湅而暴之者皆以春時也染在染人湅在㡆氏二官聨事為不輕矣周禮訂義卷七十五
