body:
  text: 周禮訂義卷八十宋王與之撰弓人為弓取六材必以其時鄭康成曰取幹以冬取角以秋絲漆以夏筋膠未聞賈氏曰取幹以冬者月令仲冬伐木取竹箭注云堅成之極時取角以秋者下云秋殺者厚也絲漆以夏者夏時絲熟夏漆尤良也六材既聚巧者和之易氏曰此與下經為總目即下經所謂材美工巧謂之時是也鄭康成曰聚具也賈氏曰和之謂春液角夏治筋之類王昭禹曰此與輪人所謂斬三材必以其時輿人所謂三材既具巧者和之同意非天時無以備隂陽之和非工巧無以全萬物之用鄭鍔曰輪用三材材為少故言具弓用六材材為多故言聚然貴乎工巧則一也幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也鄭康成曰六材之力相得而足王昭禹曰弓以幹為質以漆為文角附幹以安膠得漆以完筋則施於角之外絲則用於膠之內弓所以及逺者其力在幹故幹以為逺弓所以疾發者其勢在角故角以為疾角幹資筋以為堅刃以射則中深故筋以為深易氏曰幹之堅而栗也其本強矣故所及必逺角之厚而澤也其勢順矣故所發者必疾筋之積而密也其力鋭矣故其所中者必深三者得膠然後相合以為和故膠以為和結而固之在絲故絲以為固飾而堅之在漆故漆以受霜露六材雖取以其時苟其質不美則不足相資以為用故得此六材之全然後可以為良陳用之曰逺言其至之逺疾言其發之疾深言其入之深凡此即其用而為言和言其合之和固言其成之固受霜露言其質之堅凡此指其體而為言陳祥道曰弓以木為身以角為面筋所以為深絲所以為固張則筋外而漆內弛則角外而筋內凡取幹之道七柘為上檍音億次之檿音掩桑次之橘次之木瓜次之荆次之竹為下王昭禹曰弓有六材而以幹為質故取幹有道柘之為木其剛實如石故為上鄭司農曰檍讀為億萬之億爾雅曰杻檍鄭鍔曰即詩所謂北山有杻王昭禹曰寡枝葉而微曲俗謂之牛筋則其堅可知矣又曰檿桑山桑國語曰檿弧箕箙鄭鍔曰檿桑之絲中琴瑟弦禹貢徐州貢之其材之良可知故次之王昭禹曰橘其皮蹙而堅實木瓜稹栗而徑荆類楚可以為利凡此皆木之堅剛者竹雖剛而有節故為下李嘉會曰七者之物堅有等數髙下列之則足見凡相幹欲赤黑而陽聲赤黑則鄉音向心陽聲則逺根趙氏曰上既辨其材之善否取之矣然後相視而用之鄭鍔曰相者察而視之以知其美惡鄭康成曰陽猶清也木之類近根者奴鄭鍔曰鄉者通逹之義王昭禹曰赤者陽之正色黑者隂之正色凡木內得隂陽之正氣則外應隂陽之正色赤黑鄉心以其外之應乎內故也鄭鍔曰凡木叩而擊之聲之清者為陽聲之濁者為隂近根則隂其聲必濁逺根則陽其聲必清枝逺根其材得陽氣而良枝近根其材得隂氣而惡故擊之而聲清揚則知其枝之逺根也毛氏曰木之皮膚常柔故堅者在內欲致其堅不得不取其近心也幹常乾稿故刃在季材欲致其刃不得不取其逺根也何以知其近心耶相其色赤而兼黑則為近心矣何以知其逺根耶聽其聲清揚而瀏亮為逺根矣易氏曰木之根下屬乎地則去陰為未逺及其驕亢而親上則近乎陽陽聲則逺根言根非所以為陽而本乎陽者親上凡析幹射逺者用藝射深者用直王昭禹曰既相之而得其材之美然後可以析之而為弓之幹鄭鍔曰析者分而處之之謂王昭禹曰曲直者木之形審曲靣藝者工之能用藝者取其木之曲用直者取其木之直陳用之曰曲與直無非勢也别直而言藝則勢言其曲也鄭鍔曰木性自曲者仄其勢而用之則冝薄薄則力少惟可以射逺爾不能深入也此夾庾之弓歟木性自直者從其直而用之則冝厚厚則力多惟可以射深爾未必逺也分而處之使材適於用則弓各盡善矣居幹之道葘栗不迆則弓不發陳用之曰居謂其處之有冝下文合材奠體之事是也易氏曰曰取曰相曰析曰居四者不同而取之居之獨謂之道道也者順適乎自然而已然則取之所以善其始居之所以善其終王昭禹曰葘如葘畬之葘謂加功以治之栗如榛栗之栗謂緊密而不縱也不迆謂無邪行絶理也方其以倨析幹入而居其材之中加功以治而且致其緊密行不邪理不絶則弓之發傷無自而起趙氏曰注以葘為攻治以栗為裂裂亦治也重疊不可從亦無文理凡相角秋閷者厚春閷者薄鄭鍔曰此言相角之法王昭禹曰秋萬物揫斂而堅成之時故其角厚春萬物發生而未就之時故其角薄稚牛之角直而澤老牛之角紾音殄而昔音錯鄭司農曰紾讀為抮縳之抮趙氏曰紾謂文理粗昔讀為交錯之錯謂牛角粗理錯也賈氏曰謂理粗錯然不潤澤也鄭鍔曰昔者久故之義其色乾久如古往之物不必改為錯字王昭禹曰稚牛方少而氣血剛則角之文正直而澤潤老牛已疾而氣血衰則其文粗紾而交錯疢疾險中瘠牛之角無澤趙氏曰險傷也中裏也鄭鍔曰角之中險阻而突起者必疢疾之牛也無光潤之氣者必瘦瘠之牛也知此法則凡角皆可以逆而知之角欲青白而豐末鄭康成曰豐大也趙氏曰本要白中要青末要豐青白則色善豐末則質厚此角之好者所以欲之也夫角之本蹙於􅑠乃老反而休音煦於氣是故柔柔故欲其藝也白也者藝之徴也趙氏曰蹙近也本根也休讀作煦謂和也與禮記煦育萬物之意同蓋角有三節曰本曰中曰末本常近􅑠而分和煦潤澤之氣於􅑠故柔而無力所以欲其藝藝言曲也欲其形之自曲反是以為藝也藝則有力矣白者所以為藝之驗也此是説角之藝夫角之中恆當弓之畏音隈畏也者必撓撓故欲其堅也青也者堅之徴也賈氏曰畏從隈為曲隈之義鄭鍔曰角之中曲處用以附幹常當弓之隈曲處則必屈撓以其勢當屈撓故欲其堅實而不弱相其角之中色青則是堅之徴驗也青者陽之色陽為至剛故因青以知其堅趙氏曰此是説角之堅夫角之末逺於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徴也鄭鍔曰角之末則去􅑠為逺􅑠之氣所不能及而不休煦之氣有所不及則必脆而易折此所以貴其柔柔則不折矣相其角末之豐大則是柔之徴驗也蓋氣所及故豐豐則柔矣此角所以貴豐未趙氏曰此是説豐末之意易氏曰勢以白驗之堅以青驗之柔以豐末驗之則可以知三者之用李嘉會曰此論執之徴堅之徴柔之徴委曲明白滋潤則易柔曲中則易撓枯瘁則必脆惟反乎是則徴可察也角長二尺有五寸三色不失理謂之牛戴牛鄭康成曰三色本白中青末豐鄭鍔曰角長二尺有五寸長之極矣既極其長又且本白而中青其末又豐三色俱不失其文理如此之角是謂牛戴牛蓋一角直一牛之價如牛之上又戴一牛也茲其至貴者歟趙氏曰豐末不可以言色而同為三色者豐末雖不指色而言然亦未嘗無其色蓋三色只是三件之意初不為顔色而言也凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉鄭鍔曰此言相膠之法賈氏曰案下鹿膠青白已下惟牛膠火赤自餘非純赤則牛膠為善矣王昭禹曰凡相膠以純赤為上又欲其文之交錯故曰朱色而昔陳用之曰朱色者言其明之自內也昔者言其材之乾久也深瑕而澤者言其表裏皆有文而其色潤澤也陳用之曰深瑕者言其瑕之深瑕雖深而體之恱澤存焉非人為之深也陳用之曰其理紾密而摶鄭康成曰摶圜也廉瑕嚴利也趙氏曰謂之嚴利者言膠有精彩鋒稜森然端嚴之象不軟漫腐敗也如輪人為輪欲其幬之亷注謂以革裹得轂緊則亷隅見於外如人之清亷人皆望風而畏是皆整作氣象不是委靡廢壞氣象正與相膠之廉同意鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃鄭康成曰餌色如餌王昭禹曰膠或用皮或用角或用膘如鹿膠用其角如魚膠用其膘如馬牛犀鼠用其皮凡昵之類不能方鄭鍔曰昵謂黏䐈不解也凡物亦有能黏而不解者然比之於膠則不能及其堅故古人為弓専用膠而不以黏泥之物以固之者蓋以為他物不能比方之也王昭禹曰凡脂膏䐈敗者雖亦可用為黏安能比方六膠之用哉凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸鄭鍔曰筋出於獸獸之剽疾者用其筋以為弓則弓亦剽疾故欲知其獸之剽則相筋不可以無法趙氏曰簡注讀如簡札之簡蓋竹簡一條為一札謂筋條之直相似也鄭鍔曰結謂細聚而不散雖結又欲其色滋潤而澤王昭禹曰凡相筋以條直滋潤為主簡言條直澤言滋潤筋之小者貴乎條直而長筋之大者貴乎稹密而潤筋既如此則其勢可知故度其為獸則其性必剽疾矣以之為弓又豈異於其獸哉陳用之曰剽利疾也獸之利疾本於筋骨之強得其筋以為弓焉則體強而用疾矣豈異於獸乎筋欲敝之敝鄭鍔曰此又言用筋之法敝勞也椎嚼極熟是謂勞敝欲其敝之又敝則可用也王昭禹曰筋生則硬熟則耎以物擊爵之欲其勞敝而熟然後可用故曰敝之敝趙氏曰言熟之又熟也漆欲測陳用之曰測言如水深之可測取其清也鄭鍔曰漆之體厚重而濁用之則以清為貴惟去其檅濁而至於輕清乃善故欲測絲欲沈易氏曰沈言其潤也絲之色惡乎乾而燥故欲其如沈於水中之色取其潤也陳用之曰取其瑩也王昭禹曰取其實也得此六材之全然後可以為良鄭康成曰全無瑕病良善也王昭禹曰幹也角也膠也筋也漆也絲也凡此六材皆全則盡善備矣而無疵以之為弓必調而後可以為良矣凡為弓冬析幹而春液角夏治筋秋合三材寒奠體冰析灂陳用之曰上文既明相幹相角相漆相筋之理矣於是始言為弓之法王昭禹曰材美工巧不得天時則不可以為良故弓有六材而治之各以其時也趙氏曰析謂分析而治之液謂融液而漬如以火養之意治謂理也椎杼嚼齧是也冬為萬物堅成之時幹欲堅固故冬析之春為溫和敷榮之時角欲溫而和柔故春液之筋欲散而敝熟故夏治之夏是萬物解緩散蒸之時也陳用之曰角亦析而治之幹亦漬而治之於幹言析於角言液互見也鄭康成曰三材膠絲漆陳用之曰兩謂之合謂以所析之幹所液之角所治之筋合膠漆絲而為弓焉趙氏曰奠讀為定體六弓往來多少之體注謂內之檠中蓋檠正弓之器筋膠至冬寒則堅牢於此時內之檠中以定體則後來體不妄動也灂漆之灂也既定其體矣又取出而析其漆文以備方來之用蓋弓有漆所以為受霜露析是分析其合如蕡處合厚處薄處合環灂處必於冰析之蓋冰為寒之極漆至寒時則使在弓上亦堅固而不動上注謂析灂了又內於檠中理或然也不言寒而言冰者奠則天寒之時皆可析灂非結冰極寒之時不可也冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流冰析灂則審環趙氏曰自此以下復解上文之效鄭康成曰易理滑致也鄭鍔曰凡木之材至冬則堅凝可治治於冬則節目易去其理滑易矣合讀為洽陳用之曰角得春而和澤於以液之則洽而不脆煩亂也鄭鍔曰筋本攣結不紓冝緩而治之夏者解緩之時於斯而治之則筋勢慢易不煩亂矣合堅密也鄭鍔曰幹角筋治於三時弓猶未成必用膠絲漆然後可合秋者隂氣揫斂之時於是時而用膠絲漆則合固不可解矣故合三材冝用秋流猶移也賈氏曰體既定而後用時雖張不流移謂不失往來之體陳用之曰於寒冰之時而析其灂則於以審環焉審謂察之也環即下文所謂引之如環釋之無失體如環是也析灂則必引之引之以析其漆灂之文於以察其如環與不如環則弓之美惡即可見矣趙氏曰環周圍無關之意春被弦則一年之事王昭禹曰被弦於春候一時之久而後可用陳用之曰自冬析幹至析灂其功畢矣至春被弦而用之凡一年之事以言為之不苟析幹必倫析角無邪易氏曰倫必欲其有倫理也無邪必欲其無邪目也鄭鍔曰析幹冝用乎木之理則幹不迆析角欲順乎角之理則角不偏斫目必荼音舒斫目不荼則及其大修也筋代之受病趙氏曰荼讀作舒謂徐緩也目謂幹之節目鄭鍔曰木之堅者必有節目斫而去之冝紆徐而勿疾則節目必盡苟斫目欲急而不以舒徐則用是幹以為弓至於大修長之後而筋代幹受病矣賈氏曰學記云善問者如攻堅本先其易者而後其節目是斫目必舒之義趙氏曰大甚也修久也筋在幹則與幹為力必須筋幹相得今幹有節目不舒徐斫去用力不得其所則幹不用力筋偏用力筋必為節目所摩代幹而受病矣夫目也者必強強者在內而摩其筋夫筋之所由幨音苫恆由此作鄭鍔曰筋在幹之背所以助幹為強也幹之節目固則強矣苟不徐徐去之其去也不盡以是幹處內則其節目當摩囓乎筋筋不能勝乎木之強則久逺之後筋必絶起如幨筋之所以為幨者其病常起於此耳陳用之曰幨若衣幨然言蔽而不著趙氏曰此數句重釋筋幹不得所之意幹之利病如此則治幹其可遽乎故角三液而幹再液鄭康成曰重醳治之使相稱王昭禹曰液謂以水治之使其液作而耎也角則以火炙而治之欲其和也故三液幹則以火揉而治之欲其堅也故再液李嘉會曰液以火炙之欲其柔軟則以水漬之漬之而再液則木膏盡而堅也厚其帤女居反則木堅薄其帤則需音軟鄭康成曰帤讀如襦有衣絮之絮帤謂弓中裨鄭鍔曰帤所以裨助乎幹以為強故雖至美之幹亦未嘗無裨以助之然裨太厚則幹必失之太堅裨太薄則幹必失之太需需偃弱也趙氏曰需與罷軟同如鮑人脂之則需同是故厚其液而節其帤鄭康成曰厚猶多也節猶適也鄭鍔曰欲得其當者惟厚其液而節其帤矣厚其液則或三或再其數之多也節其帤則不厚不薄其處之得中約之不皆約疏數音朔必侔賈氏曰約謂以絲膠纒之今之弓猶然鄭鍔曰亦不皆約之或疏或密要使平均而相侔等則善矣鄭康成曰皆約則弓帤侔猶均也斫摯必中膠之必均鄭康成曰摯之言致也中猶均也王昭禹曰上下如一之謂中多寡適於勻之謂均陳用之曰於摯言斫則知其為幹豈以手所執者而名之歟摯必中欲其厚薄之適中不可過也施膠於摯其傅必均不可偏也斫摯不中膠之不均則及其大修也角代之受病夫懷膠於內而摩其角夫角之所由挫恆由此作賈氏曰自此下説弓之隈裏施膠之事趙氏曰挫謂折傷也內之不治則病自外發幹懷膠於內也幹有不勻處膠又有厚薄不勻處則幹摩及膠併及角而角之挫傷由此作鄭鍔曰膠在內角在外懷膠於內有厚有薄引弓之時膠常摩齧乎角此所以蹴而折也挫折之端常起於此陳用之曰所謂筋代之受病角代之受病者病本在幹之目及其久也筋實受之筋施其上者病本在幹與膠及其久也角實受之角附於此者本非其病而反受之所以謂之代挫折傷也總論易氏曰已上數節既言其病又言其利使為工者去其病而求其利則材之為用固矣凡居角長者以次需鄭鍔曰居處也處角之法冝長短與弓相冝長者冝在隈短者冝在簫王昭禹曰弓隈謂之需弓梢謂之簫賈氏曰簫謂兩頭也然則長者在隈內可知需者弓之隈也惟曲之處則需矣以角之長者處之以助其力使不甚弱易氏曰上經言角長二尺有五寸謂之牛戴牛則角固貴乎長也然以逹對短則逹為長之過需須也良工以次需而用之不可過於長亦不可過於短趙氏曰次者處於此之意如師左次是也故居角之法必以長者安頓在隈恆古鄧反角而短是謂逆橈引之則縱釋之則不校鄭康成曰恆讀為亙亙竟也賈氏曰竟角而短謂施角充滿兩畔而上下短於隈者也王昭禹曰縱言引其弦而力弗逮也校言舍其弦而勢不急也鄭鍔曰校與絞同謂矢之不疾鄭鍔曰竟其角而用之其角太短也如是謂之逆橈橈者隈當曲之處也以短角處之乃所以反逆橈也惟其逆撓若引其弓則角短而不用力必縱放而不強若釋而放則勢弱而矢不校凡此皆角短之病恆角而逹譬如終紲音泄非弓之利也鄭鍔曰達者通過之義竟其角而用之其角太長若其角長自隈而通過於簫頭則其弓必堅而不可引譬如終紲謂若見繫束於弓䪐之上此則非弓之利言易壞其弓也趙氏曰終猶常也與終古登阤之終同隈角太長則送矢不疾譬如常常見紲於弓䪐矣王昭禹曰角不可失之長亦不可失之短充於兩旁而不及兩端故曰恆角而短不獨充於兩旁而又過於兩端故曰竟角而達竟其角而失之短是謂逆橈言其力不足而反橈也竟其角而失之達故譬如終紲言其送矢不疾若見紲於弓䪐陳用之曰以達對短而言則達為長之過故明短之為病又明長之不利則其有度可知今夫茭解中有變焉故校趙氏曰今夫起義之辭茭謂弓隈與弓簫相接處解謂接之中變謂異也謂簫與臂用力異賈氏曰引之則臂中用力放矢則簫用力既用力異故校校謂矢去疾也於挺臂中有柎焉故剽鄭康成曰挺直也柎側骨剽亦疾也賈氏曰直臂中弓把處有柎者謂角弓於把處兩畔有側骨骨堅強所以與弓為力故剽疾也易氏曰校者疾而速剽者疾而勇知校與剽為弓之利則知居角之短與達者皆所以為弓之害恆角而達引音譬如終紲非弓之利也易氏曰甚言其過長之尤為害也趙氏曰再言恆角而達是重明達角之不利引言引弦而便使來也蓋弓之成體在幹與角膠絲筋漆附之而已所以弓人論幹角甚詳此假説角長短視幹之直其曰長者謂蓋過幹短者謂遮幹不著前言長二尺五寸謂之牛戴牛下又言長其隈蓋長在所貴今以為非利者蓋所取者適中之長所戒者過中之長嬌音矯幹欲孰於火而無贏嬌角欲孰於火而無燂音潛引筋欲盡而無傷其力鬻膠欲孰而水火相得然則居旱亦不動居濕亦不動趙氏曰此假説幹角筋膠得所不得所之事幹角有曲直之勢必以火嬌之使正筋有緩急拳縮之勢必用引之凡所攻治必水火相得不可過不可不及幹以堅為貴熟於火足矣過熟則贏贏謂過熟也角以和為貴熟於火足矣過熟則燂而脆燂謂炙爛也角三液幹再液者以此爾筋欲敝之敝不盡則有生硬處而不軟過則傷其力而不強鬻音煮膠以水浸以火燒水火相得則體熟而質化火氣過則焦水不足則硬水太過則稀為弓能如此四者之材堅固和同久而不壞亢旱與隂濕時皆不傷動鄭鍔曰不過乎火則不至於燥雖亢旱而陽過之時不與燥俱變也不過乎水則不至於柔雖處下濕而隂過之處不與濕俱變也陳用之曰居旱不動謂其不偏於陽故也居濕不動謂其不偏於隂故也毛氏曰旱近陽濕近隂凡風日之類皆旱也凡雨露之潤皆濕也動中變也四者之材治之盡善譬猶五臟六腑充實於內則外邪無所干於其間鄭康成曰不動者謂弓也苟有賤工必因角幹之濕以為之柔善者在外動者在內雖善於外必動於內雖善亦弗可以為良矣鄭康成曰苟愈也濕猶生也陳用之曰藝不能精無可貴者名之賤工鄭鍔曰賤工因角幹之濕以為弓之柔外見其柔和似若甚善然角幹之剛強而易動以此處內安能久乎故雖善於外而必動於內視之雖善不足為良弓也李嘉會曰此皆不待一年求速之故凡為弓方其峻而髙其柎長其畏而薄其敝宛之無已應李嘉會曰前説居角利病此説簫靶厚薄鄭鍔曰峻者弓之末亦謂之簫陳用之曰右手執簫以其在上而髙故名曰峻趙氏曰弓稍頭要叩弦方而不貟則健而有力稍頭尖削而不平闊故謂之峻言其峻削也鄭鍔曰柎者弓之輔以其有側骨故曰柎趙氏曰側骨乃在把處兩邉撑壓貼住上下兩隈把中襯貼處故謂之柎言其柎固而相依也陳用之曰柎弓把也禮記曰左手持柎髙其柎所以壯其力趙氏曰畏尖頭接把處故引弓時畏分外有力即上文挺臂中有柎故剽是也若柎不髙而或卑則接畏處壓不住弓必無力畏弓兩彎處若不長而短則角縱不用力反撓向外去即上文恆角而短是謂逆橈引之則縱釋之則不校也弓彎謂之畏畏言曲處陳用之曰畏即前所謂角之中當弓之畏者是也賈氏曰敝謂人所握持手蔽之處冝薄為之趙氏曰柎與敝人往往不能分别中義見柎是把中敝又是把中不應要髙又要薄遂謂柎弓把也把中總謂之柎敝即上文筋欲敝之敝敝筋而施於弓體厚則起而不相著故要薄不知柎敝雖皆把中然各不同嘗見今之造弓把處稍細把處上下皆堆起稍髙才接著角用以較量敝即把處稍細者柎乃把處兩頭兩側畔稍髙接角畏者敝則置於正面故云薄柎則置於兩側目側視之故不言厚而言髙况注分明説柎把中側骨在兩畔敝人所握持處四者皆是指弓上之名豈可以筋之敝而引為弓之敝鄭鍔曰峻欲方不欲貟柎欲髙不欲下隈欲長不欲短敝欲薄不欲厚四者如法則宛而引之常應手而來無時而止故曰宛之無已應陳用之曰宛言引之而順也鄭康成曰宛謂引之也引之不休止常應弦言不罷需下柎之弓末應將興鄭康成曰末猶簫也興猶動也發也趙氏曰柎正當弓之要惟髙其柎以壯其力故引之而弓稍不能以撓之若柎骨太卑下為之簫方應弦則柎發動由柎力弱撑壓弓隈不住故也為柎而發必動於閷趙氏曰閷謂接中若如上為柎太卑柎既發動則接中亦發動而不固蓋接是敝接畏處柎插在兩傍雖相襯貼作一柄其實是兩木湊合成柎與閷相為表裏柎動則閷亦動理之必然以此見敝自敝柎自柎本不同也弓而羽閷末應將發王昭禹曰鳥所以飛揚者羽有二焉羽閷謂兩接中俱動也兩接中俱應簫應弦則角幹亦隨之而發作趙氏曰此假先言峻柎畏敝至論病處止説柎一節全不及峻畏敝則所重在柎柎當弓之要正是制壓一弓之接處最要強固柎壞則其餘都壞所以特詳言之弓有六材焉維幹強之張如流水趙氏曰此統論弓之成體陳用之曰五材以幹為依幹於五材為本惟幹強之本足以有制王昭禹曰弓以幹為質以角附幹而為安二者之材尤冝謹擇也夫順流而不逆者莫如水周運而無端者莫如環維幹強之則弓之質堅張如流水則弓之體調質堅則無句弊體調則無難易此所以張之則如水之順流也毛氏曰水流而下其勢順疾而自然弓幹體強悍若抗捍而能如此是可貴也蓋使強為弱之意維體防之引之中參鄭康成曰體謂內之於檠中定其體防深淺所止賈氏曰體定於防之後防之者鄭云深淺所止若王弧之弓往體寡來體多弛之乃有五寸張之一尺五寸夾庾之弓往體多來體少弛之一尺五寸張之五寸唐大往來若一弛之一尺張之亦一尺是防之深淺所止也陳用之曰弓有往來之體體有多寡之辨良則曲少敝則句多方其為體必因其材勢而防之防之者深淺有所止以防其壞也引之中參而不壞焉乃適於用中參謂張而引之其中距弦有尺之三焉夫矢以三尺為度引弦而滿之亦不過此不曰三尺而曰中參云者以張之一尺為中制張一尺引三之所以指中而言也鄭鍔曰凡物相參則為參弓不論強弱引之皆以三尺為中中參者三者相參常得中也維角䟫直更反之欲宛而無負弦引之如環釋之無失體如環賈氏曰䟫正也鄭鍔曰䟫如撑柱之撑所以輔而正之也角在弓隈為弓之助所以䟫之也鄭康成曰負弦辟戾也賈氏曰置角於隈中既正欲宛而無負弦者引之弓體不辟戾故也陳用之曰夫䟫之者非他欲宛而無負弦也宛指其體負弦其用引之其體宛如而無負弦之戾六材之中惟角為能正之引之如此其釋亦然鄭鍔曰無負弦言不與弦相反也非惟不與弦相反又且引之則如環環言其勢之圎也非特引之勢圎及其釋而不引之時其體不失常如環然此皆角有以䟫之之力李嘉會曰攀來時如環放去時如環則制善而矢去急材美工巧為之時謂之參均角不勝音聲幹幹不勝筋謂之參均量其力有三均均者三謂之九和鄭康成曰不勝無負也鄭鍔曰幹赤黑而陽聲角青白而豐末膠朱色而昔筋小簡而長大結而澤漆測而絲沉此弓材之美也冬析幹春液角夏治筋秋合三材寒奠體冰析灂此為弓之時也又有巧工以和之此工之巧也是謂參均均平也三者相參皆適乎平也幹任一石角亦任一石筋亦任一石此勝則彼負彼勝則此負三者不能相勝是謂參均毛氏曰好勝者必有所負負則謂之乖戾矣角在幹之內與幹相為用故欲不負幹幹居筋之內與筋相為用故欲不負筋三者無相負則材異而功用同故謂之參均幹任一石加角任二石加膠任三石此論為弓之初弓已成矣初一石之量則弓張一尺二石而二尺三石而三尺則此之謂量其力又參均也有當為又三當為參凡此參均者三合而言之是謂九合言九者皆無過不及也此最弓之盡善也王氏曰多寡輕重等而後可以謂之均剛柔強弱稱而後可以謂之和多寡輕重不均欲其和不可也故均者三謂之九和九和之弓角與幹權筋三侔膠三鋝絲三邸音砥漆三庾音庾上工以有餘下工以不足鄭康成曰權平也侔猶等也鄭鍔曰角必與幹權權言其力之相等也筋用三倍之重其力均與之等故曰筋三侔趙氏曰三鋝言膠與角幹三者相埒也埒齊也三邸王解謂各有所抵是三者力之所至一般言絲膠角幹力致處同也三庾韻謂量也謂量漆與角幹量此三者之力其所受皆均也權侔鋝邸庾皆是均平之意但鋝注謂鍰也如書其罰百鍰與冶氏重三鋝桃氏九鋝七鋝五鋝同鋝是量名其重六兩大半兩或者九和之弓所用角幹膠三者各如此重歟經鋝字從金不應改作相埒之埒今只從注邸恐如皇邸援其邸同是託宿之意謂絲與角幹同附麗于一處猶託宿意其力均平王解作抵不若從此説分明易氏曰九和之弓以角幹筋為主故角與幹權筋三侔即所謂角不勝幹幹不勝筋之意九者和矣而絲膠漆則為之輔膠三鋝絲三邸漆三庾其輕重雖未詳以經意推之亦欲其相稱而已上工工之巧者以是為和弓則有餘言其優為也下工工之拙者以是為和弓則不足言其為之難而費力也此上下之辨鄭鍔曰良工能調使多寡適平而拙工雖足用之物其用之無法每每見其不足也為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規王昭禹曰凡為弓其材剛直則往體寡來體多而句之勢為少其材柔弱則往體多來體寡而句之勢為多天子諸侯之弓必合九合七而成規以其材之剛直而其句為少故所合者衆而後其體圜也大夫士之弓必合五合三而成規以其材之柔弱而其句為多故所合者寡而後其體圜也趙氏曰九者陽數之極體陽用九天子事也故以九張弓合之而後其體圜自此已下隆殺以兩故一減而得七諸侯之弓數以之再減而得五大夫之弓數以之三減而得三士之弓數以之雖各隨其數以成規然其成體也每降而小不比天子九張之體大也蓋弓順挽之無力惟反曲之則有力所以材良則不用曲多趙氏曰以弓人一職考之取材析幹治角筋膠絲漆色色要堅強豈有材柔弱而句多以為用者蓋天子諸侯大夫士所用之弓不可一等須是分則隆殺要之天子諸侯大夫士之弓無有不堅強者特天子之弓其材視諸侯大夫士又較堅強故就天子至士論之則合九合七為強而合五合三為弱其實皆強而合九者又堅強中之尤堅強者愚案餘説見司弓矢弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之趙氏曰弓之等制不一其長短則以三寸為差六尺六寸其長為上上士稱此故使上士服之六尺三寸其長為中六尺其長為下而中士下士稱此故使中士下士服之服言用也蓋人有三等其長不過八尺弓有三等其長不過六尺要與人相稱太長則不便於挽矣所謂上士中士之士只據長者為上次為中短為下乃泛言人之長短皆非命士與桃氏論劒之制同凡為弓各因其君之躬志慮血氣鄭康成曰又隨其人之情性王昭禹曰射之道其中在巧其至在力巧存乎志慮力出乎血氣躬者血氣志慮之所寓焉者也人之躬有長短志慮有緩急血氣有強弱故為弓者必因之也且射者必內志正外體直然後持弓矢審固而可以觀德焉苟不因其志慮則志慮有不和於心內志其能正乎苟不因其血氣則血氣有不調於體外體其能直乎為弓者各因君之躬志慮血氣者凡以此也豐肉而短骨直以立所謂躬有長短也寬緩以荼忿勢以奔所謂志慮有緩急血氣有強弱也豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿執以奔若是者為之安弓安弓為之危矢賈氏曰此以下説君之躬與志慮之所冝毛氏曰荼當為舒緩也執當為摯強也奔當為奔勇也豐肉而短以肉為主骨直以立以骨為主肉有肥瘠豐而短者肥也舉肥以見瘠骨有強弱直以立者強也舉強以見弱賈氏曰危弓則夾臾弱者安弓則王弧之類強者危矢據恆矢安矢據殺矢趙氏曰弓之強弱在工人為之然去之遲速中否却在射之者使其人勇而力將弱弓與之射則不容過逞其力使其人懦而無力將強弓去射不容不作其力而引之此安弓所以濟其人之強危弓所以濟其人之弱然危弓為疾矣不輔以安矢則太疾而過安弓為緩矣不輔以危矢則太緩而不及此危矢安矢又以濟其弓之強弱也鄭康成曰言損贏濟不足其人安其弓安其矢安則莫能以速中去聲且不深其人危其弓危其矢危則莫能以願中鄭司農曰速疾也毛氏曰願者専心致意之謂鄭康成曰願慤也以其矢去速雖専心致意無由而中王昭禹曰上言速則知下之為遲下言願則知上之為暴鄭鍔曰若三者皆安徐則不能以疾速而中雖中亦不深若三者皆峻急則不能以慤願而中猶言不能慤然必中賈氏曰危弓危矢謂夾臾恆矢之等皆射逺兼人且危躁故矢行長過去也往體多來體寡謂之夾臾之屬利射侯與弋易氏曰體謂六弓往來之體鄭鍔曰為弓之法於凝寒則納於檠中而定其體陳用之曰往來云者據張弛而言之也弛之則弓體往張之則弓體來王弓弧弓往體寡來體多亐之強者也夾弓庾弓往體多來體寡弓之弱者也唐弓大弓往體來體若一強弱之中也趙氏曰夾庾何為而利射侯與弋也蓋經曰射逺者用藝藝謂曲也若幹材弱者其木性自曲當隨曲勢向外反其曲為弓方得有力夾庾往體多來體寡是曲向外多者反而引之蓋發必逺侯謂道此是大夫合五成規之弓大夫侯道五十步相去頗逺弋謂鳥獸亦是相去逺者故夾庾利於此射也然疏云夾庾反張隨曲藝向外材薄力弱射逺不能深故射近侯用之司弓矢注亦云犴侯五十步及鳥獸皆近射也近射用弱弓却以夾庾為利於近射與此射用藝之説相戾意者射逺用藝姑指射逺之弓冝用曲木而夾庾正利射侯與弋亦不可謂之太逺歟蓋五十步必不及天子諸侯九十七十步之逺也往體寡來體多謂之王弓之屬利射革與質趙氏曰王弓何為而利射革與椹也蓋經曰射深者用直是王弧之屬王弧是天子之弓合九而成規者此弓材堅往體寡來體多其形直而不曲比唐大之曲為直者其弓健而有力於射堅最冝革謂干盾猶今之牌亦以革裹司弓矢注云革甲也春秋傳曰蹲甲而射之質正也用椹以為射正射甲與椹試弓習武也此注云椹木椹天子射侯亦用此弓據此則革者通甲盾皆可但作甲説分明椹是木趺質是射正蓋古者習射要所以入有力故以革甲椹質堅硬之物使之射椹質是天子將祭先習射於澤宫以選士先射於澤然後射於宫在澤射時立椹木以為射之正如賔射正相似以習射習了射於宫則不用椹質為習射之用所以司弓矢云澤共射椹質之弓矢圉人亦云射則充椹質此物堅強非強弓不能入故王弓利於此射往體來體若一謂之唐弓之屬利射深趙氏曰唐弓利射深者蓋唐弓往來體若一亦是直而有力者第比王弧又較曲些少大弓亦然此是諸侯合七成規之弓所以射深為利也然司弓矢言學射者使者勞者此不言舉一以該其餘亦互見也鄭鍔曰射深者未必能逺逺者未必中而深入各有所長故曰利陳用之曰司弓矢以頒之為主故各言所授之人弓人以為之為主故各言其用之利王昭禹曰司弓矢則辨其弓之物故王弧之屬以名言之弓人為弓則辨其弓之質故往來之屬以體言之陳用之曰以上文及司弓矢論天子至士六弓考之則弓之等有四蓋此六物為三等之外又有敝弓焉曲而句者則為敝矣故曰句者謂之敝弓其合三而成規者是歟所以知敝弓為合三而成規者以下文有句弓侯弓深弓之别深弓所謂利射深者侯弓所謂利射侯者降此而言句弓其在三等之外矣然自天子至士分四等而言之則士之弓為敝要之經所論者通諸侯之事而言之耳若天子之士亦用合五成規之弓焉以經言夾弓庾弓以授射犴侯者而士射犴侯故也大和無灂其次筋角皆有灂而深其次角有灂而疏其次角無灂賈氏曰大和謂九和之弓以六材俱善尤良故無漆灂筋在背角在隈皆有灂但深在其中央兩邉無也有灂而疏者以上參之此謂兩邉亦有但疏之不皆有也角無灂謂隈裏無灂簫頭及背有之鄭鍔曰灂者漆之文理也大和之弓六材至善不見其文理其次於背上之筋隈中之角有之雖有而文理深不甚著也其次皆有文理但疏而逺又有次者於角不見文理耳他皆有也陳用之曰以文意推之當言大和無灂其次角無灂其次有灂而疏其次筋角皆有灂而深恐先儒傳之失敘合灂若背手文角環灂牛筋蕡灂麋筋斥蠖灂趙氏曰弓表裏漆灂相合處邉也若背手之文如人兩手相合處兩手背上文理相應蓋弓表裏相合處易得析裂須當子細用工漆如手背文細密方得不可踈鹵也賈氏曰角環灂謂隈裏灂文如環然鄭鍔曰角之文理必如環然趙氏曰自環之圜而無不固牛筋麋筋此説弓背之灂蕡謂枲實疏謂牡麻是也與籩人其實豐蕡之蕡同尺蠖屈蟲如易云尺蠖之屈以求信是也若弓背上用牛筋則漆灂文理當如麻子之文鄭鍔曰如蕡麻之實點點可觀若弓背上用麋筋則漆灂文理當如尺蠖之文鄭鍔曰如尺蠖之形小而曲蓋麋筋不及牛筋之堅蕡文不及尺蠖文之細密也和弓􅌛摩鄭康成曰和猶調也􅌛拂也陳用之曰􅌛之以試其材美摩之則有所拂除將用弓必先調之拂之摩之鄭鍔曰將射必調其弓調弓之法􅌛拂而撫摩之則弓自和柔矣大射禮曰小射正授弓矢大射正以袂順左右隈上再下一賈氏曰謂以左手橫執之時上隈向右下隈向左而上再下一拂去塵乃授與君覆之而角至謂之句音鉤弓賈氏曰此以下論弓六材角幹筋用力多故特言之易氏曰弓以角幹筋為主三者皆善則為弓之上二善為次一善者為下鄭康成曰覆猶察也謂用射而察之王氏曰至盡善也鄭鍔曰若反覆觀之六材之中唯角為至善其他五材不善此句弊之弓鄭康成曰句於三體材敝惡不用之弓覆之而幹至謂之侯弓鄭鍔曰反覆觀之角善矣而幹又善焉易氏曰特筋未善故謂之侯弓鄭鍔曰侯弓利射逺者上經所謂夾庾利射侯與弋是也覆之而筋至謂之深弓鄭鍔曰反覆觀之角幹已善而筋又善此深弓利射深者不言王弧王弧則六材俱善故也王氏曰句弓言其體之曲不若侯弓之能逺侯弓言其材之逺不若深弓之為善故其序如此王昭禹曰弓有六材獨言角幹筋者蓋六材以角幹筋為主而膠絲漆則為之輔而已然則角幹筋於弓之材為急膠絲漆於弓之材為緩為弓者冝致詳於材之急而材之緩者斯從之古人所以冬析幹春液角夏治筋至於合三材則一於秋者亦以此也周禮訂義卷八十
