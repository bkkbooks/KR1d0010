body:
  text: 周禮訂義卷六十六宋王與之撰冥氏下士二人徒八人鄭鍔曰揚子曰擿埴索塗冥行而已又曰冥行翳路皆謂闇而無所見也故日入之後謂之晦冥冥氏設弧張為阱擭以攻猛獸欲其不知而陷入其中故有取於晦冥無所見之義薛平仲曰自脩閭氏而上逹於布憲之官凡十有一皆先王所以盡乎人也自冥氏以下至於庭氏之官凡十有二人又先王所以盡乎物夫大而人之為民害者既革微而物之為民害者已消則先王之用刑通乎天地之心矣掌設弧張鄭康成曰弧張罿罦之屬所以扄絹禽獸賈氏曰弧弓也謂張弓以取猛獸云罿罦之屬者詩云雉罹于罿雉罹于罦並是取禽獸之物劉執中曰弧張謂機弩也為阱擭以攻猛獸以靈鼓敺之鄭鍔曰既設弧張又為阱擭蓋獸之猛者非弧張所能取故為阱擭以攻之言攻則知其用力之難如攻戰之攻也李嘉會曰止曰攻之不使獲之必獲恐猛虎傷人也既為阱擭乃以靈鼓敺之使來鄭康成曰敺之使驚趨阱擭靈鼓者社祭之鼓也意者猛獸之為物藏於山蟄乎穴神實司之故用鼓社祭之鼓兾其神靈有以敺之而至若得其獸則獻其皮革齒須備鄭鍔曰若得其獸則皮也齒也須也皆備獻焉不可闕一將以供國家器用之資鄭以備為爪未之前聞李嘉會曰得之則獻不欲遺留以起人爭庶章預反氏下士一人徒四人鄭鍔曰或謂庶與蛀同字乃作庶何耶嘗聞南方之人養蠱毒之家合衆蠱之有毒者共為一處使自相啗食已盡其一存者乃為蠱毒然則蠱者合衆庶之蠱以為之也然則毒能殺人殺人有漸隂食其肉久然後死如蛀物之蠱然能蛀壞物也故其音則與蛀同或謂人所以不繁庶者蠱為之害也故名官曰庶氏豈其然乎鄭康成曰庶讀如藥煑之煑驅除毒蠱之言劉執中曰毒蠱之病人非一種而下士一人者掌其方書治禁之法掌除毒蠱以攻說禬音潰之嘉艸音草攻之鄭鍔曰左氏曰於文皿蟲為蠱穀之飛亦為蠱皆謂其腐壞也蠱能腐壞人之心腹其除之之法謂其有神也則以攻說禬之劉執中曰用巫醫以呪禁止也所以責其神謂其有毒也則以嘉艸攻之鄭康成曰攻之謂燻之所以勝其毒六祈之有攻說皆以辭責神也此曰攻曰說又曰禬非六祈之所謂禬當如注家讀如潰癰之潰謂以辭責之使其毒潰散也嘉草藥名可以攻蠱惜夫後世不知為何物李嘉㑹曰毒蠱以嘉草藥物燻去之足矣必曰攻說攻者若韓文公之云鱷魚則可見矣王昭禹曰用祝則治於未然之前用藥則治於已然之後凡敺蠱則令之比之王昭禹曰其徒有四人則令使為之校以比之皆其徒也鄭鍔曰蠱非人之所能敺也令者謂使人之能敺者敺之劉執中曰凡能敺蠱者隨其方土所宜各有能者人有病者則令呼之已則校比其事於以知其果能去否也黄氏曰令之以國法令之比之使其鄰伍相覺察穴氏下士一人徒四人王昭禹曰冥氏攻猛獸之趨走而害人者至於藏伏而害人者未去非仁政之周故掌攻蟄獸者謂之穴氏黄氏曰冥氏伺出穴氏攻蟄皆為其能害物也與獸人供膳獸不同掌攻蟄獸各以其物火之鄭康成曰蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴外以誘出之乃可得之王氏曰其攻之也以其所嗜誘之以火燠而出之鄭鍔曰魚龍有淵鳥獸有山林窟穴是其所藏之地先王欲其不敢逼人驅而遠之可也乃特設一官攻而取之火其所嗜之物誘之使出毋乃暴乎蓋除害者不待其害已及人然後除也惡其為一旦之害必先索而除之可也蟄於穴之獸如熊與羆之屬或時出而害人不可使之藏於窟穴以俟人之隙則設穴氏以攻蟄獸未為過矣以時獻其珍異皮革鄭鍔曰若其獸之身可以備珍異之羞如熊掌之類則必獻以為膳羞其皮與革可以為器用之須則亦獻之以為國家之用然獻必以時則不常攻之矣翨音翅氏下士二人徒八人鄭司農曰翨讀為翅翼之翅王昭禹曰鳥所以飛者在翨攻猛鳥者必攻其翨然後可獲故名官謂之翨氏掌攻猛鳥各以其物為媒而掎居綺反之鄭鍔曰鳥有鷙者而已安得有猛先儒謂鷹隼之屬然鷹隼雖猛不過搏擊飛禽之小者彼當立秋始擊或鳩化而為之或立於髙墉之上先視其始擊之時以正時令又畫於旌旗之上以為軍號何嘗欲其無遺類耶今乃設一官專以攻之為職又用物為媒以致之則非鷹隼而已必其性之鷙害而甚猛能為人之害者矣故曰掌攻猛鳥知其猛與猛獸之猛同其攻之法以其類為媒以誘之劉執中曰各以其物則隨其性之所宜非一物也或以鳩鴿之雛或以匹類但可媒獲其法多矣以時獻其羽翮鄭鍔曰若其羽翮可為器用者亦以時獻焉不常貢也李嘉㑹曰羽翮可以為箭羽者總論王昭禹曰獸人皮毛筋角入於玊府以足王之燕私玩好之欲而冥氏穴氏翨氏攻鳥獸之猛而其所獻皆不入於玉府者蓋此特除其害而已獸人則所脩之利衆所除之害悉仁施及人於是為大以其所施者大然後可以兼百姓之奉柞側百反氏下士八人徒二十人鄭康成曰柞除木之名除木者必先刋剥之賈氏曰知柞是除木之名者詩云載芟載柞芟是除草柞是除木陳及之曰柞氏攻木薙氏攻草皆主苑囿之官若畿内之山林自有虞衡等官提其大要而已掌攻草木及林麓鄭鍔曰攻如攻城之攻草木林麓根固蟠結不可削除則用力為尤多故曰攻賈氏曰柞氏攻木兼云草者以攻木之處有草兼攻之易氏曰木生於山而曰及林麓者林則積木者麓則山之足也鄭鍔曰先王於草木設虞衡之官以作之固欲其條暢碩大以備掄材之用於此又設柞氏以攻之者嘗考皇矣之詩作之屏之其菑其翳脩之平之其灌其栵啟之辟之其檉其椐攘之剔之其檿其柘則雖至美之材亦刋而除之以為居民之地柞氏所攻殆是類歟王昭禹曰草木所生林麓之地苟可以宅民稼穡者大司徒固嘗辨十有二土以相民宅矣辨十有二壤以知其種矣柞氏因司徒之所辨者以攻治之而已夏日至令刋苦干反陽木而火之冬日至令剥隂木而水之鄭鍔曰攻之之法夏至日則刋陽木而令燔燎以火冬至日則剥隂木而令浸漬以水木之生於山南者為陽木夏日至則陽氣之極又況火之炎陽乎於是時則刋陽木而火之彼將不勝乎陽而死矣生於山北者為隂木冬日至則隂之極又況水之凝隂乎於是時則剥隂木而水之彼将不勝乎隂而死矣蓋隂陽相濟則沖氣以為和此物之所以生隂陽偏勝則乖沴而為疾此物之所以死陽木言刋隂木言剥先儒以為互言余以為刋除也與隨山刋木之刋同陽木堅而難除故以刋言之剥剥也與易柔變剛之剥同陰木柔而易去故以剥言之刋剥者除草木而空其地或居民或作室未必欲為耕種之地劉執中曰山南之木曰陽木者以其稟而生者隂氣之不足也山北之木曰隂木者以其禀而生者陽氣之不足也陽不足者水之則多沉隂不足者火之則多浮聖人以火養其沉者可使之浮焉以水養其浮者可使之沉焉天官所謂百工飭化八材者抑其有餘以補其不足以輔相天地而成其化者也故輪人之職曰凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸陽則轂雖弊不􅀢其柞氏之所職乎故攻草木及林麓者選材以資木工也夏至日隂生也則刋其陽木之隂以去其氣之不足者既伐然後以火養其所刋可以齊諸陽也冬至日陽生也則剥其隂木之陽以去其氣之不足者既斬然後以水養其所剥可使齊諸隂也陳及之曰所謂仲冬斬陽木仲夏斬隂木頒其格令於民間使民知禁斧斤以時入山林則材木不可勝用也大要如是而已若曰設虞衡以養蕃設柞氏以刋剥之則其細已甚且不勝其勞矣若欲其化也則春秋變其水火鄭康成曰化猶生也鄭鍔曰若欲用為耕地而冀其能化生嘉穀則於春秋之時變其冬夏所用之水火夏用火矣春則水之冬用水矣秋則火之前日所用水火一切反易而變更之則水火相濟而其土和美自能化生嘉穀也王氏曰其蘖薄於隂陽相沴之氣化而為土矣凡攻木者掌其政令鄭康成曰除木有時鄭鍔曰木或當刋或當剥或宜水或宜火與夫春秋冬夏之時各有政令也薙他計反氏下士二人徒二十人鄭康成曰薙讀如鬀小兒頭之鬀鄭鍔曰考月令於季夏之月燒薙行水利以殺草則除草謂之薙也然非所當生之地而生非其有用之物而有大則害百稼小則穢塗徑安得不殺之乎故名官曰薙專以薙而殺之為職掌殺草王昭禹曰凡物以陽生以隂死唯草之為物其茇則隂不能死薙草者必有以殺之然後其茇不復生易氏曰傳所謂農夫之務去草芟夷而藴崇之此殺草之法春始生而萌之夏日至而夷之秋繩音孕而芟之冬日至而耜之鄭鍔曰殺草之法其去必有漸春始生之初則薙其萌萌而去之根尚在也未能不生夏日至則陽極而熱於時則薙而夷之夷傷也蓋因盛陽之炎陽以鈎鎌廹地傷之也然夷則但傷之而已未死也傷而未死者猶或能繩繩與孕同謂含實也於其含實而繩育之時則芟刈而藴崇之及冬日已至隂極而凍於時則以耜而剗之賈氏曰耜廣五寸謂耒頭金剗覆其根凍死於冬則來春不能萌然則一年之事也或謂草可蹂踐而死薙用一年何耶殊不知除惡務本本根難盡去之有漸賈氏曰薙氏所掌治地從春至冬亦一年之事後年乃可種若欲其化也則以水火變之王昭禹曰欲其化而為土則以火燒其所芟夷之本末又從而加之以水則其薄於隂陽相沴之氣而草化為土矣月令所謂燒薙行水也黃氏曰鳥獸昆蟲草木之害人者皆務去之此與制刑之意一也先王無一物而不愛斧斤以時入山林愛心之所加也草自始生而萌之又夷之繩而芟之又耜之既又以水火變之蓋消化之也鄭言土化美非也設官之意與稻人不同掌凡殺草之政令鄭鍔曰殺草政令謂春夏秋冬萌夷芟耜自有先後之序薙氏則掌之觀談苑記江南主患清暑閣前草生徐鍇令以桂屑布磚縫中宿草盡死則殺之之法不必一年矣硩他歴反蔟倉獨反氏下士一人徒二人王昭禹曰人情莫不欲吉而惡凶先王與民同吉凶之患凡凶者皆在所去故設官掌覆夭鳥之巢而謂之硩蔟氏硩言摘也蔟言巢也摘其巢而去之則夭鳥不復至矣鄭鍔曰硩與徹同蔟者鳥之為巢蔟衆木以為之掌覆夭鳥之巢鄭康成曰覆猶毁也鄭鍔曰王政仁及飛鳥不毁卵不覆巢今乃設官以硩去之何耶此乃覆夭鳥之巢先儒謂惡鳴之鳥若鴞鵩之類且鳥之惡鳴者固人之所惡何必專設一官以去之觀韓退之之詩言有鳥夜飛名曰訓狐然則設官而去之者殆此類歟唐子西云吾少時讀硩蔟氏庭氏未嘗不竊笑以為不急之務後讀聖惠方言有鳥夜飛謂之無辜小兒衣服遭之輙成疾因以無辜名之狀如五疳是以知夭鳥之害有如此者非獨如康成所謂鴞鵩之類除去使國中潔清而已驅出四海之外而不得以為害周公之所建置不可謂不切於事以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣音𤣥其巢上則去之鄭康成曰方版也鄭鍔曰硩蔟雖掌覆巢有不待覆巢而去之之法以方版書十日十二辰十二月十二歲二十八星之號縣其巢上彼見其號将自去焉鄭康成以為夭鳥見此五者而去其詳未聞余嘗考之鵲忌庚燕避戊己蝠逢申日則過街鵲作巢則避太歲類從亦曰燕識戊己不銜泥狐潛上伏不越渡阡陌又曰狐狼知虛實虎豹知衝破然則鳥知避此五者亦或有之蓋夭鳥者物之妖也五者之號天地之正也正之去妖理之必然也寅月為陬卯月為如辰月為寎巳月為余午月為臯未月為且申月為相酉月為壯戌月為𤣥亥月為陽子月為辜丑月為涂此十二月之號也歲在寅曰攝提格卯曰單閼辰曰執徐已曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰閹茂亥曰大淵獻子曰困敦丑曰赤奮若此十二歲之號也自甲至癸十日之號也自子至亥十二辰之號也自角亢至翼軫二十八星之號也王氏曰日辰月歲星之神凡有氣形者制焉故書其號焉可以勝天翦氏下士一人徒二人鄭康成曰翦斷滅之言主除蟲蠧者詩云實始翦商鄭鍔曰除蠧之法與庶氏除蠱事同而義異蠱則合庶毒以為之官曰庶氏本其致毒之由以詔後世也蠧比蠱為害甚輕名官曰翦教人以翦而去之之法也掌除蠧物鄭康成曰蠧物穿食人器物者蠧魚亦是也鄭鍔曰書内有白魚及白蠧食書之類然考之傳有曰木将病蠧生之則蠧亦為木之害也以攻禜攻之以莽草熏之鄭康成曰攻禜祈名莽草藥物殺蟲者以熏之則死鄭鍔曰莽草藥名也謂其有神則以攻禜而攻之謂其有毒則以莽草而熏之劉執中曰翦者飛蝗之翦斷禾穗者也蠧者螟蟲之蠧禾根者也蠱者蟊蟲之食苗心者也凡庶蠱者蝝蝻螣賊之害稼者皆是也故以攻禜之法祭而攻除之又焚莽草熏燒之除苖害也凡庶蠱之事鄭鍔曰又言凡庶蠱之事者庶氏自掌除蠱然蠱為難除除之不得或亦用翦氏之法賈氏曰翦氏主除蠧物其蠱毒自是庶氏今此云凡庶蠱者同類相兼左右掌之赤叐音跋氏下士一人徒二人鄭鍔曰蟲豸藏埋於牆屋之隈除去為難當用物以捇拔而去之故名曰赤叐掌除牆屋劉執中曰牆屋隙罅之間有蟲有豸皆螫人而毒入四爻至於迷悶痛絶不可救者蠖螋蝎䘍蜘蟵蜈蚣之類皆是也鄭鍔曰文王仁及昆蟲伏藏埋蟄於牆屋之下乃設官搜求以除之何耶此殆為王居也至尊所處固當致嚴牆屋之下人跡罕至苟有能致害之物藏焉不可不去也以蜃炭攻之以灰洒色買反毒之鄭康成曰蜃大蛤也擣其炭以坋之則走王昭禹曰以蜃炭攻之則以火之毒氣暴之使出也洒灑也沃灰以洒之則死劉執中曰古者以蜃炭攻之又以灰汁沃之今之為方非獨此也而用蜃炭塗暨牆壁亦赤叐之遺法歟凡隙屋除其貍莫皆反蟲鄭鍔曰隙屋則離宫别館希御幸之地無所不除之矣賈氏曰埋藏之蟲在屋孔穴之中故以隙屋言之鄭康成曰貍蟲䗪肌蛷之屬王氏曰貍蟲亦有害人者故除之蟈音馘氏下士一人徒二人鄭司農曰蟈讀為蜮蜮蝦蟇也月令云螻蟈鳴掌去鼃音蛙黽莫幸反鄭康成曰齊魯之間謂鼃為蟈黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之鄭鍔曰天下之螻蟈為不少矣疑此所去者亦為王宫耳蟈之字從虫從國非特野有之雖國中亦有之故晉惠帝聞其鳴詢左右以為公為私則宫禁之中未嘗無也鼃黽二者尤能怒鳴王庭肅清固所不容况有齊戒之時凡物之可以昏瞶王之志意者皆去之豈容此物聒聒乎其側耶焚牡蘜音菊以灰洒之則死以其煙被之則凡水蟲無聲鄭鍔曰牡蘜謂菊之不華者能治鼃黽蓋物有相制者不可以理詰也焚牡蘜為灰以洒之順風勢被之以煙為灰所毒者則死不為灰所毒者得煙亦無聲焉杜氏曰假令風從東方來則於水東面為煙令煙西行被之水上壺涿音卓氏下士一人徒二人鄭康成曰壺謂瓦鼓涿擊之也王昭禹曰擊瓦鼓以敺水蟲故名官謂之壺涿氏掌除水蟲鄭康成曰水蟲狐蜮之屬鄭鍔曰水蟲之能為人害者如春秋書有蜮之類謂於水中含沙射人影為災故也以炮歩交反土之鼓敺之以焚石投之鄭康成曰炮土之鼓瓦鼓也鄭鍔曰壺涿氏敺之以炮土之鼓為瓦鼓以火炮之其狀如壺可以涿擊水蟲以濁其水舊書以涿為濁王昭禹曰以土能勝水而制之也敺之不去又以焚石使熱投於水中如以熱湯以火制水也鄭康成曰焚石投之使驚去王昭禹曰攻之以火氣使感隂陽相沴之氣而死劉執中曰攻之以火氣應之以陽聲則隂邪之蟲去矣若欲殺其神則以牡橭音枯午貫象齒而沈之則其神死淵為陵鄭康成曰神謂水神龍罔象鄭鍔曰若為害之蟲敺之不去意有神者主之欲殺其神使之死欲塞其淵使其蟲無所藏必有牡橭午貫象齒而沉之橭木名所謂山榆也象齒象之牙也取山榆之牡者十字交午貫穿象牙賈氏曰以橭為幹穿孔以象牙從横貫之為十字以沈乎水中則可以殺水蟲之神且使水涸而淵塞化為丘陵物有能相制相治者固不可以理詰也劉執中曰若有神物在淵時有變見驚震於民者則以象牙午貫榆木沉之則其神死而其淵陵矣謂如蛟蜃龍龜之屬穴為居者非水注成淵古之聖人達萬物之理得其材用以為除害之術除蠧物則用莽草除貍蟲則用蜃炭除鼃黽則用牡蘜除水蟲則用牡橭天地間物皆為天地間用然非明哲有所不知王昭禹曰凡此之類皆聖人所以變化驅除之術非深窮物理之所以相治相克者孰能與此且夫琥珀拾芥磁石引針戎鹽累卵獺膽分盃壞漆以蟹浣錦以魚散血以藕皮毁金以羊角皆出于自然之理先王命官如此豈非知變化之道知神之所為乎庭氏下士一人徒二人鄭鍔曰鄭以庭氏主射夭鳥令國中潔清如庭疑其不然古有大庭氏其所行之事久逺無傳竊疑用致日月之弓矢以射夭鳥自大庭氏始也攷賜老者以杖之官名曰伊耆氏則取古天子之號以為名不為無證總論易氏曰上經四官言四物之害則有形可求也故以力勝之此六官言六物之害則無形可求也故以智勝之夫六物至微各設一官以去其害類不憚煩者蓋萬乗所至或在苑囿或齊宿於郊廟之内或臨御於朝廷之上一物不去則護衛至尊為有闕所以專設六職以除妖怪微伏之物今觀翦氏以莽草熏器用之蠧赤犮氏以蜃炭而灑牆屋之毒蟈氏以牡蘜之灰與其煙以去鼃黽之聒固可信也若夫壺涿氏以炮土焚石而除水蟲又以牡橭午貫象齒以殺其神硩蔟氏書歲月日辰之號以覆夭鳥之巢庭氏又以大隂救日月之弓與救日月之枉矢以射其神聖人精察乎萬物之理必能通乎變化之道後世巫家猶有禳厭之術醫家猶有攻治之法獨可以是而疑周官乎王氏曰詳觀周禮所載道路溝澮一草木一鳥獸一昆蟲小小利害或興或除而地官秋官之職分矣凡所興利以地官主之凡所除害以秋官主之掌射食亦反國中之夭鳥王昭禹曰夭鳥謂呼鳴而為怪者先王因人情之所惡故在國中者皆庭氏射之賈氏曰城郭人聚之處不宜有夭鳥故去之鄭鍔曰言國中之夭鳥則是夭鳥也舊所無有偶自逺而至此也如鸜鵒來巢魯舊無今有之故春秋書其異若不見其鳥獸則以救日之弓與救月之矢夜射之鄭康成曰不見鳥獸謂夜來鳴呼為怪者獸狐狼之屬劉執中曰鳥獸為夭者夜中聞其聲而不見其形被其害而不見其迹者也救日之弓者乗日食時所造陽乗於隂之器也救月之矢月食時所造隂勝陽所成也以隂陽至盛之氣攻暗昧不明之夭罔不克矣鄭鍔曰夜射之弓矢曾用以救日月或足以制太隂而勝之或足以制太陽而勝之則其神異所憑豈不足以威不正之妖物歟若神也則以太隂之弓與枉矢射之鄭康成曰神謂非鳥獸之聲若或呌于宋太廟譆譆詘詘者鄭鍔曰此言太隂枉矢則非救日月之弓矢也太隂之弓謂其弓純屬乎隂司弓矢言枉矢利火射說者謂象天枉矢之星則枉矢者純屬乎陽可知若夫先儒謂太隂之弓用恒矢太陽之弓用枉矢豈其隂陽之正足以威服百神歟王昭禹曰以此射之亦以日月之精氣勝其夭也昔歐陽脩作鬼車詩中謂昔者周公夜呼庭氏率屬彎弧逐出九州之外射之三發不中天遣天狗投空囓之落其一頭清血常流以晝藏夜伏隂黒則飛見火光則驚墮血點汚人家其家必破由此言之不設官以射之為害豈小哉王氏曰鳥獸言夜射則神以晝射總論陳及之曰古之王者鍾鼓管絃以養其内威儀文物以養其外其禮樂未嘗斯須去身出則有虎賁氏夾道而趨居則有士庶子之掌守其居止行幸未嘗一日忘武備自書生論之以為無他事矣先王猶謂猛獸之隐伏毒蠱之竊發貍蟲之潛隐水蟲之巧伺皆足以害人身夭鳥之聲鼃黽之音亦足以亂人心一物不去於治身養心為有缺則是九官者非得已而不已也豕突乗輿熊當御坐雖當時簡忽所致亦王制有不足耳所謂方書十日十二辰十有二月十有二歲二十有八星之號以去夭鳥攻禜以攻蠧物蜃炭以攻貍蟲牡蘜以去鼃黽炮土之鼓以去水蟲救月之矢以射夭鳥皆明於庶物精義入神所能也銜枚氏下士二人徒八人鄭康成曰銜枚止言語嚻讙也枚狀如箸横銜之為之繣結於項掌司嚻鄭康成曰察囂讙者為其聒亂在朝者之言語國之大祭祀令禁無嚻鄭康成曰令令主祭祀者王昭禹曰祭祀貴靜而肅大祭祀尤致嚴焉故令禁嚻孔子於宗廟朝廷便便言唯謹爾亦所以戒嚻也楚茨言君婦莫莫以言承祭祀者靜而不譁軍旅田役令銜枚鄭康成曰為其言語以相誤王昭禹曰軍旅田役大衆所聚惡譁而善靜故令銜枚大祭祀止於令禁無嚻者承祭祀者不若軍旅田役之衆禁􅑧音呌呼歎嗚於國中者行歌哭於國中之道者劉執中曰聲微而衆曰􅑧聲大而急曰嚻聲髙而緩曰呼聲怨而嗟曰歎聲悲而傷曰嗚聲過於樂曰歌聲過於哀曰哭王昭禹曰人之樂不能不歌人之哀不能無哭聖人曷嘗抑之使無歌哭哉於所居可也行而歌哭於國中之道為其感動人心故禁之鄭鍔曰亦禁其為妖異之聲以惑衆耳伊耆氏下士一人徒二人鄭鍔曰先王篤養老之禮為其氣體已衰年德彌尊設為賜杖之制以優之自七十者杖於國至八十者杖於朝取伊耆息老之義以名官且取耆艾之義陸氏曰禮記曰伊耆氏始為蜡為伊耆氏掌共王之齒杖以耆待杖然後安猶老物待蜡然後息也伊耆氏有功於耆老者也故後世以其官為姓周又以其姓名官先儒為其制鼓籥又始為蜡於是以為古王者號然𨽻首造數容成造厯蒼頡造書之類豈為古王者哉伊耆氏實古王者之號周不宜列於銜枚氏之後而以下士之宫名之黄氏曰刑官終於伊耆氏杖所以扶老者安之也道德之威中外肅穆而人各得長老慈㓜所謂堯舜行徳而民仁夀也掌國之大祭祀共其杖咸鄭康成曰咸讀為函王昭禹曰咸盛杖之器鄭鍔曰杖之有咸猶節之有英簜爾老臣雖杖於朝至於祭祀之時以敬為主雖老而不敢杖伊耆氏共其函以盛之既事乃授之所以尊神也軍旅授有爵者杖黃氏曰有爵者皆有統率在軍見王見帥冝當執杖今三衙兵官常朝亦執杖也鄭鍔曰軍中以斧鉞為威将帥所執爾若有爵者在其中既非杖鉞之将又匪将校之列宜有以表異之故授以杖見其爵位之尊劉執中曰尊其爵以御衆不必老焉然古之杖皆授於君而有等制不可以私作矣共王之齒杖鄭鍔曰國老年齒已髙在禮冝杖是之為齒杖以齒論之雖可以杖必出於王之所賜然後杖伊耆氏之職則共之於王而王用以賜也周家之杖有五十六十七十八十在鄉在家在國在朝之異此所共者其在朝在國者乎漢之哀帝賜孔光以靈夀杖其有周舊典歟王昭禹曰軍旅授有爵者杖貴貴也共王之齒杖老老也周禮訂義卷六十六
