body:
  text: 周禮訂義卷三十八宋王與之撰春官宗伯下大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人鄭康成曰大司樂樂官之長王氏詳說曰周禮雖出於武帝之世大司樂一章已傳於孝文之時孝文時得魏文侯好古樂之人竇公獻其書乃今之大宗伯之大司樂章若夫記有樂記樂之傳也非經也樂記作於漢武帝時河間獻王與諸儒共採周官及諸子言樂事者是也薛平仲曰司樂則總其樂之大者樂師則總其樂之小者自其大者言之由律同聲音六舞之合足以默交於𨼆顯之間非探索於樂理之至者不能也則司樂之官可不以中大夫居之乎自其小者言之由步武疾徐之儀足以致養其和平之德非研窮於樂之微者不能也則樂師之官可不以下大夫居之乎彼胥也者隨事之小大而致察焉然上下相承而不容缺則又二官所以繼於後也陳及之曰大司樂之官今之國子監祭酒而其下樂師大胥小胥今之司業博士掌成均之法以治建國之學政而合國之子弟焉鄭鍔曰周人立五學中曰辟雍環之以水水南為成均水北為上庠東為東序西為瞽宗學禮者就瞽宗學書者就上庠學舞干戈羽籥者就東序學樂德樂語樂舞者就成均惟天子承師問道及養老更之類乃就辟雍陳氏曰辟明也雍和也所以明和天下明之以法和之以道故大戴禮有帝入東學南學西學北學太學之文蓋周人立四代之學禮記云於成均以及取爵於上尊又云瞽宗商學也崔氏曰宗尊也瞽無見之稱譬童蒙無有所識為瞽蒙之尊又瞽宗者樂官教國子弟樂訓道童蒙故因焉為學名陳氏曰以樂祖在曰瞽宗然上庠下庠虞也東序西序夏也陳氏曰以習射事曰序左學右學商也陳氏曰居右曰右學東膠虞庠周也陳氏曰以糾德行曰膠不見成均為何代之學獨董仲舒謂五帝學康成從之他無所見或者以成均為辟雍豈其然歟名曰成均者蓋德不能無虧性不能皆平樂之為教所以成之均之陳氏曰成其虧均其過不及易氏曰成其行之虧均其習之偏五帝即此名學成周因之以為教國子弟之法有虞之世命后䕫典樂教胄子直而溫寬而栗剛而無虐簡而無傲即所以為成均之義詩言志歌永言聲依永律和聲即所以為成均之教今大司樂言掌成均之法則於規矩之中寓性命之理是乃所以勉其為成均者又言治建國之學政於防檢之中寓激勸之術是乃所以糾其不為成均者又命有道有德者使表儀於上訓迪於下如師氏以三德教國子保氏養國子以道無非所以示其成均焉然則成均者教人之名先之為道德者教人之實非於道德之外别有所謂成均也王氏詳說曰三王之學各異其名所謂東序與瞽宗是已但五帝之學名失其傳所傳者總名耳世子篇曰謂之郊人逺之於成均以及取爵於上尊夫郊人云者郊之小學所謂養老於虞庠是已成均云者國之大學所謂養國老於上庠是已鄭氏以成均為虞庠失之矣蓋命䕫典樂教胄子其制詳於有虞此周之學名必取於虞氏之庠總名必取於五帝之成均得無意乎陳氏曰諸侯之學小學在內大學在外故王制言小學在公宫南之左大學在郊以其選士由內以升於外然後達于京天子之學小學居外大學居內故文王世子言凡語于郊然後達于朝故也陳藴之曰建立也周人以成均之舊法以立國之學政合聚國子弟將以此教之鄭鍔曰凡建國必立學學必有政政者教之養之勸之沮之之術必掌成均之法以治之者蓋大司樂所掌者樂也周人於成均之中教樂德樂舞樂語則成均乃習樂之所大司樂所掌者樂官之法以治學政則於他學之法無預可知吕氏曰自舜命䕫典樂教胄子以此知五帝三王之學政無不由樂始蓋陶冶之功入人最深動蕩鼓舞優游浹洽使自得之自舜與周皆是以典樂之官兼教導之事漢太常典樂兼教胄之任亦此意歟禮庫曰這一箇所在不是官司秦漢以後錯把做官司看了雖是法度具舉然亦不過刑罰法制相臨都無深入人心道理總論教國子官屬孫氏曰均之為國子弟也而有嫡庶貴賤之别士庶子入衛王宫出守城郭奔走於㑹同軍旅祭祀賔客之事惟貴遊之子弟不預焉其衛王宫版在宫伯而教之屬於師氏以師氏之尊且嚴故貴遊子弟雖無宿衛之役亦從而學焉大司樂掌治建國之學政合國之子弟蓋羣后之太子卿大夫元士之適子常在學者愚案周禮全不說太子惟諸子說一句其他只說國子庶子子弟蓋古者太子入學則以齒論大司樂便是教太子官其餘不常在學則籍在諸子而教在大胥小胥不過春秋合之而已先王之於國子何所不用其教哉惟貴遊有國子則賤不至於妨貴諸子有别乎適子則庶不至於奪適防微杜漸之意深矣陳藴之曰司樂一項官專教子弟意極深先王思慮最逺國子弟與國家相為終始既與他父兄共維持天下子弟善見得後日子孫天下必治若不善便見得後日天下不㑹治血脉關節常相聨絡不可不早思慮凡有道者有德者使教焉李景齊曰有道有德者使教焉則保氏養國子以道師氏以三德教國子也教國子之官雖不一而成均之法特見於大司樂以樂為主耳人而未至於樂不足以語學之成故古之教十三學樂誦詩舞勺成童舞象蓋聲音以養其耳目舞蹈以養其血脉所以和平其善心蕩滌其邪志者莫急於此呂氏曰凡有道有德者使教焉是延請有道有德者使之教國子也以後世私心觀之既設掌樂之官却不專教國之子弟反資之於他人以此見古人立心至公規模廣大大抵設教受教當知無窮意思死則以為樂祖祭於瞽宗鄭鍔曰謂之樂祖者謂其通達樂德樂語樂舞之意以覺後覺如人之祖周人作樂之詩名曰有瞽有瞽而瞽矇乃樂官之屬明乎樂者然後為瞽矇之所宗瞽宗之中而祭之使後世知其為明樂之師儒賈氏曰文王世子云春誦夏弦大師詔之瞽宗以其教樂在瞽宗故祭樂祖還在瞽宗王昭禹曰古人於田則祭田祖於馬則祭先牧於飲食則祭先食於養老則祭先老皆以示其不忘本也又况以道德而教者死則以為樂祖祭於瞽宗所以示其不忘於所教歟吕氏曰祭於瞽宗不特是明尊師敬長之義亦是當時有道德者教之入人也深設教有如時雨之化人自不能忘祭於瞽宗亦是因人心之不忘與身沒教已盡者不同以樂德教國子中和祇庸孝友吕氏曰此所謂教之條目金石絲竹匏土革木是樂之物而已樂之德非有道有德者不能知之中和祇庸孝友所謂樂德也禮以教中樂以教和何故兼中言之樂雖主在和無相奪倫豈不是中且如乾固是剛坤固是柔然坤至柔而動也剛乾坤何嘗做兩假須於樂上見得中和不可相離然又不可渾然無别如坤固是至柔而動也剛又須當知乾主乎剛坤主乎柔舊以中為忠才改一字便看不得中和分明一個中字其義無窮祇敬之謂庸流通日用常行之謂孝友見於事親從兄之間者皆所謂樂之德論中和固是樂之本所謂祇庸孝友就樂中說其端亦可見一箇節奏各有條理使之肅然祇敬祇之端條暢流通庸之端易直子諒之心使人事親從兄之際油然而生孝友之端此謂樂之德易氏曰德一而已喜怒哀樂未發謂之中發而中節謂之和即中和而體之以至誠謂之祇即至誠而達於日用常行謂之庸庸用無不通之謂由是推之於事親從兄之際謂之孝友此古聖賢踐履之實行大司樂乃以為教國子之樂德者猶孟子謂樂之實鄭鍔曰教萬民以六德曰知仁聖義中和六行曰孝友睦姻任恤獨教國子則取六德之下取六行之上者而教之至祇庸二德則萬民無預焉蓋教民之道責以六德或不責其行責以六行或不責其德國子德行欲其兩全故成之以樂謂之樂德六德之下者能之其上可知六行之首者能之其下亦可知祇庸所以進乎德行惟祗則於德行不敢忽惟庸則於德行不敢輟以樂語教國子興道諷誦言語鄭節卿曰樂語非特詔樂者歌詩章凡是教導言語之間以樂教之便謂之樂語樂之理見於言語之間便是感發人處謂之興鄭鍔曰興如詩人之興因物以感發其心之所欲言者鄭康成曰以善物喻善事託物引類感發興起謂之道鄭鍔曰道如撢人所謂道國之政事之道事有𨼆意則以言而導達之鄭康成曰言古以剴今王氏曰直道其事吕氏曰道者從容和緩中和教導之意從容和緩中和教導之意謂之諷所謂倍文曰諷鄭鍔曰諷如諷諫之諷微言以寓意王氏曰諷以動之以聲節之曰頌鄭鍔曰誦如誦詩之誦揚古人之言而告之王氏曰誦人之言抑揚高下使自得之相酬酢謂之語獨自說謂之言獨說是教者自言學者無所答問鄭鍔曰食不語寢不言則言語異矣自言其己心之所藴者曰言以言而與人應答則曰語鄭鍔曰國子他時公卿大夫則奉命周旋出入專對之人故以樂而教之語則出言之際和而不暴矣黃氏曰詩之所以樂而不淫哀而不傷可以興可以怨邇之事父逺之事君蓋發於中和祇庸孝友故謂之樂語孔子曰不學詩無以言易氏曰此六者使之涵泳浸漬自然感發而中和祇庸孝友之念有不可禦者與后䕫典樂所謂詩言志歌永言聲依永律和聲同意以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武吕氏曰樂舞所以舒其情性王昭禹曰舞有大小者蓋古之教國子十三學樂誦詩舞勺成童舞象則樂師所教者小子也二十而冠始學禮可以衣裘帛舞大夏則大司樂所教者成人也鄭鍔曰國子者將使之奉祭祀待賔客揖遜升降以行禮者容儀之際尤不可不中節故以樂而教之舞黃帝之樂名曰雲門大卷言德能覆物物由之以出如門陳祥道曰雲為天之氣門者萬物之所資以出入者卷聚也又言其明民共財使有族類之聚也堯之樂名曰咸池咸言其德之感民池言其潤澤之久鄭康成曰堯能殫均刑法以儀民言其德無所不施大㲈舜樂以其繼堯而治故曰㲈大夏禹樂以其治水之功大故曰夏鄭康成曰禹治水敷土言其德能大中國李嘉會曰大夏者文德敷于四海文明如華夏也大濩湯樂以能護民也鄭康成曰湯以寬治民除其邪虐言其德能使天下得其所大武武王樂以武定天下也鄭康成曰武王伐紂以除其害言其德能成武功以樂而教之舞形容六聖之德則舞應樂節而可觀矣薛平仲曰周所以用六代之樂者存三恪與二代三恪謂黃帝堯舜之後二代謂夏商之後樂記曰封黃帝之後於薊以下是也周人既法其法故兼用其樂李嘉㑹曰自黃帝至周非無他樂必取此六者以其樂純正而音節之備也總論鄭鍔曰德所以成已語所以接人舞所以事神先能成已然後可以接人而事神教之之序如此王昭禹曰國子賢者之類功臣之世賢將進之以位貴將授之以職德不足則不可與有為言不足則不可與有應容不足則不可與有接則大司樂之教其可緩乎以樂成其德謂之樂德以樂達其語謂之樂語以樂節其舞謂之樂舞陳氏曰周之時干戈羽籥在東序絃誦與禮在瞽宗書在上庠以言學者之事興于詩立于禮成于樂而舞乂樂之成焉故大司樂言樂德樂語終於樂舞樂師言樂成告備終於臯舞以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說逺人以作動物鄭康成曰六律合陽聲六同合隂聲此十二者以銅為管轉而相生黃鍾為首其長九寸各因而三分之上生者益一分下生者去一王昭禹曰名之曰律以其述天地自然之氣而宣之名之曰同以其為律之偶而同於陽六律又謂之六始以其始於陰之氣六吕又謂之六同六間蓋吕言其體間言其位同言其情總言之皆所以述陰陽之氣故皆謂之十二律鄭康成注大師職掌六律六同以合隂陽之聲陽聲黃鍾太蔟姑洗𬎼賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾曰以合隂陽之聲者聲之隂陽各有合黃鍾子之氣十一月建焉而辰在星紀大吕丑之氣十二月建焉而辰在𤣥枵太蔟寅之氣正月建焉而辰在娵訾應鍾亥之氣十月建焉而辰在析木姑洗辰之氣三月建焉而辰在大梁南吕酉之氣八月建焉而辰在夀星𬎼賔午之氣五月建焉而辰在鶉首林鍾未之氣六月建焉而辰在鶉火夷則申之氣七月建焉而辰在鶉尾中吕已之氣四月建焉而辰在實沈無射戍之氣九月建焉而辰在大火夾鍾卯之氣二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黃鍾𥘉九下生林鍾之𥘉六林鍾又上生太蔟之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生𬎼賔之九四𬎼賔又下生大吕之六四大吕又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律取妻而吕生子賈氏曰同位象夫妻者黃鍾之初九下生林鍾之初六同是初初是象夫婦也異位象子母者謂林鍾之初六上生太蔟之九二初二為異位是象子母也但律所生者為夫婦吕所生者為母子律所生者常同位吕所生者常異位楊謹仲曰鄭氏謂下生者三分去一上生者三分益一其說未然蓋以此論律自黃鍾九寸損之為六寸林鍾益之為八寸自此以後愈損而律管愈短雖有益而不加長則自九而六自六而八可見矣積六下生五上生至仲吕而管極短不可勝吹殊不知陽中之陽則下生而損一分至隂中之陽則下生者反當益隂中之隂則上生而益一分至陽中之隂則下生者反當損而後十二管之長短乃均今考鄭氏所言管之長短則既均矣自與前言不應不可不辨何者應鍾上生𬎼賔固已益矣自𬎼賔而生大吕雖下生𬎼賔乃隂中之陽其數已不足又當益之故𬎼賔之律長六寸八十一分寸之二十六復三分而益一以下生大吕乃得大吕之管長八寸二百四十三分寸之一百四前配黃鍾之九寸故與太蔟之八寸處其中而適均若拘下生當損之則損𬎼賔之一分以下生大吕則大吕之管止長四寸二分有竒與前後不均惟自𬎼賔而後下生者反益之上生者反損之積而至仲吕乃得十二管之長短均調此上下相生損益之義不同鄭未得之故不得不辨若十二管長短之數鄭之所述已得之愚案鄭氏損一益一之說律吕長短之數已得之但必以損者為下生益者為上生未然蓋上下二字乃係於律吕之隂陽凡陽律生吕皆為下生隂吕生律皆為上生損益二字不係於上下故律生吕雖皆損一而亦有益一以下生吕者若𬎼賔陽律反益以生大吕故大吕之管比𬎼賔為長其生則止曰下生其吕生律雖皆益一而有損一以上生律者若大吕隂律反損以生夷則故夷則之管比大吕為短而其生止曰上生耳若漢志謂律皆損以下生吕吕皆益以上生律則長短之數不合鄭康成曰大吕長八寸二百四十三分寸之一百四太蔟長八寸夾鍾長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一中吕長六寸萬九千六百八十三分寸之萬二千九百七十四𬎼賔長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十七分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十王氏曰六律六同以考五聲五聲以成八音八音以節六舞六舞以大合樂王昭禹曰至於興舞則所謂六律六同五聲八音無不備此其所以大合樂歟李嘉㑹曰八音八方之氣也一有偏勝而八方之風為之不順左氏謂舞所以節八音而行八風者也鄭康成曰大合樂謂遍作六代之樂賈氏曰大合樂者薦腥之後合樂之時用之此所合樂即下云六變八變之等彼據祭天下神此據正祭合樂然合樂在下神後而退下神樂在後者以下神用一代樂此用六代樂事重故進之在上詳王氏說曰大司樂謂天地神人之大祭薦神之樂又言下神之樂正所以重其事薦神之樂謂朝獻饋獻時下神之樂謂禮天地以璧琮與人鬼以鬱鬯時也鄭康成曰以冬日至作之致天神人鬼以夏日至作之致地祗物魅動物羽裸之屬虞書后䕫所言此其於宗廟九奏效應王昭禹曰先王作樂所以導和其和至矣則大同於物故奏之郊廟則幽而鬼神由此致賜之諸侯則明而邦國由此和或奏之鄉射或奏之鄉飲則內焉萬民由此諧或奏之燕或奏之享則外焉賔客由此安夷蠻閩貉戎狄之君其來朝也與之燕焉樂以此作則逺足以悅逺人歲十二月合聚萬物而索享之羽裸之族鱗毛介之類所謂動物其祭之也樂由此作則微足以作動物乃分樂而序之以祭以享以祀王氏詳說曰自以六律六同六舞大合樂以下為一節謂天地人之大祭祀薦神之時為言自乃分樂而序之以下為一節謂天地人之次祭祀為言自凡六樂者以下為一節謂四方百物之小祭祀為言自凡樂圜鍾為宫以下為一節謂天地人之大祭祀下神之樂為言鄭康成曰分謂各用一代之樂王氏曰分律而序之自黃鍾至無射分同而序之自大吕至夾鍾分舞而序之自雲門至大武易氏曰六律以左旋為序六同以右轉為序六舞以歷代之先後為序賈氏曰分樂而序之與下為總目尊者用前代卑者用後代尊卑有序故曰序乃奏黃鍾歌大吕舞雲門以祀天神薛平仲曰祭之尊卑凡有六等故以六代之樂分用之以六代之樂配十二調而作之一代之樂則用二調者還取一隂一陽相對為之合奏者堂上四縣鍾聲之調歌者堂上琴瑟之音但一祭之中皆自為二調庭奏者常以陽律為調升歌者常以隂吕為聲欲其相配鄭鍔曰黃鍾者建子之律一陽所起六律之根本大吕雖非六吕之首然其位在丑子與丑相合之辰也故奏黃鍾必歌大吕之調取其合也易氏曰雲以象天之施黃帝之樂黃帝德與天合故雲門之樂起於黃鍾之子應以大吕之丑是黃鍾為六吕之首大吕為六同之首雲門為六舞之首以祀天神類也陳藴之曰此天神當用三陽爻生之月萬物出地之時劉迎曰天神即樂六變而皆降之神鄭既以祀天神為五帝及日月星辰又謂王者各以夏正月祀其所受命之帝於南郊不知受命之帝何所據乃奏大蔟歌應鍾舞咸池以祭地示鄭鍔曰大蔟者建寅之律陽聲之第二應鍾雖非隂聲之第二然其位在亥寅與亥相合之辰故奏大蔟必歌應鍾之調取其合也易氏曰池以象地之澤唐堯氏之樂唐堯氏德與地合故咸池之樂起於大蔟之寅應以應鍾之亥是大蔟為六律之次應鍾為六同之次咸池為六舞之次以祭地示類也陳藴之曰此地示當用三隂爻生之月萬物秀實之時劉迎曰地示即樂八變而出者鄭既謂地示則主崑崙又謂祭神州之神及社稷不知神州崑崙何所據乃奏姑洗歌南吕舞大㲈以祀四望鄭鍔曰姑洗者建辰之律陽聲之第三者也南吕雖非隂聲之第三其位在酉辰與酉相合之辰故奏姑洗必歌南吕取其合也陸佃曰南吕則隂之所成者事易氏曰㲈紹也言舜之繼堯而能紹其道也故大㲈之樂起於姑洗之辰而應以南吕之酉以舜之柴望於方嶽而四嶽四鎮四海四瀆之神咸秩以祀四望亦其類也吕氏曰康成以此言祀司中司命風師雨師或亦用此樂非乃奏𬎼賔歌函鍾舞大夏以祭山川鄭鍔曰𬎼賔者建午之律陽聲之第四者也函鍾非陰聲之第四然其位在未午與未相合之辰故奏𬎼賔必歌函鍾取其合之義鄭康成曰函鍾一名林鍾陸氏曰林鍾以夏為庇物言之李嘉㑹曰林者物已成林坤當涵而養之故曰函見蓄養萬物易氏曰夏大也言禹之治水而能大中國也故大夏之樂起於𬎼賔之午應以函鍾之未以禹之奠高山大川而懷襄昏墊之患始息以祀山川亦其類也乃奏夷則歌小吕舞大濩以享先妣鄭鍔曰夷則者建申之律陽聲之第五者也小吕雖非陰聲之第五然其辰在已申與已相合之辰故奏夷則必歌小吕取其合也鄭康成曰小吕一名中吕陸氏曰小吕則隂之所萌者小也易氏曰濩養也言成湯弔伐養天下也故大濩之樂起於夷則之申應以小吕之已以享先妣而序於先祖之上蓋主乎姜嫄而先后與焉謂子孫之養皆原於此亦其類也鄭康成曰先妣姜嫄也履大人跡感神靈而生后稷是周之先母周立廟自后稷為始祖姜嫄無所配是以特立廟而祭之謂之閟宫閟神之也乃奏無射歌夾鍾舞大武以享先祖鄭鍔曰無射者建戍之律陽聲之第六者夾鍾雖非陰吕之第六然其辰在卯戍與卯相合之辰也故奏無射必歌夾鍾取其合也鄭康成曰夾鍾一名圜鍾陸氏曰圜鍾以春為主規言之李嘉㑹曰圜物始生也卯者日之始故曰鋭易氏曰武功也言武王偃武而卒其伐功故大武之樂起於無射之戍應以夾鍾之卯以享先祖而序於先妣之下蓋主乎后稷而先公與焉謂王業之大實基於此亦其類也劉氏曰周之先祖惟后稷詩之雍言禘大祖生民言尊祖而謂后稷生於姜嫄則凡言祖者皆后稷鄭乃以先祖為先王先公蓋先公自公劉而下先王自王季而下非始祖矣天作言祀先王先公司服言祀先王則衮冕祀先公則鷩冕必明指先王先公言之今享先妣既云姜婦知先祖為后稷昭然項氏曰奏者播之於器歌者詠之於聲舞者動之於容王氏詳說曰司服所以依於王其尊卑先親而後踈司樂所以薦於神其尊卑先外而後內凡六樂者文之以五聲播之以八音劉執中曰六代之樂雖不同皆用五聲旋相為宫以成其文也假此八物之音以播旋相之文則樂成矣鄭鍔曰以五聲文之使節奏次序如錦繡之成文欲其聲之交錯以八音播揚之鄭康成曰播之言被也使音調疏暢如農者播榖之播欲其音之發散蓋六樂之奏象其類稱其德因其數著其義至於作樂則必須五聲八音以文之播之然後樂成而可觀聽也李嘉㑹曰八者之聲無以文之則金自金石自石矣王昭禹曰五聲所以成八音故先五聲後八音愚案說見大師凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神王氏詳說曰此一節謂四方百物之祭也鄭康成曰變猶更也樂成則更奏也王昭禹曰節奏俱備謂之成備而更奏謂之變王氏詳說曰六經之言有以變為成者如簫韶九成是也冇以變為闋者郊特牲所謂樂奏三闋是也有以變為終者鄉飲酒義所謂笙入三終是也曰變曰闋曰終是或一說也劉氏曰六樂而文之五聲播之八音其為樂亦大矣非祭天地宗廟不用先儒止見其致羽物裸物之屬謂大蠟索百物之祭不知大蠟止息老物樂田夫而已六樂豈用於此乎鄭康成曰此謂大蠟索鬼神而致百物六奏樂而禮畢東方之祭用大蔟姑洗南方之祭用𬎼賔西方之祭用夷則無射北方之祭用黃鍾為均每奏有所感致和以來之鄭康成曰土示原隰及平地之神賈氏曰大司徒有原隰此不言原隰故知土示中有原隰可知不言原隰言土示者欲示見原隰中有社稷故鄭駁異義云五變而致土示土五上之總神謂社也劉氏曰象物蓋日月星辰之屬易言天垂象垂象著明莫大乎日月是日月星辰亦可謂之象物保章氏謂凡此五物蓋云日月星辰星土孰云有象而非物乎鄭康成曰象物有象在天所謂四靈者天地之神四靈之知非德至和則不至禮運曰何謂四靈麟鳳龜龍謂之四靈鄭鍔曰致者使之自至樂作於此物應於彼雖聖人亦安能限其必至哉亦意其來格而已樂止於六變者蓋蠟祭之樂六變而祭畢王昭禹曰羽物輕疾而川澤則虛致之易故一變而致羽物蛙蚓之屬比羽物為重遲山林草木所集比川澤為實致之稍難故俟乎再變鱗物水族又重遲於裸物丘陵積土之為篤又實於山林故俟乎三變毛物虎豹屬其體又重遲於鱗物水崖之墳下平之衍水上交而其體卑又實於丘陵故俟乎四變介物龜鱉屬尤為重遲土示則其勢在下尤為實故俟五變而致之象物恍惚無形天神則逺人而尊致之尤難故六變而後致之易氏曰分樂之序則以雲門祀天神以咸池祭地祗與求神之樂大同小異其言大濩以祀先妣大武以祀先祖則與九㲈九德一用於宗廟不同天地有一定之體故樂不容於或異人鬼有宗廟有祧廟祭法曰王立七廟一壇一墠皆月祭之逺廟為祧享嘗乃止宗廟則七廟也先妣先祖則廟與祧皆異兹其樂所以不同凡樂圜鍾為宫黃鍾為角大蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣王氏詳說曰此一節天地人之大祭祀下神之樂愚案禮記謂十二律旋相為宫何此獨用三者為宫學者疑之鄭康成曰圜鍾夾鍾也鄭鍔曰不曰夾鍾曰圜鍾者以天體言也王氏曰圜鍾正東方之律帝與萬物相見於是出焉天無不覆求天神而禮之則其樂之宫宜以帝所出之方故以圜鍾陳暘樂書曰天圓覆為體不曰夾而曰圓與易乾為圜同薛氏曰大道著乎東而本統起乎北易曰帝出乎震震東方也故祭天神用寅卯辰之律曰大蔟圜鍾姑洗是也然不可違其本統也黃鍾為天統故兼取北方之律而以黃鍾為角鄭鍔曰十二律旋相為宫先王用樂各以其義類取聲而用之天功始於子故用黃鍾為角角言功之始天功成於寅故用大蔟為徴徴言功之成天功終於辰故用姑洗為羽羽言功之終也王氏詳說曰黃鍾為陽律之一大蔟為陽律之二姑洗為陽律之三王昭禹曰黃鍾為角大蔟為徴姑洗為羽者是三者律吕之相繼相繼者道之序天任道也王氏詳說曰宫角徴羽以清濁為先後之序且如圜鍾為宫宫數八十一黃鍾為角角數六十四大蔟為徴徴數五十四姑洗為羽羽數四十八函鍾為宫大蔟為角姑洗為徴南吕為羽黃鍾為宫大吕為角大蔟為徴應鍾為羽亦如其數此所謂宫角徴羽者以清濁為先後之序也律厯志所謂宫生徴徴生商商生羽羽生角以相生為先後之序也薛氏曰五聲有商而祭與佩玉無商者鄭康成曰祭尚柔商堅剛楊收曰周祭天地不用商者以商聲剛而角聲下所以取其正裁其繁也趙填曰商聲金周家木德金能尅木作者去之或曰五音相生宫徴居前角羽居後商實在中人位也祭祀而去人聲示盡心於鬼神又曰聲不用商惡殺聲也以數說考之則不用人聲者為當商中聲也降與上下之神則虛其中聲中聲人聲也遺乎人聲所以致一于鬼神嘗以十二律旋相為宫之法求之一律合五音則十二律皆有商聲若黃鍾為宫正也以無射為旋宫則黃鍾為無射之商若大蔟為旋宫則姑洗為大蔟之商此旋相之法鄭司農曰雷鼓雷鼗皆謂六面有革可擊者也鄭康成曰八面鄭鍔曰管用特生之竹取陽數之竒雲和先儒以為山名於此取材為琴瑟將以召乎至和故有取也六代之樂雲門為首天神最尊故用之王昭禹曰言天神則昊天上帝日月星辰風師雨師之屬莫不以類而畢降鄭鍔曰樂用圜鍾鼓取天聲管取陽聲琴瑟取雲和舞取雲門而丘之體又象天之貟祭之日用冬至一陽始生之日以類求類所謂天神之屬乎陽者安得而不降此所以可得而禮易氏曰凡樂有本有用有變自圜鍾為宫至姑洗為羽此樂之本自雷鼓雷鼗至圜丘奏之此樂之用六變而天神降此樂之變三者舉而樂之終始備矣凡樂函鍾為宫大蔟為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣王氏曰函鍾西南方之律萬物於是致養乎地求地示而禮之則其樂之宫宜以物致養之方故以函鍾陳暘樂書曰地以含洪為德不曰林而曰函以見含洪之意薛氏曰林鍾丑之衝為地統與其他之律皆相生之次而用以祀地地靜而不變以生為本故以相生為用不與圜丘宗廟同王氏詳說曰林鍾上生大蔟大蔟下生南吕南吕上生姑洗然先姑洗而後南吕以姑洗數多而南吕數少耳相生者地之功故於地言之鄭鍔曰地功始于寅故用大蔟為角角言功之始地功成于辰故用姑洗為徴徴言功之成地功終于酉故用南吕為羽羽言功之終鄭司農曰靈鼓靈鼗四面鄭康成曰六面鄭鍔曰天神而地靈故以靈名其鼓與鼗鄭康成曰孫竹竹枝根之末生者鄭鍔曰取其旁生之枝空桑山名王昭禹曰空桑則以隂道為常乏愚案咸池見本職前王昭禹曰言地示則大示社稷五祀五嶽四瀆山林川澤四方百物之屬莫不以類而畢出劉執中曰隂生而祭地以助乎坤元資生之德薛氏曰隂以方為體性靜地隂而靜故為方丘在國北之澤以祀之亦各從其類陸氏曰祭也於北郊而澤中之方丘此謂為下必因川澤鄭鍔曰樂用林鍾言地為萬物之君終於南吕象其作成萬物之效鼓鼗言其德之靈管象其生之衆空桑言其道無所不容咸池言其澤無所不遍而丘之體又象地之方祭之日用夏至一隂始生之日以類求類如此安有神之不出乎凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣王氏曰黃鍾正北方之律萬物於是藏焉死者之所首也鬼無乎不之求人鬼而禮之其樂之宫宜以死者所首之方故以黃鍾陳暘樂書曰人位天地之中以成故宫曰黃鍾與易黃中通理同意薛氏曰人道終乎北而本統在乎東北方𤣥武虛危有宗廟之象故享人鬼用亥子丑之律黃鍾大吕應鍾是已然不可違其本統也大蔟為人統故兼取東方之律而以大蔟為徴鄭鍔曰人鬼之樂異乎天地取其精神魂魄所出入之地以為始終人鬼始于正北成于東北終于西方萃於幽陰之地始于十一月成于正月者幽陰之魄稍出于東方全處幽陰則不與人接稍出于東方故人鬼可得而禮然則復歸于幽陰復其常也惟羽聲獨逺於他樂始于十一月終于八月天地歲事之一終鬼道無窮非若歲事之有卒故盡十二律然後終事先追逺之道厚之至也此廟樂之始終也王氏詳說曰大吕與黃鍾合子丑也應鍾與大蔟合寅亥也相合者人之情故於人言之鄭司農曰路鼓路鼗兩面鄭康成曰四面鄭鍔曰路大也以路名鼓以象先王之功大也鄭康成曰陰竹生於山北者鄭鍔曰象鬼神之幽陰也龍門山名鄭鍔曰龍門之山取材為琴瑟以象先王之德變化無方鄭司農曰九德之歌所謂水火金木土榖謂之六府正德利用厚生謂之三事六府三事謂之九功九德之功皆可歌也謂之九歌賈氏曰宗廟用九德之歌者以九德為政之具故特異天地之神鄭鍔曰言先祖之功德及民鄭鍔曰㲈舞次於咸池取能繼紹之意王昭禹曰九德九㲈以人之所致養乎內外而盡善盡美者也賈氏曰宗廟不言時節者祫祭也但殷人祫於三時周禮惟用孟秋之月為之易氏曰享人鬼者以路鼓路鼗作之於始然後以陰竹之管龍門之琴瑟間歌於堂上又以禹九德之歌舜九㲈之舞節樂於堂下蓋以路為人道之大九㲈九德言后稷基於舜禹之世而奏之於宗廟者所以象王業之始也賈氏曰言六變八變九變者謂在天地及廟庭而立四表舞人從南表向第二表為一成一成則一變從第二至第三為二成從第三至北頭第四表為三成舞人各轉身南向於北表之北還從第一至第二為四成從第二至第三為五成從第三至南頭第一表為六成則天神皆降若八變者更從南頭北向第二為七成又從第二至第三為八成則地祗皆出若九變者又從第三至北頭第一為九成人鬼可得禮焉此約周之大武象武王伐紂故樂記云且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子其餘大濩已上雖無滅商之事但舞人須有限約亦應立四表以與舞人為曲别也薛氏曰凡樂之變數皆用其宫之本數為終黃鍾在子子數九故九變而終夾鍾在卯卯數六故用六變而畢林鍾在未未數八故用八變而止皆用其數為終然則凡十二調而作者各用本數為樂終非謂本數為三也葉水心曰古人皆指其實不想象而言人鬼不言出鬼固依於人古人不以致神祗為難而以天地神明得其所安為難劉氏曰祀天圜丘祀天帝也祭地方澤祭地示也享人鬼於宗廟后稷已下先王先公也先儒言三者皆禘大祭夫禘者禘其祖之所自出天神地示謂之皆禘大祭可乎又言天神主北辰地示主崑崙則是祀天又非昊天上帝祭地又非地示既言人鬼主后稷又援祭法禘嚳而郊稷祀天圜丘以帝嚳配則是夫子郊祀后稷以配天詩言文武之功起於后稷故推以配天之說皆不足信多自背戾如此周禮訂義卷三十八
