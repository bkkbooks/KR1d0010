body:
  text: 周禮訂義卷六十八宋王與之撰小行人下大夫四人掌邦國賓客之禮籍以待四方之使者劉執中曰禮籍所以載五等諸侯及其孤卿上下大夫四等入覲之禮隨其爵命為之降殺大行人用之以同邦國之禮者皆書于此籍也鄭鍔曰賓客之來名位不同禮亦異數固有籍以記之大行人掌其禮儀小行人掌其禮籍則案其名位尊卑之書以待之也掌禮儀尊者之事掌籍卑者之職此其官小大之别歟易氏曰籍有在王官者在諸侯者周稱籍談曰昔而高祖孫伯黶司晉之典籍故曰籍氏諸侯自為籍如此則掌之王官者為可知小行人使適四方協九儀賓客之禮蓋以王官所掌之籍而合諸侯所記之籍故曰協大行人以此待大賓大客小行人以此待四方使者職之相承如此鄭康成曰使者諸侯之臣使來者也令諸侯春入貢秋獻功王親受之賈氏曰貢即大宰九貢鄭康成曰功考績之功鄭鍔曰諸侯每歲有常貢必以春入則因四時之始以供王一歲之用也諸侯任事有成功必以秋獻則因萬物之成以明圖事之效也小行人令之使不爽春秋之期而已黃氏曰諸侯春秋遣使貢獻是為歲事故管仲曰若節春秋來承王命是也愚案王者封建諸侯使之知有天子之尊者惟春秋貢獻不絶于王所而已入貢獻功此正是把握諸侯處令之以時受之必親公卿大夫皆不得與以見其在天子諸侯安敢不惟命是承既受之後王者方視國籍以還其禮數各以其國之籍禮之王昭禹曰國有小大其禮有等差皆載之於籍也王氏曰各以其國之籍禮之則嘗以所禮之國名籍焉以為故常左氏傳曰非禮也勿籍凡諸侯入王則逆勞于畿鄭司農曰入王朝於王也故春秋傳曰宋公不王又曰諸侯有王王昭禹曰諸候之入王以其在道塗之勞則必有以勞之逆勞于畿始至而勞之于外也鄭鍔曰掌其入境之勞及郊勞視館將幣為承而擯王氏詳説曰逆勞于畿小行人也及郊勞則非小行人蓋小行人于郊勞之時視館而已賈氏謂勞于郊為大行人事其説雖不見于經然亦有可采者案聘義言諸侯之禮云君使士迎于境大夫郊勞大夫尊于士則郊勞重于逆勞于畿矣案書傳略説云天子太子年十八稱孟侯孟侯者四方諸侯來迎于郊然世子郊勞夏法也周法則不使世子使大行人然有近郊勞有逺郊勞覲禮云至于郊王使人皮辨用璧勞鄭氏以為近郊蓋近郊則用皮辨故也言使人即王人王人即行人也賈氏謂近郊使大行人逺郊亦使大行人得矣鄭鍔曰三勞之禮初至則逆于境及至近郊逺郊又有郊勞之禮致館于賓又有視館之禮黃氏曰環人舍則授館小行人視之耳易氏曰小行人至郊勞之時又先為之眂館蓋賓至國天子館之前朝前朝者庫門外之朝右九棘之位也朝享之時則有將幣之禮皆王遣公卿以示其誠意之厚非小行人事小行人但為承而擯蓋為次擯而已承者繼之之辭有上擯矣李嘉會曰大宗伯為上擯此則承而繼其後也黃氏曰承猶奉也將幣擯者非一小行人既奉且擯之易氏曰出接賓曰擯入詔禮曰相出入異辭也小行人既為承擯矣而肆師又曰大朝覲佐擯此為大朝覲設若常朝覲則小行人為承擯而已凡四方之使者大客則擯小客則受其幣而聽其辭易氏曰大客謂諸侯之使者凡時聘殷俯皆於廟中行享禮擯而見之與諸侯同但旅擯不交擯耳交擯者傳辭于末擯示不敢與天子抗諸侯之禮若旅擯者王使人與之言其享禮皆有圭璋受幣聽辭天子也非行人也若小客則蕃國使者不可直達于天子故行人為之受其幣聽其辭鄭鍔曰若諸侯遣臣而來大國之臣非已所得專必擯之而見王使自言其所圖之事若小國之臣來則爵位卑矣受其幣而聽其辭可也鄭康成曰受其幣者受之以告其所為來之事黃氏曰此以事特來者也王有見有不見與朝享不同使適四方協九儀賓客之禮朝覲宗遇會同君之禮也存俯省聘問臣之禮也鄭康成曰適之也協合也易氏説協字見前禮籍下鄭鍔曰五等之侯四等之臣皆以時入王朝為賓客者也衆國不一則其禮或不協小行人又掌為使而之適于四方先協而同之使彼知夫朝覲宗遇會同為君禮存俯省聘問為臣禮俾其習之有素行之有常其君所行不下迫於臣其臣所行不上僣於君則名分明而禮典正矣黃氏曰朝覲宗遇會同諸侯所以尊天子也而通乎兩君之相朝是則皆君禮也存俯省天子所以撫諸侯也聘問邦交歲相問殷相聘也是則皆臣禮也此見于經經無其文注疏家自以意測之言者多誤達天下之六節鄭康成曰此謂邦國之節也達之者使四方亦皆齎法式以齊等之鄭鍔曰掌節言八節此言六節何也蓋八節有玉有角有虎有龍有人有旌有符有管此言虎節人節龍節皆用金則與掌節之文同言旌節言符節言璽節不言用竹則與掌節之文異蓋彼言所守以為用則制度之所自出此則主於達之天下使無不通而已山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門關用符節都鄙用管節皆以竹為之項氏曰達節則齎六節之法往四方齊等之使皆有定式可以通達鄭康成曰諸侯使臣行俯聘則以金節授之以為行道之信虎人龍者自其國象王氏詳説曰天子使者聘於諸侯諸侯使者聘於天子其為節則一而已此虎節龍節人節之所以不同王氏曰玉節守邦國非其所達鄭康成曰凡邦國之民逺出至他邦他邦之民來入由國門者門人為之節由關者關人為之節其以徵令及家徙鄉遂大夫及采地吏為之節皆使人執節將之以達之亦有期以反節王氏詳説曰天子王畿之道路門關與諸侯之道路門關則一而已此旌節符節之所以同薛氏曰析木為符全木為管王氏詳説曰王畿有都鄙邦國亦有都鄙王畿都鄙天子公卿所食之采地也邦國都鄙諸侯之卿大夫所食采地也如左氏所謂凡邑有先君之主曰都與夫西鄙北鄙是也鄭鍔曰掌節言守都鄙之角節守則制度不可變行人言達都鄙之管節達則無所不通薛氏曰天子公卿大夫之采地用角節所以優於諸侯之臣諸侯之孤卿大夫之采地用管節所以殺於天子之臣賈氏曰掌節云貨賄用璽節門關用符節此無璽節薛氏曰小行人之六節直謂諸侯使者入聘非有貨賄之事此所以不言璽節司關言掌國貨之節以聯門市門市節既相聯則同用符節可知矣鄭鍔曰凡此六節者有國者君道欲其守而不變故用金道路門關都鄙皆臣道欲其有自然之節故用竹王氏曰此惟上所制期無失節而已故以竹為之達之者欲通天下而無不用也王氏曰邦節先門關後道路則以自內達外言之天下之節先道路後門關則以自外達內言之成六瑞王用瑱音鎮圭公用桓圭侯用信音仲圭伯用躬圭子用穀璧男用蒲璧鄭康成曰成平也瑞信也皆朝見所執以為信王昭禹曰以質言之謂之玉以形言之謂之器以合驗言之謂之瑞上有以合驗乎下下有以合驗乎上則瑞成矣鄭鍔曰六瑞者王與五等之君所執之圭璧以為合符之驗是故以瑞名之使均用以為驗是之謂成成如成牢禮之成亦彼此皆用而終始無虧也王昭禹曰大宗伯制其度數故皆言執行人奉其成事故皆言用執之以成禮用之以合符行禮者事之大合符者事之小此其辨也合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故鄭康成曰合同也六幣所以享也賈氏曰對上文六者是朝時所用也此六者之中有圭以馬璋以皮二者本非幣云六幣者二者雖非幣帛以用之當幣處故總號為幣鄭鍔曰幣所以將其禮玉所以彰其德有是德故有是幣然後足以見其誠圭也璋也與夫璧琮琥璜皆玉也所以比德馬也皮也與夫帛錦繡黼皆物也所以行禮用之之際各欲相協然後有以明其物各有所宜也用玉比所尊者之德用物以示在我之誠合者兩兩相配之義其合之也各有義存焉圭者東方之玉帝出乎震陽氣用事物於是生故有君德之用者宜享以圭必用馬以合之蓋乾為馬而震為善鳴之馬坎為美脊之馬皆陽之象也馬象陽之剛有行地無疆之材足以配乎君德之用也易氏曰圭用於東方有始事之義而馬為天駟為辰次之始亦東方之象故合圭以馬璋者禮南方之玉萬物相見文明著見之地故有文德之著者宜享以璋必用皮以合之蓋皮者虎豹之皮也大人虎變其文炳也君子豹變其文蔚也皆文之生乎自然者也是以配乎文德之著也易氏曰璋用於南方者也有致飾之義而皮用虎豹有自然之飾亦南方之象故合璋以皮璧者禮天之玉天位乎上萬物無以稱其德故用圜玉以象其體而已象其體而無琢削之文者事之以質也故有天德而尚質者斯享以璧必用帛以合之蓋帛者純素之物不如繢繡之巧而其體則純乎質足以配乎有天德而尚質者也琮者禮地之玉地之道合六子之功而成之故為物之所宗刻其玉而八方之見其總衆功而皆成也故有地德而可宗者斯享以琮必用錦以合之蓋錦者兼衆體然後成集衆美然後就足以配乎地德之大成者也易氏曰琮用於地而地事尚文錦為華麗之物亦以文為貴故合琮以錦琥者禮西方之玉物至秋則揫斂隂功於此而備西方為肅殺之義惟殺故能有威故其德至於有威者所享以琥必用繡以合之蓋畫繢之事雜五色而繡為五采之備繢上而繡下號為隂功之全足以配乎威德之兼備也易氏曰琥用於西方象乎物之成五采備謂之繡則有物成之象故合琥以繡璜者禮北方之玉物至冬則歸根復命萬物於此而辨北方為天事之武惟辨故能有斷故德能有斷者斯享以璜必用黼以合之蓋黼為斧形王位黼依王巾皆黼之類皆取其斷而已足以配乎辨德之能斷者也薛氏曰半圭曰璜北方所用也隂陽之辨莫斷於此故合以黼以白與黑謂之黼故也小行人用此以和合乎諸侯交好之故蓋情不可見因物而見物既有以彰其德又有以行其禮則歡欣交愛之情備形於此王昭禹曰凡此六幣皆諸侯以享王為主以其有以通其情而來則謂之好以其有以因其事而來則謂之故行人為之合六幣焉所以和其好故而使之不乖而已鄭鍔曰六幣皆以和諸侯之好其用幣未嘗無辨故圭璋者二王之後用之璧琮琥璜者五等諸侯用之玉人之事曰璧琮九寸諸侯以享天子又曰瑑圭璋八寸璧琮八寸以俯聘又曰瑑琮八寸諸侯以享夫人典瑞又曰瑑圭璋璧琮繅皆二采一就以俯聘享天子者九寸不瑑享夫人者八寸必瑑皆諸侯所躬行享禮之物也圭璋璧琮俱同於八寸而皆瑑者遣卿大夫俯聘所用之物也二王之後尊而不臣故享用圭璋記曰圭璋特唯有皮馬無束帛可知故曰特特者尊之也以禮天之序觀之則圭璋宜在璧琮之下今列於璧琮之上則其尊可知尊而特之則非五等之臣所用可知若夫五等之侯則聘天子用圭而享天子用璧聘夫人用璋而享后用琮玉人但言璧琮九寸諸侯以享天子而知享后用琮者琮以象地非享天子之玉故也其為國客自相享則享國君以璧享夫人以琮玉人但言瑑琮八寸諸侯以享夫人而知享國君用璧者蓋觀用琮以享夫人則知其必用璧以享君舉卑以見尊之義也諸侯自相享所用如此則二王後用以享諸侯者亦如此也所用圭璋者特享天子則用之耳若夫琥璜則子男享諸侯所用也易氏曰璧琮琥璜則施之於帛錦繡黼也圭以馬璋以皮則皮馬不上堂故圭璋言特記曰圭璋特達德也又曰束帛加璧尊德也以至琮之於錦琥之於繡璜之於黼亦莫不然如必曰二王之後用圭璋諸侯相朝用璧琮則典瑞言瑑圭璋璧琮繅皆二采再就以俯聘則諸侯固得而通用之矣如又曰子男於諸侯享用琥璜則聘享之禮未有專言琥璜者惟禮器曰琥璜爵又非子男所得專用以為享者也要之合六幣之説即庭實之事諸侯用之以享天子亦用之以自相享之禮聘以爵命為之隆殺則不可知以典瑞及玉人無明文不可臆説也何以知之以侯伯所用知之也侯伯執圭者也其相享以璧琮則下其瑞一等矣子男執璧茍享諸侯亦以璧則為不下其瑞以此知其用琥璜也知其不用琥璜以享天子者蓋五等諸侯通用璧琮以享王與后故也馬所以貴於皮而配圭者以太王事狄觀之先事之以皮帛乃事之以犬馬乃事之以珠玉則馬貴於皮矣聘禮言三享皆束帛加璧庭實惟國所有奉束帛匹馬車上九馬隨之中庭西上則用馬可知服不氏言賓客之事則抗皮儀禮言賓入門揖遜升致命張皮則用皮可知帛所以貴於錦而配璧者以婚禮觀之納徵以束帛享贈送者以束錦以聘禮觀之享君夫人以束帛覿以束錦上大夫與下大夫致賓介饔餼皆以束帛賓介儐之束錦以食禮觀之君侑幣以束帛大夫相食以束錦則帛貴於錦矣繡所以貴於黼而配琥者以畫繪之事觀之東方青南方赤西方白北方黑天謂之玄地謂之黃而五采備乃為繡白與黑二色乃為黼則繡之功多於黼也繡使人見之有肅心焉而黼特以斧形為之以示斷此繡之所以貴於黼歟其天子酬諸侯則用琥璜知其為酬諸侯之幣者以禮記曰琥璜爵琥璜非爵名而云琥璜爵明以送爵也謂享時酬賓以琥璜將幣耳此所合之玉與大宗伯祭天地四方之序不同蓋彼所以禮神禮神者必象其類此言用以和好比其德而用其禮所用者有尊卑差等也黃氏曰圭馬璋皮璧帛琮錦琥繡璜黼幣之合也行禮必有物以將之而皆有常過則侈不及則陋失禮相責望間隙生而其好隳矣故司儀曰凡諸侯之邦交各稱其邦而為之幣以其幣為之禮是也小行人合之以定其則注疏家引聘禮享君以璧享夫人以琮又引覲禮享天子束帛加璧皆有據但禮逸已多以其一而通其餘頗為牽合如所謂二王後用圭璋唯有皮馬無束帛二王自相享退用璧琮子男自相享退用琥璜皆斷闕不完難信總論劉氏曰九儀既正乃達六節以為門關之符乃成六瑞以通朝見之信乃合六幣以致摯享之誠然後禮樂行焉燕享舉焉諸侯之和好出焉若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿苦報反禬之若國有福事則令慶賀之若國有禍災則令哀弔之凡此五物者治其事故王昭禹曰病疾為札札而死曰喪札喪則在所賻補以利傅之謂之賻助其不足謂之補賈氏曰案宗伯云以喪禮哀死亡此云國札喪則令賻補之彼據弔葬致哀此據設財物補其不足也穀不熟為凶凶甚而為荒凶荒則在所賙委以利周之謂之賙以聚與之謂之委賈氏曰宗伯云荒禮哀凶札此云國凶荒則賙委之者彼謂自貶損此謂令他人以財委之有兵寇則謂之師會衆以興功則謂之役師役則在所稿禬稿其勞而稿之則謂之稿鄭司農曰稿謂犒師會衆財以與之則謂之禬鄭康成曰師役者國有兵寇以匱病者也使鄰國合會財貨以與之春秋定五年夏歸粟於蔡是也宗伯職曰以禬禮哀圍敗賈氏曰凶禮有五唯不見恤禮以義差之當於師役中兼之王昭禹曰福事則在所慶賀大宗伯所謂以慶賀之禮親異姓之國是也賈氏曰嘉禮歸脤膰此不言者諸侯無自相歸脤膰法也嘉禮六此惟言慶賀者飲食冠婚賓射享燕之法皆當國自行非相交通之物禍災則在所哀弔大宗伯所謂弔禮哀禍災是也鄭康成曰禍災謂水火賈氏曰吉禮軍禮賓禮並不言者天子頒之非通行之事也李嘉會曰凡此五物者大宗伯雖已具是法小行人則令行是法諸侯不得自相往來小行人所以令之王昭禹曰先王之於諸侯分土而與之守則尺地莫非吾土分民而與之治則一民莫非吾民使之守吾土必與之同保其土使之治吾民必與之同安其民則治雖有逺近勢雖有內外而利害休戚實吾一家此賻補賙委稿禬慶賀哀弔之禮所以掌於行人之官凡以治其事故而已所作謂之事所逢謂之故札喪凶荒禍災則出於所逢者也師役福事或出於所作焉鄭鍔曰上云六物指六幣之物此云五物指賻補賙委之物行人用六物以和諸侯之好正為此賻補賙委等之五物而已不然遇此五物俱坐視而不以為意不治其事故何以謂之和諸侯之好哉賻補以財賙委以粟稿禬以宴勞之禮慶賀以贊美之言哀弔以憫恤之情皆用物焉凡以治其事故而已治也者言致力以助之之義也黃氏曰不獨賻補賙委稿禬慶賀哀弔之而已必且治其事故而使濟焉澶淵之會無歸于宋春秋尤之宗伯大行人慶賀稿禬天子之於諸侯者已見及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂音洛和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故賈氏曰此總陳小行人使適四方所採風俗善惡之事各各條録别為一書以報上也此五者上二條條别善惡俱有故利害逆順並言其悖逆一條專陳姦寇之事其札喪一條專陳凶禍之事其康樂一條專陳安泰之事鄭鍔曰職方掌天下之圖以周知其利害其知也以圖此則載之以書案圖所以知其形案書所以知其事也禮俗也政事也教治也刑禁也諸侯之所行者或有逆順謂於王國之法或從或違也不為一書無以知其叛服之事悖逆也暴亂也作慝也犯令也過惡之已著也不為一書無以知罪惡之輕重猶圖也謂將有犯令之謀也然猶有二義已如此而猶如此也曽犯令矣今猶犯令焉與圖謀之義不同札喪也凶荒也厄貧也諸侯所遭之故也不為一書無以知逺民之憂也康樂謂民之樂和親謂鄰國之交歡安平謂其國之寧靜不為一書無以知侯國之治李嘉會曰反命于王既已周知天下之故王必有以處此矣易氏曰上經以其五物治其事故謂其事皆有故也從其故而治之則五者之事無不舉此特言周知天下之故則非若上五物之有事可治也從其本焉者治之而已五物者為故雖不同而其本皆在乎民李嘉會曰故者必求其源委而知其所以然也鄭鍔曰大司徒土會之五物則以山林川澤丘陵墳衍原隰言之保章氏救政之五物則以天星星土十二歲五雲十二風言之此以賻補賙委稿禬慶賀哀弔為五物又以五書為五物蓋不麗於物者無方無體不可得而執據是之謂道若夫可以操執而見於用事則可名以物一也故皆謂之五物司儀上士八人中士十有六人掌九儀之賓客擯相去聲之禮以詔儀容辭令揖讓之節賈氏曰九儀即大行人九儀鄭鍔曰人道之交貴乎有禮行禮之際貴乎有儀儀者俯仰揖遜進退周旋之容也保氏教國子以六儀二曰賓客之容正謂是儀耳李嘉會曰儀者禮文也子曰周監於二代郁郁乎文哉吾從周雖夫子亦從周之文則知周公思兼三王以施四事其於儀文尤急故曰周尚文此儀既設人情委曲行乎揖遜儀容之節自然有士君子之行司儀之職特司之而已鄭康成曰出接賓曰擯入贊禮曰相賈氏曰擯即下文交擯者相即下文惟上相入者是也鄭鍔曰曰擯曰相者擯在門外主接賓也相在廟中輔行禮也王昭禹曰公侯伯子男之為賓孤卿大夫士之為客大行人則辨其命等其爵而待之以禮司儀則掌其擯相之禮而已鄭康成曰以詔者以禮告王鄭鍔曰行禮之際司儀掌擯相之禮以詔王儀容辭令揖遜之節使動容中禮為盛德之至儀容以形貌言辭令以出語言揖遜以交接言總論孫氏曰所謂賓客者非列國之君即其卿大夫也彼皆來享來王於我者而先王與之講賓客之禮若敵已然自今觀六服之君各以歲時赴朝覲宗遇之會而陪臣將命入貢獻功幾無虛日委積飱牽以待之郊勞燕饗以寵之送逆必於其疆而不憚其煩存俯必以其時而不厭於數先王之治天下國家豈無急政要務而乃費國力於此哉水心曰學者徒謂其揖遜周旋之美不知周召經紀天下精神會聚於此參以詩書所紀則唐虞三代之為國家豈有毫髮不盡於人心者哉蓋其得之未嘗以智力其守之未嘗不以禮義此意至周衰惟管仲知之故其言曰招攜以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物孔子謂管仲身不由禮則禮不能行於天下故謂之小器孟子考之不詳因亦併廢管仲或未之思也將合諸侯則令為壇三成宫旁一門鄭康成曰合諸侯謂有事而會也王氏詳説曰古者天子巡守諸侯入朝一皆為壇於國門之外加方明焉天子祀之蓋以為盟主也方明之制覲禮云方明者木也方四尺設六色東青南赤西白北黑上玄下黃設六玉上圭下璧東圭南璋西琥北璜然不用蒼璧黃琮者以祀日月之神為主耳典瑞云圭璧以祀日月是也案覲禮為壇各因其方春則帥諸侯朝日於東郊為壇於國東夏秋冬亦如其方是覲禮之有壇也案朝事儀天子冕而執鎮圭搢大圭帥諸侯朝日於東郊退而朝諸侯是朝禮之有壇也此云合諸侯者謂大會同耳巡守之制亦如其會同但會同為壇於國門之外而巡守為壇於方嶽之下耳有事而會不協而盟此壇之所作也其制為壇三成即覲禮所謂深四尺者是也蓋從下向上為深發地一尺上有三成則總四尺矣鄭司農曰三成三重也爾雅曰丘一成為敦丘再成為陶丘三成為昆侖丘謂三重賈氏曰令為壇三成者謂令封人為壇三成王氏曰為壇三成則為三等焉所謂公於上等侯伯於中等子男於下等是也宫旁一門即覲禮所謂宫方三百步四門是也蓋壝土為壇壇外為宫每旁一門則四門矣鄭鍔曰王之所處則四方諸侯各以其方而入亦闢四門之意也朝覲皆有壇而此言於合諸侯者蓋合諸侯之禮大而壇之禮特以行將幣之禮耳若夫聘禮之壇則未入境為壝而無宫亦無尺數惟其象而已此聘禮所謂入境一肄為壝無宫者是已春秋之時合諸侯之禮不在天子而在諸侯昭四年楚子合諸侯于申而椒舉引六王二公之事以為證其僭甚矣為壇之禮不朝於天子而朝於諸侯襄二十八年鄭伯如楚舍不為壇而子産以為大適小則為壇有五美焉是用作壇以昭其功小適大有五惡焉用作壇以昭其禍是知春秋諸侯之壇又非祀方明之壇比也但春秋諸侯作壇以為舍而已其去司儀之禮意愈逺矣故杜氏注云諸侯至敵國郊除地封土為壇以受郊勞詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓鄭康成曰王既祀方明諸侯上介皆奉其君之旗置于宫乃詔王升壇諸侯皆就其旗而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上賈氏曰皆明堂位周公朝諸侯之禮黃氏曰所謂覲禮不下堂而見諸侯蓋此時也諸侯旅見不為賓主春秋傳曰朝以正班爵之義帥長幼之序可見於此鄭謂四時之朝皆如是則不然今覲禮自天子為宫以前皆秋覲也無禮山川丘陵事又鄭言既祀方明王升壇見諸侯亦與覲禮不同疏家謂王降壇揖諸侯尤誤覲禮自至郊王使人用璧勞秋覲也自諸侯覲于天子為宫時會殷同也鄭注亦然賈氏曰詔告也謂諸侯各就位立王在壇亦立司儀乃告王降壇南面見諸侯乃揖之鄭鍔曰乃若王則無時而不南鄉鄭康成曰王揖之者定其位也庶姓無親也土揖推手小下之也異姓昏姻也時揖平推手也天揖推手小舉之李嘉會曰上揖不舉手起就地揖之時揖則略舉手起而後至地天揖則髙揭手起而後至地王昭禹曰庶姓諸侯異姓同姓則王之親也異姓親於庶姓同姓親於異姓故其揖之儀有隆殺如此鄭鍔曰諸侯之中有庶姓有異姓有同姓王揖之之儀欲適中故有土揖時揖天揖之殊土揖者猶今人俯而致恭其手至地也時揖者不高不下適乎中正如天道之運平分而為四時也天揖者天位乎上舉手揖之舉而上也土揖者卑而致恭也時揖者得禮之中天揖者尊而不屈也劉執中曰土揖庶姓致恭于賢也時揖異姓平見姻族也天揖同姓覆庇其宗也土所以養育之時所以生成之天所以蓋冒之王者接下思恭禮一而已今於庶姓則土揖而俯身於異姓則時揖而直身同姓則天揖而仰其身揖以成禮而有三等之殊恐非待下之道先儒謂此司儀詔王降壇揖諸侯直據揖之儀容從下至高耳由此言之三成之壇三姓之位而有王三揖之殊殆因壇之高下而為此上下之節歟司士治朝之儀孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右者待羣臣之禮也此則待諸侯於壇坫之上各辨其等故與之異也及其擯之各以其禮公於上等侯伯於中等子男於下等鄭康成曰謂執玉而前見於王也擯之各以其禮者謂擯公者五人侯伯四人子男三人上等中等下等者所謂奠玉處也壇三成深四尺則一等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺歟賈氏曰上二丈四尺為堂王立之處并祀方明之所王氏詳説曰每等兩廂各丈二尺以為諸侯奠玉之所共九十六尺矣諸侯各以其等奠玉降拜升成拜明臣禮也既乃升堂授王玉賈氏曰公奠玉於上等降拜於中等侯伯奠玉於中等降拜於下等子男奠玉於下等降拜於地及升成拜皆於奠玉之處王氏詳説曰此以爵之尊卑而為之等殺也會同受贄受享一皆於壇黃氏曰此行朝禮鄭以執玉前見王是也覲禮四傳擯蓋王升壇諸侯位在壇下王擯四旁傳擯無所特為也此則各有擯為賓主故曰及其擯之及及此時也司儀掌九儀賓客擯相之禮蓋不獨指會合諸侯時當時在國朝享禮食通掌之大行人朝位賓主之間九十步七十步五十步擯者五人四人三人是為上中下等鄭言壇之奠玉處非其將幣亦如之其禮亦如之鄭康成曰將幣享也鄭鍔曰既奠玉則拜而獻其國之所有以為幣其獻也亦於其等故曰亦如之已將幣則王祼以鬱鬯其祼而禮之亦各於其等故曰亦如之黃氏曰三享再祼一祼酢不酢已見大行人大行人掌其禮籍司儀掌擯相以詔儀容辭令揖遜之節而已亦如之言擯者各以其禮亦如上三等也鄭言將幣三等亦謂壇三成恐非疏家遂證成之將幣當時在廟此所謂壇壝宫也始合升壇見諸侯謂之覲遂行朝享之禮雖其詳不可考至若因壇三成為三等則必不然當時在廟其禮亦三等王燕則諸侯毛鄭鍔曰朝享已畢王燕之以示慈惠則擇髮鬚之白者坐乎上所以明貴老之禮朝禮尊尊行人言享禮會禮而不及燕此特言燕者蓋國之正禮有享有食則有燕可知此則會於國中之寢以示恩也燕禮親親上齒而言毛者血氣衰則毛髮變貴老之禮宜以齒為高下今以燕而尚恩故唯以老而髮之變異者為上人亦有早衰而髮先白者亦有年高而髮尚黑者若只取其毛髮之變者而尊之則早衰而髮白年尚未及者或在年長者之上矣余以為諸侯之毛亦以齒為上黃氏曰當諸侯之入王為之朝禮而貴貴之教寓焉為之燕禮而老老之教寓焉其朝也公於上等侯伯於中等子男於下等各以其禮擯之貴貴也其燕也公三燕侯伯再燕子男一燕各以其齒坐之老老也貴貴者禮也老老者仁也賢賢者義也爵也齒也德也同為天下之達尊而仁於天下也尤不可食頃廢焉故四代之燕或貴爵或貴德或貴齒或貴親各從其所貴而加之然不以爵之尊卑德之小大為之序者序齒而已尚齒仁也尚老又其仁之至也凡諸公相為賓鄭鍔曰此記諸侯國之禮儀也諸公相為賓客者謂其爵同為公者相與交際而為賓主也主國五積音漬三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送鄭鍔曰積以供其費用其數五鄭康成曰賓所停止則積賈氏曰積若遺人云五十里有市市有積是也問以問其間闊其數三此二禮皆三辭易氏曰示不敢當也鄭康成曰辭其以禮來於外也然後拜受欽其供給之惠與欽其問訊之禮鄭康成曰積問不言登受之於庭不登堂也鄭康成曰旅讀為鴻臚之臚臚陳之也賓之介九人使者七人皆陳擯位不傳辭也賓之上介出請使者則前對位皆當其末擯焉賈氏曰先鄭以旅擯與交擯同之後鄭不從者此臣禮云旅擯下文主君郊勞交擯三辭明其别旅直陳擯介不傳辭命交則一往一來傳辭也鄭鍔曰致積致問之際賓主皆旅擯之禮旅擯者不上下相傳直賓及上擯相對而語不交擯也兩君相見則交擯此特使卿大夫致之臣道卑直對之可也賈氏曰再勞者一勞在境一勞在逺郊皆使卿其近郊勞當主君親為之也王氏詳説曰諸侯於天子小行人逆勞于畿大行人勞于逺郊及近郊至於國天子館之而已至於諸侯之相為賓則境勞與逺郊勞使卿近郊則主君也案此司儀先三問再勞然後繼之以主君郊勞是已然鄭氏必知其再勞使卿者以聘禮遣卿行勞禮勞臣以卿則勞君以卿也明矣此勞之所以少異鄭鍔曰或使卿或使大夫皆三辭者辭其勞也於逺不敢當也鄭康成曰三揖謂庭中時也鄭鍔曰三揖者入門揖當曲揖當碑揖也登登堂也拜受受其勞也李嘉會曰再勞必有幣下拜於堂而登受之拜送送其使還也王昭禹曰勞禮重於問禮非特拜受而已於使臣之旋也又從而拜送之易氏曰重主君之命鄭康成曰此從來至去之數如此主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜鄭鍔曰賓至近郊則主君親出郊而勞之於是有交擯之禮賈氏曰交擯者主君至郊郊有館舍賓在內主君至館大門外主君北面而陳此九介去門九十步東面賓在大門內於門外之東亦陳九介西面不陳五擯者非主君從賓禮故也賓陳九介主君於門外陳五擯上擯傳辭與承擯承擯傳與末擯末擯傳與末介末介傳與承介承介傳與上介上介傳與賓賓又傳與上介上介傳與承介承介傳與末介末介傳與末擯末擯傳與承擯承擯傳與上擯上擯入告謂之交擯即疏説諸交擯者例當如是擯已傳辭乃三辭其君之勞而不受賈氏曰賓辭主君以禮來于外也辭不獲已賓乃乘車出門以逆主君拜主君之辱而臨已賈氏曰三揖即聘禮入門當曲當碑為三揖鄭康成曰三辭重者先辭辭其以禮來於外後辭升堂王昭禹曰三揖所以致恭三辭所以致謙然後拜受幣也賈氏曰拜受賓再拜乃受幣也主君亦當拜送不言文省也鄭鍔曰受勞訖乃出車以送主君三還而辭之乃再拜而别賈氏曰車送者賓乘車出門就主君若欲逺送之三還辭之再拜者賓見主君辭遂再拜送主君也鄭康成曰車送迎之節各以其等則諸公九十步立當車軹也致館亦如之鄭康成曰館舍也鄭鍔曰客至而後館君又以禮親致之其禮亦如郊勞也王氏詳説曰諸侯之於天子其館之也初無所致賜舍而已至諸侯之相為賓則有致館之禮焉案覲禮云賜伯父舍賈氏以為言賜舍者天子尊極所使者司空歟但使人以命致之初無束帛而侯氏受館猶儐使者用束帛乘馬所以尊王使也致命以館者司空也視館者又小行人也此司儀云致館亦如之繼於主君郊勞之後是知其君親致也然鄭氏必知其大夫授之者以聘禮大夫帥至館卿致之耳但聘禮以大夫授館於臣此諸侯相賓既親致館則其授館當使卿也明矣此館之所以少異也致飱如致積之禮鄭康成曰飱食也小禮曰飱大禮曰饔餼鄭鍔曰賓已入館乃致小禮謂之飱飱夕食也言其微而寡也其禮與始來致五積之禮同蓋遣大夫故三辭拜受旅擯而已王氏詳説曰鄭氏必知其致積致飱使大夫者以聘禮使宰夫朝服設飱而積視飱牽耳但聘禮以大夫致積致飱於其臣此諸侯相賓君既親致餼與夫送其飱積使卿也明矣此致之所以少異也及將幣交擯三辭車逆拜辱賓車進答拜賈氏曰幣即圭璋也王昭禹曰將幣賓享主君也鄭鍔曰及廟中將幣必交擯主君三辭其將幣之禮乃出車而逆之拜其辱賓車進而答拜君之迎已也賈氏曰交擯三辭車逆拜辱賓車進答拜此並在主君大門外王氏詳説曰主君郊勞之時有車逆拜辱之事將幣之時又有車逆拜辱之事車送拜辱其字雖同其理亦異此又所以見賓與主君之迭為賓主也方其勞於郊則賓為主人而主君為賓矣是賓以主人之禮車逆主君而拜其辱者辱其主君之逺出耳及其將幣於廟則主君為主人而賓為賓矣是主君以主人之禮車逆其賓而拜其辱者辱其賓之逺來耳三揖三讓項氏曰主君三揖賓三遜楊謹仲曰公朝於天子之禮去門九十步今司儀乃諸公相為賓而注言相去九十步揖之使前則是君臣之分非敵國之禮也既言車逆拜辱賓拜答拜則賓主相拜不應在九十步之外蓋三揖者讓行也三讓讓入門也及廟後三揖者讓分左右也每門止一相及廟唯上相入鄭康成曰相謂主君擯者及賓之介也謂之相者於外傳辭耳入門當以禮詔侑也鄭鍔曰每門至一門則止止謂絶行在後至祖廟則唯上相入以其詔相禮事不可止也賈氏曰每門止一相者既入門回面東至祖廟之時祖廟西仍有二廟以諸侯五廟始祖廟在中兩廂各有二廟各别院為之則有二門門傍皆有南北隔牆隔牆皆通門故得有每門也上相入者即上擯上介上介隨君後與大夫士介為鴈行於後知不全入而為絶行在後者以聘禮介皆入廟門門西北面西上故知此君介亦入門門西北面西上故云絶行在後後亦入廟也王氏曰每門止一相則為將致敬于廟及廟唯上相入則致敬故也賓三揖三讓登再拜授幣賓拜送幣賈氏曰三揖者亦謂入門揖當曲揖當碑揖也云三讓登者至階主君讓賓賓讓主君如是者三主君先升也楊謹仲曰此三揖讓分左右也主人入門而左客入門而右客若降等則就主人之階主人固辭然後客復就西階此所以至於三揖也三揖則讓登也曰登而先言再拜受幣後言賓拜送幣則是三讓之後主人先登而賓後登可知矣黃氏曰賓讓讓不敢登若將於堂下成禮焉既登主人再拜拜賓至賓始授幣主人受賓乃拜送幣言賓拜者見上為主人拜也鄭改授為受不必王昭禹曰不曰受而曰授者以主君於賓授幣則拜而受之賈氏曰賓拜送幣者賓既授乃退向西階上北面拜送幣乃降也王昭禹曰主君拜授幣尊其所享賓拜送幣致敬於所享也總論王氏詳説曰五積三問言三辭而不言三揖再勞郊勞言三揖而不言三讓及將幣言三辭於車逆拜辱之時言三揖三讓於每門止一相之時又言三揖三讓於登再拜受幣之時鄭氏以前所謂三揖者謂相去九十步之間揖之使前賈氏以後所謂三揖者謂入門揖當曲揖當碑揖二家之説最得禮意矣蓋車逆之後則是未入廟門也其所以為揖者在賓主朝位之間耳得不以揖之使前為説乎是此三揖謂揖之數有三也得揖使前之後則是巳入廟門也其所以為揖者在門在曲在碑之間耳得不以揖之使入為説乎是此三揖謂揖之處有三也是字雖同而理則異也事異則曰辭事同則曰讓於每門止一相而言讓者謂同乎入門而必讓也於登再拜受幣而言三讓者謂同乎升堂而必讓也豈非事同而曰讓乎乃若五積三問則曰三辭謂辭其積之與問也再勞則曰三辭謂辭其勞之致幣也主君則曰三辭謂辭其以禮來於郊也拜受則曰三辭謂辭其升堂受勞也將幣則曰三辭謂辭其以車逆於廟門之外也車送則曰三辭謂辭其以車送於廟門之外也辭讓兩字對文則然散文則否記曰不辭讓而對非禮也每事如初鄭鍔曰賓送幣於主君則再拜而送之每送幣其禮皆同謂之每事者蓋有三享故也黃氏曰案國客授幣不云每事如初之儀疑享禮皆當出而復入祼亦然春秋傳晉侯出入三覲王享禮命之宥其節亦如此故言每事如初正謂享也鄭康成曰謂享及宥賓音擯亦如之黃氏曰鄭以賓當為擯國客賓使者亦為擯上於下為禮敵為擯此謂灌恐是然賓以賓客之禮相待遇為義如五州為鄉使之相賓是也雖不改字亦通王氏詳説曰諸侯於天子天子再祼而酢所以禮於上公也一祼而酢所以禮於侯伯也一祼不酢所以禮於子男也其祼之也則以禮為言諸侯之相為賓其祼之也則以擯為言蓋於主曰禮於敵曰儐禮器云諸侯相朝灌用鬱鬯是諸侯之有灌禮也不曰禮而曰儐者案聘禮云賜伯父舍侯氏再拜稽首受儐之束帛乘馬是侯氏之禮於天子使者曰儐其相禮則亦曰儐也明矣此祼之所以少異也鄭鍔曰儐亦三揖三讓易氏曰謂儀容辭令揖遜之節皆如將幣之禮及出車送三請三進再拜賓三還三辭告辟音避鄭鍔曰及朝享畢而出主君以車送賓則三請於賓請留而勿行也一説請賓登車已以車送也賓不敢留主君一進進至於三則賓出亦逺矣乃再拜而送之賓見主君之一請則一回車而辭之三辭告辟言已當去不敢留也王昭禹曰凡言三讓三辭三避者有所不敢進則讓有所不敢受則辭有所不敢當則避致饔餼還圭饗食致贈郊送皆如將幣之儀王昭禹曰熟食謂之饔可食之物生氣存焉謂之餼鄭鍔曰致饔餼者盛禮也飪一牢腥二牢餼二牢則親往致之王昭禹曰還圭謂賓享主君用圭以將意畢則還其圭於賓也鄭康成曰聘以圭璋禮也享以璧琮財也已聘而還圭璋輕財而重禮鄭司農曰公子重耳受飱反璧饗以飲為主食以食為主致贈謂賓去而贈以財也郊送謂主君躬送賓至于郊也其逆送揖讓辭受之節皆如將幣之儀鄭康成曰此六禮者惟饗食速賓耳其餘主君親往親往者賓為主人主人為賓君如有故不親饗食則使大夫以酬幣侑幣致之王氏詳説曰諸侯之於天子致積致飱則使大夫致饔餼還圭與夫致贈郊送則使卿諸侯之相為賓則致飱致積使大夫致之而已其致饔餼與夫還圭贈送則皆親往焉案聘禮云君使卿歸餼又云君使卿還圭于館夫遣卿歸餼還玉於諸侯之臣則於其君必親往矣此司儀以致饔餼還圭饗食致贈郊送如將幣之儀正所以見其有三辭三揖之禮豈非親往乎賓之拜禮拜饔餼拜饗食鄭司農曰賔之拜禮者因言賓所當拜者之禮所當拜者拜饔餼拜饗食鄭鍔曰主君致禮其盛有六賓所以謝之者唯謝其至重之禮而已饔餼饗食皆為禮之盛賓將去則謝此三禮耳其餘還圭致贈之類不必謝也賓繼主君皆如主國之禮鄭鍔曰先鄭以繼為復主君之禮康成以主人禮費既多非賓所能復改繼為儐儐者報也擯之者主君郊勞致館饔餼還圭致贈郊送之時主君親至賓為主人主人為賓故必儐之也謂報為儐者敵者曰儐故也儐之之禮與主國同欲無加於主人而已然有改字之嫌不必改可也易氏曰先王制禮有施有報而施報亦有輕重之辨惟其有施有報此賓所以有繼主君之禮惟其施報之欲稱此賓之報不能如主君之禮特如王國之禮蓋主君使卿勞賓於境必為致幣故有拜受之禮其致幣雖無明文以覲禮考之賓至于郊王使人皮辨用璧勞此天子勞賓之禮則知諸侯勞賓亦以幣此所謂主國之禮豈有往來交際而復其禮費如市道之交者耶鄭康成曰禮者謂玉帛皮馬諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀鄭鍔曰侯伯子男相為賓各以其禮從其命數之高下因其國之小大所用之物不與諸公同賈氏曰五等諸侯以命數分為三等其圭璋饔餼飱積步數擯介皆降殺備於大行人掌客若夫揖遜辭受之儀無以異焉蓋禮以定名分儀者交際之容而已諸公之臣相為國客鄭康成曰謂相聘也鄭鍔曰此記諸侯之國諸臣之禮儀也公國之臣來聘公國相與為客故曰相為國客君尊故以賓言之而曰相為賓臣卑故以客言之而曰相為客王氏詳説曰上言諸公此言諸公之臣皆舉公以見諸侯伯子男耳玉人云瑑圭璋八寸璧琮八寸以俯聘是舉上公之臣耳上公以九為節而臣降其一舉其上以及其中下也則三積皆三辭拜受王昭禹曰諸侯五積其臣下其君二等故三積賈氏曰三積謂在道之禮於路館致之亦有束帛致之鄭鍔曰客始至則三積皆三辭然後拜而受之不言登受者受之於庭也賈氏曰知受之於庭者上諸公即云登登謂登堂此不云登故也總論王氏詳説曰諸公之臣為客與諸公為賓其勞其問其積其享其食其牢禮其朝位賓主之步又有大異上公言積言問而此言積不言問非不問也主君於將幣之後而問聘者之君及其大夫耳案聘禮云及大門內公問君賓對公再拜是已故此下文云出及中門之外問君蓋廟有中門有大門中門之外即大門之內也若夫侯伯之臣則又不致積矣以其聘禮主侯伯之臣為言而初無積事也夫豈無禾米薪芻但無以束帛致之耳侯伯之臣如此子男可知及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賈氏曰案聘禮此亦近郊勞之也王氏詳説曰上公於再勞言主國於郊勞言主君此言大夫郊勞者蓋上公近郊勞逺郊勞皆使卿大夫諸公之臣則使大夫及士耳案聘義君使士迎于境大夫郊勞則是主君不親勞也上公之臣如此侯伯可知鄭鍔曰及遣大夫來而郊勞則行旅擯之禮黃氏曰案諸公相為賓敵則交擯不敵則旅擯大夫雖敵亦旅擯不敢擬於君也後鄭謂旅擯皆陳擯位不待傳辭恐是但不必改旅為臚諸公之臣初為國客廟中將幣旅擯亦為不敵也諸公相為賓大夫再勞不擯主君將親勞大夫不陳介客亦不陳也臣為國客積亦不擯案掌訝委則致積是則國客不遣使也國客大夫郊勞旅擯主君不出使者代君陳介而致之也其義恐當如此王氏詳説曰上公於積問言旅擯於將幣言交擯於郊勞將幣皆言旅擯而積又不言擯者又所以見其禮之殺也然案聘義介紹而傳命則是交擯乎曰非也謂賓來至末介下對上儐傳本君之命也非謂得傳其巳之辭也上公之臣如此侯伯可知鄭鍔曰三辭不敢受勞而拜其辱也賈氏曰三辭拜辱者賓從館內出於大門拜使者辱命來於外也王昭禹曰公車逆拜辱故臣則拜辱而不以車賈氏曰三讓讓升堂也登堂聽使者傳主君勞問之命王昭禹曰聽命既畢於是下堂而拜然後登堂而受主君之命鄭鍔曰又登而受其郊勞之幣也聽命受幣皆登堂尊主君之命而致敬也王氏詳説曰上公言再勞三辭三揖登拜受而此言登聽命下拜登受者蓋上公受勞於堂而拜受於堂上公之臣受勞於堂聽命之後下拜於庭然後登而受之若夫侯伯之臣則又受勞於庭矣案聘禮賓揖至門內勞者致命則不受勞於堂也侯伯之臣如此子男可知矣賓音儐使去聲者如初之儀及退拜送鄭康成曰賓當為儐勞用束帛儐用束錦賈氏曰使傳命訖禮畢出門賓以束帛儐使者如初行勞時之儀前賓受幣今使者受幣受幣雖異威儀則同敬主君使也鄭鍔曰使者退而去則客拜而送之致館如初之儀易氏曰案聘禮賓至使大夫帥至館卿致館其旅擯以至登受亦如郊勞之禮王氏詳説曰上公言致飱如致積此不言致積者蓋上公之臣三積夫豈不致積哉但積視飱牽上言致積所以見其致飱也上公之臣則不復致飱矣非無飱也但設而不以束帛致之耳案聘禮宰夫朝服設飱又云飱不致賓不拜不致則不拜矣言侯伯之臣飱不致舉其中以見上下也及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入賈氏曰將幣亦謂圭璋也鄭鍔曰將幣所以享主君也旅擯三辭亦謂於主君大門外主君陳五擯客陳七介不傳辭也鄭鍔曰客臣也故不交擯不敢敵主君也三辭者辭主君以大客禮當已也拜逆客辟者主君遣上擯納賓賓入大門主君在大門內南面拜賓鄭鍔曰三辭其將幣之禮辭不獲已則拜而逆客也以使者奉君命來不敢當拜故逡巡避君拜也鄭鍔曰客不敢當主君之逆則退而辟之王氏詳説曰上公言車逆拜辱賓車進答拜此言拜逆客辟者蓋上公有車逆之禮上公之臣則拜逆而已上公有答拜之禮上公之臣則辟而不答拜不敢當主君之尊也案聘義君拜逆于大門之內而廟受北面拜貺拜君命之辱是拜聘君也非拜使者也故拜逆拜受拜問君拜問大夫皆辟而不答拜者亦猶聘禮賓再拜勞不答拜與禮有不答拜者不同等也賈氏曰三揖者亦揖之使前鄭鍔曰客進而入門則三揖賓主各有介每門各止一相及行禮則唯主君之介入客之相者不入所以然者客臣故也既以臣道自處故不敢用相嫌與兩君相敵也王氏詳説曰上公言每門止一相及廟唯上相入此言每門止一相及廟唯君相入者蓋上公九命上公之臣則七介上公之上介使卿上公之臣上介使大夫上相即上介也案玉藻君入門介拂闑大夫中棖與闑之間士介拂棖公事自闑西私事自闑東鄭氏謂棖門楔也君入必中門大夫士介鴈行於後示不相沿也君若迎聘客擯者亦如之唯君相入則是已之上相不鴈行而入也三讓客登拜客三辟授幣下出每事如初之儀賈氏曰三讓客登者主君與客俱登此據客而言之也拜客三辟者主君於阼階上北面拜賔喜至此堂并拜受幣客三退負序不敢當君拜也王昭禹曰三辟主君之拜然後以君命授幣於主君也授幣既畢則下堂而出易氏曰所以異於諸公之拜送幣者不敢當主君也鄭鍔曰謂之每事事事皆如初之禮文也鄭康成曰每事享及有言王昭禹曰亦與諸公拜送幣之後言每事如初同也及禮私面私獻皆再拜稽首君答拜賈氏曰此三者皆於聘之日行之故并言之吕氏曰聘禮賓卒聘事請覿擯者入告出辭乃請禮賓宰夫徹几致筵公出迎賓入拜送醴此君親禮賓也賈氏曰聘禮禮客用醴齊異於君鬱鬯賓卒聘事奉束帛請覿所謂私覿也賓朝服問卿既致命出賓面如覿幣所謂私面也君命未致使臣不敢以私見其君及其卿卒君事乃得申其私敬也私覿見其君私面見其卿也或有以私面為見君者蓋别而言之則有見君見卿之别此篇及聘禮所云私覿私面是也離而言之則私面即私覿亦可為見君如司儀諸公之臣相為國客私面私獻楚公子棄疾見鄭伯以乘馬八匹私面於君是也王氏詳説曰私覿私面之幣皆其已物者以聘禮惟有君夫人聘享及問大夫聘之幣付使者之文不見有付賓介私覿私面之幣至於贈幣如其覿幣聘禮所謂賓將行舍于郊公使卿贈如覿幣使下大夫贈上介亦如之使士贈衆介如其覿幣還以至本國陳幣于朝則上賓之公幣私幣皆陳上介公幣陳他介皆否此所以知聘者之私覿私面其幣皆其已物也鄭鍔曰或謂聘有私覿而郊特牲云朝覲大夫之私覿非禮者何耶余以為與君偕來之時君方有朝覲之事而大夫行私覿之禮則是外交也是故不敢私覿所以致敬也若夫國君遣臣來聘則得以私覿故孔子曰私覿愈愈如也而左傳言楚公子棄疾見鄭伯以其良馬私面也不曰私覿而曰私面者聘禮注云謂之面威儀質也或者謂於君謂之覿卿謂之面不知此言私面而下文有君答拜之文則非卿謂之面矣棄疾見鄭伯亦謂之面或説非也鄭鍔曰禮也私面也私覿也凡兹三禮皆再拜稽首以致敬主君答之以拜不敢以臣道受之也王氏詳説曰禮家臣不稽首所以辟君也至於見外國之君則如其君九拜之禮一曰稽首二曰頓首三曰空首臣之拜君則稽首君之答拜則空首此再拜所以異於上公也王氏曰君答拜則不稽首以主君而客臣故也出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟鄭康成曰中門之外即大門之內王昭禹曰出及中門之外然後問君問大夫勞客者以在廟授幣方致敬焉未可遽問而勞之也李嘉會曰前之將幣皆是介擯傳辭未及相親今既私面則相親矣故可問君問大夫鄭康成曰問君曰君不恙乎對曰使臣之來寡君命臣于庭問大夫曰二三子不恙乎對曰寡君命使臣于庭二三子皆在勞客曰道路悠逺客甚勞勞介則曰二三子甚勞賈氏曰此未知所出或曰孔子聘問之辭問君客再拜對者為敬慎也鄭鍔曰再拜而思所以對蓋未對也君答之也客於君拜之時乃辟君拜而對其所問也主君問其國之大夫客即對之不須再拜與辟也大夫卑於君故直對其問也主君勞巳跋涉之勞謙不敢當其問故再拜稽首以致謝明其感戴之深也主君答其拜客趨而辟之不敢當主君也致饔餼如勞之禮饗食還圭如將幣之儀鄭鍔曰致饔餼如勞之禮饗食還圭如將幣之儀此四者皆盛禮也然致饔餼則如郊勞之禮者以其不比國君為賓而饔餼之盛故也郊勞行禮而已賈氏曰同使卿威儀進止饗食還圭則如將幣之儀者與上文將幣儀同以其饗食大禮也圭者彼國之君所執以致聘之物故禮如將幣敬其君之意也鄭康成曰饗食亦謂君不親而使大夫以幣致之賈氏曰如將幣者蓋不盡如之所别如者如旅擯主人皮辨賓皮辨襲與將幣同自餘則王昭禹曰如將幣之儀者饗食還圭其禮重於饔餼可也王氏詳説曰上公致饔餼還圭饗食致贈郊送皆如將幣之儀至上公之臣則致饔餼如勞之禮謂以大夫致之君不親致也饗食還圭如將幣之儀亦謂以卿致之君不親致也然言如將幣者但郊勞其禮簡將幣其禮詳耳案聘禮云君使卿還玉于館又案聘禮云公於賓一食再饗上介一食一饗若不親食致之以侑幣致饗以酬幣然還玉使卿而饗食亦有親與使人致耳此致饔餼饗食之異於上公也君館客客辟介受命遂送客從拜辱于朝鄭康成曰君館客者客將去就省之盡殷勤也鄭鍔曰客不敢當主君之親臨故辟之而使介受其又問之命主君因此遂拜以送客也客即從君之後至朝而拜謝君之有送已李嘉會曰館客者留客也親受其命而不留幾於與主君抗故辟而使介受命從其後拜君之辱於朝王氏詳説曰上公致贈郊送皆君親往焉上公之臣則因其將去就館以送之而已明日客拜禮賜遂行如入之積鄭康成曰禮賜謂乘禽鄭鍔曰既有饔餼饗食之禮矣又有乘禽之賜者加恩惠也於君拜辱之明日客又親至朝而拜加惠之禮賜謂其待已有加而無已故也既拜其賜即行焉不復留也主君於其去又致積焉如始入之數賈氏曰入與出皆三積也蓋芻薪米禾之類不可一日缺也所以知禮數為乘禽者聘禮云賓三拜乘禽於朝以此知之黃氏曰賓之拜禮拜饔餼拜饗食賓敵有拜有不拜且有繼禮此拜禮賜臣不敢敵君皆當拜直曰禮賜於其行也而拜之李嘉會曰國君將去則有致贈郊送今止曰客拜禮賜遂行亦無郊送之禮者前將君命待之不可忽君命既將則臣也待之不可過如入之積則三積也王氏詳説曰禮大夫不饗君謂不敢與君抗禮也至於使外國亦如其禮諸侯之於諸侯則賓繼主君如主國之禮但無積問飱勞之禮耳此無繼主君之禮所以異於上公也凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之鄭康成曰爵卿大夫士也李嘉會曰以爵相為客足矣何必以其國之爵國有小大子男之卿僅可當公國之士故不止曰爵必以國之爵言也鄭鍔曰凡侯伯子男之國其臣相為國客皆以其爵命高下為禮若夫見於揖遜之間儀容則與公國之臣同故曰其儀亦如之凡四方之賓客禮儀辭命餼牢賜獻以二等從其爵而上下之鄭鍔曰禮儀見於形貌王昭禹曰禮儀所以相接辭命見於答問王昭禹曰辭命所以相與餼牢者禮之常也王昭禹曰牢禮之屬賜獻者禮之加也王昭禹曰禽獻之屬以二等從其爵而上下之者視其爵之尊卑而降殺以兩也賈氏曰上經之爵鄭以卿大夫士三等解之此云二等即大行人下其君二等大夫士降殺以兩也從其爵者以三等降殺從三等而為之也黃氏曰九儀公侯伯子男其命五孤卿大夫士其爵四其待賓客之禮公侯伯子男為三等至邦交不以命而皆以其爵為二等諸侯敵也與天子自應不同凡賓客送逆同禮王昭禹曰來則逆之而有問勞之儀去則送之而有贈送之禮如一而已易氏曰逆非止於郊勞凡有以奉其來者皆是送非止於郊送凡有以厚其往者皆是始終如一禮主乎敬也凡諸侯之交各稱其邦而為之幣以其幣為之禮鄭鍔曰諸侯交際之禮視國之大小報復之禮因物之重輕交大國則其幣以多為貴交小國則其幣以少為貴是之謂稱若夫待其使者亦視其幣之多寡而為豐殺疏謂此乃享幣非圭璋璧琮也賄用束紡所以遺聘君可以為衣服之用禮用束帛所以禮聘君而報其享焉王昭禹曰各稱其邦而為之幣者稱其邦之大小而為幣之隆殺以其幣之隆殺為禮之厚薄也如是則賓之所以繼主君而主君所以禮賓者皆無過不及矣凡行人之儀不朝不夕不正其主面亦不背客鄭康成曰謂擯相傳辭時也鄭鍔曰凡行人者司儀掌客上所言者皆賓客之禮儀也而又掌大小行人之儀為行人者當其相禮則不可向東亦不可向西亦不可向南亦不可向北常視賓主小前郤隨機旋轉不常厥處東方之明而日出為朝朝東也日入於西為夕夕西也主南面不正其主面謂不正如君南面也客答君而北面不背客謂亦不正向北也周禮訂義卷六十八
