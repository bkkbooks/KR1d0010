body:
  text: 周禮訂義卷三十四宋王與之撰司尊彞下士二人府四人史二人胥二人徒二十人薛平仲曰鬱鬯所以實尊彞而陳之則尊彞不可以不備鬱鬯所以涖几筵而灌之則几筵不可以不設此二者各有司存然鬱鬯之和人為之功雞人呼旦人事之警誠敬於是乎至矣彼六尊六彞有定用五几五筵有定制名物用事隨其宜而共奉之是亦足矣故前之三職則曰人而此之二職則曰司而命名之義著矣鄭鍔曰祭祀之禮用鬯以祼用齊酒以獻是以用尊彞之器尊以盛五齊三酒彝以盛鬱鬯尊則非惟宗廟用以獻且上及於天故名曰尊彞則常用以祼故名曰彝彝之為言常也鄭康成曰彝法也言為尊之法也祼在室而求諸隂獻在堂而求諸陽其器雖粗而可陳其義雖微而難知司尊彝之官司其器而已陳氏曰先儒謂尊實五升彝實三升此雖無所經見然彝祼而已其實少尊則獻酬酢焉其實多此尊所以大於彝歟掌六尊六彝之位詔其酌辨其用與其實王昭禹曰六尊自獻尊至山尊六彝自雞彝至蜼彝鄭康成曰位所陳之處賈氏曰若禮運云𤣥酒在室醴盞在户之類酌泲之使可酌各異也用四時祭祀所用亦不同鄭鍔曰辨其所用之宜則尊之所盛者必用以獻彝之所盛者必用以祼實鬱及醴齊之屬鄭鍔曰辨其所實之物則鬱鬯以實彝不可實於尊齊酒以實尊不可實於彝王昭禹曰先言掌六尊後言掌六彝尊卑之序也至於祠禴蒸嘗追享朝享皆先彝後尊則所用之序鄭鍔曰此言六彝六尊冪人乃有八尊以盛五齊三酒何也若五尊盛五齊則一尊常無用若以罍盛三酒則不應謂之八尊蓋尊與罍分而名之則不同合而言之則謂之尊耳春祠夏禴祼用雞彝鳥彝鄭康成曰祼用圭瓉酌鬱鬯始獻尸也后於是以璋瓉酌亞祼郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後出迎牲致隂氣也賈氏曰鄭引郊特牲證祼以鬱鬯之用圭璋也又云既灌然後迎牲謂后亞王祼後王乃迎牲也此注云后亞灌後王乃迎牲與內宰注不同內宰取王事自相亞其實以司尊彝為正鄭鍔曰祼獻必用彝尊非苟以為盛鬯齊之器而已各因時而用之時不同則器不同各因時以明義也鬯必盛以彝春祠之彝則飾以雞雞東方之畜歲起於東於時為春也王昭禹曰春者時之始而雞以其司晨而木之屬故用雞彞夏禴之彝則飾以鳥鳥鳳也書曰我則鳴鳥不聞指鳥為鳳夏為文明而鳳具五色文明之禽也王昭禹曰夏於五行為火而鳥火屬也故用烏彞王祼矣后亞之故用二彝王酌其一后酌其一皆有舟鄭康成曰皆有舟皆有罍言春夏秋冬及追享朝享有之同鄭鍔曰尊之有罍備齊酒之乏彝之有酒豈不備鬯之乏乎舟之制陸佃謂如今世酒船之類酒船喻舟其義甚著鄭司農曰若今時承槃但今宗廟中尊罍無此制度耳易氏曰考之禮制彝受三升尊受五升罍受一石鄭氏謂舟為尊下臺故禮家不言所受此不必論大槩舟之為物量其所受有濟物之利受過其量有沈溺之害靁之為物應時而動有澤物之利動不以時有浸淫之患知舟罍之戒則知先王設尊罍之意其朝踐用兩獻尊其再獻用兩象尊愚案此即九獻之禮已見籩人薛氏曰祼者所以求神於隂而禮之也二祼之後有朝事饋食與夫卒食所以備九獻而二祼則不與焉朝踐以薦腥為主王酌醴齊而始獻后亞之諸臣終焉此朝踐之三獻饋食以薦熟為主王酌盎齊以始獻后亞之諸臣終焉此饋食之三獻饋食之後尸有獻酒之禮此人道之終於是有獻尸卒食之事王以玉爵后以瑶爵為一獻諸臣亦一獻此九獻王氏曰朝踐者籩人醢人所謂朝事踐指籩豆詩所謂籩豆有踐再獻者籩人醢人所謂饋食以朝事為初獻則饋食為再獻朝獻即朝踐以籩豆言之則曰踐以爵言之則曰獻相備也饋獻即再獻也以序言之則曰再以物言之則曰饋亦相備而已王昭禹曰祭祀以祼為始而􅌊蕭乃在於朝踐之後是以禮曰既奠然後􅌊蕭又曰建設朝事燔燎羶香祼然後朝踐以薦血腥禮所謂腥其爼者是已朝踐而後饋食薦以熟禮所謂熟其殽者是也祼者求諸隂故在室中而書所謂王入太室祼是也朝踐者陽饋食者隂饋食雖為隂乃所以致食味之道故其節同在於堂而禮所謂坐尸於堂又曰設祭於堂是也且人之生雜乎芒芴之間變而有氣氣變而有形形變而有生朝踐者用氣報氣而事之以天道饋食者用味報魄事之以人道今特牲少牢之禮自饋食後而尸冇飲食之禮此先王之事其親制之以死生之間者也李嘉㑹曰秋冬不曰朝踐乃曰朝獻不曰再獻乃曰饋獻春夏屬陽生長之時以氣為主秋冬屬隂物成之時以味為主故秋冬曰朝獻曰饋獻鄭鍔曰獻字本戲字誤轉為獻毛詩傳謂之犧尊犧與戲字同音奈何康成讀犧為素何切鑿為之說曰畫為牛形婆娑然甚無理春而耕耕必資牛故春之尊為犧牛之形夏用象尊者象南方之獸其形絶大時至於夏萬物豐大故夏之尊為象形既祼出迎牲而入殺牲而獻血腥始行朝踐之事用兩獻尊盛醴齊及薦熟之時謂之再獻用兩象尊盛盎齊必用兩尊者王酌其一后酌其一也陳及之曰一彝盛明水一彝盛鬱鬯一獻尊盛齊酒一獻尊盛𤣥酒所以祼用雞彞鳥彝朝踐再獻必兩尊李嘉㑹曰經文既曰春祠夏禴祼用雞彞鳥彞春夏而各用其一明矣至其下曰其朝獻用兩獻尊其再獻用兩象尊是春用獻尊夏用象尊每尊各兩尊以盛酒則特兩再秋冬所用彞每一尊用兩亦然各隨時以致義非雞彝獻尊用於春而夏兼之烏彝象尊用於夏而春兼之紛雜而無辨也明水之酒則常禮也所不必論酒正以實八尊則有𤣥酒明水合之而為八耳愚案此說祼彝儘好至說用尊處有礙經言朝踐用兩獻尊再獻用兩象尊共為四尊每獻王與后各酌其一朝踐二再獻二共用四尊可供四獻如所言春用獻尊兩夏用象尊兩何以湊成九獻之禮皆有罍諸臣之所昨也鄭鍔曰罍則為雲雷之飾陳祥道曰罍也者佇酒而給於尊者詩曰瓶之罄矣維罍之恥則罍之為器大謂之罍者有雷之象蓋雷出以時則利於物反之則為害器之為罍者警之而已記曰終日飲酒而不醉焉此先王之所用以避酒禍也尊者取其止而安李嘉㑹曰在廷之臣如此其衆每祭豈四尊所能供必有罍以副之以為諸臣所酢之備故有二是罍之副尊亦由瓶之副罍鄭鍔曰自初祼以至饋食之獻王與后各四共為八獻諸臣乃酢尸蓋不敢與王同尊故酌三酒以酢之共為九獻鄭謂諸臣酌以自酢豈有此理昨者酢也飲酒之禮百拜三行曰獻酬酢而已酢者送也故其字亦為昨有送往之義蓋酢以送尸耳何名自飲乎薛氏曰九獻之後禮節備矣為之尸者可以昨之乎彼王主祭后從王諸臣則從事於祭茍或略焉則禮節弗盡故王始獻后亞獻尸之昨亦王后先焉言諸臣之所昨豈非往反報施之禮終於此邪且行人於上公則曰王禮再祼而昨於諸侯則曰王禮一祼而昨是主獻賔而賔昨尸也夫人之生以飲食燕樂為相愛之恩以賔主獻酬為相接之文及其既亡不忍異而絶之此昨禮所以設也王受昨在戶內之東后受昨在東房之中諸臣受昨在西階之上司几筵有祀先王受昨之席則后也諸臣也亦莫不然愚案祭祀有九獻今止曰祼曰朝踐曰再獻而不及酳尸與諸臣為賔之獻者王獻尸則酌朝踐之尊醴齊后獻尸則酌再獻之尊盎齊諸侯為賔則酌盎齊外無異尊故不必言秋嘗冬蒸祼用斝彝黃彝皆有舟鄭鍔曰康成讀斝為稼謂秋者萬物揫斂之時禾稼西成故祼用斝彝以明農事之成陸佃曰春秋傳曰燕以斝耳賂齊則斝有耳黃彝者畫為黃目也人目未嘗黃龜目則黃氣之清明未有如龜者故記曰黃者中也目者清明也言酌於中而清明於外也冬者萬物歸根復命之時祼用黃彝言明於外而欲以觀其復陸佃曰雞鳥虎蜼之彝取諸物也斝耳黃目取諸身也其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也鄭鍔曰秋之時物傷於末將反其本已斂其華將取其實故其獻也用著地無足之尊王昭禹曰萬物於秋為入入為止而著有止之象故用著尊冬之時人功已成可勞享之而飲酒矣故其獻也用酒壺之尊名曰壺者收藏蓄聚之義記言君西酌犧象夫人東酌罍尊則知王與后不共尊兹其所以皆兩也凡四時之閒祀追享朝享祼用虎彞蜼彞皆有舟易氏曰司農以追享為追及其祖之所出與大宗伯之饋食同謂之禘以朝享為三年喪畢而朝於廟與大宗伯之肆獻祼同謂之祫然饋食肆獻祼列於四時之首閒祀列於其後豈得謂之祫禘又五年一禘三年一祫乃宗廟大禮豈得為四時之閒祀考之祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠墠壇有禱祭之無禱乃止去墠曰鬼釋者謂享嘗為四時之祭時祭之外親近者為祖為考每月朔朝於廟是之謂朝享親逺者為遷廟之主有禱則追祭之是之謂追享二者為四時閒祀列於祠禴蒸嘗之後鄭鍔曰先儒謂虎者西方之義獸蜼似獮猴而大其鼻上向雨則自垂於𣗳以尾塞鼻鄭康成曰蜼禺屬卬鼻長尾蓋獸之智也追享及遷廟之主世既逺矣猶不忘祭是謂尊尊尊尊至於逺祖可以謂之義彞刻以虎以其義也朝享行於祖考之廟親為近矣每月祭焉是謂親親親親不忘乎月祭可以謂之智彝刻以蜼以其智也黃氏曰亦畫蜼為飾也虎彞則畫虎也其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也王昭禹曰大尊太古之瓦尊有反本復始之意禘以義追及其祖之所自出亦以仁而反本復始故用大尊山尊畫為山形山則以仁而興利致養之意祫以養死者之所歸合食於祖廟亦以仁而興利致養故用山尊鄭鍔曰再月之祭所以安祖先之神靈故尊刻以山取其安以致養之意易氏曰四時閒祀為非常之禮始以人道求之主動終以人道事之主靜王昭禹曰春夏動之時故象以動物秋冬靜之時故象以靜物禘祫有四時之義故一以靜物一以動物易氏曰成周功成治定兼用四代之禮樂四代之樂見於大司樂之職四代之禮於此見之嘗考虎帷為有虞氏之宗彛泰為有虞之尊山罍為夏后氏之尊又夏后氏以雞彞殷以斝以著周以犧象以黃目以魯壺今於六享之閒兼用之凡六彞六尊之酌賈氏曰六彞與鬱齊為目六尊與醴齊盎齊為目下有凡酒而上不言罍者文不具也凡言酌者皆是泲之使可酌李嘉㑹曰司尊彝所言皆酌酒之事非言齊酒之清濁也其曰獻酌者摩莎泲之出其香汁而酌之明酌者茅縮而酌之涗酌者涗和清酒而酌之修酌者以水洗勺而酌之郊特牲疏云酌是斟酌鬱齊獻酌鄭鍔曰鬱鬯固非齊名曰鬱齊者泲鬱必以齊然後可酌以祼獻言用齊者明其不可用酒蓋鬱為最尊泲之以酒則近乎泄泲之以齊乃所以尊之康成讀獻為莎獻即祼獻之獻何必改字劉執中曰鬱齊惟祼用之於獻最重故曰獻酌王昭禹曰九獻之禮始於鬱齊故曰獻酌鄭康成曰禮運曰𤣥酒在室醴盞在户粢醍在堂澄酒在下以五齊次之則盞酒盎齊也賈氏曰鬱鬯尊不用三酒而用五齊中盎齊差清者和鬱鬯泲之故云涗于盞酒愚案注疏以此鬱齊獻酌即郊特牲汁獻涗于盞酒也醴齊縮酌賈氏曰醴齊濁還用事酒之清明者和醴齊然後用茅泲之使可酌故為明酌鄭鍔曰左傳所謂包茅不入無以縮酒記曰縮酒用茅明酌也正謂是也盎齊涗酌鄭康成曰盎齊差清和以清酒泲之而已賈氏曰盞酒即盎齊盎齊差清亦不言縮則不用茅愚案注疏以此盎齊涗酌即郊特牲盞酒涗于清也王昭禹曰記曰凡涗新之也又曰盞酒涗于清以盎齊色葱白而尤清故涗以酒鄭司農曰涗酌者挩拭勺而酌也凡酒修酌王昭禹曰三酒則人所飲故曰凡酒用以獻尸而尸飲焉則尤宜修治之以致其味故曰修酌鄭鍔曰修治使之明潔然後可酌鄭康成曰修讀如滌濯之滌滌酌以水和而泲之今齊人命浩酒曰滌鄭司農曰修酌者以水洗勺而酌易氏曰以修視涗則凡酒為味以涗視縮則盎酒為清以縮視鬱則醴齊為淳蓋宗廟之中始以人道求之終以神道事之愈近則愈親故爾鄭康成曰凡此四者祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒惟大事于太廟備五齊三酒王昭禹曰獻用五齊此言醴盎二齊者蓋泛齊從醴齊用於朝踐緹齊涗齊從盎齊用於饋食祭用五齊三酒者五齊最薄所以致其義三酒致味所以效其實以神事焉故用五齊以人養焉故用三酒黃氏曰案司尊彞掌器耳鬱鬯鬱人和而實之則五齊三酒之當泲者皆酒人共奉之司尊彞明其器用使世婦掌之大喪存奠彞王昭禹曰朝奠夕徹不即去焉故謂之存鄭景望曰不知神之所享弗忍徹也鄭康成曰存省也賈氏曰大喪之奠有彝尊盛鬱鬯唯祖廟厥明將向壙為大遣奠時有之奠徹之早晚無文案檀弓朝奠日出夕奠逮日則朝奠至夕徹之夕奠至朝乃徹大遣亦然大旅亦如之王昭禹曰有大故而祭亦以喪禮悲哀祈於神故亦存之不即徹鄭景望曰若曰俟神之答司几筵下士二人府二人史一人徒八人易氏曰名官以几筵而所掌者几席舉一可以例其一王氏詳說曰筵鋪於下席加於上陳祥道曰肆於地則衍而為廣者筵也加於筵則聚而為飾者席也而几則立而設之所以待尊者養老有几筵行葦詩所謂肆筵設席與夫授几者是已禮賔客有几筵肆師所謂大賔客涖筵几是已曰几筵以尊卑為序曰筵几以先後為序掌五几五席之名物辨其用與其位鄭康成曰五几左右玉雕彤漆素五席莞藻次蒲熊用位所設之席及其處黃氏曰莞筵紛純加繅席畫純加次席黼純玉几之席蒲筵繢純加蒲席紛純雕几之席莞筵紛純加繅席畫純彤几之席熊席漆几之席葦席素几之席萑席黼純同於素几此五几五席之名物疏家謂葦萑不入數鄭鍔曰几席之用不同義各有所主名以物之命以别之或用於朝覲或用於祭祀朝覲則位於廟牖之間大射則位於虞庠之中祀先王之席在廟之堂奧受昨之席在廟之西南用不同各因物明義故專設一官司而辨之凡大朝覲大饗射凡封國命諸侯王位設黼依鄭鍔曰論國家之禮事之至大者曰大朝覲大享射大封建命諸侯大朝覲非四時之常朝黃氏曰時㑹殷同也司儀所謂將合諸侯為壇者也大享射行大享之禮又與諸侯大射黃氏曰大享㑹同享諸侯也掌客所謂王合諸侯而享禮諸侯長十有再獻者也大射澤宫之射也大封建則割裂土宇而使之有國命諸侯則臨告列國之君而命之以事凡此皆大禮故儀亦異賈氏曰爾雅牖户之間曰扆於扆之處設黼黼即白黑文而為斧形此斧以大版為邸即掌次所云皇邸彼鄭注云邸後版以此斧版置於扆即以黼扆為總名據繢人云白與黑謂之黼據采色言之若據繡於物上則為金斧文近刃白近銎黑取金斧割斷之義陳氏曰剛斷者先王之所潛用非向而上之故黼依設於後席用黼設純於下衣繡黼設於中六服以黼為後其意同薛平仲曰畫斧無柄設而不用之義王氏詳說曰明堂位以黼依為斧斤之斧字者取其所畫之物言之此云黼依為黼黻之黼字取其所畫之色言之諸侯雖有黼裘用之於誓省雖有黼裳用之於助祭然初無黼依之制此所以天子之席三重有次席黼純而諸侯無之依前南鄉設莞筵紛純加繅席畫純加次席黼純鄭鍔曰王位設之依依前必南鄉設莞筵而用紛以純之加繅席而用畫以純之加次席而用黼以純之既設玉几於左又設玉几於右無非所以明義於依設黼以表王者之威斷依前必南鄉以表王者之繼明易氏曰乾位在西北白與黑為黼蓋取諸西北之乾離位在南聖人南面而聽天下蓋取之正南之離乾之體為剛故聖人依之離之用為明故聖人鄉之所設之席則莞筵莞之為物叢生水中王昭禹曰莞蒲之細者陳氏曰爾雅曰莞苻離郭璞曰西人呼蒲為莞莞小蒲席則完而用之表其德之純全用紛以為純王昭禹曰織成紛帛紛如綬有文而狹易氏曰莞則筵之清堅者紛綬以為之緣表其文采之繽紛於莞筵之上加以繅席繅者削蒲蒻展之編以五采表其有華藻之文用畫以為純畫以雲氣易氏曰繅則席之柔懦者畫雲氣以為之緣表其文也於繅席之上又加以次席次者比列桃枝之竹以為之鄭司農曰次席虎皮為席易氏曰大則席之次列成文者黑白黼以為之緣表其行事有次序之節用黼以為純又以表其威斷莞筵紛純以全體為之質繅席畫純以文采為之文次席黼純以斧形為之斷有質為本有文為飾文質備於內然後以斷行之於外故莞席在下繅席在中次席黼純在上朝覲享射封國命諸侯之時其位之所設者若是孰敢不俯伏聽命一德以尊天子乎陳氏曰席有純猶衣有緣也鄭鍔曰以書考之其設席皆以敷重席為言莞筵在地不重者也繅席次席加於筵上蓋皆重焉與莞筵為五重則與禮記之說合矣天子之席重而為五則下文諸侯之席亦重可知賈氏曰依前南面以下席三重也凡敷席之法初在地者一重即謂之筵重在上者即謂之席已下皆然故序官注云敷陳曰筵籍之曰席禮器云天子之席五重諸侯三重今此天子惟三重者五重據祫祭而言若禘祭當四重時祭皆用此三重陳氏曰王天下故席用三所以為陽竒而諸侯則地道也重一席所以為隂耦王氏詳說曰禮記所言夏商而周禮所言成周耳左右玉几鄭鍔曰左右皆設玉几表其恃德以為安項氏曰玉則其質渾陳氏曰几王之所憑以安者也王於朝覲㑹同立而不坐曲禮曰天子當依而立曰覲當寧而立曰朝明堂位曰天子負斧扆而立非有所慿也然必設几者鄭氏釋太宰謂立而設几優至尊也荀卿曰周公負依而坐諸侯奔走堂下得非所傳聞者異歟鄭司農曰顧命云成王將崩命太保芮伯畢公等被冕服慿玉几薛氏曰周禮之五几莫尊於玉几書之四几莫貴於華玉几則玉几者華玉几也祀先王昨席亦如之鄭康成曰昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內后諸臣致爵乃設席易氏曰於室中西鄉而受之非南鄉也專言昨席則無几也所同者席而已矣鄭鍔曰受酢而設席於户內皆如朝覲享射之位奉宗廟而安祖考以祭則受福故也諸侯祭祀席蒲筵繢純如莞席紛純右雕几鄭鍔曰諸侯祭祀席蒲為筵則繢繒帛以為純以莞席加於其上而設雕刻為文之几於其右蒲以見其柔從之意鄭康成曰不莞席加繅者繅柔嚅不如莞清堅又於鬼神宜繢以四方相對為文守土一方而以柔從居下文彩外著然後能受命建國保有社稷以𫝊其子孫故祭祀之席則然王昭禹曰有言繢純有言畫純者蓋分布采色則曰繢摹成物體則曰畫考工曰青與白相次赤與黑相次若此所謂繢又曰山以章水以龍若此所謂畫易氏曰天子有次席黼純而不用於諸侯者以諸侯不可尚自然之文不可專斷制之義也諸侯有蒲筵繢純而不用於天子者以蒲不若莞之細繢不若畫之工項氏曰蒲柔而繢采莞堅而粉潔不莞加繅者王之所下諸侯之所上也薛氏曰諸侯祭祀席右几筵國賔左几則祭祀隂事也故右之賔客陽事故左之鄭氏注士虞禮謂主人陽長左鬼神隂長右是也然鬼神雖長右不必皆鬼神故甸役亦右几以甸役隂事易氏曰天子設几於左右諸侯則隂事尚右陽事尚左亦尊卑之辨一几席之間而大分存焉昨席莞筵紛純加繅席畫純筵國賔于牖前亦如之左彤几鄭康成曰昨亦讀曰酢鄭鍔曰尸酢之席莞筵以尚其質繅席以表其文惟文質兼備所以能受神之福王氏詳說曰天子昨席與祭祀席同諸侯昨席與祭祀席異蓋天子至尊可與鬼神同其席諸侯則否亦猶天子之昨酒用醴齊與鬼神同其尊諸臣之昨酒用罍與鬼神異其尊昨席昨酒不同如此然云昨席則無几祭祀其神馮几乎李嘉㑹曰君道貴剛臣道尚柔人君朝覲饗射命諸侯之大禮既以三重則祭祀以格鬼神受昨以享鬼神之福皆不易乎是席之數此君道純一之義諸侯有庇民之大德有事君之小心居上治下升龍降龍其道則二故祭祀一席受昨延賔一席劉執中曰几則神右而人左席則降王一等而變於神黃氏曰特為國賔設位於此先鄭曰禮記國賔老臣是即掌客諸侯長歟後鄭曰諸侯來朝孤卿大夫來聘皆得用之不幾於無章乎鄭鍔曰鄰國孤卿大夫來聘是謂國賔主人在阼階則賔在户牖之間如受酢之席表國賔彬彬之意鄭司農曰為布筵席於牖前王氏詳說曰王氏以諸侯左彤几為祭祀之時下筵國賔則不設几曾不知鬼神之几居右人道之几居左如以左彤几以待鬼神則上文之諸侯祭祀右雕几如以左彤几為諸神之所式慿而用於祭祀之間是非所以禮鬼神然則彤几用之於筵賔者正所以待賔也鄭鍔曰設彤几於席之左以表國賔有文明之意項氏曰彤則赤色以示文甸役則設熊席右漆几鄭康成曰謂王甸有司祭表貉所設席薛氏曰經言甸役不言祭鄭氏之說果如所言乎鄭鍔曰田簡衆役任衆必果毅為先故席以熊皮為之熊猛獸之毅而可畏者王昭禹曰以熊皮飾席或畫熊焉易氏曰几用漆飾示正固也漆几右之隂事也鄭鍔曰設几以依神神幽隂故几在右也凡喪事設葦席右素几其柏席用萑音丸黼純諸侯則紛純每敦音道一几鄭康成曰喪事謂凡奠也萑如葦而細者鄭司農曰柏席迫地之席葦居其上項氏曰柏敦皆未得其說恐是器若玉敦之類敦以承黍稷或曰柏席載黍稷之席此說似通鄭康成曰敦讀為燾覆也棺在殯則椁燾既窆則加見皆謂覆之賈氏曰棺在殯則椁燾者檀弓云天子菆塗龍輴以椁是也云既窆則加見若既夕禮下棺訖則加見見謂道上張帷荒將入藏以覆棺言見者以其棺不復見唯見帷荒也凡吉事變几凶事仍几鄭康成曰吉事王祭宗廟祼於室饋食於堂繹於祊每事易几神事文示新之凶事謂凡奠几朝夕相因喪禮略劉執巾曰凶事仍几謂不知其神之或在此在彼凡其位處皆設几如顧命之四仍焉李嘉㑹曰吉事不止祭祀凡視朝覲饗射燕飲無常處也故必變几喪有常事有常處仍几宜矣王昭禹曰吉事尚文凶事尚質變几以文為尚仍几以質為尚賈氏曰阮諶云几長五尺髙二尺廣二尺馬融以為長三尺舊圖以為几兩端赤中央黑李嘉㑹曰筵席之間短不過尋長不過常中者不過九尺純緣之制上不過黼下不過緇布卷之也必自末奉之也如橋衡敷必請向升必由下天府上士一人中士二人府四人史二人胥二人徒二十人鄭鍔曰王者所有之天下無一物之非天寶鎮之重則先祖受天命而後傳生民之數則天之所付五穀之數則天之所生治中以察吏治則奉天意而行賞罰之法其所藏之府特名曰天大府雖九府之長不過掌財用而已安得而同哉王氏詳說曰天府所藏國之寶器也然豈止於玉哉官府鄉州都鄙之治中民數穀數賢能之書皆國之寶是知成周之時以政事為寶以人民為寶以民食為寶以賢能為寶非特寶珠玉而已薛平仲曰禮寓於灌既足以格於幽冥而無歉則是禮之維持於天下者蓋可得而恃矣此天府已下之官皆有以見是禮維持之功歟是故國之玉鎮寶器承之於祖而守藏於廟者也夫使是禮之不足以維持天下則僭於天之分者蓋有盜而竊之矣是以天府之官首於此雖有守藏之不一而國之玉鎮寶器實先焉蓋是禮維持之大者府而名之曰天其大可知及夫以玉而制為五瑞所以志天寵因瑞而别為五命所以定天瑞因命而異為五服所以彰天命禮足以保天府之所藏則五瑞五命五服皆由是禮以嚴其分禮之功用固如此掌祖廟之所藏與其禁令鄭康成曰祖廟始祖后稷之廟其寶物世傳守之若魯寶王大弓易氏曰王者之業傳之先祖而後受天之命以有天下凡歷代之玉鎮大寶器皆得以有而藏之掌祖廟之守藏是先王之器守與其禁令則王者以道守其器項氏曰其所守有人則所藏有物鄭鍔曰守藏於此必有禁令以為防守之具然後可保而不墜而人不敢萌覬覦竊取之心凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之鄭鍔曰玉之美者可以為國之鎮如𢎞璧琬琰天球夷玉夏后氏之璜之類器之大者為歷代所寶如崇鼎貫鼎大貝鼖鼓和之弓垂之竹矢封父之繁弱之類康成以為玉瑞玉器之美者藏於此典瑞豈專掌其不美者歟祖廟之守藏則先祖所傳者國之玉鎮大寶器則國之至寶可與祖物俱傳者亦藏於此大祭之時出而陳之以昭其祖先傳此以及後陳之者所以昭其功大喪陳之所以昭其能守此以克終康成謂陳之以華國恐不止於華國既事則又從而藏之傳其所寶守其所傳將以為萬世之榮凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治鄭鍔曰康成之說以治中為治職簿書之要以理考之蓋治道中法可為楷式者天府以守寶藏為職故凡內而官府近而鄉州逺而都鄙羣吏之治有中法者受而藏之賈氏曰不言六遂及四等公邑文略庶幾可用以詔王用此以察羣吏之治使視其中法者以為凖式彼簿書之要何預邪易氏曰官府鄉州及都鄙之治中者計治之書也與玉鎮大寶器同藏於天府者民亦國之寶也吏尤親於民者也先王蓋深致意焉如登賢能之書于天府而教得其中登民穀之數於天府而政得其中計獄弊訟登中于天府而刑得其中凡此無非治中之書劉執中曰治中者治典也然建天下之中故謂六典為治中在顧命曰大訓蓋與河圖共為寶鎮矣天府受而藏之以詔王察羣吏之治則吏道益謹民心益固然後可以永保天命而玉鎮大寶器為可守矣鄭鍔曰說者謂司㑹考日成月成歲成以詔王及冢宰廢置太宰聽百官之致事而詔王廢置尚何假於守藏之吏受治中以詔王邪余以為此乃先王保有神器防微杜漸之意也姦宄所以敢萌窺竊之心者良由上之人不能灼見其邪正上之人所以不能灼見之者良由無法以考察之上下廢弛馴致大壞有問鼎之楚子有竊玉之陽虎此聖人所以命天府受治中以詔王蓋守之之術歟李嘉㑹曰察治職者天官必天府詔王者是詔以祖宗之意否則吏治紛更中將安在豈足以安祖宗之靈上春釁寶鎮及寶器鄭康成曰上春孟春釁謂殺牲以血血之鄭鍔曰凡寶之所在必有神者主之故殺牲以釁之所以禳却不祥也然必用上春者以明守之不失至歲首而更新新之又新至於無窮歟凡吉凶之事祖廟之中沃盥執燭鄭康成曰吉事四時祭凶事后王喪朝于祖廟之奠賈氏曰小祝大祭祀沃尸盥小臣大祭祀沃王盥此二官所沃盥在祖廟則天府為之執燭為明若士師職祀五帝沃尸盥非祖廟事則不與執燭鄭鍔曰吉凶之事王與羣臣或有事於祖廟掌沃盥以致潔又掌執燭以為明祖廟之守藏惟明智然後能守而不失春秋定八年書從祀先公盜竊寶玉大弓蓋因祀太廟而盜得以竊之是知寶鎮寶器皆藏於祖廟以明是器由祖先之功德有之而子孫始有亦本於先祖茍非明智何以守之此所以使之執燭季冬陳玉以貞來歲之媺惡鄭司農曰貞問也鄭鍔曰先王防患逺憂民深故每長慮却顧以為災害之防嘗之日卜芟獮之日卜戒社之日卜稼猶以為未足以知來歲之休咎又於季冬之月日窮于次星窮于紀歲且更始之時而預卜之方其問龜則天府之官陳玉以禮神玉之為物陽精之純將以交神靈而通之故必用玉也問龜者大卜之職天府掌出玉而陳之若遷寶則奉之鄭康成曰奉即送也賈氏曰遷寶謂王者遷都則寶亦遷天府奉送之於彼新廟之天府鄭鍔曰遷則奉之與寶俱行先王豈以為寶而愛之誠以世守不敢失也若祭天之司民司祿而獻民數穀數則受而藏之鄭鍔曰考小司寇之職孟冬祀司民獻民數於王王拜受之以圖國用則祭司民獻民數小司寇之職春官司祿之職缺其祭司祿之神或同司民之祭歟司民軒轅之角星司祿文昌宫之星又云下台為司祿祿之言穀也易氏曰考之天文志司民為軒轅角其十七星之兩角有大民小民司祿文昌三台之第六星天有是星先王以是而名官又使之以民數穀數而登之于天府蓋王者以民為天民以食為天此民數穀數之登所以必待乎祭天之司民司祿也故榖數則司祿之官掌之小司寇獻之王受之而登於天府天府受而藏之守寶鎮之所賴者在此故也然民數天所付榖數天所生以養人王者奉天牧民民穀之數藏於天府宜矣必祭司民司祿然後獻蓋司民者主人命死生之神司祿者主年穀登凶之神每歲孟冬民數登下榖數多寡皆已可知於是祭其所司之神然後獻其數天府之官藏之謂夫自是而後有民以守邦有榖以養民祖廟之守藏可謂守而不失矣林氏曰歲獻民數穀數最為致太平之要務管子曰制國以為二十一工商之鄉六士鄉十五三分其制而言之即所謂七民而五農夫二工商也先王所以為此者非他為欲等其民數穀數使之本末相當用為來歲之經制故爾至於水旱不虞之至則必有儲蓄以待之三年耕必有一年之蓄三十年耕必有十年之儲則謂之太平故曰歲獻民數穀數最為太平之要務者此也嘗考古之民數實見於九官之所治九功之所歌大禹謨之於用周公書之於冊仲尼式其版孟子陳其道觀其問所以諷齊梁滕魯之君與夫答北宫錡之問畢戰之者率此志之然則自古在昔先民有作其所以經綸圖為以富邦國而生萬民者其要實在乎此孰謂其可忽而不思以坐視天民之窮哉孫氏曰知所當守而不知守之之道則猶不足以守曰賢書能書曰民數穀數曰治中曰盟約皆所以守是器也不知任賢使能孰與先治其國不知憂民足食孰與翼戴厥位官府鄉州都鄙之治中所以挈持是器之法邦之大盟約所以維持是器之具皆於天府登之使與玉鎮大寶並藏庶乎繼體守成之君知所守在此不徒擁虛器以為安矣鄭鍔曰說者謂鄉大夫賢能之書獻之天王王登於天府不言於此何邪余以為民榖者所資以為守寶鎮之具而賢能之書特見其尊之以與鼎寶等非所以為守之之具也周禮訂義卷三十四
