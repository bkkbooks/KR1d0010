body:
  text: 周禮訂義卷二宋王與之撰以八柄兵命反詔王馭羣臣鄭康成曰詔告也王昭禹曰爵祿廢置生殺豫奪八者王操之於此而羣臣為用於彼若器之有柄焉故曰八柄賈山曰富貴人主之操柄其言亦本於此八柄操之在此則羣臣疾徐進退惟我之聽故曰馭羣臣鄭鍔曰凡是八者大宰詔之王自用之故曰擅生殺之謂王能豫奪之謂王慶賞刑威曰君惟辟作福作威為人君者當自操以為用不可以授人為大臣者隨事詔王因功而用賞隨罪以行罰則羣臣可得而馭也大宰不以詔王王或不能自用則有倒持太阿之失矣林椅曰柄猶物之柄可以獨持不可共用故八者惟王所用雖大宰亦詔之而已王氏曰於六典曰佐王治邦國大治王與大宰共之也於八法八則直曰治官府都鄙小治大宰得専之也於八柄八統曰詔王馭羣臣馭萬民則是獨王之事也大宰以其義詔之而已一曰爵以馭其貴王昭禹曰先王制爵以待有德德有小大則爵有尊卑外之為邦君則有公侯伯子男內之為王臣則有公卿大夫士五儀之命見於諸侯五等之命見於諸臣皆王之所爵也天下之人茍有之則貴無之則賤此所以馭其貴鄭鍔曰與以公侯伯子男之爵則有為君之貴與以卿大夫士之爵則有為臣之貴二曰祿以馭其富王昭禹曰祿以待有功功有多寡則祿有厚薄故司勳等其功則王功曰勳終於戰功曰多上自國君下至庶人有授之田有授之食或相倍蓰或相什伯皆王所祿也天下之人茍得之則富不得則不富此所以馭其富鄭鍔曰與以萬鍾之祿則大焉而富之與以升斗之粟則小焉而富之三曰豫以馭其幸劉氏曰幸者王所親幸也可賜豫之不可爵之者也楊氏曰職幣詔上之小用賜豫嵗終則會其出凡邦之㑹事以式法贊之小用有式法則上所賜豫雖嬖幸無過制也此所以馭其幸王氏謂以私恩施焉非所以馭之也李景齊曰爵祿者厲世摩鈍之具古人制爵必以功所以抑夫人僥求茍得之心作其進德興功之志固不容以濫受也今考之冢宰八柄自爵祿之外又有所謂豫以馭其幸豈人主或得以行其私恩而所謂以德詔爵以功詔祿之意有所不與焉毋乃啓人主之幸心耶有所謂當然之報亦有所謂特厚之恩當然之報固人臣所宜得或視以為常而無激昂自奮之意又有所謂特厚之恩以神其機於不測則所以鼓舞變化人心而使之奔走於事功也此八柄豫以馭其幸之深意若夫後世人主樂夫人投已之欲以私意而䙝名器而妄豫於人者亦曰此古人豫以馭幸之意誠可悲恨劉執中曰豫謂爵祿之外有所賜豫幸謂榮幸子及其賢則天下榮之求為其所以幸者矣四曰置以馭其行下孟反劉氏曰置者耆老廢退之人雖當廢退其素行賢明特置之若公族穆子辭疾晉侯使掌公族大夫也王昭禹曰因其有功而置之在位豈特使之有功又馭之使有行夫在位之臣無行是以貪汙誣僞無所不至記曰大臣法小臣廉蓋大臣有行則循法而不敢為非小臣有行則廉潔而不謀利此置所以馭之使有行也五曰生以馭其福王昭禹曰管子云擅生殺之謂王能利害之謂王盤庚曰矧豫制乃短長之命則人稟命而生雖本乎天而所以生之者乃在乎君則此所謂生者王使之生也洪範以夀居五福之先則得生足以為福矣劉氏曰福者其人本坐死以親故功貴者議而免之是其福矣楚誅鬬氏而免針尹克黃改命曰生則此類也六曰奪以馭其貧鄭鍔曰極之别有六而貧居一食君之祿宜不至於貧矣臣有可誅之過奪其廩稍之奉如管仲奪伯氏駢邑三百至於疏食沒齒之類以奪致貧其柄在我所以馭之也七曰廢以馭其罪鄭康成曰廢猶放也舜殛鯀于羽山是也易氏曰廢言棄也臣有罪戾不可委任褫其爵而棄之故曰馭其罪八曰誅以馭其過鄭康成曰誅責讓也曲禮曰齒路馬有誅賈氏曰臣有過失非故為者則以言語責讓之內史變誅言殺欲見為惡不止則殺之林椅曰誅與生對立福與禍對立以用誅之文考之必非適然之過王氏曰誅言其意殺言其事大宰大臣詔王馭羣臣者也以道揆故言其意內史有司詔王治守法而已故言其事誅又訓責知大宰所謂誅為殺者以內史見之也總論賈氏曰經自五曰以上皆是善事則大善在前小善在後自六曰以下皆是惡事則小惡在前大惡在後王氏曰先慶賞後刑威於賞先重而後輕於刑先輕而後重勸賞畏威之意也內史則賞刑雜而莫知後先者主以法守而不預道揆之意也王氏詳說曰賞有五而刑有三又以見詳於賞而略於刑也陳宏父曰冢宰既詔王馭羣臣得操富貴豫奪之柄則人才之進退専於冢宰可也考之王制乃選士以司徒造士以樂正論辨官材以司馬何邪曰無傷也冢宰既統百官則三官猶冢宰之屬耳則司徒選之樂正造之司馬辨論之以至於官之爵之祿之而後冢宰統而計之不特馭人之法然也而考績之法亦然一嵗之終羣臣奏嵗事之時也天官之司會以嵗會之成質於天子者而大樂正大司冦市三官則以其成從司㑹而質冢宰齊戒贊王受質成而三公則從司會冢宰贊天子受質而三公則以百官之成質於天子焉是六卿皆與考績而冢宰則操其柄也謂以冢宰統百官何為不可以八統詔王馭萬民黃氏曰八統即中庸九經也治天下國家綱統在是鄭鍔曰大宰詔王舉其綱以統之乃能大一統於天下而四方咸歸於統一矣禮庫曰八者是君民共之惟其通上下皆然故曰統然却有本原自人主身上做起一曰親親王昭禹曰宗族兄弟天屬也宜致親以親之故先王篤之以恩叙之以禮合之以飲食同之以福祿則親者無失其為親矣馭以親親則民莫遺其親故堯親九族而黎民於變時雍二曰敬故王昭禹曰故舊朋友人屬也易失於慢而不敬先王於是以燕飲致其恩以賔射致其親久要而不忘無故而不棄所以敬之也則故者無失其為故矣馭以敬故則人莫慢其故孔子曰故舊不遺則民不偷民德歸厚是也鄭鍔曰民不知親親也君舉親親之統則民從而親其親民不知敬故也君舉敬故之統則民從而敬其故論語所謂君子篤於親則民興於仁故舊不遺則民不偷三曰進賢鄭康成曰賢有善行也王昭禹曰以德則可久以業則可大禮義由之以立朝廷待之以尊民心所願興宜使之在位故進之馭以進賢則民知德之不可不務故大司徒以賢制爵則則民慎德賈氏曰有賢在下君當招之民當舉之四曰使能鄭康成曰能多才藝者愚案人各有能用之然後見如伯夷能典禮使作秩宗足以究其典禮之能后䕫能典樂使教胄子足以究其典禮之能君知量能以任使人之有能者孰不欲自效以見其能禮庫曰古者許多長民之官往往多自民間自推擇且如五家為比有比長即是五家中自推一人來做朝廷因爵以下士命之為比長五比為閭有閭胥亦是二十五家中自推一人來做朝廷因爵以中士命之為閭胥此豈非進賢使能耶要知人主才進賢使能天下便知賢者之可尊能者之可貴而自勉於善矣五曰保庸鄭康成曰保安庸有功者王昭禹曰司勳曰民功曰庸禮庫曰保庸全其有功者愚案如司勳頒賞輕重視功地三食一不使之過亦所以保之也六曰尊貴鄭康成曰尊貴尊天下之貴者孟子曰天下之達尊三曰爵曰德曰齒祭義曰先王之所以治天下者五貴有德貴貴貴老敬長慈幼王昭禹曰爵以馭貴朝廷之所尊也馭以尊貴民知爵命之不可陵七曰達吏鄭康成曰達吏察舉勤勞之小吏也王昭禹曰吏之在下有以賤事貴有以小附大其志能常患於不達有以達之尚安有莫知我勩之歎哉馭以達吏則民知壅蔽之不可為禮庫曰賢能是未仕者吏是已仕者八曰禮賔王昭禹曰先王之制五禮賔禮居其一賔者人治之大在所禮矣故聘俯存問食享牢禮凡致於賔者其小大有度多寡有數燦然之文歡然之恩見於相授接之際者凡以禮之也馭以禮賔則民知交際當以禮總論劉氏曰棠棣之詩親親也伐木敬故也南山有臺進賢也棫朴使能也彤弓保庸也湛露尊貴也采薇達吏也鹿鳴禮賔也總論八柄八統王氏曰柄言操此而彼為用統言舉此而彼從焉以九職任萬民王昭禹曰任者因其力之所能勝也陳君舉曰天之生民未有無能而養者能其事而後可以養無事而食衆之殃也故聖人制天下之民各從其能以服于事大宰既授之職閭師又責其功故曰無職事者出夫布也王制瘖聾跛躃斷者侏儒百工各以其器食之後之游民作無益以害有益者可勝計哉一曰三農生九穀愚案三農司農謂平地山澤後鄭謂原隰及平地要知只是上中下三等農夫王昭禹曰榖有黍稷稻粱秫麥苽麻豆之别故曰九榖王氏詳說曰五穀種之美者黍稷稻菽麥也百穀者凡麗乎土而可食者也此九穀云先鄭以為黍稷秫稻麻大豆小豆大麥小麥後鄭不言秫與大麥而以粱苽足其數案下食醫云大冝粱魚宜苽故耳後鄭之說為是生生不窮其種雖本於天然不能自生實賴乎人故曰三農生九榖二曰園圃布古反育音育草木鄭康成曰𣗳果蓏曰圃園其樊也賈氏曰圃即載師所云場圃任園地謂在田畔𣗳菜蔬果蓏者圃在園中故鄭以園為樊詩云折抑樊圃樊其蕃蔽也王昭禹曰育者順其性而養之也王氏詳說曰園圃藪牧舉其地以及其民吕氏曰民事在人君固不可緩而於草木鳥獸亦欲其得所者此乃物之至微人君多以為不足恤而易忽惟聖人為天地萬物之主見天地之間有一物不得其所為之不安而以為職之不盡故堯典自厥民析而繼之以鳥獸孳尾舜典時若豫上下草木鳥獸以此見聖人參天地贊化育一視同仁無一念之忘物也三曰虞衡作山澤之材鄭康成曰虞衡掌山澤之官主山澤之民者賈氏曰山澤之民無他號故借虞衡之官以表其民也王氏曰山澤皆虞而曰虞衡作山澤之材者山虞掌山林之政令則其政令施於山矣川衡掌巡川澤之禁令則其禁令施於澤矣虞衡山澤之官而作山澤之材者民職也則此所謂虞衡言其地之人而已王昭禹曰作與詩遐不作人之作同為而起之之謂也蓋先王於山澤之材非特順其天性而巳又加栽培壅溉之人功使小以成小大以成大各遂其生各適其用夫是謂之作鄭節卿曰周禮有頒田之法而山澤未嘗頒與民大宰以虞衡作山澤之材則皆畿內山澤亦皆官物特置虞衡掌之所以然者夫受百畝山澤之物或有無不均且山澤利多民自有之則有田不耕趨末衆矣虞衡既掌山澤各自募民治之國家有所輸用則征于山澤之農若角人以下是也四曰藪速茍反牧養蕃鳥獸鄭康成曰澤無水曰藪牧牧田在逺郊皆蓄牧之地王昭禹曰交之以道取之以時不麛卵不殺胎不覆巢使之既生且息既繁且殖有魚麗盛多之美無魚藻失性之譏此養蕃之效鄭鍔曰王政驅虎豹犀象而逺之故攻猛獸驅烏鳶射夭鳥各有其官乃任藪牧之養蕃何耶蓋羅氏所羅掌畜所共庖人掌客之禽獻獸人冬夏之狼麋皆禮物尤急者也非養之有素何以供不時之須哉任以養蕃謂此類耳五曰百工飭音敕化八材鄭康成曰八材珠曰切象曰瑳玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析王昭禹曰興事造業之謂工工具器者也故攻木之工七攻金之工六攻皮之工五設色之工五刮磨之工五摶埴之工二夫五材而加皮玉設色故曰八材八者雖有自然之質必人工加焉然後可適用故待百工飭化致力以飭之謂之飭因形移易謂之化如致力以飭木則化之而為舟車之屬致力以飭金則化之而為鼎量之屬也愚案曲禮曰天子之六工典制六材此曰八材者曲禮主夏商此主周爾六曰商賈音古阜通貨賄鄭康成曰行曰商處曰賈金玉曰貨布帛曰賄王昭禹曰先王之於貨賄欲其有無相資多寡相濟故使之阜通聚之使盈之謂阜遷此就彼之謂通貨賄不阜則其求為易竭故使之阜而後通與書所謂懋遷有無化居同意七曰嬪婦化治絲枲鄭康成曰嬪婦人之美稱也劉執中曰嬪婦女子之無夫家而不可受田者不任以事則淫邪失業足以敗俗而亂教故嬪婦之所以自求口食者化治絲枲而已他不可以有為王昭禹曰八材謂之飭化始乎朴而終乎化化則器成而可以致功矣故曰飭化絲枲之為物徒化之而不治則布帛無由而成化絲而治之以為帛化麻而治之以為布故謂之化治八曰臣妾聚斂疏材鄭康成曰臣妾男女貧賤之稱賈氏曰疏是草之實材是木之實鄭節卿曰荼以供喪事茅以供祭祀芻茭以飼國馬今時人取芧以飼牛取萍以飼犬豕負薪拾髮竹頭木屑皆疏材之屬也王昭禹曰疏材委人所謂凡疏材是也疏材利之至微者待臣妾而後聚斂九曰閒音間民無常職轉移執事愚案成周計民受田餘夫亦及之安有間民今謂之間民必其單丁下户力既不能勝耕又不能從事於園圃虞衡藪牧之地與夫工商嬪婦之業聖人難以强之受職也亦列於九職之終者以八職之中不可無此等人孟子曰以百畝之不易為巳憂者農夫也一人之身百工之所為備萬室之邑一人陶之則不足商賈之懋遷虞衡之興作草木鳥獸皆生生之具布帛疏材皆適用之物以閒民之無職能補八職之有闕則轉移以協佐其事曷可少哉以閒民係於九職之末以見非無職也特無常職耳豈若後世游手浮食怠惰而不事事者乎至載師民無職者出夫家之征閭師凡無職者出夫布又欲驅之務本也總論史氏曰九職任民地官之任大宰掌之何也蓋大司徒以下能授之職不能任之使不失職使不失職者大宰之責也王能用一大宰使際天所覆極地所載上而三農下而臣妾間民無不得其所者可謂任職矣古之大臣欲遇大有為之君固非求之爵貴祿富也誠以憫天下之民不得其所思輔其君而有為也以九賦斂財賄愚案先儒以周之九賦謂口率出泉夫漢有口賦有算賦皆仍秦弊令民出泉不知周之泉布所以制百物之低昂上而供邦用則有外府下而通民用則有泉府出入則有法斂散則有權至於制賦之法不過因地之所有而令之如邦中之賦即載師園㕓二十而一是貢其㕓里及場圃之所出四郊之賦即載師近郊十一逺郊二十而三是貢其宅田士田賈田及官田牛田賞田牧田之所出邦甸家稍縣都之賦即載師甸稍縣都皆無過十二是卿大夫采地田稅之所出關市之賦即司門司市之所入山澤之賦即山虞澤虞之所入幣餘之賦乃官府都鄙與凡執事者給公用而有餘幣餘財之所入然則九賦之斂財賄除關市之外皆非泉布之入而關市之賦亦非口率出泉以賦為口率出泉則是有賦而又有稅也孟子曰有粟米之征有布縷之征有力役之征所謂粟米之征即成周之田賦也布縷之征即成周山澤之農所貢絺葛服貢之材而成於嬪婦之化治者也山澤所貢以之當邦賦則無田租矣至於力役之征成周只以六尺七尺之上下而為力役之多寡非如漢之有更錢隋唐之有庸錢也孟子所謂力役之征意當時起役之外又有所取矣成周之法征以粟米者則無布縷之征征以布縷者則無粟米之征至於力役之征只用其力不取其財如凶札之年則又無力征矣冝乎孟子謂用其二而民有殍用其三而父子離也王氏詳說曰自一至六謂平民之賦自七至九謂末作之賦邦中四郊邦甸之民天子之民家稍邦縣邦都之民公卿大夫之民既以其賦入於主復以其賦入於天子是倍其賦也曰不然家稍邦縣邦都雖曰采地而其餘地為公邑公邑不可以槩言之此所以即家稍邦縣邦都為言也亦猶九職言萬民而又分園圃虞衡藪牧也林氏曰九賦自邦中至邦都則地征矣關市山澤幣餘皆末作而亦云地征何也司關司市與山澤之虞皆地職也有地職則必有地征此載師所以又有授地之言也幣餘則職幣所謂餘財餘則邦物皆已給矣又振之以歸之邦故亦謂之賦也愚案邦中有場圃即園圃之職也四郊有牧田即藪牧之職也邦甸之田皆井授即三農之職也甸稍縣都之采邑與公邑之田亦皆授於民以耕也關市即商賈之職山澤即虞衡之職李叔寶謂九賦繼於九職之後惟有以任之而後可以斂之是也所疑者成周十一之稅通行乎天下而甸稍縣都則曰十二先儒以地逺役簡則賦亦輕釋之不如陸佃以百畝而徹賦民十一於一中又以十分為率取二如此則公卿大夫之受采者自食其八以其二賦於國其說為長至於吏之治於公邑者兼統於遂其居民其制賦皆與遂法同小司徒之井牧其田野及於甸稍縣都必曰任地事令貢賦凡稅斂之事可考也總論貢賦征稅之名鄭節卿曰或問畿外有貢畿內有賦有稅有征斂之目其别何如曰公田以為稅私田以出賦征斂則賦稅之總名家征力征則以一家餘夫之力言之夫征地征即以一夫私田之賦言之若畿外諸侯則食公田之稅以為祿斡私田之賦以為貢耳請略公田之稅而姑論畿內之賦次及於畿外之貢人徒見夫稅以足食賦以足兵則以民賦為止於兵車以九賦為諸臣祿田之賦非也稅雖一而賦實有三凡起徒役毋過家一人此兵賦也甸出長轂一乘此車賦也邦中四郊而下凡九等之賦也時方有事則農出一兵甸出一車事已則兵還於農車還於甸雖名於賦實則使民自衛耳有以足軍之用而未有以足國之用也國用之大有祭祀賔客有喪荒羞服有工事幣帛有芻秣匪頒好用不調諸民於誰責而供之於是始即百畝之私以制九等之賦勸九職之任以代九賦之出今考之周禮國中四郊之賦閭師征之野之貢賦縣師征之委人征薪芻木材獸人㕓人收皮毛筋角角人斂齒角羽翮草人收金玉錫石澤虞取國澤財物掌葛掌染草則征絺綌染草以當邦賦掌炭掌荼則征灰炭茅莠以當邦賦其始也以五榖為主而其終皆以九職之物充貢其始也以五等定輕重而其終皆以年之上下出斂法熟讀一書其所以孜孜於田賦之說者以其未始立法也若公田什一之稅周禮曷嘗一言之豈惟公田大宰九等之賦不言軍旅亦以一兵一車之出自有定制耳是以大宰正其名載師酌其數閭師縣師隨其物大府謹其待用蓋其終始本末無一毫不經思慮者達之王畿之外則有異名而無異法諸侯食其稅於國則稅之名變而為祿納其賦於天子則賦之名變而為貢始於大宰之致其用中於司馬之制其賦終於小行人之令其獻考之職方氏自揚之金錫荆之丹銀以至於并之布帛此即取物以充賦也又考之大行人自侯服之祀物甸服之嬪物以至於要服之貨物此即變賦以為貢也其纎悉委曲則與甸內無一不相應者然禹貢與周禮少異者周禮畿內之賦通可以言貢而禹貢則専指以為賦禹貢畿內之賦専以米粟之屬而周禮則雜以他物代之此特其微異者耳不害其為同也一曰邦中之賦賈氏曰邦中謂國中之民也王昭禹曰邦中王所邑詩曰邦畿千里則合四郊甸稍縣都而言也此言邦中則以别四郊甸稍縣都故也載師曰以㕓里任國中之地又曰園㕓二十而一則此所謂邦中之賦二曰四郊之賦賈氏曰謂逺郊百里之內民也王昭禹曰近郊五十里逺郊百里載師曰近郊十一逺郊二十而三此謂四郊之賦三曰邦甸之賦賈氏曰謂百里之外二百里之內民王昭禹曰四郊之外謂之甸以田法正在是故也載師以公邑之田任甸地則邦甸之賦於是乎出矣四曰家削所教反之賦王昭禹曰三百里之地大夫所食之采邑祿而不世不得専其地有家而巳故謂之家謂之家削以家邑之位削小故也其賦載師所謂以家邑之田任削地賈氏曰大夫采地賦稅入大夫家采地之外其地為公邑公邑之民賦入王家五曰邦縣之賦賈氏曰四百里地名縣有小都賦入采地之主其中公邑之民賦入王家也王昭禹曰四百里之地謂之小都載師所謂以小都任縣地六曰邦都之賦賈氏曰謂五百里中有大都大都采地其賦入主外為公邑民所出賦入王家也王昭禹曰五百里之地謂之大都大都之地即載師所謂疆地是也小都不謂之都而謂之縣大都不謂之疆而謂之都互相備也蓋言家甸稍縣則都為疆地可知言都則郊甸稍縣為鄉遂公邑家邑小都亦可知也愚案家稍邦縣邦都三等采地之餘盡為公邑天子使大夫治之公卿大夫王子弟不得有也此是聖人深意大率三代封建諸侯亦不是連併封去其間自有公邑間其中漢時郡國之制亦有此意蓋郡國相錯於天下使彼此相監也七曰關市之賦王昭禹曰關以征其貨之出入市以征其貨之所在然則關市之賦出於商賈之民也王氏詳說曰載師云園㕓二十而一謂邦中也近郊十一逺郊二十而三謂四郊也甸稍縣都皆不過十二謂邦甸家削邦縣邦都也漆林之征二十而五謂山澤也而不及關市與幣餘然則關市幣餘所出之賦其將何如乎蓋周禮重乎民而禁末作故末作賦重關市幣餘之賦亦與山澤之賦等矣不然山澤所出何止於漆林陳君舉說見大府八曰山澤之賦王昭禹曰先王之於山澤有虞以度其物有衡以平其政為之厲以限其妄入為之禁以止其非法又各使其地之人守其財物則其所取者宜有職矣九曰幣婢世反餘之賦劉迎曰幣餘不在常賦之中皆式法所用之餘幣也今考職幣所掌凡用邦財之幣振掌事者之餘財蓋此幣餘之賦也惟其非常賦故以之待賜豫而賜豫亦無常故也先儒以幣餘為占賣國中斥幣皆末作當增賦者若賈人倍算矣不知此何等賦邪以九式均節財用鄭康成曰式謂財用之節度王昭禹曰式之所載為有書所麗為有數書之所載則有一定之常目數之所麗則有不易之經制以之均財則為有道以之節用則為有禮均財有道則逺近適於均而無有餘不足之患節用有禮則多寡適於當而無過不及之幣李景齊曰有以斂於民無以節於己則錙銖之積不足以供泥沙之用此九式財用又所以繼於九賦斂財賄之後也一曰祭祀之式王昭禹曰祭祀之禮有大小有豐殺多不為過寡不為不足者亦有式焉耳王氏詳說曰曲禮曰天地之牛角繭栗宗廟之牛角握此牲式也酒正曰大祭三二中祭再二小祭一二此酒式也二曰賔客之式王氏詳說曰掌客之上公饔餼九牢侯伯七牢子男五牢史氏曰朝覲聘問之時待遇宴享之法三曰喪荒之式王昭禹曰喪之禮有斂葬賻賵以送死者荒之禮有散利施惠以救貧者其用雖甚衆而皆有制焉四曰羞服之式王昭禹曰羞則膳夫羞用百有二十品之類也服則司服掌王之吉凶衣服之類是也五曰工事之式賈氏曰工若考工所作器物史氏曰工事不可闕有法以制之則無雕鏤之飾淫巧之縻六曰幣帛之式鄭康成曰謂所以贈勞賔客者賈氏曰若司儀上公三問三勞有束帛也七曰芻初俱反秣之式王昭禹曰草之謂芻榖之謂秣皆以養牛馬有事則秣無事則芻詩曰乘馬在廄莝之秣之則芻秣也王氏詳說曰謂若委人云賔客共其芻薪軍旅共其委積薪芻八曰匪頒音班之式鄭司農曰匪分也頒謂頒賜也鄭康成曰王所以分賜羣臣也九曰好用之式王昭禹曰因其所好而用之謂之好用玉府凡王之好賜共其貨賄內府凡王及冢宰之好賜豫則共之典絲凡上之賜豫皆以物授之典枲賜豫亦如之蓋好用出於上之私恩惟其時物而巳劉迎曰後鄭以為燕好賜豫其與匪頒異乎今考之經玉府所謂金玉玩好謂式貢之餘財以共玩好非所謂好乎司書所謂上之用財用職幣所謂凡上之小用非所謂用乎好用之式小所以列之匪頒之後李景齊曰自祭祀賔客以至幣帛芻秣之費固有司可以裁其出入所謂匪頒好用出於人主之意固冝人主所得自為也冢宰亦得以九式制之焉然則聖人以身享天下之奉不敢以一毫妄費以至於此財安得而不裕哉總論劉執中曰祭祀之式春官掌焉賓客之式大行人司儀掌焉羞服之式膳夫司服掌焉工事之式司空之屬掌焉幣帛之式外府掌焉芻秣之式掌客掌焉匪頒之式大府掌焉好用之式內府掌焉九者違式均節失宜則大宰掌焉王昭禹曰先王生財有道取財有義用財有禮九職所以生財也九賦所以取財也九式所以用財也陳君舉曰九賦斂財賄九式均節財用盡總於冢宰所謂以此取之以此用之未嘗分别秦漢以來人主私意日生創為條目掌天下之財有大司農掌王之治藏則有少府掌沒入民財則有水衡都尉而大司農則供邦國經費之用少府則供王玉食奉養之用水衡則供王之私用色目既煩各私其局征斂搜求富藏于官前輩嘗論王者除四夷之外不治自外薄四海闔門而視皆一家也今闔門而與子弟為市雖盡得子弟之財猶不富也又曰所謂大宰制國用者制其出也古者財用冢宰制出而司徒制入六卿三公皆兼之自漢丞相以錢榖出入為非已責則均節會計之職散之九卿以九貢致邦國之用胡氏曰先王授民以田則責之賦授諸侯以國則責之貢賦者養天子之禮貢者事天子之義陳氏曰采邑有賦而無貢邦國有貢而無賦九賦有甸稍縣都而九貢致邦國之用是也禹貢八州有貢惟冀州畿內無貢以畿內王之所食特斂其賦而巳非所謂貢也賈氏曰此諸侯嵗之常貢小行人云春入貢是也若大行人侯服嵗一見其貢祀物乃因朝而貢與此别也諸侯國內得民稅大國貢半次國三之一小國四之一所貢者市取當國所出美物禹貢所云貢篚是也李景齊曰致者使之自至非窮欲以求之也用者所貴適於用非貴於逺方之珍異也西旅獻獒固足以侈其君來逺之德而召公諄諄然以訓武王者毋亦珍禽竒獸非服食器用之宜而自以異物為寶則玩好之心一萌其弊烏可勝言哉此九貢之目自祀貢嬪貢以至於斿貢物貢蓋無不適於用者後世人主汲汲於方物之貢至於鵁鶄名鷹亦遣使以求之何謂一曰祀貢鄭司農曰祀貢犧牲苞茅之屬王氏曰凡可以供祭祀之物二曰嬪音頻貢鄭康成曰嬪貢絲枲王氏曰凡可以供嬪婦之物三曰器貢鄭康成曰銀鐵石磬丹漆也黃氏曰用器兵器禮樂之器劉執中曰謂土之精器若鄭之刀宋之斤魯之削吳越之劒也王氏曰凡可以為器之物四曰幣貢鄭康成曰玉馬皮帛也王氏詳說曰古人所謂幣者非止幣帛也小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼故後鄭以幣為玉馬皮帛王氏曰凡可以為幣之物五曰材貢鄭司農曰木材也鄭鍔曰如杶幹栝柏之類可為宫室者也劉執中曰謂若燕之角荆之幹妢胡之笴吳越之金錫也王氏曰凡可為材之物六曰貨貢鄭康成曰金玉龜貝也王氏曰凡可為貨之物七曰服貢鄭康成曰絺紵也黃氏曰不獨絺紵𤣥纁纎纊皆是王氏曰凡可為服之物八曰斿貢劉執中曰謂羽毛可注旗旄也愚按此本司農說蓋斿即龍斿九斿之斿也九曰物貢鄭康成曰雜物魚鹽橘柚鄭鍔曰物貢則不可名以一物如海物惟錯之物謂雜物之可貢者也劉執中曰謂九州所産萬物可以致逺而資邦國之用者也總論鄭鍔曰或謂邦國之貢萬民之賦皆王國所須以為用貢賦畢入然後冢宰可以制國用今也列九賦於前以九式處其中乃以九貢列其後何也蓋王國之財自足以充王國之用善治國者有生財之道又奚待於諸侯然後足哉故列九賦之目即繼以均節之式明生財之道既有九賦則量入以為出可也若乃邦國之貢本諸侯奉上之誠意不急急於徴之立法於此俟其自至耳周禮訂義卷二
