body:
  text: 周禮訂義卷三十七宋王與之撰世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人愚案世婦在天官者是內命婦即二十七世婦之數在春官者是外命婦乃在朝六卿之妻或謂以卿為世婦非也既以婦言安得以卿為之然每宫卿二人者婦人無爵從其夫之爵其夫曰卿其妻為世婦者亦以卿之爵稱之觀其職曰凡內事有達於外官者世婦掌之必是因王后有祭祀賔客之禮事在外者非內人之所可與臨時而設此職主此禮耳所以屬於禮官薛平仲曰春官世婦則主六宫之禮者也官以世婦名蓋禮行於六宫之世婦則世婦以贊九嬪九嬪以贊夫人夫人以贊王后事固有所由始故其官每宫卿二人下大夫四人中士八人以主其禮於外而奔走往來於其間事有關於六宫之人是以女府女史女奚有非府史胥徒之比世儒謂皆奄人居之若內小臣之奄上士殆不然先王於內小臣之用奄如將槩謂之奄恐後世無復以德選如將直謂之上士又恐後世以外官充之命曰奄上士必奄人有上士之德者其為後世之防嚴矣況為卿為大夫而可以奄人居之乎特未考夫主禮於外不能不以奄人為解王氏詳說曰后宫之官內宰以下大夫為之視王之宰夫世婦以卿為之視王之小宰列內宰於天官列世婦於春官者以世婦所掌不止后宫之事而及於內外宗耳掌女宫之宿戒及祭祀比其具鄭康成曰女宫刑女給宫中事者宿戒當給事豫告之齊戒也比次也具所濯溉及粢盛之爨鄭鍔曰天官世婦祭之日涖陳女宫之具涖陳在彼而校比之在此也詔王后之禮事鄭康成曰薦徹之節鄭鍔曰世婦詔之於外內小臣詔之於內詔告之以其時之早晚王昭禹曰內宰詔后禮樂之儀則見於周旋動容者也世婦詔王后之禮事則祼獻薦徹之節也非特儀而已內小臣擯詔后之禮事其詔蓋始於世婦內小臣又從而擯焉帥六宫之人共齍盛王氏詳說曰齍盛之奉雖出於帝藉獻其種者六宫之人帥女宫而濯溉為粢盛者又二十七世婦之事則其共之者非六宫之人其誰歟王昭禹曰辨六齍之名物與其用使六宫之人共奉之者小宗伯世婦則帥之而已鄭鍔曰天官世婦言帥女宫濯溉為齍盛所帥者刑女耳為之於未共之前此所帥者六宫之人共之於正祭之日相外內宗之禮事鄭鍔曰皆佐后於奉祭之時世婦相之使無失禮大賔客之饗食亦如之賈氏曰王后亦有助王禮賔之法故內宰凡賔客之祼獻瑶爵皆贊鄭鍔曰比之帥之詔之相之皆如祭祀焉大喪比外內命婦之朝莫哭不敬者而苛罰之王昭禹曰肆師大喪令外內命婦序哭世婦則比其已哭者鄭康成曰苛譴也凡王后有􅉔事於婦人則詔相黃氏曰王於諸臣有拜王后於婦人亦有當拜者世婦詔相恐失其節王昭禹曰王后有􅉔事於婦人唯大喪而已喪大記曰夫人亦拜寄公夫人於堂上世婦則以言詔之以事相之凡內事有達於外官者世婦掌之鄭康成曰主通之使相共授鄭鍔曰世婦朝臣也兼統內官之事故可以通內外之令內事與外官相聯而外官所當供備者則世婦為之傳達黃氏曰世婦掌之蓋得糾正之也后事則授內小臣使達之王氏詳說曰婦人不預外政而內豎掌內外之通令世婦內事有達於外官蓋不能無好事於四方亦不能無好令於卿大夫但女謁不行耳總論鄭鍔曰先王於六宫之人既有小宰又有內宰又立世婦之官掌之如是其嚴蓋小宰內宰治其政以整齊於內世婦掌其禮以詔相於外內宗凡內女之有爵者鄭鍔曰內宗無數凡內女之有爵者皆謂之內宗以其與王同宗故掌宗廟之祭祀陳君舉曰富貴驕人自然之勢女子生於王族乘勢以輕其家者多矣故以內女為內宗外女為外宗列於禮官之屬其職在禮觀后之事宗廟則知所以順乎舅姑觀后之享同姓則知所以和其室人觀后之亞王祼獻則知所以從其夫矣召南何彼穠矣美王姬之詩彼天子所生而若此況王同姓姑姊妹之女子乎所以為王化之基掌宗廟之祭祀薦加豆籩賈氏曰尸既食后亞獻尸為加此時薦之即醢人籩人加豆加籩之實鄭鍔曰謂之加者加於九獻之外九獻為正獻其他為之加爵故所薦之籩豆謂之加以象生時饋之有加其掌之也以助王之致孝享劉執中曰九嬪贊豆籩之薦徹內宗又贊九嬪及以樂徹則佐傳豆籩鄭康成曰佐傳佐外宗王昭禹曰卒食之禮以樂徹于造方其以樂徹豆籩則后傳之內宗內宗傳之外宗外宗傳之有司迭相佐也鄭鍔曰凡祭之始終皆用樂以致神示之歡心周頌禘大祖歌雍以徹既祭而徹王后之職后徹而傳之內宗佐之也賔客之饗食亦如之王昭禹曰徹豆亦如祭祀鄭鍔曰其薦其佐皆然也王后有事則從王昭禹曰王后有事則從者則吉凶之事皆在焉大喪序哭者鄭康成曰次序外內宗及命婦哭王王昭禹曰序宫中之哭者哭諸侯亦如之賈氏曰此諸侯來朝薨於王國王為之緦衰者若檀弓云以爵辨純衣哭諸侯謂薨於本國王遙哭之則婦人不哭婦人無外事王昭禹曰內宗亦為之序哭凡卿大夫之喪掌其弔臨鄭康成曰王后弔臨諸侯而已是以言掌卿大夫云王氏曰世婦言掌弔臨於卿大夫之喪則王或使焉乃往內宗言凡卿大夫之喪掌其弔臨則凡喪皆往亦同族故也外宗凡外女之有爵者鄭康成曰外女王諸姑姊妹之女謂之外宗易氏曰王異姓之有爵者陳君舉曰案內外宗無人數恐是祭時旋立之官非常有也掌宗廟之祭祀佐王后薦玉豆視豆籩及以樂徹亦如之賈氏曰凡王之豆籩皆玉飾之鄭鍔曰內宗言加則外宗所佐者乃朝踐饋食之節非惟佐王后薦之又當視其實蓋豆實醢人共之內宗又臨視之及以樂徹則亦佐后項氏曰外宗異姓之女踈於內宗故佐薦而已又掌視豆籩之實其事詳也王后以樂羞齍則贊鄭康成曰贊猶佐也賈氏曰羞進也齍黍稷也后進黍稷之時依樂以進贊者亦佐后進之鄭鍔曰以樂羞齍與祼獻亞獻之時皆佐后劉執中曰佐九嬪也凡王后之獻亦如之鄭康成曰獻獻酒於尸劉執中曰謂朝踐饋食酳尸后亞王為獻也王后不與則贊宗伯鄭康成曰后有故不與祭宗伯攝其事王昭禹曰大宗伯凡大祭祀王后不與則攝而薦豆籩徹謂此也劉氏曰贊之如贊后之禮小祭祀掌事鄭康成曰小祭祀謂在宫中賈氏曰宫中小祭祀則祭法王立七祀七祀之中行中霤司命泰厲是外神后不與惟有門户竈而已項氏曰宫中之祀與饗皆掌事賔客之事亦如之王昭禹曰內宗賔客之享食佐后傳豆籩外宗賔客掌事如小祭祀之事則非特傳豆籩之事凡賔客之事皆贊后大喪則叙外內朝莫哭者哭諸侯亦如之鄭康成曰內內外宗及外命婦賈氏曰若內命婦則九嬪叙之王氏曰內宗大喪序哭者則與宫中之哭者叙焉外宗叙內外朝莫哭者則叙內女外婦之序哭冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人鄭康成曰冢封土為丘壠象冢而為之薛平仲曰先王立禮經世使生有所養死有所藏禮而至於有所藏則禮道竭而人道畢矣故冢以嚴其丘封之制冢人則以施之諸侯卿大夫之貴墓以寓其哀慕之思墓大夫則以施之國人之衆禮之所重莫加於此則以下大夫二人掌之然不得不可以為悅無財不可以為悅此又職喪之所由設也禮莫嚴於始尤嚴於終此又三官所以見於典禮之末也掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右王昭禹曰謂之公墓之地則其地屬於公而非私有之也自天子至於大夫士皆葬於此地冢人則掌焉易氏曰君臣分守雖嚴義均休戚故葬同兆域鄭康成曰圖謂畫其地形及丘壠所處而藏之王昭禹曰葬者則依圖授之地也先王造塋者昭居左穆居右夾處東西吕氏曰周公薨成王葬于畢祔于文武從周家之兆域也劉執中曰廟雖已毁而墓之昭穆不可遷也王昭禹曰先王制為合族之禮非特施於生者至於死皆使之以類相從凡諸侯居左右以前卿大夫士居後各以其族鄭康成曰子孫各就其所出王以尊卑處其前後而亦併昭穆賈氏曰諸侯卿大夫士謂上文先王子孫為畿內諸侯王朝卿大夫士死者則居先王前後之左右言居左右者若父為先王是昭則子為穆居右父是穆則子為昭居左為卿大夫居後亦然但昭穆不定故左右俱言謂一父之前後左右並有也各以其族者謂次第假令同昭穆兄當近王墓弟則逺王墓諸侯言左右卿大夫士各以其族互相通也凡死於兵者不入兆域鄭康成曰戰敗無勇投諸塋外以罰之王昭禹曰死政者既養其老孤而又享之所以勸之也凡死於兵者不入兆域所以絀之凡有功者居前鄭康成曰居王墓之前處昭穆之中央易氏曰既入兆域又居前列示勸而已黃氏曰諸侯居左右以前卿大夫居後有功者各居其前以爵等為丘封之度與其樹數鄭康成曰别尊卑也王公曰丘諸臣曰封漢律曰列侯墳高四丈關內侯以下至庶人各有差賈氏曰周禮丘封高下之數無文故鄭以漢法況之案春秋緯天子墳高三仭樹以松諸侯半之樹以柏大夫八尺樹以藥草士四尺樹以槐庶人無墳樹以楊柳王昭禹曰以昭穆為左右各以其族尚親也凡死於兵者不入兆域尚德也凡有功者居前尚功也以爵等為丘封之度與其樹數尚貴也蓋先王之所以治死者如此大喪既有日請度甫竁遂為之尸鄭司農曰既有日既有葬日也鄭康成曰甫始也請量度所始竁之處地劉執中曰請度深廣制度甫於冢宰而小宗伯蒞之冢人始穿地以為竁鄭司農曰始竁時祭以告后土冢人為之尸王氏曰凡祭為尸皆取所祭之類故宗廟之尸則以其昭穆之同山林之尸則以山虞竁墓之尸則以冢人及竁以度為丘隧共喪之窆器鄭康成曰隧羡道也度丘與羡道廣袤所至賈氏曰左傳晉文公請隧不許則天子有隧諸侯已下有羡道隧道則上有負土若鄭莊公與母掘地隧而相見者也羡道上無負土然則隧與羡别而鄭云隧羡道者對則異散則通窆器下棺豐碑之屬喪大記曰凡封用綍去碑負引君封以衡大夫以咸賈氏曰衡橫也謂以木衡之於棺傍乃以紼繫木下棺大夫卑不得以木橫之直有棺傍咸耳以紼繫之而下棺也及葬言鸞車象人鄭康成曰鸞車巾車所飾遣車也亦設鸞旗賈氏曰先鄭以象人謂以芻為人後鄭不從者以上古有芻人至周不用而用象人則象人與芻靈别鄭康成曰孔子謂為芻靈者善謂為俑者不仁非作象人者不殆於用生乎鄭康成曰言猶語也語之者告當行若於生存者於是巾車行之劉執中曰將葬則語以飭戒之及窆執斧以涖鄭康成曰臨下棺也賈氏曰鄉師職云執斧以涖匠師則此亦臨匠師兩官俱臨者葬事大也遂入藏凶器鄭康成曰凶器明器正墓位蹕墓域守墓禁賈氏曰墓位即上文昭穆為左右是須正之使不失本位墓域即上文兆域謂四畔溝兆蹕謂止行人不得近之夫王氏曰若墓大之巡墓厲也鄭康成曰禁所以為塋限賈氏曰謂禁制不得漫入王氏曰若墓大夫居其中之室以守之凡祭墓為尸鄭司農曰為尸冢人為尸鄭康成曰祭墓為尸或禱祈焉王昭禹曰凡祭墓為尸非特甫竁為之尸張氏曰墓祭非古也體魄則降知氣在上故立之主以祀之以致其精神之極而謹藏其體魄以竭其深長之思此古人明於鬼神之情狀而篤於孝愛之誠實者也然考之周禮則有冢人之官凡祭於墓為尸是則成周之盛亦有祭於墓者雖非制禮之本經而出於人情之所不忍而於義理不至於甚害則先王亦從而許之其必立之尸者乃所以致其精神而示享之者非體魄之謂其為義抑精矣凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁賈氏曰上文惟見王及子孫之墓地不見同姓異姓諸侯之墓地故此經總見之若然此墓地舊有兆域今新死者隨即授之王氏曰授之兆則使之自竁窆均其禁則均其地守焉墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人鄭康成曰墓冢塋之地孝子所思慕之處賈氏曰禮記云庶人不封不樹故不言冢而言墓墓即葬地陳君舉曰墓大夫徒二百人豈不多哉然邦墓地域禁令度數皆掌焉帥其屬而巡墓厲居其中之室以守之與後世人自求地家自置守富則僭而不忌貧則窘而無所葬掘墓盜尸斬木之獄不絶於有司利害煩省異矣掌凡邦墓之地域為之圖鄭康成曰凡邦中之墓地萬民所葬地令國民族葬而掌其禁令鄭康成曰族葬各從其親黃氏曰司徒本俗聯墳墓此獨國民耳劉執中曰民遂其私而害先王喪凶之禮者以無禁令故也正其位掌其度數鄭康成曰位謂昭穆也度數爵等之大小易氏曰度數多寡也賈氏曰鄭見有爵者謂本為庶人設墓其有子孫為卿大夫士則其葬不離父祖使皆有私地域鄭康成曰古者萬民墓地同處分其地使各有區域得以族葬使相容凡爭墓地者聽其獄訟鄭康成曰爭墓地相侵區域易氏曰聽其爭則族葬不至相犯帥其屬而巡墓厲居其中之室以守之賈氏曰屬者墓大夫帥下屬官也鄭康成曰厲塋限遮列處賈氏曰墓大夫帥其屬巡行遮列之處鄭司農曰居其中之室有官寺在墓中賈氏曰萬民墓地於族葬地中央為室萬民各自守之劉執中曰聖人父母其民生則富其衣食而教以仁義死則為之地域而守其丘樹則為子孫者有不忠乎君而不服其教者乎職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人鄭康成曰職主也掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事王氏曰職喪上言諸侯下言卿大夫士乂言凡有爵者包三公矣鄭康成曰國之喪禮喪服士喪既夕士虞今存者其餘則亡事謂小斂大斂葬也劉執中曰凶喪之禮下達萬民茍無主執以涖其事則有過中而僭於上者有不及於中而遺其親者是以職喪掌之五服有制尊卑異儀殯斂虞祔祭禭含贈皆有定法不可過不可不及凡國有司以王命有事焉則詔贊主人鄭康成曰凡國有司有司從王國以王命往有事謂含禭贈賵之屬詔贊者以告主人佐其受之劉執中曰詔贊主人以禮拜命也凡其喪祭詔其號治其禮鄭康成曰告以牲號齍號之屬當以祝之賈氏曰先鄭以號為諡號小宗伯云小喪賜諡讀誄不在此故後鄭不從謂若特牲少牢云柔毛剛鬛嘉薦普淖皆祝辭凡公有司之所共職喪令之趣其事鄭康成曰令令其當供物者給事之期也有司或言公或言國言國者由其君所來居其官曰公謂王遣使奉命有贈之物各從其官出職喪當催督也易氏曰凡公有司之所共者此謂在鄉則鄉之有司共其物在國則國之冇司共其物各有定制不待王命者則職喪以其制令之愚案治其喪已見宰夫此則趣其事而已周禮訂義卷三十七
