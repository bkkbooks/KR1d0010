body:
  text: 周禮訂義卷四十九宋王與之撰司勳上士二人下士四人府二人史四人胥二人徒二十人賈氏曰軍以賞為先故司勳列職在前鄭司農曰勳功也此官主功賞鄭鍔曰大功之目皆可紀之績獨以勳名官者曰以德立宗廟社稷曰勳人臣立功無大於此取以名官冝矣愚案賞功莫急於戰命官則名以勳見得功以輔王為主而戰特出於不得已陳君舉曰六功戰居一焉而司勳𨽻政官何也軍政賞不踰時屬之他官則司存散隔文告回復而壅底之患生況有害功者乎掌六鄉賞地之法以等其功鄭康成曰賞地賞田也在逺郊之內屬六鄉焉易氏曰封國百里以至五百里非六鄉之所能給是六鄉賞地不過與官田牛田牧田並列而已以左傳考之昔鄭伯賞入陳之功賜子展三命之服先八邑注謂八邑三十二井又討衛疆戚田取衛西鄙懿氏與孫氏注謂取田六十井此賞田之明證即下經所謂參之一食者等猶差也鄭鍔曰功有小大地有美惡頒之之法以功為差而已觀羣臣之功有為王而立者有為國而立者有為民而立者有興事者有致治者有力戰者隨其功而目之因以第其髙下而為之等然後頒以地焉謂之等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多鄭鍔曰王功者輔成王業勤勞王室輔幼孤以嗣王者之緒眀王道以成王者之治即是功而謂之勳勳有薰蒸之義謂其功之大薰蒸宇宙上逹于王也周公之有大勳勞是已國功者國爾忘家盡瘁事國凡所施為無非為國計者即是功而謂之功功者事有成效之義劉執中曰謂能左右其君造成王業創有天下若伊尹之相湯十亂之相武王太公之相成王蕭曹之相髙祖獨此名曰功蓋人臣立功正以保全王國為主進而上名以勳功不足道也抑而下則曰勞曰力之類皆不足正名其功也惟為國而有成者正可謂之功如九旗皆旗獨熊虎則正名曰旗五侯皆侯獨侯服則正名曰侯之類民功者害為民除之利為民興之或便於昔而不便於今則為民革之或興於前而廢於後則為民舉之即是功而謂之庸庸者用也用者通變之義治民者貴能通變以盡利易曰通其變使民不倦能通變者斯可以為民功也事功者或從王事或任國事或有所營為或有所創制黽勉從之不畏其適我也即是功而謂之勞勞有經營艱苦之意也詩人於從王事則歎其賢勞於逺行從政則閔其勤勞任其勞者斯可以為事功治功者或平水土或辟草萊或任土地或疏導溝洫即是功而謂之力力謂其用力以作為也記曰小孝用力傳曰小人勞力孟子曰或勞心或勞力極其力者斯可以為治功矣王氏曰孔子言禹盡力溝洫是也戰功者戰以伐謀為上而以伐兵為下以正合以竒勝執俘折馘斬將搴旗奏愷而旋者是也即是功而謂之多多者算數過人之義人算其一我算其十人算其百我算其千出竒無窮人莫能測以多算勝者斯可以為戰功矣多之為義惟戰功可稱周平王錫晉文侯曰爾多修扞我于艱史書周勃之功曰至城下為多當馳道為多皆指言其戰功而已黃氏曰戰功居下名之曰多言殺獲已多可止也先王之兵誠用於不得已耶凡是六功各正其名隨名頒賞賞典重輕自然各適其當别而言之有六者之殊合而言之總以功名之可也賈氏曰六者對文為義若散文則通凡有功者銘書於王之大常祭於大蒸司勳詔之鄭康成曰銘之言名也生則書於王旌以識其人與其功也劉迎曰先儒釋典庸器之序官既以庸器為銘功之器何至此遽改銘為名而謂書其名于王旌耶蓋考之諸經凡言銘者四湯之盤銘衛孔悝之鼎銘嘉量之銘林鍾之銘皆刻而鑄之於器者也今言銘與書為一事則銘豈書者耶而止曰凡有功者銘銘之為器有鼎有鍾有蒸彛之屬非大常大蒸可指名之也死則於蒸先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹豫大享于先王爾祖其從與享之是也今漢祭功臣於廟庭王氏曰大蒸冬之大享當是時百物皆報焉祭有功冝矣鄭鍔曰大常之書司常之職也大蒸之祭大宗伯之職也司勳知立功之人當銘則詔之使銘當祭則詔之使祭銘於大常使與日月同其久也祭於大蒸使與祖宗之神同享乎盛祭也可以見其報之之厚王昭禹曰必使司勳詔之則以有大功者其二藏于司勳故也大功司勳藏其二鄭康成曰二猶副也功書藏於天府又副於此者以其主賞鄭鍔曰秋官司約掌治功之約六功之約冝司約之所藏也先王之心猶慮夫約之或亂則失報功之心故凡六功之二皆藏于司勳茍司約亡之其二可考於此則記功之心不替也藏其二以為賞功之據掌賞地之政令易氏曰賞之輕重視其功此所以為賞地之政令鄭鍔曰賞之以地治其賦役之法以授之故掌其政令凡賞無常輕重視功鄭鍔曰賞典之行何常有一定之制或輕或重視其功之大小而已此頒地之法所以盡至公也王氏曰事勞若一時有劇易戰多若一敵有堅脆若此屬不可為常故輕重視功凡頒賞地參之一食鄭康成曰賞地之稅參分計稅王食其一也二全入於臣王氏詳説曰周禮所謂三之一者見於大司徒又見於大司馬其説有二初不可槩論夫司馬所謂下地食者參之一謂下地授田百畝萊二百畝一年耕之二年休之此一説也鄭鍔曰賞地非田也田無不可耕之理也有可有不可者二分而一可食則一分可耕之田也大司徒言諸侯之地四百里諸伯之地三百里其食者三之一謂諸伯受其二而以一歸之天子此又一説也此所謂頒賞地參之一食當以大司徒所載之説先鄭謂不以美田為采邑失之矣有功之臣賜之以下地豈成周重功臣之本意哉大抵先王之制外而五等所封之土亦以其餘入於夭子公之五百里其所入者半侯伯所入者三之一子男所入者四之一內而二等所食之采地亦以其餘入於天子百里之地凡四都所入者一都五十里之地凡四縣所入者一縣二十五里之地凡四甸所入者一甸此無他尺地莫非王土耳惟加田無國正音征鄭鍔曰若有大功既賞以地又有加賜之田則無國征凡賦役皆免所以優有功而厚報之也蓋賞地在逺郊逺郊二十而三固有征也加田則出於常制之外不敢取其征非有大功者不足以預此王昭禹曰國正謂以國法之正而征之與書所謂有正有事司書言九正九事同意夫一夫之家受田百畝征之則有常法矣加田所以優其功之多又何征之有馬質中士二人府一人史二人賈四人徒八人鄭康成曰質平也主買馬平其大小之賈直鄭鍔曰或謂地官質人亦掌成馬賈又有馬質何耶質人言掌市之牛馬則人民所貿易者也馬質主官府所用者質定其賈而買之於民薛平仲曰賞典所以振士氣故司勳之官不可緩馬材所以謹戎備故馬質之官亦不敢後先王於嵗時稽鄉遂之牛馬以辨其可任之物馬之在民固無不足之慮而公馬之備闕不以責乎民而取材於公以給之是以有馬質以視其材之髙下任之能否賈之多寡由之以别用之緩急由之以定而馬固各適於用矣然馬質冝校人之屬今以中士之卑特先於校人中大夫之尊者蓋掌主馬之政而詳及於六馬者校人之官固在所當重量三馬之材惟急於戎馬者馬質之官實在所當先先儒謂司馬主軍法序官前後不以尊卑為據直取其事急者居前事緩者居後其有見於此掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈音嫁易氏曰此言市馬之政王昭禹曰戎馬謂共戎事之馬田馬謂共田事之馬駑馬者馬之賤而共冗事者也黃氏曰駑馬駕後車輜車易氏曰物云者國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸其用各有等其材各有冝故皆以三物量之有物則有價故謂之質鄭鍔曰校人所掌者六馬質人以質馬為職只量三物何邪蓋種馬齊馬道馬欲其上善則育其種於國戎也田也駑也三馬所用為甚衆買於民以供用馬質所質者買於民也故既視其三等之物又從而量其尺寸以知其所冝用或可任以戎者或止為駑以供雜用者量其髙下又因以知其價黃氏曰種道齊非所給受也受馬者書其賈馬死則更然則馬量三物者非為買馬也疏家謂列職于此為平馬價非也綱惡馬易氏曰此言養馬之政王氏曰綱謂以縻索維之所以制其奔踶也黃氏曰不使擾羣且令受馬者知其性凡受馬於有司者書其齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更其外否賈氏曰所受之馬謂給公家之使王昭禹曰書其齒者書其齒之數書其毛者書其毛之色書其賈者書其賈之直將以防其養視之不謹使以其物償之也黃氏曰齒則老壯毛則貴賤齒毛各有賈貴賤賈定老壯有進退鄭司農曰更謂償也李嘉會曰受馬於官未及旬而死安知非前之所養者失其職必欲後之所受者備償其色樣得無難乎蓋前者失其養則後者不當受既受而馬死必後者失職也責其備更則授受之時致養之際必不茍矣若夫旬之外死止以物色相類者入焉至於二旬之外惟入馬而不拘以物色矣馬質云者如今之馬博士善曉馬病善療馬疾醫治已久知非所養者罪也鄭康成曰旬之內死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪黃氏曰旬之內死全償其賈旬之外以其物償物皮筋骨也不及賈則附益之馬肥齊容有不同也入馬耳防抵偽也鄭康成曰不償齒賈其外否遝其死馬而已馬及行則以任齊其行黃氏曰此亦頒馬之政鄭鍔曰馬之駕車欲其如一戎事欲其齊力國事欲其齊足於能行之初則用物以齊之因其所任之輕重以别識其強弱蓋不先以任而齊其行則駕車之際強弱不等矣若有馬訟則聽之易氏曰聽馬訟則養馬市馬之政皆得其平黃氏曰訟鄭謂賣買之言相負非也買賣質劑自有主者馬質主頒馬之政令有訟則聽之禁原蠶者鄭康成曰原再也王昭禹曰物有異類而同乎一氣相為消長相為盈虛其勢不能兩盛也以天文考之午馬為絲蠶則馬與蠶其氣同屬於午也辰為龍馬為龍之類蠶為龍之精則馬蠶又同資氣於辰也一歲之中苟再蠶焉則蠶盛而馬衰故原蠶者有禁自非深通乎性命之理者烏能及此鄭鍔曰蠶者衣之原可勸之勤不可禁其再因其再而禁之抑亦先王之世不專用絲故歟嬪婦所化者有麻枲獵所得者有狐貉則雖禁原而衣不患不足李嘉會曰今東南如兖揚衣被天下蠶盛而無馬西北苦寒之地有馬而無蠶蓋可知矣量人下士二人府一人史四人徒八人鄭康成曰量猶度也謂以丈尺度地薛平仲曰有司勳以勵戰士有馬質以謹戰備當陳師鞠旅以俟戰也而軍旅所聚不可不量地之所容以嚴其規畫也於是有量人以量之則節制名分之定而人情喧囂之禁蓋有截然不可干者然不寧惟軍事為然平時申嚴建國之規使內外有定分人心有定守者大抵然也掌建國之法以分國為九州營國城郭營后宫量市朝道巷門渠造都邑亦如之鄭康成曰建立也立國有舊法式若匠人職云王昭禹曰掌建國之法則以王國為主也黃氏曰海內之地方千里者九三三比之是為方三千里也於是分建侯國畫為九州牧伯之制詳焉其界域則必因其名山大川鄭鍔曰九州之制其來尚矣量人分而為九此主為建邦國造都邑而言之司空掌度地以居民欲使地邑民居必參相得匠人掌營國為溝塗之制則掌其營造之役乃若量人專主其丈尺廣狹之法以此法分國為九州使廣狹各適平則於其中可以容建侯國故也建國則外焉營王國之城郭內焉營王后之六宫又量其前以為朝量其後以為市使往來有道閭里有巷出入有門通利有渠也市朝之地則一夫道巷則或九軌七軌門則或九雉七雉渠則理孫以行水法皆出於此上言分國為九州指天下為國也下言營國城郭指王城為國也量地廣狹以為之制此國之常也或謂建國而營城郭不言營王之寢乃言營后宫何邪蓋君治外則有朝后治內則有宫宫與朝雖有內外其尊則均也康成謂后者王與諸侯其説失之造都邑亦有城郭道巷但制度削小耳其説亦然蓋裁酌其制以授之也營軍之壘舍量其市朝州塗軍社之所里王昭禹曰壘謂軍壁舍謂軍舍劉氏曰六軍之行則營其所次之壘每軍必有市有朝每州一師二千五百人五師為軍各有塗道賈氏曰州即師也師皆有道以相湊之未必環繞為路而軍社則有常居之里李嘉會曰軍社者社之在軍者也皆是量人制其廣狹也王氏詳説曰市朝州塗其采地之環塗歟天子經塗九軌環塗七軌野塗五軌環塗以為諸侯經塗野塗以為都經塗則是外諸侯經塗七軌環塗當五軌野塗當三軌矣內諸侯經塗五軌環塗當三軌野塗當一軌矣市朝之塗以文意考之則為三軌鄭鍔曰營軍之壘舍非徒欲廣狹足以相容又以社主為重所居之處欲其不褻邦國之地與天下之塗數皆書而藏之鄭康成曰書地謂方圜山川之廣狹書塗謂支湊之逺近鄭鍔曰王者中天下而立欲通道於四方則邦國之地與天下道路所通之塗數凡有支湊之逺近不可不知也必書而藏於此者以夏官掌九畿之籍而職方氏屬焉量人掌其量度之法冝有其書也王昭禹曰營之則以制其分域量之則以知其所容書而藏之則以備其考察所謂建國之法如此凡祭祀饗賔制其從獻脯燔之數量鄭鍔曰獻之禮始於祼獻王即以肝洗於鬱鬯而燔之制祭於主前以玉角酌玄酒以獻尸后亞獻是之謂從獻在朝事之前祼事之後祭之末有加獻故祭之始有從獻以明祭之終始有隆而無殺然九獻之中不以從獻聨數蓋與加獻同意也脯者薄析肉為之也燔者加於火而炙之也王氏詳説曰正獻之脯見於籩人所謂加籩之實蓤芡栗脯正獻之燔見於生民所謂載燔載烈王昭禹曰從獻者以所獻牲牢為正而以脯燔為從也數者多少之目也量者長短之制也王昭禹曰物之所共則有數器之所容則有量儀禮所謂脯十脡各長尺二寸是脯之制也燔則不可考愚案燔是炙肉祭祀饗賔皆有從獻之禮所用脯膰有數量存焉使量人制之者先王建官有專而用之亦有因而命之如巾車掌路路有鸞之聲因使之鳴鈴以應雞人車僕等萃車以為屏蔽因使之大射共三乏則量人制脯膰之數量者因其掌尺寸量度之法故也掌喪祭奠竁昌絹反之俎實王昭禹曰奠謂遣奠竁謂穿土為壙其祭皆有俎實亦必量人掌之者以其制數量故也凡宰祭與鬱人受斚古雅反又音稼歷而皆飲之鄭鍔曰祭祀之時又有宰制之禮量人掌量數亦得以飲福記曰宗廟之內敬矣君親牽牲夫人贊幣而從君親制祭夫人薦盎此諸侯之禮也陸佃推制祭之節謂諸侯有享牛無求牛故制祭在迎牲之後天子有二牛故祼獻則制祭諸侯之制祭則謂之制天子之制祭則謂之宰異其文者所以别尊卑也其義一耳當宰制之時尸既即席祝乃舉斚角詔妥尸訖事則量人與鬱人受舉斚之餘瀝而皆飲之所以受神之福也鬱人之言與此同鬱人掌鬯以求神交神以德也量人制其量數事神以禮也事之如此其受福也冝均故同飲其斚歷焉者無餘之意以見其受福之盡也先儒與王安石皆以宰為冢宰失之逺矣王氏曰受斚歷而皆飲之受斚傳之他器而皆飲之也鬱人於祭祀逹其氣臭以始之量人於祭祀制其量數以成之二者本末相成皆所以致福而逹臭以始之者主王制量數以成之者主宰故鬱人大祭祀與量人受舉斚之卒爵而飲之量人宰制則與鬱人受斚歷而皆飲之皆飲所以致福者盡矣王氏詳説曰案少牢饋食之禮主人受嘏執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人量人受斚其亦出房之時歟以嗇黍授祝以爵授鬱人量人貺助祭乎記曰夫祭有畀輝炮翟閽者惠下之道也愚案受斚見鬱人小子下士二人史一人徒八人薛平仲曰量人既量地以集師旅之衆當其將戰所以必其用命者要必有托以申警之故大司馬則曰羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之而小子亦曰凡師田斬牲以左右徇陳蓋誓羣吏者司馬斬其牲者則小子也斬牲者小子共其牲者則羊人也是以小子羊人次於此焉或曰小子羊人之職皆以祭祀為首非專取乎軍事不思小子所謂祭祀者必先之以珥乎社稷羊人之掌羊牲亦曰凡祈珥共其羊牲蓋用師之際量人嘗致嚴於軍社之所里矣凡軍之不用命者實於是乎戮之此固二官有托於誓師之先也或者又曰牲之可斬以徇陳者若不特於羊二職必以羊牲者果何意邪羊之為性嗜死而不懾人之當戰亦欲見危而授命誓師之際豈不切於用哉夫有司勳以謹戰功之賞人心蓋知勸於先矣而斬牲以戒其不用命小子又次之於後焉人心於此孰不樂其賞而畏其威哉命官曰小子或誓師者之所稱如曰豫小子非但以小事為名也當從識者問之掌祭祀羞羊肆他歷反羊殽肉豆鄭司農曰羞進也鄭鍔曰羊肆者肆解牲體而進之也羊殽者體解折節而進之也肉豆者以羊肉為醯醢之屬置於豆中者也劉氏曰謂切肉而以豆羞者也王昭禹曰醢人所掌四豆之實謂以豆盛其所實之醢而進之也先儒云羊肆體薦全蒸也或謂祭宗廟不得有全蒸謂肆者豚解而腥之體解而爓之初朝踐則有豚解及饋獻則有體解酳尸乃有熟正禮運所謂腥其俎熟其殽者宗廟之祭不得全蒸故讀肆為鬄鬄者解也小子所羞者如此而掌珥于社稷祈于五祀愚案珥當為弭如小祝所謂弭兵災祈如小祝所謂祈福祥非釁事也易氏説見肆師黃氏曰社稷五祀皆人所依以生者故皆有禱祈之事祭法聨序與宗伯小子同祭法曰王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戶曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為五祀大夫立三祀曰族厲曰門曰行適士二曰門曰行庶人一祀或戶或竈是皆上下通得祭者非天子不祭天而天子與庶人皆得祭社尊父親母之義也祭法七祀宗伯五祀司命泰厲非地類血祭者唯五耳月令四時祀戶竈門行中霤是也愚案餘見大宗伯凡沈辜侯禳如羊反飾其牲鄭司農曰沈謂祭川爾雅曰祭川曰沈浮辜謂磔牲以祭也月令曰九門磔禳以畢春氣候禳者候四時惡氣禳去之王昭禹曰沈謂貍沈辜謂驅辜候謂候福禳謂郤禍愚案沈辜候禳之義見小祝易氏曰飾其牲被之以文繡謂羊牲也黃氏曰飾之以歆神釁邦器及軍器鄭康成曰邦器謂禮樂之器及祭器之屬王昭禹曰軍器五兵鼓鐸之屬易氏曰甲胄戈矛之器鄭鍔曰凡物之用釁者皆謂始成之時也器始成則殺牲以血釁焉小子掌用羊血以釁也鄭康成引雜記器成釁以豭豚謂此小子之職所釁者亦用豭豚不知此職所主者羊非豭豚也凡師田斬牲以左右徇陳鄭康成曰示犯誓必殺之鄭鍔曰師田有徇陳之事誅其不用命者也不用命者皆很而不率之人令小子斬羊以示之羊者至很之物宋義曰很如羊強不可制者皆斬之此類是也祭祀贊羞受徹焉賈氏曰贊羞若司馬羞魚牲之等此官即贊之受徹謂祭畢諸宰君婦廢徹之時此官受之黃氏曰受徹將割剝而享之鄭鍔曰祭祀之事始則有羞終則有徹羊牲之羞司馬事也始焉羞則小子贊之終焉徹則小子受之皆職之所掌也故始終皆任其事王昭禹曰必使小子以所掌皆事之小故也羊人下士二人史一人賈二人徒八人王昭禹曰小宗伯毛六牲頒之于五官使共奉之而夏官掌共馬與羊羊之用於禮為多此掌羊牲所以立羊人之官也掌羊牲凡祭祀飾羔易氏曰羊人之共羊牲如牛人共牛牲雞人共雞牲犬人共犬牲類也未為牲也數官擇其純者而取之於牧人然後命牧人卜其為牲者共之於充人至充人然後謂之牲此言共羊牲以其共而為牲鄭康成曰羔小羊也詩曰四之日其蚤獻羔祭韭賈氏曰凡正祭皆用成牲今言飾羔則非正祭是以鄭引詩為證夏二月開冰之時王氏曰飾羔若禮所謂飾羔鴈者以繢也王昭禹曰羊人於凡祭祀飾其羊牲而已祭祀割羊牲登其首鄭康成曰登升也升首報陽也升首於室賈氏曰郊特牲云用牲於庭升首於室注云制祭之後升牲首於北墉下報陽者首為陽也三牲之首俱升此羊人所升故止言羊凡祈珥共其羊牲鄭康成曰共猶給也賔客共其法羊王氏曰法羊謂牢禮之法所用也賈氏曰言法即是依法度多少送於賔館及道路如掌客所出是也鄭鍔曰賔客之來王國饔餼之禮皆以爵等為之數其供也合於禮法故以法羊言之凡沈辜侯禳釁積徐賜反共其羊牲劉迎曰先儒釋侯禳禱祠之祝號則以侯為候嘉慶如祈福祥之屬禳為却凶咎如寧風旱之屬則侯與禳蓋二祭矣至釋此沈辜侯禳釁積謂候四時惡氣而禳去之是以侯禳為一祭也考之羊人沈則沈貍以祭山川辜則疈辜以祭四方釁則釁邦器軍器積則積燔禋燎鄭司農曰積故書為眥眥讀為漬謂釁國寶漬軍器也以是而推則侯禳用牲而侯禳去凶者也非一祭乎王昭禹曰沈辜侯禳及釁小子掌其事羊人共其牲而已若牧人無牲則受布于司馬使其賈買牲而共之鄭康成曰布泉也王昭禹曰羊於禮之用為多故牧人或至於無牲則受其買牲之布于司馬使其賈買而共之以羊人之屬有賈二人能知物價者也鄭鍔曰或謂牲皆繫于牢芻之三月繫于國門然後可用使賈買之何以致其誠邪不思牧于牧人者共大祭祀固有國之常典買牲而共者特沈辜侯禳釁積之事他則不可也王氏詳説曰地官牛人夏官羊人牛羊之用廣矣牛人之職祭祀有享牛求牛賔客有牢禮積膳之牛饗食賔射有膳羞之牛軍事有犒牛喪事有奠牛會同軍旅行役有兵車之牛而羊人所謂羊牲者祭祀不過飾羔祈珥沈辜之事不過羊牲賔客不過法羊而已此牛為大牢而羊為少牢也司爟古煥反下士二人徒六人薛平仲曰司爟之職特掌行火之政令以救時疾序官必次于此何哉觀韓詩外傳有曰隂陽不和四時不節星辰失度災變非常則責之司馬知司馬之政蓋通于天道矣鄭鍔曰或謂秋官有司烜之職夏官有司爟之職俱掌火也何以分為二蓋司烜之取火也以夫燧用金錫為之西方之物也故屬於秋官司爟之行火也觀大火之星出沒以示民使民觀出內之時而用火夏令行於南方盛德在火尤為可見故屬于夏官此其所以異愚案餘説見司烜氏掌行火之政令四時變國火以救時疾鄭康成曰行猶用也鄭鍔曰政令或因時而用因時而藏鄭康成曰變猶易也鄭鍔曰火久而不變則炎赫暴熇陽過乎亢以生癘疾隨四時而更變之變之之法則鑽燧而改之春取榆柳夏取棗杏季夏取桑柘秋取柞楢冬取槐檀四時各鑽一木時運而往火變而新用諸烹飪之間使之資以養生故疾不作王昭禹曰火之為物灼之則以燭以燎㸑之則以烹以飪逆而用之則強弱相勝而氣無以為均順而變之則休廢相治而疾以之敕陽之盛則養隂之弱以抗其強隂之盛則用陽之強以救其弱使氏常得隂陽之正氣而不溺於一遍斯能受正命以生死聖人善救人之道於此乎可見矣季春出火民咸從之季秋內火民亦如之鄭鍔曰東方七宿心為大火出於夏之三月其位在辰伏於夏之九月其位在戌戌為火伏之位辰為火出之方古之火正或食於咮以出內火其或出或內皆視天之大火伏見以為節薛氏曰火之象在天既有伏見之時火之用在人亦有出內之節傳曰火見於辰故自辰至巳其方為火所王當是時雖烈山焚萊不禁也何則因其王而出之以宣其氣耳傳曰火伏於戌自戌至亥其方為火所休當是時雖鑠金燒剃不為也何則因其休而內之以息其氣耳或者徒泥於出內之文謂火者民事之大者也季春則出之始用季秋則內而不用不幾於廢民事乎且出火於季春非謂季春之時始用火也出其新火而導逹乎陽之氣也內火於季秋非謂季秋之時而不用火也內其舊火而順適其隂之氣也司爟所謂四時變其出內之火宫正所謂春秋修火禁者修其內出之禁尚何季春始用而季秋不用乎昔子産鑄刑書士文伯曰火未出而作火以鑄刑器藏爭辟焉是不知先王納火之制也單襄公假道於陳火朝覿矣道茀而不可行是不知先王出火之制也陳及之曰季春出火民咸從之季秋納火民亦如之互言之也先納舊火而後出新火春秋皆然也古者五行之官掌金木水火土火盛則制之衰則長之後世世失其官官失其職故水有泛濫之患火有焚燎之害木不盛大土多湮曠金不從革無復先王之盛矣而區區究其末流其能已乎時則施火令易氏曰施火令謂施四時變國火之令鄭鍔曰宫正司烜皆謂之修火禁此謂之施火令者修則修其舊法使不廢施則施其新令使人從也凡祭祀則祭爟賈氏曰祭㸑祭老婦也則此祭爟謂祭先出火之人王氏曰舉火曰爟祭祀用爟故祭焉鄭鍔曰先王於有功之人未嘗忘報如先農先蠶先卜皆有祭也而況鑽木出火以教人者乎凡國失火野焚萊則有刑罰焉鄭鍔曰國中失火則有延燒比屋之憂野中焚萊則有焚及山林之害大則有刑小則有罰亦權罪之輕重而加之耳或謂春田則焚萊而司爟有焚萊之禁何也先儒謂春田用火之後擅放火則有禁罰吾以為焚萊者國搜田之時野焚萊則民無故而自焚不得不為之禁周禮訂義卷四十九
