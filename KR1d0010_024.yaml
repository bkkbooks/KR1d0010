body:
  text: 周禮訂義巻二十四宋王與之撰質人中士二人下士四人府二人史四人胥二人徒二十人鄭康成曰質平也鄭鍔曰物有不齊之價人有爭利之心買欲賤賣欲貴價若不平則爭競之端起周家立質人以中士二人為之王平定物價既治其質劑又治其書契息爭競也掌成市之貨賄人民牛馬兵器珍異鄭康成曰成平也王昭禹曰物有美惡直有貴賤人有好惡二三而不齊苟使買儥之人自相為市無所質而自化居庶物有無相濟豈可得哉此質人所以掌成其買儥焉成者使彼此皆成而無虧也項氏曰貨賄財物也鄭鍔曰人民奴𨽻之稱耳粥於市者豈良人哉項氏曰兵器弓矢戈㦸也王氏詳說曰王制云戎器不粥於市謂私粥也若官為粥之而平其價何不可之有不然六鄉六遂之間以嵗時簡其兵器者當資之於何人耶孟子曰農夫以其粟易器械陶冶亦以其械器易粟是兵器非鄉遂之農所自為也明矣鄭鍔曰王制謂戎器不粥於市殆亦夏商之制歟鄭康成曰珍異四時食物項氏曰錦文珠玉也凡賣儥者質劑焉大市以質小市以劑楊氏曰質謂牙保劑謂賣買交納鄭鍔曰誕謾欺詐之心常由利起不有以結其信則爭訟多刑獄煩故凡賣儥者必使立質大市則物與錢俱多則用質質則立見以為證小市則物與錢俱寡故用劑劑則立文約以齊之不必立見也說者謂大曰質小曰劑質則所期者逺劑則所期者近故又有長曰質短曰劑之說康成謂人民牛馬謂大市兵器珍異為小市何其說之不通耶掌稽市之書契鄭康成曰稽攷也治也書契取予市物之券也其券之象書兩札刻其側易氏曰契之為物人執其一予者執左見其予之之仁取者執右見其取之之義合之以為驗示其取予之信而已同其度量壹其淳音準制巡而攷之犯禁者舉而罰之王昭禹曰同其度則齊其長短同其量則齊其淺深壹其淳則齊其布帛之幅廣壹其制則齊其布帛之匹長既同而壹之又巡行而考校之項氏曰巡攷具物不中於度量不合於淳制其或犯禁則舉其貨罰其人如此則詐偽者無所容其間矣質人言犯禁者舉而罰之而不言凡財物司門言凡財物犯禁者舉之而不言罰者蓋言舉而罰之則凡財物可知矣司門所舉未及交利也故舉之而已凡治質劑者國中一旬郊二旬野三旬都三月邦國朞期内聴期外不聴鄭康成曰謂齎契券者來訟也以期内來則治之後期則不治所以絶民之好訟且息文書也郊逺郊也野甸稍也都小都大都王氏曰質劑之治宜以時决久而後辨則證逮或已死亡其事易以生偽故期外不聴亦所以省煩擾史氏曰市之交易本無可貰其許貰者必其信結以為先故立券以貸之其過期而不償者必力屈而無所出矣使官為聴其踰期之訟則積年之負將不勝其也征索而民亦困矣期外不聴先王教民以折券棄債門里人中士二人下士四人府二人史四人胥二人徒二十人鄭康成曰門里民居區域之稱鄭鍔曰孟子曰市㕓而不征法而不門里則天下之商皆恱而願藏於其市說者以為貨物貯藏於市中而不租稅故曰㕓而不征其有貨物久滯於門里而不售者官以法為居取之故曰法而不㕓然則㕓人之官掌市中之區域者蓋有授田夫一㕓之㕓有市肆居貨之㕓則市中可藏貨物之地故設㕓人之官王昭禹曰掌斂市五布而名官曰㕓人以其布出於市門里之中也李景齊曰先王為治市而設官者有十所以掌其征者僅一㕓人其餘惟在於防民之姦與夫治其有無相通之政輕重之意可槩見掌斂市絘音次布緫音䜛又音揔布質布罰布門里布而入於泉府鄭康成曰布泉也王昭禹曰所斂之泉謂之布所入之府謂之泉蓋布言布利於外泉言利出於一孔愚案絘布胥師所取其在次之布也緫布肆長緫斂在肆之布也質布質人所稅質劑者之布也罰布司市所舉犯市令者之布也方貨入於市胥師賈師各居其次辨物經市其間有詐偽者罰之以布出於次謂之絘布貨入于肆肆長隨其所貨之物收其稅緫而計之其數非一謂之緫布質人賣儥之質劑如今田宅牛馬官給券以收稅謂之質布司市於辟布等有犯于市令舉而罰之謂之罰布㕓人正掌市㕓之地凡諸物邸舎之稅㕓人得以斂之然㕓人本斂㕓布亦兼斂五布者欲使之知取以任地者不可取其物之稅取其物之稅者不得取其地之稅㕓人所斂必入於泉府又將斂市之不售與貨之滯於民者雖取之實予之豈若後世因之以奪民之利哉凡屠者斂其皮角筋骨入于玉府賈氏曰謂屠殺牛羊之類其人亦有地稅因其屠即取皮角筋骨堪飾器物者使入玉府以當邦賦王氏曰屠者正以肉為利皮角筋骨則其餘財斂而入之于玉府則明玉府所取非民正利凡珍異之有滯者斂而入于膳府鄭鍔曰膳府以供王及后世子之膳羞乃用其滯而不售者蓋物之珍者其價必增髙市人不之市則其物滯者言其售之不速也官為斂之非徒有以供貴者之膳亦使物不臭腐而商販不絶史氏曰皮角筋骨非食物也故斂而入于玉府所以資百工之器用也食物之有珍異屠者資以為生而有滯焉將腐敗而不可食斂而入於膳府則民不失財官得實用所謂兩利緫說陳君舉曰王荆公嘗謂周禮一書理財居其半自有周禮以來劉歆輔王莽專為理財至荆公熙寧亦專理財所以先儒多疑於周禮今細考之亦誠有可疑且以㕓人一官論之所謂絘布者鄭氏謂列肆之稅即今之房廊錢所謂㕓布者鄭氏謂諸物邸舎之稅即今之白地錢又有罰布者賣買不平之罰質布者質人巡考犯禁之罰即今之撘地錢又有緫布者子春謂無肆立持之稅若熙寧間不係行錢人凡屠者斂皮角筋骨入於玉府即今所謂納筋骨者斂珍異之滯者入于膳府則以供一人之玩好者徳宗宫市之弊其初只教官與百姓交易後乃用宦者為使買之多不償其本錢熙寧不係行錢鄭俠奏議謂負水拾髪擔粥提茶皆有免行然則㕓人之弊安得不至於此其他自山虞以至澤虞自卝人以至掌炭又有上項征稅如此其未至市肆者在川則有川禁澤則有澤禁金玉鉛錫則有禁齒革羽毛則有禁絺綌薪炭則有禁所以取民者無一不備與夫司門犯禁之財司關舉貨之罰巾車之車折則入齎馬質之馬死則物更先王所以不與民爭利者全不見於此書所以王莽用周禮遂有五均六幹列肆里區無不征之荆公用周禮遂有坊場河渡白地房廊搭罰六色免行市例之類無所不有至使周禮之書後人不得嘗試夫周家之法果如是耶抑用之者失其實耶胥師二十肆則一人皆二史賈師二十肆則一人皆二史司虣十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人鄭康成曰自胥師及司稽皆司市所自辟除胥及肆長市中給徭役者賈氏曰自胥師至司稽皆是府史之類非命士已上胥及肆長與胥徒同劉執中曰市肆設官如此之繁非以為利也市肆之民日趨於小人之域者未必不由乎利故肆立一長五肆一司稽十肆一司虣二十肆一賈師一胥師而緫之以門里人涖之以司市防乎利之溺斯民於詐偽也愚按薛說見司市胥師各掌其次之政令賈氏曰序官胥師二十肆則一人故云各掌其次之政令而平其貨賄憲刑禁焉王昭禹曰貨賄之價騰則傷泉低則傷物胥師為之平焉故不得擅為高下也鄭康成曰憲表縣之賈氏曰刑謂市中之刑憲徇扑者王昭禹曰憲禁則偽飾之禁在民在工在商在賈者是也易氏曰憲刑禁使之知所趨避察其詐偽飾行下孟反儥慝他得反者而誅罰之聴其小治小訟而斷丁亂反之鄭司農曰儥賣也慝惡也謂行且賣姦偽惡物者王昭禹曰詐謂人詐偽謂物偽詐以飾行偽以儥慝鄭鍔曰飾行則矯為崖異竒衰之行或托怪神使一市之人奔走聚觀者也儥慝則魯人之飲羊鬻鞭之梔澤者也此不誅罰則市肆亂矣王昭禹曰小治小訟胥師各即其次斷之大者則之市師所以省煩擾去留滯賈師各掌其次之貨賄之治辨其物而均平之展其成而奠音定其賈然後令市鄭康成曰賈師定物賈史氏曰賈之有師賈之所取法也各掌其次則左右有局各司其局其曰貨賄之治言所治無非貨賄之事鄭鍔曰在肆之物美惡混淆賈人所能辨况為賈師尤精别其善否故使之辨其物史氏曰既辨其物而使均平既展其成而使賈定則民之交易無可議於是而令市孰有受其飾行儥慝者哉賈氏曰辨其物而均平之與胥師所掌同展其成而奠其賈則與胥師異以其知物賈故也凡天患禁貴儥者使有恒賈鄭康成曰恒常也謂若貯知吕反米穀棺木而睹久雨疫病者貴賣之因天災害阨民使之重困史氏曰物價翔踊不可禁禁之則深藏而不出求者多則賈不得不貴雖有智巧何以弭之先王之市已先知其貨賄多寡有無之所在故能使其必儥而市價可使不貳故曰使有常價後世無法以處徒肆其刑威以禁之雖日撻而求其價之有常不可得已四時之珍異亦如之鄭康成曰薦宗廟之物賈氏曰珍異亦是富人賤時預貯而貴時賣之王昭禹曰四時之珍異乘其好僻而貴之禁其貴儥則珍異少抑民之所好正矣凡國之賣儥各帥其屬而嗣掌其月鄭司農曰謂官有所斥賣賈師帥其屬更音庚相代直月為官賣之均勞逸史氏曰嗣掌其月若今所謂番直也凡師役㑹同亦如之賈氏曰此亦從行所在當直為官賣買也司虣掌憲市之禁令禁其鬭嚻者與其虣亂者出入相陵犯者以屬遊飲食於市者鄭康成曰司虣禁暴亂王昭禹曰胥師掌憲刑禁矣司虣又憲之蓋胥師所憲者凡市偽飾之禁而已司虣所憲非止於此凡鬬嚻虣亂之屬存焉鄭康成曰嚻讙也王昭禹曰鬭以力爭嚻以口競易氏曰虣則以强虐物亂則以私逆理出入相陵犯則縱惡害人者以屬遊飲食于市則恣情以亂俗者鄭司農曰以屬遊飲食羣飲食者王昭禹曰成王所謂羣飲弗佚者鄭鍔曰為治之道凶暴不去無以安善良强梁不逐無以保柔弱古人有牧羊去敗羣之說市者利之所在而凶强之淵藪也周人將以安善良保柔弱使市不擾乃於十肆立司虣一人專以察强暴為事憲禁令於市以禁之若不可禁則搏而戮之鄭鍔曰以上皆不待教而誅者何待禁之不可而後搏耶蓋王者之刑皆不得已然後用禁之不可然後搏而戮之仁恕之道也史氏曰先王有心於愛民故設吏以禁虣後世有心於取利故設吏以為虣民有一物吏思得之既不可以自取必藉姦民以為囊槖彼或不從則鬭嚻虣亂陵犯無所不至民不得已而予之吏既受矣姦民於是愈肆吏方拱手聴命而敢搏而戮之乎是以欲行禁暴當先擇吏之良者以處於上而下之姦民自化矣司稽掌巡市而察其犯禁者與其不物者而搏之鄭康成曰司稽察留連不時去者鄭鍔曰周家於五肆則立司稽一人使之微伺而隂察之非審察之久何以見其實名官曰稽義如此王昭禹曰司虣十肆一人司稽五肆一人不言各掌與胥師賈師之屬異者蓋司虣司稽以肆之數制其員而所掌則通一市焉王氏詳說曰二官聨事通職不有司稽則何有司虣故不言各掌項氏曰犯禁則凡犯市之禁者史氏曰不物不正之物竒器淫巧凡不適於用者皆是也項氏曰搏伺而擒之掌執市之盜賊以徇且刑之賈氏曰市中之刑無過憲徇扑此掌執市之盜賊亦無過小盜徇扑而已刑者必徇故徇刑兩言之王昭禹曰執盜賊徇且刑之使衆知畏而不敢犯也胥各掌其所治之政執鞭度而巡其前掌其坐作出入之禁令襲其不正者鄭鍔曰攷之序官凡官府必有胥徒而胥者才智之稱蓋有才智之人為之市之有胥二肆則一人𨽻於胥師以給使令後世五百之徒耳比之胥師又微乎微者也乃使之各分所治之地而掌其政者蓋執丈二無刃之戈可為威以懾姦人亦可謂度以訂尺寸故也王昭禹曰司市言執鞭度守門胥言執鞭度而巡其前者蓋方入則守門已入則巡其前雖不同而執鞭度則一鄭鍔曰又使之巡市肆之前凡坐者坐行者行出者出入者入各有職業不為遊手者知其趨市之人其行坐出入不正者則掩其不備襲而捕之凡有罪者撻戮而罰之鄭鍔曰若有罪則撻而戮之又從而罰之易氏曰撻以示威戮以示辱是固惡夫罔利而陷於罪戾也鄭康成曰罰之使出布肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相爾也而平正之鄭鍔曰肆者商賈所陳貨賄之區貨賄雜陳名實相亂貴賤相懸則有受其欺者每肆立一長掌其次政令使陳貨賄者各為之區别王昭禹曰所謂陳肆辨物而平市也名相近而實不同者使之相逺鄭司農曰謂若珠玉之屬俱名為珠俱名為玉而賈或白萬或數萬恐農夫愚民見欺故别異令相逺使不得雜亂欺人也則不得以名而眩實實相近而名不同者使之相邇鄭康成曰邇亦近也易氏曰實相近者如布帛之實異而衣被則一所以為相邇也則名雖非而不失實平其價正其物物不失實價得其當肆之政令無出於此斂其緫布掌其戒禁易氏曰緫布乃别肆之稅凡商旅之貿易賣儥或以斗斛受之或以權度受之緫而名之曰緫布史氏曰緫計其數而斂之以為征稅王昭禹曰斂其緫布者肆長斂而輸於門里人也故門里人之斂五布而緫布與居其一焉黄氏曰戒禁蓋立持賣者之戒禁也史氏曰斂布之戒禁也泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人吕氏曰自泉府而上凡貨事係之鄉師自廩人而下凡穀事係之遂人以此見古賦錢於市賦粟於野故里布屋粟固所有也易氏曰泉府宜列於天官今乃列於地官司徒之屬者以其掌市之征布故爾鄭鍔曰考其名錢之意曰泉者謂出於一孔曰布者謂其布散於天下泉府所藏者錢布不名布而名泉蓋輕重斂散之權出於公上如泉之源當出一孔故耳掌以市之征布斂市之不售貨之滯於民用者以其賈買之物楬音竭而書之以待不時而買者賈氏曰征布即門里人絘布已下之布並入泉府而藏之鄭鍔曰謂之征布謂以正取而得之也黄氏曰斂市不售貨滯於民用者用貨則斂不然則否鄭司農曰物楬而書之物物為揃書其賈楬著其物也不時買者謂急求者也楊氏曰泉府之法非以取利也斂市之不售所以便商賈使無滯貨不為其賤而買之也以待不時而買者所以便民使無乏用不為其貴故賈之也陳君舉曰天之生物不自用用之者人人有財不自用用之者君繫辭曰理財正辭禁民為非曰義君不理則權在商賈操市井之權斷民物之命緩急民之所時有也雖賤不得不賣裁其價太半可矣雖貴不得不買倍其本十百可矣民何以能育是故不售之貨則斂之不時而買則與之物楬書之使知其價而況賒物以備禮貸本以代生皆所以緩貧窶而抑兼并管仲平輕重李悝平糴夀昌常平皆古意也陳及之曰熙寧間置市易務且謂成周之市法内帑出錢數百萬以為本市易司遣人於嶺南諸處市貨以壓富商之利原其意為利耳豈泉府之法哉買者各從其抵音帝都鄙從其主國人郊人從其有司然後予之鄭康成曰抵實柢字柢本也本謂所屬吏主有司是賈氏曰謂本主所屬之吏乃付之即都鄙從其主之類是也劉執中曰即下文所謂賖者各從其抵者如六鄉六遂之人買者則本其族鄼之吏保任之如都鄙之民買者則本其食采邑之主在朝者保任之也已上皆賖買各從其主與有司保任之也鄭司農曰抵故價也黄氏曰主者别治大夫也釋謂以公卿大夫常在王朝其都鄙則遣人治之若季氏費宰公山弗擾之輩天子都鄙蓋亦然賈氏曰都鄙可兼大小都及家邑國人謂住在國城之内即六鄉之民郊人即逺郊之外六遂之民易氏曰有司則從其鄉遂之官陳及之曰民買物於泉府必從其主從其有司何也蓋非時買物或置不急之務非官府為之節制則害財破家若此類其細已甚陳君舉曰此特濟民之急權其出於販鬻則不可繼也凡賒者祭祀無過旬日喪紀無過三月鄭司農曰賒貰也以祭祀喪紀故從官貰買物王氏曰賒謂之賒則不即入其價也劉執中曰以上皆賒也故曰凡賒者祭祀無過旬日謂吉事不廢業故旬日可償喪事無過三月凶事廢業容其運為以償者也鄭鍔曰三月天時一周種者亦熟蠶者亦成可以償矣史氏曰民之急莫急於喪祭闕則貧者號呼乞貸而無所今也官給其物以應之立其期使償之初無息取息於喪祭之家非仁政也凡民之貸者與其有司辨而授之以國服為之息鄭司農曰貸者謂從官借本鄭康成曰有司其所屬吏與之别其貸民之物定其價以與之愚案國服陳止齋讀服如服公事之服謂民之貸者還本之後更以服役公家幾日為息徐牧齋讀服如侯甸服之服謂民之貸者以其服之所出來輸彼此價直必不等除得本之外餘皆為息二說俱勝注疏至李叔寳欲矯責償出息之說以㕓人所征之布貸之於民使因其所服之業為生生之計如農服田野之事嬪婦服絲枲之事息者亦如司徒以保息六養萬民所以保之使生息非責其利此說固好恐非泉府之所能繼蓋泉府所征之布將以斂商賈之滯貨不時而買者既楬以元賈有急而賒者復償以元直至於民之稱貸又以財生息之則其法窮矣不如陳及之之說曰立法不惟以便下苟下得其利而官失其物則非法也泉府藏物多矣不賒貸與人則必至弊壊嵗月既久不可用賒貸與民民轉徙於他所既得其利異時以元物入官各貢所有為息則官府亦得其便矣不特是也周禮凡商賈悉有稅今市泉府物而貸之則免其稅既免其稅而貢息焉何不可之有然必與有司辨而授之者防民之偽也世之奸猾無行者巧偽曲說至官府而賒貸官府不知其姦而與之則異日未必能償與其有司辨則不復有此患凡此等制得賢而後可行否則不勝其弊王荆公吕嘉問為市易官掊克細民聚斂滋甚豪商大賈怨咨盈道及人有言則曰泉府嗚呼吾不知先王之法使人怨咨而尚不顧哉鄭鍔曰後世青苗取息名曰利之適以禍之非周家立法之意凡國事之財用取具焉嵗終則㑹其出入而納其餘賈氏曰國事謂有司為國家之事興作用財物者皆來問泉府取財為具焉楊氏曰泉府斂市之征布其所得幾何說者謂先王所以變通天下之財者在此不知闗市待膳服以下皆經費也邦之大用内府待之小用外府待之泉府所謂國事之財用者特内外府之待與夫經費之外者耳其所用而取具者亦可知矣鄭鍔曰泉府所入者皆財也故國之財用可以取具亦猶大府所入者皆賦也故國之賦用取具焉鄭康成曰㑹計也納入也賈氏曰出謂出府㑹計用財入謂於㕓人斂取絘布已下納其餘者若國家來取財不盡而有餘則納與天官職幣司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人鄭康成曰司門主王城十二門賈氏曰知王城有十二門者案匠人云營國九里旁三門四面各三門是謂十二門若今城門校尉賈氏曰案經每門下士二人據在門開閉者此司門是都司緫監十二門官故舉漢法況之愚案門關次於市官之後以闗與門市常相聨設官以司之將以禦姦盜禁竒貨後世反恃此為征商之利孟子曰古之為闗將以禦暴今之為闗將以為暴掌授管鍵其展反以啓閉國門鄭鍔曰天府宗社之重宫禁之嚴四方之人畢趨焉則門之啓閉尤當謹而嚴故用下大夫掌授之以管鍵或謂籥搏鍵器也則又謂鍵為牡蓋以入者為牡容者為牝謂用管籥以啓門用鍵牡以閉門王安石謂授鍵則以司門緫統諸門故掌授之以啓門也幾出入不物者正其貨賄愚案正故書為正如中度中數中量皆正也不物者既於出入之際而察之則貨賄皆可得而正矣王昭禹曰不物有所幾而後害者亡靡者微貨賄有所正而後亡者有利者阜凡財物犯禁者舉之陳及之曰所謂犯禁者即司市偽飾之法在民商賈工者十有二是也王氏詳說曰質人云犯禁者舉而罰之司門云凡財物犯禁者舉之司關云凡貨不出於關者舉其貨而罰其人三者亦相為異同蓋司關之所舉者舉其不出於關之貨自内而出者由市及門由門及關自外而入者由關及門由門及市是關為内外之要津故人之貨必出於關不出於關則舉而罰之若夫司門質人之所舉者特舉其犯禁之貨言犯禁則不出於關者罰有所不及言不出於關則犯禁者罰必有所兼行然質人司關舉而罰之至司門則舉而不罰蓋舉之在司關罰之在質人而以其財歸司門耳不然一犯禁之物質人罰之司關又罰之何其酷耶以其財養死政之老與其孤陳氏曰老吾老以及人之老幼吾幼以及人之幼所以教天下之孝慈况出身勠力而死於王事者上有父祖下有子孫棄而不養不足以相報養不以禮不足以示勸春養孤子以象陽之生秋享耆老以象隂之成而外饔酒正司門稾人各供其職事冢人之職凡死於兵者不入兆域戰敗無勇投諸塋外以罰之罰其身而養其父祖子孫者不罰無以示義不養無以示仁春秋時齊將救鄭屬孤子三日朝以乗車而繋兩邑焉召顔涿聚之子晉曰温之役而父死焉今君命汝以是邑也服車而朝魏文侯於死事之家嵗使使者勞賜其父母漢有孤兒兵皆有所為而然祭祀之牛牲繋焉監古銜反門養之賈氏曰祭祀之牛牲即充人云散祭祀之牲易氏曰此則受之於充人者也故充人則責之司門而司門則責之監門王昭禹曰有司門又有監門者蓋司門以下大夫二人為之其屬則有二十八士凡以緫管王城十二門而已至於十二門又各有士二人乃所謂監門也王氏曰必使監門養牲則為其於郊於國各有所近便於共取夙夜啓閉未嘗乏使便於養視且衆所出入其養視不謹易以幾察故也然而祀五帝享先王不係之門則其致嚴又異於此矣凡嵗時之門受其餘賈氏曰四時之祭門非一故云凡若月令秋祭門者是祭廟門此門亦謂國門十二者除四時祭外又有為水祈禱若左傳莊二十五年大水用牲于門之事易氏曰祭門不敢用散祭祀之牲特受其共牲之餘者而用之凡四方之賓客造七到反焉則以告鄭康成曰造猶至也賈氏曰四方諸侯來朝覲至關關人告王至郊郊人告王至國門門人告王王遣人往迎之司闗上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人鄭康成曰闗界上之門賈氏曰王畿千里面五百里界首而置三闗亦十二關王昭禹曰在國曰門在境曰關鄭鍔曰在國之門則晨昏為啓閉之防在境之關不過為通貨賄之路而已掌國貨之節以聫門市黄氏曰關在郊故曰郊關貨行於關門之内故稱國鄭謂商所發司市之璽節非也不惟市無節而貨方自外入安得遽𤼵節於司市凡節皆掌節守之璽節付之司關使通貨賄聨謂與門市為聨鄭景望曰商賈蓄貨待時而貴儥因患以阨民亦王政所甚惡也以聨關市則貨無所隱泄必以時雖欲壅利以病人不可得也司貨賄之出入者黄氏曰貨入司關予節乃得入門而達于市掌其治禁與其征㕓王昭禹曰有以治而理之則貨賄之高下美惡無混淆之患有以禁而止之則貨賄之靡害不物無交通之弊張氏曰治之者治之以市官之法而已劉迎曰掌其所治之禁則幾不物也王制謂闗執以幾正此六治禁史氏曰掌其征𣙜與其㕓積易氏曰孟子云市㕓而不征法而不㕓說者謂或賦其地之㕓而不征其貨或治以市官之法而不賦其㕓㕓則坐賈之所輸征則行商之所出故㕓人掌斂市之㕓布而入於泉府泉府又以市之征布而斂不售之貨是市有征布又有㕓布若關則無㕓布而有征布何者司關掌貨賄出入是有行商之征布關無市官之法安得有市宅之㕓布然此所謂征㕓者是辨其合征合㕓者而關白焉故司關征之又五百里至於國門國門雖有不物之幾而無貨賄之征蓋市則行商有征布坐賈有㕓布此司關所以掌其征斂而聨門市也張沂公曰王制曰古者關幾而不征稱商之時也商以前國用少不征猶得周以後國用彌廣不征不得凡貨不出於關者舉其貨罰其人陳及之曰鄭氏謂從私道辟稅非也文王治岐關市譏而不征周公立法關有關稅㕓有㕓稅蓋以商賈利多於農苟不征之則末作多而務本者少然既稅之關則不征其㕓既征其㕓則不稅之關取之甚優何至於辟稅哉蓋不出於關必偽飾之物司市所禁以罔民利者故必舉其貨焉王昭禹曰凡貨不出於關者則貪利以忘義徇私而背公故舉其貨罰其人凡所達貨賄者則以節傳張戀反出之鄭康成曰商或取貨於民閒無璽節者至關關為之璽節及傳出之其有璽節亦為之傳傳如今移過所文書王昭禹曰節以驗其物傳以書其數鄭鍔曰既授以節又為之傳使所至無留礙黄氏曰節傳非司關所得為凡所達貨賄雖不自市來由門至關不由門徑造關司關皆以節傳出之達之于其所至入無傳出有傳掌節所謂凡通達於天下者必有節以傳輔之者也國凶札側八反則無闗門之征猶幾鄭司農曰凶謂凶年饑荒札謂疾疫死亡無關市之征者出入無租稅王昭禹曰司門幾出入不物者則關門固亦有幾矣今以荒札之時宜去幾矣然而不巳焉故曰猶幾春秋傳曰猶可以已而不已之辭禍故多藏於細微𤼵於人之所忽故雖凶札之時猶幾凡四方之賓客敂音叩關則為之告鄭康成曰謂朝聘者敂關猶謁關人也鄭鍔曰四方賓客敂關求入朝暴客不可不防賓客不可不迓故為之告定王使單襄公假道於陳以聘楚候不出疆司空不視塗單子歸告王曰陳侯必有大咎國必亡周之秩官有曰敵國賓至關關尹以告行理以節逆之候人為導卿出郊勞司里授館由是言之門吏之告禮賓防姦之意兩存焉有外内之送令則以節傳出内之賈氏曰外之送令謂從諸侯之國畿外而入者則關人以節及傳内之至王内之送令者謂有王命從王國而出則亦以節傳出之送至畿上鄭鍔曰内送令王命達於諸侯外送令邦國以聞於朝廷以節傳出納之則下情必上達而王命布於四方然諸侯亦以令為言者所謂諸侯之復歟王昭禹曰節所以為驗傳以輔節所以防姦也陳君舉曰先王之制寢室有閫閭里有閈出有棘梐居有郛郭以達門關皆納民於軌而禁其非義自畿而達之外國與之節而掌於王官其不同者則不達而天下如一是以諸侯無私㑹大夫無私交士無游說民各土著周衰國自為政魯廢六關秦人焚節璧馬假道戍人掌管惟馳車是利無所稟命蓋王官之守不行於外服矣漢文又去關禁當時矯偽而出乘傳而行郡國出粟賦錢無敢如何㝷創七國之變後復用乘武帝增至三輔都尉譏察至有諸侯以關入免者綱紀太宻東都有關都尉矣鄭景望曰說者以聨門市參相聨比檢猾商也貨不出闗謂從私道出辟稅者則没其財而撻其人司門幾出入不物者征稅也犯禁謂商所不資者舉之没入官凡此與後世州縣征稅之場欄檢要邏剥刻農賈何以異曰否王政之所禁為夫末勝而本益微姦欺得志而移俗習故夫檢商之政示篤本而正民志也夫負販之民貿易之際欺者得利則信實者安得不易慮而為欺姦者得利則純直者安得不相怵而為姦故門市以參聨之璽節以出入之舉其貨罰其人以懲畏之此非以為征利也設防於趨利之氓養其信實純直之心出入不物幾竒衺也財物犯禁惡逐末也用犯禁之財物養死政之老孤示先義也先王導民非有物以與之第窒其趨惡之路使欺不得設姦不得行此立法建官之意與後世專於殖利者可同年而語哉掌節上士二人中士四人府二人史四人胥二人徒二十人鄭康成曰節猶信也行者所執之信吕氏曰案春秋司城蕩意諸來奔效節於府人即此謂府二人者也古者必有府人藏此節所以效於府人賈氏曰節連於門市故亦連類在此掌守邦節而辨其用以輔王命王氏詳說曰邦節者下文所謂玉節角節用之於内外諸侯虎節龍節人節用之於邦國使者符節璽節用之於司門司關司市及鄉遂之閒緫而言之皆邦節也鄭氏以典瑞之珍圭牙璋穀圭琬圭琰圭為邦節且掌節自掌節典瑞自典瑞焉可以珍圭牙璋之類而為節乎黄氏曰掌節在關取予便也節皆邦節有守節有行節玉節邦國守之角節都鄙守之是謂守節使節及門關道路之節皆行節也必自掌節出鄭言關市道路之官皆得為節如此則雜主掌節何以設專職哉鄭康成曰王有命則别其節之用以授使者鄭鍔曰命出於一人無敢不信而矯誣以作命者殆或有之故王雖有命必用節輔之以為信守邦國者用玉節守都鄙者用角節鄭康成曰玉節之制如王為之以命數為大小角用犀角其制未聞易氏曰玉則美在其中而暢達於外諸侯之象角則致力於内而捍禦於外公卿大夫之象守則守節之義鄭鍔曰命為諸侯使守邦國者用玉節以輔之玉所以比徳凡出封而為邦國之君者皆有君子之徳命為君長使守都鄙者用角節以輔之角之為物上窮而善觸都鄙之長職當外禦其侮内蕃王室也康成謂諸侯於其國中卿大夫王子弟於其采邑有命者亦有節以輔之故用玉節用角節似失之矣凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英簜吐黨反輔之鄭鍔曰王者遣使行乎天下何所往而不通然無節以為信則詐心或萌於所遣之人而疑心或起於所至之國故必持節然後行前言玉節角節則王命之守此言虎節人節龍節則使者執行以為信所往之國有平地山澤之不同鑄金為節各為虎龍人之象山國多虎澤國多龍平土之地則人之所聚如晉楚之多山吳越之多水陳鄭之平原曠野視其所執之節可明其所往之邦孰敢矯誣以妄適哉王昭禹曰小行人有管節而掌節不言掌節所掌謂之邦節以輔王命所謂邦國之使使邦國者所執也小行人所達謂之天下之節則所謂龍節人節虎節管節邦國都鄙使者所執非王官所掌掌節不言都鄙之使節則使都鄙者無節以旌節行之而已鄭鍔曰節皆用金取其寒暑燥濕不能變也使者執節亦欲不更所守故有取於金焉輔節必以英簜所以䕶其外簜竹也所謂瑶琨篠簜是也以簜為函畫為文彩使其英華外著内有不變之剛外有可觀之文尊王命而重使華也王昭禹曰詩曰二矛重英又曰朱英緑縢則英之為飾明矣易氏曰金以為之鑄象有堅而不變之義簜而加以英飾有儀文相接之禮門關用符節貨賄用璽節道路用旌節皆有期以反節鄭康成曰門關司門司關貨賄者主通貨賄之官謂司市也道路者主治五涂之官謂鄉遂大夫也凡民逺出至于邦國邦國之民若來入由門者司門為之節入由關者司關為之節其商則司市為之節其以徵令及家徙則鄉遂大夫為之節唯時事而行不出關不用節也變司市言貨賄者璽節主以通貨賄非必由市或資於民家焉變鄉遂言道路者容公邑及小都大都之吏皆主治五涂亦有民也符節者如今宫中諸官詔符璽節者今印章旌節今使者所持節也王氏曰門關則以符合之貨賄則以璽驗之道路則以旌表之黄氏曰節皆自掌節出符節付之門關之官璽節專之司關旌節付之道路之官鄭曰鄉遂大夫是也此專為民徙及有徵令者也使隨事用之王使旌節掌節予民之自外來者皆當有路節由都鄙者都鄙予由甸稍者甸稍予至關司關留之則予符節而入至門著出入之日出關反符節司關還其所留節而出入之自内出者於其所由予路節有傳鄭言唯時事而行不出關不用節是也蓋關門之内常往來者也有期反節不獨民與商雖門關道路之官亦有期而反之反而復予弊則更為邦國都鄙使節反必有時守節易世而反反則復予此皆掌節專行之職鄭康成曰將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所適薛氏曰龍節虎節人節以金為之輔之以英簜至於符璽旌三節不言輔者以下文有以傳輔之言凡則六節皆輔之以傳矣但以金為者既輔之以英簜又輔之以傳以竹為者不過以傳輔之春秋之時所謂龍節者輔以玉而不輔以英簜昭二十九年公在鄆使公孫衍獻龍輔於齊侯說者以為龍輔玉者名所以取之輔龍節者矣至西漢時有銅虎符是龍節之屬皆以金為之竹使符是旌節之屬皆以竹為之周制行於漢而不行於春秋悲矣凡通達於天下者必有節以傳輔之鄭康成曰必有節言逺行無有不得節而出者鄭鍔曰通達於天下非止於一鄉一州可不與之節乎雖有節以為信必有傳以為輔傳者所以書其事二者相依而行是以有輔之之義無節者有幾則不達鄭康成曰圜土納之孫氏曰先王之防範斯世使循循然入於矩度之内而無敢放意肆行自陷於顛越不恭之域以其有此具也夫制為之節達之天下同其法則居邦國都鄙守之以為重適郊野四方者執之以示信命令假之而行貨賄待之而通故滛朋比徳不得逞其私合黨締交不果遂其志夫一物之微所係於人心之操舎國勢之安危若是其切豈非先王馭天下機要哉周禮訂義卷二十四
