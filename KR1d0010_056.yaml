body:
  text: 周禮訂義卷五十六宋王與之撰職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人鄭康成曰職主也主四方之職貢者職方氏主四方官之長陳君舉曰職方長天下之圖而𨽻司馬者謹之也戰國策士每言闚周室則可案圖籍以争天下故蕭何入秦獨収圖籍以此自漢守之司空寖以泄布當時如江都淮南諸王皆案輿地謀變而王鳯亦云大史公書有地形阨塞不宜在諸侯王然則古圖志雖司徒掌之而藏在司馬秘不得見先王所以弭姦消患者其慮逺哉李嘉㑹曰職方無上士下士所掌五夷八蠻與天下侯國之衆職大且尊如漢典屬國也掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩亡巾反九貉孟白反五戎六狄之人民與其財用九榖六畜許六反下同之數要周知其利害王氏曰掌天下之圖以掌天下之地則所掌非特圖也又掌其地焉鄭鍔曰職方所掌地圖與大司徒天下土地之圖一也然大司徒所掌者王朝之圖要知中國及九州可以建國分封之地且將以辨土宜而施教也職方所掌則兼中國要知其土之所有不止國中分封之地而已大司馬將以施九畿之政職必本是圖故不屬於大司徒而屬於司馬後世所謂司空輿地圖光武嘗披之以問鄧禹者是也易氏曰言邦國則王畿之外五等諸侯之國言都鄙則王畿之内三等食采之地此二者舉中國言之鄭鍔曰四八七九五六者其種類分别多矣周之所服者其數止此武王克商通道于九夷八蠻而周明堂位有九夷八蠻五狄六戎之國各列於門外其數與此或差者意當時版圖入於職方者如此耳王氏詳説曰明堂位言九夷八蠻六戎五狄與職方不同以爾雅攷之明堂位為正李巡注爾雅以𤣥菟樂浪等為九種之夷天竿咳首等為八種之蠻僥夷戎夷等為六種之戎月支穢貊等為五種之狄是也賈氏以四夷為四方之夷緫名以九貉為東方九夷以七閩為南方八蠻其説得矣但此五戎當為六字六狄當為五字陳君舉曰周天下方七千里大槩與四夷八蠻七閩九貊五戎六狄并言之其實諸侯封守不如是之廣也以王制攷之西不盡流沙南不盡衡山東不盡東海北不盡常山凡四海之内絶長補短方三千里是天子壤地之實其間亦有戎狄錯居如魯徐戎之類是也又荆楚之地在江漢之間自楚以南悉為百越之地而衡山在楚之極南安在天子之封内耶舉一隅則四海可知葉氏曰嘗疑召公在燕大公在齊唐叔在晉皆為邊逺與戎狄鄰接而江漢之間封建所不至則周之所自治者固甚狹而職方所辨乃若是其詳雖漢唐盛時不能何也豈姑著之圖籍而實未嘗統屬耶周召之政其必不然夫辨之詳而責之略治之狹而服之廣非徳有餘于天下何以致之鄭鍔曰辨其民則以廣谷大川異制民生其間異俗飲食異宜器械異用易氏曰知其剛柔緩急之異俗辨其財用則以布帛財貨所資者不同易氏曰知其衣食器械之異齊辨其九榖則以土之所生者或四種五種所宜各不同辨其六畜則以物之所産者或四擾三擾所性各不同故也易氏曰此數者職方氏皆以圖而考其數王昭禹曰數則一二三四之數謂别而計之復以數而緫其要王昭禹曰要如月要之要謂緫而計之又以數要而周知其利害利如土宜土化之類凡利於民者鄭鍔曰物之所産如金石竹箭之屬害如地慝之類凡害於民者職方氏既已周知而歴數然後大司馬以九畿之籍而施邦國之政職使九州之國各共其職以任其政無有不同之貫利此其官所以列於大司馬之屬而謂之職方氏乃辨九州之國使同貫利鄭鍔曰自中國以至夷狄兼舉而周知之矣乃若國之有九州為五政之所加七賦之所養王者所治之區域也必使貫無不同則九州共貫利無不同則四海蒙利王昭禹曰事之有條謂之貫凡可以生養人者謂之利劉執中曰四方人民好惡之不同則其風俗有善惡矣四方財用有無之不等則其衣食有厚薄矣必周知其利害貫而通之使有無之相易善惡之相濟一天下之財用養天下之人民俾同享其利焉故曰使同貫利東南曰揚州賈氏曰自此以下陳九州之事緫為三道先從南起周改禹貢以徐梁二州合之於雍青分冀州地以為幽并東南曰揚州次正南曰荆州周之西南不置州統屬雍州即次河南曰豫州為一道也次正東曰青州次河東曰兖州次正西曰雍州為二道又次東北曰幽州次河内曰冀州次正北曰并州為三道易氏曰禹貢揚州之域東距海北據淮故曰淮海惟揚州殷人以淮入徐故揚州止謂之江南周人復以淮入揚而循禹之舊不言淮海而曰東南者變禹貢之文也然禹貢以帝都所在故首言冀州周都鎬京在雍州之域而乃以揚州為先焉周人建國東南先服王化之始故以東南為首稱而正南次之亦猶禹之治水旣載壺口則以冀州為首記其功之所自始不特帝都而已其山鎮曰㑹古外反稽王昭禹曰九州之山皆言其山鎮者葢國主山川而保之山之大者可以鎮安其地也鄭康成曰凡九州及山鎮澤藪言曰者以其非一曰其大者耳易氏曰稽計也吳越春秋曰禹巡守天下㑹計萬國之功以㑹稽名山漢志屬會稽之山隂縣唐為越州會稽縣山在州東南二十里今州為紹興府其澤藪曰具區王昭禹曰水所鍾曰澤澤草所生曰藪鄭康成曰大澤曰藪李嘉會曰既曰澤又曰藪者水溢曰澤水乾曰藪易氏曰孔安國會稽郡具區澤在西古文以為震澤是吳南太湖名唐屬蘇州今為平江府黄氏曰在今平江吳江縣其川三江王昭禹曰以達水者謂之川易氏曰書曰三江既入震澤底定震澤太湖也堯時洪水泛濫有此水勢與周之職方不同而孔安國乃云江至彭蠡分為三入于震澤是求合乎禹貢之説似矣然書以江漢所匯之處為彭蠡澤在今江州湖口縣界江至湖口合三為一未聞其分一為三也又太湖在蘇湖常三州之間自不與江水相通彭蠡所匯之江何從而入之耶班固知大江與震澤不相通又附會為之説曰南江自震澤東南入海中江自蕪湖東至陽羡入海北江自毗陵北東入海毗陵今常州也今以大江之在毗陵東北者以當北江正與書合者謂南江自震澤東南入海則非經之所謂南江矣又謂蕪湖有水東至陽羨以為中江其失為特甚陽羨今常州宜興也與建康之溧陽接境兩境中高水皆東西分流其東流而下陽羨者固可通海而蕪湖之水乃皆西北流北向以入于江初非入陽羨也其為誤有如此者至桑欽所言北江與固同其叙南江中江則其謬滋甚史記正義又曰太湖旁有三水遂以為三江之證皆非禹之所謂三江也然則經之三江將孰從乎以經證經自有明文漢水出於嶓冢者為北江江水出於岷山者為中江既有北江又有中江則必有南江近代儒者謂南江自豫章而入于彭蠡此説誠可信據此則三江已合於荆揚之間至揚州末流復言三江豈果分為三乎揚瀕海為支川之下流必言三江所以紀水之所入也知此則知三江震澤之說黄氏曰韋昭以松江浙江浦陽江為三江郭景純以岷江松江浙江為三江大抵閩浙去海近水多自為瀆入海俗皆稱為江偶有三焉則為三江其實皆小水非禹貢職方之三江酈道元所謂其稱相亂者也由此言之范蠡三江當為浙錢清剡子胥三江則郭景純説猶近之盖岷江自彭蠡而下合池宣昇潤真揚諸州水在其北松江合湖秀蘇常諸州水居其中浙江合衢婺徽嚴杭越諸州水在其南此為全吳地域也禹貢職方三江為揚州川盖江漢彭蠡之已合者也江漢彭蠡已合而猶曰三江者同流各派不相雜襲皆能自達于海其浸五湖王昭禹曰以水浸田謂之浸自揚之五湖以至并之淶易皆其地之水可引以浸灌也王氏曰然涇漳之屬後世更引以浸焉則民之利固有先王未之盡者變而通之存乎其時而已黄氏曰五湖又多異説虞翻曰是湖有五道故曰五湖今湖旁港瀆不止於五其説非也韋昭曰五湖今太湖方圓五百里故為五湖具區既已號為澤藪而又以其方圓里數為浸亦非也易氏曰具區是澤五湖是浸澤浸豈可混而為一張守節曰太湖東岸五灣為五湖曰菱湖游湖莫湖貢湖胥湖其説或然今蘇常間陂湖與太湖連接者尚多何止五也酈道元因水經南江東北為長瀆歴河口乃謂江東注具區謂之五湖口既甚謬誤又引郭景純江賦謂江水經緯五湖而包注太湖觀其所指五湖雖不可盡知而滆湖在今毗陵與岷江不通則所謂經緯五湖者皆不然也酈本漢志與水經故謂南江東注具區今饒歙諸州自彭蠡右出直抵江其西為池太平宣建康其東為湖蘇常潤西水皆入江東水皆入太湖江豈能越山而注太湖乎大抵職方川則其地自髙而下水之所流行也浸則地勢平衍水之所停涵也地有浸則肥美播種所宜而又沮洳足為險固揚州自古為澤國湖名必當有五者應此數自舊説多如此則是失其傳久矣不必強牽合也易氏曰嘗攷經意既謂五湖則不止一湖今如丹陽彭蠡以湖名者甚衆皆在古揚州恐别有五湖之名但經無明文不可臆説李圖曰五湖彭蠡洞庭巢湖太湖鑑湖柯山曰五湖太湖湖州射陽湖楚州青草湖岳州丹陽湖潤州洞庭湖洪州國語越語下曰戰于五湖注曰今太湖也其利金錫竹箭鄭康成曰錫鑞也箭篠也易氏曰考工記曰吳越之金錫爾雅曰會稽之竹箭禹貢於揚州亦曰惟金三品又言瑶琨篠簜信乎為揚州之地利其民二男五女愚案司民掌豋萬民之數自生齒以上皆書于版異其男女及大司徒掌建邦之土地之圖與其人民之數則知二男五女與一男二女二男三女之差是職方緫九州之圖而辨其人民當時版籍通以一州計之大約為此數及世變既久不無升降損益也或以隂不生於隂而生於陽故揚乃多女若然則幽并在北隂方也何女之多於男乎其畜宜鳥獸鄭康成曰鳥獸孔雀鸞鵁鶄犀象之屬易氏曰此等畜多産於南方亦時見有之其穀宜稻易氏曰稻生於水澤之地經言稼下地是已揚州居東南之極及支川下流之所歸厥土為塗泥為沮洳故其榖宜稻正南曰荆州易氏曰禹貢荆及衡陽惟荆州殷之荆州南不言衡陽循禹之舊也其北境則曰漢南以地志攷之荆山在南郡臨沮縣即今荆門軍當陽縣之地漢水又在其北正屬襄陽言漢南則殷之荆州實跨荆山之北至周復以荆山之北屬豫復禹封域以荆及衡陽為荆州荆山即南條荆山衡山即南嶽皆在正南之地故曰正南其山鎮曰衡山易氏曰漢志長沙國湘南縣衡山在東南唐屬衡州衡陽縣本酃縣地要之衡山連亘數邑凡酃縣之東北以至湘南縣之東南則皆衡山也其澤藪曰雲瞢易氏曰漢志華容縣有雲瞢澤在南鄭鍔曰輿地廣記曰今雲瞢澤在安陸縣然司馬相如言雲瞢澤方八九百里則雲瞢非止一澤隨所在而為之名左傳定公四年楚子涉睢濟江入于雲中則知在江之北者為雲又昭公三年楚子以鄭伯田於江南之瞢則知在江之南者為夢禹貢言雲土瞢作乂葢南北髙下不等故江北之雲方見土而江南之瞢已作乂其勢然也黄氏曰雲瞢跨江南北今荆南岳州界其川江漢黄氏曰江水自夷陵而下為州界東流會于彭蠡漢水自房陵以下為州界東南至漢陽入江易氏曰漢志蜀郡湔氐道岷山在西徼外江水所出今攷唐元和志則岷山近在茂州而江源逺出西徼在松州之境案松州交州縣江源鎮江水之迹始見于此南流至翼州翼水縣又南流至茂州汶山縣汶山即岷山禹導江所始之地又南流至成都府成都縣有沱江鎮禹貢東别為沱是也又西南流至眉州通義縣又南流至戎州僰道縣今為叙州宜賔縣又東流至瀘州瀘川縣又東流至渝州巴縣又東流至涪州涪陵縣又東流至忠州臨江縣又東流至萬州南浦縣又東流至夔州奉節縣又東流至歸州秭歸縣又東流至峽州夷陵縣又東流至江陵府江陵縣又東流入澧州界即禹貢東至于澧之地至岳州巴陵縣有洞庭湖即禹貢九江水經云九江在長沙下雋縣正其地也又東陵即巴陵江水至此自東而迆北至鄂州江夏縣又東流至江州潯陽縣今為徳化縣有彭蠡澤即禹貢江漢匯澤之地又東北流至池州秋浦縣今為貴池縣又東北流至潤州丹徒縣州今為鎮江府北對揚州江都乃漢志所謂東至江都入海者也漢志不知漢水所自誤認嶓冢山之西嘉陵江為西漢水與禹貢漾漢大異考之唐元和志興元府金華縣今為鎮隷三泉縣嶓冢山在縣西三十里漾水所出東流至洋州興道縣又東流至金州西城縣又東流至均州武當縣有滄浪洲即禹貢滄浪之水又東流至襄陽府襄陽縣又東流至鄂州長夀縣又東南流至復州竟陵縣今為景陵縣有参澨水即禹貢三澨也又東南流至沔州漢陽縣今縣為漢陽軍有大别山即禹貢至于大别以入于江之地禹貢所記江漢皆發源于梁州周禮不載梁州山川故至荆州而後言其川江漢江至今歸州之秭歸縣以至鄂州之武昌縣凡一千四百餘里漢江自今均州之武當縣以至漢陽軍之漢陽縣凡一千四百餘里皆荆州之地江漢分流于其間至是合流詩曰滔滔江漢南國之紀是也王昭禹曰即禹貢荆州所謂江漢朝宗于海其浸潁湛直減反杜氏曰湛讀當為人名湛之湛湛或為淮黄氏曰案今潁水出河南豋封隅乾山東南流至潁州潁上縣入淮鄭言宜屬豫者據禹貢也然周人畫地當有所更革矣又案酈道元注水經湛水出犫縣北魚齒山西北東南流歴魚齒山下為湛浦春秋楚公子格與晉戰于湛阪是也湛水東入汝周禮荆浸潁湛康成云未聞偶不照此酈氏之所考據也案今汝州魯山縣漢犫縣魚齒山在龍興縣連接梁縣界是則周荆州界自隨巴唐鄧東北至汝潁與豫分界而荆牧治宛宣王封申伯易氏曰左氏傳昭元年王使劉定公勞趙孟于潁杜氏謂潁水出陽城縣案漢志縣屬潁川郡即今河南府潁陽縣又襄十六年楚公子格帥師及晉師戰于湛阪杜氏謂襄城昆陽縣北有湛水東入汝案地志襄城即今汝州之襄城縣昆陽故城今在汝州之葉縣已上二者皆古豫州之地經以為荆州之浸必有脫誤處其利丹銀齒革鄭康成曰齒象齒也革犀兕革也易氏曰禹貢荆州言礪砥砮丹惟金三品羽毛齒革其地利古今同也然荆州亦言金與範楛則未嘗無金錫竹箭揚州亦言齒革及惟金三品則未嘗無丹銀齒革特以其地産之多者言之其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州易氏曰禹貢荆河惟豫州其封在大河之南南條荆山之北故曰荆河殷之豫州則南境距漢北境接河故曰河南周人於豫州亦曰河南而南境則仍禹貢之舊不曰荆河互文以見也其山鎮曰華山易氏曰漢志京兆尹華隂縣大華山在南後漢華隂屬𢎞農郡唐及今為華陽縣其澤藪曰圃田易氏曰漢志河南郡中牟縣圃田澤在西唐以縣屬鄭州今屬開封府圃田澤一名原圃黄氏曰今鄭州管城縣其川滎户扄反洛易氏曰禹貢導沇水東流為濟入于河溢為滎厥後濟不溢河滎澤遂枯漢志河南郡雖有滎澤縣而不言滎澤唐元和志於鄭州滎陽縣云縣西北四里有故瀆恐未必然蓋水北為陽縣當在澤北不應澤在縣北也漢志𢎞農郡上洛縣洛水出冢嶺山東北至鞏入河又盧氏縣熊耳山在東禹導洛始此而洛水實出於上洛之冢嶺山今攷之唐商州洛南縣冢嶺山在縣南七十里洛水所出也又東流至本州之上洛縣又東流至虢州盧氏縣界熊耳山在縣南五十里又東流至河南府之鞏縣㑹伊瀍澗之水以入于河其浸波溠音詐易氏曰鄭康成曰波讀為嶓孔安國言禹貢有播水無波水音與播同古字從山從番讀為嶓冢之嶓康成誠有所見而然爾雅云水自洛出為波度其地其盧氏鞏縣之間即今商虢州河南府之地黄氏曰案注水經有波水出魯陽縣霍陽西大嶺東谷俗謂之歇馬嶺即應劭所謂孤山波水所出者水南流入􅘷杜佑通典曰此為豫浸之波魯陽今魯山縣霍陽山在今梁縣俗稱峴山左氏傳莊四年楚令尹鬭析莫敖屈重除道梁溠營軍臨隨杜氏以為溠水在義陽厥縣西東南入鄖水義陽即今信陽軍之西去隨甚近唐志隨州隨縣溠水出縣西四十里此正古豫州之地鄭康成乃謂溠宜屬荆州在此非也盖漢人誤以南陽郡為荆州不知古荆在荆山之南康成徇漢地志之說誤矣黄氏曰水經注溠水出隨州隨縣黄山南南流入波案職方諸浸多相接而豫浸波溠源委殊異又相去逺而馬融廣成澤頌亦曰浸以波溠波近廣成澤溠則逺矣不知何以自古聯稱周職方湛為荆浸波為豫浸則二州分今臨汝為界溠為豫浸則豫西界抵今漢東故樂史寰宇記隨州虞周為荆豫二州之域鄭以溠宜在荆者或未攷也其利林漆絲枲鄭康成曰林竹木也王昭禹曰禹貢豫之厥貢漆絲絺紵則林漆絲枲固豫之所産也其民二男三女其畜宜六擾其穀宜五種鄭康成曰六擾馬牛羊豕犬雞五種黍稷菽麥稻李嘉會曰豫州土地平曠尤宜六擾五種非無他鳥獸不足稱也正東曰青州易氏曰禹貢有青有兖有徐殷并青於徐而徐兼揚州之淮故江南曰揚州周復以淮歸揚而并徐於青正在畿東故曰正東其山鎮曰沂山易氏曰唐沂州沂水縣本漢東筦縣屬瑯琊郡沂山在縣北一百二十四里黄氏曰公玉帶所謂東泰山也賈氏曰地志沂水出泰山郡蓋縣禹貢沂水在徐州在青州者周以禹貢徐州地為青故也其澤藪曰望諸黄氏曰望諸孟諸也在應天府虞城縣淮水流至今宿泗間為青界東至楚州鹽城縣入海禹貢徐揚以淮為界北徐南揚泗水出兖州沂水出奉符新泰縣界之艾山南至淮陽下邳縣入泗沭水出祈山東南流至宿遷縣入泗淮沂沭禹貢皆屬徐州周廢徐入青故皆屬青孟諸屬豫州青又斗入豫界矣周齊為青牧大公始都營丘故城在今濰州昌樂縣宣王時齊遷臨淄烝民詩仲山甫徂齊城彼東方是也易氏曰唐宋州虞城縣漢屬沛郡今屬南京應天府孟諸澤西北十里俗號盟諸故書謂之孟諸周禮謂之望諸漢志謂之盟都史記謂之明都其實一也其川淮泗易氏曰禹貢導淮自桐柏漢志南陽郡平氏縣桐柏大復山在東南唐以其地為桐柏縣屬唐州淮水所出東流至蔡州之真陽流至申州之義陽縣今為信陽軍信陽縣又東流至光州定城縣又東北流至濠州招信縣今屬泗州本漢臨淮郡淮陵縣地乃古徐州之域即漢志所謂淮至淮陵入海者也又東北經楚州之盱眙縣今為盱眙軍與泗州隔淮相對又至楚州山陽縣入海漢志濟隂郡乗氏縣泗水東南至睢陵入淮此孔安國引以證禹貢者漢乗氏屬濟隂郡唐以郡為曹州今為興仁府縣屬焉睢陵即今泗州招信縣之北境然漢志所載自有兩泗水其一即自此乗氏至毗陵入淮者又一泗水出魯國卞縣西南至方與入沛唐元和志卞與方與皆在兖州今襲慶府泗水縣東陪尾山泗水出焉其源有四西南流至本州曲阜縣北分為二流北為洙南為泗其間即夫子設教之地又西南三十五里至本州瑕丘縣西二十五里洙復與泗合又南流至本州魚臺縣界縣本漢方與地屬山陽郡即所謂自方與入沛者也又東南流經徐州沛縣漢屬沛郡即所謂自沛入淮者也又東南經徐州彭城縣又至泗州以入于淮徐兖泗皆古徐州之境周并於青其浸沂沭音述易氏曰漢志泰山郡蓋縣沂水南至下邳入泗蓋縣在唐及今皆兖州之境下邳唐屬泗州今為淮陽軍沂水經下邳分為二水一水於城北西南入泗又一水經城東亦注泗謂之小沂水漢志琅琊郡東筦縣沭水南至下邳入泗案唐志沂州沂水縣本漢東筦縣地沭水所出東南至泗州下邳縣又東北流至泗州漣水縣今為漣水軍至此與泗合而入淮鄭司農曰沭或為洙其利蒲魚易氏曰禹貢於徐州言淮夷蠙珠曁魚周并徐於青其餘皆兼此二州而言其民二男二女其畜宜雞狗其穀宜稻麥河東曰兖州易氏曰夏殷皆言濟河惟兖州謂東河之東濟水之北也周人以青兼徐而兖州又得越乎濟之東南故徐之岱山職方以為兖之鎮山徐之大野職方以為兖之澤藪是也故曰河東其山鎮曰岱山易氏曰漢志泰山郡博縣泰山在西北博在唐為乾封屬兖州今為襲慶府奉符縣泰山一曰岱山禹貢海岱惟青州海岱及淮惟徐州是青州在岱山東北徐州在岱山東南周并徐入青而不以岱屬青州兖在西北實兼有其地其澤藪曰大野易氏曰漢志泰山郡鉅野縣大野澤在縣北唐以縣屬鄆州今屬濟州案禹貢徐州言大野既瀦周無徐州故以屬兖其川河洓易氏曰禹貢言導河積石案漢志金城郡河關縣積石山在西有唐及今為積石軍然禹之導河始於積石其實河源逺在西塞之外漢張騫班固及水經山海經等皆不知其地唐穆宗長慶元年劉元鼎使吐蕃歸踰湟水湟水出蒙谷抵龍泉與河合合河之上流繇洪濟渠西南行二千里水益狹其南三百里三山中髙而四下曰紫山古所謂崑崙者也其地蓋劒南之西虜曰穆穆哩山河源其間色赤行益逺他水并注則濁自此東北直穆克依額音磧尾入吐谷渾以至積石東北流至鄯州龍天縣界又東流至河州枹罕縣界又東流至蘭州五泉縣又東北流至㑹州㑹寧縣又東北流至靈州廽樂縣又東北流至三受降城又東迆南至朔州之鄯陽縣又南流至嵐州合阿縣又南流至石州臨泉縣又南流至隰州永和縣又南流至慈州吉昌縣又南流至絳州龍門縣今以縣屬河中府乃龍門口即禹貢所謂至于龍門者也又南流至蒲州蒲州對河為華州華隂縣大華山在縣八里河經大華之北故曰華隂即禹貢所謂南至于華隂也至此方自南迤東至陜州陜右縣今為陜縣有底柱山在黄河中禹貢所謂東至于底柱也又東流至河南府之王屋縣又東流經本府之河陽縣今為孟州有孟津禹貢所謂東至于孟津是也又東流經本府之鞏縣有洛水入河禹貢所謂東過洛汭是也又東流至衞州汲縣其黎陽縣有黎山即禹貢所謂至于大伾是也又東北流至桐州臨河縣又東北流至澶州頓丘縣又北流至魏州貴郷縣今省入于大名府之元城縣又東北流至貝州經城縣今省入大名之宗城縣又東北流至冀州南宫縣禹貢洚水亦入河以禹河東徙故自入海而不入于河洚水故瀆在縣東南六里禹貢所謂北過洚水是也又冀州西北接邢趙深三州三州皆有大陸澤禹貢所謂至于大陸是也又東北流至滄州饒安縣即禹貢北播于九河同為逆河入于海之地大抵河行萬餘里豈獨為兖州之川禹貢濟河為兖州即其地攷之自魏至滄凡一千三百餘里其河之東境皆兖州之域黄氏曰職方曰河東曰兖州盖自黎陽北流兖冀分河為界兖東而冀西泲水在經及漢志皆以此字從水從案説文從水從注出兖州之川惟禹貢從水從齊又案漢志從水從齊其水出常山郡房子縣賛皇山乃别是一水名則此二字音同實異後世雖例以從水從齊者為兖州之川其實乃字之誤當以古文為正案禹貢道沇水東流為濟攷之則在河東郡之王屋縣王屋山在縣北沇水所出伏流至河内郡之軹縣唐為濟源縣以濟水出平地有二源故名濟源南流入于河禹貢入河復截河而南溢為滎滎在鄭州滎澤縣本漢滎陽縣北實受溢河之濟水濟水自春秋後不復截河而入於滎矣今雖有滎澤而故瀆湮塞不可攷又東至汴州又東北至曹州為陶丘又東北至菏澤在廣濟軍之東北自河至此凡七百餘里皆古濟所經之地今不復有濟水但存其名而已又菏澤雖不受濟水亦自有源仍舊東流世俗因其舊名亦以濟名之然東南流至兖州金鄉魚臺入徐州沛縣與泗水合而入淮又一𣲖禹貢濟水至菏澤即東北㑹于汶汶水出兖州乾符縣今襲慶府奉符縣又北流至鄆州須昌縣又東北流至齊州臨邑縣又東北流至淄州髙苑縣又東流至青州博昌縣以入乎海自汶水源至此皆古濟之地實古兖州之域其浸盧音雷維于恭反易氏曰鄭康成曰盧維當為雷雍葢濮川雷澤縣雷夏澤在北又灉沮二水源俱出雷夏澤正兖州之境顔師古曰盧水在濟北盧縣康成讀曰雷非也唐以盧縣屬鄆州今廢入陽榖黄氏曰濰水出宻州莒縣濰山北至濰州昌邑縣入海水經注盧水出宻州諸城縣盧山即久台水也西北入濰杜佑通典盧水在濟陽盧縣因水而名盧縣今屬東平府非盧水所經其説誤禹貢兖襲慶濟屬徐濰宻屬青周廢徐兖濟濰宻皆入兖周魯為兖牧封伯禽都曲阜其利蒲魚其民二男三女其畜宜六擾李嘉㑹曰蒲魚蒲蘆葦及魚也易氏曰利與青州同民畜與豫州同其榖宜四種鄭康成曰四種黍稷稻麥正西曰雍州易氏曰禹貢有雍有梁故梁為正西而雍為西北殷周皆省梁入雍故雍州為正西其山鎮曰嶽山易氏曰漢志有扶風汧縣吳山在西古文以為汧山雍州山然案唐隴州汧源縣而汧山北與隴山接禹貢導岍是也此正岍山非所謂吳山吳山同在隴州郤自有吳山縣在州西北一百二十里吳山又在縣西南五十里周都五嶽之外以此特近故為嶽山秦都咸陽亦為西嶽唐為國之西鎮山謂之西吳其澤藪曰弦蒲鄭司農曰弦或為汧蒲或為浦易氏曰漢志有扶風汧縣北有蒲谷鄉有弦中谷雍州藪今屬隴州汧源縣其川涇汭易氏曰漢志安定郡涇陽縣开頭山在西涇水所出唐以涇陽源為平凉屬原州今屬渭川又東南流至涇州臨涇保定二縣又東南流至邠州之宜禄新平永壽三縣又東北流至京兆府之醴泉髙陵雲陽三縣以入渭汭水者非禹貢所謂汭也禹貢言汭皆渭水之北此所謂汭者雍州之川名漢志右扶風汧縣汭水出西北東入涇此正公劉居豳之地詩所謂芮鞫之即徐廣曰新平漆縣東北有豳亭其國城在邠州東北二十九里三水縣界古豳城是也正與公劉詩合又唐志涇州臨涇縣有汭水西自隴州華亭縣流入一名宜禄川然涇隴二州在邠州之西則非邠州之汭要皆雍州之川也黄氏曰汭水出汧源縣小隴山至邠州宜禄縣為宜禄水入涇渭水出熈州狄道縣鳥䑕同穴山東南至華州華隂縣入河其浸渭洛易氏曰漢志隴西郡首陽縣鳥䑕同穴山在西南渭水所出唐省首陽入渭源後省今置渭源堡屬熈州鳥䑕山在縣西渭水有三源正東微南流至本州之襄武縣又東流五十里至鞏州之隴西縣又東流至秦州上邽縣又東流至隴州南田縣今省入吳山又東流至鳳翔府岐山縣又東流至京兆府萬年縣又東流至華州華隂縣東北入于河謂之渭口禹貢所謂汭是也洛水别是雍州一浸非禹貢導洛自熊耳之洛鄭康成曰洛出懐徳釋者引詩之瞻彼洛矣為證案漢志左馮翊懐徳縣即彊梁源之洛水懐徳即京兆府之富平縣今縣屬耀州即漢左馮翊之地北條荆山在縣西正漢志洛水之源也孔安國注禹貢東㑹漆沮之下曰漆沮二水名亦曰洛水出馮翊北孔頴達引水志云出馮翊懐徳縣東南入渭正與漢志合又一洛水出慶州洛源縣在唐京兆之西北五百餘里黄氏曰洛水出慶州洛源縣白於山今名安郎山至同州白水縣入渭雍周為王都廢梁州入焉攷之地志非一源案唐志慶州洛源縣本漢歸徳縣地屬北地郡有於向山在縣北三十里洛水所出因以名縣東流至鄜州洛交縣又東南流至京兆府雲陽縣之東境又經同州澄城縣之西境此去富平之懐徳亦甚近不應言兩洛水以其異源而下流同入于渭故皆以洛水名之如冀之清漳濁漳青之大沂小沂徐亦有兩泗水以其同入不害其為名稱之同其利玉石其民三男二女其畜宜牛馬其榖宜黍稷易氏曰禹貢於雍州言厥貢球琳琅玕孔氏謂球琳皆玉名琅玕石而似玉鄭鍔曰即藍田出玉也畜榖略與冀州同東北曰幽州易氏曰舜十二州本有幽州水土既平以冀為帝都省幽入冀殷人南都河南之亳復舜幽州之名周人又以幽州兼殷之營州實禹貢青州隔海東北之境故曰東北其山鎮曰醫無閭易氏曰後漢志遼東郡無慮縣有醫無閭山唐地志營平乃漢遼西郡則其山又在營平之東北其澤藪曰貕音兮養易氏曰漢志琅琊郡長廣縣賈氏曰地志長廣屬徐州貕養澤在西唐萊州昌陽縣本漢縣屬東萊郡今為萊陽縣貕養澤在縣東北四十里葢此澤介乎東萊琅琊兩郡之間也其川河洓易氏曰經於兖州言其川河洓葢兖州北距河而南據洓禹貢言濟河惟兖州則惟兖州之川宜也幽州逺在東北於河泲何與盖幽州雖跨有遼水為東北而實西南越海兼有青州之東北境所以琅琊郡之貕養澤泰山郡之淄水千乗郡之時水皆在幽州之域光武十三年以遼東屬青州二十四年還屬幽州是知幽州實可以有青州王璜張楫云九河陷海中是九河未陷之前凡豋萊海岸及濵滄二州之東境皆在幽州之地與兖州東西分界故其川同於河泲王昭禹曰幽之川亦與兖同者盖兖在河東北二州相連皆有河泲也禹貢又北播為九河同為逆河入于海道兖水東流為濟則幽兖皆河泲所經之地其浸菑時黄氏曰淄水出淄州淄川縣原山北至博興縣入濟易氏曰漢志泰山郡萊蕪縣原山淄水所出東至博昌入泲攷輿地記則襲慶府萊蕪縣有原山淄水所出其地即漢之泰山郡東北流入淄川縣漢萊蕪故城在東北過臨淄縣東又東北過利津縣又東北入于海西漢志乃同入泲盖入泲乃禹川之舊自濟之上流既涸故淄水入海時水在臨淄縣齊城西平地出泉南北二十五里亦謂之源水東北至千乗縣入淄青淄萊禹貢屬青古河自今滄景間入海滄景禹貢屬兖職方分冀置幽居河濟下流其地得今滄景徳棣分淄萊跨河距濟與青兖分界北包營平周燕為幽牧都薊封召公其利魚鹽易氏曰幽州跨海有魚鹽之利其民一男三女其畜宜四擾其穀宜三種鄭康成曰四擾馬牛羊豕三種黍稷稻河内曰冀州易氏曰舜十有二州有幽有并有冀水土既平之後以冀為堯都省十有二州之幽并入焉以餘州準之則知禹貢冀州東西南之三面距河而北境則越乎常山今之燕雲營平諸州皆其地也殷人復以冀州北境復舜之幽州而東西南皆禹迹之舊葢東河之西西河之東南河之北也故曰兩河間周人又分冀而復舜之并州故曰河内而已黄氏曰冀唐虞夏商皆都之舜分置幽并禹貢廢不置周仍分置如虞衛為冀牧周封康叔都朝歌其山鎮曰霍山易氏曰漢志河東郡彘縣霍太山在東唐及今晉州霍邑本漢彘縣霍山一名太岳在縣東三十里其澤藪曰楊紆於于反易氏曰鄭康成曰楊紆所在未聞顔師古引爾雅云秦有楊紆李巡又以為在扶風而此乃以為冀州未詳其義及所在其川漳王昭禹曰其川漳禹貢冀州所謂覃懐底績至于衡漳是也易氏曰漢志上黨郡長子縣鹿合山濁漳水所出東至鄴入清漳又沾縣大黽谷清漳水所出東北至阜成入大河是二漳皆出於上黨也唐志濁漳水出潞州長子縣本漢縣有𤼵鳩山濁漳水所出東北流至本州所理之上黨縣又東北流至本州之潞城縣漳水一名潞水又東北經本州之垣縣黎城縣又東流至相州之鄴縣又東北流至滋州澄陽縣又東北流經潞州之洛水縣有衡漳故瀆俗名阿難渠則知合清漳而謂之衡漳清漳出太原府之樂平縣本漢沾縣少山在縣西南清漳所出東南流至儀州之和順縣又東南流至潞州黎城縣之東北又束北流至洛州之洛水縣又東北與濁漳合而至貝州之寰城縣又東北流至徳州之長河縣乃漳之南岸其北岸即瀛州之平舒縣自此東北入于海其浸汾扶文反潞音路黄氏曰汾水出憲州靜樂縣南流至河中府滎河縣入河康成曰潞出歸徳縣今慶州華池縣無潞水杜佑曰潞出宻雲郡宻雲縣宻雲今檀州水經鮑丘水從塞外來經宻雲戍過幽州潞縣西鄜道元曰鮑丘水入潞通得潞稱俗曰東潞此殆杜佑所謂宻雲之潞也是在幽界非冀浸矣案闞駰十三州記曰上黨路縣有潞水為冀浸即漳水也王猛與慕容評相遇於潞川障固山泉軍人匹絹鬻水二石酈道元曰他大川無可為浸者巨浪長湍惟漳水耳又案今潞城縣春秋赤翟潞子嬰兒之國是則潞之得名已久漳水至潞為川可以灌溉或當是也易氏曰漢志太原郡汾陽縣北山汾水所出西南至汾陽入河攷唐嵐州静樂縣今屬澤州即漢汾陽縣之地汾水東南流入太原府之交城陽曲太原清源文水五縣又東南流至汾州温城介休靈石汾西四縣又東南流入晉州之霍邑趙城洪洞臨汾四縣又束南流至絳州之正平稷山龍門三縣又南流至河中府寳鼎縣北入于河唐潞州潞城縣本漢潞縣屬上黨郡漳水一名潞水在縣北闞駰曰潞水在縣北為冀州浸即漳水也盖周以濁漳為潞清漳為漳其利松柏易氏曰禹貢冀州厥木惟條條長也其利松柏宜矣其民五男三女其畜宜牛羊其穀宜黍稷李嘉㑹曰冀之北土馬之所生今不曰馬而止曰牛羊馬多出於隴西正雍州地黄氏曰九州獨雍冀不宜稻何也自鄭國引涇為渠西門豹引漳為陂後人轉相師用大抵稻田徧二州矣禹之治水非獨除害濬畎澮距川葢興利也而二州獨不為稻田至後人始為之豈禹之智不及國豹之徒哉是必害有甚於利者禹不敢為至于商周皆因之後世但務興利始𤼵禁決防利固可喜害曽不䘏漢末諸家治河之策王横獨言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東居民當春夏少水乾燥時引河渭水溉田故使河流遲貯淤而稍洩而多水暴至則溢決國家數隄塞之稍髙於平地猶築堤垣而居水也可各順從其性母復灌溉則百川流行水道自利無溢決之患夫水不使灌溉而失藝植之利不智者皆能知之然其識微見逺實合大禹規模由漢以來冀豫徐兖河患竭國力匱民財漂没墊溺救患不給灌溉之利誠不足言矣雍上流冀下流以形勢論之雍本無害然雍亦不以灌溉何邪決涇渭㶚滻諸水使盡入河上流甚駛疾而下流猶苦其停緩若分别諸水上流已旁決下流遂淺淤何疑哉孟子曰禹以四海為壑此説至漢猶有能知者今千餘年其學遂絶滅矣攷工記曰水屬不理孫謂之不行古人治水法理精詳師授的確其肯以一概之見而使利害不足相補除哉正北曰并州易氏曰舜有并州禹貢以并入冀州殷因之周復分冀復禹并州以天下之勢言之冀州在西河之東雍州在西河之西并州介乎雍冀之間故曰正北其山鎮曰恒山易氏曰漢志恒山郡上曲陽縣常山谷在西北按唐定州恒陽縣有北嶽今改為中山府縣為曲陽即漢之舊也其澤藪曰昭餘祁黄氏曰昭餘祁在汾州介休縣水經注曰汾水於大陵縣左迤為鄔澤引廣雅水自汾出為汾陂陂南接鄔地理志曰九澤在北并州藪也吕氏春秋謂之大昭又侯甲水逕大谷謂之大谷水逕祁縣故城南自縣連延西接鄔澤是謂祁藪樂史寰宇記昭餘祁俗名鄔城泊祁屬太原漢故縣也其川虖奂胡反池徒多反嘔烏侯反夷易氏曰漢志代郡鹵城縣虖池河東至參合又東至文安入海此言參合則屬髙栁縣漢髙栁縣𨽻代郡唐貞觀以後為黙啜所破州縣俱廢開元十年改定襄為雲中有髙栁故城則鹵城又當在髙栁之北虖池河源未之詳其河自鴈門縣西南流入崞與唐林二縣又西南流至忻州秀容縣又西南流入定襄縣又南流至太原府盂縣又東流至恒州之靈夀真定九門藁城榖城五縣又東流至定州無極縣又東流入深州之饒陽鹿城安平三縣又東南流入瀛州之髙陽河間二縣又東流入莫州之唐興及莫縣以至任丘文安縣即漢志所謂至文安入海者也康成曰嘔夷祁夷與出平舒漢志代郡平舒縣有祁夷水唐蔚州興唐縣本代郡地嘔夷一名滱水出縣西北髙氏山東北流至興唐縣又東流至瀛州之博野東流入于河黄氏曰虖池出代州繁畤縣泰戱山嘔夷在蔚州靈丘縣即滱水也水經注曰漚夷之水出縣西北髙氏山東至瀛州髙陽縣入易淶水即巨馬河出蔚州飛狐縣淶山東至㶚州南入于虖池同入海其浸淶易黄氏曰易水有三皆出易州易縣寰宇記北易一名安國河出縣西北窮獨山水經注濡水也中易出閻郷城寛中谷東南流至古易京城與北易合流入巨馬河水經注易水與濡水互攝通稱南易出縣東南即山燕王仙臺東石虎罡東流與雹河㑹又東至覇州容城縣南流入髙陽縣合滱水注水經注又曰易水至文安縣與虖池合班固闞駰皆以斯水為南易文安今覇州縣并之東界至此易氏曰漢志代郡廣昌縣淶水東南至容城入河案唐蔚州飛狐縣即漢廣昌縣地有飛狐口淶水所出東南流至易州易縣又東北流至淶水縣又南流入容城縣即漢志所謂束至容城入河者也漢志涿郡故安縣閻郷易水所出東至范陽入濡此言易出故安則近幽州之境案唐蔚州飛狐縣周屬并州自縣北入媯州之懐戎即古飛狐口易水所出東南流至易州易縣至北方是漢涿郡故安縣之地又東流至涿州之歸義縣又東北流入涿州范陽之南界即漢志所謂至范陽入淶者也又曰案詩韓奕韓侯為并牧今同州韓城縣古韓國此并西界也并地最延袤綿亘冀北以制戎夷故詩曰奄受北國其追其貊荆宛并韓其國都皆近京師宛衞武關以制楚韓扞臨晉以制狄皆天下形勝故宣王中興特著二詩焉大抵周人幽據全燕制狄齊據海岱制徐淮兖冀翼蔽洛陽并荆控扼咸雍此天下全勢也觀九州山川險要之處與其建牧規模而經略大體可見矣其利布帛其民二男三女其畜宜五擾其穀宜五種鄭康成曰五擾馬牛羊犬豕五種黍稷菽麥稻也緫論鄭鍔曰自揚州而下以至於并州是謂九州之國所以正其東西南北者皆以王畿為主天子靣南故自南而辨之則四方各正矣每州各言鎮山記其為一州之鎮也各言澤藪記其一州水之所聚也各言川記其水入海之道也各言浸記其衆田灌溉之利也各言男女或二或三或五記其地氣之偏而隂陽之不齊也各言穀之所宜記其土壤之髙下而所種之不同也各言利之所宜記其山林之踈宻而所産之不同也薛氏曰凡九州之土髙者宜黍稷下者宜稻麥山氣多男澤氣多女東南多絲纊西北多織皮先王之于民因其東西南北之異方山澤川浸之異宜男女異數土石異産黍稷稻梁之異種丹漆絲枲之異利廣谷異制民生異俗為之修其教而不易其俗齊其政而不易其宜山者不使居川澤者不使居中原騂剛之地糞種不以羊赤緹之地糞種不以牛然後五方之民各安其性樂其業而無偏敝之患緫論分州之異易氏曰九州之説其來尚矣孔安國以禹貢九州為帝堯之制遂謂治水之後舜分冀州為幽州并州分青州為營州餘乃堯舊非也攷之舜典其説甚明始言肇十有二州次言咨十有二牧然後命禹平水土是則平水土之命與夫十有二州之建其先後次第自有可攷而不誣者禹别九州書以貢名在治水之後禹貢於逐州之下雖各列隨山濬川之説然皆追求其治水蹤迹而後辨山川之險易量道理之逺近以定賦貢之髙下不得以舜之十二州為後也善乎班固之言曰堯遭洪水懐山襄陵天下分絶為十二州使禹治之水既平更别九州列五服其先後次序正所以𤼵明當時置州之意薛氏曰冀兖青徐揚荆豫梁雍此禹貢之九州也冀豫雍幽營揚兖荆徐此爾雅之九州也揚荆豫青兖雍冀幽并此職方之九州也禹貢九州之名舊矣舜時肇十有二州分冀為幽州并州分青為營州至夏則復為禹貢之九州矣爾雅九州商之制也職方九州周之制也是商有幽營而無禹貢之梁青周有幽并而無禹貢之徐梁郭璞以爾雅之九州為商制然爾雅有九州之名而無九州之界禹貢職方有其界而不能不相侵入者且職方九州冀小於禹貢以分冀為幽并如舜時則一分而三也雖無徐州而青兖之間是也雖無梁州而雍豫之間是也禹貢曰海岱及淮惟徐州是徐之南及淮也又曰大野既瀦是徐州之大野也今職方青州之川淮泗兖州之澤大野是以徐而入青兖也禹貢曰華陽黒水惟梁州是梁州之南據華山之南也又曰厥貢璆鐡銀鏤砮磬是梁州之玉石也今職方豫州之地華山雍州之利玉石是以梁而入雍豫也職方既以青兖而包徐故青州多入禹貢之豫而兖州又多入禹貢之青禹貢豫州被孟瀦而職方青州有其澤望諸望諸即孟瀦也兹非青之入豫乎禹貢青州曰鹽絺海物而職方兖州有其利蒲魚蒲魚即海物也兹非兖之入青乎職方既有冀而又有幽并矣故幽州多入禹貢之青徐而冀多入禹貢之雍且幽州其山醫無閭其澤曰貕養其浸菑時醫無閭在遼東光武時以遼東屬青州後又屬幽州兹非幽之入青乎貕養在長廣菑出萊蕪地理志以長廣屬徐州瑯琊有萊山兹非幽之入徐乎冀州曰其澤楊紆而爾雅曰秦有楊紆李巡又以為右扶風顔師古注漢地志以為即楊紆兹非冀之入雍乎大抵周以夏之冀為三以餘八州為六其勢不能如禹貢之舊也然杜氏二鄭不改職方之字而必改職方之意後鄭謂潁在陽城宜為豫今屬荆非也以溠在楚隨之閒宜屬荆今屬豫非也不知青幽梁雍兖豫尚多侵入況相距之州乎是改職方之意也先鄭以青州之淮字當為睢沭字當為洙直謂宋有次睢而魯有洙泗曽不謂青之包徐也以雍州之弦字當為汧蒲字當為浦直謂雍有汧水耳曽不謂吳山在汧西有弦蒲之藪也至於杜氏以經之湛字當為淮後鄭以兖之盧維為雷雍曽不謂湛與盧雍之名無所經見是改職方之字也鄭鍔曰周之九州無徐梁禹貢有徐梁無幽并爾雅云兩河間曰冀州河南曰豫州濟東曰徐州河西曰雍州漢南曰荆州江南曰揚州燕曰幽州濟河間曰兖州齊曰營州詩譜雍梁荆豫徐揚禹貢所云堯舜法爾雅所云似夏法詩譜似商法説者云爾雅職方不同先儒以爾雅所言為商制理或然也至於周官無徐梁者葢徐去淮為近而其地或為徐戎淮夷之所有梁去洛為逺而其地或為王畿都鄙之所據也爾雅有幽州而周官有幽并者民有盈耗故州有損益冀之在商其民是以離而為二故有冀而有幽在周又離而為三故有冀又有幽并舜分冀為幽并分青為營周無徐州盖其地為淮夷徐奄所有周公之時命伯禽之魯而徐戎淮夷並興此其證也其後成玉伐淮夷宣王征徐方僖公征淮夷而周官以征伐所獲者為𨽻獨於蠻閩夷貊有之而戎狄則闕則知其服東南為難矣李嘉會曰周之九州與禹貢不同者周時都雍不可不廣梁山多險阻故合梁雍為一州徐地狹隘故青兼之堯舜都冀地壤最闊今之北境多在其内且帝都所寓人民阜繁至周亦然故冀州分為幽并緫論序州之次王氏曰九州之序禹貢始於冀次以兖而終於雍職方始於揚次以荆而終於并者盖禹貢言治水之序職方言逺近之序治水自帝都而始然後順水性所便自下而上故自兖至雍而止以逺近言之則周之化自北而南以南為逺故關睢鵲巢之詩分為二南漢廣亦言文王之道被于南國徳化所及以逺為至故也始於揚州則以揚在東南次以荆則以荆在正南終於并則以并在正北先逺而後近也周禮訂義卷五十六
