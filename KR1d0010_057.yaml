body:
  text: 周禮訂義卷五十七宋王與之撰乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服鄭鍔曰職方氏掌版圖以制其貢諸侯供貢以服事天子故以服言之欲其服職事上而已鄭康成曰詩云侯服于周黃氏曰司馬曰九畿畿界域也或曰畿封皆界域也司馬施政職而以界域為名見王政之行無逺近一也海內之地方千里者九九州各以其山川畫界而九畿自王畿出四靣畫之地形不能整方九服闊狹相補而足侯國居其中有司所當辨也故晉為甸侯鄭為男伯愚案餘説見大司馬陳君舉曰衛服之外聖人雖制之服而不必其來故武成敘諸侯之助祭洛誥稱諸侯之和會康王之誥陳諸侯之聽命止言五服而已凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下鄭康成曰以此率遍知四海九州邦國多少之數方千里者為方百里者百以方三百里之積以九約之得十一有竒云七伯者字之誤林氏曰非實有國也特計其地之廣狹所能容也黃氏曰凡邦國千里據一州之地而言也一州之地方千里故為九州而建九牧一州千里封公以五百里則四公猶曰封公足五百里則可容其四也方四百里則六侯猶曰封侯足四百里則可容其六也方三百里則十一伯猶曰封伯足三百里則可容十一也方二百里則二十五子猶曰封子足二百里則可容二十五子也方百里則百男猶曰封男足百里則可容百男也出入千里之數而進退之以見九州之地一州必千里也諸侯雖有加地未必盡登此數是故皆懸法也康成曰每事言則者設法也設法者以待有功而大其封其説是也但謂周九州界方七千里周公改殷制雖小國地皆方百里一州必四公六侯十一伯二十五子百男合附庸為二百一十國則強牽合矣王制二百一十國蓋言分土為三而一州之地合百里七十里五十里之國可容二百一十而猶有餘也職方言四公六侯十一伯二十五子百男蓋言建侯大封而一州之地盡登五百里則容四四百里則容六三百里則容十一二百里則容二十五百里則容百而適足也是皆懸設之言也封國三等建侯亦三等故五百里四百里為大國不五百里四百里則不能為三軍次國必三百里不三百里則不能為二軍小國必二百里不二百里則不能為一軍男雖加地至百里猶不能為一軍此其事實而其制參見於司馬職方者也周之公國杞宋而已九州之地封國不盡則為間田古説周國八百而春秋經傳古國存滅其可見者不過百餘未入春秋法制猶在諸侯未敢大放恣至春秋時猶以滅國為重則古國之不可見者必非盡并滅之不知其何故也愚案餘説見大司徒薛氏曰千里之方為方百里者百五百里之國為百里者二十五四個方百里者二十五用千里之方一是方五百里者不過四公也又云方四百里則六侯則是四百里之國為方百里者一十六六個方百里者十六則為九十六是用百里之方九十六於千里之方猶餘百里之方四又云方三百里則十一伯則是三百里之國為方百里者九以十一個方百里之國為百里者九十九於千里之方猶餘百里之方一又云方二百里則二十五子以二百里之國為方百里者四則二十五個方二百里用千里之方一百男則百里而已此封國之定制也其餘為附庸山川者固見於大司徒建邦國之制鄭氏謂九州之界方七千里七七四十九為方千里四十九其一為畿內餘四十八八州各有方千里者六以為封公侯伯子男之地失之矣鄭氏之見以開方言之殊不知井田之地畫為井形四圍左右皆有定制故可以開方言之若夫先王定九州之制分疆析壤各以千里為州非如井田之法周圍貫通可以開方計之若曰成周之制為方千里者四十九何成王周公斥地之廣耶王制曰凡四海之內九州州方千里豈復開而為千里之六耶或曰王制商制也夫何商周之大異也孟子曰海內之地方千里者九齊集有其一如此則知鄭氏之失凡邦國小大相維鄭康成曰大國比小國小國事大國各有屬相維聨也王設其牧項氏曰諸侯皆世襲惟牧為王所設鄭鍔曰五國為屬屬有長二十五國為連連有率三十國為州州有正雖足以相制而未足以兼制之大國無小國之助則無以為強小國無大國之依則不能以自固王於是而為之設八命之牧以為二百一十國之長統臨而牧理之然後小大之國各有所畏易氏曰其要專在建牧一事周制九牧實舜之咨十有二牧之遺制皆所以統天下之邦國使之考禮正刑以尊天子愚案陳君舉説見大宰九兩下制其職各以其所能黃氏曰牧下有正卒達乎諸侯故曰制鄭鍔曰人各有能有不能論所能而制以職如牧監參伍之職方伯連率之職必觀其才力之所能任制其貢各以其所有賈氏曰即大宰九貢小行人春入貢及禹貢貢篚是也林椅曰行人制貢蓋度道里嵗月逺近為之率例職方各以其所有乃通法也然九州九牧王居其一九職九賦自大司徒之所頒掌交之所諭推之是以一州為法達乎八者黃氏曰諸公食者半侯伯三之一子男四之一地有進退則貢有增減故曰曰制其貢九州有常貢苟非增減則無庸制也春秋傳會以訓上下之則制財用之節此其節也制職制貢牧皆參焉鄭鍔曰地各有所生有所不生論其所有而制貢如荆有齒革不責以揚之竹箭雍有玉石不責以冀之松柏因其所有則其求易供林椅曰職方言設牧而繼之以制職制貢則當時職貢亦總於州牧王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑王昭禹曰王巡守則諸侯各朝于方嶽故戒于四方鄭康成曰乃猶女也守則諸侯所守之地職事則諸侯所治之職事天子適諸侯曰巡守巡守者巡所守也故戒以修平乃守修則使之治其壞也平則使各當其分也諸侯朝於天子曰述職述職也者述所職也故戒以考乃職事職則慮其有曠職事則慮其有廢事鄭鍔曰因巡守之年警戒之使修正其疆界考察其職業以俟王之時巡告戒之有素及其不率然後待之以誅夷竄殛之罪可以無愧矣李嘉會曰必先警戒而後巡守者不欲乘其不備幾于不戒而殺也必先警戒則刑可施及王之所行先道帥其屬而巡戒令鄭康成曰先道先由王所從道居前行其前日所戒之令鄭鍔曰及王之所行先至所嚮之方國巡其前所布之戒令預考其率與不率也王殷國亦如之賈氏曰王殷國所在無常或在畿內國城外即為之或向畿外諸侯之國行之故有戒令之事黃氏曰宗伯殷見曰同大行人殷同以施天下之政則巡守本為殷國也屬象胥諭言語協辭命屬瞽史諭書名聽聲音達瑞節同度量成牢禮同數器修法則皆所以正不正也故謂之殷國職方巡狩謂不因殷國而有會同之事如成王作洛宣王車攻皆不至方嶽故獨以天子適諸侯為名其曰殷國正謂時巡朝諸侯于方嶽考制度大明黜陟也言巡狩則不殷國言殷國則巡狩可知故掌客兼言之六年五服一朝十二年王乃時巡皆定禮王有故不出非常也今年有故不出明年亦當出先王未嘗豫設非常不出之禮使人主怠惰也漢武帝嵗出祀甘泉汾隂固為煩擾成帝曠嵗不出實怠耳合禮不合禮皆未論鄭又言王不巡守其戒四方與巡守同夫王出則戒以平守考職將以待黜陟也王行將至則又巡戒焉不出何戒之有土方氏上士五人下士十人府二人史五人胥五人徒五十人項氏曰土方者主土度四方之地賈氏曰主四方邦國之事與職方連類在此以下至形方並同掌土圭之法以致日景以土地相息亮反宅而建邦國都鄙黃氏曰地形廣逺不可度量故有土圭之法今九章猶有鈎股存焉鄭鍔曰冬夏至潁川陽城晝漏半立八尺之表夏至於表北得尺五寸之景冬至於表北得丈三尺之景皆為地中此建國所用也若建諸侯國則不用此何則景一寸差千里一分則百里封侯國之大者不過五百里何取於土圭之寸耶亦取其分而已若建小國又取其分以為小分也一分百里男國也亦大都也二分二百里子國也若小都五十里則為小分五分大夫二十五里則為小分二分半所謂建邦國都鄙也鄭康成曰土地猶度地知東西南北之深而相其可居者宅居也李嘉會曰知其風土以相國君居民之所宅蓋宅里所居必隂陽納藏風氣合聚如禹貢所云四隩既宅是也鄭鍔曰土方氏所掌與大司徒以土圭正日景馮相氏之致日致月不同大司徒建王國而用土圭以測土深求天地之中馮相氏欲知四時之氣土方氏專建諸侯之國不過用土圭以度其地之逺近廣狹而已以辨土宜土化之法而授任地者黃氏曰所謂景短多寒景長多暑景朝多隂景夕多風土宜土化由是而有其法焉鄭康成曰土宜謂九榖稙稚所宜也土化地之輕重糞種所宜用也任地者載師之屬劉氏曰謂授其地以任其耕種者鄭鍔曰大司徒有土宜之法草人有土化之法用是法以授夫任地之人則非特治王畿千里之地有法而治諸侯之地亦有法何患職貢之不供哉王昭禹曰大司徒以土圭之法測土深正日景以求地中凡建邦國以土圭土其地而土方氏則輔成司徒建國之事而已大司徒掌土宜之法而土方氏亦辨土宜土化之法則輔相司徒草人任土糞種之事而已司徒草人所掌止於王畿而土方氏所掌則及於四方王巡守則樹王舍易氏曰樹植也立也王巡守則有四方之舍土方氏既為之土地相宅而知利害之所在然後掌舍為之設梐枑再重為車宫轅門為壇壝宫棘門而土方氏植立之焉鄭康成曰為之藩羅黃氏曰草舍嚮背左右猶有其法鄭鍔曰暫所舍止亦當相其宜而為之懷方氏中士八人府四人史四人胥四人徒四十人鄭康成曰懷來也主來四方之民及其物劉氏曰逺人不服則修文德以來之是懷方以成蓼蕭之化者聖王之事也逺人既來則懷方氏掌其送逆道路之給而開之以中國道德仁義之化悅之以聖人中和禮樂之方陳之以位天地和隂陽之本感之以致神祗遂生殖之義使之心悅誠服踴躍于兩間而不知自已者也陳及之曰逺人之來亦不旦旦有之今也懷方氏中士八人府史胥徒凡五十二人是冗員也必也待其來以他官從事焉耳凡周家之制官府之設有非欲常常用者皆臨時俾官府兼之李嘉會曰既懷來諸侯而比合之且兼之以道訓宜也必各立一官何故懷其所未來合其所未一然後因方而訓道之三官宜不同也而後形方氏可修其職也黃氏曰賔客屬秋官民屬夏官其事異也掌來逺方之民致方貢致逺物而送逆之達之以節陳及之曰鄭氏謂逺方之民四夷之民也諭德延譽以來之若然則是漢武使張騫輩説諭西域之比當時設官之意謂逺方之民苟有歸附者懷方氏懷之如大小行人之待諸侯也成王時越裳氏重九譯而至非設官為之主則言語不知其故飲食不知其好逺人失其所矣豈所以來逺方之民乎王昭禹曰逺方之有貢猶六服之貢世一見各以其所貴寶為贄也鄭鍔曰謂其方所當以為貢者逺方有所獻之物猶六服諸侯之獻國珍也黃氏曰逺物貿易者也飲食異嗜漢西域賈胡利漢賄無嵗不至先王以為此不能絶而設官待之自古邊事多因互市鄭鍔曰逺物非所當貢蓋其貴寶異常之物貢以致其臣子之禮獻以達其享上之誠四夷既不可責之以方貢使為嵗事之常又不可責其所出珍異之物以為已玩好之具要在有以致之使之自至而已其來則逆之其去則送之厚之以禮也其貨物則以璽節達之使道路無壅阻示之以信也鄭康成曰達民以旌節達貢物以璽節治其委積館舍飲食王昭禹曰治其委積所以備其用也治其館舍所以安其居也治其飲食所以順其嗜好也鄭康成曰續食其往來鄭鍔曰十里有廬廬有飲食三十里有宿宿有委五十里有市市有積此遺人所掌懷方氏為之治其事蓋結之以恩也王氏曰逆送之以為之禮達之節使無留難治其委積館舍飲食使有所資賴此所以懷之也合方氏中士八人府四人史四人胥四人徒四十人鄭鍔曰王者之心未嘗不欲四海無異俗九州皆共貫然道路或陷絶財利或不相通器用或不齊人各私其所好而異其所惡故命官曰合方氏以合其不合者焉質人云同其度量一其淳制則所同者一市之中行人云同度量同數器則同於十一嵗也合方氏舉天下而皆同之王者大一統於天下實本諸此掌達天下之道路鄭康成曰津梁相湊不得陷絶王昭禹曰干夫有澮澮上有道萬夫有川川上有路道路所以通往來達之則往來有不窮之通通其財利王昭禹曰財利出於土地所生而有無多寡常不能以相資通之則有無懋遷而多寡相濟矣同其數器鄭康成曰權衡不得有輕重王昭禹曰十百千萬之所計謂之數吉凶禮樂之所用謂之器鄭鍔曰數同則以九以七以五為節者舉天下皆同而不敢過器同則曰樽曰爵曰爼曰豆者舉天下皆同而不敢變一其度量鄭鍔曰分寸尺丈仞之度皆使之一則無長短之差籥合升斗斛之量皆使之一則無多少之異除其怨惡王昭禹曰生於心而有所憚者怨也人之所醜而有餘者惡也有以除之則惡將有所改而遷善怨不妄作而當理矣鄭鍔曰怨惡除使無積怨以生亂同其好呼報反善王昭禹曰情之所樂謂之好性之所欲謂之善苟役物以為好則好失之僻離道以為善則善失之竒故必有以同之先王不貴異物不寶逺物是以教而同其好也作竒技者誅被異服者禁此以法而同其好也聮之以朋友此以教同其善也不孝不悌不信不治則糾之以八刑此以法而同其善也同之如是道德奚患其不一風俗奚患其不同總論易氏曰道路達財利通此合方之事也未及夫政焉同數器而九儀之命皆有定守一度量而五則之制亦有定用此合方之政也未及夫教焉至於除其怨惡同其好善則講信修睦無有異志合方之為教也大矣陳及之曰合方氏掌達天下之道路則封內諸侯津梁相通聘好往來有無相補患難相救無有壅蔽之患矣然先王恐其私相連衡以叛上及姦人往來而莫之禁於是為之溝池樹渠之固以防之為之節制以謹之所謂守邦國者用玉節守都鄙者用角節凡邦國之使節山國用虎節土國用人節澤國用龍節門關用符節道路用旌節凡通達於天下必有節無節者有幾則不達所以禁絶姦人之往來也每歲相問每世相朝告終易代有送葬之禮有慶賀之禮凶荒災患有弔恤之禮有致禬之禮此諸侯之邦交也非是而私相連結附下罔上恃強并小則大司馬有九伐之法方伯連帥奉辭伐罪所以絶其萌芽杜其吞併也春秋以來姦人不得志於中國則如意而往無所疑忌雖弒君之賊往往藏匿以為已用則關梁呵問之法不行矣喜則朝聘無虛月怒則爭戰歷嵗年而不已則方伯連帥之職不修大司馬九伐之法不行矣若是而曰達天下之道路是啓姦詐而長背叛耳訓方氏中士四人府四人史四人胥四人徒四十人鄭康成曰訓道也主教導四方之民鄭鍔曰設教者聖人神道教化密運使民俗自移無待于訓方氏之官設官曰訓方氏者取其事之可以言傳者則訓四方易氏曰合方氏之同好善因人心之善還以道之而已至此一職專以訓方為事亦非於人心好善之外别有所謂訓也道四方之政事則政事固有良而平者矣與其上下之志則志固有醇而正者矣誦四方之傳道今之時亦有格言大訓可以為法者矣此皆人心自有之善訓方從而訓道之也王氏詳説曰地官有土訓誦訓此又有訓方氏蓋土訓所掌在於道地圖詔地事誦訓所掌在於道方志詔觀事此掌道四方之事與上下之志又異矣掌道四方之政事與其上下之志鄭康成曰道猶言也為王説之四方諸侯也上下君臣也鄭鍔曰政事謂諸侯之所施設也志謂諸侯君民上下之趨向也誦四方之傳道王昭禹曰誦與孟子為王誦之同意訓方氏所誦皆以告之也鄭鍔曰傳道謂四方之人口之所傳説稱道者鄭康成曰傳道世世所傳説往古之事為王誦之若今論聖德堯舜之道矣王昭禹曰傳則或出于衆人之所傳道則或出于一人之所道誦四方之傳道則將以來之至于推而行之然後可以為道矣正嵗則布而訓四方而觀新物鄭鍔曰道其政事與其上下之志則達其説於王使王知之誦其傳道非特誦之而已取其可以為訓者作為戒書於建寅之月布之以誦四方使知其善者可行惡者可改也布於正嵗則順時之始與之更新矣又觀四方之新物則因夫一嵗之始察民之所好時新者如何道之訓之以俟他時之布項氏曰物即事也即上所誦道之三物也新嵗觀之又將以為來嵗之訓王昭禹曰新物謂新所用之物觀新物將以觀民之好惡也正嵗者民物之所尚以一嵗之始而觀民情之所尚將以訓其志淫好僻也陳藴之曰新物如舊染汙俗咸與惟新周雖舊邦其命維新作新民亦以新子之國先知覺後知先覺覺後覺易昏為明易惡為善化變氣質如螟蛉之肖蜾裸愚案此又是一説黃氏曰布而訓四方使述其舊美也觀新物察風俗之變也形方氏中士四人府四人史四人胥四人徒四十人易氏曰形猶人之形有相屬之義鄭康成曰形方氏主制四方邦國之形體掌制邦國之地域而正其封疆無有華苦蛙反離之地使小國事大國大國比小國鄭鍔曰地域掌於大司徒版圖掌於職方特其名數也形方氏則制之如制衣之制因形裁割使各得其宜也公侯伯子男五等封疆各有所正制其地域而正之使析者不至於相絶屬者不至於相離故曰無有華離賈氏曰地有􅏠邪離絶遞相侵入不正故正之􅏠者兩頭寬中狹邪者一頭寬一頭狹析而不絶者為華王安石云華與為國君削瓜者華之之華同義地雖分析亦當連亘不絶為一國之界故不可華絶而不屬者為離一國之地當自為封疆若有國在此而地斗絶在彼則不能相統攝矣故不可離其所以使地不華離者蓋使小國近大國事之以自立大國近小國比之以自固然非形方氏制其地形使各相聨屬雖欲使小大相事相比不相侵其疆場亦不可得也鄭康成曰比猶親也易比象曰先王以建萬國親諸侯王氏曰正其封疆無有華離之地則小國易以守大國難為侵人各有土宇可以無患矣劉氏曰大司馬建邦國之九法有均守平則以安邦國比小事大以和邦國之法矣若形方氏正之弗從然後詔之司馬而九伐之法行焉山師中士二人下士四人府二人史四人胥四人徒四十人賈氏曰此山師及下川原等皆是遙掌畿外邦國之內山川原隰之等使出稅珍異以供王家陳及之曰古者山林之所産川澤之所出某物利於人某物害於人其版圖數要悉藏之王府諸侯不得而知辨其物之利害而頒之則諸侯知取其利避其害使致其珍異之物則不得欺其上矣李嘉會曰山川必曰師何也以其有珍異之物當主名以貢於上有土宜之物當播種以導乎下掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物鄭康成曰山林之名物若岱畎絲枲嶧陽孤桐王氏曰稻人澤草所生種之芒種所謂利有如此者非特中人用而已王孫滿曰夏之方有德也鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若魑魁魍魎莫能逢之所謂害有如此者非特毒物及螫噬之蟲獸而已黃氏曰吳即山鑄錢煮海水為鹽齊魏隄河皆利害也李嘉會曰地官山林川澤各有三等所守有厲禁所收有財物然行之王畿不及天下今天下之山林川澤各有其物不辨别之以示天下天下何由而知所趨各有珍異不分辨之以致於上天下何由知所貢如是則吳之鹽鐵斯不得以擅其利齊之鹽策亦可以專其征矣愚案山澤之官屬之司徒者只是會其財物而不能制其邦國司馬專主諸侯得以兼制邦國之事川師中士二人下士四人府二人史四人胥四人徒四十人掌川澤之名辨其物與其利害而頒之于邦國使致其珍異之物鄭康成曰川澤之名物若泗濵浮磬淮夷蠙珠暨魚澤之萑蒲邍音原師中士四人下士八人府四人史八人胥八人徒八十人鄭康成曰邍地之廣平者李嘉會曰地官山澤有虞林川有衡今乃有邍師者以其知地宜之美惡種植之善否以教導民故曰師掌四方之地名辨其丘陵墳房云反衍邍隰之名物之可以封邑者鄭鍔曰髙平曰原四方之地廣平之處地有丘陵之名有墳衍之名有原隰之名辨其名物相其隂陽度其水泉則可以為封建諸侯之所不辨其名無以知其或平或陂或燥或濕不辨其物無以知其或肥或瘠或美或惡以為封邑則民病而不安故使邍師辨之先儒讀物之可以封邑者為句其説謂物之者相其土之物色也余謂辨其丘陵墳衍邍隰之名物之可以為封邑者當為一句黃氏曰都邑必居平地商人避河患遷邢盤庚曰適于山用降我凶德是也然其民蕩析離居不昏作勞不服田畝不可施井邑之法故復遷亳劉執中曰此謂五等封國之餘地未有邑以管其民者不爾則諸侯吞之矣亦可以贊司馬正邦國之封疆匡人中士四人史四人徒八人鄭康成曰匡正也主正諸侯以法則薛平仲曰職方之屬自合方氏至邍師所以防間邦國者可謂密矣然邦國之土地諸侯之所世守邦國之人民諸侯之所世治王官之所制者能幾而彼則帖然退聽者何哉亦惟其服天下者有以並行而不悖也匡人達法則以匡諸侯反側之私撢人誦王志以動邦民靣王之意諸侯知有王而不私於一國斯民知有王而不私於諸侯天下孰不環向而固結哉九伐之法司馬蓋具之而不設矣掌達法則匡邦國而觀其慝使無敢反側以聽王命鄭鍔曰諸侯擅壤土之大恃甲兵之強有違法度而不正設匡人之官以法則而正之法則者王之所以治官府都鄙也鄭康成曰法則八法八則也邦國之官府都鄙亦用焉內外雖有異勢然王者之心初無異治故用其治官府都鄙之法則而正其不正者王昭禹曰大司馬制畿封國以正邦國所以正其地之大小也以九伐之法正邦國所以正其惡之輕重也若夫使之考禮正刑一德以尊天子必有法則以正之從而觀其慝易氏曰人之不善隱微而未露者謂之慝如土訓之道地慝誦訓之道方慝皆隱微之謂使其邪慝未革雖有八法八則將何所正此所以先觀其慝匡人見其為慝必繩之以法則使人無敢反而不順側而不正惟王命是聽焉兹其所以名官曰匡人也此既達之矣行人十有一嵗則修法則焉修其所達者使浸多歷年而法則不廢墜也劉執中曰如是則諸侯之犯政陵令者暴內陵外者不陷於九伐矣撢他南反人中士四人史四人徒八人劉執中曰撢與探同言探王之志及道國之政事以語於諸侯及四方之人李氏曰天下之情欲上達故訓方氏之職設人主之志欲下通故撢人之職設古者君民一體上下交孚而無壅遏之患如此掌誦王志道國之政事以巡天下之邦國而語之鄭康成曰道猶言也鄭鍔曰王者處九重之中志雖在民民何自知哉國之政事行於王國天下邦國在王畿之外逺而不聞撢人巡行天下誦之道之以告語乎其民言王志如此王之政事如此使民間聞吾君之志與其政事之善使萬民和説音恱而正王靣鄭鍔曰民皆心恱誠服延領舉首嚮仰乎王不敢背違謂之正王面面者嚮也王之所在皆仰而嚮之也蓋民未嘗無嚮君之心其所以有背違者以其萬里之逺不及知耳撢人能言其所以然彼安得而不和恱乎愚案撢人誦王志道政事則王之作於心而見於治者明白洞達安得不使民和恱而內嚮桓公圖伯恐諸侯不從令管仲以遊士八千遊揚説談齊氏之美布於諸侯豈撢人誦道之意都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人鄭康成曰都王子弟所封及三公采地司馬主其軍賦賈氏曰此王自以臣為司馬遙掌都內薛平仲曰都家之説嘗於宗伯之序官論之矣然禮之或僭其事猶有漸而至政之或弛其勢一決而隳況都家之環于王畿責之以固吾圉也制之以地域分之以人民豫之以貨賄其體固甚尊矣使王朝不制其兵柄於上或者繕甲治兵如太叔將誰馭之哉故先王設官以為都司馬者必每都以上士二人居之倍之以中士又倍之以下士夫以王制考之天子之縣內凡九十三國即周官所謂都家之地也司馬之設其官守若是之衆先王之慮蓋可知矣彼家之司馬雖亦王朝之所特置必使其臣以正於公司馬其權亦莫不有歸也夫莫大於四方之邦國而都家之為小莫逺於四方之邦國而都家之為近王政自近以及逺由小以制大規摹蓋自是始矣此都家司馬所以為政典之終家司馬各使其臣以正於公司馬鄭康成曰家卿大夫采地正猶聽也公司馬國司馬也李嘉會曰此曰公司馬而都司馬職曰國司馬蓋不必司馬之司馬上之所差以將兵者皆司馬也卿大夫之采地王不特置司馬各自使其家臣為司馬主其地之軍賦往聽政於王之司馬王之司馬其以王命來有事則曰國司馬下文注曰大夫家臣為司馬者春秋傳曰叔孫氏之司馬鬷戾曰我家臣也不敢知國昭二十五年陳及之曰春秋時楚子與莫敖氏戰于皋滸鄭子張徴役攻子産與夫晉之六卿宋之華向魯之三桓其調發戒禁悉自主之而國家弗敢問安得不與上抗乎都公卿之采地也其權勢重故王朝為之置司馬則大夫元士也俾自置焉以聽命于上賈氏曰都宗人家宗人都士家士皆使王臣為之者都家宗人有祖宗之廟王所常祭都家之士獄訟刑罪王政之重非王臣不決也都司馬掌都之士庶子及其衆庶車馬兵甲之戒令鄭鍔曰都之公卿大夫子弟之適子皆曰士其支子皆曰庶王昭禹曰衆庶凡在都之人民皆是也鄭鍔曰其民所出以備軍旅之具則車馬甲兵别設都司馬以掌其政教戒號令焉賈氏曰若王家有軍事徴兵于采地都鄙則都司馬以書致於士庶子有此衆庶車馬兵甲之戒令士庶子受而行之以國法掌其政學王昭禹曰國法則師氏保氏大司樂所以教國子之法項氏曰依諸于教國子之法鄭鍔曰所以會其車甲卒伍財賦者皆政也所以教其士庶子修德學道者皆學也易氏曰政即都家車馬兵甲之戒令也學則學其戒令而肄習于都家之學者也政以任國子之已命者經所謂士是已學以待國于之未命者經所謂庶于是已然國子所以守禦而戒令同乎衆庶則立法公矣教以都家之政學而掌之以國法則兵政一矣王昭禹曰政學則以其學而後從政也愚案古者國之子弟無時不知教無處不有學退在學校受教於司樂大胥諸子進在王所受教於師保氏入而宿衛有宫伯案其在版者而教之出而守禦有都司馬掌其政學以教之出入進退教未嘗不行乎其間非若後世之教止於庠序而庠序之教又為具文以聽國司馬鄭康成曰聽者受行其所徴為也國司馬大司馬之屬皆是賈氏曰國司馬不云大則小司馬軍司馬與司馬皆得稟其戒令劉執中曰采地之卿大夫仕於王朝士庶子則以國教胄子之法教之於其都之學及有軍旅之事徴兵於都鄙則以士庶子作其衆庶車馬兵甲而都司馬掌其戒令以聽於國之司馬奉其節制以為進退攻討焉家司馬亦如之鄭鍔曰大夫有家家之地亦有兵賦又命家自設司馬以掌之而家司馬亦如都司馬之𨽻於大司馬也其與大司馬同者以兵賦所掌焉故耳李嘉會曰國有司馬都有司馬家有司馬自國及家兵甲戒令欲其如一不獨一之於政令亦必一之於學術此所以無異政無殊俗也總論司馬官屬陳及之曰司馬一官與軍政者半不與者半自大司馬至行司馬自諸子至旅賁氏自司甲至稿人自校人至圉師其他則環人戎右戎僕都家司馬皆與戎事者也自掌固至掌疆則司疆界者也自服不氏至掌畜則掌鳥獸者也自太僕至僕𨽻則左右侍御僕從者也自職方氏至撢人掌輿地及四方諸侯外夷者也小子掌祭祀則係焉司爟掌行火則係焉候人掌賔客則係焉挈壺氏掌司夜則係焉司士掌朝儀則係焉辨師掌冠辨則係焉與夫齊右之屬射人之屬則又係焉夫既曰典軍政而官府錯居先王設官分職不必類聚彼此聯事互相關係不特是也司馬雖為掌兵之官至於軍旅大事五官之掌咸有職事冢宰徴師于諸侯大司徒以旗致萬民而治其政令大宗伯以軍禮同邦國大司寇涖戮于社自今觀之凡徴師凡致民凡軍禮凡涖戮皆軍之大政也宜皆司馬之事而分之四官掌焉此先王深思逺慮之至胡康侯曰昔成王將崩命大臣相康王方是時掌親兵者太公望之子伋也宰臣奭命仲桓南宫毛取二干戈虎賁百人于伋以逆嗣子伋雖掌兵非有宰臣之命不敢廢也召公雖制命非二諸侯將命而往伋亦不承也兵權散主不偏屬於一人可知矣此周官之制見諸行事者也又曰周制兵出於農自八家共井至五百十二家之甸出車一乘馬四匹卒七十二人宜以稍人縣師等官領之而屬司馬今屬於教官其嵗時校登其夫家簡其兵器治其車輦宜以鄉遂官領之而屬司馬今亦領之教官三代之時兵滿天下而無將驕卒惰之變兵藏於民弗謂之兵將藏於學士大夫弗謂之將以搜苗獮狩而易其習戰之名以比閭族黨而易其行陳之名國容之制軍容不亂焉養勇以禮積威以義是以不見其強而無敵於天下者如此薛平仲曰右夏官之屬凡六十有九始之以司馬終之以司馬固足以見兵政之密矣然考之周官之例凡建其正立其二設其考自大司馬至軍司馬而已若上士中士初未嘗命官也今惟大司馬之上士命曰輿司馬中士命曰行司馬二者不見於經先儒槩以文簡殘缺而委之夫以例而求則小司馬軍司馬不見於經謂之殘缺可也輿司馬行司馬不見於經謂之殘缺可乎意者周官行師之時凡領於大司馬之屬者必各有職以涖其事是以在官府則曰上士曰中士在軍旅則曰輿司馬曰行司馬亦因事而制名非有掌守而不可缺者不然制軍之法二十五人之為兩而兩司馬者亦未嘗列之官屬也謂之闕可乎若夫虞衡之官司徒蓋領之以掌山林川澤矣而山川邍野之有師司馬又從而領之周官類若重復然彼以之掌于王國此以之掌于四方是又政典所以平邦國之大權在是也由前之説所以論周官兵政之嚴由後之説所以論周官兵政之大將從識者參之卿大夫士之數六百九十有一人卿一人中大夫十有二人下大夫十有四人上士六十有九人都之上士不計中士百五十有四人都之中士不計下士四百四十有一人都之下士不計趣馬言下士皂一人以校人之職考之三乘為皂皂一趣馬積三皂以為繫積六繫以為廄積六廄以成校分校以為左右則為下士者當有二百一十六人總諸官而計之則四百四十有一人也右夏官卿大夫士之數若以制軍之法計之其數為甚衆不止於是然司馬特以敘制軍之法而已非夏官帥屬之常職也惟士之見於夏官間有異於五官之例蓋周之命士或一人或二人或倍之而為四人又倍之而為八積而至於十有二人十有六人三十有二人而止未聞有以五人居之者而土方氏則以五人焉未聞有以十人而輔之者土方氏則以十人焉豈非土方氏之為職以土圭土其地而建邦國都鄙者也以土圭而求土地之中而土之數則五故土方氏特以五人而居之彼將究心於推測之際矣不然周官之掌司土地者曰土均曰土訓固嘗以土而命名矣為士之數不見於彼而見於此信乎其有取於求地之中也府史胥徒工賈醫之數四千一百五十二人府七十有四人都之府不計史百八十有五人都之史不計胥二百四十有五人都之胥不計徒三千六百三十有四人都之徒不計趣馬之徒以左右校計之當得八百六十有四人總諸官得上數工四人賈八人醫二人右夏官之府史與胥其數特少其間有史而無府有徒而無胥有無府史與胥徒者凡二十餘官若大僕祭僕戎右齊右道右大馭戎僕齊僕道僕田僕馭夫之官又府史胥徒之俱無者也嘗疑先王之政典其大綱小紀之具舉凡書契之所藏文移之所贊而敘次之所治者將有多於他官可也顧若是之簡寡何哉又觀先王制軍之法一軍之間則二府六史胥十徒百而已夫莫密於軍政而文書調度其不為繁重者若此此固人情之所便安而軍政之所易行也特其官令之徴召不容於不備者故其徒視府史與胥則加焉然先王之於政典之意大略可考彼虎賁氏之虎士八百人若非所以為徒也先儒謂徒之選有勇力者充之愚故併而計之於徒之數焉亦不可以掌官令者例論矣不命之官凡四方相氏狂夫四人圉師乘一人圉人良馬匹一人駑馬麗一人家司馬各使其臣以正於公司馬周禮訂義卷五十七
