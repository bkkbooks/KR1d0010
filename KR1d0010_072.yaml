body:
  text: 周禮訂義卷七十二宋王與之撰輿人為車鄭鍔曰輿人掌為輿者也謂之為車者蓋察車之道雖自輪始而作車實自輿始輿居中以載人有輿則一車之體成故輿人作輿而謂為作車陳用之曰車者緫軫蓋輿輪衆體而成名然車以載為事正所為載者在於輿故輿正名為車而經言輿人為車也輪崇車廣衡長參如一謂之參稱尺證反鄭康成曰車輿也衡之長容兩服王昭禹曰處車中而舁人者輿也夾車旁以踐地者輪也横車前以扼馬者衡也薛氏曰造車始於輿而車制始於輿廣故詩人以權輿為始輿人之法皆以車廣起度隧式較軫軹轛其數小大廣狹崇庳皆始於輿廣此輿人所以指輿為車而兼數材也賈氏曰參如一者謂俱六尺六寸毛氏曰車體凡三衡在前以引輿猶手也輪在下以承輿猶足也輿在下而居中猶體也車以衡輪為用以輿為體所主在體故輿謂之車爾衡之長不六尺六寸不足以容兩服車之廣不六尺六寸不足以容馭右輪之崇不六尺六寸不足以為登下之節三者異任而尺數如一者非相期也各適其宜而已鄭鍔曰此指兵車乗車以為言也輪則計其崇輿則計其廣衡則計其長各因其所主言之是三者要如一乃謂之稱陳用之曰稱非謂其度之等言其用相稱也參分車廣去一以為隧鄭鍔曰車之輿居中以載人者也其深則名曰隧如墓隧之隧經於墓大夫言及竁以度為丘隧注謂隧羨道也左傳晉文公請隧以塟蓋為道以入墓也輿之有隧其深如之故曰隧鄭康成曰讀如邃字之邃輿廣六尺六寸謂其横也參分其廣而取二分以為隧謂其縱也車容驂乗之人或三人或四人故其廣六尺六寸隧則輿之深耳故但取三分之二以為之則隧四尺四寸參分其隧一在前二在後以揉其式薛氏曰植於車輿兩旁為輢横於兩輢在車前為人所慿者為式賈氏曰式謂人所馮依而式敬故名此木為式鄭鍔曰以隧之四尺四寸而三分之其一分當一尺四寸三分寸之二矣一分在前二分在後於其中而揉式焉則式凡深一尺四寸三分寸之二李嘉㑹曰揉者取其平貼也以其廣之半為之式崇鄭鍔曰輿廣六尺六寸取其廣之半為式之高則式凡高三尺三寸陳用之曰人長八尺首居一焉則所以為軀者七尺矣以七尺之軀而慿三尺有三寸之式所以為致恭而有禮也以其隧之半為之較音角崇鄭康成曰較兩輢上出式者兵車自較而下凡五尺五寸賈氏曰較謂車輿兩相今人謂之平鬲言兩輢謂車相兩傍豎立者二者既别而云較兩輢出式者以較之兩頭皆置於輢上二木相附故據兩較出式言之式已崇三尺三寸更増此隧之半二尺二寸故為五尺五寸李嘉㑹曰較在式上如屏風隔風輢即紗隔下面之版薛氏曰車制輿在下輢在兩相式在前軫在後較則輢上出式者也軹則横植於輢者也轛則横植於式者也式必曲為之所謂揉其式是也較有重之者所謂猗重較兮是也鄭鍔曰淇奥之詩曰猗重較兮詩疏曰侯伯之車注云卿士之車左傳載王黑以靈姑銔率請斷三尺而用之事杜預曰斷三尺使至於較大夫旗至較而禮疏謂諸侯旗齊軫大夫齊較軫至較五尺五寸斷三尺得至較者蓋天子與其臣乗重較諸侯之車不重較故有三尺之較也六分其廣以一為之軫圍鄭康成曰軫輿後横木李嘉㑹曰關三面材又出於三面材之外使無此横於輿後則車不固賈氏曰輿廣六尺六寸六分取一故得尺一寸毛氏曰輈人所謂任正者即軫也而此亦及之者軫在輈之上輿之下故兩官皆據此以為長短之法然軫圍本方而崇三寸半圍四徑一則其圍尺四寸輈人所謂三分其輈之長以其一為之圍者輈長丈四尺五寸十取其一得尺四寸數固相合矣今此六分其輿之廣以其一為之圍者輿六尺六寸六取其一得尺一寸則數不相合何哉蓋田車之軫減乗車半寸其圍共減二寸矣以田車之軫言之庶幾其可也軫為任正故比較為大自式而下皆以次減焉軫在下式在中較在上大其本者小其末物理然也參分軫圍去一以為式圍鄭鍔曰軫圍一尺一寸三分之而去其一以為式圍則式圍七寸三分寸之一參分式圍去一以為較圍鄭鍔曰以式之七寸三分寸之一而三分之取其二以為較圍則較圍四寸九分寸之八參分較圍去一以為軹圍鄭康成曰軹輢之植者衡者與轂末同名賈氏曰上文注云軹是轂末此軹是車較下豎直者及較下横者直衡者並縱横相貫鄭鍔曰較圍四寸九分寸之八而三分之取其二分以為軹圍三寸二十七分寸之七與轂之軹五分轂長而去三者異矣毛氏曰軹在較之下縱横相貫轛在式之下縱横亦相貫二者又減亦其理也然式圍大於較圍而轛在式下反小於軹何也式短而較長故較長則較之用力宜雄故不得不大也輢植乎輿之四隅較式附焉而不言其圍者舉較則輢可知參分軹圍去一以為轛音對圍鄭氏鍔曰轛之狀與軹相對所以異者軹在較下轛在式下謂之轛者取其與人相對故也趙氏曰以疏推之則轛正在式木之下植立是如今轎乗壓手版傍兩角柱子以人登車立式正與人相對故取名以轛若司農以植與衡者為轛是并軹而言矣蓋轛無横者横則不可謂之轛軹圍三寸二十七分寸之七三分之而取其二以為轛圍則轛圍二寸八十一分寸之十四凡此皆乗車兵車之制鄭氏俱以為兵車者以乗車與兵車同舉其一則可以類推亦以前文首言兵車之輪故也趙氏曰已上度數増損雖有不同皆以車廣為準而降殺焉自式至轛其言之序則取數之多寡為之先後輿人專為輿雖不當兼做式較軫軹轛之器然皆輿之所資以為用無此則獨有一輿果何用故輿人所以緫為之至於輿廣若不與衡輪同則用不相稱故輪與衡之制輿人亦不可不知圜者中丁仲反規方者中矩立者中縣音𤣥衡者中水直者如生焉繼者如附焉趙氏曰此段論治材居材之法規所以為圓矩所以為方準則為平之所取繩則為直之所取輪人作車之法其用材皆盡善故為材之圜者必以規而材之圜者自中於規為材之方者必以矩而材之方者自中於矩材之直豎立者則挺立不邪而自中於繩縣之垂衡謂横也材之横放不豎者則無高低而自中於水之平劉執中曰縣水謂準繩準繩變言懸與水者蓋物之直者無過於懸物之平者無過於水觀輪人為輪言規之矩之縣之水之亦不言準繩則以縣與水平直之尤善者故以此代言準繩焉中謂合也此四件是合乎法度之善者若夫材之直者如木之生於地直達而不屈材之繼者如木枝之附於榦相着而不可離此卻是人力之巧妙有若自然生成之物與上四件不同鄭鍔曰木之始生者必直其曲者非其性也必有所折屈故曲也立木之直者欲其如自地而出直而無所屈木之旁枝附榦而生其附也文理相依無斷裂相離之狀以木而相繼接者欲其如附榦而生無離絶之處則其直其繼皆如自然矣凡此皆言作車輿之法治木居木當致其精如此趙氏曰既曰立者中懸則直者已在其中何故復曰直者如生蓋繩之用凡為直皆取之不必懸也言立是主懸者言之立者中懸指立者之直而已其他直者不與也若夫直者如生則凡正曲之直皆屬焉不止立者而已此段非說車之全形言輿上用材如此蓋輿上如轛式軹較等器甚多其材有圜者有方者有横者有直者有附者中之與如各指一件說否則車形不四方平直如何中得又如何如得凡居材大與小無并大倚小則摧引之則絶鄭鍔曰居處也處身者必欲得其所然後身安車之制木處之亦欲得其所故謂之居木有大小各宜以類相從則強弱相敵剛柔得宜無有餘不足之患陳用之曰并以合并之謂并歸乎大者也凡物之體以小入大大者受而入之是之謂大與小宜使之勢適可者賈氏曰倚則并也凡居材當各自用力若使大材倚并小材小材弱不堪大材所倚則摧折矣此引之則絶據小并大而言也若小并於大大木振其小木力不堪則絶斷也棧車欲弇飾車欲侈鄭鍔曰巾車言服車五乗孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車棧車謂不革鞔而漆之之車也飾車謂鞔之以革而畫之之車也所謂夏篆夏縵墨車是也有革以鞔輿則固為難壊輿不鞔以革則不堅而易拆不堅而易拆者則宜弇弇者欲其輿之斂而向内也固而難壊者則宜侈侈者欲其輿之大而向外也夫以文飾之車猶且以侈為貴則上而天子所乗之路有金有玉有象以為飾者其輿之侈又可知趙氏曰弇注謂當向内為之侈注謂當向外為之據此則弇恐只是輢轛之類都移入來侈恐只是移輢軹轛之類放出去些少必不是說大與小蓋輿縱横廣深六尺六寸其制已定如何斂向内放小得又如何縱向外放大得尤宜思之易氏曰車以弇侈為善而鐘以弇侈為病蓋鐘貴乎廣狹之中而車貴乎小大之宜各適其當而已輈人為輈鄭康成曰輈車轅也詩曰五楘梁輈趙氏曰梁謂衡也輈持衡者也輈從軌前微曲而上至衡則下而句之輈縱而衡横縱者若輈横者若梁所以云梁輈也鄭鍔曰攷工所記攻木之工七輪輿弓廬匠車梓而輈人不與焉此有輈人之官者蓋作車自輿始察車自輪始故輿輪之職特建焉而並列於七工若夫蓋雖難制以其貟似乎輪也特使輪人為之而不以名官輈雖難度以其非作車察車之所始也故别立一職不以並輪輿之列輈車轅也自其可以左右挾而進則謂之轅自其載任以覆為戒則謂之輈輈猶舟焉所戒者覆也輈有三度軸有三理鄭康成曰目下車度淺深之數鄭鍔曰輈欲中法其度有三三度者國馬田馬駑馬之輈深淺不同之數薛氏曰兩轂中横截之木為軸項氏曰軸則一定但欲其理之得趙氏曰理謂物之道理李嘉㑹曰理者一木之用欲其委曲若是不可不順其理也易氏曰軸以貫轂特輪之一器於輈人何與而言於三度之後者軸待輈而後運輈待軸而後行其勢實相資焉國馬之輈深四尺有七寸薛氏曰輈之形自從軏前稍曲而上至衡下其頸以持衡其曲如屋之梁焉深謂轅曲中鄭康成曰國馬謂種馬戎馬齊馬道馬高八尺兵車乗車軹崇三尺有三寸加軫與轐七寸又并此輈深則衡高八尺七寸除馬之高則餘七寸為衡頸之間田馬之輈深四尺鄭康成曰田車軹崇三尺一寸半并此輈深為七尺一寸半今田馬七尺衡頸之間亦七寸加軫與轐五寸半則衡高七尺七寸駑馬之輈深三尺有三寸鄭康成曰輪軹與軫轐大小之減率寸半則駑馬之車軹崇三尺加軫與轐四寸又并此輈深則衡高六尺七寸今駑馬六尺除馬之高則衡頸之間亦七寸鄭鍔曰輈之所貴撓而無曲故為車則必揉之以火使其勢深深則曲然太深則折故欲其無弧深焉然計車之崇與輈人之深三車之衡各高七寸何也蓋衡以扼馬頭用力久則消磨益甚惟其高有七寸之餘不為馬頸所損故疏云餘七寸當為馬頸低消之也車雖有高下至於衡頸不得不同兹其法度所在也故下文云小於度謂之無任毛氏曰輈首為頸而衡居頸下又馬稍低劣不餘七寸則輈不可與馬相得軸有三理一者以為媺也二者以為久也三者以為利也趙氏曰媺言軸之材欲其美而無惡注云無節目是也久欲軸之體堅而可久注云堅刃是也利欲軸之勢滑以利而易運注云滑密是也陳用之曰媺言其形之媺久言其質之堅利言其用之利輈人為輈而言及於軸則輈與軸同一工可知且形之媺質之堅用之利唯輈亦然是以合而言之易氏曰以經意攷之弧而無折經而無絶輈之美如此實軸之所以為媺也終日馳騁左不楗終歳御衣衽不敝輈之久如此實軸之所以為久也勸登馬力馬力既竭輈猶能一進取道輈之利如此實軸之所以為利也李嘉㑹曰媺久利不止乎是舉其一端則意可推以是知輈人之職實兼輈與軸之制故下文又曰五分其軫間以其一為之軸圍則軸之制附於輈人也明矣軓音犯前十尺而䇿半之趙氏曰軓注謂式前據下文軓中有灂則輿上置隧處乃是軓正在隧之下式之前蓋輈身長一丈四尺四寸入輿隧下隧以前只有十尺以此見軓即隧之下面隧外空着一分輿軓即是閣住隧板之横木耳謂之軓者取其在下持住車有為則為法之意注謂軓法也謂輿下三面之材輢式之所植持車正者即此意也李嘉㑹曰何以謂之持車正蓋軓法者一車所取法路有高低車易偏側有此木則可以常正夫車䇿御者所執以制馬而使齊者也然䇿之處進退亦有其度太向前則湊馬後反礙馬行太向後則鞭策不能及馬又不肯行軓前十尺而䇿半之則離隧五尺處是也執策者立於此處以御馬則以及馬而無過不及矣所謂軓前十尺䇿半之者是就隧算去不是就輿算去蓋軓前尚有輿板二尺二寸若就輿算去則無十尺矣不知十尺者是就直算去抑隨輈曲處算去經無明文不可考也禮書云輈之減也率七寸馬之殺也率一尺軫輿軹轐之殺也率寸半三等之馬各下其輈七寸則七寸為衡頸之間此說於分寸不差十尺恐只是直算去曲算則短陳用之曰非特策之有節而已所以策者其度亦有節也半軓前之長以制其策所謂有節夫惟有節是以不及馬腹凡任木鄭康成曰目車持任之才王昭禹曰因其材之所勝而用之謂之任如任官焉各稱其材之所長如任民焉各稱其力之所能不以大材而當任之輕不以小材而負任之重各適其宜而已任正者十分其輈之長以其一為之圍鄭康成曰任正者謂輿下三面材持車正者賈氏曰名任正者此木任力車輿所取正以其兩輢之所樹於此木較式依於兩輢故曰任正云三面材者此木下及兩旁見面其上面託著輿板其面不見也鄭鍔曰上言輈之深耳若夫輈之長當計軓前輿下緫為輈之數軓前十尺與隧四尺四寸凡一丈四尺四寸矣十分其長取一以為圍則任正之木其圍一尺四寸五分寸之二衡任者五分其長以其一為之圍陳用之曰謂之衡任其為任也横而用之非車之所以為行鄭鍔曰衡任謂兩軛之間此木當輈頸之處其用力為尤多故五分其長以其一為之圍然衡任之木其圍蓋有取於輈之五分之一經於上言任正者十分其輈之長下文即云衡任者五分其長專指輈以為度也緣康成謂兵車乗車衡圍一尺三寸五分寸之一故疏因言衡長六尺六寸則衡圍一尺三寸五分寸之一竊恐不然小於度謂之無任王昭禹曰任正衡任其度如此材苟小焉則力不足以勝其任故謂之無任五分其軫間以其一為之軸圍鄭鍔曰前言六分隧之廣以為軫圍言其圍爾此言五分其軫間非計其圍也軫以承輿之六尺六寸則軫間亦六尺六寸也五分取一以為軸圍一尺三寸五分寸之一與衡任相應楊謹仲曰輪人五分轂之長去二以為賢之圍故賢之穿空適與此軸之文相當以此文合上文輪人而論之乃知鄭氏改去一為去二所以為當也轂長三尺二寸而五分之每分六寸四分去二留三為尺九寸二分以為賢之圍則賢之徑乃六寸四分每邊除一寸金則賢之空其徑四寸四分也軫間六尺六寸而五分之每分一尺三寸二分以一分為軸圍軸圍一尺三寸二分則軸之大其徑亦四寸四分也此軸之大可以入轂之大頭其末入軹處漸以小也李嘉㑹曰車之用力不在乎軸只在中央之轉動十分其輈之長以其一為之當兔之圍鄭鍔曰當兔謂輿下當横軸之處前文所謂加軫與轐轐即伏兔也輈長一丈四尺四寸賈氏曰亦通計輈之軓前與隧緫計丈四尺四寸十分取一為當兔之圍則兔圍一尺四寸五分寸之二與任正者相應李嘉㑹曰伏兔在車下與任正在輈上者相稱使輪或偏而車不偏二者相稱故也名曰伏兔亦生物之動者取其轉動之義參分其兔圍去一以為頸圍趙氏曰頸圍注謂輈頸前持衡者疏云衡在輈頸之下其頸於前向下持制衡鬲之轅故云前持衡轅也觀此則輈是軋住衡不穿破輈前言衡頸占了七寸可據也鄭謂之頸則取況人之頸非特形如之亦以其用在上而當前焉頸圍所以小似兔圍者蓋頸圍處正閣着衡此處若大則衡頸不止七寸高馬駕時衡下至地無八尺六尺則馬行費力也觀疏中向下二字又知輈過頸處又低下去三分兔圍而取一為頸圍則頸圍九寸有竒禮書亦云輈從軓前微曲而上至衡則下而句之踵圍注謂輈後承軫者五分頸圍去一以為踵圍則踵圍七寸七十五分寸之五十一五分其頸圍去一以為踵圍鄭康成曰踵後承軫者陳用之曰謂之踵取況於人之踵非以其形如之盖以其用在後且有所著而所任者重焉圍七寸七十五分寸之五十一趙氏曰前為頸後為踵頸以推衡踵以承軫近踵處為當兔當兔之圍大於持衡持衡之圍大於承軫故當兔頸踵之圍各不同者蓋大其兔以稱任正小其頸以便馬不大不小以當軫然後固也凡揉輈欲其孫音遜而無弧深賈氏曰揉者以火揉使曲也揉之欲使順理無得如弓之深弓之深大曲也王昭禹曰凡輈之深或四尺或三尺有三寸或四尺有七寸必以火揉之使其勢屈曲然後可以為深雖欲其曲而深然過於曲則易折非經久之道也故凡揉輈欲其孫而無弧深孫言曲折而順理也苟逆理而不孫非特難揉亦易傷折今夫大車之轅摯其登又難既克其登其覆車也必易此無故唯轅直且無橈也毛氏曰凡記所引皆駕馬之車而此獨言大車者駕牛之車也駕馬之車以載人駕牛之車以載物載人之車輕轅直未必覆載物之車重轅直則必覆故舉大車以明之鄭鍔曰牛車之轅必欲橈則駟馬之轅欲橈可知鄭康成曰摯輖也登上阪也克能也王昭禹曰摯言其至謂其勢直而下至也蓋輈雖不可過於弧深然亦不可失之於直直則其勢下至非特登上阪地為難其傾覆且易矣此其故非他以其揉之不曲而深故曰唯轅直且無橈也鄭鍔曰此言大車轅摯則然是故大車平地既節軒摯之任及其登阤不伏其轅必縊一臂反又于計反其牛此無故唯轅直且無橈也鄭康成曰阤阪也趙氏曰伏逼也王昭禹曰軒言其高而上干摯言其輊而下至既節軒摯之任則高下適中而無上干下至之患六月之詩曰戎車既安如輊如軒以其適軒輊之中此戎車之所以安也夫大車於平地雖節其軒摯之任若其登阪阤之地牛不退而偪伏其轅則轅必重而縊繫其牛頸此亦其轅直且無橈之故鄭鍔曰此言車之登阤之時則然故登阤者倍任者也猶能以登及其下阤也不援其邸必緧音秋其牛後此無故唯轅直且無橈也鄭鍔曰登阤者上高峻之處鄭康成曰倍任用力倍也趙氏曰邸却無可考意者邸是伏兔後踵承軫處如四圭有邸與設皇邸之邸同蓋邸是抵亢藏靠之物踵後承軫處亦是附着藏靠處故也緧就也王昭禹曰凡登阤者自下而上其用力為多故謂之倍任夫登阤雖倍任然力之強者猶能以登及其下阤不援摩其車之邸則車或進而緧就其牛之後此亦以轅直而無橈故也李嘉㑹曰輈上山高轅不及馬背則車重而必縊其牛如繩縊之及其下阤奔來太連緧牛之後摩車之邸則馬亦不可行由此觀之則轅雖不可以過曲亦不可以不曲此輈之三度所以其深皆有常數也鄭鍔曰必三言轅直無撓者一言轅之勢一言登阤一言下阤轅不曲皆為害也惟其如是故揉轅必欲深而又欲無弧深所以有四尺七寸三尺三寸與夫四尺之度李嘉㑹曰大車駕牛之車初無與乎駕馬之輈因其揉輈而證以大車之法記考工者先說平地次說上阤下阤之法蓋平地只有軒摯軒則前高摯則後重至於上山下山之際又有高低之異欲其勢順而無艱難掣肘之患必為之不甚伸亦不甚曲故三者皆以轅直無橈結之是故輈欲頎音懇典音殄鄭鍔曰上文言牛車之轅於此又言駟車之轅鄭康成曰頎典堅刃貌陳用之曰頎典謂其體之豐大蓋輈惡其折故欲頎典則壯矣詩言五楘梁輈義可知矣鄭鍔曰頎長也典實也其勢欲頎然而長其材欲典實而不虚王昭禹曰頎如碩人其頎之頎言其長也典如六典之典言其有常也欲頎典言欲其長而有常也蓋輈之長丈有四尺四寸過乎此則其長為有餘而贅不及乎此則其長為不足而虧非法度之常輈深則折淺則負鄭鍔曰揉之深則太曲太曲則傷其力力傷則易折揉之淺則微曲微曲則其勢直於馬背之上故馬常若負然非所以為善毛氏曰負言馬背縊言牛領緧言牛後牛車或行於險阻故以登下為言而曰縊曰緧馬車或行於平地故以平地為言而曰負也輈注則利準音水又如字利準則久和則安鄭鍔曰康成云形如注星賈氏曰謂輈之形勢似天上注星車之利也鄭司農曰注則利水謂轅脊上雨注令水去利謂自上而下其勢急也惟其勢如注則車必利而無凝滯之患車必準而無傾側之虞利而速準而平則其敝壊也亦難此車所以能久不失之淺可否相濟適於調和則乗之者亦無摇動之患如之何而不安李嘉㑹曰如水之注則利於行平一如準則可長久馬引之而和人乗之而安愚案記論輈之平凖在輈注論輈之能久在平準如中庸誠則形形則著文勢當如此奚必以重言為拘必欲曲為之說輈欲弧而無折經而無絶陳用之曰上云欲無弧深此云欲弧而無折蓋深則折欲如弧弓之形而無太深以折即所謂無弧深也楊謹仲曰鄭氏言揉輈太深則折夫上言輈深則折是輈太深故馬倚之則折也淺則馬負之而已今言弧而無折豈彼之所謂折哉此折乃磬折之折言弧則宛而曲無復有如磬之折者故曰弧而無折鄭鍔曰欲其經而無絶者孫即經耳順其文理謂之孫順理而直謂之經揉輈者惟恐不能順其理耳不順理則斷絶而不相屬矣故欲其經而無斷絶之病鄭鍔曰輈為一車安危所係故既言之又再言之欲其孫欲其頎典欲其弧而無折經而無絶一篇之中屢致意焉見為輈之難也進則與馬謀退則與人謀王昭禹曰馬所以駕車車之進則以馬行為主故進則與馬謀人所以馭馬車之退則以人馭為主故退則與人謀謀者指事而圖之也進與馬謀則得之於此而應之於彼退與人謀則得之於手而應之於心夫種馬駕玉路戎馬駕革路齊馬駕金路道馬駕象路田馬駕木路凡車之任重致逺者皆馬之力也故進則欲其與馬謀太僕馭玉路齊僕馭金路道僕馭象路田僕馭田路凡車之疾速進退惟人之馭也故退則欲其與人謀叔于田詩言兩驂如舞兩驂如手以言馬之節適也言兩服齊首以言馬之整序也如是則輈之和而進與馬謀可知矣叔于田詩言執轡如組以言馭之巧也駟驖詩曰六轡在手以言其馭之良也如是則輈之和而退與人謀可知矣易氏曰進若與馬相謀退若與人相謀是以無情之物而與人及馬之有情者不期自合非和之至者不能也終日馳騁左不楗音蹇又倦鄭康成曰書楗或作券券今倦字趙氏曰古者乗車之法尊者在左御者在中曲禮曰乗君之乗車不敢曠左左必式注云君存惡空其位是尊者在左之證惟輈之和則終日馳騁載在左者無罷倦之患行數千里馬不契音挈需音須鄭司農曰契讀為爰契我龜之契需讀為畏需之需謂不傷蹄不需道里鄭鍔曰車有兩驂兩服詩言兩服齊首言其不前後也兩驂如舞言其不拘閡也轅若不和則馬必拘閡而相契契倚而相合之義轅若不和則馬必前後而相需需遲而相待之義陳藴之曰契讀如死生契闊之契需如易需卦之需謂不勞苦而停滯也終歳御衣衽不敝此唯輈之和也鄭鍔曰衣之下裳謂之衽禮記云扱衽深衣續衽皆謂裳之下也御車者常苦於裳之易敝以其近下而摩於車也惟輈之和則無動摇之勞雖終歳御而衽亦不敝毛氏曰終日馳騁一日之事也行數千里一月之事也終歳御一歳之事也一日之間馬未必病所憂尊者在左之杌動爾一月之間馬行久矣所憂者契需而不前馬至於一月之間則馬病固其理也而御之衣衽亦有敝焉衣以歳制故也一日之間左可楗而不楗一月之間馬可病而不病一歳之間衣可敝而不敝豈非輈之和而然歟上曰和則安所謂安者非特君子安乗而已馬與御者皆安焉是之謂安王昭禹曰自此數者非輈之和孰能致是然則為輈者既有淺深之數與其高下之度而又五楘以致文飾環灂以受霜露故以之鳴和鸞而不失相應之節以之逐水曲而不失周旋之儀舞交衢則馭者以之良過軍表則射者以之善此亦唯輈之和也勸登馬力鄭康成曰登上也輈和勸馬用力易氏曰馬力未進輈已有勸其登非果能勸也其勢若有以使之王昭禹曰輈和則馬之行也易為力莫不勇於進而無疲倦之患馬力既竭輈猶能一取焉易氏曰馬行既止則無所用其力輈猶一進而取道焉非有意於一取也其勢自不容已趙氏曰輈非有情之物豈能勸得馬用力而考工言之者蓋形容輈之和行地之逺其勢有如此者良輈環灂音醮自伏兔不至軓七寸軓中有灂謂之國輈趙氏曰良善也灂漆也蓋輈之上為之纏固其楘有五詩所謂五楘梁輈是也楘謂束縛處又被之以筋膠而環飾之以漆以為受霜露惟制輈而盡其善故能周環四圍皆有漆灂也鄭鍔曰所以良善其輈者必環而灂之灂謂漆文周環皆漆之不惟致其文飾之美且以致其固是乃良善其輈之術也然輈之長一丈四尺四寸漆之所不至者惟自伏兔至軓七寸而已伏兔銜車軸在輿下短不至軓軓即輿下三面之木趙氏曰言漆之所施不到軓處有七寸也自七寸之外皆是漆處所以不用漆於七寸者或者為伏兔與軓遮礙著手漆不得故也據此則自軓以後近伏兔處皆可謂之軓其漆不至七寸乃在近伏兔處不在近軓處不如此則軓中無灂矣不可謂之有灂也自伏兔至軓凡七寸所不用漆其餘皆漆則漆入式下曲直之處皆有矣輈不善而動摇則所謂漆也消摩而不見苟能使軓中常有漆非國工之巧何以及兹乎其輈謂之國輈宜矣國輈言一國之輈皆不能及易氏曰軓中有灂特輈之一端何遽謂之良輈而且以國輈許之蓋自上經言輈之和至此甚言其為良也如經言良馬則緫言駕五路者又言國馬則乗車兵車之所專用者此良輈國輈之辨軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也愚案此以下緫論上文車器之義非止屬輈人鄭鍔曰聖人與天地合其徳與日月合其明無所往而不與之俱故或以宫室而象之或以衣裳而象之或以圭璧旌旗而象之而又作車以象之夫車以載乗不過一器耳而天地日月之象實具焉王者乗之豈徒然哉期得覆載照臨之道於俯仰之間也夫輿本方也為之軫以承之其制亦方方而在輿之下所以象地形之方也不以輿象之而取於軫者蓋軫又在輿之下故也李嘉㑹曰軫輿後一横木耳今不言輿而言軫以輿得軫其方乃成故謂之象地輪人為蓋其形必貟貟而在車之上所以象天形之貟也輪亦貟而不以為象者蓋輪雖貟而運乎下惟蓋則貟而覆乎上故也實輪以輻所以為直指也輪輻之數必以三十者蓋日月之行三十日而合宿輻之三十所以象其合宿之數蓋必有弓所以為庇也弓之數必以二十有八者蓋經星之列乎四方其數凡二十有八蓋弓之二十八所以象二十八宿也天地則象之以形以天地雖大已囿乎形也故以蓋軫象之日月星辰則象之以數以三辰雖妙不離乎數也故以輻弓象之上焉而天下焉而地王位其中則三才備矣車之制也豈苟然哉龍旂九斿以象大火也賈氏曰車上皆建旌旗故因說旌旗之義趙氏曰畫交龍在上故謂之龍旂乃是横畫不是直畫取其能升而能降斿謂屬縿垂者也蓋旗制中間畫象邊分裂成數條如尾之狀垂下此即是斿龍旂象大火者蓋龍旂畫九路垂九條大火注謂蒼龍宿之心其屬有尾尾九星疏云大火東方之星角亢氐房心尾箕是也東方木色蒼其七宿形如龍故曰蒼龍以角亢氐房心尾箕次比言之故曰心惟其尾有九星其數與龍旂同所以象之鳥旟七斿以象鶉火也趙氏曰鳥旟是畫朱雀與隼在上故謂之鳥旟鳥旟取其勇健象鶉火者蓋鳥旟畫七路垂七條注謂鶉火朱鳥宿之栁其屬有七星疏云鶉火南方之星南方火色朱其七宿井鬼栁星張翼軫是也形如鶉鳥故云朱鳥其屬有星星七星也月令云旦七星中是也惟其星有七星其數與鳥旟同所以象之熊旗六斿以象伐也趙氏曰熊旗是畫熊虎在上取其猛莫敢犯象伐者熊旗畫六路垂六條伐注謂伐屬白虎宿與參連體而六星疏云西方七宿為白虎金其色白伐與參六星為上下是連體也惟是星有六與熊旗同數所以象之鄭鍔曰六斿當為五斿字或誤也龜虵四斿以象營室也趙氏曰龜蛇是畫龜蛇在上故謂之龜蛇龜蛇取其扞難避害象營室者蓋龜蛇畫四路垂四條營室注謂𤣥武宿與東壁連體而四星疏云北方宿有龜蛇體𤣥武龜也有甲能禦捍故曰武水色黒故曰𤣥營室是北方七宿之數營室與東壁連體而四星其數與龜蛇同所以象之陳用之曰於西獨取伐於北獨取營室者豈非始事尚謀欲周成事尚義欲斷緫論鄭鍔曰此言王者之車建四方之旗象四方之經星也上文蓋弓二十有八以象星矣此又以旗象之何也蓋弓之所象者象星之數旗之所象者象星之體東方之龍旂以象蒼龍宿之形南方之鳥旟以象朱鳥宿之體此二方言象大火鶉火則舉其次十二次可推而見矣西方之熊旗以象白虎宿之形北方之龜蛇以象𤣥武宿之形此二方言伐與營室則舉其宿二十八宿亦可推而見矣其言九斿七斿六斿四斿則義不在斿康成見經有九斿七斿之數遂求二十八宿之數有相合者以為言出於附㑹且二旗象大火象鶉火舉其次以言則不專指尾與星可知矣二旗象伐與營室舉其宿以言則不專取參與東壁連體可知矣陳用之曰旟旗言其旗之名龜蛇言其旗之物大火鶉火言其辰伐與營室言其星互相備也然聖人制器尚象不止一端有正取以為象者有旁取以為象者東蒼龍而西白虎南朱雀而北𤣥武皆其象也於蒼龍取大火大火於東為正中於朱鳥取鶉火鶉火於南為正中所謂正取以為象也於白虎不取昴畢而取伐於𤣥武不取虚危而取室伐與參連體而六星室與壁連體而四星所謂旁取以為象者也各有所當而已或舉其辰或舉其星與堯典言四時之星同或正取以為象或旁取以為象與易象於坎或取水取雨於離或取火或取電之義同謂不如是不足以盡意行人言建常九斿七斿五斿而無斿數之六者以制攷之熊旗當五斿也若熊旗當五斿則康成取參連體六星以為說果可信乎然則此四旗者蓋王者之行前朱雀而後𤣥武左青龍而右白虎故建此四方之旗取象四方之宿也非以九斿七斿六斿四斿而象其星之數而已然經何以言斿之數耶蓋所建之旗而其旗之斿若此故連言之如荀卿曰龍旂九斿所以養信也夫龍旂以養信何取於九斿為養信耶故知其連言以及之義不在焉陳祥道曰旂以交龍所以寓其仁旟以鳥隼所以寓其禮而其數以九以七者為其主陽也旗以熊虎所以寓其義旐以龜蛇所以寓其智而其數以六以四者為其主隂也毛氏曰凡旗共九而特取四者以象星何也蓋全羽為旞析羽為旌未嘗有斿也通帛為旜雜帛為物雖有斿焉未嘗畫也日月為常雖有畫焉王之所乗非星之所可擬也惟四者之旗既取四旁之物以為象則因四方之星以制其斿固其理也弧旌枉矢以象弧也鄭鍔曰弧旌者弧弓也旌旗有弓所以張縿幅故謂之弧旌於張縿之弓上畫為枉矢之形故謂之枉矢用此以象天之弧星天有弧星有枉矢枉矢狀如流星蛇行有尾天有是星星有是矢矢所以射為凶慝者也王者之車所建四旗之上皆設弧旌枉矢亦以象天之弧與枉矢焉明天下之有凶慝者必射之李嘉㑹曰以妖星加於旌旗之上者因常而思其變也易氏曰皆不言旗縿之畫惟覲禮曰侯氏載龍旂弧韣釋者謂旌旗之屬皆有弧也弧以張縿之幅又設矢象弧星有矢恐未必旌旗皆有之或者諸侯之制乎今輈人以此列於四旗是襲侯氏之制以為軍制之飾於此益信四旗為戰國之制劉執中曰龍旂以下皆所以象徳也有徳必有威故繼之以弧旌枉矢以象弧也緫論王氏詳說曰輈人所謂戰國時制度諸儒區區求合於周公制度此其說所以紛紛也且旗之制見於巾車見於司常又見於大司馬又見於行人周公一代之制而其用亦各相為異同巾車所謂大常大旂大赤大麾者主五路所建為言而兼四代之制也司常所謂王建大常諸侯建旂孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌主國之大閱為言而為所建之定制也司馬言王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟此主中秋治兵為言而為一切之制也行人言建常九斿建常七斿建常五斿此主五等諸侯為言而為命數之制也司常司馬言旗而不言斿行人言旗而不及其斿巾車於大常大旂言斿而大赤大白大麾不言斿夫有旗必有斿大常十二斿大旂九斿則大赤七斿大白五斿大麾三斿從可知也九命者以九為節七命者以七為節五命者以五為節則司常司馬之所謂旗而其斿必從其命數爵尊者其數多爵卑者其數少又從可知也夫龍旂鳥旟熊旗龜蛇特九旗之四者耳曲禮所謂行前朱雀而後𤣥武左青龍而右白虎是已陸氏以龍旂為大旂固似矣以鳥旟為大赤熊旗為大白龜蛇為大麾非也曾不謂大赤為周制大白為商制大麾為夏制豈周專於鳥旟而商專於熊旗夏專於龜蛇乎以龍旂為青熊旗為白鳥旟為赤而龜蛇為黒則大常宜黄遂以為月令季夏之所謂載黄旂者為大常之旗又非也曾不謂月令為吕不韋所作之令而謂周公者吕不韋乎以王乗五路建大常則象路載鳥旟在前木輅載龜蛇在後金路載龍旂在左革路載熊旗在右又非也曾不謂五路但用之於郊天則四路並從若大閱則乗戎路而載大常矣使乗戎路而載大常則熊旗當載之於何車乎以上公之九斿為龍旂侯伯之七斿為鳥旟子男之五斿為熊旗又非也曾不謂諸侯載旂司常用之於大閱如此司馬用之於治兵亦如此則是五等諸侯同於龍旂但其斿降殺以兩耳使五等諸侯各異其旗則采菽之詩何以止曰言觀其旂豈上公之來朝而侯伯子男之不來朝乎大抵輈人之所言龍旂鳥旟熊旗龜蛇者非周制也又非前代制也其出於戰國之軍制乎國語曰左軍皆赤旟許慎曰熊旗五斿以象伐星士卒以為旗曲禮曰行前朱雀而後𤣥武左青龍而右白虎與前有車騎為連文騎馬之制始於戰國其戰國之軍制也明矣又况古人制度凡有所取象者皆足以為千萬世不易之典垂象著明莫大乎日月其次北辰也其次二十八宿也以大常畫三辰以旂畫交龍旟畫鳥隼旗畫熊虎旐畫龜蛇而天之垂象者盡在是矣同為鳥隼何止於鶉火同為熊虎何止於伐星同為龜蛇何止於營室是於七星之中又舉其偏也况伐非西方之宿但與參連體爾不惟舉其偏而又所舉者在二十八宿之外周公制度其為此乎九斿者象大火以尾九星也七斿者象鶉火以星七星也六斿者象伐伐止於三星不曰與參連體則六之數不足矣四斿者象營室也營室止於二星不曰與東壁連體則四之數不足矣東南之星取其一西北之星取其二周公制度其為此乎且如虞氏之十二章周之九章衣之制或九或十二章初不過觀古人之象而已亦非虞周所得而用其私意也况九章之外所謂三章者又昭然於大常矣考工記繪畫之事與觀象異其亦戰國之制歟子家駒謂天子僭天道其輈人之旗與繢畫之衣是也若夫含文嘉以為天子之旌十二斿曳地諸侯九斿齊軫大夫五斿齊較士三斿齊首而以五等同為九斿此商制之質耳非周制也爾雅曰素錦綢杠纁帛縿練斿九夫以素錦練斿為言者此亦商制之質耳非周制也又不可以此說為戰國之制然含文嘉以為天子之杠九仞諸侯大夫五仞而陸氏又引儀禮之文以為杠長三仞為非特士制疑自天子下達且曰仞九尺也若七仞之杠長四十九尺車不能載人不能持曾不謂左氏靈姑銔為齊侯之旗太子用之請斷三尺焉使旗杠之長短自天子至士一如其長又何以斷三尺為哉陸氏不明於旗之名又不明於旗之色又不明於旗之杠故備論之周禮訂義卷七十二
