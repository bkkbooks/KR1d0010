body:
  text: 周禮訂義卷七十三宋王與之撰攻金之工築氏執下齊去聲冶氏執上齊鳬氏為聲㮚氏為量音亮段氏為鎛器桃氏為刅賈氏曰此與下攻金之工為目鄭鍔曰木可攻也皮可攻也經亦以攻言之經曰爍金以為刃攻之之道殆以火爍之歟劉迎曰先儒以多錫為下齊少錫為上齊是則上下齊以錫為多寡也然築氏為削冶氏為殺矢皆五分其金而錫居二何以分上下齊乎所謂齊者知有齊量輕重於其間王昭禹曰築氏為削五分其金而錫居二則用錫為多故曰執下齊冶氏為戈㦸四分其金而錫居一則用錫為少故曰執上齊以削為下齊而言築氏執之則大刃鑑燧之屬皆下齊也以戈㦸為上齊而言冶氏執之則鍾鼎斤斧之屬皆上齊也舉築冶二工其他以類推之可知矣鄭康成曰聲鐘錞于之屬量豆區鬴也鎛器田器錢鎛之屬刃大刃刀劒之屬鄭鍔曰鳬氏為鐘然能鳴之類不止於鐘故以聲言之桃氏為劒然器之利者不止於劒故以刃言之金有六齊鄭康成曰目和金之品數鄭鍔曰凡物太剛則折太柔則仆金至剛之物錫至柔之物金有赤黒之色錫有青白之色金不濟之以錫其為器也剛烈而不和不和之以錫其為色也昬昧而不明故六齊之金皆用錫特其所以異者有多少而已六分其金而錫居一謂之鐘鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊王昭禹曰鐘以擊鼎以烹用錫為最少故六分其金而錫居一斧以伐斤以斫用錫宜差多故五分其金而錫居一戈㦸皆用之以刺防其或挫折用錫宜多於斧斤故四分其金而錫居一凡此皆所謂上齊也陳用之曰鐘鼎欲其傳之久故其齊居最鄭鍔曰鐘貴其聲之清鼎欲其體之固斧斤戈㦸欲其鋒之利金多則然也大刃則戚揚之屬施之斬斫則防其易虧缺故三分其金而錫居一削則以制書殺矢中之則死皆欲其堅忍不脆其用錫又宜多於大刃故五分其金而錫居二鄭鍔曰刃劒也削也殺矢也雖皆以利為尚然今之用刃者皆須磨錯使其光明瑩照則知貴其色之青白矣惟錫多則然也陳用之曰斧斤戈㦸大刃削殺矢則將新而用之各稱其用而為之等焉鑒燧以取水火於日月或用之以照以明白為上故用錫為最多而金錫相半焉凡此所謂下齊也薛氏曰鑒燧之齊均有取乎金錫之半而司烜則曰以夫遂取明火於日以鑒取明水於月其齊同而用異何也蓋如籥章逆暑迎寒皆用土鼓豳詩且土鼓豳詩一也而逆暑迎寒皆以是者所用各有時所占各有氣惟以聲應時以時占氣則氣無不應金錫半為鑒燧之齊則隂陽之性均而不偏當晝取火於日晝陽中也純陽之精於是而可降當夜取水於月夜隂中也純陰之精於是而可掬大抵神縁精而寓精因神而止氣因精而生偏陽則陰竭偏陰則陽竭二者不偏然後水火可以相待而成鄭鍔曰攻金之工有桃氏有冶氏有鳬氏有㮚氏有段氏有築氏或為削或為戈㦸或為鐘或為劍或為量為鎛獨無為鼎為斧斤為鑒燧之工鼎亦鐘之屬可附於鳬氏之官斧斤亦上齊可附於戈㦸之列鑒燧獨無所可附意者自有鑒燧之工執中齊記者亡之爾陳用之曰鑒燧之器於六者無所類然以明白為上則改煎金錫豈非屬之㮚氏築氏為削趙氏曰削是削刻書之刀古者未有紙筆凡事寫之竹簡欲竄則以刀削裁去之尚書序云更以竹簡寫之夫子作春秋削則削筆則筆是也故有築氏之工名官以築者蓋築所以致實書之所述欲刪其煩冗而取其實故也鄭鍔曰大事書於策小事書於簡而簡策所書者非筆也百名以上書於策不及百名書於方而方策所書者亦非筆也大約劑書於宗彞小約劑書於丹圖而彞圖所書者亦非筆也然則如之何名之曰書蓋為刀而刻於上耳書刀而名之曰削其為物甚微其為制甚易特立一官以掌之春秋書築臺築囿詩人美作室言築之登登則築者欲其堅而已為削以刻字天下之書無窮而字之刻亦無已苟非鍛鍊之堅何以供無窮之用名之曰築厥有㫖哉王昭禹曰築有節也削以裁書而治之故以削書名官謂築氏長尺博寸合六而成規王昭禹曰十寸為尺十分為寸以長尺而累之則合六削適六尺矣環而圍之其勢圜足以成規則不期於圜而自中於規矣鄭鍔曰取六削而周環以合之欲其成規取諸圓也蓋削者曲刀也其形偃曲如弓之反張而為之也其形曲則過乎曲不可也不及乎曲亦不可也合六削而圓然後其曲為得中此蓋言其制作之法其度當如是耳王安石云合六成規取乎地數之中惟成為能無窮惟中為能有常書為不刋之典削所以裁制其書豈可苟哉合六成規所以稱其書也是亦衍說欲新而無窮趙氏曰天下之器久則必舊然庖丁解牛十有九年其刃新發於硎無他器之善其制故也書之所述無窮則削之用亦欲無窮所以築氏亦欲常新而無窮已鄭鍔曰刀之新者必利既久則鈍夫久而鈍者鍛金不堅耳金不堅故其新有時而窮削之所用者大故欲鍛之有法使其新也常無窮而已敝盡而無惡鄭康成曰謂刃也脊也其金如一雖至敝盡無瑕惡也鄭鍔曰刀之久者必惡惡如今上繡也久而生惡亦以鍛金無法故也王昭曰敝盡者亦其鋒芒之適於用者然也若其脊刃亦未嘗有虧缺之疵豈非無惡之謂凡此皆材美工巧之效所謂魯之削不過此也冶氏為殺矢鄭鍔曰泥在鈞唯甄者之所為金在鎔唯冶者之所鑄則冶者鑄金之工也攻金之工六孰非冶哉特於戈㦸之工稱冶者蓋他工用金或鎔之而冩於範模之中唯戈㦸則冶而成故正名其官曰冶趙氏曰冶氏為殺矢所執者下齊也而其目乃稱冶氏執上齊者何謂注疏解義皆以為秦火後脫誤其實不然蓋冶氏正為戈㦸上齊正是冶氏所執所謂殺矢非冶氏正職特兼為之盖經中自有矢人故也然矢人為矢只是理會輕重笴羽至於箭鏃却是冶氏以金燒打成矢人不過用見成之鏃安排結裹成箭如今之造矢者何嘗自打鐵刃依舊是鐵匠打來特買來刮摩訂鬭成惟其矢刃皆是金工做底故令冶氏兼為之如輪人為輪又兼為蓋也所以刃長寸圍寸鋌十之重三垸此四句冶氏矢人皆言之者意實在此考工所以言上齊於序目者指戈㦸正職而言也然慮冶氏知戈㦸之器而廢殺矢之事故專以殺矢名其職且於職中先言為殺矢之制方繼以戈㦸之事焉以見其相兼不可偏廢之意至於矢人有五矢而冶氏止為殺矢者意者殺矢用於近射田獵要中之則死不可以他矢論所以考工言六齊獨曰五分其金而錫居二謂之削殺矢之齊其他皆無齊焉以此見殺矢用金為多刃長寸圍寸鋌音挺十之重三垸音丸趙氏曰刃長寸謂箭鏃長一寸也圍寸刃圍轉亦一寸也據矢人三分其羽以設其刃刃長二寸者意者刃只一寸併刄與刄把處言之卻有二寸鏃謂箭足入藁中者鋌十之則入藁中凡一尺矣謂之鋌取其直也矢人云殺矢七分三在前四在後亦言藁中之鐵鋌也垸注謂量名疏謂非斛量之號是稱兩之名但不知所重幾何注疏皆未聞不可考也然冶氏言此四句於職之首矢人言於職之末者豈非言於篇首所以見其不可緩之意而言於篇末又以見此物冶氏所職非矢人所當急歟戈廣二寸内倍之胡三之援四之趙氏曰自此以下却是說戈㦸戈㦸皆刺兵也戈二刃鄭康成曰戈今句孑㦸也㦸三刃戈小而㦸大㦸兵器之最健者其别於戈以此内謂胡下接柲處正是鐵筒子入木柄者這裏面謂之内胡謂矛之旁出者援謂自柲直至上尖頭刺刃也鄭鍔曰戈之狀有曲而下垂者謂之胡有直而上達者謂之援其柄謂之柲柲之受胡者謂之内戈廣二寸揔内與援與胡言三者皆徑廣二寸疏謂廣二寸只是說胡闊若是專說胡徑當言胡廣不應言戈廣也内倍之其長四寸胡三之其長六寸援四之其長八寸已倨則不入已句音鉤則不決長内則折前短内則不疾鄭鍔曰已之為言大也倨直也句曲也趙氏曰倨句長短皆指胡之四病蓋戈之所用在胡故特言之注云戈句兵也中義謂戈㦸不比矛頭有鈎以句物不可謂之句兵以為注之非不知注之言有據下文廬人云句兵欲無彈注云句兵戈㦸屬刺兵欲無蜎注云刺兵矛屬是戈㦸可以言句也禮書畫戈㦸胡皆下垂信可謂之句兵矣已倨注謂胡微直而邪多疏謂胡頭大舒是胡頭去援太逺過直可知已句注謂胡曲多疏謂胡頭太横是胡頭去援太近過曲可知直則以之刺人而不能入曲則以之刺人而創不決疏云胡太横則擁不削物故創不決也注謂胡之曲直鋒本必横而取圜于磬折疏釋之謂胡要横捷微邪向上不倨不句要如磬之折殺之勢如此則無前四病此說甚分明長内謂内過長也短内過短也内四寸援八寸内過長則胡向上侵援援無八寸則短矣短則胡向上近援胡頭低注所以云如此則胡曲於磬折也胡既與援相近故引之則援與胡並鉤並鉤則援易折前謂援以其在上故云前也内過短則胡必近下為之胡内必無四寸而援長反踰八寸注所以云如此則胡倨於磬折也胡既近下安之則頭舒頭舒則引之不能速及故不疾也決乃決開之意如決之東方則東流之決矣但言其速爾毛氏曰倨句以胡言長短以援言胡利以擊亦利以刺太直則刃不得刺人故已倨則不入太曲則刃不得擊人故已句則不决内長則援短援短則胡亦短兩者俱短則在上為太輕矣故折前内短則援長援長則胡亦長兩者俱長則在上為太重故引之不疾是故倨句外博鄭康成曰博廣也倨之外胡之裏也句之外胡之表也廣其本以除四病而便用賈氏曰倨謂胡上句謂胡下倨句皆有外廣倨之外胡之裏謂胡下近本增之使廣也句之外胡之表謂胡上近本增之使廣也趙氏曰以注與疏考之本即援也倨外博者謂自胡刃上頭直處從外頭沿入刃裏直至刃下曲處要去本闊也句外博者謂自胡刃下頭曲處從外面向上至直處沿入刃裏倨外頭要去本闊也無他欲上下尺寸皆去援寛則不太曲不太直自然合於磬折無上四病而便用矣陳用之曰戈㦸刺兵也勾者若矛是也此篇所記倨句利病似皆勾兵之制度而以屬之戈㦸豈其然乎鄭氏不此之思即以戈㦸為勾兵失之至若以戈之用為在胡謂援短則曲於磬折援長則倨於磬折倨之外為胡之裏句之外為胡之表非徒牽合而失其本㫖於形制亦無所考重三鋝音劣鄭司農曰鋝量名讀為刷鄭康成曰許叔重說文解字云鋝鍰也今東萊稱或以為大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣則三鋝為一斤四兩鄭鍔曰書之吕刑有其罰百鍰千鍰之數鍰即鋝也三鍰言戈之金共重一斤四兩㦸廣寸有半寸内三之胡四之援五之倨句中矩與刺重三鋝王昭禹曰㦸今戈類然㦸有三鋒則其廣宜少殺於戈然後便於用故戈廣二寸而㦸廣寸有半寸内三之凡長四寸有半寸援五之則其長七寸有半寸與内之長亦共尺有二寸趙氏曰三鋒共廣四寸半㦸之長亦尺有二寸胡之長亦六寸特胡内獨長於戈之内半寸援卻短於戈之援半寸蓋㦸刃多則頭重所以深内半寸減援半寸則㦸柲揷得牢而難脫也倨句中矩若以平易解之皆是說胡謂胡直處曲處中矩四方平正也然倨句之形惟方而無角者方是既為倨句乃不方不員豈得曰中矩此注所以分為二事分倨於援分中矩於胡也注云胡直中矩言方正也㦸胡横貫之胡中矩則援之外句磬折歟疏云胡六寸横貫三寸直下三寸是胡中矩也援七寸半亦以三寸為横稍舉之使不中矩以四寸半者向上為磬折向外此援為倨句也鄭鍔曰前所言戈之援即是直而上達者此㦸既有三鋒則所謂援者乃其旁之直而上達者刺乃當中而直前之鋒也㦸之廣既減於戈廣之寸若不三鋒則不得與戈同重三鋝故言與刺重三鋝言合三鋒乃如戈之重也緫論鄭鍔曰五兵之制尚矣書有執戈上刃之文而執劒執瞿說者皆以為㦸屬經有司戈盾之官而不司㦸詩有干戈戚揚之文亦不言㦸以理考文兵之用最多者無如戈觀富父終生以戈摏僑如之喉狼曋以戈斬秦囚子南以戈擊子晳長魚矯以戈殺駒伯詩曰荷戈與祋書曰稱爾戈經之司戈盾言祭祀授故士戈軍旅㑹同授貳車戈授虎士戈無所往而不用焉豈非以其柲短而易持其胡其援廣而易入可以摏可以斬可以擊可以鉤故歟然左傳有子都拔棘之事明堂位言越棘經於掌舎有棘門楚武王荆尸而舉授師孑焉說者謂孑者㦸也則㦸亦未嘗不與戈並用然不若戈為常用故後世以㦸賜臣下之有勲者或韜以赤油或韜以黼黻而謂之棨㦸以代斧鉞焉先儒謂戈或謂之雞鳴者以其胡似雞鳴也或謂之擁頸者以其胡曲故謂之擁頸也凡㦸而無刃者秦晉之間謂之孑或謂之鑣吳揚之間謂之伐東齊秦晉之間其大者謂之曼胡其曲者謂之句孑曼胡桃氏為劒王昭禹曰劒之工名謂之桃氏以桃能辟除不祥而劒亦能止暴惡故也臘廣二寸有半寸鄭康成曰臘謂兩刃鄭鍔曰古者臘必獵獵而得禽則宰殺以祭故臘於文為月旁巤蓋言於是月必獵也然四時之田得禽皆割以祭獨謂臘祭為大割者蓋冬祭則百物皆可獻其宰殺為多也然則劒刃為臘豈非取其利而可以大割乎賈氏曰兩面各有刃王昭禹曰兩刃各徑二寸半兩從半之王昭禹曰謂劒脊中髙兩殺而趨鍔趙氏曰半之自脊分斷一邊廣一寸四分寸之一以其臘廣為之莖圍長倍之鄭鍔曰莖者劒鐔也柄謂之夾莖者人所把握之處在夾之中如竹木之莖然故名曰莖取臘廣以為莖之圍圍二寸半也長倍之則長五寸中其莖設其後趙氏曰中其莖注存兩說一說謂穿劒夾内莖於中一說從中以卻稍大之也設訓為大繫辭云益長裕而不設彼注亦云設大也中其莖大其後謂以刃為前以莖為中以設為後則莖以後稍大之視中之數有加焉則操執處有所礙著於把為易制也如今之刀劒末後有鐵圈分外大即與此同俞氏曰中其莖則易於把握設其後則張而易制參分其臘廣去一以為首廣而圍之賈氏曰首廣謂劒把接刃處之徑鄭康成曰首圍其徑一寸三分寸之二賈氏曰圍之謂圜之故廬人皆以圍為圜之緫論鄭鍔曰凡劒之制有鋒有鍔有脊有鐔有鋏鋒者所以為銳也鍔者所以為利也脊者所以為幹也鐔者所以為本也鋏者附鐔者也君子所以防暴惡則大小長短之制宜不苟故其法如此身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之鄭鍔曰此謂桃氏制之以供衞王者之所佩服也人之形貌小大長短各不一也制劒以供其服非直以為觀美要使各適用而已故為三等之制以待三等之士俾隨宜而自便焉劒之莖其長五寸劒之身若五倍其莖之長則三尺也重九鋝則重三斤十二兩也兹其長之極重之至也故謂之上制唯士之長而有力者然後能勝之故上士服之劒身四其莖之長則二尺五寸也重七鋝則二斤十四兩三分兩之二也長短輕重適得中焉故謂之中制唯人之得中者所宜服故中士服之若身之莖止三其莖則二尺耳重止五鋝則二斤一兩三分兩之一耳輕而且短故謂之下制士之形短而力微者可以服焉或謂士有上中下之制安知其非指元士之在位者耶以經考之旅賁虎賁皆衞王者也然旅賁氏之夾王車左右各八人所執者戈盾則不服劒矣惟虎賁氏掌先後王而趨以卒伍不言所執其屬有虎士八百人其人既衆則有上中下之不同可知矣不言所執則服劒可知矣鄭康成曰此士謂國勇力之士能用五兵者樂記曰武王克商禆冕搢笏而虎賁之士說劒王昭禹曰先王因其人之長短強弱而所服之劒各有度數存焉至於為弓亦然故弓人弓長六尺六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之由此觀之皆各稱其人之材力而已鳬氏為鐘易氏曰天下之物重不踰金輕不踰羽鳬羽物也輕莫尚焉鐘欲其聲之清揚而逺聞故為鐘以鳬氏取其聲之輕而已王昭禹曰鳬之為物入水而不溺勝水而不淫先王於樂之聲亦欲其無淫溺故也陳用之曰以器言則鐘尚羽以義言則鐘隂也為止而聚鳬止而聚者也故為鐘之工名以鳬氏鄭鍔曰考鐘之制有鎛有鏞有編鐘編鐘十六枚而在一虡小胥正其位磬師敎其擊者也鏞則當十二辰之鐘也所謂笙鏞以間而典同辨其聲者也此鳬氏言大鐘之制所謂鏞也旁有兩欒正有兩面面皆有帶先王之制鐘大不出鈞重不過石律度量衡於是而生其方則在西其音則尚羽實樂之最大其聲為衆樂之宗也毛氏曰有編鐘有特縣之鐘有應律吕之鐘鐘之小大不一故作記者於長短廣狹無一定之論然所謂銑于鼓鉦之名旋幹景之制不可闕焉鳬氏要隨其鐘之大小斟酌以為之陳用之曰鳬氏為鐘而考工記序言為聲者蓋凡為樂器以十二聲為之齊量而十二聲皆主於鐘故也兩欒音鸞謂之銑先典反薛氏曰鐘口兩角謂之欒賈氏曰欒銑一物俱謂鐘兩角古之欒器應律之鐘狀如今之鈴不圜故有兩角王氏曰鐘尚羽其聲從紐欒是紐貌如詩素冠棘人欒欒兮彼注云欒欒瘦瘠貌蓋鍾兩角處尖細故曰欒鍾之所先故名銑王昭禹曰銑言其凈如洗以其無隧之文故也銑間謂之于于上謂之鼔鼔上謂之鉦音征鉦上謂之舞鄭康成曰此四者鐘體也鄭鍔曰鐘口兩間其名曰于鄭氏謂脣之厚形褰袪然為于蓋于者寛緩不迫之義記曰易則易于則于鐘聲之發欲其緩故謂之于圖說曰鐘聲鏗其聲欲緩故下著之形屈而不正猶氣之于名之曰于薛氏曰氣之上達謂之于于言其和也王昭禹曰鼔以作為事凡作樂謂之鼔于上作而擊之之處謂之鼔鄭鍔曰鼔之上聲之所止之處其名曰鉦鉦言聲之所由止也用兵者以鼔進以金止作樂則戒在于不已而至於流也故鐘之制有鼔以作之又以鉦而止之陳用之曰鉦之為言正也左右上下此居正中於鉦之上其名曰舞唯舞者之舞蹈厲有節鋰之有舞蓋或作或止於是而節俞氏曰舞在鉦上聲之震動於此者故云舞陳用之曰以舞為義言發揚其體從此也曰銑曰于曰鼔曰鉦曰舞凡此五者皆鐘之體因其聲之所生而制名也舞上謂之甬甬上謂之衡鄭鍔曰甬如甬道之甬言可往來而不窮也舞以為節其作止則其用可以往來而不窮故舞上名曰甬陳用之曰言若甬生出焉甬上謂之衡者横在甬上平正而不欹側故名曰衡王昭禹曰衡用權以稱物而平之為主也甬上其勢正而鐘頼之以取平焉故謂之衡曰甬曰衡凡此二者皆鐘之柄因其形之可見而制名也鐘縣音𤣥謂之旋旋蟲謂之幹鄭康成曰旋屬鐘柄所以縣之鄭鍔曰其形如環環則有盤旋之義縣鐘則假物以為之附著鐘偃於此若盤旋然陳用之曰言其飾之盤旋於旋之上為蟲形以飾之所以為固其名曰幹則有正固之義蓋旋蟲則假物以為設飾鐘繫於此益致其堅固也易曰貞固足以幹事陳用之曰言所恃以强固自漢以來鐘旋之上以銅篆作蹲熊及盤龍獸名辟邪皆周之旋蟲也鐘帶謂之間謂之枚枚謂之景鄭鍔曰鐘有銑有于有鼔有鉦有舞其名不可辨乃為之帶如衣之帶然所以介而辨之其介凡四其名曰如刻之以發隱為義如夏之又以文飾為義為之介下以發其隱且以飾焉間四處每處有乳各九四九三十六凡鐘有乳三十六枚别無可數故名之曰枚王昭禹曰數事以條數物以枚間有鍾乳以夾鼔與舞故間謂之枚枚謂之景者日之光謂之景枚景一物而二名猶欒與銑皆一物也于上之攠音摩謂之隧鄭鍔曰上云銑間謂之于謂鐘脣也于之上所擊之處謂之攠攠言擊之久而必敝如磨然也其攠之處又謂之隧隧如隧道之隧隧而深也本造鐘之時必窐其形故謂之隧輿人為車三分車廣去一以為隧隧車輿之深也與鐘隧其理則同鄭康成曰隧在鼔中窐而光有似夫隧趙氏曰自旋蟲以上謂之景所以為鐘之飾凡此諸體之名或即其體或言其用或取其象或指其物各有其義十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼔間以其鼔間為之舞脩去二分以為舞廣鄭鍔曰此一段言鐘之制非一定如此也假設而言其長短廣狹以為造鐘之法即此數而加減之則十二鐘之制皆推而知鉦欲小於銑而銑間欲與鉦相應銑十分而去二以為鉦則鉦八分矣又以鉦為銑間則銑之間如鉦之徑此鉦銑相應之數也又取銑去二分之外再去其二分以為鼔間鼔之徑居銑間之六則鼔間六分矣又以鼔間為舞脩則脩之徑與鼔間亦居銑間之六俱六分也此鼔舞相應之數也脩徑也舞之上下促以横為脩以從為廣此脩則言其徑而已又取銑去四分之外又去二分以為舞之廣之長也舞長居銑間之四則舞廣四分也凡此大約言鉦之徑居銑徑之八而鼔間又居銑徑之六銑間與鉦之徑相應鼔間與舞脩相應舞間之方常居銑之四舞間方四則鼔間六分亦其方也鄭康成謂鼔六鉦六舞四則此鐘口十者其長十六也然必以間為言者何也蓋鐘帶謂之所以為介辨於介辨之中則謂之間趙氏曰據此則此鐘果髙二尺二寸半口徑果一尺四寸矣然鉦居銑徑之八乃曰六者意者凡言間者除了兩邊帶只論帶内鉦雖八除了帶止六也經雖不言鉦間以類推之可知何者以經與注之意并圖之樣當如此算蓋十分銑去二為鉦是并鉦帶論之以鉦為銑間則鉦帶在銑之間而鉦間則正言也經所以不言鉦間特言鉦者正謂此也至於去二分為鼔然鼔卻無帶占去分數舞縱四分横六分注卻只說舞閒方四縁横去三分以為之間則間者豈非只論帶之内而然乎王昭禹曰凡鐘之制皆下侈而上斂故鉦之徑居銑徑十分之八而銑間則與鉦同以其鉦之長為之甬長鄭鍔曰鄭康成言鉦間六若以鉦長六分為甬之長則失之太長故為之甬長者并衡甬而言也然經文不言鉦長之數康成意之也以其甬長為之圍參分其圍去一以為衡圍鄭鍔曰為之圍者其圍之徑與甬之長相當也賈氏曰自兩欒已上至甬皆下寛上狹衡又在甬上故宜小於甬一分參分其甬長二在上一在下以設其旋竇氏曰旋即環也形如璧羨用之以并屬趙氏曰為鐘置甬又置衡者蓋鐘柄髙則重重則鎮墜得鐘住短則鐘掉而柄易斷若只有甬而無衡則柄低短矣穿旋於中寧無磨齧之患若甬衡一般大則柄又太重矣所以甬上又為衡者欲鐘柄長而重也以其鐘所取正故謂之衡正在甬上直出者禮書謂横甬上者未達三分甬長以甬長而三分之也二在上一在下以設其旋注謂令衡居一分則三分旋亦二在上一在下以旋當甬之中央蓋緫甬與衡而言也衡居一分甬居二分旋則穿於甬之正中旋下有一分是甬是一在下也旋上有一分甬一分衡是二在上也如此三分其旋旋亦二分在上一分在下注說極是所以如此者欲旋穿之上甬衡稍長則不唯鎮得鐘住又旋卒急磨齧甬上金錫不盡用得久長而柄不斷也李嘉㑹曰銑與鼔皆言間脩不言廣鉦不言間及廣脩只曰以鉦長為甬長以其甬長為之圍三分去一以為衡圍先王不言分齊葢以在前者可以推類知也薄厚之所震動清濁之所由出侈弇之所由興有說易氏曰大鐘以鼔間十分之一為厚小鐘以鉦間十分之一為厚則為厚薄之中今鳬氏言薄厚未免乎震動必有不得其中者趙氏曰厚薄者謂鑄鐘失之厚薄不勻也震動者作而起發謂之動動而逺聞謂之震謂擊鐘而有聲毛氏曰說意也不直曰意而謂之說者意或隱微必待解說而後見鐘形之不中則有厚薄鐘口之不正則有侈弇厚之所震動則其聲石薄之所震動則其聲播欲知石播之病則其說在於厚薄之間而已侈之所由興者其聲為柞弇之所由興者其聲為鬱欲知柞鬱之病則其說在於侈弇之間而已厚薄侈弇言其形清濁言其聲鐘小而長則其聲舒而逺聞此太清之所由出鐘大而短則其聲疾而短聞此太濁之所由出或以形言或以聲言睹形可以知其聲聞聲可以求其形凡以相明也陳用之曰聲出於器有說可推下文所謂已厚則石至長甬則震乃其說也得其說而以類推焉然後能去病而得其所謂善者典同以辨聲為職其言不得不詳鳬氏為鐘記其為之之法足矣不必悉舉也鐘已厚則石已薄則播鄭鍔曰此所以說夫震動之由也體失於太厚則聲如石堅實而無聲也體太薄則聲播布散而不聚也侈則柞弇則鬱毛氏曰此說侈弇之所由興也鄭康成曰柞讀為咋咋然之咋聲大外也鬱聲不舒揚鄭鍔曰口太侈則中央約其聲迫柞則出去必疾口太弇則中央寛其聲鬱勃則收而不揚此皆鍾之形不中乎度其聲之病則然也則清濁之所興其本於此長甬則震鄭鍔曰以其鉦之長為之甬長則鐘柄亦聲之所寓不可失之太長太長則聲必震震掉也言其動摇不定也王安石以為聲震而逺聞失之是故大鐘十分其鼔間以其一為之厚小鐘十分其鉦間以其一為之厚趙氏曰大鐘即禮書所謂十二辰之鐘詩書言鏞者是也小鐘經所謂編鐘是也國語曰細鈞有鐘無鎛昭其大也大鈞有鎛無鐘昭其細也左傳伶州鳩曰鐘音之器也小者不窕大者不摦則和於物今鐘摦矣鐘信乎所尚有小大而制有長短也據注云鼔居銑十分之六鉦居銑十分之八然鼔在銑間無帶鉦卻有帶除帶之數鉦與鼔同居銑十分之六上文所以言鉦間鼔間至鉦只言鉦不言間者蓋間是帶間故也不言間者是并帶算也夫鉦鼔既同數今大鐘十分鼔間小鐘十分鉦間皆取一以為厚無乃大鐘薄而小鐘厚乎注云若言鼔外鉦外則近之蓋鼔外有銑間乃有二分闊鉦外只有一分闊此言鼔間鉦間謂鼔外鉦外也禮書以注疏為誤謂鉦體居銑之六與鼔間同鉦間又殺與鼔間異蓋鉦間雖六分鉦間卻無六分鼔間六分然鼔間皆謂之鼔鼔間則闊況鐘上斂下侈不應鉦鼔一般闊兼之經只說間即不曽說外若就間内十分取一尚得若就外十分取一鼔鉦外共有三分能幾闊更就中十分取一鐘無乃太薄此說極好鐘大而短則其聲疾而短聞鐘小而長則其聲舒而逺聞鄭鍔曰鐘形大而短短則淺而躁故其聲疾疾言出之速也然形太短則其竭也必易此所以短聞也鐘形小而長長則安而深故其聲舒舒言其鳴之遲也然形太長則其息也亦難此所以逺聞非聞及逺也謂聲之久而長逺也賈氏曰聲舒逺聞亦不可是以樂記云止如槁木不欲逺聞之驗為遂六分其厚以其一為之深而圜之王昭禹曰遂則于上之攠謂之隧是也鄭康成曰厚鐘厚深謂窐之也其窐圜賈氏曰初鑄之時即已深而圜以擬擊也取其厚之一分而為之深則所擊之處當深六分之一而已深而又圜之所以受擊宜圜故也王昭禹曰深取其厚之一則不傷於鐘之體勢取其圜而不方則有運而行之意李嘉會曰遂者發聲之所今而圜之則就圜中擊之聲從中發而内外相應矣鄭鍔曰典同所謂鐘之形聲者十有二此惟言薄厚侈弇四者蓋為鐘之病大槩不出於是四者故也景王將鑄無射單穆公曰先王之制鐘也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出然則薄厚侈弇病之所由始歟周禮訂羲卷七十三
