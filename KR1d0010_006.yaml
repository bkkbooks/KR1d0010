body:
  text: 周禮訂義卷六宋王與之撰膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人鄭康成曰膳之言善也今時美物曰珍膳夫食官之長也賈氏曰謂與下庖人內外饔亨人等為長也自膳夫至臘人皆供王膳羞飲食饌具之事故次宫室也王氏詳說曰膳人得人則如屠蒯非人則如仲允此膳夫所以次於宫伯也禮庫曰宫正宫伯之下即以膳夫掌飲食之官繫之古人之意深矣緣此事甚繫利害非惟是養人主氣體專是正君之心防君之欲記曰飲食男女人之大欲存焉此既是人欲須防間撙節可也使飲食之共皆得其正君心安有不正乎若下之所共必以其正人主雖欲小肆其欲亦不可得若更無常制而供之者惟求以投其欲好則縱欲不已如唐時貢荔枝置遞鋪至死者相屬於道豈不大為民害若周官所供各有定制又且一一關涉冢宰冢宰既得其人則飲食之官安得非正人誰敢以四方珍味私投人主之欲古者格君心皆在此處掌王之食音似飲膳羞以養王及后世子鄭康成曰食飯也飲酒漿也膳牲肉也羞有滋味者凡養之具大略有四賈氏曰此皆下之所載矣仍有珍醬不言者小者略也賈氏曰云以養王及后世子舉尊者而言其實羣臣及三夫人以下亦養之也陳君舉曰自膳夫供膳酒正供酒司服供服皆以后世子與王同之此三代之良法王者以天下為家豈容一家自為分異王后君之體也世子君之别也故天子曰國君后曰小君世子曰儲君秦漢以後侈心太過乃以少府自主天子之食大長秋主椒房之食家令主太子之食如是則不免有私妄用而后世子各得以自侈矣凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋鄭康成曰進物於尊曰饋此饋之盛者王舉之饌也史氏曰饋者儲之一嵗之間隨所欲食而進之非謂一日之奉而咸備諸物也周公載之若此之富者以饋非常御之物儲之未用之時有時而或進之鄭司農曰六榖稌黍稷粱麥苽苽雕胡也賈氏曰此據食醫鄭康成曰六牲馬牛羊豕犬雞賈氏曰此據爾雅鄭司農曰六清水漿醴䣼醫酏賈氏曰此據漿人文也鄭康成曰羞出於牲及禽獸以備滋味謂之庶羞賈氏曰公食大夫禮下大夫有膷臐膮此出於牲者也上大夫加以雉兔鶉鴽此出於禽獸者也王氏詳說曰國君庶羞內則所載者三十一物自牛修鹿脯至於楂梨薑桂是巳鄭氏謂此三十一物皆人君燕食所加庶羞也謂天子所用百二十品作記者不能次録耳此所以有其數而未聞其物也鄭康成曰珍謂淳熬淳母炮豚炮牂搗珍漬熬肝膋賈氏曰八珍並見內則又有糝與餰及羞豆之實非珍故不取醬謂醯醢也王舉則醢人共醢六十罋以五韲七醢七菹三臡實之醢人共韲菹醢物六十罋陳君舉曰王者君臨四海九夷八蠻畢獻方物以供服食器用所謂食用六榖至醬用百二十罋者立其常制無使此心之或過也不如是則墨子菲薄之說行天子身衣弋綈而富民牆屋被文繡矣反是則肆其嗜欲酒池肉林以困苦天下此皆禮分不明故也王日一舉鼎十有二物皆有俎鄭康成曰殺牲盛饌曰舉王日一舉以朝食也賈氏曰一日食有三時同食一舉案玉藻云皮辨以日視朝朝遂以食日中而餕餕者餕朝之餘也則遂以食之謂之食則知先朝食次乃日中而餕也十薛氏曰玉藻云天子日食少牢朔月大牢案此鼎有二牢鼎既有牛羊之類陪鼎又有牛臛羊臛之類何謂日用少牢而朔月大牢乎楚語曰天子舉以大牢則知日舉亦大牢鄭康成曰鼎十有二牢鼎九陪鼎三也賈氏曰案聘禮致饔餼注云飪一牢鼎十有二是也牢鼎九設於西階前牛羊豕魚臘腸胃同鼎膚鮮魚鮮臘云陪鼎三者當內兼膷臐膮並陪牛羊豕鼎後是也王氏詳說曰膷為牛臛臐為羊臛膮為豕臛此陪鼎三也鄭鍔曰其舉也則用鼎十有二其食也取鼎之物而載於爼每鼎之物皆有爼則爼亦十二說者謂鼎爼竒籩豆耦鼎爼以盛牲體牲動物屬陽其數宜竒今用十有二何也考於禮家之數牛一羊二豕三魚四臘五腸胃六膚七鮮魚八鮮臘九所謂正鼎九也又有膷一臐二膮三所謂陪鼎三也或九或三其數皆竒合之以為十二者示人君之尊冝法天之大數也觀衣之十二章門之十二重馬之十二間冕之十二旒則鼎爼之竒而以十二為言可知也鄭康成曰物謂牢鼎之實亦九爼賈氏曰言實即牛羊豕之類陪鼎三膷臐膮者庶羞在於豆唯牢鼎之物各在爼故云亦九爼也陸氏曰爼始於禹而後世用之於吉凶者文質於是乎異矣特牲三爼又有胙爼非正爼王日舉鼎十有二內三陪鼎非正鼎以樂侑食鄭康成曰侑勸也賈氏曰上言王日一舉此云以樂侑食即王制云天子食日舉以樂論語曰亞飯三飯四飯鄭云皆舉食之樂彼諸侯禮尚有舉食之樂明天子日食有舉食之樂可知薛氏曰飯必告飽而告飽必有侑禮有拜以致其敬有辭以導其動有樂以防其心凡人皆有侑食之禮也况王者之日舉乎然以論語考之每飯異樂每樂異工若大食三侑皆令奏鐘鼓此終食之侑而樂工皆備也此則每舉之侑一工而已又無鐘鼓膳夫授祭品嘗食王乃食賈氏曰凡祭皆祭先造食者王將食必祭先膳夫授之程氏曰古者飲食穀必思始耕者先王無德不報如此王氏曰授王以所祭之物也鄭康成曰祭謂刌肺脊也賈氏曰祭肺有二種一者名為舉肺亦名離肺此為食而有二者名為祭肺亦名為刌肺此為祭而有舉肺則離而不絶祭肺則絶之今此膳夫授祭為食而授即舉肺也王氏詳說曰古者食必有祭明堂位云有虞氏祭首夏后氏祭心商祭肝周祭肺此四代之所尚也月令云春祭先脾夏祭先肺季夏祭先心秋祭先肝冬祭先腎此四時之所尚也膳夫授祭本以此然曲禮云殽之序遍祭之者謂無所不祭但周人以祭肺為主鄭康成曰品者每物皆嘗之道尊者也王氏曰品嘗者養至尊當謹故也所防者微矣卒食以樂徹于造賈氏曰卒終也天子食終作樂以徹器鄭康成曰造作也賈氏曰謂造食之處即厨是也王氏曰造致也致食於是然後進而御王及其卒也徹于所致而置焉是謂徹于造防王氏詳說曰文王之為世子命膳宰曰未有原蓋其復進也必徹于造食之所亦防其復進耳王昭禹曰王之食必侑以樂及其卒食又徹以樂則其所養固有道矣如是則無適而不和推而致之大足以位天地微足以育萬物豈特資一人之養哉王齊日三舉賈氏曰謂散齊致齊齊必變食故加牲體至三大牢鄭節卿曰王日一舉一大牢也朔日加食一等則二大牢也齊之日三舉則三大牢也蓋朔之聽政勞於常日於是而有加於常食祭祀將以致精明之德自强於禮而交於鬼神不可以不備其養於是而又有加於朔食所任愈重所治愈大則所養愈加厚史氏曰當不飲酒不茹葷之時懼其食力之不足則不能勝祭事故三舉以助之非謂盛殺而供也大喪則不舉大荒則不舉大札側八反則不舉天地有烖音災則不舉邦有大故則不舉鄭康成曰大荒凶年大札疫癘天烖日月晦蝕地烖崩動大故寇戎之事鄭司農曰大故刑殺也春秋傳曰司冦行戮君為之不舉李氏曰荒札烖皆不舉然則非直於外事殺禮若王膳亦為之貶也曲禮曰嵗凶年穀不登君膳食不祭肺馬不食穀大夫不食粱士飲酒不樂皆自貶損憂民之道也如此天不為之順人不為之悅用度不足海內不寧未之聞也王燕食則奉膳贊祭賈氏曰上文王日一舉鄭以為朝食燕食謂日中及夕也王昭禹曰非若朝舉於禮為盛故有燕閒之意如燕居燕朝同王氏詳說曰燕食謂三飯四飯耳鄭氏以為奉朝之餘膳所祭牢肉也王氏謂餕餘不祭王之所膳有魚人辨物以共王膳掌畜又掌膳獻之鳥祭其魚鳥歟然王氏之說得矣鄭氏亦未可非也玉藻曰皮辨以日視朝遂以食日中而餕奏而食此謂天子之燕食也又云朝服以食特牲三爼祭肺夕深衣祭牢肉此謂諸侯之燕食也天子言餕諸侯言祭天子言日中諸侯言夕互文見義耳蓋殽之序遍祭之朝食祭肺則牢食亦未及祭也豈得為餘物乎愚案鄭氏為祭之餘膳者非謂王食之餘蓋一舉分為三朝食其一則日中及夕又各祭其一矣薛氏曰王舉則授而弗贊燕食則授而贊之者以舉為禮之盛王當自致焉燕食則其祭不如舉之盛故膳夫授而贊之方氏曲禮解曰朝食以牛羊為主燕食以魚鳥為主凡王祭祀賔客食則徹王之胙爼賈氏曰祭祀謂祭宗廟胙爼謂若特牲少牢主人受尸酢尸東西面設主人爼於席前王受尸酢禮亦當然賔客食謂王與賔客禮食於廟賔在户牖之間王在阼階上各有饌皆設爼故亦有胙爼也鄭鍔曰王當祭祀以祭之胙肉置之於爼則名曰胙爼與賔客禮食則主人飲食之俎亦曰胙俎是俎最尊不可褻膳夫親徹之不敢使其屬也凡王之稍事設薦脯醢賈氏曰按下經燕飲酒謂大事與臣飲酒則此云王之稍事是小事而飲酒也故空設薦脯醢若大飲與食則有牲體矣王昭禹曰脯醢共於臘人醢人膳夫則設薦之而已王燕飲酒則為獻主鄭司農曰主人當獻賔則膳夫代王為主君不敵臣也燕義曰使宰夫為獻主臣莫敢與君亢禮崔氏曰凡王燕諸侯皆於路寢使膳夫為主人王不為主以燕禮輕故君不酌也故為獻主楊氏曰說者謂君臣之義不可以燕廢也不然禮受爵於君前則降而再拜燕所以待羣臣嘉賔也而使之有升降拜揖之勞是以犬馬畜之矣故以膳夫為獻主而王不自獻酬焉是孟子所謂養君子之道而廩人繼粟庖人繼肉之義也陳藴之曰龜山之說固善然崔氏蓋本注疏而有燕義為證矣二意當兼用以今世論之凡尊長之待卑幼也正席之後或命子弟為主所以伸其歡然卑不瀆尊之意固存乎中矣王昭禹曰王之於羣臣其禮有饗有燕饗以訓恭儉則以禮為尚燕以示慈惠則以恩為尚設於寢所以示私也服用朝所以示禮也酒行無算所以親之也登歌鹿鳴所以樂之也間歌魚麗所以備物也王之於燕所以將其厚意者如此羣臣嘉賔胡為而不盡其心哉掌后及世子之膳羞凡肉修之頒賜皆掌之鄭康成曰亦主其饌之數耳王氏詳說曰王之饋膳夫所進也世子之饋膳夫特掌之而已饋而進之者內饔也內饔共王后及世子之膳羞鄭司農曰修脯也賈氏曰謂王以肉及修脯頒賜羣臣則膳夫掌之加薑桂煆治之曰修無薑桂以鹽乾之曰脯散文言之則修脯通也凡祭祀之致福者受而膳之以摯見者亦如之鄭康成曰致福謂諸臣祭祀進其餘肉歸胙于王王氏詳說曰少儀曰為人祭曰致福為巳祭而致於君子曰膳其於太牢則以牛左肩九箇少牢則以羊左肩七箇犆豕則以豕左肩五箇賈氏曰左傳祭有受脤歸脤受脤謂君祭以肉賜大夫也歸脤謂大夫祭歸肉於公也諸侯之臣有歸脤於君而王之臣亦然薛氏曰諸臣如都宗人凡都祭祀致福于國家宗人凡祭祀致福然後祭僕於凡祭祀致福者展而受之然則膳夫之所謂受而膳之者受之於祭僕而膳之於王也鄭司農曰以羔雁雉為贄見者亦受以給王膳薛氏曰司士曰掌擯士者膳其摯蓋擯見之時卿執羔大夫執雁士執雉然後司士於此而膳其摯後鄭謂膳者入於王之膳人然則膳人之所受者受之司士也嵗終則會惟王及后世子之膳不會鄭康成曰不會計多少優尊者王氏詳說曰王天下之父后天下之母世子天下之本膳夫於王及后世子之膳不會庖人於王及后之膳禽不會而不及世子是世子之膳禽則㑹矣曰膳常禮也膳禽非常禮也不會者所以重其為天下之本也會者所以正其繼天下之本也又所以杜其窮奢極侈之心也酒正曰惟王及后之飲酒不會是世子之飲則會外府曰惟王及后之服不會是世子之服則會會其禽則無禽荒之失會其酒則無酒荒之失會其服則無好潔衣服之失此所以見周公之待世子也楊氏曰有司不得拘制天子固矣然而九式之職冢宰任之有司雖不會冢宰得以九式論於王矣故王后不會非蕩然無以禁止之也制之有冢宰而非有司之法故也吕氏曰大宰以九式均節財用凡羞服幣帛匪頒好用皆在焉而其屬所掌王之膳禽酒服裘皮皆不會制其大而濶其細此所以能均節財用庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人鄭康成曰庖之言苞也裹肉曰苞苴賈氏曰庖猶今之厨宫正疏曰諸稱人者若輪人車人之類即冬官鄭云以其事名官也鄭康成曰賈主市買知物賈掌共音恭六畜笴又反六獸六禽辨其名物鄭康成曰六畜六牲也始養之曰畜將用之曰牲春秋傳曰卜日曰牲鄭司農曰六獸麋鹿熊麕野豕兔鄭康成曰獸人冬獻狼夏獻麋又內則無熊則六獸當有狼而熊不屬王氏詳說曰左傳雖有熊踏孟子雖有熊掌要知非禮物所用六禽雁鶉鷃雉鳩鴿賈氏曰六畜者馬牛羊豕犬雞又見膳夫夏官校人羊人地官牛人春官雞人秋官犬人冬官豕人總送六畜與庖人六獸六禽即獸人送之庖人得此共與膳夫內外饔故云掌共辨其名物者謂禽獸等皆有名號物色故辨之劉執中曰辨其名物者物雖可食不辨其毒則能害人內則曰不食雛鱉狼去腸狗去腎狸去正脊兔去尻狐去首豚去腦魚去乙鱉去醜又曰雛尾不盈握弗食舒雁翠鵠梟胖舒鳬翠雞肝雁腎鴇奧鹿胃皆食之而不利于人所當辨者史氏曰此所謂常珍也若異饌則不可以為常而嗜之必有以口腹纍四方萬里之逺者矣凡其死生鮮悉然反薧苦老反之物以共王之膳與其薦羞之物及后世子之膳羞鄭康成曰凡計數之鄭司農曰鮮生肉薧乾肉劉執中曰死謂不可以生致者生謂不可以死致者鮮謂不可以薧薦者薧謂不可以鮮致者史氏曰膳常食也羞庶品也羞出於牲非常御之物時乎進之耳鄭康成曰薦亦進也備品物曰薦致滋味乃為羞王言薦者味以不褻為尊愚按薦羞巳見宰夫王昭禹曰膳夫凡王之稍事設薦脯醢則薦所共設薄矣庖人共后世子膳羞而不共薦者蓋薦則自后世子之官屬共之共祭祀之好羞鄭康成曰謂四時所為膳食若荆州䱹魚青州蟹胥雖非常物進之孝也鄭鍔曰祭之日思其飲食思其所嗜乃孝子事死如事生之志也昔屈到嗜芰死而其子羞芰君子皆以為非安石乃以共好羞為昭先人之好僻殊不知魯之祭非禮經之正區區求四方之物以為美故孔子正之耳非所謂先王之好者也共喪紀之庶羞賔客之禽獻鄭康成曰喪紀喪事之祭謂虞祔賈氏曰凡喪未葬以前朝夕奠大奠皆無薦羞之法今言喪紀庶羞故知謂虞祔也禽獻獻於賔客賈氏曰謂若掌客上公乘禽日九十雙侯伯七十雙子男五十雙之類史氏曰禽獻雖出於掌客庖人則授其法而視其出入獻者亨而進之也凡令禽獻以法授之其出入亦如之鄭康成曰令令獸人也禽獸不可久處賔客至將獻之庖人乃令獸人取之王氏曰掌客聘禮此禽獻之法也令禽獸則以此法授之使知其所獻之物與其數鄭康成曰出入謂及其來致禽亦以此書校數之至于獻賔客又以此書付使者展而行之賈氏曰展者視也行去也謂將向客館之時省視禽牲然後去也庖人既以數授獸人俾依數以禽入庖人是入也庖人得此禽則依數付使者送向館是出也鄭鍔曰賔客乘禽之禮當如其命之數因其舊法存焉令獸人取必以舊法授之則用各有數而無失禮之愆矣其來共也以所授之法而入之其將用也以所授之法而出之吏雖欲為姦胡可得哉凡用禽獻春行羔豚膳膏香夏行腒其居反鱐所留反膳膏臊素刀反秋行犢麛膳膏腥冬行鮮羽膳膏羶書然反鄭康成曰用禽獻謂煎和之以獻王史氏曰羔稚羊豚稚豕也方春草生羔豚美故用之腒乾雉也鱐乾魚也方夏暑盛物易腐故用之用犢麛於秋秋時草物實犢麛食之而肥也用鮮羽於冬冬時陽氣伏魚潛雁定而肥也飲食之滋春膳牛脂曰膏香夏膳犬脂曰膏臊秋膳雞脂曰膏腥冬膳羊脂曰膏羶各以其物之所便而調和之也夫膳食唯其所嗜而已必案四時而共之者一則避其物時之孕育一則辨其物性之所宜以是為膳則養王之形體者至矣程氏曰羔豚羊豕之小者方春品物小故以小而美者為宜腒鱐雉魚之乾者方夏時餒敗故以乾者為冝犢麛至秋則物成而可嘗之時雖犢麛皆得以嘗之矣鮮羽至冬則物衆可進之時雖飛與潛者皆得以進之矣然此固足以為時之冝茍在臟有所不勝食之亦不足以為善也故又膳膏薌膳膏臊膳膏腥膳膏羶焉無非主五行之氣而以養其形也王氏詳說曰月令所食唯時令也庖人所行順物性也春革始生則羔豚肥秋草巳熟則犢麛肥草之熟則甚于生犢麛之肥則大於羔豚夏則腒鱐之牲為燥冬則鮮羽之性為定是順性也若夫月令則異是矣牛土畜也故季夏食之犬金畜也故秋食之彘水畜也故冬食之然春食羊者以春之氣尚寒故食火畜也夏食雉者以夏之氣尚熱故食木畜也此秦之禮與周之禮不同嵗終則會唯王及后之膳禽不會鄭康成曰膳禽四時所膳禽獻如世子可以會之王氏詳說見膳夫內饔中士四人下士八人府二人史四人胥十人徒百人鄭康成曰饔割烹煎和之稱賈氏曰饔和也熟食曰饔內饔所主在內以其掌王及后世子之膳羞及宗廟之祭皆事之在內者掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物易氏曰割之而烹之以鼎煎之而和之以味左氏載晏子之言曰水火醯醢鹽梅以亨魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心是豈可輕也哉鄭康成曰體名脊脅肩臂臑之屬肉物胾燔之屬也林氏曰所謂左殽右胾或燔或炙是也品味庶羞之屬言百舉成數也王昭禹曰庖人共其物於始饔人熟其物於終所以通職聯事故饔人所掌者割烹煎和之事所用之物則共於庖人也王舉則陳其鼎俎以牲體實之吕氏曰陳設也鄭康成曰取於鑊以實鼎取於鼎以實俎賈氏曰案少牢司馬升羊實於一鼎是曰脀案特牲云卒載加匕於鼎是其實俎曰載史氏曰取牲以實鼎取體以實俎王氏詳說曰內外饔言鼎俎亨人言鼎鑊蓋初陳鼎於鑊西故言鼎鑊後陳鼎於阼階下其俎皆陳於鼎西南故云鼎俎選百羞醬物珍物以俟饋共后及世子之膳羞鄭康成曰先進食之時常選擇其中御者賈氏曰百羞則羞用百有二十品是也醬則醬用百有二十罋是也珍物者謂八珍之類俟待也王昭禹曰膳夫掌以膳羞養王及后世子則后世子之羞膳亦膳夫掌之也膳夫獨言凡王之饋則后世子之饋非膳夫所進內饔共之而巳王之膳羞言饋而后世子言共者降於王也辨腥臊羶香之不可食者賈氏曰按庖人注云腥雞也臊犬也羶羊也香牛也王昭禹曰腥臊羶香皆天産之物資氣體之養者也所稟之氣一不和則資其味者疾病乘之而至為害不少故內饔辨其可食者取之其不可食者去之凡以謹於奉至尊也牛夜鳴則庮音由羊泠音零毛而毳羶犬赤股而躁卑到反臊鳥皫芳表反色而沙鳴貍音鬱豕盲亡亮反視視二反而交睫音接腥馬黑脊而般音班臂方紙反螻音樓鄭司農曰庮朽木臭也愚按左傳一薰一庮庮即臭也易氏曰牛晝作夜息無故而夜鳴則反常矣其肉必庮賈氏曰泠毛謂毛長也毳謂毛别聚結者易氏曰羊以柔毛為貴毛長而結聚則非善矣其肉必羶赤股股裏無毛非謂肉赤而走又躁疾如此者其肉必臊鄭康成曰皫失色不澤美也沙澌也方氏曰沙鳴鳴之悲涼者土密而暖沙疏而涼故謂之沙王昭禹曰皫色則氣鬱而不達於毛羽沙鳴則氣鬱而不達於聲音其肉氣亦鬱而不可食矣杜氏曰盲視當為望視王昭禹曰有目而視不明謂之盲賈氏曰盲則無所覩見內則為遙望之字故子春從內則也豕乃聽物不合望視此豕眼睫毛交如此者其肉必如星鄭康成曰腥讀為星聲之誤也肉有如米者似星方氏曰黑脊言衆體皆異而脊獨黑也般猶疾之有瘢般在前脛故曰般臂鄭康成曰般臂臂毛有文也鄭司農曰螻螻蛄臭也賈氏曰以內則螻為脫漏字於義無取故轉為螻蛄字也馬脊黑前脛般般然如此其肉則螻蛄臭史氏曰物之形色一受天地謬盩之氣則駁而不純雜而不精食之不致疾者幾希凡宗廟之祭祀掌割亨之事凡燕飲食亦如之賈氏曰內饔不掌外神故云宗廟之祀陳君舉曰宗廟之割亨與王之食同掌是供王之食者此官也供宗廟之食亦此官也以見王以生道事親不以神道逺親意賈氏曰上言掌割亨煎和之事此不言煎和者鬼神尚質不貴褻味凡燕飲食亦如之者謂王及后世子凡燕飲食皆內饔掌割亨之事也凡掌共音具羞修刑膴火吳反胖普半反骨鱐以待共膳鄭康成曰共當為具賈氏曰具羞修刑膴已下也羞庶羞也賈氏曰即百二十品是也修鍛脯也賈氏曰謂加薑桂鍛治之者刑鉶羹也膴䐑肉大臠所以祭者賈氏曰膴魚肉總有膴亦詁為大王昭禹曰胖牲半體也史氏曰骨體之連骨者也鱐魚之已槁者也愚案修已見膳夫修膴胖又見臘人王氏曰此七物有掌之者有共之者各掌其物以待內饔共膳也蓋內饔掌王及后世子之膳則宜選取於羣有司以博珍善故也史氏曰凡此七物又以共庖人焉故掌共其物以待共膳也凡王之好賜肉修則饔人共之王昭禹曰好賜王以好而賜之出於私恩多寡無常惟其所與而已史氏曰物之有形莫不悅生而惡死及受鋒刃赴鼎鑊恐懼痛楚無以異於人人之氣體資是以養不得已而食之祭祀喪紀賔客之燕飲常日之膳羞禮有不可缺者至於好賜之肉修亦隨其所好而豫之非泛泛然無不得也古之養老者曰天子袒而割牲養賢者曰庖人繼肉蓋以王之所好在此而不可已耳王氏曰使內饔則親而私之故也饔人則內饔之屬人也外饔中士四人下士八人府二人史四人胥十人徒百人鄭康成曰外饔所主在外賈氏曰掌外祭祀及邦饗孤子耆老皆在外之事也掌外祭祀之割亨共其脯修刑膴陳其鼎俎實之牲體魚臘凡賔客之飱饔饗食音嗣之事亦如之賈氏曰外祭祀謂天地四望山川社稷五祀皆掌其割享共其脯修刑膴如上所釋也陳其鼎俎謂若鼎十有二也凡賔客之事謂所陳之數如宰夫所云者皆外饔共之故云亦如之史氏曰脯修刑膴凡祭皆用陳其鼎俎兼有魚臘之實者以羣小祀不用牲者或用魚臘也鄭康成曰飱客始至之禮饔既將幣之禮致禮於客莫盛於饔薛氏曰案聘禮云賔至大夫帥至於館宰夫朝服設飱是賔始至有飱禮矣飱小禮也又曰聘日致饔是賔已至則有饔禮矣饔大禮也先鄭釋宰夫以飱為夕食非也賈以饔餼為牢禮亦非也賔至設飱何待乎夕夕禮皆牢何待乎饔愚案飧饔已見宰夫詳見掌客王昭禹曰饗以飲為主行人所謂饗禮九獻之類是也食以食為主行人所謂食禮九舉之類是也饗食又王所以待賔客之厚禮也鄭鍔曰饗有體薦有房蒸立而成禮所以訓恭儉食則有飯有殽酒雖設而不飲其禮以食為主掌其割亨與夫所實者皆如外祭祀之時蓋事賔如事神敬之至也邦饗耆老孤子則掌其割亨之事饗士庶子亦如之賈氏曰耆老對孤子則耆老者死事者之父祖兼有國老庶老孤子者謂死王事者之子程伊川曰外饔酒正皆言饗耆老孤子則酒食未嘗偏廢也周官言饗不言食亦以饗未嘗無食也特以食為下爾言老足矣必曰耆老者容養之以六十而上為率歟以六十養於國故也陳君舉曰饗耆老孤子掌於王之膳人見古人君民一體不厚己以薄人陳及之說見司門羅氏鄭康成曰士庶子衛王宫者若今時之饗衛士矣賈氏曰謂若宫伯所云者鄭鍔曰養老孤其事在外外饔掌之宜矣士庶子在王宫亦以為外事何邪蓋王宫官府之吏已有命位士庶子則未有命位或因作宫衆致之太子比之外事宜矣史氏曰死事之臣忠義之家有親有子饗之致其勸也王宫之宿衛親且近既已均其秩敘頒其衣裘兹復饗之致其愛也致其勸則外之公卿大夫期以死而報上有國爾忘家之心非無家也知一死之後家不至於流離也致其愛則內之士庶子期以身而徇主有君爾忘身之心非無身也知此身之生盡出於君上也師役則掌共其獻賜脯肉之事凡小喪紀陳其鼎俎而實之賈氏曰謂出師征伐及巡守田獵王昭禹曰此於勞還犒師酌其長帥所以有獻賜之禮獻以飲之賜以豫之外饔則掌其脯肉之事史氏曰師以用衆役以任衆憫其勞苦錫之脯肉獻則受之賜則共之所以洽其情而勵其節悅以使民民忘其勞史氏曰小喪紀者一介之士以死勤事者之死喪陳其鼎俎如是為王之臣孰不知以死為上乎賈氏曰謂夫人已下之喪則陳其殷奠及虞祔之鼎俎先王之世其饋餉飲食不過此數者平居節用用不過此而能使天下之臣悉歸於忠義功勳之域則飲食之恩不既大乎亨人下士四人府一人史二人胥五人徒五十人鄭康成曰主為外內饔煮肉者鄭鍔曰鼎卦曰以木爨火亨飪也聖人亨以享上帝而大亨以養聖賢况內外饔所掌上而宗廟下而賔客有王及后世子之羞膳有耆老師役之享賜乎故使下士四人専共鼎鑊之間使沃之以水燀之以薪各得其多少之量而不至於過則亨人雖微所係豈不重哉掌共鼎鑊以給水火之齊才細反鄭康成曰鑊所以煮肉及魚臘之器既熟乃脀于鼎易氏曰俎之所實取于鼎也鼎之所實取於鑊也史氏曰味以調和為主鑊所以亨煮鼎所以調味賈氏曰謂實水於鑊及㸑之以火皆有多少之齊王昭禹曰亨和者水火欲其相當水勝火則物有過於生火勝水則物有過於熟亨人給之欲其適節而已陳及之曰水有美惡火有新舊無官府以掌其事足以傷生害氣職外內饔之㸑七亂反亨煮辨膳羞之物鄭康成曰職主也㸑今之竈主於其竈煮物也史氏曰內外饔之所共廣矣而亨人盡職之不曰掌而曰職掌有所兼職則専之而已賈氏曰膳羞則牛鼎之物也王昭禹曰膳用六牲羞用百有二十品則其物不可不辨也祭祀共大羹鉶羹賔客亦如之鄭康成曰大羹肉湆也賈氏曰肉汁一名湆大羹肉湆盛於登謂太古之羹不調以鹽菜及五味鄭司農曰鉶羹加鹽菜矣賈氏曰謂陪鼎膷臐膮牛用藿羊用苦豕用薇調以五味盛之於鉶器即謂之鉶羹若盛之於豆即謂之庶羞鄭鍔曰太古茹毛飲血所謂羹者血湆而已中古漸文則加滋味於是有鉶羮之薦去古既逺人心滋喪縱口腹之欲窮鼎俎之味聖人懼焉故使祭祀之時薦太古之大羮貴本始也記曰大羮不和貴其質也所以交於神明者非食味之道也反本復古而已有大羮矣則鉶羮次之有鉶羮矣乃薦今世之食示不忘其初也使亨人於祭祀共之謂其職亨飪之事不可不知其本也賔客亦共之謂大亨之時也荀子曰大亨先大羮貴飲食之本也使人人知本安有暴殄天物者哉易氏曰禮之初始諸飲食是以貴之然豈特大羮而已哉醴酒之美而𤣥酒明水之尚黼黻文繡之美而疏布之尚所以貴五味之本反女工之始亦猶是也周禮訂義卷六
