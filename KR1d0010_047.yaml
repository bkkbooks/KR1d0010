body:
  text: 周禮訂義巻四十七宋王與之撰夏官司馬上薛平仲曰春官掌禮所以為厚天下之仁禮不足而後政及之所以為正天下之義仁以起天下不忍不由禮之心義以制天下不敢不由禮之心政典所以有法於夏鄭鍔曰夏者南方之時萬物相見之地於五事為禮夏官掌政欲見政出於禮之意賈氏曰夏整萬物天子立司馬共掌邦政以平諸侯正天下故曰統六師平邦國王昭禹曰馬者甲兵之具王政所重故自夏官卿一人至中士十有六人皆以司馬名官李景齊曰政莫大於軍軍旅之事以馬為急大司馬之職雖不言及於馬以名官觀之其意黙寓若夫馬質校人圉師之類屬於夏官者馬政之詳可覆也惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國鄭鍔曰注謂政者正也上之所以正下也夏官獨謂政官司馬有九法九伐之制所以正其不正斯可謂之政矣王者之於邦國欲使各得其平司馬佐之以政則平也易矣然政職以平邦國治職亦以平邦國何也治出於大宰則平之以道政掌於司馬則平之以政治典則平於順治之前政典則平於叛違之後吕氏曰自夏后氏命𦙍侯掌六師舉政典以誓衆則邦政之掌於司馬舊矣國之大事何者非政獨戎政謂之政何也天下無事寓兵於農然後賦役百為始有所施是政之所從出天下有事舉兵討亂邦之存亡安危係焉其為政之大又不待論此戎政所以獨謂之政統六師而謂之平邦國王者用師之本㫖特為邦國之不平者設耳孫氏曰不曰掌邦兵而曰掌邦政政脩則兵可不試政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人黄氏曰司馬置屬與五官稍異小司馬而下有軍司馬輿司馬行司馬輿司馬掌車行司馬掌卒軍司馬兼掌之軍司馬如天官宰夫地官鄉師以軍名官其職可知易氏曰魯㑹晉師于上鄍輿師受一命之服晉享六卿于蒲圃輿尉受一命之服所謂輿者車也晉作三行以禦狄其後晉中行穆子與無終及羣狄戰于太原毁車為行所謂行者徒也成周師田之法險野徒為主易野車為主於是設二司馬之屬専掌車與徒之任異於五官李嘉㑹曰自小司馬以下皆不見其職掌豈用兵之時他官兼權故職不見邪抑兵事尚宻不當載之書邪二者皆是也先王不以兵機示天下五官治教禮刑事法無不著惟兵法不傳後世司馬法與孫吳尉繚等兼著皆先王所未有陳君舉曰儀禮闕軍禮蓋司馬法即古軍禮也古者百五十五篇今亡其百五十篇以其有者求之必非衰世權謀變詐者所能為也而謂之司馬穰苴兵法非也賈氏曰諸官皆云史十二人胥十二人徒百二十人獨此官史胥徒多者司馬大總六軍軍事尚嚴特須監察故也凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十有五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人薛平仲曰周官序官之例未嘗有序事之法惟司馬所載制軍之事為詳而後官屬之緩急始次第而舉豈非兵者國之大事政典所用以平邦國者其規畫固當蚤正歟自調民之法立民之從事於軍者勞逸出入之相權而力常有餘矣於是萬二千五百人為一軍有不容損益者自制軍之數立國之有軍者内外輕重之相制而勢可得合矣於是王六軍以至小國一軍有降殺之等制焉軍有定制帥其軍者非威令素孚不行也於是大為之將而將皆命卿小為之長而長皆上士有以定尊卑上下之志焉軍有帥則文移之往來政令之征召有不可略於是一軍則二府六史十胥百徒有以為文書調度之備焉舉軍政之要莫先斯四者先王規畫實為之井井繩繩而不紊觀敘事之法可攷黄氏曰凡制軍謂有征行之事則制之縣師所謂受法于司馬以作其衆庶鄉遂各為一軍而都鄙不與及制軍或取於鄉或取於遂或取於都鄙或徴兵諸侯所謂及師大合軍是也萬二千五百人為軍多則増𨽻孟津之㑹諸侯八百猶六師耳泰誓王乃大廵六師大國三軍次國二軍小國一軍平居民籍足充其數非天子命伐有司馬之法未嘗作軍也魯作三軍春秋譏之侯伯專徴兵諸侯亦分屬于其軍城濮之戰楚為三軍陳蔡屬右軍衛屬左軍蓋古法自軍將以下爵秩與鄉官同諸儒遂謂皆六鄉之吏非也伍兩卒旅師軍於鄉為比閭族黨州鄉於遂為鄰里鄼鄙縣遂遂之爵秩逓降於鄉一等邦國都鄙亦有鄉有遂其爵秩亦當有髙下及在軍皆升之使與六鄉等大抵軍吏無小大皆主號令當使其人尊敬之二十五人之長爵中士意可見我藝祖階級之法與三代暗合伍皆有長不必盡有爵以此見不皆為六鄉比長䟽謂衆多官卑略而不言非也五人之長號令狹雖無爵可也衆多不置則或然官卑略而不言則不李嘉㑹曰先王兵制自五人以上必用命士一人為之長至二千五百人則用中大夫故一軍之間卿一人中大夫五人下大夫二十五人上士百二十五人中士五百人下士二千五百人既是士大夫命士如此之多故各自愛不致冒昧邀功以自傷所以古者兵敗止曰敗績不至甚斬首也後世止以首級為貴可傷也伍皆有長不曰下士而曰長長則功罪皆有所歸薛平仲曰軍將命卿其來尚矣啓於甘之戰乃召六卿常武之詩王命卿士南仲太祖太師皇父整我六師皆以卿而帥軍也經謂軍將命卿説者以為天地四時六官之六卿今攷六官中特司馬掌兵餘卿無與雖田役軍旅之事互見六官然特為治事條目云耳初非為軍將鄉大夫掌六鄉之政教禁令序官則曰鄉大夫每鄉卿一人則鄉大夫亦謂之卿先王於六鄉之中設為六卿亦於六軍之中設為六將無事之時總萬二千五百家為之長有事之際又總萬二千五百人為之將帥此六軍之將則六鄉之卿非特此也以六鄉言之自五家之比積而至於萬二千五百家之鄉以六軍言之自五人之伍積而至於萬二千五百人之軍亦猶是耳五家比長以下士為之五人之伍其長亦下士則伍長者即向之比長二十五家閭胥以中士為之二十五人之兩其司馬亦中士則兩司馬即向之閭胥百家之旅師以上士百人之卒其長亦上士百家之黨正為下大夫五百人之旅師亦下大夫二千五百家之州長為中大夫二千五百人之師帥亦中大夫然則軍將之命即向之鄉大夫明矣惟鄉之政教禁令素行於無事之時而斯民之觀感甚深服從甚久一旦起而為軍而將軍者又前日之鄉大夫則前日觀感服從之人皆為今日死節犯難之事鄭氏謂凡軍帥不特置選於六官六鄉之吏自卿以下使兼官焉謂六鄉之吏兼官可也何為復曰選於六官彼蓋無一定之見豈知成周之時六鄉六軍之無異官乎晉悼公時魏絳為司馬張老為候奄鐸遏冦為上軍尉籍偃為司馬使訓卒乘注以為軍將皆命卿猶有先王之遺意愚按此説以軍將為鄉之卿固然謂命卿非王朝之卿恐未然古者畿兵不出境若以王朝六卿兼掌六鄉之軍何害至邦國之軍王制謂大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國二卿一卿命於天子一卿命於其君經以二卿皆命於君者注以為誤則命卿者非是命卿不使之將欲為將者皆出於天子所命之卿以見兵制雖備於邦國兵權不屬於私人此是聖人統御諸侯防患之深意總論調兵愚按天子諸侯兵制已見司馬序官惟周家起民為兵之制散見於經傳周禮亦無明説説家注解雜見於司徒司馬今併類聚于司馬序官云其一小司徒大司馬所謂可任者家三人二人者也其二小司徒所謂起徒役無過家一人者也其三漢志司馬法所謂六十四井出七十五人者其四鄭氏注小司徒引司馬法成十百井三百家士十人徒二十人者陳君舉曰司馬法曰四井為邑四邑為丘出馬一匹牛三頭是為匹馬牛四丘為甸甸六十四井出長轂一乗馬四匹牛十二頭甲士三人歩卒七十二人戈盾具謂之乘馬然則小司徒所制大約民數以中家計之二家十有二人可任用者五人一井八家四十八人可任用者二十人司馬法謂甸出七十五人者蓋於一甸六十四井之中五百十有二家之内一千二百八十人可任用者擇七十五人備征伐籍於司馬陳及之曰班固漢志謂天子畿方千里提封百萬井定出賦六十四萬井兵車萬乘是為萬乗之主一井之田八家耕之總計六十四萬井之田為五百一十二萬夫耕者五百一十二萬家以此夫家之衆而供萬乘之賦蓋七家賦一兵則是甸出七十五人亦七家賦一兵如司馬法之言無疑列國之賦皆同此數王氏詳説曰車一乘合士卒七十五人則一卒所餘在後卒復以五十人合二十五人為一車之士卒則所餘五十人又在後車凡三卒四乘三旅為車二十乘三師而車百乘三軍而車五百乘六軍而車千乘此車人參兩以相糾聨之法愚按司馬法天子地方千里出車萬乘今六鄉之車已及千乘總王畿之内可具萬乘而有都鄙采地天子六軍出於六鄉故千乘因是推之諸侯三軍止及三萬七千五百人有車五百乘司馬法云千乘者亦此意也故説者謂五百乘三鄉所出千乘闔境所出陳君舉曰司馬法又曰井十為通通為匹馬三十家士一人徒二人通十為成成百井三萬家革車百乘士千人徒二千人與前數差錯者前言總籍民兵今言謂發民兵前言四井為邑四邑為丘今言井十為通聚零就整以什起數耳田制以八家為井起筭兵制以十人為什起筭各從其宜前四丘為甸為六十四井五百十有二家其籍於司馬者七十五人今通十為成加三十六井二百八十八家則一成之中百井八百家調𤼵者止三十人以中家計之百井八百家約為丁四千八百人堪任使者二千人籍於司馬者四百人有竒四分當兵之數𤼵其一分之強故八百家止言三百家畨休者常五百家可見周家優民之至陳及之曰司馬法言通十為成者亦併其地言之於一成百井之中三分去一只有六十四井成地與甸地等耳何以明之左氏記少康在綸有田一成有衆一旅旅五百人一成之田百井夏氏地政三分去二而冶其一則可耕凡三十三井井九百畝除廬舍百畝而十六家耕之孟子謂夏后氏五十而貢則頒田以五十畝為制如此則三十三井凡耕者五百二十八家家各賦一人舉其全數而用有衆一旅由是言之則通十為成者亦併其地言之若然周制於六十四井之中五百十有二家之内每七家賦一人凡七十五人故曰甸出甲士三人歩卒七十二人額調𤼵從車則十七家而遣一人凡三十人故曰成百井士十人徒二十人而言三百家者蓋一人行而十家合資之則行者三十人而三百家被其征調也故五百十二家止言三百家餘二百十二家又留以須後如是則兵籍甚具行者益少所以壯國勢休民力及其後王制敗壊遂以甸出七十五人者盡調發之晉之成縣縣方百里而出革車百乘孫子謂興師百萬日費千金怠於道路不得操事者七十萬家是一人行而七家奉之或者見此以為先王之制則失之陳君舉曰周制每一車七十五人今甸出長轂一乘而止𤼵三十人無乃車多而人少乎曰古者軍行凡革車一乘七十五人之外又有重車一乘載衣糧之屬其士卒則有固守衣裝五人廐養五人樵汲五人炊子家十人凡二十五人與正車為百人又備副車為補闕是車不得不多以一同之地論之車百乘士三千人每革車一乘重車一乘通百人則三千人凡用車六十乘餘四五百人今依司馬法籍者七千五百人調者三千人若是差舛何也曰大國三軍蓋諸侯三鄉之地每家賦一人以足三軍之數取其近地為之以為國家武備若其調𤼵則依司馬法之制又曰古者五侯九伯專征而諸侯皆共四方之事畿兵不出案詩文王出車云我出我車于彼牧矣自天子所謂我來矣幽王大東漸漸之石為東勞西逸而有不遑朝處之歎更以周官司馬法參考王有四方之事則冢宰徴師于諸侯曰某國不道征之以某年某日師至於某國小宰掌其戒具虎賁氏奉書以牙璋發之詩常武王命卿士太師皇父整我六師冢宰也王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦小宰戒司馬出征也程伯時為司馬然則畿兵不逺征故劉文公平丘之㑹對晉人曰天子之老請率王賦元戎十乘以先啓行至平王東遷以王人戍申甫而揚之水始刺之矣春秋之初從王伐鄭猶有陳蔡衛之兵二百四十二年之間王人㑹伐屢矣左氏未嘗見王師之出惟敗績茅戎王師自出春秋譏焉至戰國時京師益弱諸侯強大往往猶畏之西周武公告楚猶曰一周當二十晉不百韓不足以伐周説辭雖或過實而事情亦略可據赧王伐秦尚從鋭師以此知畿兵不用其力尚寛大司馬之職掌建邦國之九灋以佐王平邦國賈氏曰此九灋以下皆言邦國以施於諸侯為主鄭鍔曰九灋皆佐王平邦國之典然建牧立監大宰之事設儀辨位大宗伯之事制畿封國大司徒之事大司馬之所謂建者特明其法以布告之鄭康成曰平成也正也愚按平字已見太宰觧王昭禹曰平邦國使強不得侵弱衆不得暴寡以九伐所以正之等之作之維之紏之任之用之安之和之如此茍戾乎此然後九伐施焉則王之平邦國豈遽加以刑辟之威易氏曰言佐王以統御諸侯之權實天子之所自出制畿封國以正邦國陳君舉曰九畿九服周制也要之法度所及止於六服書云六服羣辟罔不承徳其朝貢盡如禮止於五服書云六年五服一朝是也鄭康成曰封謂立封於疆為界鄭鍔曰制畿封國者下文所謂侯畿甸畿男畿以下是也既制為九畿之域乃於其中或封為五百里之公或封為四百里之侯或封為三百里之伯或封為二百里一百里之子男唯畿有定域國有定制則遠近不相侵小大各相比邦國可正設儀辨位以等邦國鄭康成曰儀謂諸侯及諸臣之儀辨别也别尊卑之位鄭鍔曰設儀者自上公九命以至子男五命其國家官室車旗衣服或以九或以七或以五為節是也既設為九等之儀因其儀而為之位公一位侯一位伯一位以至子男同一位儀見於設飾之間而有隆殺位見於著定之際而有髙下其法已定則等差以明名分以敘邦國可等進賢興功以作邦國鄭康成曰興猶舉也作起也王昭禹曰作興詩所謂遐不作人書所謂作新民者同鄭鍔曰見於徳行之謂賢見於事業之謂功賢可尊也受七命者進為八命之牧受八命者進為九命之伯功可録也或加之以地或進之以律進其賢者則不賢者自礪興其功者則無功者知奮邦國可作建牧立監以維邦國賈氏曰此即大宰建其牧立其監林椅曰監乃屬長連帥之比王昭禹曰九州之牧建之於上使有所統諸侯之監一國者立之於下使有所承則萬國由此而相比維與詩所謂紼纚維之同鄭鍔曰二百一十國為州州有伯是之謂牧天子使大夫為三監監於方伯之國三人是之謂監既建其牧又立其監大邦小國絲牽繩連各相繫屬邦國可維制軍詰禁以糾邦國鄭康成曰詰猶窮治也糾猶正也賈氏曰制軍上文大國三軍等是也詰禁者士師有五禁天子禮諸侯亦當有王昭禹曰詰禁或施於國或施於軍或施於刑或施於誓隨事以言詰之黄氏曰軍禁即布憲刑禁康叔為庶殷長成王命之曰外事汝陳時臬司師兹殷罰有倫臬讞也言外諸侯以刑獄讞於牧長而為之師使庶殷刑罰有倫也是詰禁為牧長之職鄭鍔曰無曲防無遏糴無有封而不告無以妾為妻是謂詰禁有軍以馭其亂有禁以詰其違則邦國可糾矣李嘉㑹曰有軍有禁當審所輕重而行之禁施於前軍用於後必曰詰者詰其禁之不行則可以用兵矣施貢分職以任邦國王昭禹曰貢以物言施貢則各以其所有職以事言分職則各以其所能施貢以任其財分職以任其力此之謂任邦國鄭鍔曰侯貢祀物甸貢嬪物男貢器物采貢服物是謂施貢甸服者日祭侯服者月祀賔服者時享要服者歳貢是謂分職貢已施則土地所有不敢不入職已分則職事所效不敢不共則邦國可任矣簡稽鄉民以用邦國王昭禹曰萬二千五百家為鄉大國三鄉次國二鄉小國一鄉所以處民也簡選也稽攷也簡其強弱稽其多寡然後衆可用林椅曰稽其數而簡其可任者師田以閲之故曰以用邦國鄭鍔曰王國簡稽六鄉之民以為軍旅諸侯之國蓋亦同之特無六鄉書云魯人三郊三遂既有郊法則簡稽其民而用之可也有民斯有兵有兵斯有節邦國可用黄氏曰邦國民籍皆在司徒軍籍皆在司馬鄉民其精兵也即其籍稽而用之三代中外皆有精兵無過防偏失之患所恃者其兵皆知仁義禮樂之訓不可與為亂而已林椅曰簡稽之法具於鄉遂師田之賦令於司馬作於縣師盖於其比聨可以稽其可任之數至車乘之政必丘甸合而後卒伍具均守平則以安邦國鄭鍔曰城郭溝池任其萬民均其守禦無使國大而所守者狹國小而所守者廣匡人達法則以匡邦國使無敢反側以聽王命無使職貢宜輕者或過乎則宜重者或不及乎則守均則力不困則平則心不疑而邦國可安王昭禹曰諸侯為天子守土則均守者均其地守也匡人達法則正邦國則平則者平其八則也都鄙非無守也以邦國為主邦國非無則也以都鄙為主地守既均則逺近無相侵奪之患八則既平則髙下無或僣忒之愆邦國於是安而無危比小事大以和邦國鄭康成曰比猶親使大國親小國小國事大國相合和也易比象曰先王以建萬國親諸侯鄭鍔曰大國恃其強足以吞併小國忘其微敢於倔強使大者不恃其強而絶之小者能盡其禮以承之則邦國可和總論孫氏曰天官經理邦國者也故曰治夏官董正邦國者也故曰政司馬統六師則九伐之法莫先焉先王姑後之首欲建邦國之九法何也盖九法皆政之大者所當脩明於國家閒暇之時九法常明諸侯皆歸於康樂和親之域奚以九伐為九伐特不得已而用之以九伐之灋正邦國鄭鍔曰諸侯有罪輕重不一至用兵以誅討之必聲其罪左氏曰有鐘鼓曰伐言聲其罪也賈氏曰下文惟賊賢害民言伐此總言伐者皆以兵加其境馮皮氷反弱犯寡則𤯝所景反之鄭康成曰馮猶乘陵也言不字小而侵侮之鄭鍔曰王氏本注説𤯝字謂詘其爵命削其土地使強更弱衆更寡若人之𤯝瘦然未免與下文削之相似𤯝宜如易有𤯝災之𤯝用兵治之使若𤯝災然不能逃其患也李嘉㑹曰𤯝之謂宣揚辭令以明其惡使之自𤯝賊賢害民則伐之鄭鍔曰伐如伐木之伐去其根本勿使再生之理賢足以長民賊之是不義民者邦所恃害之是不仁聲罪而伐翦夷去之暴内陵外則壇音善之鄭鍔曰暴内則為惡於國中陵外則肆侮於四鄰不可以為君宜除而去之如除地為墠之墠鄭康成曰壇讀如同墠之墠王霸記曰置之空墠之地置之空墠以出其君更立其次賢者劉執中曰壇者時㑹發禁以誅之也野荒民散則削之鄭鍔曰王者量地以制邑度地以居民為諸侯者有田野不能治至於荒蕪有人民不能聚至於離散則不能保有其大也故削之使小如漢削諸侯王郡是也譙郡張氏曰先王知禮義本原起於稼穡之際故於農事常先天下之政諸侯助成王祭臣工之詩因其歸而戒以農事由此故也先王廵四岳較諸侯之善惡其慶始於土地辟田野治其罰始於土地荒蕪田野不治夫戒諸侯之事莫急於新畬之勤制諸侯之賞罰莫先於田野之政先王之意可知矣負固不服則侵之鄭康成曰負猶恃也固險可依以為固也不服不事大也鄭鍔曰侵如侵于之疆之侵説者以為粗曰侵又云淺曰侵謂略以兵加之蓋恃險者必坐而困敵國攻險者必至於多殺人侵之以兵使知險之不足恃乃控制負固之良䇿賊殺其親則正之鄭康成曰正之者執而治其罪王霸記曰正殺之也鄭鍔曰正者正也親親之道以三為五以五為九賊之殺之則是不知有人倫者也正者明其尊卑之序定其昭穆之等執而殺之可也衛侯殺其弟叔武晉人執而歸之京師盖以正賊殺其親之罪也而徒用醫衍酖之失先王正之之法矣放殺其君則殘之鄭康成曰放逐也殘殺也王霸記曰殘滅其為惡犯令陵政則杜之鄭康成曰令猶命也王霸記曰犯令者違命也鄭鍔曰以諸侯而抗天子之命陵政者輕政法不循也鄭鍔曰陵政以諸侯而侵天子之權杜之者杜塞使不得與鄰國交通外内亂鳥獸行下孟反則滅之鄭康成曰王霸記曰悖人倫外内無以異于禽獸不可親百姓則誅滅去之也曲禮曰夫唯禽獸無禮故父子聚麀劉執中曰滅者斷盡其根使不生總論鄭鍔曰當其盛時制為九等之名以治輕重之罪其數若此李嘉會曰九法九伐必曰九取陽剛而不屈也林椅曰邦國之事不屬之司馬則屬之司冦如九法九伐職方氏之類見於夏官掌客司儀行人之類見於秋官者司馬將以施邦國之政職司冦之詰邦國無非糾而合之也若上無政刑雖曰封建其能安且治乎正月之吉始和布政於邦國都鄙乃縣政象之灋于象魏使萬民觀政象挾日而斂之鄭康成曰以正月朔日布王政於天下至正歳又縣政法之書愚按餘説見天官易氏曰政謂九法九伐之類布於邦國都鄙可也萬民何與焉聖人惟能合民之情内外逺近通行無間而後可以言政乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿鄭康成曰畿猶限也自王城以外五千里為界有分限者九鄭司農曰春秋傳曰天子一畿列國一同詩殷頌曰邦畿千里王昭禹曰九畿又謂九服畿言其有界畫服言其服王事鄭康成曰籍禮差之書黄氏曰政職司馬政典所當奉行者也其主在兵故令賦在其下鄭鍔曰政職者歳事之常大宰以九貢致邦國之用則政職之施本於大宰乃使大司馬以九畿之籍而施之者先王之意以為列天下為九畿載於籍以為典故施之以職使奉承而無替不可不使畏王朝之威也徳以懷之故大宰九貢可使之自至威以服之故司馬九籍可使之不違賈氏曰侯候也為天子伺候非常王昭禹曰以言扞外而蔽内甸者為天子治田以出賦貢王昭禹曰以言井牧其地什伍其民男者任也任天子之職事鄭鍔曰言於此建子男之國采者采取美物以共天子鄭鍔曰天子千里之外曰采地衛者為天子衛守蠻者縻也以近夷狄縻繫之以政敎鄭鍔曰蠻之為言緡也逺王國者羈縻之足矣自此已上六服是中國之九州自此以外是夷狄之諸侯此蠻服與大司徒要服亦一也要者要束以文教也夷者以夷狄而稱也鄭鍔曰夷之為言易也又其逺者當以簡易之道處之鎮者去中國稍逺理須鎮守也王昭禹曰鎮如四鎮之鎮以安鎮中國為主稱此三者總號蕃服故大行人云九州之外謂之蕃國王昭禹曰自侯畿至衛畿謂之中國所謂疆以周索也自蠻畿至蕃畿謂之四夷所謂疆以戎索也陳君舉曰曹去王城八百里乃為甸服鄭去河北宻縣百七十里乃為男服曹順流極便鄭有城北虎牢之險然則五服惟以便不便為義非若畫為碁局然也王氏曰方千里曰畿則禹貢所謂甸服也甸服面五百里則為方千里矣其外侯畿甸畿禹貢所謂侯服也又其外男畿采畿禹貢所謂綏服也又其外衛畿蠻畿禹貢所謂要服也又其外夷畿鎮畿禹貢所謂荒服也又其外蕃畿在禹貢五服之外易氏曰此言外方五百里則以方言之非言面也以方言之是每面面二百五十里兩面之方為五百里自侯畿至蕃畿通為二千五百五十里兩面相距通為四千五百里并王畿千里通為五千五百里其増於禹者五百里之蕃服耳然周之蕃服雖不列於禹貢九州之外而禹貢九州之外或建五長東漸西被即成周蕃服之域是周之蕃服其名雖増於禹而地未嘗増也陳及之曰周九州之閒雖方七千里大概與四夷八蠻七閩九貉五戎六狄并言之其實諸侯封守之地不如是廣也然必兼夷狄言者以見當時王化所被者廣九州之閒悉同貫利悉奉正朔朝貢與内諸侯無異故職方氏并言之或者泥大行人之説謂九州之外謂之蕃國自要服以上朝覲有常節貢賦有常職為内諸侯無疑也不知大行人亦約言之耳非必九州之内皆諸侯九州之外皆夷以王制考之西不盡流沙南不盡衡山東不盡東海北不盡常山凡四海之内斷長補短方三千里是天子壤地之實其閒亦有戎狄錯居其閒如魯徐戎之類是又荆楚之地在江漢之閒自楚以南悉百越之地而衡山在楚之極南安在天子之封内邪推一邉而言則四旁可知矣唐氏曰先王畿次内中夏外夷狄雖一視同仁必篤近而舉逺至畫為九服要荒在外為之限禁其來有時所以止暴亂之階遏侵凌之禍自堯舜三代所不廢也愚按餘説見職方氏林椅曰司馬制軍而建國之法具焉蓋文王演易箕子明疇其營國營軍同一法也故韓宣子適魯見易象與魯春秋知周禮之在魯且以七萬五千人隨方圓曲鋭可以應敵而不亂則分為九州輪為九畿自百里以至五百里之分宜無不齊則兵者政之所自出凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人李嘉㑹曰司馬令賦必兼地與食言之酌民之力而後令之也故曰可用之數黄氏曰軍賦小司徒令之大司馬又令小司徒掌民事通于軍賦大司馬掌兵而軍賦所出不可以不知言凡自鄉遂逹于邦國都鄙矣康成獨言令邦國之賦非也六鄉亦以地之媺惡人之多寡授田鄭獨曰如遂亦非也國野賦税異制而百畝之利必均上中下地媺惡雖不等而以易田均其力故其歳入多寡亦不甚較據百畝計之上地入雖多而食者衆故為三之二中地食者少故為半下地食者益少故為三之一令賦必先使民食不闕而後共賦先足其食而後餘用取具焉故曰必不得已而去於斯三者何先曰去兵司馬主賦而民食先之異乎後世之為兵矣鄭鍔曰説者謂上地中地下地非上農夫下農夫也以中等寄明上下之義耳上地者中地之上中地者中地之中下地者中地之下家八口以上則授上地上地乃有田百畝莱五十畝故得以食其半一人為家長可任者當二家五人此云上地食者三之二既非八口之上地矣又家出可用者三人又非八口共出七人之數故説者言用中等以寄明上下之義以為諸侯之國其制然也司徒言可任者以力役為主此言可用者以用兵為主劉氏曰小司徒均土地稽人民周知其可任之數蓋與此同而曰凡起徒役母過家一人以其餘為羡唯田與追胥竭作則司馬令賦以地與民制之者竭作其羡于四時之田也或家三人或家二人或二家五人皆所以教之戰也伍兩卒旅師軍為正兵者鄉遂十有五萬人而羡卒在外郊野都鄙之兵又在其外莫不軍制其師師制其旅旅制其卒卒制其兩兩制其伍而大司馬總其軍而卒以為用也既習之以田獵又試之以追胥馳騁之而隊伍罔差𤼵刺之而進退用命為其可以起六軍而行九伐也則家選一人而精強可獲矣軍無闕數戰無敗軍由教之者衆而用之者寡焉聖人之慮精宻如此此司馬所以肅諸侯而正邦國也乃因四時之田以教戰也林椅曰制軍與令賦自是二事制軍以夫家衆寡為之施舍令賦視其地之可任之數且如一軍萬有二千五百人通以上地豐年計之役之三月而畢計當可任者一百十二萬二千人蓋力征財征自是二事故也嘗疑王畿千里故天子六軍千里之地以封公者四而大國三軍是十有二軍也況小大之國參錯而居則舉一州之兵不啻倍天子之軍則封建為不利於王也又國益小而賦役益繁則封建為不利於民也然當時行之後世頌之何哉蓋制軍以命卿命卿所以簡習其民耳上地可任者家三人豐年公旬用三日是一百十二萬二千人之賦可役萬有二千五百人三月而畢故侯國之兵不自用亦不足用也五伯之盛非得列國之兵則不能成兵車之㑹至其盛者亦不過成師以出其受伐者則有悉境内之兵以應之者矣是列國之兵可以守而不可用以行也故天子曰萬乘諸侯曰千乘與夫三軍六軍之數亦數賦而約言之耳周禮訂義巻四十七
