body:
  text: 周禮訂義卷十三宋王與之撰九嬪鄭康成曰嬪婦王昭禹曰女之賔從於主謂之嬪書于二女言嬪于虞九嬪以賔從於主為義故亦謂之嬪昏義曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章婦順故天下內和而家理不列夫人于此官者夫人之於后猶三公之於王坐而論婦禮無官職黃氏曰鄭引昏義六宮有三夫人以經考之恐非內小臣擯詔后禮事相九嬪之禮事寺人佐世婦治禮事無擯佐夫人者女御比士妻世婦比大夫妻九嬪比諸侯夫人其言二十七世婦八十一御妻亦恐非周官大夫元士不止於二十七八十一其為內外相敵之數未可信也若曰數當立此以戒廣色則或恐是曰九嬪疑若一娶九女因以名之王娶下比諸侯薛平仲曰周官言夫人多矣而夫人曽不列於官九嬪世婦女御又不言其數三公固無官也嬪婦女御之以德進者不徒求以充位也內宰自內豎以上皆所以紀綱王宮之治而九嬪以下所以輔成王內之治者非法不立非人不行內外蓋一道所以敘次之别如此陳君舉曰婦人女子常與至尊幽居九重人弗得見驕蹇自恣無所不至故使之分職於六宮附屬於冡宰而天官內宰春官世婦又得以參檢其事與夫婦妾賤人自相使令而無畏忌者不同矣漢髙欲立戚夫人子留侯曰骨肉之間雖臣等百人何益袁盎却慎夫人坐文帝怒説以人彘乃從使大臣得與內事其如是乎後世一女專恣而公卿附離之不暇尚何冡宰之能率掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所賈氏曰婦學之法謂婦人所學之法所謂婦德婦言婦容婦功也易氏曰內宰言其學之已成者故謂之隂禮九嬪言其學之未成者故謂之婦職王氏詳説曰內宰之教舉其要也九嬪之教致其詳也故以婦學為言史氏曰九嬪受教於內宰謂之隂禮故能知內學之法法者規矩準繩也鄭康成曰九嬪以下九九而御於王所九嬪既習於四事又備於從人之道是以教女御鄭景望曰九嬪言教九御而不言教世婦則世婦亦必婦德之成者而後為之史氏曰教九御則世婦御妻內人皆在劉執中曰一曰婦德以柔順貞潔為本而皆本於德史氏曰周南之詩無非后事關雎首篇明后妃之德則德之為本固可知也惟其有德則外之為賢君子內之為賢婦人他或未能不害其為賢茍無其德徒有其言則婦有長舌維厲之階茍無其德徒有其容則色之蠱媚傾人之國茍無其德徒有其功則牝雞之晨惟家之索何足道哉惟其以德教之於前則三者自然類進故為婦道之全此教之之法必先於德二曰婦言者言其心之聲心懷溫柔則言溫柔心懷正順則言正順鄭鍔曰婦有長舌維厲之階詩以為刺牝雞之晨惟家之索書以為戒婦人之言其可妄出諸口乎教以婦言者欲其寡訥也三曰婦容者謂用禮以正其容也容見於身則動根於德德以正其心而禮以正其容故能步武成於宮商動靜中於禮樂詩不云乎被之僮僮夙夜在公被之祁祁薄言旋歸鄭鍔曰冶容誨淫易係以為盜之招妻美而艷孔父所以見殺婦人之容其可以不婉娩乎教以婦容者欲其婉娩也四曰婦功功者德行之實有德行以飭其身而無功實以事其上雖有寵祿不足以自固矣故有宗廟之祭祀籩豆之濯溉不可以不致其潔有王后之奉養膳羞之精雋不可以不盡其心有祭服之玄黃歲功之所施不可以不致其力有粢盛之饋食薦徹之贊佐不可以不盡其禮鄭康成曰婦功謂絲枲鄭鍔曰教以婦功者欲其知蠶織也驕侈之習與性俱成安知四事為不可忽所以有賴於九嬪之教鄭康成曰教各帥其屬者亦使九九相與從於王所息之燕寢御猶進也勸也進勸王息亦相次敘凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而遍云自望後反之孔子曰日者天之明月者地之理陰契制故月上屬為天使婦從夫放月紀賈氏曰謂月初卑者為始望後尊者為先御見之法無正文鄭以意消息之史氏曰嬪有九三倍之為世婦九倍之為御妻各帥其屬帥其所分教者以時進御於君故曰敘敘者有節而不亂蓋氣血有限而顔色無窮茍無其節則耗憊隨之凡祭祀贊玉齍音咨贊后薦徹豆籩賈氏曰祭祀之時男子進俎婦人設豆籩簠簋贊助也助后薦玉齍鄭康成曰玉齍玉敦受黍稷器賈氏曰豆籩言贊薦徹而玉齍直言贊不云薦徹明直贊進而已鄭鍔曰故書以玉齍為王齍王安石用其説乃謂下言贊后則上言贊王言之序也以經考之大宗伯奉玉齍小宗伯逆齍肆師表齍盛告潔凡此皆贊王也禮官當贊王則九嬪所贊者皆贊后謂為贊王非也王氏詳説曰大宗伯云奉玉齍小宗伯云辨六齍之名物使六宮之人共奉之是玉齍之事非王后之所奉然共齍者六宮之人奉齍者大宗伯進齍者后贊后之進齍者九嬪若夫籩豆之事雖存於有司而薦徹籩豆者后之事蓋婦人無非無儀惟主中饋況籩豆奉承宗廟得不為后之事乎至大祭祀后不預則大宗伯攝而薦豆籩徹醯人醢人皆以奄與女奚掌之所以知其為后之事明堂位曰君肉袒迎牲于門夫人薦豆籩是已若有賔客則從后賈氏曰后有事於賔客謂助王享燕時九嬪則從后往林氏曰九嬪之從后猶宗伯之從王鄭康成曰當贊后事大喪帥敘哭者亦如之賈氏曰大喪王喪鄭康成曰亦從后帥猶道也后哭衆之次敘者乃哭王氏曰大喪外宗敘內外朝暮哭者九嬪亦從后帥之世婦王昭禹曰執箕帚以事人者謂之婦記曰納女於天子備灑掃婦之事人有廣嗣之義故謂之世婦鄭節卿曰天官世婦以廣嗣為義春官世婦卿以掌女宮之宿戒名同而官異不得不分內外鄭康成曰不言數者君子不茍於色有婦德者充之無則闕掌祭祀賔客喪紀之事帥女宮而濯溉古愛反為齍盛鄭康成曰濯滌也溉拭也為猶差擇賈氏曰祭祀黍稷舂人舂之􅐪人炊之故知此世婦非舂非炊是差擇也鄭鍔曰所用之器則濯溉以致潔所奉粢盛則差擇以致精先王之置世婦豈徒奉左右以為悅哉其所掌者重矣王氏詳説曰少牢曰甕人溉鼎俎廩人溉甑甗司宫溉豆籩是灌溉之事為男子之職周禮以女官而濯溉此所以與少牢異故曰周之禮樂庶事備及祭之日涖音利陳女宮之具凡內羞之物鄭康成曰涖臨也賈氏曰案春官世婦宮卿云掌女宮之宿戒及祭祀比其具此官直臨之而已內羞房中之羞賈氏曰謂糗餌粉餈案少牢皆從房中而來王昭禹曰內羞則籩人醢人為王及后世子共之及祭之日世婦涖陳之總論劉執中曰王與后之祭祀賔客喪紀外有百執事各帥其屬夙夜厥職非不可以備其物致其誠也必使九嬪世婦躬涖乃事又俾女御從而觀焉蓋以婦人不事于宗廟賔客喪紀則不知所以事上之道豈獨使之致已之誠哉亦所以役之艱難俾盡其敬也此關雎之后妃召南之夫人立教於前而周官所以帥而習之於後掌弔臨于卿大夫之喪鄭康成曰王使往弔賈氏曰案司服公卿大夫皆王親弔之此又使世婦者蓋使世婦致禮物但弔是大名雖致禮亦名為弔是以大僕云掌三公六卿之弔勞注云王使往小臣云掌士大夫之弔勞注云致禮同名為弔是其事也王氏曰世婦視大夫故使弔臨于卿大夫之喪總論葉氏曰自古婦人之賢者蓋不易得故生則寢之地以教其卑衣之裼以教其正弄之瓦以教其事既十年則姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十五而笄二十而嫁先嫁之三月或教于公宮或教于宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順如此而後備於從人之道況夫王之北宮當貫魚之寵者可以非其人哉後世人主不擇德而以色甚者或取之倡優下賤如漢趙飛燕李夫人之屬是也曲禮納女子于天子曰備百姓言以廣子姓耳深山大澤實生龍蛇母子傳類亦不可忽晉愍懷太子宮中為市使人屠酤手揣斤兩輕重不差其母屠家女也先王之制百二十人猶以無人而闕之其至難至謹如此女御鄭康成曰昏義所謂御妻御猶進也侍也王昭禹曰預於燕寢之事則事之至賤非若婦有敵夫之意故但曰人女御而已史氏曰御之為言如馬之在御必俟鞭䇿然後遲速緩急不失節外有僕御內有婦御皆職之賤亦有九嬪教以婦學使之不失於正掌御敘于王之燕寢劉執中曰九嬪云以時御敘者朔望尊卑之敘此言御敘于王之燕寢者以九人長少為敘林氏曰小星詩曰進御於君知其命有貴賤所謂御敘則有貴賤差别之名故也鄭康成曰于王之燕寢則王不就后宮息王昭禹曰王有六寢一為路寢五為燕寢女御御敘之所九嬪言王所此言燕寢實一也李氏曰女御掌敘于王之燕寢不使九嬪世婦掌之防上之專妬蓋女御官卑不敢嫉妬自專則內無怨女子孫衆多夫飲食男女人之大欲一有失時則大傷和氣七月女心傷悲東山婦歎于室安得聚少艾之色幽於深宮而無進御之路其情之感動如何哉以歲時獻功事王昭禹曰歲時者歲終之時典婦功所謂秋獻功是也鄭康成曰絲枲成功之事史氏曰嬪婦化治絲枲女功之常女御掌獻其事則其勤惰又有勸懲矣凡祭祀贊世婦王昭禹曰祭祀之事世婦所掌女御預贊之事鄭康成曰助其帥涖女宮也大喪掌沐浴鄭康成曰王及后之喪賈氏曰王及后喪沐用潘浴用湯始死為之於南牖下但男子不死於婦人之手今王之喪亦使女御浴者案士喪禮浴時男子抗衾則不使婦人今王之喪沐或使婦人而浴未必婦人或亦供給湯物而已亦得謂之掌后之喪持翣所甲反鄭康成曰翣棺飾持而從柩車黃氏曰案禮器云天子八翣又漢制度皆戴璧后喪亦同將葬向壙之時使此女御持之左右各四人故鄭云持而從柩車王氏曰后之喪持翣者女御以蔽飾后為事從世婦而弔于卿大夫之喪鄭康成曰從之數蓋如使者之介云賈氏曰世婦象大夫女御象元士但介數依命數為差則王之大夫四命世婦之從亦四人女祝四人奚八人鄭康成曰女祝女奴曉祝事者鄭鍔曰古者聖王設董祭之官絶地天通人神不相雜擾故無事於巫祝後世官廢神有不安其所而為妖於人人有不得其安而祈福於神聖人在上因人情而設巫祝之官是故在國祀之禮則有大祝甸祝詛祝之司在王宮則有女祝以女奴曉者四人為之薛平仲曰人情莫敬於鬼神而鬼神易以惑莫畏於簡書而簡書難以守惟知鬼神之有常禮則所以敬之者不可得而惑惟知簡書之有公法則所以畏之者有可得而守女祝之設所以使之敬鬼神鬼神之禮定矣則妖誕之説果何自而入而巫蠱之禍亦何自而見乎女史之設所以使之畏簡書也簡書之法嚴矣則彤管之煒豈不甚可樂而靜女之刺何自而作乎格其邪心於幽隱之微杜其私心於記録之逺女祝女史次於女御之後所以為王內之助者深掌王后之內祭祀凡內禱祠之事鄭康成曰內祭祀六宮之內竈門户賈氏曰祭法王立七祀有戶竈中霤門行泰厲司命后亦與王同今鄭直云竈門户者以婦人無外事無行與中霤等其竈與門户人所出入動作所由后亦當祀之也案月令春祀户夏祀竈秋祀門后祀之時亦當依此王昭禹曰內祭祀之在內者若五祀之類是也禱疾病求瘳祠報福王昭禹曰祈福曰禱賽禱曰祠鄭鍔曰內祭祀則宮中之祭是事之常也內禱祠則疾病之禱是事之非常也掌以時招梗古猛反禬古外反禳如羊反之事以除疾殃賈氏曰招者招取善祥梗者禦捍惡之未至禬者除去見在之災禳者推却見在之變異王氏曰禬以禬福禳以禳禍禬以會福而以神仕者曰以禬國之凶荒民之札喪則弭凶荒札喪乃所以會福此四者皆與人為疾殃故云除疾殃也王昭禹曰招梗者施於未然之前禬禳者施於已然之際招梗禬禳顧何施而不可然女祝掌其事亦固有時矣以男巫考之春招弭以除疾病冬堂贈無方無算則招梗者必於春之時禬禳者必於冬之時以春為一歲之始招祥梗災宜於時之始冬為一歲之終禬福禳禍宜於時之終賈氏曰以時者謂隨其時不必在四時陳君舉曰胡五峯謂宮闈不當有此且曰此殆漢世女巫執左道入宮中為厭勝之事耳是蓋未察先王之意古人通天人徹幽明動則有祭故食則祭先飯桑則祭先蠶農則祭先嗇與夫祭行祭門祭竈祭表貉祭先牧祭馬祖等類不一不惟不忘初之意蓋神所在有之故所在祭之皆先王謹微之意所以自盡焉外朝有司巫男巫女巫內朝有女祝所掌者大抵類後世淫祀祈望非福然先王不以為不可必設官以掌之者交三才之道也推其意皆為祈福祥求永貞設而必若此者人臣愛上之祠華封之祝堯天保之報上亦其義耳若曰人事既盡此等事一切勿講則非聖人之意後世人主不修人事祈望非福若秦始皇漢武帝之求神仙梁武帝之奉佛法又非先王事神之本意愚案孫説見女巫後女史八人奚十有六人黃氏曰鄭曰女祝女奴曉祝事女史女奴曉書者蓋與女酒女漿同也酒人列職故女酒為女奴曉酒者漿人列職故女漿為女奴曉漿者可也女祝女史各自列職其事略如春官大祝大史故上聯嬪御與酒漿醯醢不同必非女奴也劉執中曰女史八人蓋擇嬪御之賢者為之張氏曰女史八人令執彤管在宫中書王后夫人之佐治宮女德之善惡及進御煩碎之事皆書之故宮女懼而修德鄭鍔曰古者天子有史官左記言右記動故為天子者不敢有過舉后與王同體言動不謹則家道不齊無以舉天下之內治故有女史愚案薛平仲説見女祝掌王后之禮職掌內治之二以詔后治內政王昭禹曰王后之禮各有所職若祭祀之禮則有薦徹賔客之禮則有獻酬其職女史掌之王后以禮動當以其職告上鄭康成曰內治之法本在內宰書而二之王氏曰二內宰之所掌逆內宮鄭康成曰鉤考六宮之計賈氏曰謂六宮所有費用財物及米粟皆當鉤考之王氏曰治正后宮書內令鄭康成曰后之令賈氏曰書而宣布六宮凡后之事以禮從賈氏曰大史以書協禮事執書以詔王此女史亦執禮書以從后王氏曰以禮籍從焉詔后故也史氏曰施之於事曰治內政考女宮以計曰逆內宮紀后之命曰書內令繼之以凡后之事以禮從則知后之言動皆當合於禮是故戒慎於所不覩恐懼於所不聞則於禮也庶幾其可書矣典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人鄭康成曰典婦功者主婦人絲枲功官之長宮正疏曰諸言典者出入由已課彼作人故謂之典陳君舉曰凡三官悉用士人先王以此人主奢儉所係國家利害所關非士大夫為之則害國亂政必不得已與內宮相關通如內小臣縫人之類則用宦者耳賈氏曰有賈四人者以其絲枲有善惡貴賤則須賈也史氏曰婦人女子嫉妬貪鄙驕奢淫佚皆起於飽食終日無所用心今使之趨作不倦則心之所存日在於此不見異物而遷正有賴於典婦功掌婦式之法以授嬪婦及內人女功之事齎音咨王昭禹曰式言所用之式法言所治之法所用之式則多寡之數所治之法則精粗之度知其所為之法然後可授其為女功之事齎劉執中曰婦有貴賤則職有重輕授有多寡則功有粗良故有婦式鄭鍔曰或謂大宰有嬪婦化治絲枲謂之任萬民則指民間之嬪婦言也今此典婦功之官掌授嬪婦女功之事齎鄭康成謂容國中婦人賢善工於事者若如是説則民間嬪婦皆授絲枲於宮然後為布帛官何以給之哉此言嬪即九嬪也言婦即世婦也彼皆舉婦功於宮中宜給以布帛之齎非民間任化治之職者何以知之以其言掌婦式之法以授嬪婦及內人女功之事齎推之可知蓋上言嬪婦下言內人非王宮之嬪婦而誰歟又況所獻之物為以共王及后之用又頒于內府則非民間嬪婦之所化治明矣賈氏曰內宰作二事及婦功惟據九御而言不言九嬪世婦有絲枲之事鄭以九嬪世婦者惟三夫人無職九嬪已下皆有之然女御四德不偹故須教之九嬪世婦素解不須教也黃氏曰九嬪世婦通乎諸侯夫人大夫妻典絲所謂內外工也及內人殊之於嬪婦鄭康成曰事齎謂以女功之事來取絲枲史氏曰授其齎者給其絲枲之物黃氏曰事齎治絲枲之事及轉致雜費凡授嬪婦功及秋獻功辨其苦音古良比其小大而賈音嫁之物書而楬其列反之易氏曰鄭氏謂授當為受非也當為授字謂授嬪婦功之後及秋獻功耳鄭司農曰苦讀為盬謂分别其縑帛與布紵之粗細皆比方其大小賈氏曰司農之意以典婦功是都司總掌故分别布帛其典絲唯主絲絲其良者也典枲唯主布布為苦者也史氏曰辨苦良工有巧拙也比小大功有等差也賈之者估其直之低昂書而楬之者榜其物以見凡目鄭景望曰典婦功典絲典枲皆楬賈何也其亦日省月試既廩稱事以勸勵百工之意以共王及后之用頒之于內府黃氏曰典婦功詔典絲典枲共之賈氏曰於典絲典枲處受其良好者入此典婦功藏之以待王及后之用故藏之於內府也王昭禹曰頒之於內府者所以待邦之大用共四方使者及好賜之所用典絲下士二人府二人史二人賈四人徒十有二人史氏曰天下之絲皆出於𧖟一𧖟所吐謂之忽五忽謂之絲則一絲之得亦不易矣後世親𧖟之禮廢衣服悉備於四方之土貢故取之盡錙銖用之如泥沙無一分顧惜由其不知所自來典絲之職亦先王恭儉節用之一助掌絲入而辨其物以其賈楬之掌其藏與其出以待興功之時黃氏曰凡絲皆掌其入是亦為一府藏也典枲亦然鄭康成以絲入為九職嬪婦所貢絲非也閭師任嬪以女事貢布帛不貢絲此當是九貢禹貢兖州厥貢漆絲青州厥貢絲枲賈氏曰后宮所𧖟之絲自於后宮用之以共祭服不入典絲其歲常貢之絲若禹貢兖州漆絲之等且餘官更無絲入之文亦當入此典絲也辨其物者謂絲有善惡粗細不同王氏曰以其賈楬之防其賤貿貴黃氏曰以其賈楬之將以為授功獻功之程鄭康成曰絲之貢少藏之出之可同官也時者若溫暖宜縑帛清涼宜文繍頒絲于外內工皆以物授之黃氏曰外內工九嬪世婦及諸侯夫人大夫妻賈氏曰上典婦功授嬪婦功鄭以為九嬪世婦此注內工直云女御者案內宰教女御作二事九嬪教九御以婦職則女御專於絲枲九嬪世婦四德自備不常為絲枲假使為之以其善事所造惟典婦功以共王及后所用不在典絲典枲賈氏曰以物授之若縑帛則授以素絲若文繡則授以綵絲王昭禹曰亦防其以賤貿貴凡上之賜豫亦如之鄭康成曰王以絲物賜人王昭禹曰賜豫所用者有貴賤不同亦皆以其物授之及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜豫黃氏曰鄭康成改良為苦非也又曰其良功典婦功受之亦非也典婦功掌授功之政令典絲典枲掌其出入典婦功非府藏之官猶大府之於內外府良功絲功縑帛鄭鍔曰典絲之職以絲為主則獻功之時受絲功之縑帛故曰受良功蓋物之美有曰良絲視麻為至美對苦而言則良為精苦為粗故有苦良之義對縷而言則絲功謂之良功麻功謂之苦功良功絲之縑帛典絲受之苦功麻之布縷典枲受之與典婦功之所受者不相干典婦功於秋獻功則受嬪婦之功受齎於典婦功之官故彼得而受之非此典絲所頒之絲彼所謂辨其苦良者謂嬪婦之功有苦良耳王昭禹曰有司之政令若司服辨師所司之政令劉執中曰待有司之政令謂給邦之百用玉府言王之好賜內府言王及冢宰之好賜豫此言上之賜豫又非特王及冢宰而已蓋王后夫人所用皆在是矣凡祭祀共黼畫組就之物鄭康成曰以給衣服冕旒及依盥巾之屬白與黑謂之黼采色一成曰就薛氏曰天子之巾曰黼巾位曰黼依無非黼也天子佩白玉而玄組綬素絲組之良馬五之則馬與佩亦用組也然祭祀之用絲者莫急於冕服黼畫則其服也組就則其冕也在衣而繢在裳而繡黼之於裳則繡矣此曰黼畫者周人以黼為尚耳詩曰玄衮及黼書曰麻冕黼裳此典絲之所以首黼畫也天子繅斿十有二就就成也曰組就者以組為就也故典絲言良工者其致美乎黼冕之意歟史氏曰朱緑玄黃止為祭服而不敢他用知其難得也喪紀共其絲纊音曠組文之物鄭康成曰以給線縷著盱口綦握之屬青與赤謂之文賈氏曰云線縷者釋經絲謂所裁縫皆用線縷也云著盱口綦握之屬者釋經纊組案士喪禮握手玄纁裏著組繫喪大記屬纊以俟絶氣內則云屨著綦鄭云綦屨繫是用纊組之事也云青與赤謂之文繢人職云文繡之屬亦用絲故連言也王昭禹曰喪紀有用絲以為線縷有用纊以充衣褥或用組文以為物之飾凡飾邦器者受文織音志絲組焉鄭康成曰謂茵席屏風之屬賈氏曰上既言祭祀喪紀所用此云飾邦器據生人所飾器物言茵者謂若少儀云枕几茵穎之等鄭云茵者縟也云席者謂席之四緣若司几筵紛純之等屏風者即上文注黼依也但上據祭祀此據王所用若司几筵之扆前者是也王昭禹曰文織以文為織絲組以絲為組文織絲組所以為飾邦器之用歲終則各以其物會之鄭康成曰種别為計鄭司農曰各以其所飾之物會計傅著之王氏曰典絲典枲歲終各以其物會之防其以賤貿貴典枲下士二人府二人史二人徒二十人王昭禹曰麻之未緝者謂之枲典枲所掌其物非一獨以枲名官蓋麻為女功之正鄭鍔曰布有出於麻者亦有出於草者如葛如檾可以為絺為綌是出於草者也然出於麻以衣被乎人者為多故雖布緦縷紵出於麻草之不同而設官止以典枲為名也史氏曰觀葛覃后妃在父母家志在女功之事以其躬歷女功知其物之難成則恭儉節用服浣濯之衣固宜然言葛不言布者葛輕布重舉輕以見重此葛覃之詩所以為后妃之本而典枲之官助先王崇本之治為多掌布緦縷紵之麻草之物以待時頒功而授齎鄭康成曰緦十五升布抽其半者白而細疏曰紵王昭禹曰紵則苧草之為布者草則葛之屬凡可以為布者皆是麻草之物指其自然之質而言之布緦縷紵指其人為之功而言之布緦縷紵皆出於麻草之物雜言此數物者以著其類聚衆多草葛檾之屬史氏曰布重而緦輕鄭鍔曰緦者布之細者縷者線孟子曰有布縷之征自其已成言之則曰布緦縷紵自其本質言之則曰麻與草賈氏曰以待時頒功而授齎者典絲注用絲有四時之别此麻草所為四時皆得也授齎亦如典婦功所注王昭禹曰授齎則授其所以為功之資與典婦功授齎同意史氏曰計其當用之時授以麻草使為布緦縷苧及獻功受苦音古功以其賈楬而藏之以待時頒鄭鍔曰苦功謂麻草所成之功非謂苦惡也指麻草所成者為苦以見出於絲者為良功愚案詳見典絲史氏曰楬其賈者物有等差時頒者衣服賜豫之時冬裘夏葛不可紊也黃氏曰冬服司裘頒季秋獻功裘以待頒賜是也暑服典枲頒及獻功受苦功以其賈楬而藏之以待時頒是也頒衣服授之賜豫亦如之歲終則各以其物會之鄭康成曰授之授受班者帛言待有司之政令布言班衣互文王氏曰頒衣服授之賜豫亦如之者頒衣服賜豫皆以物授之言賜豫而不言上以典絲見之史氏曰歲終之會各以其物知其出納之數總論王昭禹曰先王之於婦職王后帥之以𧖟內宰教之以二事九嬪又從而教之至於婦功則絲枲二物亦皆有官以典之及其獻功則后受之而內宰佐之典婦功又辨其苦良比其小大典絲之屬皆辨其物卑而內人尊而王后皆相率以絲枲之事其詳至於如此天下之務惟本之為貴男子之務本於農耕女子之務本於絲枲茍不忘其本而先之於上則男有餘粟女有餘布邦之財用所為足也周禮訂義卷十三
