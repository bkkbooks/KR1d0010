body:
  text: 周禮訂義卷二十宋王與之撰封人中士四人下士八人府二人史四人胥六人徒六十人鄭康成曰聚土曰封謂壝堳埒及小封疆也賈氏曰封人與大司徒設社稷之壝相左右故在地官為職首胥徒多者以畿封事廣故也鄭鍔曰論語有儀封人左傳有潁谷封人祭封人蕭封人説者皆謂典封疆之官然以經考之有掌固掌修城郭溝池樹渠之固有司險掌設國之五溝五塗而樹之林以為阻固又有掌疆之官官雖闕而康成以疆為界則所掌者封疆之界矣此封人若為掌封疆之官則宜與掌固等並列今列於地官專以設社壝飾牛牲為職則非典封疆之官明矣徐卿曰封人掌設王之社壝乃列於比長之後者蓋民為貴社稷次之掌設王之社壝為畿封而樹之史氏曰封人掌設壇壝唯王有社壝而於國則設社稷之壝也夫壇也壇在中而外為堳埒故謂之壝舉壝則知有壇矣畿封植其所宜木嚴其界限使無犯鄭鍔曰考大司徒於邦國都鄙言制其畿疆而溝封之又言制其地域而封溝之俱謂聚土為封則知康成聚土之説為是司徒制封溝之封制其法也封人為聚土之封為其事也惟其為聚土之事故於王社則掌設其壝又為畿封而植木以為表於諸侯國特之社稷亦掌設其壝為之封土以表其界之所在非王社之畿與諸侯國之封為然造都鄙表封域亦然蓋俱循大司徒所立之法而為壇壝堳埒與小封疆也愚按疏説畿封兄大司徒凡封國設其社稷之壝鄭康成曰封國建諸侯立其國之封賈氏曰禹貢徐州貢土五色注云王者封五色土為社建諸侯則各割其方色土與之使立社是封諸侯立社稷之法封其四疆造都邑之封域者亦如之史氏曰封其四疆為建國設也封其域為建都邑設也唐氏曰如是則內諸侯之制與外諸侯同也鄭鍔曰説者謂天子有社稷諸侯受命於天子則有社稷封人掌設王社壝而不及稷乃為諸侯兼設社稷之壝何耶余以為王自為立社曰王社為民立社曰大社諸侯自為立社曰侯社為民立社曰國社觀小宗伯建國之神位右社稷左宗廟則天子之制有社而稷從之自漢以來謂之大社大稷若夫王自為立社四方各以其色之土上冒以黃明為天子之有土是為地示而稷無預焉封人所設之社壝謂地兹所以不立稷也至若諸侯之有功德者天子乃取王社之土各因其方苞以白茅使之立社稷是為侯社封人不為設壝也惟其為民立社則必立稷乃為之設其社稷之壝使之有土穀之神則知務農重穀矣史氏曰王社侯社皆不置稷者王與諸侯以寶上地為任也大社國社有稷侑之者民以食為天也陳氏曰祭社必及稷以其同功均利以養人祭必有配而社配以勾龍稷配以柱商時又易柱以棄其功利足以侔社稷王與諸侯皆三社二稷其位則中門之右社主隂故也其位則北面社向隂故也其飾則不屋記所謂必受霜露風雨以達天地之氣是也其表則木傳所謂夏以松商以柏周以栗是也其主則用石為之其列則社東而稷西先儒之説蓋有所受先王之制社稷春有祈秋有報孟冬大割祠春祈歌載芟秋報歌良耜此祭之常也凡天地大災之類祭大故大災之彌祀君行有宜宫成有衈此祭之不常者也祭之常者用甲其他則惟吉而已祭之牲以大牢其遇天災則用幣而已考之於禮王之祭南面其服也希冕其牲用黝其祭血祭其樽大罍其樂應鍾其舞帗舞其鼓靈鼓凡此皆因禮樂以致其義令社稷之職鄭康成曰將祭之時令諸有職事於社稷者鄭鍔曰諸侯當守社稷之職又慮其廢而不祀封人則令之使無敢廢職如是則其國之民亦為社事而單出里為社田而竭作為社祭而共粢盛亦不敢失其職劉氏曰封人既設其壝令匠人設五方之土築其壇焉史氏曰大司徒設屬所以教民者已備然後得以立社稷之壇壝奉社稷之牲牢所謂先成民而後致力於神然均是神也曷先於社稷蓋有國有家者當以土地為重孟子言諸侯之寶必以土地居首記亦曰家主中霤國主社豈非國家所重有在於土地乎凡祭祀飾其牛牲設其楅音福衡置其絼持忍反共其水稿古老反王昭禹曰飾謂飾以文繡陳氏曰小子凡沈辜侯禳飾其牲羊人凡祭祀飾羔校人飾幣馬飾黃駒曲禮曰飾羔雁者以繢鄭康成曰飾謂刷治潔清之鄭康成曰楅設於角衡設於鼻如椵狀也史氏曰衡以系其絼也鄭司農曰絼著牛鼻繩以牽牛者今時謂之雉與古者同名皆謂夕牲時也鄭康成曰水稿給殺時洗薦牲也賈氏曰水以洗牲稿以薦牲薛氏曰祭祀以牲為大故王於命官而養則齋戒沐浴而朝之其於卜日則擇毛色而育之至於祭之日則親牽牲而入於太廟未入則迎於門既入則執其紖以鬼神之所歆享者在是也夫以萬乘之尊而從事於牽牲之禮一毫不備則無以嚴天子之禮飾其牲者崇其儀也設楅衡者防其觸也置其絼以備用也共其水稿以致潔也王氏曰封人言掌設王之社壝封疆而樹之則以飾土事為職故使之飾牛牲以牛土畜故也歌舞牲及毛炮之豚鄭康成曰謂君牽牲入時隨歌舞之言其肥香以歆神也鄭司農曰歌舞其牲云博碩肥腯毛炮之豚爓去其毛炮之以備八珍鄭鍔曰説者謂所飾者牛牲則所歌舞者亦牛牲耳又及毛炮之豚何也八珍之物炮豚居其二其法則取豚而刲之實棗於其中而炮之糔溲以稻粉調以醯醢然後成祭祀則用薦羞之豆實此致美之尤至安得不歌舞以致之凡喪紀賓客單旅大盟則飾其牛牲易氏曰喪紀有奠牛賓客有牢禮積膳之牛軍旅共犒牛大盟有載書之牛其牲皆如祭祀之飾敬其事也鄭鍔曰夫牲取可以為禮足矣乃每每致飾然後用何哉蓋文有餘而物不足失之偽物有餘而文不足失之野欲華實相副則飾不可闕鼓人中士六人府二人史二人徒二十人賈氏曰主教六鼓四金以是教官故在此陳君舉曰鼓人舞師不𨽻宗伯而𨽻司徒蓋亦野用之也凡野事則為之掌教六鼓四金之音聲以節聲樂以和軍旅以正田役鄭康成曰音聲五聲合和者賈氏曰單出曰聲雜比曰音史氏曰鼓專於陽金為西方之物有隂之義凡進皆鼓凡節皆金隂陽之義不可偏廢也鄭鍔曰此教六鼓四金則不止於鼗又况小師掌教鼓鼗瞽矇亦掌播鼗注專指為教視瞭不可也若教視瞭亦不過奏樂之際可節聲樂耳乃若軍旅田役安用彼為哉賈氏曰節聲樂者雷鼓靈鼓路鼓晉鼓也和軍旅者即鼖鼓鼓軍事也正田役者鼛鼓鼓役事也史氏曰聲樂之作綴兆舒疾以是節之軍旅之起坐作進退以是和之田役之興往來甘苦以是正之教為鼓而辨其聲用鄭鍔曰能知聲者或不能為器能制器者或未必能知聲鼓人知聲者也韗人為鼓者也為鼓者大小長短儻不中度則知聲者欲其聲不爽可得哉故上言教擊鼓之法此言教為鼓而用之之法然則教為鼓者教韗人為之先儒謂教擊鼓者大小之數則失之矣易氏曰以六鼓聲用考之惟雷鼓專用於天神鼛鼓專用於役事若靈鼓用於社祭至冥氏則用之以驅猛獸矣路鼓用於鬼享至大司馬則用之於教戰大僕則用之以待達窮者與遽令矣以至辟雍作樂之鼖鼓維鏞仲春搜田軍將執晉鼓則又鼖鼓不止乎軍事晉鼓不止乎金奏矣要之聲用各有所主所以不客不辨以雷鼓鼓神祀鄭康成曰雷鼓八面鼓也神祀祀天神也劉執中曰按大司樂雷鼓禮天神是鼓神祀也鄭鍔曰天神變化無方雷者天之聲故名雷者以鼓神祀則宜以靈鼓鼓社祭鄭康成曰靈鼓六面鼓也劉執中曰按大司樂靈鼓禮地示是鼓社祭也鄭鍔曰地道有形可見而靈者神之降而有驗故名靈者以鼓社祭則宜言鼓神祀鼓鬼享不言地示乃曰鼓社祭何也記曰社祭土而主地蓋社者地神之尤貴言社則地示見矣觀大宗伯掌天神人鬼地示之禮亦只言以血祭祭社稷意蓋類此以路鼓鼓鬼享鄭康成曰路鼓四面鼓也鬼享享宗廟也劉執中曰按大司樂路鼓禮人鬼是鼓鬼享也鄭鍔曰先王之道大而無所不通而路者道之大故名路者以鼓鬼享則宜史氏曰天神之祀用雷鼓雷固無形主乎陽后土之祀用靈鼓靈固異神主乎隂宗廟之祀用路鼓路固為大主乎祖以鼖鼓鼓軍事鄭鍔曰國之大事莫大於戎鼖鼓長八尺鼓四尺中圍加三之一其聲尤大鼖大也史氏曰軍事欲與衆共聞也字或為賁賁亦大也故宜用以鼓軍易氏曰大司馬所謂諸侯執賁鼓是也以鼛鼓鼓役事鄭鍔曰用民之力宜緩不宜急鼛鼓長尋有四尺倨句磬折其聲尤緩字或為臯臯亦緩也史氏曰鼛高也役事亦欲與衆共聞也故宜用以鼓役事賈氏曰詩云鼛鼓弗勝起役止役皆用鼛鼓也以晉鼓鼓金奏鄭鍔曰金奏者西方之聲隂之屬也隂以退為主陽氣導之乃進晉鼓長六尺六寸左右端廣六寸中尺厚三寸穹者三之一上三正其名曰晉晉進也以進為義故宜用以鼓金奏史氏曰金奏編鐘以是發之樂之始作進而未已也賈氏曰作樂則先擊鐘故鐘師以鐘鼓奏九夏注云先擊鐘次擊鼓則是擊鐘後即擊鼓故曰以晉鼓鼓金奏王氏詳説曰路鼓用之於鬼享至司馬教戰則王執路鼓矣晉鼓用之於金奏至司馬教戰則軍將執晉鼓矣鼖鼓用之於軍事至辟雍作樂則鼖鼓維鏞矣靈鼓用之於社祭至大司樂用之於祭地示是又不止於社祭也路鼓既用之於人鬼又用之於教戰至大僕建路鼓於大寢門之外是又不止於人鬼與教戰學者當知六鼓之為用不必知六鼓之為制以金錞音淳和鼓以金鐲直角反節鼓以金鐃女交反止鼓以金鐸待洛反通鼓王氏詳説曰四金之名三見於大司馬惟錞之名不見於經內見於漢之大豫樂鄭康成曰錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和陳氏曰國語曰戰以錞于丁寧警其民也又黃池之會吳王親鳴鐘鼓丁寧錞于振鐸則兵法固用錞矣王昭禹曰以金錞和鼓唱而和之鄭康成曰鐲鉦也形如小鐘軍行鳴之以為鼓節司馬職曰鼓行鳴鐲賈氏曰按詩鉦人伐鼓鄭注以為軍行所用與此不同者以其動靜俱用故也王昭禹曰以金鐲節鼓鼓行而節之鄭康成曰鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且卻賈氏曰按左傳一鼓作氣再而衰三而竭哀公傳陳書曰吾聞鼓而巳不聞金矣是進軍之時擊鼓退軍之時鳴鐃王昭禹曰以金鐃止鼓鼓退而止之鄭康成曰鐸大鈴也振之以通鼓司馬職曰司馬振鐸賈氏曰此是金鈴金舌故曰金鐸在軍所振言通鼓者兩司馬振鐸軍將已下即擊鼓故云通鼓也王昭禹曰以金鐸通鼓鼓作而通之項氏曰四金惟金錞用於樂餘皆軍事此以大小序錞大於鐲其形圓鐲小如鐘鐲無舌鐸有舌鄭鍔曰古人之制有鼓以作樂必有金以止之其説以為鼓之擊也無以和之則其聲單出而無鏗鏘之美必和之以金錞鼓之鳴也無以節之則其聲大長而無節奏之次必節之以金鐲鼓有時欲其止鐃鳴則擊者必休息而不作鼓有時欲其通鐸鳴則擊者必急疾而不徐四金用於六鼓猶隂之於陽水之於火相齊相成説者謂錞有淳和之意故可以和鼓鐲有獨立之意故可以節鼓鐃有堯然而高之意故可以止鼓鐸有絡繹不絶之意故可以通鼓理或然也凡祭祀百物之神鼓兵舞帗音拂舞者黃氏曰祭祀百物之神所謂國索鬼神而祭祀者鄭鍔曰或謂祭祀用舞固不止於兵帗此所鼓者二舞何也天神地示人鬼皆鼓人所當鼓而不及百物之神彼其神之小者有用兵舞帗舞之時雖止於二舞鼓人亦當鳴鼓以作之也神之小者或能為人捍患故用兵舞或能為人除去不祥故用帗舞兵舞本用於山川帗舞本用於社稷小神之功或近似之所以得而用焉易氏曰舞師言凡小祭祀則不興舞今以兵帗而用於百物之神何歟茍有功於民載於祀典則非小祭祀也凡軍旅夜鼓鼜鄭康成曰鼜夜戒守鼓也司馬法曰昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫鄭鍔曰軍旅所止尤以防夜為急鼓人之鼓鼜所以警之也其鳴之鼜所以致其憂戚之意薛氏曰鼓軍鼓者鼖鼓也鼜其聲也軍動則鼓其衆賈氏曰軍動謂行前向陳時項氏曰鼓其衆作士氣也經曰鼓人皆三鼓曹劌曰一鼓作氣田役亦如之賈氏曰田獵圍合之時必擊鼓象對敵故大司馬云鼓遂圍禁史氏曰所以作士氣也救日月則詔王鼓項氏曰日為月勝故食於朔月不受日光故食於望是皆陽為隂所勝故鼓以救之助陽氣也王親鼓之鼓人詔之耳賈氏曰大僕云軍旅田役贊王鼓注云佐擊其餘面又云救日月亦如之按上解祭日月與天神固用雷鼓則此救日月亦宜用雷鼓八面故大僕戎右俱云贊王鼓得佐擊餘面也王昭禹曰日月之薄蝕隂陽之進退人事何與其間哉而古人有救日月之禮蓋其以裁成輔相為事則隂陽之運有不由其道日月之明有不用其行必反之裁成輔相之事焉王之於日春朝不廢朝王之於月秋暮不廢夕則其於救日月而鼓之固王之事有司特詔之而已大喪則詔大僕鼓鄭康成曰始崩及窆時王昭禹曰自雷鼓至通鼓則鼓人之所辨白凡祭祀至亦如之則鼓人之所鼓自救日月至大僕鼓則鼓人之所詔舞師下士二人胥四人舞徒四十人鄭康成曰舞徒給繇役能舞者以為之賈氏曰掌教野人之舞亦是教官之類樂師亦教舞不在此者彼教國子學樂必須合於禮故入春官也掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事賈氏曰掌教野人國有祭山川等則舞師帥領往舞王昭禹曰兵舞干舞也山川為國阻固故以干舞之干之言扞也史氏曰帗舞執五采繒加帗王昭禹曰社稷土穀之神所以生養人者欲其無災害之厲民而有帗除之功帗有祓除之義也故教帗舞帥而舞社稷之祭祀鄭康成曰羽析白羽為之形如帗四方祭祀謂四望王昭禹曰四方為國翼蔽故以羽舞之羽有翼蔽也黃氏曰山川之在四郊者蠟則其民得祭之四方鄭康成以為四望四望非州黨所得祭記曰順成之方其蠟乃通詩曰以社以方是則四郊之民各祭其方王則通祭之王制山川社稷四方則國子舞此州黨之祭故使舞徒舞謂之野舞野舞舞師教之舞師所以列於鄉官者以此鄭康成曰皇析五采羽為之亦如帗史氏曰皇舞執五色如翟也鄭康成曰旱暵之事謂雩也暵熱氣也鄭鍔曰旱暵出於非常故不言祭祀而言事偶有是事則染羽為鳯皇之形以舞焉不象鳯者鳯雄而皇雌所以召隂而却陽也易氏曰皇舞用於旱暵之事則有隂陽相濟之義鄭康成曰帗舞羽舞皇舞形制皆同陸佃曰有山川阻固然後可以保社稷有社稷然後可以有事於四方有事干四方然後可以待變事此舞師之舞先後為序也賈氏曰按樂師六舞并有旄舞施於辟雍人舞施于宗廟此無此二者以卑者之子不得舞宗廟之酎祭祀之舞亦不得用卑者之子樂師教國子故有二者此教野人故無旄舞人舞王氏詳説曰兵舞用之山川矣司干云掌舞器而及於祭祀賓饗是不止於山川也羽舞用之四方矣籥師云掌羽舞及於賓客饗食是不止於四方也此鼓人亦云祭祀百物之神鼓兵舞帗舞者亦所以見其用之不一也但此見於地官以地事與民事為主故耳山川社稷四方地事也旱暵民事也凡野舞則皆教之鄭康成曰野舞謂野人欲學舞者易氏曰教之備鄉遂之舞所以待國事鄭鍔曰四十人學舞之外有野人學舞者亦當教之以待闕人亦用之也凡小祭祀則不興舞黃氏曰蠟祭百神與山川社稷四方有舞自餘坊庸表畷之屬不舞旱而祭其神舞祭百辟卿士不舞州祭社舞黨祭禜族祭酺不舞故曰凡小祭祀不興舞鄭曰王玄冕所祭非也王祭不使舞徒舞易氏曰鼓人於祭祀百物之神教兵舞帗舞此言不興舞者謂其神雖在祀典而功不足以形容也牧人下士六人府一人史二人徒六十人鄭康成曰牧人養牲於野田者詩曰爾牧來思何蓑何笠或負其餱三十維物爾牲則具賈氏曰牧人掌牧六牲以共祭祀亦是地事故在此掌牧六牲而阜蕃其物以共祭祀之牲牷鄭康成曰六牲謂牛馬羊豕犬雞黃氏曰牛人主牛則牧人惟牧馬羊豕犬雞五牲而已其曰六牲備言之耳史氏曰祭祀之牲貴於牧養阜蕃者不以瘠薄待神祇祖考聖人之孝心也鄭鍔曰非徒責以阜蕃又欲阜蕃其物蓋物者毛色之稱校人職曰種馬一物戎馬一物無羊詩曰三十惟物爾牲則具皆指毛色為物鄭司農曰牷純也愚按康成以牷為體完具若以下文用龎對牷司農之説是凡陽祀用騂牲毛之隂祀用黝牲毛之史氏曰凡祀分隂陽者以天地則天陽而地隂以日月則日陽而月隂以宗廟則昭陽而穆隂易氏曰騂者赤色之盛劉氏曰周人尚赤故以騂為尊黝者黑色之微鄭鍔曰用騂豈徒色之赤哉必欲其毛純乎赤用黝豈徒色之黑哉必欲其毛純乎黑牧人毛之然後五官奉之是禮官之事亦牧人之事陳氏曰大宗伯牲幣各放其器之色則天以蒼不以騂地以黃不以黝蓋陽祀以騂為主不必皆騂隂祀以黝為主不必皆黝牧人所言亦大率而已詩曰來方禋祀以其騂黑則四方有用騂黑者孔子曰犂牛之子騂且角山川其舍諸則山川有用騂者鄭鍔曰祭祀用物必有其由其一以禮神其一以祀神祀神之物從其類故陽騂而隂黝禮神之物象其功故天蒼而地黃大宗伯言其禮神者故以禮言牧人言其祀神者故以祀言禮經之文本無抵牾也説者疑禮記祭法言燔柴於泰壇祭天瘞埋於泰折祭地其文則俱用騂犢又與此用騂用黝之文不合余以為此乃為禮學者之過經之文曰燔柴於泰壇祭天也瘞埋於泰折祭地也其下乃云用騂犢埋少牢於泰昭祭時也康成失其句讀以用騂犢之文連上讀之其説曰地隂祀用黝牲與天俱用犢連言耳安有天地異位騂黝異色而於經文只連言耶注疏之學此類多矣方氏曰赤為陽之盛而蒼與青乃其類黑為隂之盛而黃與白乃其類若是則祀天之牲不必蒼亦從其類望祀各以其方之色牲毛之鄭康成曰望祀五嶽四鎮四瀆鄭鍔曰各倣其方之色豈徒東青西白南赤北黑哉必欲其毛之純乎青白赤黑也凡時祀之牲必用牷物黃氏曰時祀之牲總結上陽祀隂祀望祀皆四時所常祀山川四方百物包於其中矣此特見或騂或黝或各以其方之色皆用純對下文外祭毁事用尨耳易氏曰養牲為有素故必用牷物凡外祭毁事用尨可也鄭康成曰外祭謂表貉及王行所過山川用事者易氏曰按校人云凡將事於四海山川則飾黃駒何用尨之有考之肆師與祝侯禳於疆及郊是疆郊外祭也侯禳毁事也豈與所過山川者例言毁謂疈辜侯禳毁除殃咎之屬杜氏曰尨謂雜色不純鄭鍔曰四時常祀牲必用牷祀既有常則物可預備外祭毁事牲或用尨事出非常則物或難得然牲以牷為貴用尨出於不得已故亦僅可而已凡祭祀共其犧牲以授充人繫之鄭鍔曰上既謂之牷物此又謂之犧牲蓋牷全也犧亦全也牷之為全者謂色之純犧之謂全者謂體之具鄭氏曰犧毛羽完具也周景王時賓起見雄雞白斷其尾曰雞憚其為犧犧體具矣色或不純牷則體全而色亦全也四時常祀用牷則不止於色之必純其體亦必全也凡祭祀之犧則體具而毛或不純亦無害此其語所以不同鄭康成曰授充人者當殊養之易氏曰繫之充人潔之也所以致敬於神也凡牲不繫者共奉之鄭康成曰謂非時而祭祀者賈氏曰若上文凡外祭毁事用尨可也王氏曰共奉之則非特共其牲又奉其事史氏曰非時之祀共奉之而已不暇繫於充人也牛人中士二人下士四人府二人史四人胥二十人徒二百人鄭康成曰主牧公家之牛者詩云誰謂爾無牛九十其犉犉者九十其餘多矣賈氏曰鄭引詩者證經牛多故徒有二百人牧之也掌養國之公牛以待國之政令鄭鍔曰周制有公家之牛有私家之牛祭祀以為犧牲者公牛也車輦出於鄉遂之民者私牛也黃氏曰此與九職之牧分授牧田以養國牛故言公牛以别於民史氏曰祭祀之物牛曰一元大武以六牲之中牛最大天地之牛角繭栗宗廟之牛角握賓客之牛角尺則牛者無所不用王昭禹曰六牲之奉屬於五官羊人犬人雞人止言共以有牧人養之也牛人養之而又共之未成牲謂之牛而牛人之所養不特以為牲故自享牛求牛牢禮積膳膳羞之牛皆以牛言之賈氏曰政令則諸侯所須牛及牧人之事則供送之史氏曰政令凡祭祀所用無所不掌也凡祭祀共其享牛求牛以授職人而芻之鄭康成曰享獻也獻神之牛謂所以祭者也史氏曰享牛謂所合供者若牧人時祀之牲求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處鄭鍔曰求索也記曰直祭祝於主索祭祝於祊不知神之所在於彼乎於此乎或諸逺人乎是故祭之明日則索祭之亦謂之繹祭祭亦用牲則求牛為索祭之牛明矣劉氏小傳曰享牛者享神之牛凡求讀如逑逑配也配神者之牛以郊禮言之享牛所謂帝牛求牛所謂稷牛周書召誥用牲于郊牛二史氏曰求牛謂非時而須若牧人外祭毁事之尨是矣黃氏曰求牛亦芻之備非時之須耶牧人所謂凡牲不繫者鄭節卿曰牛有卜而後用者有用而不必卜者享牛卜而後用求牛用而不卜黃氏曰職如字不必改充人司門各共其職牧人備言之矣此省文耳鄭康成曰職讀為樴樴謂之杙可以繫牛樴人謂牧人充人賈氏曰充人置樴入地之時樴樴然作聲故以聲名其官凡牲堪祭者則牛人選入牧人臨祭之前牧人乃授充人乃繫養之今若即以樴人為充人則隔牧人故連牧人言之鄭康成曰芻牲之芻牛人擇於公牛之中而以授養之凡賓客之事共其牢禮積膳之牛鄭康成曰牢禮飱饔也積所以給賓客之用若司儀職曰主國五積膳所以間禮賓客若掌客云殷膳大牢史氏曰既以生饋之又以熟進之饗食賓射共其膳羞之牛史氏曰饗食賓射講禮之時用也賈氏曰饗者烹大牢以飲賓獻依命數食者亦烹大牢以食食禮九舉七舉五舉亦依命數無酒獻酬耳皆在於廟以速賓射者謂大射及與賓客射於朝天子諸侯射先行燕禮皆有殽俎故有牛也膳羞之牛謂獻賓時宰夫所進俎是也王氏詳説曰既曰積膳之牛又曰膳羞之牛積膳謂共賓也膳羞謂獻賓也鄭康成曰羞進也所進賓之膳燕禮小臣請執幂者與膳羞者至獻賓而膳宰設折俎王之膳羞亦猶此軍事共其犒牛鄭司農曰犒師之牛項氏曰若鄭商以牛十二犒秦師喪事共其奠牛鄭康成曰謂殷奠遣奠也喪所薦饋曰奠賈氏曰喪中自未葬巳前無尸飲食直奠停置於神前故謂之奠朝夕之奠無尊卑皆脯醢酒而已無牲體殷大也唯小斂大斂朔月月半薦新祖奠及遣奠時有牲體大遣奠亦有馬牲凡會同軍旅行役共其兵車之牛與其牽倣以載公任器黃氏曰兵車輦也王昭禹曰先王之時軍旅之賦取具於民矣此凡會同軍旅行役共其兵車之牛則公牛也馬牛車輦取具於民者乃私牛也鄭康成曰牽倣在轅外挽牛也人御之居其前曰牽居其倣曰倣任猶用也史氏曰牽倣載任引重致逺之時用也黃氏曰載公任器則私任器出於民凡祭祀共其牛牲之互與其盆簝音老以待事鄭司農曰互謂楅衡之屬鄭氏曰互若今屠家縣肉格賈氏曰始殺解體未薦之時縣於互盆簝皆器名盆所以盛血簝受肉籠也易氏曰以待事則或剝或亨或肆或將皆待之為有素史氏曰觀周官牛人所共非祭祀則賓客燕享軍旅初非為食用禮曰天子無故不殺牛大夫無故不殺羊士無故不殺犬豕所謂故其祭祀之時歟充人下士二人史二人胥四人徒四十人鄭康成曰充猶肥也養繫牲而肥之劉執中曰牧人雖掌六牲猶牧之草野以適其性乃克阜蕃然未之芻也逮將用以為牲而繫之於充人掌繫祭祀之牲牷祀五帝則繫於牢芻之三月享先王亦如之鄭康成曰牢間也必有間者防禽獸觸齧史氏曰繫於牢者充人所躬親也易氏曰充人受牛人牧人所授者而繫之也鄭康成曰養牛羊曰芻三月一時節氣成王昭禹曰記曰三月繫又曰帝牲必在滌三月傳曰芻豢逺不過三月近不過旬浹在三耳繫於牢之時也凡散祭祀之牲繫於國門使養之鄭康成曰散祭祀謂司中司命山川之屬王昭禹曰五帝之祀先王之享宗廟人鬼之大者謂之正祭祀則非是謂之散祭祀宜矣猶舞非正舞則謂之散舞車非正車則謂之散車鄭康成曰國門謂城門司門之官鄭司農曰使守門者養之王氏詳説曰詩曰爾牧來思以薪以蒸是以牧人兼薪芻之事也此繫於國門使養之且使守門之人而兼牧人之事此所以見隆古盛時之無間事也且莫間於牧人尤莫間於守門之人以其間而復役以他事而不以侵官離局為嫌者意有在矣展牲則告牷王昭禹曰展察視之也告牷告其色之純也肆師言祭祀展犧牲則展牲者肆師也充人則告牷而已碩牲則贊王昭禹曰碩大也所以告其體之充若左傳奉牲以告曰博碩肥腯是已蓋君牽牲封人告碩而充人則贊之饋食之禮宗人視牲告充則碩牲為贊封人明矣王氏詳説曰祭義云古者天子諸侯必有養獸之官及嵗時齋戒沐浴而躬朝之祭祀犧牲於是乎取之欽之至也君召牛納而視之則有視牲之禮矣擇其毛而卜之則有卜牲之禮矣吉然後養之則有養牲之禮矣皮辨素積朔月月半君巡牲則有巡牲之禮矣至於夕牲展牲牽牲射牲割牲無非禮之所寓贊牲者太宰毛牲者宗伯奉牲者五官之長贊射牲者射人歌舞牲者封人何特於充人而疑之知此則知祭禮之重矣周禮訂義卷二十
