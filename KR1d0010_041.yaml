body:
  text: 周禮訂義卷四十宋王與之撰典同中士二人府一人史一人胥二人徒二十人薛平仲曰自大師至眡瞭既以掌奏歌之節則夫因其聲之所合逹其聲之所寓度數齊量要必有托而可考此典同已下之官所以繼此也雖然樂器之制攷之於六律六同典同則掌六律六同之和者也律同不可偏廢而官特曰典同何哉盖樂以統同為貴十有二律之相配必分其六以為同取諸陰陽之合也鄭鍔曰名官不以律而取同為名同陰律也陽律主乎倡而陰律和之陰之為氣隱伏而不出其為聲忽微而難調名官以典同同則和和則器可制陰陽合則生生之理為不息故典同掌其和以為樂器先用以為十有二辰之鐘次用以為十有二辰之鎛度數齊量定於此而後樂器從之然以磬為聲固衆聲之所依也而金奏有所不可缺則鐘次之笙之為聲固下管之所先也所以鼓其金奏者有所不可廢則以鏄鐘次之笙磬遞發於樂作之時鐘鏄交鳴於作樂之際此鼓鐘必曰笙磬同音韶樂必曰笙鏞以閒節奏相承有自來矣掌六律六同之和以辨天地四方陰陽之聲以為樂器鄭康成曰陽聲屬天陰聲屬地天地之聲布於四方為作也故書同作銅黃氏曰先鄭陰律以銅為管陽律以竹為管後鄭皆以銅為之案漢志云黃帝使伶倫取嶰谷之竹斷兩節間吹之以聽鳯之聲其雄鳴六為律雌鳴六為呂是則制律之始本以竹一律有五聲清為陽聲濁為陰聲是為六十四調劉執中曰律同之和謂其長短厚薄所容中度得陰陽之和氣故律同中度則中氣之至而灰飛氣至則聲和所以日月㑹於十二次而不差則天之陽聲順於上陰陽合於十二辰而不繆則地之陰聲順於下故黃鍾之長用之以起五度則樂器修廣之所資黃鍾之容用之以起五量則樂器深閎之所賴黃鍾之重用之以起五權則樂器輕重之所出黃鍾之積用之以起五數則樂器多少之所差黃鍾之氣用之以起五聲則樂器宫商之所祖五法循環而相受則天地陰陽之中聲雖失於此或存於彼是以為樂器者必以律同為之本故曰凡樂器以十有二律為之度數以十有二聲為之齊量孫氏曰古人本同律以作樂又能審聲而知樂律之數度易定聲之髙下難辨使不能辨其聲而知其如是為宫商如是為角徵羽雖有同律之數何自而和故不能審聲和樂而徒較數度之短長此後世之議樂者常如聚訟卒莫能斷其是非也胡氏曰以律和聲則齊其輕重不使之偏裁其緩急不使之過陽而不散陰而不密夫然後宫不至於荒商不至於陂角不至於憂徴不至於哀羽不至於危是非和合之效歟王昭禹曰大師掌六律則曰以合陰陽之聲而典同則曰以辨天地四方陰陽之聲者盖典同掌其聲以作樂器欲其度數齊量之不亂故其詳有及於天地四方之位大師用其聲以施於樂故合十有二聲欲其髙下清濁之克諧其合之也則兩之以陰陽而已凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂逹聲贏㣲聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石鄭鍔曰器莫大於鐘於是言鐘之病王昭禹曰凡聲生於形形異則聲異髙則鳬氏所謂鐘小而長小而長其形髙鄭康成曰髙鐘形大上上大也其聲尚藏衮然如裏則其發也舒正則上下直其形不髙不下而適於正其聲緩而不速下則鳬氏所謂鐘大而短大而短其形下其聲發散疾而短聞鄭康成曰下謂鐘形大下下大也下則聲出去放肆鄭康成曰陂讀為險陂之陂陂謂偏侈陂則聲離散也險謂偏弇險則聲斂不越也逹謂其形㣲大逹則聲有餘若大放也㣲謂其形㣲少韽聲小不成也杜氏曰韽讀為闇不明之闇回謂其形微圜回則其聲淫衍無鴻殺也侈謂中央約侈則聲侈廹筰出去疾也王昭禹曰形侈則聲散而不斂弇謂中央寛弇則聲鬱勃不出也甄猶掉鐘微薄則聲掉王昭禹曰鐘形薄聲動揺甄掉鐘大厚則如石扣之無聲劉執中曰以鳬氏之法為鐘則無病於聲中於律同而協天地四方陰陽之和矣薛氏曰䃂聲生於髙為天之陽肆聲生於下為天之陰謂天盖髙而下者髙之配也故䃂聲為陽而肆聲為陰石生於厚而為地之陽甄生於薄而為地之陰謂地盖厚而薄者厚之配也故石聲為陽而甄聲為陰贏為東方之陽而衍為東方之陰盖作於春而萌者盡逹則將復還其所逹此逹所以主陽而回所以主陰也緩為南方之陽而韽為南方之陰盖陽盛於夏而重明以麗乎正則陰微進而韽此正所以主陽而險所以主陰也以筰為陽而鬱為陰則西方之聲也夫陽於南為正過乎西則侈矣陽雖尚侈然陰已斂質而奠故侈與弇之聲則主於西方斂為陰而散為陽則北方之聲也夫陰至西而伏於北則已斂矣陰雖斂然陽已潜動而施矣故險與陂之聲則主於北方黃氏曰諸家之説皆臆耳案經典同本以律辨聲而為樂器律十二故聲亦十二所謂髙正下陂險逹微回侈弇薄厚即十二聲故為樂器皆以此十二律為之度數皆以此十二聲為之齊量典同之下遂列磬鐘笙塤籥簫篴管皆樂器也今獨以為此十二聲者由鐘形不中法故病其聲如此則典同樂器専為鐘耳此以為未敢盡然攷工記鐘人固曰已厚則石已薄則播侈則作弇則鬱然磬人亦曰已上則摩其旁已下則摩其端已上豈非所謂聲之髙而甚焉者乎已下豈非聲之下而甚焉者乎十二律皆有五聲分清濁而宫為正所謂中正以平之者然則髙正下陂險逹微回侈弇薄厚皆其律之中聲也䃂緩肆散斂贏韽衍筰鬱甄石皆其聲之形容也不然則聲之病也其數度齊量非過則不及故皆病其聲而其故為可求故磬人曰摩其旁摩其端是也諸儒鐘説此又以為未必不然何也以為盡然則於經誠未合要之此等當有所受乃可傳信臆說必疏凡為樂器以十有二律為之數度以十有二聲為之齊量鄭鍔曰既言聲之病於是又言為器之法為樂器者用十有二律以為度數則長短多寡由此而生用十二聲以為齊量則小大輕重由此而準王氏曰數本起於黃鍾始於一而三之歴十二辰而五數備其長則度之所起其餘律皆自是而生故凡為樂器以十二律為之數度䃂聲生於髙肆聲生於下甄聲生於薄石聲生於厚髙下薄厚之所屬所制則有齊矣贏聲生於逹衍聲生於回筰聲生於侈鬱聲生於弇逹回侈弇之屬所容則有量矣故凡為樂器以十有二聲為之齊量凡和樂亦如之黃氏曰鄭謂調其故器非也其數度齊量皆合則聲可和鄭鍔曰和樂之法亦出乎此為樂制之於未成之初和樂調之於已成之後磬師中士四人下士八人府四人史二人胥四人徒四十人鄭鍔曰先儒謂磬為西方之音又以磬音象萬物之成盖立秋之音至清惟清故難調夔特以撃石拊石百獸乃率舞詩人作樂特曰依我磬聲此所以設磬師之官教撃之之法掌教撃磬撃編鐘黃氏曰視瞭掌撃頌磬笙磬故鄭謂磬師以教視瞭然視瞭所撃磬有定名頌磬笙磬之外他磬不撃縵樂燕樂亦有鐘磬視瞭職不掌縵樂燕樂劉氏曰宫縣有特磬十二鎛鐘十二皆依辰次陳之以應其方之律編磬編鐘各十有六共為一簴磬師之職掌教眡瞭撃特磬與編磬又教視瞭撃編鐘鄭康成曰磬亦編於鐘言之者鐘有不編不編者鐘師撃之賈氏曰鐘不編者不教眡瞭鐘師自撃之鐘師之掌金奏又云以鐘鼓奏九夏明是鐘不編者十二辰零鐘也若書傳云左五鐘右五鐘杜氏曰編讀為編書之編賈氏曰史記孔子讀易韋編三絶是古者未有紙皆以韋編竹簡此鐘磬亦編之十六枚在一簴教縵樂燕樂之鐘磬鄭康成曰縵讀為縵錦之縵謂雜聲之和樂者學記曰不學操縵不能安弦賈氏曰雜聲和樂謂雜弄調和學記注云操縵雜弄即今之調詞曲不學調弦不能安意於弦燕樂房中之樂所謂陰聲賈氏曰燕樂即闗雎二南房中謂婦人后妃黃氏曰房中之樂非也二樂皆教其鐘磬黃氏曰磬師掌編鐘無編磬未詳磬師不掌鐘而曰教縵樂燕樂之鐘磬者磬從鐘也凡祭祀奏縵樂鄭鍔曰三宫之樂以禮神也分樂以祭以享以祀寧神將以交神祇之歡心故奏縵樂雖非正聲亦有時而用故教之易氏曰祭祀奏縵樂亦取其和而已鐘師中士四人下士八人府二人史二人胥六人徒六十人掌金奏鄭康成曰金奏撃金以為奏樂之節金謂鐘及鎛賈氏曰此即鐘師自撃不編之鐘凡作樂先撃鐘故鄭云奏樂之節下云以鐘鼔奏九夏亦先云鐘鄭云鐘及鎛者以二者皆不編獨縣而已王昭禹曰鼓人曰晉鼓鼓金奏則此所謂金奏名官曰鐘師樂雖用鼓而以金為主凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏賈氏曰鐘師撃鐘而兼言鼓者凡作樂先撃鐘次撃鼓見先後次第故兼言之鐘中得奏九夏者謂堂上歌之堂下以鐘鼓應之故左氏傳云晉侯歌鐘二肆鄭鍔曰鐘師併與鼓言盖奏九夏必用鐘鼓非謂鐘師撃鐘又撃鼓也夏者頌之族類夏大也歌之大者有九夏於頌為最大中國謂之夏五色謂之夏南方謂之夏則夏為樂之大者其詩之體為大矣王出入所奏之夏名曰王夏以明人臣不得而用尸出入所奏之夏曰肆夏而享諸侯亦奏焉肆之言安也尸以象神於祭者子行也子坐而父立恐其不安於位故出入奏之所以安之也諸侯亦用者左氏記晉享穆叔金奏肆夏之三穆叔云三夏天子所以享元侯也君尊臣卑不敢安肆乃若元侯受享於王可以與之安肆矣禮記云大夫之用肆夏由趙文子始然則諸侯用之可也至於大夫用之則為僭矣先儒以肆夏繁遏渠為三夏謂肆夏時邁也繁遏執競也渠思文也夫以肆于時夏允王保之指為時邁猶為有説若以執競降福穰穰為遏思文配天為渠皆為二夏則恐不可牽合也牲出入所奏者昭夏昭明也昭明神徳之大故得以用此牲也四方賔來所奏者納夏言人君之徳如海之納所以能容受四方朝聘之賔也臣有功所奏者曰章夏惟有大功得奏是所以章表而别異之也夫人助祭所奏者齊夏致齊者婦人之難事欲去其驕侈之習以致精明之徳故特以齊名也族人侍燕所奏者族夏言王者合族之恩也客醉而出所奏者祴夏飲酒者始乎治常卒乎亂故奏樂以祴切之使勿失禮也或作陔陔切也戒也詩云南陔相戒以養是也公出入所奏者驁夏爵為上公位尊而勢隆慮其自大而傲慢故以驁夏謹飭之也驁又音傲所以戒其驕傲也劉氏曰諸儒皆以九夏為頌詩之篇春秋傳稱金奏肆夏之三歌文王之三夏曰金奏文王曰工歌則夏非頌篇明矣然則九夏乃有聲而無辭者也黃氏曰九夏書傳之可攷者周禮王出入奏王夏尸出入奏肆夏牲出入奏昭夏國語奏肆夏繁遏渠天子所以享元侯其餘諸儒附㑹之説未可信凡祭祀饗食奏燕樂易氏曰燕以示慈祭禮主乎敬享禮主乎肅祭祀饗食何以奏燕樂王與諸侯行享食之禮若享元侯則升歌肆夏頌合大雅享五等之諸侯則升歌大雅頌合小雅享同乎燕故謂之燕樂其禮在廟故與祭祀同其樂尤足以見先王之仁鬼神仁賔客也李嘉㑹曰饗以居前食以居後則燕在其中詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩易氏曰凡射則大射燕射賔射樂師皆言以騶虞貍首采蘋采蘩為之節大師則帥瞽而歌射節鐘師乃掌此四詩之奏盖歌則人聲也奏則鐘鼔也鐘師言奏不言節主其節者樂師也掌鼙鼓縵樂鄭康成曰鼓讀如莊王鼓之鼔鄭鍔曰雜弄之樂謂之縵樂樂之細也將作縵樂則撃鼙鼔以作之鼙鼓之小者也以至小之鼙鼓雜弄之樂事之宜也王昭禹曰磬師奏縵樂鐘師撃鼙以和之而已笙師中士二人下士四人府二人史二人胥一人徒十人王昭禹曰掌教吹竽笙塤籥簫篪篴管舂牘應雅而獨以笙師名官笙東方之樂有始事之意故也鄭鍔曰笙常繼於間歌之後觀鄉飲燕禮閒歌之後即笙由庚笙崇丘笙由儀則笙者繼人聲之後為最貴故特名官掌教龡竽笙塤籥簫篪篴管舂牘應雅以教裓樂鄭鍔曰竽三十六管笙十三管竽宫聲在中笙宫聲在左籥三孔其中則中聲其上下二孔則聲之清濁所由生篪七孔管六孔篴笛也笙師皆教以龡之之法又舂牘應雅教瞽矇與視瞭以作裓樂於客醉而出之時康成謂小師所教為教瞽矇笙師所教為教視瞭於經皆無所據彼盖疑小師既教之此又教之遂分彼為教瞽矇此為教視瞭殊不知小師教之以鼓作之節此教之以龡牘以竹為之長者七尺短者一二尺其端有兩孔舂於地以作聲其名曰牘牘之為言瀆也賔醉恐有瀆乎禮故以牘名之應亦以竹為之長六尺五寸中有推亦舂於地其名曰應賔歸恐其不應禮欲其行與樂聲相應也雅狀如漆筩而弇口大二圍長五尺六寸以羊韋鞔之有兩紐亦舂於地其名曰雅賔醉而出恐其失禮欲其雅正也三器在庭皆舂於地以為聲故謂之舂以兩手築地舂之也黃氏曰舂牘應雅鄭曰舂地以為行節未敢以為然經言以教祴樂裓節也舂牘應雅以節樂也王昭禹曰竽笙塤籥簫篪篴管皆樂之所用而舂牘應雅三者特用於教祴樂以為行節黃氏曰小師掌教塤簫管笙師又教龡塤簫管小師用於下管故以教瞽矇謂之播笙師用於凡樂謂之龡但龡之無詩也鄭謂教視瞭視瞭不龡笙竽教則當教瞽矇也案瞽矇視瞭皆屬大師自大司樂而下至視瞭皆祭祀饗射之樂而磬師鍾師笙師鎛師自為一列固有祭饗之樂又有縵樂燕樂縵樂司樂不掌固當是亦不掌燕樂先王之意嚴矣是故瞽矇不龡竽笙籥篪篴視瞭不奏九夏鐘鼓必皆有所以或曰磬師笙師分大師瞽矇視瞭而教之而不著於其職者不使殽雜大師歌詩之事恐或當是然燕樂亦有歌詩或當掌之磬師笙師凡祭祀饗射共其鐘笙之樂燕樂亦如之鄭康成曰鐘笙與鐘聲相應之笙賈氏曰笙師不掌鐘而言鐘故鄭知義然黃氏曰書曰笙鏞以間盖笙與歌門作歌則以鐘節之獨出祭祀饗射其他不出鐘笙鐘從笙也大䘮廞其樂器及葬奉而藏之鄭康成曰廞興也興謂作之奉猶送也賈氏曰此所興作即上竽笙以下皆作之送之於壙而藏之黃氏曰視瞭廞而不藏笙師藏之其職可見大旅則陳之鄭康成曰陳於饌處而已不涖其縣賈氏曰其臨縣者大司樂故大司樂云涖廞樂器注云臨笙師鎛師之屬鎛師中士二人下士四人府二人史二人胥二人徒二十人王昭禹曰鎛小鐘也國語曰細鈞有鐘無鎛尚大也大鈞有鎛無鐘尚細也鎛師掌金奏之鼓謂之鎛師者舉小以見大也與典律同謂之典同守廟祧謂之守祧同掌金奏之鼓鄭鍔曰鎛師掌鎛而言掌金奏之鼓鼓金奏之樂鼓愷樂以至於鼓鼙守鼜豈為鎛師又撃鼓乎觀鼓人言以晉鼓鼓金奏則此所謂鼓者考撃以作之之義也當金奏之時鼔人以鼔作之鎛師則以鎛作之故皆以鼓言軍旅之夜三鼜皆鼓之是鎛師皆撃鎛而鼓之也鎛師固宜掌鎛今略無撃鎛之文皆言撃鼓則鼓為鼓作之意明矣先儒之説謂鎛師不自撃使視瞭撃之但撃金奏之鼓乃晉鼓也其意謂鼓人之職以晉鼓鼓金奏也若如是説全非鎛師之本意王氏詳説曰鐘師掌金奏而及金奏之鼓亦猶鼓人掌六鼓而及於四金之制是知金鼓無二致也然鼓人雖有四金之制不過金錞金鐲金鐃金鐸而已不及鐘鎛也盖鐘鎛所用用之於樂鼔人之職為地官之屬雖曰雷鼓靈鼓路鼓用之於天神地示人鬼亦辨其聲用之而已本無預於天神地示人鬼之間凡祭祀鼓其金奏之樂饗食賔射亦如之愚案金鐘聲也鼓者所以撃其鐘也軍大獻則鼓其愷樂王氏曰鼓愷樂掌於鎛師者鎛師掌金奏之鼓其所掌樂以金為主軍以金止既勝矣欲戢兵之意凡軍之夜三鼜皆鼓之守鼜亦如之王昭禹曰三鼜夜戒之鼓司馬法所言者賈氏曰鼓人注引司馬法云昏鼔四通為大鼜夜半三通為晨戒旦明五通為發晌是一夜三撃備守鼜也王氏詳説曰鼓人之鼓鼜謂軍已發行在郊也鎛師之鼓鼜謂軍未發行在國軍已發行國猶不廢守此鎛師所以又有守鼜後世用軍行師京師戒嚴者本此大䘮廞其樂器奉而藏之賈氏曰此官所廞謂作晉鼓鼖鼓以其當職所撃也韎師下士二人府一人史一人舞者十有六人徒四十人薛平仲曰自司樂之掌樂事大師之教樂事典同之為樂器雅樂備矣納蠻夷之樂於祭祀燕享之用豈非悦逺人之極功乎抑疑韎師旄人鞮鞻氏之設皆以教夷樂然韎師旄人之後必繼之籥師籥章鞮鞻氏之後必繼之典庸器司干何歟夫逺人之服由文徳以來之自其慕徳而來莫不自見其聲歌舞蹈之節周人因之以備樂載之官府而不廢彼籥之為樂自其執羽而龡則文舞於是乎寓由其撃土鼓以和則詩章於是乎形夫皆以象文徳也則以次於韎師旄人之後至於鞮鞻氏合四夷之樂以歌之則徳化益逺典庸器之所以表其功者於是為無愧矣然先王長慮却顧文事必有武備則司干之繼於後者所以教之以武舞歟若夫韎師舞東夷之樂故其人可得而定旄人舞散樂夷樂故其人不可得而定然後四方之有能於此者皆得以自見其藝則先王因之以觀四方之風豈不在是乎鄭鍔曰作四夷之樂當從其國不變其俗故韎師所服者赤韋示不變其所服旄人所執者牛尾示不變其所執也鞮鞻氏所履者革屨示不變其所履陸氏曰王者舞先王之樂明有法也舞當代之樂明有制也舞四夷之樂明有懐也掌教韎樂鄭鍔曰四夷樂東方曰韎南方曰任西方曰侏離北方曰禁此特設官以掌東夷之樂竊疑三方之樂不存於祭祀大享之時而東夷樂猶近正孔子之所欲居且為箕子之國則其樂有中國之風可知明堂位韎作昧詩韎韐有奭左傳韎韋之跗注皆以韎為赤色之韋樂名曰韎意舞者衣赤色之韋也李景齊曰禮記明堂位曰昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟所以廣魯於天下也成周所以用夷樂意盖謂是陳氏曰魯納蠻夷之樂於太廟盖陳之於門唐之時皆奏於四門之外古之遺制祭祀則帥其屬而舞之大饗亦如之鄭康成曰舞東夷之舞王昭禹曰其屬則十六人劉執中曰舞韎之位在門外祭祀大饗皆用之示四夷來王也旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人鄭康成曰旄旄牛尾舞者所持以指麾王昭禹曰四夷之民有執旄以舞者先王因立官以教焉黃氏曰韎東夷之樂特置一官其徒四十人其樂亦盛也舞者十六人則有定員旄人盖雜四夷之舞舞者衆寡無數或多或少皆可合四夷之舞與散樂而其徒二十人比韎為微可知陳君舉曰旄舞非中國之樂因得四夷之懽心使鼓舞焉以承祭祀以共饗燕君子所樂也豈拘於數哉李嘉會曰無所拘限來者從之掌教舞散樂舞夷樂鄭鍔曰散樂野人之樂節奏踈散而非六代之舞夷樂四夷之樂而非中國之法舞有可用者旄人教之皆執旄以舞賈氏曰旄人教樂而不掌鞮鞻氏掌樂而不教互相統耳王氏詳説曰鞮鞻氏所掌専於夷樂旄人所教不止於夷樂况鞮鞻之於夷樂吹而歌耳初未嘗舞也然則旄人云四方以舞仕者屬焉祭祀賔客舞其燕樂則旄人之所教人者衆矣不必如樂師之教國子有旄舞旄人之所用於舞者亦廣矣不必如二鄭之説旄舞之用於辟雍凡四方之以舞仕者屬焉鄭鍔曰四方之人有能通知樂舞而欲仕於王官者不足𨽻大司樂也使屬旄人以其所教者散樂故也賈氏曰四方之舞仕即野人能舞者屬旄人選舞人當於中取之凡祭祀賔客舞其燕樂賈氏曰饗燕作燕樂時使四方舞士舞之以夷樂黃氏曰韎樂祭祀賔饗必舞之散樂夷樂祭祀賔客則舞其燕樂不用燕樂則不舞是則韎猶近雅歟籥師中士四人府二人史二人胥二人徒二十人鄭康成曰籥舞者所吹春秋萬入去籥傳曰去其有聲者廢其無聲者詩云左手執籥右手秉翟陳氏曰明堂位土鼓葦籥伊耆氏之樂命之曰籥以黍籥之法在是故也羽籥皆執籥以聲音之本在是掌教國子舞羽龡籥鄭鍔曰執羽所以為容籥所以為聲王氏曰籥如篴三孔主中聲而上下律吕於是乎生易氏曰成周樂舞之制有文舞有武舞文舞羽籥籥師掌之武舞干戈司干掌之然文舞未嘗無干故舜兼取乎干羽武舞未嘗無羽故詩言萬舞及於執籥秉翟是知文舞干不勝羽武舞羽不勝干此籥師之教國子所以専言舞羽龡籥歟王氏詳説曰周之祭祀有三重獻莫重於祼聲莫重於升歌舞莫重於武宿夜宿夜武舞之曲名籥師所教者止於舞羽吹籥祭祀賔客饗食所用亦止於鼓用籥抑何略於武舞耶曰籥師所掌者舞之教司干所掌者舞之器文王世子曰小樂正學干大胥賛之籥師學戈籥師丞賛之是籥師未嘗不預於學戈何止於羽籥之教又曰然後釋菜不舞不授器是舞器未嘗不為羽籥何止於干戈之器周公於籥師言教於司干言掌又所以見周家太平之治以文舞為教也祭祀則鼓羽籥之舞賔客饗食則亦如之鄭鍔曰於祭祀賔客之時鼓而作其羽籥之舞故曰鼓賈氏曰祭祀先作樂下神及合樂之時使國子舞鼓動以羽籥之舞與樂節相應使不相奪倫故鄭云鼓之者恒為之節大䘮廞其樂器奉而藏之賈氏曰此所廞惟羽籥而已籥章中士二人下士四人府一人史一人胥二人徒二十人鄭康成曰籥章吹籥以為詩章鄭鍔曰春秋迎寒暑為農而祈有年蜡祭而息老物古之詩章無不可用乃専用豳人之龡豳國之籥而名官曰籥章此周王之事也周之先公開國於豳教民稼穡與夫為寒暑之備事載於七月之詩謂之豳風至於成王王業大備念其祖先務農之勤教民之悉凡四時所行者皆以豳詩從事故用豳籥而以籥名官以籥而龡豳詩之章也掌土鼓豳籥王氏曰土鼓禮記所謂蒯桴土鼓賈氏曰鄭注禮運云土鼓築土為鼓蒯桴謂撃鼔之物以土塊為桴豳籥豳國之籥鄭司農曰豳籥豳國之地竹王業之起本於豳樂之作本於籥始於土鼓逆暑迎寒祈年皆以本始民事息老物則息使復本反始故所撃者土鼓所龡者豳籥其章用豳詩焉易氏曰以土鼓應豳籥示不忘本而已中春晝撃土鼓龡豳詩以逆暑中秋夜迎寒亦如之易氏曰民事終始實闗天時之消長故必先之以迎寒逆暑逆如逆女之義自外而入於内以我為主謂陽常居大夏而主嵗功迎如迎賔之義自内而出於外以彼為客謂陰常居大冬時出而佐陽中春為嵗陽之中晝為日陽之中如是而逆暑與堯典所謂日中星鳥寅賔出日同意中秋為嵗陰之中夜為宵陰之中如是而迎寒與堯典所謂宵中星虚寅餞納日同意萬物生於土反於土則土者物之終始也逆暑迎寒所以皆撃土鼓焉橫渠曰當春之晝吾方逆暑則三之日于耜四之日舉趾盖有以逆其氣當秋之夜吾方迎寒則一之日觱發二之日栗烈盖有以迎其氣楊氏曰陰陽積而為寒暑寒暑相推而成嵗寒暑不時無以成嵗故迎之逆之所以道其氣陽生於子冬至日在牽牛陰生於午夏至日在東井聖人向明而治於中春逆暑背其所向則不順故謂之逆中秋迎寒面其所向則順故謂之迎孫氏曰周自后稷教民稼穡至公劉于豳斯館大王肇基王迹皆推本后稷之意率先農桑之業故陶土為鼔豳竹為籥歌豳詩以勸相其民今七月之詩是也周公相成王懼後世不記先君王之舊於是命籥章之官逆暑迎寒歌之祈年祭蜡歌之又兼以雅頌雅若生民之歌頌若豐年之類皆本七月而有益於風化者無逸欲知稼穡之艱難誠以此也周先公出入田里撫摩其民無勢分之間曰殆及公子同歸為公子裳為公子裘獻􅜏于公入執宫功躋彼公堂皆室家婦子感其恩者深愛其君者切序曰陳王業見王業所由興而已後人乃臆以周公遭變故陳后稷先公風化所由遂指為周公作水心先生曰周公方制作禮樂雅頌以昭先王先公之功徳而自作土風之詩使籥章掌之可乎賈氏曰祈年田祖逆暑迎寒並不言祀事既告神當有祀不過如祭法埋少牢之類耳凡國祈年于田祖龡豳雅撃土鼓以樂田畯鄭康成曰祈年祈豐年也王昭禹曰豐年雖本於天時順而祈之亦成乎人事爾鄭康成曰田祖始耕田者謂神農也王氏曰田祖禮記所謂先嗇王昭禹曰先嗇神農也以其始教天下耕稼故祈之王氏曰豳雅豳頌謂之雅頌則非七月之詩盖若九夏亡之矣王氏詳説曰鄭氏釋七月之詩八章以殆及公子同歸以上二章為豳風以十月穫稻為此春酒以介眉壽以上四章為豳雅以稱彼兕觥萬夀無疆以上為豳頌至於釋此則以豳詩亦風言詩緫名以于耜舉趾饁彼南畝之事為豳雅惟豳頌之説與七月同鄭氏釋經亦多類此賦詩斷章惟七月之説為優陳及之曰田畯田大夫古有功於農事者王氏曰田畯禮記所謂司嗇司嗇本始民事施於有政者項氏曰或以為司嗇過矣始祈則歌頌以作耕耜之心既蜡則歌頌以息其終嵗之勞理固然也安得妄謂司嗇成周之時春祈年于上帝田祖田畯皆祭之詩曰以御田祖以祈甘雨以介我稷黍先王盖以田祖田畯其生也有功於農事今農事將興舉而祭之不惟示重農之意亦所以勸農之力田者况大如上帝則祈之次如社稷則祈之則祈田祖田畯尚何疑乎及夫嵗事既成又息老物所謂一日之蜡百日之澤亦忠厚之意不忘其初耳賈氏曰田祖田畯所祈當同日但位别禮殊樂則同國祭蜡則龡豳頌撃土鼓以息老物杜氏曰郊特牲曰天子大蜡八伊耆氏始為蜡嵗十二月合聚萬物而索享之蜡之祭也主先嗇而祭司嗇也黃衣黃冠而祭息田夫也既蜡而收民息已也鄭康成曰萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老月令孟冬勞農以休息之是也王氏曰逆暑迎寒不言國而祈年息老物言國則祈年息老物通乎下故言國以别之王昭禹曰逆暑迎寒召其氣之和聲和則氣和故先言撃土鼓以聲為主祈則以言通其意蜡則美其成功故先言頌以詞為主李景齊曰豳詩曰豳雅先儒以為七月之詩備風雅頌三體非也籥章所謂豳籥者盖以豳吹為籥以豳籥而吹詩與雅頌皆以豳名夫逆暑迎寒而吹豳詩者此則七月之詩盖如授衣鑿冰之屬皆先寒暑以戒事故也祈年而吹豳雅祭蜡而吹豳頌盖雅者言王政之所由廢興頌者以其成功告神明祈年之禮王政之所急先故宜歌雅而蜡祭之設所以答鬼神之功故宜歌頌詩之小雅甫田之詩曰琴瑟撃鼓以御田祖以祈甘雨所謂祈年而吹豳雅者毋乃在是詩周頌豐年之詩曰為酒為醴烝畀祖妣以洽百禮所謂祭蜡吹豳頌者毋乃在是乎鞮鞻氏下士四人府一人史一人胥二人徒二十人鄭鍔曰鞮革也鞻屨也以革為屨夷樂者之所履作其樂歌之時則履是屨以為容唐之燕樂有髙昌部用赤鞾有扶南樂舞用赤皮鞋周鞮鞻之類易氏曰鞮鞻者樂工所履之屨名官以鞮鞻使之掌四夷之樂言其際天所覆薄海内外凡有足所履無不至掌四夷之樂與其聲歌愚案四夷之樂已見韎師薛氏曰四夷樂或以其服色名之或以其聲音名之服色韎是也聲音侏離是也餘不可考黃氏曰康成云樂主於舞鞮鞻舞履非也旄人掌教舞夷樂此樂者其樂也四夷各有歌其聲不同以聲歌之故曰聲歌韎人之樂施於祭祀大饗旄人鞮鞻氏之樂施於祭祀與燕者盖東夷於四夷為長饗於燕為重韎師曰師而序於前旄人鞮鞻氏曰人曰氏而序於後然則東夷之樂盖聖人所重歟李嘉㑹曰先王多用夷樂不用夷禮者其禮非先王法度而其樂則可樂也若夫箕子封於朝鮮其禮亦可尚者以有古意歟祭祀則龡而歌之燕亦如之黃氏曰鞮鞻夷樂器歟祭祀吹而歌之鄭謂以管籥為之聲亦非必自有吹者王昭禹曰祭祀與燕吹其聲倡其歌以明得其歡心而服吾中國之役也易氏曰旄人掌舞夷樂而祭祀賔客舞其燕樂是旄人掌舞而鞮鞻氏之職乃以聲音節之而已陳祥道曰燕諸侯則有湛露燕羣臣嘉賔則有鹿鳴燕夷狄則有蓼蕭於太僕則見王所以燕者於内朝之地故云相其法於酒正見王所以燕者有多寡之數故曰共其計若鞮鞻氏之燕則凡有燕集皆掌聲歌也典庸器下士四人府四人史二人胥八人徒八十人鄭康成曰庸功也鄭司農曰庸器有功者鑄器銘其功春秋傳曰以所得於齊之兵作林鍾而銘魯功焉掌藏樂器庸器黃氏曰鄭謂伐國所獲之器其説是而以為崇鼎貫鼎非也司農以為魯伐齊以所獲兵器鑄林鍾則比於樂矣庸器伐國所獲之樂器若𦙍之舞衣密須氏之鼓是也項氏曰伐國所得之器言庸以見伐皆為民也易氏曰周自文王伐四國武王克殷之後所獲玉鎮大寳器皆足以昭先王之功天府藏之而典庸器藏其器物之可以備聲樂之飾者及祭祀帥其屬而設筍虡陳庸器杜氏曰橫為筍從為鐻易氏曰樂器即梓人之筍虡所以縣鍾磬之屬橫曰筍植曰虡上設板謂之業亦所以明先王之業未有無其業而可以作樂者鄭鍔曰祭祀之時則帥其八十人之屬以設筍虡小胥視瞭自當縣樂器此但為之設筍虡所當陳者庸器而已陳之於祭祀之時以表先王之有功能得此器子孫能守以奉祀李嘉㑹曰聖人於作樂之具必寓其警戒之義俾知庸器始他人為之今陳設於此因歡樂而知警懼則所以自勉者深矣樂記所謂思武臣思將帥之臣由聞鐘鼓之音而思也其意深矣饗食賔射亦如之鄭鍔曰陳於饗食賔客之時以彰先王之功可服諸侯且以為國之華大䘮廞筍虡鄭康成曰廞興也興謂作之司干下士二人府二人史二人徒二十人鄭康成曰干舞者所持謂盾也春秋傳曰萬者何干舞也鄭鍔曰記曰朱干玉戚冕而舞大武周人武舞亦執干以為容武舞雖用羽而以干為主故名官曰司干盖用武以自扞蔽為先干能扞蔽人身也黃氏曰舞器干戚羽旄皆有而獨以干為名干武王之舞器楚文夫人曰先君以是舞也習戎備也李嘉㑹曰舞者必尚武而執干戈足見周尚武之意得非因此功之成而不忘本歟武王既歸散軍郊射其意可見五兵皆舞獨以衛身之干為名意亦可見掌舞器鄭鍔曰所掌之舞器即謂干楯耳干之為器有用兵之時所用者有當舞時所用者當舞時所用之干則與用兵所用者異先儒以為羽籥之屬非矣安有籥師鼓舞羽吹籥而所執之物乃掌於武舞之司干乎王昭禹曰夫羽舞干舞皆樂師以教國子籥師於羽舞又教之至於司干則特掌舞器先王於文事尤致其詳也然文舞有羽籥名官則以籥武舞有干戈名官則以千盖文則優游而静籥則其聲静而可聞干則以有扞而自衛而武事以扞敵自衛為先祭祀舞者既陳則授舞器既舞則受之賔饗亦如之鄭康成曰既已也受取藏之鄭鍔曰祭祀之時俟舞人綴兆行列已定則授之以干至於舞畢則受而藏之李嘉㑹曰舞列既陳則授之干舞者既畢則從而受之於干授受亦甚嚴矣大丧廞舞器及葬奉而藏之賈氏曰此官掌干盾及羽籥及其所廞廞干盾而已其羽籥則籥師廞之周禮訂義卷四十一
