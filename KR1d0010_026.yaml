body:
  text: 周禮訂義卷二十六宋王與之撰遂大夫每遂中大夫一人賈氏曰遂大夫各主一遂如郷大夫各主一郷但其官皆卑於郷官命數皆減一等是以遂大夫中大夫一人不使卿差次至鄰長則是不命之士為之其郷之比長則下士薛平仲曰六郷之民既環居於國城之内外則公卿大夫實易以從容其間先王因勢之便以分其職則爵秩之隆所以加於六遂一等者其理則然非固厚於六郷彼為遂之民者既間居於甸稍縣都之中而所謂王子弟之親與夫公卿大夫之尊又皆食邑於其内則其統臨而鎮撫之者蓋亦至矣而遂復設官以從而教治之則爵位之殺所以降於六郷一等者蓋所重在彼抑豈有薄於六遂者哉又曰六遂中大夫六人下大夫三十人上士百五人中士七百五十人下士三千人鄰長不命萬二千五百人愚案鄰長推為五家之長其受田與五家等本非有禄以養之餘說見比長各掌其遂之政令以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者賈氏曰此與遂師職意同王昭禹曰郷大夫以歲時登其夫家衆寡遂大夫不登以遂人登之蓋郷之官莫尊於郷大夫遂之官莫尊於遂人李嘉㑹曰遂師曰登遂大夫曰稽遂大夫稽之於下遂師登之於上易氏曰郷大夫辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之則遂大夫所謂可任者猶是郷大夫言其可舍者國中貴者賢者能者服公事者老者疾者皆舍則遂大夫所謂可施舍者亦猶是以教稼穡以稽功事易氏曰黍稌高下穜稑先後以教稼穡有如此者田萊之荒治牧畜之登耗以稽功事有如此者鄭康成曰功事九職之事民所以為功業掌其政令戒禁聽其治訟易氏曰掌其政令戒禁則制之於未然聽其治訟則決之於已然此雖郷大夫之所不言然六郷有井牧之制卒伍之制有貢賦稅斂之事舉此可以見彼王氏詳說曰遂師遂大夫言政令戒禁至於縣正鄙師鄼長里宰則特言政令而戒禁無與鄰長於政令又無與令為邑者歲終則㑹政致事鄭康成曰不言其遂之吏而言為邑者容公邑及卿大夫王子弟之采邑政令戒禁遂大夫亦施焉曹氏曰王畿千里之地自六郷六遂之民緫為十有五萬家其餘地天子使史治之不統於遂官者是為公邑公邑之外為大夫之采邑者是為家邑家邑之外為卿之采地者則為小都小都之外為王子弟之采地者則為大都雖日家曰都各有不同而實皆采邑也遂大夫令為邑者則所職不止於六遂併與公邑卿大夫王子弟之采邑皆治之則所治者廣矣易氏曰為邑之吏有政有事一歲之政歲終必㑹一歲之事歲終必致吏之勤怠善否皆可於歲終攷之曹氏曰歳終會政致事將以達其可誅可賞可廢可興之實于朝廷正歲簡稼器脩稼政鄭康成曰簡猶閱也稼器耒耜鎡基之屬稼政孟春之月令所云皆脩封疆審端徑術善相丘陵阪險原隰土地所冝五穀所殖以教道民必躬親之易氏曰簡之脩之於正歲之始先期而為之具也曹氏曰此亦教邑甿者三歲大比毗志反則帥其吏而興甿鄭康成曰興甿舉民賢者能者如六郷之為興猶舉也劉迎曰興甿不過明有功屬地治而己後世孝亷賢良之舉即興賢能之遺制力田即興甿之遺制豈可比而一之黄氏曰郷之所謂賢者皆以徳能者皆以道遂未嘗以此教安得以此興之甿即遂人下劑致之田里安之樂昬擾之也七萬五千家幾二萬人必當有桀異聦慧者於是乎興之李景齊曰六遂以耕為主遂大夫所掌要不過教民稼穡之事賓興何與焉蓋大司徒以鄉三物教萬民而賓興之繼以施教法于邦國都鄙則教之施於六遂亦可知也田野之中莫非可取之才有遂大夫從而興之固不至老於龕巖深谷之下而不獲進矣曹氏曰賓興之禮既詳見於郷則遂之興甿安得不同於郷大夫賓興之初郷近於内故以教為主遂逺於外故以耕為主前後互見其實一也易氏曰小雅曰或耘或耔黍稷薿薿攸介攸止烝我髦士求髦士於或耘或耔之間得非六遂興甿之遺意曹氏曰教養之本在於井田耕農之中郷遂之有司所以察其民者固非一端而公論之所稱者固非一日則興於井田者決無虚偽趨競之人於是取而用之其賢而有徳者可以儀表於民庶之上觀感而化而風俗厚矣其能而有才者可以圖回於事為之間綱舉目張而治績著矣林椅曰在遂鄰有長里有宰縣有正大比興甿為此耳明其有功者屬其地治者黄氏曰遂大夫專以教稼穡為職而里宰合耦于耡鄼長趨其耕耨無非農事者故興甿明其有功者亦惟田功而已雖然謹庠序之教申之以孝弟之義雖在畎畝不敢廢也故漢舉孝弟力田有三代遺意屬其地治者謂有黜陟廢興治地之官當有闕絶於是以新興之甿聫屬之興賢能曰出使長之入使治之興甿曰屬其地治者各因其平日之所服習者而官之故曰興士於庠序興農於畎畝鄭康成曰屬猶聚又因舉吏治有功者而聚勑其餘以職事王氏曰明其有功者則察舉其屬人之有功屬其地治者則聮比其地治之職事曹氏曰明有功非不及徳也其服勤於田畆而有功者即其實徳也屬地治非不及教也其聫屬於地治而無曠者即其實教也凡為邑者以四達戒其功事而誅賞廢興之易氏曰六遂之所稽者功事功事則農事之著於功者也為邑者以四達而戒之所以見王政之公通行於天下四達即所謂四達而不悖為公邑者四達於邦甸之地為家邑者四達於家削之地為都邑者四達於小都大都之地四達而戒其功事則民無不趨於事事無不著於功行之以誅賞廢興則功事之戒無非教矣黄氏曰四達謂達之于四畺凡為邑者皆得戒其功事而誅賞廢興之事即所謂以稽功事者也鄭康成曰四達者治民之事大通者有四夫家衆寡也六畜車輦也稼穡耕耨也旗鼓兵革也劉執中曰治教其民有四事可以上達於王一曰食達有以禦水旱二曰兵達有以治軍旅三曰賢達有以補教化四曰能達有以成政治為邑之事惟是四者可達于王則受上賞鄭鍔曰里鄼縣鄙之吏位卑職微無由自達于上令戒之以勉立辨事以謂遂大夫當達之遂人遂人達之司徒司徒達之于王彼其小吏勤職于下得以聲名彰徹于上安得不自勉哉王氏曰凡國之政令自王達之于大司徒自大司徒達之于遂人自遂人達之於遂大夫自遂大夫達之于為邑者此之謂四達鄭鍔曰有以戒之於其先則視其勤惰以行誅賞廢興誅賞廢興非遂大夫所得而專亦達于王而已縣正每縣下大夫一人王氏曰遂官各降郷一等其官各亦降焉故州謂之長縣與黨同謂之正鄙與族同謂之師各掌其縣之政令徴比賈氏曰謂政教號令徴發校比之等黄氏曰徴徴斂也謂之政令徴比比而徴之小司徒井邑丘甸令貢賦稅斂之事是也鄭鍔曰或徴其賦役或比其衆寡非有政令何以治哉以頒田里以分職事掌其治訟趨音促其稼事而賞罰之項氏曰頒田里謂一門里百畆之類賈氏曰分職事者即九職之功事也鄭鍔曰民事不可緩稼事伊始則趨之使趨時易氏曰頒田里所以安民也分以職事聽其治獄亦所以安之而已然人情安則狃於故常而不知勉故為之趨其稼事而賞罰行焉賞罰雖不可詳先王之時入其疆而田野治則有慶入其疆而土地荒蕪則有讓賞罰之行於上也耕耨者有秩叙之賜不耕者有祭無盛之恥賞罰之行於下也然急於勸民而作之以不自已則民無不舉之職事鄭鍔曰民之好逸惡勞古今則一何古之農民不憚作勞丁壯耕而婦女饁後之農民不昬作勞至於舍其耒耜而去於游手是無他古者非特務農之君以勸農為先蓋亦為吏者得用賞罰以與之從事勤於三時者吏則有賞彼安得不慕賞以致勤惰於稼事者吏則有罰彼安得不畏罰而自惰觀縣正趨其稼事而賞罰之之語信周家之吏勸民有術矣然考其賞法無所見惟里宰行其秩序之說意其為力田之賞如漢世力田者賜爵一級二級之類若夫不耕之罰則出屋粟是也李嘉㑹曰頒田里分職事慮有不得其平於是掌其治訟趨其稼事必有勤惰之分故有賞罰若將用野民師田行役移執事則帥而至治其政令王氏曰移執事若遂師所謂廵其稼穡而移用其民以救其時事也易氏曰衆之所集多寡不等則移民以執事治其政令所以用之簡之任之也既役則稽功㑹事而誅賞劉執中曰稽攷其功程㑹其羣吏所集之事職否而正其誅賞黄氏曰亦攷察之如郷師鄙師每鄙上士一人鄭鍔曰教法行於六郷而六遂無書攷徳行道藝之事三歲興甿何耶鄙師猶郷之黨正名謂之師非有敎法何以為師乎各掌其鄙之政令祭祀黄氏曰遂之祭祀見於此所以敎敬也鄭以郷黨祭禜遂鄙視黨然郷州祭社野縣不祭社又禜之名不出疑野祭法略皆不立名或社或禜皆得祭於此豈非里社者歟鄭鍔曰鄙師掌其祭祀則祭祀之時亦如黨正敎其禮事明矣凡作民則掌其戒令鄭康成曰作民謂起役易氏曰戒令所以肅衆志軍法以百家應調發之數故鄼長以旗鼓兵革帥其民而至至五百家為一小陣然後鄙師為之掌其戒令以時數其衆庶而察其媺惡而誅賞鄭康成曰時四時也黄氏曰數衆庶稽其在不也媺惡其人之善良竒衺也自遂師至鄙師皆行誅賞與郷不同郷之誅賞必告於上易氏曰周官校登稽比之政皆言衆寡鄙師獨言衆庶蓋至於五百家則利足以同營害足以同禦斯可以言庶矣衆至於庶則有媺有惡鄙師以時而數之又從而察之媺謂成於郷三物者因民之所好而興之非有心於賞之也惡謂陷於郷八刑者因民之所惡而去之非有心於誅之也其終至於殺之而不怨利之而不庸民日遷善而不知為之孰謂遂官專於耕而非教耶項氏曰縣正稽功㑹事審其功也鄙師察其媺惡審其行也在外則縣正誅賞之在内則鄙師誅賞之蔑有容其姦矣歲終則㑹其鄙之政而致事李嘉㑹曰鄙管五鄼職衆事夥冝於此㑹其政而致事於縣正鄼長每鄼中士一人各掌其鄼之政令以時校登其夫家比其衆寡鄭康成曰校猶數也王昭禹曰族師以時校登其夫家則郷師統其事鄼長以時校登其夫家則遂師統其事王氏詳說曰小司徒與郷大夫言登夫家之衆寡至族師則曰校登其族之夫家衆寡遂師言登夫家之衆寡遂大夫言稽夫家之衆寡至鄼長則曰校登其衆寡曰校登者登之而致其審矣蓋族百家也鄼亦百家也惟百家然後為可校况上自遂大夫縣正鄙師下自里宰鄼長皆不言喪紀之事惟鄼長言喪紀猶六郷之官上下不言葬埋惟族師言葬埋然則四閭為族使之相葬則四里為鄼亦使之相葬等而上之黨相救州相賙郷相賓愚以為在鄙在縣在遂理或然也等而下之閭相受比相保愚以為在里在鄰理或然也不然鄰長何以曰掌相糾相受與比長所謂相受相和親者同乎又何以曰徙于他邑則從而受之與比長所謂徙于國中及郊則從而授之者同乎以治其喪紀祭祀之事賈氏曰喪紀民之喪紀若郷師所云族共喪器之類祭祀謂若族祭酺之類若然縣當祭社與州同縣正鄙師鄼長皆不言所祭神者六遂六郷互見其義李嘉㑹曰六遂之民以農為急喪祭易於曠禮使百家之長治之則職親而事舉若作其民而用之則以旗鼓兵革帥而至易氏曰先王寓兵於民而其器亦出於民無事則藏之器無不完有事則出之器無不利蓋至於百家而後兵器始備若作民而師田行役則族師以旗鼓兵器帥而至鄼長亦以旗鼓兵革帥而至蓋以是帥之以是用之所謂不教而殃民者無有矣若歲時簡器與有司數之鄭康成曰簡器簡稼器也兵器亦存焉有司遂大夫李嘉㑹曰言有司則見其衆凡歲時之戒令皆聽之鄭鍔曰有戒令躬往聽之歸而告戒一鄼為之長者職當然也賈氏曰鄼長中士唯承受遂人巳下之事不得專聽斷鄭知聽謂受聽而行之趨其耕耨稽其女功賈氏曰鄼長彌親民故趨其耕耨并稽攷女功之事鄭康成曰女功絲枲之事李嘉㑹曰男耕女桑俱其職也故鄼長以稽之鄭鍔曰遂大夫以教稼穡為職縣正則趨其稼事鄼長里宰則趨其耕耨何也春耕而夏耨皆稼穡之事非縣正只趨耕於春而鄼長只趨耨於夏里宰之兼趨其耕耨也遂之官以勸農為職則凡稼穡三時之務皆當督之使疾趨時若夫女功之事遂官皆所當稽獨使鄼長稽之豈惟一鄼有女功耶亦互見之義里宰每里下士一人鄭鍔曰六郷之長謂之宰至治一里者猶郷也閭胥亦以宰為名何耶宰取其能裁制耳一里之衆茍無宰制之能何以治之職之卑者於尊無嫌所以同夫宰之稱黄氏曰一車七十五人二十五人一人為甲長謂之甲士即里宰也四丘為甸三甲七十五人春秋作丘甲蓋一丘二十五人起羨卒矣掌比其邑之衆寡與其六畜兵器治其政令鄭康成曰邑猶里也鄭鍔曰治一里之政令冝以里為言乃曰邑者蓋有以五家而稱邑者如鄰長言邑是也有以十家而稱邑者孔子言十室之邑是也有以四井為邑者小司徒所言是也有緫六遂皆名曰邑者遂大夫言凡為邑者是也二十五家亦謂之邑蓋邑者聚居之義衆之所聚皆可以通稱也以歲時合耦于耡以治稼穡趨其耕耨行其秩叙鄭鍔曰一里之家相與耦耕冝自配合何待里宰余以為耦耕之法一耜之廣者五寸二耜為耦廣深一尺故合二耜則須兩人共發之人有老幼力有强弱為耦者未必通耕則耕者廢里宰歲時往即耡室為合其耦使人人適均斯無廢耕之事耡之為言助也易氏曰耡非公田也周之井田皆為長畆其長百歩其廣一歩中間為甽不易之地一畆三甽一易之地一畆二甽兩易之地一畆一甽甽廣一尺壟高一尺二人各執其耦而共發之合二人之耕則耜廣五寸二耜為耦正合一甽之地於是而合耦則兩兩相助謂以兩家之民而耡兩夫之田十夫百夫亦然里宰合耦之所教為治所之名月令季冬命農計耦耕事盖扵此室計之所謂嵗時者其季冬歟為合耦以治稼穡乃趨其耕耨使無失時然有以趨之無以勸之無益也行其秩序所以勸之歟宫伯言行其秩叙說者謂秩者禄廩之常叙者遷進之次此農民耳所謂秩序者何也余謂此乃力田之賞也漢自高后置力田官而尊其秩欲以勸勵天下使之務本文帝又置力田賞員以是知秩叙者爵一級爵二級之數里宰推而行之則庶㡬有遷進之漸以激勸之也賈氏曰或家有一夫二夫共耦若長沮桀溺耦而耕或先後次序相助佐為之曹氏曰里宰合耕于耡之法尤為井田均民力之要指耦者謂兩人相助而耕皆取同力相與佐助之義方里而井井九百畆其中為公田八家皆私百畆同耕公田公事畢然後敢治私事此即合耦之意也然合耕非止一井而已蓋合百家之衆共耕十千畆之田詩人所謂駿發爾私終三十里亦服爾耕十千維耦言使民均其耕耦之力共其刈獲之利自束作西成少長相從平秩有序雖遺秉滯穗亦得以惠及鰥寡孤獨之民黄氏曰鄰長無爵故行其秩使有禄所謂祿足以代其耕是也蓋時時給之皆甿也不相帥屬故以其才等行其序有序則有秩秩序定則有後有先有帥有從有司政令皆可應也周禮凡其體敵不能相帥屬者則皆秩叙宫伯月終均秩歳終均叙郷師邦事作秩叙是也緫論李景齊曰周家以農事開國誠知夫熱耕凍耘霑體塗足人所甚勞激昻振勵不可不極其至故敎稼穡則有遂人廵稼穡則有遂師以簡稼器修稼政則有遂大夫既教之又巡之稼器稼政又無不曲致其意則民冝不敢不勉矣猶未也至於合耦而耡與夫趨其耕耨鄼長里宰復有以盡其職縣正之官又有以趨其稼事而賞罰之以旌其勤而抶其不勉者則知先王設官以為農者如此其詳而官與民日周旋乎襫襏耒耜之中其情可為無間所謂饁彼南畆田畯至喜七月之風亦可想矣後世以勸農為職者足不至田畆口不問菽麥常率一遊要不過具文而已以待有司之政令而徴斂其財賦易氏曰前言治其政令里宰之所以稽乎下後言待有司之政令里宰之所以聽乎上蓋邑之衆寡與夫六畜兵器皆里宰所掌故政令可得而治焉若財賦之事則遂人既已令之遂師又從而征之非里宰所專所以必待有司之政令又見先王取民之有制也賈氏曰此言待有司徴斂者謂縣師旅師鄭鍔曰所謂有司者其遂人歟鄰長五家則一人掌相糾相受賈氏曰使五家各相糾察王昭禹曰相糾則為其有辠竒衺相及故也宅舍有故又相容受也王昭禹曰比長言相及則鄰亦相及矣鄰長言相糾則比亦相糾矣比長言相和親而此言相賛者相賛則欲其相和親也鄰相賛則比亦相賛也比相和親則鄰亦相和親矣曹氏曰相糾相受乃使五家之鄰長得以專之蓋比屋而居五家之勢為至近朝夕出處五家之情為易知其間純實而朴厚與懷姦而餙詐者皆不逃於目睫之頃以之相糾可使有所警而不為非以之相受可使有所勸而必為善變化其氣質潛消其邪心所謂舉賢興甿皆由此乎基之不然民散處於遂者其善惡豈一人所能盡究哉李嘉會曰六郷之民居近郊近則易親比長以和親言六遂之民散居田野則逺此曰相糾而不及和親凡邑中之政相賛劉執中曰邑中之政謂里宰也鄭鍔曰不獨治其一邑之政彼有政焉此其助之此有政焉彼亦我賛則鄰里相通短長相補庶無一政之或闕易氏曰相賛則左右前後相與利而導之有貢賦稅斂焉五家相與賛其財有師田行役焉五家相與賛其力此上之政令所以為易供也五家如此先王之政推而達之天下矣徙于他邑則從而授之鄭康成曰從猶隨也授猶付也鄭鍔曰卒伍之法起於五家之鄰一鄰徙則一伍廢鄰不可徙徙必有故黄氏曰徙不惟不便其處上中下地人多寡絶相逺則不容不徙徙于他邑則隨而付之明其人自官而徙非私遷也與比長所謂徙于國中及郊同然比言國中及郊此言他邑者遂中地廣以下劑致甿詎可容之逺徙即徙于旁邑或可也所謂邑者殆指里宰之里中為邑曹氏曰新遷之地始至之情或扦格未平又使鄰長躬至其所而授之使相信而有所據相敬而無所疑然後徙居者所至如歸王氏詳說曰比長言徙于他而鄰長言徙于他邑蓋六郷無邑公邑采邑皆在六遂比長言為之旌節鄰長不言鄰長之於六遂既非國中及郊所以徙而授之無旌節以行之緫論里宰鄰長曹氏曰縣正而下如鄙師鄼長雖各有職掌大抵皆趨耕稼稽民數謹征役治喪祭戒令誅賞往往略同惟耦耕徙居最為重事乃不列於縣鄙鄼之官獨見於二十五家之里宰五家之鄰長者蓋鄰長雖微能糾察其善惡使氏無遁情里宰雖微能恊此耕耦使民有餘力等而上之有百家之鄼長五百家之鄙師又有二千五百家之縣正次第而考覈之申明而勸勉之六遂之内冝皆良民而無惰農也旅師中士四人下士八人府二人史四人胥八人徒八十人鄭鍔曰旅猶處也然孔子於易則曰旅不處也惟其不處是以名旅易氏曰旅如羈旅商旅之類皆託宿于外未安其居新甿亦然故以旅名孫氏曰先王之民入有保受出有節傳豈容浮游旅寄於四方今民以羈旅為名官以新甿為職豈非自狹徙寛移偏聚之民於闊曠之野上之人當勞來安集之乎易氏曰或謂旅師之新甿繼於鄰長之後即民之徙于他邑而為之授者然他邑居亦六遂之邑乃遂人以下劑致甿之法非旅師以質劑致民之法觀旅師一職言平頒興積以至使無征役始末皆凶荒補助之政大司徒之荒政十有二不言移民之事若食不能人二鬴有非荒政所能聚者然後廩人為之移民就穀凡質劑所致者悉補助之或受門里為甿則謂之新甿此所以有旅師之法掌聚野之耡粟屋粟閒粟而用之鄭康成曰野謂逺郊之外鄭鍔曰康成謂耡粟者民相助作一井之中所出九夫之稅粟夫民既相助作何名又出稅粟恐無此理耡粟者合耦於耡而不趨合耦之令者罰使出粟劉執中曰耡粟為有五畆之宅不耡而𣗳藝之乃出不毛之粟屋粟者有田不耕載師所罰之粟即鄭說張氏曰屋粟不授田徙居之粟楊謹仲曰鄭以屋粟為所罰田不耕者之粟既有此罰則天下無不耕之田所罰之粟不常有旅師果何如掌哉鄉遂公邑皆為溝洫三等采地乃為井田則是當時之田有九一而助者則公田也有用什一之法而使自賦者則無公田者也有公田則所聚之粟謂之助粟乃八家助耕之所收無公田者所聚之粟則謂之屋粟乃三家共其所稅之粟而輸之以其三三相保其稅閒粟閒民無職事者所出一夫之征粟楊謹仲曰其間民無職事者乃不受田之餘夫則常有之矣所賦之粟乃其常也易氏曰間粟即甸地間田所出之粟曹氏曰此三等之粟在農民常賦之外旅師之所專掌愚案鄭氏改而為若最無義王氏連上讀之為是王氏曰掌聚野之耡粟屋粟閒粟而用之者聚此三粟而用以頒以施以散鄭康成曰是粟縣師徵之旅師斂之而用之王昭禹曰載師以時徴其賦則耡粟屋粟間粟皆在焉閭師以時徴其野之賦貢亦耡粟之類耳旅師於無事則徴焉聚而用之而已以質劑致民平頒其興積孫氏曰遂人以下劑致甿旅師以質劑致民皆别為籍以稽之項氏曰以治地之約契案民數而致之則其頒之也平且無所肆欺也王昭禹曰立見謂之質立約謂之劑以此致民防偽冒也鄭康成曰興積所興之積謂三者之粟黄氏曰興發也平頒之不得偏頗有多少縣官徴聚物曰興今云軍興是也陳君舉曰此乃頒其積平其興謂頒我所積以平其價之興也司稼掌均萬民之食而賙其急平其興正是旅師之義施其恵散其利而均其政令鄭康成曰以賙衣食曰惠王氏曰施其恵若民有艱阨不責莫償鄭鍔曰遺人掌邦之委積待施惠野鄙之委積待羈旅矣此旅師又聚三等之粟以施惠以待羈旅何耶遺人與旅師施惠則同其所用則異王制言自諸侯來徙家期不從政比長有徙于國中及郊之文又有徙于他為之旌節而行之之文然則旅師所施惠者皆為新甿之羈旅於野而未有所授之地也與遺人之待羈旅不同何以知之名官曰旅而言凡新甿之治皆聽之則知之也鄭康成曰以作事業曰利王氏曰資之以利本業者又散以與之鄭鍔曰散利則有時而收之黄氏曰散其利不使積貯者有所專擅常平平賣之法也易氏曰行之以王命則謂之施惠行之以有司之常法則謂之散利無多寡不均之患故謂之均此先王所以待凶荒之民也曹氏曰慮其名籍之不定則為質劑以致之慮其物價之興踴則頒此積粟以平之賙其囏阨則施之以實惠助其資本則散之以實利其曰政令之均蓋均是數者無一夫不遂其所欲耳緫論陳及之曰周家之為民慮至矣嵗有凶荒則有補助之政旅師實掌其事平其所興徴者頒其所積聚者凡質劑所致者悉補助之施其惠散其利而均其政令蓋無有偏黨不均之患矣此先王所以待凶荒之民而大司徙十有二教之所謂散利也鄭氏乃以均其政令為使之出息夫豈有補助之政而俾之出息乎介甫青苗之法遂取以為證又以平頒為不問其所欲否而槩與之殊不知旅師之法特救荒政耳意在救民苟樂歲粒米狼戾則民自有餘何至貸於官府哉青苗之法每歲再行取二分之息意謂貸者必窮民否則大姦猾而富足之家則不願取夫貸於窮民及姦猾則未必能出息故為無問其所欲否而槩與之說則富足之家亦强使貸矣凡用粟春頒而秋斂之易氏曰春頒者平頒其興積秋斂者聚野之耡粟屋粟而用之蓋凶荒之歲秋雖不熟尚有餘積或可移用及春作之始茍非上之人為之補助則將有救死不贍之患此先王所以專立春頒之法漢之春和議賑貸正與同意禮庫曰旅師鄭氏云每歲如振貸非也正是専貸新甿李景齊曰頒之以春則民有以濟其乏而斂之以秋則粒米狼戾之時不至於穀賤而傷農曹氏曰其聚之也不雜於常賦其用之也亦不施於常農惟新甿得用之孫氏曰先王之恤囏阨養老幼有予之而不復取惟新甿則春時所頒秋時必斂亦以新甿之轉徙不一茍予而不取既非可繼之道又長游隋之習必定為斂散之法然後可持乆不替人情亦將自勉乎職業不徒仰食于官府矣凡新甿之治皆聽之使無征役以地之媺惡為之等鄭康成曰新甿新徙來者也賈氏曰即上徙於他者治謂有所求乞劉執中曰給其糧食頒其田宅勞來而安集之皆所以聽其治使無征役復之也黄氏曰等復除之等鄭謂以其人之多寡授上中下地非也授地之法常法也遂人已見此言使無征役則為復除之等明矣易氏曰或謂新甿之治與遂人下劑致甿之說同是不然遂人致甿以下地而此之授地則以媺惡為之等不止乎下地也鄭氏以下劑為家取二人而此則使人之無征役併與二人亦不役也是知遂人乃致甿之常法旅師乃凶荒補助之法使無征役非盡使之無也王制曰自諸侯來徙家朞不從政則從於遂者亦可知要必限以歲月之期然後以地之媺惡為之等媺謂不易之上地惡謂再易之下地以三地為輕重之等至期則征役行之孫氏曰新甿雖無征役乆之亦不能免稍人下士四人史二人徒十有二人薛平仲曰六郷之法則曰國中以及郊六遂之法則凡曰為邑者蓋國以容六郷邑以容六遂甸稍縣都皆其邑之所積則稍人之職得不繼於遂官之後乎鄭康成曰主為縣師令都鄙丘甸之政距王城三百里曰稍家邑小都大都自稍以出黄氏曰自甸而往以稍名官者甸稍一法舉稍以包甸都鄙郷法不為丘乗之制其餘則野法而曰掌令丘乗之政令蓋不為丘乗者非其所當令也掌令丘乗之政令薛平仲曰前乎縣師之作衆庶既以其係於公邑者而緫之矣此言稍人之令丘乗則以其出於公邑者而征之矣蓋遂地車賦之正法也易氏曰丘即四邑為丘乗即四丘為甸之所出緫名之曰丘乗軍制之始也曹氏曰自有一丘之馬而車乘之數以之始自四丘之四馬而車乗之數以之定由此推之十乗百乗千乗萬乗而大備故曰丘乗世之言軍制者曰五人為伍至萬二千五百人為一軍六郷六軍凡七萬五千人為千乗王畿十倍其數則七十五萬人為萬乗是每乗當用七十五人今以丘乗推之四丘為甸甸之為井者凡六十有四其為夫者凡五百七十有六以五百七十六夫而使之共出革車一乗甲士三人步卒七十二人其軍制亦止於用七十五人何也曰家出一人為正卒此徒役之大數甸出革車一乗此出軍調發之數陳及之曰備之多以存武備調之少以優民力是知每次調發則五百七十六家共出七十五人并一革車其餘未調發者可以應八次調發之數所謂萬二千五百人為一軍者非盡發此六郷之人合諸乗之丘共為一軍也或曰萬二千五百家為一郷有比閭族黨州郷之名故萬二千五百人為一軍即有伍兩卒旅師軍之數今合諸乗共為一軍而亦有伍兩卒旅師軍者何也曰居郷則寓兵之制出軍則部伍之數古者軍國異容不明言之六遂之間既以伍兩卒旅師軍為萬二千五百人之聨及其用也亦以諸乗萬二千五百人而統之以伍兩卒旅師軍之法使其戰陣行列之際無異乎平時統率之義此丘乗之制政令於是乎出王氏曰丘之政令司徒所掌乗之政令司馬所掌稍八掌令丘乗之政令耳丘言其地乗言其賦所謂同則丘地也所謂徒役輂輦蜃車則乗賦也其作而帥以至掌其政令以聽於司馬司徒則所謂令丘乗之政令也若有㑹同師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聽於司馬王氏詳說曰縣既受法于司馬矣稍人又聽於司馬者縣師所掌邦國都鄙稍甸郊野之地域稍人所掌丘乗之政令是縣師之掌遍於王畿之間稍人之掌止於三等之采地縣師受法於司馬稍人又從而受司馬之法於縣師以見小大之相維也黄氏曰徴發之令司馬下之縣師縣師下之甸縣都復以其法授稍人據其法以作其衆庶而帥之稍人下士得主興作事而為之帥其意蜜矣以聽於司馬聽其分𨽻縣師郷官稍人甸官其作事縣師受灋於司馬稍人受灋于縣師中外相應鄭鍔曰先儒謂同徒者司馬所調之同余以謂一甸增二里十里乃為一成積至於百里乃為一同出車千乗至於一同則人徒車輦可足用故謂之同徒非司馬所調之同林氏曰鄭氏謂司馬所調之同蓋同則丘地以其地之所聚謂之丘以賦役之同謂之同易氏曰以其同井而耕同里而居帥而為役謂之同矣曹氏曰古者不輕用民之力固曰一嵗之役不過三日而更代則忽去忽來無乃紛然擾民是以若作民而師田行役則合其卒伍夫卒伍而言合必有抽摘調發之冝必有更休畨戍之道故先為聨法以為出處之便使凡出征者有居外之勢而其聨則畱以代其更役之事凡出而有事一乗之卒皆平昔之相保相受者是之謂同徒其晝戰則目相視夜戰則聲相聞行以車為衛止以車為營各致死力以相應援莫敢任意以驅馳此車戰之良法大喪帥蜃車與其役以至掌其政令以聽於司徒鄭康成曰蜃車及役遂人共之稍人者野監是以帥而致之既夕禮曰既正柩賓出遂匠納車于階間則天子以至于士柩路皆從遂來賈氏曰以其監三等采地是野監故得并監六遂蜃車之事司徒地官掌徒庶之政令故稍人帥衆以聽於司徒黄氏曰此蒙上以縣師之法作之稍人帥而聽於司徒委人中士二人下士四人府二人史四人徒四十人賈氏曰委人主斂野賦與遺人在道以供賓客亦與徴斂之官連類在此項氏曰路室有委畜聚之小者王氏詳說曰多曰積少曰委積則及於牢米薪芻委則止於薪芻地官有遺人乂有委人取其予之之義則名官曰遺取其聚之之義則名官曰委言遺則可以兼委積言委則積有所不足故遺人言郷里門關郊里野鄙縣都皆以委積為言委人言祭祀賓客喪紀則特曰薪芻與夫木材至於言軍旅則又曰共其委積薪芻者謂軍旅委積之薪芻非委積也薛平仲曰薪芻之所聚曰委蓋地利之至末也視稍人之丘乗其輕重有間矣然稍人以下士為之而委人之官既畀以中士又輔以下士何其於至微且末者顧重其職哉蓋丘乗之當共稍人令之足矣所謂薪芻者其責之於民則常病於細而用之於上則不勝其廣先王必以中士掌之于以示地利之在所愛惜也此斯民野賦之共曾不以細而不堪命歟掌斂野之賦斂薪芻鄭康成曰野謂逺郊以外歛野之賦謂野之園圃山澤之賦王昭禹曰薪以給外内饔爨烹之用芻以給馬牛之用委人掌斂之甸師帥其徒以薪蒸役外内饔之事凡䟽材木材凡畜聚之物鄭康成曰凡䟽材草木有實者王昭禹曰䟽材臣妾之所聚木材虞衡之所作凡言䟽材木材則其材非一色鄭鍔曰九職任萬民使臣妾聚斂䟽材今乃設一官以斂之何也此乃委積之所須者所待為至廣則所積冝至多矣非九職任民之比故専設一官以聚之鄭康成曰凡畜聚之物瓜瓠葵芋禦冬之具也王昭禹曰言凡聚畜之物非一色愚案薪芻䟽材木材畜聚之物皆在地賦外委人於斂野賦之下而兼掌之則所賦之内必有可以通融者不然其斂於民虐矣以稍聚待賓客以甸聚待羈旅鄭康成曰聚凡畜聚之物王氏曰稍聚者所聚稍給之物甸聚者所聚甸賦之物劉執中曰稍聚去王城三百里賓客有時故以待之甸聚去王城二百里而羈旅無時故以待之項氏曰稍廣故以其所聚待賓客可以備禮黄氏曰遺人野鄙之委積待羈旅委人以甸聚待羈旅先王之政不使一人有乏絶之患項氏曰甸小於稍故待羈旅過客其用微鄭鍔曰遺人以野鄙之委積待羈旅蓋遺人之待者米粟之待而委人之待薪芻木材䟽材而已凡其余聚以待頒賜鄭康成曰余當為餘聲之誤餘謂縣都畜聚之物賈氏曰上已云甸稍此餘聚是縣都中畜聚之物王氏曰余聚者所聚經用之餘物頒則用財之餘事故以余聚待之項氏曰其餘則待往來之頒賜李嘉㑹曰頒賜有在賓客有在軍旅有在出疆之使既以委人餘聚待之至遺人不以頒賜立額蓋遺人施恵以下皆非常用故頒賜不可得兼以式灋共祭祀之薪蒸木材賓客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡䟽材共野委兵器與其野囿財用鄭康成曰式法故事之多少易氏曰薪芻䟽材木材之類實祭祀賓客喪紀軍旅之切於用者物雖至微無非大宰之式法鄭康成曰薪蒸給炊及燎麤者曰薪細者曰蒸木材給張事賈氏曰掌次云大次小次及幕並須木材故以給張事鄭鍔曰賓客共芻薪軍旅言共其委積薪芻者蓋軍旅之所共不一此特共其委積之薪芻爾賈氏曰䟽材是百草根實可以助禾粟以供馬牛鄭康成曰野委謂廬宿止之薪芻賈氏曰委積之中有薪芻在野故曰野委其六郷之廬宿委積薪芻自六郷共之兵器承野委之下明與野委同為賓客所用故知是守衛賓客陳兵之器鄭鍔曰共其野委則乂併與守野委之兵器而共之野委不守則敵人鈔略以乏軍須必為之防可也鄭康成曰野囿之財用者苑囿藩蘿之材賈氏曰苑囿藩羅以遮禽獸王昭禹曰野囿財用以備資給曹氏曰古者師行三十里車徒皆止止則必宿而宿必有路室之委是謂野委豈可無兵器以助其守衛乎路室必有藩籬之固是謂野囿又豈可無財用以助其防閑乎凡軍旅之賓客館焉賈氏曰諸侯以軍旅助王征討者謂之軍旅之賓客黄氏曰凡㑹師者不入闗故軍旅賓客館於此使委人館之者就薪芻也鄭康成曰館舍也曹氏曰國事莫重於兵則委人之須備者亦莫詳於兵軍旅之賓客於是可以即安於館焉緫論曹氏曰薪芻材木皆麤惡而瑣細者取之於野而斂不及於民聚之於臣妾而力不妨於農備之於素暇而憂不形於倉猝儲蓄有餘給使無乏取者不病於求之難與者常見其供之易故賓至如歸師行宿飽脫有號召有會同則上作下應求得欲從人無不辦矣周禮訂義卷二十六
