body:
  text: 周禮訂義卷二十一宋王與之撰地官司徒下載師上士二人中士四人府二人史四人胥六人徒六十人鄭康成曰載之言事也事民而稅之載師者閭師縣師遺人均人官之長鄭鍔曰周制王畿之地不過千里可為井田者則授之鄉遂之民內自國中外至疆地不可為井田之所量土所宜又為十有一等之田田或多寡而地有廣狹因其土之所能任而制為之法使地足以容田田足以出賦是故名官曰載師載如舟焉輕重畢載茍不量所載舟必溺如車焉輕重皆任茍不勝其任車必折掌任土之法以物地事授地職而待其政令賈氏曰任土即下文門里里任國中已下是也薛氏曰載師掌任土之法則大而都鄙之長次而公邑之吏下而逺郊之所授又其下而場圃廛里之所居皆所以為任土之法苟以為任民之法則十一之征井田之良法何至於二十而一與夫二十而五哉鄭鍔曰載師之所任者十有一等之田法必因其土之廣狹使地足以容其田田制定而賦亦定矣故先言任田之地乃言任土之賦王昭禹曰土有肥磽燥濕之不同則其所産亦不能無多寡有無之異宜因其有無多寡而為之度數焉是任土之法也如大宰之任萬民焉就其才之所能如禹貢之任土作貢焉因其土之所有各從其所宜而非以強之也易氏曰有土斯有物或冝於九榖或冝於果蓏或冝於鳥獸之類凡所謂地事者以此物之鄭康成曰物色之以知其所冝之事王氏詳說曰物地之法見於載師又見於草人蓋載師物地以任其田草人物地以糞其種有事斯有職或職以耕事或職以牧養之事凡所謂地職者以此授之黃氏曰待政令待稅斂之政令也司書凡稅斂掌事者受法焉其他政令非載師之職也易氏曰以待其令則令其所有如園廛二十而一之類以待其政則正其所為如凡宅不毛者有里布之類以下經證之則地法可考以廛里任國中之地張氏曰廛域中族居之名里郭內里居之稱薛氏曰在市之屋曰廛在里之屋曰里其里受地視廛則所謂廛里者必聚廬托處於其肆者故曰任國中之地鄭鍔曰廛以居商賈之貨里以為民庶之居黃氏曰陳相願受一廛而為氓此廛蓋民居矣遂人曰五鄰為里其在鄉則五比為閭故日鄉里在郊則曰郊里一也賈氏曰廛里即孟子云五畝之宅者以場圃任園地薛平仲曰田不可種植妨五榖之生惟室廬之傍有園圃以育草木於此則𣗳果蓏也常時則闢場為圃而種植九月則築圃以為場而納禾稼此則場圃同出於園地鄭鍔曰場以登禾黍之入園以為果蓏之區以宅田士田賈田任近郊之地黃氏曰宅田居於城郭之外者之宅地也書曰表厥宅里孟子曰五畝之宅是不獨民也有士大夫有服公事者民曰廛士大夫曰宅通則皆曰宅廛有征而宅無征城郭中不能容則居於外鄭曰宅田致仕者之家所受田非也仕者世祿雖死祿猶及其子孫況老而致仕者固當給祿矣謂之宅田則非也鄭引宅者在邦在野止謂其家之所在耳豈凡稱宅者皆致仕者哉陳及之曰宅田卿大夫之圭田鄭康成曰士讀為仕仕者亦受田所謂圭田也孟子曰卿以下必有圭田圭田五十畝黃氏曰士田士之祿田也以其所入什一之稅給之諸侯班祿見孟子王國班祿亡不可考圭田當在此鄭司農曰賈田者吏為縣官賣財與之田王氏詳說曰成周府史胥徒之外又有賈人是賈人之有事於縣官者也黃氏曰書曰肇牽車牛逺服賈蓋謂農民既藝黍稷榖有餘則賣之易其所無者非謂且耕且販也杜氏曰五十里為近郊百里為逺郊王昭禹曰致仕者以備國之訪問士受職於朝賈列肆於市其田皆冝近故任以近郊之地以官田牛田賞田牧田任逺郊之地鄭司農曰官田公家所耕田王氏詳說曰藉田千畝甸師耕之正公家所耕之田後鄭以此為庶人在官之田則公邑之田何所用乎甸稍縣正欲以祿府史胥徒也王氏詳說曰先鄭牛田牧田說是也牛人養國之公牛牧人掌牧六牲無田何所取給乎後鄭以為畜牧者之家所受田非也牧人下士牛人中士三百六十之屬中士下士多矣何皆無田而獨於牛牧之家乎鄭司農曰賞田賞賜之田賈氏曰即司勳之賞田也黃氏曰公卿大夫士庶人於法應賞皆得有之薛氏曰官田公家之田惟近則易以供不時之需賞田旌功之田惟近則易以給非常之賜牛田牧田則養公牛六畜惟近則易以供祭之用故曰任逺郊之地陳君舉曰廛里不特國中有也而國中為多宅田士田賈田分散在甸稍縣都隨其所在給之不獨近郊有也而近郊為多官田牛田牧田賞田不獨逺郊有也而逺郊為多凡以上曰不以井為限所頒多寡而載師徴其材賦故獨任之而民田不與焉鄭氏之說不足采且以一端言之謂士田在近郊官田在逺郊夫官府遍王畿之內若在五百里之間豈可受田於近郊逺郊乎以公邑之田任甸地黃氏曰郊外四甸之在逺郊之外其中置六遂七萬五千家餘地盡以為公邑自此至畿疆四處皆有公邑故據此而言之圖說曰特於甸地言者言公邑始於此陳及之曰公邑之田謂在官之田未頒與人者黃氏曰公邑對家邑為名甸田皆井授故小司徒曰乃經士地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都是為丘乘之制甸七萬五千家為六遂共車千乘鄭康成曰公邑六遂餘地非也甸為六遂無餘地蓋其居民一以遂人鄰里鄼鄙縣遂之法施之以存卒伍之制其授田一以司徒井邑丘甸縣都之法施之以益丘乘之制里宰掌比其邑之衆寡鄰長凡邑中之政相贊則所謂邑者乃參行於鄰里之中而六遂之地十二同止能容七萬五千家非若六鄉有餘民别而為四郊也其曰公邑以其屬天子也司馬法二百里為州者言其居民如鄉之州也以家邑之田任稍地以小都之田任縣地以大都之田任疆居良反地黃氏曰以家邑之田任稍地謂天子大夫各受采地二十五里在三百里之內也以小都之田任縣地謂天子之卿各受五十里采地在四百里縣地之內也以大都之田任疆地謂三公及親王子母弟各受百里采地在五百里疆地之中也家邑大夫之食邑也其在畿外則為附庸之國不能五十里者謂之食邑非謂盡食其地蓋亦使取公田之稅而食之有大夫士有府史胥徒皆當有祿盡取給於此而歸其餘於王故謂之稍專以廪祿為義也司馬法三百里曰野言其居民授田悉與甸同也甸為公邑稍為家邑公邑合而聽於遂人家邑離而聽於家大夫費郈武城莒父小都大夫之都鄭以為卿之采地非也卿受地視伯謂之縣者著野法也必著野法者見都鄙之猶有王田也大都公卿之都也公百里州公祭公伯七十里不言七十里者合之於百里凡伯曰我居圉卒荒芮伯曰孔棘我圉圉疆也其曰疆者言為天子守封疆也又謂之都甸稍縣都猶縣之為縣也甸法四甸為縣四縣為都載師小都曰縣大都名皆互通都鄙之外一以丘甸之法治之故其名通稍不為邑縣疆不為都天子使吏治之而屬乎遂人遂人曰以逹于畿是也鄭於遂人曰中雖有都鄙遂人盡主其地非也王昭禹曰自家邑至大都以官之最尊者與王子弟之愈親為外蓋其官最尊其親愈密則其內之盡心於王為益至外之捍衛於國為益嚴陸氏曰王制所謂縣內舉中言之也然則以公邑之田任甸地元士於此受可知凡此其大凡也其地有餘有不足蓋有通法存焉雖卿或在疆地雖大夫或在縣地取足於封而已易氏曰惟內諸侯以祿為主故所任之地與郊甸同謂之田陳君舉曰古者采地未嘗世守若溫原攢茅之田周武王嘗以封蘇忿生矣周襄王嘗以賜晉文公矣狐氏陽氏復受命於晉以處之蓋更狐陽而後至郤氏郤氏而爭其田故單劉二公所以曰若治其故則王官之邑此言一出足以破郤氏之貪於是晉侯俾勿爭若已識其機準是一事則知采地無世守也明矣圖說曰四郊地居四同甸居十二同稍居二十同縣居二十八同都居三十六同共計百同之地此王畿所以為千里陳君舉曰先儒以為畿內方千里積百同九百萬夫之地其言是也以為中有山林陵麓川澤溝瀆城郭官室涂巷三分去一其餘六百萬夫又以田不易一易再易上中下相通定受田者三百萬家則非矣考封建之法王畿方千里者田方千里公侯凡百里者田方百里方千里者為方百里者百為田百萬井九百萬夫之地受田者八百萬夫百倍公侯之國夫然後足以為天子都圻鎮撫天下矣若受田止於三萬家則是方百里者三十七五十里者一耳安在其為方千里本根不強何以應千八百國之求乎先王以田制祿一夫一婦受田百畝上農夫食九人諸侯之下士倍上農夫中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿計口受田積而上之度人情交際之廣狹裁其用度之多寡而受之為公侯者田不百里不足以待天子睦四鄰親九族守宗廟定社稷伯必七十里子男必五十里不可多也不可寡也若鄭氏劉歆之言乃連山川未審田之定數茫然依約以為國者也夫國之肥磽四方不同故大禹有九等之例後世亦有土色之辨因其地之肥磽以定田之廣狹百里之國提封萬井是為定制豈有先定四封然後去山陵林麓川澤又始以一易再易定其夫家之數乎井田封國帝王之世系百世之根本若根本無法制則萬世將如之何又諸公封方五百里其食者半則是方百里者六五十里者一矣以鄭氏所言王畿計之合六國諸侯已是與王敵矣尾大不掉豈先王良法陳君舉曰或問載師凡地以何人耕曰只是使食公田之稅耳且如古人以公田養士大夫之家仕宦於朝則有常祿祿食如漢餐錢之類漢雖關內侯亦未嘗有地如二千石以下皆受榖於司農掌金榖之淵唐室無賦祿之制但令以房廊錢自給當時雖有促錢令史終唐之世賦祿不能定其實封有戶者亦不過幾人至太祖始立祿格如俸錢供給錢者皆王介甫始制此事最是然其無收處却令州縣供給錢仰給於公使庫公使庫不能辨此其勢只得將軍資庫錢制而用之如此立法是教天下之人將軍資公使庫合而為一也凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五鄭司農曰任地謂任土地以起稅賦也林氏曰載師任土有任其地之所居者有任其地之所征者自廛里至大都此任其地之所居者有逺近也自國宅至漆林此任其征之所出者有輕重也鄭司農曰國宅城中宅也鄭鍔曰民為國本本固則邦寧則國中所居蠲其賦而無征冝矣鄭康成曰國宅凡官所有宫室吏所治者也劉氏日謂國也宅也國即上文廛里任國中宅者上文宅田廛田宅田無征其餘皆有征矣此但覆解上文自國至都征稅之差更無别少異而兩鄭之說俱非賈氏曰園即上經場圃任園地廛即上經廛里任國中之地廛則孟子云五畝之宅𣗳之以桑麻是廛無榖也園則百畝田畔家各二畝半以為井竈種䓗韭及瓜是園少利也黃氏曰廛稅有夫布以夫一廛為名與里布雜征居二十之一里布以里居為名蓋給閭里雜用共服器之屬孟子不欲以室廬蠶桑之稅病民故欲去之鄭鍔曰園圃所産之利微市廛只以為居貨之所故二十而取一皆輕之也記者謂廛與陳相願受一廛為氓之廛同非市廛也余以為既言國宅無征則廛里不當有賦今有二十而一之賦其里非居之廛明矣商賈有門關之稅則居貨之所不得不輕之也愚按園廛亦之圃臣若焉汪是國之周氏之也黃氏曰國中什一使自賦役多稅輕逺郊二十而三役稍簡矣自此去國益逺役益簡稅漸增至十二而止自甸而往通行公田九一之法蓋并雜徴為十二自郊至都役賦相乘除而通平然猶必優內也陸氏曰甸稍縣都無過十二謂如百畝而徹賦民什一於一中又以十分為率取二也畿外諸侯以歸公上大略如此賈氏曰漆林之稅特重以其非人力所能作鄭鍔曰漆之為物特為用之飾舜造漆器羣臣咸諫懼用漆而至金玉富民之道可不禁其奢乎植至於成林則奢意無極特重其征非不仁也陳君舉曰周制什一之法通行於天下而載師立法多寡不均蓋參之前文而得其說近郊十一則圭田之稅商賈之田稅所以輕者蓋圭田以當祿奉祭祀商賈既有關市之征不可重也逺郊二十而三則庶人在官者之田賞田之稅畜牧之田稅所以比田稅差重者抑閒民及豪強之家也甸稍縣都皆無過什二則公邑之田稅卿大夫采地之田稅嵗貢什之二而有其八是亦優於畿外諸侯矣以上田非民田也故多寡隨冝而取若井田則什一而稅智者不能易此說又曰此九等之賦皆是公卿大夫所封之地在乎邑者其所得甚薄故以二十而一歸乎天子或封之以逺近之田者其所得厚乎邑故以十一而歸于天子至於封之以甸縣之都是封之以邑也其所得厚乎田故以十二歸之天子至於漆林之征是其所受之邑其中有漆林之地故利為厚則以二十而五以取之薛氏曰載師之法非取民之法乃任地之法耳國有宫室吏所治也故無征場圃者果蓏珍異之所出廛里者貨賄財利之所聚其利甚微而不可以厚斂故園廛二十而一宅則退政於朝士則列職於朝賈則服役於朝朝廷之所深恤者也雖受田不可以無稅而所取不可以過厚故近郊十一官田者公家所耕之田賞田者賞賜所豫之田牛田牧田牛牧所給之田彼皆得於在官之田雖斂之以稍厚不為過故逺郊二十而三至於六遂之餘地則公邑所受者為甚緊家邑小都大都之所受地視公侯伯子男則受田者為尤富斂之雖加厚而亦不為刻故甸稍縣都皆無過十二若夫事漆林之末作而掌山澤者尤當抑末作而厄之以重斂故漆林之征二十而五其首曰凡任地則知其為凡任地者之賦也陳君舉曰海內之地方千里者九以其一為畿內畿內之地方百里者百以其一為郊內鄉遂在焉此天子所自有也而近郊有宅田士田賈田逺郊有官田牛田賞田牧田則郊田亦或賦之諸臣而不皆治於天子之吏郊外唯公邑謂之甸所謂閒田也其餘以為家邑謂之稍大夫受之以為小都謂之縣卿受之以為大都謂之疆公受之凡此皆封君也各衣食其租稅以歲時頗有入於王府則近郊十共其一逺郊二十共其三稍甸縣都皆十共二是謂九賦蓋輸公上者厪厪如此由此觀之以方千里者九而天子所自有其一誠非自封殖以縱其欲徒以具百官成六軍受四方㑹朝焉耳等而下之公侯伯里伯七十里子男五十里而其君毋過十卿祿卿一旅之田大夫一卒之田而又都城過百雉伐冰之家畜牛羊則於禮為大禁大抵大小相維而不相殊絶是之謂均茍不均則自天子逹諸侯不得專有之是故山澤不以朌采地之內有漆林焉則倍蓗其征虞衡雖王官然其歲入非喪紀勿用以經考之九州川浸澤藪名在職方不屬諸侯之版而詩不以圃田繫鄭春秋不以沙鹿繫晉略可覩矣周季諸侯始擅不朌之利齊斡山海桃林之塞郇瑕之地晉實私之僭侈滋甚往往稱霸甚者至周歲貢百二十金於魏以易溫圃秦人痛懲之罷侯置守以養千八百國之君者養一人而山澤陂池之入特為禁錢屬少府由是人主獨富強而郡縣單弱天下之禍初起於匹夫然後知周過其厯秦不及期非但仁義之澤不同亦制度之異也凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征黃氏曰里布出於蠶桑宅雖不毛猶出里布屋粟出於藝植田雖不耕猶出屋粟旅師掌聚野之鋤粟屋粟公田九一之外復有此稅以夫屋為名所以給施散若今之義食歟民無宅則無里布無田則無屋粟然必出夫家之征在國則出十一之貢在野則出九一之賦一夫百畝之所任家征出士徒車輦給繇役視其費為之數王氏詳說曰里者方里而井之里何必以為二十五家為里布者布緦也何必以口賦出泉為布且比共吉凶二服是里布所罰以為吉凶二服有宅則有宅征有田與夫家則有田夫家之稅雖因而罰之但屋粟與夫家之征為常法而里布為非常法故屋粟夫家之征言出而里布言有有者不冝有也後世以里布為常法故孟子曰廛無夫里之布則民皆願為之氓唐時調法有家則有調而使之出絹去成周法意逺矣薛氏曰學者為之辭曰抑末作也激游手也抑不思彼無生息蕃養之源而蹙之以刻剝之政民將何所出乎且閭師於不植者無椁而已載師則使出二十五家之布閭師於不耕者祭無盛而巳載師則使出三夫之稅閭師無職者出夫布而已載師則使出夫家之征何同情而異罰乎所謂宅不毛田不耕與夫民無職事者非為民而言為任地者言耳謂夫都家之長公邑之吏近郊逺郊之所授皆任地者也彼既任是地則當墾闢田野教督耕桑可也今都鄙郊甸之中猶有不毛之宅不耕之田無職事之民則是上忘於職而忽於政故宅不毛者其長有里布之罰田不耕者其長有屋粟之罰民無職事則又罰其長以夫家之征夫然後為君者不虐於誅斂任地者不困於供輸何者謂所生足以給所取也孟子曰入其疆土地闢田野治養老尊賢俊傑在位則有慶入其疆土地荒蕪遺老失賢掊克在位則有讓在諸侯如此則其於郊甸都鄙者可知陳君舉曰閭師之罰罰庶民受井田者載師之罰罰有官職及閒民商賈也若圭田賞田公邑家邑小都大都之田商賈之田畜牧之田庶民在官之田何以罰之特重蓋有官者怙𫝑豪橫給以田而不耕授之宅而不毛則剝下虧上多矣庶人在官而不知耕則橫取強斂多矣商賈之家畜牧之家有田而不知耕則逐利甚矣凡此皆先王所甚惡故罰之特重也以時徴其賦易氏曰徴其賦者謂任地之正賦若里布屋粟以及夫家之征當時不常有故不立為一定之法鄭鍔曰徴之必以時則上不病國下不病民陳君舉曰冢宰制國用而財計萃於地官所謂九功者六鄉之中農圃工商山澤之賦閭師掌之九賦者廛里及疆士之有田至於都鄙者之賦載師掌之其市征廛人掌之其野斂縣師旅師掌之微至於薪芻角羽茶炭之斂各有其人而其嵗入泉在泉府榖在倉廪人委積之守在遺人皆司徒之屬而天官大府之所受特市事貨賄之入然後知冢宰制國用者非但二三府區區出內蓋兼總貢賦功之入而以九式出之以中大夫二人為司㑹治其最凡焉而以萬目付有司要其財守則固地官之職也周之大計富藏天下不盡歸之公上自九職九貢既皆不領於朝廷之經費而以九賦當歲之百須雖天子不得以意增損於其間者則以其藏在羣有司其節在大臣故也藏在羣有司雖大臣不能侵官以順適其上節在大臣雖羣有司之積若丘山而不敢專輒於下然則分𨽻二卿示公共防踰越而冢宰所以為獨制國用也歟周之大政令每如此今見於詩書周公召公並相成王而洛師之役召公先相宅及周公蒞卜而後丕作康王即位同召六卿而命仲桓南宫毛者必太保宣王南征程伯休父實為司馬而整六師者大師皇父也是謂一相處內無所不統不但理財然也秦兼天下山海池澤之稅屬於少府以給共養謂之禁錢其屬自為尚書蓋周司㑹之官則是自㑹其所司不𨽻丞相漢文帝問丞相天下錢榖一嵗出入幾何陳平對以責治粟內史內史今大農也而不及少府則少府為天子私藏雖丞相有不得與聞者而利權始分矣閭師中士二人史二人徒二十人鄭康成曰主徴六鄉賦貢之稅者陳及之曰閭師徴國中及四郊之稅縣師徴野之稅皆民田什一而稅者也鄭鍔曰或謂六鄉之中二十五家同一閭各設閭胥以統治之矣又有閭師之官何也蓋閭胥所掌者一閭之征令閭師則掌國中及四郊人民六畜之數以任其力以待其政令以時征其賦此其職之所以不同也然六鄉有比閭族黨之名獨取閭以名官者康成謂征民之稅冝督其親民者其說恐未盡何則比閭族黨之官無非親民者不獨閭為近民之官而已嘗以縣師觀之有四甸之縣有五鄙之縣有小都之縣而掌征邑之貢賦者則以縣師名之謂其在四百里之地四甸五鄙小都之縣俱可總於是故也若夫五比之家則合而為一閭閭之百家則合而為一族族之五百家則合而為一黨小而一比則未成為閭大而族黨則各同出一閭欲知民數以任其力而征其賦必當出入乎閭巷之間然後知之為甚悉名閭之意殆由此爾閭師之任既為匪輕故雖以中士為之而命名曰師冝矣鄭景望曰後世催科之法縣以户長保長率十人催二三百家之稅既巳難矣而定役者止據物力之髙下而不問其居舍之廛野故在逺郊而催城中之租居東鄉而督西保之稅姓名居里之不可識逃亡死絶之不可知而破家蕩産之害相尋役法之為民病也深矣或曰近世三十甲之說亦近於五比為閭之意夫何行之而猶病曰聨民者不異廛野役民者不本保伍雖以一夫徵十夫之稅而越竟奔走之勞死徙代納之害猶前耳掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦賈氏曰閭師徴斂百里內之賦貢故云掌國中及四郊人民六畜之數鄭鍔曰內而國中逺而四郊有人民焉為邦之本有六畜焉為家之資當悉知其多寡之數然後可量其力之所能任易氏曰牛以力而載馬以力而駕雞豚狗彘之畜無失其時八口之家可以無飢則知其力之為有餘由是任民則農圃之事以至虞衡之事皆其力之所及耕植之貢以至山澤之貢皆其力之所出量其地然後任以事任以事然後可以待上之政令而責其出賦以供在上者為無愧在民者乃無怨凡任民任農以耕事貢九榖任圃以𣗳事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物鄭康成曰貢草木謂葵韭果蓏之屬易氏曰大宰言任民則任之以其職閭師言任民則任之以其貢惟閭師以貢而論則山澤之職無慮數萬此所以列虞衡為二鄭鍔曰山澤所出不同其職可以兼言其貢則不得不分也疏材之利毫末而巳此所以不言臣妾劉氏曰臣妾各有所𨽻而無地職以任其力也然九職以虞衡為次此以虞衡為後亦山澤之利與民共之黃氏曰凡任民國中九職雜居與野不同其授地或多或寡或不授地參差不齊故皆使什一自賦圃牧工賈則皆視農夫百畝各足以致其一夫之力而什貢其一畿內無貢謂之貢者言下之所以奉其上也國中貢即賦也什一自賦其實夏法鄭鍔曰或謂龍子以為治地莫不善於貢貢者校數歲之中以為常以為樂嵗寡取凶年取盈周人用徹法今乃有閭師之貢何也余考康成之說周制畿內用夏之貢法邦國用殷之助法又考儒者之說謂大宰任三農之法是助法其法藉而不稅載師任地之法是貢法其法稅而不藉畿內自有貢法助法不然則閭師之於國中四郊何以有貢耶余謂貢法用於餘地不耕田之處助法用於鄉遂為井田之處凡無職者出夫布鄭鍔曰所謂無職則指閒民為臣妾耳臣妾者八職之所役閒民者八職之所恃初無可貢者特使之出一夫之布蓋使出一夫算口之泉與里布夫家之征異矣然此布非罰布也亦以出為言者既謂之無職殆亦不冝出者也不冝出而出之亦勉之使勵勤耳楊氏曰大宰九職九曰閒民雖無常職而使之轉移執事是亦有職也閭師之任民以時征其財則八職之民皆有常職矣凡無職者亦使之出夫布則閭師之征賦亦非不及閒民也先王任民其詳至於嬪婦化治絲枲臣妾聚斂疏財雖婦亦各有職不蠶則不帛不績則不衰故夫耕婦蠶以其衣食無敢不自力者此黎民所以不飢不寒養生喪死而無憾也夫惰農自安不客於先王之時豈閭師任民而不及閒民哉蓋閭師任民以征賦為主而轉移執事巳列於九職之末故不言也黃氏曰凡民職業雖不同而皆受廛居作受廛者必有夫布閒民雖不受廛亦必出夫布如有職業者此所以懲之也王昭禹曰大宰嘗以九職任萬民大司徒頒九職三事以登萬民則任民以九職為本以三事為輔無職者謂無事於九職也冝有以厄之使任職焉故罰之使出夫布載師言里布者罰出居里之布此言夫布者罰出夫丁之布林氏曰閭師凡無職者出夫布所以懲游惰至漢始一槩為算賦故髙帝紀書云𥘉算賦蓋􅏺變古重斂害民也凡庶民不畜者祭無牲不耕者祭無盛不𣗳者無椁不蠶者不帛不績者不衰鄭鍔曰先王使民植桑種麻雞豚狗彘之畜無失其時者使之養生喪死無憾然人之情好逸惡勞欲其不惰於本業非有以罰之則有所不勉蓋庶人之家五母雞二母彘畜以為牲不畜則使其祭不得用牲耕以供粢盛不耕則使其祭不得用盛鄭康成曰盛黍稷也不種植則使其死也有棺而不得用椁鄭康成曰椁周棺也不蠶桑則使其衣不得衣帛不績其麻則使其喪不得衣衰凡皆所以恥之易氏曰人孰不念其先亦孰不愛其身於此缺焉能無愧乎玉藻云惰游之冠垂緌五寸亦皆所以愧之也愧之也者勉其怠而作其力也黃氏曰工賈皆不耕豈可以使祭無盛儒不耕而食孟子所謂入則孝出則弟守先王之道以待後之學者固得通功易事也鄭景望曰老不帛死不椁喪不衰祭不牲不盛民之所以養生喪死厚終追逺情之所甚不忍咸無焉則罰而懲之不亦甚哉夫然後各致其力而野無曠土各率其職而國無游民衣食足於下貢賦裕於上夫先王之政本以養民因資其力以養國故凡一豫一奪一勸一懲皆以豐其原培其本後世任民無政勵民無術豫奪勸懲一皆為取民而設民生無以養死無所葬水旱饑饉枕藉溝壑莫之問而取民之法顧日益苛牧民之吏顧日益急不亦異乎縣師上士二人中士四人府二人史四人胥八人徒八十人鄭康成曰名曰縣師者自六鄉以至邦國縣居中焉黃氏曰縣師鄉官也而掌天下地域人民六畜車輦之數及徴野之貢賦猶以內統外也以縣為官取四甸為縣之義丘乘之制貢賦之法於是詳焉王氏詳說曰此天子所以謂之縣官鄭鍔曰耕牧之地有名縣者四甸為縣是也六遂之地有名縣者五鄙為縣是也采邑之地有名縣者小都之田任縣地是也此縣師之職掌邦國都鄙稍甸郊里之地域而亦名曰縣與上所言三縣之名則同其實則異何以言之王國百里之外為六遂又其外為小都大都尚有餘地不以封人者則謂之公邑天子使吏治焉其官名曰縣師則近而四甸之縣逺而五鄙之縣又逺而小都之縣凡所謂公邑者皆總統於是鄭司農謂四百里曰縣者正謂是也陳君舉曰周制以載師專管在官人祿地租賦以閭師專管農田租賦至縣師又通管軍政及野賦甸稍縣都大率皆是受分地人其中間田則領於王官亦以鄉遂之法治之至於鄉遂只是邦畿之內分擘閭師四郊縣師郊里管仲三分國之法正是鄉遂法五鄙之法正是甸稍縣都法但其制頗有團併以規利整促以便用兵處非先王立法之意掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以考羣吏而以詔廢置賈氏曰稽計所計之數皆知之吕氏曰先王自封建諸侯外有閒田散在諸侯之國或謂諸侯有罪則削其地以為閒田若有功則以閒田增封之天子平時各命王官以掌之縣師掌邦國都鄙稍甸郊里之地域而兼天下之閒田以總其目此皆古人封建相維之意鄭鍔曰邦國者畿外之諸侯都鄙者畿內之小都大都稍者大夫之家邑邑者六鄉之井地郊里則自國中以至六鄉其地域不為不廣鄭康成曰郊里郊所夫居項氏曰如一里九其夫家人民王氏曰人民在夫家六畜之中則是民之𨽻也質人所謂人民同意項氏曰如一家九夫田萊之數不為不多項氏曰如田百畝萊五十畝之類鄭氏曰萊休不耕者其畜車輦不為不衆如使縣師盡得而掌之又從而辨之從而稽之非司徒而何然其所掌者止於邦國都鄙稍甸郊里之公邑則知其不同於司徒矣史氏曰夫家人民之增損田萊之荒闢六畜之登耗車輦之備乏必待三年大比而稽考於是羣吏始從而廢置則其法略於官府鄉遂矣鄭鍔曰逺而邦國近而都鄙與夫稍甸郊里之地俱有公邑則俱有羣吏吏有勤有怠則冝有廢有置以勸激之詎可以為餘地而不考之哉縣師於大比之年從而考之知其勤則詔王以置之知其怠則詔王以廢之夫如是孰敢不留意於王事哉說者以為鄉師之職嵗終考六鄉之治以詔誅賞奚為縣師獨於大比則以詔廢置而不及誅賞無乃公邑之法獨異於六鄉乎余以廢置視誅賞為輕誅賞視廢置為重鄉師為六鄉之老而鄉師乃公邑之官縣師止於專治公邑而鄉師於事無所不考縣師亦鄉師所稽故縣師於廢置之輕者可得而詔若夫誅賞之重有不得而與焉縣師於大比詔其輕鄉師於大比詔其重職有尊卑理亦冝然孰謂公邑之羣吏獨無誅賞以馭之哉黃氏曰此天下軍籍也其序自外及內著其為一法也調發多用外兵止及郊里六鄉之軍司馬不得而徴發之也六鄉之軍專衛王大比小司徒巳考四郊之吏縣師亦考之者小司徒掌教縣師掌斂其賦各行其職必考察之而後其事嚴整若將有軍旅㑹同田役之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至易氏曰戒者戒其豫備黃氏曰司馬主兵其令不得直行於天下必有縣師關節此先王微意兵皆民也發民為兵而主民之官不應全不知故使其屬行司馬之法作起也起其衆庶馬牛車輦而後㑹其車人卒伍邦國都鄙鄉法卒伍雖素定而車人不相須甸稍縣都野法車人相須而縣鄙居民未嘗為卒伍故於此皆以司馬之法㑹之五人為伍百人為卒離則皆伍聨則皆什百人為卒鄉為四閭野為四里車徒異部多少稱事王氏曰車有車之卒伍若司右所謂合車之卒伍是也人有人之卒伍若小司徒所謂㑹萬民之卒伍是也鄭鍔曰周制以軍旅㑹同田役為國之大事不惟須衆庶以為用而馬牛車輦旗鼓兵器皆不得以不備不惟取於六鄉之民亦有時用公邑之民六鄉之吏帥之而至以聽司徒之政令公邑之民為司馬者得而用之縣師聞有是戒則往受其法以作公邑之衆庶及馬牛車輦㑹其車之卒伍又㑹其人之卒伍有旗以為之指麾有鼓以為之號令有弓矢殳矛戈㦸以為之擊刺使之各備其物然後帥之以至黃氏曰郊兵其吏帥之野兵稍人帥之邦國都鄙各從其主先儒謂鄉師以旗致萬民則帥而至者謂致於鄉師也余以為六鄉之民鄉師之所統治則民冝致於鄉師若夫公邑之民非鄉師之所統治而用民之法本受於司馬則此所謂帥而至者冝致於司馬若受法於此而致民於彼則調發之多少孰從而知之哉嘗考稍人之職掌令丘乘之政令者也若有㑹同師田行役之事則以縣師之法作其同徒輂輦帥而至以聽於司馬夫以稍人受法於縣師縣師受法於司馬上下相統出於一律安有受司馬之法乃帥而至於鄉師乎先儒之說陋於是矣凡造都邑量其地辨其物而制其域賈氏曰都謂大都小都邑謂家邑王昭禹曰縣師掌閒田之地內自郊里外及邦國凡餘地皆在所掌則凡造都邑者合天下閒田言之鄭鍔曰大司徒言造都鄙制其地域而封溝之以其室數制之此又言造都邑量其地辨其物而制其域何也司徒所造者畿內三等之采地縣師所造者公邑之地造都邑將以居民地邑民居必參相得惡可不量其地之廣狹五地之物所生異冝惡可不辨其物之名色鄭康成曰物謂地所有也名山大澤不以封家邑之里二十五小都五十大都百烏可不制其域之小大封都邑者必有定制故皆以制其域為言王昭禹曰制其域則為之立疆界大小之限若夫大司徒言以室數制之即此所謂量其地言以土冝之法辨其名物即此所謂辨其物造之之法則同所造之地則不同所以各言之黃氏日凡造都鄙鄉法卒伍令賦邑野法丘乘令賦調發徴斂皆當用之故其所授民皆有數而不使其地有餘不足量其地知其所能容辨其物知其易不易以歲時徴野之賦貢鄭鍔曰貢賦之出於野者必當以時征之不先時以困民所無不後時以失民所有乃所以惠吾民也說者謂載師閭師皆言以時征其賦此獨言以時征野之貢賦何也載師所征者任地之賦閭師所征者國中四郊之賦縣師征公邑之賦貢其地乃公邑之閒田故特言野以别之遺人中士二人下士四人府二人史四人胥四人徒四十人王昭禹曰掌施惠以振救故以遺人名官薛平仲曰取之於民而不知所以豫之則施報之義乖豫之於民而不知所以均之則公平之義泯遺人必繼於此者先王所以示施報之義均人又繼於後者先王所以示公平之義夫風俗之不善不由於施報之義乖則原於公平之義泯先王設官以寓教而動化風俗之機每形於不言之表則亦何往而非教哉掌邦之委積以待施惠王昭禹曰言邦之委積以别於諸侯國也賈氏曰此與下為總目鄭鍔曰先王仁政務在利人而已憫其不足必施惠以豫之又謂用物不足則惠有時而窮欲其不窮則其積也冝厚故立遺人之官使掌邦之委積欲其積之有素然積於此者有限待事之來也不一以一方之積將以施無窮之惠不可也故所積各有地因其地之物以待其地之事則物不匱而惠不竭故自鄉里而下各有委積以待事黃氏曰鄭謂餘法用非也廪人匪頒賙賜未有所指授儲之以待故可謂之餘法用榖不足則可止也遺人施惠皆有品式不可已者如郊里委積以待賔客豈餘法用邪又縣委以待凶荒今亦以榖不足而不出可歟大抵司徒教民相賙相救民力之所不能任與其所當任老孤羇旅國皆自當任之本文王惠鮮鰥寡之政國用之不可已者常時給養之一旦以榖不足而止則皆當為餓莩此遺人委積廪人匪頒賙賜皆當於徴斂時與倉人分受之大略如今省司義倉米各有所屬遺人所當用者亦必皆有餘蓄雖凶荒榖不足不得止也遺人與閭師縣師為聯閭師徴鄉賦縣師徴野賦其事相關郊外曰野五鄼為鄙委人以甸聚待羇旅野鄙即甸也稍無委積稍賦專給廩祿冝無餘也凡委積道逺則移用鄉里之委積以恤民之囏厄鄭康成曰鄉里鄉所居也賈氏曰鄉里謂國中鄭康成曰囏厄猶困乏鄭鍔曰鄉里之委積出於農民之力農有囏厄則取以賑恤之出於民還以與民史氏曰方其囏厄豈暇逺訴即其居而豫之取其近也王氏曰恤民之囏厄則司救所謂歲時有天患民病以節巡國中及郊野而以王命施惠也國及郊野以鄉里為中故恤民之囏厄冝以鄉里之委積門關之委積以養老孤賈氏曰門謂十二國門關十二關門出入皆有稅足國用之外留之以養老孤故司門云以其財養死政之老與其孤鄭鍔曰門關之委積出於商旅之利父老死於王事而其子孤子死於王事而其父老皆死義之家也取諸此以養之使民知利不勝義所以激天下之大義也郊野之委積以待賔客王昭禹曰近郊五十里六鄉在焉逺郊百里六遂在焉謂之郊里則異於鄉里以在鄉遂之間言之賈氏曰六鄉之民所居郊者其委積留以待賔客其賔客至郊與王國使者交接因即與之廪餼鄭鍔曰芻薪禾米賔客道路之所頒而郊勞之禮實在乎此故積於郊里以待之王昭禹曰司徒大賔客令野修道委積小司徒小賔客令野修道委積野指郊里之地言之野鄙之委積以待羇旅賈氏曰野鄙據六遂在郊外曰野王昭禹曰遂地謂之野合五鄼而為鄙則野鄙為遂地明矣六遂中有五百家鄙故以鄙表六遂亦可兼公邑在甸地者鄭鍔曰康成謂羇旅為過行寄止者以經考之乃旅師之所謂新氓蓋羇旅無定名此乃自逺方新徙而來至於六遂未授田之人如王制所謂自諸侯來徙於家者也田雖未授身留於此則用野鄙之委積待之冝矣縣都之委積以待凶荒賈氏曰縣四百里都五百里不見稍三百里則縣都中可以兼之特於此三處言凶荒者畿外凶荒則入向畿內取之畿內凶荒則向畿外取之是以鄭即通給解之鄭鍔曰凶荒則流離入關者多矣故積於縣都以待之如漢時關東水旱流民入關中仰食之類即都鄙之境上以賙恤之不來莩於京師李景齊曰司徒荒政所以散利或者取具於此歟史氏曰郊里則逺井邑矣賔客不常至野鄙則逺廛市矣羇旅不常有縣都則逺鄉遂矣凶荒不常見皆俟時而豫之故云待也劉氏曰曰恤者非恤不可行曰養者直以充其生待者必有以待之皆互文以相見鄭鍔曰凡此五地委積出於民耶出於官耶以司門觀之凡財物犯禁者舉之以其財養死政之老與其孤則關門之委積由此若夫其他余以謂三年九年耕所餘之粟皆積於此凡賔客㑹同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積賈氏曰上經委積隨其所須之處此經委積據㑹同師役行道所須故分布於道路逺處須多故有積近處須少故有飲食及委王昭禹曰衆之所至必有所須故道路皆有委積以待之鄭鍔曰賔客之往來㑹同之畢至師役之竭作其人衆矣道途之所須寢食之不便其何以行之哉遺人之官自國門之外野中之道十里以至三十里三十里以至五十里近則有廬鄭康成曰廬若今野候徙有庌也王氏曰廬小室十里可以飲食而息焉史氏曰勞其飢渴也逺則有宿鄭康成曰宿可以止宿若今亭有室矣王氏曰三十里則可以宿焉故為大室史氏曰備其之絶又逺有市廬則具飲食以待之宿有路室路室則有委以待之市有候館王氏曰五十里則四旁皆可以日中至焉故有市也可以候賔旅而館之焉王昭禹曰先言廬後言館則廬小而館大候館則有積以待之如是則日無飢渴之憂夜有寢處之便適千里者無宿舂糧之勞亦不至於暴露而茇舍則孰憚於從王事哉然必以三十五十里為率者正師行不過三十里吉行不過五十里之法以五十里計之則一市之間有三廬一宿三廬各為飲食蓋所給者賔客㑹同師役之主將黃氏曰國中賔客禮積有司供見大行人軍旅糧食廪人供自甸而往其廬有路室有候館自國野逹于天下薛氏曰成周封建之制自諸侯祿地及祿士之外其閒田之歸於公上者雖領於王官皆藏於天下故自都逹境十里有飲食三十里有委五十里有積凡糗糧芻茭具焉以待軍旅故周禮一書經國之用具於九式而軍旅無與蓋所以藏富於民而不明民以用武考之於詩疆場有積倉之具徹申伯土疆以峙其糧而左氏亦云衛取於相土之東都以㑹王之東搜夫倉積於豳糧峙於申㑹搜之備逹於衛境天下之賦藏略可覩矣下至春秋猶有存者齊侯之師僖四年陳鄭共其資糧屝屨晉入楚境輒得館榖奈何王綱解紐官守曠紊諸侯遂得以私治其財自用其兵至於京師之饑告飢於列國之晉先王之政掃地矣凡委積之事巡而比之以時頒之鄭鍔曰巡而比之則所積常有其物王昭禹日以校叙其多寡史氏曰不使過數又以時頒之則施惠不失其時王昭禹曰豫備其所須則物足以給其求而無乏事矣由此觀之周人豈欲多藏為富國之計哉後世頭㑹箕斂損下益上錢貫朽粟紅腐陳陳相因者固不無也水旱凶荒老孤流離死溝壑者不少以遺人之官廢故也余觀左氏載單襄公假道陳以聘楚膳宰不致餼司里不授館單子謂其滅先王之官必有大咎則賔客館宿之廢又非一日矣均人中士二人下士四人府二人史四人胥四人徒四十人鄭康成曰均猶平也王昭禹曰謂之均人則無所不均與土均異矣均人所均以人為主土均所均以地為主史氏曰先王立均人所以均人民人民所食者在乎地故地政地守地職皆由此均焉掌均地政均地守均地職均人民牛馬車輦之力政賈氏曰均人所均地政以下總均畿內鄉遂及公邑鄭鍔曰地政欲取於地者均也政或為正或為征此均地政均力政宜依康成為征蓋考下公旬用民之日知此政當為征地守欲制其域者均也賈氏曰謂畿內川衡山虞澤虞皆遣其地之人民守護之及其入山林川澤取之者使出稅以當邦賦地職欲於任其事者均也賈氏曰若農圃之屬均人民牛馬車輦之力政欲用其力者均也鄭康成曰力征人民則治城郭涂巷溝渠牛馬車輦則轉委積之屬黃氏曰均人掌均力政自國中推行之於天下猶閭師之民職縣師之軍賦遺人之委積也周禮地職必聨地守山川林澤丘陵墳衍原隰五地其政本通而虞衡之地必常辨之不使與民雜因其地之多寡媺惡而均之必使一夫之所受皆足以食其一家不使有餘不足相懸絶是故地政均則地守地職可均矣民之作業不同必使皆得自盡其力而後任公家之事為之程等與貢稅相補除不使輕重勞逸不相侔是故地守地職均而後力役可均矣力政力役之政令不必改字王氏曰地政上所以正下地守地職下所以供上人民牛馬車輦之力征則征於地守地職之人而已凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉鄭康成曰豐年人食四釜之嵗也人食三釜為中歲人食二釜為無歲歲無贏儲也公事也旬均也劉執中曰旬猶周遍也謂均其民力周遍皆用其三日焉鄭鍔曰或謂周禮一經於徒役之事以為用民之力事之至大故屢言之今觀均人視嵗上下為用民之節不過一日二日三日之差奚為其然余嘗論之是說自前漢始文帝集諸儒刺六經作王制以為用民之力歲不過三日自是學者不敢違鄭康成覺其不通遂改旬為均曰公事均用三日余嘗笑其鑿古者龍見而畢務火見而致用水昏正而栽日南至而畢故衛文公楚宫之作仰占定星之中詩人以謂得其時制則知力役興於農隙之時十月之候營室之中也一旬而三日則一月而九日計冬之三月則二十七日矣年豐則食有餘多用其力不為虐也一旬而二日則一月六日計冬之三月則十八日矣中年食少歉減豐年三分之一也一旬一日則一月三日計冬之三月則九日矣無年而力役不作減三分之二如以為一歲不過三日奚必諄復作經屢言役事之為大乎陳及之曰此所役者非師旅行役之事師旅行役逺者二三年近者過時而反安能以歲三日為斷或謂此非師旅行役則人主用民力荒矣殊不知師旅行役之事非歲所常有就使有之則其調發自有定制東征之師三年而歸采薇首尾一年何謂三日審如是說則無年公旬用一日苟有門庭之寇如東郊之患涇陽之患一日惡可集事是皆書生之說也王制內則云五十不從力征六十不與服戎則力征豈不與戎事異乎陳君舉則曰古者民年三十而事六十而免名在官者三十年約其在官之齒而以歲三日為斷用之九十日而免則終身不復役其說以之從力征則善謂戎事則未可也軍事不得以時日為斷雖愚者亦知其說鄉大夫云國中二十而征野十五而征夫年十五而使之力役非人情矣當以二十為斷六十而免在官者四十年林勛本政書曰凡調役之法冝使丁夫皆十人為聫歲輪一人祗役一月周而復始凡執役在官則其九人各於其家償其三日之役如此民無道路之勞官無交畨之冗公私各得其所周禮所謂五人為伍十人為聫者也想先王用民大要如是若每人役其三日煩擾為甚凶札則無力政無財賦不收地守地職不均地政賈氏曰凶札即廪人不能人二釜之歲王昭禹曰荒政所謂弛力鄭康成曰無財賦恤其乏用也財賦九賦也王氏曰荒政所謂薄征李景齊曰民方資利以自贍安可以稅斂重擾之乎故無財賦鄭康成曰不收山澤及地稅王氏曰荒政所謂散利也李景齊曰有地守地職則有貢矣不收則不責其貢亦不平計地稅也非凶札之歲當收稅乃均之耳李景齊曰有財賦地守地職之事則必有政不均地政則盡弛之黃氏曰特言無財賦者國中九職蓋有不授地而出征賦者如百工商賈閒民夫布皆是凶札無財賦其見於經者關市不征是也均人掌均力政凶札舍力役是其職也無財賦不收地守地職無預於均人其言此者蓋為均地政凶札最先舍力政甚則弛財賦又甚則不收山澤及地稅至此則不均地政每歲均之其中不免常有小小變易則亦常常均之凶札未至於不收地守地職則亦均之不均者不擾動之也力稅役賦皆免地政不均可也李景齊曰一歲之入固國用所由以給今以凶札而悉弛之則何以供一歲之入是以見先王之備凶荒者畜積有素矣三年大此則大均鄭鍔曰上文凶札之故而不均特權時之變耳久而不修則法浸以壞故於三年大比時則大均不以一時之變廢萬世之常此紀綱所以不壞也鄭康成曰有年無年太平計之若久不修則數或缺劉執中曰謂國之力役事寡而民之力政尚多三年用民而猶有未役者故大比之三年之外取其未役者役之所以能盡公旬三日之法黃氏曰大均因於大比大比不可移易大均亦不可移易古者大均有禮今制三歲占籍名曰推排歲旱則免雖古法其大意則甚失之矣周禮訂義卷二十一
