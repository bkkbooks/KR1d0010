body:
  text: 周禮訂義卷七十八宋王與之撰廬人為廬器陳用之曰鄭氏讀廬為纑盖廬有緫制之稱廬器謂柲也柲櫕也先儒以為積竹杖則所謂廬器者盖緫合衆體而成其為器焉夫兵之用以勝為主勝物則其致用者不可不求其堅固故櫕之屬積竹為之取其堅固也鄭鍔曰廬者人之所託處也莊周曰仁義聖人之籧廬可以托宿而不可以久䖏余取以為證焉夫所以攻刺乎人在兵兵之所托以為用者在柄非兵也特兵器之所托焉耳亦猶廬然非人之所居也特人之所托焉也易氏曰兵有五而弓矢不與焉曰戈曰殳曰㦸曰酋矛曰夷矛凡五也五兵又有攻金之工冶氏等為之今廬人雖言五兵六建然廬器非兵事也亦非専言五兵也特為五兵之廬器而已戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋鄭康成曰柲猶柄也王昭禹曰戈矛㦸之柄謂之柲者盖操執之以為用則謂之柄左右揮而為取必則謂之柲柲言其事而且有慎意故音毖陳用之曰殳撃兵也如杖而無刃鄭康成曰八尺曰尋倍尋曰常鄭鍔曰殳長尋有四尺則一丈二尺陳用之曰戈㦸皆刺兵也戈二刃㦸三刃鄭鍔曰車㦸常則一丈六尺謂之車㦸者疑㦸之制人所執者與車所建者長短不一也惟建於車㦸則丈六尺也左傳言楚武王荆尸授師孑焉注謂孑㦸也㦸以授師豈非人所執之㦸乎顧命云一人執戣一人執瞿説者皆以為㦸謂之執則人所執可知以是觀之記者曰車㦸所以别之也酋矛夷矛皆勾兵矛上銳而旁勾酋矛夷矛特因長短而取數爾矛用以勾則冝長於㦸然後有及故酋矛長二丈四尺酋言就也近而就之也以酋矛為長為徃而就之故曰酋矛夷言傷也以夷矛極長二丈四尺勾則有及而傷物為易故曰夷矛鄭鍔曰清人之詩曰二矛重英盖指此二矛為言也矛之飾以朱而英飾以毛羽故詩人有朱英之説趙氏曰戈以下是五兵建於車上其尺寸皆通刃數算了鄭鍔曰此言戈柲六尺六寸直指其柄之長以為言耳冶氏為戈廣二寸内倍之胡三之援四之則援長八寸矣疑此言者柄而已非通刃之辭也即前六等之數皆以四尺為差司兵云五兵五盾又云軍事建車之五兵盖有車之五兵有歩之五兵車五兵戈殳㦸酋矛夷矛是也歩卒五兵無夷矛而有弓矢然夷矛雖不施於歩而弓矢未甞不設於車小戎云交韔二弓則車上弓矢可知戈柲雖有六尺六寸却是邪揷在車上只髙四尺所謂既建而迤也獨戈言柲即短者舉之以包其餘也王解云凡用兵器逺則弓矢射之近則矛勾之勾之矣然後殳者撃之戈㦸者刺之廬人所序則以長短為先後戈在先言其極短夷矛在後言其極長刺兵莫短於戈莫長於車㦸車㦸常則長一丈六尺矛所以句冝長於㦸然後可及故酋矛常有四尺則長二丈夷矛三尋則長二丈四尺殳特以撃長短冝適中故長尋有四尺計一丈二尺先王制兵以五人為伍即一伍之中而五兵具盖五兵闕一不可一伍而五兵則人執其一隨所冝而應之若弓矢則夫人皆有故經有司兵又有司弓矢之職凡兵無過三其身過三其身弗能用也而無已又以害人鄭鍔曰人長八尺夷矛之長固已三乎人之身矣自是而上不可過過則人之力有所不能用非惟不能用且其長不可運又將害乎用矛者之身此兵器之長及夷矛而止正以不可三其身耳故曰過三其身弗能用也而無已又以害人謂之而無已者猶言不特如此也賈氏曰已止也謂不徒止又以害人人自己身也陳用之曰已疑當作已字凡兵雖善必已之體力勝及能用五人之伍左右前後手足耳目有以相及也所執之兵過三其身非特人之體力不能勝之用不便利而誤焉有以害乎人矣故曰又以害人人對已而言之故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且渉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不渉山林之阻是故兵欲長賈氏曰司馬法云弓矢圍又矛守戈㦸助此言攻國之兵短則弓矢也守國之兵長則殳矛是也攻國守國皆有戈㦸以助弓矢殳矛以戈㦸長短處中也易氏曰此言攻國守國復有長短之制非於定制之中復有増損於其間兵莫短於戈與殳故攻國者用之兵莫長於㦸與矛故守國者用之各欲其器之便於人而已凡兵句音鈎兵欲無彈去聲刺兵欲無蜎於全反陳用之曰所謂句兵者指矛而言也所謂刺兵者指戈㦸而言也所謂撃兵者指殳而言也鄭氏以戈㦸為句兵以矛為刺兵為改句言撃其失甚矣字說曰矛者句之殳者撃之戈㦸者刺之盖本此經所謂句兵撃兵刺兵而言之也鄭鍔曰句人則欲其来故其制欲無彈言不可如彈弓之勢向外去而不収也王昭禹曰彈謂如發丸失於大圜也陳用之曰彈之物擊而不著者句兵之用正以著物為事故欲無彈刺人則欲其入故其制欲無蜎言不可如井蟲之傴撓而無力也陳用之曰蜎之為物弱而不勁刺兵之用正以剛健為本故欲無蜎是故句兵椑音鼙刺兵摶音團毛氏曰因上文各致其義盖上統言其柄此正言所把之處而已凡柲皆八稜惟把處不然句兵之把則側方而去楞故曰椑椑隨圓而扁也鄭康成曰齊人謂柯斧柄為椑刺兵又非椑也去稜而全圎也故曰摶摶圎也鄭鍔曰椑則其勾而來也易摶則其刺而往也易􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則宻是故侵之毛氏曰上欲見兵柄之圎扁故以句刺為對此欲見其把圍之長短逺近故以􅌛為對賈氏曰以殳長丈二而無刃可以􅌛打人故云􅌛兵鄭鍔曰變句兵而謂之􅌛者戈㦸可以句可以􅌛殳不可以句然而無刃而長可以􅌛人也故専言勾兵足以見戈㦸而不及殳於是言􅌛以包之左傳晉人以㦸勾欒桀而殺之子而以戈擊子晳以戈㦸可勾可􅌛之驗也至於殳雖建於車然王之行則使人執以前驅故詩曰伯也執殳為王前驅謂其可以撃人故也毛氏曰同强與矢人之同異彼以兩物相比為同此就一物之上下以為同故鄭曰同强上下同也鄭鍔曰􅌛兵之柄上下及中同欲强勁手所舉處之圍則欲細而已惟强則勁而有力惟細則用之也校與左𫝊叔孫絞而婉之絞同校之為言疾也趙氏曰謂柲圍細則用之之時校疾不礙手費力也趙氏曰刺兵同强謂戈㦸柲夲末中央要堅强同也手所操處圍却要重重則増之使豐以之刺則必傅著也如傅貼之傅也宻著而無失也操重以刺則著而無失著而無失則能勝之矣侵言勝也凡為殳五分其長以其一為之被而圍之趙氏曰被謂把中圍謂圍而圜之也正其所執之處而手所被者故曰被然前云舉而此却云被者盖舉則舉而提之被則操而用之之處本不同也殳長尋有四尺計丈二尺五分其長以其一為之被而圍之則把處得二尺四寸長圍圜也於此處圜之則非所執之處必不圜矣注謂凡矜八觚明其非所執處有稜角也參分其圍去一以為晉圍五分其晉圍去一以為首圍趙氏曰晉謂殳下揷車處銅鐏首謂殳上頭銳處也三分被圍去一為晉圍則晉圍長一尺六寸而趨鐏處又殺也五分晉圍去一為首圍則首圍長一尺二寸有竒而趨上頭尖處愈殺也凡為酋矛參分其長二在前一在後而圍之趙氏曰酋矛止言二在前一在後不指其圍處長處則五分去一其尺寸尤不可考意者與殳同制故經略之耶圍之亦欲圜匝而好操執也陳用之曰舉殳矛與酋矛之圍則戈也㦸也夷矛也三者之圍亦從可知五分其圍去一以為晉圍參分其晉圍去一以為刺圍陳用之曰晉圍指其在下言之首圍指其在上言之刺圍指其上銳者言之於殳言首以其上無刃直指其首而已於矛言刺以其上為有所入故以其銳名之鄭氏以矛為刺兵其誤盖本於此鄭康成曰為戈㦸之矜所圍如殳夷矛如酋矛凡試廬事置而搖之以眡其蜎也炙諸牆以眂其橈之均也橫而搖之以眡其勁也鄭康成曰置猶樹也賈氏曰置而搖之謂豎之於地上以手搖之以眡其蜎蜎然均否王昭禹曰以審其幹弱而橈也鄭鍔曰不堅勁則摇之而橈矣鄭康成曰炙猶柱也以柱兩墻之間輓而納之本末勝負可知也正於牆牆歰賈氏曰謂柱之兩牆觀其體之强弱均否賈氏曰橫而搖之謂橫置於膝上以一手執一頭搖之以眂其堅勁與否也陳用之曰置而搖之以視其蜎言所病也炙諸牆以視其橈之均橫而搖之以視其勁言所利也六建既備車不反覆謂之國工鄭康成曰六建五兵與人也俞氏曰車之六建夷矛建於酋矛之前酋矛建於㦸之前㦸建於殳之前殳建於戈與人之前王昭禹曰六建所謂車有六䓁之數也鄭康成曰廬人所造有柄者戈㦸殳酋矛夷矛五兵也趙氏曰六等無夷矛於廬人詳之此器何不具於車若謂夷矛二丈四尺太長而不便於車上然司兵軍事建車之五兵則夷矛在其車上且夷矛髙酋矛四尺與車六等髙低次第恰好相應意者夷酋同為矛六等止辨其名不同者而名之同者其器相類不必辨耶否則六等之建有無互相見耶反覆猶軒輖鄭鍔曰前云車有六等之數盖以軫與人而言之不及夷矛也論其髙下故曰等此云六建盖人與兵皆有立於車上論其建立故曰建也凡此六者皆建於車上制不得法長短小大不適其平則車不能勝必顛覆也惟不顛覆自非盡制作之巧者有所不能矣匠人建國鄭鍔曰梓匠輪輿皆工之巧而梓人與輪輿只能為器為車而已至於為工而從事於斧斤者匠也攻木攻土無所不能是以謂之匠陳用之曰大司徒以土圭之法求地中主天地之中而言焉匠人建國水地眡景晝參夜考又將求王國之中水地以縣音𤣥趙氏曰縣者謂於造城之處四角立四柱於柱四畔垂䋲以正柱柱正然後去柱逺以水平之法望柱髙下定即知地之髙下然後平髙就下地乃平也盖地髙則柱髙柱髙則映於水之影短水地者於柱四角之中掘地貯水以望柱也毛氏曰謂於地之四邉掘而為溝以圍繞之而注水於其中水之淺深相似不偏則雖不平髙下依水以為平矣然水所注湏臾乾焉故既依水以得其平又以䋲依水而縣之水雖乾而䋲存則不復資於水也以䋲為正足矣此縣冝以䋲相牽連而縣於水之上也鄭鍔曰天下之至平莫如水將以知地之髙下則用水而視之天下之至直莫如繩將以知𣙗之邪正則用繩而視之謂之水地以縣者既度地而築之未知其髙下乃用水以望之也然水可以望髙下必以繩而騐之用水以平地立柱以懸繩觀水矣而又觀繩則平與直皆可知也置槷魚列反以縣眡以景毛氏曰水地之縣求地之平也既得平矣冝辨方以正東西南北之所在正之如何置𣙗以縣而已鄭鍔曰八尺之表謂之𣙗𣙗與書所謂臬司之臬同皆法也八尺之表則法之所在也夫立𣙗以致日景而正四方𣙗或不正則景從而差先王垂其繩以正其𣙗而後眡其所致之景焉上言水地以縣以依水而橫縣之也此言置𣙗以縣則直縣之而已趙氏曰唯置𣙗平直則冬至夏至日出入景或尺五寸或一丈三尺皆可眡矣置水於地置𣙗於地必假䋲而後正故皆以縣焉陳用之曰謂之水與司徒所謂土其地者同以測其土之深故謂之土以求諸水之平故謂之水為規識日出之景與日入之景毛氏曰識謂記之也此申明上文眂景之義大抵平地冝以水水在地而近人審之為易辨方冝以日日在天而逺人審之為難故置縣𣙗以致其景而眡之也然日不暫停晷亦隨之𣙗雖能致其景而又隨其出入之景而規識之如是則日雖在𣙗而𣙗所以得之者規畫之識而已此言規猶輪人之言矩其隂陽也矩與規方圓不同皆為刻畫之稱鄭鍔曰記景之法必畫為規者盖規圎而矩方惟因其圜然後中屈之鄭康成曰度兩交之間中屈之以指𣙗規之交處則東西正也於兩交之間中屈之指𣙗又知南北正也易氏曰又於四旁之地為規圜之勢畫以識之日出於東其景在西則識其出景之端日入於西其景在東則識其入景之端景之兩端既定中屈其所量之繩而兩者相合則地中可驗晝參諸日中之景夜考之極星以正朝夕趙氏曰晝是晝漏半正午時此時日正行在天之中雖不正在天中行然必在極旁行及夜候極星則日去極逺近可驗夜正是夜半三更正子之時極星謂北辰正當天極中以居天之中衆星所拱者謂之極極言中也易氏曰又慮所規之不正也復以出入之景與日中之景三者相參故曰參又慮所參之或偏也復以日中之景與極星之度兩者相考故曰考且極星之度何與於日月之景凡以驗日景之中而已盖夏至日在南陸躔於東并去極六十六度有竒而其景尺有五寸冬至日在北陸躔於牽牛去極一百一十六度有竒而其景丈有三尺春分日在西陸躔於婁秋分日在東陸躔於角去極九十一度有竒而其景均焉觀日躔去極之逺近以驗四時考四時日景之短長以求地中則東西可正王昭禹曰晝參日景所以正其朝也夜考極星所以正其夕也陳用之曰朝主東言夕主西言東西正則南北可從而正矣東西南北位皆正則中可求矣鄭鍔曰晝參日中之景所以求地之中夜考天之極星所以求天之中如是則可以正朝夕國當天地之中四方各正當朝則朝當夕則夕早晚晷刻不失之先不失之後於此而為天子之居以受百官之朝則朝不廢朝暮不廢夕自非辨方正位之初克正朝夕安能至此匠人營國鄭康成曰營謂丈尺其大小鄭鍔曰靈臺之詩云經之營之定之方中之詩云始建城市而營宫室則建國之與營國異矣建言其始造營言其築作此言經營之法王昭禹曰作而立之之謂建言其始也周圍而治之謂之營言其終也方九里王氏詳說曰周制天子之車十有再就冕十有二旒旂十有二斿鎮圭十有二寸饗十有二牢無適而非十二也雖衮冕九章然三辰旂旗又列於太常矣况典命言上公國家宫室以九為節此曰營國九里則是天子之城下同於上公矣案多士傳曰古者百里之國三十里之遂二十里之郊九里之城三里之宫五十里之國九里之遂三里之郊一里之城以城為宫說者謂百里之國外城九里中城七里内城五里七十里之國外城七里中城五里内城三里五十里之國外城五里中城三里内城一里於百里之國言外城於七十里五十里之國言内城互文見義耳則是天子之城當十有二里矣此云九里與典命不同鄭氏於此兩存其說陸氏又强為之說謂方九里者天子之中城然經無外中内之字焉可别加一字乎劉氏曰詩云上入執宫功言鄉井之民至冬皆當保城井田之制城中之宅率一家二畆半計地算居九里之城不能容七萬五千家然周禮所説天子中城也春秋曰城中城以諸侯之有中城知天子之有中城也匠人云宮隅之制宫隅則天子宫也城隅則中城也中城方九里則宫城冝方三里中城有左祖右社九卿之室則百官治事之所也居民不至焉則限親踈也其外城經傳無文公羊説以為十雉長二百尺凡方三十餘里則足相容鄭鍔曰天子外城冝十二里而匠人營國為城九里者盖中城也外城臯門在焉若今南薰門矣中城雉門在焉若今朱雀門矣内城庫門在焉若今宣徳門矣應門若今大慶殿門路門若今垂拱殿門賈氏曰下文有夏殷事此九里者或通異代王昭禹曰謂方九里盖作記者之誤矣旁三門陳用之曰旁者言其國之旁旁之門有三焉緫四旁而有十二門以象十有二辰之位分布乎四方國中九經九緯經涂九軌鄭康成曰國中城内也經緯謂涂也賈氏曰南北之道為經東西之道為緯面有三門門有三涂男子由右女子由左車從中央經緯之涂皆容方九軌軌謂轍廣乘車六尺六寸旁加七寸凡八尺是為轍廣九軌積七十二尺則此涂十二歩也旁加七寸者輻内二寸半輻廣二寸半綆三分寸之二金轄之間三分寸之一愚案此已見輪人為盖乃兩輪相對長八尺是為廣也陳用之曰言經涂九軌則緯涂可知矣或疑經字為衍謂九經九緯者即涂故也左祖右社面朝後市易氏曰左右前後據王宫而言古者建國王宫居中左者人道所親故立祖廟於王宫之左右者地道所尊故立國社於王宫之右鄭康成曰宗廟是陽故在左社稷是隂故在右鄭鍔曰左所以本仁右所以明義朝者義之所在必面而向之故立朝於王宫之南市者利之所在必後而背之故立市於王宫之北鄭康成曰三朝君臣治政之處陽故在前三市是貪利之處隂故在其後左右前後之位皆建國之定法也市朝一夫易氏曰以開方言之則四方各百歩為百畝此固一夫之地而為市朝之制然朝者官吏之所㑹市者商賈之所集處以一夫之地則為太狹矣或曰此經既言夏后氏之制則禹以卑宫室而盡力乎溝洫是一夫之地在溝洫為甚利在市朝不為不足是固然也亦不幾於太卑乎甞謂王朝有三市亦有三燕朝在路門之内治朝在路門之外外朝在庫門之外此三朝之别也大市居中則日仄而市朝市居東則朝時而市夕市居西則夕時而市此三市之别也以三朝三市各一夫之地庶乎可矣趙氏曰百畝之地一夫耕之可以無飢故市朝各以一夫不可侈大其制以妨民之居夏后氏世室鄭鍔曰周繼夏商之後制度加倍然亦因二代制作而増廣之記者欲言周人明堂之制故併述三代宫室之制以見其來之有漸王昭禹曰明堂之中有世室有重屋夏曰世室商曰重屋周曰明堂各舉其一而言之也以月令攷之天子春居青陽夏居明堂秋居緫章冬居𤣥堂至中央則居太廟太室然則世室則太廟太室也武公之廟武世室也則世室為宗廟可知矣以夏后氏承堯舜之後如繼世而有天下此宗廟所以謂之世室也君子將營宫室宗廟為先故夏后氏以世室為始也重屋謂王居正堂之路寢所以自居以安身也王之制始於夏而為未備故事神世室而已至商則其制稍備非特見於神也所以自居以安身者亦備其制焉故商人言重屋明堂者王者明政教以接人之堂也故月令於夏言天子居明堂以夏萬物相見之時而王者向明而治俯已接人者於是乎在周監於二代法度之文至周為大備而其盛不可復加焉故其布政教之堂謂之明堂而其文為盛經言周人尚文亦以法度之文大備於此故也或舉世室或舉重屋或舉明堂其制雖或脩廣髙下之異數而其大槩未始有殊故夏言世室非無重屋明堂也商言重屋非無世室明堂也舉其一互相明而已陳用之曰夏謂之世室商謂之明堂其名雖殊其實一也所謂世室非廟所謂重屋非寢以其皆有所謂堂者故也言夏后氏世室矣而曰堂脩七尋則重屋非明堂乎明堂者王者之堂也有堂斯有室有室與堂斯有屋矣曰世室者以室言之曰重屋者以屋言之曰明堂者以堂言之商因於夏禮周因於殷禮損益雖不同制度本無二自其異者視之夏度以歩商度以尋周度以筵自其同者視之則五室九階其下同四戸八䆫其旁同四阿重屋其上同自經之所記而互見者言之夏周五室則商可知矣商人四阿重屋則夏周可知矣夏后氏九階四旁兩夾牎有門側之堂夏有室則商周亦從可知矣四隅之阿四注複屋則上貟下方亦從可知矣以夏后氏之堂脩二七廣益以四分脩之一周人明堂東西九筵南北七筵觀之則知商人重屋堂脩七尋其廣九尋明矣或以四増一或以七加二所謂不相襲禮也要之五室以象五行四戸以象四序八牎以應八節上貟下方以法天地之形此三代明堂之大致也堂脩二七廣四脩一趙氏曰堂言中間之明堂也東西言廣廣闊也南北言脩脩深也古人以六尺為歩以九尺為筵以八尺為一尋其數不可易也其脩二七謂堂深兩个七歩計十四歩以尺計之則深八丈四尺也廣四脩一者盖夏度以歩堂脩十四歩今東西之廣如脩之外又益以四分脩之一且南北為脩以十四歩四分之一分得三歩半以十四歩又益以三歩半則堂廣十七歩半以尺計之則十丈五尺也五室三四歩四三尺趙氏曰五室注謂堂上為五室象五行木室於東北火室於東南金室於西南水室於西北土室於中央是也鄭鍔曰康成已謂世室為宗廟又於五室言五行之神何耶彼以為太廟明堂周制故也且以其制雖同然亦不可以處祖先之處而處五行之神然則此言五室者盖宗廟之神所處之室如後世某宗之室也所以不記其數者夏人逺矣世室之制大略如是也三四歩言室之深四三尺言室之廣也謂四角四室其深皆三歩其廣如歩之外又益之以三尺中央土室其深四歩其廣如歩之外又益之以四尺三歩三尺言四室脩廣四歩四尺言中室脩廣也四室脩當一丈八尺廣當二丈一尺中室脩當二丈四尺廣當二丈八尺通計五室則南北共深六丈東西共廣七丈但中間既為明堂又為五室意者五室包在明堂之内也此所計丈尺係五室四角相接無路可通所以環溪圖於四室角皆約空一筵或一歩者不為無見也毛氏曰堂脩十四歩而五室之脩止於十歩堂廣七十七歩半而五室之廣止於七丈者以其餘以為四旁中央之往来故也王氏詳說曰夏之世室堂脩二七為南北十有四歩廣四脩一為東西十有七歩半則是一堂脩不過八丈四尺廣不過十丈五尺矣堂上五室中央一室脩四歩廣四歩四尺四角四室脩三歩廣三歩三尺則是南北三室不過六丈東西三室不過七丈矣每室之間脩不過丈八尺廣不過丈八尺加三而大室所加脩廣之外不過一尺耳曽不謂宗廟之室所以安乎神靈而王之所以為祼者即丈八之地而可為乎九階趙氏曰九階謂世室之南面三階東西北各二階是為九階明堂位云三公中階之前北靣東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上據此則南面三階可證也圖說曰室有九階也四旁兩夾窻趙氏曰四旁兩夾窻者謂窻助户為明言四旁者謂五室室有四戸之旁皆有兩夾窻每戸夾以兩窻則五室二十戸四十窻也白盛鄭康成曰蜃灰也盛之言成也以蜃灰堊牆所以飾成宫室鄭鍔曰五室皆用白灰以盛之故曰白盛門堂三之二趙氏曰門堂如門樓之類裏面起成㕔堂外面須起門樓出入其中亦有堂有室也毛氏曰門側又有堂室爾雅所謂門側之堂謂之塾書所謂右塾左塾則堂與室為左右之塾矣正室之堂既為五室不容聴政於其中又不容憩息故令門側為之堂以聴政事為之憩息也䟽謂五室十二堂謂五室則然謂十二堂則當十有二門非矣此泥於月令之文大抵聴朔不過於居其堂而已假令春三月居東門之堂則夏居南門之堂閏月居門亦然易氏曰言門側之堂取數於正堂之南北其脩為十有四歩三分取二則門側之堂其脩為九歩二尺正堂之東西其廣為十七歩半三分取二則門側之堂其廣為十一歩四尺此門堂之制室三之一趙氏曰室注謂兩室與門各居一分據此則室有兩室如門樓兩旁夾室門堂居上堂三之二室居正堂三之一皆小故也但不知三之一指一室之數或兩室共三之一陳祥道曰是室也非三四歩四三尺之室乃門堂之室也門堂之脩九歩二尺則二室之南北計其脩則四歩四尺也假令堂上南北十四歩門堂三之二此十四歩裂為三分而得其二則為九歩二尺室三之一裂為三分而得其一則為四歩四尺矣門堂之廣十有一歩有四尺則二室之東西計其廣則五歩有五尺也假令堂上東西十七歩半門堂三之二以十七歩半裂為三分而得其二則為十一歩四尺室三之一一十四歩裂為三分而得其一則為五歩五尺也易氏曰言門堂之室取數於正室之制正室之南北其脩為十歩三分取一則門堂之室其脩為三歩二尺正室之東西其廣為十一歩有四尺三分取一則門堂之室其廣為三歩五尺三分寸之一此門室之制項氏曰門側之堂居正堂三分之二門堂之室二翼門共三分各居其一若以為居上五室三之一則太窄恐非也緫論王昭禹曰其居有堂其處有室升降有階出入有門慮其不徹也夾䆫以為明慮其不潔也白盛以為飾夏后氏如此則商周之制亦然矣殷人重屋堂脩七尋堂崇三尺鄭鍔曰康成謂重屋者王宫正堂若大寢也明堂位云複廟重檐謂重承壁材也重屋之制盖重檐以為深宻也殷武之詩曰松桷有梴旅楹有閑寢成孔安此言商之路寢也祀髙宗而特言脩路寢者康成謂髙宗復成湯之道故記者於商制謂此也名曰重屋者商人因夏人所居之屋重増廣其制度也易氏曰殷人度以尋則尋凡八尺也世室之制大抵南北狹東西長知堂之南北其脩七尋為五丈六尺則知堂之東西其廣九尋為七丈二尺也鄭鍔曰堂崇三尺盖堂之基言堂之基址其髙三尺也如此則夏堂一尺為卑宫室於理無害矣王氏詳説曰案尚書大𫝊曰天子之堂廣九雉三分其廣以二為内五分其内以一為髙東房西房北堂名三雉夫雉髙一文長三丈以數約之則是堂之内廣十八丈髙三丈六尺矣至於東房西房北堂每間亦各廣九丈矣此言天子燕寢之制燕寢之房且極於九丈古人寢不踰廟世室重屋明堂大於燕寢也冝哉四阿重屋陳用之曰阿者屋之曲重者屋之複四隅之阿四柱複屋則上貟下方可知圖說曰於室之四阿皆為重屋鄭鍔曰其屋則重檐以為深宻故因以名之焉凡二代之制大抵學者相𫝊皆謂之明堂余疑其非是盖記人於三代各記其一耳不可以下文周人明堂之言遂謂此為明堂周人明堂度九尺之筵鄭鍔曰此言周人明堂之制明堂者布政朝諸侯之宫謂之明者聖人以文明之徳致文明之治以言其面則嚮明以言其位則繼明以言其祀則明禋以言其政教賞罰道徳人倫無所不明故得以坐明堂而有天下賈氏曰夏度以歩殷度以尋周度以筵是王者相改東西九筵南北七筵王昭禹曰東西九筵則明堂其廣凡八丈一尺矣南北七筵則其深凡六丈三尺矣堂崇一筵鄭康成曰周堂髙九尺五室凡室二筵鄭鍔曰中為五室一室之廣各一丈八尺此五室當如康成上文五行之說盖明堂者祀上帝之所五方之帝冝各有室焉與夏之世室所謂五室異矣聶崇義曰四角之堂皆於太室外接四角為之則五室南北止有二筵東西各二筵有六尺乃得其度若聴朔於時之堂必於木火等室若閏月則闔門左扉立其中而聴朔焉故鄭云於文王在門謂之閏室中度以几堂上度以筵宫中度以尋野度以歩涂度以軌賈氏曰此記據周而作故備於周而略於夏殷下文皆據周而說陳用之曰夏度以歩商度以尋周人兼用之鄭鍔曰此言周制内而宫室外而野因宜取數或取諸身或取諸物其所度各異也几者尊者所憑以為安也禮有五几書有四几之文常設於行禮之際使尊者憑之則几之尺寸短矣一室之中不欲其廣取足以隠几為安可也故其度以几毛氏曰室狹而隠人以燕居而几長一丈筵之制短不過尋長不過丈中者不過九尺則筵於几為長矣堂則賔主所㑹揖遜雍容於其間燕饗飲食於其上取足以肆筵為禮可也故其度以筵宫室之制合而名之曰宫宫之中則有室焉王氏詳說曰宫者縂堂奥阼之稱非筵几所設之處然則宫冝大於室矣尋八尺也凡人張臂八尺張足六尺宫者人所處則度其地以容足為法焉故其度以尋趙氏曰宫中吾身蟠屈之地非几筵所設之處故度以尋取伸臂而尋之義野則分畫為田以授農夫而田以畝為率自六尺之歩積而至於歩百為畝是為一夫所受之田此野中所以度以歩涂雖人之所行然不足以容車則狹矣一車之軌其廣八尺經涂以容九軌為度環涂以容七軌為度野涂以容五軌為度此涂所以度以軌盖制度之立由數而起而數之所用在身在物者長短廣狭各有其宜以適用先王立法豈偶然哉廟門容大扃七个鄭鍔曰此言門之廣狭陳用之曰廟門者宗廟之門鄭鍔曰扃所以舉鼎者也有牛鼎有膷臐膮之鼎鼎有小大則扃有長短鄭康成曰大扃牛鼎之扃長三尺每扃為一个七个二丈一尺賈氏曰此約漢制度陳用之曰鄭氏謂大扃為牛鼎之扃小扃膷鼎之扃無所經見古人以扃為外閉之關其小大之制末聞知廟門之大而闈門之小可知闈門容小扃參个鄭康成曰廟中之門曰闈陳用之曰闈則旁出之小門爾雅曰宫中之門謂之闈先儒謂相通小門是也小扃膷鼎之扃長二尺參个六尺鄭鍔曰廟中以祭為主而祭以牛鼎為主故取足以容鼎也路門不容乘車之五个陳用之曰路門者路寢之門鄭鍔曰路大也王寢在是故以大言之鄭敬仲曰大寢之門謂之路門者寢者天子入而安身之地靜而復於道也陳用之曰路門不容乘車之五个則自乘車四个以上而下五个之數惟所取之然以乘車之度六尺有六寸計之自四以上其數已廣於應門二徹之三个理宜不然鄭氏求其説而不得謂兩門乃容之非也然則所謂乘車之五豈三字之誤歟鄭康成曰乘車廣六尺六寸五个三丈三尺言不容者是兩門乃容之則此門半之丈六尺五寸鄭鍔曰此與大司徒言其家可任者二家五人之意同言路門之大足以容両車之半而已應門二徹參个陳用之曰應門治朝之門爾雅曰正門謂之應門此主正治之朝門言也先儒釋之以為朝門焉鄭敬仲曰朝門謂之應門王者出而應天下之務鄭鍔曰人主出而應物之門故路門雖大不若應門之為尤大鄭康成曰二徹之内八尺三个二丈四尺陳用之曰應門雖正朝之門疑無大於廟門者二徹之内以尺計之有八三之為二丈有四尺焉比之廟門大扃七个鄭氏謂牛鼎之扃長三尺七之為二丈有一尺乃小於應門之數其不可從明矣天子之門有五曰臯庫雉應路舉應之制則臯庫雉亦從可知矣易氏曰甞疑明堂之室止於丈八尺而廟門乃二丈一尺應門乃至二丈四尺路門乃幾於三丈三尺則其制為太廣鄭氏疑其說以為路門不容乘車五个乃兩門共容三丈三尺則是路門為丈有六尺五寸其制反小於應門且非經之明文是必有差學者略其長短之數而取其因物擬物之度斯可矣鄭鍔曰二門正以乘車為度者盖王乘五路出入往來皆由是門故也於廟度以鼎扃於門度以乘車豈非因物冝而為之數哉緫論李嘉㑹曰祭祀之禮一時而入不欲先後故門之制度如此内有九室九嬪居之外有九室九卿朝焉鄭康成曰内路寢之裏外路門之表鄭鍔曰於路寢之内設為九室使九嬪居之以教九御而舉内治路寢之外設為九室使九卿居之以理百職而舉外治外之九室如後世外尚書省内之九室如後世之内尚書省也王有六宫九嬪以下分居之而又有九室以居者盖時當治事則居此以考内治也或謂居者非特於此内治事亦以此居殊不知王有三朝九卿以下朝焉未甞於九室而朝也此言九室九卿朝焉盖亦當治朝事之時則處此以治朝事爾非謂於此而朝見天子也九卿不於九室朝而謂九嬪居之可乎陳用之曰於内九室言居則九室嬪所常居於外九室言朝則朝日處之而已王昭禹曰書曰少師少傅少保曰三孤又曰六卿分職盖分而言之則曰三孤六卿合而言之則同謂之九卿孤而謂之卿者以典命考之王之三公八命其卿六命而未嘗言孤則孤盖與卿同於六命矣故外朝之法則孤卿之位同於九棘司士之擯則孤卿之儀同於特揖合而同謂之卿奚不可哉九分其國以為九分九卿治之鄭康成曰九分其國分國之職也三孤佐三公論道六卿治六官之屬賈氏曰三公三孤無正職天地四時正職六卿治之其餘非正職者分為三公治之三孤則佐三公者也但三公中參六官之事外與六鄉之教書𫝊又云司徒公司馬公司空公則三公六卿亦有職此亦據夏而言周則未見分為九分也鄭鍔曰取國之政事九分之使九卿各治其一也夫惟九卿各治其一則事各有統小大畢舉無廢務矣張氏曰九卿治之非上九卿朝焉之卿乃是九州之牧王宫門阿之制五雉宫隅之制七雉城隅之制九雉趙氏曰王宫王所居之宫門阿宫隅城隅皆是王宫之制毛氏曰注以阿為棟趙氏曰是門之屋兩下為之如今脊柱阿曲也棟非曲也且城隅不止城身而謂之城角之上浮思賈氏曰漢時東闕浮思灾言灾者則浮思者小樓也明堂位云䟽屏注亦云浮思刻之為雲氣蟲獸如今闕上為之然則門屏有屋覆之與城隅及闕皆有浮思刻雲氣并蟲獸者也則門阿冝謂棟之兩端特起者若䲭夷之類曲而相向故曰阿也盖門有䟽屏闕有兩觀城隅有浮思城門有臺宫室之制然也此明其髙則當論其極所以門不指棟而指門之阿城而指城之隅也陳用之曰先儒以為雉長三丈髙一丈以版數計之而知其然盖其髙一丈則古者版之髙廣二尺其長三丈則古者版之長六尺而止毛氏曰城牆之版髙二丈長六尺五版為堵言其髙也則髙一丈五堵為雉言其長也則冝長三丈凡雉之飛髙不踰丈牆之崇脩似之鄭敬仲曰雉之為物其飛若矢一徃而墮有分守而不相犯者也雉有分域故取其名焉故髙一丈者謂之雉長三丈者亦謂之雉傳云都城百雉大都三之一中五之一小九之一指其長為雉也此言五雉九雉指其髙為雉也王氏曰門阿長十五丈髙五丈宫隅長二十一丈髙七丈城隅長二十七丈髙九丈城隅髙於宫隅宫隅髙於門阿内外髙下之異制趙氏曰已上皆是言髙横闊之數未聞經涂九軌環涂七軌野涂五軌鄭鍔曰軌車轍也兩軌之間其廣八尺故軌為八尺也經涂直道也環涂環城之涂曲道也野涂田間之道也賈氏曰野涂國外謂之野通至二百里内或容九軌或容七軌或容五軌此言道涂廣狹之度經涂之所由者衆故冝廣環涂迂廻非有故而往者不由所由者寡故次之野涂則行人亦罕故又次之然康成於遂人注言涂容乘車一軌道容二軌路容三軌者盖遂人所言者田間之涂匠人所言者通道之涂也趙氏曰涂必以軌取類者一說謂欲使天下共由之而無異道故以軌以天下有道則書同文車同軌也一説涂是車徒所由者故度以軌欲能容車行一說涂制男右女左車中央不敢爭亂是約民於軌物之意故度必以軌三說皆通雉涂皆以九七五者盖陽數竒隂數耦天子體陽用九故數以九而七五以為差皆竒也緫論陳用之曰自宫言之則外以九以七而内以五焉王所居故也自涂言之則外以五以七而内以九衆㑹故也衆之所㑹取其廣王之所居取其小則營國之意見矣李嘉㑹曰天子之制當用十二何止於九而同於上公公卿大夫自八命而六命何其數止同於子男之五命信知考工之書非周書也門阿之制以為都城之制鄭鍔曰此言諸侯之制當殺於王國鄭康成曰都四百里外距五百里王子弟所封其城隅髙五丈宫隅門阿皆三丈王昭禹曰都城王子弟公卿所封其城如門阿之制則無過於五雉比諸侯之禮為殺宫隅之制以為諸侯之城制鄭康成曰諸侯畿以外也其城隅制髙七丈宫隅門阿皆五丈禮器曰天子諸侯臺門賈氏曰案異義古周禮說天子城髙七雉隅髙九雉公城髙五雉隅髙七雉侯伯之城髙三雉隅髙五雉都城之髙皆如子男之城髙案此都城之制與侯伯等子男豈不如都乎則子男城亦與伯等是以周禮之說不言子男及都城之髙王昭禹曰以宫隅之制為諸侯城制則無過於七雉比天子之禮為殺緫論王昭禹曰降殺以兩禮之節也故諸侯之制下於天子都城之制下於諸侯盖諸侯有功徳者乃入為卿士其禮反下於諸侯何也臣近君則威殺遠君則勢盈都於王宫於君近安得不屈禮以下於諸侯乎觀其采地不謂之國而謂之都其君不謂之監而謂之長其命也以耦不以竒其治也以則不以典其傳也以禄不以嗣則城涂之制可知矣環涂以為諸侯經涂野涂以為都經涂鄭康成曰經亦謂城中道諸侯環涂五軌其野涂及都環涂野涂皆三軌鄭鍔曰以王國環涂為諸侯經涂則諸侯經涂容七軌也以王國野涂為都經涂則都之經涂容五軌易氏曰此亦異代之制若成周之制上公九命侯伯七命子男五命其國家宫室各眡其命之數三公八命孤卿六命大夫四命其宫室亦眡其命數其制與匠人不合益信其非成周全書周禮訂義卷七十八
